body:
  text: 春明夢餘録卷二十二吏部左侍郎孫承澤撰三皇廟三皇廟在太醫院之北名景惠殿永樂中建前為景咸門門東為神庫西為神厨中奉安伏羲神農黃帝皆南向以勾芒祝融風后力牧氏配以僦貸季鬼臾區天師岐伯俞跗白高少俞少師桐君太乙雷公馬師皇伊尹神應王扁鵲倉公淳于意張機東廡王叔和華陀皇甫謐巢元方抱朴子葛洪真人孫思邈藥王韋慈藏啓元子王冰錢乙朱鋐劉元素張元素李泉朱彥修西廡從祀歲仲春上甲日甲屬東方木取生氣太常寺題請遣禮部堂上官行禮太醫院堂上官二員分獻仲秋上甲如之嘉靖初復建聖濟殿於內以祀先醫春秋祭同三皇而以太醫官主之二十一年以太醫院廟制湫隘弗稱命展拓今廟隨從禮官議增從祀僦貸季等二十八人隆慶四年禮部侍郎王希烈議三皇既祀於帝王廟請罷太醫院廟祭專遣太醫院官祭先醫不允南宮奏議臣等稽諸禮曰聖王之制祭祀也法施於民則祀之能禦大災捍大患則祀之非此族也不在祀典蓋聞上古聖神繼天立極開物成務夀世福民其功尤繫於醫伏羲觀天文明歷氣神農嘗百藥制夲草黃帝與岐伯問答而有素問之書醫道蓋昉於此矣周禮小宗伯兆五帝於四郊說者謂祭以天帝配食以五人帝春以太昊夏以炎帝季夏以黃帝秋以少昊冬以顓頊然此主於五方之位未有醫藥之專祀也至於有元自國都以至郡縣皆立三皇廟於醫者之學如宣聖釋奠禮太昊伏羲氏以勾芒氏之神配炎帝神農氏以祝融氏之神配黃帝軒轅氏以風后力牧氏之神配及黃帝臣俞跗以下十人姓氏載於醫書者從祀兩廡有司歲春秋二季行事而以醫師主之其臣虞集有言三聖人之所以惠利生人者不必以醫之一技而求夫為醫之道不上達於三聖人則不足以盡其至聖之能事是其祭雖專為醫而設然遍於郡縣則又不免失之黷矣肆我成祖御宇諏經稽典正名定祀尤以醫道關係民生至重乃即太醫院立廟以崇祀三皇正統間重加修葺聖祖神宗先後一揆咸欲躋斯世斯人於仁夀之域而永貽燕翼之令圖也洪惟皇上膺正凝命上法祖宗謂修合御藥保和聖體實惟兹所廟制湫隘則祀典弗稱欲拻拓而一新之創矩以盡度備物以章䖍斯其佑享昭假於三皇在天之靈而宣滯保和以迓乎萬夀無疆之慶臣等敢不祗承德美用樹宏基臣等切惟廟必有制祀必合法不為畫一之制則恐襲前時之故轍而無以稱觀瞻不正從祀之名則恐失醫聖之心傳而無以垂法守臣等謹將合行規制恭擬上進伏乞裁定施行都城隍廟都城隍廟在都城之西永樂中建中為大威靈祠後為寢祠左右為二司兩廡為十八司前為闡威門外左右為鐘鼓樓又前為順德門又前為都城隍門廟中有石刻北平府三大字按洪武二年以周禮有司民之祭封京師都城隍祭之三年正城隍神號去封爵命春秋從祀於山川壇三十年改建廟詔劉三吾曰朕設京師城隍俾統各府州縣之神以監察民之善惡而禍福之俾幽明舉不得僥幸而免其書所由於石二十一年復以從祀大祀殿罷山川壇奉祭惟仲秋祭嘉靖九年罷山川壇從祀歲仲秋月遣太常官祭城隍之名見於易若廟祀則莫究其始唐李陽氷謂城隍神祀典無之惟吳越有爾宋趙與時辨其非以為成都城隍祠太和中李德裕建李白作韋鄂州碑有城隍祠又杜牧刺黃州韓愈刺潮州麴信陵刺舒州皆有城隍之祭則不獨吳越然矣而蕪湖城隍祠建於吳赤烏二年則又不獨唐而已記曰天子大蠟八伊耆氏始為蠟注曰伊耆氏堯也蓋蠟祭八神水庸居七水則隍也庸則城也此正城隍之祭之始春秋傳鄭災祈於四鄘宋災用馬於四鄘皆其證也庸字不同古通用耳由是觀之城隍之祭蓋始於堯矣漢夀亭侯廟漢夀亭侯廟在宛平縣東成化十三年建俗呼白馬廟蓋隋之舊基也每歲五月十三日遣太常官致祭按洪武二十八年建廟於雞鳴山祭漢夀亭侯永樂中始載祀典公於後主景耀三年追諡壯繆侯宋徽宗崇寧元年追封忠直公大觀二年加封武安王宣和五年敕封義勇武安王高宗建炎二年加封壯繆義勇王淳熙十四年加封英濟王敕曰生立大節與天地以並傳沒為神明亘古今而不朽荆門軍當陽縣列神壯繆義勇武安王名著史册功存生民一方所依千載如在凡有禱於水旱雨暘之際若或見於焄蒿悽愴之間英烈巖巖可畏而仰廟貌奕奕雖逺益新爰啓王封仍加美號豈特顯爾神威德之盛亦以慰此邦父老之情尚祈靈助服我休顯可特封壯繆義勇武安英濟王奉敕如右牒行淳熙十五年十一月二十一日萬歷四十二年秋奉敕晉封三界伏魔大帝神威逺震天尊關聖帝真君雲長夲字長生雲長其别字也公忠貫一時氣蓋千古封之為王豈公之志至曰真君益不可聞於公也明翰林焦竑正陽門廟碑文曰正陽門廟者祀漢前將軍關侯作也侯廟祀遍天下而稱正陽門者為都城作也侯名在百世封號在纍朝而稱漢前將軍者侯志也斯得之矣宋司馬智玉泉寺夀亭侯印記紹興中洞庭漁人獲夀亭侯印競以為金報於官納長沙庫中時有光熖吏不敢留移文公安送還侯廟印徑二寸其制甚古印鈕有連環四面兩相貫上有一大環總之所以佩也淳熙四年冬元庵真慈摹畫印狀具夲末將獻於東宮是夕印留方丈光發於函輝燭楹廡寺有仁宗皇帝所賜龍眉龍角二物宜與印同藏名山永為鎮寶焉豫與元庵為方外遊逺訪靈跡悉所經見故得而詳之據此則公固夀亭也嘉靖十年南太常少卿黃芳以漢夀封邑而亭侯者爵也止稱夀亭侯誤矣乃改稱漢前將軍漢夀亭侯關前將軍贊嗚呼篡漢者瞞也成瞞篡者權也瞞名漢臣也實漢賊也權陽瞞敵也隂瞞翼也公批亢於前而不虞姦於腋七軍甫淹六師隨厄使永安之恨不在許昌而在公安建興之師不出樊城而出祁山安樂之箋與歸命之璧而相後先惜哉雖然不以間關而廢兄弟不以亂離而廢君臣其峙如者山嶽澄如者川流而炳如者日月星辰嗚呼此其所以亘萬古而猶神也耶宋丞相文信國祠宋丞相文信國祠在郡學西乃元之柴市公授命所永樂六年太常博士劉履節奉命正祀典謂天祥忠於宋室而燕京乃其死節之所請祠祀從之祠堂三楹前為門又前為大門祠之西為懷忠㑹館江右士夫歲時集會於此以祭公者也宣德四年保定李庸為府尹重拓其祠信國所著有日録吟嘯集指南録集杜二百首並刋板祠中元人王惲云至正十一年十二月十四日國兵自陽邏洑渡江明年十二月臨安降度宗二庶子為陳宜中文天祥張世傑擁入許浦江口時有黑龍見因改號景炎十六年為帥臣張𢎞範滅於崖山口執文天祥至大都囚之上屢欲赦出相之竟不從十九年十二月初九日戮於燕南城柴市元人吳萊曰頃豫嘗從鄉先生學見福唐劉汝鈞貽書括蒼吳思齊子善論文丞相宋瑞事云自江西初起時﨑嶇山谷購募義徒耕氓洞丁造轅門請甲仗不啻數萬而尹玉實為驍將文衣冠指麾衆皆詣闕感泣求死已而當國二揆交沮用兵師無宣諭卒無犒賞盤桓月餘僅令守姑蘇一路張彥提重兵居毗陵且有叛志尹玉竟以絶太湖弔橋首尾不救而溺死未幾獨松告急朝廷四詔政府六書趣弃聊攝援根夲一日一夜倉皇就道及至行都而獨松隨已破陷復令駐兵餘杭守獨松朝議不一衆心離散會有尹京之命餘慶遽奪其印不與漢輔遁德剛遁北軍入城與權又絶江遁乃即日拜樞使又拜右揆補與權處且令往軍前講解毅然請行及被囚以北中道奔迸收集亡散無兵無糧天下大勢去矣帝霸交馳正僞更作是不一姓當世之為大臣元老者視易姓如閲傳郵况當滄海橫流之際而彼乃以異姓未深得朝廷事權欲隻手障之至死不屈微箕二子且有愧色於宗國矣其書大略如此趙弼作文山傳云公既赴義其日大風揚沙天地晝晦咫尺不辨城門盡閉自此連日隂晦宮中皆秉燭而行羣臣入朝亦爇炬前導世祖問張真人而悔之贈公特進金紫光祿大夫太保中書平章政事廬陵郡公諡忠武命王積翁書神主灑掃柴市設壇以祀之丞相博囉行初奠禮忽狂颷旋地而起吹沙滚石不能啓目俄捲其神主於雲霄中隱隱雷鳴如怨之聲天色愈暗乃改前宋少保右丞相信國公天俄開霽元人鄧剡贊目煌煌兮疏星曉寒氣英英兮晴雷殷山頭碎柱兮璧完血化碧兮心丹嗚呼孰謂斯人不在世間明大學士楊士竒重修文丞相祠記孟子曰我知言我善養吾浩然之氣知言者盡心知性而有以究極天下之理浩然之氣即天地之正氣具於吾身至大而不可屈撓者知之至養之充而後足以任天下之大事天下之事莫大於君父文丞相甫冠奉廷對即極口論國家大計未幾元兵渡江又上書乞斬嬖近之主遷幸議者以一人心安社稷固已氣蓋天下矣自是而斷斷焉殫力竭謀扶顚持危以興復為已任雖險阻艱難百挫千折有進而無退不幸國亡身執而大義愈明蓋公志正而才廣識逺而器閎浩然之氣以為之主而卒之其志弗遂者蓋以天命去宋也雖天命去宋而天理在公必不可已故宋亡其臣之殺身成仁者不少論者必以公為稱首公事具宋史而公鄉人劉嶽申托公所著日録吟嘯集指南録集杜二百首及宋禮部郎官鄧光薦所述督府忠義傳以作公傳視史加詳實焉北京之有公祠洪武九年前北平按察副使劉嵩始建於教忠坊今順天府學之右而作塑像焉永樂六年太常博士劉履節奉命正祀典始有春秋之祭於有司歲以順天府尹行事宣德四年府尹李庸始至謁公祠下顧瞻祠宇敝陋弗稱遵用詔㫖葺而新之凡祀神之器靡不備具又求劉傳刻石將使人人皆知世之為臣者光眀震動焜焜烈烈有公也於戲忠孝人道之大節治化所先而崇禮先賢表勵後人尤守令之急務庸其達為政之夲與庸字執中保定唐縣人寬厚明敏自太學生授工科給事中上親擢為順天府尹愛人之心剸繁之才上下皆稱之而盡心學校敬賢尚德如節昌平之狄梁公劉諫議祠而嚴其祀事之類皆其知夲之務皆可書也因並書之以示來者明韓雍請諡宋臣文天祥謝枋得疏竊見宋丞相少保信國公文天祥弱冠狀元立朝盡節臨危拜相許國不疑志專恢復屢折挫而不移心切匡時蹈艱危而不變既而國亡被執繫獄纍年誘之以大用而不從脅之以刀鋸而不屈卒之南向再拜殺身成仁收三百年養士之功立千萬載為臣之極有指南録以著其忠愛有集杜詩以寄其憂傷其精忠大節與日月爭光與天地悠久誠足以正人心而扶世道也及宋禮部侍郎謝枋得登科對䇿力詆權奸發䇿漕司極攻時政受任於運去祚移之後抗敵於兵罷民散之餘力已盡而不支志有為而不果後元臣程文海等交章纍薦耻仕二姓懇辭不屈參政魏天祐強逼北行誓死不食終於燕京著為文章高邁竒絶發明道學羽翼聖經其清論無愧於先賢有功於後學文天祥江西廬陵縣人謝枋得江西上饒縣人二賢歿後贈諡未加子孫有在録用未及及順天府府學之西舊有文天祥祠堂塑像尚具儒者衣巾未復丞相冠服皆為缺典臣切惟伯夷叔齊死於殷周之際至宋而追封之諸葛亮顔真卿忠於漢唐之時至元而加封之古之君天下者若兹所行蓋有所見而非茍焉無益之舉也如蒙准言乞敕禮部翰林院儒臣㑹同考議量加文天祥謝枋得贈諡取其子孫量才録用并將順天府學之西文天祥祠堂塑像改塑丞相冠服行令有司仍各春秋祭祀庶使天下之人知為臣而能死忠死節者雖百世之後亦得暴白顯揚垂休後嗣以增志士仁人之氣沮亂臣賊子之心其於綱常誠非小補附載宋遺臣謝公枋得至燕死於憫忠寺按謝公為福建參知政事魏天祐強之北行自離嘉興輒不食二十餘日不死乃復食比至燕居憫忠寺問太后及瀛國公所在再拜慟哭疾甚留夢炎使醫將藥雜米飲進之怒擲於地不食五日死子定子護骸骨歸燕京少公一祠張千載字毅甫文公友也隨公至燕僦居公寓小樓之傍日以美食進之公既受刑潛造一櫝藏其首訪歐陽夫人於俘虜中得其尸火之拾骨並櫝南歸付其家張公宜附祀祠中汪元量亦來大都居公囚所每日作詩相倡和元量善鼓琴世祖命奏琴喜之因力求去賜為黃冠師人贈之以詩云三日錢塘水不波子嬰繫組納山河兵臨魯國猶絃誦客過殷墟獨嘯歌鐵馬渡江功赫奕銅人辭漢泪滂沱知章喜得黃冠賜野水閒雲一釣蓑謝翺曾以布衣杖䇿參信國軍事未幾善哭如唐衢過姑蘇望夫差之臺慟哭終日過勾踐行禹窆間北嚮哭乘舟至鄞過蛟門登候潮山感夫子浮海之歎則又哭晚登子陵西臺以竹如意擊石歌招魂之詞歌闋竹石俱碎失聲哭趙孟僴宋之宗室年十七文丞相辟為參謀文北去居吳依親友以居越十年為道士名道淵居松江北道堂又五年為僧名順昌因自名三教遺逸改道堂為本一庵臨終手詞以訣有曰文山之客千古忠貞于少保忠肅祠于少保忠肅祠在崇文門內東裱背巷公故賜宅也祠三楹祀少保兵部尚書于謙塑公像危坐歲春秋遣太常等官致祭公被刑於天順元年復官於成化二年賜諡肅愍於𢎞治三年改諡忠肅於萬歷十八年公被刑日陰霾翳天京師婦孺無不灑泣夫人流山海關夜夢公曰吾形殊而魂不亂獨兩目黯然借汝眼光見形於皇帝次日夫人目失明㑹皇極門災英宗臨視公現形火光中上悚然知公寃詔放夫人歸眼明如故當時殺公誣以迎立外藩王文極口辨公但云召親王非金符不可符在何必辨時印綬監諸璫檢閲各府金符俱在獨無襄府者驚懼欲死問一退間老監云是宣廟上賔時老娘娘以國有長君社稷之福欲召襄王取入三楊議不合而止符留後宫老娘娘張太后也於是啓而得之符在暖閣塵積寸餘矣公之養子于亷好聚書畫天順中自邊赦還坐裱背胡同見負畫售者忠肅夫婦像在焉蓋公家與內臣盧永同時籍沒盧尋宥給還籍物而畫像誤還盧所持以出售亷乃負之歸錢塘公之改諡撫臣傅孟春疏請宗伯于慎行題覆者也先是傅疏未入少宗伯黃鳯翔夢一偉男子持書來有空山孤魂之句覺而惡之詰晨接傅疏乃悟夜夢者公也生氣不泯如此李豸祭東坡文云皇天后土鑒生平忠義之心名山大川還萬古英靈之氣後追録坡公制詞中全用之憲宗朝追録于少保亦全用此語尤確陳繼儒云土木之變裕陵北狩公痛哭抗疏止南遷之議召勤王之師額森擁帝至大同至宣府至京城下皆登城謝曰賴天地宗社之靈國有君矣此一見左傳楚人伏兵車執宋公以伐宋公子目夷令宋人應之曰賴宗社之神靈吾國已有君矣楚人知雖執宋公猶不能得宋國於是釋宋公又一見亷頗傳秦王逼趙王㑹澠池亷頗送至境曰王行度道里㑹遇之禮畢還不過三十日不還則請立太子為王以絶秦望又再見王旦傳契丹犯邊帝幸澶州旦曰十日之內未有捷報當何如帝默然良久曰立皇太子三者公讀書得力處也春明夢餘録卷二十二
