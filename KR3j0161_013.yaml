body:
  text: 春明夢餘録卷十三吏部左侍郎孫承澤撰皇史宬皇史宬在重華殿西建於嘉靖十三年門額以史為㕜以成為宬左右小門曰􅀈歷以龍為􅀈皆上自製字而手書也中貯列朝實録及寶訓每一帝山陵則開局纂修告成焚稿椒園正本貯此實録中諸可傳誦宣布者曰寶訓宬中四周上下俱用石甃中具二十臺永陵定陵各占二臺周禮宰夫八職有史以贊治漢法太史公位丞相上天下計書先上太史公副上丞相唐宋宰相皆兼史官自成周有左右史漢有起居注唐宋之起居舍人著作郎皆史官也明初猶設起居注如洪武中宋濓為起居注劉基條答天象之問命付史館永樂中王直以右春坊右庶子兼記起居後不知廢於何時惟以修撰編修檢討掌國史遇有纂修以勳臣爵高者一人監修閣學士為總裁翰林學士為副總裁至萬歷初閣學士張居正言國初設起居注後定官制設翰林院修撰編檢等官以記載事重故設官加詳非有所罷廢也但自職名更定之後遂失朝夕記注之規以致纍朝史文闕略世宗皇帝嘗諭大學士張璁曰古左右史即今編檢等官今居此職者弗盡乃事何也是記録之職本自備官而臣下曠廢之耳邇者纂修世宗穆宗實録臣等秪是總裁凡所編輯不過諸司章奏稍加刪潤櫽括成篇至于仗前柱下之語章疏所不及者即有見聞無慿增入是以兩朝之大經大法罔敢或遺而二聖之嘉謨嘉猷多所未備此皆史官職廢致然也今日講官密邇天顏見聞真切又每從閣臣後出入便殿即有密勿謀議非禁祕不可宣泄者皆得知聞宜令講官日輪一員專記起居録聖諭詔敕册文及內閣題稿其朝廷政事見諸司章奏者另選年深文學素優史官六員編纂仍遵照祖制除御殿外例內史官侍班常朝列班六科給事中之上午門列御座西稍南專記注言動凡郊祀耕籍幸學大閲諸大典有舉輒書至不時宣召及大臣祕殿獨對恐有宣泄則自紀聖諭及奏對始末封送史館詮次其諸司章奏該科奉㫖發部即全抄送閣轉發史館其紀録體例祗備事由顛末日月先後待異日之考求所貴核實不尚文詞不得妄以已意及輕信傳聞為褒貶每月終史官編草稿為七册一起居六册六曹于册面記年月記史官姓名送閣驗訖即投小匱用文淵閣印封鎖嵗終內閣同各史官開取各月草稿收入大匱印封如前永不開視㫖允行一日神宗顧見史官還宫偶有戲言慮外聞自失曰莫使起居聞知聞則書矣起居之有益於主德如此元宰相拜珠言朝廷雖設起居注所録皆臣下聞奏事目上之言動宜悉書付史館蓋起居之廢其職自元已然觀通鑑續編所紀元人事實與明之實録規格不甚相逺以此知明之實録乃國初諸人襲元人之法而成所以逺不及古大學士王鏊云前代修史有起居注左史記言右史記動如晉董狐齊南史皆以死守職司馬遷班固皆世史官通知典故所紀君臣言動皆得之親覩記後世讀之如在目前我朝翰林皆稱史官立班雖近螭頭然猶逺在殿下未能執筆左右成化以來職纂修者惟取六部前後章奏分為十館以年月編次成書總裁官惟略加刪削便稱實録不知後世將何慿以成信史乎竊惟國家二百餘年制度文為咸正罔缺惟正史未有成編將來何所考信王文恪慮之甚是至萬歷年間閣臣陳于陛請修正史詔從之於是開館分局集纍世之實録采朝野之見聞紀傳書志頗有成緒忽遭天灾化為煨燼史事益屬茫然矣然古今正史自遷固外如左邱明范煜陳壽王隱于寶裴子野習鑿齒袁宏之倫各有藏史傳之永久不必皆世史也倘一日開𢎞文延儒碩寬忌諱之網採稗官家乘之言博覽廣詢寧無左邱明輩贊成筆削盛典者乎史貴世官官廢則貴世才司馬談之子遷劉向之子歆班彪之子固尚矣後尚有王銓之子隱姚察之子簡李太師之子延壽劉知幾之子鍊以後更無聞矣史之職壞于宋之李昉宋琪建議復時政記自送史館先進御而後付有司史遂不敢有直筆唐修史例後唐同光二年四月敕史館司本朝舊例中書并起居院諸司及諸道州府合録事件報館如左時政記中書門下録送起居注左右起居郎録送兩省轉對入閣待制刑曹法官文武兩班上封章者各録一本送館天文祥變占候徴驗司天臺逐月録報并每月俱送歷日一本祥瑞禮節逐季録報并諸道合畫圖申送蕃客朝貢使至鴻臚寺勘風俗衣服貢獻物色道里逺近并具本國王名録報外藩入冦來降表狀中書録報露布兵部録報軍還日并主將姓名具攻陷虜殺級數并所因繇録報變改音律及新造調曲太常寺具録所因并樂詞牒報法令變革斷獄新議赦書德音刑部具有無牒報詳斷刑獄昭雪寃濫大理寺逐季牒報州縣廢置及孝子順孫義夫節婦有旌表門閭者戶部録報有水旱蟲蝗雷風霜雹戶部録報封建天下祠廟叙封追封邑號祠封司録報京百司長官刺史以上除授文官吏部録報公主百官定諡考功録行狀并諡議逐月具有無牒報宗室任官課績并公主出降儀制宗正寺録報刺史縣令有灼然政績者本州官録申奏仍具牒報武官兵部録進報諸色宣敕門下中書兩省逐月録報應碩德殊能高人逸士久在山野著述文章者本州縣各以官秩勘問的實申奏仍具録報應中外官薨已請諡許本家各録行狀一本申送此唐故事也後之史館但取辦於升遐之後遺漏紕謬已多此當修明典章以補不逮宋史宋元祐中修神宗實録頗不直紹興中昭慈太后孟以誕辰天子置酒上壽歡甚昭慈忽泣數行下已慨然曰吾老矣國家多難猶幸見今日也有一事當為官家言吾不言死不瞑矣帝頓首請太后曰吾逮事宣仁古今母后之賢罕有其比奸臣快其私憤厚加謗誣建炎初雖下詔昭雪而國史未經刋定謂後世何吾意在天之靈不無望于官家也帝頓首受教遂命直史館范冲等刋定噫後世誣史安得此賢明太后耶曾布修定神宗實録舊本則用墨書新修者用朱書之刪去者用黃抹之每一卷竟納禁中將滅其迹而使新録獨行也及梁師成用事自謂蘇氏遺體頗招元祐諸家子弟為道之諸家子弟幸其書尚存固勸令傳録師成如其言而舊本遂傳及紹興中以昭慈太后之言令范冲等刋定舊文墨書刪去者黃書新修者朱書世謂之朱墨史明光廟實録成于初者大約出侍郎張鼐之手而少師葉向高取裁焉及以黃承昊之言魏廣微輩復嗾魏忠賢令改修及告成之日則崇禎改元之嵗矣衆正未登書仍進呈頒賚送至皇史宬閣臣有欲焚舊本者賴大璫王體乾不可而止兩存宬中信史之不泯皆賴兩璫之力亦一奇也嘉靖中閣臣李時言宋史當另修上曰修史甚好既要公又要出一人之手乃好世宗此言甚確蓋班馬荀范諸史出一手故佳即歐陽文忠與宋景文同修唐書已不及五代史矣宋遼金三史元命托克托修三朝史山隂楊維禎上正統辨謂今日之修三史宜莫嚴于正統與大一統之辨矣吾嘗究契丹之有國自灰牛氏之部落始廣其初枯骨化形戴猪服豕見于葉隆禮所撰契丹圖志中八部之雄至于安巴堅披其黨而自尊逮耶律光而其勢浸盛契丹之號立于梁貞明之初大遼之號復改于漢天福之日自安巴堅訖于天祚凡七主歷二百一十有五年夫遼固唐之邊藩也乘唐之衰虎視而起石晉氏通之且割幽燕以與之遂得據有地利而石晉氏不得不亡矣而議者以遼承晉統吾不知其何統也再考金之有國始于完顏氏初實臣屬于契丹者也至阿固達攘袂奮發于道宗之世遂得因契丹之衰而據有其國改稱國號于宋重和之元相傳九主凡歷一百一十有七年而議者又以金之平遼尅宋帝有中原而謂接遼宋之統吾又不知其何統也再考宋祖生于丁亥而建國于庚申我太祖之降年與建國之年亦同宋以甲戌渡江而平江南于乙亥丙子之年而我王師渡江平江南之年亦同故世祖平宋之時有過唐不及漢宋統當絶我統當續之諭是世祖以歷數之正統歸之于宋而以今日接宋統之正者自屬也元人不能用於是宋遼金各為史金史元學士王惲記王鶚事云王承㫖名鶚字百一東明人金正大元年甲申狀元入元授官翰林承㫖日見寵遇一日以祭葬故主上請允之為位哭汝水上哀動左右乃私諡為義宗據法君死社稷曰義其忠不忘君如此又上史院奏帖有云自古有可亡之國無可亡之史蓋前代史冊必代興者與修蓋是非與奪待後人而可公故也上允之然彼時有元好問者金亡隱居于家築野史亭著南冠録以載金事元人修史多採之金史不亡二人之力也歐陽元曰明宗皇帝詔修遼金史揭公傒斯與其選人問修史之道何先公曰收書用人又問用人何先曰用人先論心術心術者修史之本也心術不正其他雖長不可用此千古篤論元史洪武元年上命起居注宋濓漳州府通判王禕為總裁徴山林遺逸之士汪克寬胡翰趙汸陶凱高啓等同修元史自元統至正間事無可據遣儒士歐陽佑等詣北平采訪明年再修仍濓禕總裁而以趙塤朱佑貝瓊張孟兼等同修然備員而已筆削皆取上裁且見文稍深古者輒芟去曰惡用是獨即舊志為書可矣時楊維禎年七十餘亦聘至修史史成作老客婦吟見意放歸宋濓修元史記洪武元年秋八月上既平定朔方九州攸同而金匱之書悉輸於祕府冬十有二月乃詔儒臣發其所藏纂修元史以成一代之典而臣濓臣禕實為之總裁明年春二月丙寅開局至秋八月癸酉書成紀凡三十有七卷志五十有三卷表六卷傳六十有二卷丞相宣國公臣善長率同列表上已經御覽至若順帝之時史官職廢皆無實録可徴因未得為完書上復詔儀曹遣使行天下其涉於史事者令郡國上之又明年春二月乙丑開局至秋七月丁亥書成又復上進以卷計者紀十表二傳三十有六凡前書有所未備頗補完之其時與編摩者則臣趙塤臣朱佑臣貝瓊臣朱世亷臣王亷臣王彛臣張孟兼臣高遜志臣李𢡟臣張宣臣李汶臣張簡臣杜寅臣俞寅臣殷弼而總其事者乃臣濓與臣禕焉合前後二書復釐分而附麗之共成二百一十卷舊所纂録之士其名見於表中者或仕或隱皆散之四方獨塤能始終其事云昔者唐太宗以開基之主干戈甫定即留神於晉書敕房元齡等撰次成編人至今傳之肆惟皇上龍飛江左取天下於羣雄之手大統既正亦詔修前代之史以為世鑒古今帝王能成大業者其英見卓識若合符節蓋如是嗚呼盛哉苐臣濓等以荒唐繆悠之學義例不明文詞過陋無以稱塞詔㫖之萬一夙夜揣分無任戰兢今鏤板訖功謹繫嵗月次苐於目録之左庶幾博雅君子相與刋定焉洪武三年十月十三日史臣金華宋濓謹記明史洪武實録凡三修建文即位初修王景充總裁靖難後再修總裁解縉縉得罪後三修總裁楊士奇初修再修時士奇皆秉筆以一人而前後依違者甚多明史可議者如建文嗣位頗稱賢明乃以靖難之故去其年號不存實録之未輯楊文懿守陳曰國可滅史不可滅靖難後不記建文君事遂使當時政典方黃死事諸臣皆闕落無傳及今搜采猶可補輯此偉議也崇禎壬午都尉鞏永固給事沈𦙍培俱疏請未行景帝已正位號英宗實録猶稱郕戾王附夫景帝與于忠肅再造乾坤有功宗社當時戾字之諡已違公議後憲宗追稱景帝乃不為之稱宗改諡而實録仍書郕戾王附嘉靖初纂修武宗實録差進士訪求事實蘇州府聘楊循吉主之其所修有吳郡纂修實録冊凡例可觀及隆慶以後改行提學行邑行學學官令禮生秀才抄録一二大臣墓志塞責于是史無所取材監修實録惟用元勳一人此非定制考英宗修仁宗實録以英國公張輔成山侯王通少師蹇義少保夏原吉為監修官則文武並用官不必盡詞林元勳亦不止用一人此可為修史例石民集云列朝皆有寶訓如穆宗於隆慶六年正月下旬不豫二月十二忽出視朝諸相趨而往則已下金臺怒而欲出執高文襄拱手語不甚了了文襄固請其所以怒曰甚事不是內官壞了此言何等明切可以式子孫戒後世寶訓乃不載天啓初議修神廟實録御史郭增光疏云請就往日輔臣中功罪較然在人耳目者略陳大槩為授簡佐一得焉高拱以裕邸之舊知受托孤之明命雖崎嶇於雲間江陵兩才相厄卒能總持銓衡懋建功業所稱經濟之名流非乎張居正得君行政致治精嚴固自有功於國而奪情起復獲罪名教則瑕瑜存而名實不相掩可已王家屏以講幄之特遇矢建儲之孤忠雖徼幸於批鱗抉纓一去為恝然而竟令君心感悟默定元良所稱翼戴之誠臣非乎至於王錫爵大略雄才高睨濶步豈不顯名於時而三王並封幾危宗社則得失衡而失浮於得多矣趙志臯鄙而荏張位狡而狠臯輕主封貢貽害尚在屬國位密揭礦稅流毒則在生靈二臣相較而位之罪大於臯不獨以其貪也沈一貫之惡莫甚于楚事妖書駢僇諸宗羅織無辜皆一貫以前所未有朱賡之失又在黨助一貫傳衣扇惡妨賢蔽主皆一貫之後所隱留二臣同傳而貫之罪重乎賡亦不以其貪也假令於此隨人立論據事直書則正人一生志行不白于羣奸者待信史而白奸回無窮過惡不誅於生前者待信史而誅授簡之光也臚列諸輔功罪可謂史之董狐未可以人廢言崇禎十五年六月有御史吳履中一疏可備授簡者之助其略曰皇上臨御初年天下猶未大壞也特用一溫體仁顯託嚴正之義隂行􅎱嫉之私凡正人君子必百計摧折以致賢士解體救過不遑使朝廷不得任人以治事而釀成大害之源者體仁之罪狀也專任一楊嗣昌以欵撫為忠謀以四事為實政加練餉以刈割海內致使民怨天怒災旱頻仍四海困窮盜賊蜂起而結成大亂之勢者嗣昌之罪狀也又曰皇上治尚嚴明也而引之於苛刻刑欲當罪也而引之於從重皇上念與事之善無由見於天下而亂臣賊子無知小民遂見為朝廷闕失敢於非議而叛背之此亡國之定案朱閣學國禎云正德四年孝宗敬皇帝實録成時焦芳操筆褒貶任意葉盛何喬新彭韶謝遷天下所稱正人皆肆詆誣嘉靖元年御史盧瑗奏孝宗實録多焦芳曲筆乞改正上曰焦芳任情天下自有公論不必改修又曰我朝攻道學者自焦芳始然只從聲音容貌描寫已不堪讀越六十年遊居敬攻湛甘泉則進一步矣又六十年郭興治郭允厚朱童蒙連攻鄒元標允厚比之山東妖賊非所謂愈趨愈下者耶三朝要典朱閣學大事記曰天啓五年禮科給事中楊所修請編纂三案事成書如明倫大典例其黨起而和之六年正月開館五月書成閣臣請其名曰傳信鴻編曰三大政紀中㫖定曰三朝要典梃擊始于萬歷乙卯五月紅丸始于泰昌庚申八月移宫始於是年九月先梃擊首列詔諭之關係者為原始閣臣顧秉謙黃立極馮銓等總裁掌院施鳯來等為副刋行頒布天下大事記曰甚哉小人之愚自供罪案又代為他人發揚盛美也要典一書先叙爭者之疏附以史斷曲詆妄詈無所不至然後綴以駁者之疏主其事者徐大化等五人由今而觀五人何人肉足食乎骨之臭可洗乎前之爭者不啻百十人或死或廢其疏稿未必盡存子孫未必能盡守纂者亦安能一一搜集而要典收之略備借天子威靈既藏內府又下郡邑遍散民間幾與六經四書並行可謂密矣未幾內府告燬而散者不可收人皆得而見之于爭者無不擊節歎賞于駁者無不切齒唾罵而史臣數語假假可恨可羞穢莫加焉罪莫甚焉是殆天奪之魄自投穢厠中唼唼有味而沒頂不可拔也五人既坐大詬其二又攖大僇如劉廷元如嶽駿聲對質求勝猶曰常情又霍維華者天分儘高筆底甚鬯只以一外轉憤憤入其中兩出疏為助既躋崇顯欲以視師避逆賊之染計其生平果可當此任而事則已無及矣廷元自請南兵亦是此意二人與駿聲皆有才皆可為平世卿士吾甚惜之如逆賊既害多少善人又纍多少才人從古已然立身者不可不察總之功名之念一淡則思過半已蔣閣學德璟曰嘉靖中明倫大典為議禮諸臣發然實出上意若天啓中三朝要典則諸人嗾魏璫為之以為諸君子罪案中作論斷尤多舛倪公元璐上疏請燬之時德璟在禮部亦言于內閣謂既有實録此書可燬內閣楊公景宸深以為然遂焚其板楊公亦與修要典者侍讀孫之獬力言不可燬痛哭失聲相傳以為怪崇禎元年侍讀倪元璐上言竊見主梃擊者力護東宫爭梃擊者計安神祖主紅丸者仗義之言爭紅丸者原情之論主移宫者弭變幾先爭移宫者持平事後六者各有其是不可偏非也未幾而魏忠賢殺人則借三案羣小求富貴則借三案故凡推慈歸孝於先皇正其頌德稱功於義父批根今日則衆正之黨碑免死他年即上公之鐵劵由此而觀三案者天下之共議要典者魏氏之私書以臣所見惟燬之而已是年五月燬三朝要典諭朕惟皇祖皇考洎於熹皇止慈止孝炳若日星載之實録自足光昭盛美乃復增三朝要典一書原不能於己明之綱常復加揚闡徒爾刻深傅會偏駁不倫朕無取焉可將皇史宬內原藏一部取出燬之仍傳示天下各處官府學宫所有書板盡燬不存自今而後官方不以此書定臧否人材不以此書定進退惟是三朝原無遺議紹明前烈注意編摩諸臣各宜捐去成心勿滋異論務襄朕清平之治欽哉光宗實録朱閣學大政紀云實録改修惟文皇行之於建文尋以未備重修光宗在位止一月實録先上以三案改修蓋羣奸仗魏逆之勢恣行如此首先建議者黃承昊也把持塗改者霍維華謝啓光徐紹吉也葉文忠向高曰光皇在位僅一月實録所載多潛邸時事然其間亦有干礙而難直書牽連而難盡書脫草日余與同官互閲皆以為允而自余歸後言者鬨然以張差進藥移宫三事為非是得㫖改正余思移宫事原未敘及其敘進藥亦甚平惟張差事則因王之寀疏侵張太宰余偕同官往問張曰此事之發生輩皆里居不及知其詳公親讞此獄虛實云何張曰謀逆事千真萬真之宷所發覺事情無一不實某當時讞奏皆與之宷同何以罪我余又問當時風癲之說云何張曰此飾辭也安有持梃入宫門而可稱風癲者此余與同官共聞朝紳議論亦皆如是故實録中稍採其說而詞亦委婉乃當時之言風癲者遂耽耽矣問官如嶽駿聲遂上疏力駁時局已變無敢出片辭言官從風而靡皆附會駿聲而之宷被重譴矣余念事關宫闈似屬曖昧但罪疑惟輕施于他事則可東宫何地而持梃突入當時賴有中官格之耳萬一進而不止則跬步間便成大難而宗社有不測之憂矣在禮齒君之路馬有誅而春秋于許世子趙盾皆書弒君凡以絶干犯之萌為萬世立此大防也今毋論風癲之真假即使真癲而持梃入宫幾危儲二可但以風癲蔽罪而遂已乎况禁中千門萬戶他處不入而獨闖于東宫乎當王日乾告變已云劉成龎保二奄有謀今張差所供復與之同似又不出于癲者之口而神祖斃二奄于禁中不遣之就理亦聖意淵微可以默喻者惟是事體重大難以深窮當日聖斷處分原自妥當至欲併此一假情形而盡沒之竊恐千秋萬世而下終無以厭人心也詞臣文震孟孝思無窮疏臣猥以菲才備員史局頃因纂修熹宗皇帝實録從閣中恭請光宗皇帝實録副本較對見其間舛誤甚多而悖謬之大者如先帝之冊立與梃擊紅丸大事皆祖三朝要典之邪說而應和之蓋天啓三年七月十六日實録進呈則禮臣周炳謨等史官莊際昌等所纂修而閣臣葉向髙韓爌等所總裁者也至天啓六年逆黨崔呈秀等謂實録非實請㫖重修則崇禎元年二月十七日所進今皇史宬之所藏者也是時皇上初登大寶要典未燬逆案未成閣臣黃立極等不行奏明含糊從事後來諸臣亦無復發金匱之祕洗石渠之穢者要典雖焚邪說未殄凡先帝二十年靑宫之憂患與夫一月天子萬年聖人等事俱隱而不彰斯固臣子之所痛心者也臣見皇上追念先帝冊封敬妃慎嬪以寄永思皇衷純孝孺慕彌殷薄海臣民咸為感動乃先帝紀載尚未清明使今日編修將何所據流傳後世又安取衷國是所關良非細故若謂已入史宬不可復出則逆璫之矯㫖且能行於當年聖明之獨斷豈不易於反手視為緩圖置不上聞亦非臣子之所安也臣謹摘其甚者上瀆睿覽一云當命哲之日詔誥恩賚儼然負震器之重儲宫既定典制大明而浮議外滋無端蔓引皆好事者之過云云臣謹按先帝冊立一事自萬歷十四年以至二十八年廷臣羽翼國本有貶謫者有削籍者有遣戍者有廷杖者忘身殉國九死不移諸臣亦何利於己而為之縱皇心有主未忍言夾日之功而精忠自盟豈可沒回天之力乃為浮議外滋無端蔓引一語抹殺謂皆好事者之過此與三朝要典所稱姦黨搆釁希圖定䇿與三案諸姦一脉相貫者同一邪說也宜改正者一一云四十三年五月有男子張差持梃入東宫殿簷下擊傷門者中官共執之巡視皇城御史劉廷元回奏張差話不情實語無倫次按其迹若涉風魔稽其貌的是黠猾而刑部提牢主事王之宷揑謀危東宫之說詞連二璫科臣何士晉行人陸天受主事張廷等附和其說愈加激聒云云臣按此即要典中梃擊一案也即據劉廷元疏亦明言稽其貌的是黠猾而必欲以風癲二字草草結局不容王之宷奏張差口詞指為揑謀何也且張差有口舉朝豈應默然而一有言者輒曰附和曰激聒則必使東宫無一護衛之人而後快乎正與要典同一邪說宜改正者二一因工科給事中惠世揚疏論劉廷元遂謂初張差狂闖薊道闌入宫門廷元巡視皇城按狀風魔皇祖是其奏讞决平允自王之宷突揭搆釁徒黨因以為利借他事衊廷元未幾果顯攻風癲之案一時邪說世揚實為之倡云云臣按王之宷摘發張差之逆至於察處至於削奪後逮死詔獄莫敢議恤即惠世揚身被五毒體無完膚所以不即死者逆璫欲借為戎首遍殺天下名流非宥之也幸聖明御宇僅免一死尚稽啓事乃云徒黨因以為利斯亦何利之有焉况風癲之案忠臣義士所共明目張膽而攻者何俟世楊為倡始顯攻之要典邪說宜改正者三一云張差闖入東宫言者紛紛御史劉光復言致辟行刑一獄吏任似不必言官詫為奇貨居為元功以此二語為異議者刺骨云云臣按劉光復之得罪也實以奏對越次然據其語但言皇上極慈愛太子極仁孝兩言亦未見其有功於神祖及先帝而竒貨元功之語不可謂非抹殺忠義矣大抵闖宫一事梃及殿簷近侍俱踣亦天下奇變也必欲視為平常不當根究以為僅一獄吏之任此何心哉要典邪說宜改正者四一云方上疾大漸召李可灼并趣和藥悉出聖意一時臣工所共聞共見其後有造為許世子不嘗藥之論羣小附和囂然鼎沸汚衊君父幾成晦暝之世亡何正論大明邪說漸滅且云李可灼往來思善門中使以聞其傳奏姓名莫可得而問云云臣按此即要典中紅丸一案也昔唐憲宗殁杖殺方士柳泌泌蓋為憲宗製長生藥者彼豈不願其主之長生而餌藥不效則殺之而不為過後世亦不以為寃今可灼進藥而先帝賔天縱謂之誤庸醫殺人律有明罪况誤傷天子乎此即肆諸市朝亦人情所愜而乃與顧命大臣同賜金帛比屢經論劾僅准致仕回籍此何以解於天下後世且宫闈之中傳奏姓名豈遂不可窮詰稍欲窮詰即曰羣小曰汚衊曰晦暝此皆要典邪說也宜改正者五以上五條僅摘其尤悖謬者伏乞聖裁即敕史館逐一改正或取天啓三年所進遺稿再加勘定入皇史宬庶千古之是非不悖一代之袞鉞可慿而於皇上之逹孝亦有光矣方今兵戈未靖四郊多壘或謂臣言非其時而邪說之害甚於兵戈自古記之矣况目覩止孝之聖主永言維則何不俯循職掌仰佐涓埃西垣筆記光宗實録進於天啓三年七月十六日實録八卷寶訓四卷合目録凡例十四冊監修英國公張惟賢總裁內閣大學士葉向高韓爌何宗彥史繼偕孫承宗朱國禎顧秉謙朱延禧副總裁尚書林堯俞侍郎鄭以偉周如盤錢象坤纂修侍郎周炳謨來宗道汪輝張鼐少詹董其昌諭德蔡毅中洗馬成基命贊善李康先中允姜逄元羅喻義孟紹虞王祚遠曾楚卿修撰莊際昌張翀侯恪傅冠丁乾學其書立論頗正而又忠厚不盡人之情良史也自經改修人鮮有見其原本者謹録其大要以備採擇國本萬歷十四年丙戌正月皇第三子生貴妃鄭氏出也貴妃進封皇貴妃時主鬯未定而貴妃最愛幸廷臣不無私憂會輔臣申時行等請冊立神宗諭以元子嬰弱少待再請再諭如前㫖禮臣沈鯉有折衷典禮疏請加封恭妃得㫖子顯母貴待元子冊立加封科臣姜應麟疏請首冊恭妃次及貴妃明詔冊立元嗣為東宫以定天下之本有㫖謂其疑君賣直降極邊雜職已吏部員外郎沈璟刑部主事孫如法連疏言之俱被謫科臣楊廷相等論救奉㫖立儲以長幼為序祖宗家法朕仰遵成憲俯察輿情豈肯以私意拂公論姜應麟等揣摩上意置朕于有過之地故特降處示懲非為奏請冊立之故國本有歸朕已明白曉示待期舉行毋得妄疑瀆擾又傳諭內閣亦云然蓋神宗英明沉毅修紀叙倫以為天性至親儲宫大典權統一尊事宜獨斷至於宫闈倫序祖宗舊章宸慮先定矣十五年丁亥正月申時行等請並舉建儲封王吉典皇長子正位東宫皇第三子宜封大國聖諭候㫖行御史許守恩更申前封妃之說不報十八年庚寅正月朔日神宗召見輔臣于育德宫談論良久乃共以冊立豫教請將退有㫖令宣長哥來與先生每一見時上至皇三子亦至上侍立榻右神宗手携之輔臣仰視睿容稱賀神宗悅諭以此祖宗德澤聖母恩庇所致輔臣再進諦視神宗手引上向南正立輔臣因再請早定大計神宗頷之出再疏申請慰答不必煩擾以間天性禮部尋上疏請有如何紛紛奏擾意欲離間之㫖十月兩京九卿科道合詞懇請而輔臣請之益力禮部尚書于慎行以催激奪俸三月諭內閣以皇子長幼之序豈有搖動朕意必待朕自處不喜于聒激耳凡諄諄數百言輔臣錫爵又上疏申言凡稱間者貴而使賤之親而使疏之也今上親挈元子明示臣等以長幼之序臣等因勸冊立以成上之所欲貴又因請豫教以成上之所欲親何名為間也且建儲一事前有皇長子始生之明詔後有屢奉之明㫖公有兩部臣僚之合奏私有皇親鄭國泰之專請近有京城之流言逺有海內之喁望重以九廟之神靈兩宫之屬望皇上豈可差舉一念臣等亦豈敢茍順一言詞尤剴切神宗諭朕以誠實待天下豈有溺愛偏執之理侯過十齡冊立豫教當並舉十月內閣共疏請冊立有詔切責三輔臣各引疾輔臣王家屏獨當直謂欲釋衆疑莫若大信之蚤全欲解搖亂莫若聖志之蚤定疏凡再上神宗遣內官傳諭以明年春夏科道等衙門不來瀆擾便於冬冊立而又傳各衙門造辦錢糧俟後年春舉行是時聖意已定蓋前詔所云自處者也而科臣胡汝寧以瀆奏罰俸明年辛卯秋工部主事張有德以大禮儀物未備疏請有詔謂其邀功催激奪俸改冊立期于次年會內閣臣合疏爭之有㫖詰責時首輔時行以病在告密揭言故科臣羅大統中書黃正賔遂連疏劾首輔皆削籍正賔仍下詔獄杖百時行去國亦尋去家屏乞與國同去不允又明年壬辰科臣李獻可等以請豫教降職列名者奪俸輔臣家屏封還御批疏救不報會申救者皆獲譴家屏凡五疏爭之蓋念明主可以理奪引義决去事宜少濟神宗雖聽家屏去而聖心益動時以申救削籍者科臣鍾羽正舒𢎞緒陳尚象張棟丁懋遜葉初春吳之佳楊其休李周䇿御史鄒德詠錢一本而科臣孟養浩杖一百為民賈名儒降邊方雜職又明年癸巳有三皇子進封之㫖時首輔王錫爵以召至密揭建儲事言前皇上業有今春舉行之㫖乃兹屇期廷臣未有先發一言者故臣具疏手封以進乞乘此時從中降諭决于春月舉行使盛美盡歸于獨斷神宗復稱引祖訓立嫡條謂中宫年尚少朕欲三皇子並封王而虛儲位以待嫡即令輔臣擬諭錫爵擬二諭以進隨疏言待嫡之說臣未之前聞安敢奉詔昔漢宋母后有養育庶子故事無已請令元子母中宫而正儲位神宗不許曰奈何以僞亂真遂下前擬而並封之爭起光祿寺寺丞朱維京科臣王如璧戍邊俄免戍光祿寺卿凃杰寺丞王學曾削籍部科諸臣皆言與歷年成命不合語侵錫爵輔臣請九卿會議及面陳可否不允而科臣史孟麟上所撰條議錫爵以三誤自劾神宗報曰卿自引咎置朕何地議乃寢是時爭者則郎中于孔兼主事張納陛顧允成陳泰來賈嚴薛敷教嶽元聲若而人云二十二年甲午二月上出閣講讀告于奉先殿朝謁兩宫上之御講筵也儀度熟間舉止凝重儒臣進說經㫖潛心聽受間有問答旁通大㫖一日講官焦竑仰叩以維皇上帝降衷于下民若有恆性大義上應曰只天命之謂性是已講官董其昌講擇可勞而勞之上答曰此所謂不輕用民力也講官驚喜歎服時神宗深拱靜攝上習讀經典皆有恆度神宗喜悅間與諸王子偕召防護有加焉而先是科臣張貞觀以請備出講儀仗降黎道照磨以論救罷二十八年庚子三月詔議移皇長子居于慈慶宫再諭內閣以冊立有期而惡刑部主事謝廷讚之疏瀆且曰使天下臣民曉然知出自朕心斷不惑于奸小之口也會是時天雨傳諭凡遇雨皇長子講學暫免一日十月戚畹鄭國泰疏欲先請冠婚次舉冊立科臣王士昌糾之禮部署部事侍郎朱國祚以國泰顛倒其詞與明㫖相背恐釀國家無窮之禍無何科臣王德元請篤厚中宫之疏上神宗震怒杖之百且傳諭廷臣無瀆救以致遲延冊期二十九年辛丑二月上移居慈慶宫是年輔臣沈一貫屢揭催請諭以俟即擇日舉行九月十八日漏下二鼓諭內閣傳示禮部上冊立冠婚儀注十月十五日冊上為皇太子并封諸王上聖母徽號大赦天下妖書楚宗室訐奏楚王事行勘勘上事皆有跡于是物論紛然以楚藩為假王下廷議獨戶部尚書趙世卿總督倉場尚書謝杰謂王非假餘皆如楚宗言郭正域請再勘神宗意殊難之沈一貫亦從中阻格與正域相口語正域疏侵一貫且言其受楚王金輔臣鯉頗右正域彼此之嫌生矣其後楚王復訐奏正域勒歸聽勘楚事竟寢楚王遣人奏謝因遺書謝諸貴人楚宗率衆途奪之備兵副使周應治鄞人也恐事露遣兵捕楚宗械而繫之獄諸宗羣訴于巡撫趙可懷可懷譙責之中有一人發憤突起以手械擊可懷立斃傳者遂以楚宗為謀叛捕治坐死斬絞者六七人禁高墻者數十人議者多以為寃正域行至揚村屬妖書事起諸獻諛遂言此正域所為一貫意動故揭言此書必出於臣下相傾之詭計特借國本為名而自請絶私為公以身討賊必得真正主使之人殄滅之以泄廟社之憤其言甚危神宗覽之倉惶故下令大索緹騎兵番四出追捕而給事中錢夢臯遂露章攻正域且及鯉御史康丕揚佐之隨發卒圍正域舟盡捕其僕𨽻佐書乳媪等下詔獄嚴行考訊無所得其株連波及奪官削籍幾斃杖下者甚衆邏卒又圍輔臣鯉第日夜偵伺長安中人皆重足屏息無敢偶語又行文天下搜捕騷然煩擾矣最後乃得皎生光業已欵服然非一貫意故獄久不成禮部侍郎李廷機及趙世卿皆告輔臣賡謂即此可以具獄毋他求語甚切至賡亦力勸一貫如廷機言得㫖廷鞫生光仍欵服而刑部尚書蕭大亨不欲坐生光再三誘令扳扯同謀主使之人生光抗言我自為之誰為主使廷機與御史沈裕湯兆京牛應元輩皆言生光宜坐大亨曰脫他日獲有真犯誰當其辜廷機曰某請任之沈裕等亦曰某願同坐大璫陳矩方主讞深然之拱手曰朝廷有人議遂定乃具奏神宗亦心悟磔生光于市其獄乃得解夢臯等後挂察典復奉㫖留用物論愈喧彼此紛拿縉紳之釁卒從此起焉挺擊萬歷四十三年五月乙卯有男子張差持赤挺突入東宫殿簷下并傷門者璫輩共執之東宫奏聞下法司提問御史劉廷元疏言其迹涉風魔貌是黠猾刑官胡士相等及一二言官緣此遂有風癲之說提牢主事王之宷詳加詰問乃言有馬三道誘至龎劉二中官處與以棗木棍令至東宫逄人即打語多涉翊坤宫之宷以聞科臣何士晉力言當窮其事太常少卿史孟麟亦有疏神宗不得已召上慰諭因率上及皇長孫諸皇孫詣慈寧宫聖母几筵行告慰禮召見羣臣于宫門外神宗白衣冠立左簷前上靑袍侍于右神宗召羣臣諭曰皇太子國家根本朕豈有不愛諸皇孫振振衆多朕喜甚何外廷疑朕有他也時御史劉光復從班後抗稱皇上東宫慈孝語不甚明神宗責其恣肆震驚几筵令緹騎捉出笞杖亂下上亟止之得㫖下法司神宗復諄諄理前諭命决張差龎保劉成等上從旁請無株連以傷天和神宗復命上代諭羣臣上承㫖諭爾等毋得流言為不忠之臣使本宫為不孝之子神宗悅命閣臣速擬諭以進尋誅張差于市斃龎劉二璫內廷比獄上率從寬典方事初起中外聞者心知其故而難于言至風癲之說倡則議者謂其意有所為而王之宷直發逆狀刑部尚書張問逹深以為然形迹愈露顧必欲窮究其由來則所傷實多神宗默念大臣中無足與計不得已而自行召諭其不下二璫于理亦有深意而主風癲者遂齮齕王之宷罷其官史孟麟謫何士晉補外人甚不平焉紅丸八月二十一日丙寅召太醫院官診視進方賞銀六十兩次日大學士方從哲以未獲入宫候安上疏曰臣詢醫官知聖體御膳减少兼有疾喘必須一意調養除每日發票本章外俱宜暫輟至於進藥一節尤宜十分謹慎昔人謂治病者以服藥有效為上䇿以不服藥保養為中策蓋欲寡心清元氣自固用之不當其害更不可言惟聖明留意兵科給事中楊漣疏陳聖躬違和之由保攝萬安之法先是十二日諸臣見天顏頓減不似登極之初至十六日諸臣到宫問安旋奉有頭目眩暈身體軟弱不能動履之諭各相驚駭不知其故及十七日諸臣敬問聖安因大選問內官以違豫之故因知外廷所傳進御不節流言絶謬乃是崔文升用藥差誤所致至是上召見大臣親奉天語兩夜未睡米粥日不多食困頓至此于是給事中楊漣言文升不知醫不宜以宗社託重之身妄為嘗試如其知醫則有餘者泄之不足者補之其事明白易見以皇上之日日萬幾㷀㷀哀痛精神耗費于法止宜清補文升何投相反相伐之劑然則外傳流言必文升藉口以蓋其誤藥之奸耳既益聖躬之疾又損聖明之名且皇上初用文升一劑泄補倒置若此有心之誤耶無心之誤耶有心則虀粉不足贖或其無心一誤寧堪再誤臣念皇上睡少食少此豈是大小諸臣安枕之時閣部大臣各宜尋諸臣中有知醫者日於宫門前齊心候問同欽召御醫細細講求藥餌多方斟酌封付忠順內官如法煎和以進至如文升者宜發司禮監究問處分傳示中外使知聖躬不安全是藥餌之誤以解道路紛紛之口并祈皇上召皇長子同衆皇子承顏導喜於前以發天性之真和又擇一二通書史大義內臣時在左右說誦古聖帝明王通快可喜之事以清宸聽以醒脾神如此自獲勿藥之慶矣又臣接都督僉事鄭養性一本為懇乞天恩收回封后成命此一事也祖宗典制難干聖明當已有裁决第無上尊稱告播中外必有其名今所稱封尊之以嫡母乎則於大行皇后有礙尊之為生母乎則於本生皇太后有礙或以往日之恩當酬耶今日之請難已耶當年主鬯未定實不聞調護之深心而此時長君踐祚儘無取於沾沾承奉之虛文矣總之皇后非可以輕乞恩之名天子無可以輕自卑之理宫嬪無可以妄自尊之事貴妃試思聖母仁慈配天育聖辛苦勞劬垂四十春秋我皇上孝思無極止能崇上此皇后二字之追尊如貴妃當年今日舊眷新恩已是隆厚無涯奈何又多生此必不可萌之妄念故養性前日之請收成命正所以善安其始在皇貴妃今後養老别宫省心回念凡朝見必須啓請侍御無相攙越更所以善保全先帝之明德於有終與殊恩於無已也有㫖所奏朕母皇貴妃鄭進封皇后朕遵皇考遺囑昨覽都督僉事鄭養性所奏收回封后成命以全體制特允所奏已輟㫖不行外庭不得再行瀆擾其御藥房提督崔文升已有㫖皇長子擇用端人朕已知之二十八日癸酉上疾彌留召大學士方從哲劉一燝韓爌及英國公張惟賢尚書周嘉謨李如華孫如游黃嘉善黃克纘左都御史張問逹給事中范濟世楊漣御史顧慥于乾清宫上御東暖閣倚榻􅑀几今上侍立諸臣問安畢上命諸臣前降色連諭云朕見卿等甚喜又云朕在東宫感寒症調理未痊值皇考妣相繼大喪典禮殷繁悲傷勞苦朕不進藥已兩旬餘卿等大臣勿聽小臣言令上承㫖再申前諭上又諭冊封皇貴妃禮臣言二后封諡東宫冊立諸大典禮當次第行諸臣叩頭退先是給事中楊漣疏陳保攝參論內監崔文升醫藥之誤故召見部院吏科河南道外特及漣因諭及此云甲戌上再召見輔臣方從哲等十三員于乾清宫諸臣問安畢上乃諭冊立皇貴妃從哲等對以冊儲原卜期宜移近蚤竣吉典以慰聖懷上因顧今上諭曰卿等輔佐為堯舜又語及壽宫輔臣以皇考山陵工有次第對則自指云是朕壽宫諸臣言聖壽無疆何遽及此上仍諭緊要者再因問有鴻臚寺官進藥何在輔臣奏鴻臚寺寺丞李可灼自云仙丹臣等未敢輕信上即命中使傳宣諸臣退出可灼至同進診視具言病源及治法甚合上喜命進藥諸臣復出令李可灼與御醫各官啇確未决輔臣一燝言其鄉兩人同用此丸一損一益非萬全藥禮臣如游言此大有關係未可輕易乳嫗至上趣和藥諸臣復入可灼調藥進上飲湯輒喘逆藥進乃受喜稱忠臣者再諸臣出宫門外俟少頃中使傳聖體用藥後暖潤舒泰思進飲膳諸臣歡躍而退可灼及御醫各官留時日巳午比申未可灼出輔臣邀詢之可灼言上恐藥力竭欲再進一丸諸醫言不宜驟傳趣益急因再進訖輔臣亟問藥後何狀云聖躬傳安如前先是可灼來閣門言有仙丹欲具本進輔臣出所具問安揭中有進藥宜慎及不效傷害等語遂諭之去是早輔臣恭視寫篆大行皇帝冊寶兩內監在云有鴻臚官李某在思善門具本進藥輔臣應以難信俄蒙召見蓋可灼時從諸御醫往來思善門中使遍聞以逹于上其傳奏姓名莫可得而問是日仍以問安賜諸臣錢幣燒割可灼與焉次日五鼓內宣召急諸臣趨進而龍馭以卯刻上賔矣蓋九月一日也崇禎九年禮科給事中馮元飈熹朝信史急冝纂成疏臣待罪禮科與聞掌故每見巨重諸務類多廢弛習為固然莫之省究如諡法五年一舉所以風世也今或有再訪而無一報歷法終古不易所以奉天也今或持各是而滋大疑積怠成荒蓋難枚舉苐以四郊多壘未敢一切具陳至若實録一書則萬世是非之衡亦一時勸懲所恃也凡禮樂沿革征伐次第刑政施設羣臣功過四裔朝貢之類莫不具載太祖高皇帝曰國史貴于直筆是非善惡皆當書之使後世觀之不失其實世宗肅皇帝曰史之可否一出于公非公則鬼神亦察之在祖宗之世重史若此而又慮其書藏之金匱副在祕書人欲見之有不可得更就其事輯為寶訓以傳於天下賢者有所勸而不忠不孝之臣有所畏至盛典也故歷朝以來雖御世長久事蹟繁重實録之成無踰至數年者今熹廟之政前後七載實録故事以月繫年總其成書不過八十餘卷耳夫古之修史者或訪諸故老或採及輶軒故其編次至煩折衷匪易若我昭代則法制既詳官事畢具在翰林有起居之職在六垣有章奏之抄在內閣有票擬之籍纂輯磨對豈待九年何狥何疑坐成廢閣此固非一政一事之蠱惰也臣嘗誦孟子曰孔子成春秋而亂臣賊子懼天啓之間是稱陽九其為忠逆殆亦多途法誡所陳至非渺小徒以實録未上寶訓弗傳遂使衆志紛營猶思擾溷保奸舉逆蠅集兔爰外患未寧其漸方長臣所竊竊良抱深憂非敢過執硜迂徒于奮武之秋漫作揆文之論也伏乞皇上毅然獨斷即敕所司將實録寶訓立行竣役如寶訓頒而是非曲直有不合匹夫匹婦之公者許廷臣據實糾正按治如法如此則人心自定政體肅然天下幸甚萬世幸甚春明夢餘録卷十三
