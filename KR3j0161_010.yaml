body:
  text: 春明夢餘録卷十吏部左侍郎孫承澤撰文華傍室文華殿原係東宫講讀之所天順中始移於殿之東廂房每早各官繡服行禮分立東宫自座上背誦先日之書畢講官直上地平內侍授以牙籖指書而講講畢退食東宫易􅢁􅮌金鑲寶石帶玊縧向西窗習倣書一張各官易素袍復進通講三日之書畢諭先生每喫茶各官叩頭而出內臣設一卓將東宫倣書請視閣臣以硃筆點字之端楷者元時太子講讀之所曰承華明曰文華永樂中著文華寶鑑賜太子太子出閣講官陳經書於前講官讀一句太子照讀一句或五遍或十遍大約讀重於講故官銜讀列於前然通謂之講官天順二年禮部請皇太子出閣讀書上召李賢謂曰東宫講讀當在文華殿朕欲避此往居武英但早晚朝太后不便姑以左廊居太子此東宫移居之始也英宗為太子年二歲孝宗年六歲武宗尚未周年光宗以萬歷二十二年甲午出閣講讀時年十三崇禎十年丁丑禮部請太子出閣講讀時太子年九歲矣上定明年二月遂以戊寅正月冠二月初七日出閣己卯八月兵部選東宫侍衛人員於五府衛所子弟選一等名帶刀舍人一百五十六員名二等名控馬侍衛二百二十員名開講朝賀之日在文華門外侍立東宫講讀侍班皆用詹事春坊如萬歷四十四年題詹事劉一燝韓爌二人侍班及庶子張邦紀等六人講讀皆坊局官也萬歷二十九年東宫册立三十年正月開講侍班四講讀六翰林兼司經局較書二侍書二閣臣提調每日輪一員入侍光宗出講閣臣連侍三日以後逢三輪侍崇禎中東宫出閣閣臣初侍三日以後遇三八日全進餘日一人輪侍崇禎十五年八月閣臣恭進東宫講儀一覽史以佐經察舊儀有讀四書讀經史之文似宜於經書外每摘簡要通鑑一假進講於凡治亂邪正是非之際詳細開陳庶以古鏡今為益不小一省讀以進業舊儀經書各讀十遍為蒙養聖功伏見皇太子聰穎非常似可各省為五遍以餘力用之閲史作對既可養氣兼可旁通一對句以致知相傳祖宗朝講讀畢皆有對偶之句繇淺漸深繇近及遠比物連類觸發頗多似可將舊對佳者集為一帙恭候東宫時取覽觀間作一對容臣等與侍班講讀官互相參叩似亦格致一端一問辨以去疑聞高皇帝每令儒臣進講必令反覆討論以求義理之極如講洪範講立政講攻乎異端及心針皆至闡聖真出自天悟至肅皇帝聽講尤多發前賢所未發皇上精洞古今同符二祖計萬幾之暇所以諭東宫者耳提面命無不周到而講官進講時間有疑義東宫亦可時賜詰問以盡下情一時習以基聖先臣詹事吳寬言東宫講學自寒暑朔望令節外一歲之中不過數月一日之內不過數刻况其間又多間歇即曰習讀於內終不若出就外傅親近儒臣講習治道所得為多也商書言終始典學周頌言日就月將皆守成芳躅謹舉以為時習不厭之助親王受封未之國者當出閣讀書永樂後擇翰林官二員輪日講讀逮之國日遂改升長史以從故預者多不願宣德中周文襄忱自刑部主事升越府長史未幾越國絶遂升侍郎巡撫南畿正統中儀銘楊翥為郕府講讀官後郕王嗣位以從龍官至宫保尚書天順初德王秀王等出閣內閣李賢以親王四用官八員翰林官少請於新進士選用授以檢討之職遂著為例崇禎皇子定王於壬午正月出閣永王於癸未八月出閣皆命吏部選新進士為檢討國子助教等官為待詔充講讀以兩房兩殿中書充侍書每遇出講則王從皇極門之左𢎞政門出紅板轎用校尉八人青羅小傘二柄與至尊同而隨侍內璫六人皆金帶也王至皇極門下輿趨過西復上輿至書堂陛下出輿閣臣率講讀侍書官立於門右一躬候王入書堂至先師前行禮畢出坐堂中王命先生每來一躬即分班入門內閣臣左立餘各官稍退分左右立一躬出班初開館行四拜禮以後行一拜禮不叩頭也讀四書書經各五遍講四書書經各二遍王命先生每喫酒飯即出用酒飯畢再入侍王寫倣閣臣至案前環觀王親寫十字餘俟諸臣退後寫足送閣閣中批圈畢進呈皇極門外兩廡四十八間除曠八間外實四十間東二十間為實録玉牒起居諸館及東閣會坐公揖處西二十間上十間為諸王館下十間則會典諸館也定王書堂在西第六間為讀書處第五間懸先師孔子畫像四配侍側蓋摹吳道子筆及永王出閣因移定王第四間而永王在第六間王初出閣向先師行四拜叩頭禮以後則行一拜三叩頭皆內官贊禮第三間第七間為二王退居處案上置四書書經白文及集注大學章句或問洪武正韻海篇直音諸書皆紅綾殼春明夢餘録卷十
