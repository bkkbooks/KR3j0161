body:
  text: 春明夢餘録卷十七吏部左侍郎孫承澤撰太廟太廟在闕之左永樂十八年建廟京師如洪武九年改建之制前正殿翼以兩廡後寢殿九間間一室主皆南向几席諸器備如生儀嘉靖十一年召輔臣李時翟鑾禮官夏言議復古七廟制未決㑹中允廖道南疏請建九廟上從其議撤故廟祖宗各建專廟合為都宫太廟因舊而新之居中文皇世皇在太廟東北居六廟上昭穆六廟列太廟左右廟各有殿殿後有寢藏主太廟寢後别有祧寢藏祧主太廟門殿皆南向羣廟門東西向內門寢殿皆南向十五年十二月九廟成二十年四月雷火八廟災惟睿廟存因重建太廟復同堂異室之制二十四年七月新廟成正殿九間內貯諸帝后冕旒鳳冠袍帶匱而藏之祭則陳設祭畢仍藏匱中東西側間設親王功臣牌位前為兩廡東西二燎爐東燎列聖親王祝帛西燎功臣帛南為㦸門設具服小次門左為神庫右為神厨又南為廟門門外東南為宰牲亭南為神宫監西為廟街門正殿後為寢殿九間奉安列聖神主皆南面又後為祧廟五間藏祧主皆南向時享於四孟祫於歲除仍設衣冠不出主如初制寢殿神主太祖開天行道肇紀立極大聖至神仁文義武峻德成功髙皇帝孝慈貞化哲順仁徽成天育聖至德髙皇后中室成祖啓天𢎞道髙明肇運聖武神功純仁至孝文皇帝仁孝慈懿誠明莊獻配天齊聖文皇后東第一室睿宗知天守道洪德淵仁寬穆純聖恭儉敬天獻皇帝慈孝貞順仁敬誠一安天誕聖獻皇后西第一室武宗承天達道英肅睿哲昭德顯功宏文思孝毅皇帝孝靜莊惠安肅溫誠順天偕聖毅皇后東二室世宗欽天履道英毅聖神宣文廣武洪仁大孝肅皇帝孝潔恭懿慈睿安莊相天翊聖肅皇后西二室穆宗契天隆道淵懿寬仁顯文光武純德𢎞孝莊皇帝孝懿貞惠順哲恭仁儷天襄聖莊皇后東三室神宗範天合道哲肅敦簡光文章武安仁止孝顯皇帝孝端貞恪莊惠仁明嫓天育聖顯皇后西三室光宗崇天契道英睿恭純憲文景武淵仁懿孝貞皇帝孝元昭懿哲惠莊仁合天弼聖貞皇后東四室熹宗達天闡道敦孝篤友章文襄武靖穆莊勤哲皇帝西四室祧殿神主德祖元皇帝后懿祖恆皇帝后熙祖裕皇帝后仁祖淳皇帝后仁宗敬天體道純誠至德𢎞文欽武章聖達孝昭皇帝誠孝恭肅明德𢎞仁順天啓聖昭皇后宣宗憲天崇道英明神聖欽文昭武寬仁純孝章皇帝孝恭懿憲慈仁莊烈齊天配聖章皇后英宗法天立道仁明誠敬昭文憲武至德廣孝睿皇帝孝莊憲穆𢎞惠顯仁恭天欽聖睿皇后憲宗繼天凝道誠明仁敬崇文肅武宏德聖孝純皇帝孝貞莊懿恭靖仁慈欽天輔聖純皇后孝宗建天明道誠純中正聖文神武至仁大德敬皇帝孝康靖肅莊慈哲懿翊天贊聖敬皇后東廡諸王侑享壽春王妃劉氏為一壇霍邱王妃翟氏下蔡王安豐王妃趙氏南昌王為一壇蒙城王妃田氏旴𣅿王妃唐氏臨淮王妃劉氏為一壇寶應王六安王來安王都梁王英山王山陽王招信王為一壇凡十五王西廡功臣侑享開國輔運推誠宣力武臣特進光祿大夫左柱國太傅中書右丞相中山武寧王徐達翊運推誠宣力靖遠功臣開府儀同三司上柱國太保中書左丞相開平忠武王常遇春開國輔運推誠宣力武臣特進榮祿大夫右柱國大都督府左都督同知軍國事岐陽武靖王李文忠開國輔運推誠宣力武臣特進榮祿大夫右柱國寧河武順王鄧愈開國輔運推誠宣力武臣特進光祿大夫左柱國信國公追封東甌襄武王湯和開國輔運推誠宣力武臣右柱國西平侯追封黔寧昭靖王沐英贈奉天靖難推誠宣力武臣特進榮祿大夫右柱國追封榮國忠顯公加封河間忠武王張玉奉天靖難推誠宣力武臣特進榮祿大夫右柱國左軍都督府左都督太子太傅成國公追封東平武烈王朱能開國輔運推誠宣力武臣特進光祿大夫柱國同知大都督府事虢國忠烈公俞通海開國輔運推誠宣力武臣特進光祿大夫柱國同知大都督府事蔡國忠毅公張德勝開國輔運推誠宣力武臣光祿大夫柱國同知大都督府事越國武莊公胡大海開國輔運推誠宣力武臣榮祿大夫柱國同知大都督府事梁國武桓公趙德勝開國輔運推誠宣力武臣鎮國將軍護軍僉大都督府事追封泗國武壯公耿再成開國輔運推誠宣力武臣右柱國武定侯追封營國威襄公郭英贈奉天靖難推誠效忠宣力武臣特進榮祿大夫右柱國追封金鄉忠壯侯加封寧國公王真開國輔運推誠宣力武臣安遠將軍輕車都尉同知英武衛親軍指揮使司事特封永義侯桑世傑開國翊運守正文臣資善大夫贈太師諡文成護軍誠意伯劉基凡十七人吳元年建四親廟於闕左廟主皆南向東西有夾室有廡三門門設二十四㦸繚以周垣略如都宮之制歲時皆特享及即大位之元年議定諸禮儒臣進宗廟之說曰傳謂萬物夲乎天人夲乎祖故為之宗廟以享祖考而致其報夲之意也德有厚薄故制有隆殺自天子至官師其制不同周有天子七廟而商書伊尹曰七世之廟可以觀德則知天子七廟自古有之不獨周為然也若夫太祖百世不遷三昭三穆以次比至親盡而遷焉此有天下之常禮也至周穆王時文王親盡當祧共王時武王親盡當祧以其有功當宗故皆别立一廟謂之文世室武世室亦皆百世不遷漢髙祖承秦之敝未嘗立七廟至太上皇崩始詔郡國立廟而祖以上無聞焉惠帝詔有司立原廟又以沛宫為髙祖廟于陵旁立寢園廟自後每帝輒立一廟不序昭穆景帝尊髙帝為太祖文帝為太宗宣帝又尊武帝為世宗皆世世不毁元帝始罷郡國廟及寢園廟光武中興於洛陽立髙帝及文武宣元五帝廟天子親奉祀長安立成哀平三帝廟京兆尹侍祠又别立四親廟於南陽舂陵祀父南頓君祖巨鹿都尉曾祖鬱林大守髙祖舂陵節侯皆歲時郡縣侍祠至明帝遺詔藏主於光烈皇后更衣别室後帝相承皆藏主於世祖之廟由是同堂異室之制至於元莫之能改唐髙祖追尊髙曾祖考立四廟於長安太宗議立七廟虛太祖之室元宗創制立九室八世文宗開成中禮官以景帝受封於唐髙祖太宗創業受命有功之主百代不遷親盡之主禮合祧遷至禘祫則合食如常其後以敬文武三宗為一代故終唐之世常為九世十一室宋自太祖追尊僖順翼宣四祖每遇禘則以昭穆相對而虛東向之位神宗熙寧中奉僖祖為太廟始祖至徽宗時增太廟為十室而不祧者五宗崇寧中取王肅說謂二祧在七世之外乃建九廟髙宗南渡祀九世至於寧宗始别建四祖殿而正太祖東向之位元世祖中統三年初建宗廟於燕京以太祖居中為不遷之祖至泰定中為七世十室今擬四代各為一廟廟皆南向以四時孟月及歲除凡五享孟春特祭於各廟孟夏孟秋孟冬歲除則合祭于髙祖廟從之元年有司請製祭器上曰今之不可為古猶古之不可為今其製如事生之宜於是器用金楎椸枕簟篋笥帷幔浴室皆備二年令春以清明夏以端午秋以中元冬以冬至時享其歲除如故祝稱孝子皇帝不得稱臣遣太子稱命長子某不得稱皇太子三年令時享仍用四孟孟春特享于各廟各行禮奏樂三時合享於德祖廟初獻各奏其廟樂餘奏德廟樂六年令宗廟等祭祀祝文來說時必須著一員官捧著立地另著一員官前面跪著說看時却放在案桌上他自往前來跪聽不要將著祝文跪著說八年定廟享祭壇脫舄禮九年改建太廟前正殿翼以兩廡後寢殿九間間一室主皆南向几席諸器備如生儀歲孟春擇上旬吉日三孟朔日歲除日皆合享於正殿德祖帝后南向懿熙仁三祖以次列東西向設神座陳衣冠不出主凡合祭奏德廟之樂罷特享禮二十五年令廟享值國喪樂備而不作建文元年祔太祖永樂中建廟京師如南京制洪熙元年祔成祖宣德元年祔仁宗宣德十年祔宣宗天順八年祔英宗寢殿以次皆南向正殿神座以次皆東西向而九廟備矣𢎞治元年憲宗將升祔議祧禮部尚書周洪謨言國家自德祖以上莫推其世次德祖視周后稷不可祧太祖太宗視周文武百世不遷其祧懿祖請於寢殿後别建祧廟如古夾室之制歲暮奉祧主合享如古祫祭禮吏部侍郎楊守陳言禮官議非是禮天子七廟祖功而宗德凡號太祖即始祖也德祖可比商報乙周亞圉非契稷比議者習見宋儒嘗取王安石說遂使七廟既有始祖又有太祖太祖既配天又不得正位南向名與實乖非禮請並祧德懿熙三祖自仁祖而下為七廟如古禮異時祧盡則太祖擬稷契而祧主藏於後寢祫禮行於前廟時享尊太祖祫祭尊德祖如此功德崇恩義備上竟從禮官議建祧廟藏懿祖主并神座儀物熙祖而下寢殿神主正殿神座皆以次遞遷𢎞治十八年祔孝宗祧熙祖正德十六年祔武宗祧仁祖嘉靖九年上將祔睿宗諭禮官曰太祖肇運開基壓於太廟非宜遂祧德祖太祖居中南向是年春行特享禮令祠官於廟殿設幄如九廟主南向各奠獻讀祝三孟如舊十年冬上諭禮官曰太祖以恩隆德祖今日當以義尊太祖祫祭奉四祖同太祖皆南向庶見太廟為特尊太祖之意禮官夏言言禮合羣廟之主而祭於太祖之廟是為大祫亦以尊太祖也太廟太祖之廟不當與昭穆同序太祖太廟之祖不可與子孫並列自今大祫宜奉德祖居中懿熙仁太祖東西序皆南向列聖左右序東西向如故不惟我太祖列羣廟之上足以伸皇上之心而懿熙仁三祖得全其尊尤足以體太祖之心上曰善十一年罷設衣冠仍請主時上欲復七廟制議未决㑹中允廖道南疏請建九廟上喜下廷議禮官上言古者天子廟制唐虞五夏因之殷周皆七而祭法王制與劉歆宗說又各不同宋儒朱熹古今廟制引王制天子七廟外為都宫內叙昭穆漢不考古諸帝異廟諸廟異地不合都宫不叙昭穆明帝遵儉自抑遺命勿别為廟遂有同堂異室之制嗣後歷魏晉隋唐宋皆然我太祖初立四親廟廟皆南向似近古禮後建為太廟又用明帝之制皇上憲天稽古大釐祀典獨於廟制不能無疑形諸翰札宣諸臣召問謀諸臣弼者屢矣今太廟南近宫墻東邇世廟西阻前朝地勢有限上諭太廟三殿勿撤則太廟垣外左右隙地不盈數十丈若依古制昭穆六廟在太廟前以次而南則今太廟都宮之南至承天門墻不遠即使盡闢其地為左昭右穆猶恐勢不能容若欲稍减規模不必别門異寢又恐禮未必協况古七廟九廟制度皆同今太廟巍然𢎞壯而羣廟隤然湫隘亦恐於義未安議者欲就太廟兩廡即分羣廟不惟去尊即卑不足以稱聖孝而遷就一時裁損廟貌尤非細故且有廟無寢神將安棲諸王功臣置之何所議者又欲藏主夾室夫夾室者側室也以藏祧主可也以藏親廟未毁之主情理舛矣至謂周人廟制約儉宜倣為之夫周廟門大扄七個闈門小扄三個則大門實容二丈一尺小門實容六尺其制過於今廟烏在其為儉約也今損於太廟羣廟可又損於世廟乎且太宗功業比隆太祖憲宗獻皇父也又可减於世廟乎今之廟主太宗之下凡有七廟將如古制為三昭三穆而止六廟乎抑如商周以太宗為百世不遷之宗而加立七廟乎即使廟宇既成皇上冠冕佩玉執圭服衮循紆曲之途遍歷羣廟而行興俯拜起奠獻之禮非獨筋力不逮而日亦不給矣議者乃曰周禮宗伯代后獻羣廟可遣攝也夫古者廟祭君后祭獻后不與祭宗伯代獻謂一廟之中代亞獻之禮未聞人臣可以主廟祭也且古者助祭諸侯類多同姓罔非天􅏷今陪禮者可擬古諸侯乎皇上仁孝誠敬可以終歲舉祭止對越太祖之廟而不一至羣廟乎且規制必備而後成廟門垣廡寢是也儀文必備而後成禮主助禮樂之類是也今分為各廟廟祭之時不得不降從簡易欲尊之而反卑親之而反疏祗見其貶損而未見其隆重矣大學士邱濬謂宜一日間祭一廟歷十四日而遍七廟此蓋無據而强為之說不自知其言之迂也馬端臨曰後世失禮豈獨廟制漢儒以來講究非不詳明而卒不能復古者以昭穆難定故也必如古制父子相世則可兄弟相及則其序紊矣周孝王以共王之弟懿王之叔繼懿王而立故朱子廟圖宣王之世則以穆懿夷為昭共孝厲為穆夫穆王昭也共王穆王子穆也懿為穆孫則繼穆而為昭是也孝為共弟而繼共為穆雖於世次不紊然以弟而據孫之廟矣夷王懿王子也穆也而圖居昭厲王夷王子也昭也而圖居穆是孝王立而夷厲之昭穆易位於是朱子亦無以處此不過即其繼立之先後以為昭穆而不能自守其初說矣又况宣王時三昭三穆為六代所祀合始於昭王今孝王居其間於是昭王以六世祖雖未當祧而已在三昭三穆之外名為六廟而祀止三世耳前乎周者為商武丁之時所謂六廟祖丁南庚陽甲盤庚小辛小乙也然南庚者祖丁兄子陽甲盤庚小辛小乙又皆祖丁之子姑以祖丁為昭言之則南庚至小乙皆祖丁子行為穆是一昭五穆而武丁所祀上不及曾祖未當祧而祧者四世矣後乎周者為唐唐懿宗之時所謂六廟者憲穆敬文武宣然穆宣皆憲之子敬文武又皆穆之子姑以憲宗為昭言之則穆宣為穆敬文武為昭是四昭二穆而懿宗所祀上不及髙祖未當祧而祧者三世矣若必欲祀及六世則武丁時太祖之外必十廟懿宗時太祖之外必九廟而後可蓋繼世者既不能必其為弟為子建廟者亦安能預定其為昭為穆或穆多昭少如殷或昭多穆少如唐哉若必欲昭穆世序則建廟之時昭齒者必在太祖之廟之左穆齒者必在太祖之廟之右如此預立六廟定三昭三穆以次遞遷之說又不可行矣東都以來同堂異室未可盡以為非也皇上以皇考專享世廟而太祖列聖乃不得專廟以全其尊然列聖同享太廟已極尊崇而皇考專居世廟猶為避遜若廟制大小不倫行禮親攝或異則尊卑厚薄之間不足以稱皇上孝敬之誠皇上劄諭輔臣祀典宜正廟制難更大哉皇言實萬世之訓也疏入上不允竟從道南議撤故廟祖宗各建專廟合為都宫先是上既追尊獻皇帝建世廟於太廟之東南以四孟享十五年改世廟為獻皇帝廟十二月九廟成十七年九月上尊皇考廟號睿宗祔享太廟睿宗於孝宗弟行也躋武宗上遂稱太宗為成祖於是定享祫禮及其樂章凡立春特享上親獻太廟遣大臣獻列聖各出主成廟迎神樂别歌三獻徹饌還宫樂如太廟仁宣英憲四廟樂歌同孝武二廟迎神樂别歌三獻徹饌還宮歌同睿廟樂異於諸廟立夏時祫各出主於太廟大殿行禮立秋時祫如夏禮樂歌異於夏立冬時祫如秋禮迎神徹饌還宫樂歌異於秋季冬中旬大祫出四祖太祖成祖七宗主於太廟歌大祫樂歌祭畢各歸主於其寢是年皇后助獻罷脫舄禮二十年四月八廟燬初震火起仁廟風大發主燬俄而成祖廟火又燬延爇太廟及羣廟惟睿廟存上奉列聖主於景神殿遣大臣入長陵獻陵告題成祖仁宗帝后主同奉於景神殿已遷於奉先殿重建太廟復同堂異室之制二十四年七月新廟成時享於四孟祫於歲除仍設衣冠合享不出主如太祖時制世宗欲復古禘祭禮敕輔臣及禮官集議夏言撰禘議以進曰禮云不王不禘禘者本以審諦祖之所自出也惟王者竭四海之有以奉神明力大足以備禮故祭可以及遠有虞氏夏后氏皆禘黃帝殷人周人禘帝嚳是也我祖宗之有天下固以德祖為始祖百六十年來居中南向享太廟歲時之祭者德祖也今陛下定大祫之祭而統羣廟之主者又德祖也然則主禘之祭又可尊德祖乎夫既身為太祖之始祖矣而又為始祖之所自出恐無是理朱熹亦曰禘是始祖之廟推所自出之帝設虛位以祀之而以始祖配夫三代而下必欲如虞夏商周之禘黃帝帝嚳則既無所考若強求其人如李唐之祖𥅆又非孝子慈孫之所忍為也臣以為宜設初祖虛位而以太祖配享蓋太祖始有天下實始祖也議入上然之廖道南又獻議以為皇姓乃帝顓頊之後宜禘顓頊并下集議張璁曰言虛位者求之于虛則失之幻言顓頊者求之于遠則失之誣惟禘德祖為當兵部尚書李承勛等亦以為然言復抗疏言禘德祖之議可疑而未敢以為是者有四于是復下部議既而諭禮部祀始祖所自出之帝於太廟奉皇祖配每辛丙年舉行神牌曰皇初祖帝神位宗廟薦新品物正月韭菜四斤生菜四斤薺四斤雞子二百六十箇鴨子二百四十箇二月芹菜三斤薹菜五斤氷蔞蒿五斤鵝二十二隻三月茶笋一十五斤鯉魚二十五斤四月櫻桃十斤杏子二十斤青梅二十斤王瓜五十箇雉雞十五隻猪二口五月桃子十五斤李子二十斤夏至李子二十斤紅豆一升沙糖一斤八兩來禽十五斤茄子一百五十箇大麥仁三斗小麥麵三十斤嫩雞三十五隻六月蓮蓬二百五十箇甜瓜三十箇西瓜三十箇冬瓜三十箇七月棗子二十斤葡萄二十斤梨二十斤鮮菱十五斤芡實十斤雪梨二十箇八月藕四十枝芋苖二十斤茭白二十斤嫩薑二十五斤粳米三斗粟米三斗稷米三斗鱖魚十五斤九月橙子二十斤栗子二十斤小紅豆三斗沙糖一斤八兩鯿魚十五斤十月柑子二十五斤橘子二十五斤山藥二十斤兔十五隻蜜一斤八兩十一月甘蔗一百三十根鹿一隻鴈十五隻蕎麥麵三十斤紅豆一斗沙糖一斤八兩十二月波菜十斤芥菜五斤鯽魚十五斤白魚十五斤寢廟器用每廟壺一盂一臺盞二爵二碗四肉楪十菜楪十槖四匙二筯二茶壺二茶鍾二香爐一香盒一花瓶二燭臺二脫舄禮見郊祀嘉靖中以皇后助祭罷不行祼灌洪武三年禮臣崔亮奏周禮大宗伯以吉禮事邦國之神鬼以肆獻祼享先王灌以鬱鬯謂始迎尸求神時也禮記郊特牲曰魂氣升于天體魄歸于地故祭有求諸隂陽之義殷人先求諸隂聲是也祭統云祭之屬莫重於灌凡大祭有三始宗廟以樂為致神始以祼為歆神始以腥為陳饌始按說文裸祭也從示果聲酌鬯以灌地夏氏曰灌者謂以圭瓚酌爵以獻尸尸受酒而不飲因灌于地故謂之灌也鬯說文曰鬯以秬釀鬱金草芬芳攸服以降神也徐氏曰秬黑黍也服服事也周人尚臭裸用鬱鬯以秬黍搗鬱金草取汁而用之和釀其氣芬香調鬯故謂之秬鬯陸佃云秬者百穀之華鬯者百草之英故先王煮以合鬯圭瓉禮書云圭柄也瓉杓也徐氏曰瓉亦圭也圭狀剡上邪鋭之於其首為杓形謂之瓉於其柄為注水道所以灌瓉之言進也以進於神今定擬宗廟之祭奠帛之前宜舉用裸禮所用圭瓉宜依周禮以玉為之瓉口徑四寸深至圭二寸通長一尺二寸博二寸五分厚五分鼻一寸作龍形流空五分瓉槃用金為之口徑九寸深五分足徑七寸髙九分其鬱鬯用糯米代黑黍為酒以鬱金汁和之是年之冬享廟行家人禮次年始行灌禮西垣筆記郊廟之制明初以開天之主擅獨縱之聖故天地合祀南郊宗廟同堂異室皆可為百世法嘉靖中紛紛改作易合祀為分祀猶曰拘於周禮之文易異室為專廟猶曰拘於都宫之制也至追帝興獻已足盡人子之心矣而睿帝入廟竟祧德祖自古非創業之君之祖父有生不為帝而歿乃入廟者乎又本身現在元配未祔而孝烈皇后先入遂祧仁宗此又何禮也昔宋髙宗山陵朝議以世廟為號尤袤駁之謂光武以長沙王後布衣崛起不與哀平相繼稱祖無嫌太上中興實繼徽宗正統以子代父非光武比乃稱髙宗以子繼父不當稱祖誠萬世之斷案而乃上太宗廟號為成祖獨昧此義是太宗當日不知有父世宗並不知有祖矣按嘉靖二十八年繼后孝烈皇后升祔祧仁宗四十五年世宗升祔更奉元配孝潔肅皇后同祔廟先是孝潔薨未有夲室禮官議暫祔奉慈殿至世宗崩禮官髙儀等奉詔議曰孝潔皇后肅皇帝元配也禮太廟祔享惟一帝一后后惟元配今孝烈先祔若奉孝潔同祔則二后並配非制若以孝烈先祔而孝潔遂不祔舍元配而祔繼配亦非制請孝潔祔享移孝烈於𢎞孝殿上從之世宗議禮主繼統不繼嗣追封生父進帝此議實張永嘉孚敬力成之及入祔太廟乃具疏爭之曰臣伏惟皇上以大孝之心議尊親之典初因廷臣執論聚訟四年更詔三遍蓋自漢宋以來之君所不决之疑至皇上决之所未成之禮至皇上成之真可謂洗千古之陋垂百王之法者也是以新詔傳宣愚氓丕應蓋禮必如此然後合乎天理之正即乎人心之安也茲光祿寺署丞何淵妄肆浮言破壞成禮稱獻皇帝為所自出之帝請立世室列祀太廟此何言也臣與廷臣抗論之初即曰當别為興獻王立廟京師又曰别立稱廟不干正統此非臣一人之議天下萬世之公議也今何淵以獻皇帝為所自出之帝比之今之德祖請立世室比之周文王武王不經甚矣皇上聰明中正諒已察之茲言也上干九廟之威監下駭四海之人心臣不敢不為皇上言之昔漢哀帝追尊父定陶共王為共皇帝立寢廟京師序昭穆儀如孝元帝是為干紀亂統人到於今非之今何淵請入獻皇帝主於太廟不知序於武宗皇帝之上與序於武宗皇帝之下與孝宗之統傳之武宗序獻皇帝於武宗之上是為干統無疑武宗之統傳之皇上序獻皇帝於武宗之下又於繼統無謂何淵所請此何言也如謂太廟中不可無禰漢宣帝嗣昭帝後昭為宣之叔祖史皇孫嘗别立廟未聞有議漢宗廟無禰者蓋名必當實不可强為也如謂獻皇帝廟終當何承臣謂繇皇上以及聖子神孫於太廟當奉以正統之禮於獻皇帝廟當奉以私親之禮尊尊親親並行不悖者也先儒謂孝子之心無窮分則有限得為而不為與不得為而為之均為不孝皇上追尊獻皇帝别立廟者禮之得為者也此臣所以昧死勸皇上為之也入獻皇帝主於太廟者禮之不得為者也此臣所以昧死勸皇上不為之也夫成禮則難壞禮則易伏乞皇上念此禮大成原出聖裁非繇人奪何忍一旦遽為小人所破壞邪疏入上弗懌然侃侃正論矣明各帝廟號多至十六字皇后亦纍至數字比之唐宋皆為過溢不可為後世法正德中御史徐文華言族無後者祭終兄弟子孫之身今太廟享配諸王未審於髙皇何親大抵非兄弟即伯叔至於今五世六世矣祀宜祧下禮官議不從功臣從祀唐之可考者淮安靖王神通梁文昭公房元齡而下距太尉李訴凡三十二人宋之可考者韓忠獻公趙普開濟武陽王曹彬而下距丞相葛邲凡二十四人明髙祖定鼎念諸功臣之烈建太廟首以李韓公善長等六人及胡越公大海等從享最後韓公坐嫌死而六公亦間不得與逮永樂而始定自中山開平二王而下距永義侯桑世傑凡六王五公一侯十二人從文皇祀者至洪熙而定文武臣惟河間王玉東平王能寧國公真榮國公廣孝凡二王二公至世宗首上太祖徽號後上文皇帝祖號又采禮官言進誠意伯從祀太祖位六王下而以僧故斥廣孝使祀大興隆寺尋用翊國公勛請進其祖營國公英獨仁宗而後寥寥無聞論者謂如楊文貞李文達商文毅劉文靖楊文忠之賢於輔而不得從蹇忠定王忠肅王端毅馬端肅之賢於銓于肅愍之賢于樞而不得從張定興輔之下南交朱宣平永之八佩將印皆位太師握環衛為心膂牙爪而不得從髙帝諸功臣而下猶有說焉若李韓公之佐開創不下鄼侯雖以嫌死帝尚為之諱若馮宋公勝之佐大將軍取中原下秦隴降納哈出二十萬之衆傅潁公友德之從大將軍取山東其平蜀功冠徹侯而開滇南二百年之地惜其終於帝之末遘革除之變而未有舉也附明世宗重建太廟敕朕惟禮時為大祀典國之大事也茍不安於人心終難協夫禮意我國家宗廟之制自太祖肇基之初首建四親廟其後更制特奉殷薦同乎一堂當其始事豈不博采遐觀卒從同堂異室之規以示酌古凖今之義暨我成祖定鼎於兹廟寢之營率遵其舊百數十年以祫以享緝於純嘏則有繇然夫萃之為享其則不遠曩因廷臣之議咸稱七廟之文是用創興以從周典乃所司討論不詳區畫失當成祖以六世未盡之親而遽遷世室不獲奉於三昭仁宗以穆位有常之主而移就左宮遂致紊於班祔武宗朕兄也不得用為一世顧居七廟之中有妨七世之祀揆之古義斯為戾矣往者回祿之警天與祖宗實啓朕心茲當重建之辰所宜釐正以鼎圖新制又我皇考睿宗廟於都宫之外朕每事廟中考廟未備豈有四親之內可缺考乎雖每於祫祀同享而奉主往來深為瀆擾茲禮官㑹議欲奉處於孝宗同廟雖為兄弟同世之義然題扁各殊終未為安朕是究是圖惟遵先制其永無愆夫禮非天降乃起人情祖宗列聖歡聚一堂斯實時義之為順者茲乃建立新廟仍復舊制前為太廟後為寢又後為祧時祫祭享奉太祖髙皇帝正位南面奉迎成祖及羣廟我皇考睿宗獻皇帝神主俱堂而序享獻既畢則奉列聖神主各歸於寢庶昭穆以明世序不紊列聖在天之靈歡欣右享而克伸朕瞻事孝享之誠矣爾禮工二部如敕奉行故諭附通政使沈子木請為建文帝立廟疏建文帝以髙皇帝之孫懿文太子之子嗣位五載系明統順易世之後禋祀杳然蓋由當時諸臣徒見建文遜國之迹而未能推體成祖文皇帝之本心也臣嘗考其故建文命將北征輒戒曰毋使朕負殺叔父之名此一念也天地鬼神鑒之成祖亦信之故當金川不守宫中變起之後為舉哀致祭倉卒時猶喪葬以禮矣而忍殄滅其歲時之祀乎練子寧以不屈受誅他日又曰使子寧而在朕故當用之有罪之臣猶將録用矣而忍不祀其無罪之主乎成祖即位之數年敕法司解建文諸臣禁令晚年又劄諭禮部盡赦諸死義家使是時有乘間以建文祀典請者當亦首肯舉行不至今日矣蓋建文諸臣謀削親王之權以激北師之怒而在建文則嘗有保全成祖之盛心靖難諸臣欲甚建文之罪以彰南伐之功而在成祖則未有顯斥建文之明㫖彼時典禮既失奏聞以後相沿遂成忌諱不知天下髙皇帝之天下也正朔髙皇帝之正朔也本自一家原非兩敵代邸天授少帝何尤豈可使禮樂明備之世有未祀之懿親亦豈忍使五年臨御之君無一錢之血食此時尚謂缺典後世其謂之何臣請於懿文太子廟側别立一廟四時致祭庶髙皇帝在天之靈可安而成祖盛德益光本心益明其益於聖孝大矣惟皇上斷以必行天下瞻仰在此一舉吏科都給事中魏大中紏輔臣享廟到遲疏孟冬之朔有事於太廟皇上冕而升百執事咸集獨閣臣魏廣微不至逮飲福受胙禮且告畢始奔突踉蹌入班拜跪明駴聽睹隂貽怨恫夫從古帝王致祀其祖考非獨以一人孝一人敬必萃萬國之歡心合孝合敬以事其先故武王之祭文王其頌曰有來雍雍至止肅肅相維辟公天子穆穆成王營雒而祭文王其頌曰於穆清廟肅雍顯相濟濟多士秉文之德對越在天駿奔走在廟皆言相祀者之肅肅雍雍執事有恪宗廟之禮所以序事所以辨賢若廣微者宜何處焉且皇上即以是日之卯升殿頒來歲之歷於臣下行之四方萬國九夷八蠻誰不俯首奉命其敢矯命雄行者廣微執政近臣何以驁焉不拜皇上之正朔也昔子貢欲去一告朔之羊孔子猶愛其禮况天威不違咫尺乎語曰為人臣子見無禮於君者如鷹鸇之逐鳥雀也今廣微者皇上於一日之中行二大禮而頒朔則不至享廟則後至其無禮於皇上也亦已甚矣臣等言官也又與陪祀之列不敢不陳相鼠之刺皇上以禮治天下其無禮如廣微者恐不宜使為執政居百僚上伏惟聖明裁察春明夢餘録卷十七
