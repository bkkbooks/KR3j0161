body:
  text: 春眀夢餘録卷五十五吏部左侍郎孫承澤撰府學順天府儒學在城東北國學之南洪武中以元國學為北平府學永樂定鼎仍為國學改報恩寺為順天府學初有僧遊湘潭募造報恩寺尚未安像眀師下燕戒士卒毋得入孔聖廟僧倉皇借宣聖木主置殿中後不敢去遂以為學其地元之柴市也文文山授命焉東有祠西有館曰教忠再西有坊曰育賢諭㫖眀太祖初年詔曰惟致治在善俗善俗視教化教化行雖閭閻可化為君子教化廢中才不免于小人近北方𣪚亂人鮮務學其選太學諸生中年長學優者往各郡分教使人務學而興材又輟翰林院修撰檢討為郡學官已復令按察司精考儒學官不稱者送部别調又詔各布政司府州縣官舉秀才人材必會同境內耆宿長者訪求德行道藝著聞州里之人以充從鄰里保結命有司驗實蓋重薦舉而先德行儼然成周造士之法也提督學校官敕諭原敕萬歷初改一學者讀書貴乎知而䏻行先將聖賢經書熟讀背誦牢記不忘又從師友講解眀白俾將聖賢言語體而行之敦尚孝弟忠信禮義廉恥之行不許徒務口耳之學將來朝廷庶得真才任用一為學功夫必收其放心主敬窮理毋得鹵莽間斷其餘修已治人之方義利公私之辨須要體認精切庶幾趨向不差他日出仕方䏻顧惜名節事業可觀一習學舉業亦窮理之事果能精通四書本經便㑹行文有等生徒不肯實下工夫惟誦舊文意圖僥幸出身今宜痛革此弊其所作四書經義策論等文務要典實平順說理詳眀不許浮誕至于習字亦須端楷庶不乖教飬之意一學效無成皆由師道不立今之教官賢否不齊先須察其德行考其文學果所行所學皆善須禮待之若一次考驗學問疏淺及怠于訓誨者姑戒勵之令其進學改過若再考無進不改送吏部别用其貪淫不肖實迹彰聞者不必考其文學即送按察司直𨽻送巡按御史問理吏部别選有學行者補其缺一師生每日坐齊讀書及日逐㑹饌有司簽與齊夫膳夫府學膳夫四名齊夫八名州學膳夫三名齊夫六名縣學膳夫二名齊夫四名不許違悮缺後一生員考試不諳文理者廩膳十年以上發附近去處充吏六年以上發夲處充吏增廣十年以上發夲處充吏六年以上罷黜為民未及六年者量加決罰勉勵進學一生員之家並依洪武間例除本身外户內優免二丁差役有司務要遵行不許故違一凡巡視學校水路乘驛舟陸路乘馬仍于夲司帶書吏一名隨行陸路與官驢俱支廩給一府州縣提調官員宜嚴束生徒不許出外遊蕩為非凡學內殿堂齊房等屋損壞即辦料量工修理若恃有提督憲職將學校中一切合行之事推故不行用心整理量加決罰懲戒一所過之處遇有軍民利病及不材官吏貪酷害人事干奏請者從實奏聞一本職専督學校不理刑名如有軍民人等訴告寃枉等事許受詞狀輕則發下所在有司問理重則送按察司直隸送巡按御史提問一科舉夲古者鄉舉里選之法今南北所取舉人名數已有定制近年奔競之徒利他處學者寡少往往赴彼投充增廣生員詐冒鄉貫隱蔽過惡一概應試所在教官僥幸以為己功其弊滋甚今後不許違者聽本職及提調科舉官監試官拿問一布政司按察司官及巡按御史不許侵越提督官職事若以公務至府州縣亦當勉勵師生勤力學業不許推故不理若提督官行止不端許巡按監察御史指實奏聞一所轄境內遇有衛所學校一體提調整理武職子弟悉令其習讀武經七書百將傳及操習武藝其中有䏻習舉業者亦聽科舉一各處嵗貢生員照例將食糧年深者嚴加考試不必會官如果年深不堪充貢就便照例黜罷却以次者考充務要通曉文理方許起送赴部一廪膳增廣生員已有定額廪膳有缺于增廣內考選學問優等者幫補增廣有缺于本處官員軍民之家選擇資質聰敏人物俊秀子弟補充不許聽信有司及學官狥私作弊若有額外之數須嚴加考選通曉文義者存留待缺不許將不堪者一槩存留躲避差徭一古者鄉閭里巷莫不有學即今社學是也凡提督去處即令有司每鄉每里俱設社學擇立師範眀設教條以教人之子弟年一考較擇取勤效仍免為師之人差徭一師生于學校一切事務並要遵依洪武間卧碑行不許故違崇禎六年癸酉二月初三日上諭祖制設科取士専為致治求賢近來士習日偷貢舉失當人才鮮少理道不張由督學教諭訓導各官董率乖方培養無術盡失舊制初意以致朝廷不獲收用人之效朕思士子讀書進身乃人才根源必宜首重德行幼學壯行如生平果係孝弟廉讓自然做官時不貪不欺盡忠竭節何必専工文藝據㑹典及提學敕書內敦尚行誼以勵頺俗不専論文優劣開載甚眀近通不遵行至小學諸書乃州縣各有社學原欲養蒙育德敷教儲才近來全不講論興舉其士子自童時入孰以逮應試登科只以富貴溫飽為志竟不知立身修行忠君愛國之大道如此教化不眀士風吏治安得不日趨卑下朕惟祖宗朝求才用賢原不盡拘科目至考試文義正欲因言徵人亦非専尚浮詞務華遺實今欲祗遵祖宗制起敝還醇童生必先入學遇試先查德行自儒童以及鄉㑹須有實跡方許入場異日敗行考官挨論又教官為士子師長化導最親舊制甚重近皆以衰庸充數教術全廢此尤士風不正之源今設法興起著吏禮二部同都察院及該科詳議眀確具奏至海內之大豈無潛修碩德純孝鴻才清志剛方實堪大用者更宜特拔一二以示風勸至于科道不必専出考選館員應令先厯推知并著酌議來行江陵項氏曰學制之可見于書者自五帝始其名曰成均說者曰以成性也然則有民斯可教有教斯可學自開闢則既然矣有虞氏始即學以藏粢而命之曰庠又曰米廩則自其孝養之心發之也夏后氏以射造士如行葦矍相之所言而命之曰序則以檢其行也商人以樂造士如䕫與大司樂所言而命之曰學又曰瞽宗則以成其德也學之音則校校之義則教也周人修而兼用之內即近郊並建四學虞庠在其北夏序在其東商校在其西當代之學居中南面而三學環之命之曰膠又曰辟雍郊言其地璧言其象皆今古假借字也其外亦以四學之制參而行之凡侯國皆立當代之學而損其制曰泮宫凡鄉皆立虞庠凡州皆立夏序凡黨皆立商校于是四代之學達于天下正統中禮部請兩直隸敕御史十三省按察司敕添設副使或僉事提督學校成化中敕提學各分督所屬官簿録諸儒生德業為三等德行優文學贍治事上者為上等有德行而經義治事稍劣者次之即經義優治事長而德行玷缺者列下等嵗課月考非上等毋得應貢舉欲務士于本實而例廪生考黜者俱追廪為民父兄咸憚懾不務子弟于學提學御史閻禹錫請停追廪學乃興當是時陳恭愍公選督南畿學言稱古昔動必禮則先頒冠婚喪祭及射儀于學宫令嵗時肄業訓生徒一主于躬行以變革浮習所巡行不居公府居宿于學宫端默危坐以率之已而見諸生周旋磬折絃管豆登洋洋翼翼也比入夜齊館燈燭如白晝咿唔之聲鍧然選時以二燈前導省勸之郡士競奮前後三年章縫士未嘗見其變色之語折箠之威即輿皂不施也其教人必本諸文公小學書以達于四書五經及通書西銘性理諸書諸生翕然孚化畏信如神眀既去思之如父母以憲副督河南廣東學一如南畿時為國朝督學使者之冠眀初重督學之選其盛時未論逮正德末御史蕭鳴鳳懲惡嚴雖才不貸副使魏校敦行急受欺不悔副使李夢陽伸士節振萎習士誦義不休其後督學官稍輕柄其任者非必有卓行實學厭士心如異時髙者虛談沽譽劣者安祿養交下者至開幸門聽請託不忌又巡㦄或二三嵗乃一至至不過浹旬月獨品所為校試一日文而止不復關行䏻考察他道藝即甄考德行亦獨案郡縣學官所報三等簿奬汰之不復有案質甚乃憚巡行勞苦獨髙坐引日月至大比獨委府州縣類考而合試之故士習刓而人騖于奔趨眀初重學官之選往往取耆儒宿學以充後科目法行取舉人登副榜者選授凡國家推選坊局纂修典籍㑹試校文必與焉其經保薦及九載處優考者類得授翰林院科道部曹官于陟升無等故廷臣薦士以起家學官為美談後久刓弊師儒之職益輕副榜舉人不屑就而貢生年稍邁若貧困甚者乃甘心焉因取充位精力倦于鼓舞而學術紕謬無䏻為諸生先奔走有司結富豪以茍得而于月考課及上下三等簿率以資不復問行䏻蓋冗蠧甚矣禮部尚書沈鯉疏竊惟教職之親士與有司之親民一也今天下有牧民之官而無教士之官蓋所謂教授學正等職者徒取備員實于弟子無分毫授受之益雖亦三年大比每嵗貢士未嘗乏人而求其成德達材以著作人之效者則杳乎其未之聞也夫人材風俗出自學校為治忽理亂所係可任其廢壞不修至此乎臣等職専風化責有攸歸竊欲稍為振拔使知自奮無所容其督責之法惟慎其選除優其遷轉以示鼓舞作興之意使由科目出身者不薄此而不為貢途出身者不畫地以自限庶幾師道立而學政之修舉有日矣請自萬㦄十七年為始新科進士有願就教職者免其自行陳乞具呈辦事衙門移文吏部代與題准即與除府學教授教授三年查果稱職原係二甲者升各部主事係三甲升推官知縣俟其歷俸三年將前教職舊俸准折有司年半與初選推官知縣厯俸四年半者一體推升行取其三甲進士有願久任教職以終作人之效者許于就選之日具呈案候待其六年徑升各部主事三年者升國子監博士等官如有雅意作人如孰師之于子弟日課月程多所造就及䏻贊助有司修眀教化有移風易俗之效遇該內轉與相應部分遇該行取則通論功績所以優進士教職者似應如此夫其守選未及者得免于淹滯之苦而政體未諳者可習見有司之事或遇該鄉試之年則聘取同考不患乏人斯其所以優之者又不在遷轉之間而已矣㑹試副榜舉人及下第乞恩就教者本為貧而仕者居多乃當臨選之期有持兩端不决者何也蓋年長而願就教職者本利于推升之速年青而有志進取者又惟恐推升之速此其情之不同有若是相反者不可不從其兩便也請自今以後凡舉人就教者俱經會試一次方與推升有司如就教之後㑹試不第而仍願久任教職以終作人之效者許具呈案候准其再一㑹試方與推升惟已經三次者不准其餘仍照常推用若有造就人才修眀教化如前項所稱功績者三年以上升司務博士知州九年考滿起送到部者升各部主事大理寺評事府同知所以優舉人教職者似應如此夫進士舉人就教者多則教授學正可悉得科目出身者而用之縣學教諭雖不盡然亦宜選訓導之有賢聲者以充其任蓋掌教得人則一方學政有為之綱維者故尤宜慎選矣貢生教職視科目出身者常多數倍乃近年以來則一任分教再任掌教概從劣轉彼既無可欲之勢以誘其前而又有患失之心以隨其後未有不甘心自棄者故學政之壞由貢途居多而鼓舞作興亦宜于此輩加意也合無貢士教官查有稱職者除春秋兩季照常序轉學職外其雙月大選遇該推升之時亦查其年力精壯考語特優者與一體推升有司九年考滿起送到部而著有前項功績者升知州助教其各該撫按薦舉教職者亦特許寬其人數仍于薦本中以其資格分為三假示不相掩如云某以上係進士出身某以上係舉人出身某以上係貢士出身斯不得偏右科目致枉公論以消沮貢士之氣所以優貢士教職者似應如此夫待之優則人知自奮而師道可立學政不患其不修矣至于有司改教近年事例猶有可議者蓋凡撫按官論劾有司而欲存一線之路者必曰操守猶未大壞學問尚為可師夫曰守未大壞非果不壞特惜其履任之淺也曰學為可師非真有學特借此以為之名也審如是則教士以貪而已矣何重民而輕士如此也合無自今以後論材力則姑准改教犯操守則降調間𣪚不許概與教職以溷學宫亦補偏救弊一事也伏乞敕下吏部覆議上請俯賜施行臣等幸甚桂文襄蕚疏臣聞先王之教民也因天地之性順人物之生分土授職統之于鄉州黨族閭里而導之以孝友睦姻任恤教不出于畎畝而行不出于彛倫管敬仲曰農之子恆為農野處而不昵其秀民之䏻為士者必足賴此之謂也漢書餘子遣入序室所謂餘子父在則子餘兄在則弟餘故天下生員皆名子弟其職在入孝出弟而所以教之者莫切于出作入息之期後世岐教養之政而二之教者不知養養者不知教以致學校之弊考德行不求之鄉黨談經之謬分司徒以屬之各官故一登講堂永恥民事有父兄荷簔笠而子弟衣輕裘見達官貴人竦然敬起見胼手胝足雖至親赧然愧之是雖冠服士人言論道法而其孝友之實曽塗之人不若矣此風俗之所以日下也乞敕諭提督學校官敦本抑末進農民之秀重居鄉之行凡入學生徒必求子弟曽知稼穡有孝弟實行者取之每于考校後咨訪篤實父老如古所謂孝弟力田者量賞犒以風之設稽行簿付之里老書其敬敏任恤條報其善行旌異之其鄉行玷缺者選人不許入序嵗貢舉不以應科而命府州縣教官集諸生為㑹五日一㑹先將所欲講求經傳手録之録畢即將本文諧協音聲圈㸃句讀㑹通章大旨尋繹不得破碎擬題以壞經義茍有自得録冊端商之所作字務莊楷次將身所處倫理間事未盡分若所遭不如意者務盡心商處如此將不出畎畝之中鄉庠之內而駸駸然有復古之漸矣且夫人者天地之心也人存其心則與天地為一一息不存則不與天地相似失久不復則其違禽獸不遠矣心何以存曰敬敬何以入曰畏昊天曰眀及爾出王昊天曰旦及爾游衍敢不敬乎曽子曰十目所視十手所指畏也惟畏而後䏻敬敬而後心存朋友之交切嚴如此至舉業文字士子所賴以發身者固不待督責而自勸者矣然其業之也粗解章句輒决裂經傳擬題搆文競為浮華放誕之言以奪有司之目是則雖名士人其設心與壟斷之徒何異放心至此尚何望其讀書窮理以求見聖賢之心法也哉必申令學官務戒諸生一洗此習先閉門靜坐整齊嚴肅然後以先儒讀書法取聖賢經書誦讀而近思之體認深至程子曰如讀論孟將門人問處便作已問將聖賢答處便作今日耳聞又云未讀時已曉文義大略既讀後自家見得又别但覺意味深長今生徒知此味者或鮮矣近議者又以為讀書無益傳注為贅正緣其始未知讀書之法未深于讀書之味後有所得懲之太過而不知此論一開必將至于尚清談滅禮教聾瞽一世使天下貿貿焉無所執持而後已非所聞也乃小學之教本古庠序序以眀教庠以行禮而視化春民畢出在野冬畢入于邑餘子畢入序室學六甲五算書計之事非獨教之將有以養之也非獨飬其德性亦將養其身體固其夀命而堅强其血脈也故聲音以養其耳采色以養其目降登疾徐以養其血脉今之教者嚴課程急記誦以傷其魂强所不䏻苦其思索以損其魄而教與飬胥病矣臣治縣時闢義倉之右廢寺隙地南北數百步有餘建為學舍左右相向中設四堂前後為門左右為孰以篤實長老二人平旦坐左右孰序行道出入每食時至日夕亦如之次為習禮堂中繪陳祥道楊復所撰禮圖曰童子禮曰士相見禮曰婚禮曰子事父母禮曰婦事舅姑禮曰祀先禮曰鄉射禮立師掌之諸童子進學即率見先生習升降拜揖坐立之節隨授一圖指示擘畫令其通曉間令展習以辨雜服又次為句讀堂內榜管子弟子職亦列數圖示之日講一圖次以孝經小學教之句讀令其粗熟仍為講說大義約之入身又次為書算堂榜六書法每日止教一兩字即以四方上下自一至十若干支等名數授之又次為聽樂堂內置鼓鼙笙磬投壺詩章弓矢禮樂之器或教以鼓節或教以詩歌或教擊魯薛鼓之半以習投壺或擊魯薛鼓之全以習射儀四堂遍而日亦且晡矣自聽樂堂復之書算以次至句讀至習禮皆略復舊業于門左右孰以次序出如此則家無子弟之憂而子弟亦得養其德性血脈養其耳目心志而非僻之干無自而入于以飬端正之本而復古興理幸甚元大興府學孔子廟碑馬祖常文曰昔我太祖皇帝受命造邦金人孫于汴太祖即以全燕開大藩府制臨中夏維時已有定都之志矣故太宗皇帝首詔國子通華言乃俾貴臣子弟十八人先入就學城新刳于兵學官攝于老氏之徒逮世祖皇帝教命下始正儒師復學官廟事孔子歸壖垣四侵地勒石具文作新士子至元二十四年既城今都立國子學位于國左又因故廟為京學京師雜五方俗尹治日不給廟之墻屋弊壞將壓以毁講席之堂粗完泰定三年今大尹曹侯上視廟貌祠位皆不如制割稍入為寮宷倡然後大家富人合資以聚財者有焉釋子方士分食以庀徒者有焉施于廟咸樂相成延兩廡五十有二楹締搆塗飾工良物辦象從祀諸賢百有五人妥靈惟肖威儀有容又懇請于朝得廪餼弟子員百人受學于師復其身不勞以事于是天下首善之教興焉廟肇自唐咸通中至遼金燕為都邑故嘗用天子學制選舉升造與南國角立亦一時之盛也太宗皇帝當雲雷經綸之世聖訓諄切以德賞喻父師以夏楚懲子弟饑焉粟肉渴焉酒醴力焉僕使恩義甚備其養賢勸善之誠固已髙出于百王之上矣世祖皇帝立極作則人文昭眀登用儒臣躬親講學故當時勳賢之裔以及宿衛之臣罔不以揖讓爼豆之為懿顓䝉昏庸之為恥也而三代國學黨序庠遂家孰之等秩然羅列于上下才學經術用世之士踵武而出暨仁宗皇帝賔興大比四方舉進士比登賢書䇿名禮部者京師屢倍于外郡非列聖仁涵義揉百年之禮樂文物推而致之與燕自虞夏為武衛之服召公之化尚矣昭王築臺以徠賢士鄒衍樂毅劇辛至有稱于世韓嬰以詩易為一家師孔頴達博綜五經卓然庶幾醇儒今多士游歌在庭摳衣在廟將見魯鄒之美矣若嬰頴達宜所不道矧衍毅辛之徒哉夫儒者之學詩書六藝之文以至施天下之道無有二也後世教不眀家異人殊各溺于所習以相詆訾由上之教無以一之嗟夫古者小學大學之師弟子之傅皆本于道德仁義之實著于詩書六藝之文非有教有授則不敢以傳也傳焉而龎雜不經則上有刑也是故風淳而氣固由上之教有以一之也而王國多士逢文眀之㑹肄業有學學有師春秋祀其先聖先師者有廟有位入有食以處出有貴于衆所以報稱列聖教化之德而應賢侯承宣之志者必冠而起矣提舉學事崔居中教授賈良弼言正張禎祿司視以狀請曰廟之事成前尹馬思忽實䏻始之今尹曹偉實能終之經歷王孝祖薛讓警巡監院兀都瞞使李權且䏻考工于下也余既為言正兖郕沂鄒四公配食東鄉位其來請遂為銘詩不辭詩曰皇元有赫奄受大國于月之􅀈于日之域京邑翼翼莫不來極豫誕敷文德新都有嵯辟雍峩峩􅋒辨之瑳濟爾象犧鍧爾弦歌新宮則那舊廟如之何皇帝在御百度咸若海輸維柟河浮厥柏是尋是斫虞庠嶽嶽式光我上國元聖儀儀元紞龍衣衎我先師既右享之采芹于池薦此眀犧用介我蕃釐蕃釐伊何彼美多士克眀克類克諒厥事以登膴仕以媚于天子有鏗華鐘路鼓逢逢言燕于公有翼有顒多士既同天府是庸惟曹侯之功曹侯誾誾乃承乃宣御劇乃専虞庠連連王氏安安祗國維賢天子萬年武學附洪武初禮部奏請如前代故事立武學仍建武成王廟上曰立武學是分文武為二輕天下無全才矣三代以前之士文武兼備用無不宜如太公之鷹揚而授丹書仲山甫之賦政而式古訓召虎之經營而成文德豈比于後世武學止講韜略不事經書専習干戈不聞爼豆拘拘于一藝偏長哉今建武學又立武成王廟是近世之陋規也太公宜從祀帝王廟其武學武成王廟罷之軍衛舊無學與府州縣同城者軍官子弟皆附其學獨治一城者皆立衛學宣德十年從兵部尚書徐何之請也武官子弟曰武生軍中俊秀曰軍生衛學之有嵗貢始于成化三年從李文達賢之請也京衛武學始于正統六年除教授一員訓導六員教習勳衛子弟以兵部司官提調之每三年一開科如文士鄉試制然勳衛率多紈袴學雖立而卒無干城出其中者然後知太祖之睿謨逺也宋時武學與太學宗學共稱三學其時中武科者授簿尉之職初調即可補州縣與文科不甚逺文武之途不合而天下欲治不可得也天順八年于武舉分為二等上者加署職二級次者加署職一級旗舍餘丁上者授所鎮撫次者授官帶總旗民生上者授各衛試經歷次者授各衛知事後絶無授經歷知事者春眀夢餘録卷五十五
