body:
  text: 春眀夢餘録卷三十一吏部左侍郎孫承澤撰戎政府戎政府在皇城之東燈市大街永樂間設二帥府于都城内之東西以為㑹議之所後因敝壞嘉靖二十九年立戎政府統以勛臣一員曰總督京營戎政佐以文臣一員曰協理京營戎政營制有三中曰五軍東曰神樞西曰神機五軍營又析而為營者十有六神樞營析而為營者十神機營析而為營者九總之為三十一營而五軍營設號頭營二神樞神機各一皆領于總協大臣而奉行其命令每營将領一人中軍官一人千總官二人把總官十有二人管隊官六十人每軍五十人為隊管隊領之二十五隊為司把總官領之十二司分𨽻于一中軍二千總各得把總官四人軍千人共卒三千人為一營故分之則三十一營聯之則三大營又聨之則總曰戎政府營基五軍營即舊團營景㤗初年建立于安定徳勝兩闗外之中嘉靖二十九年罷團營始更于此南面建閱武門閱武門起至北土城止長一千七百四十二歩設将臺一座前設旗臺二座石榜碑一座皷棚二座石旗架二座演武㕔一座神樞營即舊三千營永樂初年建立于安定闗外之東神機營即舊五軍營永樂初年建立于徳勝闗外之西舊神機營在新立神機營之西嘉靖二十九年罷團營将五軍營更團營将神機營更舊五軍營而舊神機營竟廢營制洪武初定天下訓練軍士以衞京師置京營𨽻元帥府已而改五軍營曰中軍曰左掖曰右掖曰左哨曰右哨是為五軍𨽻都督府五軍都督握兵籍而不與調發兵部得調發而不治兵論者謂五軍營有六善焉一軍有變四軍足制一善也徒御既寡訓練易施二善也人自為将各愛士卒三善也彼此相形爭先策勵四善也分數畫一行伍不亂五善也彼此相依聲勢相倚六善也大約開國之祖身在行間習于兵事故制之善如此後屢改而大失其故矣太宗遷都北平一如太祖之制則于中都大寜山東河南附近衞所摘發官軍輪班上操營提督内臣一人武臣二人掌號頭官二人大營坐營官一人把總二人中軍坐營官一人馬歩隊把總各一人左右掖左右哨官如之此則髙皇帝五軍之舊也此外又有十二營掌随駕馬隊官軍是營也把總二人此外又有圍子手營掌操練上直叉刀手及京衞歩隊官軍是營也坐營官一人一司二司三司四司各把總二人此外又有幼官舎人營掌操練京衞幼官及應襲舎人是營也坐營官一人幼官營把總一人舎人營一司二司三司四司各把總一人此外又有殫忠効義營掌操練京衞報効舎人餘丁舎人營曰殫忠餘丁營曰効義是營也坐營官一人把總各一人此則五軍營之支分也已又得投附色目人一千常立于龍旗寳纛之下以為三千營營分五司掌執大駕龍旗寳纛勇字旗負御寳及兵仗局什物等件上直軍為一司掌左右二十隊勇字旗大駕旗纛金皷等件上直軍為一司掌傳令營令旗令牌御用監盔甲尚冠尚衣尚履什物等件上直軍為一司掌執大駕勇字旗五軍紅盔貼直軍上直軍為一司掌殺虎手馬轎及前哨馬營上直眀甲軍随侍營随侍東宫官舎遼東備禦囬還軍為一司凡五司是營也提督内臣二人武臣一人掌號頭官二人坐司官五人見操把總三十四人上直把總十六人明甲把總四人此則三千營之支分也已征交趾得其神機火箭之法立神機營掌操演神銃神炮諸火器亦分為五軍中軍坐營内臣一人武臣一人其下分為四司各監鎗内臣一人把司官一人把牌官一人左右掖軍如之左右哨軍亦如之已又得都督譚廣馬五千匹當時謂之譚家馬復置五千掌操演火器及随駕䕶衞馬隊軍是營也坐營内臣一人武臣一人其下分為四司各把司官一人此則神機營之支分也居常則五軍肄營陣三千軍肄廵哨神機軍肄鎗手如大駕親征則大營居中營外五軍分駐歩軍居内騎軍居外騎卒之外為神機營營之外有長圍周隣二十里樵採其中間此三大營之制也永樂雖遵洪武五軍之遺而各營添設内臣已違内臣不許典兵之禁未幾王振用事京軍五十萬一旦敗潰遂有土木之禍太宗貽之也嘉靖二十九年二月命改舊内教塲名曰内􅀢營欲以團操内使諭所司建一祀所並營舎數間中立一臺備御視團營景泰元年兵部尚書于謙建立京營團操法謙以京師兵馬分𨽻五軍三千神機諸營雖各有總兵然不相統一每遇調遣選摘凑撥號令不同兵将不相識或至悮事乃議㨂選諸營馬歩官軍十五萬分為十營每營各以都督總領每五千都指揮一員每千指揮一員每五百把總十員分管每隊管隊二員常領在營操練體統相維兵将相識出征就令原管都督等官統領前去號令歸一行伍不亂團營之設自此始十二營天順初年反景㤗之政革罷團營至八年而復及成化初又復革二年又復復則從兵部尚書馬昻議抽選京兵八萬外衞八萬外衞之兵分為二班班四萬為𤓰代合京兵為十六萬立十二團營操練之營曰奮武耀武練武顯武敢勇果勇効勇鼔勇立威伸威揚威振威營各分五軍三千神機三營五軍營領内外馬歩官軍三千營領内外馬隊官軍神機營領内外歩隊官軍而三大營之數不與焉是十二營軍名曰選鋒不任選鋒者仍歸三大營曰老家而團營之法稍變矣至於𢎞治正徳之後又有兩官㕔之制其法就十二團營挑選精鋭别立總兵叅将統領之此時十二團營可為老家而兩官㕔可為團營也設立戎政嘉靖二十九年京都戒嚴大學士嚴嵩李本請刷京營圖善後令兵部選武臣以充總督坐營之任吏部選才望大臣專理之令其㨂練人馬上是之下兵部兵部侍郎王邦瑞言國初營兵不减七八十萬元戎宿将常不乏人嗣是三大營變而為十二團營又變為兩官㕔雖浸不如初然原額軍尚足三十八萬有竒迄今承平既乆武備廢弛見據在籍僅十四萬有竒而在營操練又不過五六萬人而已戸部支粮則有兵兵部調遣則無兵比者敵至事棘戰守俱虛見在軍士率老弱疾憊市井逰販之徒衣甲器械臨時取給其為耗弊可謂至極臣謂軍伍不足其弊不在逃亡而在占役訓練不精其弊不在軍士而在将領今之提督武臣即十二團營之總帥坐營等官即諸營之主帥而號令把總之類又古之偏裨官其間多屬紈袴平時則占役營軍予以空名之餉臨操則四集市人呼舞博笑而已先是尚書王瓊毛伯温劉天和皆嘗有意整飭将領惡其害已從中阻撓隂壊正議而軍士又驕惰厭律輙亡匿渙散倡為流言清理未半事復中止今皇上親見其害矣臣願遣風力科道官議覈十二團營人馬之數叅攷戸部粮籍汱老弱留精壮逃亡者設法勾補占役者悉徴着伍然後人給衣甲器械擇謀勇将官加意練習而以科道官監視之上是之乃革去十二營兩官㕔第用京營總兵官一員提督三營以復國初之舊時咸寧侯仇鸞方以兵事幸上即使為之於是兵部㑹議條為六事其一請革内臣謂自古宦者不得典兵今三大營内有内臣提督監鎗等項不下二三十人既不知兵又專役占所宜裁革其一請處班軍謂河南山東大寧中都等處原額班軍十六萬有竒每年春秋更畨上班操備徃徃為合營借工私占之貲自今請令於五月中旬赴京各都司統率入營一體操練至十一月中旬掣囬休息不必兩班赴官如此則每嵗京營秋防之時可得十五六萬人比之召募尤為省費上悉從之於是罷團營兩官㕔以復舊制更三千營曰神樞營其三營司哨掖等名及諸内臣並裁革而統以大将一員曰總督京營戎政㕔給印曰戎政之印佐以文臣一員曰協理京營戎政兵部尚書于謙置建團營疏議得各營見操官軍已選十萬分作五營團操以備出戰每二萬人為一營每隊五十名一人管隊每二隊又立領隊官一員每千人把縂官一員每三五千人又立把總都指揮一員其管隊把總大小總兵官員各量其才器髙下謀勇如何而選用之使之互相統屬兵将相識如遇下教塲操練之時臣等出其不意量調一隊或三隊五隊㸃視但喚把總管隊官姓名各官自行管領本隊軍士前来内喚出軍士一二人或三五人令管隊把總官識認是何姓名衞所却将軍人懸帶牌面上原開姓名衞所年貌查對若有不同就将管隊等官量情責罰仍比較刀箭牌刀長鎗等項武藝精熟者量為奨勵生疎者一體懲治使管軍者知軍士之强弱為兵者知将帥之號令體統相維彼此相識不致臨時錯亂難於調遣大意前項團操軍士十萬合則為一營分則為五營萬一賊㓂侵犯賊多則各營俱動賊少則分調一二營或調一萬三五千随機應敵其平日選定大小該管頭目已定至交戰之時多用則多調少用則少調止調該管頭目則士卒自随平日相處既乆同軰之人昜以期㑹管事之人易以使令如手足之捍頭目子弟之衞父兄比之平日混同操練不辨强弱不知號令将各營之人逐漸輳合者不同庶幾可以成功取勝又賊之所恃者弓馬衝突而已賊知我火器一發之後未免再装遲慢以此我軍放罷火器就便馳突前来今若與之對敵我軍列陣外用鹿角遮䕶持滿以待賊若来𦂳堅陣不動元以弓弩對敵神銃未發先以火藥爆竹詐之賊必謂我火藥已盡不復畏避馳馬来攻則我軍火炮火銃飛鎗火箭弓矢齊發若勢衝動又以大将軍擊之待賊勢動分調精鋭馬軍用長鎗大刀勁弓射砍歩軍用團牌腰刀一齊衝入賊陣或刺射人馬或砍其馬足臣等以身率先衝冐矢石奨勵士卒俾無退縮如有退縮者即以軍法治之此則臣等愚見操軍出戰分合之勢如此謹當用心設法将各營已選團操并其餘軍馬一體操習申嚴號令務使人馬强盛武藝精熟除團營之外另選次苐精壮以備緩急調用以助團營軍威每日除演習軍馬武藝外仍令馬歩官軍兼習陣法及交鋒衝突安營走陣以為戰鬬之勢使之耳目慣熟歩驟輕健能知進退坐作之法免至臨敵畏怯失措至於固守之法則今日士卒頗多京師城垣堅固又有戰車鹿角器具賊縱勢衆可以固守無虞但用兵之法不測如隂陽難知如鬼神貴在臨期應變難以一定而求况敵騎趫㨗去來之閒如飄風驟雨應敵之際非勇無以挫其鋒非智無以破其敵必謀勇兼濟可以成其功岳飛有言陣而後戰兵家之常運用之妙存乎一心又曰文官不愛錢武官不惜死天下太平矣景㤗三年十二月二十二日各官奏奉聖㫖是兵貴乎精将在謀勇卿等務要同心協力操軍馬有事運謀或戰或守若無事則撫卹士卒飬其鋭氣遇警急易為調用這等乃不負朕委托之重大學士趙貞吉論營制疏照得我朝内外衞兵分隸五府乃髙皇帝定萬世太平之計俾免前代强臣握兵之害其為聖子神孫慮至深逺其法制甚周悉也永樂末年因聚府兵北伐旋師之後遂結營團操乃以三千神機二營附之因號為三大營其實皆為五府之兵也夫五府之兵因調伐而聚之為營既歸即當散還各府矣所以乆聚操團而不散者以當時常有戒嚴征伐之事故不暇耳然猶以五軍名營寔未變五府之舊制也沿至正統末年嘗變為十團營矣𢎞治年間又加為十二團營矣正徳年間又添置東西官㕔矣然舊營之中尚存老家軍之籍則五營之號未冺而五府之意猶存也夫我太祖分府以設将則權任不偏而得将将之法我成祖分營以統兵則分數易眀而得将兵之法得将将之法則無前代强臣握重兵之釁矣得将兵之法則合兵法御衆如御寡之方矣此祖制之盡善所當世守者也至嘉靖庚戌嚴嵩欲為賊将仇鸞之地遂請於先帝特設戎政㕔括内外兵籍鑄總督戎政之印而授之於鸞夫於五府之外而别立一㕔則盡變太祖分府之意矣以十餘萬之衆而統於一人則盡變成祖分營之意矣時無骨鯁伐奸之臣故賊臣得以肆覬覦之計向使鸞遲於伏誅則時事之危未可測也鸞誅而以鎮逺侯顧寰代之寰惟知退讓自守以保勲名以避嫌忌耳然而營兵則日弱矣往嵗戒嚴官軍俱列營於城内其怯弱可知皆由輕變祖宗之法遂至将强而如鸞則有不軌之虞将弱而如寰則有不振之弊國家與强敵宻邇而兵将之不足恃如此誠可為之寒心矣臣愚晝夜慮此竊謂分府設将之制未易卒復而分營統兵之法猶可遵行况近日兵部㑹推總督戎政之将武臣之中無堪任者葢才足以統御十萬之衆而能變弱為强者非韓白之流不能當之求之今時果難其人矣若夫才堪将一二萬之衆者猶或可選擇而使也合無将見操官軍九萬分為左右中前後五營各擇一将以分統之責令開營敎習依法訓練仍以文臣廵覈之每嵗春秋遣官較閱凡将官之能否軍士之勇怯技藝之生熟紀律之嚴縱皆得奏聞而賞賚罰治行焉務令五營齊成精鋭先将戎政印收入内府有事則領勅掛印而命将於閫外事完則繳勅納印而歸将於營中如是則太阿之柄獨持於上而輦轂之下常有數萬精兵可戰可守聽調聽戍随所用無不宜矣轉弱為强之道寔不外此今若徒狃於戎政㕔之設而不遵祖宗分府分營之意則将權重而避忌愈多兵不敢練也卒伍溷而分數不眀兵不可練也責任歸於一人而觀望推委者多兵不能練也夫與其握兵權於一人坐視其廢弛以趨於弱孰若分其權於五人令其各自操練互相奮勉而漸趨於强以壮國威也哉臣一得之愚所見如此伏望皇上俯賜採納兵部尚書張學顔京營議以言今之兵制當我髙皇帝開天合五府統𨽻之兵為一營操練有中軍有左哨右哨左掖右掖故名曰五軍營外以圍子手幼官舎人殫忠効義十二凡四營附之文皇帝繼極以龍旗寳纛下三千蒙古兵立營故名曰三千營外以随侍營附之又以神鎗及火器另立一營故名曰神機營外又以譚家馬附之夫曰五軍曰三千曰神機此所謂三大營也景㤗初因己巳之變遂於三大營中選立十團營成化中復増為十二團營以為操練之兵既未免權宜而非經𢎞治中又於十二團營中選立東西官㕔兵以為聽征之兵亦未免失多而携寡至我先帝當庚戌嵗敵騎長驅大飭戎務乃革十二團營及東西官㕔之名盡歸五軍以光復我髙皇帝之舊制因神機為神機改三千為神樞以式増我文皇帝之宏規總之為三營以盡其大分之為一總督一協理二廵視四副将三十二營四百餘員千把總旗隊以盡其詳寔昭析太甚固未嘗分數不眀也在先帝力復祖制百方慎重之心㑹於群臣告於祖廟方耆定規畫其詔㫖昭如日星有曰這事體非輕必復祖制方可事權歸一又曰朕復祖制三營修武當時諸臣合詞稱頌有曰規模宏逺修理精詳上増二祖創建之耿光下垂萬世治安之成憲臣嘗荘誦對揚以為我朝京軍三大營之制是髙皇創立於始文皇増定於中先皇完成於終凡三聖人作為二百年遵守誠祖孫作述先後相成萬世聖子神孫當欽承無替此正我皇上所謂分營練兵係祖宗舊制外此固無所謂祖宗分營亦非所謂祖宗舊制也且先帝所克復祖宗成規不獨臣與在廷諸臣以為善即嵗前九月皇上勅諭營臣有曰國家設立京營以飬戰士越我皇考又更新戎政申飭宏規其制大備今詔墨未乾是皇上之心亦已灼見其善矣夫既灼見其善而復强欲更之此固臣愚之所未解京營事例官軍每年正二三五六七八九十一十二月俱支本色四月十月支折色每米一石折銀五錢如是月米價騰貴臨時仍題給本色内正二七十二月赴通倉支粮餘月俱京倉惟選鋒俱係京倉支領亦無折色各逃故應扣者每月各該營造册投倉塲轉行下粮㕔查扣軍選冬衣布花每年每軍選各給綿布二疋綿花一斤八兩寳鈔二十五張軍係各該衞造領選鋒係各該營造領如内庫布疋不足臨期題給折色每布一疋折銀二錢五分外衞官軍口粮本折每班山東河南中都上班官軍以到京報名日為始除各該省解到各軍大粮銀聽候兵部委官給散外其口粮每官軍每月造支四斗雙月折色單月本色官軍防秋口粮車戰及標兵營官軍秋操每月各造支口粮三斗城守營各一斗三升備兵營無火器選鋒口粮萬歴二十七年該王世揚條議戰兵十枝每枝六司七司係火器選鋒春操每官軍每月造支口粮一斗秋操各造支一斗五升各該營把總春秋二操各該營動支犒賞銀各一兩充賞單粮選鋒器械銀兩萬歴二十年該京營科道郭士吉等條議三大營單粮選鋒春秋二季每季移文兵部劄行太僕寺每名給銀三錢修整弓矢馬匹草料本折每馬一匹每月係大盡支草三十束料九斗小盡支草二十九束料八斗七升四季每草三十束俱折銀二錢二分每料豆一石春冬折銀四錢夏秋折銀三錢六分惟二月十月係支本色月分每草三十束折銀四錢料豆一石折銀四錢六分城外信地都城南有重城事勢稍緩不必設營外東自東便門起迤邐而西至西便門止即以車兵十枝酌量分布大率東北二面為急用八枝西面稍緩用二枝每枝實營盤一處虛營盤二處去城不逺不過二三里其戰兵六枝即於城之東西南北闗廂外各副將一員率領各屯一枝聽兵部總協斟量專備城内外調遣應援餘下二枝俱随兵部總協同駐適中去處面相計議後又増戰兵十枝又於萬厯二十年添設標兵二枝專随總協乘城信地都城正陽崇文宣武三門外有重城每門止用軍二百名各委號頭官一員督率把總官管領其餘六門并重城七門每門官軍五百名與同各該守門官軍相兼把守一都城敵臺一百二座每座軍十名垜口一萬一千四百處每口軍一名一重城敵臺五十七座每座軍五名垜口九千三百五十九處每口軍一名臨期並内城信地如有事故俱聽兵部總協於班軍内照數撥用每門将官一員督率千把總管領充補單粮選鋒凡單粮選鋒或事故或選補雙粮其缺各該營徑将精壯善射弓箭手取補收補祖募軍丁凡三大營軍缺如係逃故祖軍本戸弟男子姪赴兵部告替騐發營操戸内無丁方行原籍清勾如係見操年老病疾或久猾逃故召募軍役近例赴總協軍門陳告發營行查每逢雙月類送過騐仍送科道衙門騐准該科道衙門㑹同戸兵衙門覆騐給票收粮原額馬匹凡三大營馬匹共二萬一千二百五十匹標兵二枝每枝馬七百五十匹二司至十二司每司馬四十一匹惟頭司四司七司十司各四十三匹選鋒馬二百五十匹戰兵十枝每枝馬一千二百五十匹頭司至四司每司馬八十四匹五司至十二司每司馬八十三匹選鋒馬各二百五十匹内惟神樞二營選鋒馬三百匹因先年薊鎮秋防以故較之别營選鋒馬多兌五十匹辨騐馬匹五軍營並標兵二營每年新闗領馬匹太僕寺于本馬右胯上印烙一五字到營仍将兩耳尖割去為記神樞馬匹左胯上印烙區字到營仍割去左耳尖為記神機營馬匹右胯上印烙一八字到營仍割去右耳尖為記每年終三大營馬匹該太僕寺㑹同廵視科道并車駕司通行印烙一次内有瘦損及倒死數多照例叅罰各經管官員甚不堪者變賣倒死馬匹追樁年限事例一年以上都指揮七兩指揮六兩千百戸五兩軍四兩二十七年該太僕寺少卿陳應芳條議倒死馬軍半年已上加追六錢半年以下加追三錢指揮千百戸仍舊二年以上都指揮四兩五年以上都指揮三兩十年以上都指揮二兩五錢以下者俱各遞减五錢十五年以上俱免追樁銀走失者被盗者賠補凡領馬一年以上倒死者例仍解究其餘免責題准分操三大營官軍先年俱在五軍營操練萬歴二十年該郭士吉等題准分三營操練至于合操仍歸五軍營凡車兵輪演日期亦赴五軍營以軍就車耳盔甲凡三大營盔甲題准俱三年一次交厰兌換若選鋒眀盔甲每年一次送修五百頂副安置軍器有局凡三大營官軍選鋒除弓矢各随帶外其一應軍火器具俱安置于安定徳勝門裡二處京營局房内遇該操日赴局領用操畢仍交此局各營派撥軍人看守造辦鉛子火藥凡京營火器所用鉛子火藥係工部王恭厰等預造以備京營領用每年二季開操各營具册前赴總督衙門用印投厰每五日三大營共領火藥三千餘斤中鉛子三千餘個小鉛子三萬餘個如遇風雨等項傳免操演則餘剰火藥鉛子具冊仍鈐印下次該操我領應用中鉛子每個重一兩二錢小鉛子每個重三錢五分各項閱射脩置箭把丈尺逺近凡三年大閱每年小閱馬箭例設三把每把逺離四十歩武舉塲同其大小閲歩把俱髙一丈五尺濶七尺五寸下濶八尺以八十歩為則其三年考試武舉官生每年選射材官并春秋二季操軍選補雙粮選鋒歩把俱髙九尺上濶四尺五寸下濶五尺若四衙門進營調閱官軍選鋒歩把則髙一丈三尺五寸上濶六尺五寸下濶七尺内臣内臣舊有監鎗名色嘉靖中盡革至天啓中又復竟名提督崇禎三年革至五年又復崇禎二年十二月以司禮監太監沈良佐内官監太監吕直提督九門及皇城門司禮太監李鳯翔總督忠勇營提督京營五年七月以司禮監太監曹化淳提督京營戎政七年十二月以乾清宫太監馬雲程提督京營戎政撤南京守備太監胡承詔張應朝以司禮太監梁洪㤗内官太監張應乾協同守備十年正月以御馬太監李名臣提督京城廵捕王之俊副之司禮太監曹化淳提督東厰十一年以司禮太監曹化淳杜勲等提督京營孫茂林分守薊鎮中西三協鄭良輔總理京城廵捕十四年九月改東厰提督京營者亦稱總督十五年正月罷提督京營内臣從閣臣周延儒之言也是年十月誅司禮太監劉元斌初元斌監軍河南羣盗在陜雒元斌留歸徳不敢進縱諸軍大掠殺樵汲者論功及論辟未得㫖即奏辨上怒并誅太監王裕民十六年閣臣周延儒逮至京賜自盡復以内臣王之俊提督捕營諭内閣捕營向来所重在捕今必練得其法而捕在其中是首重在練亟擬勅來行時京營既有督察捕營又有練捕京城兵柄盡在内操閣臣不敢爭也八月以司禮太監王承㤙督察京營戎政韓贊周守備南京十七年三月李自成䧟宣府太監杜勲同總兵王承𦙍降之随入居庸闗守闗太監杜之秩亦降京師戒嚴上遣司禮監太監王承恩提督京城又召前太監曹化淳等分守諸門及賊薄京城杜勲呼諸監縋之而上科臣孫承澤請撤城守内臣兵部奏縋賊上城不省門開城䧟王承恩殉難死附記崇禎十六年八月初九日上諭兵部京營居重馭輕事權甚重見今從新整頓訓練亟宜得人襄城伯李國楨著縂督京營戎政寫勅與他恭順侯吳惟英着後軍都督府掌府事宣城伯衞時春着暫解任學習候用國禎少年紈袴數上書言兵又自請于京營外選練衞所官舎上甚喜即與敕行之及議餉俸嵗費二十餘萬又請内庫兵仗銃藥甚多而乞上御書營額因取勅内共武二字以請上為親書共武堂賜之未幾吳恭順罷特以國楨代之官舎皆併入京營時已設有内臣察理兵權盡在掌握更以少不更事之人一旦易將于是兵制大壞城䧟協理戎政侍郎王家彦死之國楨棄城而逃賊追而殺之春眀夢餘錄卷三十一
