body:
  text: 春眀夢餘録卷六十三吏部左侍郎孫承澤撰錦衣衛錦衣衛在通政司南本儀鑾司初設拱衛司領校尉𨽻都督府洪武二年定為親軍都尉府統中左右前後五衛軍士而儀鑾司𨽻焉十五年罷府及司置錦衣衛統軍與諸衛同所屬有南北鎮撫司十四所𨽻又有將軍力士校尉人等其職掌直駕侍衛巡察捕緝等事恩功寄祿無常員恆以都指揮都督統之永樂定都後照例開設雖職事仍舊而任遇漸加視諸衛獨重焉錦衣衛與在京諸衛即唐人十六衛之遺制凡諸衛親軍皆以番直宿衛執戈戟嚴巡警監門禁而錦衣所掌者乃鹵簿儀仗之事旗手所司者乃旗纛金鼓之物諸衛皆統軍卒而錦衣獨領校尉力士即周之虎賁旅賁也諸軍皆世卒而府軍獨簽幼軍即漢之六郡良家子也諸衛正倅一惟其世獨錦衣之任則不必世而以能蓋御座則夾陛而立御輦則扶轅以行出警而入蹕承旨而傳宣皆在所司而詔獄所寄則又重矣又按錦衣衛本國初儀鑾司後定為親軍都督府而司𨽻焉十五年罷府及司置錦衣親軍指揮使司鎮撫司理衛中刑名如列衛而兼簡軍匠所謂南鎮撫司也北鎮撫司本添設専理詔獄成化十四年始給印分司得直達上下法司覆提領衛事者恆以都指揮都督或恩功或寄祿掌侍衛之事凡將軍力士校尉分番護駕直宿巡察凡大朝常駕出入督設鹵簿儀仗凡皇城四門日夜番直巡察之凡盜賊姦宄街塗溝渠密緝而時省之凡奉旨鞫獄録囚事與三司從事凡比試監焉錦衣典親軍其後寄以詗察之柄體勢日重然本非尊官也故雖紀綱門達逯杲之寵寄橫肆然綱達不過都指揮僉事杲僅指揮同知而已袁彬自都指揮出僉都府方晉橫玉正德初指揮髙得材緣從父鳳柄司禮傳升右都督終以非例於五府帶俸錢寧繼踵此官雖貴盛之極而意猶歉之請以都指揮理事下兵部議曲為諛解遂成不疑沿流至於朱陸極矣今考太保兼少傅者一人陸炳太保兼太子太傅一人朱希孝太子太傅一人劉守有左都督一人錢寧右都督一人陳寅都督同知一人余廕已上皆掌衛督行事官校者也右都督一人錢安都督同知三人袁天章孫鈺楊俊卿已上同掌衛督捕者也其他恩廕管事左右都督如麥祥髙恕黃浦之類不可勝紀矣天順成化及𢎞治初年錦衣指揮門達袁斌朱驥等提督緝捕每至十年或十一二年方一類奏下兵部定議升者不過五七人多止十人賞或以布絹鈔錠無功者撻而斥之已而有拿獲妖言升襲一輩之例於是人競貪功肆行羅織嘉靖初命兵科給事夏言御史鄭本公兵部主事汪文盛查核冒濫武職言等上言太祖開天啓運一時翊元臣封公者只六人封侯伯者二十八人文皇帝靖難封拜亦不過十餘人慎重名器如此其錦衣一衛額設指揮使一同知二僉事三鎮撫一所千百户各有定員自正統後貴妃尚主公侯中貴子弟多寄祿衛中遞進用事至正德間奄宦擅權貴幸子弟以奏帶冒銜錦衣者尤多大抵奏帶之數太濫紀驗之次失實武選之法盡壞往往安居長安寄名邉徼今查應革者二千一百九十九員名歲省度支十萬計本兵彭澤覆奏從之然裁革未幾濫授如故至隆慶四年復汰冒濫官旗一千一百十五人然邉功之冒報內侍之傳奉勳戚之陳乞相襲以為故事至以寄廕錦衣加銜五府者尤比比此眀政之一蠧也隆慶中刑科給事中舒化疏朝廷設立厰衛原以捕盜防姦細非以察百官也駕馭百官乃天子之權而奏劾諸司責在臺諫朝廷自有公論今以暗訪之權歸諸厰衛萬一人非正直事出寃誣是非顛倒殃及善良陛下何由知之且朝廷既慿厰衛厰衛必委之番役此輩貪殘何所不至人心憂危衆目睚眥非盛世所宜有也上命付司知之崇禎四年五月給事中許國榮論厰衛疏臣以厰衛緝事舊制所載為臣姦大逆偶一行之至變而為事件則失立法本意而近於告密告密非盛世風也臣請先言其理而徐及其事皇上或以為事件設而天下無遁情臣竊謂天下從此政多隱情皇上或以祕訪所致得於獨聞不知若輩正借此為招搖之榜樣納賄之便門其受皇上重託而冀其不欺者止掌厰掌衛之臣耳勢不得不轉寄耳目於夥長旗番此輩復展轉旁寄豈盡忠肝義膽見利不搖者乎其初亦效小忠小信採幾實事以取信皇上因而密窺意旨巧示靈驗以震讋通國遂畏之如虎况止有厰衛緝事之人而無緝事厰衛之人彼能顛倒人之是非而人不敢操其是非何憚而不恣其所欲為或準賄之有無以繪人之妍媸或因賄之多寡以裝事之輕重皇上之威靈隂為所竊而不覺此臣泛言流弊必至之理也然今日肆毒無忌者不盡在真厰衛而在假充厰衛之人蓋以厰衛二字為破膽之霹靂而姦棍惡少遂假為嚇詐裝頭敢就所聞錯陳其概如紬商劉文斗行貨到亰姦棍趙瞎子等口稱厰衛揑指漏稅密擒于崇文門東小橋廟內因搜其底帳載有鋪户羅紹所李思懷等十餘家并行拿拷共詐銀二千餘兩矣長子縣教官推升縣令忽有數棍擁入其寓內口稱厰衛指為營幹得來詐銀五百兩矣菜市口魚行酒館遵禁罷肆忽有姦棍劉科等口稱厰衛排其户指有宿醖魚腥各詐錢數十貫矣山西解官買辦黑鉛照數交足衆棍窺有餘剩在潞紬鋪內口稱厰衛指尅官物捉拿王鋪等四家各詐銀千餘兩矣蘇州顧監生挾數百金為加納資衆棍窺其愚稚可啖口稱厰衛拿人罄劫其資一鬨散矣醫士楊四置買紗絹衆棍疑有積蓄口稱厰衛因告行提鎖禁碾兒胡同席捲其槖而後釋放矣此猶肆詐於城市者也風聞薊門孔道假偵邉庭往來如織如玉田馬户項福等先經有四棍假稱厰衛索騎於前未幾而踵至索騎者復有多人一日之內兩被驛騷窮詰之始知贋鼎則其假詐邉方未經敗露者不知幾何人矣凡此特千百中之一二也至於散在各衙門者藉口密探故露蹤迹紀言紀事筆底可操禍福書吏畏其播弄風波不得不醵金隂餌之遂相沿為例而莫可問矣總之真厰衛之壞事厰衛之臣得而懲之唯疑真疑假觸處設阱被害者吞聲飲恨而舉朝又畏言發禍隨姑俟其自敗臣拚死為皇上陳其大略伏乞敕下該衙門益加嚴毖此後敢有假冒務置諸法即有萬不容已之役亦須慎擇而使存緝事之舊制去事件之苛條俾小民安於里商賈安於市於皇上平眀未必無小補矣洪武二十年正月焚錦衣衛刑具先是天下官民有犯者俱命屬法司其有重罪逮至亰者或令收繫錦衣衛審實情詞用事者因以非法凌虐上聞之怒命焚之崇禎十一年六月諭提督東司房吳孟眀今年火星逆度兩次為災猛烈慘酷深可驚悼夫刑罰所以誅不仁緝訪惟欲得真事茍或悮加善良飾虛為實大犯命官之戒必干天地之和近來人情作姦者固多仇詐者亦不少今後凡有首報事件旗番止許拘人或爾親審叮嚀刑官虛公查質真者據實參處誣者即時開釋仍將首報之人反坐示戒不許徑自拿人私行拷打彼卑官小卒以衙門為活計惟知嗜利鮮有良心是以有錢者賣放無錢者方來呈稟所以真者已不勝其狼狽若誣者即使放去亦人傷財盡矣甚至張冠李戴增少為多或久禁暗處或苦打屈服砌成可惡情狀令人一見輒怒此時全慿爾心腹大臣以清嚴作標虛公為準固不可避怨縱姦決不可疏忽偏聽若事果偶誤縱獄成本上仍應撿舉改正若别衙門偶有平反亦虛心聽之舊例事多平反原問衙門無罪不必堅持初入之言偏執已見到底護短遂非輕視人命非惟有負任使抑且自損隂功然亦不許因此推諉滋曠溺職戒之戒之特諭按錦衣衛堂上官每駕出則戎裝帶繡春刀扈從繡春刀極小然非上賜則不敢佩也其校尉皆衣濟遜其名仍元舊也元史云國師法王至假法駕半仗以為前導詔省府臺院官以及百司庶府兼服銀鼠濟遜此元人禮服後乃為下役之服緝事番役在唐稱為不良人有不良帥主之即漢之大誰何也立名甚竒春眀夢餘録卷六十三
