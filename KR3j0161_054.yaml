body:
  text: 春明夢餘録卷五十四吏部左侍郎孫承澤撰國子監國子監在城東北即元之舊學洪武改為北平郡學永樂仍為國子學又改為國子監正堂七間曰彜倫堂元之崇文閣也中一間列聖幸學俱設座於此上懸敕諭五通東一間祭酒公座面南司業座面西堂前為露臺臺南中為甬路前至太學門長四十三丈聖駕臨幸由之東西為墀諸生列班於此後堂三間東講堂三間西講堂三間藥房三間折而東為繩愆廳三間鼓房一間率性堂誠心堂崇志堂各十一間西為博士廳三間鐘房一間修道堂正義堂廣業堂悉如率性堂六堂乃諸生肄業之所東折而南為廊房九間門一間西亦如之太學門三間門東敕諭碑一通洪武十五年申明學制一通洪武三年定學規碑一通洪武初年欽定永樂三年申明學規碑一通洪武十六年并三十年欽定廟學圖碑一通廟學規制地界四至丈尺盡勒焉正統十二年十一月初四日立外東井亭一又東為持敬門以入廟自中少北為儲才門以通啓聖祠土地祠及典簿典籍掌饌廳倉庫之路祭酒東廂亦由此入西井亭一又西為退省號門自西少北為廣居門以為司業入廂及諸生入號之路墀內雜植槐柏共二十株前為集賢門三間門前為通衢東西牌坊各一題曰國子監監衢東西牌坊各一題曰成賢街彜倫堂後齋眀所九間格致誠正號每號計三十七間嘉靖七年作敬一堂御製聖諭共碑七座前為大門題曰敬一之門祭酒廂房在亭東司業廂房在亭西會饌堂一所在監東北土地祠五間在饌堂門之右典籍廳五間在饌堂門之左典簿廳三間掌饌廳五間退省號及廣居門之西為天地人智仁勇文行忠信規矩準繩紀綱法度凡一十八號并退省房三連混堂淨房各一所設官職事祭酒掌國學舉人貢生官生恩生功生例生譯生幼勳臣教訓之事司業為之二修古樂正成均之政令造以明體適用之學以孝弟禮義忠信亷恥為之本以六經諸史為業以升堂積分及格敘用之法而勵翼之不率者撲之不悛徙謫之以廪饌膳師生以力役給厨膳以賜豫示恩賚以寧假悉人情以撥歷練吏事以考選汰冗濫歲中春秋上丁日祀先師則總其禮儀上謁先師幸太學祭酒司業執經進講有講章其屬有監丞坐繩愆廳參領監事諸師生怠教不率教及膳廪不潔並紏懲書識之而堅明其約束博士坐博士廳分經訓授助教學正學録坐正義崇志廣業修道誠心率性六堂專教誨嚴程課講説經義導納之規矩典簿典出納文移受支金錢為師生饌季報諸生課業倣書以聽於翰林歲杪奏上典籍掌經史子集及制書掌饌掌飲食於是禮部翰林詹事春坊司經局若國子監官遞相流通而遷補因之獨華重矣治天下之大法曰學校農桑而學校尤其本也教化出焉天下未有不教不化而能治者也其制莫詳於周略約言之制於虞曰上庠於夏曰東序於殷曰右學養國老在焉於虞曰下庠於夏曰西序於殷曰左學養庶老在焉皆太學也周人修而兼用之虞學曰米廪以養庶老冬讀書在焉夏學曰東膠以養國老春夏學干戈秋冬學羽籥在焉殷學曰瞽宗以祭樂祖春誦夏絃秋學禮在焉皆太學而統之曰辟雍辟明雍和言學也者所以明和天下也又水環澤宫之丘如璧然曰璧雍亦曰成均以成其德性均調其過不及而名也膠言在郊必於郊於澤中之邱欲耳目不雜安其處而無異慮也故亦曰澤宫王擇侯國所貢士與大射其中簡焉國大事出征執訊受脹獻馘在焉其侯國命立學亦於澤而頗損其制環水如半璧曰泮宫故瞽宗東膠辟雍成均其實一也皆天子設太學以教於國者也古聖王之所甚重也故人生十年曰幼學於家學於家者就外傅而學之孰也學書計學幼儀學樂誦詩舞勺成童舞象學射御是也二十曰弱冠簡其秀而學於鄉學於鄉者學於庠序校也始學禮舞大夏惇行孝弟博學不教內而不出其學也三十壯有室大司徒簡其秀而學於國大樂正造焉小樂正大胥小胥贊焉朋友移焉四術四教春秋禮樂冬夏詩書其學也蓋九年而博學無方知明強立矣而後可以材諸位於是乎大樂正簡而進之王升諸司馬故四十曰強而仕而論官辨材始此也尚書大傳曰公卿之太子大夫元士之適子十有三年始入小學見小節焉踐小義焉二十入大學見大節焉踐大義焉故入小學知父子之道長幼之節入大學知君臣之義上下之位故為君則君為臣則臣為父則父為子則子董仲舒曰王者正南面而治天下莫不以教化為大務立大學以教於國設庠序以化於邑故養士莫大乎大學大學賢士所關也教化之本原也今以一郡一國對亡應書者是王道往往而絶也願陛下興大學置明師以養天下之士數考問以盡其材則英俊宜可得矣附元人吳澄國學碑記國朝以神武定天下我世祖皇帝以武之不可偏尚也廣延四方耆碩之彥與共謀議遂能裨贊皇猷修舉百度文治浸浸興焉中統間命儒臣教胄子至元間備監學官成宗皇帝光紹祖烈相臣哈喇哈遜欽承上意作孔子廟於京師御史臺言胄子之教寄寓官舍隘陋非宜奏請孔廟之西營建國子監學以御史府所貯公帑充其費逮至仁宗皇帝文治日隆僉謂監學櫝藏經書宜得重屋以庋有旨復令臺臣辦集其事乃於監學之北搆架書閣閣四阿簷三重度以工師之引其崇四常有一尺南北之深六尋有奇東西之廣倍差其深延祐四年夏經始六年冬績成材木瓦甓諸物之直工役飲食之費一皆出御史府雄偉壯麗煥然增監學之輝名其閣曰崇文英宗皇帝講行典禮賁飾太平文治極盛矣臺臣請勒石崇文閣下用紀告成之歲月制命詞臣撰文臣澄次當執筆今上皇帝丕纂聖緒動遵世祖成憲於崇儒重道惓惓也泰定九年春誕降俞旨國子監立碑如臺臣所奏臣澄謹録所撰之文以進臣聞若古有訓戡定禍亂曰武經緯天地曰文武之與文各適所用然戡定禍亂用於一時而已經緯天地則亘古今不可無也何也日月星辰天之文也山川草木地之文也人與天地相為經緯則亦與天地相為長久而可一日無也哉我世祖匆匆用武日不暇給而汲汲崇文惟恐或後此其髙識深慮度越百王宏規逺範垂示萬世以為聖子神孫法程夫豈常人所能測知蓋創業之初非武無以弭亂守成之後非文無以致治武猶毒藥之治病病除即止文猶五穀之養生無時可棄也有文治之君必有文治之臣文治之臣茍非教習之有其素彼亦惘然孰知文之所以為文者故建學以興文教暢文風㴠育其人將與人主共治也斯文也小而修身齊家大而治國平天下言動之儀倫紀之敘事物理義之則禮樂刑政之具凡燦然相接煥然可述皆文也古聖賢用世之文載在方册不考古人之所以用世不知今日之所以為世用者也然則聖朝之崇文豈虛為是名也哉閣之所庋古聖賢之文也立之師使之以是而教設弟子員使之以是而學教之而成學之而能則遊居監學者濟濟然彬彬然人人間於言動之儀察於倫紀之敘博通乎事物理義之則詳究乎禮樂刑政之具他日輔翼吾君躋一世文治於堯舜三代之盛由此其選也夫如是其可謂不負聖天子崇文之明命休德已若夫不能濳心方策真有得於古聖賢之所謂文而涉獵乎淺末炫耀乎葩華曾是以為文乎上之所以為世用者蓋不在是臣澄再拜稽首而獻頌曰皇元肇興於赫厥聲天戈所指如雷如霆聖聖繼承六合混一威命逺加丕冒出日神謀英略敷遺後人征誅以義持守以仁既成武功大闡文治遵道隆儒勸學講藝京師首善教胄設官孔廟巍巍四方來觀執法之臣職務紏慝爰矢嘉謨稱我文德於廟之西黌舍翬飛於黌之北傑閣雲齊其閣伊何有經有史廣采旁羅有集有子昔在中古郁郁乎文式克至今用宏兹賁詵詵多士被服聖術鳳翥鸞翔虎炳豹蔚維身之章維國之光匡扶盛化上躋虞唐民物阜蕃禮樂明備允顯崇文昌運萬世國子師明興之初未即正位即建國子監興學以元國子生梁貞為太子賔客兼祭酒掌監事倣周制以六德六藝訓迪務底於成有異才出類者即奏聞擢用之初國學既建諸博士皆就職胄子在內府者令布衣髙啓謝徽教之至是諸生方序立右順門內貞傳旨下敕諸生出受業太學既而以學制未廣諭中書省曰太學育賢之地所以興禮樂明教化賢人君子所自出古帝王建國以此為重今太學雖建齋舍卑隘不足以居其令工部增益學舍必髙明軒敞俾講習有所遊息有地庶達材成德者有可望焉廟成上幸學行釋菜禮初禮部奏增國子生上曰揚雄言務學不如求師師得其人則材盛不得其人廣生徒何益今民間俊秀可充選者甚衆而祭酒乏人卿等其為朕詢采天下通今博古才德兼備足為人師者以名聞於是起致仕尚書侍郎及四輔官驛召至皆手敕署祭酒司業官十四年以文淵學士宋訥為祭酒敕諭之曰太學天下賢士所關禮義之所自出也自建學而來歷選師儒以居迄今未臻其效豈士習之難變與抑師道之不立莫為變與此朕所夙夜究心者也卿宿學耆德兹特命為祭酒尚體朕志使諸生有成士習丕變庶國家有賴焉時初設學學徒衆師生相訐教尼不行上令曹國公李文忠以勳臣親重領監事助繩糾訥性嚴重不妄言笑以矩矱自撿撫士恩義並至恆寢食堂廂房不休沐私第諄切訓詔不遺餘力而上時時召與問對亦時時至太學臨觀一日上召問卿昨午默坐廂房色頗厲何也訥頓首言臣荷皇上恩厚念欲為國家效犬馬竭力造士昨生徒有造次步傾跌失容者皆臣不能教迪所致故靜自刻責上嘉歎訥頓首曰主臣犬馬臣動息聖明何從知上曰朕欲時見卿念學事煩不欲為數數故遣畫工圖卿像以來因出像示訥訥感泣頓首謝訥滑縣人舉元進士知鹽山縣徵為助教升學士內閣轉祭酒能躬修教率規繩整肅故其時國學人才卓有可觀永樂三年諭禮部申明國學洪武舊規俾師教無闕士學有成庶幾國家得賢才之用時以內閣胡儼為祭酒儼南昌人以舉人授華亭教諭薦知桐城入為檢討入閣以其學行堪為師表出為祭酒率以身教士心翕然嚮慕上北征以祭酒掌翰林院事太子賔客致仕自處淡薄衣食僅足方嶽重臣俱待以師禮宣德後以師道著者北為李忠文時勉南為陳祭酒敬宗於是有南陳北李之稱時勉崇亷耻抑奔競别賢否為勸懲士習丕變諸生數千人開導訓誨語經義必窮旨趣俾渙然領解諸生有貧不能婚病不能醫死不能喪者節縮餐錢為賑給仁義之風行矣督諸生學甚劬旦五鼓令起誦讀夜漏定二鼓方敢寢時濳行省其勤惰一時人士皆感奮興起共誦稱之曰天地之量父母之心太師英國公輔偕侯伯二十餘人請告詣國子監聽講既至時勉令諸生各講五經一章講罷燕飲酒諸侯伯咸讓坐惟英國公以耆年與祭酒抗禮餘皆列坐諸生雅歌投壺如古儀逮暮乃散蓋其風也敬宗力以師道自任嚴條教革舊習勵諸生於進學成德瞽宗之政肅於朝廷僚屬挾忿私有詆誣周文襄為草疏申理辭少骫敬宗曰不可被誣事小欺君事大持不上而事亦竟白時大閹振權重震天下時勉特與抗禮振生日諸大臣皆往賀又獨否振恚遣人日亷迹其過莫得也彜倫堂故有大樹時勉嫌其一面隂翳頗妨諸生班稍伐其傍枝振以為擅伐官樹供私㸑遂矯旨與司業趙琬掌饌金鑑俱逮方逮時時勉方坐東廂考業錦衣官校猝至掩卷起免冠受桎梏諸監生皆眙愕失次時勉神色自若呼諸生前徐語曰某人某處講是某處非是某勝某縷縷如平時因顧囑僚屬令終事乃行已矯旨荷校國子前校重百斤時勉尫老不任校憊甚諸生司馬詢等百千人伏闕請寬宥有石大用者獨奮請以身代會事聞皇太后乃得解尋致仕去而敬宗考績至都下不詣振振以禮幣求書程子四針走筆書而歸其禮幣竟不往故官太學者二十餘年竟不調敬宗意豁如也蓋一時風尚肅正者如此𢎞治中詔起侍講謝鐸為北祭酒僉事章懋南祭酒皆宿儒懋以父喪力辭特旨為增置司業一人署監事以待以編修羅欽順為之聽懋終制日赴官時士多放逸有差撥爭先者欽順念以為放心宜收非管攝之嚴不可爭風宜息非精稽考公豫奪鎮之不能持甚力而謗作已乃肅然及懋至與謹矩度尚德化勵亷耻明道術著功令祁寒暑雨具冠服危坐終日以聽事諸生翕然日執經質疑問業人人自以為得師也鐸先後祭酒兩雍律已率人皆嚴立規約監故有羡金為祭酒費鐸盡籍於官均贍僚屬搆東西樓刻經史列其上北監廟街湫隘益市地闢其斜側又市廬舍三十餘區居博士助教諸學官諸生貧者贍給死者賻襚皆羡金不自私一錢師道立則善人多國子祭酒司業非他官比也昔皆以德望素著者為之如宋訥以文淵大學士胡儼以內閣侍讀李敬以致仕刑部尚書陶凱以禮部尚書出為湖廣參政致仕召為祭酒尋復以參政致仕何鐸以禮部侍郎掌國子祭酒樂韶鳳以兵部尚書改侍讀學士拜國子司業升祭酒劉嵩以致仕吏部尚書為司業𢎞治正德中蔡清王鴻儒俱以致仕提學起拜王雲鳳以提學內轉嘉靖中殷邁屠羲英成憲以太常卿轉周怡以給事中建言謫隆慶初起山東海道遷國子司業不拘資品惟主得人故成賢之地於斯為盛即博士學正亦必簡宿學碩望者以充其後往往補館職列坊局已乃置內臺此真足為王者之取法也洪武中上以公侯子弟在太學者多驕慢不習訓詔曹國公李文忠提督國子監是以國公而理太學事也二十九年因學正吳啓言上命魏國公徐輝祖率禮部翰林院官詣監考試諸生等第吏部以次録用是以國公而試太學士也洪武中起致仕刑部尚書李敬為國子祭酒致仕試吏部尚書劉嵩為司業是以尚書而起太學官也其時太學之重如此附元人以許教官衡改授國子祭酒詔懿德素全經學洞貫視聽言動皆合禮宜進退周旋舉皆中道所在滿禦冦之屨疇非趨董子之帷宜處成均以全樂育可特授其官務講明於聖道為矜式於國人元人初立國學即得一代大儒而為之師詞臣王惲嘗云至元七年命許衡為祭酒選朝中貴近子弟令教授之不滿五歲其諸生俱能通經達禮彬彬然為文學之士及其入仕皆明敏疏通果於從政其成效彰彰如是真開國之盛事也元能有國百年豈偶然哉監規洪武十六年定監生三等髙下凡通四書未通經者居正義崇志廣業堂一年半之上文理條暢者升修道誠心堂一年半之上經史兼通文理俱優者升率性堂升率性者方許積分積分之法孟月試本經義仲月試論及內科詔誥表一章季月試史策及判語二每試文理俱優與一分理優文省者與半分文理紕繆者無分歲內積至八分者為及格與出身不及分者仍坐堂肄業有輪差於內外諸司俾其習於政事半年回學晝則趨事於各司夕則歸宿於齋舍優遊之以歲月琢磨之以義理約束之以規法廪食學校則俾其習經史歷事各司則俾其習政法遇大比科許其就試其為教法可為本末兼舉矣積分之法始於宋備於元按元延祐初齊履謙在國學行積分之法每季考其學行以次遞升既升上齋踰再歲始為私試詞理俱優者為一分詞平理優者為半分歲終積至八分為髙第禮部集賢歲選六人以貢此即宋人積分之法而節目稍有不同至明一依其制禮書李時曰國初監生俱由廣業堂肄業積漸升率性堂始得積分故天順以前監生必作養十餘年然後撥歷後積滯人多節將撥歷歲量減至𢎞治八年國子監有坐班人少不敷撥歷之請本部尚書倪嶽題稱權宜救弊之法有二增貢額以足坐班生徒議差歷以久坐班歲月擬將府學歲二貢州學二歲三貢縣學歲一貢行四歲而止其各衙門歷事三月考勤之後仍歷一年其餘寫本一年清黃寫誥清軍清匠三年以至出巡等項俱如舊例日月為滿今國學缺人視𢎞治時為甚所有前項事例似應參酌舉行得旨在監坐班人少皆因近來將歷事日月減少而雜歷長差等項增多既天順年間十年以上方得撥歷今乃未及一年已夤緣撥出大壞祖宗教養之法吏部查各衙門歷事舊額人數明白開奏著為定例不許仍前濫撥及今出限寫本無名差用各項歷事月日俱照倪嶽題準事例滿日方許更替凡歷事及出巡奏內既該監生監生僉名一應事務許其公平議論舉察所司姦弊以稱祖宗設立歷事深意以後考選歲貢入監務遵舊規由廣業堂漸升率性堂然後積分出身果有才學超越奏聞擢用貢額不必增恐致異日選法壅滯其監生給假者趣復班禮部題教世胄疏該兵部咨該本部題國子監司業兼司經局較書王同祖奏內開一曰教世胄臣請自今公侯伯子弟年十八以上者該部具名上請送監讀書習禮本監仍每名選撥友伴監生二名與之講學相資薰陶規勸每五日一赴監候諸生立班定友伴引至階下恭揖而退侍立兩傍以觀揖讓周旋之節候堂儀畢赴廂授書講習其有不率教者憑本監堂上官奏聞區處三年之後學有成效者本監奏聞該部注記候異時襲封之後有所委任據以甄别賢否等因奉聖旨該部知道該本部查照節年事例議擬覆題勳臣之家子孫得以承襲爵祿或遇蒙任使管理軍務責任匪輕書曰若生子罔不在厥初生言立教之不可不早也況公侯伯子弟出自膏粱素養富貴易生驕惰茍非預養而善教之欲望其能不變於習而成其德也難矣我國家慎重典禮凡將官子弟年幼者送監讀書見諸洪武五年成化𢎞治年間節經舉行皇上嘉靖元年又因該部建白申明前例題請凡公侯伯等爵無分已襲未襲已任未任年三十以下十四以上通行查出開送本部轉送國子監行祭酒司業將大學論孟諸書相舉點授令其在家講讀仍每十日赴營觀操等因嘉靖八年十二月二十二日題奉聖旨已經通行去後今本官奏要疏名上請送監備諸勸典無非修明禮教至意相應議處合候命下將見在公侯伯等爵及應襲子弟年十四以上三十以下未任者通行查出備具年甲籍貫徑自開送禮部類具姓名上請分送兩京國子監照依嘉靖八年題準教法分撥習禮肄業等因題奉聖旨咨部送司隨準後軍都督府手本開送襄城伯李應臣等前來案呈到部理合疏名上請伏候命下本部將各爵具劄送國子監肄業行令本監堂上官查照嘉靖八年題準事例教習務俾學有成效庶文武兼濟他日可備干城之用而不墜其先世閥閲之風矣祭酒吕柟疏嵗貢入監即古鄉舉里選六德六行六藝之士故禮稱四十強仕道明而德立近年有嵗貢二十上下者其德行焉考甚且禮讓未嫻遇事莫名各提學惟取詞章不顧行檢遂使質朴淪墜乞敕該部轉行提學官當嵗貢期於食廩年深二三名內遵照祖宗卧碑參取德行必注其平日某德某行縱無完人庶幾近實所校文惟取其不悖經傳理明辭達而止不專於富麗有蹈襲六朝人語竒怪難讀者俱從黜落而遐荒鄙邑亦取士以充用昭聖明一視無外之心又舉人在監本以觀光皇極薰陶德性今查在監實數天下之廣僅止二三十人蓋自會試之後支稱他故駿奔原籍有志者固不廢學餘多交際郡邑開治産業侵陵鄉曲比及試期方攢監簿計水程用規撥歷未仕若此居官可知己敕該部稱己未入監告回舉人移文行取違限作曠計月加曠不許會試之條庶士類知警衆向於學矣納銀例貢近奉欽依聽其依親原籍與考科舉此以待志士可矣其無志者一旦還里抗揖守令兼服商賈肆行鄉閭他日入官殃民非淺乞敕該部將依親例貢行各提學官考行業類報其逃監及患病給假三月之外許臣查治重則奏報削其名籍夫士必知古斯可通今儀禮一書乃成周致太平之具世行髙堂隆所傳十七篇宋儒楊復為之圖解皆可習行近臣等選諸士按圖學步自冠射鄉燕至士相見諸儀使士子間於周旋進退之節養其中正和平之氣而此書稀少靡所正據禮樂諸器舊多未完乞敕該部重刋禮儀並造前項禮樂諸器以便諸生遊業準古大雅鼓鐘辟雍周禮樂語之義生徒宋慶歷四年判國子王拱辰言漢太學千八百間生徒三萬唐六千二百間今國子監房二百楹制度狹小不足以容乃改建太學增同舍生二百猶未及漢唐之盛也明制太學號舍與宋相倣當教典方興生徒或至三千後人數蕭蕭非初制矣郭正域云謹按往牒洪武四年詔選府州縣諸生俊秀者入國子監得陳如奎等二千七百八十二人二十六年監生悅慈等八千一百二十四人永樂十九年監生方瑛等九千八百八十四人宣德四年監生程憲等四千八百九十三人正統十四年監生金聰等四千四百二十六人景泰五年監生黃夢麒等五千一百七十九人天順八年監生徐福等五千八百三十三人成化二年監生任蘭等六千二十人正德三年監生洪濡等一千三百二十六人嘉靖十九年監生徐甸等二千一百五十一人及至今日寥寥如此非所以風四方示後世也初建國學令品官子弟及民間俊秀充國子學生於是有官民生之目自一品至七品皆得與敘蔭皆謂官生民生則郡縣中諸生論其秀而歲升之者也洪武三年始設科舉士五年選會試下第年少質美者令入學皆曰民生當是時啓教雖𢎞而任官不易非強學登科則積分將至十餘載而後得歷事授官成化初始詔三品大臣以上子孫許一人送監照監例出身蔭而得舉復得以次子補蔭而自洪武來死王事者之嗣時有特蔭其經筵儲邸講導之臣有稽勞敘蔭邊境大臣以功蔭皆曰恩生邊境豪長以及海外君長梯航相望遣子入學附之官生其勳戚習讀昉自洪武初令公侯伯及武官子弟承襲者入國學肄業是時蓋二百餘人景泰天順間戚畹諸公主子孫聽乞恩入監成化十年令公侯伯駙馬初襲授者送監讀書習禮祭酒依學規教之不率者奏聞今上設禮部主事一員專教駙馬因不復入監明初人才輩出太學為盛朝廷所用內而臺諌外而藩臬率以授太學生之成材者自正統以後此制遂廢嘉靖八年廷議復申祖制三途並用於是以舉人監生孫翥為給事中舉人監生阮徽歲貢監生張澍為監察御史及萬歷初張文忠居正秉政屢申飭而未能行也洪武時國子生殷敏選入武英殿紀事授監察御史蓋其時儲養國學有出使歷事之任又有大本堂讀書武英殿紀事等清要之責故賢才輩多出其中國子生往往有上書諫諍者𢎞治十一年三月監生汪鎔劾大學士劉健李東陽上下鎔詔獄健等疏力救得釋天啓七年十月監生胡煥猷劾大學士黃立極等下法司諸公救不力上意不深罪之也得以贖論四相繼去三相皆極辨而李高陽獨引罪不辨人稱其得體至塗仲吉救黃中允詞氣侃侃廷杖遣戍可稱朝陽鳴鳳矣納粟崇禎五年十二月諭朝廷分職設官原以任賢用能非可别開幸濫其典制所載納粟輸資並與選授止為科目正途之外未盡乏才因以此鼓舞俊秀招徠㥯公立法未嘗不善乃十餘年來軍務煩興羣議足餉計臣屢經條奏事件從此頻開雖俯從士民好義之心少助國家師徒之費然而一時偶屬權宜事久必滋弊蠧吏途紛雜名器混淆有資即可博官才品俱在勿論甚而儼然民牧掊克取償階厲尤為不堪朕方欲慎稽流品撫恤痌瘝而開納不除則源之不清流何能潔兹特諭爾户工二部從今為始將近年新開各項事例盡行停止其以前曾經納過者準與照例序選此後不得再行援納仍將議停欵目開列明白奏請裁定傳示吏部遵守不許朦朧影借致滋銓弊馬文升疏仰惟我皇上法古為治凡庶官用人惟由科目出身進士舉人及歲貢監生得以除授此外雜流者不得並用前時三年大比各布政司設科取士鄉試所取舉人不多會試進士亦為有數其歲貢生員每府一年貢一人州則每三年貢二人縣則每二年貢一人其歲貢生員入監後不數年即取歷事通共不過六七年吏部就為選用在部聽選舉人監生無淹滯久積之患所以年未衰老志亦清明一旦任官知守法度罔敢貪汚逮至天順年間憲臣建議起送天下在學年四十以上生員送監讀書奈各生員夤緣作弊有方三十五六或方三十者亦作四十起送赴京之弊通有五千之上既而陜西邊情緊㥯缺戰馬又許生員納馬入監讀書其納馬之數又有七千餘名以後四川陜西地方荒歉軍民缺食乏糧賑濟守臣具奏又開生員上糧亦許入監通前共有數萬中間多係幼男自來不曾在學讀書既作監生須撥歷事其舉人監生雖年壯氣豪者亦與彼一同挨次取選始終二十餘年方得出身長者老耄壯者衰弱家道貧難未免負債於人授官到任債主相逼因此負人財物豈能展布行事所以官不得人民多受害至今未選納粟監生尚有七千餘名大壞選法壅滯人才率由於此本部雖有奏準不許生員納粟入監事例一遇兵荒府藏空虛未免又要奏開況蠲富民之徭役以重困窮民所損國體甚大不可不嚴為禁止監例洪武中欽定官吏監生會饌之制掌饌預備椅桌器皿於饌堂祭酒南向司業北向監丞博士六堂等官東西向坐諸生分東西班坐其後大約膳夫一人管監生二十五人饌先食則鳴鐸傳唱曰食不語坐必安日以為常十五年命凡監生正妻月支米六斗監生有家人者三月至十月日支米二升二合六勺十一月至二月日支米一升九合二勺監生俱給冬夏衣工部製衣被十三年準監生讀書燈油每人月一斤課倣紙月大盡三十一張小盡三十張造保安堂處監生疾病者病故給殯殮銀行文順天府支給及行兵部起關應付春明夢餘録卷五十四
