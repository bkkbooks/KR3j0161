body:
  text: 春眀夢餘録卷五十七吏部左侍郎孫承澤撰太醫院太醫院在闕東禮部後初置醫學提舉司後改太醫監又改太醫院設院使院判御醫吏目等官主診視攻療調養之事凡醫術十三科醫生世専科習其業曰大方脈曰小方脈曰婦人曰瘡瘍曰針灸曰眼曰口齒曰接骨曰傷寒曰咽喉曰金鏃曰按摩曰咒由後二科今無傳洪武六年四月置御藥奉御一人直長二人藥童十人俱以內官內使充之設太醫院御醫四人以太醫院醫士充之凡收受四方貢獻名藥及儲蓄藥品奉御一人掌之凡貢御藥餌醫官就內局循製太醫院官診視御脈御醫參看較同約會奉御就內局合藥將藥貼連名封記具本開寫本方藥性治症之法於日月之下醫官奉御書名以進置簿歷中書省印其縫凡進藥奏本既具隨即附簿年月下書名奉御收掌以慿稽考烹調御藥太醫官與奉御監視每二服合為一服使煎熟分為二器其一器太醫院先嘗次奉御其一器進御古者史官樂官與夫醫卜之官皆世掌之業不兼官官不二事懼其不精也况夫醫不三世不服其藥執技以事上者惟醫為難精惟疾病為不可不謹是故食醫之下有疾醫調飲食者不兼於治病也疾醫之下有瘍醫察內證者不兼於外證也瘍醫之下有獸醫治禽獸者不兼於治人也所謂食醫者凡人之疾未有不生於飲食之不謹今也飲食膳羞珍醬之齊既以時而視之醎酸甘苦辛之助又以時而和之牛羊犬豕魚鴈之宜又以其物而會之凡所以調和王之飲食而助養王之血氣未嘗不及於愜適疾病何自而生乎是故治之於未然之前也不獨食醫為然膳夫之下如烹人則掌水火凡美惡新舊之不同則必辨之如庖人內饔則掌禽獸凡腥臊羶香之不可食則必辨之茍有一物之傷生害氣者無所不致其察也又不獨烹人庖人內饔為然凡五齊七菹之用醯者則有醢人以掌之凡百事之用鹽者則有鹽人以掌之醯酸鹽醎然後足以成五味之甘而致四時之和氣補五臟之不足故雖瑣瑣末節而必立之官以致膳羞酒醴之物凌人於夏則鑑氷以進以禦暑惡之氣六宫六寢之修宫人於春冬則掌爐炭之共以辟寒濕之氣井匽以流其清泚而泄其汙穢沐浴以澡雪其精神而恱懌其膚體茍有以助王之養而全其內外之和者無所不致其備也又不獨醯人鹽人凌人宫人為然內宰之職以隂禮教六宫以隂禮教九嬪九嬪則以時御敘於王所女御則御敘於王之燕寢茍可以防微而杜漸戕其真而蠱惑其心志者無所不致其嚴也王之所以護養如此而何疾之可致耶大抵味以養精者也藥石以治疾者也養精為本養形次之治疾為下凌人之官日在北陸而藏氷西陸朝覿而出之司爟之官季春出火民咸從之季秋內火民亦如之夫出火而藏氷皆所以助陽而抑隂內火而求氷皆所以助隂而抑陽以是逹隂陽之氣而均寒暑之節是以冬無愆陽夏無伏隂癘疾不作民不夭札天有五星故有五行以為寒暑以為隂陽風雨晦眀分為四時序為五節淫則為災以生寒熱少腹感心之疾人有四肢五臟化為五氣一覺一寐吐納往來流為榮衛章為氣色發為聲音以生喜怒哀樂愛惡欲之情過則有傷夫天之寒暑隂陽風雨晦眀既足以傷形而人之喜怒隂陽運於榮衛之間交通則和有餘不足則病周禮醫師原人血脈經絡骨髓隂陽表裏察天五運並時六氣視人五聲五色九竅九臟之動以探百病之原決死生之分而度針石湯火之所施為之經方本草藥石寒溫之性量疾病淺深度氣感輕重假藥味五苦六辛之滋調水火齊和之宜以通閉解結致五味五穀五藥之養而反之於平至齊之得猶磁石取鐵以物相使拙者失理以熱益熱以寒益寒精氣內傷而見於外以愈為劇以生為死故諺曰有病不治常得中醫宋人王炎運氣説五運六氣之説不見於儒者之六經而見於醫家之素問夫素問乃先秦古書雖未必皆黃帝岐伯之言然秦火以前春秋戰國之際有如和緩秦越人輩雖甚精於醫其察天地隂陽五行之用未能若是精密也則其言雖不盡出於黃帝岐伯其旨亦必有所從受矣且夫寒暑燥濕風火者天之隂陽三隂三陽上奉之木土金水火者地之隂陽生長化收藏下應之而五運行於其間即五行之化氣也天數中於五戊居之地數中於六已居之戊己土也化氣必以五六故甲己化土而居於其首土生金故乙庚次之金生水故丙辛次之水生木故丁壬次之木生火故戊癸次之此化氣之序也地之三隂三陽亦五行爾而火獨有二五行之妙理也蓋木王於東火王於南金王於西水王於北而土王於四維戊附於戌而在乾已附於辰而在巽而未之對衝在丑故辰戌丑未寄王之位也未在西南其卦為坤其時為長夏以其處四時之中呂氏月令謂之中央土此土正王之位也春木生火秋金生水冬水生木而夏火制金生氣絶矣惟土王於西南然後以火生土以土生金四時之序循環不窮然火方王於午土遽王於未則火氣必耗故君火以名其氣溫而未熱相火以位與太隂同處未申之間奉君令以行暑氣於是火不耗於土不屈於金故丙盛則庚伏此火所以獨分君相之位也天氣始於甲地氣始於子子甲相合命曰歲立曰行四周而為一紀天以六為節故氣以六期而為一備地以五為制故運以五歲而為一周運統一嵗於四時之表氣分六位於一嵗之中風雨燥濕寒暑其應有候其至有期然用以占焉往往不效非素問之無驗用其説者知常而不知變故也凡物理有常必有變雖天地之運動往來消息盈虛可以逆其必然者常也若其變則無所不至可知而不可必也嘗試即其常而言之五太之運是為太過其至先時五少之運是為不及其至後時惟平氣則不疾不徐其至以時其大略如此火運上臨少隂水運上臨太陽木運上臨厥隂金運上臨陽眀土運上臨太隂謂之天符木運臨卯火運臨午金運臨酉水運臨子土運臨四維謂之歲會五太與在泉氣同謂之同天符五少與在泉氣同謂之同歲會若是者其氣和土運上見厥隂火運上見太陽謂之天刑運水運上見少陽金運上見厥隂謂之運刑天若是者其氣乖此皆五運之常也主氣各居一步厥隂主初少隂少陽次之太隂陽眀又次之太陽主終六位不遷客氣與歲推移子歲太陽之水為初丑歲厥隂之木為初迭相往來而少陽之為初氣乃在太隂之後半歲以前司天主之半歲以後在泉主之其大略如此若其情則有相得與不相得其位則有順有逆相得者木火相臨火土相臨之類也不相得者金木相臨水火相臨之類也父臨子則順木居少陽之位是已反此則寒水居金位斯逆矣君臨臣則順君火居少陽之位是已反此則相火居君火之位斯逆矣此皆六氣之常也及論其變則有正有邪於是有變有勝有復有鬱有發有淫有承當時而行者正也非時而行者邪也當時而行其過則為變非時而行其至則為勝其救則為復抑而不伸則為鬱鬱而怒起則為發陵其所勝則為淫極而必反則為承假如太角之化為啓拆而變為摧拉太徵之化為暄燠而變為炎烈正化之為變者然也少角木氣不足清勝而熱復少徵火氣不足寒勝而雨復邪化之正復然也寒勝而無陽焰是為火鬱熱甚而無淒清是為金鬱抑而不伸者然也水鬱而發則為氷雹土鬱而發則為飄驟鬱而怒起者然也風淫所勝則克太隂熱淫所勝則克陽眀陵其所勝者也相火之下水氣承之濕土之下風氣承之極則有反者然也然摧拉之變不應普天悉皆大風炎烈之變不應薄海悉皆燔灼清氣之勝不應宇宙無不眀潔雨氣之復不應山澤無不蒸溽鬱也發也淫也承也其理皆然凡此者其應非有候其至非有期是以可知而不可必也其應非有候則有不時而應者矣其至非有期則有卒然而至者矣是故千里之逺其變相似者有之百里之近其變不同者亦有之即其時當其處隨其變而占焉則吉凶可知况素問之所以論天地之氣化者將以觀其變而救民之疾也夫大而天地小而人之一身五行之氣皆在焉天地之氣有常無變則人亦和平而無災天地之氣變而失常則疾癘之所從出也是故木氣勝則肝以實病脾以虛病火氣勝則心以實病肺以虛病此醫者所能致察儒者不得其詳也至於官天地理隂陽順五行使冬無愆陽夏無伏隂春無淒風秋無苦雨和平之氣行於兩間國無水旱之災民無妖孽之疾此儒者所當致察醫家未必能知也素問亦略言之矣五行之精是為五緯與運氣相應有歲星有畏星以此察其行之逆順而占其吉凶然必曰德者福之過者罰之則是運氣之和平而為休祥有德者居之也運氣之乖戾而為災眚有過者致之也雖然其説略而未詳吾儒之經則詳矣洪範九疇始於五行中於皇極終於五福六極聖人建極於上以順五行之用是以天下之民有五福而無六極有五福皆可以康寧矣無六極皆免於疾病此其道固有行乎運氣之外者是謂大順成周之時嘗見之由庚之詩作而隂陽得由其道華黍之詩作而四時不失其和由儀之詩作而萬物各得其宜此建皇極順五行使民有五福而無六極之驗也是故素問方技之書而洪範則聖人經世之大法也知有素問不知有洪範方技之流也知有洪範不知有素問儒者何病焉又本草正經序本草舊三卷藥三百六十有五種梁陶𢎞景附名醫别録亦三百六十有五種分七卷唐顯慶中蘇恭增百十有四種國朝開寶中盧多遜重定增百三十有三種元祐中掌禹錫補注附以新補八十有二種新定十有七種合一千七十有六種分二十有一卷新舊混并經之本文遂晦今托舊輯為三卷序之曰衣有蔽膝樽有元酒樂有土鼓葦籥存古也存古者何不忘其初也世莫古於上古人莫聖於三皇伏羲有易神農有本草黃帝有素問等書醫在後世據方投治則聖人濟天下之仁術也古書竹簡火於秦易以卜筮存本草素問以方技存其天乎西漢去古未逺班固藝文志序醫四種三十有六家獨棄本草不録淮南王安曰神農嘗百草滋味一日七十毒醫方始興樓緩少誦醫經本草方衍數十萬言平帝元始五年舉天下通醫術本草者吏為駕軺傳遣詣京師時重本草如此固不録何也梁七録始載神農本草三卷或者謂初未著文字師學相傳謂之本草頗疑其不然今考其書論藥性溫涼味甘苦多異殆後人所附益非本文古之人能謹起居薄滋味嗜欲故受病少醫又神聖則用藥三百六十有五種有餘矣後之人不能攝生風濕寒暑侵其肌膚勞苦無極弊其筋骨飲啖無度傷其腸胃嗜欲無已竭其精髓故受病多醫又上非和緩巧非扁倉故用藥一千七十有六種而猶若不足是以刪取本文三篇以存古又以警庸醫和緩已逺扁倉不生藥視古三倍庸醫借此射利幸而中攘臂有矜色不中病者死醫蓋自如與操刃殺人者相去幾何噫洪武間呂復羣經古方論內經素問世稱黃帝岐伯問答之書及觀其旨意殆非一時之言其所撰述亦非一人之手劉向指為諸韓公子所著程子謂出於戰國之末而其大略正如禮記之萃於漢儒而與孔子子思之言並傳也蓋靈蘭祕典五常政六元正紀等篇無非闡眀隂陽五行生制之理配象合德實切於人身其諸色脈病名針灸治要皆推是理以廣之而皇甫謐之甲乙楊上善之太素亦皆本之於此而微有異同醫家之大綱要法無越是書矣然按西漢藝文志有內經十八卷及扁鵲白氏二內經凡三家而素問之目乃不列至隋經籍志始有素問之名而不指為內經唐王氷乃以九靈九卷牽合漢志之數而為之注釋復以隂陽大論託為其師張公所藏以補其亡逸而其用心亦勤矣惜乎朱墨混淆玉石相亂訓詁失之於迂疏引援或至於未切至宋林億髙若訥等正其誤文而增其缺義頗於氷為有功今於各篇之內注意與經相類者仍斷章摘句而釋以己意冀與同志商確非敢妄議前修也內經靈樞漢隋唐藝文志皆不録隋有針經九卷唐有靈寶詩及黃帝九靈經十二卷而已或謂王氷以九靈更名為靈樞又謂九靈尤詳於針故皇甫謐名之為針經即隋志針經九卷茍一書而二名不應唐志别出針經十二卷也所謂靈寶注者乃扁鵲太元君所箋世所罕傳宋季有靈樞略一卷今亦湮沒紹興初史嵩併是書為十二卷而復其舊較之他本頗善學者當與素問並觀蓋其旨意互相發眀故也本草三卷舊稱神農本經漢藝文志未嘗録至梁陶隱居始尊信而表章之謂此書應與素問同類但後人多更修飭之耳秦皇所焚醫方卜術不與故猶得全録及遭漢獻之遷徙晉懷之奔迸文籍焚爢千不遺一今之所存有此三者皆妄也宋髙保衡等校正內經乃云詳王氏元珠世無傳者今之元珠乃後人附託之文耳雖非王氏之書亦於素問十九卷二十四卷頗有發眀余嘗合素問觀之而密語所述乃六氣之説與髙氏所指諸卷全不侔疑必刋傳者所誤也原其所從蓋攟托內經六微旨及至真要等五篇洎天元玉册要言而附會雜説其諸紀運休祥之應未必可徵實偽書也茍啓玄别撰果見於世又豈止述氣運一端而已覽者取其長而去其短可也中藏經八卷少室山鄧處中云華先生他遊公宜山古洞值二老人授以療病之法得石床上書一函用以施試甚驗余乃先生外孫因吊先生寢室夢有所授獲是經於石函中其託為荒誕如此竟不考傳獄吏焚書之實其偽不攻自破按唐志有吳普集華氏藥方别無中藏之名普其弟子宜有所集竊意諸卷是其本經然所出郡縣乃多後漢時制疑張仲景華元化所記舊經之藥止三百六十五種因而注釋分為七卷唐李英公世績與蘇恭參考得失又增一百一十四種分為二十卷世謂之唐本草宋劉翰等又附益醫家常用者一百二十種偽蜀孟昶亦命其臣韓保升等以唐本圖經參比增廣世謂之蜀本草至宋掌禹錫等補注新舊藥合一千八十二種定以白字為神農所説黑字為名醫所傳草石之品可謂大備他若雷公以下蔡雍徐大山秦承祖王季璞鄭虔諸公所撰名本草者凡三十九部三百五十卷雖顯晦不齊無非輔翼舊經焉耳近代陳衍作本草折𠂻王好古作湯液本草亦刪繁之遺意也竊意舊記郡縣古今沿革不同及一物而根苗異名或同名異質而主療互見者尚須考定俾歸於一可也難經十三卷乃秦越人祖述黃帝內經設為問答之辭以示學者所引經言多非靈素本文蓋古有其書而今亡之耳隋時有呂博望注本不傳宋王惟一集五家之説而醇疵或相亂惟虞氏粗為可觀紀齊鄉注稍密乃附辨楊元操呂廣王宗正三子之非周仲立頗加訂易而考證未眀李子野亦為句解而無所啓發近代張潔古注後附藥殊非經意王少卿演繹其説目曰重元亦未足以發人之藴余嘗輯諸家之長先訓詁而後辭意竊附鄙説其間以便後學未敢以為是也傷寒論十卷乃後漢張機仲景用素問熱論之説廣伊尹湯液而為之至晉王叔和始因舊説重為撰次而宋成無已復為之注釋其後龎安常朱肱許叔微韓祗和王實之流固亦互有開發而大綱大要無越乎吐汗下溫四法而已蓋一證一藥萬選萬中千載之下如合符節前修指為羣方之祖信矣所可憾者審脈時汩王氏之言三隂率多斷簡况張經王傳亦往往反覆後先亥豕相雜自非字字句句熟玩而精思之未有能造其閫奧者陳無擇嘗補三隂證藥於三隂論其意蓋可見矣近人徐止善作傷寒補亡恐與先哲之意不合余因竊舉大要以補成氏之未備知醫君子或有所取也脈經十卷乃西晉太醫令王叔和本諸內經素問九靈及扁鵲仲景元化之説裒次而成實醫門之龜鏡診切之指的自與近代倣託鈴訣者不同歷歲既深傳授不一各祕所藏互有得失至宋祕閣林億等始考證謬妄頗加改易意其新撰四時經之類皆林氏所增入陳孔顧何大任毛升王宗卿輩皆嘗審訂刋傳今不多見近人謝堅白以其所藏善本刻於豫章傳者始廣余嘗托其精語并引內經之辭作診切樞要二卷非敢剪其冗復間亦補其缺漏且附私説各條之下以與同志研究爾脈訣一卷乃六朝髙陽生所撰託以叔和之名謬立七表八裏九道之目以惑學者通真子劉元賔為之注且續歌括附其後辭既鄙俚意亦滋晦今代王光國刪其舊辭而益以新語既不出其畦徑安能得乎本原餘如清溪徐裔甄權李上交輩皆自撰著凡十餘家亦每蹈襲前説在叔和之所不取讀者止記入式歌以馴至乎脈經可也病源論五十卷乃隋大業太醫博士巢元方等奉敕撰集原諸病候而附以養生導引諸法裒成一家之書醇玼相混蓋可見矣宋之監署乃用為課試元復循襲列醫門之七經然附會雜糅非復當時之舊具眼者當自見之吳景賢亦作病源一書近代不傳太始天元玉册元誥十卷不知何人所作歷漢至唐諸藝文志俱不載録其文自與內經不類非戰國時書其間有天皇真人昔書其文若道正無為先天有之太易無名先於道生等語皆老氏遺意意必老氏之徒所著大要推原五運六氣上下臨御主客勝復政化淫正及三元九宫太乙司政之類殊為詳眀深足以羽翼內經六微旨五常政等篇太元君扁鵲為之注猶郭象之於南華非心學之所易曉觀其經注一律似出一人之手謂扁鵲為黃帝時人則其書不古謂扁鵲為秦越人則傳中無太元君之號醫門倣託率多類此元珠密語十卷乃啓元子所述其自序謂得遇元珠子而師事之與我啓蒙故自號啓元子蓋啓問於元珠也目曰元珠密語乃元珠子密而口授之言也及考王氏素問序乃云辭理祕密難粗論述者别撰元珠以陳其道二序政自相戾意者元珠之名取諸蒙莊子所謂黃帝遺元珠使罔象得之之語則師事元珠子而號啓元論非普輩不能作鄧氏特附别方而更今名耳觀其方中用太平錢并山藥者蓋太平乃宋熙陵初年號薯蕷以避厚陵偏諱而始名山藥其餘可以類推然脈要及察聲色形證等説必出元化遺意覽者細為審諦當自知之聖濟經十卷宋徽宗所作大要祖述內素而引援六經旁及老氏之言以闡軒岐遺旨政和間頒是經於兩學辟雍生吳禔為之解義若逹道正紀等篇皆足以禆益治道啓迪衆工餘如孕元立本制字命物二三章釋諸字義失於穿鑿良由不考六書之過瑕瑜具存固無害於美玉也其論諸醫有曰扁鵲醫如秦鑑燭物妍􅑦不隱又如奕秋遇敵著著可法觀者不能測其神機倉公醫如輪扁斫輪得心應手自不能以巧思語人張長沙如湯武之師無非王道其攻守竒正不以敵之大小皆可制勝華元化醫如庖丁解牛揮刀而肯綮無礙其造詣自當有神雖欲師之而不可得孫思邈醫如康成注書詳於訓詁其自得之妙未易以示人味其膏腴可以無飢矣龎安常醫能啓扁鵲之所祕法元化之可法使天假其年其所就當不在古人下錢仲陽醫如李靖用兵度越縱舍卒與法會其始以顱􅀈方著名於時蓋因扁鵲之因時所重而為之變爾陳無擇醫如老吏斷案深於鞫讞未免移情就法自當其任則有餘使之代治則繁劇許叔微醫如顧愷寫神神氣有餘特不出形似之外可模而不可及張易水醫如濂溪之圖太極分隂分陽而包括理氣其要以古方新病自為家法或者失察欲指圖為極則近乎畫蛇添足矣劉河間醫如橐駝種樹所在全活但假氷雪以為春利於松柏而不利於蒲栁張子和醫如老將對敵或陳兵背水或濟河焚舟置之死地而後生不善效之非潰則北矣其六門三法蓋長沙之緒餘也李東垣醫如獅弦新縆一鼓而竽籟並息膠柱和之七均由是而不諧矣無他希聲之妙非開指所能知也嚴子禮醫如歐陽詢寫字善守法度而不尚飄逸學者易於摹倣終乏漢晉風度張公度醫専法仲景如簡齋賦詩每有少陵氣韻王德膚醫如虞人張羅廣絡原野而脫兔殊多詭遇獲禽無足算者宋人沈括良方序豫嘗論治病有五難辨疾治疾飲藥處方别藥此五也今之視疾者唯候氣口六脈而已古之人視疾必察其聲音顔色舉動膚理情性嗜好問其所為考其所行已得其大半而又遍診人迎氣口十二動脈疾發於五臟則五色為之應五聲為之變五味為之偏十二脈為之動求之如此其詳然而猶懼失之此辨疾之難一也今之治疾者以一二藥書其服餌之節授之而已古之治疾者先知隂陽運歷之變故山林川澤之竅發而又視其老少肥瘠貴賤居養性術好惡憂喜勞逸順其所宜違其所不宜或藥或火或刺或砭或風或液矯易其故常捭摩其性理摶而索之投機順變間不容髮而又調其衣服理其飲食異其居處因其情變或治以天或治以人五運六氣冬寒夏暑暘雨電雹鬼靈厭蠱甘苦寒暑之莭從先勝復之用此天理也盛衰強弱五臟異稟飲食異好循其所同察其所偏不以此一形彼不一不以一人例此衆人此人事也言不能傳之於書亦不能喻之於口其精過於承蜩其察甚於刻棘目不捨色耳不失聲手不釋脈猶懼其差也授藥遂去而希十全不其難哉此治疾之難二也古之飲藥者煮煉有節飲啜有宜藥有可以久煮有不可以久煮者有宜熾火有宜溫火此煮煉之節也宜溫宜寒或緩或速或乘飲食喜怒而飲食喜怒為用者有違飲食喜怒而飲食喜怒為敵者此飲啜之宜也而水泉有美惡操藥之人有勤惰如此而責藥之不效者非藥之罪也此服藥之難三也藥之單用為難如世之處方者以一藥為不足又以衆藥益之殊不知藥之有相使者有相反者有相合而性易者方書雖有使佐畏惡之性而古人所未言人情所不測者庸可盡哉如酒之於人有飲之踰石而不亂者有嚅咳則顛眩者漆之於人有終日摶漉而無害者有觸之則瘡爛者焉知他藥於人無似之者此稟賦之異也南人食豬魚以生北人食豬魚以病此風氣之異也水銀得硫黃而赤如丹得礬石而白如雪人之欲酸者無過於醋矣以醋為未足又益之以棖二酸相濟宜甚酸而反甘巴豆善利也以巴豆之利為未足而又益之以大黃則其利反折蟹與柿常食之而無害也二物相遇不旋踵而嘔此色為易見味為易知嘔利為大變故人人知之至於相合而之他藏致他疾者庸可易知邪如乳石之忌參术觸者多死至於五石散則皆用參术此古人處方之妙而世人或未論也此處方之難四也醫誠藝也方誠善也用之中節也而藥或非良其奈何哉橘過江而為枳麥得濕而為蛾雞踰嶺而黑鸜鵒踰嶺而白月虧而蚌蛤消露下而蚊蝝斥此形氣之易知者也性豈獨不然乎豫觀越人萟茶畦稻一溝一壠之異逺不能數步則色味頓殊况藥之所生秦越燕楚之相逺而又有山澤膏瘠燥濕之異稟豈能物物盡其所宜又素問説陽眀在天則花實戕氣少陽在泉則金石失理如此之論採掇者固未嘗恤也抑又取之有早晚藏之有良楛風雨燥濕動有稿暴今之處藥或有惡火者必日之而後咀然安知採藏之家不嘗烘焙哉又不能必此辨藥之難五也此五者大槩而已其微至於言不能宣其詳至於書不能載豈庸庸之人而可以易言醫哉豫治方最久有方之良者輒異疏之世之為方者稱其治效嘗喜過實千金肘後之類尤多溢言使人不復敢信豫所謂良方者必目覩其驗始著於篇聞不預也然人之疾如向所謂五難者方豈能必良哉一覩其驗即謂之良殆不異乎刻舟以求遺劔者豫所以注著其狀於方尾疾有相似者庶幾偶直云耳篇無次序隨得隨注以與人拯道貴速故不假久伏待完也元好問傷寒會要序往豫在京師聞鎮人李杲眀之有國醫之目而未之識也壬辰之兵眀之與豫同出汴梁於聊城於東平與之遊者六年於今然後得其所以為國醫者為詳蓋眀之世以資雄鄉里諸父讀書喜賔客所居竹里名士日造其門眀之幼歲好醫藥時易州人張元素以醫名燕趙間眀之捐千金從之學不數年盡傳其業家既富厚無事於技操有餘以自重人不敢以醫名之大夫士或病其資髙謇少所降屈非危急之疾有不得已焉者則亦未始謁之也大槩學於傷寒癰疽眼目病為尤長傷寒則著會要三十餘萬言其説曰傷寒家有經禁時禁病禁此三禁者學醫者人知之然亦顧所以用之為何如耳會要推眀仲景朱奉議張元素以來備矣見證得藥見藥識證以類相從指掌皆在倉猝之際雖使粗工用之蕩然如載司南以適四方而無問津之惑其用心博矣於他病也以古方為膠柱本乎七方十劑之説所取之藥特以意增損之一劑之出愈於託密友而役孝子他人蓋不能也北京人王善甫為京兆酒官病小便不利目睛凸出腹脹如鼓膝以上堅硬欲裂飲食且不下甘淡滲泄之藥皆不效眀之來謂衆醫言疾深矣非精思不能處我歸而思之夜參半忽攬衣而起曰吾得之矣內經有之膀胱者津液之府必氣化乃出焉渠輩已用滲泄之藥矣而病益甚是氣不化也啓玄子云無陽者隂無以生無隂者陽無以化甘淡滲泄皆陽藥獨陽無隂欲化得乎眀日以羣隂之劑投不再服而愈西臺掾蕭君瑞二月中病傷寒發熱醫以白虎投之病者面黑如墨本證遂不復見脈沉細小便不禁眀之初不知用何藥也及診之曰此立夏以前誤用白虎之過得無已投白虎耶白虎大寒非行經之藥止能寒肺臟不善用之則傷寒本病隱曲於經絡之間或更以大熱之藥救之以去隂邪則他證必起非所以救白虎也有溫藥之升陽行經者吾用之有難者云白虎大寒非大熱何以救君之治奈何眀之曰病隱於經絡間陽不升則經不行經行則本證見矣本證又何難焉果如其言而愈魏邦彥之夫人目翳暴生從下而上其色緑腫痛不可忍眀之曰翳從下而上病從陽眀來也緑非五色之正殆肺與腎合而為病耶乃就畫工家以墨調膩粉合而成色諦視之曰與翳色同矣肺腎為病無疑矣乃瀉肺腎之邪而以入陽眀之藥為之使既效矣而他日病復作者三其所從來之經與翳色各異乃復以意消息之曰諸脈皆屬於目脈病則目從之此必經不調經不調則目病未已也問之果然因如所論而治之疾遂不作馮內翰叔獻之姪櫟年十五六病傷寒目赤而頓渴脈七八至醫欲以承氣下之已煮藥而眀之適從外來馮告之當用承氣眀之切脈大駭曰幾殺此兒內經有言在脈諸數為熱諸遲為寒今脈八九至是熱極也而會要大論云病有脈從而病反者何也脈至而從按之不鼓諸陽皆然此傳而為隂證矣趣持薑附來吾當以熱因寒用法處之藥未就而病者爪甲變頓服者八兩汗尋出而愈陕帥郭巨濟病偏枯二指著足底不能伸迎眀之京師眀之至以長針刺委中深至骨而不知痛出血一二升其色如墨又且謬刺之如是者六七服藥三月病良愈裴擇之夫人久病寒熱月事不至者數年已喘嗽矣醫者率以蛤蚧桂附等投之眀之曰不然夫病隂為陽所搏溫劑大過故無益而反害投以寒血之藥則經行矣已而果然宣德侯經略之家人病崩漏醫莫能效眀之切脈且以紙疏其證多至四十餘種為藥療之眀日而二十四證減前後五六日良愈眀之設施皆此類也戊戌之夏豫將還太原其子執中持所謂會要者來求為序乃以如上數事冠諸篇使學者知眀之之筆於書其已試之效蓋如此云許衡論病證書梁寬甫證候右脅肺部也嗽而唾血舉動喘促者肺診也發熱脈數不能食者火來刑金肺與脾俱虛也肺與脾俱虛而火乘之其病為逆如此者例不可補瀉蓋補金則慮金與火持而喘咳益增瀉火則慮火不退位而痃癖反盛正宜補中益氣湯先扶元氣少以活病藥加之聞已用此藥而不獲效意必病勢苦逆而藥力未到也當與寬甫熟論逺期秋涼庶就平復蓋脈病惡春夏火氣至秋冬則退也止宜於益氣湯中隨四時隂陽升降浮沉溫涼寒熱及見有證增損服之升降浮沉則順之溫涼寒熱則反之順其順和其和為治之大方也或覺氣壅間服加減枳术丸或有飲間服局方枳术湯數月後庶逆氣少回逆氣回則治法可施但恐今日以至色青色赤及脈弦脈洪則無及矣近世論醫有主河間劉氏者有主易州張氏者張氏用藥依凖四時隂陽而增損之正內經四氣調神之義醫而不知此妄行也劉氏用藥務在推陳致新不使少有怫鬱正造化新新不傷之義醫而不知此無術也然而主張氏者或未盡張氏之妙則瞑眩之劑終莫敢投至失幾後時而不救者多矣主劉氏者或未悉劉氏之藴則劫效目前隂損正氣遺禍於後日者多矣能用二家之長而無二家之弊則治庶幾乎寬甫病候初感必深所傷物當時消導不盡停滯淹延變生他證以至於今恐亦宜倣劉氏推陳致新之意少加消導藥於益氣湯中庶有漸緩之期也鄙見如此未敢以為必然惟吾才卿元甫子益共商論之劉因內經類編序近世醫有易州張氏學於其書雖無所不考然自漢以下則惟以張機王叔和孫思邈錢乙為得其傳其用藥則本七方十劑而操縱之其為法自非暴卒必先以養胃氣為本而不治病也識者以為近古而東垣李眀之則得張氏之學者而其論著治驗略見遺山集中鎮人羅謙甫嘗從之學一日遇豫言先師嘗教豫曰夫古雖有方而方則有所自出也均腳氣也而有南北之異南多下濕而其症則經之所謂水清濕而濕從下受者也孫氏知其然故其方施之南人則多愈若夫北地髙寒而人亦病足則以所謂飲發於中跗瘇於下與穀入多而氣少濕居下者也我知其然故我方之施於北猶孫方施之於南也子為我分經病證而類之則庶知方之所自出矣豫自承命凡三脫藁而先師三毁之研磨訂定三年而後成名曰內經類編敢望吾子序夫內經十六卷素問外九卷不經見且勿論姑以素問言之則程邵兩夫子皆以為戰國書矣然自甲乙以來則又非戰國之舊矣自朱墨以來則又非甲乙之舊矣而今之所傳則又非戰國疑當作朱墨之舊矣茍不於其所謂全書者觀其文而察其理焉則未有識其真是而貫通之者今先生之為此也疑特令學者熟於此而後會於彼焉爾茍為不然則不若戒學者之從事於古方而學者茍不能然則不若從事古方者之為愈也羅亦以為然豫聞李死今三十年羅祠而事之如平生薄俗中而能若是是可序年月日劉某序王禕醫論豫觀近時言醫者莫盛於吳中而吳中世業醫者莫盛於葛氏葛氏之醫其術善於推五運六氣之盛衰以審病證而定治法此仲正之術所以異於人人也蓋仲正之諸父曰恆齋者嘗自著書其説以謂醫當視時之盛衰而為損益劉守真張子和輩值金人強盛民悍氣剛故多用宣泄之法及其衰也兵革之餘飢饉相仍民勞志困故張潔古李眀之輩多加補益之功至宋之季年醫者大抵務守護元氣而不知攻伐之機能養病而不能治病失在不知通其變也其為説如此可謂能眀夫氣運之變而通於隂陽之化者矣宋駙馬都尉褚澄脈論袪疑曰醫者可以生人可以殺人所係尤重故世子拜醫重之至也切脈之際沉微弦緊之少差投藥之間表裏汗下之少誤則不復有再生之理此世之所通患然亦在所未暇論夫所謂脈者世皆知王叔和之時訣矣左心小腸肝膽腎右肺大腸脾胃命此五臟六腑一定之位也醫者於一指之間以前半指為心後半指為小腸他部皆然而或者以六腑乃五臟之應以輕取重按之間為五臟六腑之别切脈之法其説有二彼是則此非彼非則此是部位未定况望其不謬於症耶又有大可疑者婦人之脈惟以尺脈之常盛與男子相反而脈訣謂反此背看切疑其有説也夫男女形體絶異隂陽殊途也故男生而覆女生而仰男則左旋女則右轉凡陽氣自下而上隂氣自上而下男主施與女主受男子之命在腎而處五臟六腑之極下女人之命在乳而處五臟六腑之極上氣形皆異脈傳於氣形之間者也何乃男子之與女人略不少異耶况背看二字殆必有説既言反此又言背看必不止於常弱常強之分也乃觀褚澄尊生經而前之疑者始以釋然尊生經曰脈分兩手手分三部隔尺寸者命之曰關去肘度尺曰尺關前一寸為寸左手之寸極上右手之尺極下男子陽順自下生上故極下之地右尺為受命之根本如天地未分元氣混沌也既受命矣萬物從土而出惟脾為先故尺上之關為脾脾土生金故關上之寸為肺肺金生水故右手之寸越左手之尺為腎腎水生木故左手尺上之關為肝肝木生火故關上之寸為心女子隂逆自上生下故極上之地左手之寸為受命之根本既受命矣萬物從土而出惟脾為先故左手寸下之關為脾脾土生金故關下之尺為肺肺金生水故左手之尺越右手之寸為腎腎水生木故右手寸下之關為肝肝木生火故關下之尺為心男子右手尺脈常弱初生微眇之氣也女子右手尺脈常強心火之位也非男非女之身感以婦人則男脈應診動以男子則女脈順指不察乎此難與言醫矣脈自內經以下歷周秦漢鮮有得其旨趣者至晉王叔和以脈鳴時撰有脈經可謂詳切獨惜其以大小腸候之兩寸致後人髙陽生假其名乘訛集為脈訣遂致脈經幾隱晦也至宋龎安常始得經意而有人迎寸口之辨嗣後論脈未能或之先也安常云察脈之要莫急於人迎寸口是二脈相應如兩引繩隂陽均則繩之大小等凡平人之脈人迎大於春夏寸口大於秋冬何謂人迎喉旁取之內經所謂别於陽者也越人不盡取諸穴之脈但取手太隂之行度魚際後一寸九分以配隂陽之數而得關格之脈然不先求喉引繩之義則昧尺寸隂陽關格之所起寸四倍於尺則上魚際為溢故言溢者寸倍尺極矣溢之脈一名關一名內格一名隂乘之脈曰外關者自關以上外脈也隂拒陽而出故曰外格隂生於寸動於尺今自關以上溢於魚際而關以後脈伏行是為隂壯乘陽而陽竭陽竭則死脈有是者死矣此所謂寸口四倍於人迎為關隂之脈者也關以後脈當一寸而沉過者謂尺中倍於寸口至二倍則八寸而為覆故言覆者尺倍寸極矣覆之脈一名曰內關一名曰外格一名曰乘陽之脈內關者關以下內脈也外格者陽拒隂而內入也陽生於尺動於寸今自關以下覆入尺澤而關以前脈伏行則為陽元乘隂而隂竭隂竭亦死脈有是者死矣此所謂人迎四倍於寸口為格陽之脈也經曰人迎與寸口皆盛過四倍則為關格關格之脈羸不能極天地之精氣而死所謂關格者覆溢是也雖然獨覆獨溢則補瀉以生之尺部一盛瀉足少陽補足厥隂二盛瀉足太陽補足少隂三盛瀉足陽眀補足太隂皆一瀉而一補之四盛則三陽極導之以針當盡取少陽陽眀太隂之穴脈靜者取三陽於足脈數者取於手瀉陽二當補於隂一至寸而反之脈有九候者寓浮中沉於寸關尺也且越人不敢取十二經之穴直以二經配合於手太隂行度自尺至寸一寸九分之位復分三部部中有浮中沉以配天地人也又曰中風木傷寒金溫水熱火溫病起於濕濕則土病土病而諸臟受其害其本生於金木水火四臟之變也陽浮隂濡為隂風濕陽數隂實為溫毒陽濡隂急為濕溫隂陽俱盛為溫瘧其治之也風濕取足厥隂木手少隂火濕溫専取少陽火傷寒取手太隂經手少隂火濕溫取足少隂水鄉人皆為我能與傷寒語我察傷寒與四溫變辨其疑似而不可亂也故定隂陽於喉手配覆溢於尺寸寓九候於浮沉分四候於傷寒此皆扁鵲略開其端而參以內經諸書考究而得其説審而用之順而治之病不逃焉脈要曰醫之家訣脈三部九候莫知其所由從世謂宗叔和秦越人叔和秦越人自以為發明內經而內經謂尺內兩傍則季脅也尺外以候腎尺裏以候腹中附上左外以候肝內以候鬲右外以候胃內以候脾上附上右外以候肺內以候中左外以候心內以候膻中前以候前後以候後上竟上者胸喉中事也下竟下者少腹腰股膝頸足中事也以是詳諦之三部之相屬錯而背何歟又輕按得腑脈重按得臟脈且深疑焉以按之上下分隂陽於腑臟則九候之浮中沉乃不能施於九候九候廢而診道荒何以製方劑哉然則古今名家能奏功紀籍皆幸而偶中者夫脈者血之府詬之為氣濡之為血氣運脈之外而血榮脈之中故十二經十五絡又八竒經惟貯而官者為臟腑以見於脈若合系而獨持之則無所名於具矣故心包絡三焦不得為無位兩腎不得為自離而叔和異之并其可諦者唐許胤宗醫有神效或勸其著書貽後世者答曰醫特意耳思慮精則得之脈之候幽而難明吾意所解莫能宣也古之上醫要在視脈病乃可識病與藥值惟用一物攻之氣純而愈速今之人不善為脈以情度病多其物以幸有功譬獵不知兔廣絡原野冀一人獲之術亦疏矣一藥偶得他味相制弗能專力此愈難之驗也脈之妙處不可傳虛著方劑終無益於世此吾所以不著書也劉玉咨脈説天以二氣五行化生萬物靈而為人然察其虛實寒溫燥濕死生存乎脈爾自素難抉其微王叔和萃為脈經世所傳脈訣蓋六朝髙陽生所纂其為言曰左心小腸肝膽腎右肺大腸脾胃命又曰婦人反此背觀之尺脈第三同斷病褚澄為之論曰男子陽順自下生上右手之尺為受命之本既受命矣萬物從土而出惟脾為先故尺上之關為脾脾土生金故關上之寸為肺肺金生水故自右手之寸越左手之尺為腎腎水生木故左手尺上之關為肝肝木生火故關上之寸為心其言如此可謂察於理而得其要矣然又謂女子隂逆自上生下左手之寸為受命之本萬物從土而出惟脾為先故左手寸下之關為脾脾土生金故關下之尺為肺肺金生水故左手之尺越右手之寸為腎腎水生木故右手寸下之關為肝肝木生火故關下之尺為心其言又如此則可謂惑於人而不察其理也春眀夢餘録卷五十七
