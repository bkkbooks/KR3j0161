body:
  text: 春明夢餘錄卷四十八吏部左侍郎孫承澤撰都察院都察院在皇城之西與刑部大理寺並列稱三法司初設御史臺洪武十三年改都察院十七年始定設都御史即古御史大夫之職副都御史僉都御史即古中丞之職副都左右各一人僉都四人主天子耳目風紀之司凡大臣奸邪小人搆黨作威福亂政者劾凡百官畏茸貪冐壊官紀者劾凡學術不正上書陳言變亂成憲希進用者劾而朝覲考察都御史入天官臺司賢否黜陟之斷大獄重囚㑹鞫於外朝或奉㫖同刑部大理寺讞平之屬十三道監察御史主察糾内外百司之官邪或露章面劾或封章奏劾凡差在内京畿道刷卷廵營軍提學清恤軍廵視光祿廵倉庫城門在外廵按清軍刷卷廵鹽茶河關印馬屯田師行則監軍紀功各以其事專監察而御史廵按則代天子狩轄所按藩服大臣若府州縣官諸考察舉劾尤專大事奏裁小事立斷而河南道獨專諸内外考察凡朝㑹糾儀祭祀監禮凡政事得失軍民利病得直言無避凡罪囚按廵審錄有故出入理辨之凡大獄勅下臺推奏當上聼裁常獄擬罪移評大理寺凡有大政集闕廷預議焉盖六部有專司而都察院惟所見聞得糾劾無職司乃憲綱諸御史糾劾務明著實跡開寫年月毋虚文從詆訐拾細瑣抑戒令其事慎重焉而御史出按復命都御史覆其稱職不稱職以聞又御史犯罪加三等有贓從重論周禮御史掌邦國都鄙及萬民之政令以贊冡宰凡治者受法令焉掌贊書凡數從政者按鄭注大宰以六典治邦國八則治都鄙八統治萬民治出於令而贊之以書者御史也蓋内史出王命外史書令御史為之屬則贊二官之書以百官班籍繫焉故亦以書數之即其數而數從政則察其不職者而使之各修其職亦贊書也戰國時亦有御史秦趙澠池之㑹各命書其事又淳于髠謂齊王曰御史在前則皆記事之職也至秦漢始為紏察之任所居之署漢謂之御史府亦謂之御史大夫寺亦謂之憲臺後漢以來謂之御史臺亦謂之蘭臺寺梁及後魏北齊或謂南臺唐龍朔改御史臺曰憲臺咸亨復舊門北闢主陰殺也御史為風霜之任初漢故事選郡守相髙第為御史大夫任職者為丞相唐制御史大夫一人中丞二人其屬有三院一曰臺院試御史隸焉二曰殿閣殿中侍御史隸焉三曰察院監察御史隸焉大事奏裁小事立斷凡有彈劾御史以白大夫大事以方幅小事署名而已宋初沿唐制大平興國中以張巽為監察御史正名舉職自此始元豐中以御史專領六察其後以中丞為臺長知雜御史為侍御史言事官為殿中侍御史六察官為監察御史西漢直指使者得擅誅刺史二千石以下東漢遣八使廵行二千石有罪者驛馬上之墨綬以下便輒收舉其權任之重如此元上都御史臺殿中司記按漢御史大夫有兩丞其一曰中丞居殿中蘭臺外督刺史内領侍御史受公卿奏事舉劾按章亦謂之中執法則居殿中者實古中丞之職魏以二御史居殿中察非法大朝㑹則簪白筆側陛而坐乃殿中設侍御史之始也其後殊時異制沿革靡常在唐則兼知庫藏出納宫門内事京畿諸州諸衞兵禁而政務非一在宋則三院並得言事兼察事而官守不分逮元世祖皇帝至元五年肇建御史臺置殿中侍御史二員而以殿中别為一司正名舉職紏察朝儀外廷稱慶則對立於龍墀之下而不與庶僚序列大駕行幸則畢從於豹尾之中而非若他官可以便休委任既專地位復密臣僚有所敷奏無不與聞而其命秩之崇品在第四視唐宋以七品官為之重輕之不侔從可知也自非勲賢貴胄秉清方直亮之節夙為衆所嚴憚莫敢當其選由是而致位卿相未始乏人誠欲使來者知所慕效而思維其風烈則所托以昭示於永久者曷可缺歟都御史都察院古御史府也明太祖洪武初一循元舊當是時左右大夫湯和鄧愈數膺斧鉞寄外出而中丞劉基章溢理臺事其後汪廣洋陳寧軰俱遷大夫洪武十三年胡氏之事發而御史臺僅設左右中丞俱正二品侍御史正四品而已十四年始改御史臺為都察院然僅正七品其官有御史而無都御史十六年仍為正三品明年為正二品於是定設左右都御史正二品左右副都御史正三品左右僉都御史正四品職紏劾官邪申辨寃抑而所屬御史分為十三道御史廵按以至他事公委出則奏請還則考覈然御史獨不係都察院以示得相紏察之意建文初改為御史府設都御史一員左右副都御史各一員品如故十三道御史曰左右兩院監察御史永樂鼎革悉復洪武之制其後移都察院於北京而留者曰南京都察院畧如六部矣其以左右都御史而下總督提督參贊廵撫各鎮者初自本院出曰公差事完或得代則回理院事其後不勝多則徃徃自部佐卿寺藩臬遷轉亦不復歸院洪武中命湯和等為左御史大夫等官諭之曰國家新立惟三大府總天下之政中書政之本都督府掌軍旅御史臺紏正百司朝廷紀綱盡繫於此而臺察之任實為清要卿等當思正己以率下忠勤以事上蓋已不正則不能正人是故正人者必先自治則人有所瞻仰毋徒擁虗位而漫不可否毋委靡因循以縱奸長惡毋假公濟私以傷人害物詩云剛亦不吐柔亦不茹此大臣之體也洪熙元年諭吏部慎選御史以清風紀又命吏部咨訪可為都御史者以為十三道御史表率宣徳十年勅諭都察院朝廷設風憲所以重耳目之寄嚴紀綱之任凡政事得失軍民休戚皆所當言紏舉邪慝伸理寃抑皆所當務比之庶官所係甚重近年以來未盡得人或道理不明操行不立或法律不通行移不諳或逞小才以張威福或搜細過以陷善良甚至假其權位貪圖賄賂以致是非倒置寃抑無伸而風紀之道遂致廢弛自今監察御史有贓濫及失職者令都御史及各道御史紏舉黜退按察司官有贓濫及不稱職者令按察使及其同僚紏舉黜退仍令吏部今後初仕者不許銓除風憲凡監察御史有缺令都察院堂上及各道官保舉務要開具實行聞奏吏部審察不謬然後奏除其後有犯贓濫及不稱職舉者同罪崇禎元年九月諭朕嗣宅丕基君臨宇甸念國家無一事不倚藉經費費無毫忽不取辦小民惟此胼手胝足之儔實係九邊庶府之命勞苦最甚咻噢宜先所頼郡邑有司矢志循良殫心咨訪而比年以來官方罕課吏治日非貪墨載途廉風絶響敲扑視為故事農桑置若罔聞暴歛横征徒縱饜饕之欲舖行里甲半供結納之需吾民之罹於虐政者亦既不啻水火矣其地方撫按司道有察吏之責者又皆膏盲積習倒置官評樂逢媚之可親仇清白之異已抑或猥狥情面姑示調停科甲正官雖貪殘尚從寛典明經郡佐即彈劾僅取備員甚者决裂隄防弁髦風憲廵訪而貪沉湎擁傳而繁徴求躬自教猱人誰則象如此弊風更僕難指朕痛之恨之所以然者皆爾部院轡勒先弛紀綱不立節鉞重臣置同郵傳豸驄法吏用及匪人率作有成不問拊民之實效復命考核徒循稱職之虚文功實由斯盡隳民生因而重困兹特諭爾吏部今後推用廵撫務選諳練周知民隱者畀以保釐之寄治有成績加銜久任其品足表儀才堪卿寺者無妨薦歴清曹不必内外頻遷以節鉞為遞傳之舎廵按各差御史於考選時即加精核在差事宜悉依廵訪總約申飭舉行回道之日爾部院嚴加考察有不稱職奏請處分勿得槩填稱職以憲綱為相沿之故套仍嚴諭撫按官今後有司真貪酷害民者不待考滿之期即時叅奏鞫核無枉朕處以祖宗之法其論劾事情列款備載無駢詞而失實無恭重而處輕無置豹虎而問狐狸諭頒之後在内部院衙門即時遵守在外撫按衙門近者一月逺者三月以内欽奉施行如或仍踵弊風空文塞責朕得於省覽立便摘查該科㸔詳章奏即行紏發以溺職治罪嗚呼稂莠盡除嘉禾滋植聿還累朝熙平之盛庶釋一夫不獲之憂朕與諸臣皆有令聞欽哉又十五年四月諭朝廷聼言納諫必須言路得人欲得人必嚴考選公諮慎核辨言試功抑競奬恬留真去贋此原是部院職掌昨面諭已明着即悉心詳議條列良法具奏又舊制試御史必先試以小差果能稱職歴事經年方准實授近因缺員一概差徃廵方及至回道又未見嚴加考核殊失慎重風憲之意今着該院堂上官執法綜稽申明舊制試御史必須分别去留不得循資推數槩題按差致有不堪貽誤地方所有未盡事宜也着具本奏奪内閣張孚敬疏昔唐韋思謙為御史大夫見王公未嘗屈嘗曰耳目官固當特立鵰鶚鷹鸇豈衆禽之偶乎宋杜衍為御史中丞宰相而下畏之曰不肯以恩意假人者也國朝顧佐為都御史在朝大臣有貪墨不法許穿緋衣當御前面加紏舉就行拏問故都御史凡衣緋入朝之日必有紏舉大臣莫不股慄今此職不舉故大臣無忌憚朝多貪墨如之何民不窮且盗也故掌院官必在得人始能倡率撫廵揚厲百司其守令等官一有慢令害民者撫廵官即按之無貸撫廵官一有不奉法者掌院官即按之無貸則法無徃不行矣左都御史孫丕揚責成御史澄清天下疏臣惟天下澄清其象有三無暴征無横歛合一隅之閭閻而相安於耕鑿者守令澄清之氣象也不損下不益上合一省之郡縣而相勉於撫字者藩臬澄清之氣象也有道揆有法守合一世之藩臬而相率於廉隅者部院澄清之氣象也三者本於清維貪墨壊之識澄清之路而圖亟反攬轡之臣有難諉其責者皇上欲責御史而澄清矣乎斯隨地察貪當力行焉夫都城者天下軒冕之總㑹海隅清濁之大本也國門之内某藩臬至篚筐之多幾何矣某守令至篚筐之多幾何矣茍物色之固可家喻而戶曉御史有專城之任者也請皇上下令廵視各御史立為季察嵗察之規以防羣吏之弁髦法紀者季以為察則御史持以考兵馬司一季之内交道接禮若例者勿問已必計緝獲打㸃之起幾何人妄餽之起幾何人指稱之起幾何人即以定兵馬司之賢勞而年終舉劾憑焉嵗以為察則本院持以考御史一年之内贓虚証枉無干者勿論已總計緝獲打㸃共若干濫餽共若干指稱共若干即以定御史之風裁而嵗冊滿政報焉果有蹴爾嘑爾甘為登壠之謀媚奥媚竈工於乞墦之計者聼各御史隨時恭論以清士風御史敢容隱者聼臣等恭論以肅憲體斯考取與考義利欲掩惡而不可掩矣繩都㑹之貪風廵視御史責成其可緩耶兩畿十三省者吏治汙隆之要地民生憂樂之大關也國門之外藩臬皆有分土問官於轄不可欺以閭閻茍察識之即知為廉而為貪御史有專方之任者也請皇上下令廵按各御史立為一年三年之察以防羣吏之漁獵病民者一嵗諸屬必出疆矣入賀餽受有無過濫遷官餽受有無過濫考績餽受有無過濫時維出疆即評品之三年諸屬必述職矣州縣科歛伊孰分外府寺科歛伊孰分外藩臬科歛伊孰分外時當述職即旌别之某廉吏也出疆述職無改其廉則從而賢之某能吏也出疆述職或變其守則從而紏之議在方面刺無惜於大寮議在守令紏不遺乎甲第胥聼各廵按隨事論列不待差滿之報倘罪過未盈者官職卑微者量行戒飭以清仕路廵按御史敢為炎凉者或有容隱者回道聼考以振臺綱斯一出入一辭受欲詐善而不可詐矣繩省㑹之貪風廵按御史責成其可少乎然澄清本源尤有當責備者外之撫按兩臣内之部院科道是已一方士風觀於撫按者也撫按澄清斯境内之吏治民隱莫敢不清四海士風觀於部院科道者也部院科道澄清斯海隅之吏治民隱莫敢不清是澄清天下固不當專委藩臬守令至明矣内外當路胥有世道責者也取與一茍即民瘼増向隅之悲矣臣願立為條目禁革與天下以共改奢儉不問即士風有濫觴之誚矣臣願立為條目約束與天下以共守撫按以此繩守令即以身先之求諸人者有諸已焉部院科道以此繩藩臬即以身先之非諸人者無諸已焉澄清關鍵莫要於此若言清行濁陽儉陰奢外辭内受斯靦顔媚世者流矣聼科道不時訪究以清士習之本夫然後部院科道相與澄清於内藩臬守令相與澄清於外將見人人著羔羊之節在在敦琴鶴之風海隅蒼赤豈不利頼多哉左都御史趙南星申明憲職疏臣聞孔子聖人其論臣道不過曰事君以忠而已他日告子路曰勿欺也即忠之説也宫之竒曰除闇以應外謂之忠則勿欺之説也人之心凡自私自便而不可以告人者是謂闇昧之心除去之乃為勿欺欺則不忠臣之不忠猶子之不孝不可以容於天地之間臣黭淺衰頺甘心永廢蒙陛下拔置西臺為諸御史之長臣甚愧甚懼兢兢自守履繩蹈墨以求寡過亦可保其身名然未可謂稱職也即此為闇昧之心力請除去夫臣無職也以諸御史為職諸御史皆稱其職即臣之稱職彼衣繡持斧出而廵方者如使百城循理萬民樂業則為一方之太平積之則為天下之太平所以致此者非有他術惟在舉劾之各當而已舉劾之所以不當者人務於市㤙而莫肯任怨也徃者御史之巡方事竣而報命所舉皆拘舊額固已不能悉當其後俸不及期及陞任者皆有提薦提薦之外又有掲薦昔西漢號多循吏班史所載者六人耳傳世之與救時固自不同然循吏亦不宜若此之多循吏若此其多也則宜有治理效而小民之窮苦憂愁愚弱者為鬼桀黠者為盗何哉以臣所聞見天下豈無循良而貪黷成風無術可禁自大戶改為條鞭而徴收日重有一兩而加二三錢者貧民糧少無不加倍或父子不許合封所得尤多故有司鮮不立富者買物皆與半直名曰官價或分毫不給恭謁上官輒令行戶隨之置辦下程餅師酒保皆受其累而又有喜於作威者不問事之大小一怒輒折人之肢體傷人之性命此輩常得薦舉非上官皆不之知也又非皆知之而故昧其本心也不過曰此吾之同鄉故舊不能恝也曰此權要之所託也是能報復不可劾也不劾則須舉之又從而過譽之貪者亷於伯夷而酷者惠於子産凡今之人誰無相知求人請託誰不能者以此舉人誰不可舉其所劾者皆貪酷而孤拙者耳又率多從寛故曰舉劾之不當以人務於市恩而莫肯任怨也夫任怨之於以保祿位甚為不便臣年雖已長忝竊過分如不肯任怨而徒委之後進小臣以茍且塞責則亦不忠之甚矣夫京官六年而考察御史按滿堂上官發河南等道查覈亦謂之考察言其任怨同也萬歴二年十一月内該本院題為考察事節奉神宗皇帝聖㫖御史差滿考察先朝事例甚嚴近來通不遵行一槩都准回道豈人人盡皆稱職無過者及遇京官考察之時却如何又有紛紛議論今後務要申明舊例着實舉行有不稱的即便恭奏改黜不許回道欽此十八年十二月内該本院同吏部㑹議薦舉規則具題節奉神宗皇帝聖㫖是近來薦舉汎濫屢有明㫖禁飭通不遵守今後撫按官薦舉務查照萬歴九年以前額數不許聼囑狥私任情偏濫有故違的該科指名查恭欽此俱經欽遵在卷每遇按臣差滿具題回道皆以為據臣極力行之即為盡職何必多言哉但舊章之廢弛已久則修舉反若亂常人情之偷惰相安則振作即為多事臣徳薄名微適足以結怨而無益於殿最也必仰藉陛下之威命以行之而後可紀綱之廢人心邪也沉迷未悟而遽繩之以法則人不能堪先必教誨之使知陛下之徳意而後可天啓二年内該山東廵按御史董羽宸紏劾不職有司奉聖㫖這論劾各官贓私數多着廵按官即提問追贓充餉事完議處該部知道欽此仰見陛下之匡飭吏治若此其嚴也臣請以後按臣差滿通將其所舉劾令河南道發單各道一一細加咨訪如考察之例類送堂上官必舉劾允當而後為稱職否則即以不稱職論夫臣之欲保祿位非與人殊何樂乎任怨若此哉誠以不如是則民不安民不安則社稷不安今天下禍深於邊疆兵連於黔蜀而内地之赤子化為妖賊俘囚亦可謂不安之甚矣陛下即位以來宵衣旰食未得享一日太平之樂為臣子者乃以市恩自便有人心者之所必不忍為也臣望陛下渙發徳音使領民之吏知貪酷之必不可為廵方之臣知貪酷之必不可薦提薦掲薦必不可行所薦者必不可為溢美之言所劾貪酷之吏必不可僅擬降調從此惕然猛省涊然愧汗翕然回心而向道共圖百姓之安使臣無怨之可任而諸臣功名日髙禄位從之名實甚粹美光慶及子孫豈非仕人之上願哉如以臣言為迂濶不可行而寘之於耳臣必不敢愛一官以負陛下髙厚之恩也左都御史髙攀龍紏崔呈秀疏臣惟御史回道考察憲綱至嚴也荷皇上之申飭不為不諄復鄭重矣乃不意有慢視憲規恣行無忌者如廵按淮揚等處御史崔呈秀陛下不以臣為不肖使掌西臺豈非欲其是則是非則非無所媕阿隱黙臣初入院適見兩御史回道一為江西廵按謝文錦一為崔呈秀臣心訝曰異哉兩御史一時回道一至清一至濁清濁較然臣不别白為陛下明言之是不忠之大者也即發河南道考核無何該御史袁化中以所考核謝文錦者至臣即以稱職考察奉聖㫖謝文錦着回道管事欽此越二旬而袁化中始以所考核呈秀者至化中蓋有難於言者矣臣於去年奉差而出今年復命而入徃來淮揚間所見淮揚士民無不謂自來廵方御史未嘗有如呈秀之貪汚者强盗地方大害也每名得賄三千金輒放訪犯地方大害也得賄千金輒放不肖有司應劾者反以賄得薦應薦者多以不賄止各御史出廵每有節省公費助國用者呈秀到處透支至一萬四千兩各縣賠補不勝其苦彰彰於地方耳目不可得而掩臣時以非職掌所關不敢訪其主名何人至於舉核失真貪酷漏網則有兩淮運司同知譚天相在是呈秀所薦也呈秀甫離地方而鹽臣劉大受且臚列其贓私以入告矣則有霍邱知縣鄭延祚在是呈秀所薦也吏科都給事中魏大中且發其餽遺奉聖㫖提問矣是賄而薦之實證也臣嘗竊歎人臣之負國實自負也受國家寵榮極矣如呈秀者辱身辱國何如哉臣聞其知譚天相之貪欲論劾也天相稔其易與奉之以千金求免劾而卒免天相益稔其易與也又奉之千金求薦而卒薦則是搖山撼岳之威祗供其禦貨攫金之用而墦間壟斷之賤且冐居觸奸指佞之官臣故謂其至辱所當重處以一洗廵方之辱也伏祈皇上速賜敕下吏部議覆施行都御史李賔推舉御史疏本院先奏御史缺員數多請勅天下廵按御史幷布按二司正官選推官知縣中廉能名著歴練老成言貎相宜年三十以上五十以下進士舉人出身歴任三年之上不限旌異與否舉送吏部覈實分送兩京各道問刑半年照例實授其有知而不舉舉而不公者罪之已蒙俞允兼命廵撫大臣公同推舉自是惟南直隸廵撫廵按及浙江兩司㑹舉數人其他顧忌畏避未見敢舉一人者又其後止許推舉曽經旌異者且旌異多出好惡之私又有避嫌而不肯旌異者廵按御史每年一更有前以旌異而後不肯覆勘者其中有年貌不相宜者有非科目出身者有旌異之後易其初心者古稱立賢無方不可拘泥又曰薦賢受上賞蔽賢蒙顯戮若不納賄賂不私故舊不聼請託不執偏見恊於公論自然得人况今御史多缺而𦂳急用人之際乞如前例仍行天下廵撫廵按并布按二司正官各舉所部推官知縣凡以科目出身三年秩滿堪為御史者雖未旌異當亦舉之若復知而不舉舉而不公者仍論以法如此則振揚風紀皆得其人而天下有司亦知所勸勉矣大學士兼掌都察院事趙貞吉乞止考察科道疏本月二十三日臣伏覩吏部接出聖諭朝覲在邇紏劾要公自朕即位四年科道官一向放肆欺亂朝綱有奸邪不職卿等嚴加考察仔細來説欽此蓋近因御史葉某奏論邊事言辭躁妄上干聖怒以致嚴諭臣聞之不勝驚懼臣切思葉已蒙皇上薄示降罰足以懲一戒百矣今又因此一人遂波及於諸臣並及前四年之諸臣一時衆心洶洶人人自危臣抱此私憂故不敢黙也臣查得自皇上登極以來科道諸臣僅二百人中間豈無赤心報國忠直敢言之士今一槩以放肆欺亂奸邪不職罪之其罪不容於死矣臣恐考察之日所司奉承徳意過於嚴切未免忠邪並黜玉石俱焚則將來言路壅塞士氣消沮有傷國家安靜和平之福其關係匪小也恭惟皇上聖徳寛仁如天如地臣民仰戴洋溢四海今有所激故降此嚴諭臣猥以疎庸謬承委託當此衆心惶亂之時治忽將分之際豈敢惜身保位結舌而不言哉嘗考徃古漢唐宋之事皆因鈎致黨人之罪遂各將一時賢才銷磨殆盡致國空虚無以濟緩急之用而凌夷以至於不救此誠可為戒者我祖宗之制設立科道許其風聞言事或是或不是尚有執政諸臣酌量可否取自上裁縱有不當亦止各受罰責以為懲戒而已未聞羣數百人而盡加考察一網打盡以蹈漢唐宋之弊者也伏望皇上垂大造之恩收回成諭特加寛赦仍許科道諸臣洗心滌慮以圖省改臣將見聖諭之嚴既足以鎮狂躁之心而聖恩之寛又足以作忠直之氣寛嚴並施恩威相濟萬世治安之道也臣待罪内閣一年之内屢被科道官妄加詆毁不勝其辱是科道官本不知臣也臣今乃為此言以救之豈敢有一毫狥私庇䕶市恩要譽之意哉天地神明實鑒此心縁臣一念朴忠實欲為皇上尊顯聖名為國家䕶養元氣為天下愛惜人材耳且臣兼掌都察院事亦有考察諸臣之責與其調停營救於下孰若輸忠哀懇於皇上之前倘蒙聖明垂慈曲赦宥此無知之輩豈不度越前代光美祖宗而垂令名於無窮也哉附方正學孝孺御史府記皇上嗣位之初即下明詔行寛政赦有罪蠲逋租鉅萬計去事之妨民者明年以紀元賜髙年米肉絮帛民鬻子者官為之贖免田之租税幾年分遣使者問海内所患苦賞廉平吏罪至死者多全活之於是刑部都察院論囚視徃嵗減三分之二人皆重於犯法二年春二月甲子有詔若曰頃以訴狀繁易御史臺號都察院與刑部分治庶獄今頼祖宗神靈斷獄頗簡其更都察院仍漢制為御史府專以紏貪殘舉循良匡政事宣教化為職省御史員定為二十八人務為忠厚以底治平三月戊辰賜御史衣明日己巳以都察院舊署在太平門之北於朝謁為難命即詹事府為御史府賜宴於新治復命文武大臣皆預以寵綏之既而有勅令臣某記其事臣惟斯民之生以徳養之則安於為善以刑制之則棄於為惡聖人之治天下豈有他術哉使人人皆知去惡以從善而治道成矣惟御史之官始於周其職之所治與權任之輕重雖累變不常然得其人則綱紀振而國體尊非其人則人望不肅而是非錯謬然專任以刑獄則自近代始曩者法吏持刑深刻犯者滋衆先皇帝甚厭苦之欲有所更改而未暇今皇上以徳養人羣生喜悦訟者衰止復古官名以修善政實行先帝之遺志自今居是府者其敬承聖訓凡便於國利於民者則言之為民之蠧為國之病者則去之毋溺於私而枉其所守毋懾於勢而屈所當為一以道輔佐天子行徳教使黎民醇厚如三代時斯不負建官圖治之意茍為不然舍其大而務其細或事小忠末節以市名或為詭行憸言以規榮利於民之治否國之安危無預焉則是官之名雖更而實之可厭苦者自若也奚可哉臣幸執筆從太史後夫紀政教明職守以示後世史氏職也故書其事以為居位者規總督廵撫漢初以合治矣其終也以分侯王而亂唐初以合治矣其終也以分藩鎮而亂宋初以合治矣其終也以分南北而亂正統而後或變生於腹裏或釁起於邊陲而諸邊諸省一時撫臣多不能振聨屬之䇿興討罪之師保境以自全攖城以自守直為是懔懔爾若西邊之額森河北之趙賊西蜀之廖寇江西之華林及藩濠八閩之鄧茂楚之麻陽廣之岑猛滇之麓川猖獗震蕩而各省撫臣皆相視而莫之能相救必設總督而後能平之彼其時非盡撫臣之怯也亡算也爵並權均夫兩大不能以相使而况十數大乎勢分故也列聖振長策而議聨屬邊方腹裏多設總督以聨屬而節制之若連環然且頒之勅如一省難作則總督調近省之食與兵或擊其首或邀其尾或掎其左或角其右有難則合制之難已則散而歸之無借兵之苦無萃食之擾語曰分指之十彈不如合掌之一擊此分合利病之説也制勢之策善之善者也難之者曰多設總督恐多擾則不便恐多費則不便不知今天下薊遼已設總督矣宣大山西又總督以聨屬之陜西三邊又總督以聨屬之四川雲南湖廣嘗設總督矣事平罷不設假令至今存也調諸省之食與兵撻而制莽酋耳且兩廣有總督矣閩浙直又設總督以聨屬事平又罷不設假令至今存也調諸省之食與兵直拉朽而誅浙兵之亂矣近又從言者河漕總督得提督南北直隸山東河南之兵浙江江西湖廣之食是中原一總督也即有師尚詔者弄兵釡中第合諸路坐而烹之爾惟河漕大臣不當令兼廵撫鳳陽爾夫鳳陽乃是陵寢之所鍾也中原之所樞也其地重其勢尊烏可以河漕兼也且古治水者八年萬里於外又安可匏繫一隅哉決以另置廵臣便由是言之則邊海増兩總督足矣鳳陽増一廵撫足矣增三臣而天下安何費之足云且無事則總督不得侵廵撫之權有事則廵撫不得抗總督之命若川雲總督當駐滇或兼廵撫閩浙總督當駐浙或兼廵撫尤屬省便又不必増官矣河漕總中原當駐淮而江北廵撫當駐鳳陽此大聨屬勢也而鄖陽贑州之軍門又小聨屬勢也如此則常合而不分問總督軍務官本朝始於何時曰都御史總督軍務自正統四年麓川之役王驥始也總兵官悉聼節制既以兵部尚書帥師當王振好大之心遂擬糧儲故事糧儲稱總督宣徳中始也繼是而己已之變敵薄都城石亨營城北于謙督之孫鏜營城西則江淵叅之而已繼是而四方多警類率如例如馬昂於兩廣石璞於關外王來於湖廣侯璡於雲南然事平則罷又繼是而景㤗天順及成化初白圭葉盛韓雍等皆稱提督意屬協同勅以贊理為云又繼是而為任官矣成化六年開總府於梧州此任官之所由始矣三邊總制自𢎞治末年秦紘楊一清張泰始便於徴發䇿應今亦為任官夫議者秉低昂文武之鈞濟兼制勦綏之術是矣而進止異同束手和混内外援搆隱於奸宄其能制而協之更當潤飾令必無伏機不亦盡乎又繼是而陳金華陽之役陸完劉六七之役至統制七省者後事而或援以為例其必有慎而馭之則可矣天下設廵撫都御史洪武未有也太祖不欲以重臣令典錢糧兵馬永樂十九年勅尚書侍郎都御史少卿等官十三員各同給事中一員廵行天下是謂廵撫宣徳間令廵撫官毎嵗八月一赴京議事蓋不欲疎逖以懸機重景泰四年纔差都御史其意尚在執持風紀有故則入參廟議而握纛之柄則有司存自是則曰整飭曰提督曰總制曰鎮守又復典兵部尚書侍郎之職兼都御史百寮羣將俯首聼一人之謀似於兼制少疎故復以廵按權參殺之然表裏異同痛癢不相關而司鋒鏑者每掣肘不能自盡是近年失事并罪撫臣誠得肯綮而當道執要可愈施矣夫天順間石亨曹欽請罷廵撫正徳間劉瑾取回廵撫彼固借私以逞要亦不為無說茍使其置布腹心則其為毒又不可勝言内閣張孚敬疏臣嘗聞胡世寧議云遼東薊州宣府大同山西延綏寧夏甘肅陜西四川貴州雲南兩廣鄖陽南贑保定河南山東湖廣江西淮鳳蘇松各邊腹廵撫并廵視河道御史共二十三員此等官最要得人最宜久任如宣徳正統景泰年間各邊廵撫有只用寺丞等官領敕行事不必官大又如周忱在蘇松自侍郎陞尚書凡二十二年王翺在遼東自僉都歴陞副都右都左都凡十有一年于謙在河南山西一十八年陳鎰在陜西亦十餘年是皆事久功成保濟得地方生民為朝廷分憂今此等官宜於兩京各寺卿少卿大理寺丞年深出衆給事中御史郎中在外左右布政使按察使左右叅政年深兵備副使上等知府内推陞原職髙者陞副都原職卑者陞僉都十分資淺者陞署職令其領敕一般行事其有在邊不諳軍旅而善理民事者改任腹裡不為貶抑年深有勞者就彼僉都陞副都副都陞右都常管此方十分年深勞著者就陞部院掌印如正統天順年間金濂年富皆自副都陞戶部尚書不為躐等蓋先必如此廣推方能得人後必如此重擢方能久任久任方能修葺得邊疆完固撫治得百姓安樂以為國家久安長治之計大政記云景泰三年太僕少卿黄士雋言廵撫重臣三司所行多被掣肘况久或變節怠終乞總敕大綱無親細事惟從輿論無執私見其事妥民安之處可以無設三司權本重廵撫初設便多齟齬尤不便於武官故石亨奏罷此黄少卿有激之言天下承平既久官箴漸替事未必妥民未必安則此官不可少惟須得人以老成靜重為主得風力御史佐之尤佳風力者何行於大奸大貪故曰持斧斧缺為貴循故事塞責完而歸之京堂開府肩摩而上矣西垣筆記洪武辛未敕皇太子廵撫陜西廵撫之名始於此建文元年命左都御史暴昭戶部侍郎夏原吉給事中徐思等二十四人充採訪使分廵天下問民所疾苦賞廉平吏黜貪墨不職者皆得以便宜行之洪熙初嘗命廣西布政使周幹廵視直隸浙江至宣徳元年二月幹還言有司多不得人土豪肆虐良民苦之乞命廷臣徃來廵撫庶民安田里下吏部㑹戶部工部議遂命廣西按察使胡概為大理寺卿同四川叅政葉春廵直隸及浙江諸郡此設廵撫之始凡遣尚書侍郎都御史少卿等官廵撫各處地方事畢復命或即停遣初名廵撫或名鎮守後以鎮守侍郎與廵按御史不相統屬又文移徃來亦多窒碍定為都御史廵撫兼軍務者加提督有總兵地方加贊理管糧餉者加總督兼理他如整飾邊備提督邊關及撫治流民總理河道等項皆因事特設提督總制地方不迴避本省開封人許廓以工部左侍彰徳人王彰以右都俱廵撫河南兖州人樊敬以右通政鎮濟寧濰縣人劉應節以刑書特敕開膠萊河張學顔梁夢龍等以直𨽻人總督薊遼景泰初給事中李實等奏近年各處鎮守廵撫等官動經三五七年或一二十年室家懸隔患疾病而不能相恤子女逺違遇婚姻而不能嫁娶有子者尚遺此慮無子者更有可矜乞敕各官議許其妻子完住量給本處官倉俸米以瞻其家從之此廵撫携家之始督撫帶風憲之衘不獨地方利弊可言即朝廷大政無不可入告萬厯中晉撫魏允貞淮撫李三才皆極論天下事讀其奏疏即科道亦不多見也又王岳為劉瑾所逐山東廵撫朱欽極言之瑾罰米三百石而不能罪後乃寂然矣監察御史正統四年十月諭禮部都察院朝廷建風憲任之耳目綱紀之寄所以肅百僚而貞百度也憲綱之書肇於洪武厥後官制不同所宜因時改書而中外憲臣徃徃有任情増益者我皇考宣宗章皇帝臨御臣下屢以為言遂敕禮部同翰林儒臣考洪武舊文而申明之并以洪武永樂以來祖宗所定風憲事體著在簡冊者悉載其中永示遵守而益之以訓戒之言凡出臣下所自増者並削去之書成先皇帝上賔未及頒行朕嗣位之初切以風憲為重敕有司嚴𨕖務在得人外之憲臣復以憲綱為言朕今於先朝所考定中益以見行事宜爾部即用刋印頒布中外諸司遵守爾都察院其下各道御史及在外按察司官欽遵奉行其洪武以後憲綱凡係臣下自増者不用敢有故違必罪不恕欽哉故諭嘉靖敕諭朕惟民為邦本本固邦寧不可不加意然欲民安又必慎用守令然後乃獲所安近屢有㫖命吏部多方𨕖授用心考察外但未聞某官果賢某方民獲安生某官為否某方民不聊生無憑黜陟實效未臻况近來災變多端本由朕致而百司分理亦所不免有匡贊之責而親民之官又最切焉今將朕偶有所見立為條目爾部院便即刋布開示於後守令已有㫖命所司慎𨕖外著彼到任之後務要上遵我皇祖成法盡修職業愛惜百姓所欲者與之聚之所惡者與之去之扶善而驅其强暴尊賢而去其不肖教之以忠孝導之以仁義勿得肆虐用酷殘我百姓凡軍民人等有在家能孝奉祖父恭事長上和睦隣里教訓子孫者務要指名奏來以憑旌異不許狥情用私畊桑者衣食之原一家之中頼之上奉先祖父母下養妻子八口須要依時力務男女各勤乃職但是少壯者都要耕織耕者勿怠於耒耜織者勿惰於機杼晨作晚息庶不致飢寒之苦各處但有荒蕪不種之地著招貧民自種官給與牛具種籽不徴税糧不許豪强侵奪及官豪人等有違一體奏來治罪秋成之後所獲須要樽節愛惜勿得賤棄儲之以備凶歉誤農害義蓋莫甚於釋氏之徒今尤甚焉夫彼不過以生死恐吾民小民愚甚真信無疑漫然而不之省遂至傷倫敗俗廢人事舎農業甚是有害世道今雖不能盡去恐驅廹之速必至作害但要牧民之官常加省諭禁戒其未來其見被惑者有能舍非從正都著還做生理須要從容善誘務使轉移如一府中有能一年化正二百人以上州一百人以上縣四十人以上者廵按御史奏來否亦奏來以憑考核欲守令盡職又在廵按御史御史克盡職以為表率他自不敢不勉今後各處廵按御史著照近日右都御史汪鋐所奏事件務要遵依不得抗違以為身先之道敕内所載某官果有遵行盡職民安生業的指名奏來陞用或賜以旌獎有仍前不遵故虐小民者亦要指名劾奏治罪務要從公薦劾以憑黜陟如所否者若朝廷訪知决不輕貸如敕奉行故諭嘉靖六年署院事兵部左侍郎張孚敬申眀憲綱條約一憲綱開載都察院按察司堂上官及首領官各道監察御史吏典但有不公不法等事許互相紏舉今後廵按御史彈劾三司不職者吏部斟酌舉行按察司官果有能紏廵按失職者亦應吏部查記不許科道官挾私報復其廵按清軍廵鹽刷卷御史同事地方固宜同寅協恭亦須互相紏察以清憲體一憲綱開載監察御史廵歴去處不許出郭迎接方面官相見左右對拜分坐自後不許伺候作揖奈積䛕成風卑恭過甚今後接見之間務依憲綱舊禮敢有倨肆違背本院考察不職三司官不知自立仍前獻䛕者吏兵二部即坐罷軟則繁文去而實效臻矣一憲綱開載凡監察御史各道按察司官每出廵審囚刷卷必須遍歴不拘限期近來廵按差出者半年未見涖任交代者旬月不出省城今後御史㸃差各照水程赴任仍具某年月日交代某年月日按某地方呈報本院查考違限怠事者定行叅究則郡邑皆得遍歴而奸弊無不察矣一憲綱開載監察御史廵歴去處如有陳告官吏不公等事須要親行追問近有不待陳告專事訪察者亦有不親受理轉委下司者今後不許訪察濫及無辜其必須自下而上果有斷理不公方行受理情重者親審本院節次發下勘合必須對欵親理回報事完考察完過六七分者方與回道管事則事不滯而民無稱冤矣一憲綱開載廵按所至博採諸司官吏行止廉勤公謹者禮待之薦舉之汙濫奸佞者戒飭之紏劾之勸懲得體人自敬服近來薦舉濫加於庸流彈劾下及於丞尉今後歴任年深政績卓異者方許保舉五品以上贓跡顯著者指實叅奏若是下官不職審實提問不必一概紏劾有妨憲體一憲綱開載風憲之官當存心忠厚其於刑獄尤須詳慎茍不問事情輕重而一概淫刑以逞鍜鍊之下死傷必多夫立法貴嚴用刑貴寛凡一切酷刑之具皆宜屏去不用死刑重事必須親審無冤庶體聖眀欽恤之至意一憲綱開載分廵所至不許多用導從飲食供帳只宜從儉今後廵按自廵捕官䕶印皁𨽻清道之外不許多帶人馬隨行凡設彩鋪氊無名供饋之屬一切不用其有分外奉承者定治以罪庶免小民供億之繁奉㫖卿所奏修舉憲綱事件皆切於恤民圖治要務便行與各處廵按御史及各按察司官務要著實遵行若仍有蹈前弊虚應故事的堂上官查舉降黜右都御史汪鋐申明條約一精考察今後廵按御史考察官吏務要廣詢密訪或詢諸田野鄙夫或詢諸耆碩父老人人致問事事細察毋惑於一偏毋膠於一節回道之日務將詢訪所得來歴各於本官下明白開註以俟叅考一謹官防廵按御史務要嚴於律已所帶衣鞋等物止作一扛不過百斤其書吏監生行李共作一扛只此二扛𦂳於御史馬前隨行所至下馬與起程之際御史俱要督同各該府州縣掌印官三面將此二扛一一檢閲明白方許收放抬行并將書吏監生身上一併搜檢其卷宗簿籍等項公文裝載卷箱封鎻明白另委官一員督押至察院交割御史督同各該掌印官逐一捜檢明白方許收受一嚴督率布按分司官例該二月初出廵五月終回司七月初出廵十一月終回司奈何各官好逸惡勞不肯依期廵歴又因廵按御史多住省城要得隨衆伺候遂各託故專於省城安坐今後廵按御史務要嚴督各官遵照事例依期廵歴不得輒便回司如敢故違即行叅奏一戒奢侈廵按御史務要躬行儉約率先一方日廪五升之外秋毫毋得取費於有司一菜一魚必以廪米照依時值易之仍遵照憲綱御史陸路給驛馬水路應付站舡監生吏典承差陸路并騎驛驢水路應付逓運舡並不得扛抬四轎乘坐座船如御史不能以身率下好為侈用不乗站船而乘座船不乘驛馬而乘四轎故違憲綱臣等查訪得實叅劾治罪奉㫖覽卿所奏深切時弊都准行左都御史孫丕揚内臺定規疏臣等竊惟天下之澄清治人與治法兩者而已御史者身澄清之治人都御史者總澄清之治法者也故四方之體統欲正矣而臺體之因循當革為天下先百寮之法紀欲齊矣而臺規之參差當釐為百寮倡臣不敢逺舉目今掌道御史風紀之總㑹也相習為乍掌乍更矣廵按御史省直之具瞻也相習為重内輕外矣廵視御史畿㑹之首善也相習為月易季易矣如是而望以澄清誰其任之此關於天下國家非𣺌小也臣丕揚舊臺臣也猶能記舊章謹出千慮仰塵乙覽倘大聖不棄乎芻蕘冀細流少裨於滄海斯臣與諸御史之上願存焉其一曰專御史之掌道臣惟十三道為言路關繫禮樂刑政罔不察焉故事御史掌道恒用年深邇來定為六人規矣然掌管數易政體推諉非計也臣謂專任使便掌河南道者兼管福建道掌浙江道者兼管雲南道掌山東道者兼管廣西道掌江西道者兼管四川道掌山西道者兼管廣東道掌陜西道者兼管湖廣道貴州道一如河南道考察不變之體而道有定掌焉掌道之御史仍用年深先三差回者次二差回者又次中差回者俱照隆慶二年事例劄委掌管一年為滿即准算差倘遇缺人差用亦必掌逾半年始更易之而又立交代公移之簿以稽職業斯則道務掌以定員事有專屬久任期以成嵗人有固志此澄清之總地所當議處者一也其二曰重御史之按差臣惟兩京為根本重地十三省為紀綱專司官箴民隱御史肩之特稱隆重故事御史之按廵也必中差始畀按差必滿差始請代差必挨次始得擬差憲度森然莫敢紊者近見臺規多變體矣臣謂仍舊貫便順天即近不專資深以防擇人廣貴即逺不差初授以防擇地江浙即大不再酌量以防擇差不中差者非甚缺人不按差焉不嵗滿者即甚遐方不擬代焉不循次者非果南北原籍不易處焉差鮮躐等人乏欲速豈非蕩蕩平平光明正大之憲猷乎守此而練習弛張整齊藩翰人人敦琴鶴之風省省奏青驄之績方隅依藉豈其微乎此澄清分憲所當議處者二也其三曰久御史之城廵臣觀居重要地孰五城最哉廵視御史故事不專為諠閙設者事有奸弊依法送理正統間例也禁約賭博緝捕盗賊坐舖火夫究問優免成化間例也查問九門官吏多勒客商財物𢎞治間例也訪察參奏打㸃饋送嘉靖間例也至於禁止科歛詐騙裁抑豪横奸頑安恤孤獨良善懲創奢侈遊戲舉劾兵馬司善惡何莫非御史事哉臣謂專責成便御史必用實授替差必劄一年憲度必期力舉務相率而專心城務以遏此城社之狐䑕收此輦轂之瘡痍而又省其外班以杜請託立為嵗冊以報滿政斯都人蝟冗之穀絲蠶食之輻輳冀可彈壓之有資矣此澄清國都所當議處者三也萬歴二十一年閏十一月上答㫖這所議有禆憲體著著為定規以垂永久廵城要領廵視南城湖廣道監察御史方震孺疏臣考前代畿輔之政大都統於京兆而我朝則兼用五御史意深逺哉蓋五府六部環集於輦下民無所知知有廵城御史而已侯王保傅赫奕於長安民無所畏畏廵城御史而已細而兒女小忿之爭俗而米鹽𤨏屑之事非質之御史不了也暫而徒歩之相搏久而畢世之深讐非質之御史不平也甚至覆雨翻雲之奸布地遮天之手非御史不能摘而發其覆也豪璫巨族炙手薰天可以一語折服之無敢譁依城馮社深根固蒂可以寸檄招致之無敢拒然則廵城之任綦專矣其權綦重矣故臣不遑舉其枝節而但求其本源曰城規不可不肅也城禁不可不嚴也城員不可不慎擇也廵方者例不得擕家屬例不得受私書例不得尋常宴㑹何城差獨不然終日拜客終日應酬蓋交遊雜㳫則神氣日分竿牘旁通則面皮難冷嚴於外而寛於内豈用御史之初意哉所謂城規之當肅者此也頗聞我皇初政都門白晝無敢持帕儀徃來者而一切白蓮左道揑謠造謗之徒皆潛踪屏跡可想見一時振刷景象今漸蔑如矣即如經畧繫獄而靈濟宫一弟一侄椎鑿之聲四聞又臣捜假印時無意中得山人莊士元文書一卷皆係罪璫戚畹之辨掲而其他一二尺牘深有可疑訝者乃知山人墨客慣走豪貴之門而走險通神大為悠謬之口此軰不驅除廵城者不得謝其責所謂城禁之當嚴者此也京師者萬國之堂奥也而親民之官獨兵馬指揮耳徃時司官題用正途最有深意而不知坊官之親民與司無差别也竊以為各城坊官亦當以考選遺珠充之其體貌陞轉與司官等豈惟司坊即宛平大興二縣亦當用科甲而治行之最者其超擢亦當出諸藩上所謂城員之當慎者此也總之有官不可以無法有統不可以無輔有官有法有統有輔而所以治京師者過半矣各差建置自昔言官察官截然二項如宋時亦尚如此御史臺中丞一人侍御史一人殿中侍御史一人以上並係言事官監察御史六人亦曽許言事後來止察事宋制入臺有十旬不言事輒舉辱臺之罰竊謂過矣使時無可言固將强聒也故嘗謂臺諫之言事當論其大小不當論其疏數當論其緩急不當論其早暮御史差委在内則京畿道刷卷及廵視京營提學廵倉廵庫廵視光禄清恤鹽課在外則廵按清軍刷卷廵鹽廵河廵關廵茶印馬屯田遇有征行則特遣監軍紀功宣宗嘗諭左都御史劉觀曰中外文武諸司文卷已遣御史照刷其内府諸衙門皆有錢糧出納近聞其弊甚多即選能幹御史率監生於東華門外廡下取各監局文卷簿籍詳加磨勘有隱匿錢粮虚冐支給者悉以聞景泰六年給事中李瓚言南北直隸學校俱無按察司官提督宜分遣御史二員專理始命御史葉巒張監督南北直隸學校㑹典不載宣徳二年差御史各處清軍後革歸右布政舊制遣御史二員於長蘆兩淮廵鹽又遣御史分廵南北河道有司供費不給景泰初給事中李瓚以為言遂罷廵河御史二員令廵鹽御史兼之景泰三年罷兩淮長蘆廵鹽河道命廵按官兼理正統三年令每嵗各差御史廵視景泰元年差侍郎一員清理淮浙鹽法取回御史三年又令差御史二員於淮浙廵鹽舊制屯田俱増設僉事一員宣徳二年始令廵按御史兼理屯田天順九年令南都察院差御史一員廵視屯田正徳三年差御史督理北直屯田隆慶二年差都御史三員經理各處屯田河東鹽池舊止以廵按御史兼視成化九年始專設鹽御史永樂十三年差御史三員廵督陜西茶馬景泰四年仍照洪武中例差行人成化三年令差御史一員於陜西廵茶七年罷差行人四川廵茶十一年令取回御史復差行人十四年仍差御史𢎞治十六年令取回御史命督理馬政都御史兼理正徳二年仍設廵視御史一員令仍前督理陜西茶馬兼攝川湖等處地方嘉靖中都御史汪鋐劾出差御史王宣譚纘沈奎陳大器陸夢麟李美胡體乾陳世輔熊爵等九人先後保薦官屬大計之日多以貪酷不謹敗宜連坐請勅吏部視其多寡而議罰焉部覆廵按御史濫舉四人以上者革職間住二人以上者降一級調外任一人者罰俸半年詔從之著為令廵按御史復命以銷繳勘合七分為稱職近固即其數而踰之者矣舊百執事各職其所司而今廵按百務萃攬事大繁而反易集謂之何哉則其所為集知非昔日之詳也按憲綱廵按受理詞訟必自各衙門斷過不公者其所受理必親决不令批發懸意向於喜怒夫然後事可立見而上下附同之流塞矣歸有光云嘉靖乙卯侍御餘姚周公被簡命來按吳中故事御史廵行天下郡國率一嵗還報公滿嵗且去而吏民伏闕上書願留者數千人詔聼復留於是幾及三載公在吳每行縣還百姓扶老擕㓜填溢街巷使車不得行永樂初以山東道御史文郁不諳刑名改為工科給事中又改江西道御史汪俊民為刑科給事中舊制御史皆乗驢宣徳間御史胡智言御史任紀綱之職受耳目之寄紏劾百僚肅清庶政若廵按一方則御史以朝廷所差序於三司官之上或同三司出理公務三司皆乗馬御史獨乗驛驢頗失觀瞻自今請乗驛馬許之著為令永樂時都御史陳瑛言御史車舒怠惰不任事謫舒戍邊因謂瑛曰御史當用清謹介直之士清則無私謹則無忽介直則敢言不能是者即黜之宣徳時御史謝瑤薦牘誤書姓自陳改正宣宗謂吏部曰古人奏牘皆存敬慎石慶書馬字缺㸃懼及死今薦賢不知其姓豈能知其才輕率如此豈稱御史之職遂謫交阯大蠻縣知縣嘉靖間金符廵按山海關廵撫順天都御史孟春論其行事乖張不按憲體金符不置辯詔回道考察謫河南鄧州判官天順間御史李蕃楊璡廵按宣府遼東所過軍衛有司俱令擺列官軍逺出迎送上聞之大怒俱令拏問仍降勅申飭以後有司迎送路跪甚至鼔吹放炮開門一如制撫則萬歴以後事也宋王炎雙溪集云昔漢部刺史以六條察州五條以察二千石而一條以察大姓强宗墨綬以下不與焉非固嚴於其大而畧於其小也以為大吏有所畏忌則其小者不治而自肅也今外之臺府與内之臺諫均則有所奏劾炎竊謂臺諫不論貴近而論庶僚臺府不按郡守而按小吏則人情不服而法不法炎昔在荆州聞南軒先生有言曰帥桂四年但按郡守微如簿尉縱有姦贓為害也小不若先治其大者此至論也宋魏鶴山古今考載通曰秦以御史監理諸郡謂之監察史戰國策有韓安邑之御史則以御史監郡六國亦有之非始於秦漢省其官提刑按察使宋文恪訥曰考今提刑按察周命撢人以廵天下之遺意也自唐虞五載一廵狩考制度於諸侯至周封建廣五載廵狩之禮弗克行而撢人之制始興葢以道國之政事而使萬民和悅秦起廢周制漢興雖不能復遣掾史行部郡國之治悉達於上無撢人之名法撢人之意逮孝武初置部刺史以六百石之微而察二千石之尊卑其職使自厲重其權使自行誠一代美意良法也綏和以來制不遵古始更部刺史為州牧職重權專遂流為藩鎮之弊而古制泯矣夫按察始於唐提刑始於宋唐則三年以遣使宋則諸轉運以兼職名起於近而意沿於逺也皇明既一四海即分天下為十有幾道立提刑按察使司有使有僉周適四方廵行風俗上以宣帝命下以求民瘼按其官吏能否而進黜之本唐虞之考績法漢家之分行此我國家統紀之有經歟唐置觀察使貞觀初遣大使十人廵省天下諸州水旱則有廵察安撫存撫之名神龍二年置十道廵察使按舉州縣再周而代景雲二年改十道按察使開元二十年分天下為十五道改為察訪處置使天寳末年又兼黜陟使乾元元年又改為觀察處置使皆以朝官為之而藩鎮大使皆在所察之中宋仁宗時知諫院歐陽修請置諸路按察使疏臣伏見天下官吏員數極多朝廷無由徧知其賢愚善惡審官三班吏部等處又只主差除日月人之能否都不可知諸路轉運使等除有贓吏自敗者臨時舉行外亦别無按察官吏之術致使年老患病者或懦弱不才者或貪殘害物者此等之人布在州縣並無黜陟因循積弊冗濫者多使天下州縣不治者十有八九今兵戎未息賦役方煩百姓嗷嗷瘡痍未復捄其疾苦擇吏為先臣今欲乞特立按察之法於内外朝官中自三丞以上至郎官中選强幹亷明者為諸路按察使自來雖差安撫使緣管他事不專按察今請令進奏院各錄一州官吏姓名為空行簿以授之使至州縣遍見官吏其公亷才幹明著實狀及老病不才顯有不治之迹者皆以朱書於姓名之下其中才之人别無竒效亦不至曠敗者則以墨書之又有雖是常材能專長於一事亦以朱書别之使還具奏則朝廷可以坐見天下官吏賢愚善惡不遺一人然後别議黜陟之法如此足以澄清天下年嵗之問可望致治只勞朝廷精選二十許人充使别無難行之事取進止元於各路立行省中書以總大政即今布政使也又立行御史臺以司糾劾即今按察使也至元中議以行臺𨽻行省尚書董文用曰御史臺譬之卧虎雖未噬人人猶畏之若加摧抑則風采蕭然亦無復可望矣明初置提刑按察司謂之外臺與都察院並重故大明令按察司都察院並列不視之為外官也洪武時諭曰治吏之弊莫甚於貪墨而庸鄙者次之今天下府州縣官於斯二者徃徃有之是以弊政日滋民受其害故命爾等按治其地凡官吏賢否軍民利病皆得兼問糾舉建文中改為十三道肅政按察使永樂中定今制按察使掌一省刑名按劾之事紏察官邪擒治貪酷禁詰强暴平讞刑獄雪理冤枉以振揚風紀故當時廵歴所及貪墨之吏伏首受法民困為之一甦迨後撫按之權重而憲司僅為承行之官此吏職所以日隳也嘉靖十二年閣臣張孚敬攝都察院申明御史紏彈諸司而御史不法亦聼按察司紏彈臺諌不得挾私報復王廷相掌院請如孚敬議上曰此祖制也掌院多事姑息廵按故縱按司畏怯殊非政體令通諭行之景泰三年十二月降湖廣按察司僉事黄潤玉為直隸和州含山縣知縣以廵撫右都御史李實考劾其不諳刑名也召對王副憲紀都察院副都御史王志道奏内臣越職一疏云竊惟皇上差委内臣不過核錢糧兵馬物料而已原非假以大臣小臣官評吏議也邇年以來叅疏日上論劾漸廣内則紏科道六曹外則紏方面督撫又内則紏六曹卿貳今則紏輔臣矣此臣所謂越職也夫國家之設輔臣不但責之以叅贊廷議也宫中府中陟罰臧否皆其職掌若使内臣紏劾方面以侵撫按之權而輔臣不問内臣紏劾御史以侵掌院之權而輔臣不問内臣紏劾六科給事中以侵掌吏垣之權而輔臣不問内臣紏劾卿貳執政浸浸乎口含天憲手持朝綱而輔臣尚不問則將焉用彼輔臣哉詩不云乎楊園之道猗于畝丘言自卑而髙也夷陵之漸日甚一日始而忌芻馬終而廹堂亷遂使内臣得以操其長短肆其刺詆勢所必至無足怪者且中外諸臣其紏内臣者多矣輕者紛紛去國重者下獄置對而輔臣不能救也豈入告我后不使人知耶將欲問而不能也抑能問而不欲耶臣仰見皇上天地之心内臣外臣原自一視至公也近來内臣所紏輒蒙報可其紏内臣者未見一行輔臣何不舉而一體言之以成天地之公臣仰見皇上日月之照顯劾密察各有本末至明也就内臣中間有奉法循職者擅權越局者原自不同輔臣何不舉而分别言之以成日月之明臣仰見皇上雨露之澤體悉羣臣無所不周至仁也今之建言者與被言者或放歸田里猶可引分自安或薄示降罰猶可勉力補過至下法司下詔獄如馬思理髙倬王忠孝孫肇興等實無不赦之罪而有可原之情輔臣何不一舉而以解網争之以速雨露之澤若此一事中外無不以之責望輔臣而尤以之責望首輔首輔於此必極力擔當乃或可自安如再黙黙憒憒何以仰副明主知遇諄諄諭留之意哉内臣之得失漸莫敢言南北之水火搆鬭已極固廷臣之患亦非内臣之利也雖然猶可言也士氣易激亦易靡名義易爭也勢利亦易合也自今以前固患其爭自今以後猶慮其合也合則角口且化為稱頌不可言也履霜堅氷由來者漸不見其形願察其影皇上清明在躬睿照如神何隱不燭豈待蕘言抑臣心所不安不敢有隱於君父之前且備員執法不但輔臣有以道事君不可則止之義即微賤陳力就列不能者止之分也崇禎六年癸酉二月初八日庚午上召輔臣等并五府六部都通大翰林院記注官吏科等科河南道等道及京營總督協理錦衣衛堂上官來文華殿上御文華殿諸臣於門外行叩頭禮訖上尋命卿等進來諸臣肅班而入東面鵠立上首召王志道都察院協理院事左副都御史王志道出班跪上曰遣用内臣原非得已屢有諭㫖極是明白如何又有這一番議論昨王坤疏有㫖責他率妄大體已存了如何又牽扯許多說内臣叅的處了叅内臣的又處了但是處分各官都為内臣這等朝廷之上别無政事都是内臣了種種誣揑不可枚舉别的且不説即如王忠孝臭爛米豆人馬都吃不得他所管何事這様的叅來該處他也説是為内官處了還説他臨訊時不能具一飡一文他若無情弊為何肯放這樣米豆又如為草塲處的為軍器處的都説為内臣又説一稍輕一獨重前兩厰已幾次從寛僅止降罰盔甲厰這番軍器着實不堪所以重處那安民厰稍堪所以稍輕那掌厰臣内臣劉守乾也是一同提問的如何止説是為内臣又如修整城守軍器正是先事綢繆金鉉奉㫖管理連砲眼也都不開可不誤事胡良機廵按宣大二年不為不久撫賞大弊毫不覺察這也是不當處的總是借一箇題目凑砌做作落於史冊只圖好㸔一味信口誣揑不顧事理但凡叅過内臣就是䕶身符了隨他溺職悞事都不誅處這是怎麽說志道奏曰神聖在上豈容内外臣不奉公守法其有不奉公守法者皇上自有鑒知止為近日内臣叅劾漸廣諸臣受罪者多外庭皆以申救責備輔臣臣知無不言不敢不採外庭責備之言入告及輔臣為王坤所叅舉朝皇皇為紀綱法度之憂臣仰體皇上好問好察無所不照豈可使中外有紛紜之疑不以上聞臣閩海愚材自以為輔臣該言的臣亦該言内臣既可紏廷臣廷臣亦可紏内臣其為法受罪諸臣風雨露雷無非皇上之教生死榮辱無非臣子之分臣豈敢為諸臣出脫至臣疏中不能詳慎語多謬悞罪當萬死時志道説謬悞二字語音不朗上問輔臣是說甚麽輔臣延儒代奏曰謬悞上曰有這許多謬悞來你在朕前便説謬悞書之史冊就不謬悞了上又曰爾為憲臣從來有何建白既是知無不言還有軍國利弊大事何不奏來上再詰之志道奏曰兵馬錢糧物料三者實當今急務此外未敢及上曰爾前疏只說王坤應管兵馬錢糧不該輕意侵及輔臣這就是了如何有許多説話不論該處不該處一槩都是為内臣難道朝廷政事都是内臣做了你説輔臣有言臣可無言輔臣有言你知道麽多少關係國家大計一件不説只因内臣在外不便作弊恰好有王坤一疏便張大起來有許多説話分明遣内臣一事先前靣諭你都盡知今故意借箇題目挾制朝廷不便處你可謂奸巧之極多頃上曰前年敵薄都城下那是誰致的諸臣就不說了文武各官朕未嘗不信用誰肯打起精神實心做事只是一味朦狥諉飾不得已差内臣查核原出一時權宜若是叅來不行差他做甚麽你們外臣果肯做事朕何必要用内臣輔臣周延儒溫體仁吳宗達鄭以偉徐光啓等同出班跪延儒奏曰臣等輔理無狀表率無能在内部院各衙門在外督撫按各官不能盡心修職以致封疆多事寇盜繁興皇上萬不得已遣出内臣查核邊備原是憂勤圖治之苦心屢諭甚明外廷皆知今於皇上原無不頌服只是臣等罪狀多端所以外廷都來責備王志道説臣等不能申救不能執爭也是外廷議論他就輕率入告了伏望皇上特賜優容外廷愈知感頌聖徳上色稍霽曰朕昨在講筵前日在平臺靣諭卿等甚明他這等議論正是借好名目挾制朝廷不便處他輔臣延儒奏生殺予奪聼命皇上朝廷處人誰敢挾制適蒙聖諭詰責王志道種種誣揑情罪甚明原是該處只是他的本心原非敢議論朝廷亦不是專為内臣其意只是責備臣等溺職臣等原實有罪義當任受伏祈皇上委曲寛宥外廷人心自皆帖然决不敢再有煩囂凟擾聖懐上曰各人分内職掌不修假借虚名張大其說占一箇好地步再不管朝廷事體若何此是何心似這樣人品可堪憲紀表率諸御史可使得麽上徐命輔臣承㫖歸班上嘿思久之曰疏中誣揑欵項還說不盡本該拿問念輔臣屢次申救候㫖起去志道叩頭退上召吏部尚書兵部尚書都察院左都御史吏部尚書李長庚兵部尚書張鳳翼都察院掌院事左都御史張延登同出班跪上曰吏兵二部用人根本近來弊竇最多未用一官先行賄賂文武俱是一般近聞選官動借京債若干一到任所便要還債這債出在何人身上定是剝民了這樣怎的有好官肯愛百姓卿等新任須把舊弊徹底清釐情靣一毫不顧纔用得好人纔盡得職掌若别人説的就用自己漫無主見大悞事情朕前日為兩部尚書費幾許推敲纔用卿等二人須能革去舊弊用好人才為國家任事纔不負委任吏部文選司兵部職方司尤最𦂳要吏部十三省一省一人原為要知那一省人才其實名雖為公實未必然他們何曾用心遴訪到了用人的時節仍舊南直不知北直北直不知南直今後若司官不堪有狥情的作弊的有抗違的就要叅來不要説堂屬一體只狥情靣若見有人向部裏囑托把持也要據實叅來輔臣延儒從傍奏曰吏兵二部須是自己能叅别人不怕别人叅方能任怨任事上曰各盡職掌朕自鑒裁浮言豈能動朕臣長庚鳳翼奏二臣皆自田間特恩起用敢不盡心圖報今䝉聖諭督率司官如有不遵的自當叅奏臣等或有錯謬望聖明寛宥至於情弊不敢曲狥上曰情弊須從卿衙門清楚用人須要自己主張若推那一員官俱憑人説就用或只憑鄉紳保舉這都不是就是其中也有人地相宜的畢竟還該從公慎擇若一味聼狥又何消要部裏今後不許只據舊訪單塞責及情靣囑托這様事情一定重處這是甚麽時候内外種種多故大小臣工也俱不能辭責推用人才俱在卿等兩部源頭清楚用人自當若是人才那一個不堪就是那一個源頭不清卿等責任豈輕如今所做的事都是天事謂之天工須着盡心纔是若只循舊套推陞的幾個官不過執簿呼名一吏足矣要尚書何用又如吏部情弊極多正該責成司官稽查覈察各様事體不可但委吏書臣長庚奏吏書之弊只有小官至於大僚皆臣等之責不敢有諉其諮訪舊單近奉明㫖不得濫用以後務要新行諮詢仰體聖懐臣張鳳翼奏當今東事未靖寇賊交訌只因將不得人此皆臣等之罪推官一事向來武弁原有鑽營皇上神明在御此弊竟無上曰一毫情面不顧徹底清起纔能用幾個好人若就說無弊怎能得彀先年職方司郎中方孔昭有一個總兵求推謝銀三千兩這是怎麽説一到地方自然剝軍了卿等身為大臣須要㓗己率屬上又諭張延登曰都察院風紀重任表率那御史廵按是朕所行不能到的要他去廵何等關係御史廵方賢否全在考核如今一槩回道稱職只憑河南道一本文冊説舉核過文武若干積過穀石若干舉過節孝若干便完了事就是地方有悞事的有奉㫖着回道嚴加考核的還要替他委曲出脫或説是前人的事不是他任或説是前行各様事都好只因一時偶悞將就罰俸降級了不肯處一個成甚麽憲體臣延登奏天下百姓窮困全是吏治不清御史激揚無法臣見奉不時叅處之㫖不職者即行奏聞决不敢從寛上曰只要當不是從寛果能有實蹟的是稱職若無大錯亦無大功這是平常如有地方失事平日本無整飭或隱漏不報或紏舉不當這就不稱職了如今連平常的也没有都是稱職有些過失又替他解脫不擔勞不任怨都察院如此落得做個好人御史怎肯盡心那御史差出去處一應吏治賢否俱在舉劾若一失當下邊怎了臣延登奏不敢不嚴加考核上曰考核須認真查核若只憑河南道文冊不過故事臣延登奏案呈須由河南道臣當另行多方採訪不敢全憑他人文書上曰卿是此院新任自能盡職如以前這都察院都着實不堪昨日卿上一䟽專講御史陞轉可是御史陞轉不去是第一𦂳要麽每見新任都有一箇條陳其實只是套子不拘得個温㫖嚴㫖就是臣延登奏臣昨本非敢狥情只因目前二月該推陞之期前奉㫖御史差上者不准陞在籍者亦無多人此本不得不請㫖遵行上曰考選科道祖制極是慎重不論方隅不拘甚麽人都可教他做只要取歴練老成蓋為老成則自然正直誠朴沒有那虚囂詭詐的事情了如今的考選只憑那一篇文字你們中過科目的文字原是㑹做專考他何用試御史原是試他才能果堪方纔實授今做了試御史就必定實授再不下來了科道陞慣京堂視為㨗徑就極不堪的也陞布政按察兩司去了陞知府的都少這是怎麽說上又諭三臣曰文武本原在吏兵風勵在都察院責任不輕且莫説用的都是賢才但六部都察院七員都是賢才便能治平如今邊疆不靖烽火震驚流賊蔓延何等時候文武諸臣不求匡襄實績單借虚名張大其説落於史冊昨九卿公本科道公本詹翰公本内中也有不願列名的也有是寫上若不着上名就不是了王坤疏來有㫖責他妄言已存體了王志道疏内許多誣揑着實不堪奉㫖詰問回奏纔少平些臣長庚奏皇上屢諭甚明遣用内臣為兵馬錢糧不得已而用近因王坤一疏叅論閣臣及在廷諸臣出於兵馬錢糧之外不但諸臣不能仰體皇上遣用内臣之心王坤亦不能仰體皇上不得已之心所以具有公疏至於王志道今語激切無倫誠為有罪但言雖有謬心實無他伏望皇上寛宥至於有罪者不獨王志道一人臣等俱為有罪統候皇上寛宥上曰卿等公本意在存體防微㫖已明白國之大臣朕所倚仗不可如小臣輕佻不諳事體借個題目就做起來今大敵要東就東要西就西如入無人之境尚可謂中國有人麽這個不羞不憤却羞憤别事臣長庚奏聖上屢諭甚明自有聖斷臣等自宜靜聼聖裁其王志道回奏因威嚴之下言語瑣瑣冐瀆臣等都説他不是總之諸臣為求寛宥之意至於聖上不得已之心閣臣嘗傳於臣等盡知在外小臣有不盡知的所以過疑又諸臣之罪俱有本末各自不同上曰靣諭已眀不必又說上又召六科十三道吏科都給事中劉斯􅀈等河南道掌道御史李日宣等俱出班跪上曰爾等俱是言官以言為職若條奏切實有裨軍國直言讜論朕甚樂聞如何動稱言路閉塞又說似通而實塞你們議論不管行得行不得只條陳一本塞責還有只為情靣賄賂的成何言官就如各處兵馬錢糧那一處不差爾等查核何曾肯摘發奸弊到壊了事又身處其外要差爾等何用平日具疏每隱顯閃爍就是叅一人也不指他實蹟薦一人也不指實他名節都故意如此還有做的不好的就是叅堂官一本呌他不便考核吏科都劉斯􅀈奏臣等職任言路有聞必告一毫不敢欺皇上上曰有聞必告這一句話是從心裏說出來是從你口裏説出來你們有一疏定有一緣故與那疏中所説之事不相干言官為朝廷耳目不聰明諸事俱廢了自己作弊到説别人作弊自己壊法反説别人壊法豈成言官以後如有把持囑託行賄的發覺出來自有祖宗之法在上命起去科道俱承㫖歸班上曰方今多事之秋大小各官通要實心實意做事諸臣盡出班跪上曰既做一官就有一官職掌件件都該憂思件件都該打算天下方能治平不可借一虚名張大説去徒滋煩凟輔臣延儒奏目今時事多艱各官本等職尚料理不來那虚名空言有何益於朝廷適大小諸臣欽奉聖諭自當儆省惕勵實心營職不敢輕率紛擾只臣等才力庸淺雖辦事閣中此心不敢不盡其實毫無幹濟上曰卿等匡贊居多近來言官上疏動輒說知票擬也只是擬得候朕裁奪難道擬了就是了何不竟說是㫖又説個擬字今言官見一㫖意就問道何人票擬最為可惡輔臣延儒奏臣等職掌正呌做㸔詳章奏一應㫖意都是聖裁王言臣等也只是禀承奉行上曰這個也還論事體如何有可的卿等贊襄有不妥的卿等匡救卿等在外邊聞見真至於只説卿等票擬難道竟不候朕裁奪輔臣延儒奏外廷人情揣摹議論票擬一節果是有的大抵或因奉了嚴㫖或所言不行就議論到票擬上來總是借名責備其實臣等都全不照管上曰若是照管就沒有這些話説又如朕所裁的便説是中㫖中㫖兩字是怎麽説是從宫中傳出來的是不應從宫中傳出來這不可解輔臣延儒奏這個議論到是沒有那中㫖之説還指數年以前恭惟皇上御極乾綱獨攬事事親裁不惟臣等深服即外廷亦毫無間言輔臣温體仁奏果然外廷絶無異議輔臣温體仁又奏閣中㸔詳原稱密勿外廷何由而知輒傳係某人票擬這都不是通應嚴禁上曰正是内閣舊制原不許外人擅入前卿等曾經條飭就是跟隨人役也都有限制如今還要嚴謹上謂延儒曰卿職掌甚重今後中書等官與跟隨下人都要着實申飭有不遵的叅來重處前日如童夢蘭這様的最為可惡輔臣延儒奏外人自可譏防這是該閣中供事員役所以防範不到正是臣踈庸之罪上曰以後嚴飭中書等官不可容留這等員役在内輔臣延儒承㫖歸班上曰方今民窮財盡各處盗賊生發都是從東事起必須東事平了百姓方可安寧這個事不做如何專做題目圖個名色好聼輔臣延儒奏各官好名之念果是有的皇上待之有道自然無名可沽上命卿等起來諸臣承㫖歸班上命賜茶諸臣出殿門外叩頭謝恩而出至二月初九日奉㫖王志道風憲大臣輒敢藐玩屢諭肆臆誣揑借端沽名臣誼安在本當重處姑從輕革了職為民目今邊疆多警民困時艱朕衷日夕靡寧大小各官俱宜洗心急公修舉實職以副委任不得挾私紛擾徒淆國事以後有違的嚴治不貸召對劉總憲宗周紀崇禎十五年閏十一月二十九日上常朝畢有㫖傳内閣五府六部九卿科道等官及起居記註官來中左門召對賜各官茶餅午刻上出御門各官行叩頭禮畢上諭九卿科道公議督撫去留處分限五日内如何不見回奏各官皆出班俯伏吏部左侍郎王錫袞奏二十三日奉㫖公議督撫次日即傳知㑹約於二十七日集中府㑹議二十五日大選二十六日冡臣鄭三俊偶病未出止移文各衙門令具議單送臣部酌定今單尚未繳所以稽延上曰時事甚亟如何可遲今日就於直房公同確議禮部尚書林欲楫奏要地督撫關係甚重議去一人必先就近擇一堪代者如未有其人而遽議去者五日京兆恐誤封疆上曰前有㫖諭選才望堪任的即推不得聼人規避有不堪的即時更換總要大公至正可作速確議上又諭科道官來吏科都給事中吳麟徴奏臣等識見庸淺不能仰副皇上求言之意或言之不當或言之過切又蒙皇上一槩優容以致諸臣忘其愚賤輕有䀨凟如同官姜埰干犯天威亦皆臣等之罪但姜埰作令清苦居官勤飭身體孱弱多病伏望聖恩寛宥上曰目今敵騎深入將及兩月既不能禦之於外又不能勝之於内以至畿甸震驚何可復言爾時聖容惻然垂淚曰朕無靣目見爾等只以優容為言前日御史王孫蕃叅内臣王裕民即時正法何甞不納言初九日朕諭内有一段申飭言官爾等各宜警省無則加勉有則改之時大臣有庇薊督范志完宣督江禹緒者言路欲攻之不密大臣先請上申飭上不悟也姜埰不遵朕諭反來詰問安得不重處爾言官以言為職當言的不敢言敢於欺藐二十四氣之說事同匿名見者尚當焚燬乃屢見奏章不得不於姜埰疏上一問吏部侍郎蔡奕琛貪狡異常御史成勇叅之下撫按察經年不敢問科臣袁凱孫承澤力紏逮之至京復揑二十八宿錦囊計邪說希餙罪刑部審明擬奕琛戍發遣後復揑二十四氣匿名帖託其親官金吾者掲之皇城内外前此為枚卜處分六人此番劉公金公皆氣中人蓋已深中其毒矣爾言官為朝廷耳目自己不正何能正人文武大小諸臣各盡其職何難却敵精神都不用在國家上敵勢如此諸臣同在漏舟之中誰無忠義誰無亷恥但不肯奮發任事都是一味浮泛瞻狥麟徴奏皆由用人不當如目前要地督撫委實不堪言官多有論列但言官職在紏彈用舍原在吏部先臣王恕馬文升做吏部時言官紏彈一疏有多至一二十人者及下部覆必詳細分别某人應留應去某人言當不當彼時言官亦無敢譁言官只管言即言之當否與稱職不稱職自聼朝廷處分此後邊疆用人言官紏正吏部詳核更得輔臣主持天下事猶可為上曰已屢有㫖了麟徴奏頃熊開元亦以奏詰輔臣周延儒得罪雖是出位妄言苐諺曰家貧思賢妻國亂思賢相封疆事敗壊至此豈得不責備首輔此亦人情所必至總是姜埰無知出語不倫開元亦是熱膓但言之不當上曰熊開元假託機密陰行䜛譖小加大賤凌貴漸不可長前㫖已明起來黄澍奏徃河南慰安周王賑恤安民上嗔其奉差已久起身太遲戶科廖國遴紏宣督江禹緒委卸御史周燦請逮不用命行間諸臣御史楊若橋舉湯若望教習火器左都御史宗周駁之謂國之大事不專恃一火器近來通不講人才不講兵法任賊到一處殘一處到一城䧟一城豈無火器湯若望向年倡說天主邪說蠱惑中國人心堂堂中國止用小伎禦敵豈不貽笑天下又奏若望小小伎倆何益成敗之數只要法紀修明賞罰妥當使人心震悚庶幾閫外用命可望成功上曰如今從頭整頓做起還該做那一件宗周對惟在皇上命吏兵二部慎選督撫簡將練兵若是文官不要錢武官不怕死何愁不太平如今只管說選才望不論操守致有使貪使詐貽害至此上曰督撫自是要才守兼全宗周奏須操守為主上曰大將另有一段才幹不是區區有操守的便做得宗周奏范志完平日操守不好今又貪冐尅兵以致軍心渙散上曰知道了戶部尚書傅淑訓又救熊開元姜埰上曰靣諭甚明不必申救宗周奏朝廷待言官有體言官進言可用則用之不則置之即有應得之罪乞敕下法司原情定案今熊開元姜埰狂躁無知不能無罪但以皇上急切求言而二臣因言下詔獄大於聖政國體有傷恐非皇上求言初意臣願皇上俯念時事艱危擴聖度於如天以開諸臣諍諫之路如臣宗周曩亦因言獲罪中道再疏冐凟蒙皇上不加斧鉞放還田間復荷賜環起用是臣之罪實甚於二臣臣何幸而遇皇上之優容二臣何不幸而不蒙皇上之恩宥也臣又有說於此前黄道周言語激烈有朋友不能堪者我皇上不但待之以不死且在起廢之列今二臣戅直不及道周道周何幸而遇破格之恩二臣何不幸而不蒙法外之宥也上曰人臣見有無禮於君者即當紏劾三法司錦衣衛俱是朝廷衙門你説言官有體假使貪贓壊法欺君罔上溷亂紀綱的通是不該問了宗周伏地叩頭奏云臣謹請罪上諭曰黄道周聞他有學有守用係特恩怎得引他比例似爾愎抝偏迂成何都察院卿等起來劉宗周候㫖處分閣臣周延儒等合詞申救蔣徳璟吳甡言之尤力刑部尚書徐石麒奏臣在直房與同召諸臣商議熊開元姜埰有罪仰干聖怒臣等宜代為請罪叩頭乞恩俟聖俞始起不意臣需次未言劉宗周隨即申救語言戅直若論起事罪實由臣伏乞皇上將臣處分寛宥宗周不勝感激左僉都御史金光宸奏劉宗周申救姜埰熊開元非從二臣起見幸逢聖明從諫如流無非願皇上為堯舜之君廣納言之美主聖則臣直一時不識忌諱伏乞俯賜優容兵部尚書張國維奏劉宗周清執素著即如臣受事之初宗周相㑹即以操持砥礪謂欲整釐部務在端本澄源臣服膺其語但於朝班相遇一切調度每多商畧方今多事之時老成當惜伏乞聖明寛宥上曰熊開元這疏定有主使想是劉宗周主使了主使之説先有大臣密掲熊姜二人在北司已嚴刑問主使之人上諭但打死有我作主不妨語兵部左侍郎馮元飈哭泣救爭衣袖盡濕金光宸又奏頃臣聞皇上諭熊開元疏想是劉宗周主使臣以宗周賦性硜直客也不㑹與熊開元實不相徃來宗周與臣同官臣極知他就是前日恭聆皇上面諭不但姜埰熊開元二臣有罪臣等俱有罪皆惶懼不安即宗周在外邊與臣等也說他不是因皇上靣諭遂不覺以忠愛之心披納牖之益其實從君徳起見宗周在衙門百事整頓即皇上所頒憲綱見在奉行日與諸御史申飭前同臣察理城守不避風寒老成可念上曰金光宸也着議處光宸奏臣忝風紀之地每與宗周言要天下治安全在撫按若撫按盡得其人天下太平宗周為人清直在衙門就是不動聲色人心也是振肅的皇上若是留他這個老臣願將臣罷斥臣如有一字之欺願甘斧鑕工部尚書范景文及五府勲臣同出班力救上曰靣諭甚明卿等不必申救起來劉宗周金光宸先出候㫖爾九卿科道在直房議來奏時已過酉諸臣入直房㑹議督撫去留處分事隨列單恭進傳諸臣各退召輔臣再入隨傳㫖劉宗周革職刑部擬罪即奏閣臣持不發同捧至御前力救首輔言詞甚婉蔣徳璟曰向前唐太宗惡魏徴直諫入宫怒説㑹須殺此田舍翁皇后具服賀曰君仁則臣直語未畢上遽曰唐太宗才朕所不如若論閨門徳行朕亦不學他吳甡奏皇上當學堯舜安肯學唐太宗只是唐太宗巧於取名上問怎説甡奏人臣敢言的用之則名在人主罪之則名在人臣太宗本不喜魏徴故欲優容他以自成其名上黙然久之乃去刑部擬罪數字時刑科都給事中孫承澤以病註籍次蚤上疏云為聖度本自如天憲臣去國可惜伏乞俯賜轉環以光聖徳以重風紀之任事臣聞風紀之司國是寄焉得其人則足以肅百僚失其人則無以定衆志故恒當慎重其選未可輕為更置也邇蒙皇上起劉宗周於廢籍而為風紀之長臣適奉差在外逺邇相傳無不加額以為聖朝美政及臣北上見其經過之地人曾望其丰采及聆其語言又無不轉相稱説以為慶幸盖宗周四朝耆舊一介孤清事必合乎古人行必凖之理道其迹似迂其氣近戅要本之忠君愛國而其學無欺昨蒙召對語詞過激衆為之危仰頼聖度寛容不加嚴譴我皇上之量真天地覆冐之量也我皇上之心真堯舜闢門之心也在宗周不知如何感激如何追悔行且青衣小㡌䇿蹇就途臣意近年來署位之間規利圖便恬不為非以致是非不明功罪罔定外邊内賊相因益熾自舊臣登用始知人間有亷恥事語云山有猛虎藿藜為之不採言國之重臣不可無也今宗周就職未久突不及黔落職逺去士論能無共惜至僉憲臣金光宸冰蘖為心薑桂成性正色立朝有古大臣風徃年按豫愛民如子嫉貪如讐一時墨吏望風解綬豫之人官於京師者類能言之幸於摧折之餘畀以佐憲之任今亦以語言失檢同時獲罪在二臣戀主固有熱腸而恬退亦其本性但兵戈壓境之日豈放逐舊臣之時在朝廷無不愛惜之人才在臣子難廢執奏之大義伏望聖慈矜其小過錄其生平允大小臣工之請還兩臣原舊之職必能益勵晚節振揚風紀所裨於國是不小矣臣患病伏枕因思大政所關不避斧鉞倘蒙皇上留二臣而罷斥微臣即死有餘榮矣上令部議處罰俸三月又次日劉公騎一驢一僕負襆被出順城門金公降調聞艱歸徐公石麒亦投劾去春明夢餘錄卷四十八
