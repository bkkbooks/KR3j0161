body:
  text: 春明夢餘録卷七十吏部左侍郎孫承澤撰陵園京東北平谷縣境内漁子山有大冡俗呼軒轅臺相傳為黄帝陵舊有廟今圯黄帝都冀故其陵在冀境内舊云在橋山又曰在寧州非也至鼎湖龍髯之説則益荒唐矣薊州東北有崆峒山問道廣成子處今陜西崆峒山有元鶴謂為黄帝時物恐亦神其説耳燕昭王墓九州要記曰在古漁陽北之無終山一統志云在府西清河岸側之燕丹村昭王墓前有斑狸化為書生欲往見司空張華時墓前華表亦神語班狸曰張公難籠絡子非但自誤亦且誤及老表遂見華容止風流華雅重之論及文史互有勝負言卒便退華已使人防門不得出豐城令雷煥謂華曰此千年老精必千年枯木照之則形見遂使人伐昭王墓前華表伐者聞華表歎曰老狸果誤我於華表穴中得青衣小兒長二尺餘使還未至洛陽而變成枯木遂燃以照之狸露真形燕靈王墓在城東金大定中改塟兩墓相連東墓之柩題其和云燕靈王舊舊蓋古柩字秦太子墓在大城北段堤村始皇廵狩駐蹕於此幼子亡塟此遼章宗陵在京東三河縣北五十五里金太祖太宗陵在上京貞元三年命大房山雲峯寺為山陵建行宫於其麓宫成名曰盤寧命判大宗正寺京等如上京遷太祖太宗梓宫塟太房山太祖陵名曰睿陵太宗陵名曰恭陵宣宗塟德陵章宗塟道陵二陵在大房山東北萬夀王冢在阜城門外之西碑存元人無陵遇大䘮棺用楠木二片鑿空其中類人形小大合為棺置遺體其中殮用皮襖皮㡌靴襪繫腰盆盂俱用白粉皮為之殉以金壺瓶二盞一碗碟匙筯各一殮訖用黄金為篐四條以束之送至直北園寢之所深埋之用萬馬蹴平候草青方已使同平坡不可復識嘉靖二十四年禮科右給事中陳棐疏云國家於歷代帝王陵寢之祭自伏羲以至宋孝宗三十五陵所祭之處俱實有陵墓惟順天府所祭元世宗陵絶無陵所但權於府西廟址掃堦蓆幄以畢事夫既曰祭陵而實無陵臣以為通罷之便明太宗永樂七年五月己卯營山陵於昌平縣遂封其山為天夀山時太宗擇夀陵乆不得吉壤而仁孝皇后尚未塟禮部尚書趙羾以江西地理術人廖均卿至昌平徧閲諸山得昌平東黄土山最吉遂即日臨視定議封為天夀山陵前為總神路又為門門外刻石文武大臣象獸石柱及牌樓南為紅門門内為拂塵殿外為石牌坊各陵寳城正前為明樓樓前為石几筵又前為祾恩殿為祾恩門各陵殿舊名享殿嘉靖十七年上躬祀天夀山始名殿曰祾恩殿門曰祾恩門祾者祭而受福之名也恩者罔極之思也門外為聖蹟碑亭為神庫神厨宰牲亭明成祖文皇帝后陵曰長陵明仁宗昭皇帝后陵曰獻陵在長陵西明宣宗章皇帝后陵曰景陵在獻陵東明英宗睿皇帝后陵曰裕陵在景陵西孝肅皇后祔明憲宗純皇帝后陵曰茂陵在裕陵西孝穆孝惠皇后祔明孝宗敬皇帝后陵曰泰陵在茂陵西明武宗毅皇帝后陵曰康陵在㤗陵西南明世宗肅皇帝后陵曰永陵在景陵東孝烈孝恪皇后祔明穆宗莊皇帝后陵曰昭陵在康陵西南孝安孝定皇后祔明神宗顯皇帝后陵曰定陵在昭陵北孝靖皇后祔明光宗貞皇帝后陵曰慶陵在裕陵東南孝和孝純皇后祔明熹宗悊皇帝陵曰德陵在永陵東恭仁康定景皇帝貞惠安和景皇后陵在西山前為享殿為神庫神厨宰牲亭内官房成化年建碑亭於門左嘉靖二十一年以神碑偏置門左非制乃改建於陵門之外世傳西内老佛正統五年十二月廣西思恩州知州岑瑛遇一老僧於道從者呵之不避詰其度牒乃楊應能也自言此非吾姓名自金川失守大内火起吾遂濳由地道以出自湖湘入蜀至雲南復至閩最後入廣西至横州南門夀佛寺居居十五年僧徒歸者日衆吾復遁往南寧陳歩江一寺而歸者復如之乃又去南寧雲遊四方以度歲月迤邐至此淪落江湖垂四十年老朽殆盡早晚入土無能為矣願送骸骨歸瑛大駭聞於廵按御史奏之驛送赴京號為老佛途次賦詩云淪落江湖四十秋歸來白髪已盈頭乾坤有恨家何在江漢無情水自流長樂宫中雲氣散朝元閣上雨聲愁新蒲細柳年年緑野老吞聲哭未休及至京朝廷未審何人以尚膳太監吳亮建文時内使也使之審視老佛亮見即曰不是曰我昔御便殿時棄片肉於地汝伏地餂食之何謂不是聞楊士竒尚在能出一認乎亮佯為不知已而復命遂取老佛入西内夀終塟西山不封不樹載史仲彬致身録王世貞建文還國辨曰建文之出奔王文恪陸文裕鄭端簡俱詳載其事以為天順中出自滇南呼寺僧曰我朱允炆也胡濙名訪張儠㒓其實為我衆聞之大驚以聞詔傳送入朝衆無識者僧曰固也太監吳誠俾來騐之亦不識曰吾賜汝鵞肉汝兩手俱有所執伏於地而口餂之記否誠始拜而哭命居大内以夀終塟西山不封不樹而史不及之豈有所諱耶薛應旂憲章録則言正統十二年廣西思恩州獲異僧陞州為府以知州岑瑛為知府瑛初遇老僧於道從者呵之不避詰其度牒乃楊應能也曰此非吾姓名吾有所託而逃耳汝不聞金川門事乎瑛大驚送至京師使尚膳太監吳誠試之其説如前攷之史苐云正統五年有僧九十餘自雲南至廣西紿人曰我建文也張天師言我有四十年苦今為僧期滿宜亟返邦國以黄紙為書命其徒清進持詣思恩府土官知府岑瑛執送總兵官柳溥械至京會官鞫之乃言真姓名為楊行祥河南鈞州白沙里人洪武十七年度為僧歴游兩京雲南貴州至廣西上命錦衣衛錮禁之凡四踰月死獄中其同謀僧十二人俱謫戍遼東邊衛此事與應旂紀相近然應旂實借此附會前説耳其人乃楊行祥非楊應能也建文以洪武十年生距正統五年當六十四不應九十餘也是時英宗少三楊皆故臣豈皆不能識而僅一吳誠識之識又何忍下之獄而死戍其同謀十二人也且事發於正統五年非十二年也思恩固府未聞某年陞州為府也野史又載建文詩凡三首後二詩不及前之悲切而自然恐皆好事者附會也大抵建文出亡與否不可知僧臘已高當滅跡以終必不作此等詩以取禍亦必不肯出而就危地所以有此紛紛者止因楊應祥一事誤耳顧起元曰國朝壬午之事建文皇帝遜位自鄭海鹽薛武進皆以為實然至正統復出移入京師大内云云非載於紀傳然余考之西山不封不樹之説毫無髣髴使當時果有之於時禁網業已漸弛於洪熙之後何所諱而人遂不一志其處也且以帝之遜為真邪龍而魚服矣鳯而鴻㝠矣何天不可摩而飛何地不可鍤而葬孝康之祀忽諸又何所戀戀於京師一坏土也弇州謂正統復出之説妄直據史斷之其言良為有見余又疑靖難師至日捕官搜姦爬梳亡遺當時誰敢指后屍誑以為帝者紀又載葬帝以天子禮夫禮以天子陵寢今在何地既不為置陵守冢又何云以天子禮葬乎此兩説者姑以意逆之存疑焉可也崇禎十五年給事中沈𦙍培疏竊見駙馬都尉鞏永固一本奉㫖着該部科詳酌確議臣不覺舉手加額曰皇上脩明舊章無幽不闡請諡建文於此日真千載一時殆祖宗隂牖之使言而成我皇上繼述之善也按臣祖子木為銀臺時具疏請祀建文大畧言建文君髙皇帝太孫懿文太子嫡子五年御宇統順系明生為金潢玉牒之主沒含斷蓬飛草之怨心竊痛之成祖用王景議以天子禮葬遣官致祭輟朝三日而成祖之不欲廢其祀可知也恩詔褒祀死節諸臣是忠於建文者宜祭祀乃建文何獨不得祀因請祀於孝陵髙皇帝之傍或懿文太子之側疏下部覆如議留中不報而要非臣祖一人之私言也方𢎞治中禮部主事楊循吉亦嘗請追諡建文而以景皇帝及元順帝為比謂親親固當視景帝避位尤當視順帝人皆誦其不刋暨萬歴十六年國子監司業王祖嫡復以建文不宜革除景泰不宜附録並形奏辨乃景泰附録改正而建文年號報罷直至二十三年九月神宗始允禮臣范謙覆科臣楊天民臺臣牛應元等疏而奉有建文事蹟着附載太祖髙皇帝紀之末仍存其年號之㫖其難其慎越今又四朝矣推而論之不帝何以編年不帝何以議享存其年號不得不復其帝統復其帝統不得不酌其徽稱與脩其祀典事本相因理原一貫合先後諸臣之章奏神宗霈發之明綸已示顯號鴻名之漸矣且成祖不嘗曰欲法周公輔成王乎令孺子而在未必不復辟也又不嘗稱建文為少帝乎位號依然並未如景泰之追廢為郕戾王也且建文得統於髙皇帝尤非若景泰之因危擁立也乃一則尊崇於易世之後一則冺滅於數十代之餘不過謂表章遜國則靖難無光而不知天與人歸成祖自不能避征誅之迹勢窮事去建文亦何必存揖讓之名要以承祧有主即冢君避野原無傷太祖之心况一脉相傳則繼體開天更逓禪文皇之緒而何嫌何疑之有哉皇上至仁符堯虚受邁禹逺希憲廟追崇景帝之規近體神宗褒表忠魂之意則臣有四説於此察觀實録令建文自為本紀無溷附以成萬世之信史一可議也祛西山不封不樹之訛而考尋成祖禮𦵏之蹟因以表為陵園二可議也倣恭仁康定之諡法而斟酌於二字四字之間三可議也即園為寢而春秋二享掌於南奉常四可議也夫然後皇上之心盡二祖列宗之心盡而三百年來臣民之心亦無所不盡念祖徳而隆孝思恢皇謨而舉廢典端在此矣鞏都尉上疏請以建文君入祀典崇禎帝曰建文無陵從何處祭盖建文之死史謂塟以天子之禮所塟之地南中杳然也又傳謂西山有天下大師之墓在金山寺後余在退谷幾經尋訪又杳然也崇禎帝謂其無陵信矣然加號存祀之典卒未舉行誠缺事也附載洪武乙卯冬十月詔定陵寢朔望節序祀禮時禮部學士樂韶鳯等奏每嵗元旦清明七月望冬夏二至日用大牢其伏臘社每月朔望日則用特羊祠祭署官行禮如節與朔望伏臘社同日則用節禮從之十五年夏遣使訪帝王陵寢先是上閲宋史見宋太祖詔脩厯代帝王陵寢嘆曰此美事也遣翰林編修蔡元侍儀舍人李震亨陳敏于謙等四方求之仍命各行省之臣同詣所在審視若有廟祀並具圖以聞於是陳州有伏羲氏商髙宗孟津漢光武鄭州周世宗鞏宋太祖太宗真宗仁宗酃神農氏寧逺舜帝延安軒轅氏西安周文王武王成王康王漢髙祖景帝咸寧漢文帝興平漢武帝長安漢宣帝富平後魏文帝扶風隋髙祖三原唐髙祖醴泉唐太宗蒲城唐憲宗涇陽唐宣宗滑縣髙陽氏髙辛氏内黄商中宗順天元世祖東平堯帝曲阜少昊氏趙城媧皇氏縈河商湯王會稽夏禹王宋孝宗凡三十六陵是年遣官行視帝王陵寢遂禁樵牧設守陵戸陵二人三嵗一傳制遣道士奉香詣諸陵令有司致祭皇帝即位遣官祭告嘉靖中又有武功姜嫄后稷之祠慶都堯母之祠二十六年令車馬過陵者及守陵官民入陵者百步外下馬如違者以大不敬論躬謁陵寢記萬厯八年三月上奉兩宫皇太后率后妃謁陵行春祭禮辛亥發京次鞏華城從官行禮畢薊遼總督官梁夢龍昌平總兵官楊四畏及昌平州官吏師生朝見於行宫賜元輔張居正及次輔張四維申時行膳酒有差壬子駕發鞏華城至天夀山紅門降輦由左門入兩宫皇太后陞輿上駕前導后妃後隨至感思殿侍膳畢上陞座從官行叩頭禮本日駐蹕感思殿祭日質明上具青袍奉兩宫皇太后率后妃乗輿至長陵門東降輿皇太后后妃於陵殿左右設障屏少待導引官導上至左門外典儀唱執事官各司其事内賛對引導至拜位奏就位詣前上香上三上香跪訖復位四拜傳賛同奠帛行初獻禮導至御案前獻帛導至文皇帝御座前獻爵又導至文皇后御前獻爵復位跪傳賛衆官皆跪讀祝俯伏興平身傳賛同亞獻禮終獻禮執爵者代獻四拜傳賛同讀祝官捧祝進帛官捧帛各詣燎位上退拜位之東捧祝帛官出殿門禮畢傳賛同百官上幄次即次出先謁永陵候駕執事官徹牲設酒果脯醢上奉兩宫皇太后率后妃入女官奏就位行四拜禮奏上香女官捧香皇太后三上香訖奏復位跪皇太后跪后妃皆跪上跪於皇太后之左讀祝官跪於上後讀訖奏興四拜禮畢出次詣永陵昭陵行禮如長陵是日遣公徐文璧侯李言恭伯陳王謨杜繼宗陳景行李偉分祭獻陵景陵裕陵茂陵泰陵康陵都督沈至祭景皇帝陵寢李鶴祭恭讓章皇后中官祭憲廟廢后吳后都指揮僉事蔣克謙祭哀冲莊敬二太子各陵園侯張建元祭天夀山神初擬本日仍駐蹕感思殿聖母與上聞陵所艱於得水且因念六軍恐難以乆屯必須當即日駕回鞏華城以扈駕謁陵行禮畢賜輔臣張居正張四維申時行白金紵幣諭兵部以遼薊昌平迎駕官軍防䕶辛苦給賞如京軍例又次賞宣大頂闗防䕶官軍以示朝廷撫恤恩優垂念邊兵之至意諭户部曰朕兹躬謁山陵經過地方百姓勞苦本年分田租量與蠲免以示優恤甲寅駕發鞏華城暫駐蹕功德寺行宫復賜輔臣酒膳奉兩宮聖母后妃御龍舟回京文武百官軍民耆老俱於西直門迎駕上還宮是行也上自發京以至還宮往來皆乗馬諸供億悉從省約居人老幼扶擕載道瞻仰歡頌達於遠近户部請照隆慶二年例昌平州宛大二縣免十分之五從之察勘皇陵紀崇禎辛巳四月二十五日辰時上召成國公朱純臣恭順侯吳惟英新樂侯劉文炳駙馬都尉萬煒鞏永固宣平伯衛時春禮部尚書林欲楫侍郎王錫袞蔣德璟來中極殿時臣璟方病㵼即力疾入午門直房同王公小坐旋入左掖門纂脩館待林公頃之諸公及内閣四位俱到入皇極殿旁直房坐是時方祈雨用青布袍角帶而上傳令用青錦繡本等服色諸臣相顧未敢信内璫亟趣之急令辦官出持袍帶入換交揖畢即同入𢎞政門内璫再趣云上御中極殿已乆即魚貫入中左門循殿垣高下可四十級到中極殿外鞠躬入分東西班檻外一拜三叩頭畢上曰卿等進來攝齊入殿内東西立上曰成國公等過來禮部過來同過中跪上曰孝陵為高皇帝弓劍之所闗係重大會典所載近陵不許開窑取石斫伐樹木禁例甚嚴近來法乆人玩於原額四窑外開得甚多及燒鑿紅石傷損樹木等項雖經南中諸臣回奏還須特遣重臣親勘卿等有所見各奏來勲戚六人各通職名奏畢大約皆言奉命往勘不敢輕狥情靣等語尚書欲楫奏勘陵須用通曉地理者同去聞有上林苑監楊應祥頗曉堪輿可取來同看上命即取楊應祥來左侍郎錫袞奏臣向為南京司業祭酒頗知孝陵事體上遽令勲戚諸臣起惟禮部三臣靣對錫袞復奏孝陵自花山以下屬句容以上屬上元向有祖窑四個天啓後漸添頗多宜行拆毁右侍郎臣蔣德璟奏孝陵在鍾山古稱龍蟠虎踞之地最為形勝其龍脉從茅山來歴燕岡武岐華山白雲峯龍泉庵一帶至陵可九十里祖制附陵二十里内禁例甚嚴今新開諸窑若碍龍脉自當嚴禁只是愚民無知以前似不必究臣又見宗室舉人朱統鐼曾有疏言孝陵水口闗砂諸處亦有私取紅石并陵後龍潭一帶皆當查看又前歲有涇縣百姓全大功疏言泗州祖陵鳯陽皇陵二處亦當照管上曰是全大功閣臣旁立對曰是全大功臣再奏泗州地稍低聞大水時幾没陵山砂脚鳯陽陵龍脉來處聞亦有開鑿池塘者上傾聽曰這奏向不曾聞得顧問閣臣皆謝不知上命臣等起來隨曰賜宴坐臣等出檻外跪謝因叩頭言時方祈雨齋宿不敢用酒上曰特賜酒又謝不敢坐上命即遵㫖入坐隨命内璫布席計十三人各一席四閣臣及林尚書同坐係長桌用金蓮花杯臣錫袞臣德璟同坐鍍金蓮花杯杯高大如瓶圓可四寸下有三小蒂承之旁有荷柄儼然一大蓮花也其勲戚諸席在西皆御膳所自備蔬果各席可三十餘器皆精潔席各二花瓶插蓮花中璫云未入時上自就各席觀之且手自安花云隨召光禄寺官八人入行酒酒有異香皆出御厨非光禄辦也酒三廵湯三飯一而上以齋不用酒既畢出席謝上曰右侍郎來德璟出班將過上連曰右侍郎蔣德璟來臣即過中跪上曰上來膝行數歩上曰再上來再膝行數歩如是者三距御座可丈許上曰汝纔奏的再奏來臣對孝陵前對茅山後枕大江高皇帝弓劍之所自當慎重上曰泗州鳯陽事再説來臣奏臣未曾到鳯陽亦未知其詳只部中見全大功疏是如此説祖陵只禁附陵二十里此外皆與民同所以愚民不知間有開鑿灌注須查果係龍脉與否如不係龍脉則民生水利亦當照管其泗州因高陵一帶地勢亦低聞下靣閘板不甚消水所以水勢壅塞時有渰浸之患上顧問閣臣曰這奏説的是鳯陽泗州須一并踏勘閣臣承㫖訖臣璟將叩頭起上又令再奏來臣奏中國有三大幹龍中幹旺氣在中都結為鳯泗祖陵南幹旺氣在南京結為鍾山孝陵北幹旺氣在北京結為天夀山諸陵這三大幹本朝獨會其全真是帝王萬世靈長之福上曰這三大幹都從崑崙山發脉來臣奏誠如聖諭儒者言南北兩戒南戒自岷山嶓冡來負地絡之陽至揚子江入海為南京北戒自黄河積石來負地絡之隂至天津入海為北京是兩大戒山河形勢皆兩京收住上曰這北戒是至天津入海麽臣奏北戒自太行山一帶過天夀西山入京城至天津便是大海結聚處就是西山一帶龍脉過處亦不宜開窑口上曰西山一帶亦當照管起來傍立上廻顧乆之即曰成國公新樂侯禮部尚書來三臣同過上曰今命卿等三人特徃南京孝陵會同奉祀及守備神宮監禮部禮科察勘附陵三十里及龍脉經行處并左右砂水俱不許開石燒灰凡新添窑房悉行拆毁樹木樁楂或宜移去或宜栽補俱詳察便宜行至泗州祖陵鳯陽皇陵一并嚴行踏勘如有勢豪大姓把持立行叅奏治罪欲楫奏楊應祥江西人今丁憂回籍恐不在家有原任禮部郎中今陞浙江提學副使王應華係臣舊屬官如楊應祥不在即取王應華來上曰一并行文取來因賜成國公路費二百兩綵緞二十表裏新樂侯路費一百五十兩綵緞十五表裏尚書林路費一百兩綵緞十表裏命再賜茶即同出檻外叩頭而出時天氣尚熱闢四大門薰風習習上寳座周圍刻金龍形一片黄金璀璨也内置金椅及御榻以黄綾衣之諸臣就席時上用茶間覽案上文書司禮監大璫傍立侍而諸臣坐真盛事也祖制宴羣臣皆在午門外文華門外惟郊祀慶成宴三品及學士在皇極殿永樂中召坐西内圓殿宣德中召儒臣入萬歲山廣寒殿又召遊太液池皆賜宴嘉靖中賜宴西苑然不聞侍坐亦不聞在中極者盖正統後坐禮乆廢今上崇禎十三年始議行之而中極自賜宴親王外從來未有也是日上立傳内閣取朱統鐼全大功本查統鐼疏在丁丑四月全大功疏在丁丑閏四月閣中不知也搜尋乆之始上然當時僅票統鐼疏有祖陵泄水故道宜清孝陵來脉小民鑿石及句容建坊祭葬事情著該監撫按作速脩理禁飭而大功疏則票已有㫖而已上遂特發㫖二百餘言詳述孝陵及鳯泗二陵察勘事情仍鑄闗防給勅書以行禮部侍郎臣蔣德璟恭記附蔣德璟鳯泗皇陵記泗州與旴𣅿縣夾淮而居相距五里許度浮橋從州城外㳂淮北行十里渡小河即基運山也山一片皆漫土嘉靖中始改稱基運云易輿以馬入御碑亭佳氣蔥鬱古栢萬株數百歩為紅門旁即祠祭署也世襲奉祀朱自讓來迎引入殿前行五拜三叩頭禮殿前竪石闕四石獸十六石馬六内臣控馬二朝臣十四殿内三黄幄置神座德祖元皇帝后居中南向即高皇帝高祖也懿祖恒皇帝后居東西向熙祖裕皇帝后居西東向其陵寢神宮御器一如孝陵及天夀制殿門後即熙祖陵所稱萬歲山者也高皇帝以世湮遠不輕祖故斷以德祖為肇基而德懿二陵經兵燹亦失其處故止於熙陵寢殿行望祭焉龍脉西自汴梁由宿虹至雙溝鎮起伏萬狀為九岡十八窪從西轉北亥龍入首坐癸向丁一大坂土也殿則子午陵前地平壠數百丈皆高數尺繞身九曲水入懷逺從御橋東出與小河會又前為汴河其左為徙湖為二陳溝又前即泗州城有塔又前為大淮水水皆從西來遶陵後東北入海而淮水灣環如玉帶皆逆水也又前即旴𣅿縣治米芾所書第一山也山不甚高然峯巒横亘八九與陵正對即靣前案山又前二百餘里為大江而陵後則明堂九曲水遶元武又後為影塔湖又後為汴湖又後二百里為黄河又數百里為泰山大約五百里之内北戒帶河南戒雜江而十餘里明堂前後復有淮泗汴河諸水環遶南東北惟龍自西來稍高耳陵左肩十里為掛劍臺又左為洪澤湖又左為龜山即禹鎖巫支祁處又左為老子山自老子山北至清河縣即淮黄交會處也陵右肩六十里為影塔湖為九岡十八窪又右為柳山為朱山即汴梁虹宿來龍千里結穴真帝王萬年吉壤縣令孫徴奎云大水時殿前可一尺其山較泗州城中地髙可丈餘惟御碑亭前築堤稍斜射而東一帶人家蔽塞案山似於明堂為礙耳午飯祠祭署朱君所因與瓏熺酌數廵而歸謹按圖説稱熙祖世為句容通德鄉朱家巷人生宋季元初至元間因亂挈家渡淮至泗州見其風土醇厚居焉泗人社會常推為祭酒居泗凡三十八年一日臥屋後楊家墩下墩有窩遇二道士過指臥處曰若葬此必出天子其徒曰何也曰若以枯枝試之必生葉亟呼熙祖起祖故熟睡道士乃插枯枝去十日後熙祖侵晨往騐果生葉因拔去生枝别易枯枝前道士復來心異之見熙祖在旁因指之曰必此人易去遂語祖曰若有福殁葬此當出天子語訖忽不見元致和二年丁卯夏熙祖殁因葬焉甫封土即自成墳仁祖年四十六冬十二月携南昌旴𣅿臨淮三王及曹國長公主遷於鍾離東鄉旴𣅿之木塲里淳皇后見一異人脩髯竒貌黄冠朱裳象簡授白藥一丸神光煜煜使吞之遂孕明年天歴元年九月十八日太祖高皇帝生聖造戊辰壬戌丁丑丁未也遡葬期甫歲餘耳將誕之夜紅光燭天里人起呼朱家火及至無有也舍旁故有二郎廟時聞空中語亟徙去至晚果徙東北百餘歩高皇帝甫生淳皇后抱浴池嘆曰家貧乏襁褓具奈何忽紅羅浮水上因取而衣之今傳為紅羅障其生處常見五色王氣世名明光山有紅廟在焉廟在旴𣅿縣靈跡鄉距縣百二十里及高皇帝龍飛定鼎金陵追尊四代已建仁祖淳皇帝陵於鳯陽因命皇太子至濠泗祭告祖考妣於泗州然未識元宫所在時向城西瀕河憑弔歲時遣官致祭洪武十七年甲子十月十二日宗人龍驤衛總旗朱貴從軍于外年老始歸即畫圖貼説識認宗派指出居處葬處備陳靈異始末貴故偕熙祖北渡者上即命皇太子至泗脩建陵寢號曰祖陵命禮部製造三祖考袞冕冠服瘞殿後每歲大小二十六祭設祭田一百四十五頃僉選人户三百一十四户因授貴奉祀四品服色子孫世襲管理署事當貴靣奏陵圖時恩賜田宅鈔錠金帶衣服等物寵賚有加令置祠署於貴先人所居之稍北其東南即熙祖舊屋其特賜奉祀官世為葬地及貴子紱襲前官高皇帝召入謹身殿賜膳一桌復賜御前子鵞肉諭以莫嫌官小與國同濟而楊家墩者宋保義大夫楊浚大理寺評事楊柟墓也命改遷於陵西之黄崗里復諭户部免守陵户役及一應雜色差糧嘗曰濠泗實朕鄉里陵寢在焉人民理宜優恤諭署民曰隣近荒田儘力開耕永不起科不屬有司衙門諭署官曰你衙門裏無刑名造作也不刷卷嗣是文皇帝駕過泗州詣陵祭告賜金飾鞍馬鈔錠田地四十四所並服役百户内侍等官又命朱貴子紱諭泗州降有功駕渡淮仍以令牌召紱至營賜坐溫語移時賜父老牛酒慰勞焉列聖承統皆遣重臣祭告景泰時以不雨𢎞治時以大風傷陵樹嘉靖時以陵前山石墜以基運山從祀方澤以皇嗣未生以脩陵工完皆遣重臣祭告萬歴二年七月十四夜大風雨損壞殿宇門墻及湖水衝激東南角岸命南工部郎郭子章脩理并砌石堤二十年復命南禮侍曾朝節南工部郎沈演周詩再築䕶堤二道春明夢餘録卷七十
