body:
  text: 春明夢餘録卷二十三吏部左侍郎孫承澤撰内閣一大學士直舍所謂内閣也在午門内東南隅外門西向閣南向入門一小坊上懸聖諭過坊即閣也初制規模甚狹嘉靖十六年命工匠相度以文淵閣中一間恭設孔聖暨四配像旁四間各相間隔而開户於南以為閣臣辦事之所閣東誥敕房裝為小樓以貯書籍閣西制敕房南面隙地添造捲棚三間以處各官書辦而閣制始備其職掌入内閣預機務出納帝命率遵祖憲奉陳規誨獻告謨猷㸃簡題奏擬議批答以備顧問平庶政不得專制九卿事九卿奏事亦不得相闗白凡上所下一曰詔二曰誥三曰制四曰敕五曰冊文六曰諭七曰書八曰符九曰令十曰檄凡下所上一曰題二曰奏啓三曰表箋四曰講章五曰書狀六曰文冊七曰揭帖八曰㑹議九曰露布十曰譯皆審署而調劑焉平允乃行之凡東宫出閣講讀領其事叙其官而授之職掌凡修實録史志諸書充總裁官寔録成呈上焚其草禁中凡宗室請名請封及諸臣請諡並擬上焉凡圖書繕冩讐較皆課而察之凡郊祀廵狩親征扈行凡累朝御筆實録寶訓玉牒之副古今書皆籍而藏之凡㑹敕稽其由狀而叙述上請焉凡禮部㑹試廷試貢生國子生月課歳貢生廷試譯館譯生皆總領之其屬制敕房書辦制敕詔㫖誥命冊表寳文玉牒講章碑碣題奏揭帖一應機宻文書及王府敕符底簿誥敕房書辦文官誥敕番譯敕書並譯書揭帖紀功勘合皆稽按典故起草進呈若漏洩稽緩遺失妄誤皆有罰凡入内閣曰直文淵閣官至三殿二閣二坊大學士無入内閣者不得與機務雖編修贊善等官有入内閣者亦得預機務閣門聖諭機宻重地一應官員閑雜人等不許擅入違者治罪不饒宣德御製箴廷有司言自周則然後世襲用愈宻而重䇿命所出講學所資幾務之嚴于度于咨代有賢哲博聞明識克勵翼之用光厥職咨爾儒臣朝夕左右必端乃志必慎乃守啟沃之言惟義與仁堯舜之道鄒孟以陳詞尚典實浮薄是戒謀議所屬出毖乎外心存大公罔役於私昔人四禁汝惟勵之獻納論思以匡以益以匹前休欽哉無斁文淵閣落成駕幸視謝表具官臣楊榮等兹者欽蒙聖駕臨幸文淵閣周視臣等寓直之所特頒恩命增益室宇兼賜飲饌器用周悉備至聖恩廣大感戴惟深謹上表稱謝者臣等誠懽誠忭稽首頓首上言伏以日月光華當大聖龍興之運車書混一正文明天啟之時鑾御幸臨儒紳遭遇恭惟皇帝陛下聖神天錫剛健日新典章法度之𢎞脩功成理定華夏蠻貊之率俾近説逺來萬幾餘閒怡神稽古六龍捧御寵顧延英上深軫於天心頫垂矜於寒士廣其室宇遂凉燠之攸宜給以饔飱兼什器之咸備凡百所用靡一弗周同乾坤覆載之恩踰父母生成之賜是皆皇上聖仁廣大明睿照臨溥德澤於萬方施由侍從昭禮文於千載高出古今所以致海宇之雍熙所以隆皇圖於永久臣等深慚末學幸際明時被沐恩榮匪名言之可罄䇿勵駑鈍豈報效之敢忘端秉寅誠恭陳申謝龍翔鳯翥瞻五彩於中天春育海涵祝萬年之聖夀列輔起家考洪武九年先置中書省十五年始置殿閣胡惟庸以上俱中書省李善長徐逹俱翊運勲佐汪廣洋令史胡惟庸寕國縣知縣吳沉待制吳伯宗禮部員外名祐以字行宋訥助教劉仲質宜春縣訓導朱善豐城縣訓導按十五年徵耆儒鮑恂全思誠余詮張紳張長年詣闕俱命授文華殿大學士固辭僅列銜未入閣故不載永樂七人解縉中書庶吉士黄淮中書胡廣修撰楊榮編修楊士竒吳府審理名寓以字行金幼孜給事中名善以字行胡儼華亭縣教諭鄉科洪熙五人楊榮見前黄淮見前楊士竒見前金幼孜見前權謹樂安縣知縣宣德五人楊榮見前金幼孜見前楊溥編修張瑛寜州訓導陳山奉化縣教諭鄉科正統八人楊榮見前楊溥見前陳循修撰曹鼐修撰馬愉修撰苖衷編修髙穀庶吉士張益庶吉士景泰九人陳循見前髙穀見前彭時修撰商輅修撰俞綱郕府審理江淵編修王一寜吏部主事蕭鎡編修王文御史天順八人彭時見前徐有貞庶吉士許彬庶吉士薛瑄御史李賢吏部主事呂原編修岳正編修陳文編修成化十人彭時見前李賢見前陳文見前商輅見前萬安庶吉士劉定之編修劉珝庶吉士劉吉庶吉士彭華庶吉士尹直庶吉士𢎞治六人劉吉見前徐溥編修劉健庶吉士邱濬庶吉士李東陽庶吉士謝遷修撰正德十四人李東陽見前謝遷見前焦芳庶吉士王鏊編修楊廷和庶吉士劉宇上海縣知縣曹元工部主事劉忠庶吉士梁儲庶吉士費宏修撰靳貴編修楊一淸中書蔣冕庶吉士毛紀庶吉士嘉靖二十七人楊廷和見前費宏見前蔣冕見前毛紀見前楊一淸見前謝遷見前袁宗臯輿府長史𢎞治庚戌進士石瑶庶吉士賈詠庶吉士翟鑾庶吉士張孚敬南刑部主事原名璁桂蕚丹徒縣知縣方獻夫庶吉士李時庶吉士夏言行人顧鼎臣修撰嚴嵩庶吉士許讚大名府推官張璧庶吉士張治庶吉士李夲庶吉士徐階編修袁煒編修嚴訥庶吉士李春芳修撰郭朴編修高拱庶吉士隆慶八人徐階見前李春芳見前高拱見前陳以勤庶吉士張居正庶吉士趙貞吉庶吉士殷士儋庶吉士髙儀庶吉士萬歴二十人張居正見前吕調陽編修馬自強庶吉士張四維庶吉士余有丁編修申時行修撰王錫爵編修許國庶吉士王家屏庶吉士陳于陛庶吉士趙志臯編修張位庶吉士沈一貫庶吉士朱賡庶吉士沈鯉庶吉士于慎行庶吉士李廷機編修葉向髙庶吉士吳道南編修方從哲庶吉士泰昌三人方從哲見前劉一燝庶吉士韓爌庶吉士天啟二十一人方從哲見前劉一燝見前韓爌見前葉向髙見前何宗彦庶吉士孫承宗編修沈㴶庶吉士孫如游庶吉士史繼偕庶吉士周如磐庶吉士丁紹軾庶吉士朱國禎庶吉士朱國祚修撰朱延禧庶吉士魏廣㣲庶吉士馮銓庶吉士顧秉謙庶吉士黄立極庶吉士張瑞圖編修李國􅕠庶吉士施鳯來編修崇禎五十人韓爌見前孫承宗見前黄立極見前張瑞圖見前李國􅕠見前施鳯來見前來宗道庶吉士楊景成庶吉士李標庶吉士劉鴻訓庶吉士周道登庶吉士錢龍錫庶吉士成基命庶吉士字靖之以字行周延儒修撰何如寵庶吉士錢象坤庶吉士溫體仁庶吉士呉宗逹編修鄭以偉庶吉士徐光啓庶吉士錢士升修撰王應熊庶吉士何吾騶庶吉士文震盂修撰張至發知縣林釬編修孔貞運編修黄士俊修撰賀逢聖編修傅冠編修劉宇亮庶吉士薛國觀推官楊嗣昌教授程國祥知縣方逢年編修蔡國用中書范復粹推官姚明恭庶吉士張四知庶吉士魏炤乘知縣謝陞知縣陳演庶吉士蒋德璟庶吉士黄景昉庶吉士吳甡知縣魏藻德修撰李建泰庶吉士方岳貢主事范景文推官邱瑜庶吉士文淵典故洪武元年改中書省左右相國為左右丞相左右丞各一人叅知政事二人以宣國公李善長為左丞相兼少師統六部事三年召山西叅政楊憲為右丞相陜西叅政汪廣洋為左丞已善長封韓國公進太師廣洋封護軍忠勤伯後以胡惟庸敗善長等皆坐累上御奉天殿敕文武羣臣言自古三公論道六卿分職自秦始置丞相而亡漢唐宋因之雖有賢相然多小人專權亂政自今罷相設五府六部都察院通政司大理寺分理天下庶務彼此頡頏不敢相壓事皆朝廷總之以後嗣君不許立丞相臣下敢有奏請設者文武羣臣即時劾奏處以重刑命翰林春坊官入看詳諸司奏啟平駁之平允則列名封進署曰翰林院兼平駁諸司文章某官某進其時召耆儒鮑恂張長年俞銓至命為文華殿大學士三人辭不就而命吏部尚書邵質檢討呉伯宗為華蓋武英殿大學士翰林學士宋訥典籍呉沉為文淵閣東閣大學士皆侍左右備顧問然不得平章軍國事永樂入踐極始開内閣於東角門簡翰林待詔解縉為侍讀中書舍人黄淮王府審理楊士竒為編修進修撰胡廣為侍講編修楊榮為修撰户科給事中金幼孜桐城縣知縣胡儼為檢討入直文淵閣諸六部大政咸共平章秩五品而恩禮賜賚與尚書等至洪熙初設謹身殿大學士旣又建𢎞文閣諭大臣曰卿等各有職務朕欲得學行端謹老儒數人日侍燕閑備顧問可咨訪以聞楊士竒等以翰林侍講王進蘇州儒士陳繼對命學士傳㫖繼授五經博士掌閣事進佐之尚書蹇義舉學録楊敬訓導何澄敦實即授敬編修澄給事中皆直𢎞文閣於是華蓋謹身武英三殿及文淵閣東閣俱有大學士永樂初建内閣於東閣門内以解縉等七人在閣辦事以備顧問永樂之世楊士竒楊榮官止五品是時尚沿國初之舊至仁宗朝陞士竒為禮部侍郎尋加少保轉少傅兼華蓋殿大學士榮為太常卿進太子少傅兼謹身殿學士溥為太常卿兼翰林學士蓋以東宫舊恩非例也後楊榮陞尚書授以工部蓋不欲以兼官壓六卿之上楊溥丁憂起復不入閣宣德間以九年考滿陞禮部尚書至英宗時復命入閣故宣德以前内閣與外九卿為平交執禮持法不相顧忌宣德以後三楊眷重漸柄朝政英宗以九歳登極凡事啟太后太后避專令内閣議行此内閣票㫖之所由始也及楊榮卒於正統五年楊士竒卒於正統九年楊溥卒於正統十一年則漸改於其舊及景泰易儲之後雖天子亦藉内閣以為已用但其官品如蕭鎡江淵許彬王一寧商輅等皆不脱學士之銜天順初李賢始以兵部侍郎陞吏部尚書兼翰林學士入閣薛瑄由大理卿陞禮部侍郎兼翰林學士入閣成化𢎞治多由侍郎陞尚書入閣若先陞尚書則無入閣之命至正德初劉瑾以其私人焦芳吏部尚書入閣蓋以外寮之首而入主中秘之權至張孚敬張居正則直以相體自尊危坐諸卿之上而名委之然兩文忠雖好高不懼絶利一源乃其具美閣員初無定額洪武初呉伯宗以武英殿大學士復為翰林院檢討永樂初王文忠以庻吉士入翰林未幾召同王直入内閣書機宜奏疏五年陞脩撰十四年進侍講入閣在先授官在後嗣後始以翰林院銜直文淵閣然惟胡文穆靖修撰楊文敏榮編修彭文憲時商文毅輅以修撰其他黄文簡淮以中書舍人楊文貞士竒以齊王府審理副陳汝静敬宗張子玉瑛以鄉舉金文靖幼孜以給事中胡若思儼以桐城知縣俞綱以審理權謹以光禄署丞徐武功有貞以都御史李文逹賢以主事王毅愍文薛文淸瑄以御史髙文義穀以中書舍人劉宇曹元以知縣袁榮襄宗臯以長史楊文襄一淸以總督張文忠璁方獻夫桂蕚二文襄霍文敏韜以主事席文襄書以户侍許文簡讚以吏書夏文愍言以給事中皆不由館選自兹㑹推内閣冢宰掌院必列名至崇禎朝遂定為故事毎次枚卜必内外兼推初設内閣楊文貞士竒歴二十三年官止五品後加至少師止兼兵部尚書華蓋殿三官時蹇忠定義以少師為冢宰朝廷不欲文貞班居其上以存冢宰之體也陳芳洲循雖兼五官亦止户部尚書後李文達賢以吏侍領吏部尚書而彭文憲時商文毅輅萬安相繼領吏部尚書自後遂為首輔故事内閣外出者永樂中解縉為廣西叅議胡儼為國子祭酒宣德中張瑛陳山以干請諸司改瑛為南禮部山專教内書堂景泰中江淵出為工部尚書俞綱出佐兵部許彬出為陜西叅議徐有貞出為福建叅政天順中岳正謫為欽州同知後復官止於翰林供事皆不復再入預閣務不居其職者蹇義以吏書夏原吉以户書朝夕備顧問擬㫖然不與閣職以他官兼大學士者如楊士竒以禮侍兼華蓋金㓜孜以户侍兼武英陳山以户侍兼謹身張瑛以禮侍兼華蓋黄淮以通政使兼武英楊榮以太常卿兼文淵徐有貞以武功伯兼華蓋殿閣大學士自相兼者如陳循以華蓋兼文淵高穀王文以謹身兼東閣胡廣楊榮金幼孜以文淵兼翰林院學士其内閣諸殿次第自正統間始定其兼銜次第自天順間始定然或以所兼保傅為等級或以部分為後先如楊榮以太子少傅謹身位少保黄淮武英下陳山無兼官以謹身位少保黄淮太子少保金幼孜武英下少保黄淮太子少保金幼孜以户部尚書位少傅兵部楊士竒下金幼孜又以户部楊溥無兼官以禮部位工部楊榮下王文以少保吏部位户部陳循工部高穀少保太子太傅下皆取所兼保傅為次序也張瑛以禮部華蓋殿位户部謹身陳山下此則以部分為次序也内閣之職同於古相而所不同者主票擬而不身出與事如高公拱之兼掌吏部趙公貞吉之兼掌都察院孫公承宗兼掌兵部俱出而啓事入而調㫖然惟高為首相二公皆非也事寄雖重然猶判然兩署獨天順間命徐公有貞考察方面嘉靖間命李公夲分别尚書至大小九卿去留張公璁奉敕肅淸百寮韓公爌分别逆黨則政自閣出矣然張公權掌都察院事李公因冢宰李公黙得罪去亦未可全謂之政出於閣也政出於閣者獨前武功與後韓蒲州内閣出為六卿者皆不帶閣銜即出將如楊公一淸自家起改兵部尚書左都御史總督三邊奉詔而出閲九邊如翟公鑾亦改兵部尚書兼右都御史唯華蓋殿大學士張公瑛以原官掌南京吏部然詘之也文淵閣大學士孫公承宗則亦以原官督理遼薊津登軍務自邊累官至少師中極殿則出將入相者夲朝惟中山高陽二公而已然中山帶相銜而實不與機務則又似髙陽獨也文淵閣未有言掌者徐武功有貞以勲臣領之遂改為掌文淵閣王世貞譏之以謂文淵閣不可掌也吏部左侍郎李賢為夲部尚書兼翰林院學士掌文淵閣事則又不止武功也又考解大紳縉入閣居七人之首其繫銜亦曰掌文淵閣事則又不始於武功也經筵大典初惟勲臣一人知之至李文逹賢始與勲臣並列至同知經筵閣臣亦不盡與如景泰初江淵商輅與陳循髙穀同在内閣陳髙二人同知經筵而江商二人止稱兼經筵官票擬事有闗兩部者必明標之三部以上始曰該部至天啟而後無人知此典故矣毎有一部而亦稱該部凡事有兩罪應處始曰從重如一事自有正議何曰從重高新鄭毎以此戒同列票㫖稱卿隆萬間惟二品得之而中亦有不能得者天啓中凡腰犀者盡卿之考天順間祭酒呉節以滿九年加從三品俸又三年以老請上曰國學師傅正須老成卿宜懋稱無懇辭是四品而三品亦卿矣朝廷優其人則稱之原無定例也閣中有文淵閣印章玉箸篆凡封進詔草題奏揭帖用之不得下諸司即下諸司以翰林院印行諸司行内閣亦止稱翰林院凡内閣題夲用小揭帖楷書斜摺其夲僉官銜則發科抄行止稱臣某則不送科發抄禁宻文書一小匣在几上鑰之而不合大學士暮出鑰其門匙懸門上恐禁中不時有宣索也舊規不得舉火皆出食於外宣德時始令置厨庖㑹食中堂舊制輔臣在直辰入申出率以為常崇禎壬申後必二鼔始出及己卯後遂至四鼓始出間有徹夜者周宜興至始議輪一人宿精㣲科候傳票精㣲科九間在午門外西廡其南兵科直房也舊制紅夲到閣首輔票擬餘唯諾而已崇禎中御史倪元珙疏請分票其後夲下即令中書分之首輔之權雖稍分然水火之端啓而中書之弊種種矣孫高陽承宗曰閣體重首輔其圖事揆䇿主之首輔當予陪末綴毎見上傳首輔主裁語不及次首輔即賢次輔以下豈無一得當上或間與首輔相參差而兩意各主朝士之從意者隨分蓋自古分合之議竟與國運相隨也王司寇世貞曰閣臣於體至貴倨也視百司乃無重相壓何以相稱焉其喜怒借上意故上不嫌逼也威福間已意故下屏息也創自由六曹故難不與也裁取以詔行故衆無敢訾也賢者當之不見跡而治不肖者當之不及敗而亂此在人王擇矣孫髙陽承宗曰朝廷生殺予奪之權閣臣不顯操而賢者得君以行其公遂能任生殺予奪而天下治不肖者得君以行其私亦能竊生殺予奪而天下亂故閣臣不必有其權而有其任何良俊曰唐宋設官並置三省三省皆宰相也一曰中書省二曰門下省三曰尚書省中書省則置中書令而中書侍郎左丞右丞左右司郎中中書舍人皆其屬也門下省則古唐虞納言之官今之通政司是也省中則置僕射侍中門下侍郎中常侍武騎常侍㪚騎常侍給事中皆其屬也尚書省則置尚書而六曹皆設於部其屬則選部考功儀部駕部金部倉部比部虞衡水部之類皆設郎中員外郎是也凡朝廷有大政令則由門下省奏上發中書省看詳仍發門下省下尚書省施行故尚書拜相則曰同中書門下平章事者是也當時政體互相鈐轄事權常分使門下尚書二省堅持官守不相阿縱則宰相之權初亦甚輕但看詳由於中書則主張庶事皆由其手其權安得不日漸隆重哉故唐宋時即有宰相如元載盧杞秦檜賈似道者蓋由此也近時各部之事皆聽命於閣下所不待言雖選曹有員缺亦送揭與閣然後注選此不知胡汪當國時有此事否夫威權日盛則謗議日積謗議日積則禍患日深故自世宗以來宰相未有能保全身名而去者于文定慎行曰漢唐以來宰相之任往往起家郡邑未有以文學侍從不出禁門而進宅揆任天下之重者漢宣以蕭望之才任宰相欲試以政事乃從少府左遷為馮翊曰所用皆更治民以考功故試之於三輔此人主任相之法也許衡因論阿哈瑪特之奸請解機務元世祖命舉一人自代衡曰用人天子之大柄臣下汎論其賢否則可若授之以位則斷自宸衷不可使臣下有市恩之漸此相臣事主之法也先正模範票擬宜密大學士劉健疏臣等仰見皇上委任腹心慎重機務開决壅蔽防閑漏泄之意易曰君不密則失臣臣不密則失身幾事不宻則害成正為此也臣等俱以庸駑謬承簡任輔導無狀尸素有年聖諭下臨捫心知感竊惟内閣之職所以承德弼違獻可替否輔佐朝廷裁决政務與百司庶府職掌不同中間事情誠為秘密在祖宗朝凡有諮訪論議或親臨幸或召見便殿或奉天門或左順門屏開左右造膝面諭以為常制臣等不暇逺引且如宣宗章皇帝屢幸内閣御座所在至今臣等不敢中坐英宗睿皇帝視朝將罷不時面召李賢憲宗純皇帝亦常召李賢陳文彭時或遣司禮監太監如牛玉懷恩一二人到閣計議上有密㫖則用御前之寶封示下有章疏則用文淵閣印封進直至御前開拆此臣等耳聞目見者也因循至今事體漸異朝叅講讀之外不得復奉天顔雖司禮監太監亦少至内閣朝廷有命令必傳之太監太監傳之管文書官管文書官方傳至臣内閣有陳説必逹之管文書官管文書官達之太監太監乃達至御前至於謄冩之職例委制敕房中書一二人臣等雖時常戒飭而經歴太多耳目太廣豈能保無漏泄宜有如皇上所諭者臣等自當滌慮省躬盡忠補過以副聖心但内閣文書多係機密凡事闗得失利病職在輔導不敢阿順緘黙未免有所陳奏縁臣等不習楷書字畫鈍拙恐不能一一自寫除事理重大者自行書寫封進以聽聖裁其餘仍乞容令中書代寫臣等亦當申嚴戒飭勿致漏泄皇上若有諮議仍乞照祖宗故事或召臣等面諭或親賜御批數字封下或遣太監密傳聖意使臣等有所遵奉庶情得通達事無漏泄實為便益代言不易大學士張孚敬疏兹者内閣員缺臣已上請簡命節行足以報主道義可以服人者以為首臣以表百僚實以内閣之官居密勿之地任代言之責有難勝任故也臣連日思維又有不能自已於言者敢復冐昧上請惟聖明垂察焉臣伏讀聖訓内一欵云自古三公論道六卿分職並不曾設立丞相自秦始立丞相不踵旋而亡漢唐宋因之雖有賢相然其間所用者多有小人專權亂政今我朝罷丞相設五府六部都察院通政司大理寺等衙門分理天下庶務彼此頡頏不敢相壓事皆朝廷總之所以穩當至太宗皇帝始設内閣臣謹按太宗皇帝實録永樂二年九月上御右順門召翰林學士解縉侍讀黄淮胡廣胡儼侍講楊榮楊士奇金幼孜諭之曰朕即位以來爾七人朝夕相與共事鮮離左右朕嘉爾等恭愼不懈故在宫中亦屢言之然恒情保初易保終難朕固當存於心爾等亦宜謹始如終庶幾君臣保全之美縉等叩頭言陛下不以臣等淺陋過垂信任敢不勉勵圖報上喜皆賜五品公服按此太宗皇帝時内閣止設翰林學士及講讀編修等官備顧問而已及宣宗皇帝朝楊榮楊士奇等始專任之有代言擬㫖之責其官漸加至尚書師保後不復變也夫内閣有聲者稱三楊而已後楊榮曾孫業坐事抄没家資鉅萬况其他乎故内閣設官太宗之時用之固未甞不善及夫加以代言擬㫖之責且任使多非其人遂至犯贓壞事臣歴數從來内閣之官鮮有能善終者蓋密勿之地易生嫌疑代言之責易招議論甚非君臣相保之道也古人謂人君勞於求賢而逸於得人茍所得非其人焉反致君勞而實無益於國矣臣切惟人君之德莫大於明仁武仰惟皇上聖神邁古帝王三者之德無一不備誠無假於代言之官者也伏乞體念祖宗之制宜有所處或下廷臣集議以建國家久安長治之策以全君臣始終相保之道臣不勝恐懼願望之至任用宜擇大學士張孚敬疏臣伏讀聖諭朕思民間疾苦情狀或未盡知則匹夫匹婦猶有不被其澤於此見我皇上真存心天下加志窮民者也夫有君有臣然後政舉今上有是君臣恐下無是臣也昔伊尹以天下為己任思天下之民匹夫匹婦有不被堯舜之澤者若已推而納之溝中惟成湯能用伊尹故伊尹能相成湯夫人君以論相為職宰相以正君為功伊尹不可得而見矣唐楊綰清儉簡素代宗相之制下之日朝野相賀郭子儀方宴客聞之減坐中聲樂五分之四京兆尹黎幹騶從甚盛即日聞之止存十騎中丞崔寛第舍宏侈亟毁之宋秦檜隂險深阻誣䧟善類結納内侍伺上動静髙宗相之祖父孫三世皆領史職開門受賂富敵於國外國珍寶死猶及門一時忠臣良將誅鋤略盡其頑鈍無耻者率為之用卒致外裔内横禍延國祚二宗任相得失明騐如此况皇上有堯舜知人之明而欲民被堯舜之澤者乎我太祖髙皇帝懲前代宰相專權不復設立而今之内閣猶其職也皇上責以調元贊化可謂得任輔相之道矣臣不知其宜何如為人也今之部院諸臣有志者難行無志者聽令是部院乃為内閣之府庫矣今之監司苞苴公行稱為常例簠簋不飭恬然成風是監司又爲部院之府庫矣撫字心勞指為拙政善事上官率與薦名是郡縣又為監司之府庫矣司馬光曰天之生財止有此數不在官則在民今在官者恒多矣如之何民不窮且盗也夫人君之尊如天明日月也威雷霆也近者皇上畏天修省責臣下自陳待命之日莫不震疊既而無毁無譽黜陟不聞旅進旅退幽明無别臣恐上下雷同非國家之福也孔子曰事君敬其事而後其食今之事君者其不為宫室之美妻妾之奉者鮮矣夫營巢養子禽獸皆然不敬君事何以别乎孟軻氏告齊君曰王欲行王政則盍反其夲矣臣切惟皇上宣德流化必自近始近必自内閣始夫人君用人固未嘗借才於異代者也今内閣擇其人焉責之以擇九卿九卿擇其人焉各責之以擇監司監司擇其人焉各責之以擇守令守令親民者也守令得人斯匹夫匹婦莫不被其澤矣不然則上下交征掊克在位皇上雖有憂民之心而澤民之政為遏絶如之何其可也行政事宜大學士髙拱疏一祖宗舊規御門聽政凡各衙門奏事俱是玉音親答以見政令出自主上臣下不敢預也隆慶初閣臣擬令代答以致人心生玩甚非事體昨皇上於勸進時荷蒙諭答天語莊嚴玉音清亮諸臣無不忭仰當日即傳徧京城小民亦無不懽悦則其所闗係可知也若臨朝時不一親答臣下必以為上不省理政令皆出他人之口豈不觧體合無今後令司禮監毎日將該衙門應奏事件開一小揭帖明寫某件不該答某件該答某件該某衙門知道及是知道了之類皇上御門時收入䄂中待各官奏事取出一覽照件親答至臨時裁决如朝官數少奏請查究則答曰着該衙門查㸃其紏奏失儀者重則錦衣衛挐了次則法司提了問輕則饒他亦須親答如此則政令自然精彩可以繫屬人心伏乞聖裁一祖宗舊規視朝回宮之後即奏事一次至申時又奏一次内侍官先設御案請上文書即退出門外待御覽畢發内閣擬票此其常也至隆慶初年不知何故不設覽夲御案司禮監官奏文書先帝止接在手中畧覽一二亦有全不覽者夫人君乃天下之主若不用心詳覽章奏則天下事務何由得知中間如有奸詭欺罔情弊何以照察今後乞命該監官查復舊規將内外一應章奏除通政司民夲外其餘盡數呈覽覽畢送票票後再行呈覽果係停當然後發行庶下情得通奸弊可弭而皇上亦得以通曉天下之事臣等又思各衙門題奏甚多難以通篇逐句細覽其中自有節要之法如各衙門題覆除前一段係原夲之詞不必詳覽其擬議處分全在案呈到部以後一段乞命該監官毎日將各夲案呈到部去處夾一小紅紙籖皇上就從此覽起則其中情理及議處當與不當自然明白至於科道及各衙門條陳論劾夲章則又須全覽乃得其情伏乞聖裁一事必面奏乃得盡其情理况皇上新政尤宜講究天下之事始得周知伏望於毎二七日臨朝之後一御文華殿令臣等隨入叩見有當奏者就便陳奏無則叩頭而出此外若有𦂳急密切事情容臣等不時請見其開講之時臣等皆日侍左右有當奏者即於講後奏之如此則事得精詳情無壅蔽不惟睿聰日啟亦且權不下移而諸司之奉行者當自謹畏不敢草率塞責矣伏乞聖裁一事必議處停當乃可以有濟而服天下之心若不經議處必有差錯國朝設内閣之官看詳章奏擬㫖蓋所以議處也今後伏望皇上將一應章奏俱發内閣看詳擬票上進若不當上意仍發内閣再詳擬上若或有未經發擬自内批者容臣等執奏明白方可施行庶事得停當而亦可免假借之弊其推陞庶官及各項陳乞與凡一應雜夲近年以來司禮監徑行批出以其不費處分而可徑行也然不知推陞不當還當駁正其或情事有欺詭理法有違犯字語有乖錯者還當懲處且内閣係看詳章奏之官而章奏乃有不至内閣者使該部不覆則内閣全然不知豈不失職今後伏望皇上命司禮監除民夲外其餘一應章奏俱發内閣看詳庶事體歸一而奸弊亦無所逃矣伏乞聖裁一凡官民夲辭其有理者自當行其無理者自當止其有奸欺情弊者自當懲治未有留中不出之理且本既留中莫可稽考則不知果經御覽而留之乎抑亦未經御覽而有留之者乎是示人以疑也又或事係𦂳急密切而有留中者及至再陳豈不有悞今後伏望皇上於凡一切夲辭盡行發下倘有未下者容原具夲之人仍具原夲請乞明㫖其通政司封進外來一應夲章毎當日將封進數目開送該科備照倘有未下者科官奏討明白如此庶事無闗隔而亦可以逺内臣之嫌釋外臣之惑其於治理所闗非細伏乞聖裁治平要務大學士張居正六事疏一省議論謂宜掃無用之虛詞求躬行之實效欲為一事須審之於初務求至當斷而行之如唐憲宗之討淮蔡百方沮之而不揺欲用一人須愼之於始既得其人則信而任之如魏文侯之用樂羊謗書盈篋而不動一切章奏務從簡切是非可否宜明白直陳毋得彼此推諉徒託空言一振紀綱謂情可順而不可狥法宜嚴而不宜猛近來紀綱不肅模稜兩可謂之調停委曲遷就謂之善處宜勅執法諸臣秉持公論振揚風紀刑賞予奪一歸之公道政教號令必斷於宸𠂻以勵明作之治一重詔令近日朝廷詔㫖多廢格不行抄到各部概從停閣至於應勘應報奉㫖下地方官輒視為故紙有一事而數十年不完者文卷既多沉埋干證半登鬼録漏網孰問覆盆誰伸望勅下部院凡奉㫖事務數日之内即行題覆其地方合行覆奏要嚴立期限從實查覈吏部即以此科課其能否一覈名實器必試而後知利鈍馬必駕而後知良駑今用人則不然稱人之才不必試之以事任之以事不必更考其成椎魯少文者以無用見譏大言無當者以虚聲竊譽倜儻伉直者以忤時難合脂韋逢迎者以巧宦易容加以更調太繁遷轉太速資格太拘毁譽失實或舍其職業出位是思或條陳累牘而職守茫然願愼重名器愛惜爵賞用人必考其終授人必求其當内外官三年六年考吏部必實覈其稱職平常不稱職毋眩於愛憎毁譽以臆為殿最一固邦夲方今風俗侈靡蠧敝横生外之豪强兼併賦役不均詭寄逋欠偏累小民内之官府造作侵欺冐破假公濟私損上刻下凡此耗財病民之大者若求其害而去之何必索之窮困之民以自耗國家之元氣乎前項催督御史事完宜令囬京勿復再差其屯鹽各差亦當取回但責成撫按清理可也如此則蠧害剗除民生甦而邦夲固矣一飭武備今議者皆曰兵不多食不足將帥不得人臣謂三者不足患也夫兵不患少而患弱今軍伍雖缺而糧籍具存若按籍清查隨宜募補着實訓練何患無兵捐無用不急諸費併其財賦以撫養戰士何患無財懸重賞以勸有功寛文法以伸將權則忠勇之夫孰不思奮何患無將臣願皇上先自治之圖屬任謀臣不求近功不忘逺畧選擇邊吏團練鄉兵併守墩堡則無事可以守有事可以戰矣臣又考之古禮祖宗故事俱有大閲之制以習武事而戒不虞乞勅戎政大臣申嚴軍政間請聖駕親臨較閲一以試將官之能否一以觀軍士之勇怯為磨勵勸懲亦轉弱為強之一機也疏入上曰覽卿奏具見謀國忠猷該部院看議以聞於是都御史王廷等及兵户二部各覈議覆奏上令各如議遵行宗伯黄汝良稱張江陵此疏綜覈信必振積年委靡之頺風新一代精明之神氣隆慶萬歴間號太平實藉其謀國忠猷允稱救時賢輔矣以去格主大學士王家屏疏竊臣聞漢臣汲黯有云天子置公卿輔弼之臣寜令從䛕承意陷主於不義乎且已在其位縱不愛身柰辱朝廷何毎感斯言愓然内省竊自幸遭遇皇上眀聖誠使朝政無缺帝德罔愆即將順不為從䛕緘黙無嫌承意也乃頃來九閽重閉五位深居宴安之毒是懷兢業之𠂻潛替郊廟不享而仁孝之念疎堂陛不交而君臣之誼隔天災物異之警罔徹宸聰民生國計之憂不闗聖慮皇上試省此心敬耶怠耶於治道得耶失耶臣備員輔弼既不能婉導密規防君志未萌之欲又不能明諍顯諫扶乾坤將壞之機曠職鰥官久當退避所以逡廵未去徒以被恩髙厚毫髪靡酬庶幾殫竭愚忠漸次匡正乃今數月之間請朝講不報請元旦受賀不報請大計臨朝不報臣犬馬㣲誠不能感回天意已見於此矣至於升儲大典九廟神靈共屬萬方想望惟殷即冊立之期或可少待而豫敎之舉委宜蚤圖科臣所言未為差謬皇上即惡其凟擾報罷足矣甚則罰俸足矣何至降調外任乎㫖意一出逺近驚疑使道路之猜議横生宮闈之䜛搆交作其於虧損聖德動揺國夲非細故已也揭請寛宥未賜允俞且復遷怒申救諸臣概加譴謫臣誠不忍明主蒙咈諫之誚清朝有横施之罰部科罹無妄之罪宗社蓄不測之憂也循省虚庸終慙匡救若復依違保禄淟涊茍容正汲黯所謂從䛕承意陷主不義貽辱朝廷者耳死且有餘僇焉伏乞聖恩亟賜罷歸俾全晚節第二疏頃因科臣劉獻可等疏請豫教蒙㫖降罰臣不揣輕鄙冐昧封還意事係宮闈不宜盛怒以損天親之愛言出臺省不宜峻斥以塞忠諫之門乃為聖德慮為國體慮非為獻可一人也揭請寛宥未蒙俞允方當退而補牘再瀝悃誠而科道諸臣申救獻可者若鍾羽正張棟陳尚象鄒德泳等又已得罪兩日之内嚴㫖叠出或奪其俸或謫其官方一㫖調南京又一㫖調外任方一㫖降邊方雜職又一㫖削籍為民以至於孟養浩之廷杖一百則更慘矣雷霆横擊風日凄陰凡舉朝士紳逺方選吏見者無不喪氣聞者無不摧心誠不意聖哲之君有此舉動平明之世有此景况而原其釁端由起則自臣揭救獻可始是臣惜諤諤之一士而反累濟濟之羣英爭降罰之輕刑而反搆放逐之重典善類之罪人清時之戾氣也用是自陳愚戅疏乞罷歸庶幾感悟宸𠂻消融聖怒霎然開霽赦宥諸臣使之復還舊官勉圖報稱則始雖因臣咸累罹無妄之災終乃以過見原獲自新之路臣雖退居壟畝尚可以一去謝諸臣耳何圖席藁累日未奉處分詢之同官乃知為臣具揭伏奉聖㫖謂臣希名不遂托疾故症臣聞言惶悚負罪彌深竊念名非臣之所希實非臣之敢棄臣所希者期皇上為堯舜之主而臣為堯舜之臣此之謂名垂千載有餘榮故足希也若犯顔色觸忌諱抗爭僨事被譴罷歸此何名之可希乎必不希名将使臣身處尊官家享厚禄主德愆違而莫之救正刑政壞亂而罔克匡維此可謂不希名之臣矣而國家將奚賴焉更使臣棄名不顧將逢迎為悦阿䛕取容雖許敬宗李林甫之奸佞無不可為是九廟神靈所陰殛天下萬世所唾罵也不但得罪於劉獻可鍾羽正諸臣而已豈當一日立於堯舜之朝哉伏望皇上察臣戅愚夲為禍始將臣特賜罷免以示首事之懲仍召還降謫諸臣以釋株連之累庶善類無枉羣情不揺臣感戴生成環草難報第三疏臣頃以救科臣致干聖怒兩疏乞罷未奉允俞忽蒙聖諭邇年以來喜事小臣狂肆不道逞臆激擾姑以薄罰卿為佐治見此要名不義之徒自宜調㫖厝處緩詞解諫却乃逕駁御批故激朕怒甚失禮體及朕怒起卿又不忍受假疾具疏又言求去朕想卿眞欲以此挾君廢政沽名逸卧豈人臣之義哉且卿輔朕爕理贊襄佐治有年况今國務多艱卿恝然髙卧其心可安乎卿既有疾准暫假數日即入閣辦事欽此臣謹焚香叩頭祗領訖伏念犬馬猶能報主葵藿亦克傾陽物類且然况臣受皇上作養生成之大德十年講幄六年政府即天地父母未足比其恩慈雖粉骨碎身莫能伸其報塞豈不知將順聖意鎭戢羣囂可以全君臣喜起之休養中外和平之福而止以冊立一事爭議數年矣在皇上欽定冊期已有確然不易之信則小臣數生激擾殊無帖然聽命之恭聖諭謂其喜事逞臆此誠諸臣之罪不可掩也幸蒙薄罰臣但當委曲調停從容緩觧而封還御批致激聖怒聖諭責臣甚失禮體此臣之罪臣亦不敢辭也但皇子於皇上父子之親也冊立與豫教典禮之大也言渉至親不宜有怒事闗典禮不宜有怒臣與諸臣但知為宗社大計慮以盡言為效忠而已豈意其激皇上之怒哉使臣與諸臣預知皇上之怒必不敢封還内降逞臆激擾而所以敢激聒敢封還者正恃皇上之聖明無一言之不納皇上之寛大無一物之不容也及今數日之内嚴㫖叠出斥逐紛然臣乃始錯愕銷魂自恨以為忠非素蓄志未上通而謬襲引裾之跡期收補衮之功以致一言不投萬事瓦裂譬之僨轅之犢不可復乘敗羣之羊所宜亟斥自不能一日安於其位而豈敢文言求去挾君廢政哉伏荷天言切責謂沽名逸卧大非人臣之義所宜且温㫖慰留念贊襄有年當以國務之艱為慮華衮斧鉞總屬皇恩雨露雪霜何非至教惟是孤忠獨立之身抱下愚不移之疾俯循深痼恐非數日之假可痊望乞生全寛以一朝之禠為幸封還上諭大學士王家屏疏今日文書官李相到閣蒙發下御史傅光宅夲為撫鎭更調繁數事口傳聖意謂近來吏部用人遷轉太頻欲行降敕宣諭隨蒙文書官劉宣將下勅稿令臣等觀看臣等捧誦再三仰見皇上留心吏治加意官材申久任責成之規戒輕紛易更之擾誠不勝欽服第吏部之職名曰銓衡其資序一定之中亦不能無斟酌轉移之法或才望特著或人地相宜彼此互更意存器使容有不得不然者竊見吏部尚書陸光祖老成練逹鯁介精嚴其一念進賢退不肖之心眞有孜孜汲汲夙夜匪懈者但其綜覈太鋭故更置稍頻乃其意則為公非為私任怨非任德也皇上即欲責使愼重但於其回覆疏中出一嚴㫖彼自當愓然警省將順不遑若頒降綸音特加戒諭不惟志意銷阻隳其任事之心將且體貎摧傷難居表率之地其何以甄叙衆職而壓服人心也伏望皇上念係大寮姑寛嚴督恕其既往之咎開其補過之門庶幾崇重天言不至於褻玩保全國體共荷其優容矣所有敕諭一道乞准停止舉賢報効大學士沈鯉疏臣往伏田間蒙非常知遇召以弓旌而處之輔弼之地迄今四載無能有涓埃報効私心常用為憂已而求之古人則公叔文子之臣大夫僎與文子同升諸公而孔子稱其為文臧武仲知栁下惠之賢而不與立而孔子譏其竊位乃知閣臣之所為盡職者不在乎自賢自能而在舉天下之賢以為賢舉天下之能以為能而以人事君然後為大不但以一身區區也臣等於是始交相勸勉乃各以盈尺之幅摺為手簡納之懷䄂凡有聞四方之賢者能者輙濡毫而識之用比於昔人之夾袋以備遺忘積之既久遂以盈幅方擬諏吉齋沭具奏以聞用比於芹曝之獻尋又思臣等各兩耳兩目爾今主上方且明四目達四聰豐蔀幽隱無不畢照卷阿車馬無不具陳何需此道聽塗説為乃遂削其牘而不敢奏而但請命於上敕下該部及九卿科道各舉所知亦各務以人事君如所舉而與臣等之所私擬者無不符合也則臣等之言已行矣雖削牘可也或亦有意見稍殊大同小異則以相叅酌而補苴罅漏以共成斯舉亦可也蓋臣等以一念之公心而付之舉朝之公論夫是以不敢先亦不敢後也抑臣等之所以為此者豈目前是為亦竊有深長之慮焉何以故為人才長養之難也為遺大投艱之不易也為戡亂反治之不可無人也故為是私憂過計也請一一熟慮之聖神在御菁莪棫樸作人於三十四載之間而後有雲蒸豹變如斯之盛向惟其用之不早而使之沉淪於山阿海澨蓬門蓽巷之中乃多化為異物而不得其半臂之力今之存而未泯者十之二三耳若更不及時賜環漸以澌滅於作飬人才之謂何葢樹人猶樹木當種樹之初其殷勤撫摩培灌者拱把柔條也何望之甚殷也豈既成叅天之材而棄為溝中之斷乎亦殊覺前勞之可念矣故臣等為是惜何言乎遺大投艱之不易也一榱一桷可隨地而求之亦可以隨手而得之彼巍乎隆棟如今搆三殿之材者其安可驟得乎葢必其險阻艱難無不閲歴而後能增益其德慧此在千百中一二也故以為遺大投艱之不易也然此猶論其常也自古及今事變之高高下下驚心駭目者安有定形其芟薙荆榛蕩滌邪穢廓陰曀而耀光明者亦何代蔑有也故在唐則狄仁傑薦五王在宋則王旦薦寇準乃卒能定難呼吸成旋乾轉坤之烈假令其臨渴而掘井亡羊而補牢亦何能有濟於事故臣等區區愚見以為世有一竒偉非常可排難解紛之人當及無所可用之時布在周行備一旦緩急之用乃不致臨時無措此戡亂反治之不可無人也抑又有不止於此者賢才不在朝則在野其所在有多寡則國家之氣象亦自有不同者故野無遺賢而史必書之曰慶歴之盛君子滿朝即詩書所稱濟濟師師不加於此矣不亦榮乎其不然者則書曰賢才徧野將百世而下有遺議矣夫由前三事則闗係在當時由後一説則是非在來世皆臣等逺慮也故不敢不盡焉雖然此對君公言也尤竊有私願於會舉諸臣者亦不敢不盡其愚威福人主之大柄也人臣其誰敢干之茍當㑹舉時而稍着一意澄汰不公則其所舉者即為市恩市恩與作福一意也科道官得指名糾劾以防冐濫亦更宜仰體聖心與天地同廣大與父母同恩勤即先年放逐諸臣有偶觸詿誤而困衡已深者自不妨從衆公舉一體叙録於以昭王道蕩平無作好惡亦卓絶古今一事也國是宜定大學士葉向髙疏臣惟天下之治亂必有其形治者非豐亨豫大之謂也朝政清明庶官輯睦即謂之治亂者非禍變擾攘之謂也法紀凌遲人心囂競即謂之亂皇上視今之天下治耶亂耶臣不敢言其他即如近建言諸臣意見稍分門户遂立藩籬既樹而隙釁彌開始而臭味繼而參商又繼而水火矣始而旁觀繼而佐鬭又繼而操戈矣株連蔓引枝節横生暮跖朝夷好莠自口遂使盡言無諱之朝反憂白馬清流之禍一何諸臣之失計也夫天下議論有一時而定者有一時未必定而俟之日後則又自定者有爭辨而明者有愈辨不明而置之不辨則又自明者揚湯止沸不如去薪可謂善喻諸臣何不思乎然此為諸臣言耳朝廷者臣下之紀綱威令所自出也故言一事則必决一事之從違毋因一事而滋盈庭之議言一人則必斷一人之用舍毋因一人而開羣枉之門今皇上一切涵容無所可否當去不去當留不留當斷决不斷决聚之使争養之使鬨奏牘日多事端日起職此之故夫人主之明如日月威如雷霆也日月之明以其常運雷霆之威以其迅速非運非速則毋乃自傷其明而威幾頓乎自古忠邪不分朋黨為害多見於叔季之世庸愚之君今聖明在御乾綱獨攬豈容有此誠宜盡發諸臣之疏勅下部院評其是非曲直以聽聖裁言當則行不當則止中有顚倒謬戾之甚者量處一二以警將來則人心振肅議論分明而朝宁之間廓然有天清地寧之景象矣皇上亦何憚而不為乎臣嘗為相知者言天下事非一家私議自譽為君子無益也天下後世以為君子則眞君子矣見詆為小人未傷也天下後世以為小人則眞小人矣小人君子界限甚嚴公論甚晰自古及今未之能逃念及於此將客氣自消而爭論自息矣此又臣一得之愚而欲為諸臣忠告者臣與諸臣比肩事主無嫌無疑亦無一毫偏䕶私意但目擊世界紛紜至此而處輔弼之任黙無一言安所逃責故敢直陳其愚惟聖明少加意焉遇災引罪崇禎十六年二月大學士公疏臣等因風霾具疏引罪適蒙發下欽奉御批連日風霾大作朕心悚惕靡寧深自省察總因朕寡德所致卿等𢎞謨藎志以佐不逮朕深切倚頼不必合詞引咎至於敎誨以至誠感格等語尤覘悃忱朕謹凛天戒敢懈誠修益望輔弼大臣多方匡救其折轉一應扼擊盡殱功罪賞罰屢㫖已詳行間文武諸臣俱著殫智竭力奮勵掃除必期成功該部即日馳飭欽此臣等叩頭恭頌不勝感激不勝惶悚竊惟我皇上敬天之威時保不懈錫民之福歲省惟勤昨者兆示風霾咎惟臣下而乃以悚惕省察嚴洪範五事之徵以匡救誠修謹春官十煇之戒實與我聖祖露坐郊壇顧諟雷斧之意先後同符在昔周宣王雲漢示警南征北討赫然中興彼猶中主也矧以堯舜之資而當天心仁愛之㑹滅敵平寇日可俟矣所愧臣等才識疎庸罪愆叢積若律以輔理無能之效正當在災異策免之條而猶過荷矜原暫稽恩譴俯循衾影彌切淵氷統俟兵事稍寧再圖合詞控請其行間督撫諸臣復經批諭嚴飭當益祗遵臨事奮勵成功以仰副宸算除臣等另報名廷謝外謹先具揭回奏恭謝伏祈聖鑒臣等不勝激切悚息之至崇禎十六年三月二十六日晚上二十七日奉御批覽先生毎奏朕知道了朕警凛天威勉法祖德此揭奏禆益良深并前疏著命所司書於殿壁時存警戒不虚先生毎訓誨至意該衙門知道閣員宜推吏部尚書陸光祖疏本月十五日申時伏蒙皇上召臣光祖與志臯至㑹極門傳奉敕諭初未知為何事恭捧到於朝房然後知為陞趙志臯禮部尚書張位吏部左侍郎俱入閣辦事始臣等微聞申時行等密薦二臣今乃果然臣等素知二臣之賢士論稱為正人君子望其柄用今皇上信納閣臣之言用之輔理良協輿情臣不勝欣躍但事闗職掌有不容不言者夫爵人於朝與衆共之祖宗定制凡大臣員缺吏部與九卿㑹推請㫖簡用至推吏兵二部尚書各邊總督及内閣大臣則九卿之外復益以六科十三道葢其任愈重則舉愈當公詢謀僉同方敢推用實所以廣忠集衆而杜偏聽之奸絶阿私之患也自大學士張居正用事閣臣進用始有不由㑹推者意在市恩蔑棄成法天下共言其非矣今時行等所薦固為得人即使㑹官廷推二臣資望安知不在所推數中奚庸私薦哉臣愚以為㑹推大典祖制决不可廢私薦内降其端决不可啓伏望皇上俯納臣言以後閣臣員缺仍勅吏部九卿科道官照例㑹推疏名以請廣衆大廷之中孰敢蔽賢亦孰敢私所厚庶朝廷有大公至正之體而所舉之臣亦有光榮得以殫心而任事矣若一聽之獨舉密薦誠恐異日狥私植黨之禍殆有不可勝言者臣待罪銓衡不敢不為國家存深長之慮冐昧上言伏望聖明裁奪謹題請㫖萬歴十九年九月十八日具題二十日奉聖㫖新簡閣臣你毎既説士論稱服元輔所薦足見至公今次斷自朕心原不為例以後還着㑹推按爵人於朝所以示公也自傳奉行而官品亂矣當時閣員缺公議起王山陰閣中恐妨已遂行揭薦蘭溪不足言而礦税之禍實自新建開之則平湖一疏豈可少乎春明夢餘録卷二十三
