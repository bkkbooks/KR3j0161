  text: 欽定四庫全書
  hash: sha256:64d9ff2e7643d8cd3464e7f4c9e75c7d6d85eb6ee80c540d6dcbeeab187b9ddc
  markers:
  - {type: page-break, offset: 0, content: '', id: KR3j0161_WYG_002-1a, image: WYG0868/WYG0868-0019c.png}
body:
  text: 春眀夢餘録卷二吏部左侍郎孫承澤撰形勝幽燕自昔稱雄左環滄海右擁太行南襟河濟北枕居庸蘇秦所謂天府百二之國杜牧所謂王不得不可為王之地楊文敏謂西接太行東臨碣石鉅野亘其南居庸控其北勢㧞地以崢嶸氣摩空而崱屴又云燕薊内跨中原外控朔漠真天下都㑹桂文襄云形勝甲天下扆山帯海有金湯之固蓋真定以北至於永平闗口不下百十而居庸紫荆山海喜峰古北黄花鎮險阨尤著㑹通漕運便利天津又通海運誠萬世帝王之都太行自西来演迤而北綿亘魏晉燕趙之境東而極於毉無閭重岡疊阜鸞鳳峙而蛟龍走所以擁䕶而圍繞之者不知其幾千萬里也形勢全風氣密堪輿家所謂蔵風聚氣者兹地實有之其東一𢃄則汪洋大海稍北乃古碣石稍南則九河既道所歸宿之地浴日月而浸乾坤所以界之者又如此其直截而廣大也况居直北之地上應天垣之紫微其對面之案以地勢度之則泰岱萬山之宗正當其前也夫天之象以北為極則地之勢亦當以北為極易曰艮者東北之卦也萬物之所以成終而成始也艮為山水為地之津液而委於海天下萬山皆成於北天下萬水皆宗於東於此乎建都是為萬物所以成終成始之地自古所未有也前乎元而為宋宋都於汴前乎宋而為唐唐都於秦在唐之前則兩漢也前都秦而後都雒然皆非冀州境也雖曰宅中圖治道理適均而天下郡國乃皆背之而不靣焉者孔子曰為政以徳譬如北辰居其所而衆星拱之易曰離萬物皆相見南方之卦也聖人南靣而聴天下嚮眀而治夫以北辰為天之樞居微垣之中而受衆星之所向則在乎南焉今日京師居乎艮位成始成終之地介乎震坎之間出乎震而勞乎坎以受萬物之所歸體乎北極之尊嚮乎離眀之光使夫萬方之廣億兆之多莫不靣焉以相見則凡舟車所至人力所通者無不在於照臨之中自古建都之地上得天時下得地勢中得人心未有過此者也朱文公熹曰冀都天地間好個大風水山脉從雲中發来前靣黄河環繞泰山聳左為龍華山聳右為虎嵩山為前案淮南諸山為第二重案江南五嶺諸山為第三重案故古今建都之地皆莫過於冀都蓋指今之京師地也唐趙徳鈞為幽州節度使於幽之南六十里城閻溝而戍之又於幽之東五十里城潞縣而戍之二城乃幽州之門户也閻溝即今良鄉潞縣即今通州京師瀕大海在秦始皇時起黄腄瑯琊之粟轉輸北河秦時海運固已通于兹矣唐杜甫謂漁陽豪侠地擊鼓吹笙竽雲帆轉遼海粳稻来東吳又云幽燕盛用武供給亦勞哉呉門持粟帛汎海凌蓬莱唐時已通吳之粟於此矣京東至山海闗西至黄花鎮為闗寨者二百一十二為營堡者四十四為衛二十二為守禦所三設分守叅將五于燕河營太平寨馬蘭峪密雲縣黄花鎮以管攝營堡謂之闗設守備都指揮五于山海永平遵化薊州三河以管攝衛所謂之營設總兵官一員于三屯營以總鎮焉闗設於外所以防守營立於内所以應援其制可謂密矣此所以控御其形勢者也劉基云元氏入主中夏佐以姚劉許律諸君子雖因其邇于隂山以定都而地形之强實甲天下撫據全盛㡬將百年一時文章亦頗有竒氣未必非山川形勝風氣之觀感或有以助之也至於元季四方鼎沸而國都固猶晏然自若也蓋其東連滄海西接晉冀前有瀰瀦大陸之利北有重闗天險之固若非天命有歸其主自遜於荒而以勢利相持雖引百萬之兵頓之堅城之下嵗月之間成敗利鈍未知其勢孰為得失也劉基燕都龍虎臺賦猗歟太行之山呀雲豁霧結元氣而左蟠於赫龍虎之臺摩乾軋坤魁羣山而獨尊其背則崔嵬突嵂森岡巒而拱衞其勢則崑崙駊騀仰星辰之可捫白虎敦圉而踞峙蒼龍蜿蜒而屈盤仗昂首以奮角恍颷興而雲屯其北望則居庸􅏭嵲烟光翠結攅峰列㦸斷崖立鐡踆鳥飛而不度古木樛以相掣其下視則漲海冲瀜飛波洗空風帆浪舶徃来莫窮想瀛洲之密邇睇三山之可通彼呼鷹戯馬適足彰其陋而眺蟾望烏曷足逞其雄豈若兹臺之不事乎版築而靡勞乎土功也想其嶔岑碕礒曼衍迤邐形髙勢平背山靣水巨靈獻其幽秘歸邪護其光晷何嵩華之足吞豈岱宗之可擬此所以通光道於上都掲神京之外壘匪松喬之敢登差乗輿之攸止也至若四黄既駕鹵簿既濟方玉車之萬乗蔚翠華之萋萋載雲䍐與九斿光彩絢乎虹霓山祗執警以廣道屏翳洒雨以清埃朝發軔於清都夕駐蹕于斯臺眀四目以遐覽沛仁澤于九垓眇軒轅之梁甫屑神禹之㑹稽雄千古之盛典又何數乎方壺與蓬莱慨愚生之多幸際希世之聖眀雖未獲睹斯臺之壯觀敢不慕乎頌聲遂作頌曰瞻彼神臺在京之郊金城内阻靈闗外包上倚天倪下鎮地軸太行為臂滄海為腹崇臺峩峩虎以踞之羣山巃嵸龍以翼之於鑠帝徳與臺無窮於隆神臺與天斯同崇臺有偉鑾駕爰止天子萬年以介遐祉春明夢餘録卷二
