body:
  text: 春眀夢餘録卷二吏部左侍郎孫承澤撰形勝幽燕自昔稱雄左環滄海右擁太行南襟河濟北枕居庸蘇秦所謂天府百二之國杜牧所謂王不得不可為王之地楊文敏謂西接太行東臨碣石巨野亘其南居庸控其北勢拔地以崢嶸氣摩空而崱屴又云燕薊內跨中原外控朔漠真天下都㑹桂文襄云形勝甲天下扆山帶海有金湯之固蓋真定以北至於永平關口不下百十而居庸紫荆山海喜峰古北黃花鎮險厄尤著㑹通漕運便利天津又通海運誠萬世帝王之都太行自西來演迤而北綿亘魏晉燕趙之境東而極於醫無閭重岡疊阜鸞鳳峙而蛟龍走所以擁護而圍繞之者不知其幾千萬里也形勢全風氣密堪輿家所謂藏風聚氣者兹地實有之其東一𢃄則汪洋大海稍北乃古碣石稍南則九河既道所歸宿之地浴日月而浸乾坤所以界之者又如此其直截而廣大也况居直北之地上應天垣之紫微其對面之案以地勢度之則泰岱萬山之宗正當其前也夫天之象以北為極則地之勢亦當以北為極易曰艮者東北之卦也萬物之所以成終而成始也艮為山水為地之津液而委於海天下萬山皆成於北天下萬水皆宗於東於此乎建都是為萬物所以成終成始之地自古所未有也前乎元而為宋宋都於汴前乎宋而為唐唐都於秦在唐之前則兩漢也前都秦而後都雒然皆非冀州境也雖曰宅中圖治道理適均而天下郡國乃皆背之而不靣焉者孔子曰為政以德譬如北辰居其所而衆星拱之易曰離萬物皆相見南方之卦也聖人南靣而聽天下嚮眀而治夫以北辰為天之樞居微垣之中而受衆星之所向則在乎南焉今日京師居乎艮位成始成終之地介乎震坎之間出乎震而勞乎坎以受萬物之所歸體乎北極之尊嚮乎離眀之光使夫萬方之廣億兆之多莫不靣焉以相見則凡舟車所至人力所通者無不在於照臨之中自古建都之地上得天時下得地勢中得人心未有過此者也朱文公熹曰冀都天地間好個大風水山脉從雲中發來前靣黃河環繞泰山聳左為龍華山聳右為虎嵩山為前案淮南諸山為第二重案江南五嶺諸山為第三重案故古今建都之地皆莫過於冀都蓋指今之京師地也唐趙德鈞為幽州節度使於幽之南六十里城閻溝而戍之又於幽之東五十里城潞縣而戍之二城乃幽州之門户也閻溝即今良鄉潞縣即今通州京師瀕大海在秦始皇時起黃腄琅琊之粟轉輸北河秦時海運固已通于兹矣唐杜甫謂漁陽豪俠地擊鼓吹笙竽雲帆轉遼海粳稻來東吳又云幽燕盛用武供給亦勞哉吳門持粟帛泛海凌蓬萊唐時已通吳之粟於此矣京東至山海關西至黃花鎮為關寨者二百一十二為營堡者四十四為衛二十二為守禦所三設分守參將五于燕河營太平寨馬蘭峪密雲縣黃花鎮以管攝營堡謂之關設守備都指揮五于山海永平遵化薊州三河以管攝衛所謂之營設總兵官一員于三屯營以總鎮焉關設於外所以防守營立於內所以應援其制可謂密矣此所以控御其形勢者也劉基云元氏入主中夏佐以姚劉許律諸君子雖因其邇于隂山以定都而地形之强實甲天下撫據全盛幾將百年一時文章亦頗有竒氣未必非山川形勝風氣之觀感或有以助之也至於元季四方鼎沸而國都固猶晏然自若也蓋其東連滄海西接晉冀前有瀰瀦大陸之利北有重關天險之固若非天命有歸其主自遜於荒而以勢利相持雖引百萬之兵頓之堅城之下嵗月之間成敗利鈍未知其勢孰為得失也劉基燕都龍虎臺賦猗歟太行之山呀雲豁霧結元氣而左蟠於赫龍虎之臺摩乾軋坤魁羣山而獨尊其背則崔嵬突嵂森岡巒而拱衛其勢則崑崙駊騀仰星辰之可捫白虎敦圉而踞峙蒼龍蜿蜒而屈盤仗昂首以奮角恍颷興而雲屯其北望則居庸􅏭嵲烟光翠結攢峰列㦸斷崖立鐡踆鳥飛而不度古木樛以相掣其下視則漲海冲瀜飛波洗空風帆浪舶往來莫窮想瀛洲之密邇睇三山之可通彼呼鷹戲馬適足彰其陋而眺蟾望烏曷足逞其雄豈若兹臺之不事乎版築而靡勞乎土功也想其嶔岑崎礒曼衍迤邐形髙勢平背山靣水巨靈獻其幽祕歸邪護其光晷何嵩華之足吞豈岱宗之可擬此所以通光道於上都揭神京之外壘匪松喬之敢登差乘輿之攸止也至若四黃既駕鹵簿既濟方玉車之萬乘蔚翠華之萋萋載雲罕與九斿光彩絢乎虹霓山祗執警以廣道屏翳灑雨以清埃朝發軔於清都夕駐蹕于斯臺眀四目以遐覽沛仁澤于九垓眇軒轅之梁甫屑神禹之㑹稽雄千古之盛典又何數乎方壺與蓬萊慨愚生之多幸際希世之聖眀雖未獲睹斯臺之壯觀敢不慕乎頌聲遂作頌曰瞻彼神臺在京之郊金城內阻靈關外包上倚天倪下鎮地軸太行為臂滄海為腹崇臺峩峩虎以踞之羣山巃嵸龍以翼之於鑠帝德與臺無窮於隆神臺與天斯同崇臺有偉鑾駕爰止天子萬年以介遐祉春明夢餘録卷二
