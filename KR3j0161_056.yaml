body:
  text: 春眀夢餘録卷五十六吏部左侍郎孫承澤撰首善書院首善書院在宣武門內東城牆下鄒馮兩先生講學之所也京師首善之地元宫梵宇鴟吻相望而獨無學者敬業樂羣之所往年羅念菴先生徐華亭相國同志講學率借僧舍誠大缺事也天唘二年鄒南臯馮少墟兩先生倡道于兵火震撼人心披靡之時有功于世道殊巨御史臺諸公搆書院一所于宣武門內東牆下兩先生朝退公餘不通賓客不赴宴㑹輒入書院講學紳襟有志于學者環而靜聽或間出問難無不暢其懷來一時轉相傳說咸知顧名義重廉恥士風為之稍變未幾逆璫用事郭允厚朱童蒙輩相繼疏論以講學為門户未幾楊漣二十四罪之疏上附璫者嗾璫謂此皆門戶中人也黨禍大作善類一空而御史倪文煥遂奏請毁書院棄先師木主于路左壁有記為葉公向高文董公其昌書並碎焉書院既毁逆祠乃建及逆祠毁而書院不復建蓋以秉政大臣猶襲門户穢唾以錮天下向學者遂使關閩壇坫之迹終不能勝蜀洛門户之見哀矣昔人有言國之將亡必其禮樂先去而後國隨之然則當日失禮之大孰有踰于首善書院一事者乎因輯其略俾後之有志興復者有所考云葉文忠向髙首善書院記首善書院者御史臺諸君所創為南臯鄒先生少墟馮先生講學所也額曰首善者以在京師為首善地也二先生語余子為記余曰記講學者必其素嘗學問之人髙不知學何以為辭二先生固强之余乃言曰古之所為教學則庠序學校盡之矣當其時里黨之所肄習師儒之所修眀舍三德六行五倫之外無他物也自鄒魯興齗齗于洙泗鳬繹之區始言心言性言道德仁義而其指歸不出于孝弟時庠序學校廢而賢人君子之有志于學者始欲得聖賢為之依歸以共維世教于不墜其上下之相為補救如此漢唐以來以雜途詞章取士置德行倫常于不講至宋而濂洛關閩諸儒乃復續鄒魯之微言轉相授受鹿洞鵝湖始有書院以聚徒講學亦杏壇之遺意也眀興設科羅才雖取詞章而學宫功令載在臥碑者一本于德行至以眀倫額其堂其大指與三代同而末流之弊逐功利而迷夲真乃反甚于漢唐賢士大夫欲起而維之不得不復修濂洛關閩之餘業使人知所向往于是通都大邑所在皆有書院而京師獨缺欲講學者率寄跡于琳宫梵宇黃冠緇流之所居而無一敬業樂羣之地蓋二百年於兹矣夫大學之道眀德親民歸于止至善其釋止至善首言邦畿千里惟民所止其重邦畿如此而要其所止又不外於君臣父子之倫蓋聖人之教人眀白顯易不為奧說渺論又如此夫惟君臣父子之倫眀而後朝廷尊朝廷尊而後成其為邦畿可為民止故曰商邑翼翼四方之極㑹極㑹此歸極歸此此之謂首善非他之通邑大都所得而比也二先生之惓惓于此舉意念深矣吾聞鄒先生之學深參默證以透性為宗以生生不息為用其境地所詣似若并禪機元旨而包括于胸中馮先生之學反躬實踐以性善為主以居敬窮理為程其識力所超又若舉柱下竺乾而悉驅于教外要之於規矩凖繩倫常物理尺尺寸寸不少踰越與世之髙談性命忽略躬行者大相徑庭則二先生師世淑人之模範又無不同故凡謁鄒先生者盎然如太和元氣之薰蒸疑遊華胥之庭其見馮先生則屹然泰山喬嶽生仰止之心今合二先生振鐸于邦畿又適值聖天子道化覃敷統接堯舜一時名流濟濟如龍源鍾先生輩相與于喁倡和共眀君臣父子之倫闡皇極以示㑹歸使凡有志于大學者毋以至善為荒唐而唐虞三代之治可復還于今日則其所補于世道豈淺鮮哉往徐文貞在政地好講學朝紳借以為市江陵矯之至盡毁天下之書院使世以學為諱余愧不䏻為文貞奉二先生于臯比而幸與之同朝時聆其謦咳又讀其論學之書目覩書院之建未嘗不欣欣然有執鞭之願世得無執江陵之見以誚余乎余亦甘之矣書院在大時雍坊十四鋪貿易自民間為資一百八十兩皆五㕔十三道所輸經紀其事者司務呂君克孝御史周君宗建以天唘二年月日開講是為記鄒忠介元標謹陳共學之原疏臣以待盡之年日有家園之思行裝已束待期而請偶聞聖嗣將誕大小臣工咸慶聖皇有子臣受不次之恩不隨班行歡欣祝頌豈臣子之情臣所以眷戀遲回者以此本月初四夜接兵科都給事中朱童䝉一疏為憲臣議開講學之壇國家恐起門户之漸欲臣等安心本分愛惜精神以東林為戒以法度風俗進賢退不肖等語屬望臣等思深哉科臣心乎臣有味乎其言之矣先正云本分之外不加毫末人生聞道始知本分內事不聞道則所謂本分者未知果是本分與否也天下治亂係于人心人心邪正係于學術法度風俗刑清罰省進賢退不肖舍眀學則其道無由無偏無黨王道蕩蕩無黨無偏王道平平臣等所講習討論者惟是銷反側以歸正直㑹有極以歸皇極若分門别戶則名教所不載也湛湛清空鳶自飛魚自躍天自髙地自下總是造化生機浩浩長安大成大小成小德可成材可達盡是皇上大澤無一物不備亦無一事可少琳宫㑹館觸目如林梵唄新聲沸耳如雷豈獨礙此嘐嘐則古昔談先聖之儒紳耶豈獨多此海內衣冠萃止之壇坫耶臣常逖思千古自吾夫子振鐸東魯孟軻氏繼之唐韓愈謂軻之死不得其傳所謂不傳者必有指歸至宋而諸儒並起我眀益光大有耀臣等方欲為孔孟求心法之傳童䝉獨不思為東魯延箕裘之緒乎臣志學非自今日始也臣弱冠幸舉孝廉從諸長者一登講堂此心戚戚既謝計偕獨處深山者三年嗣入夜郎兀坐深箐者六年浮沉南北棲遲田畝又三十餘年賴有此學死生患難未嘗隕志所藉朝夕切劘者無論他省即東魯則孟秋朱鴻謨王汝訓其師友也記得隆慶丁卯戊辰間徐階當國集諸部臣手書識仁定性二書與諸士商度今未嘗以是損徐階相業神宗癸未乙酉丙戌間臣等每集于演象所月有講會時執政諸臣亦嘗過而問焉後生不知今元輔所知也若以臣等講學惟宜放棄斥逐之日以此澆其磊塊消其抑鬱無聊之氣則如切如磋者道學也一語端為濟窮救苦良方非盡性至命妙理亦視斯道太輕視諸林下臣太淺矣人生墮地髙者自訓詁帖括外别無功課自青紫榮名外别無意趣惡聞講學者實繁有徒蓋不知不聞道即位極人臣勛勒旗常了不得本分事生是虛生死是虛死朽骨青山黃鳥數聲不知天與昭昭者飄泊何所此臣所以束髮至老不敢退墮自甘者也臣又有言焉東林諸臣有文有行九原已往惟是在昔朝貴自岐意見一倡衆和幾付清流懲前覆轍不在臣等臣心在光天化日之下剖籓籬垣牆之界聞童蒙之言惟自鞭自策更復何疑臣又思詩云相彼鳥矣猶求友聲矧伊人矣不求友生神之聽之終和且平古人求友必有嚶鳴相合臣等求友未得和平之韻先來同類之疑願罷臣以為倡學者之戒臣為順則之民足矣願陛下經筵日講為諸臣先無以臣等阻千百世共學之心國家幸甚臣愚幸甚馮恭定從吾書院當建臣罪當斥疏頃臣接邸報見兵科都給事中朱童䝉一本憲臣議開講學之壇等事臣讀之不勝惶愧竊惟世道之所以常治而不亂者惟恃有此理學之一脉亦惟恃有此講學之一事講學創自孔子而盛于孟子故孟子以作春秋闢楊墨為一治至孟子沒而異端蜂起列國紛爭禍亂相尋千有餘年良可浩歎至宋儒出而始有以接孟氏之傳然中興于宋而禁于宋是宋之不競以禁講之故非以講之故也伏惟我二祖開基表章六經頒行天下天子經筵講學皇太子出閣講學講學二字昔為厲禁今為令甲是周家以農事開國國朝以理學開國昨二月間因東事暫停經筵而言者以為不可旋復舉行人人稱快然臣之望其君以講學而自己不講是欺也倘皇上一日開講問講官曰諸臣望朕以講學不知諸臣亦講學否不知講官何以置對倘皇上一日御朝問諸臣講學亦有定所否不知諸臣又何以置對今臣等創建書院于此豈為名豈為利豈為官爵豈為一身宴遊之地豈為子孫世守之業原為兩京十三省俱有而京師為天子之都為首善之地反無書院非所以壯帝都而昭一代文眀之盛况今外內交訌邪教猖獗正當講學以提醒人心激發忠義先臣王守仁當兵戈倥偬之際不廢講學卒以成功此臣等所以不恤毁譽不恤得失而甘心冒昧為此也臣罪良深臣心良苦矣夫以二百五十年所未有之事而一旦為之真為可駭無怪乎童䝉之有此疏也童䝉欲臣等修職業惜精神然講學正講其職業如何修精神如何惜耳童䝉可謂愛臣厚教臣多矣臣方感之服之而又何暇與之辨惟皇上察臣無他䏻罷臣歸田使廟堂之上省一番議論臣即耕鑿深山亦有餘適臣不勝悚惶待命之至葉文忠向髙陳愚衷以質公論疏頃科臣朱童蒙以講學論鄒元標馮從吾二臣已奉旨慰留此猶論其事耳未病其人也今科臣郭允厚遂併其人而詆訾之臣竊以為過矣二科臣之意似不在講學而在于眀嵗之考察恐鄒元標有所左右其袒即允厚疏中亦已自言之年來門戶釁興互為勝負近當事者劑量其間人心稍平臣與吏部尚書張問達每論及此未嘗不歎息于前事之過當而以今此計典必力矯其失一切歸于公平鄒元標議論亦是如此毋奈人情多端過生猜疑必逐去鄒元標而後快也鄒元標在皇祖朝直聲振于朝野三尺童子無不知其為忠臣淹伏數十載海內共惜皇上拔之田間任以九列足稱清朝盛舉臣素不識鄒元標近與周旋見其懇懇愛人之念渾渾赤子之心絶無分毫矜名負氣籠罩矯飾之態心甚慕之即謂其居山已久于世局有所未諳宅衷太虛于人言有所易入然于鄒元標之本色無所損允厚所列率皆吹毛洗垢無甚關係至于張居正之恤典則楚人請之臣等擬之功罪原不相掩褒貶何妨並存鄒元標之不言臣方服其無成心奈何更以為罪欲併其一生之大節而抹殺之何其甚也鄒元標在朝如麒麟鳳凰自足為瑞如渾金璞玉自足為型何必規規然責以服乘之䏻雕鏤之技哉若逐去鄒元標則其他之講學氣節如鄒元標者皆不得安其位人心必為不平紛爭又將不了門戶之禍必與國家相終始朝廷之上已先自亂又何暇問封疆之事哉而臣亦烏可一日居此地也夫講學之禁從來未有乃二科臣之疏屢奉內傳頻更票擬至謂宋室禍敗由于講學誰為此言以告皇上獨不思宋方盛時正以濂洛關閩講眀學術比及南宋王淮韓托胄陳賈輩始立僞學題目搆陷朱熹諸賢而宋祚遂終我太祖髙皇帝立綱陳紀設科取士一本於宋儒成祖文皇帝復令儒臣採輯宋儒論學之書為性理大全頒學宫二百五六十年道德一風俗同一切裂防决綱之事有所忌憚而不敢為皆係于此皇上奈何輕聽二科臣之言而不深考祖宗一代之治法乎日來言路諸臣條陳甚多率多咈而少俞乃二科臣獨有當于聖心臣誠不知其故也如以講學為結黨則世之結黨者豈盡講學之人若欲結黨何待講學如以元標之講學為可議則臣又有忠告之談當嘉靖時海瑞以忠直著名謫歸起官為應天巡撫尅核操切人皆不堪卒被擠以去其後再起再被人言當時亦有以言者為是至于今日瑞之髙名如故而言者卒為世所詬病今元標之失未至如瑞而求多者乃反甚焉臣又安知他日之議論竟何如耶臣職在平章可以無言但恐人心不同煩囂易起若不稍為剖眀必將有非二臣者又將有非非二臣者紛紜排擊險怪一至于此今臺臣馮從吾又求去矣銓臣張問達亦苦苦言元標當即繼之矣去察典幾何時而在事諸臣勢將一空誰為皇上了此事者臣安得默無一言且當聖眀之朝有道學之禁臣為執政而諸賢連翩去國天下萬世清議謂何且將與王淮陳賈輩同被惡名是亦臣之所踧踖不安者故敢冒昧一伸其愚如以臣言為偏護則臣願與元標俱去以謝科臣不敢自眀者也臣生平不知講學惟是臣鄉素稱海濱鄒魯生鄒魯之鄉而禁孔孟之學臣尤不敢統望聖眀鑒察臣不勝悚息塵瀆之至又請休致疏頃臣以朱童蒙郭允厚論鄒元標冒進一言蓋臣自弱冠為諸生聞元標抗疏廷杖四海之人凡有心知者無不仰慕以為真古之遺直比臣通籍則元標再起為給事中為吏部皆以直言去臣備員政地人皆以不䏻起元標罪臣即臣亦自以為生平第一歉事幸遇皇考皇上録用遺賢拔擢元標而臣亦自田間來得有同朝之喜元標屢有去志皆以勸留而止臣亦自盡其夙心耳固不虞世之不能容元標一至此也童䝉兩臣疏謂無逐元標之心此誠是矣然自童蒙之疏上未幾而郭允厚繼之郭興治又繼之童蒙病其講學允厚併及其人品興治又恐禁學非所以為名人品未可以遽定遂深而擬之為賊三臣之意同而其說則已三變其攻元標可謂不遺餘力矣從學宫之改敕書禁講學毁書院沙汰生員此乃張居正所為非祖宗朝法也居正之得罪于清議背成憲失人心正為此事童䝉奈何引之臣為書院記文固云世必有執江陵之見以誚余者何其言之偶中乎至以屢奉內傳數語為臣之險毒則不過臣據事直書同官諸臣共聞共見未嘗添揑一語亦未敢過疑童蒙之有他也童蒙欲臣主張目前使禍機交息則如此一事臣已不䏻主張矣誰發禍機而望臣息之哉然童蒙實未嘗攻臣臣豈可為童蒙求去惟念封疆多事各鎮告急茫茫無以應而滇黔危困至極其承役來此求救者日時涕泣臣亦為之淚下無餉無兵無䇿可救各處撫按及科道官又連章纍牘請免加𣲖終無可以免加𣲖之䇿臣本老病之人為之焦思苦念日夕眩暈每對同官言尸素如此何顔自立本意勉挨眀春方敢求去今再三籌度萬不當留留亦無益伏望聖慈哀憐允放仍敕下九卿科道悉心講求所以足餉足兵拯九邉救滇黔之策其他閒言閒語可以暫置童蒙輩亦各安其位勿過猜疑臣雖歸死林下有餘幸矣髙忠憲攀龍論學揭近者黃門朱五吉有憲臣議開講學之壇國家慮唘門戶之漸一疏指意歸重東林至欲以東林為戒而不復講學此說一倡吾道之禍大矣職東林人也即不言及于職何忍坐受東林之誣正欲具疏旋奉眀旨如日中天不復瀆奏以唘爭端故謹具揭夫黃門所言東林非東林也乃攻東林者之言也所言東林之禍非東林能禍人乃攻東林者欲禍東林也數年來職每自詫理義人心同然何以言理義者輒目為朋黨而不容于世乎一日憬然曰正惟同然也故以為黨也國家用一當用行一當行去一當去必曰是東林之脉也或有人言一當用言一當行言一當去必曰是東林之人也不論東西南北風馬牛不相及之人茍出于正目為一黨東林何幸而合天下之衆正何不幸而受天下之羣猜弓蛇石虎塗豕鬼車皆非實事也即如郭眀龍正域生平未嘗講學生平不識東林黃門謂與顧憲成開講東林即此而觀他可例推無亦黃門師生姻婭之間涵濡浸灌之久于時局之說不自覺其入之之深乎不然何以二三年來門户去于人口依然還作當年口吻耶夫時局何為而攻東林也方中涵相國未入相之前首參之者吳嚴所亮也既入相之後首參之者錢梅谷春也故一時承迎相國者皆以攻東林為職業摧殘善人戕害國脉率由于此此果東林所為乎抑攻東林者所為乎以為東林所為東林䏻制其鄉里言官不參論人乎昔程伊川先生講學于熙豐而為蔡京諸人所攻朱晦菴先生講學于慶元而為韓托胄諸人所攻不以蔡京韓托胄為戒而以伊川晦菴為戒可乎東林非程朱而習程朱之教者也不幸類是矣夫學者何也人之性也性者何也天之道也知道則刑名錢榖皆實事也不知道則禮樂刑政皆虛文也在此心迷悟間耳諸老從迷得悟不忍人之覿面而迷故講以眀之正使之即事為學非以學廢事黃門曰孰是仕優者乎乃可學不然勿言學職亦曰孰是學優者乎乃可仕不然勿言仕審如是可仕者寡矣宇宙甚大不可以一見相礙釋老且不䏻廢况可廢儒儒者以眀道者也非儒生帖括之謂也非督學膠黌之事也收拾精神而非消耗精神者也人不知學世道交喪于是朋黨禍起相安則交安相危則交危故黨類之黨不䏻無是群分之品也偏黨之黨不可有是亂亡之夲也知黨類之不䏻無使之各得其所而勿相猜忌知偏黨之不可有使之各懲其禍而勿為已甚但得人人自反勿専尤人則無不可融異為同化小為大故有教則無類并黨類之黨亦可融之者其必由學乎惟學可消門戶顧以學為立門戶職未見立門戶者而可以謂之曰學也有眀之初各省俱有書院自張江陵當國始行嚴禁江陵沒復稍稍建置一時著名者徽州江右關中無錫而至天唘中京師始有首善書院然人不知各處書院而統謂之東林又不知東林所自始而但借東林二字以為害諸君子之名目蓋東林乃無錫書院名也宋楊龜山先生所建後廢為僧寺顧涇陽先生自吏部罷歸購其地建楊先生之祠同志者相與構精舍居焉至甲辰冬始與髙忠憲數公開講其中立為㑹約一以考亭白鹿洞規為教然躬與講席者僅數人時涇陽先生已辭光祿之召不赴於新進立朝諸公漠無與也適忠憲起為總憲風裁大著疏發御史崔呈秀之贓呈秀遂父事忠賢日嗾忠賢曰東林欲殺我父子忠賢初不知東林為何地東林之人為何人輒曰東林殺我既而楊左諸公交章劾璫璫益信諸人之言不虛也於是有憾於諸君子者牽連羅織以逢逆璫之惡鋃鐺大獄慘動天地遂首毁京師書院而天下之書院俱毁矣及忠賢誅公論眀廢籍遺佚駸駸登用適大言不慚之邊臣僨轅敗事失志者乘機搆釁復倡黨說謂庇護邉臣者東林也於是蒲州髙邑大名一時俱去朝廷之上另用一番人政事日新議論日竒刑尚苛刻而以言寬大者為東林餉主加𣲖而以言减免者為東林賊議欵撫而以言戰勦者為東林至政本之地司馬之堂前後聞凶俱衣緋辦事而以言終制言綱常者為東林于時至清無徒閉門博古之黃宫詹且糾之為老妖誣之為立幟降謫不已繫逮之詔獄不已廷杖之烟戍不已永戍之及劉總憲被斥出都破帽蒙頭舊部民京兆父老十餘為之牽驢灑泣乃政本大老方侈以為得計嗟嗟覆亡之禍豈盡關氣數哉余生長輦轂于首善書院曽見其建又見其毁而冉冉老矣思興復之無期不能不于此憤惋留連三致意焉按宋人浚儀王應麟曰漢初郡國往往有夫子廟而無教官且不置博士弟子員其學士嘗課試供養與否不見經傳然諸儒以眀經教于其鄉率從之者數百人其齊魯燕趙之間詩書禮樂春秋論語名家者甚盛則設書院昉是矣蓋未修庠序之教士病無所以學相與擇勝地立精舍為羣居講習之所若嶽麓白鹿洞之類是也逮慶歷熙寧之盛學校之官遂遍天下彼時書院在南康者曰白鹿書院在湖廣者曰嶽麓書院在歸德者曰應天書院在登封者曰嵩陽書院稱四大書院書院之設莫盛于元而皆設山長以主之給廩餼以養之幾遍天下而在京師者有太極書院中書行省楊惟中請建書院德安人趙復賢士也皇子闊出征江南俘得之㑹姚樞奉命搜訪人才見復與語大悅之同北上遂以復居書院中録其所記程朱之書以教學者由是河朔始知道學按元人吳萊淵頴集云趙復字仁甫國初南伐攻德安潰之仁甫遭虜遇姚文獻公中軍文獻與言信竒士仁甫方以國破家殘不欲北且蘄死㑹夜月出即逃乃亟被鞍躍馬號積尸間見其解髮脫屨仰天呼泣蓋欲求至水裔而未溺也文獻曉以徒死無益乃還然後盡出程朱性理等書及諸經傳故今文獻與許文正公遂為當代傳宗仁甫為有以發之也先正有云世之去聖日逺故學者惟傳經最難仁甫當天下擾攘之際乃能盡發先儒傳疏而傳之不亦難乎上在潛邸常召見曰我欲取宋卿可導之乎對曰宋父母國也未有引他人之兵以伐父母者故仁甫雖在燕久常有江漢之思元得若人以主國學可謂得人矣衍聖公府衍聖公府在皇城西太僕寺街仁宗初諭四裔來貢皆有公館先聖子孫乃寓民舍無以示崇尚之意乃賜府第其入京下程自宣德後用羊一隻鵝二隻酒六瓶麵二十斤茶鹽醬各二斤油燭十枝其初大庖欽賜後改禮部又改順天府聖裔漢初封褒成侯至唐元宗始封孔子為文宣王而令其子孫得襲王爵宋神宗議加至神元聖帝因李邦直言周室稱王陪臣不當為帝于是僅加元聖二字至和中祖擇之言文宣諡號後嗣不當以為封爵乃改封衍聖公至後因之然既封公爵品居第二泰昌元年山東撫臣以聖裔陳乞復王號具疏上聞為通政司及禮科所駁而止衍聖公秩二品特賜麟袍玉帶誥命用玉軸大朝㑹班一品上示不臣也孔氏世舉一人為曲阜令公親弟承子思為翰林五經博士其從南渡系衢州者亦世襲博士凡曲阜孔氏大小俱免徭役公許䕃五百戶丁為從人又宣德間孔諤者㑹試至京召見即與進士出身授春坊中允景泰中名公詢者㑹試中式賜出身除禮科給事中始持服服除超拜少詹纍朝優禮之如此神宗萬歷七年諭衍聖公萬夀入賀朝廷待以賓禮不在職官文武之列不必朝參此古待三恪所不及崇禎辛巳七月行幸學禮取衍聖公孔𦙍植五經博士孟聞玉等至京傳令賜宴舊無賜宴例亦屬特典春眀夢餘録卷五十六
