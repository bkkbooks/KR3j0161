body:
  text: 春明夢餘録卷六吏部左侍郎孫承澤撰宫闕燕中宮闕古不可考當自遼始遼史載其略云南京析津府本古冀州之地髙陽氏謂之幽陵陶唐曰幽有虞析為幽州商復為兾州周職方東北曰幽州武王封太保奭於燕漢為燕國廣陽國後漢為廣陽郡隋為幽州總管唐置大都督府改范陽節度使晉髙祖以遼有援立之勞割幽州等十六州以獻太宗升為南京又曰燕京城方三十六里崇三丈衡廣一丈五尺敵樓戰櫓具八門東曰安東迎春南曰開陽丹鳯西曰顯西清普北曰通天拱辰大內在西南隅皇城內有景宗聖宗御容殿二東曰宣和南曰大內內門曰宣教改元和外三門曰南端左掖右掖左掖改萬春右掖改千秋門有樓閣毬場在其南東為永平館皇城西門曰顯西設而不開北曰子北西城巔有涼殿東北隅有燕角樓坊市廨舍寺觀蓋不勝書其外有居庸松亭榆林之關古北之口桑乾河髙梁河石子河大安山燕山中有瑤璵府曰幽都軍號盧龍開泰元年落軍額宋王曾奉使録略曰自雄州白溝驛渡河四十里至新城縣右督亢亭之地又七十里至涿州北渡涿水范水劉李河六十里至良鄊縣渡盧溝河六十里至幽州號燕京子城就羅郭西南為之正南曰啓夏門內有元和殿洪武殿東門曰宣和城中坊門皆有樓有憫忠寺本唐太宗為征遼陳亡將士所造又有開泰寺魏王耶律漢寧造皆邀朝士遊觀城南門外有於越王廨為晏集之所門外永平館舊名碣石館請和後易之南即桑乾河按遼之正殿曰洪武元之正殿曰大明是後之國號年號已見於此誰謂非定數也金宫城史載海陵煬王遣左右丞相張浩張通古左丞蔡松年調諸路夫匠築燕京宫室皇城周九里三十步自天津稿之北曰宣陽門中門繪龍兩偏繪鳯用金釘釘之中門唯車駕出入乃開兩偏分雙單日開一門過門有兩樓曰文曰武文之轉東曰來寧館武之轉西曰會同館正北曰千步廊東西對焉廊之半各有偏門向東曰太廟向西曰尚書省至通天門後改名應天樓髙八丈朱門五飾以金封東西相去一里餘又各設一門左曰左掖右曰右掖內城之正東曰宣華正西曰玉華北曰拱辰及殿凡九重殿凡三十有六樓閣倍之正中位曰皇帝正位後曰皇后正位位之東曰內省西曰十六位乃妃嬪居之西出玉華門曰同樂園若瑤池蓬瀛栁莊杏村皆在焉都城四圍凡七十五里城門十二每一面分三門其正門四旁又設兩門正東曰宣曜陽春施仁正西曰顯華麗澤彰義正南曰豐宜景風端禮正北曰通元會城崇智此四城十二門也此外有宣陽門即內城之南門也上有重樓制度宏大三門並立中門常不開惟車駕出入通天門即內城之正南門也四角皆垜樓瓦皆琉璃金釘朱户五門列焉常扄惟大禮祫享則由之宣華乃內城之正東門玉華正西門也左掖東偏門右掖西偏門各有武夫守衛拱辰即內城正北門也又曰後朝門制度守衛與玉華宣華等金碧翬飛規模宏麗矣范石湖攬轡録其略云興陵見宋使儀衛戊子早入見循東西御廊北行廊幾二百間廊分三節每節一門將至宫城廊即東轉又百許間其西亦然亦有三門出門中馳道甚濶兩傍有溝上植栁廊脊皆以青琉璃瓦覆宫闕門户即純用之北即端門十一間曰應天之門下開五門兩挾有數如左右升龍之制東西兩角樓端門內有左右翔龍門日華月華門前殿曰大安殿使人自左掖門入北循大安殿東廊入敷德門東北行直東有殿宇門曰東宫直北西南列三門中曰書英是故夀康殿母后所居西曰會通門自會通北入承明門又北則昭慶門東則集禧門尚書省在門外東西則左右嘉會門門有樓即太安殿後門之後至幕次黑布拂廬侍班有頃入宣明門即常朝後殿也門內庭中列衛士二百許人帖金雙鳯幞頭團花紅錦衫散手立入仁政隔門至仁政殿下團鳯大花氊可半庭殿兩傍有朵殿朵殿上兩髙樓曰東西上閣門兩廊悉有簾幕中有甲士東西御廊循簷各列甲士東立者紅茸甲金纒竿槍黃旗畫青龍西立者碧茸甲金纒竿槍白旗畫黃龍至殿下皆然惟立於門下者錦袍持弓矢殿兩階雜列儀物幢節之屬如道家醮壇威儀之類使人由殿下東行上東階却轉南由露臺北行入殿閾謂之欄子金主幞頭紅袍玉帶坐七寶榻背有龍水大屏風四壁帟幕皆紅繡龍拱斗皆有繡衣兩檻間各有焚香大金獅蠻地鋪禮佛毯可一殿兩傍玉帶金魚或金帶者十四五人相對列立遙望前後殿屋崛起甚多制度不經工巧無遺力煬王亮始營此都規摹出於孔彥舟役民八十萬兵夫四十萬作治數年死者不可勝計金朝北京營制宫殿其屏扆忩牖皆破汴都輦致於此汴中工匠有名燕用者製作精巧凡所造下刻其名及用之於燕而名已為先兆元大都宫殿考宫城周回九里三十步東西四百八十步南北六百十五步髙三十五尺分六門正南曰崇天左曰星拱右曰雲從東曰東華西曰西華北曰厚載舊記曰南麗正門內千步廊可七百步建靈星門門建蕭墻周廽可二十里俗呼紅門闌馬墻門內二十步有河上建白石槗三座名周槗槗四白石龍擎載旁盡髙桞鬱鬱萬株逺與城內海子西宫相望及槗可二百步為崇天門門外有五總建關樓其上連內觀旁出為十字角樓其左有門為東華右為西華中為大明門仍旁建掖門繞為長廡中抱丹墀之半左右為文武樓與廡相連中為大明殿乃登極正旦夀節會朝之正衙也殿後連為主廊十二楹四周金紅鎖忩連建後宫廣三十步殿半之後有寢宫俗呼為拏頭殿東西相向至冬則自殿外一周皆籠護皮帳夏則黃油絹幕內寢屏帳重覆帷幄而後褁以銀鼠席地皆編細簟上架深紅厚氊後覆茸卑宫後連抱長廡以通前門以貯妃嬪而每院間必建三楹東西相向為繡榻廡後橫亘道以入延春宫丹墀皆植青松即萬年枝也置金酒海前後列紅蓮牀其上為延春閣後仍為主廊東有文思小殿西有紫檀小殿寢東有玊德殿又東有宣文閣旁有祕密堂西有鹿頂小殿前後散為便門髙下分引而入更為别殿飛甍數座又後為清寒宫宫後引抱長廡逺連長春宫其中皆以處嬖幸也又後為厚載門上建髙閣東百步有觀星臺臺傍有雪栁萬株臺西為內浴室有小殿在前由浴室而出內城臨海子廣可五六里駕飛槗於海中起瀛洲之殿後引長槗上萬嵗山山髙可數十丈東臨太液池西北皆俯瞰海子下有故殿基尚存金主圍棋石盤山半有方壺殿又為吕公洞洞上數十步為金露殿由東而上為玉虹殿殿前有石岩如屋繞層闌登廣寒殿內列二十四楹出為露臺繞以白石闌道旁有鐵竿數丈上置金葫蘆三引鐵練以繫之乃金章宗所立以鎮其下龍潭山下萬栁中有浴室前有小殿為穴中盤雙龍昻首共吐一丸於上注以溫泉自瀛洲外城西度飛仙槗上入明仁殿半臨邃河河流引自瀛洲西邃地而出繞延華閣達於興聖宫復西折秃樂斯后老宫而出抱前苑東下於海子約逺三四里新殿後有二水晶圓殿中有修衢長槗逺而升懿德殿槗傍二石柱度槗前苑入懿德殿主廊寢宫亦如前制乃建都之初基也山後仍為寢宫連以長廡廡後西繞邃河東流水出便門走繞東北又繞紅墻入紅門可二十步許為光天門仍闢左右掖門而繞以長廡中為光天殿殿後穿廊如前但廊後髙起隆福宫左右後三向皆為寢殿殿東有沉香殿長廡環抱又後為興聖宫中建小直殿引邃河分流繞其下甃以白石翌為仙槗四起鎖忩而抱綵樓樓後東西為日月殿後又有禮天臺髙跨殿上又少東有流杯亭又少東出便門步邃河入明仁殿後為延春閣規制髙大與延華相望四面皆臨花苑苑東有端本堂又東為棕毛殿少西出掖門為慈仁殿又後苑中為金殿四外盡植牡丹百餘年髙可五尺又西有翠殿又有花亭毬閣金殿前有野果名紅姑娘外垂絳囊中空有桃子如丹朱苑外重繞長廡廡後出內墻東連海子以接厚載門元世祖思創業艱難取所居之地青草置於大內丹墀之前謂之誓儉草司農達不花詩墨河萬里金沙漠世祖深思創業難却倚闌干望青草丹墀留與子孫看明太宗永樂十四年車駕巡幸北京因議營建宫城初燕邸因元故宫即今之西苑開朝門于前元人重佛朝門外有大慈恩寺即今之射所東為灰厰中有夾道故皇墻西南一角獨缺太宗登極後即故宫建奉天三殿以備巡幸受朝至十五年改建皇城於東去舊宫可一里許悉如金陵之制而𢎞敞過之按金陵宫殿作於吳元年門曰奉天三殿曰奉天曰華蓋曰謹身兩宫曰乾清坤寧四門曰午門東華西華元武至洪武十年改作大內午門添兩觀中三門東西為左右掖門奉天門之左右為東西角門奉天殿之左右曰中左中右兩廡之間左文樓右武樓奉天門外兩廡曰左順右順及文華武英二殿至二十五年建金水槗及端門承天門樓各五間長安東西三門北京宫殿悉倣其制永樂十五年起工至十八年三殿工成十九年辛丑四月初八日庚子災新宫既遷舊內東華門之外逼近居民喧囂之聲至徹禁籞宣德七年始加恢擴移東華門於河之東遷民居於灰厰西之隙地正統五年三月建三殿兩宫六年九月工成嘉靖三十六年丁巳四月十三日奉天等殿門災是日申刻雷雨大作戍刻火光驟起由正殿延燒至午門樓廊俱盡次日辰刻始熄三十七年七月大朝門等工成四十一年三殿成改奉天殿曰皇極殿門曰皇極門華蓋殿為中極謹身殿為建極文樓曰文昭武樓曰武成左順門曰會極右順門曰歸極東角門曰𢎞政西角門曰宣治又改乾清右小閣曰道心左門曰仁蕩右門曰義平正德九年兩宫災萬歷二十四年丙申三月乾清坤寧災二十五年二月重建是年六月十九日三殿災天啓五年二月起工至七年八月初二日三殿工成共用銀五百九十五萬七千五百十九兩餘皇城外圍墻三千二百二十五丈九尺四寸其門凡六曰大明門曰長安左門曰長安右門曰東安門曰西安門曰北安門俗呼曰厚載門仍元舊也墻外紅鋪七十二登聞鼓院在長安右門外紫禁內城牆南北各二百三十六丈二尺東西各三百二丈九尺五寸其門凡八曰承天門曰端門曰午門即俗所謂五鳯樓也東曰左掖門西曰右掖門再東曰東華門再西曰西華門向北曰元武門墻外紅鋪三十六午門之內曰皇極門左曰𢎞政門右曰宣治門旁曰歸極門曰會極門皇極門內東曰文昭閣西曰武成閣上曰皇極殿中曰中極殿後曰建極殿所謂三大殿也中極滲金圎頂如穿堂之制建極殿後曰雲臺門東曰後左門西曰後右門亦名曰平臺又東則景運門西則隆宗門中則乾清門上則為乾清宫崇禎元年八月初四日題敬天法祖牌東暖閣曰昭仁殿西暖閣曰𢎞德殿左曰日精門右曰月華門曰端凝殿曰懋勤殿左小門曰龍光右小門曰鳯彩西御憩房萬歷中更夀安居乾清宫後披簷東曰思政軒西曰養德齋中圎頂則交泰殿上則曰坤寧宫皇后所居坤寧東露頂曰貞德齋西露頂曰養正軒東披簷曰清暇居北圍廊曰逰藝齋左曰景和門右曰隆福門再北左曰端則門右曰基化門便接瓊苑左右門矣此中一路之大略也乾清宫後過日精門之東曰崇仁門稍南則曰奉慈殿萬歷中改東裕庫曰𢎞孝殿崇先殿改為神霄殿日精門往北曰順德北門則東一長街也再北向西與龍光門斜對者曰咸和左門向南者曰景仁宫其東則東二長街也南首曰麟趾門北首曰千嬰門麟趾門之東曰延禧宫曰怡神殿再東曰嘉德左門再東曰蒼震門咸和左門之北向西與景和門相對者曰廣和左門向南者曰承乾宫東宫貴妃所居東二長街之東曰永和宫廣和左門之北向西與端則門相對者曰大成左門向南者曰鍾祥