禄米一次至一千二百石葢百級矣皆濫典也内書堂教習内官始於宣廟初以大學士陳山後皆以編檢矣然不施夏椘其權反在學長其罰典輕則以界方捶手重則於聖人前罰跪再重則扳著㡬炷香扳著者向聖人直立彎腰用兩手扳住兩脚不許股屈屈則界方兩下嘉靖中詹事霍韜等重修㑹典疏謂内臣監局官員祖訓置軄甚詳惟𢎞治年間儒臣失考不及纂述宜查洪武年間各監局軄掌何如員數何如編列禮典亦以禮制治之意也不報嗣是屢脩㑹典無人議及矣附載宫人叅随視朝起扵晉代六朝相因至唐不改六典曰宫嬪掌朝㑹贊相之事引容立於殿廷杜詩所謂户外昭容紫袖垂雙瞻御座引朝儀是也崔𦙍盡誅宦官止令内夫人至中學士院傳宣聖諭及朱溫将謀禪代而始罷宫人傳宣及随朝之儀永樂末年上有疾用宫人随侍出朝後無復有此事漢時宫中有對食者宫人相與配合為夫婦也陳皇后無子使宫人衣上衣冠與之寝䖏武帝廢之責以為女而男滛後世宫人率與中官為匹偶其暱甚于夫婦唐時宫中給使令者皆有冠巾謂之裹頭内人舊制宫中女官亦給冠帯即其遺制也宋制以内夫人六人輪日修起居至暮封付史館舊制有女秀才代書王命而不職起居此不及宋古塟宫人之所謂之宫人斜京城阜城門外五里許有静樂堂磚甃二井屋以塔南通方尺門謹閉之井前結石為洞四方通風宫人有病非有名稱者例不賜墓則出之禁城後舜貞門榜右門承以歛具舁出元武門經北上門北中門達安樂堂授其守者召本堂土工移北安門外易以朱棺禮送之静樂堂火塟塔井中凡宫人故必請旨凡出必以銅符合符乃遣嘉靖中有貴嬪捐資易民地數畝其焚燼不願井者悉内地中禮儀房奶口皇城東安門外稍北有禮儀房乃選養奶口以候内廷宣召之所俗名奶子府有提督司禮監太監有掌房有貼房俱錦衣衛指揮每季選奶口四十名養之於内謂之坐季奶口别選八十名籍于官謂之㸃卯奶口倘坐季者有故即以補之先期宛平大興兩縣及各衙門博求軍民家有夫女口年十五以上二十以下夫男俱全形容端正第三胎生男女僅三月者雜選之仍令稳婆騐無隠疾具結起送候司禮監請旨差内官出合各衙門所送奶口㑹選乃定每口日給米八合肉四兩光禄寺支領每年更番什物每季煤炭雜器兩縣召商辦送每遇宣取則就中選取一人易髙髻新衣宫粧以進崇禎十六年五月司禮監王徳化本云奶口例有定額按季遴選季終退換故取之於軍者則錦衣等二十八衛之大小地方之廣狹以定口數之多寡故衛之口數最多者為錦衣額數以一百計餘衛則十五以至十口止城縣之最多者為南城額以一百七十計餘則一百二十以至二十口止每遇選期慎擇生男生女各二十口并所乳嬰兒存房作養以備一季之取用上季未用者即行疎放此舊例也今宜選生男生女各以十五口為額少副軫恤之意至於里甲之勒索僉報之騷擾事屬城司宜嚴申禁故事民間婦無得入禁中者即諸宫女已承恩賜名稱其母非得㫖亦不入惟三婆則時有之一曰奶婆即二縣與各衙門選送禮儀房坐季奶口若内廷将有誕喜先鋪月子房傳預選則數人候之内直房産男用乳女者産女用乳男者初亦雜試候月餘乃留一人一曰醫婆取精通方脉者候内有㫖則各衙門選取以送司禮監㑹選中籍名待詔入選者婦女多榮之一曰穏婆即民間收生婆中預選籍名在官者惟内府所用之如選宫女則用以辨别妍媸可否如選奶口則用以等第乳汁厚薄隠疾有無如内廷有喜則先期預集老扵事者直宿日伺候之事定乃罷諸婆中有一經傳宣者則出入髙髻彩衣如宫装以自别於曹偶民間亦以此信而用之醫婆穏婆事竣皆得出惟奶口一留用則終其身事所乳得霑恩澤無復出理其食報葢特隆云崇禎辛巳令乳皇子至七嵗放出保母之崇非先王之制即中季亦自陸令萱等一二人而外不多見明制例封夫人而永樂之保母賢順夫人馮氏夫王忠贈左都督諡恭靖洪熈之衛聖夫人楊氏夫蔣廷封追封保昌伯諡荘靖此作法於􅋽矣至天啟之奉聖夫人客氏子弟官俱累都督客氏黨比逆賢幾危宗社後市附古國都如井田法畫為九區面朝背市左祖右社中一區君之宫室宫室前一區為外朝朝㑹蔵庫之屬皆在焉後一區為市市四面有門每日市門開則商賈百物皆入惟民得入公卿大夫士皆不得入入則有罰市官之法如周禮司市平物價治争訟譏察異服異言之類此國君都邑規模之大槩也宫闕之制前朝後市市在元武門外每月逢四則開市聽商賈易謂之内市燈市自正月初旬起至月半止嵗惟一舉每月逢朔望及二十五則城隍廟市每月逢三則土地廟市謂之外市然外市係士夫庶民之所用若竒珍異寳進入尚方者咸於内市萃之至内造如宣徳之銅器成化之窑噐永樂果園厰之髹器景泰御前作房之琺瑯精巧逺邁前古四方好事者亦扵内市重價購之自古都邑大賈名侠皆有稱號如古地官司徒司市市官掌市之治教政刑量度禁令以次序分地而經市以陳肆辨物而平市以政令禁物靡而均市以商賈阜貨而行市以量度教賈而徵價以質劑結信而止訟以賈民禁偽而除詐以刑罰禁虣而去盗以泉府同貨而歛賖大市日昃而市百族為主朝市朝時而市商賈為主夕市夕時而市販夫販婦為主漢書所謂東市賈萬城西萬章箭張禁酒趙放又如貨殖傳所載翁伯販脂張氏賣漿郅氏灑削濁氏胃脯其所貨至為纎嗇往往鼎食撃鐘富比王侯都城舊日如勾欄衚衕何關門家布前門槗陳内官家首飾雙塔寺李家冠帽東江米巷黨家鞋大柵欄朱家靴雙塔寺趙家薏酒順承門大街劉家冷淘麺本司院劉鶴家香帝王廟街刁家丸藥皆名著一時起家鉅萬至抄手衚衕華家專煑猪頭内而宫禁外而勲戚皆知其名薊鎮将帥置走馬傳致亦當日太平勝槩也登聞鼔院附院在西長安門小㕔三間東向傍一小樓懸鼓俾寃民撃之通達下情每日科道官各一員錦衣衛官一員輪司其事民有寃抑有司不為申理具状通政司又不為轉達審實列其状以聞唐時宫闕前有肺石長可八九尺形如垂肺古秋官大司㓂以肺石達窮民原其義乃伸寃者撃之立其下然後士聼其詞所以肺形者肺主聲聲所以達其寃也憲綱凡按察司官斷理不公不法等事果有寃枉者許赴廵按監察御史處聲寃監察御史枉問許赴通政司遞状送都察院申理都察院不與理斷或枉問者許撃登聞鼓陳訴春明夢餘録卷六
