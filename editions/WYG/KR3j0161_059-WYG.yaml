body:
  text: 春眀夢餘録卷五十九吏部左侍郎孫承澤撰欽天監二觀象臺觀象臺在城東南隅臺上有渾天儀如世所圖璇璣皆鑄銅為器四柱以銅龍架而懸之又有簡儀状相似而省十之七止周圍數道而已玉衡亦以銅為之如尺而首尾皆曲有二孔對孔直窺以候中星又有銅球左右旋轉以象天體以方函盛之函四周作二十八宿真形南面有正統御銘臺下小室有量天尺鑄銅人有捧尺北面室穴其頂以候日中測景之長短冬至後可得一丈七尺夏至後可得二尺中為紫微殿殿傍有銅壺滴漏其簡儀乃耶律楚材製周禮保章氏掌天星以志日月星辰之變動以觀天下之遷辨其吉凶以星土辨九州之地所封封域皆有分星以觀妖祥以十有二嵗之相觀天下之妖祥以五雲之物辨吉凶水旱降豐荒之祲象以十有二風察天地之和命乖别之妖祥凡此五物者以詔救政訪叙事吳澂曰天星天文星度也歩占之法以星為主故曰天星十有二辰經天左旋常度不移不足以見吉凶惟日月五星行乎十二辰之次緯天左旋而日有薄蝕暈珥之變月有盈虧朓朒之變五星有盈縮圜角之變故總言日月星辰之變動變動即所謂遷也順則為吉逆則為凶二者相叅變矣星土十二土也合而言之曰九州星土之書雖無可攷然十二國之分野載諸傳記灾祥所應亦皆可證若昭十年有星出於婺女鄭禆竈曰今兹嵗在顓頊之墟姜氏任氏實守其地此元枵為齊之分星而青州之星土也昭三十二年吳伐越晉史墨曰越得嵗而吳伐之必受其凶釋者曰嵗在星紀此星紀為越之分星而揚州之星土也昭元年鄭子產曰成王滅唐而封叔虞焉故参為晉星實沈為参神此實沈為晉之分星而并州之星土也襄九年晉士弱曰陶唐氏之火正閼伯居商邱相土因之故商主大火此大火為宋之分星而豫州之星土也昭十七年星孛及漢申湏曰漢水祥也衞顓頊之墟故為帝邱其星為大水此娵訾為衞之分星而冀州之星土也鄭語周史曰楚重黎之後也黎為髙辛氏火正此鶉尾為楚之分星而荆州之星土也爾雅曰析木為津釋者謂天漢之津梁為燕此析木為燕之分星而幽州之星土也以至周之鶉火秦之鶉首趙之大梁魯之降婁無非以其州之星土而為其國之分星以星土而占灾祥其應有可徴矣嵗星在木則水為相之類五星順度為祥流逆失度為妖襄二十八年嵗在星紀而淫于元枵是謂蛇乗龍梓慎以為宋鄭必饑則言其所屬以為周楚所惡則言其所衝其嵗星乖次之應乎嵗在星紀而吳伐越史墨謂不及四十年越其有吳乎以嵗星十二年一周存亡之數不過三紀非嵗星順次之應乎以類求之則嵗星太嵗皆可参决妖祥之事物色也視日旁雲氣之色左氏所謂凡分至啟閉必書雲物占法青為蟲赤為兵荒白為䘮荒黄為豐黒為水既言辨吉凶水旱又言降豐荒之祲象盖水旱之降為荒年荒年之降為豐年其序如此十二風者艮為條風從大吕太簇之律兑為閶闔風從南吕之律乾為不周風從無射應鐘之律坎為廣莫風從黄鐘之律所謂八風從律是也又法于緹室之中因逐月管入律地之淺深月氣至則葭灰飛以此察天地之和氣然左氏載師曠歌北風又歌南風而知晉楚之勝負妖祥之應可决於此乖則異别則離此天地之不和而為妖祥也故命之使知所趨避上文五事即救政叙事之所從出也政者國之本詔救政於上則人君修省之道事者有司之常職訪叙事於下則人臣知警戒之意君臣交修而天降祥矣星厯總論曰夫天以輕清之氣而運乎上一晝一夜而過一周其道右行日月五星亦以輕清之氣而麗乎天日不及一度月不及十三度随天而左轉日有中道月有九行日月相推嵗凡十二㑹方㑹則月光盡滅而為晦已㑹則月光復蘇而為􅃋舒遅先後近一逺三則月斜倚而為弦相與為對當天之中則月光滿而為望􅃋晦而日月之行東西同道南北同度則月掩日而日為之食至望而日月之對同度同道則月亢日而月為之食日至角牛之方月行青赤之道則為春為夏日至婁井之方月行白黒之道則為秋為冬日道發南去極彌逺其景彌長逺長乃極冬乃至焉日道歛北去極彌近其景彌短近短乃極夏乃至焉二至之中道齊景正春秋乃分焉日月之光聚而為星中元為北極上元為太微宫下元為天市垣二十八宿衆星者言乎其經也金木水火土五星者言乎其緯也其曰㑹者言乎日月星辰之所㑹也其曰客者言乎星辰之不出太白也其曰主者言乎星辰之出乎太白也金水附日一嵗而周天火二嵗而周天木十二嵗而周天土二十八嵗而周天故曰有遅有速北極則出地上三十六度常見而不隠南極則入地下三十六度常隠而不見故曰有伏有見朝出曰贏夕出曰縮西行曰迷日月同度曰陵不順不逆芒及曰犯妖變曰孛含譽之射示其喜也格澤之生示其怒也執法郎官象其官也眀堂靈臺象其物也此其理之精深而存乎物感者也馬融有言上天之理不可測知天之事者惟有璇衡一事則求夫得天之實者惟渾天儀近之矣盖璇衡之制起於髙辛氏而虞舜察之以璿為璣而用以轉動是之謂璣以玉為管而横置其中是之謂衡璣以定天體衡以齊七曜即今之所謂渾天儀也是故黄帝得之厯起辛夘顓帝得之厯起乙夘厯之所作非渾天不可也青道二出黄道東朱道二出黄道南道之所出非渾天不可也錢藻則以朱黒白而别二家星葛衡則以青白黄而别三家星以考星宿非渾天不可也自軫十二度至氐四度則知為夀星自氐五度至尾九度則知為大火而其餘莫不皆然是考躔度非渾天不可也秦火之後其法蕩然漢洛下閎始經營之鮮于妄人又度量之至耿夀昌始鑄而為之象轉而望之以知日月星辰之所在也唐李淳風因之而為三重儀在外曰六合其内曰三辰其最内曰四游而一行復益之以黄道儀焉其為論亦宻矣靖康之亂儀象歸于金元人襲之而規環不協難復施用於是郭守敬乃創為簡儀仰儀及諸儀表其說以為昔人以管窺天宿度餘分未得其的乃用二線推測于餘分纎微皆有可攷又當時四方測景之所凡二十有七東極髙麗西極滇池南踰朱崖北盡鐡勒古人所未為者其法俱載元史而儀表至今用之豈天唘文眀之治而預生是人以創為一代之器乎分野之說以中國之九州應上天之十二次丑星紀吳越也子元枵齊也亥娵訾衞也娵訾一名豕韋戌降婁魯也酉大梁趙也申實沈晉也未鶉首秦也午鶉火周也已鶉尾楚也辰夀星鄭也夘大火宋也寅析木燕也按晉語云實沈之虚晉人是居周語云嵗在鶉火我有周之分野左襄九年商主大火昭元年参為晉星二十八年龍宋鄭之星又曰以害鳥帑周楚惡之則分野之說其来已久然星紀在東北而吳越實在東南魯宋鄭相去甚邇而分為四次且娵訾降婁戌亥之次也而魯衞屬之三家分晉始有趙何以大梁獨属趙韓魏不聞漢書地理志分郡國以配諸次其地分或多或少鶉首極多鶉火極狭徒祖相傳未聞源委於其分野或有妖祥占者多效皆聖哲度知非後人所能測也周官九州分野角亢氐兖州房心豫州尾箕幽州斗牛女揚州虛危青州室壁并州奎婁胃徐州昴畢冀州觜参益州井鬼雍州栁星張三河翼軫荆州凡五星嵗星色青比参左肩熒惑色赤比心大星鎮星色黄比参右肩太白色白比狼星辰星色黒比奎大星得其常色而應四時則吉變常則凶木與土合為内亂饑與水合為變謀而更事與火合為饑為旱與金合為白衣之㑹合鬭國有内亂野有破軍為水太白在南嵗星在北名曰牝牡年榖大熟太白在北嵗星在南其年或有或無火與金合為爍為䘮不可舉事用兵從軍為軍憂離之軍却出太白隂分地出其陽偏將戰與土合為憂主孽卿與水合為北軍用兵舉事大敗一曰火與水合為焠不可舉事用兵土與水合為壅沮不可舉事用兵有覆軍一曰為變謀更事必為旱與木合國饑水與金合為變謀為兵憂木火土金與水闘皆為戰兵不在外皆為内亂三星合是為驚立絶行其國外内有兵與䘮百姓饑乏改立侯主四星合是謂易行有徳受慶改立王者奄有四方子孫蕃昌亡徳受殃離其國家滅其宗廟百姓離去被滿四方五星皆大其事亦大皆小事亦小五星俱見其年必惡凡五星與列宿相去方寸為犯俱之不去為守兩體俱動而直曰觸離復合合復離曰闘當東反西曰退芒角相及同舍曰合凡五星東行為順西行為逆順則疾逆則遅通而率之終於東行不東不西曰留與日相近而不見曰伏伏與日同度曰合凡金水二星行速而不經天自始與日合後行速而先日夕見西方去日前稍逺夕時欲近南方則漸遅遅極則留留而近日則逆行而合日在於日後晨見東方逆極則留留而後遅遅極去日稍逺旦時欲近南方則速行以近日晨伏於東方復與日合度此五星合見遅疾順逆流行之大端也凡五星之行古法周天之數如嵗星謂十二年一周天乃約數耳晉灼謂太嵗在四仲則行三宿在四季則行二宿故十二年而行周二十八宿其說亦非夫二十八宿度有廣狭而嵗星之行自有盈縮豈得以十二年一周無差忒乎唐一行始言嵗星自商周迄春秋季年三百二十餘年而超一次因以為常以春秋亂世則其行速時平則其行遅其說尤迂既乃為後率前率之術以求之則其說自悖矣今紹興歴法嵗星每年行一百四十五分是每年行一次之外有餘一分積一百四十四年剰一次矣然則先儒之說安可信乎餘四星之行固無順逆中間豈無差忒一行不復詳言盖亦知之矣堯置閏以定四時舜察璣衡以齊七政唐虞之時歴象已極詳宻獨日月之食缺而不講良有深意後世疇人預定視為固然戒省之意蔑如矣薄蝕之說大約云月體無光待日為光日半照即為弦日全照即為望望為日光所照反得奪月光者當日之衝有大如日者謂之闇虚闇虛當月則月必滅故為月食日奪光應每望常食而有不食者道度異也日月異道有時而交交則相犯故日月逓食交在望前􅃋則日食望則月食交在望後望則月食後月􅃋則日食交正在􅃋則日食既前後望不食交正在望則月食既前後􅃋不食大率一百七十三日有竒而道始一交非交則不相侵犯故􅃋望不常有食也日月同㑹道度相交月掩日光故日食日掩月光故月食月食是日光所衝日食是月光所映故日食常在􅃋月食常在望也日月之行有南北則食有髙下日月之體有疎宻則食有偏全其度數晷刻咸可推算又連月食者甚少惟春秋襄二十一年九月十月二十四年七月八月頻食前書文紀三年十月十一月晦頻食髙紀三年十月甲戌晦日有食之十一月癸夘晦日有食之二十九日而食為太速榖梁荘公十有八年春王正月日有食之傳曰不言日不言􅃋夜食也註一日一夜合為一日今􅃋日日始出其有虧傷之處未復故知此是夜食榖梁之說甚異徐邈云夜食則星無光云一云夜食者厯官差其時宋寧宗六年史官言夜食不見是也元旦日食史或有之然未有連嵗日食如晉武帝時者咸亨三年春正月庚子􅃋日有食之四年正月庚午􅃋日有食之太康七年正月甲寅􅃋日有食之八年正月戊申朔日有食之梁普同元年正月乙亥􅃋大赦改元丙子日有食之二日食為異或云厯官避元日食移乙亥為􅃋耳太清元年正月己亥􅃋日有食之則又未必為厯官所移也東漢月二日食者凡三一云史官不見遼東以聞永樂十一年元旦日食吕尚書震請賀如常惟儀文簡公智争議不可上韙其言月食史不書然􅃋望皆食為變天順五年十一月􅃋日食望月食成化十二年二月􅃋日食望月食魏永安二年十月己酉日食地下虧從西南角起宋淳熈十二年九月望太史言月食在夜新厯楊忠輔言月食在晝慶元四年九月􅃋太史言日食在晝草澤陳大猷言日食且在夜是榖梁傳不獨言日有夜食而月並有晝食也漏刻之箭晝夜共百刻冬夏之間則有長短焉太史立成法有四十八箭按乾象厯及諸厯法皆云冬至則晝四十五夜五十五夏至則晝六十五夜三十五春秋分則晝五十五半夜四十四半從春分至於夏至晝漸長増九刻半從夏至至於秋分所減亦如之從秋分至於冬至晝漸短減十刻半從冬至至於春分所加亦如之又於毎氣之間加減刻數有多有少其事在於厯術以其算數有多有少不可通而為率故太史之官立為法定作四十八箭以一年有二十四氣每一氣之間又分為二通率七日強半而易一箭故周年而用箭四十八也厯言晝夜者以昬明為限馬融王肅注尚書以為日永則晝漏六十刻夜漏四十刻日短則晝漏四十刻夜漏六十刻日中宵中則晝夜各五十刻者以尚書有日出日入之語遂以日見為限尚書緯謂刻為商鄭作士昬禮目録云日入三商為昬舉全數以言耳其實日見之前日入之後距昬眀各有二刻半減晝五刻以禆夜故於厯法皆多校五刻也今欽天監厯日皆用馬王之說而長止於五十九刻不言六十短止於四十一刻不言四十以見隂陽之妙云按璣衡之象或謂起於伏羲或謂作於帝嚳或云乃羲和舊制非舜創為也馬融謂上天之體不可測知天之事者惟有璣衡一事而已璣衡即今渾天儀也王蕃之論亦謂儀之制置天梁地平以定天體為四游以綴赤道者此謂璣也置望筩横簫於儀中以窺七曜之行而知其躔離之次者此謂衡也若六合儀三辰儀四游儀並列為三重者李淳風所作而黄道儀者一行所増也始張衡祖洛下閎耿夀昌之法别為渾象㝠輪宻室以漏水轉之以合璇璣所加星度則渾象本别為一器唐李淳風梁令瓉祖之始與渾儀並用宋沈括所上渾天儀載在宋史者其為論精宻有志於復古儀象者可考也洪武中與侍臣論日月五星侍臣以蔡氏左旋之說為對上曰天左旋日月五星右旋盖二十八宿經也附天體而不動日月五星緯乎天者也朕嘗於天清氣爽之夜指一宿以為主太隂居星宿之西相去丈許盡一夜則太隂漸過而東矣由此觀之則是右旋此歴家嘗言之蔡氏特儒家之說耳李日華云北極五星鈎陳六星皆在紫微宫中北極辰也其紐星天之樞也天運無窮三光逓曜而極星不動故曰居其所而衆星拱之賈逵張衡蔡邕王蕃陸績皆以北極紐星為樞是不動處也祖􅀈以儀凖候不動䖏在紐星之末猶一度有餘盖辰天壤也凡天無星處皆曰辰惟北極紐星為衆動之樞而其末一度有餘適無别星故得騐其不動耳日影周髀靈憲周官鄭注皆云每千里差一寸何承天云六百里差一寸信都芳云二百五十里差一寸嘉靖中監正樂頀五星聚營室疏臣等預算今年正月五星以次聚營室但太陽臨近當隠伏不見今候其象果然夫數不爽而星暗聚則其降精流氣亦必成祥自古五星之聚莫不有大福大禍惟視人君徳政淑慝何如耳占書曰五星之聚是謂改易王者有徳受慶子孫蕃昌無徳受殃失其國家百姓流亡盖天道無親福無常至故五星之聚有福有禍無徳靡不受禍聚房周祚以昌聚箕齊桓用覇漢興聚井宋盛聚奎是四者皆當更革之際一福一禍培栽傾覆昭然在徳惟天寳聚於尾箕而唐徳弗稱旋有禄山之亂唐業遂衰皇上聖徳中興五星適聚可不亟圖修徳愛養黎元以承此天慶乎簡易寡慾修徳之大儉費省財愛民之實伏乞陛下鑒此天數之大克己約躬勵精而實行之使人心悦而天意孚真所謂有徳受慶矣臣職司占候竊惟禍福之祥莫大於此至於修徳應天之實非臣等之言所能盡意更乞延訪文武羣臣博求修徳愛民之道而實行之占書又曰天下兵謀則五星聚於營室凡所以内修外攘以銷邉疆盗賊之謀者亦何可不加之意也余按嘉靖時五星聚營室其後改宫殿改郊壇改太廟紛紛制作海内虚耗此足應之樂監正不以頌而以規可謂良臣矣唐白居易司天臺詩司天臺仰觀俯察天人際羲和死來職事廢官不求賢空取藝昔聞西漢元成間下陵上替謫見天北辰微暗少光色四星煌煌如火赤耀芒動角射三台半見半滅中台拆是時非無太史官眼見心知不敢言眀朝趨入眀光殿惟奏慶雲夀星見天之時變兩如斯九重天子不得知安用臺髙百尺為夫昔人論國家治亂係於言路之通塞李沆為相日以四方水旱盗賊之事奏聞於上自言人主當知四方之艱難區區可以報國家者此耳卓哉其慮逺矣附記郭守敬字若思順徳邢臺人中統三年以薦賜見上都大喜授都水監工部郎中先是太保劉秉忠以大眀厯自遼金承用二百餘年浸以後天議欲修正而薨至是江左既平上思用其言遂以公與賛善王公率南北日官分掌測騐推歩於下而忠宣樞密二張公為之主領裁奏於上復共薦前中書左丞許公能推眀厯理俾参預之公首言厯之本在於測騐而測騐之器莫先儀表今司天渾儀宋皇祐中汴亰所造不與此處天度相符比量南北二極約差四度表石年深亦復欹側公乃盡考其失而移置之既又别圖爽塏以木為重棚創作簡儀髙表用相比覈又以為天樞附極而動昔人嘗展管望之未得其的作候極儀極辰既位天體斯正作渾天象象雖形似莫適所用作玲瓏儀以表之矩方測天之正圓欲合也實難法當以圓求圓作仰儀古有經緯結而不動公則易之作立運儀日有中道月有九行公則一之作證理儀表髙景虚罔象非真作景符月雖有眀察景則難作闚几厯法之騐在於交㑹作日月食儀天有赤道輪以當之兩極低昻標以指之作星晷定時儀以上凡十三等又作正方案丸表懸正儀座正儀凡四等為四方行測者所用又作仰規覆矩圖異方渾葢圖日出入永短圖凡五䓁與上諸儀互相参攷十六年改局為太史院以賛善公為太史令公為同知太史院事給印章立官府是年奏進儀表式様公乃對御指陳理致一一周悉公因奏唐一行開元間令南宫説天下測景書中見者凡十三處今疆宇比唐尤大若不逺方測騐日月交食分數時刻不同晝夜長短不同日月星辰去天髙下不同即曰測騐人少可先南北立表取直測景上可其奏遂設監候官十四員分道相繼而出先測得南海北極出地十五度夏至景在表南長一尺一寸六分晝五十四刻夜四十六刻衡岳北極出地二十五度夏至日在表端無景晝五十六刻夜四十四刻岳臺北極出地三十五度夏至景長一尺四寸八分晝六十刻夜四十刻和林北極出地四十五度夏至景長三尺二寸四分晝六十四刻夜三十六刻鐡勒北極出地五十五度夏至景長五尺一分晝七十刻夜三十刻北海北極出地六十五度夏至景長六尺七寸八分晝八十二刻夜一十八刻繼又測得上都北極出地四十三度少北亰北極出地四十二度強益都北極出地三十七度少登州北極出地三十八度少髙麗北極出地三十八度少西京北極出地四十度少太原北極出地三十八度少安西府北極出地三十四度半強興元北極出地三十三度半強成都北極出地三十一度半強西凉州北極出地四十度強東平北極出地三十五度太大名北極出地三十六度南亰北極出地三十四度太強陽城北極出地三十四度太弱揚州北極出地三十三度鄂州北極出地三十一度半吉州北極出地二十六度半雷州北極出地二十度太瓊州北極出地十九度太十七年新歴告成拜太史令公與太史諸公同上奏曰臣䓁竊聞帝王之事莫重於歴自黄帝迎日推策帝堯以閏月定四時成嵗舜在璇璣玉衡以齊七政爰及三代歴無定法周秦之間閏餘乖次西漢造三統厯百三十年而後是非始定東漢造四分厯七十餘年而儀式方備又百二十一年劉洪造乾象厯始悟月行有遅速又百八十年姜岌造三紀甲子厯始悟以月食衝檢日宿度所在又五十七年何承天造元嘉歴始悟以􅃋望及弦皆定大小餘又六十五年祖冲之造大眀厯始悟太陽有嵗差之數極星去不動處一度餘又五十二年張子信始悟日月交道有表裏五星有遅疾留􅊇又三十三年劉焯造皇極厯始悟日行有盈縮又三十五年傅仁均造寅元歴頗采舊儀始用定􅃋又四十六年李淳風造麟徳厯以古厯章蔀元首分度不齊始為總法用進􅃋以避晦晨月見又六十三年僧一行造大衍厯始以􅃋有四大三小定九服交食之異又九十四年徐昻造宣眀厯始悟日食有氣刻時三差又二百三十六年姚舜輔造紀元厯始悟食甚泛餘差數以上計千一百八十二年厯經七十改其創法者十有三家自是又百七十四年欽惟聖朝統一六合肇造區夏専命臣䓁改治新厯臣䓁用創造簡儀髙表慿其測到實數所考正者凡七事一曰冬至自丙子年立冬後依毎日測到晷景逐日取對冬至前後日差同者為準得丁丑年冬至在戊戌日夜半後八刻半又定丁丑夏至在庚子日夜半後七十刻又定戊寅冬至在癸夘日夜半後三十三刻己夘冬至在戊申日夜半後五十七刻半庚辰冬至在癸丑日夜半後八十一刻半各減大眀歴十八刻逺近相符前後應準二曰嵗餘自劉宋大眀歴以來凡測景騐氣得冬至時刻真數者有六用以相距各得其時合用嵗餘今考騐四年相符不差仍自宋大眀壬寅年距至今日八百一十年毎嵗合得三百六十五日二十四刻二十五分其二十五分為今歴嵗餘合用之數三曰日躔用至元丁丑四月癸酉望月食既推求日躔得冬至日躔赤道箕宿十度黄道箕九度有畸仍慿毎日測到太陽躔度或憑星測月或慿月測日或徑慿星度測日立術推算起自丁丑正月至己夘十二月凡三年共得一百三十四事皆躔於箕與月食相符四曰月離自丁丑以来至今慿毎日測到逐時太隂行度推算變從黄道求入轉極遅極疾并平行處前後凡十三轉計五十一事内除去不真的外有三十事得大眀歴入轉後天又因考騐交食加大眀歴三十刻與天道合五曰入交自丁丑五月以来慿毎日測到太隂去極度數比擬黄道去極度得月道交於黄道共得八事仍依日食法度推求皆有食分得入時刻與大眀所差不多六曰二十八宿距度自漢太初厯以来距度不同互有損益大眀歴則於度下餘分附以大半少皆私意牽就未嘗實測其數今新儀皆細刻周天度分毎度為三十六分以距線代管窺宿度餘分並依實測不以私意牽就七曰日出入晝夜刻大眀歴日出入晝夜刻皆據汴京為準其刻數與大都不同今更以本方北極出地髙下黄道出入内外度立術推求毎日日出入晝夜刻得夏至極長日出寅正二刻日入戌初二刻晝六十二刻夜三十八刻冬至極短日出辰初二刻日入申正二刻晝三十八刻夜六十二刻永為定式所創法凡五事一曰太陽盈縮用四正定氣立為升降限立招差求得毎日行分初末極差積度比古為密二曰月行遅疾古歴皆用二十八限今以萬分日之八百二十分為一限凡析為三百三十六限依垜疊招差求得轉分進退其遅疾度數逐時不同盖前所未有三曰黄赤道差舊法以一百一度相減相乗今依算術勾股弧矢方圓斜直所容求到度率積差差率與天道實為脗合四曰黄赤道内外度據累年實測内外極度二十三度九十分以圎容方直矢接勾股為法求毎日去極與所測相符五曰白道赤周舊法黄道變推白道以斜求斜今用立渾比量得月與赤道正交距春秋二正黄赤道正交一十四度六十六分擬以為法推逐月毎交二十八宿度分於理未盡十六年太史王公卒時歴雖頒然其推歩之式與夫立成之數尚未有定藳公於是比次篇類整齊分抄裁為推歩七卷立成二卷歴擬議藳三卷轉神選擇二卷上中下三厯註式十二卷二十三年繼為太史遂上表奏進又有時候箋註二卷修改源流一卷其測騐書有儀象法式二卷二至晷景考二十卷五星細行考五十卷古今交食考一卷新測二十八舎雜座諸星入宿去極一卷新測無名諸星一卷月離考一卷並藏之官厯法至郭太史厯之聖也後世欲外其法而别取㨗術未有不舛謬而卒不可行者聞其遺書為元順帝北遯時帶至沙漠不知尚有存者否乎春眀夢餘録卷五十九
