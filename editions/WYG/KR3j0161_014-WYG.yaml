body:
  text: 春明夢餘錄卷十四吏部左侍郎孫承澤撰天壇天壇在正陽門南之左永樂十八年建繚以垣墻周廻九里三十步初遵洪武合祀天地之制稱為天地壇後既分祀乃始專稱天壇按吳元年建圜丘以冬至祀昊天上帝建方丘以夏至祀皇地祗及即位猶分祀如故至洪武十年因風雨不時災異時見覽京房災異對始定合祀禮採古眀堂遺制即圜丘舊壝作大祀殿壇而屋之罷方丘而是嵗即奉天殿行焉十二年殿成祀昊天上帝皇地祗位南嚮仁祖配西嚮従祀丹墀四壇曰大眀曰夜眀曰星辰又曰星辰内壝外二十壇曰五嶽壇五中嶽壇以鍾山附曰五鎮壇五曰四海壇四曰四瀆曰風雲雷雨曰山川曰太嵗曰天下神祗曰歴代帝王各壇一凡二十四壇大臣分獻因命太常毎嵗祭天地于首春三陽交泰之時二十一年増修壇壝殿丹墀中􅑋石為臺東西相向為壇四内壝外為壇二十亦東西相向罷朝日夕月禜星之祭并罷太嵗風雲雷雨嶽鎮海瀆山川月將城隍歴代帝王之春祭建文元年撤仁祖位奉太祖配永樂十八年京師大祀殿成規制如南行禮如前儀増附天夀山於北嶽壇洪熙元年増文皇帝配位太祖下嘉靖九年従給事中夏言之議遂於大祀殿之南建圜丘為制三成祭時上帝南向太祖西向俱一成上其従祀四壇東一壇大眀西一壇夜眀東二壇二十八宿西二壇風雲雷雨俱二成上别建地祗壇壇制一成面徑五丈九尺髙九尺二成面徑九丈髙八尺一寸三成面徑十二丈髙八尺一寸各成面甎用一九七五陽數及周圍欄板柱子皆青色琉璃四出陛各九級白石為之内壝圓墻九十七丈七尺五寸髙八尺一寸厚二尺七寸五分櫺星石門六正南三東西北各一外壝方墻二百四丈八尺五寸髙九尺一寸厚二尺七寸櫺星門如前又外圍方墻為門四南曰昭享東曰泰元西曰廣利北曰成貞内櫺星門南門外東南砌綠磁燎爐傍毛血池西南望燈臺長竿懸大燈外櫺星門南門外左設具服臺東門外建神庫神厨祭器庫宰牲亭北門外正北建泰神殿後改為皇穹宇蔵上帝太祖之神版翼以兩廡蔵従祀之神牌又西為鑾駕庫又西為犧牲所北為神樂觀北曰成貞門外為齋宫迤西為壇門壇稍北有舊天地壇在焉即大祀殿也嘉靖二十二年改為大享殿殿後為皇乾殿以藏神版以嵗孟春上辛日祀上帝于大享殿舉祈榖禮季秋行大享禮以二祖並配至郊祀專奉太祖配十年改以啓蟄日行祈榖禮于圜丘仍止奉太祖配十七年改昊天上帝稱皇天上帝是年欲倣眀堂之制宗祀皇考以配上帝詔舉大享禮于元極寳殿奉睿宗獻皇帝配元極寳殿者大内欽安殿也殿在乾清宫垣後隆慶元年罷大享祈榖禮元極殿仍改為欽安殿圜丘泰元門東有崇雩壇為制一成東為神庫嘉靖中時以孟夏後祭天禱雨祈榖壇成未行而罷洪武元年二月勅禮官太常曰昔聖帝眀王嚴于祭祀内致誠敬外致儀文朕膺天命首崇祀事顧草創之初典禮未備何以交神眀致靈貺其博考郊禮以聞丞相李善長學士陶安太常卿胡惟庸等奏國有大祀曰圜丘曰方澤曰宗廟曰社稷若他諸中祀小祀各具沿革以進于是祀天圜丘以大眀夜眀星辰太嵗諸神従饗祭地方丘以嶽鎮海瀆諸神従饗而前代太一感生五帝諸不經之祀俱罷撰二丘樂章安等又言古者天子五冕祭天地宗廟社稷諸神各有所用上以五冕禮太繁惟天地宗廟服衮冕社稷等祀服通天冠絳紗袍餘不用二年奉仁祖配時中都亦有南北丘焉五年上親郊皇太子居守親王戎服従七年以大祀獻終乃分獻未安學士詹同宋濂言請初獻奠玉帛已分獻官即初獻亞獻亦如之上曰善八年従學士樂韶鳳之請定大祀登壇脱舄禮九年令郊社大事國有三年䘮不廢十年春且郊感齋居隂雨覽京房災異對始定合祀禮二十三年合祀禮成上作大祀文并歌文略言朕聞太極之化天開乎子地闢乎丑位極既定虚其中為寰中而人生于寅人生滋多非聖莫馭天生君主為民立命洪荒之時莫知誰始今載于書開天立極首興彝倫者伏羲神農黄帝是也法三皇而守行者少昊顓頊髙辛唐虞其損益禮樂大備其文者夏商周也下至秦漢以及于唐宋元嗚呼天性自然而常者三綱五常也聖人度人情而措彝倫不逆其性務従于善每聞昔君欽若昊天莫敢有怠朕即位以來祀天饗地奉宗廟社稷當齋期必有風雨臨祭乃歛每以為憂京房有言郊祀鬼神必天道雍和神乃荅若有飄風驟雨是為未善于是命三公度土工部役梓人于南郊創大祀殿合享朕度古人南郊祭天以陽生之月北郊祭地以隂生之月獨以義起不知至陽祭之至隂之月至隂祭之至陽之月于理可疑且掃地而祭其來甚逺尚質不華令天地之享與人大異將人之饗亦執古不變乎古則汙尊抔飲茹毛飲血巢居穴處今可行乎殆必不然因定嵗祭天地于首春三陽交泰之時合祀天地前期致齋五日内二日以吿仁祖三日正齋風和日暖及夜升壇山川草木不揺江海不波太隂中天神恍臨降故合祀宜也嘉靖九年禮科給事中夏言請更郊祀疏臣按古者祀天於南郊祭地於方澤兆於南郊瘞於北郊順天地之宜審隂陽之位也至祖宗之配享諸壇之従事合祀之不經乞勅多官集議以求至當彼時皇后行親蠶禮于北郊祭先蠶氏詞臣霍韜言親蠶為亂成法分郊為紊朝政其大禮論曰合祭天地神隂陽也易曰隂陽不測之謂神並祀祖宗崇達孝也禮曰祖文王而宗武王主日配月及于星辰象従天也易曰本乎天者親上岳鎮海瀆象従地也易曰本乎地者親下是故天地合徳神化出矣祖宗合祀孝徳崇矣日月星辰麗於上河海山嶽位於下倫類齊矣是故渾涵宇宙順序隂陽幽贊神化眀奠象類合祀之典顯且著焉非聖知眀于天地之性知鬼神之情状其孰能與于此帝怒其言御史鄧文憲亦言郊祀親蠶之義夏言未必是而霍韜未必非且天地分祀則父母異處親蠶郊外則内外失閑帝責憲附和遂定分祀之制朝日夕月之祭俱復夏言薦行太僕寺寺丞張鶚考定音樂時四郊並建兵部軍卒供役不足乃將馬價及缺官薪皂銀三十萬兩募役工作萬歴三年十一月内閣臣張居正進郊禮圖册曰謹按天地分祀至洪武十年聖祖乃定為合祀之制每嵗正月上辛日行禮于南郊大祀殿列聖遵行百六十餘年至世宗皇帝始按周禮古文復分建南北郊俱壇而不屋南郊以冬至北郊以夏至行禮而二至之外復有孟春祈榖季秋大享嵗凡四焉隆慶改元詔廷臣議郊祀之禮時議者並請罷祈榖大享復合祀天地于南郊先帝深惟三年無改之義獨以祈榖大享在大内行禮不便従禮官議罷之而分祀姑仍其舊盖亦有待云爾夫禮因時宜體乎人情者也髙皇帝初制郊禮分祀十年矣而竟定于合享者良以古今異宜適時為順故舉以嵗首人之始也卜以春初時之和也嵗惟一出事之莭也為屋而祭行之便也百六十餘年列聖相承莫之或易者豈非以其至當允協經久而可守乎今以冬至極寒而祼獻于星露之下夏至盛暑而駿奔于炎歊之中一嵗之間六飛再駕以時以義斯為戾矣且成祖文皇帝再造宇宙功同開創配享百餘年一朝而罷之于人情亦有大不安者故世宗雖分建圜方之制而中世以後竟不親行雖肇舉大享之禮而嵗時禋祀止於内殿是斯禮之在當時已窒碍而難行矣况後世乎臣等愚昧竊以為宜遵髙皇帝之定制率循列聖之攸行嵗惟一舉合祀之禮而奉二祖並配斯于時義允協于人情為順顧郊禋重典今且未敢輕議謹稽新舊規制禮儀而畧述其槩以俟聖明従容裁斷焉中庸曰郊社之禮所以事上帝也朱子註郊祭天社祭地盖郊之禮主祀上帝而統地祗也按郊特牲篇郊特牲而社稷大牢又云社所以神地之道也地載萬物天垂象取財於地取法於天是以尊天而親地也禮運篇夫政必本於天殽以降命命降於社之謂殽地又曰祭帝於郊所以定天位也祭社於國所以列地利也又云禮行於郊而百神受職禮行於社而百貨可極及按泰誓云類于上帝宜于冡土召誥云用牲于郊牛二社于新邑牛一羊一豕一以上經傳對舉郊天社地之文最為眀白及考祭法燔柴於泰壇祭天也瘞埋于泰折祭地也用騂犢埋少牢於泰昭祭時也以下六宗四坎壇之百神皆埋少牢此王者郊天而并祭地之文也周官大宗伯章祀天祀上帝祭地祀社稷獨司樂章有夏至方丘之文即祭法王為羣姓立大社而王社乃宗廟之右社稷也别無北郊之名夫天包乎地天尊而地卑固不可以並言南北郊也禮云器用陶匏順天地之性也此亦郊天而並祭地也草廬吳先生謂天地並尊似拂易傳天尊地卑之義故著此論國之大在祀而祀之大在郊自古禮殘缺後儒穿鑿而五帝六天合祀之説迄無定論則以不深考于經折衷于聖以準之也書曰肆類于上帝禋于六宗望于山川徧于羣神又曰柴望秩于山川又曰柴望大吿武成曰類曰柴皆祀天之禮也然必及于六宗山川羣神而不及后土則郊必兼社之謂也易曰先王作樂崇徳殷薦之上帝以配祖考又曰聖人亨以享上帝周禮以禋祀祀昊天上帝記曰郊社之禮所以事上帝也皆舉郊以見社也家語孔子曰天子卜郊則受命于祖廟而作龜于禰宮尊祖親考之義也卜之日王親立于澤宫以聽誓命受教諫之義也既卜獻命庫門之内所以戒百官也言郊之必卜也而不及社兼社也此唐虞三代之制也儒者但見周禮有冬至祭圜丘夏至祭方澤之文遂主分祀之説不知周禮一嵗之間祭天凡㡬正月祈榖孟月大雩季秋明堂至日圜丘此外有四時之祭則固合祭者矣前期十日大宰帥執事而卜掌百官之誓戒太史與執事卜日戒大宗伯詔相王之大禮祭之日大宗伯奉玉大宰贊玉幣爵之事詩歌昊天有成命之章此其證也惟是周朔建子冬至圜丘適當獻嵗不妨迎陽報天而後命及于地故其禮比合祭稍加崇重此惟行周禮之時則可耳乃其合祀之禮則未嘗廢散見諸經及孔子之言可據也使祭而必冬至也則何用卜之為故曰至敬不壇掃地而祭則又不必于圜丘方澤也以是而知周之未嘗不合祭也由漢歴唐千餘年分祀者惟魏文帝之太和周武帝之建徳隋髙祖之開皇唐元宗之開元四祭而已至宋郊祀皆合祭其不合祭者惟元豐六年一郊元祐詔議北郊蘇軾主合祭従之者五人劉安世主分祭従之者四十人軾曰舜之受禪自上帝六宗山川羣神莫不畢吿而獨不吿地祗武王克商柴上帝望山川而獨畧地祗昊天有成命之詩郊祀天地終篇言天而不及地以是知祀上帝而地祗在焉彼時羣臣方議合祀之非上以問輔臣章惇曰北郊止可謂之社君子當不以人廢言夫國之大事莫過于郊眀太祖以開天之聖改分祀而為合祀此千古卓見故行之百五十餘年風雨調順民物康阜至嘉靖一改而眀遂衰建議者夏言也卒死于法抑太祖之靈弗歆乎至于太祖事天之誠儀文純備千古僅見備錄之以為百世法焉慎配享洪武元年十一月初三日冬至祀南郊上先詣太廟吿曰歴代有天下者未嘗不以祖配天兹臣獨不敢者以臣功業猶有未就政治或有缺失懼有責焉况去年上天垂戒早暮兢惕恐無以承上帝好生之徳故不敢輒奉以配惟祖神與天通恐上帝有問願以此言敷奏帝前善惡無隠惟上帝鑒之候南郊竣事臣當率百司恭詣殿庭吿成大禮以共享上帝之錫福越二年平慶陽羣臣復請乃奉仁祖配吿祭禮部崔亮奏按禮運曰禮行於郊則百神受職沈括援唐制云有事上帝則百神皆預遣祭吿惟太廟則皇帝親行祭吿今擬圜丘方丘大祀前期上親吿太廟仍遣使預吿百神如祀圜丘則曰某年某月日皇帝有事于圜丘咨爾百神以相祀事方丘亦如之仍増天下神祗壇于圜丘之東方丘之西其神主皆題曰天下神祗詔従之齋期上謂省臣曰朕每祭享天地百神惟伸吾感戴之意禱祈福祉以佑生民未嘗敢自徼惠也且齋戒所以致誠誠之至與不至神之格與不格皆係於此故朕每致齋不敢有一毫懈惰今定齋戒之期大祀以七日中祀以五日不無太久大抵人心久則易怠怠心一萌反為不敬可止於臨祭齋戒三日務致精專庶㡬可以感格著為令祭器崔亮奏按禮記郊祭器用陶匏瓦器尚質故也周禮籩人凡祭祀供簠簋之實疏曰外祀用瓦簋今祭祀用磁已合古意惟盤盂之属與古之簠簋豋豆制異今擬凡祭器皆用磁其式皆倣古之簠簋豋豆惟籩以竹詔従之省牲上諭禮臣先賢有言見其生不忍見其死聞其聲不忍食其肉此人情之常今祭祀省牲於神壇甚邇揆之人心殊為未安於是亮奏考古省牲之儀逺神壇三百步上喜曰必如是而後可脱舄學士樂韶鳳奏曰禮侍坐於長者屨不上於堂解屨不敢當階就屨跪而舉之屏於側注屨賤空則不敢陳於尊者之側長者在堂則脱於階下在室則上堂而不著入室也漢魏以後朝祭則跣襪惟蕭何劍履上殿宋南郊皇帝至南階脱舄升壇入廟脱舄升殿宋開寳通禮太廟饋食并禘祫皇帝至東階下解劍脱舄今議於郊祀廟享前期一日有司以席藉地設御幕於壇東南門外及設執事官之次門外西側祭日大駕臨壇入幕次脱舄升壇執事導駕讚禮讀祝并分獻陪祭官皆脱舄外次升供事協律郎樂舞生跣襪就位畢降壇納舄従之戒飾上詔中書言祀禮肇於聖王諸周旋上下進趨獻酬之莭慇懃至矣朕親循行其無乃失之瀆而過飾乎過飾是不誠也孔子有云禘自既灌而往者吾不欲觀之矣且人不誠者衆暫誠者有之永誠者鮮已今措禮設儀而過飾能有終乎朕周旋神所十有一年未見其當於是更儀殊式合祀天地神祗飭中書下翰林院令儒臣紀焉世宗更制世宗改合祀而為分祀卜之太祖不吉謀之人言不協將欲已之夏言持之獨力初問張璁璁備述周禮及宋熙寧間陳襄蘇軾劉安世程頤所議分合異同以對且言聖祖定制無敢輕議惟朝日夕月之禮具載存心錄并祭祀禮儀若欲講求復舊似無難者及上諭再議璁言聖祖為一代創業之主為子孫者億萬年所當遵守願以不愆不忘之心盡善繼善述之孝此其意雖在分祀然以祖制為言自是大臣吿君之體及夏言二祖分配之説則力闢之矣曰郊祀之議聖見已定羣臣必將循黙臣獨不忍無言皇上信以分配之説盡古禮乎大祀殿非眀堂之位孟春祈榖非季秋大享之禮則未免有失於古也信以並配之説非今宜乎太祖百有餘年之神座豈忍言撤文皇百有餘年配天之報豈忍言廢則未免有失於今也臣謂天地分祀宜従古禮祖宗並配宜従今制所謂酌古斟今繼志述事仰對祖宗願従容而裁酌之又曰天地者古今之天地分而祀之三代之彝典也臣敢不將順祖宗者一代之祖宗功徳俱隆並配天地當代之定制孝子慈孫不可輕議臣安得無言至罷議之説又天地祖宗共為昭鑒今日月迭變風霾飢饉救荒之政禮貴弛力為先請察臣言務求可傳可繼之道外此非臣所知也固侃侃正論已洧川范守已曰郊祀之議永嘉等前言為是而羣議皆非也天地分祀古今正禮而祖宗訓制亦孝子慈孫所當世守而不可改者謂祖制可變是以祖宗為不足法矣謂祖宗為不足法則凡可以紛亂舊章將無所不至也祖宗睿識神謨精思長慮其所規畫協于至善者十之八九間有一二襲近代之陋盭先聖之謨匪其識有未至亦未能無意其間也故周用子正尼父非之而子孫不為之易商人尚鬼至于盤庚以鬼恐衆亦未聞其臣有以為非而請革者何也凡以祖宗之制不可變也故寧因其所可變以固其所不可變而一代之制始傳之百世而不壊一有可變之念叅乎其間則雖其不可變者姦臣賊子亦將以辯言亂其視聽而紛更殆盡矣為端甚微為禍豈淺淺哉故漢髙襲亡秦創制陋矣孝文固守其陋拒賈生之議而不納匪真謙讓未遑也正以祖宗之法不可變耳迨至武帝狹小漢制正統易服紛紛制作匪不力追古始而漢家一代之制蕩然無存浸淫易世大釁三啟卒致新莽之亂有由然也元郊祀考元初用其國俗拜天於日月山成宗大徳六年建壇於燕京合祭天地五方帝九年始立南郊專祀昊天上帝泰定中又合祭然皆不親郊文宗至順以後親郊者凡四惟祀昊天上帝其郊壇三成以合陽竒之數每成髙八尺一寸以合乾之九九上成縦廣五丈中成十丈下成十五丈四陛陛十有二級外設二壝内壝去壇二十五步外壝去内壝五十四步各四門壇設于丙巳之地以就陽位外垣南櫺星門三東西櫺星門各一中築圜壇周圍上下俱䕶以甓内壝外壝各髙五尺壝四面各有門三俱塗以赤祭時冕無旒服大裘而加衮搢大圭執鎮圭皇太子侍祀服衮冕而執圭諸臣奉祀三獻官司徒大禮使七梁冠加籠巾貂蟬助奠以下諸執事官冠制如貂蟬無籠巾而有六梁四梁三梁二梁之異御史冠二梁加獬廌俱青羅服裳紱綬環並同笏以木祈榖壇祈榖壇大享殿即大祀殿也永樂十八年建合祀天地於此其制十二楹中四楹飾以金餘施三采正中作石臺設上帝皇祗神座於其上殿前為東西廡三十二楹正南為大祀門六楹接以步廡與殿廡通殿後為庫六楹以貯神御之物名曰天庫皆覆以黄琉璃其後大祀殿易以青琉璃瓦壇之後樹以松栢外壝東南鑿池凡二十區冬月伐冰藏凌隂以供夏秋祭祀之用悉如太祖舊制至嘉靖二十一年撤大祀殿擬古眀堂名曰大享每春行祈榖禮隆慶元年禮官言先農之祭即祈榖遺意宜罷祈榖於先農壇行事大享禮亦宜罷詔可後至崇禎朝復舉行祈榖紀祈榖用孟春上辛禮也眀初用二月上戊祭先農不行祈榖即嘉靖亦一再舉而罷崇禎辛巳年正月初五日上辛復舉行有旨祈榖除不散齋不出宿於郊齋宫不朝亥時正三刻止升一燈外其恭視壇位籩豆牲隻如圜丘儀行奏祭著改於正月初一日樂章奏舞命太常寺勤督樂舞生預為演習十五年壬午正月上辛即在朔日辛未禮部以朝賀不便疏請改十一日辛巳為中辛得旨改中辛日行禮崇禎壬午上親行祈榖禮記壬午正月初五日上常服詣太廟以親詣南郊視牲預吿於太祖及列祖神御前仍欽遣禮部左侍郎王錫衮右侍郎蒋徳璟詹事黄景昉充上香導引官初六日遣勲臣等恭代視牲初七日上御皇極殿太常寺奏祭祀初八日為始致齊三日初八日質眀上常服乗輿詣太廟門西降輿至廟門幄次内具祭服詣太廟吿請太祖配神行禮畢出至幄次易皮弁服回御皇極殿太常寺光禄寺官奏省牲初九日大雪上親享太廟禮畢臣璟即偕王黄二公冒雪出南郊宿太常别院是日午後太常官捧蒼玉帛匣香盒同神輿亭進于皇極殿内司禮監官捧帛同安設於御案之北初十日質眀上御皇極殿太常卿捧祝版従中左門進安於御案上上親填御名訖太常卿捧安於輿中司禮監官進玉帛上親装於各匣内安訖太常寺官以次奉安輿中太常卿隨捧香盒於香亭右跪上三上香行一拜三叩頭禮畢轉於東西向立錦衣衛官旗入擡輿亭従中門出太常卿隨詣大享殿神庫奉安上遂詣太廟以親詣南郊行祈榖禮預告於太祖及列祖神御前行禮畢還宫是日早璟偕王黄二公及太常少卿髙倬具吉服冒雪至大享殿皇乾殿演禮即在北天門内候駕至未時錦衣衛官備法駕設板輿於皇極門下正中上常服御皇極門太常卿奏請聖駕詣南郊行祈榖禮於大享殿上陞輿掌衛官跪奏起輿従午門端門承天門大眀門正陽門詣南郊壇内西天門至神路迤西臣璟偕王黄二公及髙少卿面駕序立行叩頭禮畢分兩旁候上降輿臣璟等導上従大享南門左門入太常卿党崇雅跪迎同導上至丹陛太常卿導上至大享殿左門入恭視神位臣璟等先詣東陛前候上視神位畢太常卿導上従東陛下臣璟等同導上至神庫視籩豆至神厨視牲太常卿逐一奏畢復同臣璟等導上仍従大享南門出迤西陞輿至齋宫陪祀各官免朝叅是日雪勢特猛導引往還可數千武而神庫門路甚深滑上亦徐行俯體諸臣便步趨也至一更時臣璟等三人具祭服詣皇乾殿行一拜三叩頭禮王公上香請神璟與黄公導引太常官以次捧昊天上帝正位髙皇帝配位神版詣大享殿奉安訖臣等三人即趨至大次候駕亥時一燈起萬燈齊眀燦如列星上常服乗輿冒大雪従齋宫東門出至神路之西降輿導駕官導上至大次徳璟三人及太常卿復命上秉圭曰朕知道了少頃具祭服出導駕官導従大享南門左門入行祈榖禮用十二拜如大祀儀祭畢上出至大次易常服不回齋宫即従西天門還至太廟叅謁如前儀畢還宫禮部侍郎蒋徳璟謹紀按月令孟春天子以元日祈榖于上帝註謂以上辛郊祭天春秋傳曰啟蟄而郊郊而後耕郊特牲曰郊用辛註凡為人君當齋戒自新盧植蔡邕曰郊天是陽故用日耕耤是隂故用辰孔穎達曰甲乙丙丁等謂之日子丑寅卯等謂之辰元者善也元日郊用辛元辰耕用亥黄道周曰春日甲乙則未知其果上辛也眀初以冬至祀天圜丘夏至祀地方澤洪武十年罷之而止以正月上辛合祀天地于大祀殿并日月星辰山川䓁神俱在焉其禮甚省其敬甚專嘉靖九年罷之而分為圜丘方澤朝日夕月四郊其大祀殿則以孟春上辛祈榖十年又改啟蟄日祈榖二十四年又改大祀殿為大享殿然祈穀禮不復行崇禎十四年復行祈榖禮用上辛十五年用中辛云齋宫附齋宮在圜丘之西前正殿後寝殿傍有浴室四圍墻垣以深池環之皇帝親祀散齋四日致齋三日於齋宫駕至南郊昭享門降輿至内壝恭視壇位又入神庫視籩豆至神厨視牲畢出昭享門至齋宫各官早朝午朝俱賜飯傳曰祭之日披衮以象天戴冕藻十有二旒則天數也乗素車貴其質也旂十有二旒龍章而設日月以象天也天垂象聖人則之郊所以眀天道也周官掌次王大旅上帝則張大次小次大次在壇壝外初往所居止也小次在壇側初獻後退俟之處也按宋營青城幄殿即周之大次也又於東壝門外設更衣殿即周之小次也其制皆用帛絞縛元豐中議禮局言每嵗青城費縑布三十餘萬乞如青城創制齋宫使一勞永逸時未及行哲宗始建齋宫南渡後庶事草創復絞縳以備制明洪武二年詔築齋宮于圜丘側永樂因之郊壇門外每祀設大次駕臨壇入幕次脱舄升壇其升壇執事導駕贊禮讀祝並分獻陪祭官皆脱舄于外以次升壇供事協律郎樂舞生依前跣襪就位祭畢降壇納舄嘉靖中享廟皇后助祭遂罷脱舄禮後不復行齋宫東西懸大和鐘每郊祀候駕起則鐘聲作登壇則止禮畢升駕又聲之洪武中禮部尚書崔亮奏宋祥符九年議南郊壇祀天或値雨雪則就太尉齋所望祭元經世大典載社稷壇壝外垣之内北垣之下亦嘗建屋七間南望二壇以備風雨曰望祀堂請依此制於圜丘方丘壇南皆建殿九間社稷壇北建殿七間遇風雨則於此望祭焉上従之嘉靖中上以舊存齋宮在圜丘北是踞視圜丘也欲改建于丘之東南夏言言更起齋宫于圜丘之旁似于古人掃地之義未為允惬且秦漢以來並無營室者正謂質誠尊天不自崇樹以眀謙恭肅敬之旨故惟大次之設為合古典陛下前日考據精宻豈今偶未之思耶願寝其議仰荅太靈報聞神樂觀神樂觀在天壇内之覀設提㸃知觀教習樂舞生内有太和殿遇祭則先期演樂于此洪武初御製圜丘方澤分祀樂章後定合祀更撰合祀樂章禮成歌九章已病音樂之未復古也詔尚書詹同尚書陶凱與協律郎冷謙定雅樂而學士宋濂為樂章著令凡祀有樂樂四䓁曰九奏曰八奏曰七奏曰六奏樂有歌有舞歌堂上舞堂下舞皆八佾有文有武郊廟皆奏中和韶樂太常領之協律郎司樂考協之凡樂淫聲過聲凶聲慢聲若舞失莭者皆有糾禁凡樂器不徙凡園陵之祭無樂洪武十二年十二月諭神樂觀云開基守業必勤政為先趨事赴公非信誠必責傳不云乎國之大事在祀與戎曩古哲王謹斯二事而上帝皇祗悅賜天下安和生民康泰朕起寒微而君宇内法古之道依時以奉上下神祇其於祀神之道若或不潔則非為生民以祈福而保已命也昔劉康公成肅公㑹晉侯伐秦祭於社稷之神然後興師當祭之時畢則有受胙之禮其受之時必思洋洋乎其在上而穆穆然或左而或右委心慎敬而受之則祥故敬勝怠者吉怠勝敬者滅所以成肅公受胙之時起慢神不恭之貌因伐秦而卒是以知敬慎必有動作禮義威儀之則以定命也於斯祀神之道能者養之以福不能者敗之以禍是故君子勤禮小人盡力勤禮莫如致敬盡力莫如敦篤敬在養神篤在守業朕觀古人之敬神也若是其驗禍福亦若是斯可謂無神而不信乎可謂佞神而祈福乎二者皆不可惟敬之以禮而已朕設神樂觀備樂以享上下神祗所以撥錢糧若干以供樂舞生非傚前代帝王求長生之法而施之然長生之道世有之不過修心清淨脱離幻化速疾去來使無艱阻是其機也於戯昔殷周之父老何存漢唐之耆宿安在果長生之道乎朕設神樂觀以備樂碑之于觀以示後世其觀主不潔樂生不精贍生不足以此觀之不但君不勤于祀事其朝臣觀主必也亦然若君勤于祀事朝臣觀主無一體之敬則國有常憲故兹勒石想宜知悉洪武六年上以祭祀還宫宜用樂舞生前導命翰林儒臣撰樂章以致敬慎鑒戒之意後世樂章惟聞頌羙無古意矣嘗謂諷諫則使人惕然有警若頌羙之詞使人聞之意怠而自恃之心生盖自恃者日驕自警者日强朕意如此卿等其撰述毋有所避于是儒臣承旨撰神降祥神祝酣酒色荒禽荒諸曲凡三十九章曰回鑾樂歌舞其詞皆存規戒其樂舞分為八隊皆八人禮部因其制以上命工肄習之洪武二年有旨教胡太常做個牌子漆的如法將圜丘方澤社稷宗廟先農風雨雷師馬祖凡一應祭祀時月日期明白開冩于牌上掛在這東耳房前我時常看都要知道欽此又銅人制亦創自髙皇也洪武十二年上命禮部尚書陶凱等曰經言鬼神無常享享于克誠人謹方寸于此而能格神眀于彼由至誠也然人心操舍無常必有所警而後無所放耳乃命禮部鑄銅人髙一尺有五寸手執簡書曰齋戒三日凡致齋之期則致朕前庶朕心有所警省而不敢放也又令各衙門置木齋牌刻其文曰各有常憲神有監焉遇祭祀必設洪武中諭曰石音固難和然以人聲為主神人悦和即八音諧和時起居注熊鼎進曰樂音不在外求在人君一心心和則天地之氣和樂無不和矣嘉靖既更定祀典中允廖道南請稽古樂章以禆盛典上曰考定律吕必真知者乃可詔發内府所藏金玉銅石鐘磬于神樂觀考正音律仍令科道官各舉所知諳曉音律之人以聞夏言薦行太僕丞張鶚曉暢律吕鶚臨清人時在告應詔至欲定元聲復古樂併進所著樂書二部一曰大成樂舞圖譜自琴瑟以下諸樂逐一作譜一曰古雅心談以十二圖象十二律律圖各有説乃下禮部議覆上曰音樂即為更定勿誤享祀之用乃譜定帝社稷樂歌以進遼州同知姚文察進所著樂書四聖圖解二卷樂記補説二卷律吕新書補註一卷興樂要論三卷因請興正樂以薦上帝祀祖考教皇太子章下禮部覆言文察所進樂書其于古今原委類多前人所未發者且於人聲中考定五音以為制律候氣之本法似徑截深合虞書言志永言依永和聲之旨宜令文察及太常知音律者選能歌樂舞生百餘人協同肄習本部及該寺正官以時按試候聲律諧協吹律候氣咸有應驗方授官與張鶚同事従之辨大司樂之誤按周禮大司樂云凡樂圜鐘為宫黄鐘為角太簇為徴姑洗為羽靁鼓靁鼗孤竹之管雲和之琴瑟雲門之舞冬日至於地上之圜丘奏之若樂六變則天神皆降可得而禮矣凡樂函鐘為宫太簇為角姑洗為徴南吕為羽靈鼓靈鼗孫竹之管空桑之琴瑟咸池之舞夏日至於澤中之方丘奏之若樂八變則地示皆出可得而禮矣元儒吳澄曰此文不惟不經仍自相背戾既曰大合樂以致鬼神示而其下則止用黄鐘大吕雲門祀天止用太簇應鐘咸池祭地如是則六律六同五聲八音六舞各自為用不得謂之大合樂矣况周家祭祀已行之迹莫詳於詩之頌今攷昊天有成命之詩郊祀天地是天地無分祀之文攷般之詩望祀四嶽河海是四望與山川無異祭之文攷雝之詩禘祖而其末則曰既右烈考亦右文母是妣與祖亦無各祭之文攷周頌之詩盡是祭祀之詞其言作樂未聞有分樂而祀之之説亦未聞用歴代之樂以分祀之禮此甚不足信又曰既言六樂者文之以五聲播之以八音是六樂之作五聲八音並用之矣而其下則禮天神地示人鬼於五聲皆止用其四於八音止用其三使其果如此則聲音不備樂何自而作况攷之於詩有瞽作樂而合乎祖其間用鞉磬柷敔簫管等樂於祭宗廟之際固亦兼用竹革木石之音矣孰謂去此而不用乎既曰凡六樂者一變至六變合六樂而言之至於七變八變九變則餘三變又不與焉况樂所以象徳而六樂之致鬼神示不知何分而象徳耶邱文荘濬曰按分祭天地之説始見於周禮大司樂他經典所不載也非獨他經典所不載雖周禮亦無之惟大宗伯以玉作六器以蒼璧禮天黄琮禮地及典瑞四圭有邸以祀天旅上帝兩圭有邸以祀地旅四望兩處分言天地然不言其地與時其言冬至祀天夏至祀地祀天於圜丘祀地於方丘惟於大司樂見之夫大宗伯之職在掌邦禮禮之大者吉禮也禮莫重於祭祀莫大於天地然於大宗伯所掌之三大禮吉禮十有二之中上言昊天上帝而不及后土地祗乃至於作器之時始言之可見其所行之禮則一而所用以禮神者其器則有兩也况於司服掌王之吉服止有祀昊天上帝則服大裘而冕之文無所謂后土地祗之服由是觀之合祭天地其神有兩而主祭惟以一人可見矣惟其神之兩故兩其器或以蒼璧或以黄琮或四圭有邸或兩圭有邸惟其祭之一故主祭之人所服之服則一而已然則大司樂之言非歟曰先儒固謂周禮非盡出周公况其所論樂律自相背戾吳澄謂其不經不足信非無徴之言也夫其所論之樂既不足信則所論之禮又烏可深信哉在大司樂分樂始言天神地祗而未及二至及論樂之變而後有二至方圓丘之説意盖謂分樂律以属隂陽故於是日奏之始合樂也故曰若樂六變若樂八變則天神可降地祗可出然後天地可得而禮是合樂而非大享也在家宗人以二至日致人鬼物鬼則為祈禬而行非大享之禮眀矣至漢時天子以二至御前殿㑹八能之士陳八音聽樂均度則猶大司樂之遺意今乃斷以二至日為分祀天地盖未嘗詳考周官禮樂之文唐楊收曰樂亡久矣上古祀天地宗廟皆不用商周人歌大吕舞雲門以祀天神歌太簇舞咸池以祀地祗大吕黄鐘之合陽聲之首而雲門黄帝樂也咸池堯樂也不敢用黄鐘而以太簇次之然則祭天神者圜鐘為宫黄鐘為角太簇為徴姑洗為羽祭地示者函鐘為宫太簇為角姑洗為徴南吕為羽訖不用商及二少漢祭天則用商而宗廟不用謂鬼神畏商之剛西京諸儒惑圜鐘函鐘之説故其自受命郊祀宗廟唯用黄鐘一均章帝時太常丞鮑業始旋十二宫夫旋宫以七聲為均均言韻也古無韻字猶言一韻聲也始以某律為宫某律為商某律為角為徴為羽某律少宫少徴亦曰變曰比一均成則五聲為之莭族此旋宫也盖樂本於五音能従五音而求之則樂之理思過半矣宋沈括云宗廟之樂宫先次角又次徴又次羽宫角徴羽相次者人樂之叙也故以之求人鬼圓丘方澤之樂皆以角為先其次徴又次宫又次羽始于角木木生火火生土土生水木火土水相次者天地之叙故以之禮天地聲之不用商先儒以為惡殺黄鐘之太簇函鐘之南吕皆商也是未嘗不用特不用商中聲耳天之氣始于子故先以黄鐘天之功畢於三月故終之以姑洗地之功見于正月故先之以太簇畢于八月故終之以南吕幽隂之氣鍾于北方人之所歸鬼之所藏也故先之以黄鐘終之以應鐘明初議樂者以唐人趙慎之言謂周禮天神地示人鬼俱不用商者周以木徳王避其所尅也故慎于唐請加商調去角調且言宋與明俱以火徳王當去羽不當去商相尅之説近于術數終以楊收之言為正且鄭康成曰祭尚柔而商堅剛故不用焉其言固不始于收也西垣筆記崇禎十五年二月禮部奏上諭太常寺有神樂觀及給賜净衣取其精潔今郊廟祭樂亦多疎澁如琴瑟並無指法舞容尤乖古制宜訪求知樂之人細加叅究因及鄭世子所進樂書及原任禮部尚書黄汝良樂律考大要以黄鍾為主仰見皇上留心上理於禮樂精微無不洞悉臣等謹察得黄鐘候氣實為律歴之本而自漢唐以來或為三寸九分或為九寸其説不同前議歴法時臣等以古葭灰候氣之法令欽天監與新局並試皆不甚曉至樂舞生則琴瑟搏拊尚未能辨矧黄鐘乎周時以舞教國子令大胥正舞位小胥正舞列莭八音而行八風盖五行之義皆寓於其中至漢大樂律則卑者之子不得舞宗廟之酎凡除吏二千石至六百石關内侯至大夫之適子取為舞生其教之豫而選之精如此以能發揚功徳孚格天人而今皆伶人下賤為之去古實逺宜令太常倣周漢意選舞士不得仍以倡優充數仍將律書正聲所纂舞圖舞莭重加翻習庶足復三代之舊又輔臣奏廟堂上不宜用教坊樂聖意亦以為然察㑹典凡祭祀用太常寺樂舞凡朝㑹宴享等禮用教坊司奉鑾而相沿既久疎舛成習所當嚴行申飭至古者房中之樂歌關雎諸詩燕射之樂歌鹿鳴諸詩笙奏繇庚諸詩即漢人樂府亦特為古雅當時音容必有可觀自唐始分太常與教坊為二實鄭聲亂雅之始惜古樂殘缺未易頓議亦宜訪求知樂之人徐加訂定以副聖天子復古致治盛心犧牲所犧牲所建於神樂觀之南初為神牲所設千户並軍人專管牧養其牲正房十一間中五間為大祀牲房即正牛房左三間為太廟牲房右三間為社稷牲房前為儀門又前為大門門西南遇視牲之日設小次大門東連房十二間西連房十二間前為晾牲亭三間東西有角門東角門北為北羊房五間山羊房五間又北為煖屋滌牲房五間倉五間大庫一間西角門北為北羊房五間山羊房五間榖倉二間看牲房一間黄豆倉一間官㕔三間正牛房之北為官廨十二間東為兎房三間又東為鹿房七間鹿房前亦為曬晾亭三間又前為石柵欄官廨西為便門門西又為官廨四間又而為小倉三間東羊房後為新牛房後牛房十間餧中祀小祀牛正北為神祠西羊房後正南房五間為大祀猪圏西房十間為中祀小祀猪圏北有井又草厰東北為司牲祠周禮充人掌繫祭祀之牲牷繫於牢芻之三月封人凡祭祀飾其牛牲設其楅衡置其絼共其水稾飾謂刷治潔清之也楅衡所以持牛令不得觝觸楅設於角衡設于鼻絼繩也所以繫牛者公羊傳曰養牲必有二帝牛不吉以為稷牛帝牛必在滌三月稷牛惟具滌牛宫也謂之滌者蕩滌牢中使潔清也三牢各主一月其一月在外牢一月在中牢一月在明牢必三月者取一時氣成以充其天性也牢閑也繫而飼之所以防其損傷也歴代以來並廪犧局滌潔唐令凡大祀養牲在滌九旬不得箠扑傷損死則瘞之病則易之凡牲方色難備則代以純色凡養牲必有副省牲而犢鳴則免之而用副宋元大祀牲牢入滌别養一依唐制神牲所設官二人牧養神牲祀前三月付廪犧令滌治如法其中祀滌三十日小祀滌十日者亦如之凡郊廟犧牲已在滌者或有傷則出之死則埋之其有疾者亦養于别所待其肥腯以備小祀中祀之用若未及滌或有傷疾者歸所司别用景泰四年令禮部鑄造牲字牢字火印各一㑹同太常寺及御史印記各處解到大祀牛羊舊制嵗以十二月朔旦駕親臨閱以後每夕輪一大臣繼視之盖自五府及吏户禮兵工五部通政翰林堂上官之不司刑者皆與焉凡兎房鹿檻羊棧牛枋猪圏周行歴視出入皆騎卒火甲人等䕶衛每夕鐘定人静乃出至中宵始回城門啟鑰以入次蚤復命用騎卒自宣徳年始春明夢餘錄卷十四
