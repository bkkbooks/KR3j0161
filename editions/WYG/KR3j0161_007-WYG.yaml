body:
  text: 春明夢餘錄卷七吏部左侍郎孫承澤撰正殿奉天殿洪武鼎建初名也累朝相沿至嘉靖四十一年改名皇極殿制九間中爲寶座座旁列鎮器座前爲簾簾以銅爲絲黄繩繫之簾下爲氊氊盡處設樂殿兩壁列大龍橱八相傳中貯三代鼎彞櫉上皆大理石屛每遇正旦冬至聖節則御焉前一日尚寶司設寶案於奉天殿寶座之東鴻臚寺設表案二於殿東中門外禮部主客司設藩國貢方物案八於丹陛中道左右欽天監設定時鼔於文樓之上教坊司設中和韶樂於奉天殿内東西設大樂於奉天門内東西俱北向至期錦衣衞陳鹵簿儀仗於丹陛及丹墀東西設羽扇於殿内東西陳車輅歩輦於奉天門丹墀中道北向金吾等衞列甲士軍仗於午門外奉天門外及丹墀東西旗手衞設金鼔於午門外列旗幟於奉天門外御馬監設仗馬錦衣衞設馴象於文武樓南東西相向欽天監設報時位於丹陛之東鼔初嚴百官具朝服齊班於午門外鼔次嚴引班官引百官并進表人員及四譯人等次第由左右掖門入詣丹墀序立欽天監雞唱官司晨一員於文樓下西向錦衣衞將軍六員於殿内之南北向將軍四員於丹陛四隅東西相向其餘侍衞将軍各分立於殿陛等處如儀鳴鞭四人於丹墀中道左右北向金吾等衞䕶衞官二十四員於丹陛之南六員於丹墀之北俱東西相向陳設方物鴻臚寺司賓署丞一員撤方物案鴻臚寺序班十六員於丹陛中道左右外贊鴻臚寺鳴贊等官十二員於丹陛及丹墀東西紏儀御史十二員於丹墀之東西殿前侍班錦衣衞千户六員光禄寺署官四員序班二員傳呼鳴鞭錦衣衞百户四員俱於殿中門外東西相向導表六科都給事二員序班二員於表案左右掌領侍衞官三員於殿内東西相向錦衣衞正直指揮一員於簾右東向百户二員於簾下左右相向捲簾畢即趨出殿門外各豫立以俟鼔三嚴執事禮部堂上官并内贊鳴贊一員陳設表案并舉案序班五員典儀鴻臚寺司儀署丞一員捧表禮部儀制司四員展表六部都察院通政司大理寺堂上官二員宣表致詞并傳制等項鴻臚寺堂上官五員捧寶尚寶司官二員導駕六科給事中十員殿内侍班翰林院官四員中書官四員紏儀御史四員序班二員及各遣祭官俱詣華葢殿外候上具袞冕陞座鐘聲止入序立遣祭官以次復命訖各趨入丹墀班禮部堂上官跪奏方物并請上位看馬候得旨復位鴻臚寺卿跪奏執事官行禮贊拜叩頭畢贊各供事鴻臚寺卿跪請陞殿駕興導駕官前導尚寶司官捧寳前行樂作上御奉天殿導駕官立於殿内柱下東西相向侍班翰林院立於東導駕官之後中書官立於西導駕官之後紏儀御史序班分立於侍班官之下尚寶官置寶於案分立於導駕官之上樂止鳴鞭報時雞唱訖外贊唱排班班齊鞠躬大樂作四拜興平身樂止内贊贊進表大樂作導表官導表案至殿東中門止序班舉案入置殿中退立於東西柱下樂止贊宣表目禮部堂上官并宣表目官詣殿中跪宣畢各叩頭退贊宣表展表官取表同宣表官詣殿中跪外贊贊跪衆官皆跪宣畢展表官分東西先退内外皆贊俯伏大樂作興平身樂止宣表官退序班舉案置殿東外贊贊跪衆官皆跪代致詞官跪於丹陛中道致詞同賀訖外贊贊俯伏衆官皆俯伏大樂作四拜興平身樂止傳制官詣御前跪奏傳制俯伏興由東門靠東出至丹陛之東西向立稱有制外贊贊跪衆官皆跪宣制制與洪武間所定同宣訖外贊贊俯伏大樂作興平身樂止贊搢笏鞠躬三舞蹈贊跪唱山呼百官拱手加額曰萬歲唱山呼曰萬歲唱再山呼曰萬萬歲贊出笏俯伏大樂作四拜興平身樂止鴻臚卿詣御前跪奏禮畢鳴鞭樂作駕興尚寶官捧寶導駕官前導至華蓋殿樂止駕還宫朝制古天子有内朝有外朝如文華殿所謂内朝也奉天殿所謂外朝也外朝古在應門之外人君不常御國家有大典禮則於此朝㑹而朝士掌其法有大疑難則於此詢事而小司㓂掌其政朝士掌建邦外朝之法左九棘孤卿大夫位焉羣士在其後右九棘公侯伯子男位焉羣吏在其後而三槐三公位焉州長衆庻在其後左嘉石平罷民焉右肺石平窮民焉又小司㓂之職掌外朝之政以致萬民而詢焉漢唐宋有大朝常朝如御正殿所謂大朝也如御門所謂常朝也漢以十月朔爲元旦行饗禮二千石以上上殿稱夀唐以元旦千秋節含元殿受朝賀宋以元旦五月朔冬至千秋節行大朝㑹于文德殿此所謂大朝也漢宣帝五日一朝唐以宣政殿爲前朝謂之正衙日見羣臣謂之常參以紫宸爲便殿謂之入閤宋于埀拱日見侍從官謂之常參于紫宸五日一朝謂之六參朔望一朝謂之朔參望參此所謂常朝也元世祖至元十一年正旦始御大明殿受朝賀及後天夀節皆行朝賀禮每日則宰執入延春閣及别殿奏事而已元大朝殿上設漏案香案酒海殿門外中道設褥位丹陛中道設鳴鞭丹陛中道設香案又設表案禮物案中道南東西設樂位設内黄麾立仗設外牙門立仗又酒海之前一人手執玉鉞立於陛下鉞乃殷時之物長三尺有竒廣半之通體花紋宋藏宣和殿中爲金所得後歸元以爲大寶其服制祀天則服大裘而加袞正旦聖節則常衣不被袞冕惟祀宗廟則服之内庭大宴則服濟遜濟遜者猶言一色服也其臣下朝㑹之服則用唐宋公服一品紫玉帶二品紫犀帶三品四品紫金帶五品紫角帶六品七品緋角帶八品九品綠角帶其京官賜宴則有濟遜其制冬之服凡九等大紅納竒實大紅克黙爾里克大紅官素一桃紅藍綠官素各一紫黄鴉青各一納竒實者金錦也克黙爾里克翦茸也章服大朝上服袞冕元衣纁裳冠制嘉靖八年定冠制以圓匡烏紗冐之冠上有覆板長二尺四寸廣二尺二寸元表朱裏前圓後方前後各七采球玉十二旒以黄赤青白黒紅玉爲之玉珩玉簪導朱纓青纊充耳綴以玉珠二凡尺皆以周尺爲度衣元色凡織六章日月在肩各徑五寸星山在後龍華蟲在兩䄂長不掩裳之六章裳黄色爲幅七前三幅後四幅連屬如帷凡繡六章分作四行火宗彛藻爲二行米黼黻爲二行中单素紗爲之青綠領織黻文十二蔽膝隨裳色羅爲之上繡龍一下繡火二係於革帶大帶素表朱裏上緣以朱下以緑不用錦革帶前用玉其後無玉以佩綬繫而掩之朱襪赤舄黄縧縁元纓結圭白玉爲之長尺二寸剡其上下以黄綺約之上刻山形四盛以黄綺囊藉以黄錦凡朔望視朝降詔降香進表四譯朝貢朝覲則服皮弁服用黒紗冐之前後各十二縫其中各綴五采玉十二縫及冠武弁貫簮繫纓處皆飾以金玉簪朱紘纓玉以赤白青黄黒相次玉圭長如冕服之圭有􅆃并雙植文剡其上黄綺約其下及有韜金龍文絳紗袍本色領褾襈裾紅裳如冕服内裳制但不識章數中單以青紗爲之如深衣制紅領褾襈裾領織黻文十二蔽膝隨裳色本色緣以玉鈎二玉佩大帶大綬襪膝俱如冕服内制鹵簿大朝儀制殿内左右扇三重内雙龍扇二十外素扇二十二又外素扇二十殿門左右黄曲葢繖二次左金交椅一金脚踏一次左金盆一右金礶一此外爲丹陛左右仗三重内雙龍扇二十次單龍扇二十外金節六次嚮節二十六次領頭二又外左朱雀旗一右元武旗一次骨朶六次金鉞六次金鐙六次卧𤓰六次立𤓰六次儀刀六次吾杖六次班劍六次龍㦸六次班㦸六次左青龍旗一右白虎旗一次領頭二中道左右雙龍扇内紅花繖二次黄蓋繖二次紅方繖二次单龍扇内設大樂之所此外爲丹陛左右仗三重内黄蓋繖二次紅繡繖二次紅花蓋繖二次紅曲蓋繖二次紅花繖二次紅曲葢繖二次紅方繖二次紫方繖四次雉扇十次紅花扇十六外羽葆幢十次豹尾四次龍頭竿十次信旛十次傳教旛十次告止旛十次降引旛十次黄麾二又外㦸􅌁二十次戈􅌁二十次儀鍠二十凡三重皆有領頭各二中道右黄蓋繖内馬兀一雉扇内左爲玉輅右爲大輅玉輅前爲歩輦大輅前爲硃紅輦㦸􅌁外左右設馬二十四仗下左右鳴鞭各三馴象各三此立仗之儀也至于出行鹵簿大畧同前稍引而長之鹵簿之制兆于秦而其名則始于漢或曰鹵者大盾也以大盾領一部之人故曰鹵簿或曰凡兵衞以甲盾居外爲導從捍蔽其先後皆著之簿籍故曰鹵簿按三輔黄圖天子出車駕次第謂之鹵簿而唐制四品以上皆給鹵簿則鹵簿者君臣皆得通稱也五代之亂圖典失墜宋王欽若爲鹵簿記宋綬蔡攸等因之而其制始詳元曾巽申復爲鹵簿圖雖間有増損而俱無大異國朝嘗詔禮官鹵簿彌文務從省節蓋尚質去奢之意也元人袁學士有鹵簿詩黄文獻潛䟦曰昔我世祖皇帝肇造大室武宗皇帝始親祼獻逮英宗皇帝乃行時享之禮而偹鹵簿之儀葢天下極盛之際也翰林直學士致仕袁公時爲秘書監著作郎冩以爲詩使窮鄉下士一覧觀焉如身在輦轂之下而覩熙朝之彌文何其幸與漢應劭唐王象皆有鹵簿圖宋王欽若有鹵簿記三卷宋綬増爲七卷後累増爲三十三卷公乃括以六百言曲盡其鋪張之妙亦竒矣詩曰雖無老成人尚有典刑安可忽諸御樂大朝㑹用樂工六十四人引樂二人簫四人笙四人琵琶六人箜篌四人􅌙六人方響四人頭管四人龍笛四人杖鼔二十四人大鼔二人板二人戴曲脚幞頭衣紅羅生色畫花大䄂衫塗金束帶紅羅擁頂紅結子皂皮靴每朝賀之日和聲郎預先陳樂於丹墀百官拜位之南北向同上位将出仗動和聲郎舉麾唱曰奏飛龍引之曲上位陞座樂止偃麾賛禮唱鞠躬和聲郎唱曰奏風雲㑹之曲樂作百官拜畢樂止國公陞殿和聲郎唱曰奏慶皇都之樂樂作國公出殿門復位樂止賛禮唱鞠躬和聲郎唱曰奏喜昇平之樂樂作百官拜畢樂止伺上位興和聲郎唱曰奏賀聖明之樂樂作上位還宫樂止百官捲班和聲郎引樂工以次出朝服羣臣朝服一品七梁冠衣赤色白紗中單俱用皂領飾緣赤羅裳皂緣赤羅蔽膝大帶用白赤二色革帶用玉鈎䚢白襪黒履錦綬上用綠黄赤紫四色絲織成雲鳯四色花様青絲網小綬二玉環二功臣一品皆加籠巾貂蟬二品六梁冠衣裳中單蔽膝大帶韈履同上革帶用犀鈎䚢其錦綬同一品小綬犀環各二三品五梁冠衣裳中單蔽膝大帶襪履同上革帶用金鈎䚢其錦綬用綠黄赤紫四色織成雲鶴花樣青絲網小綬二金環二四品四梁冠衣裳中單蔽膝大帶襪履同上革帶用金鈎䚢其錦綬同三品小綬二金環二五品三梁冠衣裳中單蔽膝大帶襪履同上革帶用鍍金鈎䚢其錦綬用綠黄赤紫四色織成盤雕花樣青絲網小綬二銀環二六品七品二梁冠衣裳中單蔽膝大帶同上革帶用銀鈎䚢其錦綬用綠黄赤三色絲織成練鵲花樣青絲網小綬二銀環二八品九品一梁冠衣裳中單蔽膝大帶襪履同上其革帶用銅鈎䚢錦綬黄綠二色絲織成鸂􅈑花樣青絲網小綬二銅環二至朔望朝見則用公服一品服赤色大獨科花直徑五寸玉帶二品服赤色小獨科花直徑三寸花犀帶三品服赤色散荅花直徑二寸金帶鏤葵花一蝉八四品五品服赤色小雜花直徑一寸五分金帶鏤四品葵花一蝉六五品葵花一蝉四六品七品服赤小雜花直徑一寸光素銀帶六品鍍金葵花一蟬三七品光素銀帶鍍金葵花一蝉二八品九品服赤無花通用光素銀帶其笏五品以上用象牙九品以上用槐木其幞頭鞾並依舊制班次文武官班次文官齊班位於午門外之東西向以北爲上武官齊班位於午門外之覀東向以北為上午門西偏門入奉天門西偏門文官起居位於文樓丹墀之南北上西向殿前班位於武官起居位之北北上東向侍從班起居位於文官起居位之北北上西向文官一品二品拜位於内道上之東每等異位重行北面西上武官一品二品拜位於内道上之西每等異位重行北面東上文官三品以下拜於丹墀内道下之東每等異位重行北面西上武官三品以下拜於丹墀内道下之西每等異位重行北面東上分文武官爲十八位第一班正一品第二班從一品第三班正二品第四班從二品第五班正三品第六班從三品第七班正四品第八班從四品第九班正五品第十班從五品第十一班正六品第十二班從六品第十三班正七品第十四班從七品第十五班正八品第十六班從八品第十七班正九品第十八班從九品使客位文官之東此初制也惟以品定班次其後稍爲變易勲臣在西上面東不與百官齒左班面西侍立一品二品爲第一行三品次之爲第二四品五品京堂次之爲第三宫坊五品六品次之爲第四翰林六品七品次之爲第五兩房中書次之爲第六此爲一叚其下六科爲第一吏部第二中書舍人第三此爲一叚其下則御史第一五部次之自此以下品級官制紊不可紀矣右班面東侍則錦衣在前五軍都督府次之其後七十二衞指揮等官其北面行禮班次則公侯駙馬伯列三班於前去文武階次稍遠其下則文武兩班同上御道左右分立一品二品爲第一三品第二四品五品京堂至翰林史官庻吉士第三科道中書第四其下則六部郎官亦頗紊亂其同班序立翰林七品在小九卿六品之上宫坊六品在小九卿五品之上宫坊五品在大九卿五品之上講讀學士在大九卿四品之上惟讓僉都少詹學士在僉都之上至于六部郎官徃時或叙衙門一吏二禮其下則戸兵等部右班武臣當以都督爲先自嘉靖以來錦衣權重又陸朱諸公皆三公重銜官在都督之上故立于首萬歴戊寅朱太傅已沒掌錦衣者俱都指揮等官相沿舊規仍立前列其後遂有争議部中以錦衣貴重竟不能持可否乃令錦衣仍前立行稍下都督立其後稍上非正禮也古時五等之爵原有等級如唐爵國公一品郡縣公二品侯三品伯四品子男五品至宋略倣其制後則公侯伯三等皆在一品之上不與文武齒矣𢎞治中主事林沂奏欲按品秩列坐御史上御史劾之曰朝廷設官分秩有拘品秩者有不拘品秩者故慶成賜宴科道坐于郎中之上翰林坐于科道之前若概以品秩則諸學士當列于少卿之下京縣知縣兵馬司當列于御史給事中之上矣上以沂故違成憲治之看馬大朝畢上暫退至謹身殿更便服於殿外丹陛上設幄羣臣盛服侍班御馬監之馬雲錦成羣每一馬各有名牌壮士控之由東􅂈西最爲盛觀其制始于嘉靖中至後乆不舉行崇禎壬申十一月初十日冬至郊祀十一日百官入賀朝畢復一閲視是日閲馬三百三十三匹賜宴每歲三大朝賀及郊祀禮成行慶賀禮俱賜宴文臣四品以上及諸學士武臣都督以上皆宴殿上經筵官及翰林講讀官尚寶司卿六科都給事中暨文臣五品堂上官武臣都指揮以上官宴中左中右門翰林院中書舍人左右春坊御史欽天監太醫院鴻臚寺官及五品以上官宴于丹墀是日行禮畢該宴官更衣立殿外候上至升堂樂作入拜進花進酒跪候上飲訖乃起即席簮花啐酒酒凡九進湯五進羣臣則殺其二㑹之時拱衞司于殿庭設黄麾仗及擎執如奉天殿之儀和聲郎列樂于殿上之南間作大樂細樂酒七行食遍凡行酒初行奏大樂作太清曲次行細樂奏感皇恩曲五行舞諸國來朝隊六行細樂奏朝天子曲七行舞長生隊細樂奏醉太平曲凡進食則作大樂音樂莫盛于唐有太常雅樂二部堂上立奏謂之立部堂下坐奏謂之坐部有鼔吹署令所掌鐃歌鼔吹曲有龜兹疏勒髙昌天竺諸部謂之散樂有教坊梨園法曲有雜樂雜戱又有山車陸船馬犀象及宫人所舞奏霓裳羽衣之曲毎大酺賜宴以次陳奏即漢武角觝魚龍之戱也髙宗因立太子勅宴百官命散樂自宣政入太常博士袁利貞請罷散樂甚為知禮大殿宴㑹用舞隊乃相沿元人陋習宜製盛世君臣相悦之樂以彰一代之盛賜宴之日其官卑祿薄者免宴賜以鈔謂之節鈔大宴之外如遇太后聖誕太子千秋夀麵及立春日春餅元宵圓子四月初八日佛誕日用不落莢端午凉糕糭子重陽糕臘八日麵俱先期奏請至日早朝畢復奏百官隨一拜三叩頭起宴畢復一拜三叩頭而出嘉靖十四年四月上諭夏言曰内殿禮儀四月八日俗事冝革其賜百官不落莢亦當改已復諭曰禮記月令謂是日麥先熟薦寢廟今歲以孟夏之五日薦麥内殿賜百官麥餅大學士張孚敬李時奏曰不落莢者相沿釋氏之説於禮無據仰見皇上據經析理得先王遺意遂著為令查萬歴中光祿寺誌稱四月初八日英華殿欽安殿用大不落莢二百對小不落莢三百對紅棗一斤十二兩而乾清坤寧翊坤等宫每宫大五十對小一百對各小宫大三十對小五十對多人每不落莢四個皆以糯米粳米黒糖蜜紅棗爲之則世廟所廢萬歴間似復行矣惟宴改爲麥餅則在四月初五日於午門前宴百官有上桌中桌二樣閣部单坐宫坊以下各雙坐策士殿前策士最稱重典㑹試後於三月十五日上陞殿百官公服行一拜三叩頭禮畢分班立禮部引中式舉人行五拜三叩頭禮各領題在殿前對䇿至晡而出其題内閣擬呈先一日召中書官于六科廊繕冩内璫監之是夜司禮監鐫刻三鼔始竣仍鐍中書于内至御殿始放出宣德五年廷策諸士上臨軒發䇿畢退御武英殿賦策士歌以示諸讀卷官𢎞治乙丑廷試上於宫中焚香籲天期得眞才以資實用嘉靖己丑廷試上閲諸卷於羅洪先卷批曰學正有見言讜而意必忠宜擢之首於程文德卷批曰探本之論於楊名卷批曰能守聖學以爲本此知要之説於唐順之卷批曰條論精詳殆盡於陳束卷批曰仁智之用本諸吾心此不易之説於任瀚卷批曰勉吾敬一之爲主忠哉羅洪先一代大儒上首㧞之時稱得人乙未廷試上批韓應龍卷曰是題本意可第一甲第一名批孫陞卷曰説仁禮之意好可第二名批吳山卷曰敬爲心學之極此論好可第三名崇禎戊辰廷試卷閣擬劉若宰第一荘應㑹次之上翻駁再三竟用劉第一而抑荘爲二甲首其第二第三皆特㧞第三管紹寧䇿内誠字少一撇御書足之因自號誠齋甲戍廷試閣擬李焻爲第一上在文華殿翻閲初進十二卷頃之閣臣趨出入閣再搜十二卷以進特㧞第二十二卷劉理順爲状元而李焻爲二甲首第二楊昌祚第三吳國華皆特㧞也庚辰殿試日上御輿張葢下丹墀徧觀諸進士對䇿及十六日呈進十七日上忽召四十人對文華殿遂㧞順天通州魏藻德第一鄞縣葛世振静海髙爾儼俱一甲而復㧞趙玉森姚宗衡劉瑄孫一脉嚴似祖爲簡討命􅃽德璟王錫袞敎習之周鼎等爲科道吏部主事有差至癸未廷試在九月十五日是年以兵事㑹試改八月廷試以三月十五日而十八日傳臚二十二日謝恩賜状元袍服故事上皆視殿自永陵之末元嘿不出後遂以爲常至崇禎御極始照例陞殿並武舉亦如文舉傳臚至于撤御膳賜閣臣如嘉靖之壬戍隆慶之辛未萬歴之癸丑是時慈谿江陵福清三公皆受主眷最隆故有殊典不多見也􅃽閣學德璟大殿侍班記崇禎帝以丁卯八月十四日御皇極殿登極三殿自萬歴丁酉燬後乆不臨御鴻臚茫然儀注皆不知時詞臣侍班四人冝在皇極殿内御簾外居東而鴻臚曰宜分東西於是詞臣分二人亟奔而西出東𢎞政門復過西宣治門過武成閣入中右門從西欄上至中極殿右門外而上已袞冕御建極矣時魏忠賢侄僞公良卿特奉㫖告南郊還入奏上曰知道了其聲甚嚴又曰百官免賀免宣表御座處其上結爲寶葢光彩煇煌行五拜三叩頭畢即趨出右門循殿前而馳從皇極殿入迎駕上自建極過中極出御皇極侍班官兩傍面駕一躬距上咫尺即侍立御簾下簾捲上從中徑上九級御座兩傍柱皆金粧凡四柱當御座處其上亦皆金也御座背及旁屛皆祖宗鎮器云崇禎壬午元旦上御大殿記崇禎十五年壬午元旦御大殿受賀鞭鳴鴻臚奏禮畢上降寶座秉圭中立命宣輔臣中使誤以爲宣府臣也五府勲臣至殿上乃令之下而曰宣閣臣閣臣周延儒等疾趨而至從西傍門入東向而跪上轉身西向長揖之諭曰朕以𦕈躬仰承天眷君主萬方十四載於茲矣深慚德行淺薄才識庸常恐忝君師之位思古來聖帝明王皆崇師道今日講稱先生猶存遺意卿等即朕之師也股肱心膂臣哉鄰哉經曰尊賢也敬大臣也禮應尊敬朕此舉原不爲過敬于正月元日端冕而求諸先生不必謙遜今而後道德惟諸先生訓誨之政務惟諸先生匡贊之調和燮理奠安宗社萬民惟諸先生是頼古來君臣志同道合而天下治平朕于諸先生有深望焉特諭延儒等跪伏流涕滿面臣承澤適以户科左給事中導駕侍班感堯舜之再見而愧臣工無以報塞也謹記元旦頌聖詩四首闢門元日感咨疇五色榮光動冕旒一自丹書臨北面更無龍袞揖東頭天支大厦思隆棟帝念巨川重濟舟泰運只慿新禮樂良臣何以荅端求黄虞曠典雅難倫復有賡揚到比隣不謂保明初訪落還從尊帝得忱恂元穹監物埀埀定聖主敦庸事事真幾代圖松當此禮光風穆雨四門賔師臣者帝古尊賢况在宸居異講筵七聖道南通大隗八能占應奉階前未須審象知惟肖不待飄風賦有卷十四朝來無故事安昌古序憶當年星辰從此睹重華勸爾聞昌即拜嘉縱賜千金猶有數雖封百子又何加碧磚長照交龍影紗㡌能添壓鬢花新注起居人少見各傳銀管照家家文昭閣傍立直房記崇禎十五年八月十七日早朝畢即登文昭閣閣在皇極殿之東即文樓也上歩下閣御德政殿召對閣臣五人言國初𢎞文舘在禁中閣臣對𢎞文舘國初設在思善門内上曰然文昭閣兩旁亦可建直房朕不時召對及講讀偶有疑問先生每徃來亦便閣臣對宋人言親賢士大夫之時多親宦官宫妾之時少臣等見皇上講學勤政眞得堯舜心法上問永樂大典及大學用人理財諸臣各有奏對言用人理財俱明明德内事大學一書只是明明德上首肯因言京中冝積貯本色德璟對外面各處都宜積貯本色髙皇帝原設有預偹倉令直省州縣專貯本色以待荒年之用今預偹倉只是空名上曰屯田也要𦂳因言漕運海運諸事黄河一帶修築如何閣臣對近年自董家河起即用泇河不用黄河一路較平稳上曰是泇河又言京中運粮車户之苦閣臣對車户脚價原有輕齎銀可用只須給發得好外面百姓尤苦練餉加𣲖須是漸漸减省上黙然是日天顔和粋疇咨詳悉幷言京營戰守諸事奏對尚多不能盡記也遂賜茶餅而出異日命于文昭閣左右創設直房云臣延儒恭記三殿鼎新賦三殿者皇中建三極殿也初爲奉天華葢謹身肅皇帝仰則天垣遠紬禹範爰錫嘉名我皇御籙中興實鼎新焉在易鼎之象曰君子以正位凝命蓋與書維皇建極之指合偉哉虖誠北辰之鴻緯南面之盛觀也七年中秋落以斯干之雅敬拜手稽首而獻賦曰􅑴維幽燕闢基黄帝四千餘年明廼繼之昔剪蚩尤張陳失阻天眛再開王氣雙吐當時所爲治城闕繕宫室於奉天出治之地尤三致意焉蓋已髙蟠龍虎上憲觜陬籠二儀以爲宫枕萬歲而不渝矣柏梁之厄盛極而然今皇帝遹追祖武堂構是肩諟殿基作而詔諸中外曰是成祖宅中之區而肅祖以疇錫福之所延也歸㑹峙其旁正陽巋其前東西文武左右𢎞宣冠帶萬國旒冕九天列聖陟降其可後焉於是命司空契元龜欽天練日營繕經初圭臬揆景般倕競趨發帑則神廟封樁之貽醵俸則千官邪許之呼蜀楠吳磚粤石荆銅山祗川后獻瑞効功爾乃神木輸厰黒窑治璃臺諫紏敏匠石究竒百司雷動萬輦雲飛曽未幾時而皇極門殿已煥乎其巍巍矣惟中與建兩殿踵成如彼太乙之宫前有太乙後有鈎陳是曰紫㣲帝座三辰倣曩規而増麗浴濛氾而俄新恢當陽之寶勢快神孫之髙門若夫雲楶星桷重楄飛昂蘭栭藻井螭梠鳯忩金扉玉鋪丹陛瑶璫岧峩博敞蔚駮煒煌􅀢􅌄莫際赩翕有光固三殿之所同羗難得而偹方也有兩班文武進而稱曰斯舉也葢遲之三十年而成之不日乘蠱用幹在鼎元吉當寶頂之晨安馳露布而生色敢賦周詩上夀千億於是尚寶陳案教坊奏韶錦衣設幟光祿授肴黄麾明扇仗鼔排簫仗馬馴象羅擁蝉貂鞭鳴簾捲玊袞以朝然後七舞入九曲湛稱制賜瀝山呼者三其或冊拜椒掖封遣桐圭臚天人之賢雋受重譯之航梯禮成郊廟典舉耕蠶頒春小歲獻至日南升恒進千秋之鏡熊羆叶百堵之占莫不晴熏春羽日射天香劔舄花生穆穆皇皇於是屏宓妃却玉女咨臯䕫訪箕吕解網除𤯝吹律回黍貌言視聽袚其思歲月日星釐其序雨晹燠寒五行帥其官食貨徒師三德脩其盬若是故庶徴應五福綏而世爲竹苞松茂之主也昔堯有塢宫舜有搃期儉德雖章大壮非時秦漢諸殿通光臨華神仙増城門千戸萬則汰王之譏也若衞歌楚室魯美靈光則又諸侯之事也安足爲今日頌哉帝錫斯疇肅祖命之肅祖錫疇來孝追之光啟中興不亦偉乎天子曰嘻是於疇叙其八抑樞在極乎夫皇極者即堯舜允執之中而建之即平康正直之衢三而一者也吾将坐華殿之上燭以玉燭風以景風使東至寗宫之塔西至松套南至鬼方解弢面内莫不來同雖黄帝阪泉之兵亦可不用而穆然治天下以崆峒隆慶初詔求直言王世貞上疏請正殿名以尊治體言太祖名大朝門曰奉天門殿曰奉天殿以至詔赦誥勅俱以奉天冠之明人主不敢以一人肆於民上無徃非奉天也義至精博也願詔門殿仍奉天故號昭象魏之重不報春明夢餘錄卷七
