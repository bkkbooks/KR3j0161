body:
  text: 春明夢餘録卷三十四吏部左侍郎孫承澤撰吏部吏部在皇城之東宗人府下西向設尚書主天下官吏選授勲封考課之政令侍郎為之貳其屬初有四部曰總部曰司封曰司勲曰考功後改總部為選部又改選部為文選司司封為驗封司勲為稽勲考功仍舊俱稱清吏司四司奉其職贊尚書之政令而部尚書首六卿擬古之天官冡宰文選掌天下文吏銓選注缺改調保舉推陞之事以署職試職實授奠年資以裁革并省兼攝添設註選量繁簡以薦舉起廢徴召達賢雋以帶俸添註寄恩冗以降調除名馭罪過以官程課吏治以寧假悉人情凡入選釐流品平注擢毋得相先後凡陞必考滿不待滿考曰推陞類推上一人取㫖單推上二人三品以上九卿及僉都御史祭酒廷推上二人或三人内閣吏部尚書勅推上二人若三四人至五六人唯上命乃其後制王官不外調王姻不内授大臣之族不得任科道僚屬有族人下避上傳陞乞陞者許執奏納粟馬銀不得銓府佐州縣正官驗封掌封爵襲䕃褒贈及吏算之事凡公侯伯勲烈外戚恩澤及闕里大宗各徴其誥券適孽功罪封號以第其世流降除之等以土流馭裔官以誥勅授封贈以進階貤封加贈追奪勵愆良以蔭敘錄任子以等級給散官以考撥差胥算以須知訓入官稽勲掌勲級名籍喪制之事凡文官五品上始授勲百官黄類登之内府有故則除之凡三年喪解職糾奪喪禁短喪謫匿喪欽天監奔喪三月復父母老七十鮮兄弟得終養更名有諱復姓無漏役名姓更復必登版考功掌官吏考課黜陟之事凡内外官三年初考六年再考引請九年通考奏請大臣不註考京官五品下已亥年考不職者除名冠帶閑住致仕有差留用者有復職有降調四品上自陳外官辰戌丑未年考不職若留用者如之内外官有劾章若大臣自陳下者品其良不肖擬去留聼上王官考察如京官倉場庫官一年考巡檢二年考教官及流外冗官九年陟無過一等惟舉人教官得引選試陞陟無等京官七十外官六十五致仕其乞致仕者不限年諸請葬祭贈諡䕃必按其滿考被劾與否傳公議以聞以閑劇量殿最以旌異廉政績以貢舉搜遺逸以保留達民情以紀録懲愆過以謫戍糾罷閑官吏用人之道莫備於周禮此萬世之凖也當其始也三嵗大比則鄉大夫考徳行道藝質諸比閭族黨就鄉先生而謀賔介帥其吏以禮賔焉曰賔興厥明鄉老及鄉大夫羣吏獻賢能之書於王王再拜受之登於天府曰選士此謂使民興賢出使長之使民興能入使治之者也而遂大夫之興甿明功亦如之非是族也不在舉典司徒以選士之秀者而升之學俾成徳達材以益就於成大樂正造焉不征於司徒曰造士大樂正論造士之徳成材達者告於王而升諸司馬曰進士而大司馬辨論之論定而後官之任官而後爵之位定而後祿之是銓選之所始也於是乎大宰以八法而治官以八柄詔王馭羣臣蓋爵祿廢置予奪生殺具而治官者為巳悉矣少宰又以六計弊吏治徳詔爵功詔禄能詔事久奠食而任焉月終小宰以官府之叙受羣吏之要而考之嵗終考嵗成太史典禮執簡記奉王嵗事諸可諱惡者不諱以諌王王齋戒受諫王自考之道也司㑹以宰嵗成質於天子宰齋戒受質宰自考之道也先自考敕正而後以正人也於是令百官各考其屬受其㑹聼其政事詔於王而廢置之司會逆焉以參互攷日成以月要攷月成以嵗㑹攷嵗成以周知四國之治以詔宰而廢置之三嵗則大計羣吏之治為誅賞八柄行焉夫其掄徳行以䖍始謹法柄以嚴中精考課以成終此成周之治所以舉無廢官官無廢事而卷阿棫樸之所以為盛也三代而後能以成周之法用人者莫如眀初當其創起淮甸正值天地閉賢人隱知庸碌者不可與圗治也乃輪旌束帛交馳於四方定金陵辟陳遇下鎮江聘􅁗從龍克婺州召許元胡翰克處州徴宋濂劉基章溢葉琛其同事幕中者皆一時之人傑也元年詔曰向干戈擾攘疆宇未一養民致賢之道未講也獨頼一時輔佐之功匡大業於底定山林巖穴念豈無懷才抱徳之賢何隱而不列也豈朕政令靡常國無法守與抑刑辟煩重人懐其居與抑朕寡昧事不師古而致然與不然賢士大夫幼學壯行欲堯舜君民豈固甘汩沒而已哉今天下頗定方將與諸儒日講眀治道以沃朕心巖穴之士能以賢輔朕以徳濟民者尚不吾棄三年下開科詔曰朕特設科舉起天下抱才懐徳之士務在經眀行修博古通今文質相副其中選者朕將親䇿於廷品學識命官焉超衆者顯擢使中外文臣一皆由科舉而進非科舉者不與六年詔科舉取士終浮文罷不設令有司察賢才先徳行次文藝舉用又諭吏部曰古之帝王若商髙宗若周文王皆皇皇於版築鼓刀之賢豈其智不足哉以賢才不備不足以為治也鴻鵠之逺舉以六翮蛟龍之騰躍以鱗鬛人君之能致治以賢才為之輔今山林之士念豈無徳行道藝之賢其令有司採舉禮遣赴京師朕將任用焉其時天下郡縣舉聰眀正直孝弟力田賢良方正文學才幹之士至京者八百六十餘人又徴經眀行修儒士三千七百餘人又詔來朝官各舉一人十七年復科舉法命禮部頒科舉新式行焉是年冬即詔各布政司府州縣官舉秀才人材必㑹同境内耆宿長者訪求徳行道藝著聞州里之人以充從鄰里保結命有司驗實蓋科薦並行十九年詔郡國舉經明行修之士諭禮部曰比有司舉士置耆年宿徳不問而拔少俊覬後恩大誖也昔周文用吕尚而興秦穆違蹇叔而敗伏生既老白首傳經豈可槩以耄老而棄哉今郡國所舉士年六十以上者置翰林備顧問六十以下者於六部及布政按察司官使之時孝廉人材及郡縣學所貢士若富戶耆民皆得見見稱旨即擢不次而國子生奉命巡列郡廉官方吏治問民所疾苦還稱㫖即擢用為行省參政僉事知府等官至有擢僉都御史者已上謂吏部言朝廷懸爵祿待天下之士惟賢是用何可以資格限也資格者獨以為常流設耳自今庶官有才能居下位者不次用於是召萊州知府董俊尚書兵部寧波知府余文昇尚書工部是時宜興主簿王復春守公不奉上上聞遣吏科庶吉士齎手勅徃勞慰即擢為同知新化丞周舟以進士蒞官有治行考最擢考功新化民詣闕願得留詔復任禮部宴賞之而遣當是時馭下用重典有贓罪懐印綬未煖輙被逮去非謫戍即門誅羅天下士之制甚設而不為君用之法亦特峻以深弛張闔闢以鼓鑄天下人材不循法故居職惴惴常恐不能奉法恤民以稱塞上意故當時之民出水火而藉衽席繼以建文仁明在位信用名賢治幾刑措此能師周禮之效也冡宰周禮天官太宰掌建邦之六典以佐王理邦國註云百官總焉則謂之冡宰列職於王則謂之太宰漢初凡郡國舉秀才廉吏貢於京師屬光禄勲成帝初置常侍曹尚書二人一主公卿一主郡國蓋選曹之所始也光武改常侍曹為吏部尚書唐以中書令門下侍中尚書令左右僕射三省長官為丞相尚書三省之一也尚書省有令有僕射有左右丞太宗嘗為令後不設僕射猶今之尚書也左右丞猶今之侍郎也其選法試而銓銓而注注而唱集衆告之然後類為甲上於僕射乃上門下省給事中讀之侍郎省之侍中審之不當者駁下既審乃上聞主者受㫖奉行各給一符謂之告身尚書曰中銓侍郎曰東西銓宋法文選屬審官院武選屬樞密院王安石擅政乃以文選武選皆屬吏部尚書左選主文侍郎一人主之謂之審官東院尚書右選主武侍郎一人主之謂之審官西院洪武元年設六部以滕毅為吏部尚書正三品屬中書省十三年罷省以山西參政偰斯為吏部尚書改正二品中書省既罷以五府九卿分理庶務翰林春坊官㸔詳諸司啓奏徴聘聖王在御必有不召之臣徴聘尚矣賁玉帛於邱樊躬萬乘於巖阿非好屈抑也蓋必如此始可得非常之才耳聘莘訪渭徃古不論如元末廟堂虚無人焉洪武之初設禮賢館而得劉基宋濂章溢葉琛呼為四先生下鎮江而得秦從龍下金陵而得陳遇皆人傑也俱於徴聘得之孰謂晚季乏才而僅可收俊髦於七義也任官人之責者宜於山林隱逸有實負經濟究心名理者奏請敦聘亦人臣以人事君之第一義也四先生或以謀畧或以文章或以政術人皆知之至陳靜誠先生遇有足異者先生以秦元之之薦聘至俾典戎務上幸其第密咨籌畫授供奉不受洪武元年首陳為治要道三事授翰林學士不受賜肩輿校尉十人除中書左丞不受召至華蓋殿令坐草平西詔除禮部侍郎兼𢎞文館學士不受尋進禮部尚書不受召至奉天門命坐詢問典故時炎暑賜衣命引入内池沐浴賜宴又命其子侍衛亦辭不受年七十二竟以布衣終夫下不肯屈其身以受官上亦不肯挾勢强人以官兩得之矣此三代以後不多見也讀洪武六年諭曰世有賢才國之寳也古之聖王恒汲汲於求賢若髙宗之於傅說文王之於吕尚二君者豈其智之不足也而遑遑於版築鼔刀之徒蓋賢才不備不足以為治鴻鵠之能逺舉者為其有羽翼也蛟龍之能騰躍者為其有鱗鬛也人君之能致治者為其有賢人為之輔也今山林之士豈無徳行文藝之有稱者宜令有司採舉備禮遣送至京朕將任用之以圖至治十一年諭曰天下之務非賢不治求賢之道非禮不行故湯致伊尹由於三聘漢徴申公安車束帛近朝臣為朕舉賢朕皆徴用之所舉者多名實不稱徒應故事而已夫披沙將以求金掘井在於獲泉薦士期於得賢今所舉皆非豈昧於識人耶抑賢才之果難得也爾吏部其以朕意再諭天下有司盡心詢訪必求真材以禮敦遣其諄切如此當時下鎮江聞元御史隱居秦從龍之賢命兄子文正以銀幣徃聘將至上親迎至龍江關訪以時事乃即元故御史臺改為府以居之每有諮問以筆書漆簡甚密左右無知者又以賢良聘至者劉于也以文學聘至者王褘也聘至而留為後日用者方孝孺也聘至修禮書成而不受官者梁寅也聘至修史書成而不受官者楊維禎陶宗儀趙汸也聘至衡文典試而不受官者沈夢麟滕克恭也一時名碩盡在弓旌中孰謂晚季乏材哉洪武之初人材進用專事採訪徴聘進士之科一行而罷至十七年復行科舉然每科所取不過數十百人與召聘之士同登並用下至正統景泰間遵守如故當時楊文貞士竒以白衣歴編修而入内閣吳思庵沉以儒醫歴御史以至都憲况鍾以吏員至知府並為一時名臣成化而後科舉重而徴聘遂為曠典粤稽載籍成周以鄉三物教萬民而賔興之一曰智仁聖義中和取其徳也二曰孝友睦婣任恤取其行也三曰禮樂射御書數取其才藝也文辭弗與也兩漢取士則郡國有孝亷之察有賢良方正之舉公卿則得自召補掾史州郡則得自辟用僚屬是以當時士修於家而聘召自至士不孜孜於求用而人之好徳自不能舍之布列在位濟濟多賢雖至桓靈衰微而一時人才風俗之美雖成周不過是也尚賢興行其效豈小小也哉經曰正其本萬事理今貪墨日甚民生日見凋瘵者凡以致理之未得其本也致治以賢才為本求才以興廉舉孝為本經曰居家理故治可移於官傳曰求忠臣於孝子之門此探本之論也李克曰窮視其所不為貧視其所不取此察廉之方也修之於家而壊之於天子之庭理無是也今欲扶世救民舉一諷百徴聘一事斷宜亟講也霍韜疏臣嘗伏讀太祖髙皇帝遣内使趙通聘壺關縣儒士杜斆諭畧曰昔之御宇内者無倖位無遺賢致時和而世泰今朕才疎遺聖道之良宗是致賢隱善匿民未康世未泰今爾博學君子齒有年矣符若到精力有餘則䇿杖來朝果可作為加以顯爵與朕同逰大哉太祖髙皇帝之至徳也聘一儒士猶自謂才疎遺聖道之良宗其謙徳禮賢之心何如也杜斆乃草莽之臣耳猶曰與朕同遊其待臣下之厚何如也又嘗伏讀英宗皇帝遣行人聘崇仁縣處士吳與弼勅諭畧曰勞於求賢然後成無為之治樂於忘勢乃能致難進之賢聞爾與弼潛心經史博洽古今特遣行人曹隆徃詣所居徴爾赴闕至哉英宗皇帝法祖之善也鄒元標疏爵禄富貴天之所不靳予聰明才智天之所不輕畀蓋百人中而得一焉用才者宜體上天生才之意國家得才之難之故矣臣讀詩至白駒之章未嘗不歎當時之輕於棄才讀摽梅之章未嘗不歎用才者貴及時也保舉夫以天下之大人才之廣而僅取用於銓衡一司網疎甚矣欲使官得其人人盡其才舍保舉其奚由焉夫保舉與薦舉異薦舉者誠有所知一舉焉而臣之心畢矣保舉者舉其顯復保其微舉其始復保其終故薦舉者上世之法也保舉者晚世之法也明王好賢如渇而又慎之以不得已非薄視天下也保而舉之不厭慎也周官曰推賢讓能庶官乃和不和政龎舉能其官惟爾之能稱匪其人惟爾不任此保舉之始也兩漢近古人才為盛當時有薦舉而無資格至不舉孝不奉詔以不敬論不察廉不勝任當免董仲舒之言曰臣愚以為使列侯郡守二千石各擇其吏民之賢者嵗貢各二人以給宿衛且以觀大臣之能所貢賢者有賞不肖者有罰夫如是諸侯吏二千石皆盡心於求賢天下之士可得而官使也此漢之得才所以盛也宋劉貢甫言唐有天下諸侯自辟幕府之士唯其才能不問所從來而朝廷常收其俊偉以補王官之缺是以號稱得人蓋必許其辟置則可破拘攣以得度外之士而士之偶見遺於科目者亦未嘗不可自效於幕府取人之道所以廣也今時雖有辟法然白衣不可辟有出身而未歴任者不可辟其可辟者復拘以資格限以舉主蓋去古法愈逺而倜儻跅􅕟之士其不諧尺繩於科目受覊􅎗於銓曹者少得以自達矣此宋人言宋事也近代人才逺不逮古大率坐此不獨宋為然矣馬端臨言按兩漢二千石長吏皆可以自辟曹掾而所辟大槩多取管屬賢士之有才能操守者後世長吏既不與之以用人之權而士自一命以上拘於三互之法不使之效職顯能於本土而與郡守縣令共治其民者則皆凶惡貪饕舞文悖理之胥吏大率皆本土人也夫吏胥一途近日每欲與科貢並用而不予長吏以辟舉之權則吏治不光而並用之事亦未易輕議也眀之得人洪宣為盛蓋大行保舉之法也宣帝至出招隱猗蘭之詩以示激勸故彼時之治幾比漢之文景焉正統二年楊文貞士竒疏言昔唐太宗命在京三品以上官舉郡守縣令後來致天下斗米三錢之效近年有等京官無人舉保造為謗語專欲墮壊良法但所舉之人籍記舉主後有犯贓必明正舉主之罪則人知謹畏不敢狥私官必得人矣詔從其議楊文貞士竒在内閣日所舉賢才列中外者五十餘人皆能正己恤民蓋取人必先徳行而後才能博詢於衆而信乃舉不得者怨誹不恤也此不愧大臣之義矣保舉一事三楊當國時謂借以攫吏部之權部意不平事遂漸寢嗟乎使官誠得人人克副官爵祿固朝廷之爵祿也臣子何權之有惟是保舉聼之衆人叙用仍還吏部使舉非其人部執而議之部用違其才朝廷執而議之事斯善矣按歴朝保舉之詔洪武元年令舉懐才抱徳之士蒙古色目人一體擢用十五年命朝覲官各舉所知一人十九年令舉經明行修練達時務之士年七十以上者禮送京師建文元年令在内七品以上在外五品以上文官及縣正各舉賢能廉幹之人吏部考驗擢用并定連坐法永樂元年令内外諸司文職官於臣民中有沉滯下僚隱居田里各舉所知正統元年御史有缺令在京三品以上官各舉一員除現任知縣不舉知縣有缺令在京四品以上官及國子監翰林院堂上各部郎中員外郎掌科道官各舉一員俱從本部推訪除授不職者併坐舉主五年令進士辦事一年監生歴事考中併坐監三年以上由吏員授官曾歴兩考者悉聼保舉十四年令方面知府并在京三品以上官保舉有才能出衆屈在下僚者聼風憲官及上司舉薦陞擢景泰三年令各處見任官有屈在下僚文學才行之士隱於民間文官罷職無贓犯而才學可用者並聼在京四品以上在外巡撫巡按方面并府州縣正官舉薦聼用天順元年令處士中有學貫天人材堪經濟隱居髙蹈不求聞達者所司具實奏聞𢎞治十一年令府州縣正官保舉山林隱逸之士懐才抱徳經明行修衆所推服者十六年令各處撫按及布按二司官訪察所屬廉能幹濟者明開堪任某官具奏陞用嘉靖八年命兩京大臣科道及在外撫按官用心詢訪才行老成繫時望者從公各舉所知至隆慶元年令各處撫按將境内人才逐一捜訪㑹本具奏以後撫按復命及巡撫年終各舉行一次從此薦舉一事徒為故事矣撫按薦舉㑹典所載朝覲年分考察既畢備查被黜方面有司等官追究所舉巡按御史四人以上革職閑住二人以上降一級調外任一人罰俸半年趙太宰南星疏言保舉之法先臣如蹇義楊士竒等皆嘗奉行有效請於本部之考功司都察院之河南道及吏科各立薦舉簿一扇每遇撫按舉劾疏到即書所舉方面有司地方人才職名方面有司通俟朝覲考察既畢備查所黜官員照依㑹典所載分别議處庶撫按知濫舉之必罰而無敢不慎矣陸太宰光祖舉廉疏臣望皇上無舉卓異而舉清吏特召臣等行撫按諸臣廉訪公論以苦節獨行飲氷茹蘗如昔海瑞邱橓孟秋其人者列為一等以公廉寡欲闇修實履如昔袁洪愈嚴清宋纁其人者列為一等撫按同五花文冊掲報本部臣等叅酌僉同於大察畢日列名上請如得其真雖數十人不為多如不得其真雖數人不為少皇上特賜宴賞或敕本部紀錄舉後如有改節以負特恩較貪吏之誅戮倍之夫舉卓異天下將矯䖍鷙詭而鶩於名舉清吏天下必刻意厲行而修其實化貪為廉在此一舉資格夫資格者吏部之凖繩也使盡屏棄之大匠立見血指矣然以四海之大望人致治朝廷方以重仔畀我而我斤斤尺寸能勝任而愉快乎故資格不得不破無容再計而决也然非明則不知破非公則不能破非置是非利害於度外則又不敢破也大匠之用凖繩不束於凖繩而後可耳洪武十一年諭曰朝廷懸爵祿以待天下之士資格者為常流設耳若有賢才豈拘常例大哉王言故當時宋景濂一代文章之宗楊士竒三朝輔相之首皆以布衣特起乃遂掌帝制典機密豈謭謭於循塗也金世宗嘗謂宰臣曰今之用人太拘資歴循資之法起於唐代如此何以得人平章政事汝霖對曰不拘資格所以待非常之材上曰崔祐甫為相未踰年薦八百人豈皆非常之材歟北朝薛琡譏時政曰黎元之命繫於長吏若取年勞不簡賢否義均鴈行次若魚貫執簿喚名一吏足矣何謂銓衡當時典選者崔亮也史謂魏之失人自亮始唐開元十八年裴光庭為吏部尚書始作循資格而賢愚一槩必與格合乃得銓授限年躡級不得踰越於是久淹不收者皆便之謂之聖書宋璟爭之不能得而天下遂不復見貞觀之盛矣邱文莊濬曰守一定之法而任通變之人使其因資歴之所宜隨才器之所能而量加任使用資格亦不純用資格不用資格所以待非常之才任要重之職釐繁劇之務用資格所以待才器之小者任資歴之淺者釐職務之冗雜者其立為法一定如此而又得公明之人以掌銓衡隨才授任因時制宜而調停消息之於常調之中而有不常之調調雖若不常而實不出乎常調範圍之外歸太僕有光曰天下竒俊之士少而中庸之士多帝王之道先為其法以就天下中庸之士而精神運用獨可於竒俊之士加於其法之外而不為法之所限此其所以能鼔舞一世之人材也嚴太宰訥言朝覲之後令來朝官各舉所屬府佐以下治行卓異者蓋位卑祿簿之臣而中有克自樹立者非豪傑不能也故國初有以典史擢都御史如馮堅以直㕔歴布政如王興宗者宜倣此意間陞一二以鼓其志乃以潮州府同知王化為廣東僉事鳳翔府同知江東為陜西僉事辰州府通判邵元美為四川僉事廣安知州張澤為雲南僉事溆浦教諭李珙為評事碣石經歴郭文通為同知嚴時以内閣署吏部永樂而後用人雖漸重科目然以才學自致公卿者甚多任子如朱長史復之子濬官尚書儀侍郎智之子銘尚書太子太保其餘有䕃編修給事中御史者因其才品原不限以官如漢陽知縣王叔英以方孝孺之薦召為修撰叔英又薦布衣楊士竒召入翰林修書董倫薦河州衛吏解縉召為文淵待詔楊解未幾皆入閣霍韜曰臣觀正統成化年間若馬昂為戶部尚書則由貢士若寇深為都御史則由監生若魏驥為吏部尚書若陳璉為禮部侍郎皆由教職若薛瑄入閣則由御史李賢入閣則由主事當時人材雖片善寸長皆無淹滯效忠竭節者得自䇿勲猷張文忠居正集載洪武六年六月以戶部郎中吕熙為本部尚書尋又以為吏部尚書以都督府經歴俞溥為戶部尚書以戶部侍郎陳則為大同府同知以大同守將壊法有司不能禁輯故也以刑部主事陳璿為本部尚書八年二月以都督府經歴韓焯為戶部尚書十一月以登州衛知事周斌為戶部侍郎九年八月以禮部員外郎張籌為本部尚書十一年正月以西安府知府李煥文寳鈔司提舉費震俱為戶部侍郎禮部員外郎朱夢炎為本部侍郎以兵部郎中陳銘為吏部尚書十二年以萊州府知府董俊為兵部尚書寧波府知府余文昇為工部尚書常州府知府張度為吏部尚書十月以儒士王本等為四輔官以教諭石璞為戶部侍郎十四年七月以刑部郎中胡禎為本部尚書禎錢塘人御史臺吏也十一月以禮部郎中髙信為本部尚書大同衛知事朱安仁為戶部侍郎十五年十一月以上海訓導顧彧為戶部侍郎十八年十二月以庶吉士楊清為戶部右侍郎以給事中􅁗昇為戶部試侍郎二十二年正月以浙江道御史凌謨為右副都御史數日又陞右都御史二十三年正月遣行人賫勅以上尊楮幣賜勞温州府平陽縣知縣張礎以其執法愛民也以韃靼指揮安童為刑部尚書是以武臣任文職始見於此二十四年正月以蕪湖知縣李行素有實政擢刑部右侍郎復以吏部考功司主事周舟為新化縣丞初舟為新化丞有善政陞考功司至是邑民詣闕言舟去任民不安願借舟再為丞故有是命賜宴禮部而遣之二十五年九月以刑部員外郎某為都察院右副都御史刑部郎中任勵為本部左侍郎司務祁著為右侍郎二十九年正月以詹事府丞杜澤為吏部尚書左贊善門克新為禮部尚書三十年正月以禮部員外郎侯泰為刑部左侍郎司務暴昭為刑部右侍郎内外夫官之有内外也内之中有外焉翰林之於部寺是也外之中又有外焉部寺之於省直是也在内者既薄視淮揚而不為在外者又遥望長安於天上其得之則侈然自恣其不得也則頺然氣沮營營一官遑問職業矣内者既昧民社之宜外者鮮通輔導之術士無實用未有近世之甚者也周官曰明王立政不惟其官惟其人古不分文武何有内外互而用之斯固周官之㫖乎漢制以郡縣守相之髙第者為二千石二千石有治行者為九卿九卿稱職為御史大夫宣帝以蕭望之才任宰相欲試以政事乃從少府左遷為馮翊曰所用皆更治民以考功故試之於三輔于文定慎行曰宰相之職上佐人主下總萬國必嘗親歴民事知錢穀刑名之詳然後可以贊理萬幾不渉懸斷故漢唐以來宰相之任徃徃起家郡邑未有文學侍從不出禁門而進宅端揆任天下之重者元人王惲云唐制選京官有才識者除都督刺史都督刺史有政跡者除京官使出入常均永為定式又云漢制由郎官而出宰百里由郡守而入為三公宋人初改官人必作令謂之須入除殿試上三名南省元外並作邑其後雖宰相子殿試甲科無不宰邑者胡端敏世寧曰内閣缺不當專於翰詹吏禮當斟酌先朝閣臣李賢等故事於六部尚書左右都御史簡其公忠體國知人有容練國體王事者推補部尚書都御史缺宜於内部侍郎於外督撫副都御史中簡其人才望懋著者補之則心膂股肱得人任職而天工時亮矣六部侍郎副都御史在外總制總督等缺宜於大理寺卿坐堂僉都御史府尹詹事學士并在外各處巡撫巡視南京管糧副僉都御史十三布政司左右布政使共四十餘人内推補各邊腹巡撫并巡視河道御史缺宜於各寺卿少卿大理寺丞年深出衆給事中御史郎中在外右布政使按察使左右參政年深兵備副使上等知府内推陞原職髙者陞副都原職卑者陞僉都十分資淺者陞署職令其領勅一般行事其有在邊不諳軍旅而善理民事者改任腹裏不為貶抑年深有勞者就彼僉都陞副都副都陞右都常管此方十分年深勞著者就陞部院掌印如正統天順年間金濓年富皆自副都陞戶部尚書府尹及布政使稱職者留以久任遷陞侍郎并坐堂副都御史如天順年間刑部尚書陸瑜禮部尚書蕭暄皆由布政徑陞翰林院春坊詹事府等官以備顧問侍講讀草制誥修史牒最一清要之職唐宋以來多重此官以備卿輔之選然多選外官才學過人者試任雖取中狀元亦令試歴民事方纔取入翰林國初多用徴聘隱逸之士永樂宣徳正統以來如楊士竒張洪由王府審理教授黄淮劉鉉張益由中書舎人鄒濟陳仲完由教職儲懋王洪陳山由給事中劉球李時勉陳敬宗由主事胡儼由知縣蔣驥由行人于敬由御史各陞翰林詹事春坊等職又如張英由教職薦陞給事中復進中允郭璡由參政李賢由主事薛瑄由御史皆歴陞侍郎尚書兼詹事學士又如張顯宗由翰林歴陞祭酒出為布政郭濟歴任春坊復陞知府王珣由檢討陞大理寺丞巡撫貴州歐陽謙由御史改編修復陞郎中徐旭由御史陞郎中祭酒復改修撰羅汝敬由侍讀改御史是皆惟才所宜不拘内外出入所以得人給事中御史皆有言責上而君身朝政缺失下而臣僚是非邪正皆唯其所言是聼使非其人人主誤聼其言則聰明惑亂是非邪正不明誤事不小不聼其言又為拒諫取謗天下至於御史又有巡按激濁揚清除奸革弊之責所係一方利害尤重故自古慎重此官我祖宗朝如王翺由寺正甄庸由知府左遷陳祚由參議康慶由知州落職皆復陞御史虞翔王鐸年富由教職冀凱由州判官皆陞給事中又如丁璿由主事馬守中由同知俱陞御史徐旭由御史郎中復改翰林歐陽謙由御史入翰林復陞郎中是皆惟才所宜不限資格所以得人而又㧞其尤者超擢侍郎僉都御史等官所以肯盡其職且又不時考察使偏私浮偽者不得混於其中以惑上聰明所以天下常受納諫之福而君上不受拒諫之名知府知州知縣於民尤親於治體尤重宜畧倣唐内外均調之法不歴刺史郡守不得任侍郎列卿不歴縣令不得任臺郎給舎進士出身不得徑選州郡正官京官外補不得徑陞參政副使參政副使缺惟推訪知府知州知縣久任卓異者當之管志道疏正統中劉永清翰林院侍講也以才堪繁劇擢為廣東左布政景泰中徐有貞春坊左諭德也以智能治河擢為僉都御史而嘉靖中歐陽德則以知州而累遷禮部尚書魏校則以副使而召為國子監祭酒蓋猶内外通融也近乃專以内閣及禮部詹事府國子監堂上清秩為遷轉翰林官之地别衙門不得與焉即有自翰林出為方面者亦以備考察之遺與左遷無異矣又如宣徳中初設巡撫官則郎中趙倫員外郎吳政長史周忱等與御史于謙同擢為各部侍郎𢎞治中大理寺丞缺鄒魯以御史謀陞而吏部竟從何喬新之薦以郎中魏紳補之蓋猶擇人不擇官也近乃專以都給事中與文選司郎中占提督四譯館及謄黄通政之缺以監察御史占大理寺丞之缺其餘雖徳若顔閔才如張葛弗與矣久任夫官之不能集事也陞轉之速也經曰聖人久於其道而天下化成不久而成聖人難之况其下焉者乎雖曰晚季凌競志希速化稍需次焉則拊髀書空攢矢銓衡之堂矣然有說焉非人不樂久上亡有以處久也古之久於其任者大槩皆賢者也不則去之惟恐不速寧能久乎其賢者功深而效著惠浹而譽起上於是初以璽書褒之繼以車服寵之再以顯秩擢之彼久者既得行其志而又大其報其誰不以久為榮而以速為辱哉漢之三公闕則以九卿郡守賢而久者任之故其得人嫓於三代人情何常顧上所以用之者何如耳宋濂曰取士莫善於選舉用人莫善於器使命官莫善於久任葉氏曰周官司士以久奠食何也盖古人爵人以徳不觀其暫而觀其常祿人以功不觀其驟而觀其素任事以能不揆其始而揆其終議論要諸久而後定功效要諸久而後成此先王所以久於任人而不驟遷也考久任之法三代皆世官也至漢文景之後治幾三代宣帝有言民所以安而無怨者政平吏良也與我共此者其惟良二千石乎以為吏數變易則下不安業久於其事則衆服教化其有政理者輙以璽書勉勵増秩賜金或爵至關内侯公卿缺則以次用之漢世循良於兹為盛司馬温公光曰自古得賢之盛莫若唐虞之際然稷降播種益主山林垂為共工龍作納言契敷五教臯陶明刑伯夷典禮后䕫典樂皆各守一官終身不易茍使之更來迭去易地而居未必能盡善也今以羣臣之材固非八人之比乃使之遍居八人之官逺者三年近者數月輙以易去如此而望職事之修功業之成必不可得也元人吳萊云欲富國者必在於養民欲養民者又必在於重郡縣之選嚴守令之職茍重其選將任之以久而可成功茍嚴其職將權有所歸而易集事韓尚書邦竒曰官不久任雖欲言治皆茍而已百弊皆生於不乆任百利皆生於久任非可以言說盡也不必上考古制我髙皇之法三年一考六年二考九年三考然後考功司付文選司因其考語之髙下或平除或陞一級或陞二級間有緊急用人功業顯著者六年以後亦得超陞若不再考而陞者考功必詰之文選何所憑據而知其賢乎𢎞治以前皆遵行之舊事按察司官惟按察使陞布政副僉鮮有陞布政司者惟風力不著之人間以陞之副使李隆陞參政見邸報泣曰我何負於其職而陞此官乎遂致仕去布政司官亦鮮陞按察司者至正徳中止因躁進無恥之士干求權幸而圖速化吏部以其年資尚淺無可柰何或以僉事陞參議或以參議陞副使而祖宗之成法壊矣張文忠居正疏各衙門佐貳官須量其才器之所宜者授之平居則使之講究職業贊佐長官如長官有缺即以佐貳代之不必另索其屬官有諳練政事盡心官守者九年任滿亦照吏部陞授京職髙者即轉本衙門堂上官小九卿堂上官品級相同者不必更相調補各處巡撫官果於地方相宜久者或就彼加秩不必又遷他省布按二司官如參議久者即可陞參政僉事久者即可陞副使不必為小轉之法互遷數易以滋勞擾如此則人有專職事可責成而人才亦不患其缺乏矣巡撫久任周忱在蘇松二十二年王翺在遼東十有一年于謙在河南山西一十八年陳鑑在陜西十餘年宣徳中陜西鞏昌知府孫亶昌黎知縣楊僖俱九年考滿耆老乞留命各加俸二級復任蘇州府知府况鍾吉安知府陳本深兩處部民請留加正三品仍管府事陜西寧州知州劉綱為州守三十二年每考績皆以州民奏留仁宗特賜璽書褒異加四品章服吏部自永樂改元至天順丁丑上能推誠下無逸口盖五十六年僅蹇郭王三尚書耳自𢎞治丙辰至嘉靖辛亥亦五十六年凡易二十八人此後更如傳舍銓部如此他可知矣内閣久任則楊文貞公士竒歴三朝四十三年楊文敏公榮三十五年金文靖公㓜孜二十五年楊文定公溥二十一年陳芳洲循十三年商文毅公輅前後十七年彭文憲公時前後二十年李文達公賢十年劉文穆公吉十九年徐文靖公溥十二年劉文靖公健二十年謝文正公遷十一年李文正公東陽十七年楊文忠公廷和前後十四年費文憲公宏前後十三年張文忠公孚敬八年吏部則蹇忠定公義二十七年輟部事備顧問者八年郭公璡十七年王文端公直十四年王忠肅公翺十八年尹恭簡公旻十四年王端毅公恕先後十餘年九卿則夏忠靖公原吉在戶部二十八年胡忠安公濙在禮部三十二年馬端肅公文升在兵部十三年戴恭簡公珊為左都掌院十二年巡撫則黄忠宣公福在交趾十九年周文襄公忱在蘇松二十二年于肅愍公謙河南山西十八年陳祭酒敬宗在國學二十年况公鍾守蘇州十二年吏部以年髙久任者蹇忠定義在部時七十三王文端直在部時七十八王忠肅翺在部時八十四馬端肅文升在部時八十一黄太宰宗載在部時七十八王端毅恕在部時七十七王太原瓊以七十三再入吏部楊文襄一清起吏部入閣七十六王國光在部時七十一楊海豐巍在部時七十四孫恭介丕揚在部時七十三趙忠毅南星在部時七十五至於以八十為内閣如楊文貞士竒諸人以八十為部堂如儀宗伯智諸人載於王元美集中者不錄也宋人有言曰天將祚其國必祚其國之君子視其君子之衆多如林則知其國之興視其君子之康寧福澤如山如海則知其為太平之象視其君子之摧折頓挫如湍舟如霜木則知其為衰亂之時諒哉宣徳中蹇忠定夏忠靖在部俱將三十年上以其春秋髙尚典劇司非以優老乃令解部事朝夕左右討論治理陞除夫推陞選除銓之大端也司官之條分縷晰者至堂而合挈矣司官之詳稽博採者至堂而施行矣司有難肩之擔堂猶難焉其誰肩之司有難任之怨堂猶難焉又誰任之故髙居端揆之堂者當鑑空衡平因物付物以彰癉還之天道以名器還之朝廷以利害置之度外庶幾福被民生慶延宗社百官所以統四海所以均乎昔趙忠毅在部年踰七十日以懲貪抑競為事嘗曰年老如此不為何待時危如此不救何時此忠之為忠毅之為毅也嗚呼能無念哉國之大僚政事係焉㑹推不可不審也每遇員缺先一日移㑹大九卿掌科掌道集於闕東九卿東西立科道北向立選司致詞推某缺逓一空冊於冡宰冡宰云推某正某陪各畫題而本不列名此舊例也吏科給事中翁憲祥云大僚之有㑹推蓋冡宰不獨受其權博謀以示公若冡宰舉手而聼則所司何事萬歴壬辰内閣張位議㑹推大臣宜令九卿科道各舉所知送之吏部類奏取自上裁孫太宰鑨爭之以為㑹推乃爵人於朝之義官至大臣􅏡歴已久才品已定㑹推之時九卿科道俱在如有不當自宜靣相爭引何必類奏給事中史孟麟疏云如輔臣之言則始以一部之權分而散之於諸司究也以諸司之權合而收之於禁密聼上自裁㫖由閣票内托上意外諉廷推誰執其咎遂罷其議嘉靖中禮部尚書汪俊請告上徑取南兵部侍郎席書補其缺吏部尚書喬宇固爭以為尚書不由㑹推祖宗百餘年所未有請收回成命令俊與書各守職如故人韙之少詹事霍韜既陞詹事辭不拜以新命由内閣推用也因言内閣推官非祖宗制自楊士竒楊榮楊溥及李東陽楊廷和專權植黨籠絡翰林為屬官中書為門吏故翰林遷擢不關吏部而中書至有夤縁迭進六卿及支一品俸者臣嘗建議謂翰林遷擢去留盡屬吏部庶不陰倚内閣為腹心内閣不陰結翰林為朋比萬歴辛卯閣臣員缺例當㑹推上傳趙志臯張位入閣辦事申公時行密薦也陸冡宰光祖執奏曰閣臣例當㑹推兩臣之賢即不負所舉然一聼密薦恐開狥私之門上是之後不為例時王公錫爵曰詞林鱗次有例光祖正色曰宰相非掾史何可例進即請致仕㑹推冡宰嘉靖中尚書聞淵致仕㑹推禮部尚書徐階上曰階方事朕左右如何輙擬外遷乃推戶部尚書夏邦謨萬歴中吏部尚書孫鑨致仕内閣欲推禮部尚書羅萬化時侍郎趙用賢署篆以為不可勲司郎顧憲成云内閣者翰林之結局冡宰者各衙門之結局况論用人大道止當問其孰可内閣孰可冡宰不可問其孰為某衙門論救世大機通冡宰於翰林其勢易通内閣於各衙門其勢難不可不深計也内閣無以奪竟用南太宰陳有年清正時稱得人選法之壊自萬歴甲午置籖始也孫太宰丕揚杜權貴請托之弊行大選掣籖之法一時稱公于文定慎行譏其非體古人見除吏條格却而不視以為一吏足矣柰何衡鑑之地自處於一吏之職而無所秉成亦已陋矣至於人材長短各有所宜員格髙下各有所便地方煩簡各有所合道里逺近各有所凖而以探丸之智為挈瓶之守是掩鏡可以索照而折衡可以懸决也趙忠毅疏掣籖之法自古未有自萬歴年間始用之以示公其初即不能行遂有造籖之法討缺者無不如意御史翟學程之疏至以為可笑良亦無怪其然荀卿曰探籌取鈎所以為公上好曲私則百吏乘是而後偏此假設以見行法之在人也而不意天下之果有此事也似宜變之以復祖宗之舊遂停抽籖之法至天啓末復行人因譏銓部為籖部豐城李太宰裕每當大選先二日於後堂設木牌上書皇天鑒之四字與二侍郎坐定文選司官前立以缺員并選人姓名品第較量筆之於牘至期引奏畢對牘填榜更不移易此吏部原行之法銓之所以為銓也詞林陞用原非一格如都給事夏言為侍講學士左給事司馬恂陞洗馬吕懐改春坊司直給事金幼孜改檢討御史王子沂為左司直徐敬陳灝劉子春周幹韓守善等俱陞中允王大任姜儆陞侍讀學士陳叔綱邵宏譽陞修撰歐陽兼改編修吏部主事李賢唐順之戶主陳淪兵主虞淮陳節之俱改編脩禮主劉球兵主劉鋐陞侍讀工主王一宏改修撰中書舍人芮善姚友直陞洗馬黄淮陞修撰朱孔暘陞編修行人右司副張洪陞修撰蔣驥沈伯咸改檢討茍有真見特疏陞改則用人之端也倪鴻寳元璐考選議考選一事請自吏部先以治行考定科道部司等員其於科道但擬懸銜部司照常銓次具題得㫖則以所定科道人數送閣考選館員自部司而下不得參預凡與試者悉為治行之尤在内閣即可一意衡文不必分心采望其髙下名次以文而定而授官編檢仍凖官評如原擬給事者則授編修原擬御史者則授檢討拔科道之尤為館員既可尊文學於政事之上定編檢之次以部議仍是升器識於文藝之先何良俊言考選科道當於各部署主事中推舉不當徑用新行取諸人以推知取到者分置各部任事後選其有風力者任科道胡氏致堂云祖宗時充臺諫之選者皆天下望士或中外踐更已久無所不知故能有補後世乃以新進為之宜其觀望喋喋而莫可遏也又司馬温公言凡擇言事官當以三事為先第一不愛富貴次則重惜名節次則曉知治體此乃名言洪熙己未諭尚書蹇義御史耳目之官惟老成識治體者可任又曰都御史十三道之表如廉清公正御史雖間有不才亦當畏憚今之不才者無畏憚矣其咨訪可任都御史者趙太宰南星言可以救民者莫過於巡撫而此官甚不易作必徳望威稜能使貪汚解綬而後可耳其次則知府最急知府賢則州縣官不敢害民二者官有大小皆宜選擇破格而用之久任而優擢之可也翰林陞轉論資科論俸道論差吏部論選大約以六選為凖科道吏部年例六年以上陞參政五年以上陞副使四年以上陞參議三年以上陞知府僉事内外陞科每年二人道四人吏部一人科與吏部又有以大計勞陞者御史以兩畿學差滿陞者内外陞原徑從部定移取非例也吏部司官雖論省然亦有不盡拘者如萬歴中吕坤黄克念皆寧陵人而同時司汝霖傅作雨皆江陵人而同時趙忠毅于江西用吳羽文鄒維璉雖人有煩言趙不之顧吏部以觀政進士而即補本部司官者李公賢時郭公璡為太宰見其嘉禾詩曰此臺閣器也即補驗封主事譚公倫觀政時王公翶為太宰一見即曰南人中乃有此誠實之人即補驗封司主事夫吏部方欲破格用天下之才而於本衙門司官顧不當破格乎各部司官外陞皆有定俸九年大參七年憲副五年參議四年知府三年僉憲禮兵二部無知府然隨才酌用地方不拘而萬不可使之鬭㨗躍冶也髙文襄拱署吏部加意郡邑正官尤重邊才疏言邊方有司實兼牧民禦賊之責必擇年力精强才氣超邁者除補或查治有成績兼通武事者調用以三年為率比内地之官加等陞遷有能捍患禦敵以軍功論不次擢用如才畧恢宏可當大用即由此為兵備為巡撫為總督無不可用之者若用之不效無益地方者降二級别用若觀望推諉以致悞事者輕則罷黜重則軍法治罪夫既開功名之路以歆之於先又嚴降罰之條以繩之於後庶脩職者多而邊方有頼直𨽻兵備俱有兼制隣近州縣之責勅書具載至於各省直交界道分如大名山東河南北直與徐州南陽荆州襄陽之類推之有接壤守巡官俱宜選擇而使重其事權假以便宜凡隣制有司給由一體註者庶幾有分土無分吏分民而精貫脉聨方成臂指相使之勢此弭盗撫民最急務也提學一官關係極重俱用風憲官須選品行文章兼優者充之不論資俸每科塲後例有甄别有内轉有平調有議處今欲興士行為國儲真才其法不可廢漢以來重守令守令親民得行其政故當時循良為多雖有刺史部史有繡衣直指之屬間一命之不專以為治也唐世諸道置按察使後改為採訪處置使又改為觀察使其戎旅之地置節度使然每道不過一使臨之而已宋時州郡控制按刺率五六人元時立行中書省設官皆視中書至眀改為布政司今猶稱某省仍元舊也各省布政使二人參政二人參議二人按察使一人副使二人僉事二人又有巡撫統之嵗命御史按之政令紛然守令欲舉其職難矣留心世道者所宜講也内六卿分職守令則六卿之責皆萃焉外三司分職守令則三司之責皆萃焉故非才識不可以漫授非久任不可以責成昔元末任非其人酷刑横歛台温處之民樹旗村落曰天髙皇帝遠民少相公多一日三遍打不反待如何由是黄岩方谷珍因而肇亂江淮紅巾徧四方矣今欲救民水火可不慎擇而久任乎按縣令之制在唐有七等一曰赤京都所治二曰畿京之旁邑三曰望滿四千戶四曰緊三千戶以上五曰上千戶以上六曰中不滿千戶七曰下五百戶以下凡注為令總治民政勸課農桑與戶口賦役錢糧賑濟給納之事皆掌之有孝弟行義聞於鄉閭者申州激勸以勵風俗有戍兵則兼兵馬都監或監押其職守若是宋詔縣令以十二事遵行一曰敦本業二曰興地利三曰戒游手四曰謹時候五曰戒茍簡六曰厚蓄積七曰備水旱八曰戒宰牛九曰置農器十曰廣栽植十一曰恤田戶十二曰無妄訟而以勸課農桑總之冡宰王恕在部中有青州府益都縣新進士石存禮年二十二嵗應選知縣乃改選行人題曰竊惟知縣乃一縣之主百責所萃生民休戚係焉今石存禮年方二十二嵗氣質清秀形體孱弱若除授知縣使之宰百里之地居羣僚之上督率衆職分理庶務加以送徃迎來承上接下勞苦百端恐不能堪㸔得行人司行人亦係三甲進士該除官員其職最簡而無勞事故將石存禮仍送該衙門辦事候有行人員缺另行除授行人使本官讀書進學日省月修待其考成然後授以任事之職斯可責其成績給事中楊允繩言古者立郡縣之等眀銓序之品所以人與地相適今宜劑量政務煩簡地方邊腹道里衝僻列三等為銓除中有請托規避者痛加裁抑至於履任後人才地方或未相宜又有出於銓擬所不及者令撫按官奏報改調則人才各適於用銓擬漸趨於平矣髙文襄疏國家用人不得官於本省惟有民社之寄者則然耳若夫學倉驛逓閘􅄵等官其官甚卑其家甚貧一授逺地或棄官不能赴或去任不能歸零丁萬狀其情可矜宜照教官例酌量隔府近地銓補國學例於三九月陞轉博士助教皆從八品學正正九品學錄從九品部院寺司務亦從九品是司㕔之缺惟正錄可轉而徃徃品髙者越之越一人遂致乆候不均不平宜令選司立畫一之規可也宣徳中方面官俱令在京五品以上保舉初行甚善既久弊生景泰初王冢宰直力言其非仍還之部用時李文達賢為選司令將六部郎註年深者第其才之髙下為一帖御史為一帖給事中為一帖方面有缺持此帖斟酌用之將盡復増之既用而人不知奔競之風頓息初行内閣不悦既服其公范公景文典選時上疏今天下仕路舉國如狂嗜進如騖毋亦衡鑒之地先自不清而欲其恬漠寡營詎可得乎竊念除者有嵗格其久近不得而私也遷者有資勞其深淺不得而私也特擢者有績望其髙下不得而私也今與需次諸臣約一行請託臣不能為之諱又與同事諸臣約一聼請託亦願諸臣勿為臣等諱以天地人材為天地惜之朝廷名器為朝廷守之天下萬世是非公論與天下萬世共之人還其人我無失我此臣心可自信者范公此疏可為吏部銘吏部有用人㨗法無如進士觀政久之人視為故事矣進士分試九卿衙門觀政堂長司僚與之朝夕而試之視其人端邪能否若燭照而數計之於是㑹其實以上於天官天官籍准以為銓注文學政事風節慈愷隨所成以授其任任則必久而不數更是以無不可用之才無不可知之人此易簡之道先朝所以得人為盛昔李賢觀政吏部郭太宰璡見而器之題授稽勲主事由郎署而少宰而太宰始終在銓卒成賢相此知而用之之明效也萬歴二年吏部題辦事進士不許借差引疾如有疾者准令在京調理三月不痊掌印官方與具題仍申諭各官躬儉用以省費忍嗜慾以保身習律令以通政務服勤勞以圖報效得㫖詐病托故推奸避事的部科即便紏奏照例罷職不叙其狥情題覆朦朧結勘一體治罪其嚴如此余於辛未觀政戶部司農畢公屢委查兑錢糧同年諸人觀政刑部者皆理部事上本列名考課夫取人之途欲寛不寛則野有遺賢也課官之法欲嚴不嚴則朝無實政也取而仕之任而課之亦賢者所樂見其長也聖王豈有姑息之政哉明試以功車服以庸舍明試别無車服之道矣故周禮日有成焉月有要焉嵗有㑹焉不厭詳焉明興考課之制逺法唐虞近酌列代最為有法至江陵相柄國大加振刷益赫然可觀迨其顛躓時且以覆轍鑑之矣人務因循事趨簡便内外大計止據各衙門開報聊一舉行而三年報滿槩加褒奬以為封典之地已耳何怪乎人競傳舍其官而事功日見其隳也百官考課之法皆以三年為一考六年再考九年通考始行黜陟之典是則舜典三載考績三考黜陟幽明之制也官滿者則造為牌冊備書其在任行事功績屬則先考於其長書其最目轉送御史考核焉亦書其最目至是考功稽其功狀書其殿最凡有三等一曰稱二曰平常三曰不稱既書之引奏取㫖令復職六年再考亦如之九年通考乃通計前二考之所書者以定其升降之等其立法之簡而要詳而盡漢唐以來所未有也按漢郡守辟除令長得自課刺史得課郡國守相而丞相御史得雜考郡國之計畫天子則受丞相之要唐法百司之長嵗較其屬善最集於尚書省唱第然後奏宋法有審官院考課院京朝官引對磨勘非有勞績不許進秩明之以御史考核即漢宣命御史考殿最也書以考語即唐人第其善最也稽其牌冊引以奏對即宋人之引對磨勘也九年之内二考稱職一考平常從稱職二考稱職一考不稱職或二考平常一考稱職或稱職平常不稱職各一考者俱從平常二考平常一考不稱職從不稱職其陞降又論地方繁簡京官俱以繁論京官有首領者得稱堂上考滿得單引不出考語其餘如庶子諭徳等皆出考語又給事中除職事相等得前後通考御史外除則不得通考有司官考滿至部如戶口不増者送問清軍得三分以上者得陞其餘雖錢糧未完不在問例王端毅恕於𢎞治三年奏言考課之法廢格不行甚非政體今後考滿官俱令給由赴部照例考覈故當時政治精明中外恬熙及王瓊為太宰乃言四方之逺一官赴京考滿徃回勞費且誤公務許令本處考覈方面官有巡撫巡按開報考語亦令就任復職待朝覲定黜陟於是成法盡壊而政體日偷初制閣部大臣考滿多有不能還職者如鄭曉今言載内閣胡儼以考滿出為祭酒故永樂五年十一月諭蹇太宰義曰胡廣等侍朕日久繼今考滿勿改外任嘉靖五年吏部奏請凡府州縣官治績卓異者各撫按以聞令其加俸管事俟九年滿不次陞遷報可洪武十七年九月以懐慶府通判戴莊湖廣都司斷事髙翼靜寧州判官元善俱為右僉都御史東昌府教授馮叡為左贊善皆以秩滿考績課最故超擢之洪熙元年思州府通判檀凱九年考滿當陞其民詣闕言凱愷悌乞留復任加正五品俸以優之韓尚書邦竒曰古人九載黜陟幽明今制三年考察其法已密在外撫按事竣復有旌劾是又不時考察矣其所劾固有貪殘之輩中間或小過或詿誤或譖謗或語言不合趨承未至以致黜退我國家以科目取士中其選者皆俊乂之器才識不大相逺但習與不習耳習之於累年棄之於一旦以壯年有用之才終身閑廢深可惜也邱文莊濬曰本朝三年一朝覲天下司府州縣各齎須知文冊來朝六部都察院行查及所行事件有未完者當廷合奏以行黜陟近因選調積滯設法疏通輙憑巡按御史開具掲帖不復稽其實跡立為老疾罷軟貪酷素行不謹等名以黜之大非祖宗初意按舊制官員給由到部考得平常及不稱職者亦皆復任必待九年三考然後黜降其有緣事降職除名亦許伸理其愛惜人才而不輕棄絶如此彼何人哉立為此等名目加以空文何以厭服其心乎鄒忠介元標疏臣查先朝以陸容之賢能為人甘心至今載之埜史以為寃抑邇者一錮顔鯨再錮胡桂芳萬廷言三錮管志道譚者皆為諸臣寃臣竊以為奪一時浮榮與萬世清議諸臣得專心并精不朽之業視之浮榮猶一吷也是所奪諸臣隘所與諸臣奢何所不樂故近為國體傷逺為國史玷以黜幽宏典開報復私竇正人君子心竊憂之臣愚謂京察年分不必分單咨訪許部院各寺紏覈各屬以備考察如撫按紏方面例翰林屬之掌院六科屬之掌科倘紏覈不當他日公論既明重則削職輕則不與葬祭夫彼既已宦成猶不為國惜才使好修之夫屈首蓬藋足以干天和召戾氣即重懲不為過也法嚴則人心肅彼雖求一時之諧衆口不能不憚他日之拂公論矣且與其隂開冊送部院不若明上疏君父之前使疏而果當其罪是與衆共棄之也光明正大之典願力行之胡端敏世寧上疏臣先為南少宰署事察吏五人陳璜朱應昌陳則清陳榮喬祺當黜稍令外除今細詢之五人者俱能其職且素賢臣前事已過乞復之五人卒得復徐文貞常言王三原為太宰大計疏上孝宗㸃留九十員自方伯至尉三原執之力或曰此皆廉吏上使人察得之者三原乃使親信於近畿州邑訪數人果皆不染脂膏遂不復執以此服孝宗不惟仁厚大度而英睿精綜使人不欺如此當時内侍亦皆謹飭無敢饕肆其治象可想見也端敏不執已遂過誠有古大臣風天順八年令考察誣妄者科道官指實劾奏南京者則責南京科道官嘉靖六年令朝覲官有考退者果執法被誣奪職許大臣言官即時論辯舊時立意公慎如此後乃嚴禁則寃抑者多矣吏部以考成為飭吏自崇禎朝始按萬歴中吏部因戶部叅罰徴賦不及格官貟當降調乃疏言地方有素稱難處各官恐其為累亦有願離地方以别就功名者於是政拙催科心甘降調則本以示懲適遂私計若乃前官積逋數多後官所徴止作前數而見年之額反稱逋負俱非事理所安此後宜以見年為正徴當年既完以前負為帶徴陸續補足總計分數若干議定降格其當降者止降一級仍在地方視事俟完足之日復原官復官之日始計俸考秩行取陞遷至於地方凋敝殊甚雖盡力催徴而亦不能完者當令撫按官覈實定限許其從容徴補如資俸已深限期未滿而額有半完者亦得陞遷行取上從之按正徴帶徴之法余於崇禎辛未初為令猶行之至丁丑候考在京見一切錢糧俱入考成縣令即有賢如龔黄亦無所用之矣而國之亡實在於此羅太宰欽順吏部題名記建官之法源於􅃉古至周而益備以善三公論道三孤𢎞化六卿分職取法於天地四時而天官卿實掌邦治天官雖與五官並列然五官之得人與否亦必由之故其責任尤重傳所謂天子之相是以周家治化之盛歴年之久前後鮮及雖由文武成康賢聖繼作抑豈非建官有體職分勢一相與左右維持之效哉嬴秦事不師古亦既罔終由漢以來規制率相沿襲未有能卓然盡復周官之舊者其治效之不古若無足怪也我太祖髙皇帝以天縱之聖開萬世之基制治保邦一惟有周是式乃洪武十三年斷然罷革中書天下大政悉以分屬六部而升崇其品秩於是尚書秩正二品左右侍郎秩正三品凡中外百官封拜考課黜陟之事吏部掌之列聖相承凡用為吏部者恒極一時之選而冡宰之蒙簡命禮數特異若夫勲勞茂著則三孤是加及其卒也徃徃三公是贈申之以易名之典任之專待之厚而其人所建立光明碩大亦班班可數治隆化洽端有頼焉雖嘗驟值權姦僭作威福若無所容其力者徒以體統素正品式具存猶得慎守堅持黙捄潛扶以需大來之慶夫然後有以知我聖祖之稽古建官慮周萬世而收其效於近日者亦云偉矣今天子初即位首用趙郡石公為吏部尚書俄入掌絲綸亟召太子太保南京兵部尚書太原喬公為之代至則修明紀法舉措惟允孜孜夙夜以翼維興運與石公先後一心朝野欣欣以為太平可嵗月冀矣公視事稍暇日考求前人名跡以為尚友之資已而得大司徒九峯孫公所集兩京吏部題名錄參互考訂乃戒工礱石次第書而刻之將樹於部之後堂以表交承存法戒焉惟吏部之稱於北京始自永樂辛丑迄今嘉靖壬午凡百有二年中間十六七年雖仍以行在吏部稱然大政所出固無改也故今題名之刻斷自永樂辛丑始卿佐凡七十五人其在南京及辛丑以前之行部皆不與焉後來者可得而續書也刻垂畢欽順適承乏南銓公遂以記文見屬顧惟不敏再三辭避而公不余釋也乃勉書其顛末如此若其人孰為可法孰為可戒觀者當自得之要豈出於公私義利兩言之外哉是為記丁尚寳元薦萬歴辛亥京察記事序今皇上御極四十有二年大察京朝官者七其一以星變閏察前後主計者太宰稱孫清簡鑨御史大夫稱辛襄城自修温三原純南太宰稱李肅敏世達曾吉水同亨御史大夫稱海忠介瑞陳恭介有年少宰稱楊上饒時喬副院稱陳莊靖瓚功郎稱趙髙邑南星諸計大不平於輿論者丁丑辛巳所甚快曰癸巳次丁亥次乙巳丁亥借拾遺大僚譁襄城去矣癸巳借拾遺庶僚譁髙邑逐清簡行矣乙巳借楚事妖書譁三原上饒岌岌乎不免矣是明為羣小報復也顧稽勲憲成王比部徳新發憤於丁亥陳秀水泰來張義興納陛賈滁陽巖顧梁谿允成薛毘陵敷教于金沙孔兼發憤於癸巳陳給事嘉訓劉車駕元珍龎武庫時雍發憤於乙巳諸君子至今有一人挂仕籍者乎盖姦人巧於簸弄敢於亡忌憚手滑者三十年矣雖然此標也綱紀不肅則倖門啓清議不重則四維裂君子齗齗苦口為國扶元氣非求勝於小人也説者曰激而兩敗不若劑之以平夫君子還之以君子小人還之以小人天下之至平也畫一於令甲而清議為權輿舍此非遷就閣臣即左右􅃝於臺省前却於門戶者又一門戶也避門戶者巧而逃之無非無是勢不得不混混之為弊也微獨紫可亂朱抑使荃化為茅於是乎主計者之責綦重且艱風波日滋險嗟乎三原王恕之齮於邱文莊濬也鈞陽馬文升之脅於王蓋吳蕣也孝廟時已作之俑寧論今日哉一則自捄一則藉口劉文泰猶可解者若乃鐵冠薦繡秉憲一堂忽焉首䑕成事開翻局之端自辛亥始也乗釡鬵之機糾衡决之衆陰搆陽煽撼必去之太宰怵攢眉愬苦之閣臣主之者二三人而噂􅊱於臺省又自辛亥始也時有刻京察記事者覈之疏掲不能半其人亦多不安於心故有所諱與譬若訟然兩造紛列立堂上者虚平叅互是非不鉤索定矣又豈以衆寡强弱分勝負哉予故仍原本蒐遺漏若干系以萬歴辛亥論其世也時南計則史晉江為政婁江四明崑宣諸黨拊掌稱二十年快事嗟乎此又富平之幸與鄒忠介元標銓曹紀要序憶余為郎猶得事楊海豐宋商􅉌楊博大有容啓事頗多商􅉌精勁而以瘁薨其後如孫清簡陳恭介陸莊簡蔡奉新孫富平楊端㓗皆世推鼎吕然上饒當相臣去就未定故得優游在事餘皆不得安其位黙黙去獨孫富平疏鳴不平上卒鑒其忠再召之然竟不得志去冡卿者各司之表各司者冡卿之幹幹强則表榮表端則幹直聨絡一體相為榮悴冡卿既不安其位何有各司諸君子柰何不逐不老且死也昔三楊在事西昌冡卿十八年歸老澄江猶賦詩有未竟用之歎使其覩今日蒼松翠栢亂落深箐明珠碎璧擲棄道旁感歎不知何似又使起西昌鹽城三原而在今日挽回又不知何似余不無遐思焉余又惟銓政固有摧之者亦自摧也世法無常我有常無常者變有常者卒不變使人各守其常可生可死何有一官庶幾澄清而有日矣附載崇禎七年甲戌八月二十一日上御平臺召内閣九卿科道及翰林院等官令各舉堪任吏部尚書者閣臣温體仁奏臣等先舉恐諸臣觀望俟諸臣舉後方舉所知吏科盧兆龍等亦奏科道例不薦舉只舉有不當的方行糾劾西班定國公徐允楨等奏臣等例不與推文官上令各舉所知也好遂令内璫授紙筆令書名於是西班先舉原任吏部尚書王永光南吏部尚書謝陞兵部尚書張鳳翼戎政尚書陸完學刑部尚書胡應台而吏部左侍郎張㨗舉南都御史唐世濟原任尚書吕純如右侍郎賀逢聖舉其鄉胡應台戶部尚書侯恂舉南戶部尚書鄭三俊禮部尚書李庚先舉侯恂右侍郎陳子壯舉其師内閣大學士王應熊欲如髙拱故事衆哂之兵部尚書張鳳翼舉侯恂刑部尚書胡應台舉其鄉原任尚書陳所學工部尚書周士樸舉其師左都御史張延登戶兵刑工各侍郎俱舉其部尚書都察院左副都御史田惟嘉舉胡應台左僉都御史帥衆亦舉應台及其鄉原任侍郎李邦華大理寺卿朱大啓舉謝陞唐世濟左右少卿李日宣鍾炌共舉侯恂胡應台鄭三俊及其鄉南工部尚書劉定國左寺丞李懋芳舉其鄉原任尚書商周祚原任府尹劉宗周通政司通政使楊建烈舉侯恂左通政吳甡舉鄭三俊翰林院掌院詹事吳士元舉胡應台既畢於是大學士温體仁錢士升同舉謝陞大學士王應熊舉唐世濟大學士何吾騶舉侯恂上曰在北各官現有職掌不必推因詢謝陞唐世濟何如人輔臣各有奏對次及呂純如上曰純如係逆案中人且問科道如何說於是吏科盧兆龍首紏而工科孫晉兵科蔣徳峻繼之御史金光宸韓一元繼之獨掌河南道御史羅元賔黙無一語而張㨗力薦純如至云用純如不效願同罪上曰既是逆案中人不用也罷復以次詢陳所學商周祚諸人已復令九卿各舉侍郎一人而退是役也上鄭重太宰之選廣咨精擇曠古一遇然數日前舊宰李長庚方逐即有言温體仁欲用謝陞唐世濟者及召對時㨗首舉世濟大理卿朱大啓為温同鄉所舉謝陞唐世濟迎合其意而二十三日上特召陞世濟之命下矣既而謝陞入吏部與體仁合力以逐文震孟唐世濟為都察院薦霍維華遣戍春明夢餘錄卷三十四
