body:
  text: 春明夢餘錄卷三吏部左侍郎孫承澤撰城池舊幽州城在今城西南唐藩鎭城即遼金故城也隋之天寧寺舊在城中今在城外矣憫忠寺有舍利記唐景福元年建其文曰大燕城内地東南隅有憫忠寺門臨康衢憫忠寺舊在城中東南今在城外西南僻境矣銅馬門在舊燕城東南隅即古薊城門城有十門此其一也昔慕容雋得竒馬名赭白歴三世四十九歳而駿逸不減銅範其像立門外因以名門唐武徳六年遷營州於薊樓館甚盛今二土阜尚存所謂薊門也閭城在京西南古城基二石獸尚存陽鄉城在京西南漢舊縣晉改長鄉今地名古縣君子城即舊薊城晉載記石勒每破一城必簡别衣冠洎平幽州擢荀綽裴憲等居之號君子城遼太宗於南京建城方三十六里崇三丈衡廣一丈五尺敵樓戰櫓具八門東曰安東迎春南曰開陽丹鳳西曰顯西清普北曰通天拱辰金海陵天徳二年命張洪等增廣燕城門十三東曰施仁宣曜陽春南曰景風豐宜端禮西曰麗澤顥華彰義北曰㑹城通元崇智光泰元人玉堂嘉話云燕展築南城係金海陵天徳二年見蔡無可大覺寺碑史記不載蕭何修未央宫事此非細事司馬遷漢史而不見書何謂又云燕城西南門曰端禮有大定末劉無黨所撰左丞相唐括安禮碑元至元四年城京師城方六十里里二百四十步分十一門正南曰麗正右曰順承左曰文明北之東曰安貞北之西曰健徳正東曰崇仁東之右曰齊化東之左曰光熙正西曰和義西之右曰肅清西之左曰平則按元之南城周圍五千三百二十八丈即金之故基也金之遺址尚在所謂土城關是也人呼崇文門爲海岱宣武門爲順承阜成門爲平則仍元之舊也明洪武元年戊申八月庚午徐中山達取元都丁丑命指揮華雲龍經理故元都新築城垣南北取徑直東西長一千八百九十丈高三丈五尺五寸至永樂十八年遣營繕司郎中蔡信爲工部右侍郎重修益加宏壯正統四年命内臣阮安重修安交趾人一名阿留刻有營建紀至十年又以内面用土恐易頽毁乃命成國公朱勇等甓之與外面等凡九門南曰正陽南之左曰崇文右曰宣武北之東曰安定西曰徳勝東之北曰東直南曰朝陽西之北曰西直南曰阜成嘉靖三十二年十月京師外城成先二十一年七月邊報日至御史焦璉等請修關廂墩塹以固防守都御史毛伯溫等復言古者有城必有郭城以衛民郭以衛城常也若城外居民尚多則有重城凡重地皆然京師尤重太祖定鼎金陵旣建内城復設羅城於外成祖遷都金臺當時内城足居所以外城未立今城外之民殆倍城中宜築外城包絡旣廣控制更雄且郊壇盡收其中不勝大幸從之下戸工二部議覆以給事中劉養直言時當匱乏諫止至二十九年兵事益急議築正陽崇文宣武三關廂外城不果三十二年三月給事中朱伯宸復申其説謂臣嘗履行四郊咸有土城故址環繞如規周可百二十餘里若仍其舊貫增卑培薄補缺續斷事半功倍良爲便計通政使趙文華亦以爲言上問嚴嵩嵩力贊之因命平江伯陳圭等並欽天監官同閣臣相度形勢擇日興工上是之然慮工費浩大成功不易屢以問嵩等嵩等請自至工所視之隨上手劄言臣等今日出視城工時方修築正南一面自東及西延長二十餘里詢之各官云前此難左築基必深取實地有深至五六尺七八尺者今築基皆已出土面其板築土有纔起一二板者有築至四五板者其一最高至十一板蓋地有高低培墊有深淺取土有近遠故工有難易大抵上板以後漸見效矣上曰城工必果持久方可但土質恐未堅或且先作南面待財力都裕之時再因地計度以成四周之制可同圭詳計之於是嵩㑹圭遵上旨議將見築正南一面城基東折轉北接城東南角西折轉北接城西南角併力堅築刻期完報其東西北三面候再計度以聞上允之于是年十月工完計長二十八里命正陽外門名永定崇文外門名左安宣武外門名右安大通橋門名廣渠彰義街門名廣寧内外兩城計垜口二萬零七百七十二垜下砲眼共一萬二千六百有二劉定之游梁園記梁氏園在今京師西南五六里其外有舊城舊城者唐藩鎭遼金别都之城也元遷都稍東于是舊城東半遂入于朝市間全無跡可見而西半猶存號爲蕭太后城即梁氏園所在也蕭太后者遼后皆以蕭爲姓有子爲帝則太后别居宫城統部屬故其亡也末帝淳之妻猶得獨存稱太后以主其國踰年乃滅也或謂此雖遼金都城而非唐藩鎭城不然也唐時此爲范陽藩鎭安史反後改名盧龍而所治幽州薊縣不改今移薊以名州移盧龍以名衞各去此數百里其實唐之盧龍與薊在此也烏得非唐藩鎭舊城乎遼金不因藩鎭以爲都而曷因乎其城僅存土而甓皆爲人取去今取猶未已其土皆眞黄土人取之和煤亦猶有即之作墓者以其高堅也城河其源出昌平州白浮村神山泉通榆河㑹一畝馬眼諸泉滙爲七里門東流環遶都城曰玉河由大通橋而下至通州髙麗莊入白河與盧溝河合長一百六十餘里元都水監郭守敬所鑿賜名通惠河又名大通河即潞河也又西山玉泉從水關經越橋俗謂銀錠橋流入西苑遶宫禁自玉河橋出入城河合流至大通橋入漕玉河橋凡三一跨長安東街一跨文徳坊街一近城垣崇禎己卯二月内監曹化淳議京城外開河以通漕糧自是年三月十九日起至辛巳六月所開河自土城廣渠門起至大通橋運糧河北岸挑河長三千八百六十二丈又東直門外關帝廟挑月河長二百七十丈鬭虎營至關帝廟大石橋挑河長三千一百五十一丈命内監于躍爲河工總理而以兵部司官輪督班軍共用班軍二百三萬二千餘名五城兩縣募夫二萬九百餘名兵部侍郎呉甡視工以爲勞費無益且傷地脉抗疏止之尚有一萬三千五百丈未完總理者侵冐不貲而震巽方之地勢大傷矣南城三里河元時運河名文明河在天地壇前去通州五十里地形髙通州六丈九尺置二閘可行舟今鐵閘尚存南城外有減水河與天壇後河相通又城之東南有兩水磨永樂九年工部尚書呉中奏請修治海子在府西三里舊名積水潭聚西北諸泉流入都城而滙於此南海子在京城南二十里舊爲下馬飛放泊内有按鷹臺永樂十二年增廣其地周圍凡一萬八千六百六十丈乃育養禽獸種植蔬果之所中有海子大小凡三其水四時不竭汪洋若海以禁城北有海子故别名曰南海子楊士竒都城勝覽云正統四年重作北京城之九門成崇臺傑宇巋巍𢎞壯環城之池旣浚旣築堤堅水深澄潔如鏡煥然一新耆耋聚觀忻悦嗟嘆以爲前所未有蓋京都之偉望萬年之盛致也於是少師建安楊公少保南郡楊公偕學士諸公以暇日登正陽門之樓而縱覽焉髙山長川之環固平原廣甸之衍迤泰壇清廟之崇嚴宫闕樓觀之壯麗官府居民之鱗次㕓市衢道之棋布朝覲㑹同之麇至車騎往來之坌集粲然明雲霞滃然含烟霧四顧畢得之而胸次軒豁趣與景㑹樂哉游也南郡公有詩諸公皆倚和之綴輯成卷是時僕以賜吿南歸不及與游旣獲覩羣什而歆艶焉皆所謂登髙能賦之大夫也諷詠之餘因慨嘆凡事之成各有其時太宗皇帝肇建北京旣立郊廟宫殿將及城池會有事未暇及也已而國家屢有事久未暇及皇上嗣大位之五年仁恩覃霈海宇乂寧始及於斯而不日成之豈非得其時者乎夫得其時而不得其人猶未也蓋嘗聞命下之初工部侍郎蔡信颺言於衆曰役大非徵十八萬不可材木諸費稱是上遂命太監阮安董其役取京師聚操之卒萬餘停操而用之厚其旣廪均其勞逸材木諸費一出公府之所有有司不預百姓不知而歳中吿成蓋一出安之忠于奉公勤于恤下且善爲畫也謂事之成非繇於人乎嗟夫一事之成猶必得人則於爲國家天下之重且大不可推見乎詞臣張四維京師新建外城記皇上臨御之三十二年廷臣有請築京師外城者參之僉論靡有異同天子廼命重臣相視原隰量度廣袤計工定賦較程刻日於是京兆授徒司徒計賦司馬獻旅司空鳩役總以勲臣察以臺諫與夫百司庶職罔不祇嚴廼遂畫地分工授規作則制緣舊址土取沃壤寮藩輸鏹以贊工庶民子來而趨事曾未閲嵗而大工吿成崇卑有度􅇤厚有級繚以深隍覆以磚埴門墉矗立櫓樓相望巍乎煥矣帝居之壯觀也夫易垂設險守國之文詩有未雨桑土之訓帝王城郭之制豈以勞民所以固圉宅師尊宸極而消姦伺者也國家自文皇帝奠鼎燕畿南面海内文經武緯細大畢張而外城未建者非忘也都城足以域民而外無闤闠邊氛時有報急而征馬未息故有待於我皇上之纘緒而覲揚之耳夫以下邑僻陬即有百家之聚莫不團練垣塞守望相保况夫京師天下根本四方輻輳皇仁涵育生齒滋繁阡陌綺陳比廬溢郭而略無藩籬之限豈所以鞏固皇圖永安蒸庶者哉故議者酌時勢之宜度民情之便咸謂外城當建夫亦思患豫防順時之道當然耳昔宋中葉武備弛矣而汴京平衍又非形勝之區其謀臣范仲淹議洛陽之城非可後者乃不見用我國家方當全盛將帥如雲重關外峙而控山帶海又非汴京者比外城之緩急可知也我皇上一聞廷臣之議即命共工建兹丕業是豈羣臣之見越於仲淹實我皇上軫念民瘼憂厪國體其視宋君之忽於忠計者萬萬不侔也以隆王者居重之威以奠下民安土之樂以絶姦宄覬覦之念豐芑貽謀苞桑定業不亦永世滋大也哉嗚呼此固聖人因時之政不得不然者耳要我皇上之心固將率土爲城寰海爲池怙冐八荒而無此疆彼界者豈一外城之建能爲限量者哉臣謹記孫承宗重修都重二城碑記維文皇奠鼎燕畿以建都城扼吭拊背維萬世之安我世宗肅皇帝念生齒滋繁比廬溢郭重毖庚戌之役詔從侍郎臣邦瑞議築外郛于三門凡以固圉宅師尊宸極消姦萌也今皇帝甲辰夏恒雨壞民廬舍無算城有圯於是秋七月朔工部尚書臣某以災異上聞若曰天不忘根本肆不輯於兩城而釁於雨夫衆心爲城外頽中陷是且有土崩之象將無彌縫其闕而固吾圉也其何變之能圖蓋時報圯者方三百丈未甚也又旬日雨溢渠計圯都城且七百七十七丈有竒重城亦三百三十丈有竒而埤堄亭舍不與於是臣某再以數上聞若曰災不可玩備不可弛玩災弛備不可以寧是時皇上方以帑金十萬理民廬舍疏入不即問乃臣某再以修葺上聞若曰刻期我惟築無寧狥故常而不慮事以授豈其不秋防是虞若猶是枕篆而不以聞也則少不逞即剟戸而逸者四走無際它其誰捍禦之其若掌故何定鼎來是墉是壑有基勿壞方今千丈之瑕秋防之候即三旬而成尚虞窺予况其平板幹稱畚築非卒辦也而繕司困憊曾餱糧之不具則登登之築無寧泄泄也於是天子下其議停一切小修若曰上天示儆恒雨壞垣尚亟修之固我保障毋怠無玩乃以繕部郎中臣某同員外郎臣某實專料理而科臣某臺臣某實專巡察時以行築者飭其不勉者蓋以八月趨事明年某月吿成功曰發丁男若干金錢若干天子重念勞人陞賞各有差且詔臣某爲之記臣以爲城以盛民也我皇上先民居而後兩城其以鞏皇圖綏蒸庶意深遠矣然威靈遐鬯荒裔率服方且極覆爲城極載爲池豈其介在藩籬是豐芑之謀不藉爲大耳不然百家之聚尚勤藩垣豈其根本天下而不以備然臣竊有警也昔我肅皇帝建永定外郛而難其守臣謂守在城郭者危守在四夷者安守在民力者疎守在民心者密今天下浚膏實之而罷力築之則民不堪暵溢災之而築鑿苦之則天且若甚忍於民夫民不堪將生心而天不忍或其未忘也我皇上惕于生心而幸是未忘必且以祖宗之徳澤維法度而上爲百姓守法下且爲朝廷守國頃所爲愼重而不輕用民意在斯乎夫愼重而不輕用民先王之所以爲天下也臣謹稽首頓首而爲之言銘曰皇明御宇奄有萬方燕畿奠鼎拊背扼吭文經武緯細大畢張是憑是式繫于苞桑泰有茹彚城有復隍天子曰吁其固我防乃度廣袤乃察相翔司徒計賦乃芻乃粻司馬獻旅乃穀乃揚司空鳩役乃飭乃奬萬臿雷奮萬雉雲長悦以忘勞迄可大康天子曰都惟爾衆襄詞臣載筆俊蹟用章小臣稽首曰惟帝光匪城不易惟守未遑過城則傾恃城則亡於鑠帝賚比於金湯惟帝念功無怠無荒億萬斯年民悦無疆魏大中濬濠疏邇自瀋遼潰陷京都震聳仰厪聖慮嚴諭濬濠刻期畢事維時工部尚書王佐侍郎王永光姚思仁劄屬何玉成等畫地分任自東便門始而科臣霍守典臺臣蘇述先事而司監察之役迄臣大中臣文龍代受巡閱而玉成等先後報竣曁磨算有成數矣而臣時榮復與臣文龍代夫以一百五十萬八百一十九名計匠以一千二百八十九名計班軍積日以三萬三千一十二名計費水衡金錢六萬一千六百二十八兩九錢一分四釐八毫七絲五忽司農銀一千七百三十三兩一錢三分米三千三百一石二斗諸椿木灰磚繩斗百物及運價咸具而鍁鐝不與焉鍁鐝以歸監督盔甲厰主事沈棨收爲甲械之需而後受直于官否者不敢以冐此一役也工有詳畧費有多寡而時有後先土有􅏫濕天有晴雨餼給有遲蚤勢亦與爲難易焉易者以程工行其節用難者以惠使鼓其子來要無不拮据瘏痡於暑雨之中而臣等今日藉手而吿成於皇上者也其有未盡者邊烽吿急經始倥偬而濠之源未求也源出玉泉山而佃農分以爲灌漑豪右壅以爲園池其波及於濠者恃其餘也濠之勢未審也水自髙梁橋抵都城西北而泒爲二一循城之左而東而南一循城之右而南而東宜接舊閘爲地形之髙下而次第布之未可以丈尺槩也而分界任官各營其目前之咫尺於全濠灌輸深淺之宜容有未協者矣更都城尠水獨徳勝門而西濠水南奔入關迤衍沿洄周行大内以出玉河而今且北淤而南涸也則其脈未疏也濠之支亦未達也嘉靖庚戌築重城以爲附則濠之深廣宜凖都城而地勢旣髙有掘未及泉而止者更廬井安堵而一旦議恢其故不無遷析之虞且班軍非可以水部之官督也異日者國有暇時庫有餘積大司空董其屬以治濠清其源審其勢疏其脈達其支而總滙於大通橋大通而下又理葺諸閘以妙節宣蓄洩之宜而後濠有全功也以壯金湯亦以固風氣也若其源壅而不輸其流瀉而不收雖濬奚益矣然此時就濠而論濠也非所論于天子之守也臣等以與有監察之責諸有事於濠者各以其文移㑹謹綴其總數開具以聞而幷及之如此崇禎十二年四月給事中夏尚絅請停河工疏京城創自成祖皇帝建都經野從來未有之勝使河須再求深廣則當年物力極盛之時必先爲之嘉靖庚戌之役始增外樓七座臣愚以爲益其上者有崇墉之固故世宗皇帝毅然爲之而有餘浚其下者不無穿鑿之煩故列聖仍之而不改至于地脉來龍關係尤重桑麻廬舍毁損非少昔春秋書莒潰明城惡者棄險之非也書浚洙明勞民者非固本之道也若不察戸口殷耗歲時豐歉而遽勤民興作使濬之而河流通猶慮所損已多矧又河髙流淺盈涸不時斥土粗疎旋淤旋壅究無當于險阻之用乎臣愚謂商理財之道于今日議生必不如議節而節之最大而最得已者莫如此河工商防患之道於今日地利不如人和而地之不足爲利徒以疲民耗財者亦莫如此河工疏上不納以操其議者大璫也春明夢餘錄卷三
