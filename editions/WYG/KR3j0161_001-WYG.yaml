body:
  text: 春眀夢餘録卷一吏部左侍郎孫承澤撰建置昔黄帝建都於涿鹿卽京師地史稱帝都涿鹿之阿往來遷徙以兵爲營衞蓋燕地在漢以前通名爲涿至漢髙帝六年始分燕置涿郡水經注引應劭云涿水出上谷涿鹿縣按涿水自涿鹿東注濕水濕水東南逕廣陽郡與涿郡分水涿郡受其稱矣今保安州西南九十里有涿鹿山黄帝破􅃖尤於此州東南四十里有軒轅城堯建都於冀燕冀地也古者中國之地分爲九州大河以北爲冀堯都平陽此其甸服也及舜卽位以冀地太廣始分冀東恒山之地爲幷州東北醫無閭之地爲幽州又分遼東等處爲營州皆冀也漢末曹操領冀州牧又統名爲冀昌平有漢人張純碑稱冀州從事循古稱也周禮職方東北曰幽州釋名曰在北幽昧之地故曰幽也又曰燕之爲言燕也其氣内盛而燕宛也爾雅曰兩河間曰冀又冀近也周封召公奭於燕封堯之後於薊史記注云薊今涿郡薊縣是也卽燕國之都水經注薊城西北隅有薊邱故以名之猶魯之曲阜齊之營邱燕有二國一稱北燕姬姓召公所封一稱南燕姞姓黄帝之後地里志曰東郡燕縣南燕國無世家不知其君諡號惟魯隱公五年衞人以燕師伐鄭杜云南燕國莊公二十年鄭伯和王室不克執燕仲父杜云南燕伯見傳耳此據左傳及註䟽之文是以北燕爲召公所封南燕爲黄帝之後也按史記武王未及下車而封黄帝之後於薊註今涿郡薊縣是也卽燕國之都孔安國司馬遷皆云燕國召公與周同姓黄帝姓姬君奭蓋其後也或黄帝之後封薊者滅絶而更封燕郡乎秦始皇二十三年滅燕以爲廣陽郡漢髙祖封盧綰爲燕王漢光武封叔父良爲廣陽王其城有萬載宫光明殿王莽改曰廣陽縣廣陽水名水經注云廣陽水東南至陽鄕縣右注聖水聖水又東南逕陽鄕城西縣故涿之陽亭也志云陽鄕城在今府治西南二十五里京西南有盧王屯在安次縣常道鄕二十五里漢燕王盧綰屯軍與劉賈夾攻燕者今名盧綰屯按常道鄕在耿就橋西去安次縣五里唐貞觀中縣治也魏燕王宇子奐封常道鄕公卽此幽州在唐爲范陽郡置盧龍軍節度使石晉天福元年割山後十六州賂契丹燕土遂為遼有至金天輔五年以燕京及涿易檀順景薊六州還宋宋宣和四年改燕山府爲永清軍郭藥師叛金金人復取之地復歸金先是顯德中周世宗親策兵復瀛鄚諸州將抵幽病還宋太祖置封椿庫曰晉割幽燕以遺契丹使一方限於境外朕甚憫之俟庫滿則以此酬之不然散滯財募勇士以圖攻取然終宋之世未能復也宋太宗垂拱中吏部尚書宋琪請復幽燕疏其言幽燕情形甚悉疏畧曰大舉精甲以事討除靈旗所指燕城必降但徑路所趨不無險易必若取雄霸路直進不免更有陽城之圍蓋界河之北陂淀坦平北路行師非我所便况軍行不離於輜重賊來莫測其淺深欲望回轅西適山路令大軍會於易州循孤山之北淶水以西挾山而行援糧而進渉涿水並大房抵桑乾河出安祖砦則東瞰燕城裁及一舎此是周德威收燕之路自易水距此二百餘里並是沿山村墅連延溪澗相接採薪汲水我占上游東則林麓平岡非戎馬奔衝之地内排槍弩歩隊實王師備禦之方而於山上列白幟以望之戎馬之來二十里外可悉數也從安祖砦西北有盧師神祠是桑乾出山之口東及幽州四十餘里趙德鈞作鎮之時欲遏西衝曾塹此水况河次半有崖岸不可輕度其平處築城䕶之守以偏師此斷彼之右臂也仍慮步奚爲寇可分雄勇兵士三五千人至青白軍以來山中防遏此是新州嬀川之間南出易州大路其桑乾河水屬燕城北隅繞西壁而轉大軍如至城下於燕丹陵東北横堰此水灌入髙梁河髙梁岸狹桑水必溢可於駐蹕寺東引入郊亭淀三五日瀰漫百餘里卽幽州隔在水南王師可於州北繫浮梁以通北路賊騎來援已隔水矣視此孤壘浹旬必克初宋太祖欲取幽薊以地圖示趙普普曰圖必出曹翰帝曰然又曰翰可取否普曰翰可取孰可守帝曰以翰守之普曰翰死孰可代帝不語久之曰卿可謂遠慮矣帝自此絶口不言伐燕及太宗平河東出討幽薊久未班師普手疏極諫甚謂陛下信邪謟之徒又謂望陛下精調御膳保養聖躬其言極切帝報曰將帥不遵成算往復勞弊爲遼人所襲此責在主將也朕踵百王之末粗致承平蓋念彼民陷於塗炭將救焚而拯溺匪黷武以窮兵卿當悉之也疆場之事已爲之備卿勿爲憂遂罷進取之兵而宋之弱實基於此遼會同元年立爲南京開泰元年號燕京金海陵貞元元年以燕乃列國之名不當爲京師號稱中都元太祖於貞祐乙亥平中都金主奔汴至至元四年城京師稱大都燕之稱京不始於遼也宋人方回曰燕將臧荼王燕都薊今燕京大興府東北有薊縣又曰陶淵明詠荆軻曰提劍出燕京蓋燕之名京久矣按燕京易州西北乃金坡關卽紫荆關昌平之西乃居庸關順州之北乃古北口景州東北乃松亭關平州之東乃榆關卽山海關自後唐屬契丹安巴堅都於此其地平州爲要害至遼天祚時其將張㲄守平州以平州降宋金人取之並擒天祚而遼亡時宣和七年乙巳也至紹興二十年金主亮以上京僻在一隅城燕京徙居之改析津府爲大興府號中都以中京會寧府爲北京汴京開封府爲南京而舊遼陽府爲東京大同爲西京如故元世祖問劉秉忠曰今之定都惟上都大都耳何處最佳秉忠曰上都國祚短民風淳大都國祚長民風􅁋遂定都燕之計明洪武元年改大興府爲北平府二年立北平行中書省三年封燕王九年革行省設承宣布政使司初欲建都於此以修撰鮑頻力諫而止永樂元年正月禮部尚書李至剛言北平布政司實興王之地宜遵太祖中都之制立爲京師制曰可其以北平爲北京上雖臨御猶稱行在十八年宫殿成去行在之號洪熙元年復稱行在正統六年復去之以應天府爲南京洪武元年改北平府詔一海宇以安人心正國統而君天下理勢所在古人皆然自羣雄乘亂以來四方思治惟切元綱已隳疆土遂分孰拯斯民以定於一顧予非德造此丕圖荷上天眷祐臣鄰翊贊肇基江左平定中原睠惟幽薊實彼根本命將北伐列郡皆順已於洪武元年八月初二日克取燕城兵無犯於秋毫民不移於肆市㨗音來奏殊副朕懷今改燕城爲北平府命官屯守海宇旣同國統斯正方與生民共享安平之福尚賴内外臣僚夙夜公勤匡朕不逮永樂十八年建北京詔開基創業興王之本爲先繼體守成經國之宜尤重昔朕皇考太祖髙皇帝受天明命君主中華創立江左以肇邦基肆朕纘承大統恢𢎞鴻業惟懷永圖眷兹北京實爲都㑹地勢雄偉山川鞏固四方萬國道里適均惟天意之所屬實卜筮之攸同乃倣古制狥輿情立兩京置郊社宗廟創建宫室上以紹皇考太祖髙皇帝之先志下以開子孫萬世之𢎞規且於巡狩駐守實有便焉爰自營建以來天下軍民樂於趨事天人協贊景貺駢臻今工已告成選以永樂十九年正月朔旦御奉天殿朝百官誕新治理用致雍熙於戯天地清寧衍宗社萬年之福山河綏靖隆古今全盛之基永樂十九年北京御朝詔朕荷天地祖宗眷祐繼承大統撫馭萬方夙夜祗勤率遵成憲乃者紹皇考太祖髙皇帝之志效成周卜洛之規建立兩京爲子孫帝王萬世之基爰自經營以來賴天下臣民殚竭心力渉寒暑冐風霜趨事赴工勤勞匪懈朕心眷念拳切不忘今宫殿告成朕已御正朝祗祀天地祖宗社稷懋圖治理嘉與維新重懷寛恤之仁用廣好生之德大赦天下史記天官書云中國山川東北流其維首在隴蜀尾沒於勃碣唐書天文志云箕尾析木津也初尾七度餘二千七百五十杪二十一少中箕五度終南斗八度自渤海九河之北得漢河間涿郡廣陽及上谷漁陽右北平遼西遼東樂浪元菟古北燕孤竹無終九邊之國尾得雲漢之末派龜魚麗焉當九河之下流濱於勃碣皆北紀之所窮也京師地最髙去通州四十里地高五丈河中置十閘始可行舟去上都一千里地高四十丈洪武初定淮甸得馮國用問以定天下大計國用對曰金陵龍蟠虎踞真帝王之都願先渡江取金陵置都於此然後命將出師掃除羣寇倡仁義以收人心天下不難定也上曰吾意正如此及克太平召陶安問之對如國用且曰據長江之險出兵以臨四方何向不克此天所以資明公也上嘉納之遂定計取金陵擒元將陳埜先等入其城遂置都焉其後旣定中原復以汴梁爲北京以臨濠爲中都逮平陜西欲置都關中後以西北重地非自將不可議建都於燕以鮑頻力諫而止金陵北阻長江南挹吳會雖稱華麗然風氣之厚形勢之雄終不如西北扼天下之喉而拊其背爲最勝昔孫吳東晉以迄宋齊梁陳皆偏安江左迭興迭廢何能爲帝王孔明所云鍾山龍蟠石城虎踞真帝王之都者蓋當時欲與孫吳結好姑爲此言以廣其意未必然也其後成祖改都燕京而以金陵爲南京爰致太平垂三百禩可謂善繼先志矣建文初户部侍郎卓敬密奏曰燕王智慮絶人酷類先帝夫北平者强幹之地金元所由興也宜徙燕南昌以絶禍本夫萌而未動者幾也量時而爲者勢也勢非至勁莫能斷幾非至明莫能察建文不能用夫使卓司農之説行寧有靖難之事乎其後徙寧王於南昌及其叛也滅之不旋踵文皇蓋隂用其言也郭子章都論古今論形勢之都曰秦曰洛而洛不如秦則自漢以來言之婁敬說漢髙曰洛陽天下之中有德易以興無德易以亡秦地被山帶河四塞以爲國案秦之故地搤天下之吭而拊其背也張良曰洛陽四面受敵非用武之國關中左殽函右隴蜀阻三面而易守敬說是也漢竟都關中二百年而王莽簒宋藝祖欲都長安晉王諫曰在德不在險藝祖曰吾將西遷者欲據山河之勝而去冗兵都汴不出百年天下民力殫矣宋竟都汴百五十年而徽欽擄議者謂洛不如秦似矣顧辟雍之詩曰考卜維王宅是鎬京維龜正之武王成之則周之都鎬卜也周書曰我卜河朔黎水我乃卜澗水東瀍水西惟洛食我又卜瀍水東亦惟洛食則周之都洛亦卜也夫周卜鎬西東南北無思不服矣而復惓惓營洛者豈知其子孫終東遷耶鎬距秦咫尺當其時何不卜秦而卜洛耶舎秦營洛周公未爲無見不徒專恃其德已也周歴八百都洛五百豈洛之王氣或加於鎬秦耶㣲獨周也都秦者西漢二百餘年唐二百八十年秦隋俱二世亡其長短之數可睹已都洛者東漢百九十五年魏晉百年唐末徙洛至宋靖康在汴洛間二百二十年拓跋完顔又百年其長短之數又可睹已則洛何以不如秦哉夫秦天下之首也洛天下之腹也首之爲體尊而腹之受大其可以都一也明興定都金陵似若循六朝之舊洪武初營汴爲北京則亦周公意也末年東宫營秦則亦婁敬張良藝祖意也而卒不果豈天將以待燕耶成祖之營燕也當時臺諫交口不便主事蕭儀言之尤峻豈不以燕爲金元故都非明所宜都乎豈不以金祚僅百年元祚不盈百年非宜都乎蓋未識上意所屬也成祖曰北平之遷吾與大臣密計數月而後行今其所密計者卽不得聞以愚度之其説有四燕非金元始也周爲召公封國由召公傳丹喜歴四十三世九百餘年眎周歴且過之宜遷一古享國長久者靡不遷都商始亳遷耿遷相周始鎬遷洛漢唐始秦遷洛宋始汴遷杭然皆廹於兵戈旤於侵逼不得已而後去故靖難之後因而遷徙亦以爲子孫長久計耳宜遷二西漢起漢中都秦東漢起南陽都洛唐起太原都秦宋起宋州都汴元起開平都燕明太祖起鳯陽都吳成祖曰吾起燕都燕耳宜遷三天下之禍莫烈於鹵吾令子孫自當之庻幾四海豪傑輻輳都下足與鹵角宜遷四成祖密計或不出此四者彼書生之見豈足以逹英雄之畧哉雖然北敵隔一邊垣正統己巳之變嘉靖庚戌之突可鑒也漕河僅一衣帶水元人海運之制脫脫水田之議當講也果兵足以制鹵食足以自固則太行易水之間卽國家億萬禩無疆之宅也又何必問秦洛之强弱哉李時勉北京賦惟皇明之受天命也我太祖皇帝首仗義師以平暴亂豪傑景從聲振江漢削除僭竊拯民塗炭定鼎金陵撫綏萬邦乃睠兹土實雄朔方倣成周之卜洛遂竝建而未遑逮我聖上繼明重光握乾御極一遵舊章仁聲洋溢乎遐邇恩澤汪濊於八荒旣致治於太平遵皇衢以省方仰先志之未遂度𢎞規以作京羌經營之伊始徧中外其懽騰曰惟北都在冀之域右挾太行左據碣石背疊險兮重關面平原兮廣澤宗恒嶽其巍巍鎭毉閭而奕奕冠九州之形勝實爲天府之國是以軒轅邑之以分州唐堯階之以為帝擴神化以宜民大勲德之光被欝王氣之所鍾於今兹而有待也於是仰瞻析木俯測地靈龜筮兆吉天人叶應神祗獻珍而山石自出河嶽效靈而神木自行民子來兮相續期不日而功成爾乃懸水樹臬識景表營方位旣正髙下旣平羣力畢舉百工並興建不拔之丕址拓萬雉之金城引天泉於西阜環湯池而鏡清九衢百㕓之通逹連甍􅃉宇之縱横顧壯麗其若此非燕逸而娛情蓋所以强幹而弱枝居重以御輕展皇儀而朝諸侯遵先軌而播風聲者也若乃四郊砥平王道正直視萬國之環拱適居中而建極其南則萬流宗海平林蔽天攬邯鄲鉅鹿之廣衍馳平疇沃野之綿延溏淤恒衛經其野濡磁淶桑滙其前界以大陸廣阿之𢎞壤扼以大茂井陘之連山包絡趙魏襟帶齊魯膏腴之地綿亘三百餘里而極於黄河伊頴之川其水陸之所産卓犖繁盛蓋莫得而計焉其北則疊嶂􅐑峞層巒蔽虧長城矗乎雲表百泉湧乎山隈壯天關而設險守一夫而莫開偉左盤而右顧宛鳯舞而龍飛實磅礴而欝積粤擁衞於邦畿包狼山上谷之阻據野狐獨石之危掩祖山木葉之離立連白登紫塞之逶迤控女真而極乎洮河之北鎮朔漠而逾乎瀚海之湄蒙苫之衆引弓之倫畏威懷德相率而來歸其東則潞河通漕控引江淮肥如灤淶灌注縈迴連峯片石之隘首陽崆峒之崖玉田白璧神仙璚臺超無終而越金山跨遼瀋而逾鴨綠至於暘谷日出之涯固已遐哉邈乎而莫不在乎綏懷環以大海衆水所歸洪濤巨浪洶湧崔嵬蓋不知其幾千萬里而蠻商番舶帆檣隱天上下不絶而往來又有蓬瀛方壺鳯麟聚窟十洲三島靈異非一流精之闕瓊華之室墉城岧嶤金臺岑嵂紫氣丹青景雲矚目靈圄偓佺安期羡門之倫相與從游於其間出入隱見而慌惚瞻帝京其伊邇庻可見其􅆖鸞駕鶴之髣髴其西則崇山鬱翠髙挹泰岱北接居庸南首河内竒峯擁關龍門阻隘玊泉垂虹青煙浮黛上嶻􅑖兮倚空下蟠據而際海其麓則有渾河湯湯西湖泱泱鹽溝琉璃桑乾廣揚雪波泛湧灝溔汪洋一瀉千里㑹流帝鄕又有上林禁苑種植畜牧連郊踰畿緣邱彌谷澤渚川滙若大湖瀛海渺瀰而相屬其中則有竒花珍果嘉樹甘木禽獸魚鱉豐殖繁育颮颮籍籍不可得而盡錄固可以因農隙而校田獵選車徒以講武事乃遵國風稽王制詔期門簡將帥乘玉輅擁翠蓋出天關而雷轟轢芳郊而雲㑹非所以黷武觀兵娛樂騁意蓋將取不姙而除菑害狩無擇而順殺氣謹大易之用於三驅之時騐騶虞之仁於一發之際水衡虞人之容與武夫壯士之奮厲皆知夫仁者之為勇而投石超距之足鄙亦何必殄夷禽獸割鮮野食而以俛仰極樂之爲貴也若夫其宫室之制則損益乎黄帝合宫之宜式遵乎太祖貽謀之良居髙以臨下背隂而面陽奉天凌霄以磊砢謹身鎮極而崢嶸華蓋穹崇以造天儼特處乎中央上倣象夫天體之圓下效法乎坤德之方兩觀對峙以嶽立五門髙矗乎昊蒼飛閣屼以奠乎四表瓊樓嵬以立於兩旁廟社並列左右相當東崇文華重國家之大本西翊武英嚴齋居而存誠彤􅒉玉砌璧檻華廊飛簷下啄叢楹髙驤闢閶闔其蕩蕩儼帝居於將將玉户粲華星之烱晃璇題納明月而輝煌寳珠焜燿於天闕金龍夭矯於虹梁藻井煥發綺窓玲瓏建瓴聯絡複道迴衝軼霄漢以上出俯日月而盪胸五色炫映金碧晶熒浮輝揚耀霞彩雲紅其後則奉先之殿仁夀之宫乾清坤寧眇麗穹窿掖庭椒房閨闥閎通其前則郊建圓邱合祭天地山川壇壝恭肅明祀至於五軍庻府之司六卿百僚之位嚴署宇之齊設比館舎而並置列大明之東西割文武而制異至於京尹赤縣之治所王侯貴戚之邸第辟雍成均育賢之地守羽林而掌佽飛者至九十而有四衞莫不井列而碁布各雄壯而偉麗其岩廊之上則有臯䕫稷契之倫元凱俊乂之輩相與賡虞廷之歌談羲農之際罄補衮之能懷忠貞之志考禮文於大備贊聲樂之盡美是以朝無缺政德教漸曁薄海内外均陶至治幸其有作聿來趨事成此大功忘其劬勩人和旣極休徵滋至慶雲瑞靄之覆於闕庭素鳥元兎之獻於丹陛醴泉屢出甘露數墜麒麟騶虞之珍馴獅天馬之類紛紜雜遝莫能殫記於以見天眷之益隆而聖德之純備者也於是正月上日工旣訖功爰告成於天地肆紹美於祖宗清心凝慮齋沐肅雍粢盛旣潔牲牷旣豐芬郁郁以旁逹靈繽繽其來降錫嘉貺之穰穰介景福於帝躬將順應於昌期趾盛美於無窮乃服衮冕御帝座開九重之深宫受萬邦之朝賀内侯甸而要荒外殊方而異俗胥近悅而遠來紛鼔舞而匍匐方物溢以充庭奓絢燦而駭矚率舞蹈於階墀效華封之三祝爾乃浹和㑹昭景鑠鏗鯨鐘奏雅樂詔光禄以開筵合百辟而燕樂饌珍玊兮芳馨罍瓊漿以斟酌聯貂蟬兮夾陛雜蠻夷之荒服莫不酣暢而飽德咸頌歌而踴躍越填城而溢郛藹歡聲於寥廓斯可以嫓太古之無爲慶華胥而蹈栗陸顧皇上之謙抑視至治爲未足於是降德音播嘉惠省刑罰薄賦稅汰冗濁旌亷吏舉賢才擢俊乂發倉廩賑貧匱尊髙年而禮有德慎防禦而修武備貴爵重賞以厲亷恥厚往薄來以馭遐裔蓋欲使人知所本士知所勵四方萬國無一民之失所窮陬僻壤無一物之不遂舉陶於春風和煦之中而樂於雍熙泰和之治此蓋堯舜兢業之心文王敬止之意所以紹鴻業繼先志益宏遠而有偉故不勞而甚易冠絶乎前古垂休於後世固可必聖子之與神孫益昌盛而無替小臣微陋忝職文字願賦帝都之盛槩揚國美於萬禩復爲之歌曰煌煌帝都兮逾鎬豐阻山帶河兮壯以雄天開日明兮王氣所鍾穹隆造天兮惟帝之宫廓氛祲兮開溟濛鎮中外兮宣皇風王道平平兮四方來同願皇圖之鞏固歴萬世兮無窮元人檇李顧淵白嘗入京獻燕都賦翰林元復初不喜曰今大朝四海一統六合一家燕蓋昔時戰國名何燕之稱春眀夢餘録卷一
