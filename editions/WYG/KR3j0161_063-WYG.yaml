  - {type: page-break, offset: 0, content: '', id: KR3j0161_WYG_063-1a, image: WYG0869/WYG0869-0191a.png}
body:
  text: 春眀夢餘録卷六十三吏部左侍郎孫承澤撰錦衣衞錦衣衞在通政司南本儀鑾司初設拱衞司領校尉𨽻都督府洪武二年定為親軍都尉府統中左右前後五衞軍士而儀鑾司𨽻焉十五年罷府及司置錦衣衞統軍與諸衛同所屬有南北鎮撫司十四所𨽻又有将軍力士校尉人䓁其職掌直駕侍衞廵察捕緝䓁事恩功寄禄無常員恒以都指揮都督統之永樂定都後照例開設雖職事仍舊而任遇漸加視諸衞獨重焉錦衣衞與在京諸衞即唐人十六衞之遺制凡諸衞親軍皆以番直宿衞執戈㦸嚴廵警監門禁而錦衣所掌者乃鹵簿儀仗之事旗手所司者乃旗纛金鼔之物諸衞皆統軍卒而錦衣獨領校尉力士即周之虎賁旅賁也諸軍皆世卒而府軍獨簽㓜軍即漢之六郡良家子也諸衞正倅一惟其世獨錦衣之任則不必世而以能盖御座則夾陛而立御輦則扶轅以行出警而入蹕承旨而傳宣皆在所司而詔獄所寄則又重矣又按錦衣衛本國初儀鑾司後定為親軍都督府而司𨽻焉十五年罷府及司置錦衣親軍指揮使司鎮撫司理衞中刑名如列衞而兼簡軍匠所謂南鎮撫司也北鎮撫司本添設専理詔獄成化十四年始給印分司得直達上下法司覆提領衞事者恒以都指揮都督或恩功或寄禄掌侍衞之事凡将軍力士校尉分番䕶駕直宿巡察凡大朝常駕出入督設鹵簿儀仗凡皇城四門日夜番直廵察之凡盗賊奸宄街塗溝渠宻緝而時省之凡奉㫖鞫獄録囚事與三司從事凡比試監焉錦衣典親軍其後寄以詗察之柄體勢日重然本非尊官也故雖紀綱門達逯杲之寵寄横肆然綱達不過都指揮僉事杲僅指揮同知而已袁彬自都指揮出僉都府方晉横玉正徳初指揮髙得材縁從父鳳柄司禮傳陞右都督終以非例於五府帶俸錢寧繼踵此官雖貴盛之極而意猶歉之請以都指揮理事下兵部議曲為諛觧遂成不疑沿流至於朱陸極矣今考太保兼少傅者一人陸炳太保兼太子太傅一人朱希孝太子太傅一人劉守有左都督一人錢寧右都督一人陳寅都督同知一人余廕已上皆掌衞督行事官校者也右都督一人錢安都督同知三人袁天章孫鈺楊俊卿已上同掌衞督捕者也其他恩廕管事左右都督如麥祥髙恕黄浦之類不可勝紀矣天順成化及𢎞治初年錦衣指揮門達袁斌朱驥䓁提督緝捕毎至十年或十一二年方一類奏下兵部定議陞者不過五七人多止十人賞或以布絹鈔錠無功者撻而斥之已而有挐獲妖言陞襲一輩之例於是人競貪功肆行羅織嘉靖初命兵科給事夏言御史鄭本公兵部主事汪文盛查覈冒濫武職言䓁上言太祖開天唘運一時翊元臣封公者只六人封侯伯者二十八人文皇帝靖難封拜亦不過十餘人慎重名器如此其錦衣一衞額設指揮使一同知二僉事三鎮撫一所千百户各有定員自正統後貴妃尚主公侯中貴子弟多寄禄衞中逓進用事至正徳間奄宦擅權貴倖子弟以奏帶冒銜錦衣者尤多大抵奏帶之數太濫紀騐之次失實武選之法盡壊往往安居長安寄名邉徼今查應革者二千一百九十九員名歲省度支十萬計本兵彭澤覆奏從之然裁革未幾濫授如故至隆慶四年復汰冒濫官旗一千一百十五人然邉功之冒報内侍之傳奉勲戚之陳乞相襲以為故事至以寄廕錦衣加銜五府者尤比比此眀政之一蠧也隆慶中刑科給事中舒化疏朝廷設立厰衞原以捕盗防奸細非以察百官也駕馭百官乃天子之權而奏劾諸司責在臺諫朝廷自有公論今以暗訪之權歸諸厰衞萬一人非正直事出寃誣是非顛倒殃及善良陛下何由知之且朝廷既慿厰衞厰衞必委之番役此軰貪殘何所不至人心憂危衆目睚眦非盛世所宜有也上命付司知之崇禎四年五月給事中許國榮論厰衞疏臣以厰衛緝事舊制所載為臣奸大逆偶一行之至變而為事件則失立法本意而近於告宻告宻非盛世風也臣請先言其理而徐及其事皇上或以為事件設而天下無遁情臣竊謂天下從此政多隠情皇上或以秘訪所致得於獨聞不知若輩正借此為招揺之榜様納賄之便門其受皇上重託而冀其不欺者止掌厰掌衛之臣耳勢不得不轉寄耳目於夥長旗番此輩復展轉旁寄豈盡忠肝義膽見利不揺者乎其初亦效小忠小信採㡬實事以取信皇上因而宻窺意旨巧示靈騐以震讋通國遂畏之如虎况止有厰衞緝事之人而無緝事厰衞之人彼能顛倒人之是非而人不敢操其是非何憚而不恣其所欲為或準賄之有無以繪人之妍􅎀或因賄之多寡以装事之輕重皇上之威靈隂為所竊而不覺此臣泛言流弊必至之理也然今日肆毒無忌者不盡在真厰衞而在假充厰衞之人盖以厰衞二字為破膽之霹靂而奸棍惡少遂假為嚇詐装頭敢就所聞錯陳其概如紬商劉文斗行貨到亰奸棍趙瞎子䓁口稱厰衞揑指漏稅宻擒于崇文門東小橋廟内因捜其底賬載有舖户羅紹所李思懐䓁十餘家并行拿拷共詐銀二千餘兩矣長子縣教官推陞縣令忽有數棍擁入其寓内口稱厰衞指為營幹得来詐銀五百兩矣菜市口魚行酒舘遵禁罷肆忽有奸棍劉科䓁口稱厰衞排其户指有宿醖魚腥各詐錢數十貫矣山西觧官買辦黒鉛照數交足衆棍窺有餘剰在潞紬舖内口稱厰衞指尅官物捉拿王舖䓁四家各詐銀千餘兩矣蘇州顧監生挟數百金為加納資衆棍窺其愚穉可啖口稱厰衞拿人罄刦其資一鬨散矣醫士楊四置買紗絹衆棍疑有積蓄口稱厰衞因告行提鎻禁碾児衚衕席捲其槖而後釋放矣此猶肆詐於城市者也風聞薊門孔道假偵邉庭往来如織如玉田馬户項福䓁先經有四棍假稱厰衞索騎於前未幾而踵至索騎者復有多人一日之内兩被驛騷窮詰之始知贗鼎則其假詐邉方未經敗露者不知幾何人矣凡此特千百中之一二也至於散在各衙門者藉口密探故露踪跡紀言紀事筆底可操禍福書吏畏其播弄風波不得不醵金隂餌之遂相沿為例而莫可問矣總之真厰衞之壊事厰衞之臣得而懲之唯疑真疑假觸處設阱被害者吞聲飲恨而舉朝又畏言發禍随姑俟其自敗臣􅂸死為皇上陳其大略伏乞勅下該衙門益加嚴毖此後敢有假冒務置諸法即有萬不容已之役亦湏慎擇而使存緝事之舊制去事件之苛條俾小民安於里商賈安於市於皇上平眀未必無小補矣洪武二十年正月焚錦衣衞刑具先是天下官民有犯者俱命屬法司其有重罪逮至亰者或令収繫錦衣衞審實情詞用事者因以非法凌虐上聞之怒命焚之崇禎十一年六月諭提督東司房吳孟眀今年火星逆度兩次為災猛烈慘酷深可驚悼夫刑罰所以誅不仁緝訪惟欲得真事茍或悮加善良飾虚為實大犯命官之戒必干天地之和近来人情作奸者固多仇詐者亦不少今後凡有首報事件旗番止許拘人或爾親審叮嚀刑官虚公查質真者據實㕘處誣者即時開釋仍将首報之人反坐示戒不許徑自拿人私行拷打彼卑官小卒以衙門為活計惟知嗜利鮮有良心是以有錢者賣放無錢者方来呈禀所以真者已不勝其狼狽若誣者即使放去亦人傷財盡矣甚至張冠李戴増少為多或久禁暗處或苦打屈服砌成可惡情状令人一見輒怒此時全慿爾心腹大臣以清嚴作標虚公為準固不可避怨縦奸决不可疎忽偏聽若事果偶誤縱獄成本上仍應撿舉改正若别衙門偶有平反亦虚心聽之舊例事多平反原問衙門無罪不必堅持初入之言偏執已見到底䕶短遂非輕視人命非惟有負任使抑且自損隂功然亦不許因此推諉滋曠溺職戒之戒之特諭按錦衣衞堂上官每駕出則戎装帶繡春刀扈從繡春刀極小然非上賜則不敢佩也其校尉皆衣濟遜其名仍元舊也元史云國師法王至假法駕半仗以為前導詔省府臺院官以及百司庶府兼服銀鼠濟遜此元人禮服後乃為下役之服緝事番役在唐稱為不良人有不良帥主之即漢之大誰何也立名甚竒春眀夢餘録卷六十三
