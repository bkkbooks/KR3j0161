body:
  text: 春明夢餘錄卷十六吏部左侍郎孫承澤撰地壇地壇在安定門外之北繚以垣墻嘉靖九年建方澤壇為制二成夏至祭皇地祗北向太祖西向俱一成上東一壇中嶽東嶽南嶽西嶽北嶽基運山翔聖山神烈山西向西一壇中鎮東鎮南鎮西鎮北鎮天夀山純徳山東向東二壇東海南海西海北海西向西二壇大江大淮大河大漢東向俱二成上壇制一成面方六丈髙六尺二成面方十丈六尺髙六尺各成面甎用六八隂數皆黄色琉璃青白石包砌四出陛各八級周圍水渠一道長四十九丈四尺四寸深八尺六寸濶六尺内壝方墻二十七丈二尺髙六尺厚二尺内櫺星門四北門外西為瘞位瘞祝帛配位帛則燎之東為燈臺南門外為皇祗室藏神版而太祖版則以祭之前一日請諸廟外櫺星門四西門外迤西為神庫神厨宰牲亭祭器庫北門外西北為齋宫又建四天門西門外為鑾駕庫遣官房南為陪祀官房又外為壇門又外為泰折街牌坊䕶壇地一千四百七十六畝明太祖未即大位之先已建圜丘於正陽門外鍾山之陽建方丘于太平門外鍾山之隂分祀天地元年李善長等進方丘説曰按三代祭地之禮見於經傳者夏以五月商以六月周以夏至日祀之於澤中之方丘盖王者事天明事地察故冬至報天夏至報地所以順隂陽之義也祭天於南郊之圜丘祭地於北郊之方澤所以順隂陽之位也然先王親地有社存焉禮曰享天於郊祀社於國又曰郊所以明天道社所以神地道又曰郊社所以祀上帝又曰眀乎郊社之禮或以社對帝或以社對郊則祭社所以親地也書曰敢昭告于皇天后土左氏曰戴皇天履后土則古者亦命地祗為后矣曰地祗曰后土曰社皆祭地也此三代之正體而釋經之正説自鄭元惑於緯書而謂夏至於方丘之上祭崑崙之祗七月於㤗折之壇祭神州之祗析而二之後世宗焉嵗一祭自漢武用祠官寛舒議立后土祠於汾隂脽上禮如祗祀而後世又宗之於北郊之外仍祠后土元始間王莽奏罷甘泉泰畤復長安南北郊以正月上辛若丁天子親合祀天地於南郊而後世又因之多合祭焉由漢歴唐千餘年間親祀北郊者惟魏文帝之太和周武帝之建徳隋髙祖之開皇唐元宗之開元四祭而已宋元豐中議專祭北郊故政和中專祭者凡四南渡以後則惟攝祀而已元皇慶間議夏至專祭地未久施行今當以經為正擬今嵗夏至日祀方丘以五嶽五鎮四海四瀆従祀上是之四年三月復改築圜丘方丘二壇七年七月増圜丘方丘従祀更定其儀十年以分祭天地揆之人情有所未安命舉合祀之典即圜丘舊址為壇而以屋覆之名曰大祀殿自是方丘之祭遂罷永樂建天地壇于南郊一如太祖更定之制至嘉靖九年議改諸祀禮臣夏言因奏分祭天地本是古制况壇于南郊坎于北郊就隂陽因髙下原無崇樹棟宇之文至祖宗並配舉行不於長至之日而於孟春俱不應古典宜令羣臣博考㑹議陛下稱制而裁定之此中興大業也疏入未報給事中王汝梅等以言説非是而霍韜詆之尤力上怒皆加切責而又自為説以示禮部于是建方澤壇于安定門外坐南向北以髙皇帝配如洪武十年以前之制潘簡肅潢議臣聞禮者體也昔者聖人作易設卦觀象以乾為天為君為父以坤為地為母為妻為臣而係之曰天尊地卑乾坤定矣卑髙以陳貴賤位矣此禮所由生也是故因天事天祭帝於郊因地祀地祭社於國燔柴泰壇崇效天地瘞埋於泰折異樂殊日不與帝同牢以卑法地明王者父乾母坤禮至而辨示民嚴上焉故孔子曰天無二日土無二王禘嘗郊社尊無二上知其説者之于天下也其如視諸斯乎盖慎之也以此坊民後世乃猶有合享分郊如新莽匡衡之云者其於上也不亦二乎臣愚竊謂禮有貴多亦有尚寡文質無常惟稱之適圜丘不屋致誠之極也明堂大享宜非所施是故掃地之典義不可曠奕奕郊廟列聖作之踐位行禮于今百祀神靈之所依祖宗精神之所聚律之以春秋譏毁泉臺之法而揆之以詩人勿翦勿拜之意有其舉之孰敢廢乎是故大祀之殿義不可墮按尚書孝經春秋凡言郊不卜郊郊祀用牲於郊皆斷名之曰郊不别云某郊凡言郊以明天道郊則天神格祭天於郊皆直繫之天更不並云天地是知祭天之外無郊郊祭之中無地易明也匡衡徒見天子有兆于南郊之語妄意祭地當于北郊其言本孝經緯于經無據且北既隂方地象母位則郊配亦當以其類矣嚴母莫大於配地古有之乎是故北郊之謬義不可襲王者受命有天下謂之有土是故古者天子大社丘方五丈封土五色祭后土焉凡封建諸侯則各割其方色之土苴以白茅而錫之使各立社祭于其國亦曰胙土是天子太社五土王社自祭畿内分土諸侯獨得祭其方土而已故曰王者有分土祭天地諸侯方祭祭土而尚書周官禮記皆謂祭地曰社或曰后土曰冢土示曰大示亦曰地示又曰土示丘方曰方丘折曰泰折天下之社莫大焉曰大社社所以眀地道列地利命降乎社之謂殽地社之為大示昭昭矣自鄭元諸儒牽附䜟緯誤分泰折為祭崑崙方丘為祭神州于是大社自為五土之神而夏至祭地别在北郊夫五土之神非地而何旅五帝獨非祭天耶周禮宗伯師甸用牲于社大祝大師大㑹同宜于社小祝冦戎之事保郊祀于社大司馬蒐田獻禽祭示大合軍以先愷樂獻功于社大司冦軍旅之事涖戮於社類皆言社而不及稷臣謂此天子大社也張載曰大社王為羣姓所立必在國外王社王所自立必在城内夫大社既在國外則小宗伯建國之神位所謂右社稷左宗廟者固王自立之社而大社無稷矣漢儒乃謂大社有稷王社無稷是無怪其以社為地别體而雜求諸泰折方丘卒起後來紛紛之議非胡宏王炎諸臣相繼講正流惑可勝慨乎編修歐陽鐸議竊惟二儀定位天髙而地下先王制禮天尊而地親故我太祖皇帝兆圜丘於鍾山之陽兆方丘於鍾山之隂用周禮也行之十年乃更為大祀之殿定合祀之儀又行之二十餘年而太宗皇帝承之百十年來論者類疑其非古然以太祖非無為而變太宗非無據而承况土木一興財費不貲事干國典不敢易言耳兹遇陛下博稽古典臣工何容異議雖然古不可悖亦不可泥叅之酌之與時宜之是在陛下聖明而已况周禮固有不可知者臣請先舉其畧而後效其愚謹按周禮冬至圜丘夏至方丘可以見天地之分祀矣然未知其兆於南郊歟抑南北二郊歟不可考也及考大宗伯掌建邦禮則禋祀祀天血祭祭社而無祭地之禮小宗伯掌建神位則右社稷左宗廟五帝四郊而無地祗之位司服則祀天大裘祭社希冕而無祭地之服乃若大宗伯蒼璧禮天黄琮禮地圭璋琥璜禮四方則無禮社之玉典瑞四圭祀天兩圭祀地璋邸射祀山川則無祀社之圭何其闕畧如此耶或謂天子之社非諸侯各祭一方者比古無北郊社以祭地也故尊與郊等親與廟並故武王伐商類於上帝即宜于冡土成王遷洛用牲于郊即社于新邑周禮盖言地即不言社言社即不言地耳信斯言也則既謂右社稷又曰澤中方丘何其乖錯如此耶意者國門之内除地為澤而築丘祭社如古者壇墠之制歟或社稷在國都之右因澤為丘不必於門内歟是又未可考也臣故曰古不可悖亦不可泥得其意不踐其迹時之為貴可也修撰姚淶議太祖髙皇帝當分祭之初存復古之念必嘗求其制於周禮必嘗採其説於諸儒必嘗集其議於在廷之臣二郊嘗並立矣二至嘗分祀矣心思其義非一日也身踐其禮非一祭也歴試而親驗之非若儒生之空談髙論而已也十年之内幽明感通之間天人相與之際必有不盡如諸儒所議者而後更之以合于一不安于前而安于後無得于分祀而有得于合祀于是定為一代之禮以垂憲無極不然終洪武之世使其少有未愜則聖祖自將復従其初矣夫豈憚於更定以貽今日之議哉是故斷之于定鼎之時者聖祖也行之而安者凡二十年襲之于徙都之日者太宗也行之而安者亦二十年承之於繼世之後者列聖也行之而安者復百餘年天清地晏百神受職命其宴曰慶成者慶天心之克享也未始一嵗間也固不屑屑於古禮之合而祭則受福已大非漢唐宋之所班矣臣愚以為合祭之禮未可輕易也夫臣非不能組織舊聞使言之成章以効仰贊之忱但言必慮其所終而行必稽其所敝古之祭日于壇謂春分也祭月于坎謂秋分也其隂陽先後之序義則得矣従之可也若冬至夏至之祭臣於此竊有疑焉周人以建子之月為嵗首故冬至祭天夏至祭地隂陽之義先後之倫各有攸宜斯制禮之本意也今所用者夏正也如以一嵗之月序之則夏至前而冬至後茍夏至祭地冬至祭天是先地而後天雖曰陽先隂後于義無嫌然實非一嵗之事尊天之義豈其若此行周之禮不可以用今之時用今之時不可以行周之禮是其大者已碍而不通矣西垣筆記崇禎十五年五月二十六日甲午夏至先是上傳親祭地於方澤所司者皆如儀是日四鼓後鐘鳴上乗輿従午門端門承天門長安左門安定門詣北郊至行幄具祭服時曙色漸開上繙閱章疏久之報卯時上步出大次従内壝櫺星右門步入行大祭禮樂九奏上升壇者五而對越盡禮仍至大次易常服而還正位黒犢一黄琮黄帛黄玉爵配位同惟無玉四従位黒犢四北羊四猪四計用犢六隻北羊及猪各四隻北羊者角彎下價髙山羊角直上價廉大祀不用山羊南祀配位藏於泰神殿北郊配位在太廟臨祭前一日請出入壇祭畢仍奉入朝日壇朝日壇在朝陽門外繚以垣墻嘉靖九年建西向為制一成春分之日祭大明之神神西向祭用大牢玉禮三獻樂七奏舞八佾甲丙戊庚壬年皇帝親祭祭服拜跪飲福受胙餘年遣文大臣攝祭壇方廣五丈髙五尺九寸壇面用紅琉璃階九級俱白石櫺星門西門外為燎爐瘞池西南為具服殿東北為神庫神厨宰牲亭燈庫鐘樓北為遣官房外為天門二座北天門外為禮神坊西天門外迤南為陪祀齋宿房五十四間䕶壇地一百畝夕月壇夕月壇在阜成門外繚以垣墻嘉靖九年建東向為制一成秋分之日祭夜明之神神東向祭用牲玉獻舞如朝日儀惟樂六奏従祀二十八宿木火土金水五星周天星辰丑辰未戌年皇帝皮弁服親祀亦如朝日儀餘年遣武臣攝祭壇方廣四丈髙四尺六寸面白琉璃階六級俱白石内櫺星門四東門外為瘞池東北為具服殿南門外為神庫西南為宰牲亭神厨祭器庫北門外為鐘樓遣官房外天門二座東天門外北為禮神坊䕶壇地三十六畝祭日之時以寅祭月之時以亥祭法曰王宫祭日夜明祭月王宫壇名營域如宫日神尊故名壇曰王宫夜明祭月壇名月明於夜故謂其壇為夜明又曰祭日於壇祭月於坎以制上下祭日於東祭月於西以端其位春官典瑞玉人之事圭璧五寸以祀日月圭璧謂以璧為邸旁有一圭盖祀天之玉以四圭有邸此為一圭者殺於上帝也嘉靖中改郊壇禮朝日夕月等壇玉爵各用其方之色因詔求紅黄二玉不得暫用紅瑪瑙水晶仍極意購求終不獲回回館通事撒文秀者言二玉産在阿丹去吐魯番西南二千里其地兩山對峙自為雌雄有時自鳴乞依宣徳時下番事例往求可獲部以遣官非例止責陜西撫按於邊地訪求春明夢餘錄卷十六
