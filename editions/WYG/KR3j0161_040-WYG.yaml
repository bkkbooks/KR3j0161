body:
  text: 春明夢餘録卷四十吏部左侍郎孫承澤撰禮部二正士習宗伯馮琦疏頃者皇上納都給事中張問達之言正李贄惑世誣民之罪盡焚其所著書其於崇正闢邪甚盛舉也臣竊惟春秋大一統統者統於一也統於聖真則百家諸子無敢抗焉統於王制則卿大夫士庶無敢異焉國家以經術取士自五經四書性鑑正史而外不列於學宮不用以課士而經書傳註又以宋儒所訂者為準蓋即古人罷黜百家獨遵孔氏之㫖此所謂聖眞此所謂王制也自人文向盛士習寖漓始而厭薄平常稍趨纎靡纖靡不已漸騖新奇新奇不已漸趨詭僻始猶附諸子以立幟今且尊二氏以操戈背棄孔孟非毁程朱惟南華西竺之語是宗是競以實為空以空為實以名敎為桎梏以紀綱為贅疣以放言恣論為神奇以蕩棄行檢掃滅是非亷耻為廣大取佛經言心言性略相近者竄入於聖言取聖言有空字無字者强同於禪敎嗟乎聖經如此解乎士子制義以聖人口氣傳聖人之神耳聖人之世曾有此語意否乎夫學宮所列至詳童而習之白首未必能窮世閒寧有經史不能讀而於經史之外博極羣書之理棄本業之精髓拾異敎之殘膏譬如以中華之音雜魋結之語語道既為蹖駁論文又不成章世道潰於狂瀾經學幾為榛莽部科交列其弊明㫖申飭再三而竟未能廓然一大變其習者何也解書或用註䟽或不用註䟽則趨向不一也掄文或正體而取平典或憐才而收奇俊則鑒裁不一也同是違制而或叅或不叅則法令不一也同是被叅而或以為當處或以為可以無處則議論不一也士有不一之趨向取士乃有不一之鑒裁而又以不一之議論行不一之法令政體且有二三士習何由歸一即如燒毁異説去年奉有明㫖督學而下何曾禁止一處燒毁一書等經學於弁髦得詔書而掛壁如此即朝廷之上三令五申亦復何益臣請一取裁於聖人之言與天子之制而定為畫一之法士子授受當先明經術講書行文以遵守宋儒傳註為主二三塲以淹貫性鑑正史為主其有決裂聖言背違王制一切坊閒新説皆令地方官雜燒之各該提學官員仍具文報部要見黜過險詖邪妄之士幾人焚過離經叛道之書幾部兩京各省鄉試録及中式墨卷亦以聖言王制為準違聖言則叅不違則否背王制則叅不背則否官司評隲送科覆閲各以虚心平心從公從寔互相叅較不得逺近異法輕重異處致有後言伏乞天語叮嚀敕下部院斷在必行行之三年而士習不歸雅則臣等與天下督學官員均受其咎乃臣等猶有説焉自古世道升降之㑹往往以士大夫好尚為徵世之治也髙明之士盡以其才識用之脩政立事主於為國其議論必典寔平確而天下靡然從之世之衰也盡以其才識用之談元課虚主於自為其議論必奇僻空曠而天下亦靡然從之自古有僊佛之世聖學必不明世運必不盛即能眞詣其極亦與國家無益何况襲咳唾之餘以自蓋其名利之跡者乎夫道術之名久矣自西晉以來於吾道之内自分兩岐又其後則取釋氏之精蘊而陰附於吾道之内又其後則尊釋氏之名法而顯出於吾道之外非聖主執中建極揭皎日於中天士大夫一德同風挽頺波於砥柱悠悠世道臣等未知所届也得㫖祖宗維世立敎尊尚孔子明經取士表章宋儒近來學者不但非毁宋儒漸至詆譏孔子掃滅是非蕩棄行檢復安得忠孝節義之士為朝廷用祗縁主司誤以憐才為心曲收好奇新進以致如此新進未成之才只宜裁正待舉豈得輒加取録以誤天下覽卿等奏深於世敎有禆還開列條欵來務期必行僊佛原是異類宜在山林獨脩有等好尚的任觧官自便去勿與儒術並進以混人心行人高攀龍䟽臣惟自古治天下者未有不以敎化為先務而敎化之汙隆則學術之邪正為之是以聖帝明王必務表章正學使天下曉然知所趨截然有所守而後上無異敎下無異習道德一風俗同賢才出而治化昌矣臣見四川僉事張世則一本大略自謂讀大學古本而有悟知程朱誤人之甚謂朱熹之學專務尚博不能誠意成宋一代之風俗議論多而成功少天下卒於委靡而不振於是以所著大學初義上獻欲施行天下一改章句之舊臣惟自昔儒者説經不能無異同而是非不容有乖謬是非謬則萬事謬矣以程朱大賢謂其學不能誠意謂其敎曰誤人之甚是耶非耶議之於私家猶為一人偏詖而於聖賢無損鳴之於大廷則遂足以亂天下之觀聽而於世敎有害臣有不容已於言者矣夫自孟子沒而孔子之學無傳千有四百年而始有宋儒周惇頤程顥程頤張載朱熹得其正傳而絕學復續學者始知所從入之途其功罔極矣然是五賢者生於宋而宋不能用其學之萬一前則章惇蔡京之徒斥之為姦黨後則韓􅇑胄之徒斥之為偽學貶逐禁錮以迄於亡恭惟我太祖天縱神聖作民君師首立太學拜許存仁為祭酒以司敎化存仁為先儒許謙之孫謙承朱熹正學而存仁承上命以為敎一宗朱氏之學令學者非五經四書不讀非濓洛闗閩之學不講而天下翕然向風矣我成祖益章而大之命儒臣輯五經四書大全傳註一以濓洛闗閩為主自漢儒以下取其同而删其異别以諸儒之書類為性理全書同頒布天下永樂二年饒州儒士朱友季詣闕獻所著書專詆毁周程張朱之學上覽而怒曰此儒之賊也特遣行人押友季還饒州令有司聲罪杖遣悉焚其所著書曰毋誤後人於是邪説屏息吾道中天矣迨今二百餘年以來庠序所敎制科所取一禀於是眞儒如薛瑄胡居仁呉與弼陳眞晟曹端羅倫莊㫤章懋張元禎陳茂烈蔡清陳獻章王守仁諸人彬彬盛矣至一代之風俗上有紀綱下重名節當變故之秋率多仗義死節之士值權姦之際不乏敢言直諫之臣賢士大夫之公評士庶之清議是非井然有不當於人心羣起而議其後至於今上下相維非祖宗敎育之明驗與不意今日乃有如世則肆然欲變祖宗表章之至意率天下而盡背之也夫程朱之學其始終條理之全下學上達之妙固未易言語形容然其大要則不出涵飬須用敬進學在致知二語此非程朱之敎也孔子之敎也故窮理即博文之謂也居敬即約禮之謂也非孔子之敎也堯舜之敎也故博文即惟精之謂也約禮即惟一之謂也二者合一並進而主敬為本故理日明瑩則心日静虚動直而初非溺於詞章心益定静則理益資深逄源而初不流於空寂此聖學所以允執其中也至大學一書程子所揭為初學入德之門而章句之作則朱子所為一生竭盡精力之筆後人學未造其域豈容輕議况古書皆有簡錯古本安可盡信世則之言誠意是矣豈諸儒獨不敎人誠意乎誠者聖人之本學之所以成始成終功先格致正所以誠正也意有不誠心有不正即非所以為格致也若夫溺於記誦徇外忘本此俗學所以為陋豈大學格致之敎哉夫孔子之道至程朱而闡明殆盡學孔子而必由程朱正如入室而必由户善學者黙而識之心逸日休况今天下不患無論説而患無躬行就聖賢已明之道誠心而力行則事半而功倍矣何必嘵嘵焉必務自私用智欲伸其一已之説為也世則又以宋之不振歸咎於諸儒之學噫是何言也人主不能用其道雖以孔子之聖生於魯而不能救魯之衰㣲何疑於諸儒宋之亡也由前而言則壞於新法由後而言則壞於和議今不咎王安石呂惠卿蔡京章惇黄潛善汪伯彦秦檜韓􅇑胄之徒而咎諸儒之學何心哉夫所謂議論多而成功少者非言者之罪而用言者之罪也自古芻蕘獻説工瞽陳規其議論不至多然而上之人善於用中則片言可折而盈廷可廢天下見事功之實而不見議論之虚上之人漫無可否則人持所見而邪正雜陳徒滋耳目之煩無補經綸之實耳豈以人人緘黙而後為盛世乎世則又謂本朝持衡國是者無決斷之勇分猷庶職者有模稜之風庠序無眞才實學之士朝廷鮮寔心任事之臣此信有之正不學之故也奈何反以咎程朱之學也抑臣有深憂焉自世廟以前雖有訓詁詞章之習而天下多實學自穆廟以來率多玲瓏虚幻之談而弊不知所終笑宋儒之拙而規矩繩墨脱落無存以頓悟為工而巧變圓融不可方物故今髙明之士半已為佛老之徒然猶知儒之為尊必藉假儒文釋援釋入儒者内有秉彞之良外有惟皇之制也而其隱𠂻眞志則皆借孔孟為文飾與程朱為讎敵矣故今日對病之藥正在扶植程朱之學深嚴二氏之防而後孔孟之學明使世則之言一昌天下之棄其讎敵也不啻芻狗焉陛下皇建有極端本化人身體孔孟之㣲言首崇程朱之正學必親經書以窮理必收放心以居敬朝乾夕惕省察克治體二祖之意振正學於陵夷廢墜之餘明詔中外非四書五經不讀而不得浸淫於佛老之説非濓洛闗閩之學不講而不得淆亂以新奇之談學無分門士無異習人心貞一敎化大同如是而人才不出政治不隆者從古以來未之有也貢舉朱文公熹於光宗時著升貢議曰古學校選舉之法始於鄉黨而達於國都敎之以德行道藝而興其賢者能者葢居之者無異處官之者無異路取之者無異術故士有定志而無外慕蚤夜孜孜惟懼乎德業之不脩夫子所謂言寡尤行寡悔而禄在其中孟子所謂脩天爵而人爵從之者也今學校所敎既不本於德行而所謂藝者又皆無用之空言其又弊則所謂空言者又皆怪妄無稽而適以敗壞學者之心術治經者不復讀經之本文與先儒之傳註但取近年科舉中選之文諷誦摹倣轉相祖述以治經為經學之賊以作文為文字之妖也是以人才日衰風俗日下朝廷郡國有一疑事嘗試則公卿大夫官人百吏相顧眙愕而不知所從亦可以知其為敎之得失矣議者不原本其所自尚猶以程試文字之不工為大患豈不謬哉古大學之敎先於致知格物而考較之法又以九年知類通達强立不反為大成蓋天下之理皆學者所當知而理之載於經者固各有官而不茍相混也况今樂亡禮缺二戴所記已非正經而治經者又類舍其所難而趨其所易僅窺其一而不及其餘於天下之事宜有不能盡通其理者矣若諸子之學同出於聖人各有所長而不能無所短其長者固不可以不學而所短者亦豈可不精擇為趨舍哉至於諸史該古今興亡治亂得失之變而禮樂制度天文地理刑法兵制之屬在焉皆當世所須而不可闕者一旦欲盡通其理勢固有所不能惟合所當讀之書分年而課試之使天下之士各以三年而通其三四之一則亦宜若無甚難者今欲諸經各立家法主注䟽而討論諸儒先之説附焉以易詩書為一科子午年試之周禮儀禮及二戴禮為一科卯年試之春秋三傳為一科酉年試之皆兼大學中庸論語孟子論則分諸子為四科分年附焉策主諸史時務傅焉將士無不通之經無不習之史德成材達而可為當世之用若學校之師必遵仁宗之制選士之寔有道德可為師表者為學官而久其任使講明道術而裁减觧額舍選謬濫之恩獨使為之師者考察其德行之寔以聞而命之官則大學之教不虚而懷利干禄之流自無所為而至矣文公此語可為百世法崇禎六年癸酉二月初三日諭祖制設科取士專為致治求賢近來士習日偷舉貢失當真才鮮少理道不張由督學敎諭訓導各官董率乖方培養無術盡失舊制初意以致朝廷不獲收用人之效朕思士子讀書進身乃人才根原必宜首重德行幼學壯行如生平果係孝悌亷讓自然做官時不貪不欺盡忠竭節何必專工文藝據㑹典及提學敕書内敦尚行誼以勵頽俗不專論文優劣開載甚明近來通不遵行至小學諸書乃州縣各有社學原欲養蒙育德敷敎儲才近來全不講論興舉其士子自童時入塾以迨應試登科只以富貴溫飽為志竟不知立身脩行忠君愛國之大道如此教化不行士風吏治安得不日趨卑下朕惟祖宗朝求才用賢原不盡拘科目至考試文義正欲因言徵人亦非專尚浮詞務華遺實今欲祗遵祖制起敝還醇童生必先入學遇試先查德行自儒童以及鄉㑹須有實蹟方許入塲異日敗行考官挨論又教官為士子師長化導最親舊制甚重近皆以衰庸充數教術全廢此尤士風不正之源今設法興起着吏禮二部同都察院及該科詳議明確具奏至海内之大豈無潛脩碩德純孝鴻才清志剛方實堪大用者更宜特拔一二以示風勸至於科道不必專出考選館員應令先歴推知并着酌議來行宗伯黄汝良䟽竊惟臣等頃所條奏文體欵項不過科塲之防維時文之針砭耳茲恭捧綸音臣等闡繹再四仰見我皇上端夲澄源至意洞晰古今有非臣等愚陋所及敢一對揚而敷陳之按周官以鄉三物教萬民而賓興之先六德曰智仁聖義中和次六行曰孝友睦婣任恤次乃及六藝曰禮樂射御書數可見德行在六藝之先也孔門以四科程及門高弟首曰德行次乃及言語政事文學可見德行居四科之首也比及漢唐宋以制策詩賦經義取士雖䆮非古初然而賢良方正經明行脩之舉未嘗不相輔而行我國家因時變通設科試士程以制義分為三塲然高皇帝時首重德行意尤拳切如大誥有頒明倫有堂禮賢有館孝亷有舉天理行事有敕學宮有卧碑鄉約有聖訓褒節義之福壽黜失節之危素至處士有行誼如陶安王禕章溢陳遇等時加徵辟列聖相承率循斯軌所以三百年來士貴名節人重清修即應試之文多醇正典雅無非道徳所發揮即文章亦徳行也乃邇来習尚陵夷風俗靡敝行誼既乖文章亦舛禮義亷恥俱􅅓為贅談背公營私相沿為故事攘官則不勝其衆任事則鮮有其人甚至以紳佩而祝閹祠以衣冠而降盗賊世道人心敗壞至此極矣宜聖心穆然有徳行之思也竊謂取士固宜先徳行而尤貴在豫養方今士習久錮驟挽為難則惟有豫養一法耳董仲舒有言不素養士而欲求賢譬猶不琢玉而求文采也在易之蒙曰山下出泉蒙君子以果行育徳伊訓列三風十愆以儆有位而總其要曰具訓於蒙士葢豫養於蒙則教易入而徳成以之脩身則自可以果行育徳以之入仕自可免三風十愆所謂少成若天性習慣成自然者也古之教者家有塾黨有庠州有序國有學順序漸進無非先朂以六徳六行而後及六藝故曰行有餘力則以學文今之教者自少至長自長至壯所學習者皆咕嗶文藝之事所經營者皆富貴溫飽之圖一切登第為官竟不知徳行為何物無怪其四維不張而百事決裂也合無敕下臣部劄行各省直學臣刋為條教頒下府縣塾師俱籍名於官有能以孝經小學教育童蒙俾之入孝出悌幾幾小子有造者塾師榮以衣巾其子弟敗類而不戒戢者塾師有罰教官有能以規矩準繩表率子衿俾之飭躬勵行斌斌成人有徳者教官註以上考其生童入試須令州縣教官各取保結無過犯方准進塲有敗倫而失簡舉者教官與州縣官有罰至於提學一官尤為宣上率下機要必於文字外加意作興其諸生行誼著聞文雖平加以優等素行薄劣文雖工黜革示懲實能奉行敕書者查覆紀録如彰癉不明勸懲無法提學官有罰乃若舉貢生儒及山林隱逸有篤學不倦秉誼由𠂻砥礪潛脩志行邁衆者府縣官核實申之督學督學核寔申之撫按撫按核寔上之朝廷朝廷覈寔而旌表加焉其尤殊髙等者特加徵召如洪武中陶安等天順中呉與弼等故事果稱得人舉主紀録否則舉主亦與其罰至於廟堂廣勵有位尤當以徳行為先大抵進亷而黜貪抑競而奬恬貴名節重清議如孔門四科即言語政事文學猶其後耳如此則父兄子弟所朂勵者無非徳行之事耳目見聞所榮羨者無非徳行之人士風庶可挽偽而還醇世道庶可反邪而歸正夙習可祛而太平可幾矣𢎞治中王鏊制科議國家設科取士之法其可謂正矣密矣先之經義以觀窮理之學次則論表以觀其博古之學終之策問以觀其時務之學士誠窮理也博古也識時務也當復何求然行之百五十年宜得其人超軼前代卒未聞有如古之豪傑者出於其間而文詞終有愧於古雖人才髙下係於時然亦科目之制為之也夫科目之設天下之士羣趨而奔向之上意所向風俗隨之人才之髙下士風之醇漓率由是出三代取士之法吾未暇論唐宋以来科有明經有進士明經即今經義之謂也進士則兼以詩賦當時二科並行而進士得人為盛名臣將相皆是焉出則明經雖近正而士之拙者則為之謂之學究詩賦雖近於浮豔而士之髙明者多向之謂之進士詩賦雖浮豔然必博觀泛取出入經史百家葢非詩賦之得人而博古之為益於治也至宋王安石為相黜詩賦崇經學科塲以經義論策取士可謂一掃歴代之陋也然士專一經白首莫究其餘經史付之度外謂非已事其學誠專其識日陋其才日下葢不過當時明經一科耳後安石言初意驅學究為進士不意驅進士為學究葢安石亦自悔之矣今科塲雖兼策論而百年之閒主司所重惟在經義士子所習亦惟經義以為經義既通則策論可無竢乎習矣近来頗尚策論而士習既成亦難猝變夫古之通經者通其義焉耳今也割裂裝綴穿鑿支離以希合主司之求窮年畢力莫有底止偶得科目棄如弁髦始欲從事於學而精力竭矣不能復有進矣人才之不如古其實由此也然則進士之科可無易乎曰科不竢易也經義取士其學正矣其義精矣所恨者其途稍狹不能盡天下之才耳愚欲於進士之外别立一科如前代制科之類必兼通諸經博洽子史詞賦乃得預焉有官無官皆得應之其甲授翰林次科道次部屬而有官者則遞陞焉如此天下之士皆將奮志於學雖有官者亦翹翹然有興起之心無復專經之陋矣或曰今士之一經俱不能精如餘經何曰制科以待非常之士也以科目收天下士以制科收非常之才如此而後天下無遺才故曰科不竢易也謝鐸科舉議周子曰天下勢而已矣勢之至雖聖人亦莫如之何故由忠而質由質而文聖人非不知忠質之貴及其至也亦不得而不文然文勝至於滅質則夲亡矣於此而不有以迴幹之通變之以不失乎先王之意奚可哉葢自先王之政廢而民無恒産則無恒心無恒心則毁譽之口不勝其愛惡之私於是鄉舉里選之法不得不變而為後世科舉之制此勢也非得已而為之者也善因其勢者謂之隨時於是而廻幹通變之而先王之意存焉是故今科舉罷詩賦而先之經義以觀其窮理之學則其夲立矣次制詔論判而終之以策以觀其經世之學則其用見矣窮理以立其夲經世以見諸用是雖科舉之制茍於此而盡焉則古之所謂徳行道藝之教要亦不出諸此而其所以成人材厚風俗濟世務而興太平也亦豈有不及古之歎哉然考其歸則所謂窮理所謂經世者恒浮談冗説脩之無益於身心措之無益於國家甚者口夷齊而身蹻跖名伊周而跡斯鞅遂使科舉之學悉為無用之虚文暨其得而棄之也顧乃以吏為師以律為治視其昔之所習者曾筌蹄芻狗之不若噫是豈朝廷立法之意使然哉歐陽子曰三代以上治出於一而禮樂達於天下三代而下治出於二而禮樂徒然虚文然則文與道離而欲據一日之文以盡收夫有道之士不亦難矣乎雖然靜言而庸違者有矣未有不深於道而文能至焉者此科舉立法之深意而今之豪傑亦未必不由之以出是其所謂迴幹通變之機以不失先王之意者乎不然一舉而紛更之吾固未知所以善其後也禮科凌義渠正文體疏皇上深軫生民害政之慮功令日嚴士人久沿譸張變幻之風宿習難醒必明開條􅅃著為章程如川行之有隄防方足遏其横奔潰決之勢如車驅之有軌範方足正其詭遇獲禽之思不則泛泛悠悠即懲創亦已後矣謹擇其切要列為八條以候申飭一曰崇經孔子刪述六經垂訓萬世及門之徒皆心通六藝漢承秦火之餘以明經取士當時大儒若董仲舒劉向蕭望之軰皆兼通數經我國家雖分經取士然未嘗不貴其博雅淹通也葢天地閒名理畢具六經不惟大事業出其中節義文章亦莫能外今士人夲經業多鹵莽他經尤不寓目朝夕誦讀惟是坊肆濫刻何當施用若能大其精神研經味道文采蘊籍必有可觀從今塲中試卷必全塲能博渉經書融㑹㫖趣者亟收之其浮華不根疎淺無味者勿録也二曰依註傳註為六經羽翼當年大儒若二程朱子蔡元定胡安國陳澔軰皆精心理觧提要鈎𤣥闡前聖之窽奥惠後學以梯航聖祖頒之學宮為程士法式諸士體其成言自足發揮妙義何乃明棄師説蹈空求奇曏曲徑而背周行忽型范而幾躍冶悖違祖訓侮棄前修無怪一入仕途輙多不軌不物自今制義必準傳註其明為背謬者槩勿收録三曰切題夫有題然後有制義近日士人全無體認漫衍浮夸掩卷讀之不知何作夫無儀的而妄射雖中絲毫不為巧無根底而敷華即炫衆目總為妖服官不顧職業營私不顧身名此生心害政之左驗也自今試卷必須切題闡發有全不相蒙者雖工弗録四曰當體書曰詞尚體要制義有體猶身有五官雖貴神俊而位置不可顚越近日士子藐視矩矱恣意猖狂則顚倒甚也限字有格而或汎濫浮淫冗至千餘則駢枝甚也或題中虚字不過助語而牽纏不已則支離甚也又案牘俚言漫入聖賢精語則猥鄙甚也至割裂扳扯恢張髙大非其文義則荒唐甚矣皆體要不存踰閑蕩檢之先證也自今取士須準先軰法程違者不得混収五曰逹詞孔子曰辭逹而已矣言貴逹意也易曰風行水上渙天下至文貴自然也沈約亦云文有三易句易讀字易解使事易知近日有一種不可解不可讀文字實多暗澁不通而躭僻者喜之試觀唐虞三代及漢唐宋諸大家曾有此否即殷盤周誥閒近倔聱説者猶謂出於伏生年老之訛况其後新莽援之作大誥以欺世夫新莽之心術不可學新莽之文曷可學乎自今為文惟取逹意為上其晦澁不可方物者必斥不録六曰讀史夫名理具六經而行實載諸列史茍能廣搜博覽考古知今則事變糾紛自能洞觀其要故武侯云才須學也士人但知塾師窠塹自甘蔽塞聰明即歴代史書或難遍觀盡識而通鑑綱目何可不寓目經心從今試卷須遍閲二三塲必其洞晰古今博雅成章者方准收録若舛錯虚浮者縱首塲可觀必勿許録七曰革偽夫書有真偽㫖趣自别有識者何難鑒裁自經書列史外諸子百家其可供文薈撮者儘多近有一種偽書淺俗猥庸讀如嚼蠟所載帝王周孔之言不根經傳無識之人津津稱引之凡以飾詐驚愚誣民惑衆其於眞正莫大文章反蔑如也棄周鼎而寳康瓠擲隋珠而憐魚目此詐偽得售之象豈盛世所宜有乎自今士子不妨博極羣書而竄竊謬偽者必斥八曰識務語云識時務者在乎俊傑國家以文章取士正欲於毛頴閒覘其經濟邇來士子全副精神祗寄初塲至於後塲不過臨時輳砌一切世務原無講究主司鮮能留意眞才前塲取中始覔後塲前塲偶落後塲即有董賈眞才何由物色士之騖浮華而闇實用則始進之路然也自今取士叅酌後塲其有練習彞典通曉時務如天文地理兵農禮樂屯鹽鼓鑄律令河渠之類能舉大議而中機宜者即前塲不中亦亟收之若虚謬無當前塲可觀亦弗録夫文事必兼武備斯時猶為三年之艾諸士中有能演習武書及百將傳而能發揮中窽者猶當急收之逺而備中樞節鉞之選近可資郡邑保障之材在於遴擇者加之意云爾明初人才率得之徵聘洪武三年行科舉詔曰自洪武三年為始特設科舉以起懷才抱德之士務在經明行修博古通今文質得中名實相稱蓋創制之初原不拘拘以文義取天下士也六年罷科舉令有司察舉德行為夲文藝次之專用薦辟至十七年始定科舉制洪武三年定初塲止試夲經義一道限五百字以上四書義一道限三百字以上第二塲試禮樂論限三百字以上詔誥表箋第三塲經史時務策一道限一千字以上三塲後十日面試騎觀其馳驟便㨗射觀其中數多寡書觀其筆法端楷律觀其講觧詳説殿試時務策一千字以上最後十七年改定則初塲增經義三四書義二次塲去箋而増五判三塲增策四篇而面試廢矣洪武閒定應試功令四書義主朱子集註經義易主程朱傳義書主蔡氏傳及古註疏詩主朱子集傳春秋主左氏公羊穀梁胡氏張洽傳禮記主古註疏後以其説不足以盡聖意乃於永樂中纂四書五經大全皆令主之今學者不能博聞平生未嘗閲大全况註疏乎乃毎申嚴新説之禁并出入於大全者皆以為異説近日士子愈不務實學遂自傳註之外一無所知習書者且不知有註疏習禮者亦唯知有陳氏集傳而不知古註疏習春秋者墨守胡氏渉獵左傳之外公羊穀梁且不閲而張洽直不知為何人矣元人虞集曰國家傳註各有所主者將以一道徳同風俗非欲使專門擅業如近代五經學究之固陋也聖經深逺非一人之見可盡試藝之文惟其髙者取不必先有主意若先定主意則求賢之心狹而差自此始矣薛瑄天順元年㑹試録序今皇上膺天命光復寳祚紀元之春適當㑹試之期天下士領薦書而至者葢三千餘人禮部左侍郎臣榦等以考試官請上命臣瑄臣原往蒞其事同考官臣溥臣賢臣泰臣正臣佖臣恂臣世資臣節臣淳臣鏞監試御史臣烈臣鑑暨百執事罔不夙夜祗承凡三試得文之中程式者若干名并擇其文之尤粹者彚成録臣竊惟為治莫先於得賢飬士必夲於正學而正學者復其固有之性而已性復則明體適用大而負經濟之任細而釐百司之務焉往而不得其當哉故三代小大之學飬士之法皆以復性為夲其得賢致治之效葢可考矣漢唐以来正學緒㣲飬士不夲於復性往往溺於雜學術數記誦詞章之習體有不明用有不周雖或有傑出之才亦不過隨所學以就功名而已其視三代之賢才何如哉至宋道學諸君子出其論飬士之法始皆夲於復性雖其説不得盡行於當時而實有待於盛世洪惟天眷皇明列聖相繼大建學校慎選師儒其飬士之法必以三代孔孟程朱復性之説為夲是以九十餘年薄海内外文教隆治士習粹然一出於天理民彞之正而雜學術數記誦詞章之習剗刮消磨無復前季之陋雖曰科目以文章取士然必根於義理能發明性之體用者始預選列類非詞章無夲者之可擬也故其得賢致治之效足以追隆前古今諸士子荷朝廷正學教飬之恩既以有夲之文得在選列行見對於大廷益當以明體適用自勵隨所器使以忠乎國以愛乎民以賛助皇明重熙累洽之治於無窮俾正學得賢之效有光於前有垂於後顧不偉歟三百年試録以此為第一而文清學問備見於此恩例恩詔各從其類上慈闈徽號則有封贈父母恩立東宮則有廕子入監恩災異修省則有蠲逋減刑恩登極則大赦矣立中宮及東宮出閣皆無恩例若建大工平大賊誅大姦亦有詔皆以類行惟蠲逋減刑毎詔有之洪武至宣徳六十八年間登極立東宮中宮及上慈闈尊號徽號詔皆無文武官封贈廕子試署寔授恩例英宗登極詔始令署部都督僉事都指揮署都指揮僉事指揮寔授景泰登極詔始令在京文官及在外方面官一考無贓犯者照洪熙宣徳年例與誥勅景泰三年立懷獻太子詔始令署郎中員外郎主事試中書寔授又與土木死事諸臣誥勅封贈廕子入監不願入監者聽天順復辟詔始令内外文武署職試職因功陞授者與寔授天順八年兩宮徽號詔始封兩京文武七品以上官父母署職試職寔授成化二十三年上慈闈尊號詔兩京文武官七品至四品先封三品以上與誥命泰陵登極詔内外文武署職試職實授内外武官天順八年正月以前功陞試職署職遇例寔授該世襲者子孫仍襲其未寔授及以後功陞試職署職寔授𢎞治五年立東宮詔文武官試職署職年半以上者寔授不及年半者扣至實授𢎞治十一年清寜宮灾詔兩京文武署職試職理刑者寔授歴任未及一考者與誥勅其誥勅准給未領因事降調非貪淫酷刑者仍給與𢎞治十八年上兩宮尊號詔文武官署職試職寔授兩京七品以上文官未及一考與誥勅父母已封者服色許與子同世宗登極詔正徳十四年文武官員人等因諫止廵遊跪門責打降級改降為民充軍者該部具奏起取復職酌量陞用杖斃者追贈諭祭仍廕子入監讀書充軍故絶者一體追贈諭祭復飬親屬嘉靖元年尊號詔兩京文武未一考者與誥勅父母已封者服色許與子同誥勅准給未領因事降調非貪淫酷刑者仍給與嘉靖九年大報禮成詔兩京文官未及一考無過者給與誥勅嘉靖十九年皇子生詔始令兩京三品上文官例該廕子未及一考者廕子入監兩京文官未及一考者在外七品以上歴任三年無過者與誥勅文官五品以上武官四品以上署職試職者并試職御史實授仍與誥勅十五年立東宮詔兩京三品上文官廕子兩京文官未及一考者在外七品以上官歴任三年無過者與誥勅兩京文武官署職試職寔授仍與誥勅十七年郊廟大禮成詔兩京文職並在外五品以上方面有司四品官未及一考者與誥勅兩京文武官并新舊武舉官署職試職寔授仍與誥敕十八年立東宮詔兩京文武三品上官與誥勅廕子二十四年宗廟成詔兩京文官未及一考者與誥勅署職試職仍與誥勅願貤封者聽崇禎登極詔内外文武俱給誥勅新科進士許令授官後即給封典崇禎己卯三月追崇孝純皇后尊諡為皇太后在乾清宮行禮旋奉神位於孝先殿有封贈恩典然歴朝生母多先尊為皇太后後加尊諡為孝某皇后今先尊為皇后而改為皇太后以皇太后神主與光宗並列非禮也一時禮官將順圖恩典竟無言之者諡法洪武中諡法皇后太子皆二字諸公侯及外藩亦二字親王一字要皆太祖親定明明以二字為重矣然略無差等義所未安太祖豈見不及此亦知千秋萬歲後必有加增姑留之待後人而不私其子曰荒曰愍誥文中皆有貶詞慎重如此雖有詔賜諡者禮部行翰林院定擬請㫖亦立法當如此自下而上以示公論亦未甞分如何為一如何為二也永樂中郡王始二字推之羣臣大約以二為常以一為特説者謂親王隆重如廟諡十六字歸重只在末一字以特為尊果爾則以後太子何以又皆二字耶總之大聖人作法後人仍之不敢改畢竟以多為貴所謂一字王二字王者亦俗説也陸子淵深以貞愈於正唐室諡文貞者魏徵宋璟楊綰庶幾焉蘇瓌有餘愧矣宋室諡文正者司馬光范仲淹庶幾焉王旦有餘譏矣矧夏竦乎卒無文貞避廟諱也明諡文貞惟楊士奇文正則李東陽謝遷也諡忠文者李時勉諡文忠者曹鼐楊廷和張孚敬張居正國制一品羙惡兼諡二品以下賢者得諡則易名之典在一品者最多難更僕也諡法兼用羙惡洪武中魯王諡荒伊王諡厲後專用羙諡文臣有諡自建文朝王禕諡文節始詞臣得諡文亦有不拘者劉基王守仁文成張益文僖馮京文簡姚䕫文敏黄孔昭文毅周忱唐龍文襄魏驥文靜呉訥楊亷耿裕文恪儲巏文懿葉盛邵寳王鴻儒文莊鄭賜文安孫應鰲文恭何喬新文肅苖𠂻文康李奎文通劉宣文懿蕭維禎文昭儀智何孟春文簡王道文定顧憲成端文詞臣不諡文者曾棨馬愉孫賢許彬襄敏楊鼎莊敏儀銘忠襄盛端明榮簡王文毅愍陳文莊靖朱希周恭靖許進襄毅四品以下官而得諡者僉都御史楊信民恭惠少詹事劉鉉文恭祭酒宋訥文恪李時勉忠文陳敬宗文定鄒守益文莊太常寺少卿李奎文通劉儼文介俱四品翰林學士朱善文簡胡廣文穆呂原文懿侍讀學士張益文僖兵部郎中楊繼盛忠愍長史朱復忠定張景明恭懿俱五品中允徐善述文肅贊善王汝玉文靖翰林待制王禕忠文侍講劉球忠愍脩撰羅倫文毅舒芬文節贊善羅洪先文恭俱六品御史鍾同恭愍七品布政陳選恭愍憲副毛吉忠襄周憲節愍馮傑恪愍許逵忠節知府岳正文肅知縣鄧顒恭毅已諡而後改者王禕文節李時勉文毅俱改忠文張王忠顯改忠武孫忠襄靖改恭憲朱永武襄改武毅曹鼐文襄改文忠于謙肅愍改忠肅石珤文隱改文介張治文隱改文毅殷士儋文通改文莊已諡追奪者張居正文忠吳時來忠恪李燧恭敏盛端明榮簡王世貞諡法考序每故事大臣卒禮部以諡請報俞矣則内閣以二字三請於上而自擇之是以具釋義也洪武之尚為吳也諸功臣死事有勞而夭者皆榮公侯之爵而傅之諡終髙帝世文臣弗得也武臣都督弗贈侯伯弗得也至建文而待制王禕得諡文節矣文臣之有諡自禕始也其諸小臣者亦自禕始永樂之制嚴矣終太宗世文臣之得者僅姚恭靖廣孝胡文穆廣而恭靖之爵則公也文臣之有諡僅文穆一人也洪熙初始大合故臣凡勞於國誼於清宮三品而上易名者十餘人而後文臣之諡廣然宣英之代猶斤斤焉持其柄而弗輕予且夫魯王愛子也秦王次嫡子也髙帝命之曰荒曰愍而登之冊曰不敢以子故而廢天下公其於宗室諸子王尚有評也文臣之有榮願也則瑕弗掩也文榮之以爵也文愍之以事也庶幾寓貶矣婦人之有諡也自后妃而外則死節也公主之有諡也自仁宗之悼愛女始也乳媼之有諡也自宣宗始也乳媼之夫之有諡也亦自宣宗始也方士之有諡也自世宗始也諡而四字淫矣而使方士得之則益淫也當世宗之季吾又得二事焉夏文愍之持秉則同列皆中諡及身以罪死易世而後牽復所得者中下諡也繼而嚴氏之持秉則其子為市焉非上所甚注懷者必賄而後得不賄不得也即得之不腆不上諡也及身以罪竄削弗諡也夫諡者人主之春秋也尊則稱天以命之不尊則與天下共隲之而奈何為大臣修怨賈利地也然則如之何其必略採唐宋故事遇大臣以諡請有俞㫖則翰林之司篆者為議而定二諡焉以授禮科科詳之復議而上之閣臣復𠂻而取上裁凡文臣二品而上及勛親臣公必諡侯伯之涖軍府加保傅必諡諡兼羙惡二品以下自卿佐以迨庶僚有徳行政術者亦有諡諡則言官請之禮部裁之有羙無惡可也禮部侍郎郭正域嚴諡典以重公評疏臣惟議諡最難而議諡於數十年之前尤難葢棺甫定則輿論方新而是非有據墓木已拱則口碑漸逺而黒白常淆故當日與諡易今日補諡難得謚榮也而補諡尤榮中之榮其法不得不主於嚴當日不與諡易今日奪諡難不得諡辱也而奪諡尤辱中之辱其法不得不主於恕今臺臣疏應議者七十餘人科臣䟽應補者十五人臣等參詳各衙門之評品而符以故老之傳聞證以累朝之實録就不肖之中而汰其甚必大犯清議有罪可指無功可贖而後議奪就賢者之中而㧞其尤必卓有完名其心表表其行錚錚而後議補凡應奪者四人為許論黄光昇呂夲范謙溢羙應改者一人為陳瓚應補者未經題諡則五人為伍文定吳悌魯穆楊繼宗鄒智已題未給則二人為楊源陳有年此外若徐階媚事嚴嵩人議其謟田連阡陌人議其富而乘時樹立能收鼎革之人心胡宗憲結嚴世蕃而廣貨賄人議其邪阿趙文華而傾督撫人議其險而計獲渠魁則除東南之禍夲張瀚俛仰時宰人議其庸而未路庶乎知止余有丁繩矩或踰人議其蕩而此中亦無他腸陸光祖機權時出人議其姦而宦蹟自多磊落以上諸臣列之當奪當改之科似太苛刻臣未敢輕議也若毛伯溫諭服安南兵不血刃而或謂其功非已出張元禎潛心理學抗䟽經帷而或謂其早不見幾郭希顏攘臂逆鱗横被大戮而或謂其考察罷官建言可已劉臺抗節敢言殺身遐壤而或謂其邊功被詰先發制人以上諸臣列之當諡當補之科似少精覈臣等未敢輕許也又如孟秋之孤介張元忭之恬退李遷陳格之清修事蹟未能臚列而衆議間有異同所當留之以俟異日論定者也至於臺臣科臣二䟽所未及夲部原冊姓名所未載尚多偉人應諡而未得亦有匪人不應諡而倖得者在原議之外又當從容採擇公論上聞以補遺漏者也夫自刑賞之窮而有諡故諡重自諡之窮而有奪諡補諡故今日之議尤重臣等上矢天日下矢方寸以看議之職掌從類奏之公評期於予者奪者改者補者各無憾於九原之下而已若夫予奪相形忮怨叢集業已甘心任之不敢避也崇禎十五年禮部覆科臣張國維議䟽察得原䟽請諡舊例五年一舉當時已缺至十二年而今又遲十年矣自古帝王治天下惟有賞功罰罪而諡則賞罰之尤大者也近日名教不靈亷恥道喪不知忠孝節義為何物則諡法真勵世磨鈍急務也除鄒元標忠介馮從吾恭定顧憲成端文王徳完莊毅趙南星忠毅髙攀龍忠憲楊漣忠烈諸臣理學事功忠諫節義皆一代之最已經賜諡外據科臣䟽首言革除諸臣次言軍功而於㑹典所稱節槩勲猷二語尤至愼焉大要節槩以死忠為上如革除中卓敬鐵鉉景清方孝孺諸人不待言矣近之忤璫如左光斗周宗建等抗直如孫承宗盧象昇等殉賊如傅宗龍等指尚不勝屈也勲猷以軍功為上如萬歴中平哱平播平倭三大案文武功多可書近日之何可綱曹變蛟以功兼死尤為慘烈指亦不可勝屈也而有宜申飭者三焉先臣邱濬謂諡兼用羙惡王世貞亦曰髙皇帝於子秦王諡愍魯王諡荒况臣下乎竊謂文臣二品以上皆宜諡勛戚凡在功列亦宜諡侯伯必涖軍府有功方許諡諡皆兼羙惡二品以下即庶僚有節烈勛猷卓然不朽者亦可諡不然官雖貴不諡則陳乞可清也唐宋諡議掌於太常博士國初令禮部行翰林院擬奏今宜先以其議責之太常臣部與吏禮兵各科核定而閣臣詳加折𠂻始取上裁則事出於公衆論可服也五年一舉雖有近例然人品邪正萬目難欺葢棺論定即可與諡不宜少待致有沉埋則風勵可速也至發單博訪聽各衙門開送固為詳慎而彼此稽延終至躭閣既有部科及太常之議似亦無敢濫狥者茍有不當聽科道各官糾舉誰敢私之勵世磨鈍寔在此矣喪制明初大喪禮今所遵者皆仁宗之遺詔非二祖之遺詔也太祖則皇太子親王世子郡王及王妃世子妃郡王妃公主郡主内宮人等俱服斬衰二十七月臨朝視事則素服烏紗帽黑角帶在京官員日朝晡哭臨至葬畢而止仍自成服日為始服二十七日而除成祖則宮中自皇太子以下成服日為服斬衰二十七月而除親王以下如洪武在京官員朝夕哭臨七日又朝臨十日自成服日為始服衰服二十七日凡入朝及衙門視事用布裹紗帽重帶素服腰絰麻鞋退服衰服二十七日之外素服烏紗帽黑角帶二十七月而除命婦二十七日而除聽選辦事等官服衰服監生吏典僧道人等素服以成服日為始各二十七日而除軍民素服婦人素服不妝飾俱二十七日凡音樂祭祀官員軍民人等並停百日男女婚嫁官員停一百日軍民人等並一月寺觀各聲鐘三萬杵禁屠宰四十九日仁宗則皆二十七日釋服諸王世子郡王及王妃郡主以下並服二十七日而除朝臨十日者皆為七日在外則哭臨三日之外更不朝臨無禁嫁娶音樂自聞喪日為始不鳴鐘鼓在京禁屠宰十三日然歴朝皆無嗣皇帝用以日易月之文惟正統七年皇太后遺誥以日易月哭臨三日即止君臣皆同故神宗於慈寜喪服素者三年所以為至孝顧起元喪制論前代服制未有定式我聖祖謂其君牽制文義優游不斷於是作孝慈録立為定制子為父母庶子為其母皆斬衰三年嫡子衆子為庶母齊衰杖期大哉王言自是人子得申其罔極之情而從來短喪之謬論與拘儒之曲説可廢而不談矣服制圖子為繼母為慈母為飬母皆斬衰三年為嫁母出母為父卒繼母改嫁而已從之者皆齊衰杖期為繼父同居兩無大功之親者服齊衰不杖期為繼父先曾同居今不同居者為繼父雖同居而兩有大功以上親者皆齊衰三月於是以恩服以義服以名服三者曲到周盡無毫髮遺憾於人心此所以明天倫正人紀順人情為萬世不易之經也貽安堂集云三年之喪金革無避葢魯公伯禽有為為之也而後世臣子多藉口焉此大謬不然伯禽一國之主也寇在門庭而宗廟社稷存亡係焉故權制可從耳若夫疆塲小警非闗大故師濟多士不乏一人詎可妄援國主墨衰即戎故譚司馬綸楊中丞鎬皆名教之罪人也何况端揆元宰儀表百僚當太平無事之日而儼然冠裳苫塊時哉宋劉公珙固辭召命曰身在草土之中國無門庭之寇而假起復之名以竊利禄之實切中奪情之謬矣愚則以雖寇在門庭奪情亦謬宋末九鼎將遷三靈將改而謝疊山猶力詆當時起復者至謂宗社之所以為邱為墟生民之所以為血為肉寔由於此三年通喪古制極嚴自漢文帝命以日易月而臣下亦因之如鼂錯父死旬日而尚以御史大夫調兵食翟方進後母死三十六日而復起治丞相事唐右僕射房元齡中書侍郎蘇頲張九齡宋參知政事寇準皆奪情起復此外亦不多明初極重此制以劉基宋濓章溢當帷幄風憲之重於天造草昧之時而聽其終喪了不之强永樂急於事寄中外臣僚始有奪情不丁憂者或有於制中起用久之漸侈為得意恬不為異成化中羅公倫有扶植綱常一䟽詞意凛然所禆於名教甚鉅邇年大臣多奪情起復恬不知怪得羅一峰一䟽振已淪之名教覺久昧之良心此大有闗係文字且即以綱常二字為主而反復發明之親切確當若鄒南臯䟽則入江陵他事而大意亦與一峰同江陵丁外艱給事中陳三謨御史曾士楚上䟽請留於是翰林趙定宇用賢呉復菴中行部郎沈繼山思孝艾熙亭穆進士鄒南臯各抗䟽糾論廷杖黜謫有差嗟乎㣲五君子舉朝皆無父之人矣而南臯往視四公杖畢乃出䄂中䟽上之慷慨赴義尤不可及云崇禎十一年黄道周糾楊嗣昌不守制䟽臣觀古今治績其典章法度雖受於先王誼不敢改至於事窮理極亦時變通以盡其神惟綱常所繫為臣敎忠為子敎孝垂萬世憲本於民彞不可易也禮三年之喪君命不過其門兵革鑿凶時出戎右不施於士大夫宋時武弁如田况岳飛皆纍乞終制皇太祖以劉基宋濓帷幄之任特聽其奔喪嗣後雖有奪情終違物論嘉靖中年以北邊孔棘起楊博於宣大還翁萬逹於夲兵然其時楊博且禫矣又以夙歴移近雲中翁萬逹以尚書降左侍郎棲遲不十日墨衣視事世宗心非之卒罷閒以去葢自是非終喪不稱起復也張居正以不守制損其勲名是後七十年士夫守法邊鄙亦無事天啓末年袁崇焕冒起於右屯崔呈秀靦顔於樞府身膏斧鑕貽唾西市今去幾何時而士大夫蒙面喪心營推營復嗟乎天下無無父之子亦無不子之臣衛開方不省其親管仲至比之豭狗李定不丁繼母憂宋世共指為人梟今遂有不持兩服坐司馬堂如楊嗣昌者臣前三月在經筵見其吉服應召疑已終制今乃未然自嗣昌秉樞亦垂兩年矣不知其何時居喪何人推轂而顚越至此自有嗣昌而海内無行蒙垢貽旤其親者皆擲塊投杖思攘節鉞之柄嗟乎人心之喪亦遂至此乎陛下克巳省躬以禮樂忠孝治天下遇有小小災眚輙減膳撤樂素服避殿以勵羣臣所以然者陛下為天之子也天有違行三辰不輯猶之父母温凊不寧則人子為之引痛不櫛不沭不食不寢以候父母之平復陛下之減膳撤樂素服齋居所以敎孝也又况於為人臣者其家父母不幸委棄而儼衣冦擁輿從飛揚喑咤抗顔僚友之前此豈人理之所應有也乎今宣大督臣盧象昇父殯載途不視含殮搥心飲血以候奔喪而廷臣動推闊逺難移之人以緩其事臣見邸抄象昇所請附近撫臣權攝其事於理可通今又忽有并推在籍守制之㫖夫使守制者可推則是聞喪者可以不去也聞喪者可以不去則是為子者可以不父為臣者可以不子也陛下以日月拂經星辰凌犯煇氣違和尚下詔求言引躬克治明示天下以君臣父子皆受於天禮樂政刑之所從出毫無可替而人臣以哀毁不祥之身決裂馳驟彼此相煽以玷陛下仁孝之治於天地綱紀之常是不宜使天下聞見之也天下人材固自不乏疆塲中外尚可料理即使人材甚乏疆塲甚廹當旁求中外誠信不貳心之臣而用之奈何使不忠不孝者連苞引蘖種其不祥以穢天下乎治天下之道無他不過正綱紀審法度汰濁揚清舉直錯枉當於民心而已民心當則天心悦天心悦則隂陽調風雨時雖有風塵之警如豺虎逸於原田田父乘墉而射之矣不得已相其要害耑力注之使忠臣孝子鼓勵四方衆志可城也諸忘君親營富貴射生刺飛者豈有毫末利於朝廷而建官以餌之耶凡人遺其親必不利於君壞於家必無成於國語云千人所指無病而死楊嗣昌在事可二年張綱溢地之談款市樂天之説才智備睹矣更起一不祥之人與之表裏指梟指鳦説夢描風猶狼狽之獸倚肩俱走無從施其鞭策又何益於負重乎陛下事事欲卓越今古又以經學範圍縉紳家庭小小勃稽尚以法治之而冒喪斁倫諸臣獨謂無禁臣雖至愚竊以為不可也修撰劉同升綱常大義䟽臣備員侍從待罪二年每見皇上至孝永慕廟祀敬誠頒行孝經小學風勵天下聖人心思上同堯舜臣仰窺淵源宣𢎞敎化竊惟中國所以為四方觀望賴有倫紀以為之維也是謂大經原夲大經變通其制使倫紀之立萬世勿墜是謂大權權者權乎其經未有離經而言權者也是故孝子有終身之喪而聖人制三年之禮非過於情之禮而不及於情之禮也縱有弗類必無毁制而忍於其親天性然也臣於楊嗣昌有不忍言而不容不言者敢昧死為我皇上陳之臣官史官也依阿腆䏰以附閣臣則媿良史上負聖明下負所學日者策試諸臣簡用嗣昌良以内外交訌宵旰焦勞如人亟欲疾去雜試諸方以冀一效聖明之用心亦甚苦矣都門喧傳謂嗣昌縗絰在身姓名不祥非若軍旅可以凶事行之也臣所以隱忍未發意嗣昌亦人子也良心不沒父死謂何必且哀痛惻怛上告君父辭免綸扉庶幾善承聖意曲盡輿情夫邦政之權亦非輕於揆地也辭綸扉而掌邦政亦可效於時艱也何乃循例再䟽遽入辦事服緋安忍叛禮滅親垂之史冊萬世唾詈傳之邉徼荷戈竊笑以謂國家乏人如此大臣自處如彼何以彈壓倔强之氣折服窺伺之心哉夫人有所不忍而後能及其所忍有所不為而後可以有為臣於嗣昌以其所忍覘其所為嗣昌之心失而智短也臣已逆知其後已何也成天下之事在乎志勝天下之任在乎氣志敗氣餒鬼神瞷之必有非恒之災動乎四體病則為狂魄已先奪如此其人即欲有所用於天下而必不能有所用於天下明矣嗣昌清夜平旦試一捫心何以對其父鶴志氣餒敗不知何如即廷辨飾非盡昧本心而清夜平旦亦必痛心疾首悔其志之短而心之失也嗟乎彼其之子自忘其父而臣猶責之亦不足責之甚也且嗣昌自號聞人豈其見不及此無奈伎倆已窮茍且富貴兼樞部以重綸扉之權借綸扉為觧樞部之漸和議非他票擬繇已將與方一藻髙起潛數輩結連邊撫敷同罔功掩敗為勝歲糜金繒立心如此何所底極獨不畏堯舜在上共驩誰欺而欲以袁崇焕之故智用於此日不見皇上之處崇焕不動聲色而忽奮乾斷乎曩是皇上切責而嗣昌不可以為臣今又一旦忽易墨縗而嗣昌不可以為子若猶附和黨議緘口全軀不惟臣以為不可天下後世皆以臣為不可臣不及逺引古昔近如李賢奪情人望頓失張居正奪情身名不終夫物未有本寔先撥而傾折不隨之者也豈非志敗氣餒已事之明證哉國家亦何頼焉當賢居正時抗言而犯其鋒者先臣羅文毅倫鄒忠介元標是二臣者初入班門直節報主臣生二臣之鄉志二臣之學當言不言顔面何施且臣念及先臣應秋而不禁哽咽沾臆也先臣起家及第五載講幄䟽納忠爭册立講冠婚東封議起力排和事後先忤姦輔申時行趙志臯遂嗾羣小陷以不測皇考深憐忠直皇祖特鑒清操得免身家之危卒至憂憤而殞伏遇皇上登極賜諡文節臣一介書生欽蒙皇上特恩親裁進士第一寵錫隆盛感激涕零父母髪膚竭盡思報臣之一家皇祖所保全之一家也臣之一身皇上所生成之一身也兢兢勵志惟恐有負知遇欲尸黙充位義之所不敢出也瀝血拜䟽冒犯新參罪無所逃然生死榮辱皆是致身之地臣亦遑恤其私也伏乞皇上廣擇芻蕘折𠂻典禮勒令嗣昌終喪守制庶幾綸扉不玷倫紀無斁編修趙士春扶名敎䟽臣草茅賤儒世受國恩蒙皇上㧞置上第授臣史職二載於兹感恩自勵中夜以思今時事多艱人情積玩外敵内寇餉匱兵單豈獨一時諸臣才力不堪驅策哉良由功名之計愈工而忠孝之性未至故也樞臣楊嗣昌墨縗涖事拮据罔效荷皇上特達之知簡入綸扉使嗣昌而猶有人心者當念代言非金革之比累朝有糾正之條聖經賢訓昭布森嚴自應力辭新命矢報中樞乃讀其勉承恩命一䟽計較於歲月久近之間絶無有哀痛惻怛之念遂儼然服緋到任聖人之言曰食稻衣錦於汝安乎臣於是歎嗣昌之胸無天倫目無清議而忍心害理舛悖一至此也伏誦聖祖六諭必先父母皇上初政首闡孝經在閭巷猶欲教以人倫豈端揆可先容其掃棄臣又考之祖訓國初陞六部尚書正二品以中書之事分𨽻之是今之尚書猶宰相也景廟之朝于謙孝廟之朝劉大夏倚毗親切未嘗以東閣處之葢以六卿之職展布有餘名位未嘗不足故也今即使嗣昌而果才也司馬之堂儘堪報効何况紙上𠞰撫無救民生局中􅅃賞坐傷國體業於封疆無補豈云幾務可參將來幾務為重必反謂封疆可卸徒以梯榮之計遂其卸擔之謀既無以責嗣昌之成功又無以作滿朝之忠孝臣所謂不如還樞臣之職以維名敎者此也然臣於是更有進者仰窺我皇上軫念時艱求賢若渴不得已而破格用人奪情起復者寔由人才缺少之故然臣以為天下未嘗無才而皆向來大臣不肯寔心講求之過夫無事不講儲才有事輕言破格終身之職業未見他竒而一日之機縁已蒙倖進此豈可謂用人無弊之道哉臣謬懷管見不遑詳舉敢以一二為皇上陳之今時事最急無過兵餉屈指中外但得數十人而天下之事集矣督撫者治兵之人也得其人以聽之夲兵則鎮戎道將可次第問也布政使者理財之人也近来視為監司常缺而不精求其選計無誤於此誠得其人以聽之司農則屯鹽鼓鑄可覈寔舉也凡此數十人者其始莫若責之大寮之保舉而又非泛然舉之也宜倣古周官六計分其科目而辨論之如所謂亷而敏者理財之選明而決者治兵之選是也得其人而衆皆曰賢付之中外職掌可也得其人而不敢遽信其人則但置之班行時賜接見敷奏明試深觀而熟察之常使所儲之才多於所供之職又安用此縗絰之夫宣勞王事於是明著令甲永禁奪情綱常名教昭然白日豈非大聖人立法超出尋常萬萬哉臣所謂亟應講儲才之法以禁奪情者此也臣新進孤立何敢輕凟宸聽惟是結髪受書臣父隆羙嘗敎以臣祖先臣用賢當神祖初年輔臣張居正蔑倫起復臣祖慷慨建言為鄒元標諸臣之倡幾斃杖下腊其敗肉以示子孫臣愚陋敢背家學而忘先訓如今者坐視樞臣蒙面入直綱常掃地而囁嚅不言是上負堯舜之主而下忝所生矣有臣如此又安用之冒昧愚忱罪無可逭伏乞聖明垂照焉南京御史成勇倫常萬古為重䟽臣竊惟天地所以不毁者人為之維也人類所以不絶者禮為之維也故記曰禮也者猶體也體不備君子謂之不成人聖人作為禮以教人使人知所以自别為禽獸者禮而已矣禮莫大於倫倫莫大於君親未有不知有君親而可以齒於人類者也今夫繩樞甕牖之子匹夫徒歩之人有人焉指之為無君無親則怫然作色何也恐不可齒於人類也况儼然秉國之軸四方是維天子是毗者而肯認其名乎臣謂欲避其名當無其寔茍寔之有而名是避又從而箝人之口廟堂即不議之草野得而議之薦紳即不議之庶人得而議之當時即不議之後世得而議之白簡之糾彈可箝青史之斧鉞可箝乎臣始謂輔臣楊嗣昌不知有君親之人也固不敢以忠孝責之今嗣昌䟽中有仁不遺親義不後君之語反覆辨論無非避不忠不孝之名是嗣昌猶知有君親也猶可以忠孝之言告臣不敢勦襲他人之説但就嗣昌之䟽以詰問嗣昌可乎嗣昌謂古之君臣列國之君臣可得而避今之君臣一統之君臣無所逃於天地之間是三年之喪可行於古不可行於今也不知嗣昌所引者何古所指何臣所據者何代之經所遵者何國之典豈非聖諭所謂另一邪説者唐虞三代未聞有奪情起復之事固勿論漢唐宋皆一統也有宋去今未逺即以宋言之遵禮經而不起復者富弼劉珙也循故事而起復者陳宜中賈似道也嗣昌將以富弼劉珙為忠乎抑以宜中似道為忠乎嗣昌雖巧文辨慧必不敢以富弼劉珙為非而以宜中似道為是宜中似道固無所逃於天地先得嗣昌之所同然矣不知富弼劉珙當時安所逃乎信如嗣昌之言是天下凡為臣者皆不當終三年之喪終則為後君為不臣先聖之詩書可焚先王之典禮可廢不舉人類化而為禽獸不止也留一嗣昌而生天下不臣不子之心何如去一嗣昌而樹萬世為臣為子之鵠嗣昌之妄為附㑹而不讓謬為飾説而不辭者豈自以一身之去留係社稷之安危而為天下所無乎將嗣昌之學術天下無耶嗣昌之經濟天下無耶嗣昌之品望天下無耶忠孝之㫖不明無問其學術矣秉樞兩年一籌莫展邊警頻告流氛披猖無問其經濟矣清議不畏名敎不畏經典之詞不畏萬世之公是公非不畏無問其品望矣嗟嗟嗣昌去則所全者亦大既盡子道亦完臣節不去則所失者亦大既為今日之賊子而敢於排羣議必作他日之亂臣而敢於變舊章最可異者嗣昌既不知有親矣又執猶子之義事程國祥三十年者何也豈非為其父之同籍乎讓行讓坐何此時猶知有親欲廢朝廷之禮以伸其私情也政孟子所謂不能三年之喪而緦小功之察放飯流歠而問無齒決者此臣之所大惑也臣極知言一出而禍隨而不忍嘿嘿者臣蒙皇上特恩改置言路是以言責臣也君有責於其臣臣有死於其言事闗綱常倫理者不言更有可言者乎此臣寧冐犯天威以明受禄不誣之誼不敢承順意㫖以長指鹿為馬之奸臣不識忌諱出語戅直鼎鑊斧鑕臣所願甘伏惟皇上鑒其狂瞽武陵聞喪不奔衣緋到内閣大學士任六垣例有公揖比出遂具公䟽糾之及黄宫詹之䟽上即召對宮詹言奪情之事在兵部猶可在内閣則不可在一人猶可又引一不奔喪之陳新甲則不可上雖責其過激未始不心折之武陵乃募人糾之降六級調外劉趙二太史俱禠職成寶慈侍御逮至令拷問主使後以清獄遣戍南樞范質公先生亦以䟽救宮詹閒住一時仰諸君子如山斗焉然國之元氣自此斬矣呂坤三年之喪觧或問三年之喪不三十六個月止於二十五月而畢何也曰喪者親始死之日也十三月再見親死之日也謂之小祥尚在吉凶之界二十五月三見親死之日也謂之大祥言祥莫大乎是始棄凶而從吉矣是月也有餘哀焉心怛怛而不忍情戀戀以增悲又一月而為中月乃行禫祭禫者澹澹然平安矣作樂歡笑如他日然飲酒食肉如衆人然葢自二十五月已屬餘哀二十六月已無餘哀先王制禮雖聖人不敢過也近世迂儒有執喪三十六個月者是不明喪之一字也或問不計閏何也曰計閏則短一月不見三年之喪矣假如二月十五日親喪必待又明年二月十五日始經三見親喪之日若計閏則正月十五日為二十五月矣是短一月不見親喪之第三日也故不計閏非謂以厚為道也近世俗吏有親死於閏二月十五日不補前月為計閏二十五月之後値閏二月十五日以不服後月為計閏者皆送問治罪是不明不計閏之㫖也有二十七個月外責餘哀三個月餘哀之中起文赴部者亦送問治罪是不明二十五月而畢之説也縂之三年之喪實服二年故曰再期而大祥嗟夫古三年之服曰居喪曰宅憂不御酒肉不治生業廢祭祀謝交游詩書不事學問不談不見齒不入室寢苫枕塊禮壞樂崩故七百二十日不為不久後世為素冠白衣在身而已百不異常可謂居喪乎可謂宅憂乎雖縗絰終身可也顧起元期功之喪論喪禮之不講甚矣前輩士大夫如張憲副祥有期之喪猶著齊衰見客其後或有期功服者鮮衣盛飾無異平時世俗安之恬不為怪閒有守禮者恐矯俗猶不敢行也昔晉人放曠禮法之外為儒者所詬乃其時陳夀居喪病使婢丸藥坐廢不仕謝安石期功不廢絲竹人猶非之視今日當何如哉余謂士大夫在官有公制固所不論至里居遭喪即功亦宜示稍與常異如非公事謁有司不變服不赴筵㑹即赴亦不聼聲樂不躬行賀慶禮不先謁賔客庻古禮猶幾存什一於千百也戒奢萬歴中禮部尚書沈鯉䟽近該吏科給事中楊文舉具奏奉聖㫖近來習尚踰侈冠服詭異著都察院出榜禁約還著緝事衙門並五城御史不時訪拿該部知道欽此欽遵明㫖森然固宜朝令夕改月異而日不同矣乃數日以來察諸衢肆騐諸士民綺衣華履之輩尚爾優游鏤金刻玉之工居然布列此非法禁之不嚴亦由禮教之不明耳葢帝王之所以整齊天下者不過禮刑二端顧刑惟治之於已然之後而禮則防之於未然之前故聖王不遽用刑而必有禮以先之所以納民於軌物止惡於㣲𦕈使之遷善逺罪而不自知也我國家稽古立法品式具備如大明㑹典諸書備載官民服色冠帶房舍鞍馬等項貴賤各有品制所以辨上下定民志者嚴矣奈縁風㑹久而易流人心習而多玩兼之方冊所載申布不常典制諸書市肆罕鬻士生斯世尚有懵然不知者而况蚩蚩之氓乎有財者以為吾力所能為有位者以為吾勢所得用好異者以矜其奇詭之習射利者以窮其心思之巧憲典雖在而尊信罔聞則有由矣及今若不稍為申飭而概以法令繩之恐無知抵禁所傷必多非聖天子前禮後刑之意也臣等忝居禮官敬循職掌仰遵大明律令洪武禮制諸書及累朝事例叅酌互考摘其𦂳闗日用者數條即以今之違式越制如聖諭所云侈靡詭異之類者附列其下上塵睿覽伏望聖明采納勅下夲部刋刻榜文張掛都邑勒成書冊傳布天下然後責成廵城御史省直撫按嚴加緝訪俟令下半月或文到一月之後敢有仍前僭違即係明知故犯定行依律問罪財物入官若工匠技藝造作淫巧織鏤違禁者從重究遣務在著寔舉行不得虚應故事夫先有禮以防之而後有刑以驅之庶乎䧟溺之人心或可挽奢靡之風俗或可移不至令之不從而禁之不止矣抑臣等又伏思之物之相效之謂風民之從好㨗於令頃者我皇上一御布袍而百辟景從萬姓歡呼轉移之效亦可睹已至於輦轂之下勛戚貴近勢家大族亦衆庶之所觀傚而法行之所自始者伏望特布綸音更為申飭俾其贊一人以崇儉徳先庶民而㑹皇極則都邑之中轉相視效寖成習俗當自有不令而從不禁而止者而海内亦喁喁向風矣臣等無任惓惓懇祈之至謹題請㫖崇禎十六年十月十六日内閣揭帖適奉御批禁奢靡止宴樂前已與先生毎面諭還宜擬㫖通飭朕於冬至正旦夀節端陽中秋及諸大典禮陞殿行禮方許作樂其餘皆免朕浣衣減膳已有諭㫖今用錫木磁器以示儉約其金銀各器係闗典禮者留用餘貯庫以備賞賚内外文武諸臣俱宜省約專力辦賊太平之日照舊先生毎再將先年舊㫖叅看議妥來行欽此臣等叩頭恭誦不勝讚服竊見近日風尚之奢日甚一日其僭幾至於無等其費總出於民閒嚴諭累頒積習未變眞可痛恨皇上諄諄戒飭且特以身先之至於典禮慶賀之外暫撤宫懸衣服澣濯之餘仍裁玉膳器用錫木居然匏尊土簋之風庫貯金刀預為行賞酬功之用恭惟聖祖時亦曾取法木輅示訓露䑓洗表袱而得金緝片毯以為被盖深得古帝王菲食卑服之意而在今日則裕民足國節儉為先飭紀整綱憂勤尤急誠可以逺光祖徳下悚官方矣至宴樂一事尤為妨廢職業而京城首善倍宜力行禁止并服舍器用輿葢等項典制甚嚴尚多侈肆皆不可不痛加裁抑者誠辨上下定民志一大端不獨省財節費而已天順時禮部尚書胡濙省冗費議欽天監歴日五十萬九千七百餘夲省為十一萬九千五百餘夲太醫院藥材九萬八千一百餘斤省為五萬五千四百餘斤光禄寺糖蜜果品減舊數三之二其添造腌臘鷄鵝猪羊二萬七千隻子鵝二千隻酥油四千斤盡行革罷厨役六千四百餘名揀選老疾者悉皆放回湖廣江西等處薦新茶芽七千五百餘斤省為四千斤上允之風俗儉樸必自朝廷始此端夲之道也劉玉懲奢説一飯百金一衣千金一居萬金上之風之下之從之俗焉有不靡乎犬馬穀食奴𨽻肉食倡優玉食食焉有不匱乎庖者海陸織者文縠匠者篆刻用焉有不費乎緇黄不炊而食游惰不耕而食啇賈不儲而食工以藝兵以力士以志公卿大夫以能大率農一而供十人天下焉有不窮乎嫁者累車塟者殫家貧富相企而日有加愚不肖相傾而日蹈於邪習焉有不陋乎嗚呼弊也甚矣上之人必躬節儉而後民風可移嚴制度而後民志可定去奇衺禁淫汰而後民用可足省末作驅遊民而後民力可完民力完民用足民志定民風移而後禮樂興刑罰措禮樂興刑罰措而後萬物阜天下安潘塤前輩風範紀塤為諸生時將郡博呉先生命往見鄉先憲副行素韋公斌字彦質先見其二子元哻季勉通刺公出面西南塤拜致郡博之意公唯唯覆數語而入命其子延坐啜以茶塤他日為給事中歸謁行太僕貫初顧公逹字存道公時年七十有六聞塤至衣冠扶杖出塤再拜問起居公引之上坐三讓塤遜避至再曰老先生有三可尊何不虚此坐以勸後進使知長少之序公瞿然以杖戳地曰老夫今日乃得聞此語坐吾不敢復讓翼日之清江浦見河隂令䨇槐張公素字元卿乃先謁倉曹同年戴君冠字仲鶡倉曹曰子往見䨇槐先生乎幸為冠先容塤晨往值公盥櫛侍於次而倉曹至公乃出衣冠甚古與倉曹修禮既轉而南向塤拜公立受扶而起塤則再拜公嘖嘖有勸勉語倉曹退塤復侍坐頃之奚奴拂几案出殽簌各二器酒三行飯二盂禮甚簡及塤避喧湖西公時八十七夀不逺三十里駕小舟過訪言笑竟日飯則飯飲則飲薄暮始歸暇日數貽以詩自署䨇槐老素其風味意態近世所未有也夫三公皆鄉先生杜門肥遯同一髙致行素未嘗與人輕接貫初䨇槐尤索居離羣意更瀟㪚見行素則少長截然凛若師傅見貫初遲十五年已煩遜避增感慨其時可知矣見䨇槐則超出流俗􅅯然以前軰自居以子弟朂後進夫三公之行不同同一持風範勵風節若行素之嚴而正貫初之通而介䨇槐之簡易而直皆可敬而仰者也非某之所能及也或曰見行素塤少也賤是不然使公居今日接見少年軰能復如前日否耶拜禮劉三吾禮儀定式序言拜禮先稽首四拜後叩首一拜為見君上之禮拜止於四為見東宮各親王禮見父母同四拜禮見親戚官長止二拜禮古人作揖口中唱之故謂之唱喏至今而廢當時謂之啞揖呂坤南禮辯國朝尚左天下皆尚左或曰南人尚右非也南人並行偶坐何嘗尚右哉惟是作揖一事讓人於右居已於左曰行南禮南人亦不自察其所從來耳葢宗廟朝廷之禮尊南面者也非以尊我也南面之東為左西為右今文武之立班是已及其轉身而拜亦東為左西為右何嘗不左重哉自北面者視之則東為右西為左不知尊有所在葢論南面者之左右非論北面者之左右所拜在南面之人非右班拜左班之人也至於賔入主人之門非朝非廟無南面可尊主人讓賔自以東為左安得以無所尊之客位而行有所尊之揖拜哉且非阼階西階古人設兩階之初意也居已於左而居客於右南禮之誤也無疑矣若曰南禮尚右則不差揖拜則差行坐二者必居一非矣或曰古人尚右今人尚左孰是曰古人是天道自中極而左旋起向右也地道自西北而東南髙在右也神道坐西東向尊在右也人道右手用事權在右故行歩右足先發而左足次之起拜左足先屈而右足先伸八卦之位乾在右古今簡冊之序往為右古人重右因其自然順其當然也今人重左髙者抑之下者舉之也論理勢則重右是耳呂坤婦人拜辯拜屈也折節以示屈不敢直躬之謂也男子以伏興為拜婦人以屈膝為拜斷斷乎無兩説矣考之古禮男子再拜婦人四拜謂之夾拜葢男子鞠躬婦人立屈膝男子拜婦人又立屈膝男子再鞠躬拜婦人又兩立屈膝是謂丈夫兩拜婦人四拜也今制太子與妃初見帝后太子四起拜妃八立拜惟是致詞妃亦同跪其興也太子俯伏皇太后皇后慶節命婦朝賀先立四拜引班首至殿上内贊跪外贊皆跪丹墀諸命婦皆跪致詞稱賀畢不贊俯伏直贊興復位立四拜而禮畢今南方扮戲子婦上父母夀子俯伏婦人雖跪而不俯伏猶有古人之遺意焉葢婦人興伏為拜起於武后臨朝衮冕郊天俯伏拜興而行天子之禮後世用之今士大夫庶人親迎夫婦拜天地拜舅姑尚有婦人同夫拜興拜興之事而邱瓊山家禮儀節父母醮女尚有拜興之文皆謬也故珠冠之制俯首不得為不俯伏無墜髻落冠之憂故不嫌於重耳毎問中常侍宮人見后妃當以何為禮曰宮人遇后妃則叩首而行遇朝賀亦只立拜相沿謂叩頭為小禮立拜為大禮耳春秋傳云三肅使者葢婦人以立拜為肅拜故周禮九拜之法有肅拜註曰婦人之拜也近世婦人簡書加一端字則非古矣又曰歛袵萬福則不經矣婦人喪禮亦有稽顙之文葢叩頭之及地者余非謂婦不叩頭但伏興為拜則不可耳且拜無奇數或再或四或八或十二其奠獻跪而俯伏非拜也故贊者不列於拜數今臣子謝恩禮稱五拜三叩頭載在會典禮臣殊失夲意矣葢四拜四叩頭耳四拜畢不贊拜何以叩頭其寔第五拜為一叩再加三為四叩耳或曰拜為兩手齊下惟男子為然曰非也婦人立拜不兩手齊下乎今鄉俗以立拜為輕以叩頭為重故婢奚見主人不敢立拜正是叩頭則知叩頭固重立拜非輕也簡而便故輕之耳肩輿宋南渡以前士大夫皆不用轎如荆公伊川皆云不以人代畜朝士皆乘馬或有老疾朝廷特賜猶力辭南渡後則通行轎矣明初雖公侯不得乗轎兼不設馬凳文職四品京堂開棍乗馬用凳五品光禄太僕寺丞翰林院五品六品官宮坊官亦用凳其餘皆用交床按唐制歩輿之制三品以上及刺史有疾暫乗不得舍驛宰相三公師保令僕諸司長官及致仕官疾病許乗襜如漢魏載輿宋政和七年詔非品官之家不許乗煖轎武臣任主兵差遣縁邊安撫官走馬承受並不得乗轎萬歴中四品官以下俱用兩人肩輿稍顯者或用四人帷轎然置棍於後示不敢也後至魏忠賢執政以御史林一翥從輿上責内使遂嚴禁焉至崇禎初給事傅櫆以請上不允御史郁成治遂請自御史驄馬之外餘不能雇馬者用竹小兜上以其欺詰責謫之薦新芽茶王應軫䟽節該禮部題為前事奉欽依這芽茶解納供應都只照舊例行不必紛更此誠陛下愛恤民財之盛心憲章舊制之羙意臣下所當順奉而遵守者也但照舊之㫖二説可通彼此意見各有所執禮部則以為解納自有原額如六安茶芽三百斤正數之外不可加者此其舊例也光禄寺則以為供應有常規如歲用六安茶約餘四百七斤故三百斤正數不得不加者此亦舊例也照解納之舊則不足供應照供應之舊則有傷解納若不申眀終無定守臣等各該廵視監收思得惟正之供固不可擅増備獻之物尤不可暫缺六安茶芽歲額三百斤此多取毫釐即為因公科歛雖該部審據解吏聞報三百袋袋多四兩有餘亦非勘合正數且無批文查銷以後或輕或重焉知誰公誰私不若通融議處立為定規毎歲六安茶止收三百斤正數其耗餘加増一槩不許濫取夲寺供應取足薦新并日進月進御用之數至於醤房所進内閣所用盡其所有不足則於常州府等處茶芽擇以供給葢茶取於細其味略同何必拘執以致煩難部寺前後所論正欲出入有經如此裁省庶有司可守原額以照解納數該署可因便宜以照供應之舊而不必紛更矣見解納六安州并常州府等處芽茶正數之外尚有多餘之數欲給領回則有盤費之勞欲令變賣則有侵欺之弊况既名上供難以退出原有封袋難以折除合無收貯該署作正公用或准下年該解之數今後各處芽茶俱照原額解納毎斤裝成一袋毎袋贏餘二兩以補絹袋紙包之數永為遵守一體通行外藩嘉靖十三年禮部題使臣出入䟽據提督會同館主事張鏊呈據朝鮮國使臣蘇洗讓等呈前事竊照夲國粗識禮義至誠事大朝廷待遇有同内服凡夲國使臣到京自行出入不見防範迤至於今敬謹彌篤别無違異近年以來始加拘禁鎖閉館門遇有禀奉公幹只許通事一二員刻期出入著令館夫帶牌管押有礙舊式查得成化六年二月間夲國陪臣權咸等赴京時分禮部發到榜文該奉聖㫖會同館安歇一應朝貢四夷使客出入舊有禁例今後不許無故往來街市該衙門知道欽此夲月十一日武都督到會同館宣諭聖㫖因通行禁鎖將朝鮮使臣并禁令後依舊出入即令撤去榜文又該𢎞治十三年五月間有會同館安歇之使人等殺死一般使人兵部奉聖㫖備由出榜曉諭朝貢夷人著令在館不許出入并夲國一體防禁禮部主事劉綱陳言奏夲查得先該夲部見行事例朝鮮素守禮義敬事朝廷比與他夷不同進貢人員事例出入原無防禁近該兵部等衙門㑹議禁約將前項事例一槩革去以致提督官員嚴加拘禁不得出入合無仍照前項舊例朝鮮人員令其自行貨賣深為便益奉聖㫖是欽此夲國使臣出入自由無有防禁在嘉靖初年主客孫郎中無縁拘禁不許出入至嘉靖四年八月内有陪臣鄭允謙等前赴京師將前項節奉欽依事理告要照舊自行出入蒙部准告查照舊例許令自行出入已經夲館移文知㑹去後有提督陳主事執已不遵廹束愈嚴久莫申省貽此因循逺人慕義之望殊用觖然所以區區陳凟不能自黙者豈是意在買賣以圖復舊哉其拘閉與否亦非有他虧益秪以一視之仁罔有内外使之觀游無間光瞻禮儀考質文物薰炙遷化大有開益此寔敦懷柔之至徳奨事大之藎誠俾我遐服永荷寵靈綿歴萬世與之匹休爾在先夲國使臣人等入貢到京常飭下人務令循度猶恐或有非違十分畏謹即自禁制嚴宻比前尤甚在館防閑有似囚縶非惟有違舊行之規恐非累朝優待之意伏乞照依舊例許自出入以示聖朝優容之典不勝幸甚等因查得朝鮮國使臣素守禮義節年慶賀到京夲部查照舊例待遇以禮於國子監等處聽令謁拜於一應貨賣聽其自便近年以來止因逺方夷使跟随人役多生事端該管官員始行一槩約束加嚴而使臣頗嫻禮義委與他處夷使不同朝廷自來待遇以禮出入不防具有舊例所據蘇洗讓等具呈前事相應議處其呈稱欲觀游無間光瞻禮儀考質文物薰炙遷化固見其仰慕上國之誠但逺人言服既殊易罹國禁亦須曲為之處合候命下毎五日一次許令該國正使及書狀官人等出館於附近市衢觀游夲部仍劄付空閑通事一員陪侍出入以示禮待防衛之意其隨從人仍行照前拘禁不許擅自出入庶幾不拂逺人之情不廢上國之法矣禮部尚書夏言進使琉球録䟽祠祭清吏司案呈奉夲部送禮科抄出吏科等衙門左給事中等官陳侃等題切念臣等奉命往琉球國封王行禮既畢因待風坐三閲月而後行無所事事因得訪其山川風俗人物起居之詳杜譔數言遂成一録録之意大略有二臣等初被命時禮部查封琉球國舊案因曾遭回禄之變燒燬無存其頒賜儀物等項請查於内府各監局而後明福建布政司亦已年久卷案為風雨毁傷其造船并過海事宜皆訪於耆民之家得之至於交際禮儀無從詢問特令人至前使臣家詢其所以亦各彫喪而不知後海道往來皆頼夷人為之用其禮儀曲折臣等臨事斟酌期於不辱而已因恐後之奉使者亦如今日故著為此録使之有徵又嘗念國家大一統之治必有信史以載内外之事如大明一統志者中載琉球之事所云落漈者水移下不回也舟漂落百無一回臣等嘗懼乎此逕過不遇是險自以為大幸至其國而詢之皆不知有其水則是無落漈可知矣又云王所居壁下多聚髑髏以為佳臣等嘗疑於此意其國王兇悍而不可與言也至王宮時遍觀壁下亦皆累石國王循循雅飭若儒生然在彼數月雖國人亦不見其相殺又何嘗以髑髏為佳哉是志之所載者皆訛也不特志書為然杜氏通典集事淵海臝蟲録星槎勝覽等書凡載琉球事者詢之百無一寔若此者何也葢琉球不習漢字原無志書華人未甞親至其地胡自而得其真也以訛傳訛遂以為志何以信今而傳後故集羣書而訂正之兼以譯語譯字并附於後寔不足以上塵睿覽但念海外之事知之者寡一得之愚或可以備史館之採擇伏惟陛下恕其狂僭下之禮部詳議施行等因奉聖㫖禮部看了来説看得琉球國逺在海濵華人鮮至其地是故國俗土風知之者寡今按一統志等書所記事夲傳聞殊載未盡者據給事中陳侃等親歴其地目擊其事山川風俗之殊往来聞見悉出寔録因採輯事跡撰述成書既以正載籍之所未盡且俾後之奉使者有所考見足見各官留心使職誠可嘉尚似應俯從所請合無候命下之日夲部將所進使琉球録付之史館以備他日史館採集崇禎五年十月朝鮮國王李倧禮重繼序䟽臣祖昭敬王諸子中長曰臨海君珒廢疾不得立殁且無嗣次曰光海君琿是為廢人次曰定逺君琈即臣之父也光海父子既以罪廢則宗祀之托合歸臣父而不幸先逝臣以昭敬王長孫承昭敬王妃之命入紹祖統而請於朝廷得完封典感戴皇恩銘骨難忘顧惟臣既受命皇上忝有王號則所生父母合有應行典禮而縁疆場多事未即據例奏請稱謂有缺殊稱不加人子至情豈敢一日自安臣竊考古禮旁支入繼謂之為人後以孫繼祖謂之為祖後為人後則重在人後故不敢顧其私孫為祖後則父雖早卒而得列於正統之序此乃生人之大倫天地之常經也凡人有祖然後有父有父然後有孫如曰受國於祖而不禰其禰以祖當禰則名寔各異倫序不明何以為國謹查成化十一年臣先祖康靖王以其夲生考懷簡王為世子早卒遺陪臣金礩具奏請封憲宗皇帝嘉其誠孝降勅襃羙頒賜誥命東土之人至今榮之况臣有所後祖而無所後父尊父承祖乃所以尊其祖也名正而言順事當而理正情理俱伸恩義兩全專在此矣臣叨守藩服效蔑涓埃而又望推恩之典臣之愧懼於此寔多而仰恃天地父母之仁輙敢專差煩籲伏乞聖明命下該部通查舊例參考禮典寵賜爵諡臣母具氏並賜誥命以廣孝思以序天倫兹寔皇朝之寵典而小邦臣民之至幸也附髙麗統系嘉靖八年朝鮮國陪臣吏曹參判栁溥等呈言夲國祖考不係李仁任之後而皇明祖訓及大明會典所載俱屬仁任已於永樂及正徳間奏請改正俱蒙俞允迄今尚未行今幸重修會典乞為改正禮部以請上許之詔開送史館纂輯據所陳建國始末言旦初名成桂其先夲國全州人二十八世祖翰仕新羅為司空羅亡翰六世孫兢休入髙麗十三世孫安社仕元為南京五千户所逹嚕噶齊世襲其職元季兵興安社曾孫與男成桂避地東遷至元辛丑當髙麗恭愍王之十年有紅巾賊二十萬衆入境成桂領兵𠞰賊有功授武班職事恭愍無嗣隂畜寵臣辛肫之子禑為已子晚多躁暴為嬖臣洪倫等所弑權臣李仁任車裂倫等於市立禑為嗣其子昌為世子禑於六年擢成桂為門下侍中禑遣將犯遼東成桂為副將行至鴨緑江與諸將議不宜得罪於上國禑懼遜位於昌以洪武二十二年宣諭以偽姓見黜而復王氏之裔定昌君瑶主國事仁任罪竄於外既王瑶又不義國人憤怨乃共廢瑶推立成桂成桂請命於髙皇帝乃命成桂為王國號朝鮮改名旦云云考其國史當元盛時其元孝王者已遷居江華島元無如之何但責其不登陸而已竟臣服於元而終不登陸至其子順孝王親迎王主以元服同輦入國觀者駭愕時從行宗宰不開剃王責之至其子忠烈王則宰相至下僚無不開剃唯禁内學館不剃左承㫖朴桓呼執事官諭之於是學生皆剃春明夢餘録卷四十
