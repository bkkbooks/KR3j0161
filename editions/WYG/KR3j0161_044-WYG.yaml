body:
  text: 春明夢餘録卷四十四吏部左侍郎孫承澤撰刑部一刑部在皇城之西與都察院大理寺並列而為三法司設尚書侍郎掌天下刑名徒隸勾覆闗禁之政令置十三清吏司如户曹主兩京十三省之奏當凡宗室勲戚官吏軍民麗于法者詰其辭察其情偽傅律例而比其罪之重輕律例所不及者上下附以請凡兩畿十三省歳讞其死罪刑平之凡詔獄必傅例請上裁凡應減者下就輕應加者上就重重不得至死凡律例有殊㫖别勅詔例榜例非經請議著令者不得引為比凡死刑即决及秋决並三覆奏涖戮於市凡贖罪視罪輕重為差斬絞雜犯從末減者聽收贖凡簿録俘囚配沒給賜官私奴婢必籍知之凡籍産不得及其先墳塋凡贓罰計佑易銀嵗杪類入内府凡獄成移大理寺讞平焉凡訴寃家内皆自下而上急者擊登聞鼓凡重囚京師嵗霜降會五府九卿科道共慮之以請情真者决矜疑者戍邊有詞者調所司再問比律者監候五嵗請㫖遣官出京府兩京十三省審録减釋寃濫者凡夏月録囚免笞刑減徒流而下刑辨重刑凡提牢月更主事一人葺囹圄固械繫而時其飲食有病醫藥之凡官有過紀録之兩京嵗杪請勅湔除紀過凡大祭祀止刑凡四方有獄受命而徃成之以名例攝律條以以准皆各其及即若括律詞義以五服參情法以墨湼識賊盗宗人不即市宫人不即獄悼耄癃殘不即訊周禮秋官大司冦掌建邦之三典以佐王刑邦國一曰刑新國用輕典二曰刑平國用中典三曰刑亂國用重典視國俗為重輕制御世之權不顓之於法此其大綱以五刑糾萬民一曰野刑上農功而糾其力作為野治也二曰軍刑上順命而糾其失守為軍律也三曰鄉刑鄉首善上徳而糾孝孝徳之元也四曰官刑上功能而糾職職官之守也五曰國刑上愿而糾暴國兆民所聚風易澆難淳故糾暴民歸之愿為紀法守也亦不顓之法彼司刑之所司者法也非制法者也而刑莫先於罷民罷民者民惰於教不昬作勞如疲癃者然是滛酗之所生敖狠之所始民俗所以日偷而不可反也其害人也泰而固未麗於刑也故刑之則已重不刑則亂俗而傷化故寘諸圜􅁟而收教之日夜施九職工事焉而役之用其力以强其罷書其罪於方版著之背以恥其心而冀其改則教道存焉耳盖環而教之也故圜土非其獄之謂也能改者復之三年不齒其不能改而出圜土者殺則止惡於萌坊俗於忽王教之為俗化慮至逺也小司㓂聽萬民之獄訟用情而訊之至旬乃弊以五聲聽訟求其情一曰辭聽謂辭枝辭滛若直也二曰色聽謂色怖色怍若定也三曰氣聽謂氣懾氣喘若氣壯也四曰耳聽五曰目聽謂視聽直則端不直則眊惑失常也其制五刑也必原父子之親立君臣之義以權之意論輕重之量慎測深淺之宜以别之悉其聰明致其忠愛以盡之猶恐其未也必三刺三宥三赦以求其衷三刺者一訊之羣臣再訊之羣吏三訊之萬民所謂疑獄汜與衆共之者也衆疑赦之矣即臯麗於罰衆所宥雖上刑下服舉與衆宥之所刺即下刑上服舉與衆刺之也不顓之於法惟用中於民故曰國人刑殺之也猶未也司刺者又得以不識過失遺㤀而宥之幼弱老旄惷愚而赦之至國有大獄又得以親故賢能功貴勤賔八辟焉麗邦法以議之則其所求諸刑者為已悉矣乃嵗孟春士師以木鐸狥於朝以邦之五禁書懸之象魏浹日而後歛以右刑罰一曰宫禁二曰官禁三曰國禁四曰野禁五曰軍禁國有事則又為五戒以先後之一曰誓用之於軍旅二曰誥用之於㑹同三曰禁用之於田役四曰糾用之於國中五曰憲用之於都鄙斯曷非欲法令著揭無使罪麗於民欲民恊中懷徳而郵無麗於法也哉刑官在朝者謂之士師在六鄉謂之鄉士在六遂謂之遂士在各縣遂謂之縣士各掌其民之数夫謂之士者理官也士居四民之先而列五爵之一列官分職不皆謂之士而理官獨謂之士者盖以此官民命所係天討所寓國家所以得失民心皆在於此故非明理義備道徳通經學者不可以居之自虞廷以臯陶為士而周人自秋官卿以下皆以士名盖示後世使知刑官之重而不可雜以他流也刑法之名雖非王道所先然讞議刑名不通律法不可以從政先王之教禮律並設出乎禮則入乎律故明習法令亦所以佐禮教之不及也宋人設刑法科以試諸吏選人任子亦試以出官非無見也自古哲后惇臣曷嘗不以刑辟為天典重用之哉典著欽恤誥表敬明記稱論量慎測必即於天倫此其意至精故咎繇元徳羣聖宗焉以作士制百姓於刑之中用期於無刑司冦蘇公敬由獄周公作立政訓王諄復紀之誠重獄也重獄重天民也自教之衰亶以五刑為癉惡之具靡知為倫叙當即也於是乎哀矜勿喜之意㤀甚且愉快喜之豈謂天徳哉又何以敬刑弼徳司天民命也先漢時攄忠守法清議之臣猶能本經術明常教以决事而張廷尉令天下無寃唐徐司刑身視鴻毛法視泰山以其死衛生民之命即古今難之矣三代而後稱嚴刑者曰秦曰隋漢髙入闗約法三章殺人者死傷人及盗抵罪餘悉除去秦法民大悦隋煬帝滛刑以逞行轘裂梟首之刑天下潰叛唐祖入闗除苛政約法十二條已又頒新格五十三條惟吏受贓詐冐盗府庫物罪不原餘悉除去隋法物已又詔裴寂等更撰律令本前代法故為書一曰名例二曰禁衛三曰職制四曰户婚五曰廐庫六曰擅興七曰賊盗八曰鬭訟九曰詐偽十曰雜律十一曰捕亡十二曰斷獄一以漢九章為守律家以為集大成焉唐末迄五代刑罰峻深視人命如牲牢而國祚日促周世宗用范質議律條猥繁輕重失衷詳定之曰刑統行焉宋祖即位與天下更始尤注意刑辟哀矜無辜嘗讀虞書喟然嘆曰堯舜之世四凶之罪止於投竄何近代法網之密耶故自開寶来犯大辟非情理深重者多得貸死懲五代牧守皆武人多率意用法擅殺生著令諸州所决大辟奏當上咸委刑官詳覆吏坐深文故入終屏斥不復甚者流故由是吏皆持平法網晏寛宋以忠厚立國立石太廟戒子孫勿殺大臣勿殺上書言事人勿殺柴氏子孫其石封鐍甚固每一帝即位赴廟受戒誓手啟而仍親錮之厯代相沿不敢渝故當時名臣項背相望號稱小三代元世祖定天下之刑笞杖徒流絞五等笞杖罪既定曰天饒他一下地饒他一下我饒他一下自是合笞五十止笞四十七合杖一百十止杖一百七天下死囚審讞已定亦不加刑皆老死於囹圄自後惟秦王巴延出天下囚始一加刑故七八十年之中老稚不曽覩斬戮及見一死人頭輒相驚駭可謂勝殘去殺黎元在海涵春育之中矣世祖謂宰臣曰朕或怒有罪者使汝殺汝勿殺必遲回一二日乃覆奏斯言也雖古仁君何以過之自後繼體之君惟刑之恤凡郡國有疑獄必遣官覆讞而從輕死罪審録無寃者亦必待報然後加刑而大徳間王約復上言國朝之制笞杖十減為七今之杖一百者宜止九十七不當又加十也此其君臣之間唯知輕典之為尚百年之間天下乂寜亦豈偶然而致哉大明律令明太祖洪武元年定大明令百四十五條頒天下制曰朕惟律令者治天下之法也令以教之於先律以齊之於後古者律令至簡後世漸以繁多甚至有不能通其義者何以使人知法意而不犯哉人既難知是啓吏之姦而䧟民於法朕甚憫之今所定律令芟繁就簡使之歸一直言其事庶㡬人人易知而難犯書曰刑期於無刑天下果能遵令而不蹈於律刑措之效亦不難致兹命頒行四方惟爾臣庶體予至意洪武六年命中書省詳定律法諭之曰凡立法貴簡當使人易曉若條緒繁多或一事而兩端可輕可重奸貪吏得因縁為奸則所為禁殘暴者反以賊良善也卿等宜盡心參究凡刑名條目逐日上朕親酌議焉律成宋學士濓具表言皇上登大寶而来保乂臣民孳孳弗怠訓廸羣工諄復千言惟恐有犯慈愛仁厚之意溢於詞表是大舜惟刑之恤之義也矜憫愚民䧟於罪戾法司奏讞惻然弗寜多所寛貸是神禹見辜而泣之心也惟貪墨吏承踵元弊乃不得已假峻法以䋲之是以臨御以来屢詔大臣更定新律至五六易弗倦兹特勅臣刑部尚書劉惟謙等㑹衆律重修以恊厥中近代比例之繁姦吏可資以出入者咸革臣以洪武六年冬十有一月受詔明年二月書成篇目一凖唐舊自名例以至斷獄十九篇中采用已頒舊律二百二十八條舊令改律三十六條因事制律三十一條掇唐律補遺百二十三條合六百有六條為三十卷每一編成輒繕寫上上揭之西廡壁端親御翰墨為之裁定聖慮淵深稽天揆人成百代之憲具易書之奥好生之徳洽於民心俾日月所照霜露所墜有血氣者莫不改過遷善臻雍熈之治何其盛哉詔頒行已定設六部復更定以吏户禮兵刑工為六類析篇目為十九約條為四百六十析户婚為户役婚婣分鬭訟為鬭毆訴訟分廐庫為廐牧隸兵倉庫隸户分職制為公式改屬吏受贓隸刑凡刑之名五曰笞曰杖曰徒曰流曰死死二等流三等徒杖笞各五等死刑至重者曰凌遲徒流重者曰遷徙曰充軍凡憝惡之戮十曰謀反曰大逆曰謀叛曰惡逆曰不道曰大不敬曰不孝曰不睦曰不義曰内亂凡貪墨之贓六曰監守盗曰常人盗曰竊盗曰枉法曰不枉法曰坐贓名雖沿唐而因時定制縁情制典自有法律来所未有洪武三十年詔刋大明律將大誥内條目附其中御製序言朕有天下倣古為治明禮以導民定律以䋲頑刋著為令行之已久然而犯者猶衆故於聽政之暇作大誥昭示民間使知趨吉避凶之道古之人謂刑為祥刑豈非欲民並生於天地間哉然法在有司民不周知故命刑官取大誥條目撮其要畧附載於律凡榜文禁約悉除之除謀逆并律誥該載外其雜犯大小之罪悉依贖罪之例論斷今編次成書刋布中外令天下知所遵守刑期無刑庶稱朕恤刑之意律制凡刑五服以定之九族以齊之六親以别之五刑以用之七具以差之十惡以誅之六贓以等之八議以貸之五則以贖之斬衰三年齊衰三年杖期不杖期大功小功緦麻是謂五服自髙祖至於元孫上治旁治是謂九族妻為夫族服妾為家長族服出嫁女為本宗服為外親服為妻親服為三父八母服是謂六親笞杖徒流死笞刑五一十至五十杖刑五六十至百徒刑五一年至三年流刑三二千里至三千里死刑二絞斬是謂五刑笞杖訊杖枷杻鉄索鐐是謂七具謀反謀大逆謀叛惡逆不道大不敬不孝不睦不義内亂是謂十惡監守自盗贓盗贓竊盗贓枉法贓不枉法贓坐贓是謂六贓議親議故議功議賢議能議勤議貴議賔是謂八議應工贖輸囚糧贖輸灰贖輸甎贖輸水及炭贖是謂五贖律意凡犯死罪非常赦所不原而祖父母父母老無養者得奏聞取上裁犯徒流者得贖存留養親教民孝也凡同居若大功以上及外祖父母外孫妻之父母女婿若孫之婦夫之兄弟及兄弟妻有罪得相為容隐奴婢工人為家長隐者皆弗論泄其事致罪人匿者亦不坐教民睦也民七十以上十五以下及廢疾犯流以下得贖八十以上十嵗以下及老疾犯殺人當死者奏聞取上裁盗及傷人者得贖餘皆勿論九十以上七嵗以下雖有死罪不刑教民養老慈幼矜不成人也犯罪未發而自首者免其罪輕罪發覺因首重罪者免其重罪與民悔也犯罪時未老疾事發時老疾者以老疾論犯罪時幼小事發時長大以幼小論從民可哀憐也二罪俱發論其重者若一罪已决餘罪後發者等勿論重者并計前罪以充後數示民輕省也其本應罪重而犯時不知者以輕論其本應輕者聴從本法憫民疑也罪得減等二死三流同歸一減開民生也敖英曰至矣哉我朝之律可謂情與法並行而不悖者也如十惡不原法也八議末減情也干名犯義者法也得相容隐者情也自首免罪者情也猶追贓証者法也罪有加者法也有減者情也有從重者法也有免科者情也凡法之所在而不姑息者義之盡也凡情之所在而必體恤之者盖仁之至也此我朝所以忠厚埀統而社稷靈長終必賴之葉良佩曰讀國家之憲章至法令未嘗不廢書而嘆也曰深哉仁乎雖使舜臯陶復生其無以易之矣夫象刑之不可復也猶江河之不可挽而登諸山也是故聖人之治天下必縁時以定制鏡古以修今要在於垂諸後紹俾不可易斯已矣國家之法雖本於李唐之十一篇然或芟䌓定舛因事續置大抵比舊増多什二三而祥徳美意殆未易以言語殫述也姑舉其大者如以笞杖徒流絞斬定為五刑而釱趾蠶室之制一切剗除以六曹分為類目而擅興事廐庫等篇悉為裁定代背箠以臀杖而數無過百易黥面以刺臂而法止賊盗他如見知嚴於逃叛故縱深於捕亡收孥連坐之條獨於反逆大不道者當之凡兹皆法之至善者也至夫圜土之制嫌於太重則貸之以輸作嘉石之制嫌於太輕則罰之以荷校盗官藏受贓枉法罪皆死又嫌於太重則著為雜死之命而聽其贖鍰與輸焉由杖徒一轉而入大辟嫌於太疎則定議著為徙邊戍邊永戍之令不與同中國凡兹皆損益於累朝而令之至善者也其有𠖇頑不軌之民或情罪弗麗於法者復許所司比議奏决以行曲而不苛平而難犯盖肉刑雖亡而厥威故在象刑無事於復而欽恤之意未嘗不行乎其間也噫澤深逺矣雖舜臯之為法其何以加於此哉或曰刑以期於無刑也自國家迄於今兹㡬何世矣桁楊之囚溢於戸外而獄訟不為之少衰豈所謂不犯之法乎曰此非法之過也用法者不得其人之罪也今之用法者有三蒙有二厲而其原則始於好惡之未明於上焉耳何謂三蒙闇於推鞫者其情謾昧於法意者其刑舛疵於官反貨内来者其寃滯何為二厲徼公亷之譽則以深刻為能任喜怒之情則以巧詆為用何為好惡之未明大吏之深刻巧詆者既以能名而闇昧愞弱之流亦復循資積勞以躐髙位茍為若是夫安所憚而不厲不蒙此吏道一大癥也統兹六患將惟滋獄速訟之不暇而又何衰之可圖故曰有治人無治法嗚呼如有作於上者得兹六患之説而變通之則國家無刑之效庶㡬其可冀矣邱濬疏臣按唐虞三代以来俱用肉刑至漢文帝始廢肉刑用笞其原盖權輿虞刑之鞭朴也除死罪外自墨劓以下率以笞代之然未為笞令所箠之具無常物所箠之處無定在景帝定箠令箠之制始用竹受箠之處專在臋魏晋南北朝其君臣仁暴不同其俗尚厚薄不一其所用刑各有不同隋文帝始定為今之五刑凡前代考訊之具若夫挾捧束杖車輻底之䫫盡除不用唐宋因之制為刑具各有等第本朝於大明律卷首作為横圖以紀獄具笞大頭徑二分七釐小頭徑一分七釐訊杖大頭徑四分五釐小頭三分五釐以上皆以荆為之長俱三尺五寸枷以乾木為之長五尺五寸頭濶一尺五寸死罪重二十五斤徒流杖罪以下有差手杻長一尺六寸厚一寸鉄索長一丈鐐重二斤凡為笞杖皆削去節目用官降較勘如式然後用之不許筋膠諸物裝釘應决者用小頭臋受其大小厚薄視唐略等比宋則尤為輕焉祖宗好生之心雖為惡之罪人惟恐或有所傷而為之薄刑也如此是以仁恩厚徳浹於民心百年於兹近年以来乃有等酷虐之吏恣為刑具如夾棍腦篐烙鐵之類名數不一非獨有以違祖宗之法實有以傷天地之和伏乞聖明申明舊制凡内外有因襲承用者悉令棄毁然禁之必自内始敢有仍前故用即以所制者加之庶使太祖皇帝慎罰之意恤刑之仁所以著於律文者萬世之下恒如一日所恢皇仁於九有綿國祚於萬年者端在於斯馬文升疏臣伏覩大明律一欵凡國家律令參酌事情輕重定立罪名頒行天下永為遵守百司官吏務要熟讀講明律意剖决事務每遇年終在内從都察院在外從分廵御史提刑按察司官按治去處考校若不能講解不曉律意者初犯罰俸錢一月再犯笞杖四十附過三犯於本衙門遞降叙用欽此欽遵外竊惟國家大事莫先於刑獄刑獄所重莫先於人命盖以死者不可復生斷者不可復續一女含寃三年不雨匹夫結怨六月飛霜以其寃抑之氣有以傷天地之和召水旱之災自古帝王莫不慎之故舜典有欽恤之言周書有敬慎之戒下至漢唐法家多取專門趙宋刑官設科取士皆所以慎刑獄而重民命也仰惟我太祖高皇帝膺天眷命奄有萬方臨御之初屢詔大臣更定魏律至於五六為之弗倦以求至當復命刑官重㑹衆律親御宸翰為之裁定務恊厥中而於人命尤致意焉是以當時司刑官員多所用心而於律意務為講明奏讞之際少有失平陰陽以和風雨以時而天下無寃民焉近年以来兩京法司官員或由進士初除寺正寺副評事主事或由知州行人就陞員外郎郎中而御史亦多知縣所除到任之後未經問刑就便斷獄公差所以律條多不熟讀而律意亦未講明所問囚人不過移情就律將就發落且笞杖徒流縱有所枉為害未大至於人命一有所寃闗係非輕且如强盗窝主重在造意若窝藏强盗而不造意亦難問擬斬罪又如官吏懐挾私讐故勘平人因而致死重在懷挾私讐若因事到官但有笞罪雖勘致死亦止可問擬因公毆人致死徒罪又如故殺鬭毆殺人若兩人相爭互相毆打毆死一人則名鬭毆殺人一人未曽動手一人打彼致命去處有意致死則名故殺此等律意人多忽略有將强盗窝主未曽造意同謀止是分贓及官吏因公事毆人致死本無私讐故勘情由而俱問斬罪者有本係鬭毆而問擬故殺斬罪者有本係故殺而却擬鬭毆殺人絞罪者甚至謀殺故殺無屍簡驗而問擬斬罪輒取情真罪當奏請處决者或本因與人妻妾通奸其夫别項身死而問擬本婦因奸同謀殺死親夫凌遲處死奸夫斬罪者其他以非為是以重作輕者非一查得數年之間各都布按三司等衙門呈詳死罪重囚本院并刑部詳擬明白大理寺復詳合律該科覆奏處决幸蒙憲宗皇帝慈愛仁厚不忍殺人止令監着恭遇皇上嗣登寶位重念刑獄屢下明詔强盗無贓仗人命無屍檢驗者具奏定奪其節年原監該决重囚近日辯理寛宥者亦多若使當時就令處决則含寃而死者不知㡬人矣其所傷和召災者果誰之咎歟法司尚然則其餘府州縣衛所囚犯枉抑而死者又不知其㡬何矣此皆原問官員律學未講律意未明之故也况府州縣官員多有不曉刑名不知律意者遇有刑名事務多有不能剖决問理而惟聽於主文之人盖由廵按御史按察司官按治去處不行考校之故也伏乞勅兩京法司堂上官督令所屬官天下都布按三司督令斷事理問及浙江等按察司官并各府推官各要將大明律條熟讀講解深明其意不許似前忽畧置而不講其問囚之時叅錯訊勒務在得其真情方纔取招議罪之時尤須原情定擬不許輕易致有寃抑獄成之後難以辨明及通行天下大小衙門并兩京部屬官吏各置大明律一本朝夕熟讀用心講解務曉其意仍通行各處巡按御史按察司分司官按治去處遵依大明律内事理從公考校若有不能講解不曉律意者依律施行當奏請并降用者徑自具奏發落仍乞勅吏部行移法司將撥去進士就令與現任官員一同問刑以後該選之時兩京法司有缺先儘各衙門問刑進士除授如果法司無缺方令除授别部等衙門是亦前代刑官設科取士之意也庶使人精法律而刑鮮濫施之弊獄無寃抑而世底刑措之美原係講明律意以重人命事理未敢擅便謹題請㫖刑部尚書何喬新疏伏覩律欵言罵祖父母父母及妻妾罵夫祖父母父母者並絞註云須親告乃坐又欵言祖父母父母誣告子孫告子孫婦者各勿論竊詳律意盖謂父子祖孫天性也子孫子孫婦悖戾至於毁罵逆天性甚矣故坐絞然恐他人詆誣成罪故曰須親吿乃坐謂他人雖告不坐也邇刑官遇祖父母父母告子孫及子孫婦罵者不問虚實輒坐是親告即坐矣使親告而即坐律又何有誣告子孫之文乎凡愛憎之偏人情多有有因後妻之譖而憎前妻之子若婦者有溺愛幼子而惡其長子者有欲奪孫之資産歸其子者有憎其子孫遂及其子孫婦者使親告即坐雖恭順如薛包孝友如王祥父母一有言將不免於死豈不痛哉請自今勅中外官須鞫實乃坐其誣告者自依律擬斷伏覩計贓科罪律四百六十餘條是律也律正法當一定而不易以鈔計贓者例也例輔律當隨時而無常國初制律時每銀一兩直鈔一貫今八十貫矣是國初常人盗銀八十兩而絞今一兩而絞也初監守盗銀四十兩而斬今五錢而斬也非律意矣請自今估計鈔貫以銀一兩直錢千文鈔四十貫為凖庶輕重為衷又律官非法决撻人至死者黜為民謂肆虐殘忍於虛怯處横加考掠也云耳鞭作官刑自古有之若因公决打死而輒黜非法意宜貸律威逼人致死謂諸色人或逼取田園或强索財物致愚弱卑賤呼號無告而自盡也云耳其愚夫愚婦或忿爭醉謔或語言抵觸輕生無賴而問擬威逼非律意宜寛各省編伍律名有衛分近不分南北多發西北邊盖以西北邊近敵欲伍實也然罪犯而至斬絞必皆姦頑梗化輕生易死之人徃徃隨至而迯仍復為惡雖有但逃便殺之條然逃者接踵終不知警况中有原係北人諳知邊情慣習譯語脱後逃入敵中啓釁擾邊如漢衛律宋張元可為永鑑宜西北人編發兩廣雲貴江南人編發江北衛分如律便孫承宗律例集解序律之詁曰矩曰率律者天子與天下共以為矩而率之也樂有律師出有律師之律不爽進止而主容民樂之律不爽損益而主相生刑之律不爽輕重而主容如師主生如樂三者一不得其平而統干天地之和故謂之律然律求所以生之而用律者求所以殺之故古之知律者省刑而今之知律者不失罪耳太祖重念民命詔定律令凡六經聖裁為四百六十條而列聖相承復有條例以補律之所不及盖至世宗之乙卯漸積為三百八十五條我皇上欽恤庶獄命刑臣重加酌議其仍者半删定者半凡殊㫖别㫖詔例榜議非經議請著令者不得引比然律文沿晉唐之舊愚者既懵不知守而奸者且依法舞文邱文莊濬議令儒臣通法意者為解而陳御史察等如其解成書於是一代之大法字析句分不獨令天下曉然知法意難犯而實令士大夫深念民命無進愽斷棺之利退抱仰屋之憂也盖自古國家之運莫不與法為存亡故􅖄匿則民勝法􅖄窮則法勝民民勝法國亂法勝民國殘是以願治者相與共率為矩如樂之鐸如師之符而不敢以意用然今天下郡縣之於律患不明而朝廷之於律患不守不明者監司直指間有駁正其不守者上既用意以屈法而下且屈法以奉意嘗怪漢廷尉釋之號知法而曰當是時天子殺之則已豈以天子而可獨失律乎唐權善才法不得死髙宗欲殺之王本立法在必死髙宗欲原之狄仁傑兩執法以爭而兩得其法雖以髙宗之主終不敢以意與而况治朝乎髙皇帝當律成而曰非但一代當遵雖萬世當守也豈非聖子神孫所當共以為矩而率之與又嘗恭讀序律之言曰明禮以導民定律以䋲頑夫禮之所去刑之所取失禮則入刑而明刑以輔禮乃賈生有曰禮防於未然之前法禁於已然之後嗟乎安得輕徭薄賦以導民於禮而無輕試法乎然而不得已也終願明律者無失其相容相生之意為朝廷守之爾論令按唐有律律之外又有令格式宋初因之至神宗更其目曰勅令格式所謂勅者兼唐之律也洪武元年即為大明令頒行天下盖與漢髙祖初入闗約法三章唐髙祖入京師約法十二條同一意也至六年始命刑部尚書劉惟謙等造律文又有洪武禮制諸司職掌之作與夫大誥三編及大誥武臣等書凡唐宋所謂律令格式與其編敕皆在是也但不用唐宋之舊名爾夫律者刑之法也令者法之意也法具則意寓於其中方草創之初未暇詳其曲折故明示以其意之所在令是也平定之後既已備其制度故詳載其法之所存律是也伏讀太祖訓誥之辭有曰子孫做皇帝時止守律與大誥而不及令而諸司職掌於刑部都官科下具載死罪止載律與大誥中所條者可見也是誥與律乃朝廷所當世守法司所當遵行者也事有律不載而具於令者據其文而援以為證用以請之於上可也此又明法者之所當知洪武五年十二月禮部尚書陶凱等奏言古者國有典法定著為令有違於令者則加以律故令與律相為表裏漢有令甲令乙後世守法之人有曰法者髙祖之法也今律已行而令未備宜及時定令使有所遵守又考漢唐宋皆有典要宋㑹要逐日記載時政分門别類以憑稽考今起居注記言記事藏之金匱是為實録凡各衙門欽録及奏事簿記載時政可以立法垂之後世者宜依倣㑹要編類成書使後之議事者有所考焉上從之次年遂命纂日歴復纂皇明寶訓惟大明令未見復修所行乃洪武元年修者論誥霍韜疏洪武教民榜文一民間子弟十八嵗者或十三嵗者此時欲心未動良心未䘮早令講讀三編三誥誠以先入之言為定使知避凶趨吉日後皆稱賢人君子為良善之民免貽父母憂慮亦且不犯刑憲永保身家臣謹按教民榜文及御製大誥等書皆聖祖訓勅天下拳拳至意天下臣民皆得熟讀敬守真可以寡過矣今則非直百姓不見此書雖學校生儒見此書者亦鮮也伏願勅下禮部將聖制各書各刻一本頒各布政司翻刻頒布學校里閭社學實嘉惠臣民至幸洪武詔言頃因戡亂以軍律用刑殊乖平允自今務從中典重刑須秋後無非時决傷天和祖訓云以後子孫做皇帝時止守律與大誥並不許用黥刺剕劓閹割之刑云何盖嗣君宫内生長人情善惡未能周知恐一時所施不當誤傷善良臣下敢有奏用此刑者文武羣臣即時劾奏將犯人凌遲全家處死令曰凡特㫖臨時處决罪名不著為律令者大小衙門不得引比為例若輒引比律致令罪有輕重者以故入人罪論上讀老子書至民不畏死奈何以死懼之惻然感懷命焚錦衣衛非法獄具悉以所繫囚送部䑓審理而諭刑部論囚諸武臣並親審餘引奏詣承天門外命刑人持訟理幡出欲自理者聽入訴諸無罪當釋者持平政幡宣徳意遣之其在重辟府部院六科通政司詹事府雜聼之審録其寃狀以聞刑尚書劉濟言諸司刑牘動千萬言類泛濫失本實盍禁之上曰虚詞失實浮文亂真自今有以繁文出入人罪者罪無赦命刑科㑹諸司議獄牘式示中外諭刑尚書周禎曰刑以輔治唐虞所不免觀舜命臯陶之辭始曰明刑終期於無刑臯陶告舜亦曰與其殺不辜寜失不經當時君臣莫不以恤刑為重而民亦自不犯所以能致雍熈之治朕常觀此深有所契卿當體之命中書省詳定律令諭曰律有連坐之條謂侵損傷人者衆吾以為罰弗及嗣忠厚之至也自今民有犯者毋連坐十七年建三法司名其所曰貫城勅云貫索七星如貫珠環而成象名天牢中虚則刑平官無邪私中有星即刑繁有星而明有貴人無罪而獄今法天道置法司爾法司官各勵乃心慎乃事法天道行之如貫索星之中虚庶不負肇建之意上與侍臣論待臣之禮劉基曰古者公卿有罪盤水加劍請詣密室自裁未嘗鄙辱之詹同侍坐因取大戴禮及賈誼疏以進且云古者刑不上大夫所以勵亷恥而君臣之恩義兩盡上深然之工部尚書王肅坐法當笞上曰六卿之職不宜以細故加辱命以俸折贖著為令上諭刑部凡論囚當原情母刻深盖人命至重常存平恕之心猶恐失之况深文乎昨民有子犯法父行賄求免者有司欲并論朕以父子至親子論死而父救之情也故但論其子而赦父自今凡論獄必詳讞覆奏而後論毋重傷人中書叅政傅瓛言應天府有滯獄當斷决者上曰淹滯㡬時矣曰逾半嵗上惕然曰京師而有滯獄郡縣受枉者多矣有司得人以時决遣安有此弊瓛頓首曰臣等不能統率庶寮是臣罪也上曰吾非不愛其民而民尚爾幽抑近且如此逺者何由能知自今獄囚審鞫明白須依時决遣毋使淹滯贛州民有止宿逃囚者初不知其囚刑部逮問坐之罪上曰刑者聖人設防於天下耳深文重法仁者不為故凡斷獄貴得其情縁情而論罪則刑當而民服彼不知其為囚舍宿者人情之常也何為罪之如汝議行路之人將無止宿矣遂命釋之諭羣臣曰讀書所以窮理守法所以持身故吏之稱循良者不在於威嚴在於奉法循理而已卿等既讀書於律亦不可不諳民有告富人謀反者命御史䑓臣刑部勘問皆不實䑓臣言告者事在赦前宜編戍逺方刑部言當抵罪上以問秦裕伯對曰元時凡告謀反不實者罪止杖一百以開来告之路上曰不然姦徒若不抵罪天下善人為所誣多矣自今凡告謀反不實者抵罪有司著為令論元政曰元時條格煩冗吏夤縁出入為姦所以貽害且以七殺言之謀殺故殺鬭毆殺既皆死罪何用如此分析但誤殺有可議者要之與戲殺過失殺亦不大相逺今立法正欲矯其舊弊大槩不過簡嚴簡則無出入之弊嚴則民知畏而不敢輕犯勅刑官自今凡雜犯死罪者免死輸作終身徒流罪限年輸作官吏受贓及雜犯私罪當罷職役者謫鳳陽屯種民犯流罪者鳳陽輸作一年然後屯種人有誣山西之民從故元四大王為冦者捕獲至京上曰刑罰所以威惡施之必當其罪則刑不濫而人心服彼四大王以元之遺孽竄匿山谷聚逋逃以為民患山西之民邊其巢穴者徃徃被驅掠廹脅為盗皆出於不得已豈真為盗者哉古人云得其情則哀矜勿喜此之類也今民相捕獲將延蔓不已是助之立黨而激之為亂也其釋之十五年正月諭刑官曰方春萬物發生而無知之民乃有犯法至死者雖有决不待時之律然於朕心有所不忍其犯大辟者減死論命天下諸司刑獄皆屬刑部都察院詳議平允又送大理審覆然後决之其直隸諸府州刑獄自今亦凖此令諭都督府曰前遣囚徃充遼東驛卒今天氣尚寒恐道途凍餒此輩本宥之以全其生若不免死是徒宥耳且令就濟寜暫住待春暖遣行二十三年通政司茹瑺引奏潮州府學生陳質言其父戍大寜已死今有司取質補伍自念從幼至今荷蒙國恩教育願賜卒業以圖上報上謂兵部尚書沈溍曰國家得一卒易得一材難此生既有志於學可削其兵籍遣歸進學天䇿衛卒吳英父得罪繫獄英詣闕陳情願沒入為官奴贖父罪上諭英曰汝之情固有可矜但汝平時何不勸諫汝父使不犯法今罪不可貸然念汝愛父之至特曲法宥之二十八年刑部奏律與條例不同者宜更定俾所司遵守上曰法令者防民之具輔治之術耳有經有權律者常經也條例一時之權宜也朕御天下將三十年命有司定律久矣何用更定嘗行郊壇皇太子從指道旁荆楚曰古用此為扑刑取能去風雖傷不害盖徳念至於如此建文明太祖嘗以律授皇太孫曰此酌古凖今恊禮制宜人情其熟玩以復太孫捧之退居數日成誦問曰汝熟其文矣能解其義乎曰解因問名例之義對曰名者聖人所以勵世磨鈍也故生人大倫名義為重維持風俗必先名教以名義名教為例庶㡬刑罰之中不失徳義之意曰然此書首列一刑圖次列八禮圖者重禮也但愚民無知如於本條下即注寛恤之令必易犯法故以廣大好生之㫖總列名例律中善用法者㑹其意可也太孫曰名例律中某條尚覺嚴而不恕請稍改之可乎曰試率爾意改来看因更定五條明日呈稿帝喜曰甚善因跪而請曰明刑所以弼教凡與五倫相渉者宜皆屈法以中恩今律中所定期於盡法而不必於原情竊所未安曰凡所未安者汝悉改之遂遍攷禮經叅之歴朝刑法志改定七十三條帝覽竟大喜曰吾當亂世刑不得不重汝當平世刑不得不輕所謂刑罰世輕世重也如後用刑皆宜遵此常州陳理以子弑父送太孫處分太孫從容詳審竟脱之理父原抱病經年誤服一藥而斃繼母素憎其子因力証成之無以自解太孫條其情而讞之帝未之信也拘隣里婢僕及原醫訊之乃知父向患火症庸醫誤認為寒藥中潛投附子主人不知故服之而暴卒耳帝驚曰有是哉刑不可不慎也太孫不獨仁而且明朕無憂矣邏者獲强盗七人命送太孫審理太孫一見即疑首盗非真訊之果係主人之子偶出莊上而佃客皆盗也是夜正謀劫商舟遂强之同行歸欲首明而先被獲帝覆審盡得其情釋之問太孫曰爾何以知其非盗對曰周禮聽獄色聽為先尚書亦稱惟貌有稽炆見其人雙眸烱烱視聽端詳定非盗也帝因嘆曰决獄者不可不讀書建文帝即位諭刑官曰大明律皇祖所親定大意雖凖唐律亦遍考歴朝刑法志叅酌而成朕先年受命細閲令律校前代律徃徃加重盖刑亂國用重典非百世通行之法也朕當時改定七十三條皇祖已命施行然罪可疑情可矜者何止此也律設大法禮順人情齊民以刑不若以禮其傳諭天下有司務崇禮教赦疑獄嘉與萬方共享和平之福永樂元年大理寺卿薛巖等奏各布政司上所部具獄凡死罪百餘人請分遣御史臨决上從之顧謂都御史陳瑛等曰人命至重既絶不可復續夫治獄得情尤難鞭扑箠楚之下罪人成於鍜鍊者徃徃有之今百餘人之中豈能必其皆無寃枉爾分遣御史宜具書慎刑之意授之使論决之際詳探其情非其情者即與辨釋必揆之以理理不可生然後刑之則彼雖死無所恨矣二年四月諭法司曰天氣向熱獄囚淹久必病病無所仰給必死輕罪而死與枉殺何異今令五府六部六科恊助爾等盡數日疏决凡死罪成者俟秋處决輕罪即决遣有連引待辨未能决者皆令出獄聽候御奉天門録囚多所矜宥囚已皆出午門尚慮有枉抑者復召錦衣衛指揮陳逵鴻臚寺少卿郁㫋等謂曰囚皆久困於獄而乍至朕前久困則雖枉而不求辨初至朕前則畏威而不敢言有此二者則刑罪豈能皆當爾等更以朕言從容審之果其有辭即来白刑官引奏浙西人告人誹謗罪及追至面對皆未嘗相識告者當抵罪上諭之曰此譬之蛇蝎不可暫留留則復毒人其速誅之即日棄市八年新進士王疹自陳臣家與奸惡外親有連今聞朝廷已下本貫籍沒臣家臣雖中進士寔罪人應就繫上諭三法司曰學至於中進士亦成材矣成材勿棄其有罪能自陳可務併其家宥之法司奏冐支官糧者上怒命戮之刑科覆奏上曰此朕一時之怒過矣其依律自今犯死罪皆五覆奏著為令洪熙大理寺論囚上惻然曰人命至重帝王以愛人為徳卿等職理刑輔徳宜贊朕志毋俾含寃地下傷天地之和命府部通政司六科同法司於奉天門㑹審已特召大學士士竒榮幼孜等至榻前論比年法司之濫擬大逆不道徃徃出於羅織先帝為之切戒故事死刑五覆奏而法司壹不以措意今審决重囚卿三人同徃慮期審克必中閣學士同審録始於此元年詔朕恭承大統為天下生民之主惟我皇祖皇考愛民之仁祗率不怠旦夕思念人命甚重哀矜庶獄惓惓在懷夫刑以禁暴止邪導民於善豈專務誅殺哉故律令之制善善長而惡惡短罰之輕重咸適厥中顧執法之吏不能持平有虚飾其情傅致死罪而比附謬妄尤甚枉人朕甚憫之夫五刑之條莫甚大辟大辟之施身首異處斯已極矣自今有犯罪律該凌遲者依律科决其餘死罪止於斬絞法司並不許牽合傅㑹昧情以致寃濫若朕一時過於嫉惡律外用籍沒凌遲之刑法司再三執奏三奏不允至於五奏五奏不允同三公及大臣執奏必允乃已永為定制文武諸司自今亦不許恣肆暴酷於法外用鞭背等刑以傷人命尤不許用宫刑絶人嗣續有自宫者以不孝論且人之為非固有父子不相為謀者虞舜為君罰弗及嗣文王之世罪人不孥自今惟犯謀反大逆者依律連坐其餘有犯止坐本身毋得一槩處以連坐之法古之盛世恒采民言用資戒警今兇險之徒徃徃摭拾誣為誹謗法吏刻深鍜鍊成獄刑之失中民則無措今後但有告誹謗者一切勿治爾中外文武羣臣宜端乃志悉乃心畏天愛人務崇寛恕庶有以佐朕父母斯民之治或有違者必罪不貸敷告天下咸使聞知諭侍臣曰方孝孺軰皆忠臣也宜從寛典明日御札付禮部尚書吕震曰建文奸臣其正犯已悉受顯戮家屬初發教坊司錦衣衛浣衣局并習匠及功臣家為奴今有存者既經大赦可宥為民給還田土凡前為言事失當謫充軍者并宥之宣徳八年勅三法司言朕體上帝好生之心惟刑是恤今爾等覆詳天下重獄而犯者逺在千萬里外需奏當即决亦何能無寃抑者乎人命至重死不復生其遣亷能官分詣所在同三司廵按御史及府州縣官公同詳審若情犯深重無寃者聽從處决如情可矜疑及審異不服者具奏遣官審録自此始又諭古孟夏斷薄刑出輕繫仲夏挺重囚益其食所以順時令而重民命也我祖宗時遇隆寒盛暑命法司審囚繫卿等皆先朝舊臣親所聞見今嚮暑宜量情罪區别又諭朕夜来觀周書立政篇有云式敬爾繇獄以長我王國此深有意味盖能敬慎用刑不致枉濫則仁恩浹洽足以培固國本福祚豈不靈長宣徳四年吏部奏第二甲進士王懋應授從七品官其兄嘗為御史以誤决死囚抵罪懋乃極刑家屬當罷不録上曰士勤苦學問始登一第棄之可惜朕記憶皇祖時一進士以極刑家當罷念其成材之難特命吏部録用此故事也其以懋為州判官刑部奏决重囚上命公侯伯都督尚書都御史同審覆諭之曰古者斷獄必訊於三公九卿所以合至公重民命卿等徃同審覆毋至枉死太師英國公張輔等覆審還奏訴枉五十六人上命法司重與勘寔又勵之曰殺不辜者縱免人責難逃鬼誅不可不慎七年都御史顧佐言觀政進士宜照永樂年例於刑部都察院理刑者與御史郎中主事分理諳練政務從之各省府州縣民有擊登聞訴獄枉者上不欲兼庶獄勅藩臬官言朕荷天命嗣洪業孜孜夙夜惟保民之為務比者田里小民為官吏及勢豪侵損凌虐不能自存訴於郡縣又不能直淹禁嵗月寃抑駢死以致赴闕徑訴殞身不恤詞訟之繁故由於此夫理訟之道必得其情枉者直之犯者罪之所以戢横暴而安良善也今無理者肆虐被害者歸怨即設方岳風憲焉攸用乎今已命都察院榜諭越訴者爾等宜去惡衛善鋤强扶弱毋忽毋怠正統正統十二年差刑部大理寺官各賜以勅徃南北直隸及十三布政司㑹同廵按御史三司官審録死罪可矜可疑及事無證佐可結正者具奏處置徒流以下減等發落若御史别有公務督同所在有司審録原問官故入等罪俱不追䆒從大學士商輅之請也天順天順三年諭人命至重死者不可復生自天順三年為始每至霜降後但有應决重囚三法司奏請㑹多官從寔審録庶不寃枉永為定例諭法司曰春陽肇序萬物咸新在京文武官除贓罪外諸紀録悉與湔除命奉公守法錦衣衛按弋陽王敗倫事虚上因悟錦衣衛按獄之枉召輔臣賢諭之賢對曰誠如聖諭因言錦衣衛武人粗豪又國爪牙即法司明知其枉内憚之不敢辨乞特㫖諭法司許有枉者辨理毋畏勢避嫌於是上召法司臨誡如賢指人人悦服景泰初官吏故勘平人致死者論死不宥給事中于泰言其意本非故殺宜在所宥由是坐故勘者悉得貸罪景泰中監察御史左鼎等言小民無知犯法可以情而貸若官吏以學術發身以法律從事操威福之柄豈可懷私受賄巧文深詆殺無罪人原其情與故殺何異先朝屢有恩宥皆不及此豈列聖之仁明有所不逮誠以法者天下之公不可以私意妄有所輕重也章下刑部尚書俞士悦等言御史言是自後故勘者宜論死不宥從之御史苖穟言臣見府州縣衛所問刑官不問罪之輕重一槩監禁有一年不决者有半年不理者乞通移文在外問刑衙門今後真犯死罪監禁外其餘輕重罪囚不許久禁照舊例大事五日小事三日不與决斷者聽受禁之人赴廵撫廵按等官伸告則囚犯亦不致淹禁而囹圄空虚矣詔從之成化廵按南直隸都御史王恕言我太祖髙皇帝酌歴代律條定為大明律凡四百六十條頒示天下而名例律有云律令該載不盡若斷罪無正律比附應加應減擬罪名以上近刋行大明律後有㑹定見行律百有八條不知從何年㑹定如兵律多支廪給刑律罵制使及本管長官條皆輕重失倫不可行法官諳刑名者必不依此而流傳四方有誤筮仕入官之士非細故也乞追板焚毁㫖下言㑹定律紕謬可焚諸依此律出入人罪者以故論𢎞治二年勅法司言朕惟刑者民命所闗刑獄清則人心服而天道順一夫含寃致傷和氣災沴不免焉邇者京城雨水為災南京有風雷雨之異朕甚懼焉得非刑獄寃濫致然乎情偽微曖未易遽察問刑者各據原辭審録者多拘成案人命或鬭毆誤殺而檢勘者以為謀故盗賊或搶奪拒捕而廵獲者以為强刼中間有事出緝訪者務鍜鍊以成之此寃濫之所由也今特命爾三法司堂官詳加審録凡人命無屍可檢若屍朽難辨者盗賊追無贓仗或有贓非真者或情法不相當或情罪可矜疑或累訴稱寃而不伏或久俟證佐而未獲具情節奏讞審問之際尤須詳察色辭旁詢知證毋避嫌疑毋任好惡毋視權要為輕重務得實情以全民命原問官故入及廵捕人妄拏宥勿治爾其悉心殫慮明斷而以恕行之庶稱朕好生之意并勅天下諸司詳録重刑三年諭曩因災異勅諸司審録重刑諸情可矜疑及有辭者勿拘成案平反之原問官亦原勿究欲廣仁恩而全民命也今數十百人矣當兹春和天地大生朕思與其寛之於終曷若謹之於始兩京三法司及天下大小問刑衙門務存心仁恕持法公平審詞辨色詳審情罪大惡當懲者毋務姑息以長奸小過可宥者毋事苛刻以啓怨其無憑證驗情節難明者尤當加意推究毋踵訛以失出入庶不悖古人欽恤之意復嵗以天炎暑命法司録輕重囚毋淹刑部奏律條歴代相承損益無㡬勅令則世自為格宋人勅重於律斷獄以勅勅中所無方用律昔賢病之國初刑用重典取上裁榜文紛紛下洪武末定大明律刑官始得據依為擬議輕重畫一後又申明大誥諸有罪減等累朝遵用而法外遺奸列聖時推移損益之而有例例非律所該而實不大違逺於律特用輔律非以破律也而中外巧法吏或借以文飾私怒多引例便已意而律寖格不用於是命部尚書白昻都御史閔珪㑹九卿查議條陳定奪畫一其餘冗瑣並革昻等條上命覆詳更上已上覆摘條例中疑者六條命覆議已乃布行嘉靖元年詔諸司問刑一依𢎞治中欽定條例輔律行後新増例革不用於是刑部尚書喻茂堅以修省疏言自𢎞治中考定條例而来今五十年世變風移宜思通變以宜民乞命各衙門將歴年題准刑名事例情法適中經乆可行者條具咨送臣等㑹九卿通再申明㑹議除簡切易曉引用無差者照舊遵行外其間有例意本明而罪狀未合妄自摘引或事有專指而引用他條及妄自牽合或擬議已詳而語意未明該載未盡或處斷已當而事體未盡偏滯難行嘗經各衙門申明者各併為一條以便遵守其有雖經申明而擬議未詳或未經申明而引用易差與一切姦弊條例未悉者亦行斟酌損益因事推廣務求文義簡切情罪適均曉然於易知易行開陳具奏㫖如議行久之書成列上㫖刋布仍申今後問刑官任情妄引故入降黜之命萬歴二年三月廵捕營獲大盗朱國臣等十人下法司具服而朱國臣曰我等擒京師清矣且吾語若凡訊獄不可不慎如石駙馬街周皇親之殺我也而坐使女蕭荷花凌遲家人斬豈不甚寃臨刑不覺為之揮淚李皇親朝房人亦我殺其婢與僕棄首餙於道而坐拾遺人以死又一寃也今吾不言誰復為鳴之者於是法司追問所治荷花獄者而免侍郎翁大立為民謫郎中徐一忠於外三年議准各審録官量地逺近嚴立程限分為四等出京之後北直隸限三個月山東山西陜西河南限四個月江南江北浙江江西福建湖廣限五個月四川兩廣雲貴限六個月入境以辭朝日為始復命以出境日為始俱先具不違揭帖送部查攷如違前限從重叅究堂上官仍不時體訪如有不諳刑名行事乖方者即行叅究降黜崇禎諭法司朕法天好生矜全民命深念刑獄一道堪哀甚多今在京刑部等衙門已結未結各案人犯特命元輔㑹同清理業已有緒其北直南京及各省一應大小罪囚着該撫按責成道府州縣各官通行質審所有軍徒杖笞各罪應釋放者即與釋放應減等者即與減等有訊讞未結拘揑牽累監禁逾年者通着速問結或成招立案免提註銷都一一清楚不許一槩溷監其大辟重罪雖已奉㫖定案若有情可矜疑及年久有疾等項即一靣減擬保候一靣請㫖發落凡追賍人犯除軍需庫藏起解京邊錢糧侵欠奸弊應追不饒及就中仍聽酌議外其餘賍罰罪贖給主徴逋等項都着察明寛免或減半或全豁不許仍前覊繫敲比至於佐貳等官尤不許擅受詞訟徑送監舖違者拿問治罪各撫按官須遴委精明道臣風力推官分行各府俱親詣獄監審理疏豁一應減罪減贓都悉心詳酌分别年分久近事情輕重以為差等務期一清淹禁盡滌煩寃寜失不經勿入非罪以稱朕愛民慎罰刑措圄空至意爾法司還察照道里逺近分立限期與各撫按官去如有奉行不實玩視虚應者察出從重究治其凜奉之勿忽十五年二月清獄詔刑獄所繫甚重法貴一成朕每加意詳慎有批駁以期允當乃法官不能仰體不肯執持始多失之輕縱繼輒務為深文疑揣游移率歸緩閣或因犯人孤獨無控竟置罔聞不讞不提經時累月或因追贓未了証犯不齊淹繫牽纒剖脱無日又有一等事理已明訊局可結乃胥役故為抑勒借端生枝仍行拖累以致獄案叢積貫索㡬盈釀沴干和深可警痛兹特遣元輔周延儒前去㑹同三法司官將大小一應獄情悉心清理除事干重大案已確審照舊監候外其餘戍遣配杖等項俱着詳審招案依律定罪請上發落至於犯証闗提未到贓銀追比未完亦當酌量事理或覊或保不得一槩溷監倘有事係寃抑情可矜疑雖在重罪不妨特疏奏請候憑裁奪總期疏淹理滯據法得情子以應得之條留其再生之路庶㡬惟明克允可望獄簡刑清縱使寜失不經猶是矜頑宥過尚其殫心詳覈設誠力行以稱朕好生欽恤至意春明夢餘録卷四十四
