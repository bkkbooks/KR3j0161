  text: 欽定四庫全書
  hash: sha256:64d9ff2e7643d8cd3464e7f4c9e75c7d6d85eb6ee80c540d6dcbeeab187b9ddc
  markers:
  - {type: page-break, offset: 0, content: '', id: KR3j0161_WYG_008-1a, image: WYG0868/WYG0868-0093c.png}
body:
  text: 春明夢餘錄卷八吏部左侍郎孫承澤撰殿門奉天門卽皇極門常朝之制每日晨興上便服御門文東武西侍鳴鞭畢鴻臚寺卿唱入班百官行叩頭禮分班侍立翰林學士侍御座左錦衣衞官夾陛西立六科給事中分侍左右御史分班面向北立鴻臚官屬立其後先一日謝恩見辭者於鴻臚寺報名至日先進午門外候百官叩頭畢鴻臚寺卿對御前宣奏姓名員數於午門外行五拜三叩頭禮畢五府六部以次奏所司合行事次通政司引入於御前面奏請㫖該司官出班承㫖大理以下有事則奏無則已次禮部引差使考滿官員次六科各奏㫖意題本守衞揭帖賞賜鈔錠次鴻臚宣奏藩府邊境所遣使臣上命以酒飯賞賜旣而兩京堂上新陞者及在外三司來朝赴任者面叩頭畢鴻臚卿唱奏事畢羣臣俱側身向上立鳴鞭畢上乘輦往御武英殿或文華殿閱章疏日率如此至午復出朝晚亦如之此每日常朝之制也每月朔望上具皮弁服御正殿百官公服叩頭畢分班侍立鴻臚寺卿宣奏謝恩見辭員數畢上出御奉天門視朝如常儀御門常朝答㫖一官員遣祭復命一官員陞遷面恩一官員到京面見一凡各衙門奏事無請㫖字樣者已上俱不㫖答一太常寺奏祭祀京營官請神旗祭旗手衞請旗纛之神祭幷六月初六日請旗纛晒晾吏兵二部奏頒給文武官誥勅尚寶司請寶捧寶幷請用寶及奏關金牌已上俱聖㫖是一官員面辭内有該領勅者叩頭畢聖㫖與他勅捧勅官承㫖捧勅下授之有該賜酒飯者受勅叩頭畢聖㫖與他酒飯喫又有該賜銀兩表裏者謝酒飯叩頭畢聖㫖與他賞賜一通政司奏事先一日進面帖内係吏部者聖㫖吏部知道戶禮兵刑工等部俱如之該都察院者聖㫖都察院知道其云本司奏者聖㫖該衙門知道一吏科進㫖意題本兵科進守衞官軍揭帖聖㫖接來司禮監官承㫖接上一御史及序班紏奏失儀官員内過大者聖㫖錦衣衞拿了過小者聖㫖饒他一夜間或從門縫逓出鑰匙一把或城上擲下食物及衣服等項以試坐更將軍其將軍接得鑰匙當卽逓進明日兵科引奏不用㫖答若食物衣服等項收執引奏聖㫖賞了他一吏部引奏知印聖㫖著東西邊跪的五箇做一都察院奏差御史接管巡按聖㫖著東西邊跪的去一年終各衙門類奏差錯聖㫖你每說的是且都饒這遭在外的還行文與他毎知道一每月初一日順天府官領耆老等聽宣諭内閣先期擬諭詞上進司禮監官録一帖隨侍俟彼奏畢皇上以諭詞面諭之或命司禮監官以所録帖與之常朝御史紏儀載風憲事宜户部署員外主事某人將笏落地事屬失儀合當拿問請㫖錦衣衞百户復命不行平身事屬失儀不謹合當拿問請㫖刑部主事某打斷復命例不叩頭却行俯伏事屬差錯合當拿問請㫖禮科引奏官吏人等數内官一員跌倒在地事屬失儀合當拿問請㫖進守衞揭帖官員跌倒在地事屬失儀合當拿問請㫖兵科給事中某引奏遲誤及刑部主事某奏事重複俱合通行拿問請㫖金吾左衞具奏俸糧官員數内一員跌倒在地事屬失儀合當拿問請㫖南京工部辦事官某奏事不出及跌倒在地事屬不謹合當拿問請㫖浙江布政司公差叅政某朝見不行平身事屬不謹合當拿問請㫖行人司行人某復命不行稱臣事屬不謹合當拿問請㫖陜西行都司指揮等官某等奏事行禮差錯俱合拿問請㫖鴻臚寺序班引班差錯合當拿問請㫖刑科給事中某引奏官吏人等七起說作八起事屬差錯合當拿問請㫖刑部署郎中某幞頭落地事屬失儀合當拿問請㫖兵科給事中某奏事遲慢及吏科給事中某失落題本在地俱合拿問請㫖都指揮某欽賜酒飯不行叩頭事屬失儀合當拿問請㫖河南按察司僉事某朝見行禮卑身太遲合當拿問請㫖鴻臚寺堂上官引彛人拖扯不起中間必有别情合著通使問别奏定奪請㫖鴻臚寺鳴贊某不候某繳勅先贊叩頭事屬差錯合當拿問請㫖西垣筆記當朝御門其御座謂之金臺旣陞座錦衣力士張五傘葢四團扇自東西陛升立座後左右而内使一執葢升立座上一執武備雜二扇立座後正中武備之制一柄三刃而圏以鐵線裹以黃羅袱如扇狀用則線圏自落三刃出焉防不虞也朝儀常朝第三通鼓起先開二門官軍旗校將軍先進擺列待鐘響朝官依次而進朝象以鼻相搭侍立午門外永樂初閣臣遇常朝立金臺東錦衣衞在西後因病用宫人隨侍遂移下御道東西對立値天雨各衙門俱上金臺奏事五府立西簷柱外六卿叙立東簷柱内閣臣退立於後景泰二年秋户部尚書兼學士陳循上請始復舊制朱字傳帖者奉天門朝罷駕興司禮巨璫持下丹陛呼該衙門官與之次日早朝該衙門官具奏本御前奏云傳奉事理補奏本鴻臚寺官接逓司禮小璫進覽墨字傳帖則出自左順門付該衙門奏行不復面繳若事未穏便須執奏者固不問朱墨也翰林管誥勅官例當捧勅俟上御門視朝陞座内閣門官以勅授管誥勅官卽隨輔臣登御階循廊從𢎞政門至金臺東輔臣立御幄旁咫尺誥勅官立輔臣稍後尺許俟領勅官過卽轉北向上拱立俟領勅官自陳某官奉差某處領勅有㫖曰與他勅去卽向北鞠躬授勅一躬而退其制始於嘉靖七年萬歴三年題准常朝該日記注起居史官四員列於東班各科給事中之上稍前以便觀聽常朝舊制每日御門决事萬歷初以方在諒隂聖齡冲幼閣臣議酌三六九日視朝及二年五月禮部請復舊制閣中擬二票上請仍定三六九日遂沿爲例萬歷五年定朝覲官面見儀兩京府尹行太僕寺苑馬寺卿布按二司俱於十二月十六日朝見外班行禮畢由右掖門至御前鴻臚寺官以次引見其鹽運使及府州縣有司官吏浙江江西十七日山東山西十八日河南陜西十九日湖廣南直隸二十日福建四川二十一日廣東廣西二十二日雲南貴州二十三日北直隸二十四日各朝見外班行禮畢仍至御前鴻臚寺引見其中廉能官面加奬諭賞賚此深得建國親侯之意葢從江陵之請也崇禎十五年七月初九日値常朝臨期傳免閣臣具揭進諌至二十七日䧏手勅褒嘉皇帝勅諭輔臣周延儒陳演蔣德璟黃景昉吳甡朕以涼德纂服昕夕靡敢荒寧幾務殷煩愆忘是懼賴卿等盡心匡導卽事贊襄視國猶家圖難於易調和銷弭未易枚舉卽如本月初九日偶因微恙暫免早朝方愧宵衣卽勤補牘卿等忠純體國念篤愛君上攷典謨惓惓於君要臣詳之義深惟易傳懇懇於晝勤夜静之宜意比韋絃言同藥石朕心忻悅是用褒嘉惟海宇當多事之時而拮据賴克艱之佐臣勞而君乃逸内治則外自寧卿等其益納誨無方匡朕不逮䖍終如始共保天休欽哉故諭崇禎壬午閏十一月初七日上諭二祖舊制日常朝見羣臣裁决政事朕今率循成憲除門朝照例應免日期傳免外餘每日視朝畢勲戚文武諸司等官有欲奏事者赴𢎞政門報名候召内外官員敢有壅蔽阻當者定以奸欺論斬按御門非古制也古制天子居總章明堂惟閏月則居門故閏字從王從門也春明夢餘錄卷八
