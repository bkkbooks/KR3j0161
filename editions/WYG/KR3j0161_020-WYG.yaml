body:
  text: 春明夢餘録卷二十吏部左侍郎孫承澤撰帝王廟帝王廟在阜成門内大市街之西永樂定鼎北京諸祀畢舉惟帝王無廟嘉靖十年中允廖道南請改大慈恩寺興辟雍以行飬老之禮撤靈濟宫徐知證知諤二神改設歴代帝王神位仍配以歴代名臣禮部覆言今國子監乃祖宗以来臨幸之地恐不必更葺梵宇舊址重立辟雍惟都内喜佛寺係元人􅁋制敗壊風俗相應毁棄靈濟二神當時已得罪名教固宜撤去但所在窄隘不足以改設帝王寢廟宜擇地别建得㫖邪鬼􅁋像可便毁之帝王廟工部其相地卜日興工於是工部銷毁􅁋像㑹官相擇帝王廟地因言阜成門内保安寺故址舊為官地改置神武後衛而中官陳林鬻其餘為私宅地勢整潔且通西壇可贖還而鼎新之詔可遣工部侍郎錢如京提督工程名景徳崇聖之殿東西兩廡南砌二燎爐殿後為祭器庫前為景徳門門外東為神庫神厨宰牲亭鐘樓又前為廟街門東西二坊曰景徳立下馬牌大學士宋訥帝王廟碑兩儀判而人極立大統建而君道眀越自上古神聖繼作代天理物以開萬世太平之治故天地以之而位四時以之而序萬物以之而育大經大本以之而立盛徳相繼傳至於今欽惟聖天子受天明命肇修人紀以建民極纘皇帝王之正統衍億萬年之洪基稽古制作廟京邑以祀歴代帝王重一統也相舊廟地介乎通衢䙝而勿嚴洪武二十一年秋始命改作于欽天山陽越明年己巳夏五月三日工部尚書臣秦逵奏成功請文劖石詔臣訥為之記臣忝職胄監懼不敢辭謹拜手稽首而言曰帝王功徳於昭於天宜有清廟以宅神展敬歴世以来祀典斯闕三皇五帝祭于肆類僅見于周而堯舜禹湯發迹肇基及所經歴之地或有祠焉遣使致祭後世有之至於合廟京國嵗修享禮古未之聞皇上定鼎江右治功既成神人洽和禮樂明備凡廟祀之凟禮不經謟神非法者一切去之正名定統肇自三皇繼以五帝曰三王曰兩漢曰唐曰宋曰元受命代興或禪或繼功相比徳相侔列像於庭金玉其相衮冕焜煌聚精㑹神咸宅於兹毎嵗春秋二仲諏日誓士上御宸極制命大臣齋眀承事籩豆靜嘉粢盛豐潔告充告碩神格洋洋所以推惟本始式昭曠典者至矣三年則命奉香幣詣陵寢具儀物以時致享又以昭聖顯靈而示不忘也嗚呼天生民而立之君所以靖亂也康濟天下阜成兆民而登之仁夀之域者皆以奉若天道而已是故前乎三代之家天下者亦天也皇帝王之繼作漢唐宋之迭興以至於元皆能混一寰宇紹正大統以承天休而為民極右之序之不亦宜乎秦晉及隋視其功徳不能無愧故斥而不與是可見皇上敦名實重理道崇徳報功大公至正之心真足以度越百王垂憲来世永永無斁謹為之銘曰惟皇作極克配天地丕昭盛化以正大位皇道而皇帝道而帝歴夏商周三王迭繼熙熙皥皥同底於治於赫漢祖寛而有制光武奮興炎靈用熾唐興晉陽遂有神器太宗重光力行仁義明明有宋其徳克類暨于元氏而亦用乂豐功茂徳後先輝賁翼翼新宫有侐而閟貌象既嚴皇靈斯蒞享祀苾芬儀文孔備陟降在庭神之攸塈祚我皇眀以克永世洪武元年祀三皇用太牢以勾芒祝融風后力牧配四年今天下立三皇廟嵗春秋祭已而祭扵陵是年命禮官㕘考古帝王在中原安養人民者三十四君合祀之擇名臣從祀六年上從禮官言古帝王有父子祖孫合祀非禮乃别立帝王廟同堂異室祀三皇五帝禹湯文武漢髙光唐髙祖太宗宋太祖元世祖其守成賢君令所在有司祭于陵七年塑帝王衮冕坐像上曰伏羲神農未有衣裳之制勿加冕服二十年以武成王從祀去王號二十一年禮官擇歴代名臣始終全節者三十五人請從祀上曰趙普負太祖不忠不可祀元穆呼哩安圖祖也不可祀孫而去祖可祀穆呼哩罷安圖并巴延阿珠勿祀又曰漢陳平馮異宋潘羙皆宜祀又曰文王雖基周命終守臣節唐髙祖有天下本太宗也可勿祀祀于陵增祀隋文帝是年廟火改建於欽天山之陽去隋文帝又增帝王壇于大祀殿以孟春從祀天地惟仲秋祭於廟嘉靖九年罷南郊從祀禮官請加南京廟春祭上不從令建廟京師以嵗仲春秋祭罷南京廟祭十年春上祀之文華殿是年廟成殿中奉安太昊伏羲氏炎帝神農氏黄帝軒轅氏東奉安帝金天氏帝髙陽氏帝髙辛氏帝陶唐氏帝有虞氏西奉安夏禹王啇湯王周武王又東奉安漢髙祖皇帝漢光武皇帝又西奉安唐太宗皇帝宋太祖皇帝東廡則風后臯陶龍伯益傅說召公奭召穆公虎張良曹参為一壇西廡則力牧䕫伯夷伊尹周公旦太公望方叔蕭何陳平為一壇東之次則周勃馮異房元齡李靖李晟潘羙岳飛許逺為一壇西之次則鄧禹諸葛亮杜如晦郭子儀曹彬韓世忠張浚張廵為一壇從祀是年上親祭修撰姚淶請罷元世祖并從祀之臣穆呼哩等凡嵗仲春秋太常寺題請遣大臣一員行禮四員分獻凡子午卯酉之秋上傳制遣樂舞生祭於陵其年罷秋祭昔人議罷唐髙祖而祀太宗為非者謂温大雅大唐創業起居注義旗之初皆由帝㫖大郎二郎尚未軒輊及入關東討秦力雖多然身係嗣𦙍何殊将帥禁門之舉不無遺議焉而遽謂功盡彼出罷父祀子靈豈無知至於從祀云者以臣事君耳中興諸君未聞爼豆而其臣儼然且仲虺列於見知甘盤稱為舊學梁公之伐逺過西平淮隂之寃有同武穆而舎彼取此義復何居也春明夢餘録卷二十
