body:
  text: 春眀夢餘錄卷四十五吏部左侍郎孫承澤撰刑部二愼刑葉良佩曰夫刑法者禮之輔也禮者晅潤而法者震曜禮者身軀而法者手足禮者主君而法者弼佐彼此相湏以為道盖闕一不可焉者也賈生之論取舍固嘗貴禮而賤刑矣彼有所激而云爾也非聖人制作之本意也彼見嬴秦滅詩書而首法令其極也民怨而風衰而秦遂以亡國故為是抑揚之說欲時君矯而歸諸正爾乃若聖人之意其制刑也正所以輔禮是故出禮則入於刑何以眀之夫君令而臣恭父慈而子孝者禮也反是而不恭不孝則有刑吉凶賔軍嘉各有儀節禮也反是而猖狂自恣慆慢匪彜則有刑故曰刑者禮之體貳也聖人之所藉以平治天下之道盖莫要於是矣是果聖人創而為之乎則非聖人創之也昔者臯陶為理嘗陳其道於帝舜矣曰五禮五刑壹皆天之所命也聖人不過能奉天而勿失爾子孟子曰瞽瞍殺人臯陶執之舜寧竊負而逃而不敢以父故貸法成王謂君陳曰殷民在辟予曰辟爾惟勿辟予曰宥爾惟勿宥由是觀之則法者雖天子不得以自專若是者何哉其意以謂吾之所以為天下者以禮而已若法不行則禮壊禮壊則民無所措其躬而天子亦將無以自立矣夫安得不執而守之乎臣之於君猶君之於天也昔者石奢為楚王相其父殺人奢縱之而以其身請罪王赦之奢曰不可不縱父不孝賣國法不忠乃伏劔死張釋之為漢廷尉人有犯蹕奏當罰金有盗高廟玉環當棄之市文帝大怒釋之曰法者天子所與天下公共也若更重之是法不信於民也固諍弗易夫死者人情之所甚惡天子之怒人情之所甚恐也乃二子獨若是焉何哉所以為君上守法也故臣之法受之於君者也若不能為君守法則失其所以為臣君之法受之於天者也若不能自守其法則失其所以為君誠使君臣各得其職則法行法行則禮立以禮為天下其升而為大猷也何有先儒謂律為八分書盖以其輔禮與道而言之也然則非深於道者不足以議禮非深於禮者不足與議刑於戯刑法之敝也久矣安得深於禮道如舜與臯陶者而與之議刑法哉劉球疏古者人君不親刑獄而悉付之理官書所謂予曰辟爾惟勿辟予曰宥爾惟勿宥惟厥中盖恐狥喜怒有所輕重於其間以致刑失其中也近者法司所上獄狀有奉勅㫖減重為輕加輕為重者法司既不敢執奏至於訊囚之際又多有所觀望以求希合聖意是以不能無枉臣竊以為一㘦刑獄宜從法司所擬設有不當調問得情則罪其原問之官其運磚納米贖罪等項例亦非古法且使貪者得以倖免而亷者蒙辜宜令法司今後文武之臣除犯公罪許贖外其餘俱依律問擬則刑賞中而憲典彰矣致仕尚書林俊諫廷杖疏臣待罪海濵㝷中風疾手足不仁口眼失位遂就醫藥備後事繼聞有西北之報漕輓供億恐煩聖憂臣受知四朝敘復起廢者屢屢竟無能久於其位以宣有微勞陛下新政之初召臣衰以老矣又無能久於其位力乞休致顧蒙賜勅給役給廩嵗時存問臣疏辭未允强顔登受臣今氣息奄奄安望久居人世者哉自按察使乞歸已無起望附虚壙臣父墓之傍備納蛻焉前項致仕恩典及身葬祭通乞停免以為存殁之安臣又倣古人遺直遺表之義僭有獻焉夫議禮如訟見各不同包而容之徳之大也若粉墨大辨恐未足以服其心伏讀明詔仰見天地之大日月之明於斯有悔焉存恤敘復日候而久未聞也昔成湯改過不吝陛下儷徳堯舜於湯何有哉伏望早降溫㫖以荅幽明慰人望臣又聞古者撻人於朝與衆辱之而已非必欲壞爛其體膚而致之死也亦非所以待士大夫也成化時臣及見廷撻三五臣容厚綿底衣以重氊叠帊猶牀褥數月淤血始消正徳時逆瑾用事始啓去衣之端重非國體所宜釀有末年諫止南巡撻死之慘幸遇新詔収䘏士氣始囘不謂又偶有此臣又見成化𢎞治間詔獄諸旨惟叛逆妖言强盗好生打着問喇虎殺人打着問其餘常犯送錦衣衛鎭撫司問鎭撫奏送法司議罪中間情重始有來說之旨部寺覆奏始有降調之㫖今一概打問無復低昻恐舊典失查非袓宗仁厚之意即此二事似宜循舊臣又見去嵗以來舊臣謝遣殆盡朝宁為空伏望聖眀留念既去者禮致未去者慰留與數三大臣時加延接又有碩徳重望如羅欽順王守仁呂柟魯鐸輩乞引自近以裨聖徳圖聖政臣舌梗意長授書難盡無任懸結愛願之至刑部侍郎呂坤自陳疏高皇帝之定律也藁凡七易當重者自不從輕刑部之擬罪也法欲堅持寜死諫不宜阿奉而臣以不切不果之念退縮因循致令無罪輕罪之人吞聲飲泣有臣如此官守謂何臣聞三年大旱為匹婦之含寃六月飛霜因一夫之抱屈今刑部獄中含寃抱屈者不止二人也不平隠憤上徹雲霄鬱結窮愁散為氛祲臣上之不能為張釋之之執以悟聖心次之不能為蚳鼃之去以眀已志回祿煽熖孽自臣躬伏望皇上將臣罷斥責令刑曹以後詔獄一切奉法不得阿意奉承以損聖徳以戾天和臣即跧伏草莾所甘心矣刑科鍾斗愼刑疏臣按國家設官一事止屬一部而特於用刑一節有刑部以專理之而又有都察院同鞠問大理寺平反總之一禀承於律必使情麗於法罪恊其情而後已可見祖宗重刑之意較他事尤為拳拳曲切此羣下不得以恩怨為出入天子不得以喜怒為重輕者良法羙意豈不炳若日星哉何獨於今刑愈煩律意愈晦耶總惟問刑衙門於律意毫不講究所以一當斷獄條例茫然再經㫖駁便爾牽合矣大半移情就律何嘗按律定辜即不然而中無確見不敢成招或先後延挨或彼此推諉以致初終異詞証佐改口一獄而淹禁數月傳染漸入瘴鄉一案而沉滯餘年磨累幾登鬼錄諸如此類實可涕零職非不嚴催因循終是謬為牽合倘有游移附合者罪勿宥庶刑得其平而太和在宇宙間矣崇禎三年御史吳履中朝審疏近日者復朝審獄囚矣今日之獄囚非㝷常比駢首藁項率皆公卿大臣淮南子曰庶女呌天而雷下擊景公臺殞漢書載建和二年六月乙卯雷震憲陵寢室是梁太后聽兄冀枉誅杜喬也盖用刑一失其中則邪氣積蓄隂陽謬盩妖孽滋興不可不愼古者人君不親刑獄而悉付之理官書所謂予曰辟爾惟勿辟予曰宥爾惟勿宥惟厥中盖恐喜怒有所輕重於其間以致刑失其中也向者見人情玩弛日甚積習難破大加懲艾嘉與更始誠救寛以嚴而化枉為直之妙用乃法司所上獄狀一奉嚴㫖不敢執奏改輕從重輒經屢更皇上益以法官所擬原未蔽罪若留餘地以俟駁勘遂至堅於從重而訊鞠之際又多有所觀望以希合聖意不能無枉書曰與其殺不辜寧失不經聖人好生之本心如是也皇上敬天勤民同符堯舜臣下奉法無狀平反失宜習慣積獄之苦至屢煩眀㫖森切而無奈其漠然何也臣又稽會典載問刑衙門供招之外不許妄加叅語謂口供既眀何須蛇足意念深矣近者供招多不出囚口但彫琢為工犯人難解殊非刑名之體此又以煩文而掩律意不思獄以得情為主律以至中為法情溢乎法法踰乎情皆非確擬嘗讀書見成王之命君陳予曰辟爾惟勿辟予曰宥爾惟勿宥惟厥中夫成王君也不難降志令臣勿就君以就中中之為言不偏無枉之謂也况内外法司當思法律者祖宗之法律民命者朝廷之民命而可不眀制律之意體欽恤之仁任臆强合以屑越於其間哉夫一女含寃三年不雨匹夫結怨六月飛霜其寃抑之氣有以干天地之和召水旱之災闗係非𣺌小也兹值聖主當陽多男應索凝祥集慶千古罕儔者正惟寛仁之性上符天地即不得已而用刑輔治猶以清繫釋寃惓惓申諭諸臣何復妄為揣摩不仰體我皇上好生之徳哉伏乞嚴勅問刑衙門一切讞獄俱要眀律意不許少為增減上干天譴所當矜疑解網以施法外之仁此則刑罰為生死斷續之闗未必非天心所憫惻而示皇上以儆懼者也南刑部主事曹荃求致治之原疏竊惟是非者天下之公事偏用之則徼倖者生端而報復無已賞罰者人君之大柄輕施之則習視為固然而威勸不靈以今人心懈弛吏道陵夷之秋而概以尚徳緩刑之說雜陳於座右臣知其無濟也然臣在刑言刑所求於聖眀者惟欲用法之平且當耳以今觀之竊有憂焉皇上所與共理天下者二三執政也自錢龍錫以輔臣下獄而政府畏罪一味柔隨即安危大事囁嚅莫敢發口矣所與綜核庶政者六卿之長也自易應昌以執法重譴而士師懼禍巧用揣摩即昭然爰書游移莫能自主矣詞臣者啟沃之資也自楊世芳劉必逹以閱文拘謹置之司敗而主試一席人皆視為畏途矣監司守令者郡邑之綱紀也左應選力捍危疆聲名甚著偶掛彈章幾不保身王忠孝清操自矢囊無尺縑禮數稍疎隨被逮訊而保障者無必死之志飲蘗者懷不測之虞矣諫臣之設欲其舉賢無隱也王績燦吳執御吳彦方以薦揚縲絏而言路吞聲雖有正人端士不敢入告矣直言之旌欲其糾慝不避也摘發厰衞之許國榮以鉛斤落職抵觸閹寺之金鉉以銃門褫逐甚而馬思理高倬諫用中涓雅有風亮以漫不相渉之草場累月繫鞫而危言賈禍宵小益肆其鋒鋩碩士莫措其手足矣夫三代之世坐石垂緌而民知耻者罰當其辜也叔季之時深文峻誅而下不辱者罪浮其實也煌煌聖世雷電日赫而恬不知警至矯激之士借以為名高詭恢之徒因端而餙說可不為深省者乎且皇上今日而欲行法則内臣之遣尤不可不愼也何則内臣不出則雪霜雨露皆屬君恩内臣既出則兵刑矯竊半歸中貴今者大小臣工毛髪細過一經指摘罰不踰時而張彜憲鉅萬贓私悉置不問邊臣餌敵飬交立就榜掠而王坤同主欵議反蒙優詔然則内臣有功而無罪有賞而無罰有彈駁之權而無斧鉞之凛將來鴟張又奚所底止乎海内元元誰非赤子内外人臣誰非耳目平則萬物皆安不平則百職俱隳臣身在南雖無言責而臣職惟刑實有官守用是據見敷陳伏懇聖眀察其狂瞽特昭廣大既沛好生之仁復開改過之路庶執政攸司益詳于眀允即蒙譴諸臣彌勸乎浩蕩矣崇禎十年中允黄道周愼喜怒疏臣坐狂瞽自廢五年不圖殊恩又逄再造去嵗秋盡驚聞邊警匍匐入都萬里載途經冬始到自謂七尺殘軀已非臣有頂踵可効不敢自存然自元正見朝以來依阿淟涊遂歴春夏出無一語可報聖眀入無一言可對衾影還顧徃年自請使鮮經理東江之事俱成囈夢凄然淚下緬觀自古忠藎之臣竭力致身有懐必盡未有自欺其心以欺其君頑鈍不肖如臣今日者臣自度血氣已衰學問不進利疚威怵事事創心怔忡之餘遂成痼疾正擬呼籲乞身自投溝壑而雨澤未降雲漢其勤方陛下宵旰殷憂之時群臣修省惕厲之日臣雖無知安敢自絶然觀邊圉洊驚㓂攘式内亷耻道衰人心盡䘮非有獨立不懼有霣無貳之臣必無以灑發夙心湔除暮氣而諸臣過自懲艾茍免朝夕無敢為陛下昌眀其說者勿論其他即如近者中外齋宿為百姓請命冀下沛澤以成麥秋即釋滯囚斷庶獄繪監門之圖徇烹桑之請猶未足以上叶元載下慰蒼生而五日之内繫兩尚書衿紳咋愕道路嗚咽未聞有一臣寮敬申一疏者又安望其戡亂除兇蠲寃解網贊浩蕩之恩成霖雨之業乎以陛下寛仁優容言路猶且如此盖自三百載十三宗以來未有士氣不揚隨風茅靡至於今日者矣臣觀天下災祥繫人主之喜怒人主喜怒係天下之安危古之聖人喜氣行於臣隣則臣隣興作怒氣行於邊鄙則邊鄙廓清詩曰君子如祉亂庶遄已君子如怒亂庶遄阻君子之喜怒皆以撥亂故爭於其大不爭於其細今大猶不爭細故是競朝無一可喜之臣則臣無一可起之事邊無一敢怒之氣則亂終無一遄阻之日威順反施貴賤倒置是以姦昏互煽叛逆蜂起四方潰決漸不可收亢陽之極至為旱災而大小臣工猶結舌不語使陛下焦勞於上百姓輾轉於下諸臣括囊其間稍有人心宜不至此也臣非言官黙不違道然受特恩起自草莾雖不以言自居天下猶以言責臣逺有韓愈陽城之嘲近有孟軻蚳鼃之諷自顧惕然無以自容其一二高識之士猶以臣前者開政府諉卸之端後者堅詞林緘黙之路負恩藏拙逺媿古人臣何知言知有臣之心而已臣自欺其心則何以事陛下惟立賜罷黜以激素餐之恥以發感恩之忠以垂有懐不盡之戒臣擊壤荷榮没齒無怨謹此奏聞給事中姜埰宏作人之化疏臣讀易之賁卦觀乎人文以化成天下而其象曰君子以眀庶政無敢折獄自古文章興獄事不多見臣聞東南文學之士彬彬盛羙爰有復社之名敢云人盡才能要而論之闡眀經史銳情講誦其間即有二三之士懐古憂時慷慨持言扶進正論觸犯威嚴者或亦規勉大義匡翼眀時非盛世所宜諱也如以為分外狂瞽宋臣范仲淹不自其為秀才時以天下為己任乎乃自罪輔密承衣鉢事類坑儒不曰誹謗即曰結黨一事而株連無盡一人而毛疵必求嗟乎罪輔固未之深思耳夫所貴乎佐理機務者以其無可誹謗也事茍害治縱使緘舌亂靡有底孔子曰天下有道則庶人不議此言上下之相應也上世指佞之草猶有屈軼宋時太學諸生佐闕朝政假使大臣壅塞專固嚴猛廹促民力屈絶當時小臣不敢直言而士子代之士子不敢直言而文章代之此亦世道之不幸而執政者之羞矣大臣返躬循省豈盡無過若空言賈罪立䧟阱機卒使投止望門張儉有亡魯之禍處士橫議申屠絶梁碭之踪抑亦過矣且罪輔亦知天下之事士子不留心誰當留心者布衣擔簦之時朱紱簮筆之日總此人才國家累世育飬幸有經術湛眀之儒指陳切隱禆益上理士茍不攷古今治亂之端當世得失之故其人之賢不肖為何如也若慕仁義者號稱多事忤權姦者輒為狂生幾何不輕學校而罷師儒也不獨此也學校可輕始而畏䜛口者繼而諱文事師儒可罷始而廢社課者繼而壊文運其於皇上豈弟作人久道化成之治不大傷哉目今郷會兩試正人文消長之時伏祈天語申飭俾天下之士勿以復社為危機維繫國運不小抑復社之禍始於周之􅇪之誣訐張溥也張溥一代著述之手砥礪名行折􅇆古今不幸齎志以殁天下惜之昨見臺臣劉熈祚疏請表章聖學幸蒙睿鑒併祈皇上予以易名之典以重文學之臣詩曰古之人無斁譽髦斯士臣為皇上頌之矣崇禎十年中允黄道周求言省刑疏臣自計此生應死不死應黜不黜曲荷生全者再四矣旁皇彌月欲求一靖獻不可得凡懐疏欲上中止者三非獨謂言非其職亦深知建言之難也鬰鬰昏病沉眩二十餘日時科臣陳昌文與臣同病竟死令臣當日死則亦死矣縱有忠言誰為白者臣迂蒙寡特於中外大計無所復知所懇懇欲以空言眀報者誠以天下神器為之有道簿書刀筆非所以䋲削天下之具也古之聖人設為禮樂以治方内設為征伐以治方外禮樂不足以治其内始有縲絏纓釐纒於君子征伐不足以治其外始有揭竿裂帛縱於小人周宣王中主耳自文王至於宣王亦二百六十年而後中興宣王感旱魃而修行是為雲漢之詩其詩曰王曰何辜今之人言宣王側身憫下之至也感玁狁蠻荆而修政是為六月江漢之詩其詩曰王猷允塞王心載寧言宣王憂思謀畧之逺也宣王内以至仁憂其臣庶外以至眀至武奠其封疆是以吉甫召虎之倫皆以儒生躬贊大業享有太平者四十六年今陛下則皆見之行事矣而天下大勢未可頓回人心未可頓收兵戈搶攘未可頓息所當深維其道講求其故考證詩書以鞏其後齷齪瑣人安足共圖大計乎古之聖人愛人以立體知人以致用其所知者不過數人其所愛者及億萬人知之道無他亦曰能愛人安民而已共工伯鯀身亮天工使土水不治人民不治雖明神之胄不保幽羽之戮今陛下寛仁𢎞宥葢有身任重寄七八載罔效尚擁權藉自若者夫以風動之時人心淳固龍蛇作孽不足以亂天下故寛假以九載之績今生民塗炭朝不及夕一夫晨呼百臂齊奔而東西悠忽若此是有道仁人所倚席而廢箸也臣觀陛下每值天戒輒避殿省躬率先群下此自古聖主所未嘗有而股肱心膂竟未有得當以報陛下間有隂陽災眚兵戈之害則率云是郡邑無狀所致郡邑州縣猶之坌土所應不過百數十里之内何足以廣召祲氛漢蕭望之以御史大夫欲應天變上猶薄之何况州縣承流象指者凡天下風化轉移隂陽若否皆視當宁之心氣當宁之心敬則天下皆敬静則天下皆靜當宁之氣和則天下皆和平則天下皆平當宁之心氣既以敬靜和平而天下猶有不敬靜和平者則二三元老當刻責自厲奈何使草土臣庶市其怒色乎積漸以來國無是非無枉直郡邑長官茍且了事誠可憤痛然其視聽一繫於上上急催科則下急賄賂上樂鍥覈則下樂巉險上喜告訐則下喜誣頼今天下巉險誣頼之徒群聚京師鳥聲獸聲白晝相呼縉紳俯首屏息以伺動定皆曰是有繇來孤危之臣重足而立幸逢陛下好生下詔求言省刑清獄如清執學臣俾復原官中外鼔動此軰稍稍歛戢然方求言而建言者輒斥方清獄而下獄者旋聞臣思自古致治之道惟此二端清獄之端出於惻隱惻隠為仁引而充之仁一人即可仁天下小民雖有納溝之痛縉紳猶多雉罹之嗟求言之端出於是非是非為智引而充之知一事即可知萬事君子猶有畸偏之談小人豈有虚公之論今陛下仁智端竟甚眀而大臣引伸擴充不力昔太祖在干戈控攘之中尚日與劉宋章葉講仁義究道徳以為戰勝之術今公卿即多暇而戎馬倉皇干戈擾攘江淮之間不合如礪雖張仲山甫處此未遑舍六月而歌清風奈何與市井細民申勃谿之談修睚眦之報乎臣自少迄今五十年孤踪塞兌不言人過然私誦聖賢之言以為清忠易許仁孝難知故有至道以責至人忠恕以恕僚友陛下慈孝即風動海宇豈必令二十年前閭巷飬驕無觸乳之犢陛下敦睦即雍孚上下豈必令二十年前縉紳無傾軋之嫌且以時事如此人心如此輔臣雖甚賢甚良甚清甚彊寧保天下四海無一蹴芻齒馬之事目下伏暑將徂凛秋且至最要者在安慶厲師措餉立限務掃英霍襄鄧之賊勿以若撫若勦諉之道謀最急者在寧錦訓練六師三軍預為固圉守險之䇿勿以若棄若存復成瓦注最便者在因士氣方朝開兵衝州縣另為選舉但約事平許以雄職勿以掣簽分地長其倖心最切者在起廢籍批鱗强項之臣使為秦豫襄廬諸道監軍但約賊平授之節鉞勿以别戸分畦銷其壯志又最不可緩者應詔直言之臣被訐無證之士悉以一面解其煩寃行此五事使天下凄風苦雨盡為祥雲寸短尺長畢成大慮諸臣之詬誶可以不解自融朝廷之刑威可以漸措不用然後以上歌采薇下誦天保講律度眀禮樂與周宣殷武嫓羙無窮臣雖長往没齒無怨又臣自未病前觀五月朔夕熒惑與日同在鶉首參火之分三辰皆火也又以朔夕合火宜修平火政稍節威光使火不為厲眀春熒惑在於大火徘徊氐房心尾之墟宜愼火器逖毖戎務漢臣盖勲曰㓂在於外而内陳兵黷則不武陛下洞燭歴理深眀天道握要以御四方求仁而蘇百族樽爼之内勝算自饒何必使舉朝精神敝於兵餉刑獄之下乎臣草野受殊恩無可報稱又被病濵死思一罄所懐非敢一毫感憤輕談時事惟陛下垂鑒憫其孤危惓惓冐昧乞賜生還冀遂首邱臣無任感激之至崇禎十一年給事中孫承澤微臣入告之初疏臣生長輦轂世受國恩蒙皇上親賜䇿問㧞置刑垣感激無地今當受事伊始因思以職掌為報稱首先刑獄盖治天下之道惟禮樂兵刑如刑失其宜召為兵端雖禮樂之中和無以布優優之政故古聖眀王莫不愼重刑獄或曰折獄致刑或曰議獄緩死寛之嚴之使天下頌好生之徳而惕雷電之威非取必於姑息也如服其心殺之而不怨書曰五刑五用哉言貴當也邇來人窮物競易與為非往往自扞法網而大小臣工或不自毖愼辜負聖恩間置一二於法以明朝廷之憲典具在乾剛獨攬天下臣民誰不感極而惕息哉臣去年留考在京見皇上清理之詔一頒一時得釋者千餘人路傳巷語以為聖朝第一羙政不特此也出學臣袁繼咸於法而謗書不能誣人矣寛刑臣鄭三俊道臣曾櫻於私寓而不以一事没其生平矣即令堯舜復起不能有加臣仰體皇上之心必欲仁覆之心也刑罰其不得已而用者也凡司刑諸臣或拘於文法輕重不得其所麗而皇上以大明照之賜之駁難以求其當猶是眀法敕罰之仁心也而諸臣或妄相揣摩過於疑畏以是有經嵗累旬不敢即結者何以成法之平而使人自不寃耶故臣曰臣子不善用法以格皇上之仁也現今圜扉之中覊繫將滿其中豈無寃抑實干天和伏乞皇上憫此愚蚩𢎞開一面立敕再為清理其徒流各罪速令遣斷其人命非下手姦盗無原贓務令眞偽立分則所生全又不知凡幾矣至於逮繫各臣其事各有本末其罪各有應得决宜早令訊結勿令有應得之罪而不即定其案致有可矜之情而反不盡為解網也是留獄也豈我皇上之心哉如刑得其正臣竊意章疏朝上而聖斷夕報可也即臣工果有眞知灼見為當而非以私狥非以臆决即皇上以為不可而再三補牘聖眀亦必不以為凟䀨也虚公而執者臣子之道也威克厥愛者聖眀如天之仁也寧有成心於其間哉臣見邇因星變致勞皇上素衣避殿實圖修省則清理刑獄實弭災之大端也臣在刑言刑直據所見伏惟皇上採酌施行崇禎十六年給事中龔鼎孳請罷詔獄廷杖疏臣聞虞廷之命臯陶神聖一堂叮寜告誡至祥盡也乃其大要不過曰惟明克允以刑弼敎而已若是夫刑之與敎至相須也近者恭誦聖諭以天氣炎蒸省釋諸獄犯復於中原被兵之地特頒赦詔嘉與維新赤子投懐聞者歡動臣於是舉手加額曰大聖人仁覆庶物亦何周至而惻怛也即有虞欽恤曷以加焉顧小人之納溝可矜而君子之雉罹尤痛其敎戒之則君父之義也其生全之則天地之恩也往臣過南都士大夫為臣言詞臣黄道周蒙恩放還時下體蹇殘以杖助履臣為凄然淚下夫道周之清操力學夙荷主知使其當日死則竟死矣誰復能忍須臾以待聖慈之特注者又近者建言熊開元姜埰二纍臣受剏亦復類是使其當日死則又竟死矣誰復能忍須臾以待大恩之普及者故臣竊謂扑作敎刑雖盛世所不廢而當建鼓置旌之下寧期過愼以恤群情語曰刑不上大夫盖將以飬其亷恥使知自惜也陛下比年來罷告密而人慶更生清積獄而物無寃滯惟兹詔獄廷杖尚有待乎推慈夫祖宗之法累代相沿敢遽云置而不用然原其本指要以待大姦巨憝謀逆僭亂之徒非獨為臣子語言狂戅設也後雖駸駸失其初意乃典要所在必以俟諸不世出之聖人今亦望陛下謹所以用之而已昔叔向曰大臣持祿而不極諫小臣畏罪而不敢言此患之大者唐太宗謂魏徵曰人臣欲諫輒懼死亡之禍與赴鼎鑊冐白刃亦何異哉故忠貞之臣非不欲竭誠者乃是極難所以禹拜昌言良為此也夫太宗中主耳所言若此遂以成貞觀之治矧陛下淵虛仁聖度越百王者乎乃諸臣蓄縮茍且擇便圖安輒自為是頃者士氣日就茅靡人心日見頺䘮母論裂麻還詔事不敢為即伏閣犯顔亦云希覯不肖者樂為阿比而賢者並習於歛藏其始或止存乎懐刑而其後必盡趨於持祿波流莫砥可為深憂易俗移風是在陛下誠宜曠然逺覽俾士大夫滌其故心茍眞罪狀難寛不妨付之司敗至於榜笞屈辱實冀蠲除允若兹則士之亷恥立亷恥立則忠孝生忠孝生則智力畢奮純鉤湛盧亦其不折者可使耳善乎臣同官陳燕翼之言曰今日之兵必非持㦸武士也天下之守道守官却金逺佞者即陛下之兵每念斯語憬然汗出鍊鋼繞柔亦在乎所以飬之者矣臣故願陛下之廣斯至仁也極乎仁之效刑措可致而貞士守道愚夫慕義無復詭隨僥倖之謀世道其底於醇理乎崇禎十五年御史楊仁愿論寛緝事止遣緹騎疏臣讀勅諭申交結近侍之律義炳於日詞烈如霜中外臣僚孰敢不遵微臣拜颺之餘因稽高皇帝設官之初無所謂緝事衙門者不法之事祗於眀紏無隂訐也後來以肅清輦轂則有東厰然如神宗皇帝享國四十八年合天下臣庶登之春臺緝事之門鞠為茂草而亦未嘗有姦宄之滋故元氣日培士氣日張郅隆之業曷有過哉今幸我皇上聰明神聖即委任緝事亦無有炫日月之照者臣復何贅獨臣待罪南城所見詞訟多為假番即假稱東厰則魂魄俱搖况其眞者乎此由積重之勢然也所謂積重之勢者如此較事件則番役即懸價以買事件甚至誘人為姦盗而賣與番役則誘者獲利挾仇忿以首告而証以惡棍則挾者逞志厰臣豈不三令五申禁之然比較事件而又欲令其不買事件是吹薪止沸必不得之數矣嗟乎設阱布罟以待魚鳥人猶哀之况餌人以䧟禍擇人而肆喙惟恐其不為惡又惟恐其不即罹吾網羅揆之皇上泣罪解網之心豈不傷哉臣今冐昧一言亦恐禍機不測而臣不暇顧也伏願皇上先寛東厰事件而後比較可緩比較緩而後買事件與賣事件者亦息皇上勿急於求彼亦不必急於得皇上惟恐其寃累彼亦惟恐其波及此自然之理也如是而積重之勢稍殺匪惟輦轂蒙樂利之休内外闗通之事且不期自息矣抑臣復有請者如臣子獲罪國法難貸皇上勅撫按以檻車送詣闕下未為不可踐土食毛罔非人臣春溫秋嚴皆為聖恩固安所逃哉若緹騎一遣有貲者家門破散無貲者地方歛餽衞臣又非不三令五申禁之然而天威所遣䟦渉逺來彼自為長途計又安能已如使其罪可贖則留彼餘財以贖罪如不可贖則妻子衣食頼之自非劇惡聖眀亦豈忍籍没哉故飬無事之福以臻仁壽防有害之政以維平治惟我皇上聖徳天縱微臣拭目望之矣訟理洪武朝主事王國用為李善長訟寃疏竊見太師善長與陛下同一心出萬死以得天下為勲臣第一生封公死封王男尚公主親戚皆被寵榮人臣之分極矣志願足矣天下之富貴無以復加矣若謂其自圖不軌尚未可知今謂其欲佐胡惟庸者揆之事理大謬不然人情之愛其子必甚於愛其兄弟之子安享萬全之富貴者豈肯僥倖萬一之富貴哉雖至病狂亦不為矣善長於惟庸則姪之親耳於陛下則子之親也豈肯舍其子而從其姪哉使善長佐惟庸成事亦不過勲臣第一而已矣豈復有加於今日之富貴者乎且善長不知天命之不可倖求取天下之百戰而艱危也哉當元之季欲為此者何限莫不身為虀粉世絶宮汚僅保首領者幾人哉此善長之所熟見也且人年邁摧頺精神意慮鼔舞倦矣偷安茍容則善長有之曾謂有血氣之强暴動感其中也哉又其子事陛下托骨肉至親無纎芥之嫌何苦而忽為此凡為此者必有深仇急變大不得已而後父子之間或至相挾以求脱禍圖全耳未有平居安然都無形跡而倐起此謀者此理之所必無也若謂天象告變大臣當灾則殺人以應天象夫豈上天之意哉今不幸已失刑而臣懇惻為眀之猶願陛下作戒於將來也天下孰不知曰功如李善長又何如哉臣恐四方之解體也事枉寃延群臣杜口竟無一人為陛下言者臣恐懼愧恥忘其疎賤冀陛下萬一感悟甘就鼎鑊無恨疏入不報大學士張孚敬救張延齡疏臣因張延齡事情不能積誠上悟聖心罪當萬死伏思他人可委之無言臣受恩深重惟應死報皇上視臣有手足之親託臣有心膂之寄臣不盡言以明是非則臣負恩罪莫贖矣伏蒙聖諭謂延齡皇伯考懿親祗宜守分乃包藏禍心謀為不軌是何道也并所奉皇伯母傳諭錄示臣等作速議處因法司會問招詞未成不敢輕議十四日伏蒙發示會問招擬臣又覆看得張延齡殺人罪狀已眀誠不可宥而謀逆之情未眀故以一得之愚上請非以其眞有逆情尚敢以孝皇帝懿親求皇上宥之也随蒙聖諭責臣以左右大臣必為我皇祖保天下以殺逆賊同姓尚處死况懿親乎臣伏讀戰懼之至臣伏思皇上欲察延齡逆情眞與不眞行法當與不當請自今日在朝人心觀之也夫延齡兄弟當孝宗武宗時朝士多相交往臣時雖未入仕竊嘗聞之武宗彌留之際皇上迎繼大統未至京師閣臣上託昭聖皇太后懿㫖拿人輒自處斷彼時威權内外已震懼矣迨夫皇上嗣統閣臣等乃輒敢以皇上考孝宗母昭聖凡在朝者靡不翕從昭聖因自以有擁立之恩以子皇上為當然以致聖母至京莫知所以接見之禮皆臣下謬妄之罪以誤昭聖也彼時臣初為進士未嘗受皇上一命之寄皇上亦未嘗識臣為何如人臣只因見得道理之真故敢以一人犯天下之怒幸頼聖眀在上裁决不然臣萬死無益也今朝士恨臣之心實未嘗一日肯忘每欲相時報復雖昭聖皇太后之心恐亦未嘗一日忘臣者也嘗有人以斯言告臣者臣答之曰臣子事君惟盡此心之誠若夫成敗利鈍則在乎天而已臣自誓此心至死靡他也今者延齡之事臣觀内外大小臣工俱黙黙無言雖言官亦無敢言孰是孰非者何也實皆幸皇上今有此舉以為悉由議大禮中來得皇上誅㓕延齡家俾昭聖皇太后不得善終以深皇上之過以為臣及獻夫陽為解釋隂為佐助以重臣二人之罪莫逃於天下後世其設心如此而已特聖眀偶未察之耳臣連日伏思延齡殺人之罪誠不可宥皇上即殺之無得而議其他也如臣前議以處延齡或置之南京不得留住京師以滋惑仁壽宮之心臣之愚見盡忠於皇上者不過於此夫亂臣賊子人人得而討之况臣為左右大臣又受恩深重者乎設使延齡真有逆謀而臣得見之真即當首倡大義請加天討而族㓕之又敢為隱匿之自甘為叛逆之黨乎臣詳招所稱曹祖狀有曰天曹抱送六丁六甲及天神䕶伊之說皆渉妖言皇上聰明天縱必能察悉孟軻氏曰行一不義殺一不辜而得天下勿為也而况謀逆之罪㓕人族類臣於延齡此項罪狀實見得未真豈敢妄為議擬無所可否而重為聖徳之累乎臣又思皇上此等訪據皆未知出於何人或彼一時不思干係國家憲典重大或出一時報復之私卒難收救聖眀亦必自加察臣又思前次退休山中皇上召臣催勅内云自卿去後切軫朕思聖母嗟問者亦數次矣臣伏讀流涕哽咽臣思皇上所以思臣聖母所以數問臣者臣之心豈惟皇上鑒之聖母亦鑒之矣兹者天眷聖眀誕生皇嗣國本綿長萬加喜慶或以臣言上聞聖母亦必欲皇上寛法以處延齡之家者也誠或不察真情必欲斷成謀逆之獄則當如律行法族㓕張氏矣昭聖皇太后不知何以處之臣竊恐皇上之心必有所不安聖母之心亦所不安者矣臣承聖眀厚恩重託君臣一體休戚相同憂之也深故言之也切伏乞聖眀鑒察萬歴朝趙錦請矜宥張居正疏臣等連日廷議遼莊王次妃王氏所奏及湖廣巡撫李江勘報已故大學士張居正并其所犯事情議定將會疏上請退復相顧追維往事念不可不一聞於聖主之前方聖祖肅皇帝時故大學士嚴嵩特受眷知首叅幾務每不能仰體聖祖所倚毗之心而專怙寵行私其子世蕃復大為姦利於是中外切齒言者四起而聖祖方旋悟放逐命收捕世蕃而言者猶忿恨不已至謂世蕃有謀叛狀於是正世蕃之罪而籍其家時承勘者與撫按諸臣懼無以上應眀詔重干不測則虚上所當籍事而其實不符則又為株連影捕旁搜逺取以足之聖祖以為此所籍世蕃之物而不知其强半出於無辜之民閭閻之間至今瘡痍未起哀怨未平今日久事眀世蕃實未嘗有叛狀而徒流毒江西一省之民論者亦嘗謂其時大臣未有能為聖祖一言之者臣等每切恨之今居正受聖上特逹之知心膂之寄其際遇實倍於嵩而復不能仰體聖􅇆深圖報稱以至自干罪戾臣等亦何能為之諱聖上量同覆載眀並日月今所議勘處事情亦萬不至如往日世蕃之貽患亦復何言而臣等中居正所忌擯棄退處有年今幸遇際聖眀復得拔擢至此原其私心亦豈得盡無怨恨為國家計又不得復言其私心居正之家臣等不敢謂其一無所藏然比之馮保萬分不侔初抄没世蕃命下倉卒所得猶僅若此今居正之罪遷延日久即有微藏亦多㪚㓕今人心憤恨言常過當而聖意所向鮮克自持萬一復有世蕃往日之事則其所得當不及世蕃萬分之一而其流毒三楚更有十倍於江西之民者臣等又常見嚴嵩敗後閣臣多顧念後患不敢復出身為國家任事居正自以受皇上深知不復顧念而毅然引為已任今復過為懲創則後之為閣臣者懼矣故臣等以為欲無阻將來任事之心則莫若少寛於既往欲無流毒於全省無罪之民則莫若曲貸乎一家况居正身死名敗生平所蒙爵謚位號與其子弟官職悉從褫奪亦足以正其罪惡而垂戒於將來矣臣等又就其罪而觀之其過為操切壟斷富貴决敗名敎以致四海怨騰而國家元氣為之日消者種種有之然實未嘗别有異志而其受先帝顧托翊戴皇上於冲齡夙夜勤勞中外寧謐其功亦有不容於盡冺者倘蒙俯垂體察特賜哀矜不忘敝盖敝帷之義亦足以增光聖徳曲全國體其為闗係豈𣺌小而已哉臣等竊恐後之追恨於今亦猶今之追恨於昔故不敢不預為皇上一言欲乞俯亮臣等區區為國之心留神察省崇禎三年都御史易應昌議喬允升罪疏議得刑部反獄一案聖眀極其加意臣等無不嘔心伏念事堯舜之君不敢不以祖宗之律者臣等犬馬之誼素所自矢也臣等猶憶失獄之夜寒更凍燭徬徨而起莫知所措眀㫖闖城失火幾成大變安危呼吸豈不寒心天語一提猶堪骨凛所幸者聖眀先事綢繆無所不至故死賊無端欲逞人心有恃能安斯固祖宗之靈聖眀之佑允升等所以至今餘息者皆聖眀之賜也然使有律可引即不然有例可比臣等奉㫖何難另議惟律例無可加重是以問刑諸臣盡相對閣筆前疏披瀝具在御前皇上言必垂謨動而為法即如先朝失獄尚書侍郎止奪俸臣等前日猶必援之上請者曰此肅皇帝成憲也則今日允升等之徒杖他日亦必有援為議者曰此因邊警而别論我皇上之成憲也顧臣等前疏猶恭請天語申飭後不為例誠以祖宗法律為萬世法程今日遵律文正以遵祖宗遵皇上也臣伏讀漢史文帝晝行中橋有人從橋下走乗輿馬驚捕屬廷尉張釋之奏曰此人犯蹕當罰金上怒曰此人親驚吾馬頼柔和令他馬固不敗傷我乎而廷尉乃當之罰金釋之曰法者天下之公共也今法如是更重者是法不信於民上曰廷尉言是也文帝在三代之下纔稱中主然此事尤為千古羙談况臣等恭逢堯舜之君敢自遜釋之以傷皇上平明之理哉奉㫖之三臣何敢無說而處此提牢主事敖榮繼初以律應杖而議杖引例改徒二年今請加一年為滿徒三年尚書喬允升初以律所不議而杖既引例改徒一年今請加一年為總徒二年盖眀㫖遇警縱囚自當别論固輕重有權之意也侍郎胡世賞本以推遷出署又以擒犯效力前引同僚犯公罪不知情者杖八十更難再議矣獨臣等叨為皇上法官謂以守法為官今一加再加一時以奉命為恭皇上異時垂睿憲章問臣等應執爭今何不執爭畢竟無說之辭仍乞特頒天語後不為例臣等前疏所請終不敢不為皇上請者主事徐爾一為熊廷弼訟寃疏臣竊惟今日恢遼久無成績者由刑賞不平人心不服而最大莫如熊廷弼一案矣夫廷弼以失䧟封疆至傳首陳屍籍産追贓天下幾謂其罪無疑律矣乃臣按當年疏揭塘報轉覺罪無一據謂廷弼不死守右屯而是時廣寧兵三十萬糧數百萬盡入王化貞掌握廷弼止留援遼兵五千駐右屯距廣寧四十里耳化貞方無日不言進戰言剋敵而忽同三四萬遼民轉瞬盡潰當是時得此五千人不同潰足矣而弼罪安在謂廷弼不見事機乃當其按遼時已疏䇿必有事最後與化貞共事化貞仗西敵東而弼云必不可仗化貞信李永芳内附而弼云必不可信無一事不力爭無一言不竒中而其如當時廷臣方信嚮化貞轉責廷弼不能和恊撫臣何也而弼罪安在謂廷弼責在經畧而經畧無其實如屢疏原派兵馬不與而部覆又高閣束之如云名是經畧便主持由我則昔以有名無實而指為擁虚器抱空名者豈獨一經畧哉而弼罪安在謂廷弼殺戮太嚴而當時節節潰逃節節姑容法紀蕩然獨廷弼至遼始鳴鼓集衆斬逃將三人曰劉遇節王㨗王文鼎貪將一人曰陳倫又陸續斬逃兵數百人而軍心帖服無敢叛者豈非事理必當如是耶而弼罪安在臣按唐郭子儀李光弼之討史思眀也既與九節度之師同潰自應收拾潰兵扼河陽橋勢必不能以河陽一塊土為尾生之柱坐受思眀桎縳今計自廣寧而西僅山海一重門限廷弼不趨扼何待且能全此五千人不散至大凌河面付化貞正與慕容垂軍三萬獨全事正相類豈得與化貞之獨握兵馬而誤用西人誤信永芳以致潰敗者同日道乎可謂勞有足矜當三路初䧟時開鐵北闗相繼奔潰兵逃民逃將哭道哭惟餘遼陽一空城矣廷弼經理不及一載俄而迎拒敵兵於横河之上又於遼陽城下包甎鑿河列柵埋砲屹然樹一金湯令得終竟所施何至舉榆闗以外拱手授人而其如廷議囂呶不得使少安其任何而今俱抹殺不論矣又當廣寧再潰時試問在廷諸臣幾人留眷屬在京守闗諸將幾人敢寓目闗外乃當闗者慮姦細混入閉闗三日衆心洶洶廷弼至闗盡勒卸刀馬在外洞開放驗凡二百八十餘萬人令當時鎮讋無人分處無法致此二百八十餘萬帶刀乘馬蜂擁入闗不知此日闗上風聲鶴唳之兵作何景象在廷不留眷屬諸臣作何鎮定而今又抹殺不論矣乃其所由必死則有故矣才既籠盖一時氣又凌厲一世人望之辟易揭辯紛紛致攖衆怒是則所由必殺其軀之道耳然夷考當年為廷弼鳴寃闕下如閣臣韓爌部臣周嘉謨科臣惠世揚臺臣周宗建等皆濟濟名流也至督臣朱爕元亦西南勞臣聞廷弼按斬輒嗟吁懊䘮數日臣時為屬吏耳聆最真而聞廷弼被勘被逮時天日無光此足觀近臣所主逺臣所為主上干帝天之怒下灰將士之心矣今恢遼久無成績疑正坐此伏惟立賜昭雪為勞臣勸崇禎三年閣臣成基命救立决科道疏適文書房呂直到閣捧下刑部等衙門問擬杜齊芳李長春等二本蒙諭臣等看過付會極門發行臣等恭誦聖㫖嚴責確當即欲將齊芳長春二犯會官取决臣等不勝悚惶仰見皇上眀作求治飭法懲欺二臣自作之孽夫亦何言然臣等竊有請焉按論罪至於大辟大辟至於决不待時乃法之至重而無以復加者也今二犯此律未免稍過夫罪浮於法則人皆仰覆載之寛而其罪狀因之愈著法過其罪則人皆惕雷霆之震而其本案反渉可矜在皇上聖懐特深有憤於積玩習欺之莫挽而刑亂用重既係積習則因仍已非一日沿重亦非一人彼二犯獲罪乃在未經嚴惕時耳今日布此一番斧鉞凛此一番天威亦足使人人戰越濯惡洗心亦不敢再有輕犯者矣臣等非輕為二犯求寛但求皇上少假湏臾再行擬議盖祖宗之制雖其正犯罪無可矜疑者猶必幾經質審再三覆奏總以事闗重辟不妨過詳慎也臣等不敢煩言祗願皇上俯加熟籌而芻蕘愚悃倘亦微有可賜鑑納者謹將原本暫留閣中恭候皇上眀示施行成公拜疏後復入㑹極門長跪至日晡上意解各官俱荷遣戌崇禎三年黄道周救閣臣疏臣執筆九載未效纎塵猥以編摩分光桂海臣退而感泣思人臣致身自一命而上皆有微勞足塞瘝曠而臣獨無有又流覽古今有一代主臣必有二三蹇諤照耀中外而今諸臣亦皆無有是臣所慨然興歎也嘗閲舊史稱臺省諸臣自劉瑾摧折而後不敢言事者一十四年然而大禮議起百寮廷爭不避鼎鑊雖人無灼見而梗概頓挫各自可觀未有一往莫違大小收聲共託容黙至於今日者臣素泥古初出山不知世上經權何似不知羣臣值眀主媕阿何故竊觀比來逮繫舊輔錢龍錫拳梏鋃鐺對簿法庭搶首獄吏羣臣相視啞無一言此自書傳以來所未經見也尚古不具論秦漢而下宰相有犯坐請室不過數日是非大逆或裁或原人主未嘗不為引痛也今纍輔所坐昏庸疎率為罪督扳緣耳督臣受劔制閫外忘親忘君僨事誤國雖磔裂莫贖閣臣坐綸扉遙度邊事不知能否成敗浪浪叩頭此於鬼薪城旦奚加乎先是輔臣張居正嘗以邊功得廕錦衣堅辭不受曰吾身未嘗至疆塲而受上賞即一旦有敗何所逃誅臣疑其言以為不忠由今而觀未謬於先見也凡疆塲事最難言勝負何常一彼一此今閣臣以邊事坐誅後之閣臣必顧盻躊躇不敢任邊事又令邊臣得以瑕罅閣臣後以邊臣有事必摭閣臣隻語单詞為質則是使綸扉之内割邊墻為殊域也自古宰相生值眀時無大故而伏斧鑕者惟漢劉屈氂及先朝夏言耳漢武帝决意北伐心疑丞相阻廣利之師故一旦破法而誅屈氂今東疆之圖未有定筭恢復之計上下持疑未有一男子據鞍而斫騎墻之案者而獨斷然快意於一纍輔纍輔既無歛碁引杯之致廷臣又無蹴芻齒馬之嫌遂使三台灰溺於貫城斗柄銷光於理縶每見衣冠相語以目不曰安敢言則曰那得歸天下人心衰颯若此誰復為擔安攘之畧者乎為治無多端大要不可使外輕内下慢上賤破貴今巷議謬悠謂殺纍輔為毛文龍報仇朝廷自為人神攄憤何嘗計一故弁然物情既如此則邊將必驕邊將志驕則閣臣權絀故殺一閣臣為毛文龍報仇猶可為劉興治樹幟則不可借一閣臣為邊臣今日示前車則可為政府異日開後阱則不可且自陛下御極以來宰輔負重譴者九人矣一代之間寧有幾宰輔而三年連翩逾下至此當堯舜盛時岳牧舉鯀貽禍滔天浮沉九載寧無徃來放殛之餘未聞岳牧繫縲煩臯陶之聽也人臣事主自以堯舜為師秦漢而下有何足法陛下即欲整齊羣臣敷求言功不過倣虞廷故事令諸廷臣應自陳者各陳時政考詢屢省因而澄之何材不服即欲威柄獨運操縱海宇但乗輯瑞之期綱舉數條别貴賤輕重親渙徳音則頃刻釋滯嘉與更始使天下噩然誦如天之仁神不殺之武何必囹圄憤盈孤卿駢首令四方傳者咸謂天朝獄吏甚貴士紳甚賤乎今天下漸多事人心漸散彼此顧望胥怨一方臣閉戸半生獨立無徒於萬物無所畔羡臣而不言誰當言者臣於纍輔未有三刺之投一揖之雅然度其人殺之不足眀威而徒損於國臣不自揣量誠不忍容黙負堯舜使後世鯁士笑眀時無人疏上道周被謫中允倪元璐上言原任中允黄道周抗疏獲謫臣恐海内士大夫之氣化為繞柔前府尹劉宗周清恬耿介道周既蹇諤承貶宗周以骯髒投間天下本無人得其人又不能用誰為陛下奮其忠良者右通政徐石麟救刑部尚書鄭三俊疏臣備員留京奉箋入賀間闗驅馳顧瞻周道見大江以北千重甌脫畿輔以南三時不雨澤鴻滿野量壑幾半入畿以來知我皇上精心密禱仰格元穹而雪不封條雨不濡軌竊意君尊如天臣卑如地天道太上而不及下濟法不得雨地道太卑而不能上行亦不得雨兹之亢旱意者皇上威名峻極臣子奉職無當漸成釡鬵之形致有鬰攸之應與正欲以尚徳緩刑霽顔納諫仰塵天聽然後陛辭乃本月初十日伏見刑部尚書鄭三俊奉㫖提問下獄臣旅次驚聞未詳本末因思三俊受恩累朝致位正卿皇上授以執法之官分宜竭忠報稱一旦仰觸宸𠂻自干嚴譴此必職業所係輕重出入之間有負皇上之任使者雷霆所及斧鉞何辭既又伏而思之三俊昔事神祖歴著勞勛迨事皇上亦已十年於兹矣一生風力屢挫姦鋒四壁蕭然素標清骨臣親見其為南戸部時力叅不職司官精釐錢糧蠧窟皆夙蒙皇上鑒察不知何以精氣耗磨今昔頓異一至於此恭繹抄傳之眀㫖眞有不能不責備於三俊者惟是朋謀朦蔽巧行欺罔為人臣者有一於斯當身膺顯戮三俊雖老而耄諒其性植孤忠不敢出此今為司㓂僅僅敝衣一篋㸑烟不繼下理之日姦胥弊役酌酒相賀羔羊素絲之風尚可想見雖一時膠守成例往復移會似屬推諉罪誠有之至於朋朦欺罔臣敢剖心代明以祈皇上始終保全而矜宥之也三俊聞命之時即囚服束身自拘司敗舉朝動色行路吁嗟謂此亦曽備皇上股肱大臣之末者朝而冠裳暮而犴狴譬諸犬馬曾不得蒙盖帷之賜焉凡在三事九列亦何常之與有當亦拊心而自憐矣臣又回思三俊六年考滿時人皆以得進勛階為榮而俊獨以㓂仇未殄為愧乞身再四逡巡嵗餘不蒙俞允懼闗考成匍匐就道向令此時得蒙皇上俯從其請賜之骸骨為三俊者今日尚得與田夫牧䜿歌詠太平優游耕鑿豈不為熈朝優老盛事高尚羙談而竟以遷秩之隆恩釀骫法之罪案三俊之辱諸大臣之辱也亦朝廷之辱也且自皇上御極以來先後諸臣麗丹書者幾於圜扉為滿即使其人盡皆情法允恊幽隂景色猶恐上戾天和下召地變而况問擬惕於威嚴之下者有將順而無挽回有揣摩而無補救株連蔓引九死一生於刑期無刑之意竟何當焉書曰與其殺不辜寜失不經傳又曰失出臣子小過好生人主大徳今皇上以輕擬之故深督三俊恐將來必有承順風㫖以鍜鍊為能事以鈎棘為精神而反負皇上法天慎獄之本意矣陽和已布幽草猶知向榮曠蕩無期纍臣未逄祝網伏乞皇上念三俊砥礪畢生過誤一事得從釋繫以示優容或姑許在外席藁候訊俾國法凛然仍無妨於國體君心廻照即仰合於天心臣即受出位妄言之誅彌彰皇上轉圜從諫之羙矣御史李右讜救戸部尚書畢自嚴疏臣見戸部尚書畢自嚴因鄭友元代輸金花銀兩奉㫖着法司提問輦轂之下無不驚駭既而自嚴囚服匍匐往詣犴狴道路屬目無不咨嗟臣昨從邸報中覩其回話一疏於友元之代輸屢奉查核眀㫖乃當日浮寄緣故竟未眀白剖陳皇上責以欺玩而立下之理真所謂自貽伊慼也但思皇上於股肱心膂素加優渥而於祥刑慎獄尤注宸𠂻今自嚴於六卿之内首膺宮衘非小臣比也專握計務已閲六載非新進比也且聞曩時邊警倉皇籌畫儲糈毫無缺誤又非安居坐嘯比也合之律例八議所謂職事官三品以上及大將吏守職奉公議貴議勤均似可以比附者且以事情虛心推究友元熱中考選輸銀倖進罪首也自嚴始緣䕶惜繼成支餙罪次也首犯罪狀尚未訊眀波累之人先淪圜土輕重已似失倫矣且自嚴年既衰暮病復纒綿憂鬰煎熬必致委頓如或溘先朝露即異日者終徼皇上解網之恩欲湔袚以自新其路奚從乎臣幼誦漢臣賈誼之言曰亷遠地則堂高亷近地則堂卑三公之貴天子已改容而禮之則不宜復加以繫緤古者刑不上大夫所以豫遠不敬也又聞谷永之告其主曰記人之功忘人之過宜為君者也犬馬有勞於人尚加帷盖之報况國之功臣哉誼之語盖為漢相周勃之逮繫而發永之疏亦緣陳湯有定西域之功而以言事下獄也卒之兩主轉圜以聽矧皇上堯舜比隆吁咈無間者乎臣亦非敢謂自嚴之罪可以概置不問苐祈皇上稍示寛容豁其囹圄俾束身私寓俟友元解至日同治以應得之罪庶於三尺之法大臣之體兩無所虧耳臣又思陽和寒沍乃四序之恆經風雨雷霆繫神工之不測偶值肅殺太過已覺庶類不堪况乃摧擊頻加未免元和有損臣伏見今春以來九列之内或以狂言被譴或以凟請蒙褫今復摘至再三其勢必將抱蔓我皇上量同天地恩猶父母震叠之所施原屬生全妙用但宥過矜愚嘉與更始實羣工之所其祈而非一二人之私念也又臣於自嚴原非同鄉亦無舊識上年以帶解新餉誤叅經年無端受抑然臣從國家大體起見自不敢以私隙而嘿嘿處此也疏上不允吳甘來復上疏曰自嚴之罪豈獨在蒙狥哉􅆒歴多年不能保其終罪一也自嚴不能保其終致皇上不能全其恩罪二也望八之年匍匐入獄萬一瘐死使人譏皇上之薄待老臣罪三也次日遂釋出崇禎十三年監生凃仲吉救黄道周疏臣草茅書生何敢妄言况當天威震怒誰甘以身試法苐讀書師古有志效忠每觀古忠臣義士損一身以成君父之徳如孔璋代請於李邕郭亮伏鑕於李固皆志本於誠死生所不顧臣覽古論世未嘗不痛哭而起今適當其事正臣效忠之日故匍匐萬里請死眀志幸皇上察而誅焉日者黄道周因薦被逮廷杖之日臣工飲痛童嫗堕淚以聖怒方殷無敢鳴其無辜幸一不怕死之葉廷秀昌言申救蒙杖一百天下聞之益為驚心此真皇上從來未有之極怒諸臣從來未有之極痛自此人人自危竟無復有敢言之者矣夫人臣事君猶子事父母父母怒撻之至死而不敢怨然父母至極怒終不忍死視其子觀其箠楚哀號之狀未嘗不興憐而思痛焉皇上好問好察過於古先哲王又銳意太平勵精圖治思得一真正人才而用之乃有一黄道周而摶執僇辱置之必死之條甚非海内之所想望也臣觀道周通籍十載半居墳廬自躬耕樵採而外稽古著書晨夜不輟宗黨憐其貧鄉里推其孝孤踪獨立門無雜賔其一生學力止知有君有親幸已遭遇聖眀亦欲發抒所學雖其言嘗過戅而其志實純忠當酷暑萬里鋃鐺就逮時囚服草履飲水啜蔬士紳挽縶幾不得行道路見者莫不悲嘆今聞喘息僅存猶且讀書不倦未嘗不以囹圄圜扉為皇上敎育之恩霜露雷霆皆天地裁成之徳此天下之大小臣工至於皃童走卒莫不知之莫不傳之非獨臣草芥之私言也惟是天威方嚴陽和未布大臣緘嘿以需時小臣畏縮以全軀使皇上所以敎育裁成之意不能大白於天下此臣不為道周惜而為皇上天下萬世惜者也天下所以不治皆由臣子不清不勤隳其職業不忠不孝隳其家修皇上方嚴典刑䋲天下之不清不勤不忠不孝者若道周至清至勤真忠真孝而一旦顚躓受禍至此豈不傷天下讀書之心灰海内為善之志乎今天下之人謂殺道周以激奮樞輔而樞輔未必可奮殺道周以緘閉諫臣而舉朝久已卷舌皇上必欲誅獨立孤介之臣則道周是矣皇上必欲誅結黨匪類之臣則道周非其人昔唐太宗恨魏徵之面折至欲殺而終不果漢武帝惡汲黯之直諍雖外出而實優容皇上方欲逺法堯舜柰何智出漢唐賢主下臣讀史見漢唐宋之衰也其賢人君子皆受黨人之禍盖惟君子有聲氣不謀而應其求不齒於人類者則從而誣之三季之王墮小人之術皆以此摧士氣失民心我皇上方振中興昌眀之運斷不宜以黨人輕議學行才品之臣伏乞聖眀詳察道周鑒其苦節赦其無辜保全清忠消除朋黨無蹈晚季之覆轍為小人所快心即殺臣狂妄實得死所矣臣家有垂白之母堂有未𦵏之親殺身求仁雖死何恨將以愧天下之立朝行道見義不為者謹席藁願從葉廷秀之後惟皇上幸照察焉崇禎十四年司㓂劉澤深擬譴黄道周等戍疏看得黄道周之罪前議烟戍議永遣總不足以蔽斯人之辜者則以道周為人偽學無補於時妄議足灾其身聖眀在上崇正息邪固難容此堅僻偽辯之徒也凃仲吉解學龍葉廷秀薦之救之事雖不同而曲比道周之情則一與馬思理董飬河等各照原擬等因案呈到部該臣莊誦聖諭仰體聖心恨不即速擬爰書之為快也苐道周沽名釣譽之矯情迕㫖蔽賢之深罪臣前兩疏已痛切嚴責之矣到此只有一死死生之際臣不敢不慎也緣我皇上自御極以來所論死諸臣非封疆大事則貪酷大罪從未有以諫言誅大小一臣者而今以此加道周是道周無封疆貪酷之失而有諫言蒙戮之名於道周得矣非我皇上無不覆無不載天地之全體也且皇上所疑者黨耳黨者見諸行事相聚訟言乃為植黨道周自上一疏空言無當睿照一臨肝胆寒裂試看如某等者始未嘗不相與而今且斥之短之道周亦不與之較而日惟禱祝聖壽怨艾無已烏有所謂絲毫黨氣而煩聖眀之震怒動朝廷之大法耶昔孟子之論生殺也不取决於左右諸大夫而窮情於國人國人皆曰可殺然後察之見可殺焉然後殺之今道周國人皆不以為可殺而臣論殺之豈確案乎臣仰見我皇上於去年行刑時即負罪深重之人而猶忽然傳㫖停免滿城老稚舉手加額祝頌無極今皇上豈有重恨於道周萬一轉圜動念而臣已論定噬臍何及所以當此生死之闗不敢不存一難慎之心亦惟是恩威出自皇上聖意淵微有非微臣𣺌識所敢窺測故躊躇冐死仍以原擬仰候聖裁而非微臣之所敢必也解學龍薦章妄詡委屬乖謬但疏舉循例非敢創行烟戍足蔽厥辜凃仲吉等昏昧庸愚𡨕行取咎仍照原擬至若某等項背相接比肩事主豈無臭味相闗一當利害反面攻擊若將凂焉翻覆變態薄似秋雲縱不相干亦非良士亦照原擬以示薄懲崇禎十一年錦衣吳孟眀回奏鄭鄤杖母疏臣查在衞見監犯人共三起一起係田唯嘉家人一起係李皇親家人皆正在究擬例難保候其鄭鄤一起係崇禎十年二月奉㫖到衞前任鄒之有未經究問董琨於本年四月接管曾以鄭鄤病狀具題本月十六日奉聖㫖鄭鄤是否真病着責令調治速行研訊如致斃董琨不得辭罪該衙門知道欽此臣自蒙恩任事以來每進署即欲將此案審結屢據醫官馬龍圖呈稱犯官鄭鄤久患癱瘓手足戰搖不能轉動臣復差人相驗所報如前若一加刑訊難保無虞臣隨嚴批醫官用心調治待其痊可究結去後偶一日㑹恊理陸完學渠詢鄭鄤病勢如何臣對以病尚未愈臣因問其杖母事完學云若論此人自負才名既藉門第踞傲放肆得罪鄉邦死不足惜其杖母之事非其本謀臣又云既無此事何以故輔溫體仁以此告人完學又云此事最為可宥鄤父鄭振先家有箕僊能發人隠事一家崇奉無不皈依凡有過失皆遭撲責謂之懴悔自振先夫婦至鄭鄤以下無不皆然不獨鄤母吳氏一人受杖也惟是吳氏受杖係振先之婢動刑想懐宿憾杖之太重以致吳氏生疑杖時鄭鄤與父皆在其前不能救饒事則有之實非所挑激也恊理係臣鄉舊公祖與鄤同住府城知之必真且言非一次臣遂信之及再訊之臺臣王章所言與恊理相同臣因思鄭鄤罪案原在誤奉箕僊至於杖母一事據二臣之言不係鄤主使則鄤罪不至死矣崇禎十六年閣臣公捄舊輔揭適蒙發下刑部一本係㑹議罪輔周延儒臣等凛奉嚴威俯鑒覆轍方負罪愓息悚媿不遑安敢昧死代為籲控且以我皇上待臣之隆體臣之至深恩異數千古鮮倫為臣子者忍於比匪行私自干法網尚敢以國體君恩求寛於日月雷霆之下乎惟延儒赴召之初一切奉揚聖徳如蠲租起廢解網肆赦諸大政中外欣傳有太平之兆即我皇上亦曾有功多過寡之諭但其賦性寛疎以致門客宵壬乘機假借納交通賄延儒不能盡知即知亦不能力絶因而寵賂彰聞疵垢多端天鑒烱然罪安所遣部院以烟戍議上誠當其辜至視師一出奉命即刻起行似亦慷慨圖報其馳驅通義一帶亦不無微勞可憫倘蒙皇上法外施仁俯從部議則帷盖之恩同於覆載非臣等所敢冐徼也謹擬票進臣合詞宻請伏祈聖眀鑒裁施行初七日奉御批覽卿等奏揭朕心惻然但延儒罪犯重大前面諭已眀如濫用匪人遺誤封疆比昵姦險營私納賄及親履行間回朝面詢應將兵情邊情據實陳奏極力挽救庶幾收效桑榆而乃欺蔽機械較前愈甚若律以祖宗大法當在何條念係首輔姑從輕處勒令自裁已有㫖了大學士范復粹清獄疏臣欽奉眀綸清理刑獄因取各犯審時所投狀詞一一翻閲見有公狀一紙係未結各犯官侯恂傅宗龍等臣數共六十六名内而尚書侍郎都察院科道部屬外而撫按道府州縣等官無不畢具不覺慨然嘆曰此我國家歴朝之所無而何近日犯法之甚衆乎孰非我皇上作飬之士而拔用之人哉析圭擔爵巳為榮矣作姦犯科何辱如之豈真衣冠為累詩書誤人耶當㸃名挨審時臣責以臣子大義凛以朝廷大法皆俛首叩頭恩赦案前自怨自艾感戴聖恩陸續先後不見其多今察各招凡内外文武約有一百四十有竒亦甚可痛矣謹摘其大者為我皇上陳之一原任尚書侯恂原任司馬倪嘉慶夫屯豆借還之數已經改明多開未眀之數已題追納其司官賄差一節力辯皆為懸指兩案牽纒五年沉滯所宜蚤為分案酌結者也一原任尚書傅宗龍當撫蜀則功績亦著在中樞則籌畫多疎惟哀籲其一時疎率之差實不敢有藐抗阻撓之意所當速為酌擬者也一原任順天府府丞戴澳論人無據祗為博巳之名事出風聞殊失入告之體所宜酌量擬罪以開言路者也一原任巡撫黎玉田常道立方孔照為撫則一罪各不同總之勦撫未見有效按法何辭而城池未有䧟殘亦難概論所當分别各招擬結者也一原任兵科宣國柱諫官職任糾彈為何代人私囑但逃弁拘提何時得至若審無受賄之情宜擬應得之罪先為結案者也一原任兵科耿始然催餉數月有一百三十餘萬之多似急公家而科叅有欵又多有駭人所聞之事難免官謗但辯稱誰送様銀有何的據既説打死今何生存張仁原非快役金台亦非聽用節節應辯所宜再加研審請㫖定奪者也一原任河南道成勇自負直戅非為傾排但言官原就事論人今堅稱無有主使若果無主使之人所宜原情定罪以免幽沉者也一原任御史魏景琦事出倉卒原非違法應奏不奏罪其應得已駁另擬仍宜酌减速結者也一原任御史范良彦應追贓數已有二千之多雙目皆枯已獲貪淫之報所宜勒限追贓照例矜釋者也此案方經欽駁自當訊其贓証眀白確擬乃司官王廷授徑擬斬罪成招懼而賄求有由然矣但良彦之罪不至於斬况已雙瞽又豈可斬乎一原任口北道賀鼎據册未完之贓多至一萬三千見在追比據辯地方錢糧除去抵完欠數尚有餘剰此中難以懸坐所宜行該督撫察眀後方可酌擬減罪者也一原任司官孫嘉績浮薄恣肆虛見才情剖厲過激乃其本色據其辯有十欵法當立聽謂周敬宷係堂上所親拔於司官似為無與即云既講送允然此月身在塲中金玉係赤貧之傭安有多金又非經推用之官為何重賄種種矢辯所當研訊確情再為酌議者也一原任司官熊汝學朱國夀朱日爃塌工俱有可原賠修似可寛罪所當分别酌議各量還職者也以上諸犯各殊幽沉則一所宜請㫖下部作速清理者此矣臣於審案中得可用者二人焉有不忍黙黙然者一原任江西布政朱之臣一原任總兵劉光祚夫出夷吾於檻車用孟眀於三敗率皆成功古今羙談今之臣未必如管子光祚未必如孟眀而鼔舞磨厲可當一面未可知也崇禎十七年刑科都給事中孫承澤時事日艱人才足惜疏臣嘗讀唐史至徳宗欲殺陸贄諌官陽城曰不可使朝廷殺無罪之人於是率同列伏闕而諫將軍張萬福年八十拜諸諫官曰言官肯言事天下太平矣臣竊慕之夫徳宗忮主也而城能克盡言職如此臣生昌言不諱之朝官刑名封駁之地乃逡巡顧慮有懐莫吐反躬自責何以為臣今敬頌言於聖上者有六人焉原任兵部尚書張國維湖廣巡撫郭景昌淅江巡撫董象恒科臣姜埰方士亮部臣尹民興也國維身任中樞大敵在門不能運籌制勝蚤紓君父之憂何得無罪然國維清謹之品軍旅非其所長向年撫蘇大得民心總河數年道路梗阻運轉不匱有功國本特簡中樞受事未久其罪可原景昌倜儻之才平日以岳武穆自况身在戍所起授節鉞洛陽已破無家可歸乃於山西士紳遍行借貸召募壯丁間道入楚以圖報答不謂中途遽有繫逮之命至象恒臣不知其生平亦不知其政績但聞緹騎到浙闔城百姓擁塞號哭竟至罷市觀其深得民心則其生平政績可知姜埰之罪起自故輔今故輔伏法而同時之熊開元久已訊結獨埰猶覊滯獄底情深可憫方士亮尹民興隨故輔軍前監紀雖無可錄之功亦無阿比之跡况還京之後辭賞不受其心可知此六人成案具在公論甚眀臣既有知敢不陳列上請臣尤有言者當兹内外多故時事日艱每見大小臣工一經受事率多不效或膏血沙塲或受鑕西市或逺禦魑魅或星沉貫索盖纍纍若若矣以致遇缺㑹推扼腕乏人既瓶罍之交罄亦襟肘之兩窮豈世遂無材一至於此盖天之生材有數長飬之則出摧折之則盡理有固然臣之敢於輕凟宸嚴者又不止為六人惜也臣垣前此為請寛貸獲蒙重譴臣豈不知一念之愚止以身有言責不敢不以人材當惜效古人伏闕之義倘有一毫狥私市徳之心則願二祖列宗在天之靈顯殛之此又臣所自信並求信於皇上者也統祈鑒察施行疏入召閣部大臣出疏示之范公景文極力挽回六人俱獲出獄國維景昌更荷起用眀刑刑尚書馬文升疏竊惟為治莫先於徳敎輔治莫先於刑罰非徳敎無以化導乎人心非刑罰無以懲戒乎姦宄故帝舜之世契敷五敎而臯陶典刑以弼之自古帝王之御天下未有舍此而能致治者也恭惟我太祖高皇帝膺天眷命奄有萬方當殘元入主之後法度廢弛之餘以為刑乃輔治之具不可不眀首命大臣更定新律以一人心又命刑官重會衆律以恊厥中而垂法萬世其勸善癉惡之意無以加矣且五刑之屬三千而罪莫大於十惡十惡之外而情莫重於强盗何則强盗之行盖其執兵持刅生殺在其掌握刼財姦淫操縱隨其意欲比之叛逆之徒相去不逺所以强盗條云凡强盗得財不分首從皆斬例該决不待時所以禁暴去惡懲姦止亂而輔治者也及天順三年傳奉英宗皇帝㫖曰人命至重死者不可復生自天順三年為始每至霜降後但有應决重囚三法司奏請會多官從實審錄庶不寃枉永為定例欽此盖專指律秋後處决重囚臨决之際恐有寃抑故令三法司會審即古帝舜欽恤大禹泣辠之心也然恐强盗重情不在其内且强盗旣該不待時决又何監至秋後處决况以强盗不分贓之多寡情之輕重俱監之至秋後與衆囚一同會審比及㑹審之時十死七八存者監禁日久翻易原情能言者俱作矜疑情雖重而不决柔弱者俱作無詞情雖輕而行刑及夫處决之際囚犯既衆或至日晚更深人多不見甚非刑人於市與衆棄之之意且情犯有輕重故行刑有遲速今常若此則自此終無决不待時之强盗矣是强盗與鬭毆殺人者為無異矣况辟以止辟刑期無刑帝王之盛也强刼有犯不時處决則餘賊知警是辟以止辟之意也盖兵刑二事每每相湏惡之小者以刑治之而有餘惡至於大雖兵加之而無益矣刑尚書林俊正法守疏嘉靖二年該太監崔文題為分豁妄揑虚詞䧟害善良事竊惟祖宗設刑部都察院大理寺謂之法司凡大小罪犯無不由之錦衣衞謂之親軍伺察機密姦細鎭撫司鞫訊大盗妖言洪武二十年我太祖以鎭撫司非法凌虐燒其刑具以所繫囚送刑部洪武二十六年申眀鞫刑之禁凡罪囚俱送法司永樂以後任遇漸加而職事仍舊見之大眀會典者如此列聖相承恪遵無易正徳年間劉瑾錢寧等繼相擅權凡意中愛惡輒奪付鎭撫文致成獄以遂其姦而祖宗之法大壞劇盗四起巨逆繼作皆陛下所習聞而痛惡者天啓我皇上入正大統撥亂世而反之正先朝之牢姦錮弊一舉而剪除之天下方仰中興之治不意忽有此未思之舉豈崔文有所膚愬或假手以濟其私乎夫法本大公罪必居一使宋鈺所告崔文等渉虚自有反坐之律所告果實亦有必當之條此祖宗成法在陛下亦有所不得私者况臣等微末之臣耶今不待法司問結而輒付鎭撫是固臣等奉職無狀只可治臣等之罪而未可廢祖宗之法况今風霾雨土赤日無光天之示戒甚明正上下内外省身修徳之日今此小事尚爾有拂於天萬一有大於是將何如耶臣恐將來之變有不可測者伏願皇上念祖宗之法畏上天之戒收回成命仍將李鳳陽等付法司從公問結以為將來之戒則刑罰當而天下服矣又疏嘉靖元年十月管牛房尚膳監左少監賈全奉御王太安郭文王川長隨叚仲張仲堂姜輔閻川内使任信等侵盗喂飬牛隻料豆三十九石倉官徐鈞失於覺察該本部浙江司問擬賈全等俱雜犯斬罪徐鈞減等杖罪具奏送審奉㫖是賈全送司禮監奏請發落徐鈞等送大理寺審了來說欽此看得刑部大理寺皆古刑官虞謂之士師周謂之司宼我太祖愼重刑獄鞫於刑部而讞於大理寺然後告成於天子而聽之成法也近者内侍有犯多付司禮監似無刑部也今付刑部又即付司禮監又似無大理寺也竊意終非祖宗成法伏望聖眀將賈全等仍同徐鈞送大理寺審錄然後付之司禮監庶幾成法具存為聖子神孫萬世不易之定守臣等可勝願幸又疏竊以内府嚴宻之地内監親近之臣而内庫之儲付以監守責亦專矣不謂王玘等大肆姦貪潜通陳俊等恣意侵盗夫一時侵盗如是平時侵盗何如一起事發如是各起事未發何如中間隠侵又有不可以數計者夫當正徳蠱極之時嘉靖起而應亨嘉之會豹房等財物天意為中興積也而道路相傳多見侵没今被該厰訪出宜示大戒顧乃得送司禮監奏請發落夫以近日内臣有犯不付有司猶非大盗尚為失刑今王玘等大盗豈容不付有司也成化間内使張來保盗昭徳宮財物奉擬處决且累掌宮太監亦發海子充軍夫昭徳之財物猶私財也尚示大戒况内府公家之積内而大禮外而大費皆於是乎出不示大戒誠恐江河不足以實漏巵羣盗效尤國計一空其弊可勝道耶書云君曰辟曰宥臣曰勿辟勿宥言不當狥君以為生殺惟當審輕重之宜此法官萬世規也臣等為國守法豈容忍黙以漏大姦乞將王玘盧能等下之有司明正其罪大監張得玉等及該直守門守備内外官軍亦各查究如律庶羣姦屏息積弊一清矣正徳間刑部等衙門誅大逆以彰天討疏問得一名劉瑾年六十嵗係陕西西安府興平縣人原任司禮監今降奉御自幼凈身景泰年間選入皇城乾清宮荅應歴陞内官監太監正徳元年十月内蒙改司禮監辦事荷䝉委以腹心整理庶務瑾要得任意欺罔專權納賄慮恐人心不服難以行事不合朦蔽朝廷將各衙門大小官員㝷事䧟害以作威福科道等官一言觸犯就行拿來决打枷號充軍以塞言路選委乖覺官校一百餘員名聽瑾提督管事害人不時差出天下司府州縣訪察官民賢否過失所過地方重遭擾害從此人皆危懼莫敢言瑾過惡正徳三年六月内欽䝉令瑾本監掌印管事瑾因權勢重大益無忌憚内外百僚一應奏章不與各官計較亦不與内閣相干往往袖回私宅專與孫聦張文冕揑寫㫖意屢更屢變是非混淆時常分付吏兵二部凡進退文武官先於瑾處計議允行方許進本内有今日陞職若謝禮微薄明日黜退或令致仕賄賂一通又即起用各處鎭守太監總兵巡撫副叅遊擊等官但由門下出身者不拘貪汙老疾一概存留此外雖有知勇亷幹亦就罷黜添設巡塩巡捕查􅋥等官騷擾天下軍民府庫銀兩起解一空但凡朝覲公差鎭巡等官俱要饋送少不滿意即令校尉搜訪小過羅織重罪江西寧府先犯不法事情已經先朝革去䕶衞瑾因接受本府金銀數多擅自准令復設又將玉帶二條送與寧府及差來承奉又准與南昌河泊所一處侵奪民利激變地方科歛剝削銀兩饋送鉅萬入已以至地方民窮盗起至今擾亂不息近年以來瑾招引四方術士余明余倫余子仁等出入私宅占候天文相面算命妄稱瑾姪劉二漢後有大貴又見財貨充盈威勢張大及聞市井軍民號稱瑾為站的皇帝輒起異心要得謀為不軌宻令心腹置造衣甲牌面約有千百餘副私假寳印一顆令兩廣太監蔡昭潘牛置造弩五百餘張匿藏私宅瑾待時起手將小刀二把暗藏扇内出入禁闥要得乘便使用擅差大理寺少卿周東等前往遼東寧夏等處丈量起科以致人心不堪地方激變遼東錦義二城相率作亂毆打職官幾致反叛正徳五年四月初五日見在反賊何錦謀同革爵寘鐇等將瑾激變罪惡刋印告示榜文各處張掛動搖人心謀立寘鐇為主殺死鎭守等官容匿不行奏聞正徳五年四月二十六日朝廷得知寧夏反叛頒詔天下慰安人心太監張永領兵征討將何錦捕獲瑾聞知寧夏平復揑寫㫖意誇稱已功本身既加添祿米又將兄劉景祥超陞都督本年八月十三日太監張永班師回京備將瑾前項不法事情開條具奏蒙拿送錦衣衞鎭撫司監候隨於瑾家搜出前項假置違禁衣甲牌面弓弩等件金銀數百餘萬寳貨不計其數科道等官備將瑾各項事情條陳奏奉欽依將瑾等拿在午門前三法司錦衣衞會同多官逐一追問前情委各是實叅照犯人劉瑾本以險邪謬膺重托盗竊政柄播弄威權擯斥忠良援引姦黨官爵視苞苴為進退刑罰任喜怒為重輕黷貨積如邱山人命等如草芥專權亂政於今五年蠧國害民非止一事毒流中外惡貫古今祖宗百餘年之元氣斵䘮無遺國家億萬載之紀綱變亂殆盡自歴已往之罪已負滔天尚昧無將之戒深懐不軌偽造寳印而反狀已形私蓄甲兵而逆謀已著似此不法宜當速置極刑伏望皇上獨奮乾剛大彰天討即將劉瑾押送市曹眀加顯戮梟首示衆仍將本犯招情并處决屍形畫圖榜示天下以為萬世臣子不忠之戒崇禎二年三月十九日吏部都察院接出聖諭朕惟帝王憲天出治首辨忠邪臣子致身事君先眀順逆經凛人臣無將之戒律嚴近侍交結之條邦有常刑法罔攸赦豎逆魏忠賢獧狡下才備員給使傾回巧智黨藉保阿初不過窺嚬笑以市隂陽席寵靈而饕富貴使庶位莫假其羽翼何蠢爾得肆其毒痡乃一時外廷朋姦誤國實繁有徒或締好宗盟或呈身入幕或隂謀指授肆羅織以屠善良或秘䇿合圖扼利權而筦兵柄甚且廣興祠頌眀效首功倡和以極於三封稱謂浸疑於無等誰成逆節致長燎原及朕大寳嗣登嚴綸屢霈元兇逆孽次第芟除尚有餙罪邀功倒身竄正以望氣占風之面目誇發姦指佞之封章跡其矯誣惡容錯貸朕鑒察既審特命内閣部院大臣將發下祠頌紅本叅以先後論劾奏章臚列擁戴謟附建祠稱頌賛導諸欵據律推情再三訂擬首正姦逆之案麗於五刑稍寛脇從之誅及兹三褫其情罪輕减者另疏處分姑開一面此外原心宥過縱有漏遺亦赦不究自今懲治之後爾大小臣工宜洒滌肺腸恪修職業共遵王路悉斬葛藤無曠官守而假事譸張無急恩讐而借題叅舉朕執是非以衡論奏程功實以課官方有一於斯必罪不宥尚各懲毖乃亦有終欽哉故諭大學士韓爌等疏為遵奉聖諭事竊惟尊無二上人臣首戒無將國有常刑天討用彰有罪祖訓内官不許干預政事律重交結近侍官員於以防内外而肅官府杜姦萌而窒亂源法至嚴已逆璫魏忠賢狡譎多端兇頑無忌始焉小忠小信祗便身圖繼而作福作威漸干國政内則妖姆客氏闚覘禁宻結為腹心外則逆臣崔呈秀逗露機情助其羽翼戕宮妃而戮忠直盗帑藏而弄兵權已徼無等之三封洊議偪尊之九錫亟開藩邸廹逺宗城建生祠以卜人心遣内鎭而連邊將隂謀叵測僣勢顯成磔辟已服上刑爰書具列逆狀誠如聖諭所謂首逆之罪當先正者也頼宗社有靈聖眀御世乾坤旋轉雷電合章屬元兇已就誅夷凡黨附宜嚴區别若乃官聫蹻跖人類豺狼懐私欲借兇鋒拱手隨蠲魁柄或首發大難禍始敎猱或倒身怙終勢成騎虎有如動揺母后倡和逆封鐵劵金章覆題恐後腴田甲第請給争先或引聖經以慫慂中傳或攘史職而抺殺直筆墨縗朝襘忍比罪魁緹騎鋃鐺大興詔獄修睚眦以殘軀命不難殺人媚姦供嚬笑而效爪牙總是酬恩報怨至於一人而創祠幾地一事而䛕頌連章祠省直祠邊鎭祠京都未已也而且祠之國學頌碑文頌奏章頌鄉錄未已也而且頌以絲綸此則聖諭所謂首開謟附傾心擁戴及頻頻頌羙津津不置者也而又有徑竇旁通網羅宻布腹藏鱗甲搆青蠅貝錦之讒意慘鏌鋣釀白馬清流之禍即占風望氣莫可端倪而覆雨翻雲難逃指視斯又潜施鬼蜮之毒而更巧避虎彪之名聖諭所謂雖未祠頌而隂行贊導者也以上諸人罪案各殊法銓亦異或已經褫逐不盡厥辜或謬附摧傷當追始禍遵眀聖諭據法依律無枉無狥期服天下後世之心三尺無私天誅不貸四兇畢竄國憲用申惟是大憝既罹不赦之條而羣小宜開自新之路臣等簡祠頌及部院開來諸臣或事闗題覆公牘列名或身在封疆委蛇濟事或城守全於捍禦或編摩效有劑調而又或生平材具自優􅆒歴猷勞蚤著聖諭所謂事本為公而勢不得已素有才力而隨人㸃綴湏當原其初心或可責其後效咸與昭灑免臚姓名固明罰敕法之嚴條兼赦過宥罪之寛政也臣等祗奉諭辭共矢公愼就事論事叅畫一之刑書以人治人肖本來之面目中涓衿弁畢麗於科啇販兵民姑置之外倘幸無掛漏可永示誡懲寒亂臣賊子之心抒正氣忠魂之欝三章既約金石不渝一面宏開葛藤永斷閉姦謀而安反側眀刑政而襄治平端在是已若夫加衘加廕濫被恩施殿工邊功尚需嚴核最可恨者先帝當彌留之日多官徼横拜之恩其天啓七年八月二十一日大工謝恩併寧錦叙㨗鹵簿告成三藩之國所有叙勞秩廕悉宜聽部削除尚寛矯㫖之推求用廣原情之徳意併用附及以俟宸裁所有前項欵分名姓及應得罪名開具於後統惟鑒奪勅下遵行為此具本謹具奏聞崇禎十四年戸科左給事中孫承澤劾犯官不入獄疏臣前待罪刑垣見大貪蔡奕琛一案具疏指叅此紏駁職掌宜然誠以事之最眀確者無如此案也奕琛曾官吏部賄賂公行賄罪輔一事一次三百金一次一千金衞招已眀部案已定且奉㫖王陛彦自招納賄何謂枉扳久在聖眀洞鑒今受賄之人過付之人俱正法矣夫與者受者同罪從來定律也乃奕琛巧思脱百計遷延謬以從前定案隻手可翻既借一丁煌為煽辯之端又借一李化熈為展身之計揣其意無非以一係本邑縣令一係本府理官情分素熟而不知耳目最眞之事道路有口良心難欺奉眀㫖蔡奕琛受賄事情該府申文原以李化熙為証何乃又稱不知盖已洞燭其微矣前按臣察疏久下刑部備載該府申詳巡按鄧云中彦事有大老説情係徳清蔡奕琛書云吳徵􅀢係琛同年朱澹修之愛婿若婿即琛婿也乞從寛政等語且吳徵􅀢口供蔡侍郎始事即得銀八千兩叩而隨荅未用刑威此係察明在案最眞確有據者而奕琛故為牽飾希圖展卸已經褫革高坐私寓試思祖宗之法有提問而不革職既革職而不下獄者乎臣見往年刑部尚書馮英等一下部議輒投身法曹近如陳是集等再經革職亦入犴狴即罪輔薛國觀奉有特㫖方許在寓候審奕琛提到革職奉何明㫖輙敢抗不入獄同案諸臣李燦等提到而下獄葉有聲等革職而下獄此其事同情同而下獄不下獄逈異不知奕琛包藏何膽而藐肆如此也伏望皇上勅部察奏奕琛賄証已明何故竟不入獄且奉㫖確擬已久何故聽其狡延不早結正暴其應得之罪破彼譸張之姦庶大法眀而貪惡知儆矣崇禎十五年刑科都給事中孫承澤劾憲臣殺人疏竊聞律莫重於殺人殺人者抵罪莫大於欺罔欺罔者誅法紀昭然不以巨憝而或漏焉者也若原任副都御史今陞戸部侍郎宋之普殺人一案臣不能無説焉之普寓中死屍二軀潜行掩埋科臣袁愷忘桑梓之私執朝廷之法據實入告其原疏中載擡埋則有二强盗其知情則有蘓管家及麻面厨子事固已如指掌在之普自應俯首認承束身就法乃膽壯氣橫蔑視法紀自恃身為負嵎之虎勢同憑城之狐乃肆口反嚙堅言子虛隣佑總甲可以勢壓屬下御史可以情囑若謂赫赫氣熖殺此二人止㝷常事我但言為無誰敢執之為有遂使輦轂之下通衢之間重泉抱難訴之寃青燐有夜號之慘亦輦轂未見之變矣且其死者或妾或媵為臧為獲據實招眀法或末减乃硬口掩飾止欲氣懾言官不知已目無君父則其欺罔之罪視殺人之罪實更重也我皇上不即置之於理因科臣左懋第黄雲師尚未奏眀今兩臣之疏俱下臣垣再四叅詳事已明白有據寧可使殺人者不死欺罔者無罪因循時日大案久懸臣職掌所闗寧敢嘿嘿伏乞聖明勅下法司提問根䆒二屍下落嚴申欺罔之罪庶大法彰而人心肅矣春眀夢餘錄卷四十五
