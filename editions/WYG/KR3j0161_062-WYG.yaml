body:
  text: 春眀夢餘録卷六十二吏部左侍郎孫承澤撰上林苑監上林苑監在皇城東東江米巷南向洪武中議設上林苑監以妨民業遂止永樂五年間設左右監正左右監副左右監丞典簿所屬良牧蕃育嘉蔬林衡川衡氷鑑典察左右前後十署每署設典署署丞録事洪熙元年止存左監丞典簿餘官不除又以蕃育署帶管良牧川衡兩署嘉蔬署帶管冰鑑林衡兩署四署人户并四典察署人户俱撥二署暫管宣徳十年止存蕃育良牧林衡嘉蔬四署餘皆革後仍設右監丞上林之設自漢始盖漢武帝元鼎中初置水衡都尉本於虞周山澤之官然實以掌上林苑主上林離宫燕休之處後漢省之併其職於少府一云後漢上林苑有令丞主苑中禽獸頗有人居皆主之唐因隋屬司農亦有令丞掌諸苑囿池沼種蔬果藏冰之事宋四園苑東曰宜春南曰玉津西曰瓊林北曰瑞聖提舉官無常員元曹後四園苑屬司農永樂十四年諭凡牧養栽種地東至白河西至西山南至武清北至居庸西南至渾河一應人不許于内圍獵有犯禁者每人罰馬九匹鞍九副鷹九連狗九隻銀一百兩鈔一萬貫仍治罪雖親王勲戚犯者亦同永樂五年三月改上林署為上林苑監以中官相兼任用置左右監正各一員左右監副各一員左右監丞各一員首領典簿三員設良牧蕃育林衡嘉蔬川衡冰鑑及典察左右前後十署每署置典署一員署丞二員録事二員春眀夢餘録卷六十二
  hash: sha256:4bd241ab72b304d8827f51cc1a39949514698df7e5c9d45a7693b26b087b16dd
