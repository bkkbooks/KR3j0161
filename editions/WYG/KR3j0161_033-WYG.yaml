body:
  text: 春明夢餘録卷三十三吏部左侍郎孫承澤撰詹事府詹事府在皇城東玉河岸上初設東宫官屬有同知詹事院事副詹事左右詹事詹事丞左右率府使副使同知左右率府事諭徳贊善文學中舎正字侍正洗馬庶子等官皆以勲舊大臣兼之不别設已又改贊善為贊善大夫設贊讀洪武十年置通事司設司令司丞㝷革十四年設左右司直郎十五年置左右春坊設大學士又置司經局設洗馬校書正字二十二年以各衙門無所統屬始置詹事院二十三年設校書二十五年改院為府左右春坊司經局皆列署府中府設詹事一員少詹事二員府丞一員主簿一員録事二員左右春坊設大學士各一員左右庶子各一員左右諭徳各一員左右中允各二員左右贊善各二員左右司直郎各二員司經局設洗馬二員校書二員正字二員二十九年添設春坊左右清紀郎各一員左右司諫各一員通事舎人二員皆以侍從輔導東宫為職左右春坊則專典東宫上奏請下啓箋講讀之事司直郎掌彈劾紏舉清紀郎佐之司諫掌箴誨鑒戒之事以拾遺補過洗馬掌收貯經史子集刋輯圖書立正本副本貯本以備進鑒校書正字掌繕冩装潢並詮其訛謬調其音切以助洗馬主簿􅃹勾㑹文移檢稽脱失録事佐之通事舎人典東宫朝叅謁辭見之禮與承令勞問之事而皆統之於本府洪武初建大本堂取古今圖籍充其中召四方名儒教皇太子諸王皇太子居文華堂諸儒專經面授分番進直迭班侍從上時時賜宴賦詩商畧古今紬繹文學其時東宫官皆勲舊大臣兼領不别置後始設詹事院已更名府設左右春坊司經局皆别署而詹事府總焉已令春坊翰林院日二人進講尚書春秋資治通鑑大學衍義貞觀政要諸書纂述終始大義為講章呈上覽已赴文華殿為皇太子陳説太子三師三少詹事府鴻臚寺官各一人侍召則同入有留身獨進者給事中司直清紀即劾而上日所處分府部軍國諸大務及撫諭外藩恩禮坊局官日陳説於東宫已又選秀才張宗濬等隨官僚分直文華殿侍讀畢進説民間利害田里稼穡古今孝弟忠信文學材賢諸故事㝷命廷臣舉孝義篤行之士充東宫官東宫官如庶子而上初制大臣兼領脩撰􅀺淳等九年考滿値英宗實録進呈以纂脩俱陞庶子諭徳等官淳上言舊制無專領者乞以大臣兼之臣等仍翰林之職不許明初因元人之制自太師至賔客皆無所關掌而詹事以下至於坊局始實為宫臣然洪武元年丞相善長逹平章遇春帶少師少傅少保右都督馮勝𢃄詹事平章廖永忠趙鏞帶副詹事都督康茂才等帶左右率府使副御史大夫湯和鄧愈帶左右諭徳中丞劉基章溢帶贊善大夫善長基溢理省臺幾事煩日不暇給而逹遇春等諸大將帥征討之不遑然則以虚名被之而已所日授經者宋濓軰耳洪武二十二年公馮勝傅友徳領太師藍玉李景隆領太傅常昇侯孫恪領太保而尚書詹徽兼少保尚書楊靖領賔客亦不聞有關掌永樂初以公李景隆邱福領太師朱能領太傅尚書蹇義金忠侍郎墨麟領少詹事而學士解縉等七人皆兼坊學士庶子諭徳中允等官顧獨僧姚廣孝專為太子少師㑹上狩北京廣孝與義忠麟留輔太子學士楊士竒亦以諭徳輟閣務輔太子而自是以後三師至賔客乃為虚衘按宫僚自昔甚重唐馬周以位髙恨不能為司議郎至後則太輕故元稹曰師資保傅之官非疾廢眊瞶不任事者為之即休戍罷帥不知書者處之至於左諭贊議之徒踈冗散賤之甚者縉紳恥之近制宫寮之外往往以沈滯僻老之儒充直講侍讀之選可見其輕矣至宋時凡初改官者即得太子中允則其輕可見明制一作宫寮便比清卿其榮極矣夫此何官可以不尊崇此亦今勝於古也然明初必博選於諸寮而自穆宗以来祇為翰林循級之資則名雖重而實輕矣至於師傅之官古人所重故有寧加太尉而不加太傅者後則總戎緹帥皆得為之雖無與於職業而使天子儲君人得而師保之亦一大辱也王鏊儲教論昔者成王㓜在襁褓召公為太保周公為太傅太公為太師所以保其身體傅其徳義道之教訓此三公之職也又置三少曰少保曰少傅曰少師與太子宴遊者也又選天下端正孝悌博聞有道術者以翼衛之所以與居處出入者也逐去邪人不得見惡行故太子生見正事聞正言行正道前後左右皆正人也其身有不正者乎古之教太子者其制如此今國家之東宫官以序進未必皆天下之選學之日晨而授書授畢而退日中進講講畢而退况祁寒暑雨學皆間歇間歇之日所與宴遊者誰歟所與居處出入者誰歟不可得而知也又近世之弊患在上下不交然為太子亦且未同於君今也則已儼然端黙有言且不敢進又况為君之日乎求上下交而徳業成胡可得也昔者三王之教世子必齒於學國人觀之曰将君我而與我齒讓何也曰有父在則禮然然而衆知父子之道矣其二曰将君我而與我齒讓何也曰有君在則禮然然而衆知君臣之義矣其三曰將君我而與我齒讓何也曰長長也然而衆知長㓜之節矣此所以學為父子君臣長㓜之道而與人同如此下至漢唐此意冺矣然明帝受尚書於桓榮及為天子執醤而饋執爵而酳唐劉洎岑文本馬周遞日往東宫談論治道李泌與肅宗為布衣交出則聨轡寝則對榻國朝洪武初建大本堂取古今圖書充其中延四方名儒教太子親王分番夜直才俊之士充伴讀時時賜宴賦詩商確古今詳論文學無虚日仁宗於潜邸臣嘗伏覩其教令長至宴勞東宫之臣如家人父子有從學詩學表至有以暗逐明之喻則本朝之初亦嘗如古制也英宗㓜冲當時大臣無深識逺慮阿時所好名為尊君卑臣非祖宗之法本然今雖未能如古之制亦宜稍畧君臣之儀敦師友之分使宫僚日侍左右從容誦讀講讀之暇宴飲出入起居皆得周旋其間至暮乃退或有剪桐之戲隨事諫止宫僚有失從三師紏正之甚者斥逐邪人不使得預其間如此所謂一人元良萬邦以貞三代所以長久者用此道也霍韜東宫聖學疏臣等伏蒙聖恩擢補東宫官僚恩命下臨無任感激古人蒙一飯之惠猶思報効聖上獨擢臣等隆以清秩委以重任豈直一飯之徳比也臣等所由萬倍感激圖報無涯也仰惟皇太子今未出閣臣僚未得供職未得陳說文辭圖以涵養睿資預備聖功之基惟曰聞正言見正事習正道久而黙化習與性成而已矣臣等又聞古昔聖學圖史箴誡日陳於前於以維持身心無不備具進善之旌誹謗之木朝夕飫聞善言日進則徳日崇謗言日聞則過日寡帝王樂求謗言善言圖以優進聖域也臣等切取古意繪為聖功圖一十三幅装為一冊獻上東宫殿下其一曰文王世子問安次曰文王世子視膳願皇太子大孝師文王也次三曰文王世子齒讓願皇太子黙契古聖王謙徳也次四曰漢儒桓榮授經見東漢存古風去隆代未逺也次五曰神堯茅茨土階願皇太子知我祖宗皇帝聖徳上符神堯次六曰大禹菲飲食惡衣服願皇太子敦倫重儉也次七曰大禹卑宫室力溝洫願皇太子知聖主嗇身勤民也次八曰周王稼穡艱難乃知小民之依不恣逸欲所以祈天永命也次九曰周室后妃蠺織願皇太子知帝王家法也后妃知蠺織之勤乃知綺繡難得不敢侈也次十曰宫中隙地種蔬願皇太子知我聖祖盛徳同符堯禹乃萬世太平之丕基也十一曰西苑耕稼願皇太子知我聖上恤民稼穡艱難同符成周上契虞舜也十二曰西苑蠶桑願皇太子知我聖上家法即成周家法關睢麟趾之風也十三曰商家髙宗訪道願皇太子知聖王務學勤誠賢臣語學諄切莫盛於髙宗傅説萬世凖極也是圖次先後微意也伏願皇上少垂聖覽如謂臣等所繪圖冊或有少裨東宫作聖之資勅下内侍謹愿人員将臣等所繪圖冊時進皇太子觀玩未用講解文義且觀圖象得意悟契自深愈於講說之煩也臣等據事直辭無所忌諱雖未及古人拾遺補過之盛節亦庶㡬言無偽飾欲皇太子預養納言之量無俾古人樹誹謗木者專羙於前也又圖象惟繪大意於古人之服噐制度俱未精考神堯大禹文王傅說及漢明帝桓榮或冕裳或便服惟㨿聖賢圖象繪寫大略未敢謂肖真也至於字畫惟儒士勞良相陳鈿按舊冊謄雖有差訛不敢洗補臣等演說誤謬亦由學識膚淺所致臣等謹陳罪狀伏乞聖明察臣等感激圖報之愚亮臣等獻芹之悃恕臣等謬誤之故宥臣等不識忌諱之戮特賜内侍人員時進東宫睿覽楊廷麟薦代東宫講讀疏臣蒙恩㫖以充東宫講讀官臣惟青宫妙選儒者至榮臣得與供事竭此愚誠實出萬幸既退而思之皇上聰明天授慎擇端良其為慮深且逺庶幾必得清剛讜直博學多聞之士以充斯選而臣碌碌材質踈淺拊躬自慙且以臣所知伏見司經局掌局事左春坊右諭徳兼翰林院侍讀臣黄道周學術貞醇品行端潔在皇上已鑒其清望即賢者久敬為人宗愛國之忠出於誠懇自其始仕迨今十有六年守身樂貧書史之外室無長物又博覽羣書究心經務古今諸大典故靡不推研體察洞貫本末方之古人真徳秀胡安國之儔也使得與講讀之列必有正言正事之效以臣方之萬不逮一臣不揣冐陳乞皇上察臣至愚准臣辭免願以臣所任别簡道周必能進仁義陳堯舜以無負皇上慎選至意即道周受之天下以為不媿臣思審力推能人臣之義偽讓市名臣必不敢深念元良天下根本而正人世所難得如臣下劣濫與清班徒使大儒未獲實用名實之際臣實媿心儻蒙恩聽臣所請宫寀得賢良之效微臣免匱望之譏實臣大願臣質辭讓能義在為國非為道周也臣又考祖宗朝有洗馬司直司諫清紀等官所以隆副貳之儀廣正直之助也皇太子端位震宫歴有嵗年謂宜禮取備員以敬曠典義資箴誦功裨髙深四方聞之後世法之率祖敬徳於古有光伏祈聖明留察勅部臣酌議别選充員萬年有道之長為益不小臣凡有勞勩義不䘏私自審材分宜讓名賢區區之愚仰冀聖明省擇崇禎丁丑秋皇太子出閣講讀預題侍班四人禮書姜逢元詹事姚明恭少詹王鐸屈可伸講讀六人禮侍方逢年宫諭項煜修撰劉理順編修呉偉業楊廷麟林增志校書二人編修胡守恒楊士聰越數日項煜楊廷麟各上䟽讓黄道周奉㫖實圖供職不得矯讓於是閣臣張至發上掲極言之畧云公議推舉時於至聖先師之前齋心對越每人各出一名單擇其公同商確者入告彼時亦曾言及道周清品但意見不無少偏如近日三罪四恥七不如疏中有不如鄭鄤等夫蔑倫杖母明㫖煌煌鄤何如人而自謂不如是可為元良輔道乎文皇帝特簡王讓侍皇太子讀書謂侍臣曰孝者百行之原朕聞讓孝於親故擢用之今煜等謂賢如道周猶然格外煜有何徳堪在選中是博讓賢之名而使臣等冐蔽賢之愆臣等所不任受也於是刑科給事中馮元颷出䟽駁之曰臣聞聖王之世公卿能讓其下皆讓是以風俗醇羙冦攘不作逺人賔服神聽和平傳曰讓者徳之本孟子曰無辭讓之心非人也斯道不明至於邇日大臣以訟受服小人則而傚之奮臂相先不奪不止雖仗聖明屢申奬抑辭榮崇讓人情所難日者皇上敦重元良盛典肇舉而東宫講讀官楊廷麟等䟽請推良自代及於坊臣黄道周夫道周者嫉惡已甚至清無徒環召以来閉户却掃一時之人非不重之敬之特以道周數忤執政引嫌褁足罕至其門二臣獨篤信舉知退然自下即使其言不必用自足砥礪末俗増輝盛典為皇上股肱輔弼之臣者謂宜深相嘉嘆風勸百寮而伏讀閣臣張至發等愼選心矢至公一䟽若大不快於言者而併遷怒於道周則何也道周之賢閣臣固已言之矣事親至孝天下所知直諒多聞身無遺行所不足者惟以賦性髙介不能随時俛仰得當事大臣歡心耳閣臣何心執之如讐一至於此若以其言之為罪則皇上業已起田間還其清秩數四面奏皆荷優容天下萬世方頌為主聖臣直一大盛事而閣臣乃反借此以怒道周嗟乎道周忠足以動聖主之鑒而不能得執政之心臣恐天下萬世有以議閣臣之得失也夫官僚濟濟豈盡講讀道周即不與選而閣臣所選者亦既有項煜楊廷麟其人在二臣為閣臣所選而能以讓賢自異不肯茍悦於閣臣自臣而觀選者亦可以無愧臣所惜者皇上方欲懲貪而有一清者大臣又指以為偏皇上方欲抑競而有一讓者大臣又指以為矯以人事君之效将安望乎臣素恥雷同復羞摶擊但以公道所在自比他山伏望皇上特勅閣臣滌慮蠲私一更往轍以清讓為必可法以偏矯為必可取師濟之隆猶可立追也䟽上不報元颷求去上留之附記黄少詹道周召對紀崇禎戊寅五月詹事府少詹事黄道周具二䟽其一䟽言方一藻撫賞事與諳達不同其一䟽言不必起復陳新甲為宣大總督如無人肯任已願為之二䟽繕録既成使班役赴㑹極門投進班役以黄方在枚卜不欲其上䟽乃駕言㑹極門内監需索銀八兩以窘之黄不能應未㡬楊嗣昌入閣黄復具一䟽言楊嗣昌不當奪情入閣繕完又付班役班役見枚卜之事已畢遂将二䟽並投之至七月初五日上召閣臣来平臺又召五府六部恊理都通大錦衣衛堂上官吏科等科河南道等道掌印官恊理詹事府少詹事黄道周来平臺召對閣臣楊嗣昌以人言未至中使遞趣始到日午宣入上常服坐門内輔臣薛國觀劉宇亮傅冠及新輔臣楊嗣昌程國祥方逢年蔡國用范復粹各次第面恩訖黄道周奏臣註籍未見朝蒙宣召不敢不進上曰知道了上召吏部尚書商周祚侍郎董羽宸及戸部署部事右侍郎許世藎兵部輔臣楊嗣昌刑部尚書劉之鳳侍郎王命璿等各以該部職掌再四申飭訖上召黄道周道周跪上曰朕㓜而失學長而無聞時從經筵啟沃中畧知一二凡聖賢千言萬語不過天理人欲兩端耳無所為而為之謂之天理有所為而為之謂之人欲多一分人欲便損一分天理天理人欲不容並立你三疏不先不後却在不㸃用之時可謂無所為乎道周奏曰聖學淵微非臣所及若論天人只是義利分别為利者以功名爵禄私之於己事事專為己之私此是人欲為義者以天下國家為心事事在天下國家上做便是天理臣三䟽皆是為天下國家綱常名教不曾為一己之功名爵禄所以自信其初無所為上曰前月二十八日准陳新甲何能當日成䟽道周奏曰先時要推不拘守制者已知是新甲又嗣昌先薦他所以當日草䟽要上至未時已晚所以不上上曰三䟽皆後時始上何為扼於時道周曰初欲上䟽時因同鄉御史林蘭友科臣何楷有䟽恐渉嫌疑上曰如今就没嫌疑麽道周曰臣所奏關天下綱常邊方大計如今不言若後時言之又怕無及所以不得不上前日言路若有言者則臣可以不言臣之有言臣不得已也上曰近来言路大開不拘何人言的當都是聽的原無避諱何為先時不言至簡用之後方言道周曰先時既不可言至簡用後不得不言今日不言再無言之日且如髙官厚禄誰則不樂臣緘黙數時亦可叨冒升斗為先人誥命後人恩􅄻臣何苦捨自己之功名為他人之話柄臣所惜者千古之綱常名教臣何私之有渉上曰清原是羙徳但不可揚詡我太祖祖訓曰俗儒是古非今奸吏舞文弄法是此等人又曰且就清字言如伯夷是聖人之清若小亷曲謹不受餽遺止呌做亷不呌清道周奏陳文子大節不可觀夫子説他清夷齊大節可觀夫子所以説他是任上曰你説多有牽扯如前云子思子一生以誠明為本此句是了又云誠出於清仁出於誠不又隔了一層道周曰人有欲則不誠此誠字都從清来不清安得誠有子説孝弟也者其為仁之本此即誠生仁之説凡孝弟最篤實所以為仁之本有孝弟之人纔能經理天下發生萬物如不孝不弟的人無有根本如何生得枝葉故説至誠能經綸天下之大經立天下之大本如無根本那有枝葉又奏云譬如綱常名教禮義亷恥皆是根本上事若無此根本豈做得事業也奏未畢楊嗣昌跪奏綱常二字不敢不剖明君為臣綱父為子綱君臣述在父子之首古之君臣是列國之君臣去此適彼故有辟色辟言之義今之君臣乃一統之君臣為臣子者無所逃於天地之間即臣父母皆受君恩而無所逃臣又逃於何所先朝楊榮􅏝義侍祖宗三四十年無一日敢離左右故有奪情之舉天下咸亮之後来臣屢進屢退無侍上三四十年之事所以人不能亮且如成祖奪楊榮􅏝義之情而竄給事中丁鈺世宗奪楊溥之情而罷廖昌臣入京聞黄道周品行學術為人所宗意其必有持正之言可以使臣終制而去不謂其䟽上自謂不如鄭鄤臣始嘆息絶望上曰朕正要問他此事嗣昌奏人言禽獸知母而不知父今鄭鄤杖母禽獸不如道周又不如彼還講甚麽綱常道周奏大臣聞言應當退避使人得畢其言漢唐以来故事諫官論執政者出聼諫官對仗讀彈文臣雖非言官未有大臣跪在上前爭辯不容臣盡言者上曰你説了多時候輔臣纔奏嗣昌奏臣為綱常名教不容不剖陳上曰卿才猷敏練原為時事多艱屢㫖敦趣誠非得已這䟽也不為奪情古時人情多無所為近日人情各有所為孟子欲正人心息邪説古人邪説别是一般今人邪説直附於聖經賢傳之中關係世道人心更大道周奏臣生平恥言人過聞人之過如聞父母之名今日在上前與嗣昌角口亦非體臣知為天下後世留此綱常名教天理人心而已上曰對君有體這本前邉引綱常後邉全是肆口潑罵道周曰何敢潑罵魏徴云臣願為良臣毋為忠臣䟽中只有兩句説公子開方不省其親管仲比之豭狗李定不持繼母服宋時比之人梟此兩句是臣過激幸遇明主纔敢直言上曰直言豈是潑罵道周曰人臣進言甚難管子云禮義亷恥國之四維所言綱常名教者朝廷之綱常名教禮義亷恥者朝廷之禮義亷恥假如臣為一己之私只用緘黙自取富貴何苦與他爭辯上曰你無端汚詆大臣又以大題目来説他不得不辯總是别有所為道周曰宋臣司馬光有言臣若有專司則有所不言如為論思則無不可言者臣為侍從論思之臣與嗣昌比肩事主比不得詆毁大臣臣自少讀書於今五十年無一言一事不可對於君親告於妻子臣二十年躬耕手足腁胝四十䘮親負土成墳誠不忍見有奪情之事上曰既如此説又不如鄭鄤是怎麽説道周曰匡章棄於通國孟子不失禮貌孔子自云辭命吾不如宰予臣謂文章不如鄭鄤上曰章子是不得于父豈鄭鄤杖母之比你説不如鄭鄤是朋比道周曰衆惡必察未可因一人之言使主上不知是非之實上曰陳新甲先作兵道諳練軍情用之廵撫不幸有人倫之變不得不遣歸今日内外交訌不得不用他你説他走邪徑難道楊嗣昌一薦就是邪徑道周曰臣不識陳新甲但人心正則行皆正心邪則行皆邪且奪情一事在司馬堂猶可在内閣則不可使嗣昌一人為之猶可又呼羣引類使成奪情世界則不可臣不得不言臣今日不言使後有言者亦是臣今日之恥上曰如今的人有所為就在綱常名教道周曰自是陛下之綱常名教豈臣一人之私上曰朕正要再問你鄭鄤五倫盡絶昨日許曦等説他罪狀甚明不如雜職到有公論大小臣工到無公論這也可恥道周曰人若為功名富貴只當説鄭鄤不孝不弟依附權臣豈不立致通顯反説不如鄭鄤正是臣無所為宋人惡李元不丁母憂於孝子徐積賜粟帛以風之臣如要救鄭鄤則叅楊嗣昌非所以救鄭鄤也上黙然道周曰方今獨立敢言之人少讒謟面諛之人多臣不得不言上曰我先師孔子攝行相事誅少正卯正卯當時亦稱聞人五罪有一不免孔子之誅今人多類於此道周曰少正卯欺世盗名心術不正所以夫子誅之臣平生孝友居心不敢不正毫不敢有私讀夫子書惟求不得罪於夫子上曰前以爾偏執稍示裁抑後聞操守隨復賜環即前日那様暑天勞頓之餘仍成一篇文字雖不切題才亦可用還要用你不圖這様偏矯恣肆本當拿問念係講官姑著起去候㫖道周曰臣今日不盡言則臣負陛下陛下今日殺臣則陛下負臣上曰你都是虚話一生學問止學得這佞口道周曰臣還将忠佞二字奏明夫人臣在君父之前獨立敢言的為佞豈讒謟面諛的為忠乎夫敢爭是非辯邪正者為佞豈不敢爭是非辯邪正一味容悦者為忠乎忠佞不分則邪正亦不明此從古為政之大戒望皇上體察上曰起来楊嗣昌曰皇上所諭誠是誅意之法道周亦冒盛名望求優容上曰這便是優容了上賜𤓰果㸃心各官謝出復召囬聼諭曰今内外交訌天災地震皆朕不才不能感發諸臣公忠為國之心不智不能辨是非邪正及不能宣布徳化不武未能削平禍亂凡此皆朕之寡昧即朕之愆尤人心關係國運世道一等機械存心的專於黨同伐異假公濟私朝廷纔簡用一大臣百般詆毁若論祖宗之法當如何處看来這賊冦却是易治衣冠之盗甚是難除以後再有這等的立置重典諸臣各宜洗滌肺腸消除意見共修職掌共享太平之福諸臣承㫖起時詞臣趙士春劉同升亦上奪情疏下部議覆降三級照舊御札諭閣道周輕處趙劉重處盖以趙劉二臣上疏在既有諭㫖之後故欲重處耳楊嗣昌懼道周復用急募人上疏叅之職方司郎中王陞新擢太僕寺少卿示其意於鄉試所售士刑部主事張若麒遂上擁戴不效怨望紛然一疏云頃者皇上憂軫時艱不憚煩勞召對之後大布王言諄諄然以正人心息邪説為治天下之大本原舉黨同伐異之隱情招權納賄之狡術無不見其肺肝直為道破而闢邪一義尤為千古之聖帝名賢所未嘗發一時之端人正士所不能言直如日月當天妖狐莫遁消沮閉藏之態固已堪嘆堪憐謂大家洗心以副明㫖何意諸臣恃衆藐㫖造揑姦言歸過君上而無天無地無父無君一至此極也以臣所聞數日以来天諭既頒羣黨籍籍或擲抄傳之邸報而怒視或引不倫之逺事而詆議通宵聚衆信口譏排未已也至有謂召對之日黄道周犯顔批鱗古今未有而皇上為之理屈者至有謂堅求一死而皇上左顧言他始終無如道周何者要使古今未有之好話盡出自道周之口而凡可以歸過君父者無所不至盖倡之者飾六藝以文姦言務在假託道理以把持朝廷而顯行其呼朋引類之計一聞皇上下頂門之針遂大家喊呌謂老魔之赤幟既㧞山魈之穢態難藏嚇騙不靈谿壑無幸遂至潑口横加毫無顧忌夫病之久者不加瞑眩不能立愈迷之甚者不牽猛索不知囬頭伏乞皇上始終為世道人心計目今舉國如狂莫之敢指臣何敢畏其兇鋒雷同不言以負清明疏上黄降六級調外楊嗣昌以知兵調張若麒為職方少詹黄道周赦罪記詹事府少詹事黄石齋道周於崇禎庚午以編修上疏救錢華亭龍錫鐫級再上疏言事斥為民乙亥以薦起宮允丙子陪推内閣丁丑六月陞春坊諭徳以救鄭鄤為温體仁所紏十二月升少詹事辭不允戊寅陪推内閣八月紏楊嗣昌陳新甲奪情降六級調外補江西斷事庚辰四月江西廵撫解學龍入為少司馬例有薦䟽列道周名上以其黨並逮問至京二人並拜杖闕前户部主事葉廷秀疏救廷杖十二月監生凃仲吉疏救廷杖並道周下詔獄刑部主事吳文幟以問遲杖六十辛巳五月出詔獄俱遣戍道周更永戍至崇禎十五年壬午八月二十四日上御文華後殿日講畢召閣臣周延儒等入後殿上手一本問張溥張采何如人延儒對讀書的好秀才上曰張溥已死張采小官科道官如何尚説他好延儒對他頗有胸中書亦㑹做文章科道官做秀才時見其文章又以其用未竟惜之不然張溥已死説他亦無用上曰亦不免偏延儒對即黄道周皆有些偏只是曾讀書所以人人惜他上黙然徳璟言前黄道周蒙皇上放他生還他極感聖恩只是永逺充軍家貧子㓜還望皇上天恩赦囬或量改附近也好上微笑景昉言永逺充軍子孫要世世承當也極可憐延儒言道周在獄中尚寫許多書即向前章奏皆係親手寫的徳璟言道周寫有孝經一百本每本有一篇文字各一様共一百様多是感頌聖徳景昉言皇上表章孝經所以道周寫有一百本徳璟言頃皇上問知樂之人即道周便知樂甡言道周無不愽通不止知樂且其清苦極不可及徳璟言臣與道周同年他登第後多徒歩徃来至今尚未有住屋最是清苦且子方十歳但得免其永戍便好延儒言道周也不在永戍不永戍就是讀書亦還用得上不答微笑而已翼日手勅云昨先生每面奏永戍黄道周清藻博學見今戍逺子㓜朕心不覺憐憫彼雖偏迂經此一番懲創想亦改悔人才當惜宜作何釋罪酌用先生每密議来奏閣臣延儒等奏黄道周為人勵行力學是其所長偏執迂踈是其所短然而本心則願為君子素矢忠孝者至於博通典籍貫串古今刻苦亷隅摛詞吐藻實有一種人不能及足以感動人心之處是以譽望蔚然但向来未經追琢每有任性率意之咎自蒙恩譴裁抑陶鎔聞已甚悔前非每日在獄手書孝經極其感佩天恩頌揚聖徳此臣等皆得於目擊者近日恭覩皇上勤學好問稽古考文臣等自慚固陋未能仰承萬一因思及道周之博雅庶不愧詞臣職掌遂率陳奏伏蒙皇上憐其貧苦鑒其改悔而軫及於人才當惜赦罪酌用斯真造化生成之恩天地覆載之量播之海内傳之奕世有不懽呼讚嘆我大聖人之舉動超出㝷常萬萬者乎照得道周原職係詹事府少詹事今既蒙恩赦用當還其故秩以備史局編摩更足資其一得此則又非從道周起見也二十六日上諭吏兵二部永戍黄道周罪本應得念其清操力學尚堪䇿勵已經一番懲創想知悔改自新特准赦罪復職以昭朕奨亷尚學宥過惜才之至意諭下中外加額以為聖朝善政少詹黄道周天恩至重疏臣自去歳臈月解網重生暨於今春束裝就伍仰戴日星俯循道路凡有血氣俱感皇仁自揣殘年無可報主但得子孫永世荷干戈禦魑魅足矣蹢躅載途阻風澤畔六閲月始抵九江逺望辰陽尚三千里㿃瘧間發就醫蕭寺沈綿六十日摧頺老病之身誤服截瘧止痢之藥遂成委頓兩膝俱枯每念聖恩中宵揮涕謂臣廬墓十餘載乃不死於北司而死於江楚命也不圖十月朔日人從留都来傳邸報稱八月二十五日吏兵二部接出聖諭永戍黄道周罪所應得但其清操力學尚堪䇿勵已經懲創自當改過自新特准赦罪復職以昭朕奨亷尚學宥過惜才之至意特諭臣驚遽墜床起借香案匍匐叩頭隕越久之念自古人臣或以文才前席或以直戅召還未有迂愚狂瞽如臣得起於戍籍申以華奨者也臣少孤貧長而傭書不知清操力學為何事但為人臣予宜硜硜如此耳幸當風動之時得更囂頑之習雖損脰裂體不足為報然臣廢憊極矣當數年前筋力差徤誠不自忖欲奮横草之勞塞素餐之報今年垂望六體經九折百病交侵一絲未絶而欲盡盖前愆别圖後效徒足以招訾議增悲涕而已臣憶漢臣馬援病卧土窟中聞鼓角聲曵踵延頸見者哀之宋臣范鎮劉安世在屬纊囈語猶以天下為念今臣未即死而委頓若此即欲匍匐以親鵷行扶携而售馬骨飈聖主之風尚賛海嶽之涓埃何可得乎臣智不如葵忠不如曝徒逢仁閔得遂首邱偷隂擊壤能復幾時度無可報陛下者惟願陛下歛福錫極在宥羣生力行仁義之方徐收忠信之效擇亷幹以辦封疆重守令以靖冦攘使塵氛蚤清蒼赤永賴臣雖晨夕溘就草露與九原父母共啣結無窮臣下體已廢兩臂空存感戴髙深萬逾罔極乞容臣骸骨歸附邱隴為此力疾哀懇辭謝不勝戰栗春明夢餘録卷三十三
