body:
  text: 春明夢餘録卷十五吏部左侍郎孫承澤撰山川壇山川壇在正陽門南之右永樂十八年建繚以垣墻周回六里洪武三年建山川壇于天地壇之西正殿七壇曰太嵗曰風雲雷雨曰五嶽曰四鎮曰四海曰四瀆曰鍾山之神兩廡從祀六壇左京畿山川夏冬季月將右都城隍春秋季月將二十一年各設壇於大祀殿以孟春從祀遂于山川壇惟仲秋一祭永樂建壇北京一如其制進祀天夀山于鍾山下嘉靖十一年即山川壇為天神地祗二壇以仲秋中旬致祭别建太嵗壇專祀太嵗東廡為春秋月將西廡為夏冬月將各二壇前為拜殿宰牲亭南為川井即山川壇舊井有龍蟄其中壇西南有先農壇東旗纛廟壇南藉田在焉十年定太嵗月將祭期嵗于孟春享廟嵗暮祫祭之日遣官行禮隆慶元年禮官議天神地祗既從祀南北郊仲秋不宜復有神祗壇之祭罷之而太嵗之祭如故神祗壇神祗壇方廣五丈髙四尺五寸五分四出陛各九級壝墻方二十四丈髙五尺五寸厚二尺五寸櫺星門六正南三東西北各一內設雲形青白石龕四于壇北各髙九尺二寸五分地祗壇地祗壇面濶十丈進深六丈髙四尺四出陛各六級壝墻方二十四丈髙五尺五寸厚二尺四寸櫺星門亦如神壇內設青白石龕山形三水形二於壇北各髙八尺二寸左從位山水形各一於壇東右從位山水形各一於壇西各髙七尺六寸太嵗壇太嵗壇在山川壇內中為太嵗壇東西兩廡南為拜殿殿之東南砌燎爐殿之西為神庫神厨宰牲亭亭南為川井外四天門東門外為齋宫鑾駕庫外為東天門洪武二年以太嵗風雲雷雨及嶽鎮海瀆山川城隍諸神止合祀於城南諸神享祀之所未有壇壝等祀非隆敬神祗之道命禮官考古制以聞至是禮官奏太嵗者十二辰之神按説文歲字從步從戊木星一嵗行一次歷十二辰而一周天若步然也自子至巳為陽自午至亥為隂所謂太嵗十二辰也隂陽家説又有十二月將十二時所直之神若天乙天罡太乙功曹太沖之類雖不經見歷代用之唐宋不載祀典元每有大興作祭太嵗月將日直時直於太史院若風雨師之祀則見於周官秦漢隋唐亦皆有祭天寶中增雷師於雨師之次因升風雨雷為中祀宋元因之又按嶽鎮海瀆之祀虞舜以四仲月巡狩而祭四嶽東嶽曰泰山四嶽之宗也故文曰岱宗南嶽曰衡山西嶽曰華山北嶽曰恆山而未言五嶽王制曰天子祭天下名山大川五嶽四瀆始有五嶽之稱蓋以中嶽嵩山並列又周官小宗伯兆四望於四郊鄭元以四望為四嶽四瀆四瀆者江河淮濟也四鎮者東曰沂山西曰吳山南曰會稽北曰醫巫閭詩又曰巡狩而祀四嶽河海則又有四海之祭蓋天子方望之祀無所不通而嶽鎮海瀆在諸侯封內諸侯亦各以其方祀之秦罷封建嶽瀆皆領於祠官及漢復建諸侯則侯國各祀其封內山川天子無預焉武帝時諸侯或分或廢五嶽皆在天子之邦宣帝時嶽瀆始有使者持莭代祠之禮由魏及隋嶽鎮海瀆皆即其地立祠命有司致祭唐宋之制有命本界刺史縣令之祀有因郊祀而望祭之祀又有遣祭之祀元遣使祭嶽鎮海瀆分東西南北中為五道其天下山川之祀虞書望於山川遍於羣神周頌曰懷柔百神周禮小宗伯兆山川邱陵墳衍各因其方王制凡山川之小者其祭秩視伯子男劉向謂山川能生物出雲雨施潤澤品類以百數故視伯子男其在諸侯封內者諸侯又自祭之如楚祭雎漳晉祭惡池齊祭配林是也秦罷封建則皆領於祠官焉由漢唐以及宋元嶽鎮海瀆之外又有其餘山川之祀不獨嶽瀆也城隍之祀莫詳所始先儒謂既有社矣不應復有城隍故唐李陽冰縉雲城隍記謂祀典無之惟吳越有之然成都城隍祠太和中李德裕所建張説有祭城隍文杜牧有祭黃州城隍文則不獨吳越為然又蕪湖城隍建於吳赤烏二年髙齊慕容儼梁武陵王祀城隍神皆書於史又不獨唐而已宋以來其祀遍天下或賜廟額或頒封爵至或遷就附會各指一人以為神之姓名如鎮江慶元寧國太平華亭蕪湖等郡邑皆以為紀信龍且贑兖瑞吉建昌臨江南康皆以為灌嬰是也張説祭荆州城隍文曰致和産物助天育人張九齡祭洪州城隍方隅是保氓庶是依則歷代崇祀之意有在也今國家開創之初嘗以太嵗風雲雷雨嶽鎮海瀆及天下山川京都城隍及天下城隍皆祀於城南享祀之所既非專祀又室而不壇非禮所宜考之唐制以立春後申日祭雨雷於城東南以今觀之天地之生物動之以風潤之以雨發之以雷隂陽之機本一氣使然而各以時别祭甚失享祀本意至於海嶽之神其氣亦流通暢達何有限隔今宜以太嵗風雲雷雨嶽鎮海瀆及天下山川城隍祗合為一壇春秋祀之從之何孟春云國初肇祀太嵗禮官雜議因及隂陽家説十二時所值之神太祖乃定祭太嵗於山川壇之正殿而以春夏秋冬四月將分祀兩廡或謂月將非經見者按禮祭法埋少牢於泰昭祭時也相近於坎壇祭寒暑也太嵗實統四時而月將四時之候寒暑行焉古人有時與寒暑之祭今祭太嵗月將則固時與寒暑之神也載諸祀典孰謂非經見耶至洪武七年甲寅令仲春秋上旬擇日祭未幾以諸神從祀南郊遂省春祭是年夏六月始正嶽鎮海瀆及各城隍等稱號惟孔子之封爵不改遂詔為制一五嶽之神稱東嶽泰山之神中嶽嵩山之神西嶽華山之神北嶽恆山之神南嶽衡山之神一五鎮稱東鎮沂山之神南鎮會稽山之神中鎮霍山之神西鎮吳山之神北鎮醫無閭山之神一四海稱東海之神南海之神西海之神北海之神一四瀆稱東瀆大淮之神南瀆大江之神西瀆大河之神北瀆大濟之神一各處府州縣城隍稱某府城隍之神某州城隍之神某縣城隍之神一歷代忠臣烈士並依當時初封名爵祿某之神餘祠無功於民不應祀典者一切禁罷降詔云五嶽五鎮四海四瀆之封起自唐世崇名美諡歷代有加瀆祀不經莫此為甚至于忠臣烈士雖可加封號亦惟當時為宜今依古定制凡嶽鎮海瀆並去前代所封名號山水以山水本名稱其神郡縣城隍神號一體改正歷代忠臣烈士亦依當時初封以為實號後世諡封美稱皆與革去其孔子明先王之要道為天下師以濟後世非有功一方一時者比所有封爵仍因其舊遂為令未幾復降儀注凡府州縣新官到任必先宿齋城隍廟謁神與誓在隂陽表裏以安下民而祠祀之文禮儀之詳備載大眀集禮北嶽在今真定府定州曲陽縣漢為常山郡上曲陽縣史記封禪書常山王有罪遷天子封其弟于真定以續先王祀而以常山為郡然後五嶽皆在天子之邦漢書郊祀志祠北嶽常山於上曲陽後漢書章帝紀元和三年春二月戊辰幸中山遣使者祠北嶽于上曲陽魏書和平元年春正月如中山過恆嶽禮其神而返二年春二月如中山遣使者祀恆嶽隋書大業四年秋八月帝巡河北親祀恆嶽唐書地理志定州曲陽縣元和十五年更恆嶽曰鎮嶽設有嶽祠張嘉貞傳為定州刺史至州於恆嶽廟中立頌自為文書于石其碑用白石為之素質黑文甚為竒麗先是嶽祠為逺近祈賽有錢數百萬嘉貞自以為頌文之功納其數萬自漢及唐北嶽之祭皆在曲陽一統志乃謂恆山在渾源州南二十里山西志又謂宋時因山後諸州陷于契丹乃即曲陽致祭此謬説也邱文莊濬云歷代東海南海皆臨海而祭西海北海則望祀在宋都汴梁無由至遼薊之域出國門而北望祭之可也今建都于燕望南而祭北海豈天子宅中以臨四海之義哉今京師東北乃古碣石淪海之地于此立祠而祭于勢為順于理為宜若夫中國之正西在于秦隴西南則蜀稍南則滇也滇之極西百夷之外聞有大海宜于此處望祀之今祭北海仍在懷慶祭西海仍在蒲州是邱之説終眀之世未用也都城隍之神嵗以五月十一日為神之誕辰及萬夀聖莭各遣官致祭倪宗伯嶽上疏云廟祀城隍之神本非人鬼安得誕辰可謂妄謬每嵗南郊大祀壇八月山川壇俱有合祭之禮事體已重比於天下府縣之祭不同所有前項祭告煩瀆無據遂罷之先農壇先農壇在山川壇內西南隅永樂中建按洪武元年御史尋適請耕藉田享先農以勸天下上從之二年建壇壇南為藉田北為神倉嵗親祭先農以后稷配已而又奉仁祖配八年令府尹祭不設配永樂建壇京師一如其制建于太嵗壇傍之西南為制一成石包甎砌方廣四丈七尺髙四尺五寸四出陛西為瘞位東為齋宫鑾駕庫東北為神倉東南為具服殿殿前為觀耕臺用木方五丈髙五尺南東西三出陛臺南為藉田護壇地六百畝供黍稷及薦新品物又地九十四畝有竒每年額稅四石七斗有竒太常寺會同禮部收貯神倉以備旱潦又令壇官種一百九十畝壇户二百六十六畝七分上耕藉田親祭餘年順天府尹祭嘉靖中建圓廪方倉以貯粢盛耕之日上具辨服詣壇躬祭如儀更翼善冠黃袍各官吉服户部尚書進耒耜順天府官進鞭上秉耒耜三推三返部臣受耒耜府臣受鞭府官捧青箱隨以種子播而覆之上御觀耕臺坐觀三公五推九卿九推府官率庶人終畝漢耕于巨定于㺯田于定陶于下邳無定所唐戒近郊履千畝行九推宋耕數十步或十有二畦無定數至眀而其制始備天子耕用亥日蓋亥之地直上天倉星又以建辰月祭靈星以求豐穰靈星是天田星在于辰故農字以辰明宗伯蔣德璟藉田考按藉字周禮作籍禮記作籍詩載芟小序亦作籍説文作藉大明會典亦作藉周禮天官甸師掌帥其屬耕耨王籍以時入之以共齍盛注籍之言借也月令孟春天子以元日祈榖于上帝乃擇元辰天子親載耒耜帥三公九卿諸侯大夫躬耕帝籍天子三推三公五推卿諸侯九推注元辰郊後吉辰也帝籍者為天神借民力所治之田也籍田共上帝粢盛故云為天神借民力也箋云籍之言借也借民力治之正義云天子千畝諸侯百畝王一耕之而使庶人藝芓終之是借民也王者役人自是常事而謂之借者言此田耕耨皆當王親為之但以聽政治民有所不暇故借人之力以為已功漢書孝文籍田應劭曰籍田千畝典籍之田臣瓚曰親耕親桑率天下先本不得以假借為稱然凡言典籍者謂作事設法書而記之或復追述前言號為典法此籍田在於公地嵗嵗耕墾何故以籍為名若以事載典籍即名籍田則天下之事無非籍矣何獨於此偏得籍名瓚親耕之文即云不得假借豈籍田千畝天子親耕之乎周禮疏云籍田之榖衆神皆用獨言帝籍者舉尊言之自天子三推以下示有恭敬鬼神之法又示帥先天下故暫時耕終之者庶人也説文曰藉帝藉千畝也古者使民如借故謂之藉從耒昔聲通作籍韋昭曰借民力治之以奉宗廟且以勸率天下使務農也盧植曰藉耕也左傳鄅人藉稻故知藉為耕瓚曰藉謂蹈藉也師古曰瓚説是今會典作藉蓋本之説文考先農詩載芟春籍田而祈社稷也正義曰周公成王太平之時王者親耕籍田以勸農業又祈求社稷使獲年豐嵗稔故序本其多獲所繇經則主説年豐不及籍社所以經序有異也月令孟春天子躬耕帝籍仲春擇元日命民人社大司馬仲春搜田獻禽以祭社然則天子祈社亦以仲春與耕藉異月而連言之者俱在春時故以春總之祭法云王為羣姓立社曰泰社王自為立社曰王社亦曰帝社此二社皆應以春祈之但此為百姓祈祭文當主於泰社其稷與社共祭亦當謂泰社泰稷焉鄭元謂王社在籍田之中按大眀集禮云周官籥章凡國祈年于田祖吹豳雅擊土鼓以樂田畯鄭氏曰田祖始耕田者謂神農也漢立官社文帝令官祠先農晉武詔復二社北齊及隋又改曰先農唐神龍中禮官祝欽眀議以禮典無先農之文先農與社本是一神妄為改作請改先農壇為帝社壇以應禮經王社之義至開元定禮又採齊隋之議復曰先農宋陳祥道曰先儒謂王社建於籍田然國語王藉則司空除壇農正陳籍禮而歷代所祭先農而已不聞祭社也詩曰春籍田而祈社非謂社稷建于籍田也今按祝欽明云先農即社陳祥道云社自社先農自先農籍田所祭乃先農非社也其説不同其為重農報本之義一也考祭與耕同日享先農之禮與躬耕同日禮無眀文惟周語云農正陳籍禮而韋昭注謂陳籍禮者祭其神為農祈也至漢以籍田之日祀先農而其禮始著漢舊儀春耕籍田官祠先農百官皆從置籍田令丞東漢籍田儀正月始耕常以乙日祠先農於田所先農已享耕於其地自晉魏至唐宋其禮不廢政和間罷享先農為中祀命有司行事止行親耕之禮南渡後復親祠元不親行僅命有司攝事而已眀髙皇帝親祠躬耕始復古禮後改中祀止遣應天府官致祭不設配祭畢親耕惟登極初行耕藉禮則親祭云考不用亥月令孟春擇元辰説者曰元辰祈榖郊後吉辰也十二支謂之辰郊天是陽故用辛日耕藉是隂故用亥辰知用亥者正月亥為天倉以其耕事故用天倉也周語立春之日農祥晨正至二月初吉王祼鬯而行籍禮漢文用亥日耕籍祠先農明帝耕以二月章帝耕以正月乙日晉武帝以正月丁亥宋文帝以正月上辛後吉亥齊武帝時王儉謂親耕用立春後亥日經無明文何佟之云少牢饋食禮禘太廟用丁亥鄭元以不必丁亥今若不得丁則用己亥辛亥茍有亥焉可也梁天監中議書云以殷仲春籍田理在建卯於是改用二月唐用孟春吉亥宋用正月上辛後亥日政和中議禮局言孟春親耕下太史局擇日不必專用吉亥元用孟春吉亥國朝以仲春擇吉日行事考壇制虢文公云籍田之制司空除于籍漢文帝立壇於田所其制如社之壇宋於宫之震地八里外整治千畝中開阡陌立先農壇於中阡西陌南梁移籍田于建康北岸築兆域如南北郊齊作祠壇於陌南阡西廣輪三十尺四陛三壝四門又為大營於外唐髙宗改籍田壇為先農壇神龍初復改先農壇為帝社壇於壇西立帝稷壇禮同太社惟不備方色有異焉壇髙五尺方五丈四出陛其色青宋先農壇九尺四十步飾以青二壝元壇制同社壇縱廣十步髙五尺四出陛其色青每方開櫺星門國朝壇在藉田之北髙五尺濶五丈四出陛考耕所唐貞觀中議籍田所在給事中孔穎達曰禮天子籍於南郊諸侯於東郊晉武時於東南今於城東不合古禮太宗曰禮緣人情何常之有虞書之平秩東作已在東矣又乘青輅載黛耜者所以順於春氣故知合在東方也於是遂定宋初耕於東郊神宗元豐中議以天子為籍於南郊諸侯為籍於東郊是為不易之典而歷世帝王循用東郊之制乃依古禮度地於京城東南御耕位在先農壇壝門東南考榖種周官內宰上春詔王后帥六宫之人生穜稑之種而獻之王先種後熟曰穜後種先熟曰稑必使后宮藏種者以其有繁育之祥也必生而獻之者示能育之使不傷敗且佐王耕事供祭祀也此項後惟宋文帝時行之考勞酒周制耕籍畢反執爵於太寢三公九卿諸侯大夫皆御命曰勞酒勞酒謂既耕而宴以勞羣臣也大寢路寢御侍也周語虢文公曰耕畢膳夫陳享膳宰監之膳夫贊王王歆太牢班賞之庶人終食此禮唐宋皆行於還宫之次日或擇日賜宴明制耕畢皇帝置酒于大次從耕大臣執事百官以及耆老村社皆蒙賜焉𢎞治元年二月上親耕藉田禮畢宴羣臣時教坊司以雜劇承應或出狎語左都御史馬文升厲聲曰新天子當知稼穡艱難豈宜以此瀆亂宸聽即去之考大蠟大蠟與藉田相為始終而本朝唯於此闕焉因請當東作方興之始既舉藉田之禮以祀先農于春而以帥先農民興其務本之心則百榖告成之後載舉大蠟之禮以報先嗇於冬而以勞來農民報其勤動之苦惜未行崇禎壬午上親耕藉田紀今上御極之七年嵗在甲戌二月二十有七日親致祭於先農之神行躬耕藉田禮至十五年壬午二月十九日上復親祭先農行耕藉禮澤為户科左給事中同科員張希夏沈􅏷培左懋第沈迅戴明説導駕躬逢大典略紀其槩壬午二月十九日巳未卯刻上駕至先農壇六科同禮部堂上官導駕至具服殿易皮辨服絳紗祭服至壇壇上結黃幄奉先農下設上拜位上拜揖甚恭禮畢仍導駕至具服殿易翼善冠黃袍太常寺奏請詣耕藉位六科同禮部導駕至位户部尚書傅淑訓跪進耒耜順天府尹張宸極跪進鞭六科錦衣衛太常卿導引上左手秉耒右手執鞭三推步行犁土中盡壠而止耕時教坊司引紅旗兩旁唱禾詞老人牽牛二人扶犁二人耕畢户部尚書跪受耒耜置犁亭府尹跪受鞭置鞭亭府尹捧青箱播種耆老以御牛隨而覆之上御觀耕臺於是大學士周延儒賀逢聖張四知謝升陳演吏部尚書李日宣六人耕東定國公徐允禎恭順侯吳惟英清平伯吳遵周户部尚書傅淑訓兵部尚書陳新甲工部尚書劉遵憲六人耕西順天府廳官各執箱播種太常卿奏耕畢駕至齋宫各官一拜三叩頭分班侍立順天府官率兩縣官耆老人等五拜三叩頭農夫蓑衣挑農具三十人隨後俯伏禮畢即隨府縣官至耕所終畝各官行慶賀禮上傳旨賜酒飯文官三品以上武官二品以上坐丹陛上餘在臺下是日科臣沈迅因教坊承應歌詞俚俗宜改正上疏即下部本月二十四日上令閣臣傳禮部王錫衮蔣德璟到閣諭以後耕藉宜歌豳風無逸之詩其教坊所扮黃童白叟鼓腹謳歌為佯醉狀委為俚俗斥令改正天地之舞不宜扮天神褻瀆及禾詞宜頌不忘規須令詞臣另行撰擬户科左給事中臣某紀旗纛廟旗纛廟建于太嵗殿之東永樂建規制如南京神曰旗頭大將曰六纛大神曰五方旗神曰主宰戰船之神曰金鼓角銃炮之神曰弓弩飛鎗飛石之神曰陳前陳後神祗五猖等衆皆南向旗謂牙旗黃帝出軍訣曰牙旗者將軍之精一軍之形候凡始竪牙必祭以剛日祭牙之日吉氣來應大勝之徴纛謂旄頭也太白隂經曰大將軍中營建之天子六軍故用六纛以旄牛尾為之在左騑馬首秦置頭騎以先驅漢武帝置靈旗為兵禱則太史奉以指所伐國孫權作黃龍火牙旗後齊天子親征建牙旗唐宋及元皆有旗纛之祭旗纛藏內府仲秋遣旗手衛官祭于廟霜降祭于教場嵗暮祭于承天門外後罷霜降之祭又朔望有神旗之祭則京營提督官專祭火雷之神于教場國有大征討皇帝武辨服禡祭祭軍牙之神六纛之神建牙旗六纛於神位後祭之日皇帝省牲視滌牛一羊一豕一禮三獻奏樂皇帝飲福受胙望燎刺五雄雞血於酒碗酬神焉春明夢餘録卷十五
