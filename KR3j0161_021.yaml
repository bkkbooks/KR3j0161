body:
  text: 春明夢餘録卷二十一吏部左侍郎孫承澤撰文廟文廟在城東北國學之左元太祖置宣聖廟於燕京以舊樞密院為之成宗大德十年京師廟成明太祖改為北平府學廟制如故永樂元年八月遣官釋奠仍改稱國子監孔子廟尋建新廟於故址中為廟南向東西兩廡丹墀西為瘞所正南為廟門門東為宰牲亭神厨西為神庫持敬門門正南為外門正殿初名大成殿嘉靖九年改稱先師廟殿門為廟門萬歷二十八年廟宇易以琉璃廟主至聖先師孔子之位洪武定大成文宣王木主長三尺三寸五分連上雲下座共五尺二寸濶七寸連左右雲共一尺一寸五分嘉靖中定至聖先師木主髙二尺三寸七分闊四寸厚七分座髙四寸長七寸厚三寸四分朱地金書四配復聖顔子宗聖曽子述聖子思子亞聖孟子洪武制木主各長一尺九寸五分連上雲下座共三尺闊五寸連左右雲共一尺一寸嘉靖中改各髙一尺五寸闊三寸二分厚五分座髙四寸長六寸厚二寸八分赤地墨書啓聖公神主與四配同十哲先賢閔子損冉子耕冉子雍宰子豫端木子賜冉子求仲子由言子偃卜子商顓孫子師洪武制木主各長一尺九寸闊四寸連座共二尺五寸嘉靖改一尺四寸闊二寸六分厚五分座髙二寸六分長四寸厚二寸赤地墨書東廡從祀先賢淡臺子滅明原子憲南宫子適啇子瞿漆雕子開樊子須公西子赤梁子鱣冉子孺伯子䖍冉子季漆雕子徒父漆雕子哆啇子澤任子不齊公良子孺奚子容蒧顔子祖句子井疆秦子商公祖子句兹縣子成燕子伋顔子之僕樂子咳邽子㢲公西子輿如公西子蒧陳子亢琴子牢步叔子乘先儒左子邱明伏子勝髙堂子隆后子倉董子仲舒王子通歐陽子修邵子雍司馬子光程子皓楊子時羅子從彥陸子九淵朱子熹真子德秀許子衡陳子獻章王子守仁西廡從祀先賢宓子不齊公冶子長公晢子哀髙子柴司馬子耕有子若巫馬子施顔子辛曹子恤公孫子龍秦子祖顔子髙穰子駟赤石子作蜀公夏子首后子䖍公子肩定鄡子單罕父子黑榮子旗左子人郢鄭子國原子亢亷子潔叔仲子會狄子黑孔子忠施子之常秦子非申子棖顔子噲先儒公羊子髙穀梁子赤毛子萇孔子安國杜子子春韓子愈胡子瑗周子敦頤張子載程子頤胡子安國張子栻李子侗吕子祖謙蔡子沉薛子瑄胡子居仁洪武制先賢木主各長一尺七寸闊三寸連座共二尺一寸嘉靖改髙一尺四寸闊二寸六分厚五分座髙二寸六分長四寸厚二寸赤地墨書洪武制先儒木主同諸賢嘉靖改各髙一尺三寸闊二寸三分厚四分座髙二寸六分長四寸厚二寸赤地墨書褒崇魯哀公十六年夏四月己丑孔子卒哀公誄之稱曰尼父漢平帝元始元年六月追諡孔子曰褒成宣尼公東漢和帝永光四年封孔子為褒尊侯後魏孝文帝太和十六年改諡文聖尼父後周宣帝大象二年追封孔子為鄒國公隋文帝贈孔子為先師尼父唐太宗貞觀二年尊孔子為先聖以顔子配唐髙宗永徽中改周公為先聖孔子為先師顔回左邱眀從祀顯慶二年以周公配武王定孔子為先聖孔子定稱先聖始此乾封元年正月辛卯追贈孔子為太師尹氏起莘曰贈以三公之官是臣之也綱目於贈太師削不書為先聖諱也武后天授元年七月封孔子為隆道公唐元宗開元二十七年八月追諡孔子為文宣王贈顔子為兖公閔子九人為侯曾子等為伯二京國子監及州縣始正南靣位二京之祭牲用太牢舞八佾州縣少牢邱濬曰此孔子封王弟子稱公侯之始夫宣之為諡不過聖善周聞髙洋李元素等皆有此諡聖人萬世道德之宗稱天以誄之猶恐未稱區區荒誕之稱何足為重䡖哉宋真宗咸平三年幸曲阜謁文宣王廟追諡孔子為元聖文宣王大中祥符五年改諡元聖為至聖文宣王以犯聖祖諱也邱濬曰加諡用緯書異端之說改諡用妖妄之神而避其諱要皆非禮之禮元武宗至大元年加號孔子大成至聖文宣王明洪武三年正諸神封號惟大成至聖文宣王及配享從祀諸賢儒如故成化十二年祭酒周洪謨請加孔子封號為聖神廣運帝且曰或謂孔子陪臣不當稱帝則宋儒羅從彥嘗曰唐既封先聖為王襲其舊號可也加之帝號而褒崇之亦可也禮部尚書鄒幹謂聖神廣運伯益贊堯之辭不若大成至聖本於孟子中庸猶可擬議也且貴乎孔子之道者在身體力行乃尊崇之實可易諡加號豈足為孔子重䡖哉遂弗許嘉靖九年大學士張璁請正祀典從之因製祀典說曰孔子之道王者之道也特其位非王者之位焉孔子當時諸侯有僣王者皆筆削而心誅之其生也如是今不體其心而漫加之號豈善於尊崇者哉又若增樂舞用八佾籩豆用十二牲用熟而上擬乎事天也無忌之甚者矣若夫顔回曽參孔伋以子而並配於堂上顔路曽晳孔鯉以父從列於下此名之不正者也綱領既紊至有宋而程頤以親接道統之傳遂主英宗不父濮王之禮是可忍也孰不可忍也璁也為名分也為義理也非諛君也非滅師也兹所正者亦以防間於萬世之下也於是通行天下學校改大成至聖文宣王為至聖先師孔子四配稱復聖顔子宗聖曽子述聖子思子亞聖孟子十哲以下凡及門弟子稱先賢某子左邱明以下稱先儒某氏悉罷封爵廟制魯哀公十七年立廟孔子舊宅東漢明帝永平二年躬飬三老五更於辟雍令郡縣通行鄉飲酒禮於學校皆祀聖師周公孔子東漢靈帝元光元年始置鴻都門學畫孔子及七十二弟子像魏文帝黃初元年令郡國修起孔子舊廟黃初二年詔魯修孔子廟魏主芳正始七年令太常釋奠以太牢祀孔子於辟雍以顔淵配宋文帝元嘉十九年十二月建孔子廟置守墳戶宋武帝孝建元年詔建孔子廟制同諸侯禮梁武帝天監四年六月初立孔子廟於江左北魏主拓跋始光三年起太學於城東祀孔子以顔子配北齊顯祖天保元年詔郡國各於坊內立孔顔廟唐髙祖武德二年六月令國子學立周公孔子廟各一所四時致祭七年二月親臨釋奠以周公為先聖孔子為先師配唐太宗貞觀二年尊孔子為先聖以顔子為先師配備爼豆干戚之容四年令郡縣皆作孔子廟四時致祭十一年尊孔子為宣父作廟於兖州十九年追尊太公尚父為武成王作廟與孔子文宣王廟東西並峙唐髙宗顯慶二年定孔子為先聖後唐眀宗長興二年文武二廟詔復並建宋太祖建隆三年詔祀文宣王用一品禮廟門立㦸十六祭用永安之樂按用一品臣之也此非禮宋真宗大中祥符元年加聖像冕服桓圭先仍唐制孔子與弟子同服衮執木圭至是加冕九旒服九章圭用玉宋徽宗崇寧四年詔辟雍文宣王殿名大成國子監丞趙子櫟言唐封孔子為文宣王其廟像內出王者衮冕衣之今乃循五代古制服上公之服七十子皆周人而衣冠率用漢制非是詔易七十子以周之冕服時帝幸國子監謁文宣王殿再拜行酌獻禮司業蔣靜言先聖與門人通服冕服無别考周官司服公之冕與王同今既考正配享從祀之服亦宜考正先聖之冕服於是增孔子冕十二旒服九章州縣學咸如之政和元年詔先聖廟用㦸二十四文宣王執鎮圭並用王者之制金世宗大定十四年加宣聖像十二旒十二章元武宗至大三年置曲阜宣聖廟登歌樂眀洪武二年十月令天下郡縣皆立學學皆立孔廟禮延師儒教授生徒十五年國子監大成殿成用木主不設像二十年罷武成廟獨尊孔子正統三年禁天下祀孔子於釋老宫嘉靖九年改大成殿為先師廟㦸門為文廟之門天下學宫通撤像易木主邱濬曰塑像之設中國無之至佛教入中國始有也三代以前祀神皆以主無所謂像設也彼異教用之無足怪者不知祀吾聖人者何時而始觀李元瓘言顔子立側則像在唐前已有之矣郡異縣殊不一其狀長短豐瘠老少美惡惟其工之巧拙就令盡善亦豈是生時盛德之容甚非神而眀之無聲無臭之道也釋奠漢髙帝十二年過魯以太牢祀孔子東漢光武建武五年幸魯遣大司空以太牢祀孔子十月還宫幸太學眀帝永平十五年幸魯詣孔子宅廟以太牢致祀及七十二弟子親御講堂命太子諸王說經章帝元和二年過魯詣闕里祀孔子作六代之樂帝升廟西面羣臣中庭北靣皆再拜帝進爵而後坐大會孔氏男子六十三人命儒者論難賜褒成侯損等錢帛安帝延光三年過魯祀孔子率循元和之軌靈帝建寧三年詔祀孔子依社禝出王家穀春秋行禮魏主芳正始七年令太常釋奠以太牢祀孔子於辟雍以顔淵配晉武帝泰始二年令太學及魯國四時備三牲以祀孔子及七十二弟子七年皇太子親釋奠於太學講孝經通也自是咸寧三年講詩通太康三年講禮記通並親釋奠以顔子配東晉明帝太寧三年詔四時祀孔子祭宜如泰始故事成帝咸康元年二月帝講詩通親釋奠穆帝升平元年三月帝講孝經通釋奠於中堂孝武帝寧康三年二月帝講孝經通釋奠於中堂時議以太學在水南懸逺依穆帝故事於中堂權立太學釋奠禮畢會群官六品以上宋文帝元嘉二十二年皇太子釋奠舞八佾設軒懸之樂牲牢器用悉如上公從裴松之之議也齊武帝永明三年正月詔立學是年秋集有司議禮冬十月皇太子講孝經親臨釋奠車駕幸臨尚書令王儉議周禮春入學釋奠合舞學記云始教皮辨祭菜示敬道也又云始入學必祭先聖先師中朝以來釋菜禮廢今之所行釋奠而已金石爼豆皆無明文陸納車𦙍謂宣尼廟宜依亭侯之爵范寧欲依周公之廟用王者儀范宣謂當其為師則不臣之釋奠日備帝王禮樂車陸失於過輕二范傷於太重引用上公即事惟允宜設軒懸之樂六佾之舞牲牢器用悉依上公明帝永泰元年三月復孔子祭秩梁武帝天監八年九月皇太子釋奠大同七年皇太子釋奠國學敬帝太平二年訪孔子後修廟堂備四時祭陳宣帝太建三年八月皇太子釋奠於太學陳後主至德三年親行釋奠禮畢設金石之樂宴王公卿士北魏主拓跋圭天興四年命樂師入學習舞釋奠於先聖先師北魏主燾太平真君十一年南伐至鄒山以太牢祀先聖北魏主濬詔宣尼廟别敕有司行薦享之禮北齊顯祖天保元年制春秋二仲釋奠於先聖先師每月朔祭酒領博士以下及國子諸學生四門博士升堂助教及太學諸生階下拜孔聖揖顔子其郡學則博士以下每月朔朝隋文帝制國子寺每嵗以四仲月上丁釋奠先聖先師州縣學以春秋仲月釋奠唐髙祖武德二年制國學釋奠禮先師籩十豆十簠一簋一登三鉶三爼三從祀籩二豆二簠一簋一俎一州縣釋奠先聖先師籩豆各八簠二俎二武德七年二月帝親臨釋奠以周公為先聖孔子為先師皇太子王公皆從祭酒以下說經太宗貞觀二年尊孔子為先聖顔子為先師皇太子親釋奠十四年帝親釋奠於國子學二十年詔皇太子詣國子學釋奠先聖先師皇太子初獻國子祭酒張復𦙍亞獻光州刺史趙𢎞智攝司業終獻二十一年制先聖神坐於廟堂內西楹間東向先師於先聖東北南向餘弟子及二十一賢以次東陳南向西上春秋上丁行事前享一日奉禮郎設三獻位於東門之內道北執事位於道南西向學生位館官之後皆重行北上觀者位於南門之內道之左右重行北向相對為首設三獻門外位於東門之外道南執事位於其後每等異位北向西上館官學生位於三獻東南北向西上釋奠令祭酒初獻司業亞獻博士終獻辭稱皇帝謹遣某官行禮以為永制髙宗乾封元年過曲阜以少牢祀孔子睿宗太極元年製宣聖贊皇太子釋奠開講筵元宗開元七年詔皇太子諸王入國學行齒胄謁孔子十三年封禪還詣孔子宅奠祭又遣使以太牢祀墓二十六年詔諸州貢舉人就胄監謁先師官為開講二十八年詔以春秋二仲月上丁祭先聖先師代宗永泰二年修國學祠堂成行釋奠禮宰相及參軍官六軍將軍皆就觀焉自肅宗以來初復二京宫懸不具至是乃奏宫懸於祠堂德宗貞元二年釋奠詔宰相以下畢集於國學後唐明宗長興三年詔文宣王廟四壁諸賢每釋奠各設籩二豆二簠簋各一爵一後周髙祖廣順元年詣闕里奠孔子左右曰天子不當拜異代陪臣帝曰孔子聖人也百王取則安得不拜宋太祖建隆元年二月視國子監詔加飾祠宇親製文宣王及兖公二贊十哲以下分命宰臣兩制撰真宗大中祥符二年幸闕里謁廟有司以人主議止肅揖帝特再拜六月頒諸州釋奠儀注祭器圖是年就文宣王廟立像飬孔氏子孫仁宗天聖元年視國子監奠謁先聖退閲七十二賢贊觀東序及禮器景祐元年詔釋奠用登歌徽宗政和六年五月賜堂上正聲大樂一部及禮器於闕里髙宗紹興七年有司請文宣王殿釋奠加鉶鼎三登一十哲從祀共用羊豕各一每位籩二簠一簋一爵一十年七月復釋奠文宣王為大祀祀前誓戒加籩豆十二禮如社稷幸太學駕止㦸門外登降步趨執爵灌獻十四年三月視太學謁先聖製像贊及七十二子贊刻石孝宗淳熙四年二月乙邜視太學御崇化堂理宗淳祐元年祀太學以所製伏羲堯舜禹湯文武周孔顔曾思孟十三贊就賜國子監宣示諸生元世祖至元十年頒釋奠文宣王祭器又詔外路提學教授官春秋二丁不變常服於禮未宜自今執事官各依品序服公服執手板元成宗大德十年命浙江行省製宣聖廟樂秋八月用於廟祀其樂歌仍宋之舊又令翰林新撰樂章不果用武宗至大三年置曲阜宣聖廟登歌樂明洪武元年二月以太牢親祀孔子於國子學八月丁丑遣官釋奠於先師孔子時禮官言周制凡始立學者釋奠於先聖先師凡學春夏釋奠於先師秋冬亦如之漢儒以先聖為周公若孔子先師為詩書之官若禮有髙堂生樂有制氏詩有毛公書有伏生可以為師者蓋四時之學將習其道故釋奠各以其師而不及先聖惟春秋合樂則天子視學有司總祭先聖先師是則漢時釋奠亦略可知矣嗣後歷代宋元因古禮而損益之今宜定制以仲春仲秋二上丁日降香遣官祀於國學以丞相為初獻翰林學士亞獻國子祭酒終獻從之四年秋更定孔廟釋奠祭器禮物初孔子之祀像設髙座而器物悉陳於座下至是各置髙案籩豆簠簋登鉶悉用瓷牲用熟酒三獻並祭酒行禮樂六奏擇監生及文臣子弟在學校者充樂舞生預教習之宋濂上孔子廟堂議曰世之言禮者皆取法孔子不以古禮祀孔子是䙝祀也䙝祀不敬不敬則無福古者將祭主人朝服即位於阼階東西靣祝告利成主人立於阼階上西靣尸出入主人降立於阼階東西靣此皆主人之正位也祝先入南面主人從戶內西靣祝酌奠主人西靣再拜稽首皆為几筵之在西也漢晉春秋載章帝元和二年幸魯祀孔子帝升廟西靣再拜開元禮亦先聖東向先師南向三獻官皆西向是猶未失古禮也今襲開元二十七年之制遷神於南靣而行禮者北靣則非神道尚右之義矣古者造木主以棲神天子諸侯之廟皆有主大夫束帛以依神士結茅為蕞無設像之事開元禮亦設先聖神坐於堂上西楹間設先師神坐於先聖東北席皆以莞則尚掃地而祭也今因開元八年之制摶土而肖像焉則失神而明之之義矣古者灌用鬯臭鬱合鬯臭隂達於淵泉既灌然後出迎牲致隂氣也蕭合黍稷臭陽達於牆屋既奠然後焫蕭合羶薌蓋求神於隂陽也今用薰薌代之庸非簡乎古朝覲㑹同郊廟祭饗皆設庭燎司烜共之火師鍳之天子百公五十餘三十不若是則不嚴且敬也今以秉炬當之庸非瀆乎古之有道有德者使教焉死則為樂祖祭於瞽宗謂之先師若漢禮有高堂生樂有制氏詩有毛公書有伏生也凡始立學者必釋奠於先聖先師釋奠必有合有國故則否謂國無先聖先師則所以奠者當與鄰國合若唐虞有䕫伯夷周有周公魯有孔子則皆自奠之不合也當是時學者各自祭其先師非其師弗學也非其學弗祭也學校既廢天下莫知所師孔子集群聖之大成顔回曾參孔伋孟軻實傳孔子之道尊之以為先聖先師而通祀於天下固宜其餘當各及其邦之先賢雖七十二子之祀亦當罷去而於國學設之庶幾弗悖禮意也開元禮國學祀先聖孔子以顔子七十賢配諸州但以先師顔子配今也雜置而妄列甚至荀况之言性惡揚雄之事莾王弼之宗老莊賈逵之忽細行杜預之建短喪馬融之黨勢家亦厠其中不知其何說也古者立學専眀人倫子雖齊聖不先父食故禹不先鯀湯不先契文武不先不窋宋祖帝乙鄭祖厲王猶上祖也今顔回曾參孔伋子也配享堂上顔路㑹晢孔鯉父也配祀廡間張載則二程之表叔也乃坐其下顛倒彛倫莫此為甚又不知其何說也古者士之見師以菜為贄故始入學者必釋菜以禮其先師其學官四時之祭乃皆釋奠今專用春秋亦非禮矣釋奠有樂無尸而釋菜無樂二者之輕重繫乎樂之有無也今用魏漢津所製大晟之樂乃亂世之音其可乎哉古釋菜釋奠名存而儀已亡開元禮倣佛儀禮饋食篇三獻各於獻後飲即尸酢主人主婦及賔之義也今惟初獻得行之其可乎若夫廟制之非宜冕服之無章器用雜乎雅俗升降昧乎左右固更僕難言也或曰建安熊氏欲以伏羲為道統之宗農軒堯舜禹湯文武與臯伊望旦稷契夷益傅說箕子皆秩祀於天子之學而孔子則通祀於天下不識可乎昔周立四代之學先聖者虞庠以舜夏學以禹殷學以湯東膠以文武復以左右四聖成其德業者為之先師此固天子立學之法也何不可也議上謫濓為安逺知縣助教貝瓊遂希旨建議斥濂為邪說焉五年作文廟成遣官以太牢祭遂視學釋奠七年正月定上丁遇朔日日食者改仲丁致祭十五年四月令天下通祀孔子賜學糧增師生廪膳五月乙丑幸國子監謁先師行釋菜禮十六年正月令祭酒朔望行釋菜禮郡邑長以下詣學行香二十六年頒大成樂器於天下府學令州縣學如府式始定舞用六佾樂用登歌永樂四年三月辛卯朔視太學服皮辨四拜正統九年春新建北亰太學成三月臨視行釋奠禮時吏部主事李賢言國家建都北京以來所廢弛者莫甚於太學所創新者莫多於佛寺舉措舛矣若重修太學不過一佛寺之費宜諭修舉以致養賢及民之效從之成化元年視學行釋奠禮十三年閏二月丁丑釋奠初用八佾籩豆各十二先是祭酒周洪謨請加籩豆佾舞又言古者鳴球琴瑟在堂上笙鏞柷敔在堂下干羽舞於兩階今舞羽居上而樂器居下非古制也禮部尚書鄒幹駁之詔以尊崇孔子國家盛典從洪謨之言而羽舞始居下云𢎞治元年三月視學釋奠先師用太牢加幣改分獻為分奠從吏部尚書王恕之請也嘉靖十年以釐正祀典服皮辨謁廟用特牲奠帛行釋奠禮迎神送神各再拜樂三奏文舞六佾配享從祀及啓聖祠分奠用酒脯亦遣官致祭於南監及闕里從大學士張璁議也郊祀以祖而配天功在一代者也大社稷之祭功在養民者也其籩豆佾舞皆與祀天同夫子功在萬世享配天之禮孰曰不宜如以位則六佾亦僣也茍以德則八佾非泰也張璁去王爵易木主祀叔梁皆諸儒已陳之議惟殺籩豆禮樂乃其已說耳王世貞欲復禮樂之舊且謂璁之為此也謂師之不敢與君抗也斯誅意之論矣崇禎戊辰春躬行釋奠禮辛巳八月復行釋奠禮禮部先以八月初四請已報可是日丁未適與丁祭相值舊例丁祭遣閣臣行禮乃改是月十八日躬行釋奠而初四日仍遣閣臣行禮辛巳八月十八日卯初刻駕從長安左門出自崇文街至成賢街入廟祭酒司業吉服率學官諸生於成賢街左跪迎駕至櫺星門外降輦禮部與鴻臚卿導上步入門登大成門中階入御幄坐定具皮辨冠服出太常寺官導由大成門中道入盥洗詣先師廟中陛上奏迎神樂上兩拜遂行釋奠禮太常寺卿跪進帛於上右上搢圭立授帛獻畢少卿跪進爵於上右上立授爵獻畢上出圭奏送神樂上復兩拜而禮畢上仍至御幄更翼善冠黃袍幸彞倫堂諸生列於堂下祭酒各官列於諸生之前跪候駕過起北向立上至彞倫堂百官行一拜三叩頭禮祭酒以下及諸生五拜三叩頭禮有頃內贊贊進講祭酒南居仁從東階升由東小門入至堂中北向立執事官舉經案於御前禮部官奏請授經於講官祭酒跪禮部以經立授祭酒置於講案復至中北向立一拜三叩頭上諭講官坐祭酒承㫖就講案邉坐上諭官人每坐百官承㫖武官都督以上文官三品以上及學士一拜三叩頭坐祭酒講臯陶謨講畢退出堂外司業羅大任從西階升由西小門入一如祭酒禮講易咸卦講畢傳制官稱有制宣諭云聖人之道如日中天凡四語祭酒司業學官習禮公侯伯諸生五拜三叩頭尚膳監進茶上諭官人每吃茶茶畢出百官一拜三叩頭上賜五府六部都察院及衍聖公羊酒甜食盒上入彞倫堂後敬一亭觀世宗所立程子四針諸碑又令將廟學內各碑及石鼓俱摹榻進覽十七年甲申二月春祭遣大學士魏藻德行禮是日天氣晴眀臨祭各官甫就拜位大風忽起殿上燈燭盡滅庭下松檜作怒號聲黃沙如雨下竟不能成禮而罷按元世宗以宋小黃門李邦寧為左丞相釋奠孔廟方就拜位亦有異風之變夫子在天之靈赫奕如此從祀東漢章帝元和二年祀七十二賢靈帝元光二年祀七十二弟子畫像魏主芳正始七年使太常釋奠孔子於辟雍以顔淵配唐太宗貞觀二十一年二月以左邱眀卜子夏公羊髙穀梁赤伏勝髙堂生戴聖毛萇孔安國劉向鄭衆杜子春馬融盧植鄭元服䖍何休王肅王弼杜預范寧二十一人代用其書垂於國胄自今有事於太學與顔子俱配並為先師髙宗總章元年贈顔回太子少師曽參太子少保並配享孔廟睿宗太極元年二月加贈顔子太子太師曽子太子太保元宗開元八年詔十哲為坐像悉從祀曽參坐十哲之次圖七十弟子及二十二賢於廟壁時國子司業李元瓘言凖禮授坐不立授立不跪顔子配像合從坐侍又四科弟子閔子騫等雖列像廟堂不參享祀按何休等二十二賢猶霑從祀豈升堂入室弟子獨不霑配享之餘望春秋釋奠列享於二十二賢之上又七十子之像文翁之壁尚不闕如豈有國庠遂無繪圖請命有司圖形於壁兼為之贊又曾參孝道可崇獨受經於夫子並望從祀從之上復以顔子亞聖親為贊書刻於石令當朝文士分為贊題於壁焉蘇洵曰貞觀顯慶稱二十一賢太極開元即稱二十二賢服䖍下之賈逵不知何年附入馬端臨曰聖作之者也師述之者也述夫子之道以親炙言之莫如十哲七十二賢以傳授言之莫如子思孟子必如是而後可以言先師今舍是不録而皆取於釋經之諸儒姑以二十二子言之左邱公穀猶曰受經於聖人至於高堂生以下則謂之經師可矣非人師也至王輔嗣之宗老莊賈景伯之附䜟緯已非聖人之學矣又况戴勝馬融之貪鄙今乃俱在侑食之列而高弟自顔子外反不得與焉雖李元瓘言之僅升十哲㑹子於二十二子之列而七十二賢俱不霑享祀蓋拘於康成之注以訓詁專宗為盡得聖人之傳也二十七年追贈顔子為兖公閔子為費侯伯牛鄆侯仲弓薛侯冉有徐侯子路衛侯子我齊侯子貢黎侯子遊吳侯子夏魏侯曾子等六十七人為伯後唐眀宗長興二年以顔子配坐閔損等十哲從祀堂上又准太常禮院言敇四壁圖畫英賢各陳脯醢以祭宋真宗大中祥符二年五月乙卯追封閔子以下為公曾子以下為侯命宰執兩制館閣撰贊初帝閲崇文院檢定七十二弟子案史記唐㑹要凡七十七人帝曰何故不同王旦曰國學經太祖定議今曲阜宜准國學畫像七月戊寅復封左邱眀等二十一人為伯仁宗明道元年八月詔國子監修七十二賢堂左邱明以下二十一人並以本品衣冠圖之神宗熙寧七年令諸州釋奠通祀十哲元豐元年五月封孟子鄒國公同顔子配享又封荀况揚雄韓愈為伯並從祀時晉州教授陸長愈請春秋釋奠孟子與顔子並配徽宗大觀二年詔繪子思像從祀從通仕郎侯孟之請也四年追封公夏首等十人為侯議禮局言史記弟子傳曰受業身通六藝者七十有七人家語曰七十二弟子皆升堂入室者唐㑹要則宗史記開元禮則宗家語本朝斷以七十二人取琴張等五人而去公夏首等十人今益定公夏首后處公肩定顔祖塢單罕父黑秦商原抗樂咳亷潔皆有伯爵載於祀典請追贈侯爵使預祭享從之政和三年以王安石配享封舒王子雱從祀封臨川伯時新儀成以孟春元日釋菜仲春仲秋上丁日釋奠以顔孟安石配享俱東坐西向在閔子十哲上五年春詔樂正子克配享孟廟公孫丑至子叔十七人從祀各加封爵欽宗靖康元年罷王安石配享猶從祀右諫議大夫楊時言安石學術之謬請追王爵明詔中外毁去配享之像使邪說詖行不為學者之惑詔落配享猶依鄭康成例使從祀孝宗淳熙四年去王雱畫像從趙粹中之言也理宗淳祐元年正月視太學贈周惇頤張載程皓程頤為伯與徽國公朱熹並崇祀孔子廟黜王安石景定二年贈張栻吕祖謙為伯俱從祀時皇太子謁孔廟還言栻祖謙與朱熹切偲講磨有功聖門故有是詔度宗咸淳二年以顔回曽參孔伋孟軻並配享進封為公改封閔損至卜商九人為公躋顓孫師於十哲亦封公祀泗水侯鯉位於鄆城侯忠之次贈邵雍為伯與溫國公司馬光並從祀元仁宗皇慶二年以許衡從祀文宗至順二年加顔子復聖公曽子宗聖公子思述聖公孟子亞聖公明洪武五年罷孟子祀雷震謹身殿踰年以孟子辨異端闢邪說發明孔子之道有功於天下後世宜配享如故王禕議漢儒從祀者十四人而猶闕者一人董仲舒是也唐之從祀者一人而猶闕者一人孔頴達是也宋之從祀者九人而猶闕者四人范仲淹歐陽修真德秀魏了翁是也漢諸儒宗經翼傳局於顓門惟董仲舒號稱醇儒所以告其君者如天人性命勉强遵行正誼眀道之論至其罷黜百家表章六經使道術有統異端息滅功殆不在孟子下荀况言性惡揚雄事新莽猶獲從祀而仲舒不及何也唐初孔頴達受詔撰定諸經之疏號曰正義凡不本於是者謂之異端誠學者之宗師也何休注公羊黜周王魯王弼注易専尚清虛然在祀列何獨至頴達而遺之聖人之道或著事功或著文章用雖不同實則一致三代以下能以聖人之道為己任而著之行事者范仲淹而已首以中庸授張載以為道學之倡蓋其為學本乎六經而議論無不主於仁義也世儒徒知章句以為事而孰知聖人經世之志固不専在是也歐陽修與仲淹同時明聖賢之學而著之文章世之淺者每目之以文人夫文以載道雖經天緯地者亦謂之文而顧可少之哉自朱熹作五經四書傳注集賢聖之大成中更學禁真德秀魏了翁力以尊崇朱學為已任而聖賢之學復明真氏所著有大學衍義讀書記魏則所著有九經要義皆足以續朱氏所傳之緒二人者當繼起而列於從祀者也又按聖孫孔伋故列孔鯉之下而曽參亦在曽晳後咸淳三年始升配為四侑東坐而西向父祀廡下子配堂上尊卑舛逆莫此為甚聖道在眀人倫而先自廢何以詔後世昔魯祀僖公躋之閔公之上傳者謂子雖齊聖不先父食以為逆祀今父子失序非逆祀乎夫禮有似緩而急似䡖而重者以有關於名教也祀有宜備而禮有未稱者固不得置之而不議也二十九年黜揚雄進董仲舒從祀先是待制王禕建議至是行人司副楊砥復請從之宣德十年四月以吳澄從祀時慈利教諭蔣明建議楊士竒主其事從之元之大儒許衡其學一本於程朱其仕也為行道也一有不合奉身而退化行鄉里其人純乎其為君子也吳澄學主陸氏謂朱子道問學之功多尊德性之功少豈知朱子者哉且為人諛墓起家巨萬核其實行不及魯齊逺矣從祀之舉楊文貞以香火起見也正統二年以宋儒胡安國蔡沈真德秀從祀何孟春曰七十弟子門人有公孫尼子者作樂記緇衣矣吐辭為經宜列從祀敏政乃不之及何耶八年八月以宋儒楊時從祀祭酒謝鐸言時息邪放淫廢安石新經有衛道功請祀時禮部尚書傅瀚沮之大學士溥主鐸議乃祀時嘉靖九年釐正祀典以申黨即申棖存棖去黨罷公伯寮秦冉顔何荀况戴聖劉向賈逵馬融何休王肅王弼杜預吳澄十三人林放蘧瑗鄭衆盧植鄭元服䖍范寧七人各祀于其鄉增后蒼王通歐陽修胡瑗陸九淵從祀張璁議歐陽修所著本論實有翊衛聖道之功蘇軾曰自漢以來道術不出於孔氏而亂天下者多矣五百餘年而又得韓愈學者以配孟氏蓋庶幾焉愈之後三百有餘年而得歐陽子其學推韓愈孟子以達於孔氏故天下翕然師尊之曰歐陽子韓愈既已從祀歐陽修豈可少乎張永嘉之議人以為歐陽公之濮議相合也然歐陽公濮議豈戾於正乎澤按朱子嘗稱歐陽修用力於文字之間而泝其波流以求聖賢之意則於易於詩於周禮於春秋皆嘗反覆窮究以訂先儒之謬而本論之篇推眀性善之說以為息邪距詖之本其賢於當時之號為宗工巨儒而不免於祖尚浮虛信惑妖妄者又逺甚其於史記善善惡惡如唐六臣傳之屬又能深究國家所以廢興存亡之幾而為天下後世深切著眀之永鑒者固非一端其他文說雖或出於遊戲翰墨之餘然亦隨事多所發眀而詞氣藹然寬平深厚精切的當韓公所謂仁義之人者觀朱子之所推重則歐公之論定矣陸九淵之從祀不能無議者九淵雖資性髙眀然六經皆我注腳之說非孔門博文約禮之㫖彼其疑程子詆朱子開後來心學一𣲖與伊閩諸賢同坐一堂似非所安也隆慶五年以薛瑄從祀萬歷十二年以王守仁陳獻章胡居仁從祀禮部尚書請獨祀居仁大學士申時行等內主守仁揭薦之因三人一時併祀明儒以薛文清為第一胡居仁次之陳獻章為巡撫朱永所薦授官檢討以母老辭歸當時尹直謂其作詩稱頌太監梁芳固未可輕信至歸途乘轎張蓋列槊開道張元禎載之實録至賀欽篤行君子也獻章謂其無所見勸之讀佛書此何說也章𢡟胡居仁羅欽順崔銑諸人皆深於理學者斥之為禪非過矣王守仁之學以陸九淵為宗其無善無惡心之體一語前人已力駁之至襲孟子良知之說自謂發千古之祕然聖人中正之道寧有遺行而獨言知者其門人王畿輩益肆其說遂使儒禪混雜李贄輩大為世道人心之蠧當議從祀時陸宗伯堅持不覆陶大臨曰朝廷不難以伯爵酬之何况廟祀陸宗伯曰伯爵一時之典從祀萬世之典人不能奪柄臣乃以中㫖與之此輿論之未定者也嘉靖中王守仁總督兩廣以病擅離信地事聞上大怒令廷議會議云守仁事不師古言不稱師欲立異以為髙則非朱熹格物致知之論知衆論之不與則著朱熹晚年定論之書號召門徒互相唱和才美者樂其任意或流於清談庸鄙者借其虛聲遂敢於放肆傳習轉訛悖謬日甚其門人為之標榜至謂杖之不死投之江不死以上瀆聖聰幾於無忌憚矣若夫勦捕軬賊剪除逆濠據事論功誠有可録是以當陛下御極之初即拜伯爵雖出於楊廷和豫為已地之私亦緣黃榜有封拜侯伯之令夫功過不相掩宜免奪封爵以彰國家之大信申禁邪說以正天下之人心上曰卿等議是守仁放言自肆詆毁先儒號召門徒虛聲附和用詐任情壞人心術近年士子傳習邪說皆其倡導至於逆濠之變與伍文定移檄舉兵仗義討賊元惡就擒功固可録但兵無節制奏捷誇張近日掩襲軬賊恩威倒置所封伯爵本當追奪但係先朝信令姑與終身其沒後恤典俱不准給都察院仍榜諭天下敢有踵襲邪說果於非聖者重治不饒當日申飭嚴切如此及入祀時何無一人言及以彼時良知之說盛行也崇禎十四年八月諭朕覽我聖祖命儒臣纂輯五經四書大全其中作述傳注引證等項惟宋儒周子兩程子朱子張子邵子為多可見理學大眀於宋而周程諸子大有功於聖門然與周秦漢唐諸儒並稱先儒竊為不安兹欲特加崇隆是否可行著禮部翰林院太常寺國子監禮科等衙門會同詳議來說十月部議以周程六子宜稱先賢並請漢儒董仲舒隋儒王通俱稱先賢按以六子宜加隆稱此誠眀主之特見部中議及董王則贅詞矣又從祀議及吳與弼王艮等而反不及曹端羅欽順髙攀龍馮從吾諸公則昧於聖學之正傳矣宜其事遂中閣也國家祀典二丁之祭宜與郊社宗廟並重其典制乃太學志中缺焉不備故詳稽而備録之且考歷代之所加禮隆殺當否可以知其君焉知其臣焉並可以知其世焉春明夢餘録卷二十一
