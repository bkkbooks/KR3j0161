body:
  text: 春明夢餘録卷十九吏部左侍郎孫承澤撰社稷壇社稷壇在闕之右與太廟對壇制二成四靣石階各三級上成用五色土隨方築之壇西砌瘞位四靣開櫺星門西門外西南建神庫庫南為神厨北門外為拜殿外天門四座西門外南為宰牲亭洪武元年命儒臣定諸祀典李善長等進社稷議曰周制小宗伯掌建國之神位右社稷左宗廟社稷之祀壇而不屋必受霜露風雨以接天地之氣凡起大事動大衆必先於社而後出其禮可謂重矣蓋古者天子社以祭五土之祗稷以祭五穀之神其制在中門之外外門之內尊而親之與先祖等人非土不立非穀不食以其同功均利以養人故祭社必及稷所以為天下祈福報功之道也然天子有三社為羣姓而立者曰大社其自為立者曰王社有所謂勝國之社屋之不受天陽國雖亡而存之以重神也後世天子之禮惟立大社大稷以祀之社皆配以勾龍稷皆配以周棄漢因髙祖除亡秦社稷立官大社大稷一嵗各再祀光武立大社大稷於雒陽在宗廟之右春秋二仲及臘一嵗三祀唐因隋制並建社稷為大祀仍以四時致祭宋制每嵗以春秋二仲月及臘日祭之元世祖營社稷於和義門內少南以春秋二仲月上戊日致祭今宜祀以春秋仲月上戊日皆從之上親祭大社大稷大社設正位在東配以后土西向大稷設正位在西配以后稷東向各用玉兩邸幣黑色特用犢一羊一豕一籩豆各十后土后稷位並同不用玉祭畢賜羣臣享胙於奉天門復議社稷壇創屋以備風雨學士陶安奏考諸禮天子大社必受風雨霜露以達天地之氣若亡國之社則屋之不受天陽也今於壇創屋非宜若祭而遇風雨則於齊宫望祭上是之洪武十年上以大社大稷分祭配祀皆因前代制欲更建之為一代之典遂下禮部尚書張籌詳議奏曰按通典顓頊祀共工氏子勾龍為后土后土為社烈山氏子柱為稷稷田正也髙辛唐虞夏皆因之周棄亦為稷自商以來祀之此社稷之祀所由始也商湯以旱而遷社以后稷代柱欲遷勾龍無可繼者故止然王肅謂社祭勾龍稷祭后稷皆人鬼非地祗而陳氏禮書又謂社所以祭五土之祗稷所以祭五穀之神鄭康成亦謂社為社土總神稷為原隰之神勾龍以有平水土之功故配社祀之稷以有播種之功故配稷祀之二說為不同漢元始五年以夏禹配食官社后稷配食官稷唐宋及元則又以勾龍配社周棄配稷蓋本鄭氏之說此配祀之說緣於古昔初無一定之論也至於社稷分合之義書召誥言社於新邑孔氏注曰社稷共牢又封人掌設王之社壝注云不言稷者舉社而稷從之如是則當時社與稷固已合而一之矣陳氏禮書曰稷非土無以生土非稷無以見生生之效故祭社必及稷以其同功均利以養人也而山堂考索則曰土爰稼穡其本一也是則社稷之祭合而一之於古自有眀證至於壇位則考之周制小宗伯掌建國之神位右社稷左宗廟起大事動大衆以先告於社而後出其祭在中門之外外門之內尊而親之與先祖等漢遣官祭大社大稷光武立大社大稷於雒陽在宗廟之右唐因隋制建於含光門之右大抵皆夲成周左祖右社之意社主之言周禮大司徒設其社稷之壝而樹之主各以野之所宜木名其社小宗伯立軍社鄭氏注社主用石為之蓋以石者土之所生最為堅實故也唐神龍中議立社韋叔夏引鄭元議以為社主用石韓詩外傳云天子社主長五尺方二尺剡其上以象物生方其下以象地體埋其半以象根在土中而本末均也宋初祭社稷正配位用神位版大社又以石為主其形如鐘長五尺方二尺剡其上培其下半其中植槐是則木主石主前代蓋兼用矣今擬社稷合祭共為一壇皆設木主而丹漆之祭則設於壇上祭畢收藏仍用石主埋壇之中如唐宋之制至於以勾龍配社以棄配稷棄雖唐虞農官而勾龍共工氏之子也祀之無義啇湯欲遷之而未果漢嘗易以夏禹而今以列祀帝王之次棄稷亦配享先農請罷勾龍與棄配位謹奉仁祖配享大社大稷以成一代之盛典以眀社尊而親之之道上覽奏稱善遂命定合祭之禮右奉仁祖配至建文朝撤仁祖配太祖永樂中京師壇成其位置如故洪熙元年增奉太宗並配嘉靖九年諭禮部曰祭大社大稷奉我太祖太宗配朕有疑焉夫天地至尊次則宗廟又次則社稷此次序尊殺之禮也奉祖配天則正矣又奉祖配社則失其序或謂以祖配社乃我皇祖時禮官張籌之失然與否與又議者謂后土勾龍氏乃共工之子祭之無義夫勾龍氏有平水土之功故取之配社猶以后稷配稷也當論其人况父不善而可惡及其子乎至如奉祖配社屈其所尊義實未安兹當改正宜如髙皇帝制大社以后土勾龍氏配大稷以后稷氏配雖合祭如故而使祖宗百餘年之配位一旦撤之人有遺譏焉帝社帝稷在西苑豳風亭之西嘉靖十年建其壇址髙六尺方廣二丈五尺甃以細甎實以淨土繚以土垣北為櫺星門髙六尺八寸神位以木為之各髙一尺八寸廣三寸題曰帝社之神帝稷之神俱朱漆質金書壇之南置石龕以藏神位髙六尺廣二尺壇之西為祭器庫樂器庫壇之北樹二坊以表之曰帝社街每嵗以仲春秋次戊日上躬行祈報禮如次戊日在望日則以上巳日臨期命文武大臣十二員陪拜建恆裕倉儲以供粢盛隆慶元年禮官議罷夏言西苑耕藉疏該司禮監太監鮑忠題嘉靖十年二月二十六日奉聖㫖西苑等處但有空間土地都要耕種五穀牛具種子并應用農器奏領銀錢買造使用欽此本月二十九日臣帶領本監右監丞宋興等並內官監太監溫璽等及官匠人等親詣西苑等處逐一將空間土地通行丈量過共七頃九十四畝五分畫圖貼說具奏節該奉聖㫖有㸃的都要宜時耕耘種五穀欽此有㸃的地計六頃三十七畝三分一釐內除建造帝社稷壇無逸殿豳風亭省耕亭恆裕倉省斂亭并御路稻池界境糧場及各宫各衙門直殿碾磨農夫農器房屋占用一頃二十畝一分七釐行間該戶部手本順天府宛大二縣送到應用農夫牛具種子犁耙鍬鋤等器臣就會同戶部右侍郎張雲郎中張玩及府縣委官李僉等督率農夫於本年三月十一日起將堪種土地五頃十七畝一分四釐耕治播種五穀間續奉聖㫖先蠶壇著戶部栽培小樣桑樹欽此臣又同右侍郎張雲并兩縣上林苑監委官侯璽魏夢吉等於先蠶壇西夾道栽植小樣桑樹七百八十株完備訖臣仍督率播種既畢將牛具發出又買辦騾一十六頭西苑専力耕種責令老人孫泰等管領農夫孫得玉等將水旱田禾自春徂夏及秋沿假履畝耘耨澆灌三時既畢禾稼告成刈穫登場揚簸堅實除獻新進用留種並秸奏賜各衙門不開外謹將見在收過各色糧八百五十八石八斗二升七合於本年八月二十五日眼同右侍郎張雲郎中張玩等逐一盤量明白運輸恆裕倉管事奉御郭真等看守訖臣竊惟農桑王業之本小民之依古先哲王之所慎重者也但載諸典籍未有見諸行事今聖上定耕藉之儀立先蠶之制身先天下風動四方實千古而一見者也如蒙乞賜該部著為令典使嵗有常規以供郊廟粢盛之用以昭聖上敬天勤民之意以立萬世永逺之規臣下情不勝忭躍快覩之至等因隨該戶部右侍郎張雲題同前事俱奉聖㫖是君后耕蠶以供郊廟粢盛衣服除親蠶已定有儀注了今將西苑隙地命內外官員耕種五榖已經收穫藏貯恆裕倉內著禮部查照著在令甲每嵗定擬户部官二員管領耕種各郊廟合用粢盛擬數目支給其田地頃畝農夫耕具册籍喂飬等項一應事宜都立為一定規制以垂永逺庶稱朕敬天事神之意便開具來看欽此行據藉田祠祭署呈報常年郊廟合用粢盛等項數目前來臣等竊惟古者天子躬耕以供粢盛是以有千畝之藉恭惟皇上敬天勤民憲則古典耕藉之禮每歲舉行猶以郊坰遼逺不得時時觀省又於西苑之中以為農桑之所雖於農務有內外之分而恪共神祀之心則一也兹者農事告成御廩充實乃命有司定擬支給之常以供郊廟粢盛臣等查得舊規郊廟百神之祀所用粢盛以及葱韭芹菜醬醋之類悉取給於神倉乃今西苑之穫固足以供一歲祭祀之用但藉田之舉皇上躬執三推而公卿共宣其力較之西苑為重西苑之事雖屬農官督理而皇上時省耕斂較之藉田特勤所據二倉之儲委當分屬兼支以供郊廟祭祀合無每嵗將藉田之所出者藏之南郊圓廩方倉以供圜丘祈穀先農神祗壇歷代帝王長陵等陵以及百神之祀西苑之所出者藏之恆裕倉以供方澤朝日夕月大社稷帝社稷太廟世廟祫祭禘祭先蠶先師孔子之祀庶稱皇上敬天禮神勤重致誠之意而內外倉廩之儲皆得以供明薦事體便而禮意周矣謹將查過每年該用粢盛等項數目開具揭帖隨本進呈乞惟聖明裁定嘉靖十年十一月日奉聖㫖是郊廟粢盛支給數目都依擬行其田畝農夫等項册籍立為定規的還會同戶部擬議來說古有蠟祭合百神而祭之以報嵗也唐制先有事必質於戶部戶部具詞曰旱於某水於某蟲蝗於某癘疫於某則黜其方社之神不及以祭此即郊特牲所云順成之方其蠟乃通之義也先蠶壇先蠶壇嘉靖中始建在安定門外後改於西苑壇石乞甎砌方廣二丈六尺髙二尺四寸四出陛嘉靖九年正月舉耕蠶禮先給事中夏言清理皇莊事竣請將負郭宫莊削去皇莊之名改為親蠶厰公桑園種植桑柘以備宫中蠶事下禮官考禮經斟酌皇后親蠶儀以進戶部覆議不可而止及上有事於南郊言奉命分獻南海壇因上疏請舉親蠶之禮言按祭統天子親耕於南郊以供粢盛皇后親蠶於北郊以供純服夫以天子之尊非莫為之耕也而必躬耕以供郊廟之粢盛后妃之貴非莫為之蠶也而必躬蠶以為祭祀之服飾所以然者一以致其誠信可以交於神眀一以勸天下之農夫蠶婦非身帥先之弗可也先儒張栻曰周家建國自后稷以農事為務歷世相傳其君子則務稼穡之事其室家則躬織絍之勤如周公之告成王其見於詩有若七月皆言農桑之候也其見於書有曰無逸欲其知稼穡之艱難知小人之依也帝王相傳心法之要端在於此臣繇是考之於漢則皇后蠶於東郊後漢皇后帥公卿列侯夫人蠶歷魏晉宋北齊後周以及於隋亦復依據周典未之或廢唐立先蠶壇在長安北苑中太宗貞觀九年三月文德皇后帥內外命婦有事於先蠶歷髙宗永徽顯慶以還皆間嵗皇后親祠先蠶宋真宗景德三年詔禮先蠶神宗元豐四年又詳定享先蠶之儀宣和元年皇后親蠶於延福宫髙宗紹興七年猶復舉行至十五年太常丞王湛言請按政和禮建親蠶殿蠶室繭館請皇后就禁中行親蠶之禮朝㫖送禮部下太常寺討論尋不果行則是親蠶之禮殆廢於此矣恭惟我太祖髙皇帝開天建極統一萬國制禮作樂卓越百王躬耕藉田既稽古攸行矣顧獨於親蠶闕焉當時議禮儒臣亦竟未有及之者豈非本朝之缺典歟列聖相承繼文繇舊謙讓未遑禮官廷臣蔑聞建白是固有待於陛下也夫農桑之業衣食萬人不宜獨缺耕蠶之禮垂法萬世不宜偏廢先儒謂禮樂必百年可興又曰必聖人在天子之位此臣惓惓之愚所以不能已於今日發也伏望陛下留神垂覽倘蒙采納乞敕禮戶工三部會集共議以聞然後謀之儒臣參酌考訂慨然施行則天下萬世永有瞻仰皇天后土永錫祚𦙍陛下敬天勤民之心上可以慰皇祖列聖之靈下可以垂聖子神孫無疆之休矣疏入上方以大禮恚廷臣將大有更易得之甚悅命戶部建置尚書梁材言宜建于皇城南內或西內堪供𧖟事且便出入上曰周禮耕蠶分南北郊其蠶於禁中唐人便安之制耳不可為法時上意方鋭深疑世儒因襲舊聞固執已見不達古先帝王典制且戶部原非其職不必問沉吟者纍日惟有㑹議一䇿可以歸一而深仗大學士張璁為主禮部尚書李時亦决不敢異同乃以言疏示璁遂敕禮部曰耕桑王者重事古者天子親耕皇后親蠶以勸天下朕每稱慕自今嵗始朕躬祀先農行禮其親蠶禮儀㑹官考求古制以聞璁等請於安定門外擇壇其制一凖先農少減其數皇后三採桑三公夫人五列侯九卿夫人九詹事霍韜言親蠶事有名無實皇后出郊難以越宿乞擇近地便上曰此禮萬世不可易之典卿素諳禮制何有此言又諭禮部曰疑謀勿成其事在朕心决之久矣得言奏意合並無毫末之疑恐韜奏一出必藉彼為言破害政事夫言之奏有云農桑之事衣食萬人不宜獨缺耕蠶之禮垂法萬世不宜偏廢此言已盡朕所納者以此今之非朕者有五中謂制禮作樂出自開創之君太祖神謀聖慮自有定見何待汝為亦非汝之所當行斯非作聰明而何蓋上亦自知之自言之矣於是李時等請行於北郊條四事以上酌治蠶之禮定壇壝之向制採桑之器擇掌壇之官翟車出入或從東華門或從元武門用謹厚內臣周肅宫禁從之命翟車出入由元武門其壇制殺先農什一建具服殿蠶室繭館俱如古制既出採桑仍西內營織室以終蠶事時又言親蠶之禮出於創見一時命婦倉卒入壇恐致愆度請以所繪採桑圖授之俾各如式演習仍請定名採桑之所因名其所為採桑壇十年召張孚敬李時詣西苑相地建土穀壇并建先蠶壇於仁夀宫側毁北郊蠶壇其禮以嵗仲春擇日皇后祭用少牢禮三獻樂六奏去舞公主內外命婦陪祀先期內尚儀奏祭祀皇后內執事皆致齊蠶宫令陳祭物樂女生陳樂器至日皇后乘肩輿出宫至西華門升重翟車女官奉鈎筐前行至郊壇皇后易禮服拜跪瘞奠飲福受胙如禮畢皇后易常服遂視桑蠶為龍之精按馬質云禁原蠶注天文辰為馬蠶書曰蠶為龍精月值大火則浴其種是蠶與馬同氣李林甫月令釋曰先蠶天駟也先蠶之神或以為苑窳婦人寓氏公主或以為黃帝或以為西陵氏或以為天駟歷論不一然蠶其首馬首其性喜溫惡濕其浴火月而再養則傷焉此固與馬同出於天駟矣然天駟可為蠶祖而非先蠶者也蠶婦人之事史記黃帝娶西陵氏始蠶漢祀苑窳婦人寓氏公主此或有所傳然其祭設壇或少牢或太牢或一獻或三獻禮必皇后親享北齊使公卿祀之非也髙禖臺髙禖臺眀初無此祀世宗嘉靖中始設木臺於皇城東永安門北震方壇上皇天上帝南向騂犢蒼璧奉獻皇帝配牛一羊一豕一髙禖在壇下西向牛一羊一豕一禮三獻樂九奏陳八佾皇帝位壇下北向后妃位壇南數十丈外北向用帷壇下陳弓矢弧韣如后妃嬪之數祭畢女官導后妃嬪至髙禖前跪取弓矢授后妃嬪后妃嬪受而納於弧韣張璁疏頃者生員李時揚監生張岑各疏請舉祀郊禖之禮以祈聖嗣夫古后稷之生祈於禖孔子之生亦禱於尼山乞禱之說古禮有之然大雅既醉之詩曰公尸嘉告曰君子萬年永錫祚𦙍曰釐爾女士從以孫子夫公尸之告皆祖考之錫福也皇上仁孝誠敬天地神明日鑒在兹况祖考之親者乎臣願當兹慎選淑女之時以廣求嗣續之誠告於太廟世廟以祈祖考之祐以慰聖母之心上嘉其請擇十二月二十四日行禮夏言充祈嗣醮壇監禮使金章宗明昌六年以上未有子尚書省臣奏行髙禖之祀乃築壇於景風門外以春分日祀青帝伏羲氏女媧氏及姜嫄簡狄其齊戒奠玉帛進熟皆如大祀儀官備弓矢弧韣以進上命后妃嬪御皆執弓失東南而射命以次飲福受胙及得子遣官報謝髙禖西海神祠西海神祠在西苑嘉靖十四年八月建夏言疏臣言於本月二十日伏蒙召見無逸殿欽奉聖諭兹西海子每嵗端午奉兩宫逰賞止是望祭以祀其神今宜特建祠宇庶有所瞻依欽此臣切惟禁內西海子者即古燕京積水潭也其源出西山神山一畝馬眼諸泉繞出甕山後滙為七里濼東入都城瀦為積水潭南入玉河入於大通前人謂積水為海且在西內故至今沿稱西海都城之水悉於此滙玉河城壕大通漕河皆食其利比之五祀之神其功較大但一向未立祠宇以便舉祀是亦缺典今特建祠宇足以棲神且便於行禮皇上事神之義可謂周矣但祠必有名舊日西海之名恐嫌於四海正號未協専稱今祠宇既建所有神位祠額伏乞皇上特賜嘉名以答神貺庶稱祀典今將相度過北門口湧泉亭後隙地一區堪以定建其規制丈尺謹畫圖貼說二本隨本進呈伏乞聖裁候命下之日行移內外各該衙門遵奉施行春明夢餘録卷十九
