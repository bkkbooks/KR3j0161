body:
  text: 春眀夢餘録卷六十一吏部左侍郎孫承澤撰行人司行人司在西長安街朝房之西設司正一人司副二人行人二十六人職専使命凡頒行詔敕册封宗藩撫諭番人徴聘才賢及賞賜慰問賑濟軍旅祭祀敘差焉凡法司謫戍囚徒送五府者填精微繳內府張寧題差疏竊惟太祖髙皇帝設官㝎職各有攸司其在亰各衙門郎中主事等官俱有官守不宜一時曠廢所以特設行人以通使命往來自洪武二十七年以前止以承差任使後欲其通達國體不辱君命始専以進士除授任用之意蓋亦重矣爰自定制以來一應合差事件俱屬行人間有别項官員無非一時特旨或因行人不敷故也豈期因襲既久遂以為常今各衙門官員一切指此要求請託苞苴公行有因親舊在任而假途營求者有因離家日久而枉道回還者有因懶於坐理而託此遊逸者有因有所規避而假此疏釋者求之者不巳主之者不辭易於取覔者皆歸之請託難於辦給者必委之行人致使為是官者羣坐無為一籌莫展仍乞再行查考舊制及近今事例遇有事務先儘行人方許差遣别項官員其奉特旨者仍前不拘此例如有請託等項事發一體治罪庶使祖制不違而職有定守官難作弊而人不茍求矣洪武十四年諭凡為使臣受命而出四方之所瞻視不可不謹孔子曰行已有恥使於四方不辱君命可謂士矣爾等當服膺是言若縱情肆欲假使命而作威福虐害下人為朝廷之辱矣自今或捧制書或奉命出使或催督庶務所在官吏淑慝軍民休戚一一咨訪還日以聞庶不負爾職春眀夢餘録卷六十一
