body:
  text: 春明夢餘録卷十二吏部左侍郎孫承澤撰文淵閣文淵閣係中祕藏書之所明初伐燕詔大將軍收祕書監圖書典籍太常法服祭器儀衛及天文儀象地里戶口版籍既定燕詔求遺書散民間者永樂辛丑命修撰陳循將南內文淵閣書各取一部至京計取書一百匱載以十艘又遣官四出購買故閣中所積書計二萬餘部近百萬卷刻本十三抄本十七蓄積之富前古所未有也嘉靖中閣災書移通集庫及皇史宬洪容齊云梁元帝在江陵蓄古今圖書十四萬卷將亡之夕盡焚之隋嘉則殿有書三十七萬卷唐平王世充得其舊書於東都浮舟泝河盡覆於砥柱貞觀開元募借繕寫兩都各聚書四部祿山之亂尺簡不存代宗文宗時復行搜採分藏於十二庫黃巢之亂存者蓋鮮昭宗又於諸道采訪及徙雒陽蕩然無遺宣和殿太清樓龍圖閣所儲靖康蕩析之餘盡歸於燕觀此則知燕之書蓋合宋金元三朝所蓄而為一代之書計數百萬卷縹緗之富逺勝前代也周禮太史掌建邦之六典又有外史掌四方之志三皇五帝之書漢氏圖籍所在有石渠石室延閣廣內貯之於外府又有御史居殿中掌蘭臺祕書及麒麟天祿二閣藏之於內禁後漢圖書在東觀桓帝延熹二年始置祕書監一人掌典圖書考合同異唐制祕書省掌經籍圖書之事祕書郎掌四部圖籍較書郎掌較讐典籍刋正文章宋有祕書監掌古今經籍圖書國史實録天文歷數之事官有少監監丞屬有著作郎祕書郎較書正字各以其職隸於長二明初設祕書監秩正六品先除監丞一員直長二員使掌祕書後改典籍及文淵閣中書移之他所而典籍乃為內閣辦事官失立官之意矣𢎞治五年閣學士邱濬請於文淵閣近地别建重樓不用木植但用磚石將纍朝實録御製玉牒及干係國家大事文書盛以銅匱􅍥於樓之上層如詔冊制誥行禮儀注前朝遺文舊事與凡內府衙門所藏文書可備異日纂修全史之用者盛以鐵匱􅍥之下層每嵗曝書先期奏請委翰林院堂上官一員曬晾事畢封識內外衙門因事欲有稽考者必須請㫖不許擅開㫖允行正德間閣學士楊廷和請令中書胡熙典籍劉偉與主事李繼先查校書籍由是盜出甚多永樂初問文淵閣書皆備否解縉對經史粗備惟子集尚缺上曰士人起家皆欲積書况朝廷可闕乎遂召禮書鄭錫令擇通知典籍者四出購求且曰書籍不可較價值惟其所欲與之又曰置書不難須常覽有益洪武二年八月詔儒臣修纂禮書其書以吉凶軍賔嘉冠服車輅儀仗鹵簿字學樂為綱所該之目吉禮十四曰祀天曰祭地曰宗廟曰社稷曰朝日曰夕月曰先農曰太嵗風雲雷雨師曰嶽鎮海瀆天下山川城隍曰旗纛曰馬祖先牧馬社馬步曰祭厲曰祀典神祗曰三皇孔子嘉禮五曰朝會曰冊拜曰冠禮曰婚禮曰鄉飲酒賔禮二曰朝貢曰遣使軍禮三曰親征曰遣將曰大射凶禮二曰吊賻曰喪儀又冠服車輅儀仗鹵簿字學各一樂三曰鍾律曰雅樂曰俗樂凡升降儀節制度名數纎悉備具通五十卷賜名大明集禮洪武二十六年上以諸司職有崇卑政有大小無方冊著成法恐後之涖官者罔知職任政事施設之詳命吏部同翰林官倣六典之制自府部以下諸司凡其設官分職之類彚編為書名曰諸司職掌行之洪武二十八年修寰宇通志其書方隅之目有八東距遼東都司又自遼東東北至三萬衛西極四川松潘衛又西南距雲南金齒南距廣東崖州又東南至福建漳州府北暨北平大寧衛又西北至陜西甘肅為驛九百四十浙江福建江西廣東之道各一河南陜西山東山西北平湖廣廣西雲南之道各二四川之道三為驛七百六十六凡天下道里縱一萬九百里橫一萬一千七百五十里四陲之驛不與焉永樂中命解縉纂集類書為文獻大成嫌其未備乃命姚廣孝重修正總裁三人副總裁二十五人纂修三百四十七人催纂五人編寫三百三十二人看詳五十七人謄寫一千三百八十一人續送教授十人辦事官吏二十人凡二千一百八十人永樂五年十一月告成凡二萬二千二百一十一卷裝成一千九十五本各以韻為類賜名永樂大典貯文淵閣副本貯皇史宬永樂中命儒臣集宋儒五經四書傳注纂修之其諸儒論說於傳注互發足其所未備者分注其下不合者不取周官儀禮不課士置科不列書成賜名四書五經大全書諸儒語録足羽翼聖經者彚為一編賜名性理大全書成化十年命編纂宋元綱目以閣臣彭時等為總裁官以宫坊翰林劉珝邱濬程敏政劉健楊守陳尹直彭華謝一䕫等為纂修官分八館未五年而書成𢎞治五年命內閣諸臣倣唐宋會要及元人經世大典大元通例編成一書賜名大明會典其書以諸司職掌為綱以度數名物儀文等級為目附以歷年事例使官各領其屬而事皆歸於職用備一代定制以便稽考嘉靖二十八年修之萬歷十五年再修之一代之大經大法備焉其餘諸書不具載陸文裕深曰宋太宗平列國所得祼將之士最多無地以處之於是設六館修三大部書命宋白等總之三大部者冊府元龜太平御覽文苑英華也御覽外又修廣記五百卷永樂靖難後修永樂大典亦此意余按宋太宗詔諸儒編集故事一千卷曰太平總類文章一千卷曰文苑英華小說五百卷曰太平廣記醫方一千卷曰神藥普救總賜名曰太平御覽若冊府元龜一千卷乃真宗編集也文裕所考或未確乎至靖難之舉不平之氣遍於海宇文皇借文墨以銷壘塊此實係當日本意也附記內府刋刻書目五倫書十二本一千七百一葉周易大全十二本一千一百十八葉書傳大全十本七百六十三葉詩傳大全十二本九百七葉春秋大全十八本一千四百五十九葉禮記大全十八本一千二百五十九葉書傳六本五百八十三葉易傳六本五百八十二葉詩傳六本三百三十五葉春秋四本四百四十葉禮記八本一千六十一葉四書大全二十本一千五百九十九葉四書集注十八本八百二十葉性理大全三十本二千二百六十九葉資治通鑑綱目四十本四千一百葉續資治通鑑綱目十四本一千一百二十二葉少微通鑑節要二十本一千四百三十八葉資治通鑑節要續編二十本一千六百八十三葉晏宏資治通鑑綱目三十本四千二十葉文獻通考一百本一萬八百三十六葉歷代名臣奏議一百五十本九千七百二十葉歷代通鑑纂要六十本三千七百三十二葉大明會典一百四十本六千五百九十葉事文類聚一百三十本八千三百六十葉大明一統志四十本三千一百五十葉明倫大典二十四本七百二十葉大明集禮三十六本二千四百七十六葉大學衍義補四十本三千六百葉對類十二本八百七十三葉諸司職掌三本四百二十八葉大明官制二本三百十葉大明律二本二百七葉御製大誥四本二百五十三葉御製文集八本七百十三葉御製詩集二本八十四葉洪武正韻五本五百葉經史海篇直音五本五百十二葉韻府羣玉十本一千四十葉玉篇二本三百十五葉廣韻二本二百二十五葉詩韻釋義二本一百五十八葉經書音釋二本一百七葉詩學大成十四本一千葉四書白文六本三百十二葉許氏說文八本六百五十葉爾雅埤雅四本三百九十七葉孔子家語三本一百四十四葉吕真人文集二本二百四十葉列女傳三本一百二十五葉通書大全八本九百九十葉大明仁孝皇后勸善書十本八百七十六葉神課金口訣二本二百四十葉選擇歷書二本二百五十六葉臞仙肘後神樞二本一百七十八葉三國志通俗演義二十四本二千一百五十葉雍熙樂府二十本一千七百五十三葉貞觀政要六本三百七十葉歷代臣鑑十本五百六十葉聖學心法四本三百十五葉居家必用十本八百八十葉飲膳正要三本一百七十五葉釋文三注千字文一本七十一葉蒙求一本一百四十五葉胡曾詩一本九十九葉唐賢三體詩二本一百七十二葉古文精粹二本二百五十六葉李白詩四本三百六葉高皇后傳一本四十七葉女訓一本四十九葉內訓一本五十葉以上三種共一帙曰傳訓同函尚書孝經大學中庸五本三百三十六葉選詩補注三本三百十二葉唐詩鼓吹五本二百六十六葉周易占法二本二百四十葉草堂詩餘二本一百九十葉獻皇帝恩紀含春堂詩餘二本二百四十葉小四書三本二百四十葉明心寶鑑二本一百十五葉擊壤集四本三百五十葉勸忍百針四本三百葉古文真寶四本三百九十一葉醫要集六本二百八十葉草韻辨體六本二百七十葉增定舌人譯語十一本一千七百八葉評史心見六本三百五十葉通鑑博論三本二百九十葉證類本草十本一千三百四十五葉皇明祖訓一本五十葉祖訓條章一本十二葉皇明典禮一本九十五葉洪武禮制一本八十二葉御製洪範篇序一本三十葉稽古定制一本十九葉慈聖宣文皇太后女鑒一本六十九葉鄭氏女孝經一本四十二葉又女訓內訓同前曹大家女誡一本十六葉內則詩一本六十二葉內令一本十二葉昭鑒録一本五十二葉勤政要典一本七十三葉外戚事鑒一本六十八葉山居四要一本八十三葉省躬録一本七十二葉祥異賦一本四十九葉步天歌一本八葉傳心妙訣一本四十五葉詳明算法一本一百十葉草字碎金一本九十二葉真字碎金一本九十二葉千家姓一本五十九葉孝順事實一本二百九十二葉為善隂隲一本二百七十二葉小學書解一本一百六葉忠經一本四十二葉孝經大義一本四十三葉歷代紀年一本三十六葉四時歌曲一本十一葉隨機應化録一本六十葉高皇帝道德經解一本六十九葉逹建字孝經一本四十二葉醫按經一本三十二葉蒙求白文一本二十九葉山歌一本四葉舌人譯語一本八十八葉古字便覽一本五十二葉八行遺事集一本二十八葉警世編一本三十葉忠經直解一本十六葉太上感應靈篇一本九十二葉憲綱一本五十葉百家姓一本十葉千字文一本十七葉孝經一本十六葉大學一本三十六葉中庸一本五十六葉千家詩一本四十四葉神童詩一本十二葉四書雜字一本十二葉七言雜字一本十三葉三字經一本二十六葉啓蒙集一本四十葉啓蒙書法即永字八法一本二十一葉草訣百韻一本十四葉草訣百韻歌三本四十葉八行圖說一本四十一葉孝經直解一本三十三葉周公解夢書大全二本七十葉四書直解二十六本一千八百四十葉書經直解十三本八百二十葉通鑑直解二十五本一千四百二葉帝鑑圖說六本三百五十六葉洪武正韻玉鍵二本一百三十葉其餘釋道書不載春明夢餘録卷十二
