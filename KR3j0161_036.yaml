body:
  text: 春明夢餘録卷三十六吏部左侍郎孫承澤撰戶部二屯田萬歷䇿衡曰養軍而不困民法莫善於屯田國家原額屯田八十九萬二千七百八十九頃餘今所存六十二萬七千一百九十七頃餘然增損不一在南京衛所南北直𨽻浙江湖廣福建山西河南廣東廣西山西萬全陜西雲南遼東則有加於昔昔為額二十一萬一千九百四十四今為額五十九萬三千九百五十五共增三十八萬二千一十一唯在京衛所江西四川貴州則損失舊額舊為六十八萬八百四十五今為六萬三千二百四十二共失去六十一萬七千六百零三頃內四川失六十一萬七百四十一其最多者矣昔之養軍自京衛而外共一百七十一萬四千二百八十二今之養軍為一百二十九萬九千一百九十四昔之屯糧不可考今之屯糧為四百三十三萬五千三百七十五石為銀九萬三千六百一十兩除京衛外尚有糧四百十五萬五千七百四十八石為銀六萬一千五百五十三兩京衛之軍向亡其籍考之先臣奏議大約為四十餘萬南衛之軍亦不可考大約遷鼎以後為額一十二萬而京衛屯田舊額不過六千三百三十八頃南衛屯田舊額不過九千三百六十八頃即如舊制每分五十畝收正餘糧二十四石則京衛亦不過三十萬四千二百二十四石必不能供四十餘萬之衆即南衛之四十四萬九千六百六十四石亦不足供十二萬之衆其取給於饋運也明矣若夫外衛則不然雖曰為分不等或百畝或七八十畝然以南衛之法準之每分為一由每由田實量嘗有七八十畝至寡者亦為六十五畝則所寬即寬於分之內而非分有差等也故會典三十五年始定科額每分正糧十二石餘糧十二石科額定則糧可準矣屯之衆雖曰三七四六二八不等而大約為三七是以三人耕供七人之食也耕者授粟多故得十二石守者授粟寡分得五石一斗四升然此數似不足以養且嘗總計之外衛昔田八十七萬七千八十三頃應得一百七十五萬四千一百六十六人耕也盡驅其軍為屯軍亦不可遍況三七乎蓋以四川之屯田為六十五萬九千五百四十五頃而軍額不過一萬四千八百二十二必不能人耕四十五頃之地今惡其害已而去其籍法不可考姑置此全蜀則昔額止二十一萬七千五百三十八頃度其糧尚有一千四十四萬二千八百十四石除正糧外尚有五百二十二萬一千四百十二石軍除三分屯種外尚當有一百二十萬人亦非每人四石三斗餘之所能供也然國初之時不聞有轉運之粟以養軍則所以待軍之法通縮之故俱可想也今折米之銀大約每石三錢則今之額減昔之額度不過九十萬今之軍視昔一百二十萬之額加不過將十萬昔何以不加派而自足今何以西北嵗益年例四百萬東南嵗有募兵之餉派民徴商借鹽種種措辦而不給竊嘗思之非法之弊而行法者之弊也屯法之壞一壞於餘糧之免半洪熙行寬大之政命免餘糧六石是捐其半也是時大臣違道干譽不能為經逺之計夫舉天下之軍藉食於屯一旦失其半何以足軍國之需再壞於正糧之免盤宣德十年始下此令正統二年率土行之不知正糧納官以時給之可以免貧軍之花費可以平四時之市價可以操豫奪之大柄今免其交盤則正糧為應得之物屯産亦遂為固有之私典賣迭出頑鈍叢生不可收拾端在於此屯糧日虧徴發日甚不取之此必取之彼易欺者民則倍徴而不以為苛難制者軍遂棄置而不敢問非法之平也況取者已竭亦將為不可誰何之人兼軍受其貧而豪右獨享其利乎歷朝以來皆知修屯法之善卒未有能舉之者徒以疆界難清豪強難抑徴催難整耳愚以清疆界莫如嚴丈量丈量則寸壤不可隱故相以丈量犯江南巨室之怒然國受其利此左驗也抑豪強莫如撫貧弱奪不應得者與應得之人則衆心得而禍不煽矣整催徴莫如調屯官今各督其衛恃為固有必一以軍政之法分調賢能等其繁簡一有不稱置之重典則人人凛凛不敢刁恣矣然後復正餘糧二十四石之額復上倉交盤之制即以今田等之量其入可得粟三千一十萬五千四百五十六石除正糧以食其十之三尚可得餘糧一千五百五萬二千七百二十八石今京軍額不過十二萬南京軍額不滿四萬盡補天下失伍之額不過一百四十六萬除屯軍外不過九十八萬餘用其粟大半足以養矣截長補短盡取給於此更不煩轉輸之勞而嵗有兩嵗之支茍足九年之蓄則繕險治器皆可取給更以其餘設預備之倉補飢荒之缺軍有餘食民無暴取野無棄土國有積儲雖井田復興內政復作不能過也但經理之時向拋荒者未免有牛種開濬之費在邊外者未免有築堡防禦之勞然築堡即所以修邊開濬乃所以永利牛種之費止在一時茍兼行錢法取之裕如不足煩當寧之慮也若夫齊魯宋衛秦晉燕趙之墟古之膏腴今為瘠鄉民惰土荒以至於此因而開濬教導使如江南無三尺之惰農無尺寸之棄地不過五年可使富足此愚所囁嚅而未敢深言者也總理屯務僉都御史方孔照疏竊惟京師者天下之本也畿甸富強可以抗天下而制其勝今日者非貧寡之患而均安之難也故術貴變通機惟知恤生節兩端豈容緩計阜財詰戎宜先自京師始請以兵論則諸葛亮減兵省將之意為可師也兵未遽減當練土著將未遽省當寄有司今畿甸之民差徭太繁鉗羅又密渙散仳離實不忍言以職所聞每畝約納糧一百七八十文雜差多至三四百文思避無門惟有投獻而小民之當戶差重疊而無告矣即聖恩蠲緩而催徴自如邦本若斯何能泄泄宜嚴敕京兆尹順真撫按道府細察民隱盡除一切雜差之最苦者力蘇重困大家巨室當兹患難一體均勞屏絶投獻詭寄之風賦役無私自然樂業然後并免本戶丁徭聽其每甲訓練鄉勇一名大縣可得六七百人小縣可得三四百人此皆戶籍可稽不同浮募妙選州縣正官亷惠勇幹者以當將帥之任每府則修舉衛政為府標臨屬縣以聨絡之文不妨兼武銜外不妨豫京銜小縣如殘不妨併入中縣本縣若徑不妨併應鄰縣此所以為固守者大端備矣京營衛屯十有二萬內堪戰者十之二三耳餘為城兵隨操無益稍為調劑可積餘糧當事既已得人免操各稍通其憊衛所軍人既充選鋒軍改為兵軍田自在更簡舍餘原備三十六萬之數有充軍民二差者免其民差可增丁壯每三十丁抽一其餘助丁銀作糧大約三營與餘丁共練戰兵三萬所向便能克捷若屯政既裕徑旅漸增此強國所自始也請以食論則周官遇荒弛禁和糴之意為可師也聖詔久頒保民興屯二書而效尚未彰者有其時而無其地有其地而無其人地請自皇上躬耕藉田之典擴而充之凡上林草場諸禁地西北山諸禁水似可先之勞之利自三倍其間腴土佳泉不下數千頃宜敕該管衙門募屯開種三春一麥便見充盈如難其人則營衛之備兵與罪人之贖作皆可招應而來皇上慨然為輦下先矣近臣親臣勇於倡義者但能備本别墾荒蕪信行賞格所墾之利仍歸各姓行之蕃庶榖粟自饒矣秋間御前四十萬為和糴本誠為至計更宜設法招商寬其𣙜課而後各邊會通有無不窘蓋漕已半耗後運虞阻勢如草昧創起艱難若復似承平之規逺望轉輸恐不能如願也推行畿內其效逐年而見此富國所自始也今光景已逼振舉在人伏望敕諭宮府內外一體同心各衙門冗員冗食為公撙節凡一切損傷民心破碎民財者盡與釐剔使百姓忘勞而忘死民心既得兵政自嚴冒破自清親上自切次第施為不外于均安和而已矣附後唐同光三年閏十二月吏部尚書李琪上疏曰臣聞古人有言榖者人之司命地者榖之所生人者君之所理有其榖則國力備定其地則人食足察其人則徭役均知此三者為國之急務也軒黃以前不可詳紀自堯堙洪水禹作司空于是定九等之田收什一之稅其時戶口一千三百餘萬定墾田約九百二十萬頃為太平之盛及殷革夏命重立田制每私田十畝種公田一畝水旱同之亦什一之義也洎周室立井田之法大約百里之國提封萬井出車千乘戎馬四千匹畿內兵車萬乘馬四萬匹以田法論之亦什一之制也故當成康之世比堯舜之朝戶口更增二千餘萬非他術也蓋三代之前皆量入以為出計農以為軍雖逄水旱之災而有凶荒之備降及秦漢重稅工商急關市之征倍舟車之算人口既以減耗古制猶復兼行按此時戶口尚有二千一百餘萬墾田亦一千八百萬餘頃至乎三國並興兩晉之後則農夫少于軍衆戰馬多于耕牛供軍須奪農糧秣馬必侵牛草于是天下戶口止有二百四十餘萬洎隋文之代而與漢比崇及煬帝末年又三分去二唐太宗文皇帝以四方初定百姓未豐延訪羣臣各陳所見唯魏徴獨勸文皇帝力行王道由是輕徭薄賦不奪農時進賢良悅忠直天下粟斗直兩錢自貞觀至于開元將及九百萬戶五千三百萬口墾田一千四百餘萬頃比之近古又多增加所云堯時戶口田土之數不知何所據録之備考畿輔屯丁萬歷中給事中郝敬疏臣檢閲章奏濟陽衛舍餘李大用等一本奏為不費官錢情願效力以報恩養事大略稱畿輔附近濟陽等衛屯牧額兵共四十八萬願以萬人隨行征倭衆軍自貼糧餉情辭踴躍臣心疑之夫以征戍逺役不召而自赴又不費官餉褁糧從役必非人情乃徑瀆天聽豈好事欺罔若此旋訪其故粵自永樂年間我成祖文皇帝靖難功成剩精兵四十八萬內將一十二萬選入十二團營餘三十六萬給賜屯田牧地種納子粒馬價分置七十八衛於順天府所屬各州縣地方安插俱屬三千營統轄聽調征勦今二百餘年生齒繁衍遊手坐食與民混雜有司派以馬戶撑船運米等役衆軍以馬戶運米應屬民差脫卸無計昨者寧夏之役各餘丁議自備糧隨行征勦求免前差未幾寧夏平議遂寢二十五年倭奴告警李大用等重復申奏蓋彼以三十六萬之衆止出萬人是三十六人中抽一丁耳以三十六萬衆共餉萬人是三十六家共贍一軍耳又得概免民差圖此便利汲汲上請據臣所聞大略如此此情若果何憚而不從今東方師老矣可勿復用此惟是遼左空虛枝梧無䇿合無因羣情為轉移之計令該部會同新撫臣李植呼大用等面詰前情果無别項違礙即于各衛原籍中務要每十名抽一名據三十六萬原數除六萬作耗外尚可得壯丁三萬人擇令亷幹將領官數員統領前赴遼東住扎開種屯田于存留三十萬中每十名幫貼屯兵一名牛種廬舍之費行令所在有司一概免其前項馬戶撑船民差開墾田成即給本兵為永業自耕自餉彼無征倭險逺之苦又受田管業愈欣然樂從之恐後矣大率每兵一名納墾田二十五畝內除五畝為官田每畝量收子粒五六升則此三萬人可墾田七十五萬畝一嵗收官田子粒可八千餘石以備緩急之需至于畫地經野之法悉聽該巡撫司道官布置考其成功臣嘗見經略標下有王宗聖者條陳沿邊井田圖式又有陳伯懌者言遼東墾田之利皆鑿鑿可行語云狂夫之言聖人擇焉若其可用便當依倣為之不可以人廢言也但各衛兵籍廢壞已久清核須嚴及有餘丁規避民差依投勢豪者清查檢舉此一亷幹兵備官之力不費帑藏不煩轉輸不勞征調因其願赴之人心蠲其不急之徭役一呼而得勝兵三萬坐收兵食兩利之效備門庭之警扶肘腋之危何憚而久不為此按明初宿重兵於畿輔至四五十萬不費一粒一芻及中葉而後猶有萬人自備糧糗願效力行間者後何不振乃爾耶昔人言祖宗之法惟祖宗能行之豈不信然陜西之屯崇禎十年陜西巡撫孫傳庭疏竊博考故牘洪武年間每軍額地一頃嵗徴正糧十二石餘糧十二石盡行收貯屯倉以正糧按月支給本軍以餘糧支給官軍糧俸餉不煩轉輸而倉廪充實兵不煩召募而士卒精強法至善也至永樂二十年奉詔減免餘糧六石然正餘一十八石猶然交倉按支法尚未壞也至正統二年以正糧十二石兑給本軍充餉免納免支止徴餘糧六石入倉而屯法大壞矣至後不知何時復將餘糧六石改為正糧一併兑軍免納而屯糧既不入倉屯地幾為私産莫可究詰矣陜西省下舊四衛因檄行西安府推官王鼎鎮清查除右護衛名𨽻秦府外先將左前後三衛各地查明酌古凖今推情定法按地起課即責辦於見今承種之人每上地一頃徴糧十八石中地量免三石下地又免三石每石折銀七錢總計三衛共該起課地三千三百二十七頃零徴銀三萬五千餘兩寬平易從無不翕然相安不呼籲以窘大農不加派以厲孑遺疏上上褒嘉之編修吳偉業疏臣嘗觀宋之諸臣慨然以郡縣削弱欲救其敝李綱請以三鎮置帥文天祥請以四閫分都統制今非常之原不可驟開然衛所者高皇帝所以修郡縣之備也事久寖微虛糜廢弱今宜清餉核軍甄别世職其不任者汰之以授有功特令大臣典護一省衛所許其徴辟幕僚收召義勇互相唇齒以壯干陬時不能用墾荒崇禎七年戶部疏查得北直河南山陜等處拋荒田土最多然有額內者原屬軍民有額外者原係曠土不屬軍民者也以額外言之沙礫斥鹵其中不無可耕民間自願開墾墾之或未畢力耕之或未獲利官府隨而起科此科一起便無脫理將來水旱蕪治尚不可知目前小獲永逺包賠民雖至愚誰肯自貽伊戚故明明知其有利明明棄之額外難墾全在於此有如洪武十三年詔陜西河南山東北平等布政司及鳯陽淮安揚州廬州等府民間田土許儘力開墾有司無得起科又令山東河南開荒田地永不起科以此募民堅如金石信如四時民未有不應者此田原係額外不必起科但使地無不耕民能藏富朝廷之利已多此一議當急行者也以額內言之非軍則民或逃徙他鄉或見在無力田久荒廢而人不敢耕即有司募民給帖耕種成熟未幾而本主至矣所在告訐不奪不休甚或已無本主而本戶爭之已無本戶而本管里長總旗爭之又或墾出膏腴大收花利則本地豪勢無不人人爭之而開墾者莫必其命招徠者反受其謗往往有之額內難墾又全在此有如洪武初令各處人民先因兵燹遺下田土他人開墾成熟者聽為已業業主已還有司於輔近荒田撥補又令復業人民見今丁少而舊田多者不許依前占護止許儘力耕墾為業見今丁多而舊田少者有司於輔近荒田驗丁撥付以此募民堅如金石信如四時民又未有不應者此項原係額內不畏起科但使人知恆産竭力耕耘官府之糧自辦此一議當急行者也至於清查隱占屯地宜首正疆界巡行阡陌按地畫圖從某至某有田若干屬某衛所係某旗軍管種只以見在著業為主方一里刻一石記其界址分其弓口録其戶名通遍各處如此清查而屯之實地實籍舉在於此不必問簿書也比至夏秋成熟又復巡行按圖履畝此某某之屯果成熟者曾否納糧完則已否則立追果荒蕪者有無水旱災則已否則必究通遍各處如此覆核而屯之實成實虧舉在於此亦不必問簿書也如此清查覆核果係著業而耕種勤納糧早者量行奬賞且奬賞其衛所之官名在籍中而無力耕種虛占拋荒者勒令退出另召軍民給帖開墾永為已業且罰治其衛所之官則隱占未有不清荒蕪未有不墾者矣不然屯在阡陌而求之於簿書屯在山谷而了之於衙署抄謄册籍積習相蒙何時而破且才有更端告訐因之而起姦豪肆騙良善人人自危甚則激變者有之矣又查得萬歷七年山東巡撫趙賢議青萊登三府海島二十餘處熟地八千餘畝令海防官軍往來耕食免納租稅二十餘年又該巡撫鄭汝璧請撥登州軍兵渡海北長山諸島畫畝耕種收穫糧食運至郡治抵充軍餉三十三年長蘆巡鹽御史徐元正議山東島田開墾成熟已計萬餘今長蘆各場草場沿海一望無際乞要責成天津道專委分司遍歷各場不拘祖地無主荒地召募盡力開墾每頃每年止納課鹽四引有奇給與印帖永為巳業又令墾地之家抽壯為兵聨以保伍訓以武事無事兼捕盜賊有事驅之戎行俱經本部覆準施行此則登津往例今應查責兩處司道照此處置兵屯聽其自耕自食如不能行則此兵百無一用斷乎當撤毋令兩地虛糜新餉嵗至二十餘萬也古時軍國之需仰於西北而有餘今也軍國之需益以東南而不足蓋地有遺利應墾而不墾民有餘力宜務而不務此其本之失也夫濟兖之地非古井田之區三代所倚以給軍國者乎今荒沙漠漠彌望邱墟至於京畿之間亦復如是而各邊之地可知巳大抵官非其人理非其要膏腴之區貪併於巨室磽確之地荒失於小民而屯田壞矣務貪多者失於鹵莾困賦稅者一切拋荒而農業隳矣所謂地有遺利民有餘力此之謂也沿邊諸郡宜倣趙充國屯田故事兼以眺錯募民耕塞下之議參酌損益選京官之識見明逹幹望精密者分督其事假界丘畫區析畝分閲其強壯優其食給隨地所宜務力於農乘其餘間課之騎射昔韓重華之在唐釋罪吏耕邊田嵗償官逋四十萬斛又募人為屯田嵗省度支千三百萬軍不病飢冦不為害韓愈稱之以為兵農兼事務一而兩得至於腹內西北諸路必得如漢之趙過召信臣國初之陳修其人者分方經理相原隰之宜立旱潦之備定肥瘠之區寬稅賦之額居止而作者使循其舊流亡而復者各歸之田湖蕩之間可以水耕者則引水鑿渠高衍之地可以陸種者則分疆定界務使人各歸農農各力田地各樹藝藝各得力天下而不長治久安未之有也宋紹興五年屯田郎中樊賓言荆湖江南與兩浙膏腴之田彌亘數千里無人可耕則地有遺利中原士民扶携南渡幾千萬人則人有餘力若使流寓失業之人盡田荒間不耕之田則地無遺利人無遺力以資中興可見今稱財賦之區者昔固曠土也韓愈謂賦出天下而江南居十九以今觀之浙東西又居江南十九而蘇松常嘉湖五郡又居兩浙十九也今國家都燕嵗漕江南米四百餘萬石以實京師而此五郡者幾居江西湖廣南直𨽻之半自宣德正統以來每擇任有心計重臣巡撫其地蓋以此地朝廷國計所資故也若不曲為經理恐如往昔膏腴仍變為荒間天下事不可言矣從來大臣未有不留心民事而可為大臣者他不具論如元相王鶚因懷孟路勸農官王秉中入朝即訪問枋口去路六十里屬濟源縣所開水利即今溉田幾何秉中曰水舊名古秦渠蓋魏末司馬孚創修至隋盧賁復開治唐太和間河陽節度使大加疏導溉河內河陽溫濟武陟五縣民田五千餘頃宋天聖初枋堰始壞至是秉中復為起廢又云初興役時掘地丈餘得柏枋數十段稱曰枋口豈因是得名乎觀相國亟以民事為問而任事者對答詳明如此俱可以為後世法畿輔墾田葉春及疏臣嘗讀司馬遷所為貨殖傳列致富人十數家具道盬鹽鐵冶丹穴厄茜之事與王者埒家不訾津津矣及敘白圭觀變趨時若猛獸鷙鳥之發必以李悝務盡地力先之然後知遷傷切於世憤其所為末作濫而本業衰也故曰本富為上末富次之此豈昧於大較悅奇勝惡治生之正道哉呰窳之人負郭千頃荒蕪不治持籌執策以爭刀錐指計僮奴扼吭而誅其入所謂舍萬金之産而行乞於市也土田當闢古今諸儒具有論著大者在唐鄧汝頴陳蔡許雒荆襄淮楚間臣未敢論論畿甸中古者畿內謂之甸服粟米總秷於是而出所以省輸將便資給也國家建都北平古為燕國燕故諸侯宮闕城郭之壯麗玉帛會同之輻輳百官萬民之殷庶何敢仰望萬一然自文公以後立於強國之間北迫強敵南拒大邦又嘗帥師爭馳中原乘勝逐北翺翔千里之外此其為費非微細矣蘇秦入燕時東有朝鮮遼東北有林胡樓煩西有雲中九原南有滹沱易水即今畿內東西所至視昔雖狹而南有渤海巨鹿至於邯鄲濮陽蓋兼齊趙之地長短相互實亦當之昔者纎悉出於其國而今盡仰江南非所以富國息民也蘇秦謂燕足以棗栗粟支數年不言粳稻之事豈非人謀地利漸乃出哉臣觀往牒何承矩耕水田於河北虞集議海田於京東托克托大興營田西自西山東至遷民鎮南起保定河間北抵檀順皆從司農佃種欣慕之焉水泉陂塘之迹門堰捍築之方召募敕授之法器具工作之資蜃蛤粟米之富燦然可觀也按成式法往智數嵗之後其效立見此與轉吳會漕潞渚功相十利相百矣窮山澤計毫毛取贏萬里而直千里之內棄而不收甚可惜也然出數十萬緡以為利本而取息于數載之逺非富厚之家不能貧者一日之入尚不足一日之用而何暇思乎其他蘇轍有言曰賈人之治産也將欲有為而無以為資者不以其所以謀朝夕者為之也取諸其不急之處指鹽鐵等今內帑金有未用者所謂不急非耶且富人之出錢也度其能償且在旦夕而後貸之興水利闢草萊亦旦夕可償者也雖然事議非難任難任非難用難用非難成難夫天下之人每病太怯不敢任事事偶相值謾然受命而不自量上雖用之常有輕之之意及其未成而奪其業古之君子先量其身而又要乎其君君能用之則受命而不辭不能用之不敢一日茍然以試而君亦專責之事終以濟故足述也方册遐矣成化中都御史原傑經理鄖陽不可稱哉荆襄迤西沃壤千里蓬藋蒿萊實盡其利籍流民墾曠土得戶一十二萬君相委心豪傑效職亦千古之概也今朝廷之上望治如渴天下之大獨無一人可使乎抑洪武初天下土田八百四十九萬頃至𢎞治已失其半近日司農所入又多詘焉不耕之田固不少矣獨畿內哉藩府州縣雖有農官孰為朝廷任事者富強之道在任用矣徐貞明西北水利議當今經國訏謨其大且急孰有過於西北水利者乎雖然概而行之則效逺而難臻驟而行之則事駭而未信蓋西北皆可行也盍先之於畿輔畿輔諸郡皆可行也盍先之於京東永平之地京東永平之地皆可行也盍先之於近山瀕海之地近山瀕海之地皆可行也盍先之數井以示可行之端則效近而易臻事狎而人信又恐其難於遙度也則又褁糧屬二三解事者走永平傍海近山之境相度而經略之既得其水土之宜疆理之詳始信其事之必可行京東輔郡而薊又重鎮固股肱神京緩急所必須者矧今地負山控海負山則泉深而土澤控海則潮淤而壤沃水利尤易易也豫所屬二三解事者蓋遍歷山海之境閲兩月而返披圖出示如指諸掌也為言諸州邑泉從地湧一決而通水與田平一引而至比比皆然姑摘其土膏腴而人曠棄即可修舉以兆其端者自西歷東如密雲縣之燕樂莊平峪縣之水峪寺及龍家務莊三河縣之唐會莊順慶屯地皆其著者薊州城北則有黃崖營城西則有白馬泉鎮國莊城東則有馬伸橋夾林河而下城南則有别山鋪及夾隂流河而下至於隂流淀疏渠皆田也遵化西南平安城夾運河而下及沙河鋪地方乂鑯厰湧珠湖以下至韭菜溝上素河下素河百餘里夾河皆可成田遷安縣北徐流營山下湧出五泉合流入桃林河又三里橋湧泉流出灤河又蠶姑廟湧泉成河與灤相接夾河皆可田之地盧龍縣燕河營湧泉成河及營東五泉湧漫四出至張家莊撫寧縣西臺頭營河流亦是燕河營湧泉而來皆可田自西以東如豐潤縣南則大寨及刺榆坨史家河大王莊之地東則榛子鎮西則鴉洪橋夾河五十餘里皆可田玉田縣清莊塢導河可田後湖莊疏湖可田三里屯及大泉小泉引泉可田其間有民所不業之地有屯地有牧馬草地屯草之地屬於官官則闢其蕪而收其利不難也至於民不業者召民業之官為助其力何至連阡以棄鞠為茂草乎至於瀕海可田則自水道沽關黑崖子墩起至開平衛南宋家營之地東西度之百餘里南北度之百八十里皆𨽻豐潤其地與吳越瀕海之沃區相等今雈葦彌望而繫名於勢族然葦之利微即勢族亦無厚入於其間也若如吳越人田而耕之則利十倍於葦即捐其一以與勢族使不失其舊入勢家亦何憾焉昔虞文靖公之議東極遼海南濱靑徐瀕海皆可田之地今豐潤實其中境欲舉其議而行之兹非其先當致力者乎蓋先之京東數處以兆其端而京東之地皆可漸而行也先之京東以兆其端而畿內而列郡皆可漸而行也先之畿內列郡而西北之地皆可漸而行也在邊陲則先之薊鎮而諸鎮皆可漸而行也至於瀕海則先之豐潤而遼海以東靑徐以南皆可漸而行也夫事有小用則宜大則局而不通大用則宜小則窘而難布兹其試之一井究之天下無不利者事有旦夕計功而逺猷不存積久考成而近效難覩兹其暫之嵗收久之永賴無不利者特肇端於京東數處因而推之西北一嵗開其始十年究其成而萬世席其利矣左光斗屯田水利疏萬歷四十七年屯田御史左光斗題為足餉無過屯田屯田無過水利懇乞聖明申飭當事著實舉行以濟急需以圖永賴事臣幼聞父老言東南有可耕之人而無其田西北有可耕之田而無其人既候命闕下間取農書水利及古人已試陳迹略一講求頗得大意適承乏屯牧耕當問奴此其職已方今東事正興籌邊無䇿十八萬􅑎腹之兵待八百萬畫餅之餉催外解之檄如火而不可得來求內解之涕如雨而不能得去止有漕運一脈而民力已竭加以旱乾水溢接濟不全河竭海漂種種難測其他意外之事中梗之患且未忍言若不汲汲講三年九年之儲而局局為不終朝不終夕之計臣愚不知其可蚤夜以思只有屯田可以救急而今之屯田者不過按籍徴糧期於及額而已間有隱占多不可問然亦不必問也惟是西北不患無地而患不能墾以臣所聞京以東畿以南山以東兩河以南以北荒原一望率數十里高者為茂草窪者為沮洳豈盡其地利哉特不墾耳其不墾者苦旱兼苦潦也其苦旱與潦者唯知聽命於天而不知有水利也一年而地荒二年而民徙三年而地與民盡矣今有道於此使上之不為魃而下之不為魚相反而相為用去全害而得全利何憚而久不為此謹陳上屯田水利三因十四議惟皇上採擇焉其一曰因天之時五行之用誰能去水三江震澤禹貢所稱厥土塗泥厥田下下昔之汙萊今之沃壤何常之有邇見莞蒲魚鱉蜃蛤之屬到處有之自南而北風氣固然而謂水偏利在南偏害在北火耕水耨缺五行之二名曰誣天其一曰因地之利引漳溉鄴渠鄭富秦龍首渠漢世尤盛民之歌曰涇水一石其泥數斗且溉且糞長我禾黍河源如昨地脈未改而謂水偏利在古偏害在今使瓠子之歎長興宣房之績不顯名曰誣地其一曰因人之情南人惜水如惜血北人畏水如探湯習固使然亦未見其利耳翟方進壞陂而黃鵠之怨興召杜開陂而父母之歌作有之以為利死且不避近日京東一𢃄多所開濬浸浸已見其利所在州縣亦知有爭水者矣臣私喜之而謂水不宜北北不慣水拂耕鑿之情而失田民之利名曰誣人禹功明德惟是平水土濬溝洫而巳未有不治河而治田者支流既分而全流自殺下流既泄而上流自安無昏墊之害而有灌溉之利此濬川之當議也沿河地方唯運河不敢開泄外其餘源流瀦委是不一水陂塘堤堰是不一用或故迹之可尋或方便之可設工力多者官為量給費少者聽民自舉惟無水之處不必鑿空尋訪以蹈即鹿無虞之戒則疏渠之當議也秦漢之世鑿地為港掘地為井汲而得灌以一畝一鍾即東南地高水下車而溉之上農不能十畝北方水與地平數十頃直移時耳事半功倍難易懸殊則引流之當議也河流漸下地形轉高逺引不能平引不可將若之何其法闌河設壩以壅之大約如囊沙之意或壅二三尺或壅四五尺然後平而引之水與壩平流從上度遞流而下節節壅之亦復如是蓋不能俯地以就水而惟升水以就地支河淺流最宜用此即如滏陽一河發源以至出口約七八百里得其利者僅一二縣餘皆以低下棄去不曉此法故也則設壩之當議也蓄泄不時泛溢為害加以秋水時至百川灌河壞民禾稼蕩民廬舍往往有之惟於入水之處設斗門以時啓閉旱則開之潦則塞之出水之處反是此建閘之當議也沿山帶溪最易導引山水暴漲沙石壓衝再行挑洗勞費不償其法順水設陂以障之用支河不用河身支以上溉身聽其下行此設陂之當議也而必概種粳稻恐不素習得利轉微隨其高下聽其物宜宜粱宜菽宜薏宜芋宜蔬惟意所適總之水源一開灌旱地之利勝水田之利一倍每畝之值亦增價三倍漸漸由而不知通而不倦而焦原盡澤國矣則相地之當議也春夏澆灌常苦水少秋冬無所用之常苦水多儲有餘以代不足法用池塘濱淀以積之既可儲水待旱兼可種魚蒔蓮每見南方百畝之家率以五畝為塘水不勝用利亦如其畝之所入何不倣而行之而五家一塘或十餘家一塘居然同井遺意而築塘尤易于浚井但期築做如法可以注水不漏惟原窪下之處不必另設則池塘之當議也以一教十以十教百必用南人而南人寧為農夫不欲為農師北地徭輕江南役重以走利如騖之情乘避徭如虎之勢吾土雖美樂郊可適但著為律令永為世業不得一二年後即行告奪將負耒而來爭先恐後舉鍤為雲決渠為雨此之謂也則招來之當議也四民之業迭相為用南方士子不得志有司則棄為胥吏舞文犯科往往此輩若倣漢世力田之科令墾田若干畝許令占籍而又不礙地方本額且令官司與之講明水學如胡瑗之教授門人不猶愈于白鏹而鬻靑襟者乎蓋先師與后稷並位勝與倚頓爭坐也則力田之科當議也虞文靖公建議于元泰定之時聽富民欲得官者能以萬夫耕則為萬夫長千夫百夫亦如之今其意可師也若令各屯衛所官軍及經歷俱以墾田多寡加級雖格外之勞來實本等之職業於計甚便今議者動抑豪強防其兼併不知富者樂耕則貧者轉貸但得地無曠土土無遺稅何妨勳戚貴近大賈富商駢集而來徙豪實塞實用此意則募富開爵之當議也宋巡行使者分道四出民苦不便蘇軾力非之而治杭之日修治西湖欲天下盡興水學母亦行之介甫則不善行之文忠則善耳今水利之銜猶設而勸農之義無聞至於有司多所不解但得撫道而下個個得人又皆講求之熟路已試之成事如懷隆靖逺河內磁州海島先後諸賢分滿布列彼此呼應官無添設之煩民無追呼之擾穡人成功田畯至喜則擇人之當議也天津一處舊撫汪應蛟墾水田八千畝設兵二千用充額餉今援遼千名即八千畝多蕪且有申言種榖不如取葦者廢興由人良可浩歎誠得練習明作一將官領兵數千屯之而天津一帶不足墾也永平負山瀕海擇官而墾亦如之附近關外得榖一石足抵漕之五石且屯且練用備不虞則擇將之當議也或者曰遊惰之軍不任耰鉏是不然近見出關觳觫之狀視關內如春臺壽域若練其老弱使盡力南畝死且不憾而又計田行賞比於得級如宋給事廖剛之䇿其言曰執耒之勞較之操戈之危豈不特易夫驅之戰與驅之耕臣固知其必悅也則兵屯之當議也臣所言者止於臣屬耳由畿輔而九邊由關內而關外豈乏充國其人又豈乏武侯子儀其人而坐令金城祁山河中之績為千古絶盛哉此數議者不煩公帑不勞民力而又皆田里樹畜老農常談無甚高論舉朝皆言其可行當事亦見為當行而不肯力行國家無事既以因循而不行有事又以張皇而不及行農既疲於養兵而不耕兵又恥於為農而不耕謂見效遲在三年之後而三年後復然謂大利遲在十年之後而十年後復然譬之富人衣珠而餓死豈不惜哉元末年東南有梗始思虞文靖之言倣其意設海口萬戶業已無及乞張士誠貸米數百斛反覆告急僅乃得之而終無救於亡矣可不寒心先臣徐貞明曾以尚寶專理此役而事出創議難與慮始且欲以一身兼禹稷之任大開河工復井田之遺省東南之運語近迂闊會忌者而止乃其意不可磨也今潞水客談及治田存稿具在任事之難令人追恨無已今時勢迫矣過此不行更無行時伏乞明天子照臨於上賢公卿百執事主持於下各舉所知知人善任更祈敕下戶部酌議委妥轉行所司著實舉行勿狃故事勿急速效勿憚事始勿撓事終載入考成一切有司首課農政田野不治即異能高等亦注考下下其有不習者孳孳求講務期曉暢躬自勸相單騎巡行阡陌問民疾苦不得勞民煩費無益民功小有嫌怨臣等力為主張逮試有成效破格超遷永著為令庶幾小墾小利大墾大利小利在地闢而民聚民聚則墾者愈多大利在粟賤而民饒民饒則墾者愈易生聚漸繁和糴轉便即不必省東南之漕而亦不專靠東南之運矣給事中魏呈潤水利疏臣聞農者天下之大本也泉流灌溉所以育五穀也是以山澤通氣天下收其成功雨晹示徵王者因之爭美比者滹沱諸河乾可步涉東光等淺轉漕若石近京數百里一望赤地假十日不雨哀此勞民多稼少穫何以御歲臣聞雨者天地之和氣霏潤上騰而後雲滃澤解洋溢頃畝是以山居知雨非山之能厭浥也山必有澤燥濕相蒸而變化生高下相感而雨水成夫天下之水自足灌天下之田而每苦於不能用天下之田自足給天下之生而每苦於不能穫周禮曰幽州藪曰貕養其川河泲其浸災時冀州藪曰揚紆其川漳其浸汾潞言水澤至沃也國家定鼎於燕用幽冀以為畿輔負重山面平陸奧衍之利甲于東南若疏其上源自涓滴傳而致之何田不充何漕不裕惟北方不知蓄水聽其自旱自雨自盈自涸而莫之均節故潦蕩則遍地巨浸炎烈則滿眼砂礫一遇飢嵗比室如懸民之凋敝極矣昔舜命禹治水至千百年獲其利而考其言曰決九川距四海濬畎澮距川也此之謂水政即農政也漕政也自秦開阡陌廢井田而溝澮之制始湮漢唐而後日受河決之害夫以數丈之河挾五六月之霪霖而無有旁地以停蓄之其潰軼也固宜此潦害也潦時不收之為利一或天靳其澤地屯其膏遂致焦燬而無所措此旱害也夫聖人在上水旱不能為之災其時沿河之水無一勺不疏如血脈是以沿河之地無一畝不化為膏腴今近畿州縣之間自守令而上水利河屯等官各有司存矣請敕下撫按分責所𨽻監司務以疏瀹水土為事凡地形高窪之勢源委分合之宜古今通塞之故與夫興作之緩急工程之多寡一一循行而咨度之然後編册以獻曰某處可復為大渠逹於漕河某處可復為中渠逹於大渠而小渠諭令自開濬也册已陳矣其力役之費不盡需之官帑亦不盡需之民間需之官帑者則以付之罪人操畚鍤而往從之徒計里而杖計丈不然則常平之積可間給焉需之民間者因水之所利而用之利在一井則役一井之民利在一邑則役一邑之民利在鄰邑者鄰邑助之利及鄰郡者鄰郡助之皆官預為會計而民不苦於追求則無不趨事之人也趨事衆則水利廣總其全力既可以致逺分其餘力并可以潤稿矣昔管仲之相齊也其説曰聖人之治於世也其樞在水是以自修封修界以至於修制十仭見水不大潦五仞見水不大旱蓋誠急富國而盡地利也曩者月食差度皇上既治歷明時法堯之開天兹雨澤愆期虔禱方應臣愚以為皇上亦當濬川導泉紹舜之闢地誠及此時舉地利而經理之富民不能供貧民之役必轉募田間而窘於耕者得食於工一利也旱則蓄其流潦則宣其溢瘠産化為沃土流民漸次復業二利也水道與田疇相通譬咽喉之氣逹於肺臟靡不虛而咸通漕事可以早濟三利也北地種植既多即粟米芻茭俱將輸之天府逺可省額外之徴而近可蠲召買之役四利也原野之間有溝有防高下自成天塹窺關探丸之盜不敢援弓而馳馬五利也夫不費太倉之金錢而坐獲此五利何不可為也要以瀦防溝渠之法不獨衛輝真定以南濟寧以北可以漕運計而已天下無不可用之水無不可用水之地如吳起之用魏也引漳水溉鄴而河內富鄭白之先後用秦也舉雲決雨涇水一石其泥數斗而關中沃李冰之為蜀守也壅水作堋穿二江通舟楫而諸郡遍溉今遺迹具在若乃吳越州郡則引太湖苕霅諸溪之水汝南九江引淮東海引巨定太山下引汶并州西南若汾若沁盡可引注為農田他小渠者不可彚紀也第舉之有序不至或興或廢委為不急之務則無地不耕無人不屯水之為利當與天澤上下同流矣傳曰雨者水氣之所化然則水利修又所以致雨之術也臣渺學寡識敢因霖雨而效微忠若此近畿水利昔何承矩建議於宋於河北諸州興建水利發戍兵萬八千人開泊種稻民賴其利即今河間保定淀泊之區也虞集建議於元謂京東瀕海之地海潮日至淤為沃壤宜用浙人之法築堤捍水為田聽富民欲得官者合其衆分授以地官定其畔以為限能者授以萬夫之長千夫百夫亦如之察其惰者而易之三年後視其成以地之高下定額以次漸征之五年有積蓄命以官就所儲給以祿十年不廢得以世襲如軍官之法時善其言而莫能行至正間丞相脫脫復議西自西山南自保定河間北抵檀順東及遷民鎮召募江南民師立法佃種給鈔五百萬錠以供牛種即虞集之議也時天下已亂欲行已晚危素為大農墾田於雄霸二州相地授略剃除荊棘闢田幾千萬畝以補漕運之缺夫固本足用不行於平日而僅行於衰亡之時此元人之失䇿也萬歷庚子保定巡撫汪應蛟海濱屯田有效疏天津葛沽一帶地從來斥鹵不耕種臣謂以閩浙治地之法行之未必不可為稻田今春買牛制器開渠築堤葛沽白塘二處耕種五千餘畝內水稻畝收四五石種薥豆者得水灌溉亦畝收一二石惟旱稻以鹹立稿始信閩浙之法可行於北海而斥鹵可變為膏腴也天津為神京牖戶開府設鎮其地益重見在水陸兩營兵四千人嵗費餉六萬四千餘兩俱加派民間若盡依今法為之開渠以通蓄泄築堤以防水潦每千頃各致榖三十萬石以七千頃計之可得榖二百萬石非獨天津之餉取給而省司農之轉饋無不可者且地在三岔河海潮上溢可以灌溉白塘地無糧差白塘以上為靜海縣糧差每畝一分八釐民願賣則給價不願則給種於民情無拂請以防海官軍用之於海濱墾地每嵗開渠築堤可成田數百頃一面召募居民承領數年之後荒田漸闢各軍兵且屯且守民間可省養兵之費重地永資保障之安矣天啓中屯田都御史董應舉疏臣近到天津歷何家圈白塘口雙港辛莊羊馬頭大人莊鹹水沽泥沽葛沽見汪司農往日開河舊迹猶存可作水田甚多荒廢不久開之甚易一畝農工止用八錢可得粟三石三斗久荒者畝用農工一兩其挑濬舊河為力不多只須挑濬數尺明年萬石之糧可必也按天津水田議之者科臣解學龍也前董應舉所開四當口及雙白二港又同知盧觀象所開何家圈皆得米萬石轉餉關門此亦曩行水利之明效也後盡汙萊矣嘉靖三年大理卿鄭嶽言臣勘事陜西道經畿內河南見太行西倚潼關東繞懷衛北及燕冀水皆東注南入於海盧易滹沱琉璃漳洺衛沁洛瀍其大也宜令瀕水開田築堤鑿渠平疇無水者量濬畎澮或為陂塘下通水泉上蓄雨潦數年之後皆為沃壤矣此經國至計所謂待其人而後行也古時西北水利魏史起引漳水溉鄴鄴以富秦開鄭國渠溉舄鹵之地四萬餘頃關中為沃野秦以富強漢文翁溉灌繁田千七百頃而蜀饒白公穿渠引涇水溉田四千五百餘頃而以饒富馬援引洮水種粳稻而狄道並塞之民得以樂業虞詡復三郡激河浚渠為屯田而省內郡之費此前人興水利於西北之明效也限田崇禎庚辰工部主事李振聲請限田一品官田十頃屋百間二品官田九頃屋九十間以是為差逾限者房屋入官變價充餉田地入官為公田有旨下部議禮部侍郎蔣德璟出揭駁之謂限田起於井田三代時有井田故田可限也自秦而後經界廢矣漢董仲舒始建議限田李翺元稹林勳皆祖其説非不雅志三代為抑富扶弱之圖然皆不見用惟漢王莾宋王安石賈似道三人力任為必可行而皆以擾民致亂似道至首捐已田萬畝為倡其法益峻其禍益酷由此思之法非不善而井田既湮勢固不能行也説者謂開創之初戶田稀少土地荒曠田尚可限故唐太宗嘗行之而未幾亦廢洪武初北方府縣近城荒地召人開墾有餘力者不限頃畝皆免三年租稅仍免雜泛差徭又令北平山陜及江北等處民間田土儘力開墾不許起科甚且給以牛種田器不惟不限且恐其不能田大哉神謨卓冠千古惟令履畝丈量為魚鱗圖册而嚴詭寄投充之禁則雖不言限田而限田之法亦行其中矣胡公世寧言立國者不於平定之初復古授田之制中葉而後安懷成俗而云均田田未易均也其説是矣然平定之初即欲計畝授田如三代制而不封建不井田總不能久况中葉之後乎鄧徴君元錫謂有三難何者守令嵗月更改各懷一切莫慮經久一難也豪強兼并謗讟朋興二難也守令不能履畝而較必寄於吏胥上下其手豪右售賕貧弱抑勒名曰均田實滋弊孔故王莾王安石賈似道行之而亂皆生今反古之過也今欲足兵食莫如務農欲務農莫如貴粟惟在遵守國初重農諸欵行之如北平山陜河南江北諸處聽民盡力開墾三年不起科及課植桑棗修治農田水利令府縣官考滿以農田水利桑棗為殿最如此庶民勸於耕而粟有三年六年之積以漸致太平倘亦救時之急務乎蘆田計曹條議曰議者欲清南京太僕寺所𨽻草場地六十萬頃出佃價一兩使此法能行則可得銀六千萬利莫大焉然而不能也自馬草均派于田畝民間已忘其事故江北尚有名目而其田本賤值不過數錢豈能頓增一兩江南田貴易增而竟莫可辨析茍欲徴其價必至攤𣲖此教之亂也愚以為蘆洲一項可以此意行之今沿江一帶田之利微洲之利重故洲必歸於豪勢兩豪相爭纍年不止且甚至逞戈結營白日殺人而官不敢問祇以不煩佃價辦課輕微而影射易滋故不惜身命而爭之耳今得為之令曰某處某洲若干畝每畝納價若干不論業主他戶能納者聽既納之後永為世業舊業主不得爭民縱出佃價其利尚浮於田必爭先而納舊業主家能辦者唯恐失其利亦必競納不煩催督而可以得無限之資原其本始皆由白佃未為奪其所有既納之後永無相爭之端續有新增亦必遵此不得以水影微課先佃為辭利減事平爭端少息亦致治之權也計蘆政分司所轄見為畝三百三萬三千九百二十四如往年少試於如臯等處每畝納四五錢不等民無不樂從則分等量入亦不下百六七十萬可坐而致也若能命一幹官嚴為丈量度其隱蔽不啻一倍上而川蜀亦可倣行數百萬之利在一使者得人耳事集民樂又何患焉預備倉備荒之政莫善於預備倉成化中敕布按二司言洪武中州縣設預備四倉所以廣儲蓄備旱潦為民賴也比久廢弛爾等督同各府州縣正官將原設四倉核實見在儲蓄有無多寡之數仍儘各處在官贓贖金續糴粟備之有不敷聽於存留糧內借撥或於各里上中戶內勸助以充其看守倉者於附近里分僉殷實有行止者主之有通同官吏實收虛放為侵盜者論如律都司督同衛所正官於衛所地分置倉亦如之後都御史林俊題定預備倉所儲粟務三年積足周一嵗之食而後已大都五十里積粟三萬石百里積粟五萬石官儲中程者為稱職不及三分而上罰有差少六分課殿而給事中吳世忠言積貯之名歷代不一而常平義倉獨存於後世自臣觀之莫善於常平莫不善於義倉義倉之法凶年則散之豐年則斂之其初未嘗不善也然官與民償貸其弊易生方其貸也寄之於里胥而詐冒之名多逮其償也責之於里胥而徴求之弊作及其弊也里胥必詐與貧民通而許為詭詞貧民必甘與里胥市而覬為滅迹前者獲利後者效尤將斂散之粟與存者無幾矣其又弊有借止一石或償至十數石而不足借止一年或徴至十數年而未休下戶細民有寧賣子女甘流徙而不肯窺倉廪之門見官吏之面者以故粟竭於官有出而無入約爽於民有貸而無還其勢必盡廢而後已此義倉之弊也常平則不然豐年榖賤則增價而糴以為備凶年榖貴則減價而糶以濟飢願糴者與之而無所強願糶者受之而無所追其利常周而其本不仆故公私兩便今宜因義倉之舊更以常平之法量民數多寡以貯粟酌道里近逺以立倉每豐而糴委之於富民而計其數時凶而糶臨之以亷吏而主其衡糴不出一人人不過一石而又善為之處嚴為之法使所糴皆貧民而富者無所侵焉斯可矣或曰義倉之行飢者可徒手而得粟常平之設必轉貸糴本而粟始可得也其轉貸之際安知富人之不留難而徴取之時又安知富人之不侵漁乎臣應之曰天下無不弊之法為治者但當酌其弊之輕重而審處之常平立於漢義倉立於隋而用常平者常多用義倉者常寡常平每廢而猶存義倉隨起而即廢至於宋常平特置提舉之官而義倉無聞焉亦足明其法之善矣林希元救荒叢言臣聞救荒有二難曰得人難曰審戶難救荒有三便曰極貧之民便賑米曰次貧之民便賑錢曰稍貧之民便轉貸救荒有六急曰垂死貧民急饘粥曰疫病貧民急醫藥曰病起貧民急湯米曰既死貧民急募瘞曰遺棄小兒急收養曰輕重繫囚急寬恤救荒有三權曰借官錢以糴糶曰興工役以助賑曰借牛種以通變救荒有六禁曰禁侵漁曰禁攘盜曰禁遏糴曰禁抑價曰禁宰牛曰禁度僧救荒有三戒曰戒遲緩曰戒拘文曰戒遣使其綱有六其目二十有三備開於後編次以進總曰救荒叢言是皆往哲成規昔賢遺論臣嘗斟酌損益或已行而有效或欲行而未得或得行而未及謂可施於今日者也若夫恐懼修省降詔求言蠲租稅以舒民困散居積以厚黎元皆人主救荒所當行則陛下已先得之不容臣言也至於賣軍職賣監生賣吏典乃不得已救急之事非盛世所當行則大臣已先言之不待臣言也陛下倘不以臣言為愚拙為迂踈乞敕部院詳議可否即賜施行潘潢積榖議查得先該戶部奏行天下府州縣官各照里社積榖備荒立格勸懲不為不密但如每一小縣十里之地三年之間不問貧富豐凶概令積穀萬五千石限數既多責效太速以致中才剝削取盈貪夫因緣為利往往嵗未及飢民已坐斃及遇凶荒公私俱竭為困愈甚臣聞田野縣鄙者財之本也垣窖倉廪者財之末也與其聚民脂膏以實倉儲孰與盡力溝洫以興水利昔宋儒朱子賑濟浙東所至原野極目蕭條惟見有陂塘處田苗蔚茂無異豐嵗於是益歎水利不可不修謂使逐村逐保各治陂塘民間可永無流離餓殍之患國家可永無蠲減糶濟之費此則救荒不如講水利明效大驗之可見者合無本部備行都察院轉行各處御史申明憲綱嚴督所屬凡境內應有墟岸壩堰坍缺陂塘溝渠壅塞務要趂時修築堅完疏濬流通以備旱潦毋致失時有傷禾稼及因而擾害於民每季終預將疏築完壞備細緣由開報御史及總督水利官員不時巡歷勘驗如有申報不實及壞久不修修不完固或因而害民者並為不職從實按勘施行遇該考滿務查水利無壞方許起送有能為民興利如白起溉鄴鄭國開渠之利者具奏不次擢用該管官員亦照所轄完壞多寡分數定注賢否一體旌别其人分紙價贖罪贓罰銀錢香錢引契魚鹽茶酒等稅不係解部者悉如御史王董賢等所言盡數糴榖入倉備賑不許分外分毫科罰侵尅庶幾藏富於民因地之利雖有旱乾水溢民無菜色管子所謂積於不涸之倉藏於不竭之府者用此道矣宋朱熹曾請於府得常平米六百石賑貸夏受粟於倉冬則加息計米以償自後隨年斂散小歉則蠲其息之半大飢則盡蠲之凡十有四年得息米造倉三間及以原數六百石還府以見儲米三千一百石以為社倉不復收息每石只收耗米三升以是一鄉之間雖遇凶年人不缺食熹又嘗言於上曰臣曾摹得蘇軾與林希書説熙寧中荒政之弊費多而無益以救之遲故也其言深切可為後來之鑒洪武間湖廣孝感縣言民飢請發預備倉糧以貸乏者太祖謂戶部臣曰朕嘗捐內帑之資付天下耆民糴粟以儲之正欲備荒歉以濟急民也若嵗荒民飢必候奏請道途往返民之飢死者多矣爾戶部即諭天下有司自今凡遇嵗飢則先發倉廪以貸民然後奏聞著為令本計明鄧元錫曰記載家言高皇帝方定金陵時諭太史令基起居注禕言今軍興四方民生苦甚吾欲舒其力且奈何基禕對曰師行必齎糧食上存此心幸甚然天下未底定紓民力宜未易及也上曰不然紓民力在均節財用在制常賦國家愛養生民猶保抱赤子惟恐傷之茍掊克以朘之雖慈父不能得之其子君安能得之民乎今當定賦節用崇本而抑末庶民力少有紓乎基禕頓首曰臣等愚所不及此仁政之本也永樂初湖廣夏稅至後期戶部尚書郁新請案府州縣官稽緩罪治之文皇帝不許曰賦入但無失經制而可矣耕種有先後地里有逺近何可槩必任官牧民當察其難易而悉其情一主於利民茍罪其官必急責於民吾民殘矣其勿問洪熙初昭皇帝諭工部言古土貢隨地産不強其所無比年丹漆石青之類槩下郡縣徴郡縣迫小民鳩金幣轉買價騰踴百倍朝廷得不十一而民費以千百何痛也自今於出産地計直市母槩派毒吾民嗚呼聖神之計慮深矣給事中吳執御理財必本經術疏臣靜觀今日國勢民情無如理財為急今諸臣為茍且之計者無不謂此時多事勢不得不出於權宜臣耳目孤陋不能逺引唐虞三代請舉祖宗朝多事者一折之可乎臣考永樂初年承廢弛之後府庫空虛一時賜賚功臣大封親藩而又招集諸儒編輯大典未幾而有安南之役有營建京兆宫殿之役費以萬萬計而戶臣夏原吉殫力經營未嘗告乏豈今日之多事有踰是乎今諸臣為權宜之説者又無不謂此時民窮財盡勢不得不出於茍且臣竊謂天下之民未嘗窮而天下之財未嘗盡也惟主計者自為窮之盡之之計剜肉醫瘡去皮附毛令比屋脊脊嗷嗷府事之所以日虛泉流之所以日竭也臣耳目孤陋亦不能逺引唐虞三代請以幼學所聞質之祖宗已行故事與諸臣一商確可乎聞之仲尼曰生財曰節用此兩言者已略盡理財大端矣屯政鹽法生財之大者諸臣業已言之皇上業已行之臣故無容贅臣考祖宗時有曾泉者為泛水縣典史也涖事已勤然督農事稽女工時歷鄉村率民墾荒田以恢榖麥伐林木以贍財貨無牛具無紡織具者皆設處借之行之二年官有積貯民無窮乏以其羡餘造船以備儹運夫官至典史微矣殫心殷阜有殷阜之效如自典史以上何官不可倣此以自效乎陳壽之之巡撫延綏也開邊耕耘架梁採木不期月省費二十七萬葉盛之巡撫宣府也修復官牛官田之法墾田積糧以其餘嵗補戰馬一千八百餘匹修屯堡七百餘所此兩臣者治兵非不稱雄而其理財又如此凡為巡撫者若邊若腹獨不可倣此以自效乎至劉大夏之治淮鳯民飢奏裁光祿供辦也嵗省費銀錢八十餘萬趙璜因正德中嵗派料價過濫遂取𢎞治前成例而裁之也所省嵗費亦不下數萬夫國家之經費有限而漏巵影沒漸生其中主計者茍留心撙節此二者非其標的乎蓋泉流之通於天下也與天地並行不息而無一塵一忽不灌輸於斯民者故巡撫以下典史以上無一臣非皇上保民之人即無一臣非皇上理財之人為計臣者當大宏經術以急濟時艱為生為節務與諸臣實實求所以補救之方臣愚謂大約以固本厚基為至計以酌虛劑盈為權宜臣知九州之大四海之廣皆環拱以作皇上外府定無有憂不足者矣若夫加派捐助搜括者竊不能無議焉加派一節皇上原以不得已之心而姑行之其停止近或在一年之外逺或在三年之中似可無言然必不可不即停止者近畿保河六府之加也臣觀太祖高皇帝開基建業鎮江寧國諸府為京師翼郡故屢行蠲恤其曰子孫百世何可忘江左之民蓋注意邦畿如此其重哉保河六府又奕世為皇上拱神京者也其地多沙磧原與南土不同矧年來多故哀鴻之歎十室九空此二十二萬餘者加之原無益於山嶽減之又何損於涓埃哉其餘省直皇上與計臣預定年限庶百姓知息肩有期而幽遐之歡聲雷動矣至捐助搜括二者尤難為訓夫臣子媚兹有心一芹一曝皆思上獻則捐助何獨為非竊謂人臣但能奉公守法約已裕民而以區區為忠愛恐不教之偷者鮮矣搜括原有欵項豈為橫取竊謂郡縣之間當留有餘以防不足矧正賦未完搜括先到此果足以療度支之飢否熙朝之世寧堪受此名乎考洪武三年戶部請論蘇州守臣逋稅罪高皇帝云蘇州積欠兩年民困可知若逮其官必責之民民畏刑罰必傾資以輸官如是而欲其生遂不可得矣又朱英總制兩廣府藏頗充有勸以羡餘進者英曰王者藏富於郡縣茍羡餘一進他日餉匱奚從取給盛世君臣無一念不為斯民計亦無一念不為先事計此真可作今日良藥矧皇上懲貪禁墨之令無日不下而有司不肖或借捐括以為辭倘賜罷之諸凡郡縣誰敢不洗腸濯胃以自干斧鉞乎今天下邊腹多虞臣亦具知但以天地財源無一不輸於民故理財自理民始民裕而財自阜財阜而賦自足不然皇上試問諸臣今秦晉間何以不責其輸正賦且欲請賑請餉了無屬厭之日乎臣觀計臣清強儘足辦事而在廷多忠智之佐伏乞皇上下臣言敕諸臣共殫虛心參酌如有一得之愚亟賜採擇施行御史吳履中論加派疏近日者議增加派矣皇上惓惓於開節大計以賦加民困為念真經國之深慮愛民之至仁也即向來急催科嚴參罰開事例裁額欵皆不得已而為之臣下遂以其心全用於此百姓遂以皇上所急專在乎此而德意幾不見於天下矣國家嵗入計一千四百六十餘萬而遼餉五百萬不與焉捐助罰贖事例等項鹽課稅額所增復不下數百萬而尚不足則安能於天下之外再得一天下之物力以取其盈乎臣謂財之生數至此已極自有遼事以來取諸民者已溢於制而魏忠賢搜括之術復無所不至以至今日真皮骨俱盡之時不惟加派不可行而催科更當緩不惟開之苦於無術而節之尤病其失經如青襟優免嵗不過十數銖然培養士氣賴此一線而併去之何以為勸士之藉皂快工食猶官之有祿乃以養亷而併裁之彼安能褁糧奉公而不至橫視百姓也凡為此者皆權宜茍且之計非盛世所宜有臣意此時非中國得意之秋雖衛霍將兵未能窮追逺討以幸成功但宜為固守計蓄積糧草訓練士卒伺察邊情嚴烽火整器械謹斥堠以備之兵精則不必務多餉省則不憂財匱昔勾踐之治吳曰十年生聚十年教訓皇上春秋鼎盛如日方升長駕逺馭久道成治何必計旦夕之功竭天下之力以事一隅萬一民窮財盡外患未寧內盜蜂起何以處之莫若蘇息民力固結人心以為久安長治之圖進取恢復之本此兵事民生有強弱枯榮之勢未必非天心所軫結以冀皇上憬惺者也崇禎八年御史鄧啓隆民害未除疏臣聞趙宣子舉韓厥為司馬厥以軍法戮宣子僕左雄薦周舉為尚書舉即劾雄不應選貪汚若今戶部尚書侯恂舉臣者也臣為國忘私不後古人寧敢三緘請悉數其罪可乎大學稱與其有聚斂之臣寧有盜臣夫子三千之徒其鳴鼓而攻者惟有冉求聚斂孟子稱三王巡狩惟掊克在位則有讓從古聖賢惡言利之人如此其至也自流賊發難以來於今六年而無如客冬今春之烈所至之處民無不望風相迎甚有望其來而恐不來者何以故則困於徴斂與其飢死不如盜死計秦晉楚豫鳯廬之焚戮寧啻萬萬此萬萬之命誰殺之恂殺之也罪一也流冦平日之垂涎在淮揚金陵耳鳯陽之凋瘵賊亦稔知無奈方圍頴州而鳯之窮民逺幾百里相邀具以册授賊某家富厚某處無兵於是賊遂擁衆焚劫震動祖陵試問誰使發祥重地一旦化作煨燼恂釀之也罪二也祖陵既震感愴聖懷在外諸臣方勤于掫計招撫薄海內外延頸企踵仰應宥之詔令而恂且劾江浙吳楚各撫按住俸帶罪使扶杖觀聽之老幼僉訝寬恤之日何有此督責之嚴盛典為之不光罪三也人才者天地之所鍾育祖宗之所培植得之甚艱摧之甚易今海內科甲強半守令幼之所學壯之所行誰肯不以撫字為政者而恂不論地方不分豐歉嚴立參罰或前官之拖欠纍及後官或地方之瘠疲纍及守令有七八年不得行取者有降至二三十級者於是即有馴雉集鳯之賢不得不化為碩鼠猛虎之毒使海內之人才壞於參罰之苛酷罪四也語曰利不百不變法又曰知者作法愚者制焉昔龎尚通博考精通袁世振講求鹽法十年方奉特遣清理故變法而信從恂不學無術妄意紛更不規疏理之舊懸定取盈之額舊票銷至十年遼寧兩項俱增紙上之虛易填庫中之實難輸商人愁怨載道司計顰蹙求脫猶自詫曰寬其積逋導其壅滯將誰欺乎罪五也皇上所嚴禁者賄賂也內外諸臣無不洗心滌慮恂陽假考成隂規厚利考滿要無參罰考選要無參罰省直錢糧那緩就急或已解司府而未到者或止欠二三十兩者差役賫文入京道阻且長往返維艱不得不稱貸湊補又欲題開復竣事不得不稱貸備禮杜牧所謂不敢言而敢怒者也罪六也其他剝青襟廪餼減有司公費刻核太甚又其餘矣此等臣立朝一日則驤亂一日一時則釀亂一時今皇上明正典刑列其罪狀布告天下流冦聞之有不投戈解散百姓聞之有不呼慶更生臣不信也崇禎十三年刑科給事中孫承澤劾軍前私派疏邇因冦禍益深皇上特遣閣臣楊嗣昌秉鉞躬勦凡徴兵索餉之事內呼如雨司農臣初應之以新餉繼應之以勦餉再應之以練餉惟恐須臾稍緩無以慰任事之心且有以開卸事之口蓋已竭閭閻之膏血惟命是聽矣然孰知軍前之需取之部額者有限而私派之地方者正無紀極也憶臣待罪縣令時倐奉一文取豆米幾千石草幾千束運至某營交納矣倐奉一文買健騾若干頭布袋若干條送至某營交納矣倐奉一文製銅鍋若干口買戰馬若干匹送至某營交納矣並不言動支何項錢糧後日作何銷算惟曰遲誤則以軍法從事耳州縣之吏凛凛恐後間有借支正餉以救目前之急者然派之里下者則比比矣是以私派多於正賦民不堪命怨聲四起而行間之臣止計目前不計逺大於是綿延數省無一寧宇使從賊者無復還鄉之望為民者徒為溝壑之填嵗即豐稔萬亦難當况今值此百年未有之荒災也臣見我皇上念切痌瘝每於部請加派之際不知幾為斟酌豈意部中之加派皇上得而斟酌之而軍前不時之私派未行題明不奉部檄不知凡幾烏可置而不問也近日閣部軍前派徴益厲甚至小縣有派米稻三千石黑豆二千石粟米二千石者計價不下二萬餘此果勦餉乎練餉乎是驅民而為賊也何日平賊之有伏望聖明嚴諭軍前之需俱照部中撥定分數即有不足不妨明白奏請不許私行徴派使將士戀餉玩冦以重小民之困至於誓師已久敉寧無期宜文武諸臣認定限期仰遵明旨務期努力殱盡斷無留賊尚至十四年之理不然露布徒聞賊勢益熾將見軍實日墮民怨愈深竟於封疆何如也奉旨奏內私派米豆價不下二萬餘金小縣何縣奉何衙門私徴著孫承澤指實奏來該部知道又疏臣見邇來民生日蹙所在騷然大江以北幾無寧宇人止知歸咎於天行之災沴也又歸咎於部派之繁重也而不知軍前之橫徴苛派其害更甚臣頃具民力久困一疏蒙皇上令臣指實具奏請即以江北言之臣督餉其地兵燹荒殘之景目所親擊近聞鳯滁所屬坐派不一即小縣如全椒來安等處先後各派米豆亦至七千餘石蝗旱之後價值騰貴計費不下二萬餘兩檄文一至官吏攢眉蹙額小民魚驚獸駭真不啻身在湯火中者一處如此他處可知臣職司耳目敢不據實入告以為百姓請命哉至於督理勦餉原有部臣或係徑行或係轉奉閣部楊嗣昌之命望皇上敕江北按臣一察即明仍力為釐飭以蘇民困者也嗟夫小民竭力以養兵兵貪餉而玩賊究之賊不能一殱而立盡而民復轉迫而為賊上下相蒙日復一日何所底止臣亦惟望皇上嚴令行間諸臣速圖勦蕩以救民於水火而已崇禎十七年給事中光時亨王言更新疏竊臣見給事中孫承澤疏內有求皇上下罪已之詔一欵言極切直此誠今日轉亂為治苐一要務也以古帝王之盛猶凛於四海之困窮責夫省躬之六事故罪已而興蓋勃焉三代而後惟漢詔最著蓋漢承秦弊事必更始故其諸所詔令迄今讀之猶可想見當日規模鴻逺今陛下聖明天縱亦何罪之與有臣以為繇於有誤陛下者其罪實不容不論或人已往而是非宜明或人見存而賞罰宜當臣敢謬為縷指之孰為練餉之加以致民竭夫膏髓兵亂於抽募者乎孰為撫冦之説以致慘遍乎中原人習為媚賊者乎孰為欵敵之議以致邊臣因而懈守戰士為之灰心者乎孰催戰松錦以致八鎮精鋭盡喪荒原遂貽寧逺孤注之憂斷關門犄角之勢者乎孰鑿挖河堤以致汴城億萬化為魚鱉反開冒功幸賞之門為親藩避地之始者乎孰謂制科可廢以致鎮帥跋扈譁卒生心即今武辨紛紛薦文臣糾文臣救文臣仍踵其故智無所不至者乎孰為加等之律以至刑名日濫善類摧殘即今明詔煌煌議清獄議停刑議貰罪猶猝難挽回恩膏未遍者乎此輩姦深啓釁苛刻相因附其熱者有立然之死灰逢其螫者無不投之陷穽甚至尤而效之使風憲大臣傳殺人媚人之衣鉢以遍肆蜂蠆竄伏逆案逞如鬼如域之伎倆以遙制朝權隂險足以招外冦慘毒足以兆干戈結轖足以生疫癘乖悖足以致天變反覆足以長小人當其時或亦有小忠小信小功小利以互相歆動而不知其騙官市廕者巧於鬻封疆提線護法者善於竊威福以致財盡民窮神怒人怨皆此輩日漸月纍之所為陛下試一回思十六年來誤國諸姦歷歷如睹伏乞聖明立詢廷臣詳開姓名欽定一案大誥中外使曉然知禍亂所自起諸姦之罪案明而陛下之聖德益彰明綸所布凡深谷窮黎必感而泣㺯兵赤子必悔而返以有唐奉天一詔猶能動人若彼何况英謀睿斷逈出尋常萬萬者乎從來是非不兩立賞罰必並舉陛下先行此擊姦誅亂以杜後起之僉壬旋及於搜滯拔幽以收失志之豪傑所謂四罪而天下咸服舉逸民而天下歸心其此之謂矣夫遏亂有大勢尤有大機機之所在不可失也春明夢餘録卷三十六
