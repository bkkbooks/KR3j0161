body:
  text: 春明夢餘録卷二十四吏部左侍郎孫承澤撰內閣卜輔于天崇禎元年輔臣施鳯來等以枚卜請上允之吏部會推十員翼日召閣臣與吏科河南道至乾清宫前殿上諭輔臣曰內閣公孤大臣倘得其人社稷之福朕不敢自定欲求之天施鳯來對曰海內多事望皇上多㸃數員上頷之命內臣設香案上舉香一拜三叩隨設小桌置筆硯于香案之左前出紅紙十方各書一名為􅍐入金瓶內上舉匙拈之每拈一􅍐遍示侍臣然後舉筆㸃之再拈如前共㸃錢龍錫等六員上復拜叩禮畢還御座侍臣趨入叩頭謝來宗道浙江上虞人任禮部尚書楊景辰福建晉江人任吏部侍郎李標北直髙邑人原禮部侍郎起自請告錢龍錫南直華亭人劉鴻訓山東長山人周道登南直蘇州人原禮部侍郎起自削奪俱加禮部尚書東閣大學士起用舊輔崇禎元年戊辰三月上諭吏部朕勵精化理注意端揆近日政本諸臣維朕特簡雖庶幾和𠂻師濟之盛但主持國是尤藉老成舊輔韓爌忠謹直節淵識宏猷劻勷績著寅亮望隆方今時事多艱如斯良弼豈宜長違禁地兹特從閣臣及臺省諸臣所請以原官起用入閣特正揆席式資和燮之功期佐蕩平之治爾部即遣官到家敦請俾刻期就道用副朕側席延竚至意欽哉故諭特召密對崇禎二年己巳上御文華殿遣內侍特召禮部侍郎周宜興獨對移時漏下一鼓始出御史李長春毛羽健等上言聖主舉動宜慎一臣獨召非體我國家設閣臣以備顧問設九列以課職掌設臺省以資紏彈主封駁大小相維壅蔽不生皇上之意得無謂舉朝不足信不堪用惟延儒一人可信可用乎如此宜以所問答明布中外宣付記注毋徒使人揣摩於不可知之域不報未幾同溫體仁入閣辭召不赴崇禎七年甲戌二月溫體仁借內監王坤逐宜興去意在攫其首輔也三月上特召舊輔何桐城入朝在道屢引疾不許給事中黃紹杰奏從來君子小人不能並立如寵徘徊瞻顧則次輔體仁當知所自處矣自體仁為相水旱洊臻盜賊滿路燮理固如是乎秉政既久窺㫖必熟中外諸臣承奉其意用一人則曰此與體仁不合也行一事則曰此體仁所不樂也凡此皆召變之由乞命體仁引咎辭位以回天心慰民望上責其率妄不傳首輔首輔溫體仁病去時張至發為次輔例應傳為首輔乃半載不傳或勸張宜請病張曰無奈賤體頗健時傳以為笑一日上偶有宣賜稱首臣張翼日廷謝吳編修偉業上疏云前事者後事之師今日首輔之鑒取之溫體仁而足矣體仁學無經術則當講求仁義練達朝章體仁性習險諛則當矢志光明立身公正體仁狎昵宵人則當嚴杜言翕訿之輩體仁護持逆黨則當力繼忠孝之經毋如體仁之泄㳫偷容毋如體仁之游移飾詐庶乎聖恩可副衆望可塞也乃積習未化近日盛稱體仁之美曰孤執曰不欺夫體仁有唐世濟閔洪學蔡奕琛吳振纓胡士粦之徒參贊密謀有陳履謙張漢儒陸文聲之徒驅除異己何謂孤庇樞二則總理可不設而事敗乃設庇鳯撫則鎮撫可不移而事敗乃移何謂執皇上之决去體仁正謂其善欺耳家窩巨盜産遍苕溪自詭曰清孽子招權匪人入幕自詭曰謹何謂不欺然則首臣真以為孤執不欺乎夫使聊為嘗試之言實作更新之計臣何敢議如其不然則必因私踵陋盡襲前人所為將公忠正直之風何以復見而海宇禍患何日得平也閣試票擬崇禎八年乙亥六月二十八日上御中左門召詹翰九卿各官入見發御前章奏試以票擬至七月初二日傳諭吏部將尚書等官姜逢元陳子壯文震孟張至發蔡奕琛張元佐馬之􅀈閻仲儼張居年籍履歷開寫來看在籍各官有品望超著實堪閣員者也從公會議幾員來上諭吏部召在籍禮部左侍郎林釬禮部尚書孫慎行順天府府尹劉宗周作速來京越三日上命文震孟張至發俱升禮部左侍郎兼東閣大學士入閣辦事時震孟以注籍未與票擬蓋特典也御試閣員崇禎十一年戊寅上于中極殿御試閣員䇿題年來天象頻仍今年為災甚烈且金星晝見已逾五旬將謂主兵耶今方在用兵四月山西大雪凍斃人畜將謂邊地耶然時已入夏何所致歟朝廷腹心耳目托寄臣工今應擔當者嫌怨在念司舉劾者情賄繫心以致囂尤易起直枉難分何所憑歟欽限屢違冦尚未滅處分則勦局更張再寬則功令不信况勦兵難撤敵國生心邊餉缺多蠲留未已民貧既甚正供猶難侵剝旁出如火益熱至于重利尚欺分畛去公近多比比即有操守清謹者又自傲睨遂非必也俱令處置得宜禁戢有法卿等忠能體國才足匡時其悉心以對至六月十八日上命楊嗣昌以兵部尚書改禮部尚書程國祥以户部尚書改禮部尚書方逢年以禮部侍郎升禮部尚書蔡國用以工部侍郎升禮部尚書范復粹以大理寺少卿升禮部侍郎俱兼東閣大學士入閣辦事同事水火都給事中許譽卿應以資俸升京堂吏部尚書謝升紏之謂其爭官講缺也譽卿辨疏言臣屢劾輔臣溫體仁觸忌已深日思所以中臣升為體仁所舉欲逐臣以報舉主體仁竟票㫖革譽卿職為民文震孟亟挽之不得體仁出一疏稱病求去云前冡臣謝升參許譽卿疏蒙發票擬時同官中有與譽卿密交者以臣擬有殊干法紀一語意甚不平次日又蒙御批改票商之同官士升述吾騶震孟之意謂當擬聼勘或令回奏臣不敢徇及擬革職為民震孟忽然曰科道官為民是天下極榮的事以心膂股肱之臣為悖理蔑法之語臣不知其解上怒甚勉令入直令何吾騶致仕文震孟冠帶閒住回籍特用閣員崇禎十三年庚辰殿試後上召諸士問邊腹交訌何以復讎雪恥進士魏藻德對曰以臣所見不離明問之中內外諸臣皆知所恥則才能自生功業自建纍數百言朗朗可聼上為傾耳久之特定一甲一名至壬午十一月上疏陳兵事次年三月上召對大加稱奬遂升禮部右侍郎兼東閣大學士入閣辦事藻德辭侍郎之銜上改為侍讀學士再辭下閣議乃以少詹兼大學士聞警求去崇禎十七年甲申正月賊氛已逼二十一日上諭閣臣陳演等宜調三桂馬兵助勦餘兵尚多乘敵三邊新安頓未定之時此著似不可失原言用間係兩事即督臣王永吉請召見所言或亦不出兵餉兩匱關寧不能互援之意此等重大軍機應行與否原應先生每主持擔任未可推諉誤事上意諄切如此閣臣演持一寸山河一寸金之說猶豫不决樞臣縉彥曰三桂之調不調視寧逺之棄不棄兩言而决耳計臣吳履中亦以為然而閣臣不任也上復諭寧城一事前已經廷議宜速斷未可猶疑單修中前移寧士馬收守關之效成蕩冦之功雖屬下䇿誠亦不得已之思先生每即擬㫖來行如必須再議先生每即刻會官密議妥確來奏仍將各官議語各行親書備覽諭下內閣集部堂臺省于德政殿之傍而議之閣議如初力言寧遠當棄三桂當調者數人吏科都給事中吳麟徴爭之尤力演等乃請行督撫鎮再議寧逺棄後關門作何守法軍民作何安頓總欲完其不敢任之局也未幾賊陷宣雲京師震動演以病請允去督臣王永吉上疏劾之演入辭謂贊理無效臣罪當死上怒斥之曰汝一死不足盡其辜蓋深恨關寧一事也薊遼總督王永吉疏曰為乞誅亂賊以正人心以謝天下萬世事本月初四日職行次玉田閲邸報該閣臣陳演題為痛念時艱事奉聖㫖卿公忠敏練佐理有年朕方倚望輔弼宏濟時艱乃因國事多虞又兼有恙屢行面陳引退兹特允所請以成恬讓仍賜路費銀五十兩綵縀四表裏馳驛歸里卿還善攝以待後用該部知道欽此職讀未終憤悶欲絶異哉奸輔敢於欺皇上復忍于背皇上至此極矣方今邊烽正急冦禍甚張豫楚秦晉開門揖盜望風納欵川廣黔滇政令不通貢賦不入問兵則士馬凋殘戰守坐困甚且戕撫殺將反操同室之戈問餉則泉府耗竭本折兩枯實則財盡民窮久無樂生之趣要害不守咽喉將斷疆宇漸蹙禍變日多此乾坤何等時乎志士飲泣以長號忠良籲天而無路我皇上宵衣旰食焦思勞神正不知若何憂勤若何憤歎矣匡時定亂全在臣工有力者竭其力有財者輸其財各辦赤心共襄大計或運籌帷幄助日月之光或盡節疆場作山河之氣人人同仇處處敵愾勢如救焚情同拯溺即未必轉弱為强轉禍為福立見太平亦曰主憂臣辱主辱臣死分固無所逃情亦不容己也乃首輔臣演者不聞建䇿定謀輸忠排難俄作賦以歸來忽飄然而揚去既非年已遲暮何曽病入膏盲引退無因殊駭觀聼或者逆料神京孤危急思全身遠害遂不暇為社稷宗廟計乎若然既明且哲演誠多算矣其如皇上何當此危急存亡之秋付理亂于不聞方將築沙堤而緩步開緑野以怡情尋秋壑之芳踪享郿塢之樂事天理良心滅絶已盡尚謂有人臣禮哉且國家全盛之天下一旦破壞幾於不可收拾皆演之罪也恭繹明㫖佐理有年則非若百執事之效一官辦一職不獲與聞樞密者比矣又非若新經簡任得君行政之未久者比矣此數年中若肯公忠體國將天下兵馬錢糧文武將吏經心著意實實打算一畨如何禦邊如何辦冦如何清兵如何措餉如何用人早早商量急急整頓何遂貧寡决裂至此乃一味欺蒙一句不肯直說一事不肯擔當把持朝綱變亂成法職為外吏寵賄奸狀不及深知即如順撫趙惟嶽急欲抽身遂謂密撫可裁巧為出脫保督呂大器夤緣卸擔遂謂保督可撤曲計彌縫江楚冦警留都振動髙倬求去何遂併操江而裁之計典嚴重已露彈章邱祖德不謹何反舉東撫而畀之以至江督甫任遽登司馬之堂則呂大器之神通大也催餉不繼忽奉回部之㫖則莊祖誨之線索靈也他如李兆之貪汚而優升胡世賞之庸鄙而起用諸如此類不可縷指只此香火情深顛倒任意目中何曽知有聖明在上乎及見事勢傾危委而去之危而不持顛而不扶則將焉用彼相哉皇上方下罪已之詔演為首臣可得脫然事外告無罪于先皇耶近來草木皆兵遠近風鶴到處倡逃藩王不守封疆州縣不守城社所以狡賊乘之勢如破竹京師為四方根本正當鎮靜堅定以安人心演乃先去以為民望所稱腹心手足不二心之臣固若是歟演元輔也以臣背主則不忠又元子也以子棄君父則不孝不孝不忠罪並當誅伏望皇上數演之罪立正刑章俾天下萬世之人皆知誤我皇上者有陳演在庶無損于天地之大日月之明耳職為邊臣討賊禦侮皆職之責豈因天步多艱紀綱頓廢遂令亂臣賊子肆無忌憚輕朝廷而傷忠臣義士之心哉疏入不報會推二變崇禎元年十一月初六日癸亥上召輔臣并五府六部都通大及禮部尚書溫體仁侍郎錢謙益翰林院記注官二員吏禮等科河南等道掌印官錦衣衛堂上官來文華殿召對上御暖閣先召輔臣李標錢龍錫及冢臣王永光入商確移時三臣出上御文華殿諸臣行禮畢召入諸臣肅立召溫體仁曰卿參錢謙益受錢千秋賄以一朝平步上青天為關節結黨欺君之罪可是實的麼體仁奏曰字字都是實的上又問疏中語欲卿二則卿二欲枚卜則枚卜是怎麼說體仁奏此畨枚卜都是錢謙益事體不曽結不該起升如何起升如今枚卜不該推他在裏面他就是要枚卜了上召問錢謙益曰溫體仁參卿可是真的麼謙益對曰臣才品卑下學問荒踈濫與會推之列處非其據溫體仁參臣極當但錢千秋之事關臣名節不容不辨臣于辛酉年典試浙中與科臣暴謙貞矢公矢慎一時號稱得人初不聞有錢千秋之事臣到京方聞其事當時具有疏參他勘問明白現有卷案在刑部體仁奏曰錢千秋逃了徐時敏金保元過付之人提到刑部如何賴得過謙益曰不敢多辨現有刑部卷案上召問刑部喬允升奏曰此事在天啓二年臣三年才到刑部現有卷案體仁曰錢千秋並不曽到官謙益曰其實到官豈敢欺皇上上召部臣科道曰據體仁奏說不曽結據錢謙益奏結了卿等奏來王永光奏曰錢千秋事臣已經奏過皇上錢千秋到官結案了吏科章允儒奏曰臣當日待罪在科曽見招稿上曰招稿上是甚麼人納賄體仁曰錢千秋未曽到官只是照提上命禮部卷子並刑部招稿俱取來體仁曰當時還有科道參他臣在田間失記姓名謙益曰疏在錢千秋未參之前後來魏忠賢用事見臣與楊漣道義相交崔呈秀使臺臣陳以瑞誣疏陷臣體仁曰前疏在魏忠賢未用事之前難道也是崔呈秀上命辨疏與參疏俱取來體仁奏會推不與臣應避嫌引退不當有言不忍見皇上孤立于上是以不得不言上命諸臣暫退少頃復御殿命諸臣入召體仁曰卿參神奸結黨奸黨是誰體仁曰錢謙益之黨甚多不敢盡言上問王永光刑部招稿怎麼說永光曰臣不曉得原招是允儒看見允儒出跪奏曰臣先任華亭知縣壬戌行取蒙先帝拔入諫垣臣見同官顧其仁參疏有錢千秋的事問結了以後假滿回京見刑部有招稿刋本不記得刑部問官姓名今蒙召對頃聞溫體仁有疏參錢謙益冢臣云這是我們會推中之人曽見招稿未臣云家中偶有一個刋本因命人取與冢臣看體仁曰可見諸臣在外商議來的允儒奏曰枚卜大典諸臣矢公矢慎天日臨之在上皇上臨之在上臣等何敢有私溫體仁資雖深望原輕諸臣不曽推他如謙益有穢跡何不紏之於枚卜之前今會推疏上㸃與不㸃一聼上裁溫體仁以不與會推熱中鞅鞅體仁曰科臣此奏正見其黨允儒曰黨之一字從來小人所以陷君子皆是這等說臣猶記得當日魏廣微欲逐趙南星陳于廷諸臣于會推吏部尚書汪應蛟喬允升刑部尚書缺使魏忠賢加一黨字盡行削奪大抵小人為公論所不容將公論之所歸者指之為黨留傳至今為小人害君子榜樣上怒叱之曰胡說拏了錦衣衛扶出上命王永光奏從公會推至于結黨臣實不知上命部臣科道過來朕先傳㫖枚卜大典會推要公如何推這等的人是公不是公房可壯奏臣等都是公議上曰推這等人還說公議輔臣奏關節實與錢謙益無干上曰關節是真他為正考如何說不是他輔臣曰據刑部招是光棍騙錢的千秋文才原是可中的光棍知道他可中所以去騙上曰光棍作主考麼光棍中他的麼體仁曰分明滿朝都是一黨輔臣奏前事招問明白上曰招也是閃爍的輔臣曰千秋後來拿到了上曰卿等即去與在外文武諸臣從公會議不可狥私良久輔臣持疏回奏錢謙益既有議論回籍聼勘錢千秋下法司再問上曰是公議的麼輔臣李標奏曰臣等確是公議臣等共事堯舜之主如何敢黨上曰朕豈敢當堯舜只願卿等為臯䕫輔臣錢龍錫奏曰這所推諸臣品望不同也有才品也有清品如清品人說他偏執有才識學問的又說他有黨安得人都道好還望皇上就中㸃用上曰通關節是有才麼又責令二班奏禮部右侍郎周延儒奏曰錢千秋硃卷招案已經御覽關節已有確據不必又問諸臣上又詰諸臣曰今後會議要公若不公不如不會議延儒曰大凡會議會推只是相沿故套原無許多人只是一兩個把持住了諸人都不敢開口就開口也不行徒是言出而禍隨上目視延儒令奏職名上曰只有這官奏了數句李標奏曰關節原是與錢謙益不相干錢千秋原是名士中得的只是其人希圖僥幸被人騙了標又奏曰吏科章允儒奏事言語牽纒心實無他他是言官望皇上寬宥錢龍錫奏允儒是言官之長處之恐言官結舌上曰如何結舌他是吏科會推是他的事他豈能辭其責他是挾私多言卿等看不出麼龍錫奏言官皇上只要優容他上曰朕有過失科道官奏來朕不憚改只是不可挾私上命諸臣起覽思片時批㫖錢謙益關節有據受賄是實又且濫及枚卜有黨可知祖法凜在朕不敢私著革了職九卿科道從公依律會議具奏不得狥私黨比以取罪責其錢千秋著法司嚴提究問擬罪具奏上曰卿等怎麼說輔臣奏皇上處分自然至當又曰卿等直言如何說自然輔臣曰會推是一件好事如今就處分一個恐於大典不光上曰會推好事如何推這樣人往時閣中也只是一員雖如今多事卿等居中擔當首輔韓爌到日三員也彀辦事了會推且停卿等不必奏上命諸臣出諭內臣收前案傳入閣時漏下二鼓餘矣崇禎十五年壬午內閣魏照乘謝升張四知先後去賀逄聖亦以告得請止首輔周宜興延儒次輔陳井研演在直一日上允閣請下吏部枚卜吏部尚書李日宣令選郎盧化鰲約會吏科都給事章正宸掌河南道張煊照例內外兼推以蔣少宗伯德璟黃詹翰景昉姜南璽卿曰廣王少宗伯錫衮倪大司成元璐楊少詹汝成楊宮諭觀光李少宗伯紹賢鄭大司冦三俊劉少宰宗周吳少司馬甡惠少司冦世揚王總憲道直于五月十六日列名上請至六月初一日㫖令再推幾員通列來看吏部仍持前單令選郎商之掌科掌道再次第得十人林宗伯欲楫謝少詹得溥邱詹翰瑜王南司成廷垣閻宮庶仲儼徐少司冦石麒房副院可壯宋少司空玫沈大銀臺惟炳張廷尉三謨于六月初四日上請初十日召會推諸臣入對既至上賜饌傳免上遊西苑召二輔臣隨宜興以足疾辭獨井研在焉先是井研有親廖于義為御史及考實授井研託房副院為之地房堅拒之而掌道張煊持之益力廖于義上疏紏憲臣及掌道不公疏下吏部將于義降調井研銜之是日侍宴舟中上問及枚卜諸臣井研力奏此畨枚卜冢臣濫狥掌科掌道把持以不堪房可壯等情面濫推上屏左右令之再奏十一日上諭吏部會推有未到者宜促來陛見十九日召對諸臣中極殿至則仍賜饌上先召輔臣延儒演及已允告賀逄聖入德政殿賜坐賀忽放聲大哭久之上召兵部尚書陳新甲入詢邊事先出又召吏部尚書李日宣諭順天巡撫王文清為巡按梁士濟言其病狀誰可代者日宣以大名道魏公韓對又召都察院王道直諭將新授御史王燮蘇京王漢差分監軍援豫亦命二臣先出上即移駕過中左門入中極殿三輔臣亦入殿坐宴而賀復放聲大哭拜跪至數十不止上命之出及出殿檻外行五拜三叩頭禮復絮哭不止上召會推諸臣入對至二十一日奉㫖蔣德璟黃景昉吳甡俱升禮部尚書入內閣同首輔延儒等辦事會推大典當矢公矢慎勿濫勿遺况係輔弼重臣宜何如敬慎乃任意稱詡狥情濫推內如房可壯宋玫張三謨等是否皆堪斯任著吏部回話來二十二日吏部具疏回話二十三日召五府九卿京營總協及科道掌印來中左門召對首輔延儒以病辭不入賜饌畢上衣青袍皇太子定王永王皆衣紅侍案前行禮畢上喚吏部尚書李日宣來其聲甚厲上曰用人為致治之要用人不當吏部不得辭其責如今封疆多故督撫屢易天下安望治平記得兩年前曽面諭諸臣有寧背君父不背私交寧隳職業不破情面而今還是這等照管情面那能濟事昨者枚卜閣臣是何等事如何也狥情濫舉任意揚詡這事如此何况他事日宣伏地少許上曰何不奏來日宣曰用人是臣部職掌臣入嚴地兩載無小無大無不兢兢從事如督撫不得人用天下不得治平臣嘗以為愧至會推督撫則樞臣科道具在不是臣一人能獨行其意但用之而當臣不敢居功用之不當臣不敢辭罪昨者枚卜一事臣不啻萬分兢業即臣微賤姓名亦不敢循例輕入若諸臣才品原具在聖鑒中止是臣才識疏淺未及詳確臣該萬死上曰吏科章正宸河南道張煊來又曰房可壯宋玫張三謨來上曰你看三臣是否堪任閣員日宣奏臣初推十三員猶以為多後奉㫖再推科道諸臣皆欲仰體立賢無方之意廣收博採以聼聖裁如房可壯之峻節練識飽歷風霜宋玫之英資邃學諳于典故張三謨之風節凜然能持正論三臣之事業在後日非臣所敢知今日之用否在皇上非臣所敢必臣但知三臣原不愧枚卜上曰章正宸張煊如何說二臣奏冢臣凡事相商臣等亦相規勉如此事有一毫狥私納賄臣等可必其無三臣才品原俱可用日宣又奏此事臣亦要說個明白科臣此奏殊為不是今日之事只宜論其人之應否堪用如何只把不狥私納賄等語向皇上瑣瀆臣自入吏部凡事一任虛公有何規勸每遇會推必先令選郎與掌科掌道商妥然後約會九卿上推至于枚卜尤不比尋常所推之人掌科必商之六垣掌道必商之十三道大家敲推但有一不當臣部即不啓事從中酌定不敢纎毫任意臣事皇上十三年自為御史至今精白一心若有一毫狥私背公今文武諸臣具在皇上一一可問廷臣一一可參良久上曰六員都著錦衣衛堂上官拿了次早回話奉㫖俱革職刑部提問七月初二日部用貢舉非其人律擬杖具狀上請㫖竟以吏部掌垣掌道發戌邊逺與推三人贖罪為民是日上初欲行大法賴冢臣奏對詳明而止猶記是年余楚闈事竣遇賀公對揚于九江問以近事賀曰大臣謀國不忠主上振作無緒天下事萬不可為矣余亦言楚中之事禍在眉睫相對灑泣在路聞余以户科左轉刑科都比至都自念身為刑垣朝廷失政孰有如枚卜一案者遂補牘上諫奉㫖疏內吞聲荷戈士論共惜是成何語孫承澤著吏部議處原疏發垣見疏上硃抹二行然抹處用紅紙貼之紙痕尚在始知非上意也冢宰李公遇知持之不肯處久之聞上稍悔其事僅獲罰俸綸扉藥石吏科給事中章允儒閣臣忠告疏從來內閣票擬必有專屬凡有得失六科得而駁之自魏廣微交結逆黨專擅票擬一時輔臣依阿淟涊而中㫖奪封駁之權至黃立極專取易者與已難者與人而票擬乃分後遂為固然假令票擬未當甲乙可移臣等又何據封駁乎臣謂目前韓爌未至宜專責居前者擔當而更不廢參酌庶一㫖出而是非曉然輔臣亦不得交諉則幾宜一也皇上親裁庶政動法祖制輔臣當取祖宗典故禮樂兵刑用人理財大端一一講求凡遇召對如叩洪鐘毋以不知仰謝明問蓋輔臣平章軍國茍云不知誰當知者昔姚崇事中主尚能設十事以堅上意况遇聖明可無偉略所謂重救時之相則識宜練也先臣薛瑄為御史三楊為相求識面不可得若是乎言路之不敢與政府親也猶憶臣昔典試入朝罪輔廣微令人至臣寓求臣往見臣堅拒之乃賈試録竒禍今實封具奏自矢勿欺循例送揭已非古道况可踵門乎即或未有此事然漸不可開也願輔臣以集思廣益為心勿以疏亢而抑嘉猷勿以親近而增褒賞庶幾作忠鯁之氣披吐握之誠則心宜虛也臣所為輔臣忠告者以此兵部員外華允誠可惜可憂疏竊見三四年來皇上焦勞于上羣百工執事鞅掌拮据于下勿勿孜孜日不暇給而法令滋章臣民解體人材蕩盡根本受傷此臣所謂可惜可憂者也以皇上聖德加之勵精何難手握大權坐躋至治乃當事者借皇上剛嚴而佐以舞文擊斷之術借皇上綜核而騁其訟逋握算之能遂使和恆之世競尚刑名清明之躬浸成叢脞以皇上圖治之盛心為諸臣鬬智之捷徑可惜者一人臣典幹展采止此精氣今但以窺􅗎微指為盡心抉摘細瑕為快意乃至率屬大僚驚魂于回奏認罪封駁重臣奔走于接本守科直指風裁徒徴事件長吏考課惟問錢糧遂使官守言責止歸牒牘之繁吏治民生盡成勾較之務以多士修職之精神為小夫趨辦之能事可惜者二今何時乎非大小臣工同舟遇風之時乎而廟堂不以人心為憂政本不以人才為重四海漸成土崩瓦解之形諸臣但有角户分門之見意見互觭議論滋煩遂使佹剿佹撫等於築舍忽用忽舍有若舉碁以興邦啓聖之日時為即聾從昧之舉動可惜者三國家所據以總一天下者法也今雷霆所及幾莫知其方矣喪師誤國之王化貞何以與楊鎬異辟潔己愛民之余大成何至與孫元化並逮甚而一事偏誤一言偶咈執訊隨之反使輕猾者不以扞罔為懼而矜矯者且以對吏為榮刑罰不中鈇鉞無威可憂也國家所恃以為元氣者公論也今直言敢諫之士一鳴立斥指佞薦賢之章非訐則黨不惟不用其言并錮其人不惟錮其人又加之罪遂使諸臣相戒拱默喑塞求容是非共蔽忠讒互淆可憂也國家所賴以為防維者廉耻也今大臣握重權大官而有徒𨽻之心小臣惟望氣占風而鮮特立之操近者中使一遣妄自尊倨與之抗衡者僅二三人耳其餘奔走期會惟恐後時諂曲趨承猶虞獲戾皇上以為近臣可倚而不知幸竇已開以為內臣可惟吾操縱而不知其屈辱士大夫已如此矣貪競成風羞惡盡喪可憂也國家所藉以進賢退不肖者銓衡也古者宰相之職實兼今之閣部權太重而易以為奸國家罷設丞相于是用人之職吏部掌之而閣臣不得侵焉今次輔與冢臣以同邑為朋比惟異己之驅除閣臣兼操吏部之權吏部惟阿閣臣之意線索呼吸機關首尾造門請命夜以為常統均大臣甘作承行之吏加膝墮淵惟其所欲黜陟大柄祗供報復之私卿二美官兩手握定而私人遍布脉暗通乎南北封疆重寄一味游移致覆轍相尋憂獨遺于君父甚至庇同鄉則逆黨可公然保舉而白簡翻為罪案排正類則講官可借題逼逐而薦剡遂作爰書皇上惡諸臣之欺欺莫大于此矣皇上怒諸臣之擅擅莫專于此矣皇上厭諸臣之黨黨莫固于此矣威福下移舉錯倒置權熖薰灼正氣消靡可憂也臣區區之心願皇上尚德緩刑用賢去佞勿以至聖至神之資為臣下所誤勿以治人治法之大為奸回所牽勿過用嚴而使士氣人心日趨于頑懦勿偏為任而使名流善類永錮于清時使臣言得行即加臣以出位僭言之罪有餘榮矣給事中馮元揚政本名實宜稽疏臣惟今日邊氛未熄冦熖旋張涓涓江河馴致大戚所恃聖明哀痛率土同讐卧薪枕戈誼無再計然以臣私憂過慮固非一端積痼未瘳為患方大則獨謂政本一席治亂所繇實以表率之司而為弛諉之首尤而效之其禍安極當此主憂臣辱災並剝膚豈復微臣畏咎怵威喑默不言之日耶每見一二孤戅之流遇事抒忠時多齒路顧皆紏繩欺誤摘及細微斯則國人之所皆知明主之所必察但關名節無繫安危臣所鰓鰓竊不在此特以今日政本大臣往往居實避名受功辭罪平時養威賈重是其固然一至朝廷有事如漢制所謂天地大變天下大過者輒云昭代本無相名吾曹止供票擬上則諉之聖裁下則推之六部持兹片語遂叢百欺安得復有定識訏謨為中外文武倡其忠懇者乎夫中外之責則誰復有大于票擬者即以皇上神明天縱每出獨裁者以輔臣所擬視之諸曹條奏其為俞咈不啻倍蓰果若所云必如國初之制或以疏逖遽補訪咨或自綸扉仍還卑秩可云事權不在肩任為難今則體絶百僚任兼庶事有漢唐宰相之重而更代天言有國初顧問之榮而特隆位號地親勢峻言聼志行是從古柄用之專且重莫如今之輔臣矣若以經自上裁便可過歸君父則凡百司庶府逺近巨細所見施行固無有不取進止得自矯擅者使其得失盡諉朝廷紀官以來未聞斯義臣以為票擬一事輔臣生平人品心術邪正公私于此畢露皇上苐靜以照之嚴以呈之某事為某輔所誤某事為某輔所撓某人為某輔所奬某人為某輔所抑他日某票而當則某宜任功某票不當則某宜任罪揭其肺肝公諸耳目不許以閃爍游移之故智陰陽其詞不許以刻忮險仄之深機髙下其手則議任自清謀斷自定恩讐自不得徇功過自無所逃庶已棼之土宇猶可復萃所以慰祖宗之恫怨酬聖主之焦勞端無有踰此者治亂之分是在今日若仍悠悠忽忽佹謝佹承如頃者所以謀流冦載胥及溺當不知所底止矣昔唐太宗命諫官隨宰相入閣議事有失輒諫所以貞觀之治聲施不泯豈其事至今日猶可更忌人言區區誠無所避伏望皇上留意垂察御史詹爾選輔臣以去明心疏頃臣具疏駁陳啓新因而責備冢臣與諸輔臣蓋為大臣擔荷不力循默不言而發也乃近閲邸報大學士錢士升有微臣職分看詳等事一疏奉㫖詰問不勝驚異及得輔臣與李璡疏合觀之而後知輔臣有不忍不言之情且有不得不疾呼之勢也俄而輔臣引咎求斥矣俄而遽奉回籍調理之㫖矣明乎輔臣之以票擬去執爭去也夫大臣所以不肯言也其源在不肯去耳今輔臣肯言矣去矣上可對九廟之式憑下可質後世之清議隱以去就悟明主顯以氣節風百僚臣實榮之而獨不能不為朝廷惜此一舉也蓋皇上所不滿于輔臣者為其以心膂之臣而致疑于聖明之主耳臣則有說焉孔子曰君有諍臣父有諍子夫臣子之有諍皆從疑起也不疑而又何諍古來一德之世孰如唐虞維時臯陶矢知人安民之謨而禹輒曰惟帝其難之然則千古以上之能疑其君者莫如禹而舜未嘗以此貶聖且鰓鰓焉惟恐禹言之不盡也故從顯處諫者小臣之事也而從疑處諫者是謂幾諌此真大臣事而不意其以過慮無當于皇上也且輔臣所言者為何事乎李璡不識皇上為堯舜之君而敢導以非情非法荼毒富民鄉紳從來庸主所不屑為之事此關一錯大亂將興正輔臣憂心如焚之時而忽又奉有改票之命因是揣摩未當亦由驚懼愈深遂不覺抗章之汲汲耳竊謂輔臣此舉差强人意皇上方嘉許以示鼓舞之不暇顧以為相疑以為要譽耶夫人臣無故而敢疑其君非忠也若乃全不敢疑謂吾君為萬舉萬當以是為信其君也恐只容悅之借名亦非忠也人臣而習于沽名義所不敢出也乃人主不以名譽鼓天下使其臣爭為尸位保寵習成寡亷鮮恥之世界又豈國家之利也况今天下疑皇上者恐亦不少也何哉以天下人對皇上者皆中材以下之品也知常而不知變知平而不知竒知法後王而不知遵逺代如尚方劍不靈將卒驕懦日甚聖意恩禮感激威于斧鉞也而人見億萬之生靈徒以供韎韐之逗遛則或疑過于右武穿札與操觚並課非是者弗録聖意取聰明才技分注于騎射以助武臣之不振也而人見賣牛而買馬絀德而齊力徒使强冦溷跡于道途而父兄莫必其子弟則疑緩于敷文免覲之說行上意在暫蘇民困臣亦以為蘇民困也而或疑朝宗之大義不值數萬路費之金錢駁問之日煩上意在痛懲姦頑臣亦以為懲姦頑也而或疑明啓之刑書能當幾畨加等之紛亂其君子憂驅策之無當其小人懼陷纍之多門明知一切茍且之政或拊心愧恨或對衆欷歔種種隱情有難殫述輔臣不過偶因一事代天下而發憤耳而竟鬱志而去也輔臣之去以言而自後之大臣恐無復敢言矣大臣不敢言而小臣愈難望其言矣所日與皇上言者惟此苛細刻薄不識大體之徒似忠似直如狂如癡售則挺身招搖敗則濳形逋竄駭心志而爚耳目毀成法而釀隱憂天下事尚忍言哉伏乞皇上以逺大宅心以簡靜率憲責大臣弼違之義作言官敢諫之風嚴敕下內閣部院大臣不得以去輔臣士升為戒寧獻可贊否無藉口聖明獨斷掩皇上之謙冲寧進禮退義無藉口君恩未酬飾自家之濡滯務期上下交格志氣聿新于以覩廓清平治之猷成綱紀風俗之美庶幾有日矣中書陳龍正特闡揆職疏本朝不設宰相然今之輔臣上效啓沃下倡寅恭職無不統世廟寶訓云此官雖無相名實有相職洋洋聖謨至矣哉古人每言如某者宰相才也夫明相職然後可辨相才相職云何居恆則位置六卿有事則謀定大將是也英宗皇帝諭輔臣李賢曰今六部尚書庶皆得人蓋知天下治安由六卿而獨與賢面商正謂賢之職事宜與聞乎此也他日又曰吏部乃天下人物權衡命舉左右侍郎賢遂舉姚䕫舉崔泰是則六卿稱職皆賢之能使當年六卿有不稱而賢狥顧情面不以入告皆賢罪也故位置六卿者揆職也世宗皇帝諭輔臣張孚敬李時曰六部須要得人吏部都察院尤為緊要因傳諭分别諸臣才品他日又因吏兵二尚書缺與時及翟鑾面議其人遂以王瓊居冢宰王憲居本兵蓋深明致治得人之綱領而獨與輔臣議者以輔臣又吏兵部院之綱領也下至羣僚賢否草野逸才皆輔臣所宜留心而不得專以票擬章疏遂足盡帷幄論思之職業也所謂謀定大將亦以近事驗之正嘉之間有楊廷和張孚敬則能信本兵王瓊能一再起用王守仁而南昌定思田平諸苗蕩矣萬歷初有張居正則能委王崇古專制而諳達欵和數世矣能委戚繼光修守禦而諸邊十八年不聞警矣故能定大將然後可以為輔臣史遷云興聖統在擇將相特為孝武言之其實天子之事惟在擇任輔臣輔臣得則諏謀大將者亦輔臣事而天子無煩拊髀也李敬告世宗皇帝云人君以論相為職謂此也頃者輔臣常數人不為不盛然未聞有以搜訪異才足民裕國賑災弭患為己任而分至尊之憂者豈真無心報主退然甘讓古名臣亦多謂票擬之外無他司習慣而安耳臣愚以為今後凡遇卿二專閫員缺會推既上宜各以保舉之事責之俾得各出目力各吐赤心并其平日胸中所識不拘大小文武山林隱逸但係真才悉令分别行能堪何事之任堪居何職隨時開奏歲月之間皇上總計其所薦孰當所當孰多多稱職即某輔也知人少稱職即某輔也不逮將得人而兵戢冦弭即某輔也功將非才而兵驕冦熾即某輔也咎宋儒程頤言天下治亂責宰相而孚敬疏謂今之內閣宰相職也宣流德化必始自內閣謂此也至于他事小有得失未足以定輔臣之優劣也如此不惟朝廷可得多才又可因薦才以别輔臣不惟已用諸輔分量因兹較然即欲求良輔于方來亦可以此法預試而儲之矣取人圖治豈不至簡至要歟所謂謀定大將亦須先辨大將之才將才有二要能戢士也能用間也夫士卒戢之平日甚易臨陳驅之必死甚難諉其易而能其難萬不然之數也今客兵所過城守望風披靡豈兵真不可禁也將不能御耳故曰將才以戢士卒為第一義至于軍中機要則在用間年來我屢為敵人所間而我曽未聞一人能間敵人者敵為客而反明我為主而恆暗潰師失守曷足怪乎蓋知己莫先戢士知彼無過用間所謂智仁勇信嚴與一切因時因地出竒合變之道舉包其中輔臣與樞臣論辨將才為推轂之綱領惟宜精考于斯二者或曰本朝權歸六部遴擬文官吏部事推舉將帥兵部事孰敢冒侵官之嫌不知擬推文武原出銓樞但所當推則宜入告爾后允而行之不當則宜入告爾后駁而更之惟夙昔注心臨時始能辨其當否設銓樞所推終繆雖輔臣自舉所知可也更議銓樞亦可也至自舉之更議之而必無不當則非古人之論相所云一心正兩目明者孰能堪其任哉襄密勿忠國家惟斯事為最大不然以用人得失直委銓樞輔臣一身超然長立于是非擔當之外盍思蒙鑑賞獨深受恩數獨隆其于報禮酬知究竟所主者何事耶伏見我皇上十餘年求治謀兵謀餉憂勞萬端竊謂宜且勿憂餉而憂兵兵精則餉自省又且勿憂兵而憂將將良則兵自精又且勿憂將而憂輔臣輔臣賢則銓樞部院多賢而良督撫良將帥自出故特闡揆職以為明主聚精會神地而治效可歲月計矣再闡揆職疏竊惟票擬一事未足盡輔弼大臣之職而今日輔弼大臣果欲就票擬一事以盡厥職則亦有道焉凡諸司章奏其言非當則違其事非可即否其意非私即公未有介于兩者之間茫無定持而可低昻二三其斷者也所藉于票擬者正謂為誠心觀理折衷求平使票擬果當雖偶值發改亦宜詳悉敷陳某事理合何如天心至虛必能轉圜是則票擬之中具有啓沃之道若隨發隨改至于再三謂原擬者非耶豈其始有未竭之心謂原擬者是耶繼何以不堅其信皇上孜孜求治無問巨細槩期精詳所以一再發改者不過欲事理得平曉然見其斟酌裁處之故原非必盡更初擬始可允愜聖懷且以外間事理喻之郡縣詞訟申報撫按其稍重大者撫按必一駁再駁蓋亦致詳致慎豈欲槩翻初招郡縣抱公心持定見者覆報明確原招允行十固八九以聖明天縱豈有輔臣能覆申前說果平如權衡洞若指掌而不逌然樂從者乎說命曰后從諫則聖皇上于羣臣葑菲時賜裒收况委以股肱心膂之重論道經邦又非若親臣小臣補闕拾遺之難為力者耶唐宰相李絳有云知而不言臣負上言而不用上負臣今願諸輔臣皆以絳之志為志可也頃自行人司司副倪元珙疏稱閣臣票擬各自注名料今日諸輔已無不殫厥心之患惟念可否有一定是非無屢遷謂宜深體聖明發改之心求至是于初擬矢至誠于復奏則諸輔品職各可自見而皇上亦得洞見諸輔之能明良交賡庶事康哉孟子曰責難于君謂之恭臣以堯舜期君因以益稷期輔臣今一日而再效責難之說固臣所以致其恭也若乃本朝相業首稱三楊三楊當日惟以保舉衆才商確六卿為務如掌院劉觀貪士竒與榮劾去之而舉顧佐代卒為名臣自後楊一清翟鑾共舉胡世寧掌院而請罷原擬王時中費宏亦舉姚鏌為兵部尚書總制三邊世宗即傳諭行不待部推是輔臣之克舉其職者于中外大僚時時仰贊廟斷固不止票擬為司明甚而况或少曠于票擬之內其可哉臣再考國初罷中書省歷朝止稱閣臣欲名與事相符也邇者閣員有缺廷臣章請恆借枚卜為名詳稽禹謨枚者指大功臣卜者謀及龜筮非謀及乃心卿士也與今推㸃閣臣事體非類語稱舜湯選于衆舉臯陶伊尹帝典曰使宅百揆于此參酌其間因義定名自有攸當或云選輔猶簡在帝心之義也或云命揆猶俞往汝諧之義也或徑云推舉閣員則爵人衆共之義也務使名與事符以仰追聖祖不設宰相本意并備末議供採納焉御史吳履中攻補闕失疏皇上仁明威斷鋭意幾康好學勤政敬天法祖嘉猷懿德史不勝書有何闕失尚需攻補雖然皇上虛己責躬臣子匿心獻諛則慚負聖明之盛矣臣謂皇上之失有二一曰大奸之罪狀未彰而身為受過一曰圖治之綱領未挈而用志多分皇上臨御初年天下猶未大壞也特簡一溫體仁顯托嚴正之義陰行􅎱嫉之私凡正人君子必百計摧折以致賢士解體救過不遑使朝廷不得任人以治事而釀成大亂之源者體仁之罪狀也專任一楊嗣昌以欵撫為忠謀以四事為實政加練餉以刈割海內致使民怨天怒災旱頻仍四海困窮盜賊蜂起而結成大亂之勢者嗣昌之罪狀也皇上所信任無如此二人二人恃皇上之信任以售其奸欺不知如何忠愛如何匪躬以自結于皇上逮深信不疑然後得為所欲為無不如意其所欲為者先做成一不得不為之機彀待皇上發一意㫖而遂見諸行事有執以罪彼彼不任受曰皇上自為之皇上亦曰彼實未嘗專擅也乃益深信不疑是以二奸誤皇上而反卸責于皇上皇上為二奸所誤而反為二奸代受過也夫臣子為君父受過分也誼也豈有君父為臣子受過之理皇上自君臨以來無一念不善無一事不善而奸邪輒借以濟其惡如治尚嚴明也而引之于苛刻刑欲當罪也而引之以從重皇上念與事之善無由見于天下而亂臣賊子無知小民遂見為朝廷闕失敢于非議而叛背之孰知皇上固十五年如一日哉今即下罪己之詔俾父老扶杖往觀相顧流涕亦祗曰天子至今日始翻然悔悟孰知其十五年如一日哉誠以兩奸罪狀暴白于天下使天下皆知皇上為二奸所誤而未嘗自有闕失則聖明之戴翕然無間亦收拾人心大機括也至于圖治自有綱領聖人撫世酬物因時制宜世治則潤色太平為制治保邦之計世亂則幹濟屯蹇為撥亂興治之謀要惟相天下大勢緩急而輕重布之如今日者亂極當治之會也內治缺而後戎馬生民生促而後冦盜起向者𤇺急于外而政治愈棼冦起于內而賦斂愈急是以生亂䇿救亂何惑乎亂無已而益甚也近始反其所為省躬厲翼治有紀緒蠲租解網民有生機亂源已塞急宜求治兵之人真能禦邊者任邊隅真能勦冦者辦內地先了此兩大事而治功可次第舉矣選賢自輔敦勉臣工司調燮者以平格理陰陽秉樞衡者以公衷董僚屬庶官蒸乂百職交修漸至天心降順大有書年便可整頓皇猷恢張化理將國家數百年之紀綱法度陵夷而壞亂者悉行修舉千百世之基圖統緒缺略而廢墜者從此創垂皇上為法今傳後之主羣工為幹蠱開泰之臣千古盛明拭目可俟若委托非人紛絲求理臣未卜成功于何日也皇上以天下為一身其精神當無所不周貫以古今為一堂其學問當無所不并包兢業萬幾間值閒暇何可用心于元虛無益之事况釋宗道𣲖不過為我兼愛之源流孟子所謂無父無君之教聖人之徒所當禁而闢之皇上甚不可惑志于此也唐貞觀中引學士番宿更休與討論古今宋亦令名儒夜直禁中不時召對蓋聖賢義理所以栽培此心神明之地時加灌溉則與天地民物自然不相間隔而精神默運無弗貫通時復翻閲經史觸發理趣考證事變無事而靜有感輒通闕失無自來矣吏科都給事中章正宸欣聞下濟疏履端肇慶羣寀呼嵩有喜天顔忽遣中使宣閣臣入殿一時鵷鷺咸愕眙為希有盛事引竚良久導駕導表同官班散臣始竊聞梗概不勝手額曰有是哉端冕以臨之折節以下之調和以望之師保以稱之股肱心膂以託之志同道合以叮嚀之學焉後臣帝王盛軌而不世遭逄也顧閣臣何德堪此以矢報我皇上哉今時勢最大且急者兼裕公私澄清吏治內平流寇外制四裔孰非閣臣仔肩能不急商辦此四者之法而訪求辦此四者之人乎若夫感孚帝衷贊襄廟謨宏開言路收拾人心此四者不由閣臣身親為之更誰任乎以漢陳平猶知理陰陽順四時遂萬物之宜鎮撫四裔諸侯親附百姓使卿大夫各得任其職為相務也而况親見堯舜者乎昔商宗之命傅說也首言啓心沃心今閣臣所造膝請者必無敢有祖述刑名􅎱嫉之說掊克聚斂之文者矣而夙夜靖共其果藏身以恕乎從來先格君而後事功可建亦必先積誠而後君心可格何以故凡人主菲薄左班朝士必因外廷無一人一事足稱意㫖茍能不與中官作緣不憑恩怨起見不以寵利居成功不以爵䘵私親昵而任一二大事不驚料一二大事不惑自足以起皇上敬信敬信則宫府通委任專而百事辦矣閣臣事辦總在知人呂公著見士大夫以人物為意者必問其所知所聞參互考實以達于上王淮問楊萬里先務萬里曰人才因疏朱熹以下六十八人虞允文為相嘗籍人才為三等有所見聞即記之號材館録是國計邊防非不喫緊揆之用人似猶第二義而所用之人惟吏兵二部尚書最急如皆賢也則閣臣當與同心共理有不賢者則必更置之何悠悠忽忽為也其次講官其次諫官其次督撫其次提學其次總鎮至于文選職方兩郎須精擇而久任焉更得賢掌院注意巡按御史嚴為殿最則州縣長吏孰不化枉為直若是者然後百姓親附羣才奮庸而諸事就理矣以今扆寧配羲軒之德社城絶狐鼠之緣時際道行躬逄聖作贊平章而翼協和俾天下猶有納溝饑溺閣臣豈不抱恥實欲式酬天奬惟在以人事君罄伊呂之衷蹀臯䕫之軌奏太平之績斯真萬世一時也臣方齊袚繕疏間又有愓于天人之際焉是夕也同雲忽合雨雪載塗道路歡呼有年叶卜和氣致祥于兹徴信臣惟日祝皇上以天自處下濟光明而已給事中傅朝佑論內臣不宜參閣臣疏夫公論國之元氣也故為臺諫者以天下公論為主臣讀王坤一疏為岌岌乎有履霜堅冰之懼也昔太祖髙皇帝垂訓有曰為政必先謹內外之防庶得朝廷清明紀綱振肅大哉王言實萬世治平之鑑歷漢唐宋以暨我朝其間治亂相尋往轍未有或易之者也我皇上慮周邊境用王坤監視宣大而未嘗令其操彈劾之權司中朝之議論也乃一參再參近且浸淫幾于閣臣試思閣臣之上更有何人日進不已長此安窮是幾于輕朝廷矣易有之由來者漸言不可不辨之蚤也縱令閣臣有過朝廷有缺上有典章下有清議今朝廷耳目之司不乏人乃令中官漫言天下事書之史冊其何以示子孫而傳後世哉臣于是乎不能不為首輔咎焉當遣內臣之始滿朝諌官何不近援祖制逺援漢唐宋之覆轍以力諫即不然相率以去就爭之皇上神聖聰明當必轉圜而聽而奈何泄泄㳫㳫坐視其至此極也臣于是乎又不能不為諸輔咎焉當令票擬王坤之疏曷不直言奏上正義責坤為皇上遵祖制為朝廷持大權為天下昭公論而奈何唯唯以聼也失今不爭後將何及矣臣蓋不意王坤為此言也廷臣僉謂為此言者非必王坤也其文詞練達機鋒挑激是必有陰邪憸人附之而起而借王坤為發端以嘗試皇上此臣不特為閣臣一時惜而深為國體惜深為天下治亂之大關惜也夫臣之言迂言也亦正言也祈皇上幸聼臣言裭斥之生死之惟命乃臣之心區區憂國之心也臣不惟愛朝廷愛世道并愛中官夫中官權盛亦非中官之福也方今搆結者漸起中外皇皇無敢為皇上言者天下事不堪再壞矣詩云不愆不忘率由舊章書曰鑒于先王成憲其永無愆願皇上遵祖訓提公論以上稽往古正責王坤而撤回內遣于以清議論而正國體消隱禍而課實功其于治平之計豈細故哉春眀夢餘録卷二十四
