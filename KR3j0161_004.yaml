body:
  text: 春明夢餘録卷四吏部左侍郎孫承澤撰畿甸京師地屬順天府其府治即元大都路總治舊署也先是遼升為京立幽都府又改為析津府至金為大興府元初為大都路號大興府官署為宗正所據官吏辦事佛寺中至大中監路平章政事莫吉奏請以錢四萬二千五百緡買靈椿里周氏地計十九畝建為公署永樂定鼎於此遂因其署而為順天府歷朝來皆為京兆重地在元所轄州九縣二十有三今領州五縣二十二洪武中微有不同據天文分野書載北平府支郡四涿州通州霸州薊州親領縣十一大興宛平良鄉永清昌平密雲舊州東安舊州固安舊州順義舊州香河舊州懷柔新立涿州親領縣一房山舊有范陽縣附郭後裁通州親領縣四三河武清寶坻漷縣舊州舊有潞縣附郭後裁霸州親領縣三文安大城保定舊有益津縣附郭後裁薊州親領縣四遵化豐潤平谷玉田舊有漁陽縣附郭後裁大興宛平在元同為赤縣畿內郡縣親領於六部故曰直隸而順天府在輦轂下與內諸司相頡頏不以直隸稱漢之京兆宋之開封其權極重開封牧至以皇子領之舊制三品衙門用銅印順天府印用銀誠重之也其職掌京府之政令宣化和人勸農問俗均貢賦節徵繇謹祭祀閲實戶口糾治豪猾賑恤窮困清録罪囚務察知百姓之所疾苦而時撫摩之嵗攢實徵十載造黃册凡賦役皆按册丁産而均適之嵗貢府學一人三嵗合試圻府生而貢士焉月朔奏老人坊廂聽宣諭嵗立春迎春進春耕藉田奉青箱播種以從核勳戚家人季終引造帳上國有市易平其價召商而時給之凡學校軍匠積貯牧馬柴炭河渠堤塗僧道醫藥之事宣德中令所屬地方每丁種桑棗百株官擇耆老勸督天順中令於宛大二縣各設養濟院以處貧者成化六年府尹閻鐸以嵗飢坐視民患不能賑濟降衢州府知府府丞而下並巡城御史加罰有差府堂懸宣宗皇帝御製針奕奕京師四方所瞻京尹之職民庶事咸周之內史漢之三輔不輕畀人擇賢以付國家因之有尹有丞亦有庶僚用贊厥成茫茫區域輦轂其本王者施仁篤近舉逺爾體豫懷務勤以周情必上通澤必下流氷清玉剛準平繩直毋憚豪右毋縱姦慝趙張邊延顯顯有規毋愧古人祗我訓辭按府尹即秦漢內史之職掌治京師漢景帝分置左右內史武帝更名右內史為京兆尹左內史為右馮翊又更所謂都尉者名曰右扶風共為三府治長安城中唐京兆府置牧一人以親王為之五代置開封尹宋牧尹不常置太宗真宗皆常尹後設權知府一人以待制以上充典司轂下為要劇之任順天二字乃史思明僣位於燕之年號宋熙寧中發地得大錢二十餘千文皆順天得一蓋順天乃其偽號得一則其錢名耳然則固不若北平二字之為得也萬歷二年戶部題順天府宛平大興孤貧張祿等四千五百九十四名口支領冬衣甲字庫發給布四千五百九十四匹京師古薊門宋沈括曰余奉使至契丹界大薊茇如車其地名薊恐其因此也如揚州宜楊荆州宜荆之類荆或為楚楚亦荆木之别名也雷禮順天府題名記京師古設內史漢改置京兆尹服銀章青綬佩水蒼玉其地居轂下慿城社者類橫恣抗法加之五方蠻貊湊集緣為姦市難格風靡所及為萬國取則故唐宋以來選遣皆人望尹或以親王為之小事專決大事則稟奏受成旨者刑部御史臺無輒駁異蓋肅清京師鎮撫畿甸必隆重其任有若此我聖祖定鼎金陵稽古設應天府置尹丞等官司輦轄至我文皇龍飛北平遷都改北平布政司為順天府於永樂六年先置尹丞等官如應天以後遂為都輦重職延今百有五十三年典守定於聖謨者赫然具在而年久法弛事變叢生一切徵派和買之類干沸中禁出於繩限部臺往往以勢下諉而一二養望自全者凜不敢詰積為民蠧間有挺節廷諍以肅清鎮撫為己任則云生事沽名九原可作安得起國初名京兆與之論職守也哉確山受齊劉公總尹務鈞陽頴谷馬公以丞副之慨然有槩於中思法前修表京師因閲碑刻多訛逸復搜輯增次具其姓名籍貫及歷官大略鐫之於石請記於余余惟古之圖容貌表室廬記官氏使善者知思而慕之因以久其善惡者知指而譙之因以久其惡凡以示懲勸策事功也况自昔京兆行事得失載之史籍萬世可鏡又不徒為一時四方取則而已唐人諺云前尹赫赫具瞻允若後尹熙熙具瞻允若言敷政寬嚴不同其以治稱一也又云前尹舉其綱而太簡次尹綜其目而太密後尹毁常法而取一時之聲言寬嚴失宜均之為世所譏今二公坦易相符政不務苛細而繩檢截然人方以赫赫熙熙並譽乃又即其前刻於石者時觀省焉孰為秉忠勵世戢豪右於黎庶如趙張在漢吳許在唐包范歐陽在宋毅然思齊如摳衣侍教於一堂則彈壓所加姦恣斂縮而仁惠沾濡民若更生自足以重京輦則四方矣逹之畿輔相與歌頌曰前有某公後有二公固不待睹石刻知名而聲稱不朽將與古名京兆並傳彼愒時巧宦如仲方黎幹之脂媚尹丞不輯如行餘棲楚之相訕不無其人而重以為戒獨非成事之師也哉愧豫前尹順天不足為後人景法此亦竊載名之榮云葉向髙順天府題名記令甲三嵗一計吏治自嶽牧以至尉史鱗集於闕庭而京兆實攝郡事綱紀之意蓋云維兹郡吏其式化於王畿故郡吏之視京兆不啻望表赴鵠夫內備列卿而外倡九牧秩尊而於民親則無如京兆者二百年來名公巨卿多由兹奮確山劉公嘗刻其名於石而司空豐城雷公為之記嵗久石溢今尹廣陵錢公少尹關西劉公礱石續紀而以記屬余夫司空嘗官京兆宜能言京兆余越俎而談非其任矣然余有職於掌故不能辭則嘗取司空言讀之若慨然有慕於國初諸臣之丰裁而恫切於年來因循叢蠧之非是其為京兆規不啻詳矣余惟國家初造耳目雖新聲靈震乎遐陬而功令肅於庶府京邑翼翼四方之極奉職順流亦可以為理故其治易也其後襲恬承熙輦轂之下日膏沐㴠濊於太平之休澤寖以窳惰而五方殊技輻湊灌輸奔命於上國都市之政雜而多端姦日萌生治稍難焉又其後則恬熙益深耗蠧愈甚九閽之聽既高而豐蔀之勢易壅郊圻之內若隔萬里勢家寺人作姦犯科官府之憲令閡軹而不行因循則虞偷操斷則虞掣繩墨周密日不暇給京兆之難治遂為天下最矣蓋嘗總郡國之政論之其在開創則外難而內易何者依日月者愈近而愈易為光也其在承平則外易而內難何者慿城社者愈近而愈易為蠧也方司空時去國初才百五十年度事揆勢已異昔日馴至於今又數十年矣職京兆者其感慨歎息當抑又甚焉弊久則窮窮則復思其始今日之京兆亦起弊反始之一時已在漢以賢京兆稱者則趙張三王然大都皆以精嚴為理而治行第一之黃次公一受事而輒謝去此何以故本始元康而後漢當極盛宦戚漸滋五陵豪少夤緣恣睢浸不可問如史所稱吏民懈弛桴鼓數鳴厪縣官憂此其時亦稱難治而次公一切以郡國寬和之法行之宜其格矣故夫勢有宜乘化有宜更難易之形殊不可以一術操也要於補偏苴漏酌緩急之施疏宣底滯無所壅閼惠京師以綏四國斯惟尹之任而稱乎其為羣吏表已今天子神聖加意三輔赫然有願治之思而錢公劉公皆當世名臣協力同心以理京兆將見畿甸太和百度咸修寧復有如司空之所慨也者夫數之相禪貞下起元彈冠振衣猶從其新而况躬奉寵靈為郡國首者乎是名之新題或亦事之適相符者豫故樂為之記以請於二公若夫建置之由事權之重寬嚴忠佞之不同足以鑒往詔來語具司空記中在事者業稔聞之矣春明夢餘録卷四
