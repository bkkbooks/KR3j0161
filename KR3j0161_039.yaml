body:
  text: 春明夢餘録卷三十九吏部左侍郎孫承澤撰禮部一禮部在闕東户部之南西向宣德五年建時府部公署皆未營造以典禮之區萬方會同有事於此遂首建焉至六年六月成賜宴落之公侯卿二皆與焉本部尚書擬春官掌天下禮樂祭祀封建朝貢宴享之政今敘辨階秩以贊於天子侍郎為之二其屬初曰儀部曰祠部曰膳部曰主客部後改為儀制祠祭精膳主客四司俱稱清吏儀制掌禮文宗封學校舉貢之事天子即位天子冠若納后若册立皇太子若上慈宫徽號若朝賀朝見若大宴饗則舉諸儀辨其名數條上之報可而今於諸司凡傳制開讀表箋學校貢舉文移印章官民服舍皆辨儀式而頒之諸司凡巡狩親征班師䇿勛行賞第禮儀條上凡祥瑞辨其物名類奏大瑞特奏無得請封禪以蕩上心以鄉飲酒禮讀律誥訓禮讓以養老尊高年以恤貧宣仁政以旌表章勸勵以建言議利病以連坐謫戍禁官邪祠祭掌祭饗獻薦天文國恤廟諱之事辨大祀中祀小祀之等而敬供蠲飭第其牲帛配侑從介差其禮樂凡王國司府衛所州縣祀典神示稽令甲而播之百司督日官歷象而在其徵變日月食起止分而豫移諸司大災異即聞次類聞並乞修省凡國喪若品官庶人喪皆辨其同姓九族異姓母族妻族親疏之等而為三年期大功小功緦之制傅古喪禮損益頒行之凡諡帝后妃太子太子妃王郡王以字為差次勛戚文武大臣請祭葬贈諡移諸司核行能傅公論定議以聞其侍從勤勞死事官品未應諡若藩王貢使得特諡凡帝后愍忌祀於陵輟朝不廢務凡天文地理醫藥卜筮師巫音樂籍其人毋得以術越境興妖妄毋藏讖緯元象凡僧道三年一度度必通經咒周知册檢其偽冒而嚴其禁令凡雅樂屬於祠祭太常領之俗樂領於伶人主客掌外國朝貢往來宴賜之事凡外藩辨其五年三年比年年至年再至之貢與其貢物貢途貢使豐約遙徑多寡之數王若使至賔待之差其迎送宴勞賞賚室廬帳幕食料之等嗣封者為請使頒册於其國諸大酋有保塞功者授册郊封之以信符徴勘合以金敕諭差發以通事譯夷情以開市平交易以折計收畨貨以刑典禁交通凡賜均賞特賞各有差凡役中歲徴其方物有常式精膳掌宴饗牲牢酒膳之事凡膳羞珍品酒醴光祿領之會其數程其出納凡貤宴辨職官品秩之等凡外藩土官辨下程宴次食料多寡之等凡厨役僉諸民次僉諸王府典膳之久次者凡歲藏氷出氷移所司謹潔之成周盛時以禮持世凡其所以建國而辨方正位體國經野設官分職以為民極者皆謂之禮不徒以祭祀燕享冠婚賓射以為禮也太宰掌建邦之六典以治典為先而禮典僅居其一然其書不謂之治而謂之禮秦漢以來凡其所以為治者皆謂之政特以其所以施於郊廟朝廷學校而有節文儀則者則謂之禮蓋三代以前以禮為治天下之大綱三代以後以禮為治天下之一事古今治效有隆汚之異者以此禮制夫子遺經皆經諸儒校定獨禮無成書朱子於寧宗四年致仕家居始修禮書名曰儀禮經傳通解其書大要以儀禮為本分章附疏而以小戴諸義各綴其後其見於他篇及他書可相發明者或附於義其外如弟子職保傅之屬又自别為篇以附其類其目有家禮鄉禮樂禮邦國禮王朝禮喪禮祭禮大傳外傳其大體已具者蓋十七八先是草奏欲乞修三禮曰遭秦滅學禮樂先壞漢晉以來諸儒補輯竟無全書其頗存者三禮而已周官一書固為禮之綱領至其儀法度數則儀禮乃其本經而禮記郊特牲冠義等篇乃其義疏耳前此猶有三禮通禮學究諸科禮雖不行而士猶得以通習而知其説熙寧以來王安石變亂舊制廢罷儀禮而獨存禮記之科棄經任傳遺本宗末其失已甚而博士諸生又不過採其虛文以供應舉至於其間亦有因儀法度數之實而立文者則咸幽冥而莫知其源一有大議率用耳學臆斷而已若乃樂之為教則又絶無師授律尺短長聲音清濁學士大夫莫有知其説者而不知其為闕也臣昔在山林嘗與一二學者考訂其説欲以儀禮為經而取禮記及諸經史雜書所載有及於禮者皆以附於本經之下具列注疏諸儒之説略有端緒而私家無書檢閲無人抄寫久之未成曾蒙除用學徒分散遂不能就而鍾律之制則士友間亦有得其遺意者竊欲更加參考别為一書以補六藝之闕而亦未能具也欲望聖明特詔有司許臣就祕書省關借禮樂諸書自行招致舊日學徒十餘人踏逐空間官屋數間與之居處令其編類可以興起廢墜埀之永久使士知實學異時可為聖朝制作之助則斯文幸甚會去國不及上朱子修禮書時年已六十有八越三年而先生捐館舍書迄未完門人黃幹楊復補喪祭二禮以成書先儒言後之言禮者不至棄經而任傳違本而逐末賴有此書臨川吳文正澄著三禮考注一書考周官以正六典以大司徒之半補冬官之闕蓋取陳氏俞氏之論也以儀禮為經禮記為傳蓋取朱子之論也其言曰因朱子所分禮章重加倫紀其經後之記依經章次秩序其文不敢割裂一仍其舊附於篇終其十七篇次第並如鄭氏本更不間以他篇須十七篇正經不至雜揉二戴之記中有經篇者離之為逸經禮各有義則經之傳也以戴氏所存兼劉氏所補合之而為傳正經居首逸經次之傳終焉皆别為卷而不相紊而外悉以歸諸戴氏之記朱子所輯及黃氏喪禮楊氏祭禮亦參伍以去其重復名曰朱氏記而與二戴為三凡周公之典其未墜於地者蓋略包舉而無遺造化之運不息則天之所秩未必終古而廢壞有議禮制度考文者出所損所益百世可知也朱文公熹居母憂自始死以至祥禫參酌盡變因成喪葬祭禮又推之冠婚以成編曰家禮冠禮則多取司馬氏婚禮則參司馬氏程氏喪禮本司馬氏後又以禮部侍郎高閌益崇之書為最精多採用焉書成一侍子竊之亡去文公沒而其書始出自敘曰三代之禮其宫廬器服出入起居之制節皆已不宜於世世之君子有意乎禮或違其本而務其末緩其實而急於文苦其難而不能舉其要也其困於窶貧者尤患其終不能及於禮熹之愚蓋兩病焉是以嘗獨究觀古今之禮少加損益為一家之書其大體之不可變者則以謹名分崇愛敬為之本至其施行之際則又略浮文敷本實以附於孔子從先進之意誠得與同志之士熟講而施行之古修身齊家之道愼終追逺之心庶猶可得復見而國家崇化導民之意或其有小補云洪武中命儒臣陶安定郊社羣祀禮詹同定四廟祫祭禮李善長定官民喪禮朱升定祭祀齋戒禮崔亮定五祀禮劉基定百官朝會禮魏觀定祭祀禮陶凱定軍禮而又令天下郡縣舉高潔博雅之士年四十以上者於是徐一夔梁寅周子諒胡行簡劉中弼董彛蔡深滕公琰曾魯至京編集大明集禮洪武中所著禮書曰國朝禮制曰稽古定制曰國朝制作曰大禮要議曰皇朝禮制曰禮儀定式曰大明禮制曰洪武禮法曰禮制集要曰禮制節文曰太常集禮曰禮書上之郊廟朝廷次之侯王郡邑下之閭巷州黨制度俱備洪武五年詔曰朕聞三皇立極導民以時庖厨稼穯衣服始制民居奠焉五帝教以仁義益未備之時宜天下從之民用和睦自周至於漢唐宋增損益周國乃用昌民受時宜家用永康朕蒙皇天后土眷命祖宗之靈統一天下紀元五年朕本草芥失習聖經况摧強附順二十餘年居無寧日乃理道未臻民不見化鄉閭市里尚染舊俗天下大定禮儀風俗可不正與兹條畫事宜再整彛倫恤念孤寡務遵先王之法顧以德薄恩澤未孚下民未説恐貽上天之怒夙夜祇懼若履淵氷咨爾臣庶體豫至懷期臻禮義之風永底升平之治崔文敏銑曰禮者理也人心之理協之以同然即百世可通也今王祭無樂大臣無廟仕者不奔祖父母之喪無功緦之假冠婚任俗飲射具文民無定志而濫士異學而莫止伶人道流秉禮司頌齊民下賤踰限犯分雖有洪武禮制而廢莫或行夫國無禮猶水無坊人無禮猶室無基衝嚙圯毁夫焉有極哉禮樂積百年而後興宜詔徴四方明道奧學之儒萃於京師凖以典誥案以三禮參以詩之詠歌孔氏遺言皆比以今法寧要毋繁寧徑毋易裁成明典行之天下埀後世範俗同德一邦其永孚於休矣屠康僖勳論三大典疏臣猥以凡庸叨司風紀兹當皇上繼體改元之初正祈天永命之日百度維新萬化攸始首卜郊祀藉田幸學三者夫郊祀所以敬天尊祖祀典之載於經者自虞舜肆類上帝禋六宗望山川遍羣神為命而告也虞書而下莫詳於周禮禮記思文之詩郊祀后稷以配天我將之詩則宗祀文王以配上帝蓋以萬物本乎天人生本乎祖此郊祀而配祖者大報本反始之道也至於以時以樂以牲以器之類各有其義降及秦漢唐宋或郊或不郊或合或不合或祀白帝或祀黑帝其祀不同或三歲一郊或過期不郊其制不一甚者或以求仙而行或以祈嗣而行皆出於道家者流怪誕不經瀆亂非禮無復古人報本反始之意矣殊不知天即帝也帝即天也以其形體而言故謂之天以其主宰而言故謂之帝其實非有二也安得有如異端所謂天皇太乙之號哉我聖祖龍興定為天地合祀之禮列聖相承以太祖太宗配享一用古禮參之周制分命羣臣各獻二十四壇其儀文制度至精至備三代而下祀典之正未有如我朝者究其所以宥密緝熙顧諟祗肅此則歷代敬天法祖之大略也藉田者所以重農厚俗考之月令孟春之月天子乃以元日祈穀於上帝乃擇元辰天子親載耒耜措之於參保介之御間帥三公九卿諸侯大夫躬耕帝藉天子三推三公五推卿諸侯九推又曰王命布農事命田舍東郊皆修封疆蓋天子藉田千畝收其穀為祭祀之粢盛而必躬為之者以為天下之農民帥先爾天子既身為之帥先又必命田畯之官以督其耕其重農事如此舜命官曰食哉惟時播厥百穀成王戒農官曰敬爾在公王釐爾成其見於詩有若七月皆言農桑之候其見於書有若無逸具言稼穯之艱厥後漢之文帝詔耕藉田以給宗廟粢盛又親率羣臣農以勸之賜民田租之半景帝親桑以奉宗廟粢盛祭服為天下先自周以迄唐宋莫不以此為務然躬耕藉田者必祀先農我朝歷聖躬祀先農親行藉田禮如古制具有成法誠以民為邦本本固邦寧民之所恃以生者食食之所賴以足者農耳幸學者所以崇儒重道天生孔子實萬代帝王之師文王世子天子視學大昕鼓徴所以警衆也衆至然後天子至乃命有司行事興秩節祭先聖先師蓋學校禮義之所在聖賢道德之所宗萬乘所以親臨之也雖曰以聚賢斂才而實以崇儒重道也漢明帝初建三雍親行其禮備法物之駕盛清道之儀尊養老饗射禮唐高宗幸國子學親行釋奠太宗召純儒耆德以為學官數臨幸親釋奠命祭酒博士講經賜帛增廣學舍宋太祖太宗數幸國子監詔講易卦堯典説命哲宗詣文宣殿行釋奠禮命祭酒豐稷講尚書無逸之數君者雖非三代庠序學校之比而其所以敬仰休風循古良規者殆亦可取我聖祖首建太學車駕親臨列聖相承率循是道所以勉勵師生者諄切詳備諭以聖人為學之道期以帝王作人之功具載御製五倫等書貽厥孫謀以燕翼子正在陛下今日之舉耳之三事者其禮相因其事至重不考古無以證於今不質問無以探其本伏望皇上念兹三事之大不徒循故事之美觀必求行三事之實意特敕館閣儒臣經筵侍從講求郊禘配享之禮思文我將之詩法三代以上所行之善監秦漢以下所行之失然儀文不備無以合古誠敬不足無以格天必真知上帝之享享於克誠黍稷之馨不如明德必仁必孝善繼善述則一陟一降在帝左右而感通之妙上帝居歆億萬年之丕基兆於此矣所以藉田者必求古人分井經界之法豳風七月之詩周公無逸之篇我列聖重農之訓必崇節儉以為裕財之本必薄稅斂以為足食之原禁遊惰則為之者衆省力役則不奪其時正經界不為外戚之所占均田里不為豪户之所侵貴五穀賤金玉務農桑益種樹如此而帥先天下宣其德意作其農功勸相有方貪暴不作則仁心仁聞天下被其澤而勸農之政行矣所以幸學者必尊德樂道以正天下之人心親賢納諫以厚天下之風俗師嚴道尊如學記之所存敬怠吉凶如丹書之所戒如此而帥先學校則人倫明教化興風俗丕變人才彚興矣竊見先儒真德秀大學衍義一編具載修齊治平之道依經據史引物連類言天必有徴於人語事而不遺於理善惡必録綱目詳明誠君天下者之律令格例也陛下於經筵講論書史之中常以此書進講仍以别册置之便殿以備清燕之覽則所以事天重農崇學以隆聖治之禮舉不出於此矣宗伯沈鯉議從祀疏臣等裒集衆論較量其間預廷議者共四十一人除注有原疏外內注胡居仁從祀者二十五人注王守仁陳獻章者俱十五人蔡清五人羅倫二人吕柟一人居仁則仍有專舉且無疵議在石星則議二臣不宜立門户講學在邱蕣則議守仁乃禪家宗旨在吏部右侍郎王家屏則又謂從祀重典非真能信今傳後者未可輕議非見其能信今傳後者亦未可輕議若使後日議黜恐反為盛典之纍故未敢遽擬其人也臣等反復參詳看得從祀一事持久不決必煩廷議者則以在廷之臣可以盡天下之公議而衆言僉同人品自定所以要之於歸一之論也今預議諸臣舉從祀者莫不以胡居仁第一即有次及居仁與其不舉者亦毫無異議及臣等考其平生與其論著亦大都淵源孔孟純粹篤實一時名士如羅倫張吉婁統周瑛高明賀欽羅欽順張元楨之類皆極口稱道比於薛瑄而次其論著與瑄之讀書録並傳焉斯其為孔子之徒已彰明較著有歸一之論矣如蒙俯賜采納容令臣等以居仁行實撰議上覽特允從祀自足以仰承德意增重儒林豈必求備蓋我明道化翔洽人文輩出二百年間侑食孔廟者僅薛瑄一人誠愼之矣今距祀瑄之後未二十年而又得居仁與之並祀亦所謂旦暮遇之比肩而立者雖一人不可謂少也至如守仁之學在致良知獻章之學在於主靜皆所謂豪傑之士但預議諸臣與之者僅十三四不與者已十六七甲可乙否殊未有歸一之論以稱上意指臣等亦何敢輕議查得嘉靖十九年亦曾廷議薛瑄彼其時固毫無間言也而庶子童承敘贊善浦應麒猶以為事體重大莫若少緩竟以報罷至隆慶元年復下廷議則在議諸臣或挽或推惟恐其不預於澤宫尸祝者何人心之同也夫惟人無異議故盛典一舉至今為爼豆之光今守仁獻章既不能毫無間言又一時與議之臣亦多有耆舊老成直亮多聞之士而不皆為二臣左袒者是輿論未協而事久論定尚非其時也臣等有感於承敘應麒之言故輒敢效其愚亦請暫緩之以少候公論之定而徐議於後似亦未晚蓋事可埀千萬年而不朽者即遲回數載而不為逾時禮有垂千百世而示法者即詳審再三而不為過愼與其祀也而有議豈若議定而後祀乎蓋可祀不祀者其失怠怠猶可補於將來未可祀而祀者其失誣誣則貽譏於後世拾瀋反汗勢豈能及是不可不為深計也昔者孟軻氏之告其君曰國君進賢如不得已蓋至於左右皆曰賢諸大夫皆曰賢而猶未敢信必至國人皆賢也而後察又親見其賢也而後用彼固一人之進退一時之是非耳而猶然若是矧是舉也在朝廷則象賢崇德見道揆法紀之公在天下則章軌作人為俗易風移之漸所關甚巨可嘗試而漫為之耶如皇上以我朝人文逺軼前代不宜寥寥焉若是臣等謂居仁而祀不可謂寥寥矣蓋隆古以還士之以行誼道德令聞長世者非託之於顯位則託之於門閥非託之於文章則託之於勳業順風疾呼聲聞易達所藉然耳如居仁者固深山窮谷之士而布衣韋帶之夫自非其德有過人負一代之斗山於當世擇地而趨噦心而語其誰為傾耳而聽正目而視者惟皇上超然逺覽拔之於儔伍之中榮之於崇祀之位則日月之光賁及豐蔀雖在齊民無不興起比於祀瑄尤為盛事兹臣等之所謂一不為少也至如蔡清羅倫章懋黃仲昭陳真晟吕柟羅欽順鄒守益中間或未有專祀者仍望推廣德意專祀於鄉通候論定之日另議從祀則仁至義盡可為天下萬世之法將見薪槱之道以光蘋藻之禮不濫一舉而二物具矣再照講學為致知之事聖門之所謂條理之始也夫學亦安可不講也顧臣等之所謂講學者殊無甚高論蓋六經孔孟之道既昭如日星而漢宋諸儒之書又發明殆盡後雖有述何以復加所貴乎學者亦守其師説愼思明辨如何為格致誠正如何為齊治均平隨事精察敦行不怠雖暗室無愧必白首一節如是焉而已世之學者不務為平易而厭薄古訓欲自名家至為續鳬頸以見長添蛇足以工畫於子臣弟友日用常行之道反視為辨髦不講焉其又有竒者則片言單詞樹之赤幟而天下之喜為名高者亦茍見前茅之所在遂靡然裹糧而趨之口耳一言反復辨難至窮年不能殫其説其流之弊將有內棄其事而外棄其主之事以釀成清談之俗者此不可不為早辨也伏願皇上既愼簡可祀之人又渙發德音使天下知朝廷之所以崇祀者意在此不在彼則世道人心不勝幸甚按孔廟從祀為禮之大者龍江先生此疏欲止祀薛胡兩公而白沙陽明徐俟論定又推廣楓山整菴諸先生先祀於鄉此正論亦定論也乃陳王從祀閣中竟以密揭中旨行之此何等事而可如是與樂音宋周元公惇頤之論樂曰古者聖王制禮法修教化三綱正九疇敘百姓太和萬物咸若乃作樂以宣八風之氣以平天下之情故樂聲淡而不傷和而不淫淡則欲心平和則躁心釋優柔平中德之盛也天下化中治之至也是謂道配天地古之極也宋建陽蔡元定著律吕新書二卷其上卷以漢志斛銘文定長九寸空圍九分積八百一十分為黃鐘第一以淮南子漢前志本黃鐘之律以三歷十二辰積之得一十七萬七千一百四十七為黃鐘之實第二以黃鐘三分為損益定生十二律第三次十二律之實四次變律五次律生五聲圖六次變聲七次八十四聲圖八次六十調圖九於是候氣審度嘉量權衡次焉為十三篇其下卷述前史書志經傳疏注吕氏春秋淮南子下至歷代籥尺欵識用以明造律和聲均調候氣制器之事朱文公稱其書明白而淵深縝密而通暢鑿鑿可見之行也其後文公考訂禮書定鐘律詩樂樂制樂舞等篇而鐘律篇大率本元定所著而互演之稱明邃矣自南宋及元以至於今皆用大晟樂考大晟樂乃方士魏漢津之所造取徽宗指寸為律故考亭曰崇宣之季姦諛之會黥涅之餘不足以語天地之和然金太宗取汴得之改為太和樂流傳入元及明破燕京得其樂工今太常雅樂與學宫所謂大晟樂者皆漢津之遺而徽宗之指也至其百戲隊舞亦元聲之遺樂章又近淺無爾雅之辭太祖一革元政而此事却謂金得之宋先王之遺不復改創而當時儒者亦憒然不知所自世宗制禮作樂而止於儀文之末略其元聲之本亦張夏諸人之過也元人吳萊大晟樂論鄉豫北遊京師聞太常所用樂本大晟之遺法也自東都失守大樂氏奉其樂器北趨燕都燕都喪亂又徙汴蔡汴蔡陷沒而東李嚴侯獨得其故樂部人國初有旨徴樂東平太常徐公遂典樂向日月山奏觀乞增宫縣登歌文武二舞令舊工教習以備大祀故今樂户子孫猶世籍河汴間僅能肄其鐘鼓鏗鏘不復能究其義矣豫因考求前代議樂自和峴以下更六七巨公而議論莫之有定前日之宿縣者本謂樂和曾未幾時倐已改鑄或云樂失之清或云樂過於濁樂工冶卒且深厭其爐鞲鼓鑄之勞則或自取其樂之協時加銅齊以濟之當軒臨試雖以老師宿儒終不能心悟其銅齊之輕重而徒論其銅律之清濁也逮夫崇寧之世魏漢津乃以蜀一黥卒為造大晟樂府遂頒其樂書於天下蓋謂古之制樂者惟黃帝夏禹得樂之正何則聖主之稟賦上與天地隂陽為一體聲則為律身則為度故夫黃帝夏禹之制樂實自其身而得之臣今請以聖主中指三節三寸定黃鐘之律中指之徑圍又即據而定為度量權衡樂以是制則臣將見其合天地之正備隂陽之和而得夫金石清濁之宜矣當是時惟丞相蔡京最神其説先鑄帝鼐八鼎復造金石鐘虡雕幾刻鏤蓋極後世之選已然以崇寧之指尺既長而樂律遂髙惟漢津亦自知之嘗私謂其弟子任宗堯曰樂律高北方元鼎水又溢出律高則聲過哀而國亂水溢出則國有變而境土喪沒是不久矣嗚呼漢津所制豈復有加於和峴以下諸人所論之樂哉然且至今沿襲相承未聞有所改作樂殊不可以草創茍且而遽定也雖然崇寧之樂亦可變矣蓋古之論樂者一曰古雅樂二曰俗部樂三曰畨部樂古雅樂更秦亂而廢漢世惟采荆楚燕代之謳稍協律吕以合八音之調不復古矣晉宋六代以降南朝之樂多用吳音北國之樂僅襲舊俗及隋平江左魏三祖清商等樂存者什四世謂為華夏正聲蓋俗樂也至是沛國公鄭譯復因龜兹人白蘇祇婆善彈琵琶而翻七調遂以制樂故今樂家猶有大石小石大食般涉等調大石等國本在西域而般涉即是般瞻華言羽聲隋人且以是為大簇羽矣由是觀之漢世徒以俗樂定雅樂隋氏以來則復悉以畨樂定雅樂唐至元宗畨部與俗部並樂工肄樂坐技不通然後發為立技立技不精然後使教雅樂天下後世卒不復知有古雅樂之正聲矣自唐歷宋大扺皆然是猶未能究夫樂律之元而僅拳拳於黍尺指尺之同異及乎大晟樂府之立吾殆未知其尚有畨俗之雜耶抑果雅樂之正也夫以雅樂平淡而聲緩畨俗繁碎而聲急今大晟之樂律太高樂聲急矣當大晟樂書之行教坊色長張俁曾制大樂元機賦論七音六十律八十四調本不脫乎龜兹白蘇祇婆之舊正行四十大曲常行小令四部絃管猶或尚循乎大唐五代梨園法曲之遺此非畨俗之雜行者乎宜雅樂之未易遽復也然吾就俁之所學嘗謂樂工肄樂先須通達強記巧妙幹旋復窮十載曉夜之思而務諳前人格犯之正故不可以草茅無識而輕議樂又况漢津蜀一黥卒稍窺范景仁司馬君實之議論而且得與夫黃帝夏禹配食於樂成之廟尚可至今沿襲而不變耶嗚呼誠以世之通音曉律者或少也夫何天下四方之所尚畨俗伎樂率多輕儇剽殺嘷呶縱肆前緩後驟不中音節他則倡優雜劇類且青紅塗抹子女雜獶導淫教媟不得禁止然以畨俗之樂音節不中則聲氣淺浮而日趨於薄倡優之伎禁止不行則風俗流蕩而不知所返此雖小節所係甚大漢諺有云宫中好高髻城中高一尺宫中好長袖城中全匹帛意者朝廷合議先正雅樂然後天下四方悉更畨俗二部之不正者悉歸於正而後止殆不可視是為千古之絶學也然古者律歷二事更相為用太史郭公一嘗定歷誠曠世所未有子謂宜依古法緹室葭灰隨月候氣天地之中氣既應則鐘律之中聲當無有不應者要在久而後驗樂殊不可以草創茍且而遽定也嗚呼崇寧之樂亦可變矣吾又安得夫伶倫榮緩之徒而與之共論樂哉禮樂箋曰説者論大晟樂為宋方士魏漢津所製此未考本末不知樂律者也宋濂議漢津製樂為亂世之音在洪武四年而冷謙所定樂舞為洪武之六年樂章猶宋之舊而樂音非宋之音矣以何知之以律而知之蓋謙所製者為太簇之羽中吕調也漢津所製其迎神初奏為南吕之角大吕變調也與謙之樂如參辰黔晳之不相合矣蓋謙之七均自太簇夷則夾鐘無射中吕皆正調也惟清黃清林巧為變調然此二變音也固無妨於變也漢津之林鐘為宫者僅商角二音為正調其徵羽變宫變徵皆屬變調是七均之中而變者居四矣南吕為宫者僅商音為正調其徵羽角變宫變徵皆屬變調是七均之中而變者居五矣又况漢津之律即李照之律下古樂二律所謂黃鐘者僅中太簇則其林鐘之宫僅中南吕南吕之宫僅中應鐘應鐘管長四寸六分有竒而商角以下六均無一不出於變矣君則其細已甚而臣民事物靡然不振哀淫怨咽此真亡國之音也豈可與謙之樂同年而語哉大扺樂律樂章本為二道由宋以降樂章屢易而所用者皆王朴之律也政和以降樂章屢易而所用者皆漢津之律也至冷謙定樂樂章無改而所用者則非宋元之律也改其律而不變其章者聲音道微政合嚴重律正其元曲襲其舊此謙之所以為明哲也謙舊有樂書在南太常函史曰李教授文利祖吕氏春秋三寸九分為黃鐘曰含少之文辨黃鐘九寸之誤以太極隂陽五行繇一生二繇少及多見黃鐘數少為極清辨宫聲極濁之誤以左右對待各得百二十九分辨三分損益上生下生至仲吕而窮之誤其法由十一月黃鐘三寸九分至十二月大吕則增六分由大吕至太簇夾鐘姑洗仲吕㽔賔皆各增九分由五月㽔賔至六月林鐘亦減六分由林鐘夷則南吕無射應鐘以復於黃鐘皆各減九分而適合三寸九分之數由此而如環無端焉以相生其説曰陽數始於一成於三終於九故律之為數三九盡之矣黃鐘一陽初升氣微數少故其管三寸九分三寸乃陽數之少九分乃陽數之成以三涵九故黃鐘之宫命之曰涵少此其證也十一律皆從以生而增減亦各以九分惟黃鐘之於大吕㽔賔之於林鐘其增減視他律特異者大吕當五隂之盛一陽始生則陽雖進而尚弱林鐘當五陽之盛一隂始生則陽雖退而尚強其增減宜僅得三分之二也律管長短一本隂陽升降之氣所謂律歷同道者也作律吕元聲書二篇范副使輅等信其説從受學楊學士亷愛其書以為天授而王尚書廷相韓尚書邦竒皆大儒通解音律皆不謂然以為樂律音調之承傳在中原依古往而來非他方及知非可以臆見卜度決也楊忠愍繼盛為韓苑洛志樂序世之談經學者必稱六經然五經各有專業而樂則滅絶無傳論治法者必對舉禮樂然議禮者於天然不易之外猶深求立異可喜之説至於樂則廢棄不講全德之微風俗之敝恆必由之良可悲夫然律吕與天地相為終始方其隱而未彰也天既生哲人以作之則於其既晦也天忍任其湮沒已乎闡明之責蓋必有所寄者先生自做秀才時便抱古樂散亡之憂當其嵗試藩司聞諸督學虎谷王公云律吕之學今雖失傳然作之者既出於吾人則在人亦無不可知之理特未有好古者究心焉耳先生於是惕然省悟退而博極羣書凡涉於樂者無不參考其好之之專雖發疽尋愈不知也既而見其説矣於是有直解之著然作用之實未之悉也自是苦心精思或脫悟於載籍之舊或神會於心得之精或見是於羣非之中若天有以啓其衷者終而觀其深矣於是有志樂之作曰志云者先生自謙之辭也非徒志而已也是故律生聲鐘生律馬遷著之矣而律經聲緯之遞變體十用九之明示則未之及也圍九分積八百一十分班固著之矣而管員分方旋宫環轉乘除規圓則未之及也六十調八十四聲蔡子著之矣而起調則例及正變全半子倍之交用調均首末長短相生之互見則未之及也六變八變九變之用周禮載之矣而以黃鐘祀天神以㽔賔祭地祗以太簇享人鬼一造化之自然以黃鐘一均之備布之於朝廷宫闈實古今之絶唱則又有出乎周禮之外者也宏綱細目一節萬變信手拈來觸處皆合樂之為道盡於是矣志云乎哉其於先儒世儒之圖論備録不遺者是固先生與善之心然亦欲學者考見得失焉耳方其始刻之日九鶴飛舞先生之庭者久之識者以為是書感通所致觀仰秣出聽之説則鶴之來舞也固宜而其得樂之正也此非其明驗矣乎昔人謂黃帝制律吕與伏羲畫卦疇得程朱數子而始著律吕得先生是書而始明則其功當不在數子下豈曰小補云乎嗚呼太和在成化宇宙間故先生所由生太和在𢎞治宇宙間故是書所由始太和在嘉靖宇宙間故是書所由成則其作誠不偶然也後之有志於樂者茍能講求而舉行之則太和將在萬世之宇宙而先生之功至是為益大矣然不苦心以求之何以知是書之正不得其説而精之又何以知盛之言不為阿私也哉噫盛不敏雖學之而未能也講求之責深有望於同志君子云姑蘇王煥如曰周禮太師掌六律六同以合隂陽之聲播之八音以為樂器孔子曰易有聖人之道四以制器者尚其象八音者聖人致中和之器也其制之長短廣狹小大輕重皆有數三三迭運九九相乘天地萬物之所生也太和元氣之所鍾也聲律家謂之元聲黃鐘者天地隂陽之和也五聲之本生於黃鐘之律律十有二陽六為律隂六為吕律法也律以統氣類物吕侣也吕以助宣陽氣為道不同其中一也今按黃鐘之長九寸寸積九十分分十釐釐十毫二十忽忽方五十九萬口四百九十萬得寸十寸為尺十尺曰丈十丈曰引黃鐘之管其容子粟秬黍中者一千二百為籥籥十抄抄十撮撮二十圭圭六粒粒凡一千二百得籥十籥曰合十合曰升十升曰斗十斗曰斛黃鐘之籥所容千二百黍其重十二銖兩籥則二十四銖為兩兩四分分六銖銖十纍纍十黍黍凡二千四百得兩十六兩曰斤二斤曰裹十五斤曰稱二稱曰均四均曰石三之九之損之益之以合隂陽之中以通律吕之和長短廣狹小大輕重以十有二律為之度數以十有二聲為之齊量紀之以三平之以六成之以十二天之道也凡八音之器莫不以是為凖是以聲出於器器得則聲得器失則聲失也八音惟革木無當於五音不係於律國語曰革木一聲此之謂也其餘六器清濁高下莫不隨器審察而齊一之夫金匪改煎齊量不成石匪旁專摩鑢不協竹有穴竅疏密之異匏有安山卑崇之殊土惟俯仰啓閉而契歌惟依永比律而和總衆音而言之金欲應石石欲應絲絲欲應竹竹欲應匏匏欲應土而八器之音根祖出一黃鐘器雖萬有不同未嘗不克諧也祇患僅知七律為一均而未知度曲之義僅知一律配一字而未知永言之旨耳所謂七律者如以黃鐘為宫即以林鐘為徵太簇為商南吕為羽姑洗為角應鐘為變宫㽔賔為變徵其七律自為一均而聲相諧應古人欲合聲先須吹律使衆音皆合如一律所出乃可近世不解多以黃鐘奏而聲或林鐘林鐘奏而聲或太簇七音之協四聲各有條理今以平入配重濁以上去配輕清奏之多不諧協六器之定琴瑟尤難琴必每調而改絃瑟必每調而徙柱上下相生其理至妙又琴瑟聲微常見蔽於鐘磬匏革竹土聲長金石常不能以相待矧曠不習間擊鐘磬者不知聲吹匏竹者不知穴操琴瑟者不知絃同奏則啓手不均迭奏則發聲不屬失之逺矣故妙達音律者必於此而幹旋之度律均鐘以耳齊聲以聲定律而訂黃鐘之宫凖此中聲均瑟十六聲次第又以十六聲而齊六器聲高者抑而下之聲下者引而上之過不及者損益而酌中之使衆器之間音音翕和不相凌奪然後被之於絲彈者純然如出一手吹之於匏土者翕然如出一口聲以和樂律以平聲金石以動之絲竹以行之詩以道之歌以詠之匏以宣之瓦以贊之革木以節之合作於一堂之上將見八風從律氣無滯隂亦無散陽風雨時至神民和説制物備而樂成庶幾不失夔曠之遺教云樂書曰昔太史公為律書其始不言律而言兵不言兵之用而言兵之偃以為天下庶富百姓嬉遊此和樂之本也蓋亦深達制律之意者哉樂之用不外乎聲音律吕通典云以子聲比正聲則正聲為倍以正聲比子聲則子聲為半如仲吕之管長六寸五分有竒上生黃鐘三分益一不及正律九寸之數但得八寸七分有奇以為黃鐘之變律半之得四寸三分有竒為子聲此聲有倍半之略也淮南子云姑洗生應鐘比於正音故為和應鐘生㽔賔不比於正音故為謬蓋五音相生至於角位則其數六十有四隔八下生當得宫前一位以為變宫又自變宫隔八上生當得徵前一位其數五十有六以為變徵變者與正比則為和變者與正不比則為謬此音有和謬之略也漢書律歷志天地人及四時為七始此合而言之也又以黃鐘為天始林鐘為地始太簇為人始此分而言之也蓋黃鐘居子為天統林鐘居未衝丑為地統太簇居寅為人統故為三始姑洗為春㽔賔為夏南吕為秋應鐘為冬以三合四是謂七始此三始七始之略也以七音因十二律為八十四調除二變聲不得為調以五因十二則為六十調然二變不調則冬夏聲闕四時不備蔡子之説非而鄭譯之議是也此六十調與八十四調之略也以徑象言之黃鐘長九寸為乾林鐘長六寸為坤乃邵子皇極經世聲起於多乾之甲也音起於古乾之子也此理之可通於易者也以娶妻生子言之黃鐘為陽大吕為隂猶甲子之娶乙丑皆同位者也黃鐘之生林鐘林鐘之生太簇猶甲子金之生庚辰金皆隔八者也乃沈重鍾律議用京房之術求之得三百六十律當一期之日隨日建律依次運行當日者以天為宫而商徵以次從焉此義之有符於歷者也樂必用五音然周三大祭皆無商音説者謂周德木也故祭鬼神之樂去金開元諸臣言唐土德王請加商調去角調以土德王初作洪武正韻聲起於東從角也後見禮部韻會而遵用之不起於東而起於公此則從宫矣豈非深達造化者哉律止於十二是矣然十二者律之本聲而四者應聲也本聲重大為君為父應聲輕清為臣為子故四聲曰清聲即夾鐘大吕黃鐘太簇之應也茍不用四清聲是有本而無應矣冷謙議用四清聲故編鐘編磬皆為十六豈非洞達音律者哉詩稱定之方中謂測日景以辨方也土圭之法祖沖之之論備矣然候氣者使按日景之子午以布律則氣必不應何也天氣微偏於左地氣微偏於右所謂不參差則不能生物者也故土圭測日景常在子午之中此天之正位也以針定南北常在丙午壬子之中此地之正位也故冬至置黃鐘之律於壬子之中夏至置林鐘之律於丙午之中然後飛灰應律今元定乃欲一室之中多截管以候黃鐘豈非臆説哉黃鐘起於子之一以三倍之歷十二辰而終於亥之一十七萬七千一百四十七漢志蓋借十二辰以列三因之算位耳蔡子乃據以為真張皇鋪衍謬矣自黃鐘之管陽皆生下隂皆生上自㽔賔之管陽反生上隂反生下此非空言也從子至巳陽生隂退故律生吕言下生吕生律言上生從午至亥隂生陽退故律生吕言上生吕生律言下生蓋班志隔八相生一下一上則終於仲吕其長止三寸三分有竒京房之法至㽔賔重上生凡五十六上終於仲吕其長六寸六分有竒若仲吕止三寸三分有奇雖三分益一不能復生黃鐘之律故用六寸六分則三分益一可以復生黃鐘耳蔡子乃譏其隂陽錯亂亦未之思耳近世儒者乃曰黃鐘非九寸之管而引外紀吕氏春秋所載含少之説為證曰黃鐘音始也象則君也其律宜短其氣宜微其聲宜清者也夫黃鐘以八十一分為管而吹三寸九分以為聲故謂之含少乃遂以三寸九分為黃鐘之律而執含少以為清管焉是此律一差大吕而下十一律者皆無由取正矣蓋太史公之言曰細若氣微若聲聖人神而明之雖妙必效今聖主當陽能禁暴戢兵保大定功安民和衆是樂之本也區區之器與數何足論哉黃太史道周樂律論衡樂律史記所載極為詳悉楊子雲太元只是説歷耳天地之體四方各百二十八周而圍之五百一十二因而圓之四百八十凡方圓相割十有八變而歸於極體四則用三體三則用四以四為實以三損益割方即為損割圓即為益考其纎微皆方不止於徑一周四圓不止於徑一圍三約長餘分是日月差法之所由生也律歷之妙皆於此徑一圍三上察其微差以為相生之律如黃鐘全律百二十餘一分七釐有強因而裁之八十有一為黃鐘之上宫其下宫三十有九餘分不盡以起下生而淮南子吕不韋俱稱黃鐘三寸九分此是訛黃鐘之下宫以為上宫我朝李文利鄭世子之流又祖其説以三寸九分起黃鐘則黃鐘之聲宜極短而清毋復牛鳴窖中者矣管子亦稱黃鐘有大灑之音此皆於變宫上説黃鐘非就黃鐘本位起實數也如就本位起實數則六律六吕皆百有二十分如大吕七十有二則其餘宫四十有九又有餘分不與仲吕相亂今以子未寅酉辰亥午丑申卯戍巳分為娶妻生子之序上下損益終於南吕之六十而百二十分之律分中所謂律之一終也京房六十律亦從此始如用三寸九分之律則管分極短吹不成聲應不動氣又益五寸二分以為大吕顚倒極矣某自少時常用文利之律以比於淮南吕覽之説久而知其不然乃復求之史記知太史所藏去古未逺置一而十一三之以三為實以四為積不可易也伶州鳩所論六間六正大不踰宫細不過羽從來已舊安得指極短之律以起至大之宫使鐘量衡度皆無所從始乎凡樂言鐘吕為人生致用之大端鬼神所用進退亥為應鐘卯為夾鐘未為林鐘此三鐘者三甲所治易之先甲三日後甲三日謂是物也巳為南吕丑為大吕酉為仲吕此三吕者為三庚所治易之先庚三日後庚三日謂是物也黃鐘為子子與亥而從陽治陽者為主治陽而主鐘㽔賔為午午與巳從隂治隂者為客故言賔而治吕主客之分出入之序六府三事之所為治也禮祀天神則用圜鐘為宫以相次為序祀地祗則用函鐘為宫以相生為序祀人鬼則用黃鐘為宫以相合為序其以黃鐘代應鐘亦猶之尊于而絀亥也凡道之本於禮樂者皆與天行之度一一相追禮退而絀樂進而盈樂動而升禮讓而反日之讓天月之讓日進而稱順退而數逆藏往知來其致一也日月律度之差各十三有餘為日月交食之會析之為六分有半為律法之所從極蔡元定稱子丑寅卯辰巳上得全分午未申酉戍亥不得全杪猶未有定論唯以十二差之自三分九釐損益上下以至於一分而極而半聲間起之法亦於是而出矣木上云然則太師吹銅聽律以知師之善敗如何某云豫非瞽史安知吹律然詩稱其軍三單大國一軍萬二千五百人三軍之數與天地參六師之義倍而用之用衆之律而過於天道未有不敗者也然則律數十有七萬八千餘強何也曰置十而十一三之是大易之偶數也因而三之五十三萬餘強而與天俱周律之與禮樂天道兵師其槩一也崇禎十五年禮部議覆太常寺樂疏云蒙諭太常寺有神樂觀及給賜淨衣取其精潔今郊廟祭樂亦多疏澀如琴瑟並無指法舞容尤乖古制宜訪求知樂之人細加參究因及鄭世子所進樂書及原任禮部尚書黃汝良樂律考大要以黃鐘為主仰見皇上留心上理於禮樂精微無不洞悉臣等謹察得黃鐘候氣實為律歷之本而自漢唐以來或為三寸九分或為九寸其説不同前議歷法時臣等以古葭灰候氣之法令欽天監與新局並試皆不甚曉至樂舞生則琴瑟搏拊尚未能辨矧黃鐘乎周時以舞教國子令大胥正舞位小胥正舞列節八音而行八風蓋五行之義皆寓於其中至漢大樂律則卑者之子不得舞宗廟之酬凡除吏二千石至六百石關內侯至大夫之適子取為舞生其教之豫而選之精如此以能發揚功德孚格人天而今皆伶人下賤為之去古實逺宜令太常倣周漢意選舞士不得仍以倡優充數仍將律書正聲所纂舞圖舞節重加翻習庶足復三代之舊又輔臣奏廟堂上不宜用教坊樂聖意亦以為然察會典凡祭祀用太常寺樂舞凡朝會宴饗等禮用教坊司奉鑾而相沿既久疏舛成習所當嚴行申飭至古者房中之樂歌關雎諸詩燕射之樂歌鹿鳴諸詩笙奏由庚諸詩即漢人樂府亦特為古雅當時音容必有可觀自唐始分太常與教坊為二實鄭聲亂雅之始惜古樂殘缺未易頓議亦宜訪求知樂之人徐加訂定以副聖天子復古致治之盛心律尺崇禎十四年上欲考定樂律命工部察周尺之制工部不能定移聞禮部禮部覆云周尺之説古今推求不一有用纍黍者漢書律歷志云以子穀秬黍中者度之九十分為黃鐘之長一黍為分十分為寸十寸為尺爾雅云秬黑黍也顔師古云中者不大不小後周時牛𢎞等議曰上黨羊頭山黍其色至烏其形圓重唐禮樂志曰黍真則尺定尺定則律均宋竇儼司馬光等考定周尺用上黨黍十黍為一寸是也有用指者古人按指知寸布手知尺舒臂知尋大禹聲為律身為度用左手中指三節三寸謂之君指裁為宫聲之管許愼説文曰中婦人手長八寸謂之咫尺即周尺也有用璧羡者考工記曰璧羡度尺好三寸以為度蓋璧徑九寸羡而長之縱十寸橫八寸周謂之度尺則周之十寸八寸皆為尺也有用蔈粟者蔈禾穗芒也淮南子曰律數十二故十二蔈當一粟十粟而當一寸是也有用蠶絲者孫子算術云蠶吐絲為忽自絲毫釐分而成一寸是也有用馬尾者易緯以十馬尾為分是也詳考之竊謂人指則長短不同璧羡則古璧難得粟有輕重馬尾有巨細蠶絲秒忽亦難辨惟纍黍之法為正而又有謂圭璧之屬用指尺冠冕尊彛之屬用黍尺者又有謂歲有豐歉地有肥磽纍黍較驗亦復不齊者故前代製尺非特用纍黍又必求古器以雜較焉隋書所載歷代之尺十有五種第一種即周尺與西漢劉歆銅斛尺東漢建武銅尺晉荀朂律尺祖沖之銅尺皆合今去古既逺欲求確據惟我高皇帝時命宋濂冷謙等所定樂律及劉基等所定欽天監晷景可憑而晷景尤其顯者宋和峴用西京銅望臬即司天臺影表銅臬下石尺也影表上可測天度數不爽况其他乎唐順之曰今欽天監表尺乃元郭守敬所造比市尺止得八寸強守敬精於律歷決非妄作嘗取黑黍中者一千二百粒日乾之稱量重五錢者以九十粒橫之命為九寸與表尺果合於今欲求周尺似不能舍是而他求矣抑又有説焉高皇帝創制垂法貽謀萬世當時製為鎮圭定按周尺莫若以鎮圭之尺為主若欲别造凖尺是必博搜古器如表尺之屬兼求真黍參互考定非可懸虛臆決也工部據以回奏奉旨既説周尺即鎮尺著照鎮圭式造尺審度嘉量權衡皆出於律自積黍之法不明黃鐘之説始紛然如聚訟近代鄭世子考羊頭山秬黍以時等則稱之百粒得二分五釐至兩籥二千四百重六錢則今之六錢為古一兩以約度量今之八寸即古一尺今之三斗即古之一斛度以八為率量以三為率權以六為率大祀郊廟社稷先農為大祀已而改先農及山川帝王先師旗纛為中祀諸皆小祀大祀致齋三日中祀二日祀有牲牲四等曰犢曰牛曰太牢曰少牢色尚騂或黝天地日月加玉焉玉三等曰蒼璧曰黃琮曰玉牲大祀入滌九旬中祀三旬小祀一旬殺禮不用牲用果脯從其族或用素羞祀有帛大祀中祀京師用制帛制帛五等曰郊祀曰奉先曰禮神曰展親曰報功小祀素帛禮佛帛王國司府州縣亦用帛小祀則否凡祀有樂樂四等曰九奏曰八奏曰七奏曰六奏舞皆八佾先師六佾小祀則否凡助祭文臣五品武臣四品以上小祀則否禮部寅清堂有嘉靖十五年秋欽定大報諸祀禮儀碑每歲大宗伯以大報日期等日告於皇帝前期於本衙門宿鴻臚卿具請御殿及設案奉天殿中是日百官公服侍班皇帝服皮辨大宗伯具朝服自午門中道行捧祀日册立置於案皇帝就案先立定大宗伯跪奏曰嘉靖幾年分大報等祀日册請敬之皇帝搢圭取而恭視訖序班舉案於華蓋殿中皇帝升座百官叩頭如常禮畢正祀典倪文毅嶽疏釋迦牟尼文佛三清三境天尊謹按傳記西方有佛國曰天竺有五中天竺乃釋迦所生之地後漢明帝時其法始入中國後之宗其教者遂以釋迦為師其曰三世佛者則以釋迦之本性為法身德業為報身并其真身而為三其實本止一人耳今乃分為三像而並列之失其旨矣唐儒韓愈有曰三代之時天下太平百姓安樂壽考中國未有佛也明帝時始有佛法其後亂亡相繼運祚不長宋齊梁陳以下事佛漸謹年代尤促惟梁武帝捨身施佛其後餓死臺城事佛求福乃更得禍由此觀之佛不足事亦可知矣至於道家以老子為師其所謂三清者蓋倣釋氏三身而為之尤為謬妄宋儒朱熹有曰玉清元始天尊既非老子之法身上清太上老君又非老子之報身設有二像又非與老子為一而老子又自為上清太上老君蓋倣釋氏之失而又失之者也况莊子明言老聃之死則聃亦人鬼耳豈可僭居昊天上帝之上哉由此觀之三清三境天尊實無所據况躬親祠醮傾心崇奉如宋徽宗者可謂至矣卒之陷身沙漠覆亡宗社千載之下可為明戒但緣異端佛老之徒轉相模倣惑世誣民歷代因之莫之有廢是以遞年以來凡遇萬壽千秋等節奉欽依修建吉祥好事或遇喪禮七七修建薦揚好事俱先期一日遣官詣大興隆寺祭告釋迦牟尼文佛朝天宫祭告三清三境天尊此皆因襲而行不合祀典今議齋醮既合停止其前項祭告俱各罷免北極中天星主紫微大帝謹按象緯書有曰北極五星在紫微垣中一名天極一名北辰其北第五星名天樞蓋極星之在紫微垣萬星所宗七曜三垣二十八宿衆星所拱為天文之正中又曰紫微大帝之座天子之常居也即今朝廷宫殿所在乃其象焉國朝正統初年建紫微殿一所於大德觀之東設立大帝之象每遇萬壽聖節正旦冬至俱遣大臣一員祭告今議得日月星辰並曜於天故古有大明祭日夜明祭月幽宗祭星之文祖宗以來每歲南郊大祀內壇已有星辰壇合祭之禮今乃象之如人稱之為帝以極星之正祠於異端之宫稽之祀典誠無所據所有前項祭祀伏乞罷免九天應元雷聲普化天尊謹按傳記有曰凡隂氣凝聚陽氣在內而不得出則奮擊而為雷霆非如異端所謂龍車石斧鬼鼓火鞭怪誕之説也雷聲普化天尊者道家以為玉霄一府總司五雷而雷部諸神皆其所主而又託以六月二十四日為天尊現示之日故朝廷遂以是日遣官詣大德顯靈宫致祭今議得雷雨風雲皆隂陽之妙用鬼神之盛德祖宗以來每歲南郊大祀外壇已有合祭之禮而八月望後山川壇復有秋報之祭况自二月發聲之後無非雷霆奮震之日顧乃定於六月二十四日於義何取至於像設名稱禮亦無據所有祭告伏乞罷免梓潼帝君謹按圖志英顯王廟在劍州即梓潼神姓張諱亞子其先越嶲人因報母讐徙居劍州之七曲山仕晉戰沒人為立廟唐元宗西狩追封左丞僖宗入蜀封濟順王宋咸平中改封英顯又按文昌六星在北斗魁前為天之六府道家謂上帝命梓潼神掌文昌府事及人間祿籍故元加號為輔元開化文昌司祿宏仁帝君而天下學校亦多立祠以祀之京師之廟在北安門外景泰五年間闢而新之敕賜文昌宫額每以二月初三日為帝君誕生之辰遣官致祭今議得道家謂梓潼以孝德忠仁顯靈於蜀廟食其地於禮為宜祠之京師不合祀典至於文星與梓潼無干今乃合而為一誠出傅會所有前項祭祀伏乞罷免仍行天下學校如舊有文昌宫者亦合拆毁祖師三天扶教輔元大法師真君謹按傳記張道陵字元輔漢光武十年生於吳之天目山善以符水治病桓帝永壽元年於靈峯白日上升百二十歲唐天寶七年册贈太師中和四年封三天扶教大法師宋熙寧中加封三天扶教輔元大法師大觀三年册號正一靖應真君子孫歷代相傳皆有封號逮入國朝仍令傳襲正一嗣教真人之封秩正二品歲以正月十五日為祖師示現之辰遣官詣大德靈顯宫告祭又按宋邵伯溫聞見録建安二十年曹操破張魯定漢中魯祖陵順帝時客蜀學道鳴鶴山中造作符書惑百姓從授其教者輒出五斗米時謂之米賊陵子衡衡子魯以法相授受自號師君其衆曰鬼卒曰祭酒大抵與黃巾相類朝廷不能討就拜魯漢寧太守鎮巴中觀此則陵本非異人而道家祖陵為天師者特因天寶詔稱漢天師而然爾今議得正月十五日乃其生辰自宜其子孫祭於其家所有前項祭祀伏乞罷免大小青龍之神謹按碑記昔有僧名盧自江南來寓西山之尸陀林祕魔岩一日二童子來拜於前盧納之鬻薪供奉雖寒暑無怠時久旱不雨二童子白於盧能限雨期言訖即委身龍潭須臾化青龍一大一小至期果得甘雨事聞賜盧師號曰感應禪師建寺設像立碑以記其事又别設祠於龍潭之上春秋遣官祭青龍神國朝宣德中敕建大圓通寺青龍出現禱之有應於是加以封號至今春秋二時遣順天府官致祭及遇歲旱遣官祭告蓋因舊傳二龍能致雲雨故纍朝崇奉如此然雖稱二青龍其實蛇也蛇有神蛇其名曰蜦亦能致雨今此二蛇西山寺院處處有之略無靈異近者京師連年亢旱纍纍祭告祈禱杳無應驗則此亦非蜦蛇乃凡蛇耳蓋妖由人興久自衰息無足崇矣昔宋祥符中天慶觀有蛇極怪異人以為龍孔道輔以手板擊其首死之其患遂息程明道為上元主簿茅山池有小青龍如蜥蜴崇奉以為神物明道捕而脯之使人不惑後亦不聞如何則此二蛇之怪誕正此類也所有前項春秋祭告之禮伏乞罷免東嶽泰山之神謹按圖志東嶽魯之泰山今在山東濟南府泰安州山下有廟自黃帝以來封禪者七十二君唐宋元皆加神以封號曰王曰帝若祀人鬼國朝洪武三年詔去封號稱為東嶽泰山之神有司春秋致祭有事則遣廷臣祭告今京師朝陽門外亦有東嶽廟蓋自元延祐中元教宗師張留孫買地為宫奉祀東嶽齊天仁聖帝國朝仍而不廢歲以三月二十八日及萬壽聖節遣官致祭夫嶽鎮海瀆以其山川靈氣有發生潤澤之功故歷代祀之而泰山在魯封內歲時已有常祀况每歲南郊大祀壇八月山川壇俱有合祀之禮所有前項祭告稽之祀典煩瀆無據今當罷免北極佑聖真君謹按傳記北極佑聖真君蓋真武神也真武本元武宋真宗尚道教避聖祖諱改元為真元龜也武蛇也此本北方元武七宿虛危星形似之故因而名後乃以元武為真武而作龜蛇於下靖康初詔加號助順曰佑順助聖真武靈應真君及考圖志乃云真武為靖樂王太子也生而神靈長而勇猛志除邪魔遇紫虛元君授以道祕東遊遇天神授以寶劍入武當山修煉功成白日飛升奉上帝命往鎮北方披頭跣足建皂纛元旗統攝元武之位此則道家傅會之説殊為誕妄再考國朝御製碑文太祖高皇帝平定天下兵戈所向神隂祐為多及定鼎金陵乃於雞鳴山建廟以崇祀事載在祀典太宗文皇帝肅靖內難以神有顯相又於京城艮隅并武當山各重建廟宇而兩京歲時春秋及京師每月朔望各遣官致祭武當山則命內外官員專一在彼提督列聖崇奉之意可謂至矣憲宗純皇帝在位常范金為像遣內官陳善齎往武當安奉蓋亦不過承先志以祈神庥耳豈期陳善援引左道之人鄧常恩等上則熒惑聖聽糜費內帑下則騷擾道路虐害生民且又奏請重修京師廟宇改號靈明顯佑宫日居其間引進邪術遂使香火之地幾為姦盜之區固非朝廷崇奉之本意使元武有神亦豈其所樂聞哉今議得神既有功於國則纍朝崇奉之禮固不可廢但本以一人而一歲之間兩京俱有春秋之祭京師復有朔望等祭過於煩瀆合無照依南京洪武年間以來例應每年三月初三日九月初九日各用素修遣太常等官祭祀其餘祭禮并行停止其武當山神像之類頻年齎送不無太繁况已有內外官員領敕在彼一應供奉之物自合責令各官嚴加整辦所有襄陽府縣三年一次額辦給散道士濶白綿布二千四百匹濶白苧布二千四百匹祀神油蠟香燭三萬七千八十四斤雖稱送日久皆係正稅所出即今民力憊敝亦宜量為裁革減省合行湖廣巡撫巡按官員徑自酌量奏請定奪今後差遣內官鑄送神像等事並乞一例禁革庶幾神祠不替而國用少節矣崇恩真君隆恩真君謹按道家之言有曰崇恩真君姓薩氏諱守堅西蜀人在宋徽宗時嘗從虛靖天師張繼先及王侍宸林靈素傳學道法纍有靈驗而隆恩真君則玉樞火府天將王靈官也又嘗從薩真君傳授符法國朝永樂中有杭州道士周思得以靈官之法顯於京師附體降神禱之有應乃於禁城之西建天將廟及祖師殿宣德中改廟為火德觀封薩真人為崇恩真君王靈官為隆恩真君又建一殿崇奉二真君左曰崇恩殿右曰隆恩殿成化初年改觀曰宫加顯靈二字遞年四季更換袍服三年一小焚化十年一大焚化又復易以新製珠玉錦綺所費不資每年萬壽聖節正旦冬至及二真君示現之日皆遣官致祭其崇奉可謂至矣今就其言議之薩真人之法因王靈官而行王靈官之法因周思得而顯其法之所自皆宋徽宗時林靈素輩之所傳一時傅會之説淺謬如此本無可信况近年附體降神者乃欽發充軍顧珏顧綸之父子其為鄙褻尤甚往往禱雨祈晴杳無應驗則其怪誕可知但經纍朝創建一時難便廢毁所有前項祭告之禮俱各罷免其四時袍服宜令本宫住持并庫役人等於每年應換之日仍會同道籙司掌印官照舊依期更換如法收貯不必焚化永為定例伏乞敕內府衙門以後袍服等件不必再行製造如此則國用不至於妄費而邪術亦可以少貶矣金闕上帝玉闕上帝謹按大明一統志福州府閩縣南舊有洪恩靈濟宫一所祀二徐真人即今之金闕玉闕二真人也真人五代時徐溫子曰知證封江王知諤封饒王常提兵定福建父老戴之圖像以祀宋賜今額又考之御製碑文云太宗文皇帝臨御之十有五年適遇疾弗愈百藥罔效或有言神靈驗者禱之輒應脫然平復於是大新閩地廟宇命有司春秋致祭歲時易衣給户灑掃又於京師立廟以祀之加封金闕真人玉闕真人十六年又加封金闕真君玉闕真君賜廟額名洪恩靈濟宫正統初年重新宫宇進號金闕崇福真君玉闕隆福真君成化二十二年重加尊號伯曰九天金闕總督魁神洪恩靈濟慈惠高明上帝仲曰九天玉闕總督罡神洪恩靈濟仁惠宏靖上帝遞年以來每月朔望并萬壽聖節元旦冬至及二真君誕辰俱有祭祀遣官行禮及時食獻新至今不缺四時已有皮辨冠大紅紗羅紵絲織錦雲龍朝服近又加以平天冠明黃紗羅紵絲衣服其黃服五年一次更換紅服十年一次更換焚化夫神之世系年代可考如此本非有甚異也先年只因有功於閩廟食一方後以保護太宗文皇帝聖躬故京師有别廟之奉祀但本處既有春秋二祭而京師一年之間復有前項數次祭祀不無煩瀆且惟皇上帝主宰於天而兄弟並稱上帝其為僭擬可知至袍服等件在京更換焚化差遣內官前往福建齎送道路騷擾虐害人民不可勝言今議得廟之創造既始於閩則神如有靈固當往來於閩所有福建舊時祭祀宜仍其舊其京師聖節并朔望等項祭祀及時食獻新俱乞罷免若以有廟無祭為嫌則於二真君誕辰各遣本宫住持致祭一次仍乞革去帝號照依永樂年間加封事例止稱真君冠服仍用本等服色在京者聽令本宫住持廟户人等於每年應換之日會同道籙司掌印官依期更換如法收貯不必焚化直待敝壞之日方許奏請更製將不堪者照舊火焚其在福建者亦同此例但遇有敝壞者聽令布政司督屬就彼處置修理以後再不差人前去永為定例所有現在平天冠明黃袍服責付本宫庫內收貯仍行內府各該衙門無得再行製造如此既不失報功之典而祀亦不至於煩瀆矣神父聖帝神母元君金闕元君玉闕元君謹按徐仙真籙及國朝御製碑文神父神母者即二真君之父母金闕玉闕元君者蓋其配也宋理宗朝封父齊王為忠武真人母白氏仁壽仙妃配許氏助順仁忠仙妃陶氏助善慈懿仙妃國朝永樂中加封父翊亮真人母淑善仙妃許氏真應仙妃陶氏恭靖仙妃繼又進封其父為真君成化二十二年神父加封高上神主慈悲聖帝神母加封安寧護國恭靖元君金闕妃天房衛保節靖元君玉闕妃天房衆母顯祐元君每歲萬壽聖節正旦冬至俱遣官致祭而金闕玉闕君前又有誕辰之祭皆二真一時禱應之功故推及而崇奉之如此今議得神父徐溫乃五代時誤國專權弒主殊無功德祀以報功豈宜濫及况父母并妃並受隆名稱帝稱君僭擬益甚所有名號乞照永樂間封者為正以後加增一切祭祀俱各罷革京都城隍之神謹按易坎卦有曰王公設險以守其國蓋謂人君者觀坎之象知險不可陵也故設為城郭溝池以守其國以保其民人傳記謂其制自黃帝始歷代建國必有高城深隍上以保障宗社朝廷下以衛捍百官萬姓其所係甚重其為功不少故國朝之制天下府州縣皆有城隍廟之祭京都城隍廟舊在順天府西南纍朝皆加修葺歲以五月十一日為神之誕辰及萬壽聖節各遣官致祭夫廟祀城隍之神本非人鬼安得誕辰可謂謬妄况每歲南郊大祀壇八月山川壇俱有合祭之禮事體已重此與天下府州縣之祭不同所有前項祭告煩瀆無據俱各罷免奉旨是商文毅輅諫祀玉皇疏竊惟聖上嗣守祖宗大業十有三年夙夜憂勤圖惟治理天下之人無不感仰聖德視前代嗣統之君逺過萬萬是宜天道協和雨暘時若休徴畢應而妖孽不作也夫何近年以來災變日多去歲宫門火災秋大雨水一冬無雪今春嚴寒河氷重結郊祀之際大風怒號二月朔望日月連蝕南京地震陜西天鳴即日又有妖物害人之異此皆隂盛陽微非常之變也夫天道不逺感召在人觀此則今日人事之不修政德之有虧軍民之怨困莫伸國家之事變叵測不言可知此誠皇上側身修行之時所宜深省逺慮以安宗社為念增修德政講求闕失疏逺私昵節省冗費以回天意可也臣等又惟人君應天以實不以文事神以誠不以物祖宗創為郊祀之禮每年一次舉行極為愼重邇者臣聞皇上推廣敬天之心又於宫北建祠奉祀玉皇取郊祀所用祭服祭器樂舞之具依式製造并新編樂章命內臣習之欲於道家神降之日舉行祀禮臣竊詳皇上為此非有他故無非上為母后祝釐下為生民錫福用圖保安宗社於萬萬年之久聖心誠敬人所共知但稽之於古未為合禮昔傅説之告高宗曰黷於祭祀時謂弗欽禮煩則亂事神則難釋之者曰祭不欲黷黷則不敬禮不欲煩煩則擾亂皆非所以交神明之道也况天者至尊無對尤非其他神明可比事之之禮宜簡而不宜煩可敬而不可黷乃别立玉皇之祠祀并用南郊之禮樂則是相去一月之間連行三祭未免人心懈怠誠意不專且郊祀所用執事并樂舞生皆神樂觀道士為之謂其離族出塵清心寡欲刑喪病疾之人一切不預祖宗制禮蓋有深意存焉皇上為天之子其於事天之禮豈可不斟酌典故而致有纎毫之不謹乎臣等伏望聖明將前項神祠停罷神像送宫觀侍奉祭服祭器樂舞之具送太常寺收貯凡內庭一應齋醮之事悉宜停止今後聖節等項修齋悉照舊例施行勿為褻瀆庶幾天心昭鑒可以變災而為祥轉禍而為福宗社萬萬年無疆之慶端在於此徐文靖溥諫祀三清疏近司禮監傳示聖諭遞出祭三清樂章令臣等改補進呈臣等謹按天子祀天地天者至尊無對盡天下之物不足以報其德惟誠意可以格之故禮以少為貴物以簡為誠祭不過南郊時不過孟春牲不過一牛蓋祭非不欲頻頻則反黷物非不欲豐豐則反褻書曰黷於祭祀時謂勿欽禮煩則亂事神則難正此謂也漢祀五帝儒者尚非之以為天止一天豈有五帝况三清者乃道家邪妄之説謂一天之上有三天帝至以周時柱下史李耳當之是以人鬼而加於天之上理之所必無者也若夫樂器之清濁樂音之高下有制度有節奏毫釐之際不容少差差則反以召禍况製為時俗詞曲以享神明褻瀆尤甚以此獲福又豈有是理哉我朝天地合祭祭用正月皆太祖所親定樂器樂章皆太祖所親製足以傳之萬世當此之時豈有三清之祭俗曲之音今所遞出樂章雖云出乎永樂大典蓋是書之作博采兼收欲以盡天下之事初未聞以此施之朝廷見諸行事以為後世法也陛下純誠至孝嗣統守成一以太祖為法以上追二帝三王之盛不宜黷禮事天臣等讀儒書窮聖道道家邪妄之説未嘗究心至於鄙褻詞曲尤所不習不當以非道事陛下所以連日憂惶不敢奉命者實不願陛下此舉也且古之帝王必資輔弼以成治化舜大聖也其命禹之辭曰豫違汝弼汝無靣從伊尹之告太甲曰有言逆於汝心必求諸道蓋惟恐臣之不盡言也仰惟祖宗所以置文淵閣簡命學士居之者實欲其謀議政事論講經史培養本原弼正闕失非欲其阿諛順旨惟其言而莫之違也臣等待罪此地積歲纍時今經筵早休日講久曠異端邪説得以乘間而入此皆臣等講讀不勤輔導無狀不能事事規正以啓陛下之聖心保陛下之初政憂愧之至無以自容近數月來凡奉中旨處分其合理者自當仰承德意不敢違越間於民情有干治體相礙亦不敢茍且應命以誤陛下未免封還執奏至再至三迹似違忤情實忠愛似此者多伏願陛下垂日月之明廓天地之量俯加鑒察曲賜依從臣等益當勉䇿駑鈍庶幾少有禆益非但樂章一事而已劉文靖健革除濫祀疏今月十七日冬至節靈濟宫祭金闕真君玉闕真君奉旨遣尚書李東陽行禮臣等切有愚悃謹昧死為陛下陳之佛老二教聖王所必禁儒者所不談中世以來正道不明人心久溺如秦始皇宋徽宗好仙漢楚王英梁武帝好佛唐憲宗仙佛俱好求福未得皆以得禍載在史册事迹甚明若靈濟宫所奉二真君乃南唐徐溫二子知證知諤謹按正史所載徐溫養子知誥篡偽吳王楊氏諸子皆為節度使知證夭死知諤病死五代石晉時無故立廟稱之為神國朝雖有廟宇然亦止稱為真人令道士供奉香火成化末年加為上帝禮官失職不能規正先帝初年革去帝號天下傳聞以為聖政真君舊稱尚未盡革至於神父神母仙妃皆是僭叛家屬濫冒美名尤為非禮每歲三大節分官祭祀不知何時復遣內閣儒臣臣等初承遣命未敢固違因循至今勉強從事恭遇孝宗皇帝崇儒訪治舍已聽言方欲具奏論列而龍馭上升徒深悵慕近者文華殿所供佛像有旨令臣等撰文祝告臣等以為事關治體據理上陳荷蒙聖斷即時撤去仰見陛下聰明正大遠過百王善推所為雖堯舜之治不難致矣靈濟真君生為叛臣死為逆鬼而冒名僭禮享祀無窮惑世誣民莫此為甚臣等讀聖賢書當勸陛下行帝王之道心知邪偽而身與周旋則講讀者皆為虛文輔導者更為何事且有其誠則有其神無其誠則無其神縱使有之亦須誠心對越乃能感格臣等心既不信誠從何生強使驅馳雖祭無益若先師孔子遣祭舊規臣等自當竭誠奉命其一應寺觀祭告自來並不干預伏乞聖明洞察俯聽愚言將前項祭祀通行革罷免令臣等行禮先帝革號於涖政之初陛下革祭於嗣位之始傳之後世於前有光庶祀典不愆治體無纍而臣等瘝官失職之咎亦少逭於萬一矣內閣楊廷和請停齋醮疏夫齋醮之事乃異端邪説誑惑時俗假此名目以為衣食之計佛教三寶道家三清名雖不同其實同一虛誕誣罔聖王之所必禁在昔梁武帝宋徽宗崇信尊奉無所不至一則餓死臺城一則纍繫金國廟社邱墟生靈塗炭求福未得反以召禍史册所載其迹甚明若使二君當時左右隨侍皆得正人何至受禍如此哉二君且未暇詳論只如近日劉瑾建元明宫錢寧建石經山祠張雄建大慧寺張鋭建壽昌寺于經建碧雲寺張永建隆恩宫所費金銀不可勝計其心本欲求福也然皆身被誅竄家底敗亡略不蒙佛與天尊之庇佑由此觀之則其不足信也明矣夫何讒邪小人公私眩惑不遵祖宗法度不畏天下議論至使宫闈之內修建齋醮萬乘之尊親涖壇場上惑宸聰下誑愚俗以為福田可種利益可求災患可除祥瑞可致不知年來遠近亢旱風霾災變彼何不誦一經不念一咒以消弭之乎南北直隸山東河南流賊往來焚劫殺戮彼何不驅神兵鬼將以掃平之乎陛下試以此驗之則其無益有損不待辨矣况陛下親涖壇場行香拜籙亦甚勞矣何不移之以御講筵修設齋醮糜費錢糧亦甚多矣何不移之以賑窮困正道異端不容並立心既繫於彼則必不繫於此邪説既入聖賢之經訓自疏播之天下傳之後世其為陛下聖德之纍不少非止虧損聖治耗蠧民財而已宗伯夏言議瘞佛疏比者恭遇皇上咨及羣臣欲除去禁中釋殿奉建兩宫以備一代之制一時廷議翕然仰贊皇上篤養盡制之孝闢邪崇正之化盛德大業光前振後已今月十一日伏奉聖旨命大學士李時同臣言入看即所謂大善殿者臣等看得殿內有金銀鑄像巨細不下千百且多邪鬼淫褻之狀伏惟聖明燭其誕妄不經一且奮然舉而除之甚盛舉也但臣見諸几案之上及懸庋梁栱之間與夫金函之所藏貯者為物尚多不可識辨問之守者且云是為佛骨是為佛牙枯朽摧裂奇離磈礧計不下千斤臣惟佛法之入中國自漢明帝時始然不過人誦其書習其教而已至唐憲宗朝乃迎佛骨至京師其臣韓愈上表極言其邪穢不祥不宜以入宫禁憲宗不能聽且深罪愈竟遠斥之臣意自是厥後人莫敢矯其非凡番僧持以誑惑中國之人而名為佛顱佛骨者相屬於道由是流入天子宫禁之內歷世皆然而不以為異今殿中所有未必非勝國所遺國朝以來亦必以為彼法則然未嘗深究以延至今兹者恭惟皇上躬堯舜禹湯文武之資行堯舜禹湯文武之道始議撤佛屋毁除穢像使詭異之形不得瀆留清禁此真卓越千古之見出於尋常萬萬者也然殿宇像設既除所有前項佛頭佛牙之類皆屬汚穢不宜使之尚存臣請乞以此物敕下所司瘞之草野一切掃而淨之以杜愚冥疑惑之端實為大聖人非常作為有補名教甚大功德罔極臣不勝幸甚後世幸甚疏入答曰大善殿所貯佛骨諸不經之物瘞之草野恐後日好事之人仍為啓視不如焚之以杜永患遂命禮部俱於城外焚之宗伯沈鯉拆毁寺觀疏看得户部尚書王遴條議要將近日私創寺觀菴院盡數拆毁僧道年四十以下無度牒者盡數驅逐歸農流寓者遞歸本籍土著者收入里户白蓮羅道等會惑衆糜財者悉從重懲治一節為照異端之術足以惑世誣民茍非禮教素明未有不蠱於福田利益之説者在昔已然其風猶未甚也邇來遊手遊食之輩布滿中外此倡彼和莫可收拾以致梵宇琳宫星列碁布而無知之民約會進香建幟號佛者日充斥於道途豈直民財糜費上虧惟正之供且風俗漸偷釀成地方之禍臣等目擊兹弊方欲申飭今尚書王遴條奏及此深得移風易俗足國裕民之計相應酌議題請恭候命下移咨兩京都察院轉行五城內外及天下司府州縣地方大小寺觀菴院除係古剎及奉有欽依建置照舊存留聽其焚修外若係近日私創菴院招集僧尼瀆祀不經者悉行拆毁入官以後再不許新立增置違者依律問遣僧道曾經給有度牒年四十以上者照舊存留其年四十以下未經給度牒者查果戒行無礙姑準查照見行事例申送納給度牒如不行給度牒削剃不守清規與流寓遊食之徒一併驅逐原籍務農當差一切白蓮羅道募緣僧道及約會燒香頭戴甲馬口稱佛號等項愚民在內聽緝事衙門在外著巡邏員役嚴加禁捕務得會首倡率之人依律枷號治罪知情故縱者罪亦如之勿視虛文務臻實效然臣等猶有過計者夫禮之禁於未然者易為力而已然者難為功查得僧道之禁節經言官建白本部議覆不啻三令五申矣而齋醮施捨愈昌愈熾俾異端者流安坐而享富厚豈盡左道之愚人抑亦崇尚者之自愚耳崇之於彼而欲禁之於此猶聚羶而去蠅增薪而止沸耳其將能乎今宜於禁令之外仍以禮教隄防之乞敕各撫按嚴督各該守令母專以簿書期會為急而務以移風易俗為要申明聖諭勸化愚民教以君臣父子之常道示以農桑衣食之恆業曉以惠迪從逆之實理喪葬必依家禮有擅作佛事者必罰祈年必於方社有揭榜消禳者必罪大經既正邪慝漸消行之既久果於風化有禆不為俗吏吏部開著上考脫有奉行未至亦宜罰治以示創懲庶幾教化與法制並行民風與世道咸賴矣奉神宗旨各處寺觀菴院除古剎及敕建有名的照舊存留其餘私創無名黷祀不經的兩京著五城御史在外撫按官嚴行稽查應改應毁酌量區處具奏餘依擬禮部侍郎蔣德璟糾張真人疏臣惟古帝王天保治內采薇治外治內在省刑薄賦以固民心治外在選將練兵以鞏國勢並無所謂異教也比者敵寇交訌民不聊生幸皇上神武英斷清理寃獄蠲免舊逋近復再行親耕勸農頒詔民始有再生之望而於邊腹二寇宵旰惓切中外翹首佇見廓清乃有真人張應京乞渙發三官徽號一疏則臣等不能無駭者據道藏並無三官之説近世始有之其經以天官地官水官為陳子椿之子有無不可知然既經晉號而應京復請齎諭中外一體遵奉共奉慶賀則不惟例所不載其意欲以何為得無借以簧鼓愚民使之奔走供奉以為利乎抑幾幸差遣招搖誑耀以為名乎近年異教盛行遊惰姦民棄農不務逃入二氏之徒脫漏户口消減丁糧不啻千萬别有白蓮無為等教夜聚曉散所在充塞若復許之慶賀其惑亂有不忍言者漢末之黃巾以妖術授徒及應京之祖道陵以五斗米設教是也道陵舊事姑不深言自晉及唐其子孫並無封號宋崇寧中始賜號張繼先為虛靖先生亦並無品級至元始加真人稱嗣天師高皇帝以天豈有師斥之且以清理釋道二教責之臣部大哉聖謨一洗元人之陋矣應京酒肉俗流前春祈雪不效而歸此來沿途祈雨亦不效反以得雨誑告蓋與誦華嚴經咒蝗者並笑破天下之口而尚久戀京邸耗蠧不訾長愚民左道之心短邊兵血戰之氣無益有害斷可知矣似宜急逐歸山以清輦轂至其妄瀆宸聽容臣等照左道惑衆例依律究處伏乞聖斷施行禮部諫殤王不宜加道號疏為傳奉事祠祭清吏司案呈崇禎十三年十一月十三日奉本部送該內府遞出揭帖奉聖旨皇五子悼靈王追贈為孺孝悼靈王通元顯應真君禮部擇日具儀來行欽此欽遵傳奉到部送司案呈到部恭照皇五子孝敬性成神靈天授誠為千古希遘皇上以孺孝二字辨於王封用表岐嶷而復賜以道號盛典也亦異典也臣等方手額讃嘆豈敢復有異議但臣部歷稽職掌所載册封典禮皆有王號而無道號蓋王號以世法埀儀闡懿易名皆古今共遵之典道號以神道設教元感靈通實不可思議之事皇五子儼然王也自古帝王至德要道未有不以孝為首稱皇上以儒道治天下表章孝經垂訓萬世而皇五子年甫五歲孝本生知誠有成立屏藩所不能及者稱為孺孝悼靈王傳之中外洵足光昭孝治惟是追封真君之儀遍察大明會典集禮國朝典彚正續文獻通考杜佑通典及本部職掌等書皆茫無可循臣等禮官也禮所已行者自當恪為遵依仰成懿美若其未經行者亦不敢擅自撰擬致有乖違萬一使好異者以臣部為嚆矢而循常者復以臣部為射的則臣等之罪大矣章服學士宋濂議歙儒有議章服之制者其言曰公之服山龍華蟲火宗彛五章在衣藻粉黼黻四章在裳五章則五列也四章則四列也四列之外雜以雲朵間之禮官駁之曰九章之名則是也其謂五列四列則歷代之制無有也非也自軒轅氏肇為章服有虞氏從而明之各章或一或兩而已惡取所謂五若四哉假使其言可行則天無二日天子之服當繪三辰無乃有數日乎矧三辰者咸法天而成章雲亦天物也設用以間之無乃又益之以一章乎蓋曲説之無據者也是未可信也宋濂曰禮官之議皆傅經而辨善則善矣至謂歷代之制無有則不能有以降其心也竊按唐制袞冕之服衣繪而裳繡自山龍而下每章一行為等每行十二夫行猶列也天子之衣既云每章分為十二則公之服似可以類推但不知五四之分又别何所見也若自山龍而下始然則日月星者必仍其舊而無所加強誣天子之章當有數日亦不能通矣又按宋制章服並織成間以雲朵而補其空地夫間以雲者不過藉為文章而周飾之亦非益之以一章也由是觀之歙儒其果有據乎無據乎若不待知者而後決所可憾者好竒之過舍先王之法壞侈靡之習逮於六代極矣至有議畫鳳於袞以示差降飾圓花於裳而云於禮無礙者况於唐宋之世哉豈惟袞衣為然也冠冕之制古者以采藻為旒前後邃延延冕上覆也元表纁裏後世則用龍鱗錦表綴玉為七星旁施犀屏金絲網之屬又外作翠旒使碧鳳銜之古者以旒數為降殺極於十二而止後世則或增為二十四焉使歙儒舉以為言則羣起扼其吭矣不觀其會通而遽斥人以曲説豈亦可哉然則將安從之曰章服當凖有虞氏之制古之人有是言也宜以禮官為正嘉靖中上諭張孚敬曰兹者光澤王奏請冠服之式以便遵服朕已允其言今思其製當以燕辨為凖親王用九􅙭世子郡王用八􅙭郡王長子用七􅙭俱去簮與五玉後山皆一扇為之分畫為四服用青身青緣前後方龍補各一身用素地邊用雲帶用青衣緣裏履用皂白襪其補子郡王以上許綵粧郡王長子止許織金為之未知可否卿其詳看來聞張孚敬回奏云臣謹按國朝定制天子冕冠十二旒皮辨十二縫皆象十二月也今燕辨十二縫正如其數又親王冕冠九旒皮辨九縫今燕辨宜用九􅙭親王世子冕冠八旒皮辨八縫今燕冠宜用八􅙭郡王冕冠七旒皮辨七縫燕冠亦用七􅙭兹聖諭世子郡王俱用八􅙭郡王長子用七􅙭竊謂郡王冠冕皮辨既俱用七旒七縫今燕冠若同親王世子八􅙭恐燕服之制獨於公服等數不合或宜用七􅙭庶與冠辨之數相合其郡王長子或宜殺用六􅙭自鎮國將軍以下各依原忠靖冠品官之制服之可也又思燕辨冠服及忠靖冠服俱欽定名今諸王冠服宜更立名伏乞裁示上曰卿回奏具見詳明夫朝冠公服止於七數間常所用反重之可乎郡王之冠仍宜七數其郡王長子既無冕辨只可同鎮國將軍之制可也惟冠五􅙭以分等差一如忠靖之制式又其名當異於朝廷庶别天子諸侯也或名之曰保和曰寧義孚敬請用保和從之崇禎庚辰上傳禮部今百官燕居皆用世廟所製忠靖冠服賜閣臣五人一襲復以二襲下部為式上燕辨冠元端服襯以深衣素帶元履冠用烏紗上分金線十二瓣前飾五采五雲各一後列四山雙玉簮服即古元端制身用元邊緣青兩肩繡日月前蟠圓龍一後蟠方龍二邊加龍文八十一領與兩袪共龍文五九袵同前後齊共龍文四九深衣黃色袂圓袪方下齊負繩及踝十二幅素帶衣裏青表緑緣邊腰圍飾以玉龍九片元履朱緣紅纓黃結襪用白考衣服之制漢天子冠通天冠服衮龍袍唐冠翼善冠服赭黃袍宋一大裘冕二衮冕三通天冠絳紗袍四履袍五衫袍六御閲服洪武中學士奏古者五冕祭天地宗社諸神各有所用請製之上曰五冕禮太繁祭天地宗廟服衮冕社稷等祀服通天冠絳紗袍洪武乙酉賜各朝臣袍帶凡二千八百一十三人禮部奏準唐制服色皆以散官為凖元制散官職事各從其高者故服色亦因之今各官服色宜依所授散官與唐制同百官衣服自十月初四日至次年三月初三日穿紵絲自三月初四日至四月初三日穿羅自四月初四日至九月初三日穿紗自九月初四日至十月初三日穿羅俱司禮監預題以中旨行之孝宗時令禮部申禁服色閣臣請應禁花樣上諭若蠎龍飛魚斗牛皆不許用亦不許私織間有賜者或久而損壞亦自織用均為不可又諭云黃紫皂是正禁若柳黃薑黃等色皆須禁之又諭元色可禁至黑緑乃人間常服不必禁但內人不許用文職官讀書明理猶不敢僭內官不知道理多僭要嚴加緝訪閣臣王錫爵請傳戴暖耳疏臣伏見連日雪後風寒異常百官尚未蒙恩傳戴暖耳在聖主或深居暖閣不知外寒在微臣則歷事先朝頗諳舊典蓋祖宗二百年來歲傳暖耳示體恤於等威之外乃故事中之特恩所以百官傳衣不謝而傳暖耳獨謝此燔肉醴酒之類物微禮重古人以此窺君心之取舍驗政事之勤替不可忽也大抵人臣有不公不法之罪寧峻其譴訶之法不可無故而賤厭若無故而賤厭則重道義識廉恥之人日逺而讒諂靣諛厮輿牧養之人日近臣竊懼焉為此不憚瑣屑具揭上請伏望皇上少思足寒之傷心毋愛餼羊而廢禮臣等幸甚四方聞之亦幸甚宗室馬文升保全宗室疏竊惟親莫親於宗室法莫嚴於祖訓宗室奉藩循理恪遵祖訓者朝廷親親之恩為益篤縱欲敗度有違祖訓者朝廷黜罰之典所必加昔周武王克商之後以其弟管叔蔡叔監殷後二叔挾殷之武庚以叛流言以傾王室故周公奉命東征誅管叔而囚蔡叔孔子恕之鄭莊公弟叔假母寵愛之莊公不早防間封之於京縱彼所為候其惡深舉兵伐之如克常人春秋譏之一則事於宗社而示天討之公一則不預防間而虧親親之義或恕或譏此天下至公之法而萬世之所不可易者也洪惟我太祖高皇帝天生聖武袪除羣雄奄有中夏掃一時之陋俗回百代之醇風功德之盛遠符堯舜有非後世之所能及故本枝繁衍亦非前代之所能比封建諸王藩屏王室藩王之子封為郡王郡王之子襲封郡王諸子俱為鎮國將軍以漸而降世為奉國中尉藩王府內官設承奉正副各一員典寶典膳典服各所正副各一員內使六名各門正門副各一員內使司樂二名司弓矢二名外官設長史司左右長史二員典簿一員其餘審理典膳奉祀典寶紀善良醫典儀所各有正副官二員伴讀四員教授一員內外各設官以理一國之政彼時俱遴選才識老成之人以充其任而輔導之方甚嚴王若有過先責輔導官員所以各王讀書樂善保守其國而稱賢王者甚多縱欲敗度而被黜罰者間有自正統年間至今除秦晉蜀襄淮德吉徽崇等府并新封興岐等府內官不缺外其餘王府內官有缺不行具奏有一府止有承奉一員者甚至全缺不補者宫門有傳事多係女人其他郡王府亦無火者往來傳事俱係外人凡百出入尤無禁忌雖有藩王其郡王并將軍有係尊屬或族屬頗疏者雖知所為非禮不敢戒諭輔導官員不敢諫正其鎮巡三司官懼其妄奏欺侮離間差官勘問亦不敢具奏所以肆其所為有潛畜異謀而蒸淫不道者有強擡軍民子女而打死人命者有骨肉相殘而至成仇敵者有密取外人之子為嗣者有呼喚樂妓入府姦用者甚至宫閫不肅致生外議其他將軍潛入富樂院宿倡者或與市人飲酒賭博者以致衣食之不足欠負於人鞍馬全無徒步於市雖有祿米不能供其浪費矣及至事發差官行勘事多不虛因違祖訓事干宗社有不終其天年者有幽之高墻者有削去爵秩者有革去祿米者况醜惡之事傳之中外聞之天下又恐史册書之貽譏後世誠有玷於朝廷若使原設輔導外官內官各得其人早為諫正藩府親王肯為戒諭鎮巡等官預為具奏豈有前項之事哉與其懲治於已敗而示黜罰之典莫若保全於未然以全親親之仁如蒙乞敕各藩王除本府內官不缺不必具奏其餘缺少內官內使者明白具奏缺內官若干員內使若干名仍乞敕司禮監於相應內官內使擇其老成讀書者具奏照缺給賜前去以後有缺具奏除補互相維持府事其合用衣服飲食等項本府照例關給使之得所不許凌辱陷害其郡王府每府給賜內使二名專管宫闈事務及關防門禁其長史紀善伴讀教授乞敕吏部今後有缺務要訪察國子監並在外有學行儒官除授若藩王所為未善長史等官從容諫正如其不聽再三匡諫如再不聽密切具奏其郡王所為不合禮度者教授藩王密切戒勉如再不聽藩王具奏情輕者降敕切責若干宫闈重事差內官皇親前去體勘密切處置不宜露泄於外若係外事仍差內官并法司官前去勘問藩王有過專罪輔導官員郡王有過專罪內使教授如此防間自無過舉其藩府輔導官員亦要逐日請王於書堂內講讀習禮王子王孫亦要講讀習禮若各府將軍有前項所為者各府郡王自行禁治若藩王郡王府互相容隱不行禁治許鎮巡等官將所為不法之事會本著實具奏上請區處其藩王府選用妾媵務要具奏奉有明文定其名數不許於本府軍校之家選用不許過數亦不許強買民間子女郡王將軍使女俱照會官奏準事例名數若擅自買用女子及名數過多或令外人入府者許鎮巡官參奏長史教授降調遠方任用若樂工縱容女子擅入郡王府及容留各府將軍在家潛行及軍民旗校人等敢有與將軍賭博誆哄財物及擅入王府教誘為非者事發發邊遠充軍色長依律問罪革去管事保全宗室莫過於此臣叨任大臣每見宗室所為不善事發容之則違祖訓所以不能保全者多臣竊憫之故敢冒昧上言崇禎八年禮部左侍郎陳子壯宗才換授非易疏臣伏覩陛下求賢圖治之盛心致甄拔乎宗才明援祖訓凡郡王子孫有文武才能堪任用者宗人府具以名聞朝廷考驗換授官職其升轉如常選法至再至三必欲見諸舉行臣待罪禮官二年矣從府部科諸臣參議此事僉謂三百餘年之曠舉宜加詳愼然臣恭承節次之明諭實非尋常所能測度者蓋易之象曰地上有水比先王以建萬國親諸侯堯典睦九族以平章百姓人徒見官人以族一若有親比之迹者殊不知聖人立賢無方一平章百姓之心也聖人之待九族也與天下士庶同其親親而賢賢義有兼該者也比者聖諭通行保舉之法令兩京文職三品以上於進士舉貢監中各舉堪任知府一人五品以上及翰林科道撫按司道知府官於舉貢監生士民中各舉堪任知州知縣一人亦何嘗有私於天下之才乎陛下之意誠以科目所以舉才而有不盡於科目者今乃四出弓旌廣張羅網即使諸臣有內舉猶且不避厥親而况於天潢之派乎曩所諭臣部至稱賢才不外於科目殊屬偏見者正此之謂而當四方多故人材落落求所謂疏附後先奔走禦侮於宗子維城之中即拔十得五詎不勝任而愈快然而事有未必盡然者三有不可行者五請瀝其愚為陛下籌之國家設資格以處常才而又不純用資格以待非常之才蓋不特非常之才不勝常才之多也亦以非常之事不勝常事之多也是故文職四品及在京堂以上官在外方靣五品以上官有缺員皆具名以聞自五品以下吏部斯得銓注今進士初任亦止循其甲第逮不次擢用又往往超越常調焉若非有殊庸異績及國家異常猝變未聞拔卒為將徒步而至卿相者濟濟克生非多於萬邦之黎獻也將資格可以不論而非常之才亦可輩出乎臣竊以為未必然也自宗藩四民之業開其有文才則於文科見有武才則於武科見宜已倘謂二科不足以盡才倍宜致重於二科之中自不宜因重才而輕二科也典禮雖大封拜未嘗朝賀獨朝賀於䇿士傳臚之後致辭天開文運賢俊登庸何如其重也今謂進士豈必賢於舉人則舉人亦豈必賢於貢監貢監亦豈必賢於齊民夫然則天下胥為齊民已矣又何必辛勤偕計以縻有司續食乎而臣部奉功令所日厲飭於科場文義字句之間凛乎其不可輕貸者又何如其重也然則謂科目之外遂足以盡才臣亦以為未必然也夫科目之制本六經詩書之文用濂雒關閩之説漢人所謂經術宋人所謂道學不出乎此其獲俊者節義勳伐於此乎生其即不獲俊者於以耗雄心消餘年亦不失為白首窮經之士此祖宗磨礱一代之善物也故庸有通科目之義而不能窮理致用者矣未有不通科目之義而能窮理致用者也今宗藩中非將軍則中尉有食祿之貴其所以屈首讀書者為有科目之資格可更進更榮耳使見不屈首讀書亦得掇拾竒榮以去誰肯避逸而趨勞乎而謂將有劉向李勉趙汝愚之才不由屈首讀書而進者臣亦以為未必然也臣謹按洪武三年開科十七年始頒科舉定制猶在或行或罷祖宗之意未嘗以換授官職與科目出身並著當是時也親郡王將軍才四十九位高皇帝親歷民間果見有懷才抱德如葉琛章溢之流慮有遺逸異日子孫千億亦宜有以致詳乎此也而非必謂已經開科復有換授之如此其多途也故當時任用則燕晉代遼寧谷六王勒兵備邊兄之子文正然且不效况今時勢視高皇帝為何如換授之議臣期期知其不可矣乃至齊黃諸臣冒鼂錯之禍我成祖非不心高皇帝之心而時異勢殊也嘗駐蹕東平州謂侍臣曰漢東平王蒼開國於此其對明帝曰為善最樂當時諸王泯沒惟蒼有賢名至今朕嘗以此勵諸王卿等勿忘斯語列聖纘承因是而飭越關奏擾之禁因是而嚴王親任京官之條目列聖非不心高皇帝之心亦時異勢殊也不特此也國初親王有每年朝覲之禮凡遣使至朝廷不須經繇各衙門直詣御前且有守鎮兵有護衛兵而又許歲時出城演練者此大都開創之體制則然謂換授為祖訓將議而行之如前數者獨非祖訓乎亦將議而行之否也而臣固有以知其不可矣高皇帝之時親王之祿五萬石縀絹鹽菜之用亦復萬計不數年而止給祿米不給雜用又不數年而減為萬石又不能給而代慶遼肅寧谷諸王且歲給五百石高皇帝令自巳出而前後巳如此夫祿與爵一也乃祿猶可視物力為盈虛爵則名器所繫一假不可復收吳王几杖之賜叔段京鄙之求又將何所限量乎當敵入河套而襄陵王沖秋願率子孫及壻與總兵官從征請也憲宗皇帝復書曰朕已命將出師征討矣兹得王奏見忠愛之誠憂時之意但宗室子孫名分尊崇難與總兵官從事自祖宗以來藩邦無從兵共討之例夫從兵共討與勒兵備邊幾希矣而先朝致謹於此今宗室中忠愛憂時如襄陵者不乏也而其才能又以文武舉也假設以此來奏陛下又何以復之乎抑亦概許之否也而臣固有以知其不可矣親王之耳目未免寄之長史今也長史考察不屬之該撫按而屬之親王親王以為賢長史不得而異同也長史不得異同而該撫按又孰從而核實乎故親王以為賢核實賢則可如或不然巡方之參差多有不便者矣核實以為賢考驗賢則可如或不然館驛之伴送多有不便者矣考驗以為賢至授職任用也始終皆賢則可如或不然參劾之瞻顧考功之連坐多有不便者矣而臣已知其不可矣在外之八省有王府也在京而六部風憲衙門之多有關於王府也進士舉人三年一試貢士一年一試將來銓法推升已不知何如其衡量矣文武才能之目是未可以數計者也既皇皇而招之將源源而來懸人以待缺乎懸缺以待人乎抑權宜以處之也而臣又以知其不可矣蓋公家之事總為公家計萬全非徒取銷繳於一時也臣觀大凡見有所未明學有所不及有未必然而不礙於行者則寧姑從而申之有非甚利於行而猶冀其然者則無遽難以阻之今也有一於是乎貴臣之議其何以議之臣部諸務經理宗藩是其大端故有善必揚有請即覆者職掌之宜也雖臣之愚視篆三月名封婚壻惟恐後時旌奬恤諡惟恐缺典條議恩詔恤貧矜罪惟恐不盡而獨為此換授一事私憂過計反復囁嚅以告同官欲以入告者屢矣又恐萬有一分涉離間之嫌斧鑕不足贖罪然臣參侍講筵仰窺睿聽雖至迂疏無當之論偶涉忌嫌尚且傾注不懈矧兹事件斟酌遠大實非輕易故寧冒昧竭其狂瞽毋寧畫諾以旁觀模稜於兩可欺此心以欺陛下異日將謂臣在事之久有所知而不言言而不盡猶斧鑕不足贖罪也臣鄉之先達輔臣梁儲當武宗皇帝威嚴同列引避之時代草泰王牧地一詔竟以回天而事遂寢臣每歎息當日感格之竒轉成下濟光明之美况今遇神聖之主乎事即少異所以防微杜漸之意則一伏惟陛下俯賜採納允罷前議藩規銓政所全良多國家磐石之重於焉永安祖孫繼述之隆亦為盡善臣愚幸甚如或微誠不足以孚鑒謭識無當於遠猷則請敕下五府大小九卿翰林科道等官各抒共議以憑裁斷或俟保舉知府州縣之法行之有效然後推倣其意以保舉宗才亦未為晚敷衍冗長有踰限式更望聖慈寬宥臣不勝悚切祈懇之至僧道宗伯倪嶽疏該都御史馬文升奏我朝定制每府僧道各不過四十名每州各不過三十名每縣各不過二十名今天下一百四十七府二百七十七州一千一百四十五縣共該額設三萬七千九十名成化十二年度僧一十萬成化二十年度僧二十餘萬以前各年所度僧道不下二十萬共該五十餘萬以一僧一道一年食米六石論之共該米三百六十餘萬可勾京中一年歲用之數况有不耕而食不蠶而衣且又不當本等差役可謂食之衆而為之不舒矣其軍民壯丁私自披剃而隱於寺觀者不知其幾何民食不足府藏之空職此之由若不通查僧道之數以示再度之禁則遊食之徒何有紀極伏乞敕下禮部通查天下並在京寺觀共若干處僧道共若干名如果數多既已關有度牒難以追奪明白具奏不許額外再度僧道直至額數不足之時方許各該有司具結照數起送關給度牒敢有無故再言度僧者許六科十三道官糾劾拏問等因前件本部查得永樂十三年十一月二十七日節該欽奉太宗皇帝聖旨今後為僧道的府不過數十名州不過三十名縣不過二十名額外不許濫收續於天順二年五月十五日節該欽奉英宗皇帝聖旨今後有願為僧者務從有司取勘户內三丁以上年十五以下方許出家如額外有缺許照正統十四年榜例保送赴部考通經典然後給與度牒仍定與則例每十年一次開度許照缺依期來關敢有故違悉發邊衛充軍又查得成化二年給度過僧道一十三萬二千二百餘名成化十二年一萬三千三百餘名成化二十二年二十二萬四千五百餘名為因十年一度兼且各處納銀賑濟等項多有不查額數不由有司保送一槩請給以此額外增添數將十倍是以軍民之籍日削異端之徒日盛侵奪民食耗費民財其為治道之蠧莫此為甚誠有如都御史馬文升所言者合無準其所奏行移兩京僧道録司并各布政司直隸府州縣各邉衛有寺觀去處通查給度過僧道共若干備造文册送部存照以後各年有為事病故等項追繳度牒者照名開除仍將十年一度之例請乞停止待後各處額數不足之日方計所在官司照依額內名缺起送赴部考中給與度牒再不許內外衙門指以救荒納粟為由奏請給度庶得不致虧損國體僧道官亦不敢貪圖僥幸敢有故違許科道官紏劾拏問等因具題節該奉聖旨準册少見繳到誠恐無知小人止以十年一度為期不知巳有前項禁例以致各處僧道行童互相煽誘輒便預先來京潛住各寺宫觀設禮僧道官住持以圖至期可以夤緣請給一時不免蠶食京師將來米價日漸踴貴未必不由於此查得成化十二年節有奏準預期出榜禁約僧道不許來京騷擾事例理合早為照例查處案呈到部看得天下各處地方災傷數多民不聊生盜賊竊發劫財殺人在在有之中間解到賊徒多有僧人在內皆因先年給度泛濫所致及查先該錦衣衛指揮朱驥等奏稱奉敕巡捕盜賊今為盜之人多係各處無藉僧徒晝在沿街乞食夜則相聚劫掠得贓即分各行遠遁雖有巡捕人員無從追捕等因奉行都察院出榜禁約此為明驗况天下僧道額數不過三萬有餘而成化年間所度已該三十五萬有餘此非天地别生一種之人不過出於軍民匠籍之家即今天下軍衛有司工役衙門軍多缺伍匠多缺役里甲籍册日見凋耗皆由此等之徒躲重投輕捨此入彼若不早為限量將恐天下之人皆流而為僧道之歸其為貽患不可勝言合無本部查照先次奏準事理及纍朝奉有欽依事例通行天下司府州縣掌印官督屬查勘原先給度過僧道數目見在若干事故等項若干比於欽定額數有無多少務照先次奏準事理造册繳報除額數尚多去處外果有額數不足去處許待豐年有收之日徑自具奏本部查照成化十二年奏準給度事例另行奏請定奪施行仍要通行禁約各處寺觀僧道行童不許指以請給為由預先來京攪擾各該關津把截去處嚴加盤詰阻當仍行錦衣衛五城巡視監察御史嚴督各兵馬司僧道録司逐一挨查各處寺觀不許容留在外僧道行童在內潛住取具住持人員不致扶同容隱結狀繳報違者坐贓問罪無度牒之人發回原籍當差京城內外官員軍民之家亦不許容留僧俗混雜有壞風俗事發一體究治其有內外衙門及僧道人員或假救荒等項為由妄行奏擾者仍聽科道官指實參劾問罪淨身男子宗伯沈鯉疏稽古內官之設載之周禮曰內小臣曰閽人曰侍人曰內豎雖其職掌不過守王宫中門之禁掌女宫之戒令與內外之通令然必求正人居之如巷伯之倫是已降及秦漢而下乃以罪人充之我朝法制高出前代伏覩大明律一欵凡官民之家不得乞養他人之子閹割火者違者杖一百流三千里又條例一欵先年淨身男子曾經發回若不候朝廷收取官司明文起送私自來京圖謀進用者問發邊衛充軍臣等仰窺祖宗盛心即古除肉刑之意所以重絶人道預抑姦慝也至𢎞治五年節奉孝宗皇帝聖旨今後敢有私淨身的本身並下手之人處斬全家發邊遠充軍兩鄰及歇家不舉首的問罪其里老人等仍要時常訪察但有此等之徒即便捉拏送官如或容隱一體治罪不饒欽此但私淨之禁雖嚴而報官之路未開故自宫者旋即如舊至萬歷十一年節奉聖旨自宫禁例載在會典皇祖明旨甚嚴乃無知小民往往犯禁私割致傷和氣著都察院便行五城御史及通行各省直撫按衙門嚴加禁約自今五年以後民間有四五子以上願以一子報官閹割者聽有司造册送部候收補之日選用如有私割的照例重治鄰佑不舉的一併治罪不饒欽此但報官之路雖開起送之例未定故自來者紛然不已猶有曾萬壽等輩也夫以孝皇之明例皇上之嚴旨奚啻三令五申乃十數年來有司有造一册送部者乎有拏一私割照例懲治者乎法令不行德澤不布又何怪此輩之羣聚奏擾乎伏望敕下臣部嚴行各省直撫按官行令各州縣以文到之日為始以前見在閹割者許令報名到官查係三十歲以下精壯可用者姑免追究準其記籍其衰老不堪者行令各里族拘收以後凡情願閹割者報官查明果四五子以上方與記籍通前類造清册限半年一次送部候各監局缺人聽司禮監奏請本部通行在外各該衙門查係在册人數取其官吏里鄰不扶甘結起送赴部聽候選用其册籍無名及儇巧凶惡潑賴無恥者不許一槩濫送如有仍前私自閹割私自來京者在外撫按有司在內五城御史嚴加訪拏照例問以重罪如撫按等官不行訪拏及有司不行造册違例起送者聽本部查參請旨究治務在必行無事姑息庶黎庶免傷殘之苦而慈惠旁流宦寺皆端正之人而隙竇永塞仁至義盡萬世無弊矣再照死者人之所最重也今自宫之徒加以死刑而不懼者內臣之員數太多富貴太驟選進太頻有以惑其心耳我太祖高皇帝深鑒前代之失祖訓條章內府各監局內官俱有定員各有職掌一監常職止五員一局正副止二員官不過四品所掌不過灑掃供奉之事洪武永樂間未嘗額外濫設其太監等官非歷練老成雖有聰明才俊亦不輕授近年以來則有不然矣皇城之內通名籍者不止萬有餘人而倉厰場庫牟利無算蟒衣玉帶濫賞不惜又不三五年輒有一選選輒數千以故無知小民貪圖富貴入骨薰心奈何欲以死刑禁之乎臣等更望皇上恪遵祖制凡監局冗員非祖宗之舊者悉為裁革一切侵漁科索等弊悉為釐正蟒玉等服非效勞年久忠勤不欺者勿輕賜豫仍著為定例必十年以外方行收選一次務使宫府一體賞罰有章規制既定僥幸不萌前項無知之徒將不禁自息不終為聖化之纍矣春明夢餘録卷三十九
