body:
  text: 春眀夢餘録卷三十吏部左侍郎孫承澤撰五軍都督府五軍都督府在闕之西皆東向初置統軍大元帥府後改樞密院又改為大都督府秩正一品設左右都督都督同知都督僉事等官洪武十三年始分中左右前後五軍都督府各府都督初間以公侯伯為之參贊軍國大事後率以公侯伯署府事同知僉事則參贊軍事永樂元年建行都督府於北京後仍分五府稱行在某都督府十八年定都北京除行在字在應天者稱南京某府洪熙元年復稱行在宣德三年革行都督府正統六年復建五府其職分領都司衛所凡武職襲替及誥敕旗役併鎗手水陸步騎操練俸糧屯種器械舟車賞賜聲息軍情清勾替補邉腹畫圖貼説薪炭荆葦之事分移所司綜理之大都督府因樞密院而改建之者也樞密院之職實古太尉大司馬諸將軍而其名則循唐宦官之舊五季託肺腑其權寄宰相上宋顓兵政稍與宰相次而號兩府然皆縉紳大夫為之至元而用其國人與漢人之以武功顯者第往往參互一二縉紳以贊其謨畫至眀興而截然武辨藪矣髙帝之下集慶置中書省即置行樞密院而自領之功臣宿將得序遷為同知僉院同僉判官其品秩皆仍元舊至四年辛丑之三月始改置大都督府拜皇姪文正為大都督節制中外諸軍尋增置左右都督同知副使僉事官以中書參議李善長兼司馬宋思顔為參軍經歷都事皆極一時之選而同知僉院之在軍行者尚仍其故不改吳元年甲辰正月即王位定大都督從一品左右都督正二品同知從二品副使正三品僉事從三品尋大都督坐罪廢罷不設以左右都督為長官十月進階俱正一品同知從一品副使從二品僉事從三品三年革副使升僉事正二品凡天下將士兵馬大數蔭授遷除與征討進止機宜皆屬之十三年分大都督為五軍都督府見若以為品秩如其故者而兵部隂移之其權漸分矣至永樂而盡歸之兵部所謂五軍都督者不過守空名與虛數而已其左右都督以下至同知皆以加邉將之有功者其僉事以待序遷者而掌印僉書之類必以屬公侯伯間有屬老將之實為都督者不能什一也封拜考封建古制也而莫詳於周周之天子僅稱王而其下為公侯伯子男不能子男者為附庸其命則自九而至五其别則有同姓有異姓而其封則以功德不以親疏秦始并天下創尊為皇帝廢封建公族無尺寸土而猶存侯爵為三等以待有功者列侯則如武城通武之類倫侯則如建成信武之類皆有邑名而不稱國下者則關中侯有封食而無邑名然皆金印紫綬而列侯倫侯至位丞相上丞相之尊重者莫如李斯九卿之見幸有大功者莫如蒙恬兄弟而皆不得沾其慎貴可略推已漢髙豁逹裂天下以王諸子弟及大功臣而其次則因秦之舊為徹侯亦有關內侯凡二等第功臣之為王雅非其意至白馬之誓而獨侯國存武帝狹海宇窮兵黷武不愛通侯之印以待有功者即功雖鮮細或見録天下之壤地不能侯而國用則益侈於是苛為之禁以伺其過即鮮細亦見削而髙帝身與共創業之臣所餘無幾封拜日下而侯國不日益漢地不小損自武帝而後封拜之與削亦漸寡而終東西二京其制亦相仿佛中間雖有呂氏之擅王與新莾之盜為公未幾輒罷自魏氏之末司馬擅制始復為五等曰郡縣公侯伯曰縣子曰縣男皆得稱開國金印紫綬而關內侯有不開國者顧反居子男下晉氏以至齊梁陳皆因之若北魏之與北齊皆崇設王爵以待勳舊而其更有功者則别封郡公侯或一人而擔三四爵然同姓異姓皆不得為國王而郡縣公侯益卑矣後周宇文泰辭安定王遂以安定公終其身而其子篡魏進封功臣晉趙等大國然皆稱公而不王隋氏因之至唐而始定以子弟為親王正一品其稍疏而有功者為郡王功臣之有功者為國公皆從一品郡公以至侯伯子男則遞降焉如趙無忌梁元齡之類皆得世襲而他以恩賜者或世與否自安祿山之為東平王遂毁周例而踰之然中興以後王公之格益輕至有佩櫜鞬捧酒炙而趨走於節度之庭者而封亦不復世矣宋興復唐初之制以宗室之懿敘封王爵而其疏者與文武大臣自國公而下至子男往往以郊恩遞進徒以媺其名而已戶不得言祿爵不得言世然猶斤斤守其靳焉自蔡京之公兩國而公制紊矣童貫之為王而王制踰矣南渡以後所謂王者遂冒於宰執如檜如托胄如彌逺矣元承遼金之後王爵尤易即將相非勳德可以一嚬笑而得之獨漢人至國公而止明髙帝下建業草創未遑吳元年始拜功臣李善長徐逹常遇春為國公而其他功臣之死勤事封疆者有國郡公侯伯子男之贈然往往一循元舊洪武三年始大啓封建皇帝之子為親王親王之從庶子為郡王而功臣則公侯伯三等有世襲有流爵罷子男不置公侯位正一品上伯位正二品上朝服進賢冠加籠巾貂蟬世襲者領鐡劵流爵則否當是時封伯者僅二人忠勤之祿僅當侯三之一誠意至不能當六之一而其輕可知矣十年以後封東莞徽先祿遂與侯等至永樂初而始定居侯之下正一品之上其階勳皆與侯等而伯亦重矣凡公侯伯之任入則掌參五府總六軍出則領將軍印為大帥督留都管鑰轄治朝綱獨不得預九卿事宋制軍旅屬於樞密院與中書省並謂之兩府眀以兵部掌兵政而統軍旅專征伐則歸之五軍都督府兵部有出兵之令而無統兵之權五軍有統兵之權而無出兵之令至將屬於五府而兵又總於京營合之則呼吸相通分之則犬牙相制五軍都督府總天下之戎政國體具存其所關者甚大眀初勳臣俱充參逰後止充兩廣湖廣漕運三總兵又次苐革而惟戎政五府屬焉五府僉書猶有以都督充者至掌印則必勳臣嘉靖八年令五府掌印官都督有才望者一體推用終不能行都督有三等曰左右都督曰都督同知曰都督僉書是為世官副都督則流官也都督都指揮等官雖定於洪武初然其稱謂與後亦有不同如稱都督府僉書曰某府僉都督都指揮使司僉書曰某都指揮司左封印右封印皆見於張紞雲南機務抄黃嘉靖間會議疏列五府銜僉書與帶俸者槩稱管府事即錦衣衛堂上皆稱管衛事亦此例也初制總兵無專官有事命將事已即歸後因邉境多事遂留鎮守然或地方小警調兵勦殺非奉上命者即有功亦不稱捷具疏聞而已眀初在外兵馬盡是屯軍指揮千百戶管領而盡屬都司提調其制各都司掌印僉書等官缺本處有相應官聼各鎮巡官保舉兵部擬議具奏夲處無官兵部查訪中外相應官員兼用極重其選衛所之制洪武中設錦衣等上十二衛以衛宫禁留守等四十八衛以衛京城上十二衛為親軍指揮使司番直宿衛不𨽻於都督府永樂中設五府各衛於北京改前北平三衛為金吾左右衛為羽林前衛改北平都司為燕山左右衛為大興左衛為濟陽通州衛是為上十衛與騰驤左右衛武驤左右衛四衛亦得名親軍其武功中左右衛以匠役𨽻工部其諸陵設衛不隸督府亦不稱親軍凡親軍衛得直逹兵部其餘衛分流官世官土官襲替優給優飬所衛都司上之府引奏送兵部五府以中左右前後為序南以總兵坐中府北以總兵坐後府凡舍人承襲皆以五府試驗必年至二十以上方許比試初試不中者食半俸再試不中者降充軍蓋國初將材皆儲於此故其嚴如此每衛設指揮使一人指揮同知二人指揮僉事二人又設中前後左右千戶所分領軍士其所領軍士逃亡者計數論罰如百戶逃一人減半俸逃十人全不給至三十人降總旗至四十人降小旗至五十人發充軍其千戶逃軍十倍於百戶指揮逃軍五倍於千戶者並減俸及遞降如百戶例蓋國初之兵皆籍於此故其嚴如此洪武初諭五軍府曰養兵而不病於農者莫若屯田今海宇寧謐邉境無虞若使兵但坐食於農農必受其弊非長治久安之術其令天下衛所督兵屯糧庶幾兵農合一國用以紓又諭曰天下衛所分民屯種者咸獲稼穡之利其令在屯軍士樹桑棗百株柿栗胡桃之類隨地所宜植之亦足以備嵗歉之不給又諭今年屯種須於五月報禾苖長養何如七月報結實何如十月報所收籽粒若干一歲三報彼時留心屯政如此故大寧都督僉事啇皓奏見在糧粟大寧三十一萬石松亭關五十八萬石會州二十五萬石他鎮所報亦相若至宣德時所積之粟尤多立法之善古所未有也屯田原額宣府屯軍八千六百七名屯地四千三百三頃五十畝各色籽粒二十五萬四千三百四十四石三斗一升大同屯軍一萬六千七百名屯地一萬五千八百三十頃各色籽粒五十一萬三千九百四石五斗五升山西屯軍九千四百九十名屯地六千一百一十二頃一十畝各色籽粒二十五萬七千七百四十六石五斗五升遼東屯軍四萬五千四百五名屯地二萬五千三百七十八頃二十八畝額糧七十一萬六千一百七十石其後減徴四十五萬四千石固原延綏二鎮屯軍舍人二萬六千七百三十八名屯地二萬六千一百一十八頃二十一畝各色籽粒三十六萬五千一百四十石五斗四升六合寧夏屯軍一萬一千一名屯地五千五百二十七頃九十二畝五分各色籽粒三十二萬二千七百二十二石一斗七升九合四勺甘肅屯軍二萬三千八十三名屯地一萬一千六百九十一頃五十畝各色籽粒六十萬三千一百八十八石四斗二升五合薊州屯軍五千八百七十五名屯地二千八百二十八頃五十一畝細糧六萬八千五百六十七石五斗九升其制每軍一名受田五十畝嵗徵米二十四石以十二石飬贍其人十二石入倉給官俸並城操之兵倉中所積率足供數年之用天下屯牛二十五萬五千六百六十四隻宣德以後各處衛分牛隻數目俱由五軍都督府照會工部立案備照倒死者著令買補孳生者查勘眀白年終依例造册奏送該府轉行工部知會工部設屯田司以司其事附記洪武二十二年兵部五軍府奉旨衛所官員不肻教兒子弓馬如今但有學唱的割了舌頭下棋打雙陸的斷了手蹴圎的卸了腳做買賣的發邉逺充軍已而府軍左衛千戶虞讓男虞端吹簫唱曲將上唇連鼻尖割了龍江衛指揮伏願與小旗姚宴保蹴圎卸了右腳當時禁制極嚴故一時將帥皆出其中而無世胄紈褲之氣後法禁弛而應襲舍人驕惰成性實稱乏才宣德五年正統八年成化八年始令天下保舉有謀勇者用之天順八年開武舉成化四年𢎞治十七等年各有參定條例然所取甚少初止取二名七年至十五名三十餘名及嘉靖後非武舉不得升調於是世胄擁為虛器而功臣之澤斬矣凡要害之地設官統兵鎮戍總鎮一方者曰鎮守獨守一路者曰分守獨守一城一堡者曰守備有與主將同處一城者曰協守又有備倭提督提調等官其官稱挂印專制者曰總兵曰副總兵曰參將曰遊擊將軍俱於公侯伯都督指揮等官內推舉後不然矣明初立君子舍人二衛選文臣子姪居君子衛武臣子姪居舍人衛晝則侍從夜則直宿更畨此即勳衛之始後不用文臣子姪春眀夢餘録卷三十
