body:
  text: 春明夢餘録卷十八吏部左侍郎孫承澤撰奉先殿奉先殿在神霄殿之東殿九室如廟寢制國家有太廟以象外朝有奉先殿以象内朝毎室一帝一后如太廟寢殿其祔祧迭遷之禮亦如之凡祀方丘朝日夕月冊封告祭及忌祭在焉餘皆於太廟行之明洪武三年十月建奉先殿上以歲時致享則於太廟至晨昏謁見節序告奠古必有其所下部考論以聞於是尚書陶凱奏古者宗廟之制前殿後寢爾雅云室有東西廂曰廟無廂有室曰寢廟是棲身之處故在前寢是藏衣冠之處故在後自漢以來建廟宮城外已非一日故宋建欽先孝思殿於宫中崇政之東以奉神御今太廟祭祀已有定制請於乾清宫左别建奉先殿以奉神御每日焚香朔望薦新節序及生辰皆致祭用常饌行家人禮永樂三十五年十一月始作奉先殿其初止享五廟太后孝宗生母孝肅紀皇后薨禮不得祔廟殿乃於奉先之右特建奉慈殿别祀之已而憲廟生母孝穆周皇太后世廟生祖母孝惠邵太皇太后皆祀其中歲享薦如奉先殿嘉靖十五年上諭禮官曰廟中帝配一后陵祔𦵏乃有二三后廟祀陵祀禮夲不同奉慈三后主既不得祔廟又不祔陵殿似黜之非親之也禮官遂請奉孝肅於裕陵孝穆孝惠於茂陵其罷奉慈享薦而并祭於奉先殿外廷莫知也萬歴三年上諭禮官曰朕思𢎞孝神霄二殿皇祖妣孝烈皇后孝恪皇太后神位宜奉安於奉先殿祔享查議來行禮部查嘉靖十五年議祔陵祭不議祔内殿上曰奉先殿今見有孝肅孝穆孝惠三后神位俱係我皇祖欽定宜遵照祔安不必另議乃奉安孝烈孝恪神位於肅皇帝室併罷𢎞孝神霄之祀而專祀於奉先殿崇禎十五年五月十七日上傳禮部堂上官禮科太常寺卿來中左門及午賜宫餅各十五枚上御中左門之左小廂房有扁曰德政殿上返顧屏諸璫退後即日禮部等官過來上曰太廟之制一帝一后計九廟此外祧廟亦有九亦止一帝一后因屈指數自德懿熙仁四祖外仁宣英憲孝共九祧廟已滿各一帝一后其繼后及生母后七位既不得入太廟亦並無祧廟之主即宮中奉先殿亦原止一帝一后嘉靖後有以繼后生母后入者而以前七位尚無祭也上意似在生母孝純皇太后而又推及七位后悉入奉先殿亦未明言也禮臣林欲楫蔣德璟王錫衮奏奉先之外别有奉慈殿係奉繼后及生母后處今雖廢尚可舉行上曰奉慈殿外尚有𢎞孝殿神霄宫夲恩殿禮臣奏奉慈殿如未可復或即在神霄殿奉祀未知可否上曰太廟一帝一后朕不敢輕動還只是奉先尚可恢拓前後加一層即祧廟亦當祫祭德璟奏大祫之禮歲暮已行於太廟似已妥當且奉先原止一帝一后與太廟同若並祧廟之主俱入未知妥否上曰奉先殿見有繼后及生母后七位璟奏此萬歴初添入上黙然此舉雖屬孝思然自古無二祧廟再建非禮也頼部科上疏執奏得止帝后忌辰祭期太祖五月初十日孝慈皇后八月初十日成祖七月十八日仁孝皇后七月初四日仁宗五月十二日誠孝皇后十月十八日宣宗正月初三日孝恭皇后九月初四日英宗正月十七日孝莊皇后六月二十六日孝肅皇后三月初一日憲宗八月初二日孝貞皇后二月初十日孝穆皇后六月二十八日孝惠皇后十一月十八日孝宗五月初七日孝康皇后八月初八日興獻睿宗六月十七日孝慈皇后十二月初四日武宗三月十四日孝靜皇后正月二十五日世宗十二月十四日孝潔皇后十月初二日孝烈皇后十月十八日孝恪皇后正月十一日穆宗五月二十六日孝懿皇后四月十三日孝安皇后七月十三日孝定皇后二月初九日神宗七月二十一日孝端皇后四月初六日孝靖皇后九月十三日光宗九月初一日孝元皇后十二月二十四日孝和皇后三月初一日孝純皇后七月十九日熹宗八月二十二日每月供獻初一日捲煎初二日髓餅初三日沙爐燒餅初四日蓼花初五日羊肉肥麫角兒初六日糖沙饀饅頭初七日巴茶初八日蜜酥餅初九日肉油酥初十日糖蒸餅十一日盪麵燒餅十二日椒鹽餅十三日羊肉小饅頭十四日細糖十五日玉茭白十六日千層蒸餅十七日酥皮角十八日糖棗糕十九日酪二十日麻膩麫二十一日蜂糖糕二十二日芝蔴燒餅二十三日捲餅二十四日熝羊蒸􅀈二十五日雪糕二十六日夾糖餅二十七日兩熟魚二十八日象眼糕二十九日酥油燒餅以上一月共用銀一千五百九十二兩四錢又毎月遇十五日奉先殿用猪九口羊五隻大尾羊四隻香油棗柿葡萄荔枝梨水粉諸件用一百六十八兩四月初八日獻新不落夾用銀一百六十九兩四錢崇禎十五年禮科給事沈𦙍培不宜别立廟祀疏竊惟禮以祖宗所定者為尊議以經傳所依者為正臣伏莊誦諭札以祧廟贈后三位終歲無一祭見廟繼后聖母七位忌辰不得設祭服青孝念難已欲將夲恩殿改建殿宇二層供安已祧九廟帝后而祔三贈后於其中及見廟繼后聖母逢忌之日宜否設祭服青煌煌天語既昭示以太廟大禮不敢輕議而又通着部科同太常寺折衷情制詳酌典儀微臣拜揚明命敢不畢竭愚誠用光聖孝夫禮有萬世之經有一時之權經者推之祖宗而凖比之經傳而符如太廟一帝一后奉先殿亦一帝一后是也權者祖宗所已行而禮縁義起經傳所不載而儀以情隆如别殿之專享奉先之祔安是也今日舍祖宗所定之禮而别求所為禮舍經傳所依之議而别求所為議有萬萬不敢出者臣請盡言無諱可乎考古無奉先殿之制太祖以時享未足展孝思特彷前代原廟神御殿之意而建奉先殿於乾清宫之左成祖率循無改雖曰用常饌行家人禮而太廟以象外朝奉先殿以象内朝凡節忌祭告太常題知光禄供獻禮未嘗不嚴且重也每室一帝一后如太廟寢殿其祔祧迭遷之禮亦如之禮又未嘗不明且備也孝宗以孝穆紀太后不得祔太廟奉先殿别建奉慈殿薦享既以避尊復以專敬仁至義盡千古為昭嗣孝肅周太皇太后崩孝宗召内閣劉健李東陽謝遷等議祔廟禮一則曰事須師古末世鄙褻之事不足學再則曰宗廟事闗係綱常極重豈可有毫髮僣差卒祔孝莊錢皇后於太廟奉先殿孝肅則祀奉慈殿中室移孝穆居左世宗追上孝惠邵太后尊號亦祀奉慈殿居右嘉靖十五年諭禮官以三后主既不祔太廟又不祔陵殿似黜之非親之命㑹議以行禮官言自古天子惟一帝一后配享於廟所生之母别祭於寢斯禮之正孝宗奉慈殿之建子祀生母以盡終身之孝耳禮於妾母不世祭謂子祭之於孫則止葢繼祖重故不復顧其私祖母也今於孝肅曾孫也孝穆孫屬也孝惠孫也禮不世祭義當擬祧但祧義惟遷主為是而遷祧陵殿歲時祔享尤為曲盡非前代所及世宗從之罷奉慈殿祭二十九年祔孝烈方皇后於太廟時以孝潔係元配持議久而始定穆宗即位仍祔孝潔太廟而祀孝烈於𢎞孝殿又别祀孝恪杜太后於神霄殿萬歴三年諭禮官以孝烈孝恪宜奉於奉先殿祔享部察嘉靖十五年議祔陵殿不議祔奉先殿神宗曰奉先殿見有孝肅孝穆孝惠三后神位係我皇祖欽定宜遵照祔安不必另議而并罷𢎞孝神霄之祭自是繼后贈后皆以祔享奉先殿為成例矣當孝宗始建祧廟暨世宗再正太祖南向之位爾時明明穆穆酌古斟今豈不念太廟既有祧廟奉先殿何無祔殿良以遠廟為祧去祧為壇去壇為墠禮有不得不降情有不得不殺先儒嚴陵方氏曰王者之於祖禰以人道事之則有寢以神道事之則有廟天子七廟而周官𨽻僕止掌五寢者以二祧將毁先除其寢事有漸故也祭神道也薦人道也致堂胡氏曰天子七廟而已矣有祧焉不患其數盈也有禘焉不患其乏饗也是故宗廟之禮繇子孫不忘而建不忘者仁也斷以先王之義無敢損益於其間是則禮之盡也今欲建祧殿二層而又不在奉先殿之後將以奉先祧殿名乎抑以何名乎無論宫殿即遠有毁而無立且前此祧遷之神位供安何所如送陵殿無迎回大内之理若更製焉即神位與神主不同十數世之後重取久祧之神位而題之可不可也周家卜世三十卜年七百止曰先公之遷主藏於后稷之廟先王之遷主藏於文武之廟耳未聞祧亦以九為數而預計增加也昔殷髙宗為中興盛主肜日有雊雉之異祖已戒其典祀無豐於昵而傳說亦云黷於祭祀時謂弗欽禮煩則亂事神則難子思子曰先王之制禮也過之者俯而就之不至焉者跂而及之禮稱王母不配言有事於尊可及卑有事於卑不敢援尊也皇上孺慕徹於重元孝思通於錫類然帝后之尊卑罔斁即典祀之疏數無違在聖母可極尊崇而不必同於列后在列后宜俾孝享而未免抑於祖宗如魯立武宫煬宮春秋皆大書特書見其毁已久不宜立而輙立焉非即遠有終之義而哀公三年書桓宮僖宮災桓僖親盡矣宮何以存志其災以咎其復也皇上試以祖宗所定合之經傳所依今日既詔之國人他年將垂之青史可曰内殿之禮非外廷之禮比哉况祧廟三后但不得祭於太廟奉先殿而陵祭遣官焄蒿之感原未嘗不申必追罔極而事如存則立别殿以專祀聖母揆之閟宮之文奉慈之建猶為合禮并忌日設祭服青似宜分别久近稍避祖宗統候聖明詳察西垣筆記崇禎十六年癸未六月二十三日立秋是夜大雷雨奉先殿内滿殿皆火自殿東而上擊壞獸吻次蚤上御中極殿召輔臣面諭昨夜雷震奉先殿東獸吻深懷警戒業親行恭慰禮卿等可傳禮部議上祭告修省事宜輔臣公疏請遇災䇿免上慰留仍親書諭㫖頒示中外朱國禎大政紀云南奉先殿内䜿日進膳如生少不䖍擔壓重不可舉内守備殿門叩頭請罪杖如其律乃解膳既進列御案即閉門聞内中肸蠁有聲凡過殿前必急趨余嘗一過不覺凛然偶風聲颯颯一老内使曰太祖爺至也葢開國之主英靈不爽如此昔明太祖得元都即於北平立特廟享元世祖不絶其血食不使之怨恫也所見遠矣景神殿景神殿在太廟東北奉藏列聖御容嘉靖中上親祀四郊及南北郊視牲辭㕘髙皇帝后忌辰俱行禮於殿中二十四年髙皇帝后忌祭仍行於奉先殿隆慶中大祀辭㕘告於太廟寢殿大祭方澤并視牲朝日夕月辭㕘俱告於奉先殿矣惟每歲六月六日夲寺吉服詣太廟暨景神殿曬晾宋有景靈宫藏列朝御容各為一殿文官執政武臣節度以上並圖於兩廡玉芝宮崇先殿玉芝宮崇先殿建於太廟東南安睿宗帝后神主世宗繼統之初既尊生父為皇帝避不敢祔廟亦未祔奉先殿别立崇先殿祀之嘉靖四年特建世廟享獻皇帝祀禮如宗廟十五年改世廟為獻皇帝廟十七年改獻皇帝廟為睿宗廟祔太廟享祫如列聖而輟世廟之祀二十年八廟灾惟睿廟獨存二十四年新太廟成睿宗帝后遂祔享然舊廟猶藏主凡四孟歲除五享太廟日仍設祭於睿宗廟四十四年改廟為玉芝宫隆慶元年二月禮部題奉欽依玉芝宫四孟歲除之祭並罷惟六月六日夲寺官具吉服詣宫曬晾春明夢餘録卷十八
