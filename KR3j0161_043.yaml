body:
  text: 春明夢餘録卷四十三吏部左侍郎孫承澤撰兵部二輿圖考周禮職方氏掌天下之圖以掌天下之地辨其邦國都鄙四夷八蠻七閩九貉五戎六狄之人民與其財用九穀六畜之數要周知其利害掌天下之地圖而隸於司馬何也謹之也戰國策士每言窺周室則可以按圗籍爭天下漢大將軍王鳯亦云太史公書有地形厄塞不宜在諸侯王然則古人圖志雖司徒營之即藏之司馬祕不必見所以弭姦而防患也蕭何入秦獨收圖書自漢掌之司空浸以泄露當時如淮南諸王皆按輿地圖謀變以此知古人之慮逺矣凡用兵制勝以識形勢為先然有天下之形勢有一方之形勢有戰陳間之形勢得之則成失之則敗成敗之為利害有不可勝計者矣今之儒者鮮或談兵要之錢穀甲兵皆吾人分內事何可以不講也且如唐安祿山既犯東京眷留不去李泌郭子儀皆請先取范陽以覆其巢穴此真識形勢者也肅宗急於收復不從其䇿河北之地由此失之終唐之世而不能復黃巢橫行入廣髙駢請分兵守郴循梧昭桂永數州之險自將由大庾度嶺擊之此真識形勢者也使從其言巢直罝中兔爾而當國曾莫之省巢果覆出為惡遂致滔天然則形勢之所繫豈小哉京城北九十里昌平州州東北九十里黃花鎮自鎮歷白馬陳家吊馬等峪關口四十八而古北口又一十四關口至峨嵋寨中歷黃松峪將軍石凡五口而薊州東岸峪自關以東歷寬峪等關凡十口而遵化縣之馬蘭峪乃歷沙皮羅文松青龍井兒潘家口團亭寨關口三十一而喜峰口又七十口而遷安縣之青山口又十二口而冷口又三口而劉家口又四口而盧龍縣之桃林口又四口而昌黎縣之界嶺箭桿等六口而撫寧縣之義院口又石門等五口而董家口歷大毛山小青山等十口而山海關眀初於古會州之地設大寧都司為外藩籬又收山海關喜峰口古北口黃花鎮潮河川一帶為內藩籬永樂中遷都北平掣回大寧以其地委諾延福餘泰寧三衛而以內藩籬為界大寧既棄則開平興和不容於不失宣德中移守獨石勢然也興和在萬全都司野狐嶺之外乃隂山之脊元之中都地宜耕牧居民亦盛宣德間棄守龍門西人踰野狐嶺過宣府又開平去獨石馬營三四百里宣德間棄守獨石遂失桓州興州興安宜興肥要邊地開平四日程則有玻璃谷諸要地興和四日程則有哈喇罕之險哈喇罕即五雲關關內諸山乃隂山之脊澗壑天塹能守玻璃谷以衛開平戍五雲關以固興和大興耕牧則萬全勢重京師益壯紫荆關易州西南保定界倒馬關龍泉關并井陘故關皆真定界此通燕山前後東西路偏頭寧武雁門三關乃通南北之路為大同太原所達廢東勝則大同寧夏不為援廢大寧則遼東宣府不為援以榆林援大同寧夏則偏頭關花馬池等處所以孤弱以諾延三衛代大寧則喜峰古北口黃花鎮等處所以單薄九邊初設遼東宣府大同延綏復設寧夏甘肅薊州皆文武大臣鎮守提督又以山西鎮巡控固原共為九鎮𢎞治間設總制於固原嘉靖間設専督於三關權任差異而邊防則九都金陵者守淮以防外庭守武昌九江以蔽上游守淮之勢東固淮安泗州自丹陽而揚州而淮安而泗州乃全淮之右臂也西固鳳陽夀州自采石而和州而鳯陽而夀州乃全淮之左臂也東無淮安雖得泗州而不為用西無鳯陽雖得合肥而不為用上遊之勢沅湘諸水合洞庭之波而輸之江則武昌為之都會固湖廣省所以蔽九江江西諸水與鄱陽之浸滙於湓口則九江為之都會固九江所以接武昌而蔽金陵若用於天下則徐邳臨清淮安之應也洛陽鈞鄭鳯陽之應也荆州武昌之應也而襄陽又荆州之應也固荆州可以開蜀道固襄陽可以控川陜固臨清可以通燕冀固洛陽可以制潼關其西南守江西以運百粵其東南守浙江以治閩吳皆金陵之門庭帑藏爾欲聨屬南北以制天下於揚州臨清徐州置重臣鎮之其聨屬徐臨而執其中則濟寧為之要轄其聨屬徐揚而執其中則淮安為之要轄臨為梁冀青兖之會揚為江淮汴海之交徐為梁冀青兖江淮汴海之限金陵十衛陳列江北浦子口五衛和陽龍虎應天橫海武德直當龍江下關處東西之中江淮衛設江浦縣瀋陽右衛設和州以防上游英武衛設紅心驛飛雄衛設池河驛廣武衛設朱龍橋鳯陽滁州之中以防北衝儀真之東鎮江之北有揚州重鎮不為慮也甘州古張掖郡肅州古酒泉郡極西北重鎮北倚合黎山山丹界甘肅之中焉支山在山丹東南五十里祁連山在酒泉張掖南連亘一帶古丐奴失此地嘗曰亡我祁連使我六畜不蕃亡我焉支使我婦女無姿本朝設行都司於甘州以肅州為都司門庭肅州城西六十里為嘉峪關乃羌人要塗關外即沙州衛古三危山在焉有羈縻六鎮古燉煌地土番所居西北有鎮番所尤孤危其地雖險溥於鹽利外所垂涎紫荆倒馬大關在北龍泉故關小在南龍泉把總成化二年設原係倒馬提調故關𠫭將嘉靖二十二年設則並制龍泉而龍泉不屬倒馬蓋往年敵犯紫荆倒馬故龍泉為急後每犯山西則故關為重故設故關𠫭將住劄真定當二關之中若警在五臺繁峙赴龍泉警在太原榆次赴故關又西可援廣昌南可趨順德諸路寧武處三關之中當內外之要衝為東西之援應實陽方溫嶺神池義并之門户外接八角堡內維岢嵐一守備一千户居之自偏頭徂雁門似落寞套人渡河而東焦家坪娘娘灘羊圈子等處為衝其要在偏頭關三受降城唐所築禦敵於河外中城南直朔方西城南直靈武東城南直榆林三叠相距各四百餘里花馬池極要地成化前外患在河西敵據套而河東為敵衝花馬池居其中都憲徐公廷璋楊公一清王公瓊新舊城控禦得宜花馬池西至興武營一百二十里又西至橫城堡一百四十里一漫沙漠寇路拆墻頗易入靈韋掠環慶犯平固則清水營鐵柱泉小鹽池一帶為捷徑又自大壩廣武渡河而下至靈韋亦易蘭州重地行都司八鎮自此出宋張叔夜以天都山為守界我朝守在定火城今亦棄去止就河外作金城關關外即倚山較前易守榆林地乏耕牧所藉河套自套失𢎞治正德間數千里膏腴盡為敵有榆林由是失所飬榆林無險可據左右大同寧夏勢非所及雖設迤左烽墩五十六迤右烽墩九十二而軍食兩艱諸邉鎮榆林最忠義每懷復套之憤究之志以時移漸委無事固原西北二百里海納都城控鳴沙州路東北三百里葫蘆峽城控靈韋州路宋种世衡城清澗成化九年余子俊城榆林去清澗外二百餘里是為大鎮東起黃甫川西至定邊營長亘一千二百里橫絶河套之口內復塹山湮谷以為夾道地利亦多大河三門之上有小河可通延綏應運糧草各貯水次泝流儧發為便且順帶解鹽數十萬充淮課國利亦賴之天順間戶書楊公鼎曾疏議不及行延綏邊覀抵三山饒陽界與固原相接榆林鎮成而延綏警備緩議處宣府者補長峪城鎮逺城之募軍益浮圗峪插箭嶺之防守留茂山衛京操以益紫荆築李信屯界堡以固兩鎮大同地勢平衍無據且增套警而腹裏門道直衝京輔其鎮西衛朔州諸路四衝保德岢嵐河曲及太原平陽甚易議者欲于三岔路口八栁樹堡嚴戍之若三關緊要己巳之變徴調七千餘又河南山西嵗運掛籌屯糧逋負給馬疲斃昔許襄毅裁占役禁掊剋恤調遣有益邊務甘肅鎮自蘭州起至嘉峪關幾二千里一線綿延嵗縻邊費止欲絶隔羌及戎以息其爭其謂斷胸奴右臂非說之盡乃是宇宙一體之心而今無知之者四川天下絶險龍川松蕃鎮其北播州諸夷列其南天全黎州當其西瞿塘守其東江山四塞關峽孤開可守一當百吐蕃西控烏思藏等處風俗朴魯慈教大行法令嚴飭行人所安非若倭冦烏合之衆殘侵無紀况以重險臨之為力又易南鄰芒部東川烏䝉烏撒諸蠻獠要皆腹裏几上肉行都司六衛截制民夷可以安業而西之雅威茂灌南之崇慶瀘嘉馬叙北之疊溪綿漢彭石重重繞護深藏三窟所慮奸宄內作地饒貯實不能施速定之術國初從階文隂平道入成都取眀升蓋以計破之茍非瞿塘東守之堅事未易成也川之形勢北有劍門不足恃而慮在松蕃松蕃以孤城介生蕃之域乃待食於龍川懸命千里之外設為羌戎所截則疊溪以南如建瓴而下直抵茂州西有黎州不足恃而慮在維州維州在保縣外無百里乃為董卜韓胡所據是切近之災且復有自靈關一道可抵雅州自草坡一道可抵汶川縣自泄里壩一道可抵灌縣自清溪口一道可抵崇慶州雲南領十四府八軍民府州惟雲南大理臨安鶴慶楚雄嵌居中腹地頗饒沃餘俱瘠壤警區大抵一省夷居十之六七百蠻雜處土酋割據惟黔寧遺法沐氏世守較廣西貴州省土官差有定志而西有瀾滄衛聨屬永寧麗江以控吐蕃南有金齒騰衝以持諸甸東有元江臨安以扼交趾北有曲靖以臨烏蠻各先得其所處惟尋甸武定防戍稍踈木邦孟密性習叵測元江景東土酋稱桀老撾車里姻好安南阿迷羅台瘴癘微梗廣南富州界臨左江不可不加之意也雲南自貴州烏撒衛入曲靖霑益州為通衢烏撒衛實居四川烏撒府之地又自貴州普安州入曲靖又有廣南府一路出廣西安隆上林泗城今英國禁不由又有武定一路從金沙江出四川建昌衛今亦莾塞自涪陵由達州取西鄉路入子午谷至長安才二日楊貴妃生荔枝馳道也襄東䕫北入漢始略為金州險阻平曠之交也西安商州與襄陽上津縣止隔金州鶻嶺地網在秦州吳璘制以拒金因平為險北邊自燉煌起至遼東一萬一千五百餘里地勢平易又界以山便於水泉便于望瞭部曲相保可為屯田甘州可屯次凉州其莊浪西寧俱可屯陕西鞏昌入階州文縣進青川所江油縣至彰眀縣綿州達成都六詔乃西南夷雲南全省之地夷語謂王為詔其都在大理麗江䝉化及四川行都司建昌之地六詔俱姓蒙氏凡名嗣代各頂父名下一字蒙舍詔在蒙化府浪穹詔在大理浪穹縣鄧賧詔在大理鄧川州施浪詔在浪穹縣麼㱔詔在麗江府蒙嶲詔在建昌衛六詔惟蒙舍居南蒙舍至皮羅閣始彊盛滅五詔而王總名南詔遷大理名大和城子閣羅鳳用假儉魏為相獲唐西瀘令鄭回而尊之至其孫異牟尋創立法度修議禮樂設三公九爽三託諸府之官以分其任回勸尋歸唐蒙氏歷年二百五十而鄭氏趙氏楊氏迭興皆不久至石晉天福間段氏始立元世祖得南詔降假為總𬋩迄明朝尚為鎮撫不絶黎州安撫司為巴蜀西門外有卭崍飛越青溪之險以臨吐蕃內復藏雅州之雕門始陽靈關以蔽腹裏重重要隘出險據險唐韋臯城此成征西之功貴州省古夷地明初分𨽻湖廣廣西雲南永樂中設流以控制土官乃川楚滇桂之衢大路三自鎮逺偏橋興隆清平平越新添龍里至省而威清平壩普定安莊安南為中路自省而威清平壩安順鎮寧永寧州普安為西路自省而劄佐龍場谷里水西奢香金雞閣鴉歸化畢節周泥黑章瓦甸烏撒為北路小分路自省南五十里為程番自平越而南六十里為都勻自鎮逺而東北為思州為銅仁自鎮逺而北為石阡為思南自鎮逺而西北為黃平自畢節而赤水普市為永寧衛由普安西亦資孔驛達雲南曲靖平夷衛由烏撒西倘塘驛達雲南曲靖霑益州由程番南達廣西泗城州由都勻南獨山豐寧達廣西丹州由思州東達湖廣沅州由思南東達四川酉陽西達四川播州北達四川涪州由黃平達四川草塘白泥容山由永寧衛北達四川瀘州由永寧州南達廣西泗城州由省北抵寨養龍達四川播州其各小路不能悉載黎平門户全貴鎮逺都會水陸貴州省城統括諸衢廣西五屯所居荔浦斷藤府江藤縣之中當斷藤峽右臂及白石寨十二磯濛江口之衝為諸猺要道其間山泉佳秀獸木豐麗田沙衍沃足以裕其居而遏其患洪武間立所近增置城堡集獞兵而守之借其力以為用亦一隅雄鎮廣西猺獞獠蠻雜生蕃類然微各有别猺多性槃氏初靖江之興安義寧古田融州之融水懷逺有之猜忌䡖生烙跖善奔能忍饑獞初居慶逺南丹之地人呼為獞今桂之荔浦修仁永福且多而欣城荔波天河永順永定尤厲其慶逺思恩分生熟二種以入編籍為熟獠無酋長版籍惟推勇者為郎火餘自稱火蠻有撫水蠻出慶逺酋多蒙姓有西原蠻出廣容之南雍桂之西酋多寧姓有廣原蠻出雍州西南今羈縻州峒多古蠻地南安在西贑州在東贑州東南為汀州汀州東南為漳州贑州南為惠州界龍南縣山峒接惠州三浰寨安逺縣東過登頭嶺即汀州府武平縣安逺縣南過打鼓嶺皆惠州由峒南安縣南二十五里過梅嶺為南雄南安西過橫水桶岡聶都山為桂陽州軬人溪峒連接彬州桂楊州都臺總轄瓊州居浮海中周二千餘里中有黎母山絶峻五峯諸蠻盤據號黎人最中者為生黎不與州人交其外為熟黎雜耕州地原姓黎後多姓王及符熟黎之産今半為湖廣福建奸民亡命又南恩藤梧髙化征夫利其土占居之各稱峒酋成化來副使徐棐有犂庭之計漸就編差𢎞治末符南蛇之亂連都震警其小醜漫突無時而息故欲拔其根株可編甲食土或遷置髙雷湖廣奠籍之亦可天全六番無險而險在雅州故禁門紫石二關以雅州所戍之巴蜀地居極髙而烏蒙特甚烏蒙南臨六詔東控諸蠻故畢備諸種羅羅土獠蠻夷人悉聚青州城中實外陷惟女墻出土而城埒平地蓋因地勢之舊也不患於攻紹興城勾踐所築堅緻不易攻蔚州城如盂形不能攻儀真舊設臨江諸閘復新設攔江閘於江口引湖水以濟諸閘且便停舶瓜洲近設瓜口閘於西江觜諸壩之利也亦攔江遺意瓜洲舊有通江閘後尋廢瓜州既設似與儀真不異闢通江與十壩並發不亦可乎裏河運船十年一造江南船五年一造以往回越壩耳貴州偏橋清浪銅鼓五開四衛及黎平中潮龍里新化亮寨新化屯五所俱𨽻湖廣據上遊也雲南霑益所𨽻貴州開行道也四川黃平所𨽻貴州厚夷防也河南汝寧所𨽻鳯陽守中都也河南磁州所𨽻山西扼壺關也山西廣昌所𨽻萬全嚴紫荆也山西平定所𨽻後軍謹外應也浙江嘉興所𨽻蘇州運海防也潼關衛𨽻中軍系親戌也山西蒲州所𨽻潼關衛援關戍也嘉靖十五年以四川川南道地曠分眉卭雅三州八縣建昌行都司六衛天全招討黎州安撫二司為上川南道兵備駐卭州州近省黎州至省八百餘里建昌至省一千五百餘里似逺而踈控制舟山七十四㠗山繞圍不能進蘆花㠗在口傍故被盜府江八百里自梧達桂中度灘瀧三百六十至平樂稍平以藩省節鎮夾於梧桂兩端而兵憲署嵌平樂兩岸猺獞嘯集去城不數里輒禦人而魚肉之堡寨沿江為毒不息三府而北惟全州為樂土四川馬湖叙州二府逼臨蠻獠華與夷雜瀘州不雜夷實殷夷警成都以省藩重鎮控制西畨而崇慶雅州亦難安堵重慶南接夜郎西通牂牁俗有夏邑蠻夷雜處夏為中夏人邑為廪君後蠻為盤瓠後夷為白虎種順慶閴無外防保寧䕫州險據在我其地沃民殷諸府皆然當是海內樂土馬湖叙州略次之湖廣省南滙交廣滇貴諸水於洞庭而受之於前北引漢沔諸水而固之於後西承川蜀諸水而折而過焉東有武昌縣樊山承之而為大回釣臺橫之而為小回水法縈洶而山奔不歇故有不可居終之說大率楚廣俗悍而易動雜夷種蔓而寡束雜之以四方來者東南人以覔利至西北人以避地至實能容之其地氣固然也蘄黃北倚五關前憑大江占淮壖之上腴連雲夢之巨藪古豪傑有取焉然非宅中圖外之地其水要不如武昌其險要不如襄陽其路要不如荆州東漫廬安則退無歸束中阻江湖則江西不為用肘腋之勝殊非所以成大此陳友諒所以得算之少也永州寶慶正據五嶺之背嶺南羣山四固故瘴為獨盛兩府嶺擁如案後曠諸湖故無瘴永州之背衡嶽為扆故炎氣較盛若郴州窪在一隅負之以衡水障之以九疑夾之以袁吉欲其不為瘴不可得矣諸省惟雲南諸夷雜聚之地其為中華人惟各衛所戍夫耳百夷種曰𤏡人㸑人各有二種即黑羅羅白羅羅麼些禿老些門蒲人和泥蠻土獠羅舞羅落撒摩都摩察儂人沙人山後人哀牢人哦昌蠻懈蠻魁羅蠻博尋蠻色目濔河尋丁蠻栗夢㱔廣西及髙亷等府山嵐蔚薈蒸氣成瘴如坐甑中頃間裘扇兩用晴雨疊更春為青草瘴夏為黃梅瘴夏秋之間為新水瘴中秋為黃茅瘴霜降後始無恙炎方隂閉陽泄故治者不宜發表麻黃金沸散青龍白虎湯不可用只宜溫中正氣亦或投以薑附沈存中七棗湯用烏頭七移七泡亦此意平時調攝平胃散正氣散節食寡欲戒多七情南方蠱毒有數種蛇毒蜥蜴毒蜣螂毒草毒食之變亂元氣心腸絞痛或吐逆不定靣目青黃十指俱黑驗蠱法吐於水沉而不浮含黑豆豆脹爛脫皮嚼之不腥嚼白礬味甘皆是治蠱法飲白水牛血為效王氏博濟方歸魂散必用方雄硃丸皆可斷藤峽即大藤峽韓都憲雍平賊改今名甲藤絶流蔓生韓斷之周六百餘里下口潯州府西北境上口接栁州府勒馬峽兩崖壁立叢樾蔽天中流奔滙猺獞哨聚行者患之近設有上隆州以控上口五屯所以控下口風氣天成舉動猶昨陳都憲金處行旅魚鹽瓦器以給之數年盜息復改永通峽然恐非事體今復不能守於其終議者謂摘其酋而授之職以居之稅啇以充廄廪或為可久處興安六峒賓州八寨亦須此意廉州人作閩語福寧人作四眀語海上相距不逺風氣相關杭之西湖髙據上流陳同甫駭為可灌上書宋孝宗福州城外海洲名河口居十九姓交往琉球全諳其國姓贑州龍南界惠州興寧微瘴微癩惠之長樂龍川興寧界贑林深山㠗寒少暑多其俗巾縞純素為羣豈有所為以鎮之程番俗亦然閩中有流民佘種潘藍吕三姓舊為一祖所分不入編戶凡荒崖棄地居之耕獵以自食不供賦役椎髻跣足各統於酋長酋長名老人具網巾長服諸府遊處不常松蕃地極寒不産五榖惟青稞一種如麥粒炒而磨酥和以食或以熬茶又有芫根白莖青葉煮為菜莊浪土官魯經忠勇馭下嚴靜部曲以萬計其下甚感而服其子孫雖幼有調即用命本朝混一河隴勝國遺姓魯趙汪三氏趙汪今微惟魯賢盛至此無襄陽則荆州不足以用武無漢中則巴蜀不能以存險無關中則河南不能以豫居無巴蜀則吳楚不得以奠枕廣西府江即灕江發源興平縣海陽山經桂林平樂至梧州左江源廣源州右江源峩利州經太平南寧之合江鎮二江合是為鬱江又黔江源牂牁界經栁州象州至潯州與鬱江合是為潯江至梧州與府江合東注封川縣德慶州肇慶府至番禺縣入海三江為經其餘諸水各附焉是梧州乃兩廣輪輻八桂門户水陸要衝民夷總節開設三堂自成化元年始其設鎮守總兵永樂間始總制都御史景泰三年始沔湖廣八百六十里袤五百四十里為江漢諸水所滙瀦於太白湖泄於沌口設河泊所三十六以課魚成化𢎞治以來漢淤江溢湖水渟注積滓所澄洲沙漸起佃民估客日集因攘為業由是湖平强半今省所為二十一水患日甚夏秋之交沱潛溢道車木堤排沙頭班家灣等處利害切要且繕功未至百年後將莫知誰何雲南二大水俱源吐蕃一金沙江自西北來經麗江鶴慶武定東北出四川馬湖一瀾滄江自西北來經麗江大理蒙化臨安車里東南入海地勢中卭然也其滇池西洱海撫遷湖瀘沽河石地河魯窟海子俱周廣三五百里山脉局厄然也梧州開總憲府初意重廣西其廣東山海警事漸生則兩廣之備不得兼而遙制又雇募打手自梧州始其初行頗可應用後漸流玩局成虛器矣贑榆外有神山海州外青峯山有一所十八村登萊外浮島其比如櫛沙門島渡遼者必泊舟長山島四十餘里多産鹿田橫島可居千餘人唐島唐太宗征遼駐蹕石臼島金主宋髙營寨古鎮島有巡司薛島武陽侯故居不能悉紀故自淮海渡山東者只島內行不放大洋山東泉獨多為其地髙擁下流而河南土疏水勢所控遂成伏流至山東乃出山東平度州東南境有南北新河元時所開以避海運放洋之險其水源發髙密至膠州分流為南北新河自膠州入新河二百四十里至萊州之海倉口入海自迤北新河店置閘以達安東止八十里河通海嵗久盡塞近王副使獻方御史逺宜力主開復并於馬家濠鑿山麓通海人溺便安不遂此議不可終已也海運憚文登南之成山登州北之沙門此兩險多磧又成山突出當東陽之衝沙門旋扼處北洋之腹宜無靖勢新河一開可避兩險不爾則古濰水及沽尤河稍致力皆可免於兩險辰州當夷蠻咽喉西際施州南際靖州東際永順保靖乃五溪所出能溪眀溪西溪武溪辰溪惟東為常德古武陵桃源之境由是而五溪注之洞庭故洞庭諸溪洞之庭除也海匱乃荆州北險築橫堤引水作三海綿亘數百里又為八匱蓄泄水勢今盡占為民田非惟失荆州之險其地十年六七潦苦於無所瀉瀦金衢徽諸水入江至嚴州一峽口諸山水若齊發嚴州輒罹水患至盈五丈餘太湖介蘇常湖三府之中北納荆溪百瀆南納霅溪七十二漊荆溪百瀆上受金溧常廣諸水東壩既立宣徽應天之水皆出大江霅溪七十二漊港口日淤苕川勢渀嘉興分以東泄湖之所瀦自吳江長橋出合龎山湖以南入海為松江自大姚分支過澱山湖以東入海為東江自鮎魚口北經蘇郡之婁門東北入海為婁江又有胥口白洋灣鮎魚口三支流惟吳江長橋築而茭生沙壅松江之勢緩惟大石趙屯等浦淤而澱山水阻東江之勢緩惟七浦鹽鐡等塘滯而陽城水阻婁江之勢緩近來三支流盛瀉白茅港北入於大江以達海而白茅港遂致淤淺震澤注海三江淞江一流已久為淤上海之南蹌浦口即吳淞江嘉定之劉家港即婁江常熟之白茅港乃震澤餘流向北注之揚子江者水勢東南為順今盛流白茅港漸渀於北則長橋所為害其明驗也故陽城昆承流壅復浚吳淞江南北兩岸定安諸浦閒道北注劉家白茅二港又大黃浦流壅傍浚范家濱間道注蹌口皆引水北流以順其勢而三吳勢占水利日盛莫知於何底止也保寧漢江客舟可直遡漢中再上徽州徽州以上止通浮筏保寧又一水自西北來至巴州可通舟下渠縣歷入大江䕫江平近重慶有險上叙江又平近馬湖又有險江勢至京口頗下丹陽一帶運河每患淺練湖髙據欲厚所瀦而時泄之可濟緩急瓊州東畔水道文昌之鋪前清瀾會同之調懶樂會之傳敖萬州之運塘南山之李村崖州之臨川諸港不可泊舟其西畔水道澄邁之東水臨髙之博浦儋之洋浦昌化之烏泥感恩之抱羅崖州之保平諸港有灣汊俱可泊舟黃河自蘭州入中國五千餘里至開封界不為患决溢惟開封大名居多二府地夷斥孟津而下無山岡束隘且土疏善崩又下流所受已多旁無渟瀦而河身易淤冬春止丈許其湍駛不能遏固勢也古黃河周定王五年徙砱礫始失故道漢而下徙决無常漢武帝時已通淮泗宋太宗時始入淮自是南北交注今河水全達淮入海一道自開封蘭陽縣趙皮寨口東南流由杞縣睢州寧陵歸德夏邑宿州下符離橋出宿遷縣小河口至清河縣入淮乃嘉靖七年新開趙皮寨口今盛流一道自趙皮寨口至寧陵縣南入渦河經亳州蒙城懷逺縣出荆山口之西開趙皮寨口今由焉一道自儀封縣北折經黃陵岡蔡家口縷水堤入梁靖口出徐州小浮橋下清河縣入淮其梁靖之行自宋初今流漸微梁靖以上至儀封北乃黃河東行舊道此三流之南又正統十三年徙開封西北滎澤縣孫家渡口入汴河至