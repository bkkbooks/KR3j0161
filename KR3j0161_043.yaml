有衝本圎而立為方地有軸本方而運為圎天地各前後衝所以駐之為出隊之具風雲附於天地所以挾而助天地之為變衡重列各四前後之衝各四風接居四維圎之所為圓也軸單列各三前後之衝各三雲接居四角方之所為方也圎之所設以禦方方之所設以禦圎此皆言其體於是遇敵設戰用無定形而龍而虎而鳥而蛇各以時出虛實以為二壘動靜以為措宜化裁以為戰勝陳勢雖八不得分而視之天惟主衝而無隂不能行地自成軸而無陽不能配風雲之附藉於天於地言有所起也而天與地無其附則未足以成全用於是而四竒所由生皆四正之宗嫡千變萬化不脫本母故古之竒兵兵在陳內求竒兵於陳外則形露必潰大將眀賞罰為首事欲眀賞罰必由好惡之公學問最難處是公好惡此處未消磨不可以言大將遊軍選鋭先出逰軍定兩端先鋒䇿先鋒所以為陳始陳訖逰軍從後躡敵殿後䇿殿後所以當敵遇或驚其左或驚其右所以助跳蕩聼音望麾獨往獨來力不可輕故當正陳三分之一正竒一物營陳一事營為居生陳為戰作居而為正戰而為竒正以守其常竒以應其變神而眀之化而裁之不以動靜有無有所息戰無正形形隨時而立然而未嘗無一定之體居無竒設設無時可襲然而未嘗無必守之法故神眀而化裁流行於動靜有無之間以正合以竒勝兩相為用故為一物以必然者視正任意者名竒又非正竒之實世復冇以逰軍作竒則逺之甚矣止則為營出則為陳皆以言其體所謂正也因其所遇以為出則隨人隨地隨敵隨時變化無常是謂竒八陳之正可圗可言竒不可豫言豫圗廣都土壘魚腹石磧一也如人立家各任其基局其惟天衝其惟地軸其惟附天之風其惟附地之雲則兩端中央前後之所生以之為自固為可守其惟龍飛其惟虎翼其惟蛇蟠鳥翔皆由是出以之為設局為應敵䡖重之權鎮於中外剛柔之節列於隂陽取舍之宜生於方靣以之而訂虛實等主賔量進止隨在以為用然後為竒則是合戰之陳陳之行次先右兵尚隂道先虞候兵尚探先角聲兵尚一耳必於角兵尚木求其生先馬軍兵尚速右而前前而中中而後後而左凡中不使離乎中兵尚主主尚權李筌言曰兵猶水水因地以制形兵因敵以制勝能與敵變化取勝謂之神庸將以教習之法為戰敵之陳不亦謬乎宋人有不然其說蓋筌能言其意所以䡖迹古法云善用兵者教正不教竒古萬二千五百人為軍合用三軍二軍有成算後世兵無一定之數各隨多寡可為陳必以若干成隊若干成軍則拘矣惟平時練意不可不偹古名將李廣竇嬰祭遵李績等皆極亷約不私財故蓄惠不倦愛士能得其用這是世人命根此處得則我之根培於御人得則人之根益培根根相培造化日盛校士先結伍法左傳云先偏後伍司馬法五人為伍尉繚子有束伍令漢制定尺籍伍符左傳鄭子元請為左右二拒以中軍奉公為魚麗之陳先偏後伍伍承彌縫以敗王師偏車乘也先車而後伍以伍乘車之隙而彌縫其缺漏穰苴以五人為一伍尉繚子五人為伍共一符收於將令之所亡伍而得伍當之得伍而不亡有賞亡伍不得伍身死家殘漢制尺籍伍符尺籍書斬首之功於尺板伍符伍伍相承李靖六花陳本諸葛八陳而變後世謂八陳以九宫為法六花陳以七軍為法大陳包小陳大營包小營隅落鈎連曲折相對是八陳制外畫之方內環之圎是六花法方是立局圓是結伍此說非也變是變其形局其為正其為竒其制營其結伍其周意為鈎連其委情為曲折一也而未嘗變也曹操兵法戰騎居前陷騎居中逰騎居後前後中為三覆不言兩廂軍何也舍藏變化曹術所寓四頭八尾散合正竒不定當其轉戰徹遊騎而前退戰騎而後而化分陷騎以為用故兵法須識意不識勢識勢不識形在神其妙兵形五變方圎曲直鋭因地而為之者也李績兵法有牝牡方圎伏因人而生之者也范蠡兵法先用陽後用隂盡敵陽節盈吾隂節以奪之其曰設右為牝益左為牡早晏以順天道蓋深於計者也田單為燕所圍命一人假為神師拜而祠之神言燕可破遂出火牛大破燕此以天官時日為我用不用於天官時日者也趙盾帥師伐秦交綏而退司馬法逐奔不逺縱綏不及蓋我軍既有節制彼衆亦正行伍豈可輕合光武收銅馬鐡脛五幡大彤尤來大鎗時按行賊營賊曰蕭王推赤心置人腹這是兵家本錢太公云分不分為糜軍聚不聚為孤旅散合無常形要須識辨孫子曰可勝者攻也不可勝者守也皆以敵言之也敵有間則攻不以我强弱為攻守其自治則當先為待矣兵法以伍為要小列之為五人大列之二十五人參列之七十五人又五參其數得三百七十五人其卒三百人為正六十人為竒竒之於正如五而一蓋重本也兵之要不虛內以役外重末以䡖本洞當勝中黃中黃勝龍驤龍驤勝鳥翔鳥翔勝折衝折衝勝握機握機勝虎翼虎翼勝衡陳衡陳勝洞當言得用竒之道也用竒之道惟先自識為難吾見定知彼知已彼誠中黃也而吾能誠洞當也則勝彼非中黃也而吾之洞當敝過時而用近似而用士不精而用藝不備而用也則不惟不勝而纍而以責陳法不驗可乎哉十二辰陳成都碁盤市江田植芋法九曲燈詳整周匝總是布陳一理雖一一偹具簡以御煩堅以待滲若堅而不簡令人難守煩而有滲令人易窺李靖陳裴緒陳穰苴陳彌牟魚復陳會得分數明只一法李筌楊師晉獨以天地風雲龍虎鳥蛇均列而為八後世異之若真會得已為名識安營九法九地十八避隨形隨時警備只一心生於警備之心無形無法踈密生於時非守前人故套蓋凡老營立可守可攻如人之有家否則是逰夫路旅裴緒新令數尚十只從五法起每部前後曲總是兩其伍百人曰隊二隊曰官二官曰曲二曲曰部部以前後曲相次曲以左右官相當官以前後隊相隨隊百人為列列十人為對對則伍也隊分為團團合為隊團則十之伍也方圓牝牡衝方罘罝軍輪雁行陳雖八皆自方為變已為知要後尾常山楊竒備伏且以應權陳方以備曠圎以御險偃月之情險之所生偃月為圎之半圎當用而半所補於圓者地也虎鈐四陳即四竒而言之不言以正合也飛鶚為衝重霞為細長虹為扼八卦為周以飛鶚當灣以重霞當直以長虹當突以八卦當圍隨變化生形於敵者陳不可踈踈難應不可密密難用首欲捷翼欲䡖腹欲實尾欲正捷不可使過輕不可使凌實不可使不應正不可使不知變此虎鈐之法也李靖以正兵為應敵之陳諸葛擒孟獲馬隆討樹機能藥師平突厥皆為正兵以勝又言兵以前向為正後却為竒又以兵少地遙而用正乃知其正兵之陳因行逺深入敵境即其所布之行陳以應敵不待更作轉發而變化因生其間者可蓋惟専倚車用且戰且前竒即是正正即是竒教武之功愈習而愈無窮教武之器更述而更不盡種種安排只三官不謬五教不亂是簡易包括教須以寡傳衆以暇寓忙當事三令五申又曰閲以成家校以習意悠而優之使自得之品武孫吳為名家然兩家不同局若詳戰事孫誠精吳論意在威國以運於用而以兵為緒餘其無王心則同用衆必素有練以不教民戰為棄民近世乃不得已而興召募此非用衆正法兵専重選將將得而練成將選雖重才賢尤貴習久與士卒相便近易於轉擢突臨新卒恐非所以為選也樂毅不下齊兩城不下云者知七十餘城之皆下之也不以德威自服而待勤於兵刀曽曰下之乎此毅兵法之善也開彌廣之路長容善之風其為道光而賢智托心蓋意兼天下者也太史公謂田單兵法始如處女敵人開户守之慎而難也後如脫兔敵不及距發之决而勇也當家無慮濟濟獨於單發之單不専於技擊策深而功易施也李廣軍行無部伍行陳就善水草屯舍止人人自便不擊刁斗以自衛幕府省約文書籍事此深得古兵法故敵屢犯而不為害其逺斥堠疏於近而密於外有所以當其處者若程不識謹嚴同出機軸特宏狹藴露可以見才力淺深其受成顯拜係諸過而已君子不道也文中子有言强國戰兵伯國戰智王國戰義帝國戰德皇國戰無為言戰而至無為則戰法無所施不得已而受命焉知其所從事不可茍也斯意劉誠意蓋知之曰善戰者省敵湯武之所以無敵以我之敵敵敵司馬法誠是周家兵典節節不忘所本殺人安人以戰止戰王者不得已之意盎然具見雖嚴位用衆篇專發眀治兵應敵總不脫這意後世有謂出於穰苴穰苴豈能見到於此聖人神武而不殺性立而弛張時仁義具武士慣家手熟不免橫刺之慘積以成見發之而不自由所以强兵有制即其所有事堅束之使不得擅施犯者必罹重刑練既成雖非性出習與性成故曰小人而和於君子勉意以事上豈其性哉接物而變已者也春明夢餘録卷四十三
