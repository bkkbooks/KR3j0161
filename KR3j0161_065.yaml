body:
  text: 春眀夢餘録卷六十五吏部左侍郎孫承澤撰名迹二燕京八景一曰居庸疊翠一曰玉泉垂虹一曰太液秋風一曰瓊島春隂一曰薊門飛雨一曰西山積雪一曰盧溝曉月一曰金臺夕照其説起於金章宗眀昌史胡廣北京八景圖詩序地志載眀昌遺事有燕京八景前代士大夫間嘗賦詠往往見於簡策聖天子龍飛於兹肇建北京為萬方會同之都車駕幾載巡狩而文學之臣多列扈從侍講兼左春坊左中允鄒緝仲熙獨曰昔之八景偏於一隅猶且見于歌詠吾輩幸生太平之世當大一統文眀之運為聖天子侍從之臣以所業而從逰於此縱觀神京鬱蔥佳麗山川草木衣被雲漢昭回之光而昔與今又豈可同觀哉烏可無賦以播於歌誦衆咸曰然遂命曰北京八景間更其題一二仲熙作詩為倡於是繼賦者國子祭酒兼翰林院侍講胡儼若思右春坊右庶子兼翰林侍講楊榮勉仁左春坊右諭德兼翰林侍講金善幼孜翰林侍講曽棨子啓林環崇壁翰林修撰兼右春坊右贊善梁潛用之翰林修撰王洪希範王英時彥王直行儉中書舍人王紱孟端許翰鳴鶴暨廣凡十有三人得詩一百二十首廣兩和仲熙之韻詩獨後成竊嘗自惟承乏詞林以文字為職乃獲隨侍萬乘覽山川之雄歷古迹之勝於所謂八景者得之獨先且多儒者之榮孰有踰於此者然才學猥陋不足以敷贊洪休賴諸公有作雍容大雅宣暢發舒可以傳於文苑而廣忝厠名於後亦何幸焉乃寫八景圖并集諸作置各圖之後表為一卷藏於篋笥他時歸老南方優遊江村林屋之下擊壤鼓腹詠歌聖化時展而觀之撫其景誦其詩豈無歐陽子所謂玉堂天上之思與夫平生交逰出處之感耶楊榮序余嘗考天下山川形勝雄偉壯麗可為京都者莫逾於金陵至若地勢寬厚關塞險固總踞中原之夷曠者又莫過燕薊昔太祖髙皇帝受天眀命混一九有以金陵龍蟠虎踞長江天塹遂定都焉逮皇上肅清內難繼承大統又以燕薊左環滄海右擁太行內跨中原外控朔漠宜為天下都會乃詔建北京焉及今十餘年車駕凡兩巡狩榮叨祿翰林既嘗歷觀金陵之勝今而復忝扈從得以追陪文臣之末隨侍皇上遍閲北京山川之槩退而與諸僚友討論莫不稱歎以為斯文千載之竒逢一日翰林學士兼左春坊大學士胡公光大偕翰林侍講兼左春坊左中允鄒公仲熙考求其迹以昔人有燕山八景之作而簡策無聞今聖朝天下一統皇上建都於兹誠非往昔比不可無賦詠以播於無極於是仲熙倡為北京八景學士胡公兩和其韻而序之僚友同賦者凡十三人榮亦厠名其間亦何幸哉竊自幼嘗閲地志考其山川形勝心目為之開眀精神為之飛動思欲遨逰歷覽而不可得及今得以循厯兩京又得屢承上命奉使西北由江淮道大梁雒邑踰關中以逹玉門關之外及侍皇上兩率出塞北至極漠西抵和林觀兩京之地王氣所鍾實為天下形勝之最東南西北道里適均直足以控制萬方而為聖子神孫萬世磐石之基也榮以菲才叨逢恩遇涓塵海嶽效報未能茲以北京八景圖并詩裝潢成卷因舉足迹所至書於卷末且以諸景之槩所以得名者疏於圖首誠非欲夸耀於人將以告夫來者俾有考於斯不惟知天下山川形勢之重而又有以知八景所在如目親覩有若余輩之菲薄叨承國家眷遇之厚樂其職於優遊得以歌詠帝都之勝于無窮者皆上賜也然則觀於是者豈無感發興起以自奮於眀時者哉王文安英有園在城西北種植雜蔬井旁小亭環以垂栁公餘與翰苑諸公宴集其地文安登髙詩序都城西北山林泉石之勝嘗一逰覽而學士錢公習禮好之不忘與李公時勉陳公得遵曽公鶴齡暨豫期九日出城登髙以償所好之雅以是日必賜宴乃更約預逰焉衆皆曰然九月五日早朝侍經帷退偕出西安門而李公暫還私第於是四人者聨轡出宣武門西行五六里下馬令從者煮茗而李公至飲茗罷南行而西至壁商寺塔巍然如舊佛宇方修飾座後壁施生綃縱橫可三丈許繪觀音像歎其畫之工忽一僧至曰近富人以白金百餘兩募指揮商喜畫喜蓋宣德中以善丹青得官也又相顧竊歎一壁之費如此而畫工之能者亦至是邪後有臺稍髙峻登而四望城闕崔巍峙其東羣山蒼翠繚乎西由北而南則平疇廣陸長林大澤曠莾千里渾河浩乎東注其逺無際臺之石隙多細草可坐欲呼酒來酌僧迎入丈室焚香獻茗果言寺塔創於隋寺古僧少車馬罕至近時權貴創寺環布城邑度僧至數百千寺多固無益僧且混塵俗耳僧名聞宛平人也與僧别北行一里許至廣恩寺蓋權貴所創者外門表石刻大光眀三字門之內鐘鼓二樓又重門栖僧之宇疊峙其中以黃金飾像五綵繡幡幢他器物􅊀極工巧觀者目駭僧聞客出迎長身古貌白髭毶毶然詢其名曰主寺趙州和尚也導客觀兩廡畫壁頗能言壁間故事從廡東登寺後山寺元長春宮故址山聚土而成樹木蕃茂不可逺望還坐僧室出寺又西北行二百步至豫小圃傍井多栁其西曠然逺山亭亭微露秀色如修眉半出天際乃酌酒坐栁隂下錢公喜獨盡量飲既乃至李公園又東出古城北繞城河流如練沿流行數十步登城磴道欹斜荆棘叢生微風蕭颯幽思浩然逹李公園劇飲坐近羊棗樹多濃隂日將夕乃還眀日錢公以江山留勝迹為韻各賦五詩屬豫記嗟夫佩茱登髙九日之事預逰則自錢公始夫豈好逰哉歐陽子所謂在乎山水之間而已詠歌而記之固宜然思前時城西之逰皆侍郎王公行儉所倡率公承上命出掌邦政位望尊崇有所不暇五人者為之戀戀焉然公亦未必忘情於此也乃併書之不鄙誦豫之言又豈無所歆羡哉按李公時勉亦有園在文安園之傍彼時開國之始風氣淳厚上下恬熙官于密勿者多至二三十年少亦十餘年故或賜第長安或自置園圃率以家視之不敢蘧廬一官也史載孝宗時令南北五城遇百官夜飲歸使各鋪火夫提燈傳送此真盛世之風也楊文敏榮杏園文敏隨駕北來賜第王府街植杏第傍久之成林楊文敏雅集圖序正統二年丁巳春三月朔適休暇之辰館閣諸公過余因延于所居之杏園永嘉謝君庭循旅寓伊邇亦適來會時春景澄眀惠風和暢花卉競秀芳香襲人觴酌序行琴詠間作羣情蕭𣪚衎然以樂謝君精繪事遂用著色寫同會諸公及當時景物倚石屏而坐者三人其左少傅廬陵楊公其右為榮左之次少詹事泰和王公傍杏花而坐者三人其中大宗伯南郡楊公左少詹事臨川王公右侍讀學士文江錢公徐行後至者四人前左庶子吉水周公次侍讀學士安成李公又次侍講學士泰和陳公最後至者謝君其官錦衣衛千户而十人者皆衣冠偉然華髮交映又有執事及傍侍童子九人治飲饌傔從五人而景物趣韻曲臻于妙廬陵公喜題曰杏園雅集既序其端復與諸公賦詠成什乃屬余識其後仰惟國家列聖相承圖惟治化以貽永久吾輩忝與侍從涵濡深恩蓋有年矣今聖天子嗣位海內宴安民物康阜而近職朔望休沐聿循舊章余數人者得遂其所適是皆皇上之賜圖其事以紀太平之盛蓋亦宜也昔唐之香山九老宋之洛社十二耆英俱以年德髙邁致政間居得優遊詩酒之樂後世圖之以為美談彼固成於退休之餘此則出于任職之暇其適同而其迹殊也然考其實爵位履厯非同出一時聨事一司今豫輩年望雖未敢擬昔人而膺密勿之寄同官禁署意氣相孚追視昔人殆不讓矣後之人安知不又有羡於今日者哉雖然感上恩而圖報稱因宴樂而戒怠荒余雖老尚願從諸公之後而加勉焉梁園在京城外之西南廢城邉引涼水河入其中亭榭花木極一時之盛劉定之逰記梁氏園在今京師西南五六里其外有舊城舊城者唐藩鎮遼金别都之城也元遷都稍東於是舊城東半遂入于朝市間全無迹可見而西半猶存號為蕭太后城即梁氏園所在也蕭太后者遼后皆以蕭為姓有子為帝則太后别居宮城統部屬故其亡也末帝淳之妻猶得獨存稱太后以制其國踰年乃滅也或謂此雖遼金都城而非唐藩鎮城不然也唐時此為范陽藩鎮安史反後改名盧龍而所治幽州薊縣不改今移薊以名州移盧龍以名衛各去此數百里其實唐之盧龍與薊在此也惡得謂非唐藩鎮舊城乎遼金不因藩鎮以為都而曷因乎稽諸史志遼金又曷嘗創建都城乎其城僅存土爾甓皆為人取去今取猶未已其土皆真黃土人取之和煤炭以燒亦有堲之作墓者以其猶髙堅也豫往逰之日去清眀節未久插棘挂紙近逺在目嗟乎昔之在此地者以臣叛主如祿山輩自唐中葉迄元季世七百年矣小而鼠拱豕伏大而虎吞龍亢孰得窺之哉天旋地轉時移事改而懦夫竪子持畚鍤以斸甓掘土焉就其構樓櫓立麾蓋喑嗚叱吒之故處而葬埋哭泣引紼掩袂焉因其頽垣隳墉而增髙補缺以障朔風延夕暉蓻羣芳於是吾儕得以息朝署之迹攄林野之興焉俯仰古今感慨多矣可以自幸夫聖眀之不易遭也是日園中牡丹皆半謝蓋京師氣候牡丹開於穀雨後於候為鳴鳩拂其羽戴勝降於桑之間豫往乃立夏初故已過也同逰者柯學士孟時相約携具皆甚儉園有龍槐共酌其下而歸去時微風埃中道憩一寺正統中太監僧寶所建非數萬金不能成僧寶沒于土木有像在寺海月庵在皇墻之西乃吳文定寬之居文定在翰苑及佐銓日以讀書為事公餘披白夾據案録書如儒生至今傳之文定海月庵冬日賞菊圖序𢎞治二年十月二十八日翰林諸公會余園居為賞菊之集既各有詩寬又以為宜有圗置其首乃請鄉人杜謹寫之蓋據案停筆而搆思者今南京國子祭酒致仕方石謝鳴治也並方石坐濡筆伸紙欲作字者太子少保禮部尚書兼文淵閣大學士西涯李賔之也持杯而傍坐者南京都察院左僉都御史成齋陳玉汝也舉茗碗而顧後者掌國子祭酒事禮部右侍郎泉山林享大也背立而觀飛鶴者太常寺少卿兼翰林院侍讀學士石城李世賢也循除而采菊者故詹事府詹事兼翰林院侍讀學士治齋陸亷伯也後至而褫衣者今詹事府少詹事兼翰林院侍讀學士守溪王濟之也坐泉山之次呼童子進饌者為寬而小兒奭捧卷而進亦與焉大率寫其意不求甚似至于衣冠古雅亦不必似今人而况草木之産乎夫古今人雅集多有圗傳於世以寬所見如宋王晉卿之西園元顧仲瑛之桃源國朝楊文敏公之杏園皆模寫一時人物各極其思而又必有序之者後世得以按而識之故述其人於圗付奭藏之覽者庶識其為某某也後十年己未四月草四日吏部左侍郎前詹事府少詹事兼翰林院侍講學士匏庵吳寬原博撰吳文定佐銓時手植藤於堂之右廂既而王文恪繼公之後乃命陸包山為圖諸公題咏之莆田方興邦刻記藤下余家有文定小楷詩稿一册錢尚湖題曰吾鄉吳文定公手書詩藁一册北海先生出以相示公平生好學老而不倦家有叢書堂藏書萬卷凡古書祕本多出手鈔其題署有云書於吏部東廂者則其佐銓時書也王文恪公手鈔唐六典今鏤板吳中先輩遭時承平讀書汲古優遊翰墨其風流可想見也文淵閣石臺芍藥其花較時花碩而艷大學士有擷之私第者傳玩數日不落李文逹玉堂賞花記文淵閣右植芍藥有臺相傳宣廟幸閣時命工砌者初植一本居中淡紅者是也景泰初增植二本純白居左深紅居右舊常有花自增植後未嘗一開天順改元徐有貞許彬薛瑄李賢同時入為學士居中一本遂開四花其一久而不落既而三人皆去惟賢獨留人以為兆眀年暮春忽各萌芽左二右三中則甚多而彭時呂原林文劉定之李紹倪謙黃諫錢溥相繼同升學士凡八人賢約開時共賞首夏四日盛開八花賢遂設燕以賞之時賢有玉帶之賜諸學士各賜大紅織衣且賜宴因名純白者曰玉𢃄白深紅者曰宮錦紅淡紅者曰醉仙顔惟諌以足疾不赴眀日復開一花衆謂諫足以當之賢賦詩十章閣院宮僚咸和彚成曰玉堂賞花詩集賢序其端月河梵苑僧道深别院池亭幽雅甲於都邑學士程敏政記月河梵苑在朝陽關南苜蓿園之西苑之池亭景為都城最苑後為一粟軒軒名曽西墅學士題軒前峙以巨石西闢小門門隱花石屏北為聚星亭亭四面為欄檻以息遊者亭東石盆池髙三尺許元質白章中凸而坎其旁云夏用以沉李浮瓜者亭之前後皆盆石石多崑山太湖靈壁錦川之屬亭少西為石橋橋西為雨花臺上建石鼓三臺北為草舍一楹曰希古桑樞甕牖中設藤牀石枕及古瓦塤箎之類草舍東聚石為假山西峰曰雲根曰蒼雪東峰曰小金山曰壁峰下為石池接竹以溜泉泉水涓涓自峰頂下竟日不竭僧指為水戲臺南為石方池貯水養蓮池南入小牖為槐室古樗一株枝柯四布蔭於階除俗呼龍爪槐中列蠻墩四槐屋南為小亭中庋鸚鵡石其重二百斤色淨緑蓋石之似玉者凡亭屋臺池四圍皆編竹為藩詰曲相通花樹多碧梧萬年松及海棠榴之類自一粟折南以東為老圃圃之門曰曦先曦先北為窖春冬以藏花卉窖春東為春意亭亭四周皆榆杜桑栁叢列密布逰者穿小徑逼仄以行亭東為板凳橋橋東為彈琴處中置石琴上刻曰蒼雪山人作西為下棋處少北為獨木橋折而西曰蒼雪亭亭為擊壤處有坐石三踰下棋處為小石浮圖浮圖東循坡陀而上凡十餘弓為灰堆山山上有聚景亭上望北山及宮闕歷歷可指亭東隙地植竹數挺曰竹塢下山少南門曰看清入看清結松為亭踰松亭為觀瀾處自聚景而南地勢轉斗如大堤逺望月河之水自城北逶迤而來下觸斷岸有聲潺潺别為短墻以障風雨曰考槃榭出看清西渡小石橋行叢薄中回望二茅亭環以葦樊隱映如畫盤旋而北未至曦先結老木為門曰野芳出曦先少南為蝸居東為北山晚翠樓樓上望北山視聚景尤勝出樓後為石級乃至樓下蓋樓處髙阜為之故下視若洞然樓下為北窗窗懸藤藍僧每坐其中以嬉蓋畨物也樓閣出小牖為梅屋盆梅一株花時聚觀者甚盛梅屋東為蘭室室中蒔蘭前有千葉碧桃尤北方所未有者苑主道深性疏秀通儒書宣德中住西山蒼雪庵賜號圎融顯密宗師而自稱蒼雪山人後歸老乃營此自娛諧者頗寡而獨與豫善故輒記之以示夫未逰者懷麓堂李文正第堂名也公名東陽字賔之茶陵人以戍籍居京師四嵗舉神童景皇帝抱置諸膝六嵗八嵗兩召見講尚書大義命入京學天順八年進士選翰林庶吉士成化元年授編修八年以禮部左侍郎兼文淵閣大學士直內閣纍官少師兼太子太師吏部尚書華蓋殿大學士正德七年致仕又四年卒年七十諡文正公歿後故第業已易主嘉靖乙酉耿公定向贖回搆一小祠塑公遺像其中內有一櫝貯公紵衫及小朱履蓋幼時所著以見上者櫝上耿公刻銘文正秉政久門生故吏滿朝或朝退或散衙即集其家分題吟咏嵗以為常公歿諸門人哭公有國賢詩一卷陸文裕深跋云右户侍邵二泉先生國賢詩一卷皆西涯李文正公卒後之作以致哀慕者萃寄都諫俞正齋國昌國昌示深讀之迂曲之情不可已敦厚之義不可窮實近世以來師生之所鮮有千載而下讀之猶將涕泗滿襟况於識西涯知二泉如吾國昌者往嵗丙子秋深起告北來舟次廣川適聞文正之訃亦有一詩哭之曰細推天運幾生賢又是山川五百年廊廟江湖今復少文章功業古難全重來東觀嗟何及再過西涯定惘然白髮門生傷往事每看憂國淚雙漣壬申二月深嘗與修撰何粹夫瑭撿討盛希道端眀謁文正公于私第議及國事公手揮雙淚意甚悲愴落句蓋紀實也因附卷尾以諗于正齋云文衡山在詞林日寓居禁城東玉河岸春水一灣新栁鬖鬖每集文人吟咏其中嘗自作燕山客舍圖題云燕山二月已春酣宫柳霏煙水映藍屋角踈花紅自好相看終不是江南何元朗云衡山先生在翰林日大為姚明山楊方城所窘時昌言于衆曰我衙門中不是畫院乃容畫匠處此耶惟黃泰泉佐馬西元汝驤陳石亭沂與衡山相得甚歡時共酬唱乃知薰蕕不同器君子小人固各以其類也然衡山自作畫之外所長甚多二人只會中狀元更無餘物故此數公者長在天地間今世豈更有道著姚淶楊維聰者耶此但足發一笑耳衡山先生在都無日不思歸嘗有詩云潦倒儒官二十年業緣仍在利名間敢言冀北無良馬深愧淮南賦小山病起秋風吹白髮雨中黃葉暗松關不嫌窮巷頻回轍消盡爐香一味間又經時卧病斷經過自撥間愁對酒歌意外紛紜知命在古來賢達患名多千金逸驥空求骨萬里冥鴻肯受羅心事悠悠那復識白頭辛苦服儒科未幾拂衣歸先生有道之士適以畫掩之也古雲山房米太僕萬鍾之居也太僕好竒石蓄置其中其最著者為非非石數峰孤聳儼然小九子也又一黃石髙四尺通體玲瓏光潤如玉一青石髙七尺形如片雲欲墮後刻元符元二月丙申米芾題又有泗濵浮玉四篆字太僕嘗以所蓄石令閩人吳文仲繪為一卷董元宰李本寧嘗為之題古今好石者自襄陽後人輒稱太僕云閩人陳衍米氏竒石記米氏萬鍾心清欲淡獨嗜竒石成癖宦逰四方袍袖所積惟石而已其最竒者有五因條而記之為靈壁者二一髙四寸有竒延袤坡陀勢如大山四面皆蹸踆􅛡砢如繪畫家皴法巖腹近山腳特起一小方臺凝厚而削臺面刻伯原二字小篆佳絶伯原勝國人杜本之字也本能詩工書尤以篆籀知名所著有篆訣此其遺物也其一塊然非方非圎渾璞天成周遭望之皆如屏嶂有脈兩道作殷紅色一脈濶如小指一細如縷絲自頂上凹處垂下如湫瀑之射朝日也石可髙八寸許圍將徑尺其聲視前石尤鑑亮色皆純黑凝潤如膏俱磬山産也更三石一英德産如雙虬盤卧玲瓏透漏千蹊萬徑穿孔鈎連雲煙宛轉欲興雷雨髙四寸許長七寸有竒一兖州産又曰出嶧山深谷中灰褐色巉巖渾雅堅緻有聲如拳一韶州産即仇池石也鐵色靚晶聲如響磬大亦如拳而峰巒洞壑層疊窈窕竒巧殊絶米公刻其􅔄曰小武夷五石羅列各具形勝皆數百年物隂陽滋養風露薄蝕雖復頑然若有靈氣矣是日巖桂盛開水天澄徹坐無俗客賔主盡歡欲是秋深如涉春和米太僕于大房山得異石博四五尺修三丈許欲致之園中乃束牲載書告之曰惟豫之于公也素性敦好氣質攸同爰求于山乃幸見公惟公之于豫也自啓雲關不靳一斑爰兹披塵得覩道顔豫既于公為夙契公宜為豫而出山云何屢懇不即慨然既聞即次復遲且延豈謂小園之無地異空佳客有天豫則有平原茂樹草蒨花嫣良辰勝日佳客名賢或袍笏之肅拜或韻事之聫翩或嘯歌之昵就或撙爼之留連視爾山中孰全孰偏又豈惡石工之佻巧畏用大之不情豫則有酒伴笙侣雲幄松帡自然𨗳窽百態岐嶷且物有用而功宏道有用而名成不鍊絀補天之績不鎸晦磨崖之英視爾山中孰重孰輕石乎石乎何濡濡而不行竒石休于良鄉道左甬東薛罔見之代石報米書石隱云僕山中頑民賦質堅貞不能言動意有所契僅知點頭孤眠獨立托處房山以為我地莫尊我計莫得我心莫靜我體莫寧千巖萬岫間確乎其不可轉矣頃者山靈失職不守藩籬俾我支機漫遭漢使遂承足下安車蒲輪從者數百厚幣卑辭逺辱召命天壤可敝知己難逢昔秦皇帝欲通三山遣僕入海賞靳𢃄礪虐以鞭笞僕義不受辱身可流血足必不移今當足下拜使即行幾不俟駕大夫之命重于王者何則知與不知也拘攣之夫寡聞淺見見僕出山以為希事物議蜂起毁言曰滋行雖半途畏不可涉躊躇四顧無復敢前矣嗟乎足下實負雅懷略陳固陋僕生長幽區風蔓雨蕪陶然適也煙花臺榭作陷穽觀竅若玲瓏而器夲窒礙圭角纖峭不學模稜原非世網之具又豈磬折之姿足下不察謬賞為竒稱僕以支持乾象奠守坤維廣大圓通卓哉國寶聞似過情美殊溢實恭聆斯語惟有主臣僕纍纍族齒未琢未雕散居名山不可數計其在靈壁者家聲尤重莫不鎸鏤祖訓懷寶懷刑往有不類不師至人後身持已為天下先技逞一長法羅三尺以驚人服射刑以補天服煉刑以砥中流服淹刑殆哉岌岌乎殷鑒不逺足下愛僕甚知不令補天砥流此禍無患然使僕正墻面而立備弄臣之員貽之以安似非重徴僕之初意僕不屑也使僕展厥生平監峻任巨不少貶巖巖之度足下能保人不驚乎驚斯疑疑斯畏畏必有以中之淹煉可逃飲羽不免足下仁慈涖衆蒲不濫施何忍一介之士為知己者死耶里有喬松甘泉者松慕髙而髙奔泉慕深而深注僕猶然笑之不解我衷亦若有慕竊恐今後松泉得反之矣僕聞人情胥尚惟位與金多金髙位自昔重之足下擅陳思之敏才兼司空之博物文人慧性衆揣不如獨奈何當官則計拙與僕則情投人藉位而營金足下捐金而贍僕僕誠何竒好酷至此大非人情愚不可及僕以足下永附亷吏之稱足下以僕反蒙愚公之誚非所以答清貺而安余心也且足下家傍瓊林林中則十面仙郎為政自號元衣客卿既態既韻亦見亦隱五嶽讓其秀聳八音爭其鏗鏘竒氣逼人不可一世擁腫之與遊我形覺穢何以施面目于此君之前哉僕尚有虞焉足下與客卿逰有年矣館之以白玉之宫叔之于紫霞之座窺彼所宜曲合其意行擬偕行止擬偕止而使軿在道無計相將軀質􅏀園貌登縑素􅌽人讃跋對客摩挲夢裏元衣卷中斑管鳥啼吏散悠悠我思假令僕儼然而至足下不勝其喜必袍笏迎拜晨夕與俱異日君位漸髙君途漸逺携之不去思之不來有如今日何以為懷僕之纍足下不淺矣語云一貴一賤交情始見先人壁立公一卷處士雖與君家海嶽老人定方外交晨星俱殞世逺澤亡足下拖紫紆青不挾其貴憐我子姓少即負竒或居侍從或掌圖書濟濟布列充滿下陳更惜老成復迎耆長世講隆情古今絶少况今售惟膺品鑒鮮真知物價長于宋人人羣久無卞氏足下畫龍弗好旁採溪山務求邁種以僕硜硜均蒙推轂啓母若來可追十亂人之非常舉之違衆指示紛紛良有以也僕匪不知吐握再興聞風奔走而憎兹多口士有同情伏惟垂原勿加斧戮幸甚足下買骨髙名遍徹崖谷龍門崇重人又願登一種不羈之子不顧一世之非求價急沽未必不有儻能留意自入彀中望夫干時挂瓢辟世所志不一存乎其人故山可歸吾完吾壁嗟乎足下夫復何言初遊塵界來路已迷𨗳之使還願借力士古稱金銅仙人辭漢鉛水霑襟僕既乏羊足亦鮮燕翎欲歸未能淚作時雨惟足下念之若足下膏盲有癖嗜果在痂請畢鐘鼎之才薄建山林之業地無虎豹鄉頗安恬俗子不來惡聲不入煮之則我即糧偃之則我即枕待君結鄰同吾不老足下計不出此耶二書當時傳誦以為韻事海淀米太僕勺園園僅百畝一望盡水長隄大橋幽亭曲榭路窮則舟舟窮則廊髙柳掩之一望彌際傍為李戚畹園巨麗之甚然逰者必稱米園焉海淀李戚畹園方廣十餘里中建挹海堂堂北有亭亭懸清雅二字明肅太后手書也亭一望盡牡丹石間之芍藥間之瀕于水則已飛橋而汀橋下金鯽長者五尺汀而北一望皆荷望盡而山婉轉起伏殆如真山山畔有樓樓上有臺西山秀色出手可挹園中水程十數里嶼石百座靈壁太湖錦川百計喬木千計竹萬計花億萬計閩中葉公向髙曰李園不酸米園不俗都人王嘉謨丹稜沜記帝京西十五里為海淀凡二南則觭於白龍廟又南湊於湖北斜鄰岣嶁河又西五里􅜍山又五里為青龍桁河東南流流入於淀之夕陽延而南者五里旁與巴溝鄰曰丹稜沜沜之大以百頃十畝瀦為湖二十畝沈灑種稻厥田上上湖圜而駛於西可以舟其地虛敞面陽有貴人别業在焉土木甚盛最後為樓一區沜自垣以西入於樓之漘為小湖桁二舸二中多菱芡魚鱉之屬上有竹萬箇筨􅼢垂絲􅓁簩雜生又有石苔沙嘗甘菊忍冬幽蘭之類蘼蕪蔓延以入於沜竹最美亦帝京之僅有也樓下為城髙可四丈竹籜蒙之根如蒼龍土石迸出登樓則沜當其腹以貫於南熒曜如銀其十􅒪外有大查鐵鎖纜之以度行者度而南則為官道東入海淀循沜而西或南或西町塍相連有石梁一是曰西鈎復瀦為小溪溪上有大盤石有小石瑟翠可愛溪中倒映見西山諸峰如鏡小魚淰淰如吹雲又南為陂者五六沜水再瀦為溪有村一是曰東雉土人汲焉始入地中出於巴溝自溝逹於白石以入於髙梁是為西郊自髙梁合二潞是為東潞云溯而北自岣嶁而北入於西湖土人訛為諸墊西向之東有古祠一斷碑乃元上都路制使多爾濟撰文云丹稜沜尚餘數行餘皆磨滅沜雖小然忽隱忽瀦連以數里可舟可釣足食數口負山叢叢蓋神臯之佳麗郊居之選勝也癸未春三月余讀書海淀與沜為鄰主人僅有閽者暇得以遊息其間如已有之莫余難也於是乎記張惠安牡丹園在嘉興觀西其堂室一大宅其後植牡丹數百􅒪每當開日主人坐小竹輿行花中竟日乃遍袁宏道遊牡丹園記四月初四日李長卿邀余及顧升伯湯嘉賔鄭太初出平則門看牡丹主人為惠安伯張公元善皓髮頳顔伺客甚謹時牡丹繁盛約開五千餘平頭紫大如盤者甚夥西瓜瓤舞青猊之類遍畦有之一種為芙蓉三變尤佳曉起白如珂雪已後作嫩黃色午間紅暈一點如腮霞花之極妖異者主人自言經營四十餘年精神筋力強半疲于此花每見人間花實即採而歸之二年芽始茁十五年始花久則變而為異種單瓣而樓子者有始常而終冶麗者已老不復花則芟其枝時殘紅在海棠猶三十餘本中設緋幕絲肉遞作自籬落以至門屏無非牡丹可謂極花之觀最後一空亭甚敞亭周遭皆芍藥密如韭畦墻外有地數十畝種亦如之約以開時復來二十六日偕升伯長卿及友人李本石龍君超邱長儒陶孝若胡仲修十弟寓庸時小修亦自密雲至遂同往觀紅者已開殘唯空亭周遭數十畝如積雪約十萬餘本是日米者多髙户遂大醉而歸附載其詩看罷南徐紫錦堆紅亭碧榭乂催開旋心纈子紛難識喚取維揚舊譜來雪色玲瓏照地華飛觥走兕疾如車等間倒却春三甕未了東軒一角花百千新艷一時開那遣花妖不下來好與扶笻枝上去花頭處處有樓臺花勳難樹亦難酬炙雪澆風老未休給與掃花十萬户靈芳國裏古諸侯薛瑄車窗記河東薛德溫官御史近五年始買小屋兩間於京師僅容几榻床褥又苦其東壁暗甚力不能辦一􅖠小子淳乃取廢車上轅卸去兩傍長木以中方穿櫺類若􅖠者穴壁而安置之余歸自外來因嘆曰以御史之顯曽不能辨一􅖠致以此物為之使富者見焉必睨目而哂掩口而走矣御史之拙於生事乃至於此既而取古書讀其下則旭日漏彩清風度涼心神通融四體超爽忽不知天之回地之廣而屋之陋也復從而自解曰吾之屋如是可謂陋矣然安之而忘其陋是居雖小而心則大也彼貪名侈士巍堂綺户可謂廣且麗矣彼方𥚹􅏥汲汲若不足以自容日夜勞神憊精思益以擴大之是其居雖大而心則小也小大之説君子必能辨之於是作車窗記春明夢餘録卷六十五
