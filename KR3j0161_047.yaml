body:
  text: 春明夢餘錄卷四十七吏部左侍郎孫承澤撰工部二寶源局寶源局在城之東石大人衚衕盖石亨舊宅也亨伏誅宅沒入官嘉靖中賜仇鸞鸞敗復沒入官因改為鼓鑄公署虞衡司員外郎監督其事所屬有寶源局大使國初鼔鑄之事惟屬工部至天啓二年始增寶泉局其政屬於户部而工部之所鑄者㣲矣錢自周景王以前皆漫無文至南宋廢帝景和元年鑄二銖錢文曰景和錢有年號自兹始然杜佑通典載宋武帝鑄四銖錢文曰孝建則錢有年號又不始於景和矣至後漢曰漢通元寶周曰周通元寶至宋之開寳中所鑄錢文曰宋通元寶至寶中所鑄錢文曰皇宋通寶皆不用年號錢始於周太公然商紀紂厚賦歛以實鹿臺之錢則商時已有錢名矣周錢為幣本皆足陌梁武帝時以鐵錢之故商賈浸以姦詐自破嶺以東八十為百名曰東錢江郢以上七十為百名曰西錢京師以九十為百名曰長錢大同元年詔通行足陌詔下而人不從錢陌益少至於末年遂以三十五為百唐之盛際純用足錢天祐中以兵亂窮乏始令以八十五為百後唐天成又减其五漢乾祐中王章為三司使復减三皇朝因漢制其輸官者亦用八十或八十五然諸州私用猶有随俗至於四十八錢太平興國二年始詔民間緍錢定以七十七為百自是以来天下承用公私出納皆然故名省錢但數十年来有所謂頭子錢每貫五十六除中都及軍兵俸料外其餘州縣官民所當得其出者每百纔得七十一錢四分其入者每百為八十二錢四分元無所謂七十七矣民間所用多寡又益不均云明初置寶源局鑄大中通寶錢與歴代錢兼行以四百為一貫四十為一兩四文為一錢置官治之即位以後鑄洪武通寶錢當十當五當三折二若小錢凡五等當十錢重一兩當五重五錢當三折二重如其當之數而小錢重一錢六年禁私鑄八年罷寳源局造大明寳鈔每鈔一貫准錢千文銀一兩其餘以是為差曰一貫五百文四百文三百文二百文一百文凡六等每鈔四貫易赤金一兩禁民間不得以金銀物貨交易違者治罪告發者就以其物給賞有以金銀易鈔者聼凡商税課諸色錢鈔兼收錢十之三鈔十之七百文以下則用錢十年置各布政司寶泉局鑄小錢與鈔兼行十三年令在外在京各置行用庫令民間鈔貫伯昏爛者入庫易換量收工墨價值二十三年令造小錢一十文至五十文以便民用每生銅一觔鑄小錢一百六十折當二錢八十當三錢五十四當五錢三十二當十錢一十六二十三年定錢制每小錢一文銅二分其餘四等錢依小錢制逓增二十四年令諸商税課程但鈔貫有字可辨真偽者不問破爛油汚水跡紙補即與收受二十六年罷各布政司寳泉局其明年禁行錢専用鈔永樂元年以鈔法不通令民間有用金銀交易者以姦惡論有能首捕者以所交易金銀充賞五年令各色税程課程俱准折鈔以重鈔法七年設寳鈔提舉司於北京八年鑄永樂通寳錢於天下而錢復兼鈔矣宣徳正統中並重鈔法至景泰四年聼民間鈔錢相兼行使成化十三年嚴鑄私錢之禁十六年嚴揀錢之禁但係囫圇錢即便行使勿拘年代逺近宏治中民間徃徃有盗鑄錢遂有新錢及鉛錫薄少低錢倒好皮棍等項名色於是鑄宏治通寳錢官吏俸薪並給通寳錢諸税課衙門一半收洪永宣三朝制錢如無三朝制錢者折收舊錢二文以示懲罰正徳七年令職官折色俸給十分為率一分折錢九分關銀嘉靖三年令民間用好錢每銀一錢七十文低錢每銀一錢者倍之四年令收税課每鈔一貫折銀三釐每錢七八文折銀一分六年鑄嘉靖通寳錢每文重一錢三分與洪武錢相兼行使隆慶元年令民間貨鬻值銀一錢以下止許用錢國朝制錢凡歴代舊錢每八文折銀一分不許任意低昻四年鑄隆慶通寳錢成命戸部量放京官折俸萬歴造金背火漆錢每六文作銀一分崇禎末戸部司務蒋臣請行鈔法錢法侍郎王鰲永力主之然卒不能行鑄錢則例洪武間當十錢一千箇燻模用油一斤一兩三錢鑄錢連火耗用生銅六十六斤六兩五錢炭五十三斤一十五兩二錢當五錢二千個燻模用油一斤四兩鑄錢連火耗用生銅六十六斤六兩五錢炭五十三斤一十五兩二錢當三錢三千三百三十三箇燻模用油一斤一十四兩鑄錢連火耗用生銅六十五斤九兩二錢五分炭五十三斤八兩三錢五分折二錢五千箇燻模用油二斤五兩五錢鑄錢連火耗用生銅六十六斤六兩五錢炭五十三斤一十五兩二錢小錢一萬箇燻模用油一斤四兩鑄錢連火耗用生銅六十六斤六兩五錢炭五十三斤一十五兩二錢宏治十八年題准每銅一斤加好錫二兩銼匠每一名一日銼當十錢二百五十二箇當五錢三百二十四個當三錢四百六十八箇折二錢六百四十八箇小錢一千二百六十箇嘉靖中則例通寳六百萬文合用二火黄銅四萬七千二百七十二斤水錫四千七百二十八斤炸塊一十四萬五千斤木炭二萬斤木柴二千三百五十斤白麻七百七十斤明􅈨七十七斤松香一千五百六十六斤牛蹄甲十萬箇沙礶三千五百二十箇鑄匠工食每百文銀三分八釐萬歴中則例金背錢一萬文合用四火黄銅八十五斤八兩六錢一分三釐一毫水錫五斤一十一兩二錢四分八毫八絲炸塊二百三十九斤八兩一錢一分六釐七毫木炭四十五斤六兩二錢四釐四毫白麻一十一兩六分六釐六毫松香二斤一十三兩六錢二分四釐四絲砂礶六箇鑄匠工食銀三兩六錢五分火漆錢一萬文合用二火黄銅斤兩同牛蹄甲一百八十五箇一分八釐餘皆同前凡在外各處鑄錢北平二十一座每嵗鑄錢一千二百八十三萬四百文廣西一十五座半母嵗鑄錢九百三萬九千六百文陕西三十九座半每嵗鑄錢二千三百三萬六千四百文廣東一十九座半每嵗鑄錢一千一百三十七萬二千四百文四川一十座每嵗鑄錢五百八十三萬二千文山東二十二座半每嵗鑄錢一千二百一十二萬二千文山西四十座每嵗鑄錢二千三百三十二萬八千文河南二十二座半每嵗鑄錢一千三百一十二萬二千文浙江二十一座每嵗鑄錢一千一百六十六萬四千文江西一百一十五座每嵗鑄錢六千七百六萬八千文工部條議鑄錢必用水錫者以銅性燥烈非用錫引則積角不整字畫不明倘有四火黄銅則水錫乃必需之物近商銅日低錫似宜裁前任王員外呈議以錫易銅歸錢内盖欲錢體厚重期於久逺惟是錢自有定式如果合式則錢自不䡖與其以錫换銅而以四斤五兩四錢八分之數加重於一萬文之内不若計銅增錢而以四斤五兩四錢八分加多於一萬文之外盖水錫五斤一十一兩二錢價銀四錢五分六釐照價買净銅四斤五兩四錢八分可鑄錢四百八十三文如鑄錢十萬即多四千八百三十文錢矣積而累之其數無窮如此則公家有水錫之費而亦有水錫之利爐役無乾没之弊而亦無冐領之名若後果有四火黄銅相應仍用水錫庶不失立法初意至於嚴禁低銅成色不足者依法重處尤正本清源第一義也萬歴中給事中郝敬錢法議錢者古帝王經國之良法也天生五金并為民利而金銀最少鐡錫太賤惟銅為適中古今之通幣也因其自然之利濬其不竭之源存乎人與法耳今海内行錢惟北地一隅自大江以南强半用銀即北地惟民間貿易而官帑出納仍用銀則錢之所行無幾耳舉天下之人用其最少者若之何不匱况逐年九邉之費徃而不返頃者天府之入又閉而不出銀非雨之自天非湧之自地非造之自人奈何不竭竭而强取則民病取之不得則國病必然之勢也惟銅則不然二百餘年来錢法不修天下廢銅在民間為供具什噐者不知幾千萬億其産於各處名山者豪姓大賈負販以擅厚利又不知幾千萬億假使盡天下之銅化而為錢則盡天下之銅皆可貿銀而歸之太倉以助司農之急盖銅因於山自然不費而錢成於人鑄造無窮上不動朝廷錙銖而厚裨於國下不朘閭閻膏血而隂厚於民生財之道無踰於此乃格於議論束手坐視莫肯决行是管仲計然之所捓揄而竊笑也謹循職掌條議於後一曰責專官凡錢法不行以有司不肯收錢徒責之小民也所以使有司得操其收不收之權者由朝無專責之官以錢法委之有司不知錢法行有司之所不便也欲行錢宜責成司道官董其事選委地方亷幹屬官分理每年差御史一員廵視以錢法之行滯注各官之能否事干錢政一體紏劾庶事有責成不致推諉底績不難矣二曰定規則凡官吏所以喜收銀以收銀有加耗稱頭支放有那移侵减若錢不可欺羡不可隐銀輕易聚錢重難携故百計阻格今宜先立規制自某年始有司徴税除起運照舊收銀其餘存留支放者銀錢中半兼收小民不許一概納銀有司不許一概收銀令納戸赴各府鑄局换錢囬本處州縣納庫毎紋銀一錢限换與小民銅錢八十五文小民納銀一錢者止徴銅錢八十三文官給錢與舖户變賣亦照八十三文舖戸賣與小民紋銀一錢限八十一文小民自相交易止八十文如此則民有㣲息無不悦從矣一切上下俸薪並工食俱銀錢中半支給各府州縣扣定毎嵗除半銀若干外該半錢若干申詳合於上司刋入由票永為遵守各衙門贓罰抵贖亦銀錢兼收或全收銅錢尤見羙意敢有勒要小民全銀希圖加耗者廵按御史叅究三曰廣鑄局官不收錢民無用錢之處故錢法不行官既收錢民無錢可用法亦不行或議每省設一鑄局以一局供數十州縣不足用也錢初行湏布散周流多開鑄局廣募工匠大府地廣糧多者一府一局量州縣之數為爐之多寡小府錢糧少者一道設一局可也工部選寳源局嘉靖新錢金背平圓光亮者每省給様錢二三千文該布政司轉發各府依様鑄造不必大重每錢一文定制官法馬一錢二分為凖每銅加錫一斤鑄錢一百三十文有竒銅錫驗勘原解足色下火不許工匠偷换摻和字畫邊文務鑿礲光平俱以大明通寳四字為文以便永行如式様歪薄文理糢糊比式不合者監造官初犯戒飭再犯追賠鑄造如法者工匠加賞仍令轉相教習其局中一應利弊聼監造官講求禁緝因考其能否三年之後錢多足用量議减局四曰採礦銅買銅鑄錢則所費多今雲南陕西四川廣東各省有銅礦為姦商專擅或封閉未開為土人竊發宜選亷幹官一員為錢運使專理銅課重其權而久其任臨洞開採禁緝私販各省巡錢御史按季差委的當職官給與勘合公文前去運使衙門關領官銅回省轉給各府鑄造其各省支銅量各礦近便者坐𣲖每歲支銅若干即以地方銀錢中半兼支之數起例假如應支銅錢一萬三千三百文坐𣲖銅一百斤以錢輕重凖銅之多寡如礦銅一時採銷不敷設法權買接濟其鑄法每銅一斤和錫數兩則錢色光潤宜于該省出錫地方每歲酌量𣲖徵本色錫若干解赴錢運司收貯照數轉給每給銅一百斤搭錫若干斤傾驗足色交付解官領回巡錢御史衙門勘驗轉給錢法道給散該府五曰處工本起鑄須工本工本無措稱法不便者藉口矣今必不費官帑但查該府各州縣額𣲖存留銀兩先一年十二月預借徵四分之一解府支用假如一縣存留銀共二千兩移五百兩解用候鑄錢成儘先給還前銀每兩照例給還算錢八百三十文通計原銀五百兩該還銅錢四十一萬五千文領回兼銀支放或即以凖小民初一年納錢之數亦可大約鑄造之費每銀一兩可鑄錢一千二百文銀五百兩可鑄錢六十萬而還抵之外尚餘錢一十八萬五千文給舖戸變賣可值銀二百二十二兩九錢此皆以㝷常費工本鑄造者論也若因銅於礦不勞買辦止於匠作工食所費益無幾矣奉行得人前銀五百兩可無多費而更增二百二十兩有竒之息由五百兩以推至千萬由一縣推之天下即此那借子息已不下百萬矣自此以後惟因自然之利盡人官之力有增無减錢日多于下利日歸于國大倉之積計日可充矣六曰鑄大錢錢法始行鑄造不行則有權宜變通之法古者以大錢為母權子行其費少而利多今宜另開秘局一所鑄大錢或一當三十或一當五十務極精工不必大重但以文為别曰大明通寳旁註當三十字様與小錢三七或四六兼行背鑄文曰私鑄者斬四隣籍没告者賞銀一百兩誣告反坐盖利厚私鑄起禁不得不嚴先令寳源局鑄様頒給各省依式監造以佐小錢之不給七曰算嵗息查每年運司給過某省銅錫若干即依銅一斤鑄錢一百三十文起算比對本省該年應鑄過銅錢若干又依銅錢每八十五文賣銀一錢比算本省額銀一半收錢之數即知各局一年該换過銀若干假如一省該存留支給銀十萬兩即該一半换錢計四千二百五十萬文該領過運司銅錫三十二萬四千四百九十斤有竒該變賣過銀五萬兩濟邊此其大約也八曰禁盗鑄官錢精好則通行無滯錢精好工費多姦民無厚利盗鑄自少盗鑄之錢自然粗惡官錢一被混雜民遂囂然疑阻錢法之壊多由此所以從来禁私鑄非但為利權不可下移亦以防阻滯也今宜嚴為之禁但捕獲私鑄真贓者一文以上皆斬知而不舉者連坐出首得實者賞銀二十兩九曰嚴稽算各局鑄錢事干軍儲凡逐年收過銅錫鑄過新錢賣過銀兩起解過數目責成監守置籍稽查勿使工匠朦朧冐破吏胥那移侵欺此一亷幹御史理之有餘矣十曰重賞罰令行禁止存乎賞罰信賞必罰天下無不辦之事茍且依違則仍成故套今國計艱窘忠藎之士自然曲體其偷安蒙蔽者必惡臣言多端遮飾了事是今日之痼疾也宜著為令凡各官能疏通錢法每年鑄錢解銀如額者超級陞用貪惰違玩阻格不行者聼錢法御史叅提重處當超陞者决然超陞當叅問者决然叅問令出必行禁出必止有不沛然四逹者乎十一曰曉愚民夫錢本銅也而以代銀民用銀久一旦更易不能無疑不肖官吏乘隙煽惑則隂壊其法宜令該部轉行申諭各省開示各府州縣軍民人等詳曉以朝廷便民抑貪省斂之意勿使姦吏猾胥倡為浮議庶閭閻遵信則令行如水十二曰信命令前此錢法亦常議行未幾報罷今民欲蓄錢恐一旦中改則錢之積無用宜詔諭天下確然示以必行永久之意使百姓安心為長久計十三曰聼販賣地方商人屯錢販賣官司往往禁之盖因錢少販多則地方空虚民不足用今既廣開鑄局則錢多販賣者亦多流通布散小民得錢易於出手亟宜聼之十四曰因民便各省舊用錢地方多舊錢或者議禁舊錢以疏新錢民未見利先稱害矣宜聼新舊兼用若淮北用鵝眼雲南用海􅚔隨便兼行至於原用銀地方則决然全用新錢以上十四條皆據臣職掌謬陳一得倘垂採納未必非軍需之一助也春明夢餘錄卷四十七
