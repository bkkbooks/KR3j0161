body:
  text: 春明夢餘録卷二十六吏部左侍郎孫承澤撰尚寶司尚寶司在午門外西兵科之上初設符璽郎後改今名設卿少卿丞職在禁庭守寶璽符牌印章而辨其所用有事請於内既事而藏之凡寶十四曰奉天之寶以鎮萬國祀天地曰皇帝之寶以册封賜勞曰皇帝信寶以徴召軍旅曰天子之寶以祭享鬼神曰天子行寶以封賜蠻司曰天子信寶以調發番兵曰制誥之寶以識誥命曰勅命之寶以識勅命曰廣運之寶以識黄選勘籍曰御前之寶以進御座從車駕曰皇帝尊親之寶以答賜宗人曰敬天勤民之寶以訓廸有司凡奉寶用寶從寶洗寶與印綬監俱凡扈守侍衛令牌之號六以警夜廵金牌之號五以嚴守衛凡半字銅符之號四以稽廵守凡銅牌之號一以稽卒凡牙牌之號五以察朝叅凡祭牌之號三以謹祀事凡雙魚銅牌之號五以肅直衛以潔祀壇凡符騐之號五以給傳郵通制命尚寶司題名記尚寶司掌璽牌符之事國初建符璽郎後改曰尚寶司秩正三品洪武元年乃置卿一人正五品少卿一人從五品司丞二人正六品其後大臣子弟以廕補丞者無常員列署在右掖之内其地至禁密也寶璽之大者曰奉天之寶為唐宋傳璽惟祀天地用之凡詔若赦則用皇帝之寶立封及賜勞則用行寶詔親王大臣調兵則用信寶册上尊號則用尊親之寶勅諭親王則用親親之寶祀山川鬼神則用天子之寶封外國及賜勞則用天子行寶詔外國調兵則用天子信寶曰誥則用誥命之寶曰勅則用勅命之寶勅奬臣工則用廣運之寶勅諭来朝官員則用敬天勤民之寶凡寶之用必請命而後發焉天子享祀郊廟若視學耤田勲衛扈從及公侯駙馬都督日衛錦衣當直則給金牌牌之制有龍者虎者麒麟者獅者雲者以其官為差皇城金吾禁夜五城夜巡則給令牌虎賁巡城則給銅符九門守衛則給銅牌錦衣校尉入直則給雙魚銅牌京官之朝叅者則給牙牌勲臣以勲字親臣以親字文臣以文字武臣以武字文武官之與陪祀郊廟及執事人亦給牙牌有圎花長花長素之别凡諸得給牌者有故則檢籍而納之親王之國及文武大臣出撫鎮則給符騐御史出巡察則給印事竣則納之稽出入之令而辨其數其事至重也每大朝㑹則二人以寶導駕先立侍殿中駕出幸則二人以騎從寶行其為侍從至親近國初類以文學儒臣領其職或兼秩為尚書郎而下非有才名者不得調勲輔大臣子弟奉特㫖乃得補丞他流所弗與焉其𨕖至慎也尚寶司舊直廬頺圮而題名亦闕焉嘉靖丁未尚寶諸君乃請于上曰尚寶為禁近臣而待漏齋直無所每風雨晨夕雜處他舍中弗便詔以長安之閒署改為之用是興止有寜宇既而諸君復喟然曰君子疾沒世而名不稱也况居其官而紀載弗偹姓名無傳焉何以稽徃而詔来哉乃蒐諸故牒自洪武而下迄於今凡有事於尚寶者得若干人刻其名氏爵里立石廬中丐張治記之記曰寶者人君所以信其命於天下者也名者君子所以信其行於後世者也人君之於寶則設官以守之者慎其令也然則君子之於名其賢不肖闗於勸懲者至逺也顧可以弗思慎乎哉夫徳者所以慎名之具也是故人君有慎令而後天下無邪政是謂治法君子有慎名而後終身無邪行是謂治人以治人而守治法則身安而國家可長保也嗚呼豈獨尚寶然哉此諸君所為題名意也長沙張治撰尚寶司卿劉日升議處公署疏竊照本司設在掖門内西收藏金銅牌靣等件俱係朝廷信物機密所在闗係匪輕國家剏立衙門必於禁地誠重之也伏讀聖祖賜臣等衙門誥詞寶乃乾符也昔列聖握而統寰宇故為神噐特謹以示信又曰事密而隐機潛而深洋洋聖謨顯示以禁地之當慎矣續奉欽依凡一應閑雜人等無事擅進尚寶司裏去的錦衣衛着人拿赫赫明命嚴諭以禁地之當肅矣臣等夙夜出入仰王言之在上瞻天威之伊邇兢兢焉惟不能奉職是懼不意一旦被燬遂致辦事無所臣等有不敢不亟請者但大工方興恐難遽及本司有午門外直房三間原係候朝處所合無比照六科勅下工部估計脩理暫容臣等辦事其中候大工完日次第興造照舊入内庶不失祖宗創建初意而臣等職業亦不致曠廢矣奉㫖是該衙門知道西垣筆記周官有典瑞掌節二官掌瑞節之事秦漢有符節令丞領符璽郎文帝時與郡守有銅虎符竹使符之制皆屬焉隋有符璽局屬門下省唐稱符寶郎掌天子之八寶及國之符節並納于宫中駕出幸則二人以騎從寶行明之各寶皆内尚寶監女官掌之遇用寶則尚寶司以揭帖赴尚寶監尚寶監請㫖然後赴内司領取嵗用寶三萬餘顆嵗終尚寶司奏進數目官職入朝皆佩牙牌其官職鐫牌上拜官則於尚寶領出出京及遷轉則繳還唐人百官隨身魚符一右一左左者進内右者隨身皆盛以袋宋賜金帶者例不佩魚惟兩府賜佩謂之重金煎熬寶色法大麻子油十八斤一次下皂角四十五兩二次下金毛狗脊九個三次下白芨十八兩四次下白礬九兩蜜陀僧一兩八錢黄丹一兩八錢無名異九錢茆香二兩五次下藿香二兩地蓮衣二兩甘松二兩山柰二両苓陵香二兩麝香五個雙璽記𢎞治十三年七月陕西都司都指揮使楊敬等奏據西安府鄠縣道安里軍人毛志學狀本年六月二十二日午時在本里趙綸村沿河邊澡浴得一玉璽臣等辨得篆文係是受命於天既壽永昌八字背有螭鈕其色洗白光彩異常厚一寸連鈕二寸方圓一尺四寸四分完全篆文明朗刻畫竒古殊無瑕玷巡撫右都御史熊翀㑹騐此即厯代傳國璽也除璽該熊翀差官齎進外謹具奏聞天啟甲子九月初四日河南臨漳縣民邢一泰於務本莊東去磁州八里漳河西畔得一玉璽大如斗縣令何可及騐其文曰受命於天既壽永昌方各四寸厚三寸餘重一百一十兩報之都察院副都御史巡撫河南程紹奏聞曰秦璽之不足徴久矣今璽之出適在臣疆内道路喧噪流聞禁闥既不應還瘞地下又不敢私秘人間欲遣官恭進闕庭跡渉貢媚非臣誼所宜亦恐皇上之所寶者在彼不在此臣雖什襲進之皇上且瓦礫置之也謹先馳奏聞候命進止昔者王孫圉不寶玉珩齊威王不寶照乘蠻裔偏霸猶知尊賢寶善輝耀史册况於聖明之朝全盛之世乎今之大臣如總憲鄒元標馮從吾尚書王紀盛以𢎞孫慎行侍郎曹於汴等憂國奉公白首魁艾又有一斥不還之詞臣久錮不起之臺諫思皇多士國之寶臣臣不能挽囬天聼汲致明廷徒獻符貢璽效七十二代之故事臣竊羞之伏望皇上踐履大寶克受貞符怡神寡慾親賢納諫在朝之忠直勿事虚拘遺野之名賢急為登進玉瓚毖於清廟瑚璉賁於明堂共襄大噐永固金甌雖謂虞舜黄璽夏禹元圭至今存可也區區傳國璽其真偽豈足論哉秦璽至漢已亡後之僣竊多偽為之其不足重明矣𢎞治中秦中所進上令禮部察騐謂與輟耕録所載秦璽規製不合僅賞軍人毛志學銀五兩此𢎞治之所以為𢎞治也河南省所報上令賫進天子親御文華殿璽貯御前逆閹魏忠賢手捧之慿軒頒示羣臣皆呼萬嵗傳制受賀而罷此天啟之所以為天啟也巡撫程公紹一疏烺烺千古矣程公徳州人崇禎初起為工部右侍郎四疏告歸優游林泉歿贈工部尚書丁酉六月曬書得萬厯癸未中書謝從寜所搨璽文一紙因書二疏於後以為山中閒玩退谷手記按宋紹聖三年十二月長安村民叚義掘地得玉璽正緑色以獻於朝蹇序辰安惇等皆言此秦璽漢以為傳國寶自五代失之今為時而出尋詔禮部御史臺學士院秘書省太常寺議於是蔡京等奏考之璽文皇帝壽昌晋璽也受命於天後魏璽也有徳者昌石晋璽也今云受命於天既壽永昌其為秦璽無疑哲宗遂以五月朔御殿受賀改紹聖五年為元符元年云此事與熹宗朝事極似春明夢餘録卷二十六
