body:
  text: 春眀夢餘録卷六十七吏部左侍郎孫承澤撰石刻周宣王石鼓文在國子監廟門內京師石刻莫古於宣王獵碣矣其形如鼓其數盈十蓋周宣田獵之事史籕之迹也舊在陳倉野中韓昌黎為博士時請於祭酒欲輿之太學不從鄭餘慶遷之鳳翔孔子廟經五代之亂遂至散失宋司馬池知鳳翔復輦至府學廡已失其一皇祐四年向傳師搜足大觀二年歸於汴京詔以金填其文初致之辟雍後移至寶和殿金人破汴輦至於燕置王宣撫家復移大興府學元皇慶移至文廟戟門內其文漫滅不可讀潘迪音訓載四百九十四字薛尚功帖載四百五十一字今存三百二十五字楊用修慎曰此文在太學潘迪有音訓凡四百九十四字豫得唐人拓本於李文正先生凡七百二字蓋全文也嘗刻之木以傳矣然都元敬金薤篇劉梅國廣文選所收仍是殘缺四百九十四字本蓋亦未見此也陸文裕深曰石鼓詩先儒辨論至多蓋風雅之遺云鼓今在北監子為司業祭酒時慮其泐也欲扃鑰之而不果别有樹碑一元司業潘迪以今文寫之仍其舊闕潘碑與鼓積有存亡矣潘仕大德間虞文靖公集助教成均時嘗謂十鼓其一已無字其一惟存數字潘虞相去不遠其言如此今去之又將二百年石可知矣詩之存者頗賴諸家文字集録以傳石顧足恃哉慱洽之儒如王順伯鄭漁仲又好古而搜訪訓釋靡餘力矣咸存斷闕焉歐陽公集古所録才四百六十有五字胡世將資古所録僅多九字乃稱先世藏本集古録之前孫巨源於佛龕中得唐人所録古文乃有四百九十七字視資古又前矣又前之則韓公所見紙本已謂毫髮備盡復有年深闕畫之嘆韋應物亦謂風雨闕訛而杜工部直云陳倉石鼓久已訛其上下世數如此近世吾衍子行尤號慱雅自謂以甲秀堂譜圖隨鼓形補闕字列錢為文以求章句又參以薛尚功欵識諸作斯已勤矣亦僅得四百三十餘字每鼓列行裁分為十而章句次第又與諸家不同子行介士未嘗入燕止於畫中見鼓爾不知近日何緣得此十詩完好乃爾耶此詩出於修撰楊用修慎若所從來果有的據豈非千古之一快哉如以補綴為竒固不若闕疑之為愈也石鼓文我車既攻我馬既同我車既好我馬既􅥹君子云獵云獵云遊麀鹿速速君子之求彎彎􅒾弓弓兹以時我驅其時其來􅀈􅀈􅀈􅀈炱炱即御即時麀鹿速速其來大垐我驅其僕其來射其豚屬右甲鼓汧繄泛泛丞波潮淵鰋鯉處之君子漁之漫漫有鯊其遊􅀈􅀈白魚鱳鱳其葅底鮮黃白其鯿有鮒有白其􅀈孔庶臠之㲋㲋洋洋􅂒􅂒其魚惟何惟鱮惟鯉何以橐之惟楊及栁右乙鼓田車孔安鋚勒駻駻六師既簡左驂翻翻左驂騝騝我以隮于原我戎止陸宫車其寫秀弓時射麋豕孔庶麀鹿雉兔其原有迧其戎奔奔大車出洛亞獸白澤我執而勿射多庶􅂒􅂒君子乃樂右丙鼓帥彼鑾車勿速填如秀弓孔碩彤矢䒨䒨四馬其寫六轡沃若徒駢孔庶廓騎宣慱酋車載道如徒如章原隰隂陽趨趨六馬射之簇簇有貙如虎獸鹿如兕怡爾多賢迧禽奉雉我兔允異右丁鼓我來自東靈雨奔流逆湧盈盈泄隰君子既涉我馬流汧汧繄洎棲丞士駕言西歸舫舟自廓徒駢逴逴惟舟以道或隂或陽扱深以户出于水一方丞徒徨止其奔我以阻其乃事右戊鼓宣猷作原作周導遄我辭攸除帥彼阪田􅀢為世里希微乃罟漆栗柞棫其拔棕􅀈庸庸鳴條亞􅀢其華何為所斿水盩導旨樹幽晤右已鼓徒御嘽嘽然而師旅填然會同又繹以左戎障弓矢孔庶熖熖是熾射夫寫矢具奪舉㧘其徒肝來或羣或友悉率左右燕樂天子來嗣王始振振復古我來攸止右庚鼓彼走䮺䮺馬麃晳晳華華雉㲋位多庶微我師氏憲憲文武何其一之右辛鼓我水既淨我道既平我行既止嘉樹則里天子永寧日惟丙申旭日杲杲我其旁導乘馬既迧􅀈夏康康駕彼四黃左驂右驂駷駷棨戟以奕汝不執德幡翰黎黎斿施施公謂大來余及如兹邑曷不余及右壬鼓吳人憐亟朝夕警惕載西載北勿奄勿伐若而出竒進獻用特歸格藝祖告于太祝禘嘗受享致其方藝寓逢中囿孔庶麀鹿原隰既坦疆理疃疃大田不搜君子何求有謀有始周爰止于是右癸鼓張懷瑾曰按籕文者周史籕所作也與古文大篆小異後人以名稱書謂之籕文七略曰史籕者周時史官教學童書也與孔氏壁中古文異體鄄酆定六書二曰竒字是也其迹有石鼓文存焉陳倉李斯小篆兼采其意史籕即籕文之祖也漢韓延夀碑在京西南罕山延夀漢循吏世居於此人呼為韓家山碑漶滅不可讀漢冀州刺史王純碑延熹四年碑在京西北昌平境上漢崔實頌德碑在涿州大鴻臚袁隗撰實字真長桓帝時為尚書免歸著月令十二篇漢將馬成碑在平谷縣南五里魏征南將軍建城鄉侯劉靖碑在燕故城東門晉元嘉四年晉康王碑在涿州晉范陽王虓廟碑在涿州晉范陽王誨碑在涿州孝武帝太昌元年定武本蘭亭敘在國學東廂唐太宗留心右軍之迹因魏徴言蘭亭敘真迹在僧辨才處特遣御史蕭翼賺得武德四年收入秦府貞觀十年始命湯普徹馮承素諸葛貞歐陽詢禇遂良各有臨本而歐禇流傳最著後之所謂定武本歐臨是也所謂唐絹本褚臨是也定武本當時石刻禁中每紙已值錢數萬逮後石晉之亂契丹輦之而北路棄殺狐林慶歷中李學究得之其子負官緡無償時宋景文守定武乃以帑金代償納石於庫熙寧間薛師正出牧刋一别本以應求者此郡真􅎓已有二刻矣其子紹彭字道祖又模之他石潛易古刻乂剔損古刻湍流帶左右五字為識大觀中詔向其子嗣昌取龕宣和殿後靖康之亂金人取石鼓及蘭亭敘重氊輦至於燕見宋人薑白石蘭亭考中石鼓在國學而蘭亭不知所在矣今存國學者疑是定州薛師正翻刻本或薛紹彭所刻本雖非古刻然元人不能也此石一云眀初出天師庵土中一云元順帝北還重氊裹載棄之于路徐中山取置國學唐紫陽觀碑元宗御製在涿州道士邊洞元修真成仙于此唐雲麾將軍李秀碑靈昌郡太守李雍文並書逸人太原郭卓然模勒并題額李秀字元秀范陽人唐元宗朝以功拜雲麾將軍左豹韜衛翊府中郎將封遼西郡開國公卒於開元四年葬范陽福祿鄉碑刻於天寶元年李北海有兩雲麾碑一為李思訓在陕西一為此碑其官同其姓同也然此碑筆法遒逸大勝陕碑秦人有著石墨鐫華者乃以為一碑且以北碑為趙松雪所臨誤矣此碑舊貯良鄉縣庫中不知何時入都城宛􅊭令李蔭掘地得六礎洗視乃雲麾碑建古墨齋以覆之後移少京兆署中止二礎其四礎傳謂萬歷中王京兆惟儉擕去汴中范陽郡憫忠寺御史大夫史思眀奉為大唐光天大聖文武孝感皇帝敬元垢淨光寶塔頌范陽府功曺參軍兼莭度掌書記張不矜撰承奉郎守經略軍胄曺參軍蘇靈芝書至德二載十一月十五日建其文書丹於石故以後為前按唐史肅宗至德二載安祿山已死安慶緒忌史思眀之強遣安守忠阿史那承慶往徴兵因密圖之思眀納判官耿仁智等之謀乃囚承慶以所部十三郡及兵八萬來降上大喜以思眀為歸義王范陽莭度使此碑蓋建於初歸附之時而借以媚唐也靈芝書法整潔較所書諸碑此為最勝其碑完好乃近人著景物略者謂碑上半斷裂不可讀且蘇靈芝原有其人乃謂為李北海自鐫名尤誤之甚北海自鐫名乃伏靈芝也隋天寧寺塔前石幢開皇時置書體遒美楊升庵云最似歐禇筆法隋房山石經開皇中釋靜琬鑿石刻經一藏僅成而卒唐宋皆有續刻隋立幽州智泉寺舍利塔仁夀元年內史令王臣暕宣隋智泉寺舍利感應記王邵撰唐秀峯寺石幢心經貞觀二十二年書唐重藏舍利記景福元年沙門南敘述僧知常書唐石磴庵心經廣德二年趙偃書唐重藏舍利記會昌六年采師倫書唐草書千文僧亞栖書自云飛鳥出林驚蛇入草唐雲居寺石浮屠銘王大悅撰開元十五年唐雲居寺石浮圖銘梁髙望書開元十年唐石經堂記劉濟撰元和四年唐金仙公主奏請莊田記王守泰撰唐𨽻書心經天寶十五年二月一日朝議大夫行尚書武部郎中上柱國徐浩書都人孫氏從墨迹勒石唐太尉朱懷圭碑元載撰李融書宋仁宗篆書針灸經石刻在太醫院三皇廟內舊在汴中移此燕中無宋迹以其地未奉宋正朔也採魏院石塔記遼景福元年建燕京寶塔寺講律沙門如正述塔在今蕃育署石經碑在舊燕城南金國子學碑碑刻春秋禮記今磨滅不完佑聖王靈應碑金貞元元年許復書戒壇聚慧寺碑大定元年建大憫忠舍利函記大安十年義中書潭柘寺碑大定十三年香山寺碑李晏撰大興隆寺碑李晏撰又章宗書飛虹橋飛渡橋六大字平遼碑立燕都豐宜門外史臣韓昉撰宇文虛中書舊有詩云十丈豐碑勢倚空風雲猶憶下遼東百年功業秦皇帝一代文章太史公石斷龍鱗秋雨後苔封鼇背夕陽中行人立馬空惆悵禾黍離離滿故宫韓昉燕京人雙塔寺碑黨懷英撰并書舊在西長安門外寺中為內監取置神道懷英奉符人善篆籕人稱李陽冰之後一人棲雲嘯臺字章宗遊駐蹕山題刻於石重修蜀先主廟記金王庭筠書在涿州廟中雲居寺續鐫石經記遼趙遵仁撰清寧四年雲居寺續祕藏石經塔記遼沙門志才撰天慶八年鐫華嚴堂經本記賈志道撰并書至元元年通惠河碑元翰林歐陽元文碑略首導昌平白浮之水次緒太行西山之麓會馬眼諸泉瀦為七里河東流入自城西水門滙集成潭又東並宫墻環大內之左合金水河南流東至潞水之陽南會白河又南會直沽入海凡三百里是為通惠河置閘二十有四延祐中易木以石云改修慶豐石閘碑至元宋褧撰奉安四國公配享碑至元十六年潘迪八分書雲居禪寺藏經記釋法植撰陳皓篆額至元三年重修崇國寺碑至元十一年沙門雪澗法稹撰石鼓文音釋碑潘迪注并八分書崇文閣藏書記吳澄撰并書佑聖王靈應碑至元任拭撰張禮書天慶寺碑至元九年學士王惲撰并書隆禧觀碑在大都東南數里漷州地漷州本漢泉州地遼稱鎮金為縣建觀元學士王惲撰文大都路總治碑皇慶二年王構撰劉賡書延祐二年進士題名記趙孟俯書在國學崇教大師演公碑皇慶五年趙孟俯書張天師像贊趙孟俯書張天師大道歌趙孟俯書爭座位帖趙孟俯臨黃庭經趙孟俯臨樂毅論趙孟俯臨金丹四百字趙孟俯書以上四刻俱在國學慶夀寺碑編修所次二官王萬慶撰真人留國公碑延祐四年趙孟俯書城隍廟碑至治四年莊文昭書大都城隍佑聖王碑泰定三年黃籙大醮碑泰定二年虞集書真人張留孫碑天歷二年趙孟俯書昭德殿碑天歷三年趙世延書加封先聖父母并夫人及四配制祠碑至順元年大都城隍廟碑至順二年虞集撰喀喇庫庫書碧雲庵碑至順二年仁聖宫碑至順二年虞集八分書碧雲庵碑元統三年萬寧寺神御殿碑至正四年歐陽元撰寺在鼓樓東內有番字碑二座豐甚潭柘字碑至正八年葛天麟崇國寺敕諭碑至正十四年隆安選公傳戒碑至正二十四年危素書潭柘寺碑危素書護國佑聖王記至正二十五年吳雲書長眀燈記至正二十六年醫無閭山碑在薊州城平津門外洪武三年御製重修順天府學碑宣德三年大學士楊榮文丞相祠碑永樂楊士竒朝天宫記事碑宣德時建潭柘寺碑正統學士胡濙大國師智光功行碑天順時建𢎞光寺碑內侍髙麗鄭同法藏寺碑沙門道孚重修憫忠寺碑正統七年陳贄修順天府學碑正統十一年陳循文丞相祠碑羅倫撰西天逹爾瑪約格資哩行實碑天順二年大國師智光功行碑天順時建修朝天宫記事碑成化時建報國寺碑成化劉定之大隆善護國寺敕碑成化七年龍華寺碑成化八年僧道深撰真覺寺御製碑成化九年古像觀音大士碑成化二十一年程敏政潭柘寺碑𢎞治大學士謝遷大隆善寺敕碑正德七年昭應宫碑大學士費宏修順天府學碑萬歷府尹李損萬夀寺碑萬歷大學士張居正修龍華寺碑萬歷朱之蕃修火德真君廟碑萬歷朱之蕃書翁正春撰文重修憫忠寺碑萬歷公鼐壇北藥王廟碑恭順侯吳惟英慈慧寺碑陶萬齡撰黃輝書蜘蛛塔記黃輝書正陽門漢前將軍關侯廟碑焦竑撰董其昌書長椿寺水齋傳米萬鍾書眀因寺傳道記董其昌書燕都有虞帝廟不知始於何代其碑則唐貞元間顔真卿書謂之復廟碑至元時尚在元人王惲文集有大都復虞帝廟碑記謂此碑人屢欲易去礱焉以他用主者心戃恍若有警動乃已後有道士陳志元起長春别院復購之約不犯原刻用石背及來徙碑與趺坼身挺植重不克舉道士惕息不敢徙仍安原處其碑著異如此今不可考元人又有修理大都南京石經事狀云竊見大都南京廟學所有九經石刻刋琢極精近年以來舊制既廢舉皆散亂於荒煙草棘間日就摧圯甚可寶惜且經之遺制自漢唐至今歷代聖王無不尊崇修理蓋重夫經世大法故也今海宇混一方息馬論道之時據上項石經理合修立以彰國容按九經石刻舊在汴梁學宫金人移置於燕今不復存余官汴城於開封府學又見有篆書九經似是唐人手迹已殘剝不全余捐資修理列於兩廡今亦在深泥中矣石刻在世可以考證逸事補史之訛缺然所存者極鮮舊記載景祐時薑遵奉太后意悉取長安碑石為塔材又雒陽天淵池中有魏文帝九華樓殿基悉是雒中故碑金陵街衢半是六朝舊碑余向在汴梁搜閲舊碑止相國寺宋白一碑張孝廉民表曰國初欲建都於此悉取燒灰築城燕京舊碑多為中貴取置神道或重修廟宇改勒新文亦古今之所同慨也春眀夢餘録卷六十七
