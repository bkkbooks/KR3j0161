body:
  text: 春明夢餘録卷四十一吏部左侍郎孫承澤撰禮部三貢院貢院在城東南隅元禮部舊基也永樂乙未改為貢院制甚偪隘嘉靖中議改創西北隙地又有言東方人文所會宜因其趾而充拓之卒未果至萬歴二年始命工部重建因故趾拓旁近地益之徑廣百六十丈外為崇墉施棘徼道前入左右中各樹坊名左曰虞門右曰周俊中曰天下文明坊内重門二左右各有㕔以備譏察次曰龍門踰龍門直甬道為明逺樓四隅各有樓相望以為瞭望東西號舍七十區區七十閒易舊制板屋以瓦甓可以避風雨防火燭北中為至公堂堂七楹其東為監試㕔又東為彌封受卷供給三所其西為對讀謄録二所又後為燕喜堂三楹東西室凡十六楹諸書吏工匠居之其後為會經堂堂東西經房相屬凡二十有三楹同考者居之元大都會試仁宗始於皇慶四年二月當日詔曰其以皇慶三年八月天下郡縣興其賢者能者充賦有司明年二月會試京師中選者朕將親策焉初試論賦後以經學為主至於充賦之説始於漢漢辟公孫𢎞以充賦李世弼金登科記道㪚而有六經六經㪚而有子史子史之是非取證於六經六經之折中必夲諸道道也者通治之路天下之理具焉二帝三王所傳是已三代而上道見於事業而不在於文章三代而下道寓於文章而不純於事業故鄉舉里選取人之事業也射策較藝取人之文章也两漢以經術取士六朝以薦舉得人莫不稽舉於經傳子史焉隋合南北始有科舉自是盛於唐增於宋迄於金又合遼宋之法而潤色之卒不以六藝為致治之成法進士之目名以鄉貢進士者本周之鄉舉之遺意也試之以賦義策論者本漢射策之遺法也金天會改元始設科舉有詞賦有經義有同進士有同三傳有同學究凡五等詞賦於東西兩京或蔚朔平顯等州或涼庭試試期不限定月日試處亦不限定府州詞賦之初以經傳子史内出題次又令逐年改一經亦許注内出題以書詩易禮春秋為次蓋循遼舊也至天眷三年析津府試迨及海陵天德三年親試於兩京貞元二年遷都於燕自後止試於析津府收遼宋之後正隆二年以五經三史正文内出題明昌三年改令五經子史内出題仍與本傳此詞賦之大略也經義之初詔試眞定府所放號七十二賢榜迨及蔚州析津令易書禮春秋專治一經内出題蓋循宋舊也天德三年罷此經義之大略也天眷三年令大河已南别開舉塲謂之南選貞元二年遷都於燕遂合南北通試於燕正隆二年令毎二年一次開闢立定程限月日更不擇日以定為例府試初分六路次九路後十路此限定月日分格也天德二年詔舉人鄉府省御四試中第明昌三年罷去御試止三試中第府試五人取一名合試依大定閒例不過五百人後以舉人漸多會試四人取一名得者常不下八九百人御試取奏㫖此限定塲數人數格也自天眷二年析津放第於廣陽門西一僧寺門上唱名至遷都後命宣陽門上唱名後為定例此唱名之格也明昌初五舉終塲人直赴御試不中者别作恩榜賜同進士出身會元御試不中者令榜末安插府元被黜者許來舉直赴部初貞佑三年終塲人年五十以上者便行該恩此該恩之格也大定三年孟宗獻四元登第特授奉直大夫第二第三人授儒林郎餘皆從仕郎後不得為例明昌閒以及第者多第一甲取五六人狀元授一十一官第三人授九官餘皆授三官此授官之法也進士第一任丞簿軍防判第二任縣令此除授之格也近披閲金國登科顯官陞相位及各卿士大夫閒見迭出代不乏人所以翼贊百年如大定明昌五十餘載朝野閑暇時和歲豐則輔相佐佑所益居多科舉亦無負於國家矣是知科舉豈徒習其言説誦其句讀摛章繪句而已哉篆刻雕蟲而已哉固將率性修道以人文化成天下上則安富尊榮下則孝悌忠信而建萬世之長策科舉之功不其大乎國家所以籍古重道者以六經載道所以重科舉也後世所以重科舉者以維持六經能傳帝王之道也科舉之功不其大乎庚子歲季秋朔日東原李世弼序明初以六科取士經明行修為一科工習文詞為一科通曉四書為一科人品俊秀為一科言有條理為一科曉達治道為一科六科備者為上以次而降至洪武十七年始定鄉試在子卯午酉年秋八月會試在辰丑未戍年春二月初制五經義限五百字以上四書義限三百字以上論亦如之策惟務直述不尚文藻限一千字以上其髙麗安南占城等國如有經明行脩之士各就本國鄉試許貢赴京師會試不拘額數選取明制主試官初時不拘現任家居洪武中取元逸老沈夢麟滕克恭典試事竣不願授官放還又如正統丙辰進士陶希文以親老耳病告歸至天順乙卯成化辛卯浙江河南聘典鄉試皇甫録明紀略曰楊少師以服闋主浙江鄉試王陽明為刑部主事病痊北上為山東聘主鄉試至於各省典試分遣京官始於萬歴乙酉非舊制也明制會試或待詔或典籍或編修紀善不論官甚有兩京主試官尊於會試者宣德癸丑始令少保黄淮與少詹事王直主之淮又久致仕以謝恩至京至𢎞治庚戍命大學士徐溥己未命大學士李東陽然未用貳相者自天啓壬戍始有何宗彦朱國祚後皆因之會試主考舊用翰林出身者如丁丑張至發以刑部侍郎入閣庚辰薛國觀蔡國用皆以外官入閣者至同考十二人内編修魯元寵胡守恒劉正宗梁北陽李景濓薛所藴皆由知推選授初會試同考官從禮部推選翰林院官京官敎官皆得為之至景泰中禮部尚書胡濙言翰林院及春坊以文藝為職業宜專其事京官由科第有學行者宜兼取以充敎官不得充請著為令自是敎官無得分考會試者矣永樂十六年始定宮坊官主兩京試舊例各省及順天主考不賜宴獨南畿二主考辭朝賜宴於闕東松林相傳云洪武舊制也舉子所作之文曰墨卷主司改竄刻録曰程文陸游與王樵秀才書曰間偶見程文一二可愛者往往遭塗抹訾詆令人氣湧如山則知前無墨卷之説概曰程文耳萬歴乙酉有創為程文不得全用已作須存舉子夲質潤色之後乙丑會試二主司憚於自作遂欲三塲俱用墨卷丁卯鄉試因之頗取譏姍禮部侍郎夏言當嘉靖壬戍會試條陳科塲事宜内一欵應試之士於風簷寸晷之中欲實録其文可為程式者蓋絶無閒有所以試録文字多出主司之手而兩京會試皆館閣儒臣所為足為海内矜式近令録士子夲文不必考官自作所以各省試録文理紕繆體裁龎雜今次會試若士子之文縱有可録仍令考官重加裁正以示模範天順閒浙江溫州府永嘉縣敎諭雍懋言朝廷毎三年開科取士考官出題多摘裂牽綴舉人作文亦少純實典雅比者浙江鄉試春秋摘一十六段配作一題頭緒太多及所鏤程文乃太簡略而不純寔且春秋為經屬詞比事變例無窮考官出題往往棄經任傳甚至叅以已意名雖搭題寔則射覆遂使素抱寔學者一時認題與考官相左即被斥出乞勅自後考官出題舉子作文一惟明文是遵有不悛者罪之英宗善其言命禮部議行嘉靖時御史聞人銓言今時文體詭異已極乞申飭天下力崇古朴其要在先責督學憲臣次責塲屋考校等官世宗報曰自後遇鄉試禮部必磨勘試録與各生公據有仍前離經叛道詭辭邪説者則治監臨考校官之罪黜其中式者為民鄉試觧額洪武三年定省直名數應天八十人山東山西陜西北平浙江福建湖廣江西皆四十人廣東廣西各二十五人若人才多處或不及者不拘額數洪武十七年三月令舉人不拘額數從寔充貢洪熙元年定取士額南京國子監并南直𨽻共八十名北國子監並北直𨽻共五十名江西五十名浙江福建各四十五名湖廣廣東各四十名河南四川各三十五名陜西山西各三十名廣西二十名雲南交趾各十名貴州願仕者就試湖廣宣德二年令貴州就試雲南宣德四年令雲南鄉試増五名宣德七年令順天取八十名正統二年令開科不拘額數正統五年復定取士額順天府仍八十名應天府一百名浙江福建皆六十名江西六十五名河南廣東各五十名湖廣五十五名山東四十名廣西三十名雲南二十名正統六年順天鄉試增二十名景泰元年開科不拘額數景泰四年復定取士額南北直𨽻各增三十五名浙江江西福建河南湖廣山東各增三十名廣東四川陜西山西廣西各增二十五名雲南增十名成化三年雲南復增十名成化十年雲南復增五名𢎞治七年雲貴觧額共增五名嘉靖十六年令雲貴分科試士雲南四十名貴州二十五名嘉靖十九年湖廣鄉試増五名嘉靖二十五年貴州鄉試増五名隆慶五年两京各増十五名以恩貢集太學者衆也萬歴元年雲南増五名萬歴二十二年順天増二十名亦以選貢集太學也萬歴四十三年概増天下觧額天啓元年順天增二十名應天增十名以登極及恩貢集太學也其餘各省增三名是年山西中宗生二名江西一名河南一名陜西一名山東中四氏學二名遼生一名皆不在額内㑹試額數洪永多至四百七十餘人少則三十人宣宗定省直試額百南士十六北士十四正統七年加為一百五十人景泰五年三百五十人𢎞治十五年加至四百人嘉靖隆慶以首科皆四百人萬歴二年張文忠居正題定三百人至後如萬歴癸丑崇禎辛未皆四百人兩畿中額一百三十五名其五名原為雜流而設如成化元年章元應以留守左衛軍餘中第八十七名四年謝宗德以内江吏人中第四十二名十年王鑨以犧牲所軍餘中第二十三名十三年李用文以武學生中第九名十六年喬衍以武學生中第二十四名二十二年陳玉以浙江舍人中第十七名楊俊以江陰衛軍中第八十五名𢎞治五年劉麟以武學生中第十五名齊貴以營繕所匠中第九十一名十一年史良佐以醫生中第八十五名十四年陳沂以醫生中第四十八名劉鏞以羽林右衛舍餘中第七十一名劉弼以錦衣衛舍餘中第七十七名十七年柴虞以驍騎右衛總旗中第八十九名崇禎壬午順天鄉試奉㫖中武生五人及揭榜乃以冐籍滋議致累主考呉江姚現聞先生希孟蓋忌者借以攻姚也洪武辛亥髙麗國人入試者三金濤三甲第五其國之延安人也授山東邱縣丞歸為其國相景泰五年甲戍進士黎庸交趾清威人阮勤多翌人勤仕至工部左侍郎天順四年庚辰阮文英慈山人何廣扶寧人成化五年己丑王京嘉靖二年癸未陳儒俱交趾人儒仕至右都御史曹鼐寧晉人以貢士為學官上書願得一劇職自效改泰和典史以觧糧至京與試中宣德癸丑科第二廷試復第一先是洪武榜眼呉言信乃抄鈔局副使也正統壬戍進士鄭溫乃松陵驛驛丞也明初應天觧元黄文忠以作全塲題五經二十三篇領解天啓甲子崇禎甲戌福建顔茂猷獨作五經得雋而甲子鄉塲則外簾止謄其四書三篇易經四篇以入房考祁彪佳取之既放榜始知為五經也甲戍㑹試則知貢舉林釬上䟽題明上許俱謄於是五經房同考俱有批語文震孟以易經收之及殿試僅在二甲第二而禮部刻㑹試録上特命題名於㑹元李靑之前亦異典也洪武辛亥狀元授員外郎及第出身俱授主事同出身授縣丞會元亦授縣丞金濤係髙麗人在三甲第五名後歸國為相永樂丙戍賜林環等及第取副榜舉人廷試之擢周翰等三人進學翰林餘除學官乙未始詔天下舉人會試北京考官梁潛拆卷得第一名曰陳循其鄉人也避嫌故改置第二而擢林文秸既又以秸字難識定洪英第一第五王翺者鹽山人也上喜得畿輔士以布衣召見賜酒食既廷試復擢陳循第一賜宴於後軍都督府成化丁未尹直主考試録序稱宣德丁未大學士楊士竒議會試取士分南北卷北四南六既而以百乘除各退五為中數是年以言者又各退二以益中數云科塲變異科塲變異洪武丁丑言者謂考官劉三吾所取南士多北士少有私遂罷陳䢿等五十一名俱不刻登科録而改試中韓克忠等六十人永樂己丑以考試官侍講鄒緝等出孟子尚書題誤覆取下第舉人熊概金庠等十餘人𢎞治己未言者論學士程敏政鬻題遂預行塲中程不得閲文舉人唐寅徐經俱黜嘉靖甲辰言者論狥私不公進士翟汝孝翟汝儉彭謙焦清等並考試官江汝璧等俱逮問萬歴丙辰會元沈同和以懷挾事露并第六人趙鳴陽送法司治罪荷校禮部門一月謫戍會試録遂除名無元是科武狀元亦以贋卷被黜己未會元莊際昌殿試卷有誤字人譏其膠醪不辨遂以進士回籍洪武辛亥有進士永樂癸未無進士天順癸未亦然永樂初即位天順南省火皆以明年甲申會試永樂己丑北征又明年殿試故有辛卯進士正德庚辰南廵明年嘉靖自興邸入即位故有辛巳進士又明年癸未遂有進士張鳯翼有會試移期議謂會試期太祖定於二月葢謂金陵南北之中地在大江之南得春為先故定於二月取春之中今建都北京逺三千里宜移在三月其利有五一在覲吏後從舟可省僱費二便於雲貴士子三減衣裘防閑甚易四謄録無呵凍之苦五歸家無閘河運舟之阻會試原無搜檢官嘉靖己未御史建言欲厲其禁尚書呉山持不可曰彼巳歌鹿鳴而來矣隆慶二年復有言者始設昔舒元輿於唐元和中舉進士見有司鈎較苛切既試尚書雖水炭脂炬飡具皆人自將吏一唱名乃得入列棘圍席坐廡下因上書言古貢士未有輕於此者且宰相公卿由此出夫宰相公卿非賢不在選而有司以𨽻人待之誠非所以下賢意羅棘遮截疑其作奸又非所以求忠直也詩賦㣲藝斷離經傳非所以觀人文化成也臣恐賢者逺辱自引去而不肖為陛下用也今貢珠玉金貝有司承以棐笥皮幣何輕賢者重金玉耶此書激昻有士氣嘉靖中給事中胡叔亷鄭大同建言科塲事宜謂監試御史不過防範於外故内簾之弊無從糾察而㪚卷等官始得以狥私公送今内簾亦設監察一員遼東原附山東科舉嘉靖十三年因過海風濤改附順天萬歴三十七年增額五人其寄户中試者不許圖便遷徙違者治罪宋陸游老學菴記本朝進士初亦如唐制兼采時望眞廟時始建糊名法又國初舉人對策皆先冩策題其後策題寖多舉人甚以為苦慶歴初賈文元奏罷之舊制殿試在三月初三日狀元率進士上表謝恩在初六日成化八年以悼恭太子發引改殿試於十五日又舊制殿試畢次日讀卷又次日放榜𢎞治三年閣臣劉吉等言時日廹促閲卷未精再展一日第四日放榜頒歴舊在十一月朔成化十五年是日値冬至命改於十月朔日後皆因之國家至公至重之典無如設科取士先朝大臣罔敢干之者干之自翟鑾始翟二子登第被叅上曰鑾既為輔臣二子雖有軾轍之才亦不宜並進於是二子並黜唐人知貢舉詩有云梧桐葉落井亭陰鎖閉朱門試院深常念昔年辛苦地不將今日負前心人不肯負心自不將國家大典為行私之具不將風簷苦搆為五色之迷春明夢餘録卷四十一
