body:
  text: 春明夢餘錄卷二十八吏部左侍郎孫承澤撰中書科中書科直房在午門外之西初中書省設置省舍人後革省為科定中書舍人二十人無正貳印屬資深者掌書誥勅册符鐵劵凡草請翰林院寶請諸内府左劵寶籍歸諸古今通集庫凡誥勅勘合籍以急就章為號凡誥勅之號四曰仁曰十二支曰文行忠信曰千字文以千號為滿滿則續所典司天子詞命親王郡王並妃初膺封號合受金銀册則書之自郡王以下至奉國中尉自王夫人以下至鄉君合給誥命則書之凡公侯伯初受封爵合給鐵劵凡勲戚内外文武官應給勅命誥命則書之其職掌至重也每大朝㑹則擬四員與翰林史官上殿東西班對立凡東宫節令朝賀定擬二員文華殿導駕侍班凡㑹試一員入塲收掌試卷日給大官酒饌與翰林宫坊尚寶司六科同為侍從之臣諸司無相並者其地勢至清也其選用自進士外舉人與纂修書成被恩典者乃得之監生生儒惟有勲勞大臣暨宫僚講官有子孫宜承廕叙奉特㫖者乃得之至文華殿門東房别設中書舍人分直職專奉㫖書冩書籍等項武英殿門西房别設中書舍人分直職專奉㫖冩篆册寶圖書等項内閣誥勅制勅二房中書不屬中書科中書所書告身皆佐史體無佳筆隆慶中司馬王崇古以泥金書軸請寶為言者所糾然唐制皆名手書如顏魯公自書告身朱巨川一人而顏魯公徐季海俱為之書巨川賴此以傳至宋即當制者書字兼真行幸得歐蘇便奉為瓌寶張文忠璁言成化以前誥勅之體猶為近古其于本身不過百餘字祖父母父母並妻不過六十字言之者無費詞受之者無愧色近来藻情飾偽張百成千以萬乘之尊下譽匹夫匹婦之賤殊非政體宜加釐正詔自今誥勅務從簡實不許競飾浮詞致䙝體制夫立詞失體固當申飭而書法板俗迄無言者邱濬曰唐武徳二年改内史舍人為中書舍人臣案此中書舍人設官之始然是官也故𨽻於中書省故以中書舍人為名我朝罷中書省尚仍其舊名名雖同而實則異也盖前代之中書與翰林學士分掌内外制誥以為兩制盖屬文之官也我朝之中書舍人則專以書寫為職耳書者六藝之一漢人謂之小學以試學童為吏者也夫人能之無庸設官設之始自今日盖以王言所係之重前代乃屬筆于吏胥殊無慎重之意祖宗以此設官盖有深意必得夫素通儒術深明六書之義心正筆端如栁公權所云者居之庶不汙王言耳茍粗識偏旁而學術無素者尚不足以當此况又粗率側媚而流品非清者哉誥勅唐最重誥命開元二十三年加皇子榮王以下官詔張九齡蕭嵩等十三人就集賢院人書一通以進三相各賜絹三百疋餘官二百疋其愛重如此唐制拜官之日即給告身其人先輸朱膠綾紬價錢方准書給即今之誥勅也宋之制亦然每至宣麻誕告鎖院演綸詞頭已下外人未知其密且重如此明初拜官之初亦給誥勅其後除授陞遷止奉成命吏部備書㫖意移以咨劄以為慿據至考滿覃恩方給誥勅以獎其成宋元封贈大父母降父母一等封贈父母降本身一等盖推恩近重而逺輕也然子孫之心終有不忍明制封贈三代一如見爵教孝之典可謂大備封典有再醮不得受封之説典制為妻不為母引楊文貞事辨之然正不必然也按㑹典曰洪武二十六年定凡曽祖父母祖父母父母曽犯姦盗除名等罪及例所封妻不是以禮娶到正室或係再醮娼優婢妾並不許申請其昭然如是乃有以母再醮不請封者殊失考各中書考石民外集曰中書舍人以進士起家為此者有官而無署其俗謂中書科者乃因與六科聯署而借言之實文移奏疏不入此字也其職業唯用寶之時同符卿供事盖尚是政府之遺體其他引班等職則以補科臣不足亦以聯署而及之耳絶無繕寫之職其以選入制勅房者舊時進士亦為之今止以待舉人之髙選其職為草武臣誥命贈䘏誥勅諭祭文此外制也亦不與繕寫其餘兩房史舘文華殿則以繕寫為職而武英殿辦事及舊有仁智殿辦事則且及于畫即古之書畫學又不特繕寫也至于貲入兩殿者則借以𢃄銜實無職掌他銜皆可辦事盖在辦事不在中書也以中書多譌而為兩殿中書耳而兩殿資深者亦有較理書籍之名書不在殿何以得較此欲文其名而失其實也誥勅房中書永樂初選翰林文學之臣六七人直文淵閣叅典機務詔册制誥皆屬之而謄副繕正則中書分直更入事竣輙出宣徳間三楊始置厨饌于閣之東偏而選能書者處以閣之西小房謂之西制勅房諸學士則居閣之東五楹專管勅誥具稿定正于閣臣乃付中書繕進謂之東誥勅房而帶知制誥銜則惟閣臣與諸學士而已中書等官不敢僣也時諸學士每早與閣臣㑹食乃退正統九年陳循入閣後學士惟劉鉉一人過自遜避朝退止于東閣不復㑹食視誥勅以後學士皆因之至後誥勅悉委于中書而中書稱為内閣書辦萬歴元年定兩殿中書九年考滿官階陞至正五品止如再有年勞止得加陞服俸識餘録云中書周令温州人嘗言成化年間授職彼時中書與閣下如同僚然投刺俱平交盖宣徳以前本一堂相處今之西房即文淵閣也閣臣居中中書居東西兩房各辦其事己撤内庫十間以西五間居閣下謂之文淵閣以東五間藏書籍而東房中書亦遷居之故今以閣下稱中堂而東西非房矣猶稱兩房者沿舊名也凡閣下到任尚之兩房答揖若六部之于各司無是體矣附記崇禎元年上諭近来誥勅文字繁稱過情殊為非體以後撰擬不由詞臣繕寫不由中書者俱與着實查駁春明夢餘録卷二十八
