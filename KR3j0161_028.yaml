body:
  text: 春明夢餘録卷二十八吏部左侍郎孫承澤撰中書科中書科直房在午門外之西初中書省設置省舍人後革省為科定中書舍人二十人無正二印屬資深者掌書誥敕册符鐵劵凡草請翰林院寶請諸內府左劵寶籍歸諸古今通集庫凡誥敕勘合籍以急就章為號凡誥敕之號四曰仁曰十二支曰文行忠信曰千字文以千號為滿滿則續所典司天子詞命親王郡王並妃初膺封號合受金銀册則書之自郡王以下至奉國中尉自王夫人以下至鄉君合給誥命則書之凡公侯伯初受封爵合給鐵劵凡勳戚內外文武官應給敕命誥命則書之其職掌至重也每大朝會則擬四員與翰林史官上殿東西班對立凡東宫節令朝賀定擬二員文華殿導駕侍班凡會試一員入場收掌試卷日給大官酒饌與翰林宫坊尚寶司六科同為侍從之臣諸司無相並者其地勢至清也其選用自進士外舉人與纂修書成被恩典者乃得之監生生儒惟有勳勞大臣暨宫僚講官有子孫宜承廕敘奉特旨者乃得之至文華殿門東房别設中書舍人分直職專奉旨書寫書籍等項武英殿門西房别設中書舍人分直職專奉旨寫篆册寶圖書等項內閣誥敕制敕二房中書不屬中書科中書所書告身皆佐史體無佳筆隆慶中司馬王崇古以泥金書軸請寶為言者所糾然唐制皆名手書如顏魯公自書告身朱巨川一人而顏魯公徐季海俱為之書巨川賴此以傳至宋即當制者書字兼真行幸得歐蘇便奉為瓌寶張文忠璁言成化以前誥敕之體猶為近古其于本身不過百餘字祖父母父母並妻不過六十字言之者無費詞受之者無愧色近來藻情飾偽張百成千以萬乘之尊下譽匹夫匹婦之賤殊非政體宜加釐正詔自今誥敕務從簡實不許競飾浮詞致褻體制夫立詞失體固當申飭而書法板俗迄無言者邱濬曰唐武德二年改內史舍人為中書舍人臣案此中書舍人設官之始然是官也故𨽻於中書省故以中書舍人為名我朝罷中書省尚仍其舊名名雖同而實則異也蓋前代之中書與翰林學士分掌內外制誥以為兩制蓋屬文之官也我朝之中書舍人則專以書寫為職耳書者六藝之一漢人謂之小學以試學童為吏者也夫人能之無庸設官設之始自今日蓋以王言所係之重前代乃屬筆于吏胥殊無慎重之意祖宗以此設官蓋有深意必得夫素通儒術深明六書之義心正筆端如栁公權所云者居之庶不汙王言耳茍粗識偏旁而學術無素者尚不足以當此况又粗率側媚而流品非清者哉誥敕唐最重誥命開元二十三年加皇子榮王以下官詔張九齡蕭嵩等十三人就集賢院人書一通以進三相各賜絹三百匹餘官二百匹其愛重如此唐制拜官之日即給告身其人先輸朱膠綾紬價錢方準書給即今之誥敕也宋之制亦然每至宣麻誕告鎖院演綸詞頭已下外人未知其密且重如此明初拜官之初亦給誥敕其後除授升遷止奉成命吏部備書旨意移以咨劄以為慿據至考滿覃恩方給誥敕以獎其成宋元封贈大父母降父母一等封贈父母降本身一等蓋推恩近重而逺輕也然子孫之心終有不忍明制封贈三代一如見爵教孝之典可謂大備封典有再醮不得受封之説典制為妻不為母引楊文貞事辨之然正不必然也按會典曰洪武二十六年定凡曽祖父母祖父母父母曽犯姦盜除名等罪及例所封妻不是以禮娶到正室或係再醮娼優婢妾並不許申請其昭然如是乃有以母再醮不請封者殊失考各中書考石民外集曰中書舍人以進士起家為此者有官而無署其俗謂中書科者乃因與六科聯署而借言之實文移奏疏不入此字也其職業唯用寶之時同符卿供事蓋尚是政府之遺體其他引班等職則以補科臣不足亦以聯署而及之耳絶無繕寫之職其以選入制敕房者舊時進士亦為之今止以待舉人之髙選其職為草武臣誥命贈恤誥敕諭祭文此外制也亦不與繕寫其餘兩房史館文華殿則以繕寫為職而武英殿辦事及舊有仁智殿辦事則且及于畫即古之書畫學又不特繕寫也至于資入兩殿者則借以𢃄銜實無職掌他銜皆可辦事蓋在辦事不在中書也以中書多訛而為兩殿中書耳而兩殿資深者亦有較理書籍之名書不在殿何以得較此欲文其名而失其實也誥敕房中書永樂初選翰林文學之臣六七人直文淵閣參典機務詔册制誥皆屬之而謄副繕正則中書分直更入事竣輒出宣德間三楊始置厨饌于閣之東偏而選能書者處以閣之西小房謂之西制敕房諸學士則居閣之東五楹專管敕誥具稿定正于閣臣乃付中書繕進謂之東誥敕房而帶知制誥銜則惟閣臣與諸學士而已中書等官不敢僣也時諸學士每早與閣臣會食乃退正統九年陳循入閣後學士惟劉鉉一人過自遜避朝退止于東閣不復會食視誥敕以後學士皆因之至後誥敕悉委于中書而中書稱為內閣書辦萬歷元年定兩殿中書九年考滿官階升至正五品止如再有年勞止得加升服俸識餘録云中書周令溫州人嘗言成化年間授職彼時中書與閣下如同僚然投刺俱平交蓋宣德以前本一堂相處今之西房即文淵閣也閣臣居中中書居東西兩房各辦其事己撤內庫十間以西五間居閣下謂之文淵閣以東五間藏書籍而東房中書亦遷居之故今以閣下稱中堂而東西非房矣猶稱兩房者沿舊名也凡閣下到任尚之兩房答揖若六部之于各司無是體矣附記崇禎元年上諭近來誥敕文字繁稱過情殊為非體以後撰擬不由詞臣繕寫不由中書者俱與著實查駁春明夢餘録卷二十八
