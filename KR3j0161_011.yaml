body:
  text: 春明夢餘録卷十一吏部左侍郎孫承澤撰武英殿武英殿在右順門之西規制如文華凡齋居及召見大臣其中後以文華殿近慈寧宮故歷朝多居之而移太子講讀於南廡至嘉靖建九五齋於文華殿以為致齋之所而武英遂不復御文華有直殿中書擇能書者居之武英有待詔擇能畫者居之如宋之書畫學是也然宋朝立學時有考較至明惟以中官領之不關藝苑無從考其殿最故技藝之精逺不及宋宣德獨好畫品武英待詔間有一二著名者至書法以薑立綱為宗類如掾史矣仁智殿仁智殿在武英殿後命婦朝賀中宮之地朝儀前期一日女官陳設皇后寶座于宮中設香案于丹墀之南其日清晨內官陳設儀仗於丹陛之東西及丹墀東西女官擎執者立于寶座之左右陳內樂於丹陛東西北向設而不作設箋案于殿東門外設班首拜位及各命婦拜位于丹墀北向設司贊位於丹墀東西設司賔位於命婦班之北東西相向設內贊二人於殿內東西命婦至宫門外司贊引命婦入就拜位女官具服侍班如常儀尚冠尚衣等官詣內奉迎尚儀奏請升座皇后具禮服出導從如常儀升座司贊唱班齊贊四拜外贊唱進箋贊衆命婦跪引箋案女官二人由殿東門入至殿中箋文不宣命婦皆興司贊唱四拜尚儀跪奏禮畢皇后興還宫命婦以次出鹵簿丹陛儀仗三十六人黃麾二戟五色繡幡六戈五色繡幡六鍠五色繡幡六小雉扇四紅雜花團扇四錦曲蓋二紫方繖二紅大繖四丹墀儀仗五十八人班劎四金吾杖四立瓜四卧瓜四儀刀四鐙杖四骨朵四斧四響節十二錦花蓋二金交椅一金腳踏一金水盆一金水罐一方扇八宫中常用儀衛二十人內使八人青五色繡幡二金斧二金骨朵二金交椅一金腳踏一宫女十二人金水盆一金水罐一金香罏一金香盒一金唾壺一金唾盂一拂子二方扇四宫女服用紫色圓領穿袖遍刺折技小葵花於上以金圈之珠絡縫金束帶紅裙弓樣鞋烏紗帽飾以花帽額縀團珠結珠鬢梳垂珠耳飾冠服冠為圓匡冒以翡翠上飾以九龍四鳯大花十二樹小花如大花之數兩博鬢十二鈿服禕衣深青為質畫翠赤質五色十二等素紗中單黼領朱羅縠褾襈裾蔽膝隨衣色以緅為領緣用翟為章三等大帶隨衣色朱裏紕其外上以朱錦下以絲錦鈕約用青組玉革帶青襪青舄舄以金飾凡朝會受册謁廟皆服之燕居則服雙鳯翊龍冠首飾釧鐲以金玉珠寶翡翠隨用諸色團衫金繡龍鳯文帶用金玉命婦冠服一品冠花叉九樹兩博鬢九鈿服用翟衣色隨夫用紫繡翟九重素紗中單黼領朱縠褾襈裾蔽膝隨裳色以緅為領緣加文繡重翟為章一等大帶隨衣色革帶用玉青襪舄佩綬二品冠花叉八樹兩博鬢八鈿服用翟衣八等其色隨夫用紫革帶用犀角餘並同一品三品冠花叉七樹兩博鬢七鈿翟衣七等其色隨夫用紫革帶用金餘同二品四品冠花叉六樹兩博鬢六鈿翟衣六等其色隨夫用紫革帶用金餘同三品五品冠花叉五樹兩博鬢五鈿翟衣五等其色隨夫用紫革帶用烏角餘同四品六品冠花叉四樹兩博鬢四鈿翟衣四等其色隨夫用緋革帶用烏角餘同五品七品冠花叉三樹兩博鬢三鈿翟衣三等其色隨夫用緋革帶用烏角餘同六品崇禎五年三月二十八日皇后千秋命婦例當朝賀久不行閣擬二票一免一是上用是字而是時京官以驛遞禁用夫馬罕携家者多携妾媵即間有之亦多不習是日惟勳臣成國公朱純臣夫人韋氏等七人文職禮部侍郎薑逄元詹事何吾騶兩淑人而已然何淑人尚云候封則未封也又鴻臚卿等三人武職都督十五人共命婦二十七人耳教坊司奉鑾等官妻李氏四名口女樂來定三十六名口其日甫明中宫已御仁智殿行禮畢命婦即歸亦無頒賞例也先十日文書房傳諭文武命婦從西安門北安門進西華門赴武英殿行禮仁智殿在武英後中宫受朝賀之所也甲戍三月命婦再朝賀林尚書欲楫莊少司農欽鄰二夫人與焉諸命婦可百餘人自西華門外下輿入門復肩輿至武英殿門外下黎明皇后升殿諸命婦入排班下手立四拜女官宣箋表跪班首成國夫人入殿內致詞命婦皆跪三叩頭起四立拜而出以立為拜不復俯伏也是日皇后母嘉定伯夫人亦入班朝賀畢即召入殿皇后欲設座拜之辭不許皇后面有泪痕先是二十四日上以祈雨出宿文華是日方入宫故事東西宫備宴奉邀上與中宫上座上以齋素辭翌日再出文華崇禎帝事皇嫂懿安皇后甚恭每年十月初六為懿安聖節許命婦朝賀崇禎辛巳十月行賀文官命婦無一至者惟武命婦十八人耳上令司禮監呼儀制司詰問時道路冦警又楊司馬嗣昌嚴申驛禁官至八座僅用夫二十名以次遞減僅至數名勢難携家也教坊司女樂舊用一百十五人後惟用三十餘人耳春明夢餘録卷十一
