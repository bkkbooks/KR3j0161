body:
  text: 春明夢餘録卷五十二吏部左侍郎孫承澤撰四譯館四譯館在東華門外南向設太常寺少卿提督之聼于翰林院所𨽻凡八館曰西天曰韃靼曰回回曰髙麗曰髙昌曰西番曰緬甸曰百裔初以舉人監生年少者入翰林院習裔字以通事為教師科舉時任其應試卷尾識譯書數十字三場畢送翰林定去取仍送入場填榜中榜後改庶吉士仍習譯天順中革令擇俊民俾専其業藝成㑹六部大臣試之通者冠帶又三年授以官永樂初命禮部選國子生蔣禮等三十八人𨽻翰林院習譯書人月給米一石遇開科令就試仍譯所作文字合格准出身置館于長安右門之外處之謇齊瑣綴録永樂間嘗選舉人監生習四方譯書憫其妨曠夲業乃命㑹試卷尾識譯書數十字三場畢送出翰林定去取仍送入場填榜蓋優典也然既登第仍官館中習譯書如許道中是也至景泰初吳禎以民人充譯字始援此例中鄉試及登第又以與修寰宇通志成從衆庶吉士出授御史成化間俞瓚又因此例授主事于戶部蓋資稍可進輒習舉業而譯書不復精徒藉為科第之捷徑故爭趨者衆天順八年彭可齊始建白如制去取于內不復送出院天順中禮部左侍郎鄒幹奏永樂間翰林院譯寫番字俱于國子監選取監生習用近年以來官員軍民匠作厨役子弟投托教師私自習學濫求進用况番字文書多關邉務教習既濫不免透漏消息乞飭翰林院今後各館有缺仍照永樂間例選取年幼俊秀監生送館習學其教師不許擅留各家子弟私習及狥私保舉洪武中以元人素無文字但借髙昌書制蒙古字行天下乃㑹翰林侍講火原潔與編修馬伊徹赫等以華言譯其語復取元祕史參考以切其字諧其聲音名之曰譯語詔刋行之自是使臣往來朔漠皆能得其情大學士髙拱議補譯字生疏看得譯字生自嘉靖十六年考收之後迄今垂三十年中多事故更遷所存者僅餘一二世業無傳番譯具廢夲當選收以備作飬今該內閣題乞照例選收併敕夲部詳議委應議處臣等謹擬議條件開具上請一選世業查得正德三年選取譯字生一百七名嘉靖十六年選取譯字生一百二十名皆不問世家不論夲業止泛考漢文數字待收館之後方習番文考非所用用非所考譬之責工于商難便成熟今該內閣具奏專取各館世業子弟資禀年嵗相應者考選送院作飬其議甚當相應申請合候命下夲部行移翰林院轉行四譯館即將各官名下世業子弟資禀清秀者開送夲部考以番文收管習學伏乞聖裁一定年限議得世業子弟雖即試以番文然未經作飬難便責其全曉但取其精通門路易于習學而已若不限年則有年既長而止通數字者收之豈能有進若皆限年則有年雖長而業已成熟者棄之豈不可惜合令各生先自報已通未通二項其未通者限年二十五嵗以下審驗得實方准收考以分數多者取中其已通者不限年數考必全曉而後取仍于夲卷首行明書已通未通以便分别庶年富者可望其進而業成者可得其用伏乞聖裁一慎考校查得舊例考選入館之後提督官四季考試缺精者責打二十習學三年㑹同六部都察院堂上官翰林院掌印官於午門內㑹考每差御史二員監試其中試者月給米一石又至三年㑹考中優等者與冠帶仍月給米一石又至三年㑹考中優等者授以序班職事其初試不中者有再試三試之例及查嘉靖元等年屢經夲部題准各館官生中有愚頑不學屢考無成者若容再試終于無用今後習學三年不中者徑斥為民六年冠帶不中者給與冠帶榮身九年授職不中者即以應得原職俱各回籍間住今該收考相應通查議請合候命下除將前項考選送館之後仍行提督官照例季考懲戒其有怠惰愚昧終難策勵者不拘嵗時徑請罷革至于三六九年㑹考照例食糧冠帶授職其三年考不中者姑量加責治容再習學又三年不中者黜退為民其食糧三年考不中者亦行黜退其冠帶三年考不中者令冠帶間住毋或姑息坐糜廪祿伏乞聖裁一定收補查得收補譯字生自正德三年一行嘉靖十六年一行以至于今曠日久逺人心絶望所以不習其業應考者鮮而他人反得營求入選取收之後三年㑹考例有黜陟人漸减少而各館世業子弟藝隨齒長又自有俊秀者出似當量為收補以便習學合無今後每六年一次收考每考止取二三十人則進身有期人既肻習其業取人不泛業自可精其能况數番方滿一百二十人之數得諸積纍似與一日濫收者尤為有間伏乞聖裁一查實歷查得在館各生有怠惰托避者率多告病給假及㑹考之期輒行告補甚非事體今後合無臨及三年㑹考須要查算在館日期有無虛曠若無故曠三箇月之上已食糧者住支未食糧者令補足日期方許送考其丁憂起復事出不幸者情若不同故往時亦嘗奏擾乞要附在廷試嵗貢中同考皆已准行然據考課責實之意似亦未當今後俱合扣算三十六箇月為滿如未滿數者通不准考伏乞聖裁一嚴保勘照得世業子弟必用夲館教師保送然有等夤緣之徒冒認宗族假托姓名買囑教師朦朧保送深為可惡今該內閣奏令各館教師結送世業子弟赴考如朦朧冒選者日後事發即行黜退并將原保教師參問相應依擬申請合候命下行令各館教師各將夲館見任各官及曽任而物故退間者的親世業子弟取具重甘執結親赴夲部投遞間有夲館教師故絶而子弟獨存者許鄰館保之臣等嚴加審核果無詐冒方准收考仍于考試之日許各生面訐如有前弊即將夲生并保送者一併送問脫或一時幸免日後被人告發或查訪得出不論入館年月久近仍行問革為民原保教師一體連坐伏乞聖裁一絶干請查得先年考選不公大招物議皆因富商豪族憑恃錢神或鑽刺部官自通貨賄或買囑勢要轉為請求以致有嫌可避年久不敢舉行然國法有在若果以公奉法何有于嫌合候命下臣等先行禁約敢有鑽求窺伺及轉為干請係官員者容臣等指名參奏治以重罪不係官員者即於夲部門首枷號一個月滿日送法司問罪伏乞聖裁一嚴考試查得先年試法甚疏致通關節且止考以七言絶句詩一首既係成語則或有預擬而暗合者合于考試之日嚴加搜檢封鎖防範前後不得相通其試字不用舊句臨時雜出漢文三十字令譯番文仍設彌封官一員卷完時先行彌封然後送看預行各館教師先將番文底夲送部以慿驗對其考試之日俱于部中别所封鎖待取定進呈之時放出令其參驗庶免差訛伏乞聖裁一分館業查得九館所習番文各異而注以漢字亦互相有無若一體考譯則有無其字者將何以應合於考試之日公同于九館番文底夲內揭出一假令其譯寫又各館事務繁簡不同亦難一槩均取合于事繁者多取數名事簡者少取數名如有一館無人習學者則于别館當取有餘之數補之令入館之後改習其業仍于考卷首行明寫某館譯字以便稽查伏乞聖裁一禁差遣查得譯字官生一得進身即便營求差遣曠廢夲業每有外藩朝貢之文及朝廷敕諭宣示諸番者令一辨譯則瞪目支吾莫可措手不免為逺人所笑今後各館官生俱要安心習業較閲課倣毋得鑽刺謀差以取罪譴伏乞聖裁一補教師查得提督四譯館少卿邱嶽呈稱緬甸館師生俱已故絶誠為闕典蓋先年缺人俱令各邉鎮巡官保舉起送充用又查得當時緬甸教師不識中國文字使人口傳漢字題目令其寫作番字先因夲館教師不曾傳有夲國字樣夲館人員止將百裔字樣習學故考時欲要依夲對看而無夲可對以致難定等第封卷進呈今據教師既缺相應取補合候命下本部行令該鎮巡等官多方覽求通曉番漢字樣者充緬甸教師并求夲國字迹或就責令教師尋獲凑譯成書以便教授庶各館皆有全書不致如往時含糊考校漫無憑據伏乞聖裁春明夢餘録卷五十二
