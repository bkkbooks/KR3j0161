body:
  text: 春明夢餘録雜家類三雜説之屬提要臣等謹案春明夢餘録七十卷國朝孫承澤撰承澤有尚書集解已著録是書首以京師建置形勝城池畿甸次以城防宫殿壇廟次以官署終以名迹寺廟石刻巖麓川渠陵園似乎地志而敘沿革者甚略分列官署似乎職志每門多録明代章疏連篇纍牘又似乎故事體例頗為龎雜且書中標目悉以明制為主則不當泛及前代既泛及前代則當元元本本絲牽繩貫使端委粲然不當挂一漏萬每門寥寥數語或有或無絶不畫一即如禮部第一子目標曰禮制而首以朱子儀禮經傳通解一條次以吳澄三禮考注一條又次以朱子家禮一條此儒者之著述非朝廷之典章不當繫于禮部又周與宋之舊文非明代之新制尤不當繫于明之禮部是何義也太醫院自敘官一條外皆雜録古人醫書序文及諸脈論以足一卷此無論不能遍載即遍載之何預明太醫院然則翰院門將備録歷代制誥詩賦耶又承澤沿門户餘波持論皆存偏黨如萬厯以後厯法差舛衆論交爭至崇禎中西法中法喧呶彌甚此沿革之大者乃欽天監門于鄭世子載堉諸説今見于明史者悉刪不録于徐光啓等改法之事亦僅存其略且謂舊法不過時刻之差不害于事又謂新法將來亦必差殊有意抑揚不為平允蓋其時論者多攻大統厯而大統厯曽經許衡參修承澤以講學家宗派所繫故為之左袒其反覆以衡為詞宗旨了然可覩也又周延儒招權納賄賜死非枉承澤乃于內閣門中録其直房記一篇以為美談復于刑部門中以閣臣公救延儒揭列之慎刑條下益乖是非之公矣其好惡性情往往如是蓋不足盡據為典要然于明代舊聞採托頗悉一朝掌故實多賴是書以存且多取自實録邸報與稗官野史據傳聞而著書者究為不同故考勝國之軼事者多取資于是編焉乾隆四十二年三月恭校上總纂官臣紀昀臣陸錫熊臣孫士毅總校官臣陸費墀欽定四庫全書子部十春眀夢餘録目録雜家類三雜説之屬卷一建置卷二形勝卷三城池卷四畿甸卷五城防卷六宫闕宫官內官監卷七正殿卷八殿門卷九文華殿卷十文華傍室卷十一武英殿仁智殿卷十二文淵閣卷十三皇史宬卷十四天壇祈榖壇神樂觀犧牲所卷十五山川壇神祗壇太歲壇先農壇旗纛廟卷十六地壇朝日壇夕月壇卷十七太廟卷十八奉先殿景神殿玉芝宫崇先殿卷十九社稷壇先蠶壇髙禖臺西海神祠卷二十帝王廟卷二十一文廟卷二十二三皇廟都城隍廟漢壽亭侯廟宋丞相文信國祠于少保忠肅祠卷二十三內閣一卷二十四內閣二卷二十五六科卷二十六尚寶司卷二十七光祿寺卷二十八中書科卷二十九宗人府卷三十五軍都督府卷三十一戎政府卷三十二翰林院卷三十三詹事府卷三十四吏部卷三十五戶部一卷三十六戶部二卷三十七戶部三倉場卷三十八戶部四寶泉局卷三十九禮部一卷四十禮部二卷四十一禮部三貢院卷四十二兵部一卷四十三兵部二卷四十四刑部一卷四十五刑部二卷四十六工部一卷四十七工部二寶源局卷四十八都察院卷四十九通政司卷五十大理寺卷五十一太常寺卷五十二四譯館卷五十三太僕寺卷五十四國子監卷五十五府學卷五十六首善書院卷五十七太醫院卷五十八欽天監一卷五十九欽天監二觀象臺卷六十鴻臚寺卷六十一行人司卷六十二上林苑卷六十三錦衣衛卷六十四名迹一卷六十五名迹二卷六十六寺廟卷六十七石刻卷六十八巖麓卷六十九川渠卷七十陵園
