body:
  text: 春明夢餘録卷三十二吏部左侍郎孫承澤撰翰林院翰林院在東長安門外北向其西則鑾駕庫東則玉河橋元之鴻臚署也正統七年始建為院初為三品衙門後改正五品定學士一人侍讀學士二人侍講學士二人為正官侍讀侍講各三人五經博士五人侍書二人待詔一人為屬官修撰二人編修四人檢討四人為史官而孔目為首領官其院事主於內閣大學士而掌印則以學士或侍郎詹事等官兼學士或春坊官署掌內閣行移用翰林院印而各衙門章奏文移亦止曰行翰林院學士之職掌詞翰禮文草誥敕詳正圖籍考議制度以文學備顧問出入侍從參謀議凡經筵日講修書皆承受而統領焉講讀職專勸講經史五經博士業專經佐學士講讀待詔主應對以四體侍上書於唐為供奉官典籍守古今四庫書籍史官掌修國史凡天文地理宗潢禮樂兵刑諸大政上所下詔敕書檄謹籍而記之以備實録為上心簡注者得入內閣預機務兩直𨽻鄉試禮部會試充考試官萬歷初申飭日講史官從閣臣後記注起居及密勿謀議别㨂史官分曹纂諸司章奏題覆月封送內閣藏之當洪武初設文華堂擢張唯等為編修上政暇幸堂考業而光祿日給饌皇太子諸王日迭主焉賜冬夏衣賜白金鞍馬其敦崇如此翰苑考周禮內史掌八柄之法以詔王治凡命諸侯及孤卿大夫則䇿命之蓋八柄詔於冡宰內史復掌以詔王吳澄謂內史翰林之職猶今學士院之草制詔也然謂之史乃掌文書贊治之名今制並史館於翰林其亦此意也唐文皇開天䇿府而始有學士之目武后中復置北門學士間以親昵充之如漢鴻都而加重其後至德宗朝始定設學士繫銜於翰林與中書舍人對掌內外制然無定品往往寄䘵於他官其資深者至散騎諌議而淺者僅拾遺參軍尚不能與舍人埓獨其長一人最貴曰承旨往往竟拜宰相其次亦不失三司觀察卿監至宋一切因之而益加重然不為定品如故元豐制行自是稍稍有恆秩又按端明殿學士之設起於唐明宗時明宗目不知書四方奏事皆令安重誨讀之重誨亦不能盡通乃選文學之士與之共事有宋因之遂為華選唐宋以來名卿碩輔多出其中然不輕授必敡歷中外聲華大著者始預其選彼時即殿試大元亦必歷試民事乃召入禁掖故其得人為盛元翰林國史院記世祖皇帝中統元年初設翰林學士承旨官止三品至元元年乃建翰林國史院而備學士等官八年院升從二品成宗皇帝大德九年院升正二品仁宗皇帝親攬御筆點定置立學士承旨六員學士侍讀學士侍講學士直學士各二員皇慶元年院升從一品迄今永遵為制先是蒙古新字及伊斯題喇卜並教習於本院翰林國史集賢兩院合為一仍兼起居注領會同館知祕書監而國子學以待制兼司業興文署以待制兼令編修官兼丞俱來𨽻焉其後新字既析置翰林院而復立集賢院如故今興文署已廢本院於起居注會同館祕書監國子學之事悉無所預回回學士亦省而伊斯題喇卜以待制兼掌之今上皇帝建宣文閣而不設學士詔以經筵崇文監皆歸於本院崇文監言其非便而止惟於學士承旨而下摘官判署經筵之文移頃因纂修后妃功臣傳又以執政兼學士承旨等官而無常員此建置沿革之大略也明太祖初下江南庶事草創有所聘擢僅寓名以備顧問而已元年五月始置院學士正三品侍講讀學士正四品直學士正五品修撰典簿正七品編修正八品二年正月定學士承旨正三品學士從三品侍講學士正四品侍讀學士從四品直學士正五品典簿正七品待制從五品修撰正六品應奉正七品編修正八品典簿從八品九年閏九月詔承旨與六部尚書同然班在其上十四年罷承旨直學士待制應奉檢閲典簿十八年三月始定置學士一人正五品侍讀學士侍講學士各二人從五品孔目為首領一人未入流侍讀侍講各二人正六品五經博士五人正八品典簿二人從八品侍書二人正九品待詔六人從九品皆稱屬又修撰三人從六品編修四人正七品檢討四人從七品别為史官亦係屬焉是歲侍讀始列侍講前建文初大有所更置然於職事無損益永樂初仍高帝舊尋擢史官解縉而下七人入內閣預機密典綸綍然自學士王景卒解縉胡廣楊榮輩猶相繼領院篆洪熙之歲大學士士竒等驟遷至三孤踞六曹上遂不復領院矣第文淵內署與六曹異文移往復猶以翰林行之今雖稍稍變革而猶有一二存者如史宬焚草中貴傳旨猶傳大學士為翰林學士翰林公署中左設大學士三座學士一座而講讀學士東西對列是也明改學士院為翰林院夫學士代言之官講讀經筵之職五經博士典籍則前代祕書之屬侍書待詔則前代著作起居之任也並屬於翰林至於升轉之例初明編修九年升侍講檢討九年升修撰既升侍講修撰矣與狀元徑授修撰者又皆九年方升中允成化二年童緣以修撰升諭德後遂為例至𢎞治中改正必二十六七年方升五品學士此載在楊文襄召對録者故當時詞臣回翔禁林曉暢典故及至宣麻卓有可觀學士一官在唐居五品之上直學士居六品之上武后時以宰相兼領中宗景隆中始置大學士自是宰相皆帶𢎞文集賢大學士及宋王欽若罷參知政事真宗眷遇未衰特置資政殿學士以寵之時冦凖在中書定其班位依雜學士在翰林學士下欽若訴於上真宗為特置大學士班在翰林學士上明設翰林學士及講讀學士而殿閣則設大學士其秩亦止五品既重其任而又輕其秩遲其升設官良有深意宣德後大學士始加保傅非制也正統間以學士一人在內閣專管誥敕後久不設𢎞治七年復設至用尚書兼學士如石瑤侍郎兼學士如賈詠輩掌管至嘉靖六年以張璁議始停不補翰林由别衙門改用者如王子沂以御史改左春坊司直陳皓徐敬李賢劉子春周幹韓守善皆以御史升中允歐陽兼以御史改編修金臯以給事中改檢討張衮胡經俱御史改編修儀智以右通政改右春坊右中允許誥以南京右參議改侍讀學士盛端明以南京尚寶卿改左庶子兼侍讀鄒濟以吏部郎中改左庶子王道彭澤俱以文選司郎中改右諭德任翰以考功司郎中改春坊司直兼檢討鄒守益以南京考功郎中改洗馬李維鼎以儀制郎中改贊善劉球以儀制郎中劉鉉以兵部主事俱改侍讀尹昌隆以刑部主事升中允王一寧以工部主事改修撰歐陽崇一以刑部郎中改編修韓邦竒以考功郎中改左庶子嘉靖十一年唐順之李學詩陳束虞淮王汝孝陳節之屠應埈葉察吕懷王愼中金潞楊淪皆以科道部屬改編修王大任薑警俱以御史升侍讀學士宣德正統初陳叔綱邵宏譽俱以與修實録改修撰翰林升改别衙門及外官者除考察降調外正統元年劉永清以侍講學士升廣東右布政陳文升以侍講學士升雲南右布政𢎞治十六年李州以侍講學士升浙江右布政後亦有以史官徑轉兩司者不具載洪武中羅公願以編修改都水郎中張顯宗以編修為太常寺丞宣德中徐允逹以中允升鴻臚少卿高巽志以侍講學士升太常寺少卿迮原霖以修撰升通議黃觀以修撰升尚寶卿盧原質以編修升太常寺少卿金問以修撰升太常寺少卿正統初陳珣以侍讀謫安陸州知州尋召為大理寺少卿巡撫大名孔公恂以修撰改大理寺丞巡撫貴州天順中林文李紹俱以左庶子改尚寶司卿李太以中允改尚寶司丞柯潛以洗馬改尚寶少卿成化中羅璟以洗馬改禮部員外郎孫賢劉珝以中允升太常寺少卿𢎞治中李繼以諭德升南太常少卿傅圭以中允升太常少卿正德中靳貴以學士改光祿卿黃諌以編修升尚寶司卿黃琮以左庶子改宗人府經歷許彬以修撰升大理少卿徐穆以編修改南禮部員外郎嘉靖中張春以侍讀改南太僕寺丞秦鳴夏以中允在告起為兵部主事萬歷中張一桂以諭德調兵部員外郎范應期以諭德調南刑部郎中崇禎中以編修楊廷麟改兵部職方司主事監軍翰林兼科道者洪武中夏原吉范顯祖以太子賓客兼治書侍御史永樂中李凖以太子賔客兼吏科都給事中嘉靖庚戍趙貞吉以左春坊左諭德兼河南道御史己丑夏言以侍講學士兼吏科都給事中萬歷己未徐光啓以少詹事兼河南道御史其實改科道者永樂中孔諤以中允改御史洪熙初侍讀李時勉羅汝敬俱以言事改御史正統中金幼孜子檢討逹改給事中成化中檢討李昊改南禮科給事中洪武中編修馬亮任敬王璉王輝陳敏張唯俱改御史正統己巳徐珵以侍讀改浙江道御史楊鼎以中允改河南道御史檢討王玊改江西道御史崇禎中金聲以編修改御史張縉彥以侍讀改兵科俱以知兵改任翰林改教授者永樂乙未進士第二人李貞以編修改高州府教授第三人陳景以編修改福州府教授鼎甲不入翰林洪武四年狀元吳伯宗授禮部員外郎第二郭翀第三吳公逹授吏部主事丁丑狀元陳䢿謫戍第三劉鍔補鴻臚寺司賔署丞第二尹昌隆授禮部主事嘉靖壬辰第二孔天胤以王親授陜西按察司僉事萬歷己未莊際昌廷試卷誤書醪字為膠言者劾之請告歸詞臣以諌諍著譽者如修撰羅倫疏爭李賢不冝奪情起復貶福建市舶副使編修章懋黃仲昭檢討莊昶疏言上元張燈賦詩非盛德事又時四方多故乞將煙火一切停罷以省煩費充兵餉忤旨各廷杖調外任時稱為翰林四諌其後疏爭張居正奪情有編修吳中行檢討趙用賢杖革時許文穆國為庶子鐫玊杯一日斑斑者何卞生淚英英者何藺生氣追之琢之永成器以贈中行鐫犀杯一曰文羊一角其理沉黝不惜剖心寧辭碎首黃流在中為君子壽以贈用賢又其後疏爭楊嗣昌奪情為少詹黃道周修撰劉同升編修趙士春各降斥有差皆翰苑中之祥麟威鳯也成化間鄒公智幼貧居龍泉庵焚葉照讀或通宵不寐丙午領四川鄉試第一郡人聚觀於會江門外公馬上口占曰龍泉山上苦書生偶竊三巴第一名世上尚多難了事鄉人何用大相驚時年方弱冠耳及入庶常因星變抗章極斥宦官遂下詔獄其寫懷曰人到白頭終是盡事埀青史定誰真夢中不識身猶繫又逐東風入紫宸其辭朝曰盡披肝膽知何日望見衣裳只此時但願太平無一事孤臣萬死更何悲舒公芬及第入翰苑未幾以建言出為福建提舉賦詩曰金榜題名墨未乾寸心耿耿向長安九重殿闕金門鎖萬里江山赤子寒午夜人爭搖狗尾一封誰肯犯龍顔生來戅直懷孤憤不作肓聾喑啞官洪武中諭侍讀張信等曰官翰林者雖以論思為職然既列近侍旦夕左右凡國家政治得失生民利病當知無不言昔唐陸贄崔羣李絳之徒在翰林皆能正言讜論補益當時顯聞後世爾等當以古人自期又諭詹同曰古人為文明道德通世務如典謨皆明白易知無怪異險僻之詞至出師表誠意溢出近文士即過相如揚雄何禆實用今翰林但取通道理明世務無事浮藻經筵王文恪鏊疏國家經筵之設其盛矣乎天子自正朝輦御文華公侯九卿大臣盛服侍列羽林之士亦皆環列以聽經筵一開天下欣欣焉傳之以為希濶之典故曰其盛矣乎然一歲之間寒暑皆歇春秋月分日不過三三日之間風雨則免遇事有妨則免講之日夙具講章至期講訖綸音賜宴儼然而退上下之情未見其親且密也至於日講可謂親矣然體分猶過於嚴上有疑焉未嘗問也下有見焉未嘗獻也昔傅説之告高宗曰學於古訓乃有獲惟學遜志務時敏厥修乃來遜者遜其志如有所不能敏者敏於學如有所不逮成王訪落於羣臣曰學有緝熙於光明弼時仔肩示我顯德行緝熙者繼續而光明之示我顯德行者冀群臣有以開示之也商周之君其學如此之切夫人主一日萬幾固不暇如儒生學士日夜孜孜然而帝王精一之傳治天下之大經大法古今治亂之迹天人精微之際自非遜敏緝熙亦安望其有得而今也濶略如是暴之之日少寒之之日多傅之之人寡咻之之人衆未見其能得也且不獨商宗周成為然也漢光武雖在軍中投戈講藝息馬論道至夜分乃罷唐太宗延四方文學之士房杜禇薛輩十八人分番直宿討論經籍或至夜分今貞觀政要與魏徵所論亦可見矣宋世賢君宫中消日惟是觀書居常禁中亦有日課翰林侍從日寓直禁中以備顧問我太祖高皇帝甫得天下開禮賢館與宋濓劉基章溢輩日相講論其後聖學高明詔誥天下皆出御製睿翰如飛羣臣拱視今御製文集是也仁宗皇帝臨御建𢎞文館於思善門之右文學之臣數人入直時至館中講論孝宗皇帝經筵之外兼觀永樂大典又常索太極圖西銘等書於宫中玩之尤嗜故學士沈度之書日臨數過夫自古帝王之學如此祖宗之學如此陛下睿哲自天春秋鼎盛講明聖學正其時也臣愚特望於便殿之側修復𢎞文館故事妙選天下文學行藝著聞者七八人更番入直內閣大臣一人領之如先朝楊溥故事陛下萬幾有暇時造館中屛去侍從特霽天威從容訪問或講經或讀史傳或論古今成敗或論民間疾苦間則遊戲翰墨詩文之類亦惟所好而不禁蓋亦日講之義而加親焉大略如家人父子上有疑則必問下有見則必陳日改月化有不知其然而然者時御經筵所以昭國家之盛典日造𢎞文所以崇聖明之實功如是不已則聖德日新又新高宗成王不得專美於前矣楊守陳疏陛下冝遵祖宗舊制開大小經筵以講學當御蚤午二朝以聽政其大小經筵則必擇端介博雅之儒臣侍班進講陛下聽講之際凡所未明輒賜清問若復有疑更加詳詰講官或訥則侍班諸臣佐之而覆解詳釋旁引曲喻必待聖心洞然明悟而後已凡聖賢之旨帝王之道與夫理欲危微之所以辨知行精一之所以盡以及人臣何者為賢何者為否政事何者為得何者為失天下因何而治亂歷代為何而興亡若此之類皆必講之明而無疑乃可行之篤而無懈凡四書五經祖宗典訓及歷代諸史百官題奏皆當聚文華殿日輪內閣大臣一員講官二員使居前殿之右廂陛下退朝常御後殿或前殿以養心窮理裁決庶務一遇經書題奏或有可疑奧義則録講官示之使解或召問使對一日之間陛下居文華殿之時多處乾清宫之時少則欲寡而心清惑少而理明當夫萬幾間暇之際旦氣清明之時湛然凝思常恐欲心長而理心微邪佞進而忠良退以致政事多失天下不安凡一念之萌一事之作愓然警省必務除人欲而循天理遠小人而親君子以致政事皆得天下久治心常得其正事常執其中則陛下之得於內者深如堯舜而出治之本立矣薛文清瑄疏近有請開經筵以緝熙聖學者未見施行蓋欲候軍旅事平之日以開講也臣愚以為當聖主中興之時天步維艱之日正講論為學為治之道不可一日而緩焉者也昔漢光武躬擐甲胄討除羣凶猶且投戈講藝息馬論道軍旅之間未嘗一日廢學故能除羣盜如鴻毛復大業猶反掌此講學所以有資於成大功也唐太宗興義兵掃除冦亂一時潛邸從龍之臣皆文學智謀之士日夕相與論為學致治之道乙夜之覽身忘其倦故能剗刮僭偽拯濟生民此講學所以有資於戡大難也近者漠北雖稱兵深入而內外禦侮各有其人堂堂天下號令一施風行草偃非至如漢唐草昧之秋也顧可以斯時而少緩講學之事乎伏望皇上命廷臣集議經筵儀式務從簡約不尚奢華仍博選公卿侍從文學之臣有學術純正持己端方謀慮深遠才識超卓通逹古今明練治體者一二十人使之更代入直恭遇皇上視朝之暇日御便殿即召各臣進講其所講之書先大學論語孟子中庸兼講尚書春秋諸史則資治通鑑綱目務要詳細陳説聖賢修己治人之要懇切開告帝王端心出治之方以至唐虞三代漢唐宋以來人君行何道而天下致治失何政而天下乖亂與夫賞善罰惡之典任賢去邪之道莫不備陳於前如此則勸講之臣庶可日修其職講讀官之職既修雖皇上聰明上智之資實由於天錫而朝夕緝熙啓沃之力亦有益於聖心聖學日新聖德日明於以修治道則正心以正朝廷正朝廷以正百官正百官以正萬民而治道有修明之效於以禦外侮則修軍政以簡將帥簡將帥以練士卒練士卒以備不虞而烽燧有銷灌之期此講學有資於成大功戡大難冝急行之而不冝緩焉者也且漢光武唐太宗一時英主也猶能勤講學於搶攘之時以收戡靖之績伏惟皇上有唐堯虞舜之聖德將以立殷周中興之大功誠於此時舉行開講之事以緝熙聖學則神功聖德高出千古矣又豈漢唐二主之可比哉倪嶽疏近者伏聞聖旨勤御經筵日講不輟講明聖賢之格言圖維治平之要道緝熙之功啓沃之益於是為大三代之治端在今日宗社之幸生民之幸也臣等竊惟朝廷日講之制必以宋儒真德秀所著大學衍義次第進講書云知之非艱行之惟艱徒讀其書而不求其意亦無益也考之衍義所載首言格物致知之要必以帝王知人之事為先其於辨人材之論尤惓惓焉蓋任賢圖治乃人君之職故所任之得失賢否則天下之治亂安危係之非細故也伏望聖明因今日所講之書驗之古人已行之事獨運於聖心之微以謹夫用人之道於凡內外文武之臣左右前後之職其間果有忠實不欺淳謹可託特立而不為黨與之私勤敏而足為治理之助者俯推委任之誠而不輕為搖奪曲施保全之恩而不易為間阻其有立心私邪制行姦詭執左道以變亂倡異端以熒惑以土木營繕為奉承以禱祠祈禳為忠愛費財而不顧勞民而不恤以至依阿循默以茍容而不知竊位之恥奔競冒昧以希進而不知枉己之辱若是者皆足以僨事而害政違天而虐民所冝迸逐而不留扼絶而遠去庶朝廷為之永清天意為之昭格災眚可弭政務可修而太平之治必在此矣制誥張孚敬疏臣竊惟制誥者王言也知制誥者臣職也知制誥而使王言不重則不得其職矣臣按國初以來成化以前制誥之體猶為近古明敡履歷宣昭事功其于夲身者不過百餘字其覃恩祖父母父母并妻室者不過六七十字言之者無費辭受之者無愧色近來俗習干求文尚誇大藻情飾偽張百成千至有子孫讀其祖父母父母誥敕莫自知其所以然者卒使萬乘之尊下譽匹夫匹婦之賤良可惜也孔子曰天下有道則行有枝葉天下無道則辭有枝葉今當聖明之世可使制誥之文為枝葉之辭哉伏乞敕下內閣自今以後凡有誥敕必須復古崇實一切枝葉浮誇之辭盡行刪去庶王言重而人知所勸矣張居正疏竊照閣臣之職專一視草代言故其官謂之知制誥若制詞失體以致輕褻王言則閣臣為不職矣謹按舊規凡官員應給誥敕該部題奉欽依手本到閣撰述官先具稿送臣等看詳改定謄寫進呈候批紅發下撰述官用關防挂號然後發中書舍人寫軸用寶此定制也至於制命之詞貴在簡嚴莊重乃為得體查得成化𢎞治年間誥敕敘本身履歷功績不過百餘字祖父母父母及妻室不過六七十字至於慶典覃恩則其詞尤簡蓋以恩例槩及比之考績不同故以賚被為榮不必詳其閲歷此制體也近年以來俗尚干求詞多浮靡撰述官沿襲宿弊往往不候進呈先將文稿傳示於人其中詞語又過為誇侈多至數百千言或本無實行虛為頌美或事涉幽隱極力宣揚臣等方欲為之更定而本官已先得稿登軸矣夫誥敕者朝廷所以誥諭臣下者也臣諛其君猶謂之佞况以上諛下是何理乎倪元璐姚翰長代言序夫雲霞者非天之為也山澤之氣蒸而歸文於天是地之忠天者也後王法之以使臣子代為君上之文章宋人曰得知制誥一日足不恨當宋之時環玦雲泥皆厪書命道總褒誹其義則史今言絲萃於旌纁字衮依其鞶帶無譏有奬以明至仁且夫遇物稱佳敷歡四座毫毛茂茂化為醴脂此氣士之難居者也以孟堅之才為其大臣上哦主德猶病伊優今使天子執平交之分涌如泉之詞媚於卿士不亦悖乎是故觀夫百爾之道察其難為雖調匕橫戈無如視草者矣而以姚孟長先生為之其難益甚先生之為難者二望峻而文行遠望峻則今之人必以其言為山龍不得則怨文行遠則後之人必以其言為蓍蔡不核則譏近怨遠譏此二者不兩弭之術也故使聖人今日以是事命臣元璐必大怖啼泣請辭而先生居之夫先生之居之則亦天意也往五六年間璫禍熾興醜徒干紀凌撼椒庭冀離肺腑黨鈎正士不漏平原裭脫纓組如風擊籜北寺填門踵不得下戎行牖下等於三山天地既冥陵谷將變聖人乃作行其大僇氛盡旭出道介長消奮椎黨碑極命輪轂萇𢎞之血祓以膏蘭胥靡閭氓悉還車服號綍並汗木鳯為疲而先生方召自英州再升玊局聖人顧之貴其峻整以為精微前坐賈生側陳里革進則資其甘盤之學退則役其燕許之才先生於是奮筆致能體天貌物章霆露之功别愷凶之道表方中之晷揚大來之符引伏戎之憂厲揚廷之義著首肱之愛呼敬應之心發言如雷軯訇天下若此者非先生孰可使為之乎先生之與聖人通德譬水合雨而冠領正人引衾發氣如芝荃之並馨斯能鼓吹大謨青黃羣直雖或光回綺合小命春華而義鬚鬇然搴壯岸出史狐之能於斯不墜矣昔蔡襄之歌景祐陳瓘之論元符非為巽牀巫紛歸榮一氏之業也以先生之鯁固多怪少可使修譽命之辭適及泰征之會嚶鳴之求託音節足故曰天意斯不誣焉子瞻縱筆一世唯為五銘先生典制二年亦不盈牘端人之心可以知己詩曰倬彼雲漢為章於天又云螮蝀在東莫之敢指夫以文人之淫氣上干日星螮蝀之與雲霞豈得無其辨乎史職大學士陳於陛疏臣考史家之法大者有二一曰編年之體以事繫日月而統之年者是已一曰紀表志傳之體凡君臣事迹朝家大政各自為始終者是已左馬以來代有述作兩者並行而宋世去我朝為近制度尤彪炳可考自建隆後編年之書謂之曰歷即所稱採百司奏對事實為時政紀取柱下見聞為起居注髏次而潤色之為日歷修而成之為實録以備史官之採擇者是已其紀表志傳之書謂之正史如真宗祥符間王旦等撰進太宗兩朝正史為紀六卷志五十五列傳五十九仁宗天聖間吕夷簡等增入真宗朝名三朝國史為紀十卷志六十列傳八十者是已此外又有輯録祖宗宏謨要政分門析類以便御覽禆帝學之書如王曾取三朝聖語政事分政體聽斷謹災省費等類為寶訓三十卷范祖禹撰仁皇訓典六卷自聖孝至愛物凡三百十七條以備邇英進讀與國史實録並行者是已以上三書體裁殊致各有取義乃有國之不可闕者恭惟我朝建立法制事事超越前代而史書獨有列聖實録藏之金匱石室似只依倣宋世編年日歷之體但可謂之備史未可謂之正史至於大明會典屢修頒布凡六曹政務因革損益之冝雖已該載而廟堂之謨猷册誥臣工之議論文章不與焉但可謂之國家典制百司遵行之書而非史家之體蓋本朝紀表志傳之正史經二百餘年來學士大夫踵襲因循闕略不講在今日似不可不亟圖者然斯事體固甚大亦非有獨創特起之難何者國家著書自實録會典外玊版琅函鏤之尚方播在寰宇者焜耀日星未易悉舉其諸朝野各家撰次典故之書高文竑議可偹正史採擇者又無慮數十百種臣本膚學見聞寡陋略以耳目所覩記者言之如實録有聖德之總敘寶訓皆列聖之淵猷此外有御製文集有聖政記有皇明詔制及諸臣所編如大政記昭代典則孤樹裒談憲章録鴻猷録之類參以三朝聖諭録前後北征録天順日録燕對宣召視草宸章等録更加採輯藻潤即可以為列聖大紀帝系宗譜有玊牒公侯紹封有兵曹底簿封爵考參以吾學編同姓異姓王侯內閣典銓表及列卿表之類更加考訂增益即可以為纍朝年表制書如一統志官制大明律例大明集禮洪武禮制明倫大典之類諸司列布者如宗藩軍政條例會計録太倉考漕河圖志海運編太學馬政鹽法志之類四方形勢如廣輿圖九邊圖説星槎勝覽瀛涯勝覽炎徼紀聞殊域周咨録之類折𠂻以實録會典所紀載參以衍義補名臣經濟録疏議諸書吾學編中天文地理三禮百官四裔邉防諸考述即可以為國家諸大志實録中有后妃事迹廷臣自三品以上有小傳益以開國靖難功臣録羣志備遺録名臣言行録名臣紀殿閣詞林紀琬琰録文獻備遺之類其諸高逸學節等目更採托於郡國志即可以為國史之列傳特諸書散佚浩瀚未經裒聚櫽括茫無統紀是以昭代久虛之典必須聖明在上力為表章整輯然後可以包舉藝文總一流略勒成巨編垂著萬世此真千載一時也臣愚伏思本朝得國之正功高千古卜歷之長將綿萬祀聖祖躬造而臨御最久列聖纘紹而謨烈重光以是禮樂規模明備閎遠品式樞機精詳周愼掞天揭日之文煥焉足述銘鍾書帛之賢不可勝載今且二百三十年奎章玊簡傳之萬世者即在册府麟臺之上未得盡觀遂使聖德鴻猷辭多散見而無統名賢舊德事或湮墜而不收豈所以昭聖朝之景鑠宣國美於無疆哉大學士張居正疏國初設起居注官日侍左右紀録言動實古者左史紀言右史紀事之制逮後詳定官制乃設翰林院修撰編修檢討等官蓋以紀載事重故設官加詳原非有所罷廢但自職名更定之後遂失朝夕記注之規以致纍朝以來史文闕略一議分管責成照得史臣之職以紀録起居為重顧宫禁邃嚴流傳少實堂亷遠隔聽睹非真則何以據事直書傳信垂後看得日講官密邇天顔見聞真的又每從閣臣之後出入便殿即有密勿謀議非禁密不可宣露者閣臣皆得告語之合令日講官日輪一員專記注起居兼録聖諭詔敕册文等項及內閣題稿其朝廷政事見於諸司章奏者另選年深文學素優史官六員專管編纂事分六曹以吏户禮兵刑工為次每人專管一曹俱常用在館供事不許别求差遣及託故告假等項致妨公務一議史官侍直謹按禮儀定式凡遇常朝記事官居文武第一班之後近上便於觀聽即古螭頭載筆之意洪武二十四年定召見臣下儀以修撰編修充侍班官即古隨使入直紀事之意今冝遵照祖制除升殿例用史官侍班外凡常朝御皇極門即輪該日記注起居并史官共四員列於東班各科給事中之上午朝御會極門列於御座西稍南專一記注言動凡郊祀耕藉幸學大閲諸典禮亦令侍班隨從紀録至於不時宣召及大臣祕殿獨對者恐有機密不必用史官侍班但令入對大臣自記聖諭奏對始末封送史館詮次其經筵日講則講官即記注起居亦不必另用侍班一議纂輯章奏照得時政所寄全在各衙門章奏今除內閣題稿并所藏聖諭詔敕等項該閣臣令兩房官録送史館外其各衙門章奏該科奉有旨意發抄到部即全抄一通送閣轉發史館至於欽天監天文祥異太常寺祭祀日期各令按月開報其抄本不必如題奏揭帖格式但用常行白紙密行楷書不論本數多寡並作一封送入一議紀録體例照得今次紀録祗以備異日之考求俟後人之刪述所貴詳核不尚文詞宜定著體式凡面奉上諭直書天語聖諭詔敕等項備録本文若諸司奏報一應事理除瑣屑無用文義難通者稍加刪削潤色外其餘事有關係不妨盡載原本語涉文移不必改易他字至於事由顚末日月先後務使明白無致溷淆其間事迹可垂勸戒者但俱據事直書美惡自見不得别以己意及輕信傳聞妄為褒貶一議開設館局照得東西十館原係史臣編校之所密邇朝堂紀述為便今合用東館近上四所令史臣分直其中一起居二吏户三禮兵四刑工除典守謄録人役隨同供事外一應間雜人等不許擅入其合用紙劄筆墨酒飯等項俱照纂修例給一議收藏處所照得國史古稱為金匱石室之書蓋欲收藏謹嚴流傳永久今冝稍倣此意月置一小匱歲置一大匱俱安放東閣左右房內每月史官編完草稿裝為七册一册為起居六册為六曹事迹仍於册靣記年月史官姓名送內閣驗訖即投入小匱用文淵閣印封鎖歲終內閣同各史官開取各月草稿收入大匱用印封鎖如前永不開視一議謄録掌管照得史館紀録所用謄録典守官吏見今纂修實録即可通融選用合將各館謄録官選取勤謹善書者二員專謄祕密文字行吏部選撥善書貼寫辦事吏十二名專寫各衙門章牘撥當該吏四名專管文册及朝夕啓閉館常川供事滿日各照常送部撥補不給恩典一議補修記注伏覩聖明踐阼之始即召見輔臣於平臺二年之春召見計吏亷能卓異者靣賜奬諭邇者以吏兵二部奏除文武職官又親臨選銓皆古帝王之盛節三年之間鴻猷善政不可縷數兹者曠典復修亦合將二年以前事迹追書謹録用傳萬世擬各官除每月照前供事外兼將二年以前起居初政亦照月分曹以次纂録其詔敕等項內閣查付各衙門章奏行六科照月類抄一册送內閣轉發焦太史竑修史四事一本紀之當議國朝實録代修如建文景泰二朝少者四年多者七八年向無專記景帝位號雖經題復而實録附載未為是正夫勝國之君人必為紀以其臨御一時猶難泯沒所謂國可滅史不可滅也况在本朝乃使之孫蒙祖號弟襲兄年名實相違傳信何據此所當創為者一也德懿熙仁四祖本朝發祥之始列於高廟本紀之首如漢高之述太公光武之述長沙已無可議至睿宗獻皇帝似當一遵此例不必另紀蓋位終北靣猶人臣之列事屬追王無編年之體此所當附見者二也或當分而不必合或當合而不必分蘭臺石室之中自有定論但須經聖斷乃可遵行一列傳之當議竊聞舊例大臣三品以上乃得立傳夫史以褒貶人倫豈論顯晦若如所聞高門雖跖蹻亦書寒族雖夷鰌並詘何以闡明公道昭示來兹謂當貴賤並列不必以位為斷一也世傳吾學編名臣録之類多係有名公卿至權姦誤國之人邪佞欺君之輩未一紀述今循此例使巨惡宵人幸逃斧鉞史稱檮杌義不其然謂當善惡並列不必以人為斷二也纍朝實録稟於總裁茍非其人是非多謬如謂方正學為乞哀于肅愍為迎立褒貶出之胸臆美惡係其愛憎此類實繁難以枚舉至於野史小説尤多不根今歷世既多公論久定冝乘此舉亟為改正三也一職官之當議國初修書多招四方文學之士不拘一途近日內閣題請實合此意但世道日衰人情不美未得學行之人徒為奔競之地其於纂修無益有損况今承明著作之廷濟濟多士供事有餘寧須外索中惟星歷樂律河渠三項非專門之人難於透曉宜移文省直訪有精通此學者或召其人或取其書史官就問大加刪潤以垂永久此外決當謝絶勿啓幸門至史館兩房中書本供繕寫今始事之日方翻閲遺文搜討故實下筆之期茫無影響謄録之官安所用之似當暫為停止俟他日脫稿之後經總裁改定方可取用量為資給不但冗費可裁而亦僥幸少抑一書籍之當議古之良史多資故典薈萃成書未有無因而作者即今金匱石室之中當備有載籍以稱昭代右文之治臣向從多士之後讀中祕之書見散佚甚多存者無幾即合班馬名流何以藉手考之前漢郡國計書先上太史副上丞相後漢公卿所撰初集公府亦上蘭臺史官所修於是為備國初聖祖伐燕屬大將軍收祕書監圖書典籍太常法服祭器儀衛及天文儀象地里户口版籍既定燕詔求遺書散民間者永樂初從解縉之請令禮部擇通知典籍者四出購求遺書合無倣其遺意責成省直提學官加意尋訪見今板行者各印送二部但有藏書故家願以古書獻者官給以直不願者亦抄寫二部一貯翰林院一貯國子監以待纂修誦讀之用即以所得多寡為提學官之殿最書至置立簿藉不時稽查放失如前者罪之不貸此不但史學有資而於聖世文明之化未必無補董其昌薦李惟楨修史疏天啓二年八月初五日吏部一本奉聖旨董其昌題充纂修官俟泰昌實録稿成前往南京採輯邸報等册以備參訂供用就彼支給完日回館供事該部知道欽此臣聞命自天感恩無地於十月前往南京將河南道所藏邸報摘其未奉旨者一一録出太常寺祠祭司督遣僧道助寫僅得十分之三緣事出創見應天府例無工食而其書充棟就結為難臣仍歸里大集書傭給以紙筆雖奉有支給之旨不敢破用官帑先差中書沈僎亦録七年通共若干張裝為三百本但據原本對録以備史官取材徵實無所點竄隨蒙欽命翰林院待詔宋啓明中書朱正色守催實以私家作事孑身獨力侵尋歲月不自知其罪莫逭也但臣有刪繁舉要之義兹四十八年留中之疏有事因疏而傳言不以人而廢凡關於國本藩封人材風俗河渠食貨吏治邊防議論精鑿可為後事師者别為選擇倣史贊之例每篇系以筆斷而其他請朝講請祭祀請起遺佚請罷礦稅請下章奏請補廢官請蠲內帑昔之所急章滿公車者皇上勵精圖治皆見施行今之謀國尤有進於此者略存一二而已共四十卷目録一卷别表進呈外抑史之所重者筆削耳善人勸焉惡人懼焉所係匪細故也每朝纂録於三品以上大臣皆有小傳寂寥數行衮鉞斯在如世廟實録於郭希顔胡宗憲唐順之等多有貶詞未協輿論夫正史所書不公則私史之所記益雜何以起信於萬世哉計四十八年之中大臣當立傳者何止百數雖三長之史詞苑如林然生既後時莫詳本末竊見南京太常寺卿李維楨出入四朝囊括百代且與諸臣同朝同世習見習聞若就陪京之日歷抒腹笥之春秋其文直其事核非大典之光哉臣又聞司馬光纂資治通鑑受詔得自徵辟故劉恕范祖禹為之佐前後十九年其書始成成祖朝纂修性理大全所聘名流百餘人不以為濫况兹實録比於通鑑性理孰重孰輕而神祖作養之史材皇上掄簡之髦士顧多逸於事外刻印銷印聖人無我賜環賜玦又何成心臣一念朴忠所日幾幾望之者也至臣五技已窮二豎相迫中道乞骸情無矯飾乞敕下吏部允其休致自此與含哺鼓腹之民戴堯天而永永矣倪元璐薦黃道周疏奏為學行第一詞臣宜留史局微臣自揣不如懇恩換職以全器使事臣聞常才易得竒士難求故席前宣室有吾久不見之言賦奏上林興安得同時之歎彼皆中主有此勤拳况以陛下理學文明首出千古龍雲道合適有其人而坐使淹沈實可惋惜伏見原任右春坊右中允今聽降黃道周學行雙至今代所稀觀其嫉俗多忤至清絶塵禁近十年日益貧寂瓶鮮儲粟厨或無煙此皆中朝所共知信執母之喪廬墓摧毁里衆見者並云會閔復生其學原本六經博極羣史旁串百氏澤於仁義所為文詞宏深竒典上凌數代西漢而後莫有其傳然又精洞時冝務為經世有用之學自天文歷算禮樂名法邊籌財賦往代今朝典常興革出其胸中悉有成謀陛下試以清宴之暇召見文華或給筆札使條所蓄自可倚馬萬言坐躋董賈如道周者誠天下竒才天為陛下生此一人使之仰佐天章一代不可謂之偶然也在今一時聞臣此説者或以為疑所謂世人貴耳賤目若道周死後數十年天下之推之必有甚於臣言者臣雖愚悖豈敢以身觸雷霆過情奬物即陛下釋之不誅臣亦懼為後世所非笑所以推舉本繇至誠耳道周前因疏救舊輔錢龍錫忤旨降調未幾而其言卒行是則陛下之知道周久矣當道周抗疏之時同輩聞之並為危栗而道周以為惟聖主可與忠言侃然進説此誠至難臣謂陛下今日用人惟當取其伉直有氣者今人多畏禍重其身家又間者中使銜憲四出動以威倨上官之體加於庶司臣懼海內士大夫之氣必化為繞柔陛下又可不式怒蛙重摧折之乎然自道周既獲罪而一時論者遂有摘其試録議及科場以其經史為子書以其精詳為孟浪此可歎也又臣仰窺陛下勞於求賢睿懷孜急曰安得不貪財不愛官不徇情面實心任事之臣而用之然以臣所知道周而外又有如原任順天府尹劉宗周清恬鯁介正類道周而宗周居尹釐之職盡力尹釐道周守文史之官致精文史以此二臣仰符側席猶圭璋之合而今宗周既以骯體投間道周亦以蹇諤承貶天下本無人得其人又不能用如此安望天下有為陛下奮其忠能者乎此皆諸臣之過非昧則忮不以告陛下耳臣聞制世之道非有他端其上用必當材使必稱器其下愚者遜智拙者推能則天下自治臣自量庸劣遠遜道周從道周蒙譴以來臣內愧氣失因其有科場事未結縮默至今頃經部覆奉旨是臣披胸見心之日矣誠以臣在詞垣有如鳬鴈若道周者使之大承顧問小效編摩必有補益度越時賢陛下幸聽臣言還道周原官而出臣於外承道周所應降官級此猶棄碔玞得良玊也昔孔璋請為李雍代死栁宗元以劉禹錫母老願以栁易播今道周所遭不至死徙而其才又遠過李劉即臣自處亦實羞出孔璋宗元之下且臣自為聖朝用人及史局需材之計非為道周惟聖明垂察庶吉士洪武六年詔天下鄉貢舉人罷會試開文華館禁中命選舉人年少質美者肄業其中河南解額內選張唯等四人山東選王璉等五人并各省共一十七名上召見便殿親命題賦詩稱旨皆擢翰林編修命入堂中讀書詔儒臣宋濓桂彥良等分教之永樂三年正月上命學士解縉等於新進士中選材質英敏者俾就文淵閣進學至是縉等選修撰曾棨編修周述周孟簡庶吉士楊相劉子欽彭汝器王英王真余鼎章敞王訓柴廣敬王道熊直陳敬宗沈升洪順章材余學夔羅敬汝盧翰湯流李時勉段民倪維哲袁天祿吳紳楊勉二十八人入見上諭勉之曰朕不任爾以事文淵閣古今載籍所萃爾各食其祿日就閣中恣爾玩索務實得於已庶國家將來皆得爾用不可怠惰以負朕期待之意時庶吉士周忱自陳年少願進學上喜曰有志之士也命增忱二十九人遂命司禮監月給筆墨紙光祿給朝暮膳禮部月給膏燭鈔人三錠工部擇近第宅居之宣德五年命楊士竒等曰新進士多年少其間豈無有志於古人者朕欲循皇祖時例選擇俊秀十數人就翰林教育之俾進學勵行工文章以備他日之用卿等可察其人選文詞之優者以聞於是士竒等選薩琦逯端葉錫陳璣林補王振許南傑江淵八人以聞上命行在吏部俱改為庶吉士送翰林進學給酒饌房舍月賜燈油鈔悉如永樂之例復命兵部各與皂𨽻上又顧士竒等曰後生進學必得前輩老成開導之卿等日侍左右無餘間其令學士王直為之師常提督教訓所作文字亦為開發改竄卿等或一兩月或三月一考閲使有進益如一二年怠惰無成則黜𢎞治六年準奏每科一選不拘地方不限年歲待進士分撥辦事之後行令有志學古者各録其平日所作古文十五篇以上限一個月裡投送禮部禮部閲試訖編號分送翰林院考訂文理可取者按號行吏部該司仍將各人試卷記號糊名封送內閣照例於東閣前出題試之每科取選不過二十人留不過三五人嘉靖八年己丑大學士楊一清題請教庶吉士官帝曰改選庶吉士命官教習乃太祖之制在當時固為盡善邇年以來祗為大臣市恩無益於國此後不必選留一體除用中外諸臣果有學行卓異者吏部訪奏入翰林以備擢用方獻夫上言館閣乃儲材之地賢相名臣多出其間邇年以來選留不能盡公所教或非其道樹恩立黨於國無益誠如聖諭所云者吏部訪收信得其要編修檢討於主事御史給事中評事中書行人博士助教推官知縣學官進士內訪補講讀修撰於郎中員外都左右給事寺正寺副太僕光祿丞同知知州通判內訪補其學士諭德庶子贊善洗馬等官亦論資序遷庶事體畫一經久可行帝從之崇禎四年辛未考館後因內閣票擬疏中有何况二字誤以為人名票出上摘而詰讓之遂有翰林內外兼用之旨甲戍丁丑皆不選館以俸深候考知推選授編檢等官至庚辰廷試召對親拔趙玉森等授以檢討命蔣德璟王錫衮教習之崇禎癸未十一月十五日召輔臣陳演蔣德璟魏藻德來德政殿先是集九卿科道於文華殿令舉堪任户兵二部官是日出各臣薦單欲用何楷為兵部堂上官及襄城伯密奏欲鄭芝龍捐餉等事畢陳演奏今日閲考館試卷業奉明旨矢公矢愼臣等會同吏禮二部在東閣設立髙皇帝牌位同誓如有私徇天誅地滅上默然者久之曰須選得文行兼優的方好演對士先器識而後文藝上曰正是演奏今次俱經各九卿翰林科道開送必有學行的方敢開來今既糊名只憑文取進上曰也有私記德璟奏既糊名實無從知上曰即知亦何妨魏藻德奏前工部尚書范景文有疏奉旨兩畿並重今考廣西只二人雲貴亦只二人如照壬戍例則廣西一名雲貴一名似太濫或照工臣奏添北直一名璟奏且看廣西雲貴卷如何如不佳即以一名增北直上曰然是科北直與南直俱四人大學士徐溥疏云庶吉士之選自永樂二年以來或間科一選或連科屢選或數科不選或合三科同選初無定限每科選用或內閣自選或禮部選送或會吏部同選或限年歲或拘地方或採譽望或就廷試卷中查取或别出題考試亦無定制自古帝王皆以文章關乎氣運而儲才於館閣以教養之本朝所以儲養之者自及第進士之外止有庶吉士一途凡華國之文與輔世之佐咸有賴於斯然而或選或否則有才者未必皆選而所選者又未必皆才若更拘於地方年歲則是已成之才或棄而不用而所教者又未必皆有成請自今以後立為定制一次開科一次選用待新進士分撥各衙門辨事之後俾其中有志學古者各録其平日所作文字如論䇿詩賦序記之類限十五篇以上於一月之內赴禮部呈獻禮部閲試訖編號封送翰林考試其中詞藻文理有可取者按號行取夲部仍將各人試卷記號糊封姓名印送照例於東閣前出題考試其所試之卷與取投之文相稱即收以預選若其詞意鈎棘而詭僻者不在取列中間有年二十五以下果有過人資質雖無宿搆文字能於此一月之間有新作五篇以上亦許投試若果筆路頗通其學可進亦在備選之數每科不必多選所選不過二十人每選不必多留所留不過三五輩如此則所選者多是已成之才有所論撰便堪供事將來成就必有足賴者如是則預列者無徇私之弊不預者息造言之謗臣等皆出自此途引進後賢儲之館閣以報國厚恩乃其職也萬歷中管志道疏二祖始選庶吉士皆令肄業文淵閣讀中祕書常親視校試驗其進修務在通逹國體薰陶德性以儲異日之用自正統以後掄選多非出自聖意而從閣臣議請舉行亦不得讀中祕書而以唐詩正聲文章正宗為日課不知將來所以備顧問贊機密者果用此糟粕否乎事固有以祖宗宏深之美意而翻成末流偏重之敝習者此舉是也臣謂自今以後如復選庶吉士則當求二祖作養之初意若止如今日之所教所習則莫若停止此途一二十年翰林員缺亦如先朝將各衙門之有器識者對品改入假以歲月明習典章何患侍經筵典制誥及纂修校士之乏人哉嘉靖中會曠十餘年弗選聖慮良遠且今以偏重而暫止後以特旨而復開猶善法祖宗鼓舞豪傑之便計也崇禎初給事中瞿式耜疏竊聞昔賢云天序日月星辰以自光聖人序爵祿以自明天子之置三公蓋法上天之三光也臣嘗稽古之三公論道而不與政漢之三公治事而不論道惟我朝之設閣臣既論道而又與政入則論思啓沃關君德之汚隆出則定事決疑首百官之善敗任莫重焉然臣見近日政府立身非禮公論共排譏刺滿身顔甲以出橫口潑詈等於市徒竊嘆官至揆席豈復更有加之者縱不為一身名節惜獨不為官常愛大體乎反覆尋繹其故蓋由發軔之途不清樹藝之種不愼也臣考國初宰相不專拔於翰林纍朝相沿途徑猶寬至世廟以來則枚卜之舉大抵俱屬翰林矣是庶常之官即他日平章軍國之人今日即愼選行修言道之士尤恐他年晚節未愜初盟豈有始進之時先叢物議而異日立朝能為國家樹光明俊偉之業者臣初入班行即聞長安自殿試之後其介然不茍之士誠不乏人而一種躁競之夫日夜講求謀所以必得館選之法鑽求百出敗檢難言或機關預設妄希張鷟之青錢或根柢先容冀受和凝之衣鉢又排人益己無風作波伏影射於含沙利相持於鷸蚌甚有以心期共許之友祗以睂睫之得失顯作猜疑隂相傾軋世風如此良可感嘆孔子曰尊賢則不惑敬大臣則不眩以翰林而漸臻講讀師傅不可謂不尊矣以翰林而馴至宅揆亮采不可謂不敬矣夫豈已惑未清而能清紫宸之惑已眩已甚而能定國是之眩者乎以是人而當是非溷淆之日必將佐非亂是主持之擔誰肩以是人而當隂陽相戰之時必將扶隂抑陽燮理之能誰寄凡諧臣媚子之態翻出於禮宗而稱功頌德之詞遞見於元老皆此患得患失之人貽之也且今之時何時也聖人出御天地清寧值龍飛之首科尤萬方之瞻仰豈可不蕩一時之陋習端始進之臣心臣謂今年館選宜照殿試法皇上臨軒而試之令考試諸臣即於御前定其去取正額之外多備副卷以聽聖裁其彀外諸卷亦當盡數函呈間有遺珠不妨特拔凡若此者所以抑躁進之人知此番之試無畫然必得之法又所以來高潔之士使知聖天子之雅意求賢當振筆一吐胸中之竒不必拂衣遠引避館試如浼也其試士之題臣愚謂冝倣古制考以今日吏治民生經邦強國之䇿不必盡依舊例以風雲月露之詞費精神於無用也濟濟多士豈無有董仲舒賈誼之流以應皇上眷求者乎臣考洪武癸丑命翰林張唯等入禁中文華肄業詔宋濓為之師高皇帝聽政之暇輒取其文親評優劣可見選俊儲才簡自帝心聖祖已有行之者矣又古者左史記言右史記動凡以天子一時言動即萬世法程慮或湮遺故以史臣必專其事凡天子召見羣臣商議時政則史臣必隨之今皇上再舉召對海宇欣瞻而臣等侍從之臣反有未能詳知者雖閣部大臣於陳謝疏中微有條敘亦似約略言之伏乞今後凡遇召對即令史臣二人簮筆入侍記注詳核隨於次日具疏奏呈一面發抄一面宣付史館庶四海快若親承而萬世垂為永憲并望俞詔施行大學士徐階示新庶吉士條約一君子之道必本諸身今朝廷作養諸士固將責以治平之業使非卓然以古聖賢為師修身以立其本他日何由措諸政事光佐治平故諸士宜致力於此辨義利審好惡使此心純乎天理之公庶幾他日事業有可觀者一文章貴於經世若不能經世縱有竒作已不足稱况近來浮誕鄙庸之辭乎故諸士冝講習四書六經以明義理專觀史傳評隲古今以識時務而讀文章正宗唐音李杜詩以法其體制並聽館師日逐授書稽考庶所學為有用其晉唐法帖亦須日臨一二副以習字學一每月館師出題六道內文三篇詩三首月終呈稿斤正不許過期初二日十六日仍各赴內閣考試一次一入館之後各冝謝絶人事專心學問以求進益附記學士李東陽程敏政教庶吉士至院閲會簿悉注病假而去乃賦一絶云回廊寂寂鎖齋居白日都消病厯餘竊食大官無寸補瀛洲亭上勘醫書館選散授不拘內外如永樂乙未沈晹知縣戊戍莫圭孔友諒知縣宣德癸丑傅綱知縣正德甲戌王邦瑞知州嘉靖丙戍李元陽王格張鐸連礦知縣己丑孫光輝推官楊祐安如山知州其為行人評事者不可勝計春明夢餘録卷三十二
