body:
  text: 春明夢餘録卷二十七吏部左侍郎孫承澤撰光祿寺光祿寺在皇城東華門內初為宣徽院尚食尚醴二局繼改光祿寺掌祭饗宴勞酒醴膳羞之事辨其名數會其出入量其豐約以聽於禮部凡祭祀請視牲進飲福酒胙凡薦新共品物凡祭葬共祭物凡牲果嘉蔬移上林苑共不給市諸民視時估十加一凡市直季支凡貢獻果鮮厨料省受之凡器皿移工部若募工兼作之嵗省其成敗凡宴待四方貢使差其等共之凡傳奉宣索籍記而覆奏之監以科道官各一人其屬四署曰大官曰珍羞曰良醞曰掌醢而司牲司牧二局𨽻焉周官天官膳夫上士二人中士四人下士八人府二人史二人胥十有二人徒百有二十人掌王之食飲膳羞以養王及后世子即今光祿寺官之職也寺有四署曰大官即周官庖饔之任曰珍羞即周官籩人之任曰良醞周官酒人是也曰掌醢周官醢人是也周官凡膳夫甸師酒正宫人之屬皆總于太宰蓋太宰之佐王將與之講論治道而經綸邦國則內必有以養其心外必有以養其身以一人而治四海則必以四海而奉一人若夫奉養有節而交于萬物有道則自有九式存焉而侈非所慮也故王日一舉一太牢也朔日加食一等則二太牢也齋之日三舉則三太牢也蓋朔之聽政勞於常日於是而有加於常食祭祀將以致精明之德自強於禮而交於鬼神不可以不備其養于是而又有加于朔反覆膳夫一官其所以奉至尊而助體氣之養者一何其至也必品嘗食乃食所以謹其節必侑徹以樂所以導其和必奉膳而贊祭所以起其敬必受祭僕司士之福與摯所以養其德元人王惲云有旨講究光祿寺職掌寺與卿漢官也應劭曰光明祿爵勳功也言光祿典郎謁者虎賁羽林舉不失德賞不失勞故曰光祿勳郎中令秦始置掌宫殿門户及諸郎在殿中之侍衛者故曰郎中令漢因之不改北齊隋唐止掌膳許左丞衡作新定官制圖大抵以唐為則品從略與金同洪武初禮部尚書牛諒上所考定進膳禮奏言古禮凡大祀齋日宰犢為膳以助精神上曰太牢非當用之物致齋三日而供三犢所費太侈夫儉可以制欲淡可以頤性若無節制惟事奢侈徒增傷物之心何益事神之道諒曰周禮是古人所定非過侈也上曰周官之法不行于後世多矣惟自奉者乃欲法古其可哉洪武元年正月初八日諭今後但係光祿寺買辦一應供用物件比與民間交易價錢每多十文且如肉果之類及諸項物件民人交易一百文一斤光祿寺買辦須要一百十文隨物貴賤每加一分賣物之人照依時估多取十文利息宣德五年二月行在光祿寺厨士告言光祿竊減外國供給之弊上命行在刑部侍郎施禮執而罪之且諭禮曰光祿寺之弊不止此祖宗以來飲食供給皆有定規比聞擅自增減應給之人率不能得得者率非應給之人惟虛立案牘掩人耳目宜究治之因顧侍臣曰毋謂飲食細故不干大體華元殺羊享士羊斟不與遂致喪師勾踐投醪于江與衆共飲士心感悅遂成伯業以此而論所係非輕寺額設銀二十四萬先時止用十二萬餘至正嘉時用至三十六萬猶稱不足嘉靖中厨役用四千一百名嘉靖中光祿嵗用銀計三十六萬上疑有乾沒乃諭內閣今無論祖宗時兩宫大分盡省九嬪僅十餘宫中罷宴設二十年矣朕日用膳品悉下料無堪御者十壇供品不當一次茶飯朕不省此三十餘萬安所用也閣臣對祖宗時光祿寺除米豆果品外徴解本色嵗額定二十四萬彼時該寺嵗用不過十二三萬節年積有餘剩後加添至四十萬近年稍減乃用三十六萬其花費情弊可知而冒費之弊有四一傳取錢糧原無印記止慿手票取討莫敢問其真偽一內外各衙門關支酒飯或一人而支數分者或其事已完而酒飯尚支者一門禁不嚴下人侵盜無算一每嵗增買磁器數多臣查得會典內一欵凡本寺供用物件每月差御史一員照刷具奏內府尚膳監刋刻花攔印票遇有上用諸物某日于光祿寺取物若干用印鈐蓋照數支領進用本寺仍置文簿登記嵗終會計稽查此一例不知何年停罷若查復舊規則諸弊可革矣乃切責該寺官而添差御史月籍該寺支費進覽神宗朝宫膳豐盛列朝所未有不支光祿錢糧彼時內臣甚富皆令輪流偹辦以華侈相勝又收買書畫玉器侑饌謂之孝順上惟嵗時賞賜而已至崇禎禁止一日欲食米糖內臣奏令御膳監製進上問一料所費幾何對曰得銀八兩上以銀三錢令赴市買之須臾捧一盒至上分給各皇子公主笑曰此寧須八兩耶崇禎十五年春光祿寺支用皇帝膳每日三十六兩每月一千四十六兩厨料在外又藥房靈露飲用粳米老米黍米在外皇后膳每日十一兩五錢每月三百三十五兩厨料二十五兩八錢懿安皇后同承乾皇貴妃翌坤貴妃兩宫每月各一百六十四兩皇太子膳並厨料每月一百五十四兩九錢定王永王兩宫每月各一百二十兩光祿寺每月册奏一切內外諸費約用二萬餘兩崇禎十六年癸未九月上諭內閣輔臣修省應有實政庶幾挽回氣運仰希天慈如賊冦失事各案應速結戰守有功應速敘此二事全賴先生每秉公擔當如錢糧不足亟宜節儉先自朕躬始若祀典豐潔仍舊不敢議減外朕久服浣濯之衣此無可議惟日用膳品減去一半各宫分減去十分之四宫女內員桌銀減去十分之三通俟平定之日照舊在外衙門有可節裁者亦著照此推行再如兵火焚殺之酷災變死亡之慘朕皆不能拯救消弭殊愧君師之位今又添嬪御之奉乃是增過增慚之舉其選擇之事竟宜停止此亦節儉之一事其章疏沉壓過多朕不能朝上夕下稽誤政幾皆朕之過當極力披閲發行先生每即擬旨來行寺中典故光祿卿蔚能朝邑人於成化初以吏員為禮部侍郎管光祿卿事盡心職事每宴會躬自檢視必求豐潔在光祿三十年未嘗持一臠還家嘗率其僚請清查入內供應器皿有旨逮問能謂衆曰上怒不可測某老矣請獨任之諸公方嚮用不以相纍也既而獨受責降調官南京退無後言鄭宗仁於正德中以太僕卿調光祿卿凡供應俱照𢎞治初年例日省百金上幸光祿寺樓呼之為節儉管家永樂十三年十二月初十日行在光祿寺卿張泌等謹奏為不遵舊制事切照洪武年間凡遇筵宴禮部奏請合宴人數坐𣲖本寺造辦茶飯完備鴻臚寺堂上官提督司賔司儀分擺班次序班搬放茶飯桌椅斟酒遞湯已有成規近年以來四方使臣朝貢及遇節令筵宴序班止是殿內斟酒遞湯其餘搬放茶飯桌椅斟酒遞湯等項俱係本寺整理臣等纍對鴻臚寺官説知舊制事例其寺丞丁鐸髙慶司賔司儀王神等視為泛常略不究心照例改正又不分擺與宴官人等依品序坐致使攙越擠匝難以供應非惟背舊制乖禮儀實乃故違舊制俱合拏送法司問罪緣係京官未敢擅便奉聖旨且記他每一遭都察院著御史看著今後再不依舊制時拏了問當即又奉聖旨但有攙越班次的再不許他入宴正統二年諭比聞進宫中食物所用器皿扛索十還一二重復造用甚費財擾民今後凡進食物必須印信揭帖備書器皿扛索之數與收領內官姓名尚膳監如數還之不足即以奏聞敢隱瞞扶同者悉坐以罪復敕宮中六尚司知之隆慶初詔罷寶坻縣等處採取魚鮮自今薦新上供俱令光祿寺備辦毋得奏遣內臣著為令萬歷二年光祿寺積米二十七萬石倉厫滿盈奏于東安門外買房一區改為外倉明初筵宴祭祀凡茶食果品俱係散撮至天順後始用粘初每盤髙二尺用荔枝圎眼一百二十斤以上棗柿二百六十斤以上舊制各衙門堂上官皆支光祿寺酒饌正統七年以光祿寺卿奈亨言始罷之六科給事中辦事科中每日支用如故寫抄監生每人日給米一升五日一支故事自冬至後至春日殿前將軍甲士賜酒肉名曰頭腦酒琉璃厰有牧羊地一十三頃四十一畞舊屬尚膳監後以光祿寺卿趙錦請以羊發有司而地遂荒廢朝廷每賜臣下筵宴其器皿俱各領回珍貯之以為傳家祭器國子監監生寫倣紙每季移送光祿寺作麵袋寺有鐵梨木酒柞可盛醞三十石洪武中籍沒沈萬三家物永樂移置寺中吏部選官于棕棚賜宴必用糯米糕一盤永樂朝吏部説選正值上用饌掇御前米糕賜之命光祿寺以為例春明夢餘録卷二十七
