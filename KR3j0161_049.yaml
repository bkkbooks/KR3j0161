body:
  text: 春明夢餘録卷四十九吏部左侍郎孫承澤撰通政使司通政使司在太常寺南東向初置察言司設司令掌受四方章奏尋革十年始置通政使司正三品設通政使左右通政左右參議經厯司經厯知事職專出納帝命通達下情關防諸司出入公文奏報四方臣民實封建言陳情伸訴及軍情聲息災異等事成化二年增設謄黃右通政列銜本司不與司事後革洪武十年七月置通政司掌出納諸司文書敷奏封駁之事時官制初立上重其任頗難其人刑部主事曾秉正新擢陜西參政未行遂命為通政使以應天府尹劉仁為左通政諭曰壅蔽於言者禍亂之萌専恣於事者權姦之漸故必有喉舌之司以通上下之情以達天下之政昔者虞之納言唐之門下省皆其職也今以是職命卿等官以通政為名政猶水也欲其常通無壅遏之患卿其審命令以正百司逹幽隱以通庶務當執奏者勿忌避當駁正者勿阿隨當敷陳者勿隱蔽當引見者勿留難無巧言以取容無苛察以邀功無讒間以欺罔公清直亮以處厥心庶不負委任之意按通政即古之納言舜典帝曰龍朕堲讒說殄行震驚朕師命汝作納言夙夜出納朕命惟允朱子曰納言之官命令政教必使審之既允而後出則讒說不得行而矯僞無所託矣敷奏復逆必使審之既允而後入則邪僻無自進而功績有稽矣周之內史漢之尚書魏晋以來所謂中書門下省皆此職也菽園雜記通政司所以出納王命為朝廷之喉舌宣逹下情廣朝廷之聰明於政體關係甚重也洪武永樂間實封皆自御前開拆故奸臣有事即露無幸免者自天順間有投匿名書言朝廷事者於是始有關防然其時但拘留進本人在官候㫖㫖出即縱之未嘗窺見其所奏事也後不知始于何年乃有拆封類進及副本備照之說一有訐奏左右內臣及勳戚大臣者本未進而機已泄被奏者往往經營幸免原奏者多以虛言受禍祖宗關防奸黨通逹下情之意至是無復存矣可勝歎哉京朝官封事自㑹極門內臣收進其餘皆自通政司入惟各邉總兵官都指揮指揮等官差來奏事人員鴻臚寺序班連本連人引進俟本進收訖該管序班引出收在本寺宿歇次日早天明放出每遇常朝通政司奏事原不拘起數寓圃雜記云自太祖相傳列聖臨朝每至日昃不遑朝食惟欲逹四聰以來天下之言英宗以幼冲即位三閣老楊榮等慮聖體易倦因創新制每日早朝止許言事八件前一日先以副本詣閣下豫以各事處分陳上遇奏依所陳傳㫖而已英宗既崩三臣繼卒無人敢復祖宗之舊至天啓時惟奏二事及余於崇禎之十年間侍班猶見奏四事格套相沿無禆實政至通參一官初制吏部㑹同禮部考授後亦惟吏部按資升授昧初制矣洪武中通政使門下有一紅牌書云奏事使當時恐下情不得上逹執此牌可以直入內府守衛等官不敢阻四方奏報雨澤章疏舊皆貯通政司司臣有欲送科臣收貯者仁宗曰祖宗所以令天下奏雨澤者蓋欲前知水旱以施恤民之政此良法美意今州縣雨澤章奏乃積於通政司上之人何由知又欲送給事中收貯是欲上之人終不知也如此徒勞州縣何為自今四方所奏雨澤至即封進舊制題本紙四葉一接末一接不用四葉盡紙所長每葉六行每行二十字比奏本頗大具年月獨占一葉本中字只許占年月上一行過二行則年月􅀢書一葉洪武十七年二月定諸司文移紙式凡奏本紙髙一尺三寸一品二品衙門文移紙三等皆髙二尺五寸長五尺為一等四尺為一等三尺為一等案驗紙二等皆長二尺五寸髙一尺八寸為一等二尺為一等三品至五品衙門文移紙髙二尺長一尺案驗紙髙一尺八寸長二尺五寸六品七品衙門文移紙髙一尺八寸長二尺五寸案驗紙髙一尺六寸長二尺八品九品與未入流衙門文移紙髙一尺六寸長二尺案驗紙髙一尺四寸長一尺八寸不如式者罪之章奏有正有副正本御覽副本啓東宫者實封同進無東宫則不用副奏疏之式揭其要别書於後謂之貼黃外封所書事目日月謂之引黃崇禎元年上諭諸臣章奏倣古人貼黃之法自撮節要粘原本進覽以便執要從輔臣李國􅕠之請也章疏貼黃有三種一則宋人貼黃乃於狀劄中未了事復貼黃以增入如尺牘中又言是也一則本朝文武升除事故則録底本藏於內府即詹事通政樞郎所司清黃是也一則本朝制於賀謝等表上面貼黃帖一方如印大帖下用印黃帖上所書如聖夀寫進賀聖夀表文正旦寫進賀正旦表文冬至寫進賀冬至表文謝恩寫進上謝恩表文末後年月日上亦印封皮上用黃帖上所書如前黃帖下用印印下寫具官臣某進謹封於上進謹封字上用印是也近日貼黃則書其疏中大要節文又一體矣然軍機疏往往不同以無暇及也崇禎元年上諭各衙門章奏未經御覽批紅不許報房抄發泄漏機密一概私揭不許擅行抄傳違者治罪上傳章奏冗長不便省覽以後各衙門條陳章疏務要節明其字不出一千如詞意未盡不妨再夲具奏著通政司申飭上傳內閣夲內凡遇天地祖宗列后字樣皆要出格朕不敢與並列卿等傳示各衙門欽奉遵行附載崇禎十三年監生凃仲吉疏伏惟皇上好問好察過於古先哲王惟恐一夫失所為聖德纍故極芻蕘之言未嘗不樂聞而採擇焉臣不自量以前月十五日具奏為明主可與忠言草野義甘受罪懇祈天心轉圜以慰天下萬世一疏中言黃道周至清至勤真忠真孝及其言戅招尤因薦被逮廷杖殘息加以圜幽竊謂皇上必欲誅結黨敗類之臣則道周非其人必欲誅孤行獨立之臣則道周當死此通國至愚所共心傷非獨臣草野之私見也臣聞嚴命匍匐萬里願從葉廷秀之後冒請天誅使臣疏得上逹皇上震怒殺臣杖臣繫臣俱甘如飴不意通政抑臣之疏三格不封若有所為而然者不曰臣疏不當封而曰寬以俟之可也不曰臣言無當而曰惟存此議論可也是司臣良心未泯亦未嘗以臣言為謬但畏罪耳臣復激切懇封而司臣辭色俱厲至令衙役辱臣不許臣進夫臣書生雖微志頗以古人自任亦成均教育以為異日效忠於朝廷建不朽之業者司臣爵位雖尊不過患得失保祿秩耳以一朝之權而阻千秋之論豈不輕朝廷羞當代之士耶况臣所言有禍無福有死無生是天下所心哀而不敢出口者非敢效一班衣冠敗類及紛紛市棍之徒藉上書希圖幸進者比司臣何不之審耶嗟乎在廷懼罪不惜賢才而使書生冒死惜之為大臣者當慚愧無地反以出納之寄而撓忠義之心使聖代闢門明目逹聰之典壅閉實甚然臣頭可斷臣疏不可抑也伏乞皇上取臣原奏賜覽即立殺臣臣無所恨矣亦無虛臣犬馬齒二十七讀書報國之志也春明夢餘録卷四十九
