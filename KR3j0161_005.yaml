front:
  text: 欽定四庫全書
  hash: sha256:64d9ff2e7643d8cd3464e7f4c9e75c7d6d85eb6ee80c540d6dcbeeab187b9ddc
  markers:
  - {type: page-break, offset: 0, content: '', id: KR3j0161_WYG_005-1a, image: WYG0868/WYG0868-0036a.png}
body:
  text: 春明夢餘録卷五吏部左侍郎孫承澤撰城坊京師雖設順天府兩縣而地方分屬五城每城有坊中城曰南薰坊澄清坊仁壽坊明照坊保泰坊大時雍坊小時雍坊安福坊積慶坊東城曰明時坊黃華坊思城坊居賢坊朝陽坊南城曰正東坊正西坊正南坊宣南坊宣北坊崇南坊崇北坊西城曰阜財坊金城坊鳴玉坊朝天坊河漕西坊關外坊北城曰崇教坊昭回坊清泰坊靈椿坊登祥坊金臺坊教忠坊日中坊關外坊每城設御史巡視所轄有兵馬指揮使司設都指揮副都指揮知事後改兵馬指揮使設指揮副指揮革知事增吏目選於吏部昔宋以四廂都指揮巡警京城神宗置勾當左右廂公事民間謂之都廂元設警巡院三至元四年省其一止設二院分領坊市民事即今之巡城察院也王瓊京師捕盜事宜議竊議得京師內外先年設立五城兵馬指揮使職專禦風火察姦盜及錦衣衛官校巡警夜禁緝捕盜賊監察御史巡城禁革姦弊在外通州良鄉等處各設有軍衛委官巡捕其後通州等處又設分守涿州良鄉又設守備又三年一次差御史錦衣衛官分路巡捕𢎞治元年為因盜賊生發奏準於三千營選撥官軍一百員名於彰義門外義井兒及良鄉縣并清河髙碑店四處每處二十五名隄備盜賊正德初年京城內添設把總官二員委官八員各分地方每委官一員管領馬軍二十四名步軍二十五名共四百員名京城外添設把總官二員每員領有馬官軍五十員名委官七員每員管領馬軍六十名共四百二十名正德十年會議京城內每委官一員各添馬軍二十五名步軍二十五名共軍七百九十二名馬四百匹京城外每委官一員各添一百名共軍一千一百二十名馬一千一百二十匹把總并委官俱一年一換城外把總該領官軍全給盔甲每巡馬軍給與一半八十副今年又奏差工部右侍郎趙璜專一整飭武備挑選河間等衛舍餘交與分守通州都指揮袁傑及涿州守備崔澄亦添發官軍各給與馬匹嚴謹巡捕壩上良鄉等處正係袁傑崔澄等該管地方立法不為不密責任不為不專但京城內外人煙湊集遊食者多壩上良鄉等處軍民艱窘差役繁重以此盜賊隨捕隨發難得盡絶自去年本部會官議添巡捕官軍數多定擬條格賞罰嚴明又給盔甲火器馬匹草料以此一年之間把總官捉獲強盜二百餘名錦衣衛坐委官校及各該緝事衙門亦皆緝捕數多奈何世情艱難財重命輕致厪聖慮屢降明旨著落官軍用心挨拏未得寧息今又奉旨令臣從長議處停當奏來定奪臣等愚見若欲從長計議處置停當必先撫恤軍民輕徭薄賦人得安生則盜賊自少前項節年議處捕盜事宜已極周密今若不先撫安專立嚴法搜捉擒捕誠恐法網太密致有激變前代漢武帝時為因山東盜起遣官衣繡持節發兵擊斬至萬餘級盜賊愈滋至不可禁正德四年添設巡捕御史帶領家眷專督捕盜法網嚴密賊勢愈熾凶惡之徒乘機倡亂肆行劫掠至動邊軍入勦逾年始平是其明驗以故捕盜之法固不可寬縱亦不可太嚴今將弭盜根本及先年捕盜事件開查明白合無照依𢎞治元年事例本部會同錦衣衛并六科十三道掌印官再行計議應否施行奏請定奪正德十一年十二月十三日具題奉旨是這先年捕盜事宜恁每還會官議處了來説左都御史孫丕揚議久御史巡城之任疏臣觀居重要地孰五城最哉巡視御史故事不專為喧閙設者事有姦弊依法送理正統間例也禁約賭博緝捕盜賊坐鋪火夫究問優免成化間例也查問九門官吏多勒客商財物𢎞治間例也訪察參奏打點饋送嘉靖間例也至於禁止科斂詐騙裁抑豪橫姦頑安恤孤獨良善懲創奢侈遊戲舉劾兵馬善惡何莫非御史事哉臣謂專責成便御史必用實授替差必劄一年憲度必期力舉務相率而專心城務以遏此城社之狐鼠救此輦轂之瘡痍而又省其外班以杜請託立為歲册以報滿政斯都人蝟冗之穀絲蠶食之輻湊可冀彈壓之有資矣附載元人王惲彈兵馬司文切見在都兵馬司設馬步軍五百人係專一警捕衙門自去年至今年三月終強竊盜賊計六十餘起致有殺傷事主劫掠財物及本司公廨下為盜者蓋當該官兵不為用心滋多如此三限不獲行下取招並不回報其都轄上司縱令滅裂虛作行移亦不申明賞罰是作過之人無法可畏教之公行也都城輦轂之下庫藏倉廩諸所在萬一窺竊深繫利害又間有敗獲賊徒除事關權勢不能歸結者才方申上自餘無問輕重輒便鞫問斷遣豈惟侵司越職竊弄威權但恐中間姦弊日滋實為事害兼是司自來並無囚繫鞫問斷遣之理今後合無令兵馬司據應獲盜賊略行取問即便解府歸結施行外據失盜起數已獲者賞未獲者罰如此庶望上無縱恣虛行之失下革違錯自專之弊賞罰既明民知所畏京畿之間不待歲月作過之人將自消弭據此合行糾呈春明夢餘録卷五
