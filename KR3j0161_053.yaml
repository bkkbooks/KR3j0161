body:
  text: 春眀夢餘録卷五十三吏部左侍郎孫承澤撰太僕寺太僕寺在皇城西乃元兵部舊署初設羣牧所牧飬馬匹洪武六年始置太僕寺從三品在滁州設卿少卿寺丞典簿等官職專馬政三十年置北平及遼東山西陜西甘肅等處行太僕寺永樂元年改北平行太僕寺為北京行太僕寺十八年改稱太僕洪熙元年復稱北京行太僕寺正統六年定今名以原置在滁州者為南京太僕寺太僕古官掌牧馬之政令以聽於兵部少卿則分督京營馬若畿馬丞分理京衛若畿甸及山東河南六郡孳牧寄牧馬三年而更凡馬肥瘠登耗籍其毛齒而時省之三歲偕御史一人往印烙而差擇之選其良凡草場歲徴其租金國災祲出以佐市馬凡租金恩蠲或災蠲不得兼即蠲必轉移相抵不得虧軍賦而寺主簿勾省文移常盈庫征馬金貯焉凡馬政曰民牧曰衛牧曰京府寄牧凡牧地曰草場曰荒地曰熟地嚴其禁令而封表之凡牧人曰恩軍曰隊軍曰改編軍曰充發軍曰召募軍曰抽選軍皆籍而食之凡民牧人視其丁産而授馬種馬牡十二牝十八牡牝五歲而徴駒曰備用馬齊其馬力以給邉邉馬足寄牧於畿府而府甸土不宜馬及人民耗者征馬金凡馬駒十八年而免定頭駒重駒而籍之報駒有常期凡馬肥瘠登耗籍其毛齒而時省之三歲寺卿偕御史二人印烙選其良汰其羸劣凡草場歲徴其租金地畝十七樁朋十三災祲出之佐牧人市馬舊設寺丞十二員分轄各路孳生馬匹官給善馬為種率三牝馬置一牡馬每一百匹為一羣羣設羣頭羣副掌之牝馬歲騍馬一駒牧飼不如法缺駒損斃者責償之其牧地擇旁近水草豐曠之地春夏牧放遊牝秋冬而入寺印駒用種字俵用江字馬毛稀毨而齒少者老馬所育眼光照人見全身者其齒小照半身者滿十歲所照漸短其齒愈大驗其病否取毛附掌中相粘者無病粘少者有病周𢎞祖曰國朝領飬種馬南北直𨽻河南山東之民兩太僕寺總其事而御史稽察印烙之北數七萬南數三萬每歲五馬共俵解馬一匹赴京上納給各軍喂飬後又寄順天所屬州縣謂之寄飬馬匹山西陜西又設苑監飬於官上苑一萬匹中苑七千匹下苑四千匹陜西又有茶馬洮河西寧等衛畨族給金牌四十一靣該納差發馬一萬四千五十一匹給與茶一百萬斤取之四川保寧等府三年一次正德中都御史楊一清修整茶馬奏金牌之制久廢無從稽考止給茶易馬似互市云成化二年南直𨽻地方奏稱地不産馬暫收折色或三十兩或二十四兩自是比照日漸加增解銀儲北太僕寺發各邉買馬及各邉借支别用隆慶中李興化春芳在內閣憫桑梓領飬種馬之難因奏通行革去一半而舊制蕩然矣種馬飬在民間一兒四騍此制甚善隆慶二年提督四譯館太常寺少卿武金言種馬之設專為孳生備用今備用馬已别賣則種馬可遂省且言種馬之害變賣種馬之利於是御史謝廷傑言當收法以除弊不當因弊而廢法兵部亦主其議議上竟如金言變賣一半每馬變價銀十兩徴收草料銀二兩解太僕寺至萬歷九年御史于有年復請盡將種馬變賣兵部議覆云國初戰馬原係官牧嗣因承平無事散飬於省直民間課駒起俵後因多事課駒不堪征戰改為買解大馬之法寄飬近郊緩急足恃其種馬尚在民間百十年來節經當事諸臣建議設法課駒迄無毫毛之效民間攢戶飬馬困苦已極有司按季點驗騷擾益甚無名差遣各項科索悉取辦於馬戶閭閻殆不堪命數十年來節經當事諸臣建議革去種馬永塞弊源卒未有能行之者豈惟年復一年民害日深抑恐一旦有事戰馬缺乏至穆宗皇帝初年採太常少卿武金之議欲行盡革於時當事之臣議革一半其害猶未盡除至今遺議紛然兹蒙皇上特容臣等查照節年題奉事理議處停當誠為惠安小民預飭武備至計適該御史于有年建議痛切逺自數千里而至臣等劄行太僕寺查議回稱審度時勢變通調停上不失祖制下有禆於生民蓋亦有見於此臣等再三考究籌畫先年變賣未盡種馬一半委應通行變賣量徴草料銀兩以佐買馬之費種馬雖革馬戶宜存聽省直各照舊或十年或五年一次審編買解大馬如嵗用馬匹數多太僕寺預呈本部多買本色或有重大征戰無論本折悉買本色如再不敷並出太僕寺所貯變價及歲積草料銀兩分發州縣收買臕壯大馬一同解俵太僕寺應用庶民害永除武事有備一清久廢未盡之弊復還國初慎重戰馬之意相應題請定奪恭候命下通行南北直𨽻山東河南巡按衙門並劄付兩京太僕寺仍咨都察院轉行各巡按並印馬御史行各司道並府州縣掌印官將賣剩一半種馬盡行變賣司道各官親估價銀上等無過八兩下等無減五兩估完先造清册送部案候查考以文到之日南直𨽻限一年以裏北直𨽻山東河南限十箇月以裏變賣完日傾銷成錠各州縣依限解部發寺收貯專備買馬不得别項支用每馬每年折徴草料銀一兩以萬歷九年為始徴完各州縣總數解部發寺不許延挨拖欠孳駒已報在官其種馬堪賣者將駒給賞馬戶不堪賣者將駒一同變賣輳價馬戶有逃故種折者審實免徴逃移復業種馬猶存者照下等馬價減估仍嚴禁有司仰體上意各將馬戶務要優恤俾令樂業不得踵舊承訛加以雜泛差役科索以致朝廷恩澤不及於民其餘未盡事宜並經理馬政各官應否裁革撫按官悉心計處停當具奏上請定奪上允之於是寺庫積銀千萬而天間之制蕩然矣欲講明馬政必盡復洪永之舊歸有光曰江南折色可也畿輔河南山東之折色不可也草場之舊額可清也子粒之不可徴也官吏之侵漁可黜而懲也而管馬官羣長獸醫不可省也行馬復之令使民得寬其力民知飬馬之利則雖官馬亦以為已馬矣又修金牌之制通關互市益得好馬别賦之民以為種馬而有司加意督視之洪永之舊猶可復也太僕卿周孔教題馬價疏本寺老庫馬價自嘉隆以來封識惟謹不許擅動誠謂老庫之銀即外廄之馬也無事折而為銀有事出以市馬以備非常所以拱衛神京固安根本慮智深逺節奉明旨不許借討歷歷可數故自嘉隆至今老庫馬價所積幾至千萬及後各部率意借討遂至濫觴始曰不得援以為例後卒以為例始猶兵部支請為例自後各部亦借請為例始借猶曰勒限補還及後竟不補還日減一日歲削一歲以故屢年千萬之積殆盡今僅存二百萬有竒耳所謂儲蓄不備卒有水旱盜賊無能以應而國非其國者也夫富家巨室欲保其家旦夜所以慮不常防盜賊者備至周密况以堂堂神京所恃以戒不慮者空疏至此可為寒心臣等蒿目焦心計無所出方思遵旨取償該部原借銀兩不虞今又借討百萬矣卷查戶部所借本寺七百餘萬不為不多舊借未還新借踵至况本寺僅存二百萬今一借百萬能堪幾借竊恐不數月寺帑盡空矣寺帑空則神京幾無馬矣神京何地今日何時帑竭馬乏何以為國或曰事有緩急亦有輕重等重從急等急從重京師之重視邉圉何如譬之邉圉手足也京師腹心也未有剜心血以補手足者近見天象告變河源已竭民心擾動亂萌已形隂雨綢繆不可不慮是京師備禦當急乎當緩乎倘一旦有警欲徴馬則無馬欲市馬則無銀倉惶失措誰職其咎往者庚戍之事至今念之令人心悸夫天下利害事惟身親之而後心知其苦今太倉空匱九邉告急計臣所知也若寺帑匱乏後禍難任計臣豈知故計臣今日之請臣等今日之執所謂各痛各腸無非為國非敢動意氣爭區區衙門體靣已也體靣之爭小軍國之計大臣等竊見宋之季世臣子不求為國濟事動輒求勝卒誤人國臣等竊恨之臣等所以不敢默默者非敢求勝為陛下守此官耳挈瓶之守手不失器况軍國大計乎伏望皇上俯念根本之重加意桑土之計敕下兵部酌議彼此各有老庫錢糧應否堪動所借錢糧百萬之多應否當從從長計議奏請定奪庶馬政有賴而大計不誤矣崇禎二年太僕寺卿凃國鼎馬價出入數目疏查臣寺所𨽻北直𨽻各府州縣歲額解銀共一十四萬七百一十二兩南直𨽻各府州縣歲額解銀共一十八萬九千五百三十五兩三錢五分河南各府州縣歲額解銀共七千八百七十四兩山東各府州縣歲額解銀共九萬一千四百一十六兩通計省直歲額解銀共四十二萬九千五百三十七兩三錢七分此臣寺之入數也乃若臣寺所給發京邉各項年例在遼鎮撫賞銀二十二萬六百三十七兩五錢零薊鎮撫賞銀二萬五千二百兩在密雲犒賞銀一萬兩在大同鎮馬價銀三萬兩在宣鎮馬價銀五萬二千二百九十二兩四錢三分六釐在延鎮馬價銀一萬八千三百六十四兩在寧鎮馬價銀一萬二千四百兩在薊昌二鎮馬價銀二萬六千二百四十三兩八錢七分七釐五毫在灤陽兵餉銀三千六百兩在壩上祭司馬等神銀二十八兩在京營軍伴操賞修理弓箭金鼓旗幟等項銀四萬一千四百兩六錢五分通計職寺給發京邉年例共銀四十五萬二百一十兩四錢六分三釐五毫此臣寺之出數也臣寺出入之數如此即令外解全完所入已不足以供所出矣况逋欠實多並四十三萬之數亦不足乎且舊歲復派皇賞銀三十六萬兩乃在京邉年例之外於是搜括如洗束手無所措矣近且以俵馬改折請當此秋運之期民間俵馬有到京者有在途者紛紛駁回改折往來騷擾將有不勝其勞費者况祖制設立馬政専給團營騎操防守都城拱護陵寢祗謂根本重地有備乃無患耳原非為邉鎮即後來折色亦謂無事則易馬輸銀有事則出銀市馬仍是備禦京師之意乃今折色銀數盡給發各鎮矣如并其俵馬盡行改折萬一變生不測如嘉靖庚戌故事欲買馬則無價且無及計將安出言之可為寒心臣等惟知為祖宗固守職掌萬萬不敢徇邉鎮以誤朝廷也苑馬寺楊一清疏臣章句迂儒本無致用之地伏蒙皇上簡擢總理陜西馬政揣分捫心實深愧懼誓竭駑鈍以圖報稱本年八月內到陜西地方奉宣德意備行兩寺監苑官員共修職業以副委任臣親詣兩監六苑查得牧馬草場原額一十三萬三千七百七十七頃六十畝見在各苑止存六萬六千八百八十八頃八十畝其餘俱被人侵占原額飬馬恩隊軍人一千二百二十名見在牧馬止有七百四十五名牧軍包攬代役及私回原衛住坐點視得見在牧飬兒騸騍馬并孳生馬駒止有二千二百八十匹馬政之廢至此極矣臣考究國初牧馬成法行據該寺回稱先年被火將文案燒燬無從查考查得永樂四年兵部節奉欽依開設甘肅陜西苑馬寺衙門每寺管六監每監管四苑各有分撥草場水泉地方坐落四至上苑牧馬一萬匹中苑七千匹下苑四千匹僉撥恩隊軍人牧飬恩軍將各處有罪人犯發充隊軍於各衛丁多軍人內選撥每軍一名飬馬十匹仍月支口糧六斗俱係舊例其後陜西苑馬寺不知何年將原設監苑裁省止存長樂臨武二監管轄開成廣寧安定清平萬安五苑後又革去甘肅苑馬寺衙門將原發恩軍遷設黑水苑於平涼府開城縣地方亦附長樂監管轄前項裁革監苑其地散在臨洮鞏昌延安慶陽四府之間各入軍民版籍固未能盡復其舊即今見在監苑觀之土地廣衍水草便利使典牧得人蓄飬有法豈有馬不蕃息之理臣親閲安定萬安諸苑恩飬馬匹中間率多奮迅騰躍不可控馭始知西方畜産土地所宜而牧事頓廢非法之過乃人之罪也臣曩為陜西按察司官彼時馬政已稱廢弛猶有馬七八千匹每歲給軍騎操猶有數百餘匹邇年以來該部屢經建白朝廷注意修舉奈何積習之弊難袪頽靡之勢轉甚查得該寺奏報册內𢎞治十五年終實在馬三千八百一十四匹臣今點查見在止有前數則是半年之間又少馬一千五百三十四匹若皆委之天數則本處官員軍民之家私飬馬匹不聞消耗若此典守非人其責惡可辭哉且今見在馬匹除作種外餘下兒騸馬不多設遇有警將何給軍既無益於邉方又焉用夫彼苑幸賴皇上廟謨英斷深念邦政之重采納廷議增置風憲重臣委以便宜専制之柄使圖興復臣雖無狀承乏而來敢不夙夜孜孜一新舊規痛革宿弊總率寺監各苑官僚勤考牧攻駒之政謹騰遊調習之宜務期馬政蕃息雲錦成羣上舒九重宵旰之懷下濟一方戎務之急此臣之志也亦臣之分也茶馬楊一清疏臣受命督理茶馬親詣西寧洮州等衛地方選差撫夷官員帶領通事分投撫調各族番夷中納茶馬各族番官偕其國師禪師各齎捧原降金牌信符而至臣得拜觀焉其額上篆文曰皇帝聖旨其下左曰合當差發右曰不信者死臣奉宣皇上恩威撫且諭之責其近年不肯輸納茶馬之罪彼皆北向稽首云這是我西番認定的差發合當辦納近年並不曽齎金牌來調止是一年一次著我每將馬來換茶今後來調時天皇帝大法度在我西番每怎敢違了臣於是乃知我聖祖神宗睿謀英略度越前代逺矣考之前代自唐世回紇入貢已以馬易茶至宋熙寧間乃有以茶易馬之制所謂以摘山之利而易充廄之良戎人得茶不能為我害中國得馬足以為我利計之得者宜無出此至我朝納馬謂之差發如田之有賦身之有庸必不可少彼既納馬而酬以茶斤我體既尊彼欲亦遂較之前代曰互市曰交易輕重得失較然可知蓋西番之為中國藩籬久矣漢武帝圖制胸奴乃表河曲列四郡開玉門通西域以斷胸奴右臂而幕南無王庭今京城之西綿亘數千里北有敵南有番敵終不敢越番而南以番人為世讎恐議其後此天所以限别區域絶內外者也國初散處降裔各分部落隨所指撥地方安置住劄授之官秩聨絡相承以馬為科差以茶為價使知雖逺外諸番皆王官王民志向中國不敢背叛且如一背中國則不得茶無茶則病且死以是羈縻之賢於數萬甲兵矣此制西番以控北邉之上䇿前代略之而我朝獨得之者也頃自金牌制廢私販盛行雖有撫諭巡察之官卒莫之能禁坐失茶馬之利垂六十年豈徒邉方缺馬騎征將來逺人既不仰給我茶敢謂與中國不相干涉意外之憂或從此生藩籬之固何所於托其所關係誠非細故臣乃申飭禁令嚴督所司緝捕私販根究株引不少假借茶徒稍稍斂迹茶價頓增已而招調番人逺近畢集稔惡如朵工黑章咂者亦如期而至乃知中國之茶真足以繫番人之心而制其命誠使私茶啇販一切禁絶不得通番不一二年番族無茶不撫亦將自來調之寧敢不至臣仰承任使恆懼無補以速罪尤深慮郤顧輒罄一得之愚如此南太僕唐時升代作南太僕志序今上中興輦轂下諸君子以為國家重熙纍洽之後百度慮有不備於方䇿者於是兩京諸司皆纂修志書臣職在冏寺不可不討論故籍咨詢遺老以俟參考謹按洪武四年初置羣牧監至六年改置太僕寺當是時四方僭亂未平王師所至如太陽出而雲霧消散故元餘衆猶在沙漠之南王保保強力慓悍終不肯俯首帖耳就我羈絡及大將北發步兵未至竟以驍騎襲其營遂令狼狽跣足而走蓋皆用江淮間馬也孰謂天下善馬必出髙寒之地哉後數十年間天下大定謂宜却走馬以糞而詔旨諄諄叮嚀戒飭不獨留意於中國之畜牧而又取之四裔如西戎之茶馬朝鮮之馬耽羅之馬既又敕關中諸將吏各以其餘馬送京師分給沿邉騎士豈非以戎馬國之大事天下雖安不可一日忘哉至永樂初上問尚書劉俊以天下馬數止十萬三千七百有竒當寧太息太僕卿楊砥言近馬蕃息而牧者乏人請令民十五丁飬一馬馬死孳生不及數者責之償遂世為北方患自是以來朝廷之上更制易令部寺之間焦心勞思議論朋興互得互失顧官無飬馬之用而民有飬馬之害於是慶歷中盡斥賣種馬收買備用其時馬戶皆曠然如更生而僕寺亦如釋重負所從事者唯催督府縣馬價而已夫百金之家畜吠犬以防姦置蹇驢以致逺今南方數千里內卒有金革之事如近日愚民弄兵潢池倘逰魂三輔則欲具銜勒鞍轡而不可得何以盛軍容而威不軌哉蓋寄飬之行本一時嘗試之䇿非明習國事者深慮熟計而為之故審編之害交兑之害胥吏之要索里甲之侵漁勢所必至而當時不計也今採掇二百餘年見行故事與列聖之垂訓深謀逺見諸臣之嘉言讜論語云前事之不忘後事之師也後之君子反覆纍朝之利害得失而精思今日之時之勢倘有可以禆牧政者不惜為聖眀條奏之則雖辨髦此志可也春明夢餘録卷五十三
