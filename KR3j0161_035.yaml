body:
  text: 春明夢餘録卷三十五吏部左侍郎孫承澤撰戸部一戸部在闕之東吏部之下西向設尚書主天下人民戸口田賦征役經費之政令經鹽法邉儲金穀出納之制以贊於天子侍郎二人為之貳司務照磨檢校典磨勘計算為首領官屬清吏司四曰民部主天下省府州縣之圖志以周知其地里古今沿革山川險易田土肥瘠寛狭户口物産多寡登耗之數曰度支主㑹計天下存留起運若廩禄俸給之經費曰金部主天下魚鹽税課若贓罰之折收曰倉部主兩稅起運倉庾之委積已上念地曹務繁更定為十三清吏司司各理一布政使司戸口錢穀賦役課程之事而司分民度金倉為四科郎中員外主事所添設繁簡視所司劇易兼直隸府州之貢賦贊尚書邦政焉其職事以版籍稽賦役以墾荒業貧民以占籍附流民以畸零寄細民以馴野馭覊縻之民以圖帳抑兼并之民以折銀劑米値以平米均田税以布帛斂庸調以桑棗課農官以芻地給馬牧以里老攝鄉社以律誥嚴禁防以給除差優復以珍異儲上供以鈔錠節恩賞以限田裁異端以賜田懷降人以封閉宻砂鑛以金穀累贓罰以課程䦨雜物以闗𣙜市船材以引由嚴茶政以權量和市易以時估約均輸凡獻産詭産漏産朋户析户迯户有禁亂宗類淆良賤逰手逰食有禁毀鈔遏錢有禁諸王大臣毋得請常課乞閑田寳鈔提舉司若局庫倉所官悉隸焉周官司徒掌邦教敷五典擾兆民在當時所司者教化後世則專理財賦户口之事從古財用之政莫備於周禮而善言周禮者莫備於太平經國一書有志於當世之務者在所亟講也如云先王與民為生後世則民自為生至于今世則民無以生矣嘗觀周之世其所以與民為生非一事也井九百畝其中為公田八家皆私百畝使之相養相生如是足矣為之比閭族黨州鄉為之鄰里鄼鄙縣遂為之溝洫川澮畛塗道路以安其生為之禱祠醫藥之政為之賙救補助之法以衛其生如是又足矣而猶以為未也謂王畿之内皆齊民而未有特富者生生之具雖以粗給而祭祀䘮紀猶有所不足而取於常數之外於是九職之任頒焉雖臣妾閑民皆不敢遺而亦必有以厚其生反覆太宰之九職未嘗不三嘆先王之政思慮周宻安養生利備至蓋不措之於仰事俯育無憾之地則鬱鬱然如有負於斯民也此民所以樂其上之愛己而忘其勤於是相與出其賦税以供其上税以足食賦以足軍國之用而先王猶不敢泰然而享之斗粟尺帛則有司存鈎考㑹計猶恐其用之妄間有水旱不登則焦然凛然念民生之不易禍至之無日捐租出粟欲減膳而不御樂矣自上不能制民之産而行九職之任而民始自為生有父子兄弟夫婦之聚而無衣食生養之資去而為工技散而為商賈不得已而為庸保而民之為生始勞矣迫之以水旱役之以軍旅困苦之以加征厚斂貪官猾吏而民始無以為生矣又云冢宰嵗杪制國用九賦九貢之後又有九式以節財用蓋君心之非莫大乎侈心之生財聚於公上而大臣不敢撙節於其間則府庫之充牣財物之浩穰而人主之宫室器用服食賜予一切始無度矣故嘗論冢宰屬官以為内外庭宿衛之士士之賤者也烹庖饔膳之事事之辱者也魚腊酒漿醯醢之物物之微者也次舍幄帟䘮服為末用宦寺嬪御洒掃使令為冗役而宴私玩狎之際易以惑悅人主之耳目而府庫之財物國家之耗費亦莫大乎是數者之間使太宰身不得總其人心不得約其用則多寡豐殺去取用舍損益之目誰得而檢之又曰周禮理財理其出而已矣非理其入也理國之財而已矣非理天下之財也昔者天下之民百畝之田可以無饑墻下之桑五母之鷄二母之彘可以衣帛而食肉而又任之以百工商賈責之以嬪婦臣妾資之以山澤藪牧故其地無餘利而其民有餘財當是時也下之所以輸於上者常易辦而上之所以取於下者常不見其難集内而九功之正税九職之正賦外而九土之常貢其時已至其財已可取則太宰立法以授之征者司徒之屬征財以入之掌者太府之職掌財以頒之當用者如斯而已矣非理天下之財之入也財之來為無窮財之取為甚易其藏之也充足而盈羡而其用之也則常懼其姦欺而鹵莽是故一時之財不待於理其入而常盡心於理其出焉又曰内府若可以兼玉府矣而必分為二府者切於一身之用固不可以混夫一國之用也司㑹若可以通司書矣而必立為二司者掌財用之㑹計固不可以汩之以書契版圖也職内若可以攝職嵗矣而必設為二職者出入之數固不可以專責之一人之手也此特其不相參者耳至於相參而相攷者則内府在内反以供邦之大用外府在外反以供王及后世子衣服之用内外互相攷也職内職入反以每嵗所入而考其所出職嵗職出反以每嵗所出而證其所入出入互相考也不相參則可以專其耳目必相考則可以防其姦欺惟其然也故財用之出上無所肆其侈下無所容其私上不侈而下不私則財常足於用征歛常不至於虐而民無復有受其病者然則周家之理財理其出而已非理其入也理之於上者不欲虐取之於下而已固非屑屑然為是不憚煩也田土户口禹別天下為九州三代因之秦分為三十六郡漢分為十三部每部多寡不等晉分為十五道唐十道旋分為十五道宋四京二十三路元十一行中書省二十三道明兩京十四布政司後棄安南實十三司也天下田土據諸司職掌載洪武年間田土官民共八百五十萬七千六百二十三頃六十八畝零據㑹典載𢎞治年間田土官民共六百二十二萬八千五十八頃八十一畝零萬歴年間田土官民共七百一萬三千九百七十六頃二十八畝零崇禎年間田土據㑹計冊開載見額七百八十三萬七千五百二十四頃零天下户口據後湖冊開載洪武中户一千六十五萬二千七百八十九口六千五十四萬五千八百一十三𢎞治十五年户九百六十九萬一千五百四十八口六千一百四十一萬六千三百七十五嘉靖二十一年户九百九十七萬二千二百口六千二百五十三萬一百九十五萬歴中户一千六十三萬一千四百三十六口六千六十九萬二千八百五十六至天啟崇禎之季荒燹相繼市井蕭然版籍不可問矣周官制地之法六鄉以教為主而其民有郊於内故其地為郊而民則謂之民以其近主而有知者也六遂以耕為主而其民有遂於外故其地為野而民則謂之氓以其逺主而無知者也明制凡行郊祀禮以天下户口賦籍陳於臺下祭畢收入内庫著為成式每嵗類報總數十年攅造黄冊以定賦役覈隐漏清逃亡法例甚詳黄冊以一百一十戸為里推丁多者十人為長餘百户為十甲甲凡十人嵗役里長一人管攝一里之事城中曰坊近城曰廂郷都曰里凡十年一周先後則各以丁數多寡為次每里編為一冊冊首總為一圖鰥寡孤獨不任役者則帶管於百一十户之外而列於圖後名曰畸零賦役稽古定制以天下之墾田定天下之賦税因其地宜立為等則徵之以夏者謂之税徵之以秋者謂之糧其額數則具於黄冊總于户部其徵輸期限則責之藩服州縣若夫丁口之税百無取焉惟逐年編里甲十年一度輪差其餘年分官司有所營為隨時起集傭倩事已即休科則陞降洪武初令田起科每畝官田五升二合五勺民田三升三合五勺重租田八升五合五勺蘆地五合三勺四抄草塌地三合一勺沒官田一斗二升嵗入賦額其載在㑹典者不開據萬歴八年太倉考所載録之備考派剰麥米折銀共二十五萬二百八十五兩絲綿税絲農桑絹折色一十三萬一千八百二十一疋二丈二尺七寸一分每疋折銀七錢共銀九萬二千二百七十四兩八錢五分八釐九毫七絲綿布苧布折銀共三萬八千六百一十三兩府部等衙門禄俸米折銀共二萬五千九百八兩二錢馬草折銀三十四萬五千六百一十四兩二錢四分零京五草塲草折銀六萬一百八十兩三錢六分八釐戶口鹽鈔銀共四萬六千八百九十七兩八分八釐六毫薊永昌宻遼東五鎮民運改解銀共五十二萬三千八百二兩五錢三分各鹽運司并各提舉司餘鹽鹽課税銀共一百萬一千六百六十四兩黄白蠟折銀共六萬八千三百二十四兩八錢霸大等馬房子粒銀共二萬三千四百三十九兩五錢七分備邉地畝銀三萬三千四百九十一兩五錢八分京衛屯牧地増銀共一萬六千一百四十一兩三錢五分零崇文門宣課分司約解商税正餘銀一萬六千六百六十二兩一錢六分銅錢一千八百八十七萬七千七百十六文猪牙税銀二千四百二十九兩張家灣宣課司約解商税正餘銀二千四百七十九兩二錢銅錢二百八十八萬七千七百六十二文河西務鈔闗約解商税正餘銀一萬四千六百三十三兩六錢八分臨清鈔闗約解商税正餘銀四萬四千七百七兩二錢一分零滸墅鈔闗約解商税正餘銀一萬七千三百七十六兩五錢六分零九江鈔闗約解商税正餘銀一萬九百九十兩三錢二分零淮安鈔闗約解商税正餘銀一萬一千四百一十四兩六錢三分零揚州鈔闗約解商税正餘銀九千六百七十八兩九錢七分零北新鈔闗約解商税正餘銀三萬六千八百三十九兩四錢三釐泰山香税銀二萬兩贓罰銀十二萬八千六百一十七兩五錢富户銀約解三千一十八兩三錢六分三釐共銀二百八十四萬五千四百八十三兩四錢零銅錢二千一百七十六萬五千四百零太倉銀庫有舊庫新庫余于崇禎十四年巡視查冊舊庫餉數目浙江省額銀二十一萬五千八十二兩五錢九分七釐零江西額銀一十一萬一千三百五十四兩六分三釐零福建額銀一十二萬五千九百二十九兩三錢四分六釐零湖廣省額銀一十八萬九千一百一十二兩六錢二分零河南額銀五十八萬九千二百八十九兩九錢三分六釐零山東額銀七十六萬三千五百三十六兩四錢六分零山西省額銀八萬七千一百七十一兩五錢三分二釐零陜西額銀三萬九千九百二十九兩四錢六分六釐零四川額銀一十三萬九千五百五十一兩七錢三分九釐零廣東額銀一十萬九千一百四十七兩五錢八分八釐零廣西額銀二萬八千六百八十六兩八錢三分九釐零雲南額銀二萬三千三百二十六兩六錢一分四釐零貴州額銀一萬七千六百二十五兩七錢四分九釐南直額銀六十一萬三百二十八兩九錢二分五釐北直額銀十六萬二千一百七十二兩一錢六分三釐又襍項額銀十萬四千九百九十三兩九分五釐零各衛額銀三十萬九千八百八十五兩一錢一分六釐零鹽課額銀一百二萬七千六百八十五兩六錢八分七釐闗税額銀三十一萬三千二百四十六兩六錢一分三釐是舊餉額數統而計之不過四百九十六萬八千五十六兩一錢五分四釐合天下商民共為承辦猶未見其甚困也至一加遼餉遂有九百一十三萬四千八百八十餘兩之多再加練餉遂有七百三十四萬八千八百餘兩之多視原額舊餉不啻三四倍矣而所謂勦餉不與焉軍前之私派不與焉猶此人民猶此田土餉加而田日荒徵急而民日少皮之不存毛将安附當日司計者肉寧足食哉楊嗣昌在兵部議加勦餉一百八十萬欲練兵十二萬為勦賊之用餉既加陜豫江楚報兵八萬然仍舊籍之兵也又議加練餉七百餘萬将宣薊邉兵抽而練之集成勁旅營制紛紜出彼入此仍舊籍之兵也勦不成勦練不成練而四海之困窮已甚矣操其説者沈迅張若麒輩誤嗣昌嗣昌遂誤天下易曰小人勿用必亂邦也洵其然哉經費明初邉制止遼東大同宣府延綏四鎮繼以寧夏甘肅薊州為七又繼固原山西為九其防守士馬各鎮原自有主兵一鎮之兵足以守一鎮之地其合用芻糧各鎮原自有屯田一軍之田足以贍一軍之用後主兵不足増以募兵募兵不足増以客兵調集多于往時而坐食愈衆屯糧不足加以民糧民糧不足加以鹽糧鹽糧不足加以京運饋餉溢于常額而横費者滋甚大農潘潢言邉餉取辦民屯馬料取之採牧昔者未嘗稱乏今動稱不足屢請内帑虚腹心以奉四肢非完䇿也宜嚴覈民運完欠屯種虚寔是後㑹計嵗用先儘民屯二糧開中鹽引及各税科等項通融計算裒多益寡或有非常蠲減方許奏發帑銀庶邉臣奏討之煩非所慮矣萬歴中總憲王徳完論經費曰軍國之務稱重大者惟邉餉而軍國之需稱浩繁者亦惟邉餉方今邉餉匱詘極矣在鎮臣按額而呼尤有額外之呼在計臣按時而應尤有不時之應呼者至急應者至艱呼者愈頻應者愈窘何内外相違若是豈祖宗朝固已然耶臣考開國之初及嘉靖之季其所為經制繁簡有若天淵逈絶者國朝自洪永以來原無年例年例自正統始薊保宻昌原不稱邉稱邉自嘉靖始臣請縷析言之宣府嵗額不過五萬兩今主客餉銀不下二十九萬有竒大同原額亦止五萬兩今不下四十五萬有竒山西原額不過二萬兩今不下二十六萬六千有竒遼東初不過一萬兩嘉靖時增至二十萬三千今不下六十萬有竒薊鎮初不過一萬五千兩嘉靖時増至七十三萬今不下一百二十四萬有竒延綏初不過一十萬兩今不下三十六萬有竒其在甘固等鎮或増八九萬四五萬此眇少者也總計𢎞正間各邉年例大約四十三萬而止在嘉靖則二百七十餘萬業已七倍至今日則三百八十餘萬且十倍之竭九州之財力而不足以供括百年之蓄藏而難乎其繼撫今追昔能不寒心然臣伏而思之我祖宗朝土田賦税非有加於今也乃事不煩而自足今甲兵戰馬大不逮於昔矣乃例嵗加而難支其故何也蓋祖宗朝寓兵以屯且耕且守有備無患此趙充國金城之遺蹟也自屯田之法湮則經界隐沒而難明屯丁蕭索而賠苦人皆逋逃地為䧟穽戎馬財賦遂分兩塗祖宗朝輸鹽於邉納粟於倉有飛輓之利而無轉輸之勞此鼂錯實塞之遺意也折銀之説出則金錢盡出於太倉枵腹咸仰於内帑脂膏益竭芻粟愈難米珠草桂可為扼腕數十年來謀臣䇿士蒿目嘔心思復屯鹽之舊者至諄切矣然榛莽之區竟無畔岸開荒之報多是虚文逐末之輩率憚耕耘開墾之譚卒成畫餅生財有道舍此何由崇禎二年倉塲侍郎南居益查奏京支出數在京各衙門如宗人府五府六部翰林院詹事府都通大太常太僕光禄尚寳六科十三道國子監中書行人鴻臚寺欽天監上林苑監順天府宛大二縣自公侯駙馬伯及錦衣旗手等衛指揮經歴暨各衙門監吏各俸銀雖陞遷名數時為増減較數嵗之中以為常每嵗支銀十四五萬餘兩惟太醫舊制院使一員院判二員吏目十員御醫十員惠民局生藥庫大使副使各二員連醫士共止一百一十員名沿至萬歴年間官醫已増至三百二十三員名迨天啟年間増添日多及至崇禎元年官醫共計五百三十三員名但查每年見支俸銀三千三十一兩零比萬歴四十六年嵗支已多銀一千三百六十餘兩文思院舊制大使一員副使二員洪熙元年添註大使副使六員後仍裁革其匠役名數俱不甚煩襍沿至萬歴年間官匠已増至七百六十三員名迨至天啟年間増添日多及崇禎元年官匠共計三千一百九十八員名今但查每年見支俸銀三萬四千三百二十一兩零比萬歴四十六年每嵗支已多銀二萬七千四百九十餘兩若較祖制各不啻數倍相懸究何闗於有無之數哉其餘京軍布花太常寺小麥光禄寺果品丙字庫綿花絨欽天監歴日版片惜薪司抬炭甲夫司苑局召買豆草丙字庫召買黒菉豆穀草價又煮豆薥稭價供用庫召買正旦元宵端陽中秋三單年例香蠟價光禄寺錢鈔禮工二部邊賞折絹兵部咨紙筏夫廣盈庫題染顔色商價神樂觀樂舞生布絹小麥黄豆芝麻折銀光禄寺厨役冬布折銀器皿厰小麥惜薪司炭餅糯米價内官監召買稲草價外供用庫召買黄菉豆穀草價太常寺祭祀猪價陵寢墳園公侯駙馬造墳及㑹試合用米麥折價銀作局造冊金價承運庫御用監供用庫丁字庫凡遇吉凶典禮題買金珠香蠟銅錫價各衛軍伴優恤各倉故官錦衣衛宣官馬匹草料折銀又将軍馬匹草料又禁兵春秋二操口糧又衛營家丁鹽菜馬匹料草錦衣衛禁兵廪糧旗手通州等衛馬匹糧草折銀定慶陵做工鹽銀京糧㕔祭祀各倉籌架造斛修理閘河各衙門工食公費三王府鹽菜銀崔黄口三大營勇士四衛營糧草折銀京營飛石敎師口糧山東河南班軍口糧犒賞廵捕營官軍并馬匹料草各官心紅番役工食等銀訓練營并通州三標營鹽菜草料總督房價訓練三大營鹽菜草料行糧銀各衛所新兵月糧訓練總兵家丁鹽菜料草三大等營䕶送梓宫口糧草料銀各衛所月糧折色等項銀増減不一每嵗約支銀四十五六萬迄今有見在停止者有無容輕議者及典禮修舉不時營辦數多擅難預定而米折籌架數項分隸漕折合行另算外惟是三大營馬匹草料銀萬歴年間歲支銀八萬七千餘兩至天啟三年遂増至一十八萬四千餘兩迄天啟七年雖經少減尚計一十六萬四千五百餘兩查舊例每馬一匹月支草料銀五錢六分後議每馬月支銀八錢六分及選鋒題増全馬振武營添馬六百匹遂比舊例嵗増銀八萬餘兩矣又查奏邉鎮年例數目按永樂正統之間各邉鎮不過有儹運糧料之例其京運舊額在薊鎮止五萬兩永鎮止二萬八千六百七十二兩八錢九分宻鎮止一萬五千兩昌平易州井陘并無京運遼鎮止一萬兩宣府五萬兩大同五萬兩山西二萬兩延綏十萬兩寧夏四萬兩甘肅六萬兩固原四萬八千八百七十一兩二分又犒賞銀五百八十八兩八錢二分二釐五毫迨世宗朝始議宣大山西每年發主客兵銀二十五萬五千餘兩薊州主客兵銀五萬六千餘兩永平四萬八千餘兩宻雲三萬三千餘兩昌平一萬兩延綏新舊主客兵銀二十九萬七千餘兩寧夏主客兵銀四萬五千兩甘肅主客兵銀二萬二千餘兩固原主客兵銀五萬兩隆慶中又増昌平防秋銀一萬六千餘兩嗣後又議四川撫按及茶馬各衙門贓罰税科等項改解延寧甘固及宣大遼東山西三闗等處准作夲年應發年例雖沿革多寡不一尚未至十分懸殊也嗣因覆定經制在薊鎮原額銀止五萬兩後増至三十八萬九千四百九十三兩賞軍撫裔之數不與焉今見支又増四十二萬八千八百九十二兩零宻鎮原額銀一萬五千兩後増至二十九萬四千三十七兩今見支幸減至二十六萬五千三百九十一兩零永鎮原額銀二萬八千六百餘兩後増至二十四萬六千八十五兩今見支又増至二十八萬九千八百六十六兩零昌鎮原無舊額後増設京運銀一十七萬三千九百九十二兩今見支幸減至一十四萬二百三十二兩零遼鎮原額銀一萬兩嗣後夲折嵗用銀四十一萬七千七百餘兩後又増至五十二萬兩自萬歴四十六年發難始設新庫其銀屬為幇支奉夲部題奉欽依每年正幇新庫銀二十萬兩易鎮先止河南山東扣送太倉糧價抵作客兵年例銀二萬八百餘兩後増至五萬九千兩今見支又増至一十七萬七千八百六十餘兩宣府原額銀五萬兩後増至三十三萬三千二百二十餘兩今見支幸減至二十九萬九千一百五十餘兩大同原額銀五萬兩後増至四十二萬四千六百三十餘兩今見支又増至四十五萬六千三十餘兩山西原額銀二萬兩後増至二十一萬三千六百餘兩今見支幸減至二十萬六千三百兩延綏原額銀十萬兩後増至三十六萬七千二百六十餘兩今見支又増至四十三萬三千七百餘兩寧夏原額銀四萬兩後増至五萬二百五十兩今見支又増至一十三萬三千七百九十餘兩甘肅原額銀六萬兩後減至五萬一千四百九十餘兩今見支又増至一十九萬七千五百餘兩固原原額銀四萬八千八百七十餘兩後増至六萬一百三十二兩今見支又増至一十四萬五千八百二十三兩零又萬歴四十二年下馬闗召兵買馬立左右正兵四營嵗支銀四萬二千三百七十餘兩以上除遼東一鎮今見増數不開但據太倉考經制與原額較内除甘肅一鎮稍減其餘十三鎮便増銀二百八十六萬一千七百七十餘兩今再以見支與經制較内宻雲昌平宣府山西四鎮稍減其餘九鎮又増銀五十五萬四千四十餘兩豈屯鹽之政乆格而不行故主客軍餉盡改為年例乎抑備禦日煩募𨕖日増不如此不足以為四裔之守耶在各邉鎮計口授食必自有説但朝廷出入祗有此數入者幾何出者無算又何怪年例之拖欠無償也合營馬草料醫文兩院月俸共増銀六十六萬餘兩矣内供萬歴間奏疏天下之所入為一千四百六十一萬而入於内府者為六百餘萬其為金花籽粒銀不過一百二三十萬而絲綿絹疋醋茶顔料則将五百萬頃餉臣請改折一嵗而陛下不許豈以内供不可缺哉然在朝之士未有為陛下言其故者陛下安得而知之愚竊痛焉今陛下有黷貨之名而礦税既罷以來實未嘗横取於外不過損抑内䜿使以孝順名目日竭其資茍不能承㫖則加以嚴刑或有亡故籍其所積耳然而内帑之充牣已亘古所無矣夫内䜿自刑入宫豈有私財自東厰之外不得與聞外事豈能雨粟生金以供上之取哉不過刻削内供甚至隂為盜賣恣其奉養之娛足其子弟之業以其餘應上耳夫好利者取之於外求之於人未聞以所有之物聽其恣盜又從而取之徒以聚衆怨失令名何其左也陛下天縦睿聖特未思耳而羣臣又莫言徒日夜請内帑上曰内帑者非取之民民之脂膏非由内帑而竭非取之有司有司之庫藏非由内帑而虚司計者曷不圖之所以萬請而萬不應也今若為陛下言致財之繇則一檢核之間而姦弊一無所容足所供需量為改折則可以應目下之急清其弊源無使冐破則可以嵗損數百萬即明入内帑備不時之需亦無不可何必宛轉其事而坐受其弊哉此清源之大者也天下財賦入户部太倉者可得而稽其入内庫者不可得而稽皇城甎城北甲乙丙丁戊五庫與天財承運等庫以收贓罰銀香料等項甎城内文華殿南是内承運庫以收銀絹除嵗用外其餘皆入内女官庫雲南各處礦銀各閘辦銀竟入女官庫附記金花銀鹿定興善繼為户部主事時遼東方缺餉請帑疏皆不報㑹廣東解金花銀至公謂大司農李汝華曰每嵗廣東解金花銀兩恭進大内此近例也頃督部有扣留之議此時仍進大内則部議終成畫餅欲經解太倉則俞㫖艱如拔山莫若題留為便考㑹典國初金花銀折糧俱解南京供武臣俸禄各邊或有緩急亦取足其中正統元年始改解内府嵗以百萬為額嘉靖三十二年題准三宫子粒及各處京運錢糧不拘金花折錢等項應解内府者一併催解貯庫悉備各邉應用不許别項那借夫曰緩急取足是内府與外府分用也曰備各邉不許那借是備外府專用而内府不得旁分也今邉烽告急軍糈乏用即舉金花全數一旦復還太倉亦率由祖制非奪大内所有而益外府也惟是皇上批發庋之髙閣而中涓熒惑其間急難得㫖一靣題知一靣劄納銀庫轉發遼左權自外操不至如帑金之緘縢不可問天下事為之有機留與不留係於進與不進此際間不容髮萬一宸怒不測請以身任罪不然局外者方議留而局内者且議進無論清議不可即主上視吾輩何如也司農如公議上請上怒奪公俸一年勒令補還司農不敢違公力持不可謝恩日中官闔門扇不聼公出勒問太倉云何管太倉主事劉榮嗣報曰發三日矣然實未發也中官傳嚴㫖促令補還公曰有銀何用借無銀又安用補中官愕眙不敢應公曰但執善繼語回奏死生惟命不敢易一字也中官歎息而去無何堂官奪俸二月公降一級調外任舉朝交章請留不報擬降山東運判亦不報公遂移疾去賦役全書崇禎元年七月戶部纂修賦役全書尚書畢自嚴上條議曰㸔得賦役全書肇自行條鞭法始距今已四十五年矣查賦役初定錢糧數目自有定則惟是地方因事加添司道每年増定吏書受賄任意那移有一州縣而此多彼少者其弊為溷派州縣奉行而不敢問司道偶増不過千百中十一而有司不肖者一聼奸胥之暗洒派分如每兩因加一分而即加二分者其弊為花派小民遵行而不為怪二者乃㝢内通弊牢不可破者也欲清其弊全在撫按先為裁定今當亟為申飭其説有八一錢糧之規則宜明也省直錢糧因地起糧因糧起科其間有上中下不同而則次亦異如某地係某則應該糧米若干斗升該科銀㡬分㡬釐逐項開載明白由升而合斗由分釐而合錢上中下分别明白以則例定編派之額以編派衡出入之數則錢糧之大概了然矣一總撒之確數宜核也省直錢糧名色雖不一大約田賦均徭二項不離起解存留兩欵宜令各州縣不論賦徭不論起存共開一總次開二項各掲一總又於二項之下備開起存支解撒數務期撒合州縣總州縣合府總府合省總省合部總一分一合不爽分毫則飛洒増減之弊絶矣一新舊之糧額宜晰也省直錢糧既有則例當以萬歴初年賦額為凖從前糧每石納銀㡬錢㡬分又於某年因某事又増銀㡬分合舊額若干今果有裁減否逐一開明不得一槩開入撒數其有裁減如征播征倭等項亦須開明某年事停除豁勿溷原額之内至遼餉一款有因地畝起科者有因田糧起派者與舊額京邉錢糧原自各分此係新増不在全書之内今亦另開一項則新舊二項瞭然明白矣一起存之𤨏細宜備也夫解京有官運解邉有民運悉屬起解一項臣部於崇禎元年㑹計冊内刋有成數而存留一項在各省直地方支銷者頭緒紛亂難以窮究須将存留錢糧先查全書原額若干後因事加増者幾項逐一開明其應加裁汰并應改充餉者亟為拈出聽臣部酌定議改不容隐匿者也一雜項之開列宜詳也以新餉言之雜項數𣢾而抽扣工食雜支公費等項括於其中以舊項言之㑹議數款而司道公費修理衙門等項括於其中又有冗官冗役先由撫按題准裁汰仍留以充餉者并今見存仍可以量裁者凡隸某項即於某項開載原額若干今裁减充新舊二項若干分别明晰較若列眉俾與存留數内總撒相符可也一驛站之増派宜減也驛站銀兩在原刻書内者自有定額年來因驛逓苦累多有額外加増而他處之協濟不與焉目今功令新頒郵傳廓清出數既少而入數猶多是病民也今後務照原額派徵凡額外私増者俱應註明裁去以蘇民困於萬一也一民屯之出納宜清也凡各省直賦役書内多不載民屯銀是以豪右得以肆侵吞衛弁得以恣乾沒據萊州衛指揮楚邦禎具奏已有左驗由萊衛而推之東省由東省而推之天下無處不然合令省直将原徵民屯銀兩并支銷款項存剰數目另項造入簡明冊内以慿彚編無容遺漏者也一裁定之冊式宜簡也各省直送到全書有詳有畧有宜于昔不宜于今者皆當商確裁定裁定未妥臣部當再駁如将賦役全書通行繕寫未免躭費時日合令省直撫按裁定賦役如全書詳備者止於夲項下貼一浮簽明註某項因何應刪改増減某項應節省解部用印鈐葢以慿酌議如全書未備另造一簡冊以便彚編近者限三月逺者限五月送部要以寧速毋遲為便計耳八議既備而裁定之事思過半矣此外合通省計之地方有肥瘠通㝢内計之風土有南北中間均一款項為此所有而彼遂無者務令詳造不許掛一漏萬此在撫按司道自能酌定而非臣部所能預擬者也查奏舊餉崇禎元年主事周夢尹疏言地畝正餉約以三分起解嵗入太倉反不及九釐㫖令户部查奏尚書畢自嚴疏曰夫田賦之有留存起解也可按籍而復視起解之有夲色折色也亦可分款而稽核謹按崇禎㑹計冊所載宇内見額田地七百八十三萬七千五百二十四頃有零所載太倉每年額入以充邉餉者實該銀三百一十萬五千有零然内仍有在京衛所屯糧秋青鹽課贓罰備邉缺官吏農事例等項約居過半其實地畝起解者僅一百五十六萬耳取一百五十六萬之銀坐派于七百八十三萬七千五百二十四頃有零之内雖有雲貴四川廣西等處截留餉銀竝北直抵買遼豆銀共四十八萬五千有零計畝而論為數幾何即夢尹浙江人也浙江一省額地四十八萬一千八百七十一頃所稱天下䧺藩財賦之郷實計解之太倉充為遼餉者共銀五萬六千五十四兩零計畝而論僅得一二釐耳即此以例其餘地畝有肥瘠則例有差等恐一畝之起解固有不止三分者亦有不滿三分而三分之起解實未盡入太倉而充邉餉也請以起解項款言之如漕糧有四百萬白糧則二十餘萬而南糧不與焉金花則百餘萬民軍折色則三百五十六萬餘内供絹布花綿蠟茶硃漆芝蔴紅花桐油銅鉛膠礬槐花茜草等項暨兵部之柴薪工部之料價及内供夲色織造縀疋柴炭軍器等項動以數百餘萬計而又加之王府禄米河工站價科舉公費廪俸工食等項又不啻幾百萬凡此廣浩繁項不可枚舉孰非賦自地畝則計嵗入太倉嵗充邉餉者眞無異馬體之毫末也撙節李康惠承勛定經制疏夫量入以為出是謂仁政量出以為入是謂虐政既不量入為出又不量出為入雜然而收泛然而用是謂無政考成周之制以四分制國用每嵗用三存一以備凶荒故三十年之通則國有九年之積漢之時則有計相唐之時則有判度支宋之時則有判三司皆所以㑹有無而制國用也近年以來戶部雖有㑹計之虚名而無量入為出之實政臣愚謂當因其名而舉其實通查一嵗天下税糧所入總計若干經國之費總用若干首兩京次各邉各省直𨽻各府每嵗所入所出俱查有的數分為二目倣周禮用三以足一嵗之用存一以備不測之虞萬一所出多于所入則㑹九卿于堂上科道官各查凡百費用有約于昔而浮于今日必考昔之所以約者請而復之又考今之所以浮者請而約之至于裒多益寡之道撥此補彼又在臨時通融議定務使所出不踰于入之數通将出入總數攅造黄冊一夲進呈以備御覽然時有盈虚事有因革每十嵗一㑹而損益之此十年一㑹之大綱也若嵗有豐凶事有多少每嵗十一月户部㑹奏各官通查某處災傷蠲免若干某處用兵該用若干則以各處茶鹽商税之所入者補足錢糧正額以備軍國正支其餘雜用一切不得糜費漢母将隆所謂大司農錢自乗輿不以給供養葢不以夲藏給末用不以民力供浮費别公私示正路也經制一定取之有經用之有義而財恒足矣張居正嵗賦出入疏伏蒙發下票擬章奏内有戸部進呈御覽掲帖一夲臣等㸔得國家財賦正供之數總計一嵗輸之太倉銀庫者不過四百三十餘萬兩而細至吏承納班僧道度牒等項毫釐絲忽皆在其中矣嘉隆之間海内虚耗公私貯蓄殊可寒心自皇上臨御以來躬行儉徳覈實考成有司催徵以時逋負者少姦貪犯贓之人嚴迸不貸加以北敵𣢾貢邉費省减又適有天幸嵗比豐登故得倉庫貯積稍有贏餘然閭閻之間已不勝其誅求之擾矣臣等方欲俟國用少裕請皇上特下蠲租之詔以慰安元元之心今查萬歴五年歳入四百三十五萬九千四百餘兩而六年所入僅三百五十五萬九千八百餘兩是比舊少進八十餘萬兩矣五年嵗出三百四十九萬四千二百餘兩而六年所出乃至三百八十八萬八千四百餘兩是比舊多用四十萬餘矣問之該部云因各處奏留蠲免數多及節年追贓人犯財産已盡無可完納故入數頓少又兩次奉㫖取用及凑補金花拖欠銀兩計三十餘萬皆額外之需故出數反多也夫古者王制以嵗終制國用量入以為出計三年所入必積有一年之餘而後可以待非常之事無匱乏之虞乃今一嵗所出反多于所入如此年復一年舊積者日漸消磨新收者日漸短少目前支持已覺費力脱一旦有四方水旱之災疆塲意外之變何以給之此皆事之不可知而勢之所必至者也比時欲取之于官則倉廪所在皆虚無可措手欲取之于民則百姓膏血已竭難以復支而民窮勢蹙計乃無聊天下之患有不可勝諱者此臣等所深憂也夫天地生財止有此數設法巧取不能増多惟加意撙節則其用自足伏望皇上将該部所進掲帖置之座隅時賜省覽總計内外用度一切無益之費可省者省之無功之賞可罷者罷之務使嵗入之數常多于所出以漸復祖宗之舊庶國用可裕而民力亦賴以少寛也伏惟聖明留意魚鱗冊初脩魚鱗冊以土田為主田各歸都啚履畝而籍之諸原坂墳衍下隰腴沃瘠鹵之故畢具為之經而土田之訟質焉其黄冊以户為主田各歸其户而詳其舊管新收開除實在之數為之緯而賦役之法從焉其後魚鱗冊嵗乆漫漶至亡不可問而田得買賣糧得過都啚賦役冊獨以田從户而田所在不復可辨知于是飛洒寄詭買賣推收其為虚偽至不可原詰求其言之痛快可行莫如嘉靖中唐冢宰龍為江西廵按時一疏矣疏言國初計畝成賦縣有定額嵗有常徵近置買田産遇造冊時賄里書飛洒之見在人户名為活洒有暗栽逃絶户内名為死寄有花分子户不落戶眼者有留賣户不過割及過割一二名為包納者有過割不歸夲户有推無收有總無撒名為懸掛挑回者有暗襲官紳脚色揑作寄莊者在冊為紙上之桑在户皆空中之影以致派糧編差無所歸着俱小民賠償小戶逃絶責之里長里長逃絶而糧長負累由是户口日耗盜賊日熾告訐日滋乞令廵守二道分詣地方督州縣将飛洒詭寄弊源重者隨田丈量輕者随戶清理究首尾之因度廣狹之則定髙下之科分肥瘠磽沃之等均崩灘開墾之數各将原糧填入原戶歸之原田而啚總都總縣總造流水冊十夲甲各收藏縣因造冊為大造為冊四上府州縣上南京後湖收架俾因戶推田因糧編戶戶與田有一定之則為便求其綜覈田畝之法莫如裕州知州安如山為善矣裕州故阻險然四衝野多坡坂地磽确土雜砂石不皆可田種知州安如山白于上為丈量命耆老董其役命區長驗區畛命量人歩阡陌命算人制畝分精覈版籍因區定畝因畝準稅區為綱畝為目綱以麗目則無漏畝畝為母税為子母以權子則無逋税平衍原隰膏腴之田一而當一平石岡田二而當一山石岡田三而當一山石陡阪之田四而當一陂池林麓廨宇舖舍㕓市之税蠲之田溢税則從増税溢田則從減咨詢徧故人無遁情版籍明故上有定徵疆土别故下有定輸此皆可為天下取法詹事霍韜疏臣查洪武十四年天下田土原額八百四十九萬頃有竒至𢎞治十五年存額四百二十二萬頃有竒虧額强半彼承平相繼事猶如此迨後所虧不知凡幾矣此斷當亟為經理者也顧事當創始計慮宜周地係久荒經營不易宜勅下督撫二臣專委道臣及各府正官請将南京後湖先年魚鱗冊籍與弔到各屬近年黄冊逐一查對要見某州某縣原額田土若干見今成熟若干抛荒若干坍沒若干成熟者有無欺隐坍沒者曽否開銷抛荒者作何開種各督撫委道府官親履疆畝延召端方通敏致仕郷官公直人等細加體勘丈量除欺隐者追出還官坍沒者照數開破及荒田原有人佃領代糧者仍准承業俱無庸另議外其一應丈出田地採訪輿論或借給牛種召人承佃或南方五頃以上北方十頃以上有産之家每家定限墾田一頃田多者仍照頃加算至十頃而止或設有官兵之處每一百名以七十名操防三十名承佃三畨屯種如古營田之制或每縣民壯五七十名責令量分三分之一領佃各預借二年兵糧工食以便偹辦犂鋤工夲三年以後方許一例陞租其開荒之法即不能倣古井田一畝三畎深尺廣尺畎逹于溝深廣四尺之制但合數百畝之田必有溝合數十溝之水必有川合數大川之水必就窪而為湖以達于河于江而滙于海則髙亢者有瀦卑下者有障固非茍完于目前亦非糜費于無用上為千秋之業而獲有百倍之饒矣一條鞭差役之法洪武以後皆以丁糧多寡編派大小差役至嘉靖四十四年議准行十段錦冊法算該每年銀力差各若干總計十里之田派為定則如一甲有餘則留二三甲用不足則提二甲補之久之弊生里下騷然莫必其命浙江為甚龎尚鵬巡按浙江時乃奏請行一條鞭法其法通府州縣十嵗中夏税秋糧存留起運額若干均徭里甲土貢僱募加銀額若干通為一條總徵而均支之也其徵收不輪甲通一縣丁糧均𣲖之而下帖于民備載一嵗中所應納之數于帖而嵗分六限納之官其起運完輸若給募皆官府自支撥葢輪甲則逓年十甲充一歳之役條鞭則合一邑之丁糧充一年之役也輪甲則十年一差出驟多易困條鞭令每年出辦所出少易輸譬則十石之重有力人弗勝分十人而運之力輕易舉也諸役錢分給主之官承募人勢不得復取贏于民而民如限輸錢訖閉戶卧可無復追呼之擾此役法之善者也後江陵相當國復下制申飭海内通行者将百年而今又有不然者余讀懷柔縣志載賦役議曰天下有名為節省而其實有大不便于民者則今日之清減條鞭是已里甲之累民易知也以故改而為條鞭立法者貴其可繼故改鞭之始尚寛有餘地以俟有司之酌處乃一倡為節省之説各𣢾盡為裁減減之又減以至必不能行矣而各款将終焉已乎必不能已則私役里甲以濟之者也昔止一里甲之累而今兩累之大家為掩耳盜鈴之計其害更甚于加賦竊謂今日之裁減太甚徒掣賢者之肘而益以恣不肖者之無忌憚困民極矣司國者将有䇿以復條鞭之舊乎鈔闗倪文毅岳疏祖宗舊制各設有鈔闗收受商稅俱委各夲府通判等官管理行之百年雖不能無弊然課鈔亦未見其虧客商船隻亦未見其留難葢通判等官職卑責重上受廵撫巡按分巡分守等官節制少有不才隨加罪黜故非極妄無知之人則不敢在闗生事動擾客商近年以來改委戶部官員出理課鈔其間賢否不齊往往以増課為能事以嚴刻為風烈籌算至骨不遺錙銖常法之外又行巧立名色肆意誅求船隻往返過期者指為罪狀輒加科罰商客資夲稍多者稱為殷富又行勸借有夲課該銀十兩科罰勸借至二十兩者少有不從輕則痛行笞責重則坐以他事連船拆毁客商號哭水次見者興憐夫増課為國雖稱聚斂猶是有名其科罰勸借者或倚稱修理公廨或倚稱打造坐船率皆借名入已無可查盤况此等官員既出部委各處廵撫官視為賔客巡按官待以頡頏是以肆無忌憚莫敢誰何以致近年客商懼怕征求多致賣船棄業此豈祖宗設闗通商足國裕民之初意哉伏願聖明俯察民隐特勅該部停止新例遵復舊制仍勅鎮廵等官時常糾察各府委官如法奉行務要公私兩便商民不虧庶幾人心快悦怨聲消弭而天意可回矣蕭彦商税議商税倣古闗市之意以佐國用胡可已也顧法愈詳税愈重視國初異矣他姑無論即如河西務大小貨船船戶有船料矣商人又有船銀進店有商税矣出店又有正税張家灣發買貨物河西務有四外正條船矣到灣又有商税百里之内轄者三官一貨之來榷者數税所利幾何而可堪此夫船料舊也條船果舊乎出店進店可重税乎而不落店家徑赴京賣者彼且未嘗進店也一體徵收何名乎此萬歴八年該司郎中之議而今因之者約所増三萬有竒而商困矣商困則物騰貴而民困矣獨奈何不一蘇之為商民計也淮安四税下及脚抽真同商賈議者以為權宜之術不可已矣然不可漸減耶而日用米穀進出店二税如河西布疋通州油簍類者又不可蘇耶至于儀真之税既非祖制亦無重獲曩言官之疏詳矣乃以該地方執稱軍餉之充為數幾何不可議罷耶諸如此類難以枚舉此商税所當議也司農梁材鈔闗禁革題例疏查得嘉靖四年為應詔陳言以禆聖政以回天變事該夲部置立空白印信稽考文簿三扇發去該鈔闗委官主事收掌令其逐日塡冩船料商税數目差滿之日将一扇存留夲闗備照一扇委官收執一扇差人解部查考等因又為陳言時弊以禆國用事該雲南道監察御史楊彛題該夲部議行各鈔闗委官自文書到日為始于附近府州縣内行委佐貳官一員與同簡鈔人役查收錢鈔不必另刷號紙就将原立稽考文簿一扇交付府州縣委官令将收過錢鈔眼同各役登簿呈報主事查見在實數并将文簿二扇即将親筆于前件項下照𣢾填註明白錢鈔照常發府州縣收貯季冬解部類進差滿之日仍将部簿籍三扇應存留備照解部俱照舊施行如此而猶有不飭亷隅不惜名檢者是謂衣冠之盜聽本部指實叅行吏部不待考察即時罷黜以示懲戒至于皂𨽻門子書算等項聽各該有司審編照常額送役不許自行收取更換致生物議仍要嚴加訪察如有積年充當及各作弊情由徑自拏送各府州縣問罪發落抽分之時各商装載柴米并自用物件不得一槩混抽等因嘉靖七年夲部題奉聖㫖是各鈔闗收受商税船料雖稽考嚴宻而宿弊不能盡除差去官員亦多苛刻取盈往來多怨今後務差老成亷靜的去嚴加闗防覺察如再有貪鄙不惜行檢的你部裏便叅行吏部不待考察就行黜罷欽此又為改收𣙜税以便商民以濟國用事該廵按直𨽻監察御史魏有夲題該本部議擬合無行令各該鈔闗委官主事将經過軍民船隻應納錢鈔自嘉靖八年十月初一日為始照例每鈔一貫折銀五釐每錢七文折銀一分傾㵼成錠轉發各該附近府州縣官庫收貯按季差委經收人役依限解部轉送内府承運庫收貯等因奉聖㫖是准議行欽此崇禎二年戶部議𣙜額疏南北𣙜闗凡入有舊額有新増查北新闗原額四萬天啟元年加増二萬天啟五年加増二萬共八萬兩滸墅闗原額四萬五千天啟二年加増二萬二千五百天啟五年加増二萬共八萬七千五百兩九江闗原額二萬五千有竒天啟元年加増一萬二千五百有竒天啟五年加増二萬共五萬七千五百餘兩而兩淮鈔闗原額二萬二千天啟元年加増七千六百兩有竒天啟五年加増一萬五千共四萬五千六百兩揚州闗原額一萬三千天啟元年加増二千六百兩天啟五年加増一萬共二萬五千六百兩臨清闗原額銀八萬三千八百兩河西務原額四萬六千兩以上二闗并無加増因解不足額臨清議減二萬兩河西務議減一萬四千兩總期于必完者耳崇文門原額六萬八千九百二十九兩今天啟五年加増二萬共八萬九千九百二十九兩此舊額與新増之數也查以前𣙜闗司屬有加額起解者有解不足額者今再申飭嚴加考核以完欠為殿最少溢額為優紀又查天啟六年奉㫖助工税差照正額每兩加羡餘一錢後來各差所觧多寡參差有名無實後因大工已竣題改助工為助餉每兩加羡餘五分觧入太倉查正額已兩經議増尚有完欠不等應于觧羡餘内仍量増五分為一錢照正額通算合計八闗每年共増銀五萬餘兩務要全解毋託空言仍不許借口増税致剥商膏以叢物議至差滿日亦同正額考核庶法平而商不稱困羡報而數亦頓増矣張居正曰余嘗讀鹽鐡論觀漢元封始元之間海内困敝極矣當時在位者皆扼腕言𣙜利而文學諸生乃風以力夲節儉其言似迂然昭帝行之卒獲其效故古之理財者汰浮溢而不騖厚入節漏費而不開利源不幸而至于匱乏猶當計度久逺以植國本厚元元也賈生有言生之者甚少靡之者甚多天下財力安得不詘今不務除其本而競困賈豎以益之不亦難乎洪武十三年六月諭戶部曰曩者奸臣聚斂深為民害税及天下纎悉之物朕甚恥焉自今如軍民嫁娶喪𦵏之物舟車絲布之類皆勿税爾户部其榜示天下使其周知鹽法天下鹽課惟兩淮為多浙次之長蘆次之福建無廵差以行無逺地河南塲無運官以出有專所廣塲兼之故廵運俱無總計天下設轉運司者六提舉司者七嵗辦舊額一百一十七萬六千五百二十五引每引五百五十觔多五觔以下照例割沒五觔之上照夾帶律問擬初制每引納銀八分粟二斗五升商人納粟于邉受鹽于塲無守支之苦嚴禁食禄之家不得牟商利一切請乞悉絶之私賣阻亂者處死竈丁給以滷地草塲每引給工本鈔二貫五百文復其雜役有餘鹽官自出鈔收之下以資竈戶上以攬利柄故鹽法行自正統中有常股存積之法常股七分以為常而存積三分以待塞下之急倍賈開中越次支放又引價日増需索日繁而鹽法大壞且易粟而為銀不之塞下而之鹽司於是塞地盡荒邉儲俱匱而邉事亦大壞造其議者戶部尚書葉淇允其請者内閣徐溥也户部尚書李汝華疏國家財賦所稱鹽法居半者蓋嵗計所入止四百萬半屬民賦其半則取給於鹽筴兩淮嵗解六十八萬有竒長蘆十八萬山東八萬兩浙十五萬福建二萬廣東二萬雲南三萬八千各有竒除河東十二萬及川陜鹽課雖不解太倉併其銀數實共該鹽課銀二百四十餘萬兩又各邉商所中鹽糧銀淮浙蘆東共該銀六十餘萬兩總鹽課鹽糧二頃併舊額新添計之實有二百餘萬之數每嵗完不缺額庶合民賦牽補邉計猶少二十餘萬乃今竟何如也蓋我朝鹽法自正徳迄今凡三壅而今為甚正徳末年權閹占􅌪淮鹽大壅至嘉靖初年為小鹽之法以疏之嘉靖末年鄢懋卿増行引三十五萬淮鹽復大壅至隆慶初年龎尚鵬倣小鹽之法以疏之迄今十餘年來璫課横行淮鹽復益大壅謂亦宜倣小鹽之法師其意以疏之臣兹不揣竊謂今日兩淮鹽法須以急救二商為主以急復祖制為經以正行見引附疏積引為題目以預闗引目改行小鹽倣前人已事為方畧預闗引目所以行新引也改行小鹽所以疏積引也見行正引而帶疏積引如見徵正賦而帶徵夙逋所以復祖制也祖制復而二商蘇矣二商蘇而國計舉矣葢新引之利人人所攘臂而争趨焉者惟是舊引日積無法疏通則併新引之利而捐之今有法于此令得新引之厚息而又併沾舊引之微貲人其舍諸葢舊引新引皆以一商合併而行其虧本者少而其獲利者多故積壅漸疏而新課無套撘之憂倉鈔盛行而邉引無不售之歎也鹽道袁世振綱法議今查淮南紅字簿中納過餘銀之數凡三十一單該有二百六十餘萬引内除消乏銀者納六十餘萬引其實數僅有二百萬稍縮耳本道刳心極慮為衆商設為綱法遵照鹽院紅字簿挨資順序刋定一冊分為十綱每綱扣定納過餘銀者整二十萬引以聖徳超千古皇風扇九圍十字編為冊號每年以一綱行舊引九綱行新引行舊引者止于收舊引夲息而不令有新引拖累之苦行新引者止于速新引超掣而更不貽舊引套撘之害兩不相涉各得其利如今丁巳年為第一聖字綱應行舊引之年止令行夲綱二十萬舊引不令行新引一張其新引派于淮南者凡四十八萬六千五百九十六引却分派與九綱共行之又加以掛掣附綱十餘萬引每正綱算派新引五萬一千二百引附綱算派新引二萬五千六百引是在向也以四十八萬有零新引而責行於二十萬舊引之商今也以四十八萬有零新引而散行于二百餘萬超掣之商其在僉㸃之中者既不苦于力量之難支其在僉㸃之外者又不苦于冷坐而難待至明年戊午年為第二徳字綱應行舊引之年亦止令行舊引不行新引却令第三超字綱以至第一聖字九綱及附綱照窩數派行新引巳未巳後俱照此行從此以往行至丙寅凡九年而舊引盡净即掛掣之引是年亦盡却令漸加新引以補淮北暫停新引之數此十字綱冊目今刋定以後即留與衆商永永百年據為窩本每年照冊上舊數派行新引其冊上無名者又誰得鑽入而與之争騖哉此法至輕便至明白至公普至饒益利無不收弊無不除不待行之數年而即今鹽法已一旦豁然大通矣若行于數年之後不但嵗額無停可以漸為増加即運司庫中亦從此大有餘積矣昔人論行鹽法惟劉晏知取予謂知所以取民不怨知所以予民不乏也今兩淮數十年來所以征商者稍急之而怨讟叢至稍緩之而匱缺多虞取予之謂何保舉縣丞沈時鹽法疏向之官鹽鹽賤輕而雜費少今之官鹽有引價有餘銀有割沒復有遼餉挑河募兵賑濟常例等項種種重費每一引共出夲三兩八錢投之本商止得銀三兩若私鹽每引止須鹽本五錢即有上下賄通之需不及輸官者十分之四奸人遂以私行為得計且行之地方官鹽價髙而難售私鹽價賤而易施所以私鹽之利十倍于官而官鹽之壅百不售十也是今日之鹽政私鹽則公行之而官鹽反私匿之使二百餘萬引鹽之利悉供姦人竊取而朝廷不得過而問焉在計國者惟日増鹽課以為生不知名雖増姦民善避之而旁走求多益寡是故帝王之生財與民不同謂之大道大者畧其小而忽其微務其寛大廣博寛大一分則國日増益一分廣博一分則國日擴充一分惠雖在下而利實總歸于上今欲将二百餘萬引之私鹽立變而輸官課惟祈皇上特簡重臣之最清亷才望者專責前往兩淮疏理将三十鹽塲舊制滷地草塲一一清結竈丁而厚恤之每年煎鹽務盡其物力之所出除正鹽七十餘萬外其餘餘鹽即将夲額正賦銀兩照時値工本給價官收而貯倉官賣每包額定五百觔為一引新舊派足三萬引之數每一引除商人引價五錢外止取鹽税九錢悉去餘設遼餉助工南北新窩等費計一兩四錢外再加鹽本五錢在商人一引止輸銀一兩九錢較前三兩八錢之數則減其半官收餘鹽則竈丁不窮課額減半則商人不困竈丁敢私匿一引而姦人敢私販一引犯出授與受即立時處絞家産籍沒入官如此力行如塞决者水無傍流扼喉者氣無傍出餘鹽盡入于官則私鹽不禁而自止私販止則遍天下皆官鹽也食鹽功績之名悉行除去在竈丁知官收之價不減于私則何樂就私在姦人知私販之費不減于官則何苦避官而䧟不測之罪哉臣計三百萬引之輕賤可得銀四百二十萬兩除舊額一百四十九萬七千餘兩頓増二百七十萬三千兩且姦商化為良賈千萬家私販頑户化為良民而行鹽地方南極湖廣西抵河南東海數千里人民咸享賤鹽之利兩淮若此合各運司行之可勝計哉收餘鹽減正價之説按嘉靖十三年給事中管懷理先言之矣其疏云欲通鹽法須先處餘鹽欲處餘鹽必多減正價大抵正鹽賤則私販自息私販息則正鹽自行此不易之定論也今雖不能法祖宗時八分二斗之制宜斟酌開中每正鹽一引定價五錢或四錢餘鹽一引定價二錢五分或二錢俱令在邉照時上納粟米豆料草束每年差給事中或御史一員赴邊趂時開中禁革一應買窩占中等弊正鹽給與引目餘鹽給與小票正鹽下塲支給餘鹽徑自收買正鹽一引許中餘鹽三四引或五六引務以盡收竈丁餘鹽為止若或未盡再添一二倍亦無不可如此正鹽價輕既有以利乎商人餘鹽盡收又有以利乎貧竈國課不集而自足私鹽不禁而自止沈疏即此意也崇禎十一年張慎言疏計天下之鹽法河東不同于長蘆長蘆不同于兩淮兩淮不同于兩浙乃其要領則可一言而盡曰恤商而已猶之足賦者在盡地之利欲盡地之利者在得農之情而農得竭其利欲得農之情而竭力在去其農之苦鹽法亦然欲課之無虧者在得商之情而去其商之害故䇿鹽者不必官别㝷一整齊之法即以行鹽之法仍曲詢于商若何而行若何而可以經久若何而可使私販不禁而自止因其勢而利導之即有姦商積弊但去其太甚使之樂而喜從事自下令于流水之源矣猶記萬歴末年有袁世振者行綱法行之半年新舊之引帶銷而課之解太倉者幾倍于曩時其後法既效而世振誤用羣小敗人去而法已更矣其所謂綱法者臣不知其詳然淮之父老必有能悉之者其時世振為官另設于運使之外今但重運使權而慎其選令御史提綱于上訪世振之法而輕重布之不必再設多官足矣茶法榷茶之法始于唐而詳于宋宋在江南則宣歙江池饒信洪撫筠袁十州廣徳興國臨江建昌南康五軍兩浙則蘇杭明越婺處溫台湖常衢睦十二州荆湖則江陵府潭灃鼎鄂岳歸峽七州荆門軍福建則建劍二州嵗輸租折税送六𣙜貨務鬻之置𣙜茶務江陵府于真海荆州漢陽無為軍凡六務在淮南則蘄黄舒廬光壽六州官自為塲置吏總之曰山塲十有三州軍采茶民𨽻焉曰園户嵗課作茶輸租餘官為市之先受錢而後入茶曰夲錢又民嵗輸茶折税賦者曰折税茶民有茶者售于官官給其食用曰食茶凡民茶折税外匿不送官及私鬻販者沒入之計直輸罪園戶輙敗毁茶樹者計所産論罪後乃稍寛商賈貿易入錢若金帛京師𣙜務以射六務十三塲給茶劵隨所射與之至道末鬻茶至二百八十五萬餘貫後益稍増至三百六十萬貫而以雍熙用兵令商人入芻塞下即今中鹽之法而髙其估遂以三百六十萬貫僅易邉儲五十萬入中者非盡行商多土人既不知茶利厚薄得劵則轉鬻之商若京師交引舖商舖因得收蓄貿易以射利劵以積滯雖二三年不足償邉以頓乏茶法日壞于是使入粟塞下者度地里遠近即實糧量増直給劵徑至權貨立償以緡錢而茶則罷夲錢使園戶與商自相交易而官收其息如舒州羅源塲茶斤鬻錢五十有六官不復給夲但使商輸息錢三十有一而聽其所指地行得給劵通行為左驗以防私售謂之貼射若嵗課不盡官市之如舊而以商驟失利尼之不行至後始行輸茶之法而茶户摘山者往受錢于官乏困于輸錢之不時入則刑随商賈利薄販鬻者少官似簡易而利大損商民亦交困矣葢其法即今鹽法之變竈戶與商自交易其弊必至此也此後始以王韶言行秦鳯茶即明初設廵茶御史所廵者止存此一路而利亦薄矣明初茶法商人詣所在買茶已具數赴官輸錢千文給引照茶百觔其畸零不及引者納錢六百文給繇帖繇帖照六十觔量地定程以賣而犯私販與鹽法同罪諸批驗所截角退引一准鹽法以行民間蓄茶不得過一月之用茶戸私鬻者籍其園入官成化中批驗所不詳茶商姓名貫址聽冐名給引為轉相販賣故退引累催不繳為影射茶出山時不從公盤詰批驗所又不如法批驗而夾帶者衆又法商人詣批驗所買引而所在獨應天常州杭州三府于産地分逺者數千里近不下數百里道苦逺多費而姓名貫址易為欺于是用尚書王恕言聽茶商于産茶府州納課已即姓名貫址買引照茶年終該府縣各将賣過引由造冊并收過紙鈔解部仍具數買領次年合用引由各批驗所遇茶商經過照批驗将截角引仍付放行有夾帶送所在官司問理年終具驗過客商盤獲私茶具申冊掲合于上司繳部其法未為不偹今川陜畨市者茶積年不行至累數年而内地茶户不知官茶私茶之説久矣天下之言生財者亦罔聞知春明夢餘録卷三十五
