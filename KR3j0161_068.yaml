body:
  text: 春明夢餘録卷六十八吏部左侍郎孫承澤撰巖麓京師之西皆山也舊記太行山首始河內北至幽州第八陘在燕强形巨勢爭竒擁翠雲從星拱於皇都之右玉泉山在京西二十餘里山頂懸崖舊刻玉泉二字水自石罅中出鳴如雜佩金章宗行宮芙蓉殿之故址也半嶺有呂公嵓廣盈丈許深倍之相傳呂仙宴坐處甕山在玉泉山之傍西湖當其前金山拱其後山有寺曰圓靜寺山之陽有耶律楚材墓都人王嘉謨石甕記燕之西山有甕山焉純盧土中多杏柟榆柳之屬余嘗逰其間其南巖若洞而圯者一樵人曰此少鬲仙室也久之逰丁公潭問於漁父漁父曰甕山蓋市中之異域云昔吾大父嘗聞山中有父老能繕生久而去之俄而來云山麓魁然而大凹而秀者甕之屬也因鑿之得石甕一倍於常甕華蟲雕鑿不可辨中有物數十種父老悉擕以去置甕山西因為䜟曰石甕徙貧帝里人不之信也嘉靖初甕不知所存僕老矣睹吾里中之世變習矣夫甕何為余喟然而歎曰有味乎父老之言父老何用識之漁父曰成宏以往非吾所知也聞之宏治中帝京世臣富嘉靖中商富隆慶俠富今之時益治而昔之富者遷徙靡常僕何足以知之夫幽薊馬四足可當中人之産棗栗千子可食數口蔬百畦可當五帛相思桃李芳實雜遝屯軍日夜織作純緣輕縠薰燧丹緑則天下之沃饒也列聖培養小民守法豈獨先世號為太平哉宏治以後外戚邊臣都公卿之右握兵席寵氣勢炎炎世䘵者為之役則武斷鄉里都人以軍為美募郊而居屋相比也又謹事上時時餽食有所制無所爭吏攝於主者不敢問則世臣富世宗慨然求治破去煩攣法令日新民莫之式於是文武奉法利害一切公之於下加以求仙采補異好竒珍之絡繹則商賈重醝賈外攝府賈內嬴雜賈疽食奄人地之即竹木之場陶冶之技亦富千室及至隆慶所好靡靡矣於是姦人之雄習刀筆觀時變其言曰所謂富者豈守子母錢而日為愚也禍且立至故不如求百倍之利乃鮮衣怒馬以交於貴人倚憑則髙如青雲接趨則汙如溝染已而昵則挾之怨則箝之刎頸託於非類千金轉於片言風扇波流無復綱紀其勢斯極乃今又不無少變矣說者曰帝里侈是未見天成之豪麗宣洪之清泰也曩者燕市夏屋樓觀重縷連鈴貴人造佛寺渴泉飛山佛身純金七寶鋈渥中人燕享水陸區殫后軒美人曵縞紵秣陵之縠袀於中單秀水機杼不藉而靡少年日夜歌吹東西樂部倡家樓閣通天乳煎鏤蛤冬果春蔬棄之如遺賞賜動以千計三正元會酺樂燈火奧若連山狀於六鰲生花舞鳥閉機其中舉火樹者萬萬計荆揚估船日夜集於大市而今安有之衣文之巧日變日儉故有屋設而寡堅黑伎者或改而市矣元夕寥寥數人行少年慱具數錢而攤司空召商具五刑泥首號哭家立破敗四方異味日至物價翔踊器更狹橢轉效他方賈者日夜心計市魁大姦其迹堇堇則何以稱也夫財通物富美名也逋之於不可知變之於不可繼豈石甕之為乎且以為誕也余默然夫時變不一知者所難父老何言之易夫變之與來固不能必也是故成宏之有嘉隆猶先朝之有今日也豈必需於灾䘲之故志䜟之微哉藏舟於壑流遁繼之夫甕也又何知語曰觀俗於野父老其似之矣歸而記之都人李東陽記西山自太行聯亘起伏數百里東入於海而都城中受其朝靈秀之所會屹為層峯滙為西湖湖方十餘里有山趾其涯曰甕山其寺曰圓靜寺左田右湖近山之境於是始勝又三里為功德寺洪波衍其東幽林出其南路盡叢薄始達於野乃有玉泉出於山噴薄轉激散為溪池池有亭宣廟巡幸所駐蹕處也又一里為華嚴寺有洞三其南為呂公洞一竅深黑投之石有水聲數步不可下竟莫有窮之者五湖朱長春記西山之勝衆矣不能紀紀其所過逰自玉泉山始其泉流為西湖玉河發焉車馬遵涘以入其山於諸山突而前延延遠望如釡首戴土猶冠也近削立而尊如屏華嚴寺南倚之寺燬存其寢拾級升有平臺望湖焉見帝都焉壁當寢後洞在壁間洞戶沈沈黑若無人者入久而白熅光照其上下下乳如露盡其洞四丈而修廣丈有竒左右石牀最裏見石龕也暮僧燃葦薪助之復見兩石壁詩自元丞相揭里以來其上又有洞其頂有故金芙蓉宮址章宗避暑宮也未至山之右撓梟而蛇盤曰金山寺自華嚴而下度三石橋折水而門臨之水清鑑毛石齒齒然藻蘊蕊蕊然其中無魚隂水也金山觀不如華嚴軒楹差之可以寢處客多宿者右盤而西北緣岡而途蜿蛾以曼衍皆山也崟峞髙下隈粵巄巄然其林木參焉日之所照垣翼朱丹五采則嬪嬙內人大璫塋焉秫黍菽粟油油交於林間有果園稍稍有蘇牧村落也陸釴記出平則門行可數里清風徐來塵意灑落遂遵湖堤繞村徑後先惟意行歌相答舉盻間樓臺鱗次出沒烟靄若非人世所有者午至功德寺主僧汲泉瀹茗酒數進起陟英廟行宮已乃促騎西往緣崖攀磴穿雲霧間溪花石竹幽芳襲人徐憩玉泉登望湖亭撫看花臺道傍諸剎不能遍歷惟聽主僧談名耳李流芳記出西直門過髙梁橋可十餘里至元君祠折而北有平堤十里夾道皆古柳參差掩映澄湖百頃一望渺然西山匌􅂒與波光上下遠見功德古剎及玉泉亭榭朱門碧瓦青林翠嶂互相綴發湖中菰蒲零亂鷗鷺翩翻如在江南畫圖中公安袁宏道髙梁橋逰紀髙梁橋在西直門外京師最勝地也兩水夾堤垂楊十餘里流急而清魚之沉水底者鱗鬛皆見精藍棋置丹樓珠塔窈窕緑樹中而西山之在几席者朝夕設色以娛逰人當春盛時城中士女雲集縉紳士大夫非甚不暇未有不一至其地者也三月一日偕王生章甫僧寂子出逰時柳稍新翠山色微嵐水與堤平絲管夾岸趺坐石根上茗飲以為酒浪紋樹影以為侑魚鳥之飛沉人物之往來以為戲具堤上逰人見三人坐枯樹下若癡禪者皆相視以為笑而余等亦竊謂彼筵中人喧囂怒詬山情水意了不相屬於樂何有也少頃遇同年黃昭質拜客出呼而下與之語步至極樂寺觀梅花而返公安袁中道紀出西直門過髙梁橋楊柳夾道帶以清溪流水澄徹洞見沙石藴藻縈蔓鬛走帶牽小魚尾遊翕忽跳達亘流背林禪剎相接緑葉穠鬱下覆朱户寂靜無人鳥鳴花落過響水閘聽水聲汩汩至龍潭堤樹益茂水益濶是為西湖也每至盛夏之月芙蓉十里如錦香風芬馥士女駢闐臨流泛觴最為勝處矣憩青龍橋橋側數武有寺依山傍巗古柏隂森石路千級山腰有閣翼以千峯縈抱屏立積嵐沉霧前開一鏡堤柳溪流襟以畦畛叢翠之中隱見村落降臨水行至功德寺寬博有野致前繞清流有危橋可坐寺僧多業農事日已西見道人執畚者鍤者帶笠者野歌而歸有老僧持杖散步塍間水田浩白羣蛙皆鳴噫此田家之樂也豫不見此者三年矣又裂帛湖記功德寺循河而行至玉泉山麓臨水有亭山根中時出清泉激噴巉石中悄然如語至裂帛泉水仰射沸氷結雪滙於池中見石子鱗鱗朱碧磊砢如金沙布地七寶粧施蕩漾不停閃爍晃耀注於河河水深碧泓渟澄徹迅疾潛鱗了然荇髮可數兩岸垂柳帶拂清波石梁如雪鴈齒相次間以獨木為橋跨之濯足沁凉入骨折而南為華嚴寺有洞可容千人有石狀可坐又有大士洞石理詰曲突兀奮怒較華嚴洞更覺險怪復有竇深不可測其上為望湖亭見西湖明如半月又如積雪未消柳堤一帶不知里數嫋嫋濯濯封天蔽日而溪壑間民方田作大田浩浩小田皛皛鳥聲百囀雜華在樹宛若江南三月時矣循溪行至山將窮處有庵髙柳覆門流水清激跨水有亭修飾而無俗氣山餘出巉石肌理深碧不數步見水源即玉河發源處也水從此隱矣白鹿巖在甕山西北越橫嶺白鹿巖在焉人鮮至者閩人陳衍記凡客長安者未有不指西山為勝概者也然遊覽所至亦自玉泉香山華嚴而止豫自馬上望全山之勢蜿蜒嶻嵲烟草四合意必有神工鬼斧在人跡不到之處或曰白鹿巖最竒於是挾善遊者新安周生裹糧取道登甕山絶頂度黃沙坂縋石澗而西秋髙澗水僅沒踝清駛殊常挹而飲焉夾澗桑葉如綺澗窮小嶺橫之有白石如幢屹立嶺上微有字畫然薄蝕不可辨矣越嶺諸峯爭列芽茁不斷一峯最異即白鹿巖也巖髙數十丈嵌空欲墮中虛可旋兩車巖左一隙如窗櫺下視深窅不知所際谷風倒射隙內琤然雖笙筑合奏不如也相傳遼時有仙人騎白鹿往來斯巖故以命名登巖頂瞷萬壽山如竪掌指西望太行髙掛天際夭矯拏飛烟雲繞之斷續無跡適風烈不可久立而下巖角有茅舍小而整西僧居之黃眉紅頰採草根和水以食音語不通見人嘻笑而已不知何年代至中國棲遲此山也凡巖之木皆偃蹇離披非平地所見獨巖口古檜一株根出兩石相夾處盤旋橫繞倒掛於外大可數百圍色赤如丹砂夫人不能拊虬龍而諦視之使得諦視當如此檜矣是又巖中之最竒者也日暮歸宿甕山次早略至玉泉而返聚寶山在玉泉山西南行數里度兩石橋循溪轉至卧佛寺復二里為碧雲寺金碧鮮妍宛一天界巖下一泉汩汩石渠導之過齊厨繞長廊出殿兩廡左右折復滙於殿前石池泉傍一柳有大癭人呼癭柳柳左堂三楹萬歷御題水天一色前臨荷沼沼南修竹成林巖下一亭曰嘯雲玉泉西七八里聚寶山碧雲寺金銀宮闕如王者之居朱鋪文戺門堂七重重纍數十階以髙其除廣夷有池廣方居以殿中有梁跨池如亘白虹池中魚大小萬頭其色丹白青藍驪珠玳瑁出沒藻絲蘋葉承間如綴金玉寶珠繁露也梁之中塞以朱欄神宗移蹕再幸樂之設帟飲梁上觀魚遂為御道云池之水盤折而流其下洑地而至玉泉出焉其上且隱且見經殿北澗復伏殿下出有洞又伏落池其源至遠出者當寺後山之髙壁云當源為泉亭折泉為流觴交亭左右又前滙為池紅白荷花茭蒲參差又前盤柏為屏屏前竹一方區細如楛皮黃金數千百枝䓗䓗鳥噍噍者竹前古銀杏䕃蔽區等於竹亭右古柳下本半皮枯臃腫若橛若虬鱗若疣上枝細如絲青青蓋亭亭為寺中竒駕為留半日御膳寺人進飲三留御書額二曰蒼松古柏曰水天一色亭傍壁峭如城髙可十丈長四五十丈亭蓋處其窪間道也壁右石室三臨澗石門石竇窗入踏地有鐘鼓鐃吹之聲吰吰疑其雲中盛夏凉可以衣僧云冬則燠花木之避凍者藏焉虎林沈守正紀碧雲寺精整勝香山而踈曠遜之獨寺後一泉出石根冬夏不涸𨗳為方池植白蓮其中上有亭大小二池前修竹一林清瀟可愛豫自渡江久别此君婆娑不忍去微風徐來簌簌如相絮語泉繞寺中庖湢皆資之恨其從屋霤下過安得好事引為流觴可坐可歃亦一大勝也吳郡王衡記從玉泉渡兩石橋循溪轉䕃於卧佛寺娑羅樹之隂復二里許至碧雲西折聽泉亭上殿前石池一而橋綰為二中畜五色魚百千頭余解衣盤礴坐而施餅餌焉唼呷相呼雲隊再捲若為魚麗以仰攻者武林黃汝亨紀卧佛寺亦泉勝層巖夾道而下木石散置可游可坐亦勝地也寺內有娑羅大樹二株可數圍其子如橡栗僧云不但與菩提幻子可作念佛珠碎之下酒可療心痛諸山皆無公安袁中道紀香山跨山踞巖以山勝者也碧雲以泉勝者也折而北為卧佛峯轉凹不聞泉聲然門有老柏百許森立寒威逼人至殿前有老樹二株大可百圍鐵幹鏐枝碧葉虬結紆羲回月屯風宿霧霜皮突兀千癭萬螺怒根出土磊塊詰曲叩之丁丁作石聲殿墀周遭數百丈數百年以來不見日月石墀整潔不容唾寺較古游者不至長日靜寂若盛夏宴坐其下凛然想衣裘矣詢樹名或云娑羅樹其葉若簌豫乃折一枝袖之俟入城以問黃平倩必可識也卧佛蓋以樹勝者也夫山剎當以老樹怪石為勝得其一者皆可居不在整麗三剎之中野人寧居卧佛焉香山在碧雲南二里許有永安寺舊名甘露其制一如碧雲而饒古色最勝者來青軒乃神廟所書額也金人李宴有碑其略曰西山蒼蒼上干雲霄重岡叠翠來朝皇闕中有古道場曰香山上有二大石狀如香爐蝦蟆有泉出自山腹下注溪谷曰小清凉西行數百步至𢎞光寺殿圓製極工成化初創於中官中官髙麗人見其國金剛山有圓殿故移甚製於此面其前者金章宗祭星臺朱長春記香山敞煥不如碧雲棟宇特盛碧雲蕩蕩開朗有大人威嚴香山獨孤髙如羽人化域陵世焉碧雲塹削面坦夷其陽可望萬里都城如帶香山獨牙錯門徑幽耳來青軒其至髙望不一隅但海氣蒙蒙出焉其山盤回其泉折淙其離閣參差其氣窈深其草䝉修其木離披多古殿前二枯松十圍隱千牛焉日出映之山中蓊蓊如青雲起世宗嘗幸臨登軒望之歎曰佳哉此山獨有紫翠色軒有今上御書亦兩幸矣其髙於軒者山顚有亭右盤數百磴上上不留足夋夋也下須翼之猶不可趨升之望見諸陵其兩胠猶山蔽之蓋遊希至亦無題者未至亭亭在山巔至去頂復千尺按志上有二石狀如香爐蝦蟆望之未得升焉山之人言自香山又西以南山特竒怪峞深其靈巖佛宮往往而是經數百里盡乃至河內彌月不能遊然遠稍稍荒落莾蔽而此以近都獨盛以故遂不復西王衡紀由碧雲至香山磧路深曠夾道盡白楊青檜雖都雅不减幽絶當山之邃者曰流憩亭其曠而可坐眺者曰來青軒流憩在山半灌木隂翳之中憶春季杏花飄飛盡矣而此地猶能護殘紅以遲我念而尋舊遊焉已乃過來青軒軒前西山為距而虛其襟以捧帝城斜照薄金銀臺蒸氣正紫相顧謂此地宜月投枕焉而東自無量殿數折乃至洪光寺皆短垣踈柏不蔽外景涓人甃白石為階其净若拭余歎曰使死不速朽者殆樂哉斯邱矣笑而出望之東壑中鬱蒼攢錯閣道參差若飄紅掛樹葉者其光裕寺耶心樂之而日且下舂矣不果遊洪光寺入石門路甚修平可步古柏夾之外不見林上不見顚枝幹交䕃人行道上蒼翠撲衣日影注射如荇藻凌亂歷數百步復折而上如是者凡十有一每登一折必右俯木末左瞰絶壁壁皆甃石為之歲久若天造柏從石罅出多類鬼工初登一二盤竒在柏稍上諸山如螺髻自柏外見則又竒至七八盤山盡在下精藍名墅棊布繡錯金碧晃耀日竟屢換殆無暇問柏竒矣盤窮為山門甚精麗又進為圓殿亦目所未見洪光者即香山之支院也不復由十一盤穿柏中山徑數十步即香山藏經殿步而下即後殿從兩廊逶迤行至正殿歷級從東行至方丈自回廊復東為來青軒羣山拱揖蒼蒨刺人目下見陂陀髙下杏樹可十萬株此香山之第一勝處也由方丈出見山右溪流奔注如玉龍夭矯蟄而未蘇下為方池一注沉碧有魚數十頭出沒其間沈守正記碧雲池亭蒼松翠柏水天一色香山來青軒鬱秀清雅望都亭六榜皆今上御書又一聯云恐壞雲根嫌地窄愛看山色放牆低不知出睿思否語亦有致書似沈度學士而骨徑過之王衡記今歲戊子春季之二十二日約友人張益之陳錫元張仲立鄭子瞻遊香山以了花事而以盧師足之比期而仲立以事辭錫元復拉入他隊中余與張益之鄭子瞻周生如春者且行矣而黃風如矢益之又謝病歸余三人獨當風行葆髮蓋面蹇且不前也已至髙梁橋而風窢然柳枝不搖巾角微拂子瞻顧謂余是風留花耶抑花留客耶余笑曰噫互有之半里許為真覺寺寺前浮圖髙五六丈許而上為塔五方陟其頂山林城市之勝收焉余語子瞻此不當勝天壇耶吾於此訂雪盟矣由真覺寺緣湖堤堤柳婀娜妥水色油油然而其下則茭芽蒲㦸虛著柳絲鴨緑正與鵝黃相貼顧尚不多得花初見花數十樹或百樹則紆騎賞之以簪余帽且滿已而去城漸遠花漸繁則當馬首者視之已則左右指而已小憩於望湖亭俯而窺泉以所佩花盡施之池清颸或來紅翻緑皺悠然有春江花月之想余乃以杯酒坐花瓣上候於橋左雜水二停因呼子瞻和花嚼之自亭右沿山膝行又遡一小村而香山碧雲始見見山以上下皆漫漫遙白余曰雲也子瞻營視不應徐而曰其雲耶將無是英英者耶已而問之山農乃真杏花也始大呌以為竒絶相羊至卧佛寺面面皆花而一緋杏據西原上者大可盈抱且殊麗三人緣而上則枝輪樛覆若倒掛茱萸網網外復施百步錦障余駘蕩不自持而日且晡矣期以明日假碧雲道脫衣掛壺於此乃舍而至香山宿於來青軒從軒前望花如春後薄雪鬖鬖滿野而不蔽襳濃草樹之觀詰朝陳錫元從碧雲來視豫豫與憑軒指畫諸勝次及新柳余曰人盡云煙柳烟安得柳容其似者正在露葉時若眠若起半空半色之間耳錫元深賞其言相攜而上流憩亭亭西一杏尚未破函蓋昨嵗遲我於花後者也余謂錫元曰是當有神酬以酒祈明年花事焉武林黃汝亨紀過香山躡蹻披磴流泉茂樹一著屐即有軒軒白雲之氣半似吾山九里三竺間於西山中當據上座登來青軒峯下皆蒼翠盤鬱大撮山河之勝有扁書世宗元年題此山獨有紫翠色真睿賞也餐卧彌日獨不忍去上有流憩亭不及來青甚寒泉亭更可無坐中峯在香山之後以其居諸峯之中故曰中峯也上有庵躡危磴而上十百者三始及庵庵兩翼有亭東望京城漭漭塵土微見黃色一㸃大內也山之隂有晏公祠翠巖寺永壽庵山之陽有𢎞教寺俱稱名勝公安袁中道記中峯庵門有石樓可眺有亭髙出半山可窮原隰牆圍可十里悉以白石壘砌髙薄雲漢修整中雜之紆曲階磴墀徑石光可鑑不受一塵處處可不施簟席而卧於諸山中鮮潔第一剎中僅見一僧甚靜寂豫少憩石樓下清風入戶不覺成寐既寤復循故澗澗涸而怪石經於疾流衝擊之後墮者偃者橫直卧者泐者背相負者欲止未止欲轉不獲轉者猶有餘怒其岸根水洗石出亦復皺瘦崚嶒﨑􅋂陷坎罅中松鼠出沒淨滑可人舍澗而上碧峯得寺曰𢎞教亦有亭可眺也有松盤曲夭矯膚皴枝拗有遠韻間有怪石佛像清古亦為山中第一降復過翠巖循澗左行山口中為曹家樓有橋可憩竹柏駢羅石路宛轉可三里許青苔紫駁綴亂石中牆畔亦多斧劈石骨理甚徑意山中概多怪石去其土膚石當自出無奈修者意在整齊即有竒石且將去天巧以就人工況肯為疏通顯其突兀奮迅之勢者乎絶頂有亭眺較遠以在山口也此處門徑𢎞博不如香山而有山家清奧之趣亦當為山中第一也又紀翠巖寺門有渠天雨則飛流自山顚來巖吼石擊濤奔雷霆直走原麓洞駭心目剎後石路百級有濤好鳥和鳴於疏林中隱隱見都城九衢宮觀櫛比萬嵗山及白塔寺了了可指其郊坰之林煙水色山徑柳堤及近之峯巒叠秀樓閣流丹則固皆几席間物出門即為登眺入門即就枕簟雖夜色遠來猶可不廢覽矚有泉甚清可煮茗遂宿焉風起松柏怒號震撼衝擊枕上聞其聲如在揚子舟中駕風帆破白頭浪也豫遂定計九夏居此以避長安塵埃武林黃汝亨紀從洪光寺過佛光寺為𢎞教寺有石橋魚池不及碧雲寺前有流泉亭亦似碧雲蘭亭意而攝境開山面過之會晉州趙孝亷飲此與之浮三大白而别𢎞教之傍有巗俗稱晏公祠余偶入視其內皆石室琢三皇五帝列聖名賢像自吾師宣尼而下及宋朱紫陽李延平諸公兩壁又刻畫忠臣孝子如王祥顔杲卿之屬又有小石室題函五經書史訊之乃武廟時中貴晏公造也余因嗟嘆自吾入西山所見金碧殿閣皆浮屠氏之宮大都皆中人自營其身後香火藏而此室獨及吾儒門一宗何類無賢盧師山在京西三十里山半為祕魔巖巖石嵌空幾二丈舊傳隋末有沙門曰盧師居此山能馴伏大青小青二龍故名巖下一池二青蟄處視之若不甚深然探入不可窮都人于奕正云石子鑿鑿故桑乾河道也曰盧師山有寺曰盧師寺正統十一年更名清凉今佛無殿已過寺半里者祕魔巖是盧師晏坐處相傳隋仁壽中師從江南掉一船來祝曰船止則止船至崖下止遂崖居居數歲二童子來曰大青小青願侍不去嵗大旱所司徴禱雨者童子白師乘師願願施雨雨一方也遂乘雲氣去俄雨大注知大青小青是乃龍矣龍歸投潭中潭廣丈巨石覆之深黝不可測二龍有時出雲氣仍隨之崖下塑二童子侍師像崖上一柏産石面長尺不凋不榮是盧師手植翠微山在城西三十餘里上有圓通寺蓋舊平坡寺也姚少師嘗言平坡最幽勝學佛者所宜居山半有平地故名洪熙初始改今名從香山東行飯于善應寺中東走澗道尋盧師山覩翠微一帶蒼石碧瓦掩映白楊深柏中而新柳杏花希稠㸃綴斜分倒插盡有深情蓋香山如揚州花市濃抹故佳而此地則若耶曲徑其不厭正在淡粧耳從盧師寺祕魔庵循東岡而至清凉寺寺有古佛像其前為平臺眺望甚偉自此下而南折皆從山邏中行花柳時可觀凡折數盤涉五六庵而至平坡寺寺一閣庋山顚于遠眺尤勝舊志山上柘樹一株屈曲如虬斜傍二潭潭水磅礴繞峯而出其頂修竹箯姢不减江南潭柘山在京西八十里出京至馬鞍山千佛閣及戒壇至龎涓洞踰二嶺而至潭柘潭柘以一培塿當羣山心九峯扆而立焉志所謂老柘美竹者烏有矣而兩殿鴟工絶則金元故物也寺後故有龍潭今已甃為池而其支委尚濶去山數里泉走石崖壁間聲甚怒至寺橋而水益怒覺山在京西三十里懸崖之上與盧師平坡鼎峙西有三泉曰清冷曰清香曰洊至韓家山在京西三十六里山隂有漢左馮翊韓延壽墓韓世居于此俗呼罕山又呼黑山滙仰山在京西七十里峯巒拱秀中有平頂如蓮花心旁有五峯曰獨秀翠微紫蓋妙髙紫微金章宗有詩刻石云金色界中兜率景碧蓮花裏梵王宮鶴驚清露三更月虎嘯疏林萬壑風百花陀在京城西王平口四圍皆山中有平川約數十畝産杉漆藥草春夏之交百花爛然有金章宗石床今存都人于奕正紀府西一百二十里由王平口過漢胸奴分界處曰大漢嶺抵沿河口元女廟是百花山足也山翠躍來引人渡石澗上馬欄山折旋其徑左右周轉百步當直上十步以登所苦石磊磊承趾不似土柔素車馬人趾繭生之所喜樹隂雲影䕃蓋密稠不至曝酷徑此至法幢庵五里徑折旋如前幸容騎而馬奔奔喘喘汗淫淫多不忍騎者上下諸嶂縱橫一翠迎送目步不覺五里籬徑坦然者姚庵也嶺而西行數里千佛山又數里觀音山徑折旋如前山舊有菩提樹仙人橋望海石盜伐樹矣橋石則存過此山石盡於空際態變矣下上嶺者七迎前壁立者鶴子山也此去千佛巖山石態變者盡作人形度閻王􅮬是百花山腰也百花者紅紫翠黃不可凡數不可狀喻不可名品即一色中瓣蕚跗異不可概之土人指一種尊之曰天花豔光而幻質佛諸經每所稱天雨曼陀羅花天雨曼殊沙花也行百花中一里進籬門石洞禮佛殿上禮文殊閣上禮文殊法身塔下登菩薩頂纍石凡三峰登者必以小石纍而尖之種佛因故石小風大不能吹去以示曠劫無動轉故坐立頂上俯諸山搢如圭東西兩靈山也乃旁四望東京師也南冉冉者渾河也西鬱鬱乎茶露頂居庸諸山北蕩蕩乎邊城外沙漠際無窮也是百花山頂也下頂未半又入百花中不可名狀數者多於前遊此者或曾見文殊光風雲作雷一聲山灝灝如海忽左澗一圓光輪右壑遍初白次紅次五色具木石人鳥塔語攝入光中如鏡受像我聞文殊表智故放光莫勤五臺智光也東之龍王頺廟列五龍王中位龍母北之大士殿髮鬅鬚鬈然下千佛巖南之東之又入百花中花被徑八里多於前過白水庵行泉聲二里一松標瑞雲寺寺即五代時李克用建亭故處俗今曰百家寺也寺有摩訶祖師法身用像法裝之若新有摩訶煮石鐺非石非鐡瑩如漆光宣宗曾取視賜以龍袝歸寺也有摩訶摔龍石龍逸袓追摔之今龍迹宛于石也志稱山暖肥産杉漆藥草春夏爛紅紫香襲人則百花者藥草花耶然本草圖經中亦無從物色之附退谷小志退谷在水源頭傍退翁記云京西之山為太行第八徑自西南蜿蜒而來近京列為香山諸峯乃層層東北轉至水源頭一澗最深退谷在焉後有髙嶺障之而卧佛寺及黑門諸剎環蔽其前岡阜回合竹樹深蔚幽人之宮也水源頭兩山相夾小徑如線亂水淙淙深入數里有石洞三傍鑿龍頭水噴其口又前數十武土臺突兀石獸甚巨蹲踞臺下相傳為金章宗清水院章宗有八院此其一也水分二支一至退谷之傍伏流地中至玉泉山復出昔有人注油水中玉泉水面皆油也一支至退谷亭前引灌谷前花竹谷口甚狹喬木䕃之有碣曰退谷谷中小亭翼然曰退翁亭亭前水可流觴東上則石門巍然曰烟霞窟入則平臺南望萬木森森小房數楹則為退翁書屋一榻一爐一癭樽書數十卷蕭然行腳也谷之後髙嶺峩峩攝衣而上為古塋塋垣之外有臺可憩茂松蔽之不見其下谷之東則隆教寺寺前舊在退谷上移置石門之東殿供大士像嵗久漶漫寺僧秋月募善知識繕飾之境地深邈可供趺跏谷之前為蒔植花竹之圃中有僧家别院養牡丹數百本石樓孤峙面面皆花北望退谷掩映翠樾中如懸董巨妙畫在閣之壁谷口外沿泉東行皆石壁也大石一方上建觀音閣再東則卧佛寺傍扉入扉娑羅古樹大可數圍柯幹參天瞿曇酣卧殿上亂後寺廢香燈久斷矣寺門白塔髙矗大松兩行擁之香翠撲人衣裾谷西南里許為廣應寺寺有白松如雪門外深澗石橋橫之橋傍喬松數十株箕踞其下看碧雲香山諸寺丹甍碧瓦如蜃樓如絳闕又惝恍如夢際谷西越澗而過則長嶺橫拖嶺半為章宗看花臺古松一株夭矯磅礴拾級而登此則佳主人也谷後踰嶺數重則見湯峪畫眉諸山東北烟樹迷䝉鞏華城也又天半搖搖萬馬騰空而下天壽元宮也廣應寺之西為木蘭陀由寺前鳥徑西指過小橋三四徑漸峻盤旋而上始至玉皇殿殿南别院有軒有室小樓三層踞山之巔俯視𢎞光寺松盤香山來青軒諸勝殿北深澗懸崖水出洞中傍為魚池為藥欄為篁叢殿側有滿井水可手掬西山山頂之井廣皇寺與此為二甘冽似中泠谷中瀹茗取給二井退谷逸叟記附記西山髙隱按漢王氏有五侯乃談商立根逢時也五侯中王談實為貞臣談雖封侯而不肯事鳳水經注王談不同王莽之政子興生五子並避時亂隱居涿郡西山光武即位封為五侯元才北平侯益才安喜侯顯才蒲隂侯仲才新市侯季才為唐侯所謂中山之五王也此五侯以貞節封比前之五侯清濁不同矣本傳談倨不肯事鳳不輔政而薨子仁嗣仁素剛正莽內憚之令人奏就國後遣使迫守令自殺是不同王莽之政者談之後又有子仁所云興者豈即仁之弟耶因兄死而相率避亂正相因也惟仁受王莽之誅而後光武義而封其後然則談抗王鳳仁抗王莽興子五人並能沉冥髙隱居西山則西山以五王重矣此山苦無古蹟有如此懿美之蹟而志不知載惜矣軍都山在昌平州西北二十里昌平漢軍都縣以山名也後漢盧植隱居上谷立黌肆教授生徒昭烈微時修弟子禮焉彼時軍都縣屬上谷郡又名居庸山銀山在昌平東北六十里峯巒髙峻氷雪層積色白如銀故名麓有石崖皆成黑色又名鐵壁頂為中峯逈出雲霄緣石梯上五里許下視梵剎如彈丸剎乃唐時建領七十二庵沙門鄧隱峯藏修之所有浸月泉天清橋巨虎石誦經臺諸勝明李元陽記曉起騎行幾二十里路人乃云赤獨子去密雲已旬日矣衆相顧色阻南沙謂豫曰銀山鐵壁去此不遠盍往遊焉遂折北而去諸君相尾問程或言逺或言近各有難色遲回不進南沙與豫恐為所阻遂策馬亟馳行六十里至鄧隱峯道場八角亭東北有鐵崖壁立石色熒然頃之月出爛如銀界洗盞更酌夜分不寐明日將拄杖登頂寺僧曰頂由閻王鼻行僧住此十餘年亦不敢度豫二人笑而不聼竟趨鼻側山脊如刀背僅容一足長約十步面旁如削下臨萬仞不可凝視罡風吹衣足不能立豫曰列子履萬仞之險足二分垂外何如乃去鞾鞋趺坐徘徊取棋枰對奕南沙忽推棋東行比豫回顧渠已度鼻矣豫亦側身起立逐其武而東遂相與同登山頂豫曰君無議擬豫無思量乃能至此向使議擬思量東瞻西顧則私意起而反惑安能至此哉南沙曰士之立朝能以無議擬思量之心行之何事不辦坐未有頃寺僧憑樵者送茶各飲一盞樵者指長城外曰此為黃花鎮此為居庸關又西為某關又東為某鎮皆在烟光微茫中萬里龍沙風霾無際令人氣吞邊塞眼隘寰區矣罡風稍定挺身度鼻而回初無難者回入僧院崔都尉京山自外來曰聞二公在此願得同遊遂舉觴薦山䔩坐月下說長城險易夜分各就宿明日京山早發來别豫二人尚未下榻飯已由捷路向昌平道中多木柵如圈初不知其故既而問樵人乃知其為致虎圈也頃之從人告饑遂就流泉而飯甚甘之馬上作銀山鐵壁歌夜投昌平公署不食而卧明日荆川少海擕酒來相勞頃之湛泉亦至因為言山水之情狀諸君頗以不遊為恨荆川名順之編修武進人湛泉名與齡驗封郎山西人少海名瀚考功郎順慶人南沙名過職方郎富順人豫則名元陽字仁甫號中溪大理人為御史玉帶山在州東北十五里山腰白石周圍如帶實拱揖皇陵者又五里為筆架山三峯並列逈出雲表成祖元宮在焉州之南則曰鳳凰山出城西四里至紅門兩山並峙連翩如鳳翥州北則曰虎峪山巍峩若虎踞又十里曰昭壁山正方如屏以作南障州東有影山逺望之其影先見故名是為東山口州西有小金山日午金光射人又皆陵園諸山之護翼紅門之西翠屏山下出泉九穴為池名九龍池池上亭臺金碧輝映敻若仙都又有仙人洞在紅門東山腰谽谺俯梯而下至洞約三丈許內有一門巨石天成近門上有石鐘長約數尺倒垂待叩入門轉南見有石縫如夾道元窅無際不可深入古詩云我欲叩石鐘驚起洞中人烟蘿杳無際空鎖石門春石洞何窈窕云是仙人庭仙人渺何許瑶草空自清石洞窅且深花落無人掃仙翁去不還何處尋瑶草白浮山在昌平南一十里山有二龍潭流經白浮村元人郭守敬引此水西折而南經甕山流入積水潭以通漕運郭守敬所築堰起白浮村至青龍橋延袤五十餘里以障雙塔神山諸水名曰浮堰駐蹕山在昌平西南二十五里髙十餘丈西北袤二十里金章宗遊此鐫駐蹕字上有臺章宗自題棲雲嘯臺四字都人王嘉謨紀自髙梁橋水度至白浮甕山出薊縣境甕山斜界百望是山也南阻西湖神臯蘭若皆萃焉北通燕平叢叢􅀈磈背而去者百里猶見其峯焉是宜禾黍山之陽有祠焉髙十五丈登之可以望京師可以觀東潞出百望十里為長樂河河水不甚濶而駛又北二里為玉斗潭潭箕圓僅丈腐草罨之深不可測或云是有物焉有兩牛鬬而飲陷於潭輒不可得又北十里為灌石駐蹕山在焉其山長西北袤凡二十里石皆壁立髙可十餘丈嶟㳫欹危如墜如挽前臨平川一望無際孤堠時隱猿鳥悲號行者凛凛西望白虎站深若天井湛碧難盡山之上有臺是名棲雲金章宗嘗遊焉登臺而嘯題石而歡下而觀於野蓋燎而獵焉召其部長大人擊毬俄而自擊也乃歎曰美哉乎而誰見之山下石牀石釡俱存山之西有洞是名寒崖勢殊奧邃中多異草竒石灌木隨風揚芬四望則惟北多岨云壽宮之成也上自狄村遊於渾河是嘗駐蹕自駐蹕而北皆崇山也連綴匼匝又砂礫延緣巖間白石嶄嶄春夏雨潦則成巨浸樵采不達又北二十里許乃從西折斜入南谷有聚焉是名漆園園之南有山焉是名雅思是山也幽晦多霧富有果蓏山陷而為坎有池焉浚洌如露是名露池有比邱一人土人敬事之自園而出再由走集西十里許為髙崖崖下有衆泉繞其聚四面皆山蔚洞森蕭壙如也又西北十里許為清水澗是澗也兩山如門行可二十里山皆竒峭巃嵸山中飛泉滮灑或决地或分流淙汩樹木之間推激巖崖之穴青如亂鬌白如吹絮仰視重峯時有孤石之揭揭沈黯迷離天氣自曀崖間百合忍冬棠杜牛妳相思郁薁黃精唐求之屬滲味扶芳爍紅隕翠飛沫擊枝墜而復起新實含濡落而不變竒禽異羽嚶嚶滿耳鳥巢雉囮遍其巖穴山鹿之毳豪豬之毛丰茸隨風泝流而行髙髙莫極有嶺焉名曰鰲魚又西里許山益峻有蘭若二焉上曰松陽下曰金鷹其上獨多松合抱而數丈者有三朴遫者萬計登之而望則大山屏張霅然斜開則金鷹在焉金鷹下控大巖巖吐百穴滙而為湖决而東流是為清水之源迤邐以東下山折坂而南蓊然紅赩髣佛有光有陘焉曰六十屈折汗邪黃蘆白沙之間可六十折再由走集又西有陘曰十八盤息壤如金鬱勃而立狹可容人可十八折登顧徘徊西則植立夾持不暇停足俯視斜柯洪枝匝藤蘿而舞鵾雀者深深莫極旁睨則北山矗矗一隂一陽閃倏孤日含濡雲彩山之上平衍西五里有嶺焉是曰長城蒼黯髙竦下視前坂其巔瓦礫縱橫微有雉堞剝蝕沆莽是曰秦皇之址有泉出焉是曰馬跑苞稂覆之將眢矣又西二里有臺焉是曰了思衡可二畝髙可數仞莎蘋匝之楸檀桕柏之木宛宛相構登之可望四方斗絶有足懷者下臺而西又十里皆峻嶺也判為中路巖之兩間如榭如障如層構深藏如㫖苕盤互花實齊秀風泉並響逺聞伐木嶷嶷留滯有嶺焉是曰灰嶺險特倍於長城石如蛤粉無樹木大石磋磋吹籟揚塵則紛溶而起百里可見了了如雪路口如甔甀一綖孤露瑩照通川下山有城焉是曰鎮邊之廢邑又西八里許有城焉是曰鎮邊兩旁皆山圍之其南曰碧駕之山曰通明之山其北曰鷹揚之山曰涔洛之山有湖焉小而深在碧駕之巖圞結不見每多異草中有赤鯉盈尺春夏之交山水增流則湖益清可鑒是曰合抱之湖鎮邊巖邑也居人僅可百數地寒不能五穀五畜勞羸不甘兵雜其間狡猾難治西十里有堠曰唐耳背據大山下視懷來煙液杳裊足為天險樓堞固溝洫濬軍械精睨橫嶺而斜界居庸可甲燕平鎮邊廢邑其南皆山也中為衢路其東曰六華之巖其西曰小神之山曰青利之山巖分形如六華其第四巖有洞焉最深窈土人夜登之取宿鳥忽有雙鶴飛鳴是為鳴臯之洞南可十里有聚焉曰長峪又西五里有巖曰德勝又曰鳳凰上有蘭若焉是山也威紆距絶抵此而窮四面環匝山可三十丈磴道半之登之每顧則山形變蘭若已圯然蟠結秀竦下視三山側側欲合東望長峪蔚然開陽其左巖崟尤峻石稍擁出山下有泉焉源源可二十里達於渾河照映蕭瑟町畦滉然據巖而立終日無人山之上竒樹新實甘香飂䫻背秋涉冬空冗悄然萬碧俱立山之上有臺焉登之而望則蹙然兩山蘭若閉藏不可俯見是曰隱鷲之臺山之西有洞焉小而隘可容數人門有古松蔽之坐其中以瞻西峰有如指掌中壁刻觀世音大士像鐫刻甚深是曰觀音之洞又曰孤松之巖蘭若講堂中有蘋婆三株大可合抱翠葉多子團圞數丈真可竒也山之南有嶺焉曰西峪可以入沿河山之下有碑不可辨自長峪而東可二十里有聚焉曰菩提塹有祠焉是祀菩提蓋古人有乞者衆食之俄而怒焉乃殺之剖而食猶故民神之是為祠也有蘭若焉曰白駁是山也險倍灰嶺不通行者幽阻凄藹蕭然可詫有壇焉幢設於上皆紫英之石爛若丹霞有銀杏二樹大可盈抱芬盛多子出山而北有山焉是曰白鶴其峯岫繚繞不易詰也其中有白色皬然狀如鶴著於石上又折而東則走髙崕北山自髙梁至德勝共百八十里小山至衆記者二十鳥有紅鴉沙雞文雉半趐獸有虎豹竒狸狼野干白駁豪猪兔麅草樹多竒土人每言二月之交有山曰青華下可萬丈西通四方每有瑰形竒物且飛且走銜乳而西獵人莫敢近也又言三伏每雨羣山出流大石浮浮馬奔麏至有如雷霆仰視碧駕鷹揚之山半在雲霧戍樓晝晦飛雲積煙片片入戶連月不霽實神京之奧區山川之都㑹也􅒖􅒖崖在昭陵之北極其險峭于奕正記􅒖􅒖崖旋旋蟠蟠望若梯磴石醜怪若鬼面下崖之庵曰瑞峯一曰麻尼崖髙危立庵逼其踵南山前逼菴而又髙危冬前後兩月蔽不見日惟短至日景一線透之崖三峯而三庵兩峯翼中峯首自盤道庵以之東峯菴壁與石與樹也西若有竒焉自渡津橋以之西峯菴壁與石與樹也東若有僻焉自東西峯以之中峯菴壁與石與樹也東西若有髙焉天啓中陵監飾五菴新矣三峯失其朴妙髙峯在西山後居庸關諸山之面也與天壽山相接中開一罅即居庸關山峻而秀故以妙髙稱袁中道記妙髙峯去沙河四十里逺視之惟一山逼近則山山相倚如笋籜皺雲駮霞極其生動其根為千年雨溜洗去石骨稜稜每山窮處即有小峯如筆格法雲寺枕妙髙峯最髙處近寺有雙泉鳴於左右過石梁屢級而上至寺門內有方池石橋間之水泠然沉碧依稀如清溪水色此雙泉交㑹處也其上有銀杏二株大數十圍至三層殿後乃得泉源西泉出石罅間經茶堂兩廡繞霤而下東泉出後山經蔬囿入香積而下㑹於前之方塘是名香水也山石雖倩更得此水活之其秀媚殊甚有樓可卧看諸山右有偃蓋松可覆數畝故老云金章宗遊覽之所凡有八院此其香水院也金世宗章宗俱好登眺往往至大房山盤山玉泉山而其中有云春水秋山者章宗無歲不往豈即此地耶上方山即古稱大房山最稱竒秀古碑云幽燕奧室閩中曹學佺紀出房山縣行六十里所過村落曰瓦井曰天光曰孤山口皆與山勢為升降過孤山口則崇山如環幽溪如帶時時涉溪沿壁踐苔捫蘿乃至山麓有一庵焉為諸峯所覆如狻猊之昂首也巉巖兩壁相距中開一線鳥道盤旋五里至石梯梯即巨石五丁鑿為坎僅容半跬髙數百磴左右兩鐵絙長百尺山顛下垂陟者緣之手足分任其力蓋左迫無極之巖而右臨不測之淵矣梯盡處有小庵可憩折而東北可一里至山門入門始昂首見諸庵縱橫稠疊處於懸崖峭壁蒙茸之內如鳥巢然所謂禪棲也獨上方寺正中如負扆以居躡千百磴始可到傍有兩澗流下聞而不見水其上有氷封之耳又東折而往則連嵓層隂雪堆未化獨有古柏青青龍蟠虬舞出雪之上其嵓軒揭如仄竒秀如雲穿注如蜂房燕壘嵓下有泉深三尺廣倍之面一平臺又十倍之相傳開山時有龍占此禪師叱之避盡挈其山泉以去師飛錫擊其尾留泉僅滿斗今山即名斗泉也山下有洞尚隔一山說者以此山空腹寺徑達洞然人必自其上行上行必徑前峯孤圓突兀形如摘星望之甚憚陟亦可至峯半可俯諸庵嶺亦劣平尚不見洞又下五里入洞如一城僧家依洞為窟石牀茅扉可掬為客煮茗初未有水以葫蘆繫腰至洞裏取水曳之出入尋縳枯藤為炬鱗次而進第一洞猶隱隱見影二洞以內即黯黑無光三洞是一小竇圍可三四尺深五六丈伏地匍匐束身蛇行即僧所曳葫蘆處也入三洞倐髙廣燎炬不見頂傍有一潭石蜿蜒如雙龍狀其中圓光如珠於是取水焉抵九洞無路有穴如井入者後人躡前人背丈餘復空濶但霧氣蓊塞履滑衣濕不易前進至十三洞路尚不窮云過此無竒興盡返矣大抵中以一曲為一洞十三洞約有六七里洞中之石玉白鏡瑩剷為琉璃踰寸明徹其境之最著者曰蓮花山片片如青蓮瓣曰龍虎宛肖龍虎曰長眉祖師兀坐巖畔眉翛然垂曰呂純陽儼然具道者衣冠曰石塔層層筆立曰石鐘鼓叩之作鐘鼓聲此非歷三洞穿竇之苦不能得也又其最著者曰須彌山一山甚大行良久難盡曰雪山猋如積雪捫之若刺曰萬花樓山之上有重樓焉以雪為地吐花如靈芝者數萬朵曰仙人橋跨青溪而渡曰十八羅漢為修短欹正各狀貌曰接引幡從頂倒懸縹眇若拂此非歷九洞入井之危不能得也出洞之後依然天光逈若隔世驚喜異常小西天即石經山也在房山西南四十里紀云范陽懷玉鄉西北山水秀異出獨樹村北行四里許兩山對峙外隘內豁小溪中出石峯參差如犬牙水觸石流潨然有聲沿溪前行十數里有巨石數十橫布水中躡之以渡登平岡而望四山多離絶之勢峯巒峙立如書空之筆者不可勝數其中一山若火焰而草樹獨茂問諸牧童知為田帶山而小西天之境在焉迤邐至山麓壁立似不可登徐望之有磴道循山之偏脊直上行者前後頂踵相接凡三憩息始及山之半有石室題曰義飯㕔碑志云唐乾符中僧藏賁所建欲俾遊者至此不必齎糧也由㕔前折而東鑿石為道廣不滿尺橫於山腹者一里許將折而北則條石為階凡九十九級上至平處行百餘步復有階如前級差少自其上平折而南有石堂東向方廣一丈五尺許名曰石經堂堂有几案罏瓶之屬以祀三寶皆石為之其上天然如帳頂下則甃石以平其地三向之壁皆嵌以石刻佛經字體類趙松雪意必元人所刻其中有四石柱柱之上各雕佛像數百皆為小圓光而飾以金碧堂之前向為石扉八扇可以啓開外有露臺縱僅八尺橫與堂稱三面為石闌設石几石牀以為遊人之所憑倚傍有禪房庖湢之所皆因巖為之不假人力堂之左有石洞二其右有石洞三復有二洞在堂之下方石經版分貯其中蓋隋沙門靜琬始以經刻未成而奄化唐貞觀後其徒道公等繼續成之至遼統和及金明昌之際有沙門留公順公亦增刻之前後納於洞中者通千餘卷石凡七百餘條有石幢記其目甚悉每洞皆以石為窗櫺用鐵固之縱廣不可知而石本之近窗者可以窺見觀其字畫則遼金所刻與隋唐自異其左洞有靜琬貞觀八年碑記嵌於門上大意謂未來世佛法有難故刻此藏之以為經本若世有經願毋輒開其用心亦可謂勤矣石洞之北有石池石井池廣七尺而深半之井深淺不可測皆瑩然涵虛可鑑毛髮井之北十餘步有泉自竇中出涓涓不絶又有石為龍王像民禱雨則祀之古木蒼藤樛錯其上然隂翳慘淡不可久居由泉竇之南復扳緣小徑盤屈數十折至山頂有五石臺臺之上皆有白石小浮圖其南二者乃唐金仙公主所建刻字如新餘無題識不可考頂有巨石後廣而前鋭平出於虛空者數尺相傳謂之曝經臺豫至其上回視四山則向之特立若書空之筆者皆隱然在履舄之下似可垂手撫摩稍臨石之鋭處而俯視之則陡絶萬仞無有底止已而下至堂中左右有碑十餘通特觀其髙大者則唐元和四年幽州節度使劉濟與其僚來遊所建主僧指曰有雲居寺亦靜琬所創西偏下五里許可造乃至山麓渡小溪叢薄間寺規制已壯然比舊基差小墀中有唐時所建石浮圖四皆勒碑其上其一開元十年助教梁髙望書其一開元十五年太原王大悅書其建於景雲二年者則寧思道所書而大極元年建者則王利貞之書也然獨不著撰文人豈即書者為之歟豫次第讀之愛其字畫清竒皆有虞褚法老僧復曰後苑中石刻猶多遂歷榛翳間見殘碑斷碣或立或仆不知其幾而多貞觀開元時刻紅螺嶮在上方東三十里循九龍峪過八達嶺穿雲㑹門始及下嶮再挽鐵綆而上至紅螺洞曰中嶮再上半里為松棚庵再右百磴曰觀音洞是為上嶮公安袁宏道紀紅螺嶮從葫蘆棚而上磴始危天始夾從雲㑹門而進山始巧始纎水始怒卷石皆躍至鐵鎖灣險始酷從灣至觀音洞仄而旋竒始盡山皆純鍔劃其中為二壁行百餘步則日東西變數十步則嶺背面變數步則石態貌變矣壁郛立而隂故不樹瘦而態故不膚亦不頑蛟龍之所洗滌霜雪之所磨鏤不工而刻其趣乃極盤山一名盤龍山在京東薊州西北二十五里髙二千仞周百餘里勢磅礴而盤桓因名記云自三河行五十里至盤山之麓仰望其嶺元紫逈異浮圖樹石溢於目前既入山有長泉一道從峽壁間飛噴而下穿齧石趾鳴㶁㶁不已壁上劖盤泉二字沿泉而上至中盤寺當即下盤耳東折里許有亭左右峯勢拱抱出一岡巒嶐然突吐是為亭亭傍有松髯甲夭矯如虬龍石谽谺磈礧甚異山之石乃從此始石有一片數斷又數片相連若飛若走若蹲伏若臥若坐若立若負若搏噬若撐若平若傾欹若嗸然以出若畏而縮樹拳而曲徑詰而折皆以石故至其地差衍而松勢得以少舒者上盤寺也實為山之中西有懸石亭亭趾為平臺其嵓隂百仞之上有石懸空勢壓亭表折而東北躡嶺以登將及半嶺左望前石若巨人仰天臥其下峭削背與山合處有光斷而不斷懸空之妙畢呈於此上之始見長城長城者塞上山也城與山為髙下起伏山青而城白如領之有緣金玉之有相大者為虹霓小者為縞帶縹眇糾紛不可窮詰又上之始見塔體圓質素卓立雲際峻整精潔如經磨礱山有三盤而此據其上也盤山者以山之盤旋曲折而言之也或曰山有三盤焉其說近是又謂山有盤石可搖動故名下山從他道觀之石圍數丈一人搖之輒動吳郡王衡紀出公樂十里許而山髻見若黛染頳山頭晡乃至廣濟寺繞北而西抵環翠亭亭面山松屏之并東西崖者為三望而第其伯仲焉質明復緣石澗下三里許稍上而羣峯相拱揖又上則圍山而帶林莫可辨其隅面其一峯稍遠對松立者九華峯也峯勢峭欲摩天意氣漸上而紺宮翠邏又自下以秀色留之杖策策然不能即行良久穿蔡氏巷西折而陟北岡長城蜿蜒界山半如線沙白浩浩際以濃雲猛風意色慘然越數嶺倐陡下俯瞰巨谷窅然深黯百谷之縷紛出而繆聚於此又里許而為上方自盤山而至上方下下上上幾百千折行者相望於石根木杪有相去數程而望不盈咫者計山形殆蛇縈而瓣襲山故名盤名當不虛上方之前曰懸石亭自此上益陡絶更百尋而至舍利塔塔標峯首五峯肩而隨焉蓋山絶頂也其西峯為無梁殿殿後稍有餘地可縱立覩層沙叠巒面面縈抱蓋盤山之外若有大盤山焉三河寶坻甘泉長城俱在望又數里雙峯塔額隱映樹樾如白鳥踏碧浪中自雙峯下走旱麓忽東轉望見沉碧冉冉者曰百草窪其稍下而最深者為天城寺寺當谷口巖壑肩背皆蔚藍紺緑相為因依自寺上之三里許為李靖庵又二里許為舞劔臺側東走為東甘澗又西折而為西甘澗又五六里許至仙師臺公安袁宏道紀盤山外骨而中膚外骨故峭石危立望之若劍㦸熊虎之林中膚故果木繁而松之抉石罅出者﨑􅋂虬曲與石爭怒其餘壓霜雪不得伸故傍行側偃每十餘丈其面削不受足其背坦故遊者可迂而達其石皆鋭下而豐上故多飛動其疊而上者漸髙則漸出髙者屢數十尋則其出必半仄焉若半圯之橋故登者栗其下皆奔泉夭矯曲折觸巨細石皆鬭故鳴聲徹晝夜不休其山髙古幽竒無所不極李元陽紀盤山頂上無土盤石徑四丈許有大字刻云唐李從簡遊李靖舞劍臺蓋此石即靖舞劍處也字刻約八寸許深燕山在京東自西山一帶迤邐來東龍騰虎躍延袤數百里直抵海岸宋蘇轍詩燕山如長蛇千里限夷漢首銜西山麓尾掛東海岸中開哆箕畢末路牽一線却顧沙漠平南來獨飛鴈居民異風氣自古習耕戰上論召公奭禮樂比姬旦次稱望諸君術略亞狐管子丹號無策亦數遊俠冠哀哉漢唐餘得失所操半從來帝王師要在侮亡亂攻堅甚攻玉乘瑕易冰泮中原但常治敵勢要自變㑹當挽天河洗此生齒萬碣石山水經注云大碣石山在古北平驪城縣西南王莽改曰碣石也漢武帝亦嘗登之以望巨海而勒其石於此今枕海有石如甬道數十里當山頂有大石如柱形往往而見立於巨海之中潮水大至及潮波退不動不沒不知深淺世名云天橋柱也狀若人造要亦非人力所就韋昭亦指此以為碣石三齊略記始皇於海中作石橋海神為之竪柱始皇求為相見神云我形醜莫圖我形當與帝相見乃入海四十里見海神左右莫動手工人潛以其腳畫其狀神怒曰帝負約速去始皇轉馬還前腳猶立後腳隨崩僅得登岸畫者溺死於海衆山之石皆傾注今猶岌岌東趣疑即是也韓苑洛云東海至永平府南發出一洋東西百餘里河從此洋之西自北注之此洋正逆河也碣石在右轉屈之間碣石在海洋北洋濶五百餘里自洋南遠看如在海中實未淪入海也春明夢餘録卷六十八
