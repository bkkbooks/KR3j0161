body:
  text: 春明夢餘録卷三十八吏部左侍郎孫承澤撰戸部四寶泉局寶泉局在皇城東北國初錢法專屬工部寶源局自天啓二年始設戸部錢局以右侍郎督理之名錢法堂加爐製造以濟軍興戸部尚書侯恂條陳鼔鑄事宜一議興鑄利古寶龜而貨貝後世易之以金幣然自太昊髙陽以來則已有錢矣虞夏之際幣為三品曰黄曰白曰赤兼龜貝行之不純用錢管子亦云先王以珠玉為上幣黄金為中幣刀布為下幣所以守財物御人事而平天下也故命之曰衡謂之衡者將以行輕重之術使一髙一下乃可權制利門悉歸於上也秦兼天下幣二等黄金為上幣銅錢為下幣而珠玉龜貝銀錫之屬為器飾寶藏不為幣漢自建元以後即山鑄錢而又用白鹿皮為幣造銀錫為白金有三品未幾皆廢唐於銅錢外有飛錢宋以鐵錢與銅錢兼行又倣飛錢為交子為關子始以楮為錢南宋造㑹子有大鈔小鈔之别凡十等又謂之錢引亦謂之關㑹實一而已元造交鈔以鈔一貫權銅錢千文無何物價騰踴逾十倍積鈔不售國用大詘明興右鈔抑錢旋令錢鈔兼行禁民間不得以金銀貨物交易違者治罪告發者即以其物給賞若有以金銀易鈔者聽一百文以下止用銅錢永樂中以鈔法圯而峻金銀錢物貿易之誅然究之鈔易昏爛收換艱難制雖設而法不行今天下自京師達四方無慮皆用白銀乃國家經賦專以收花文銀為主而銀遂踞其極重之勢一切中外公私咸取給焉民用不贍而國安得不貧幸賴稍稍用錢耳安得不亟行鼔鑄以救其乏乎夫錢出於銅銅不鑄錢則銅而已鑄之為錢而可以前民用則是盡天下之銅皆已變而為銀也利孰大焉以錢濟銀之窮而又用錢殺銀之勢使錢廣布民間則可陰歛銀以歸之上於是用銀為母錢為子而因以行其髙下之術昔先臣邱濬欲倣古三幣之法寶鈔銅錢通行上下而一權之以銀夫鈔恐難行矣舍鈔言錢可也一議遏銅流自三品之貢興而黄白赤金世為天下幣漢而後佛老象教盛行於域中寺若觀糜黄金者億億計而天下刻鏤織作錘冶為冠服衣履什物者又不可勝原故黄金日銷而赤金乃大行已亦漸貴固其理也夫有利之源有利之權利源之消長在天地利權之操縱在人主昔之善議鑄者無若漢二賈山之言曰民不應與主同柄誼之言曰銅畢歸於上則博禍可除而七福可致今天下姦民私鑄陰持主柄以厲公錢果如誼言上收銅勿令布下民安所得銅而私鑄之故收銅之說持柄息奸之要術也劉秩曰鑄錢之用不贍者在乎銅貴銅貴之由在乎採用者衆耳夫銅以為兵則不如鐵以為器則不如漆禁之無害使銅無所用則銅益賤則錢之用給矣又銅不布下則盜鑄者無因而鑄則公錢不破公錢不破則人不犯死刑錢又日增末復利矣斯言可謂曲盡自漢先主取帳鈎銅鑄錢以充國用唐大歴中嚴天下用銅器之禁貞元九年張滂奏請國家錢少損失多門興販之徒潛將銅錢一千為銅六斤造做物器則斤直六百餘有利既厚鎖鑄遂多江淮之間錢實滋耗伏請除鑄鏡外一切禁斷如有鎖錢為銅者以盜鑄錢罪論宋朝鑄錢比前代最多銅禁最嚴大抵國計仰給於此自熙寧間王安石一變其法而國用日耗聖祖始定天下令軍民惟鑄鑑及軍器又禪門鐘磬鐃鈸得用銅此外并收之官有私藏者禁嘉靖六年題准但有銷鎔舊錢及今制錢造作銅像銅器等項比盜鑄律科斷隆慶元年部議軍民之家但有廢銅願賣者聽赴所在有司易錢易銀照舊給價宜申明前例嚴藏銅之禁行收銅之法民間私藏銅器及造作銅像銅器被告發者比盜鑄律罪無赦市有鬻銅器者罪亦如之官收民銅給銀若錢視銅之直如有爐座處所於存留錢糧内動支其銅即以充鑄如無爐座處所於起解錢糧内動支准將銅估抵解京夫民以無用之銅易有用之鏹其何苦而不輸之於官官可藉為續鑄之資而無費於公帑之金又何憚而不收之民况銅藏於民銅祗銅耳而私藏有罪銅一入官銅盡錢也而國家日富聖主所以獨持大柄而利天下者無出於此一議省鑄局錢以銅鉛參雜而成而銅鉛各有産處搬運重難是以歴代多即坑冶附近之所置監鑄錢唐有八監宋有三十六監惟永平者最久永通者為最多然至熙寧歲輸六百萬貫則幾不可繼矣夫天子藏富於山川冶鑄太煩則民力耗竭漢武帝時專令上林三官鼔鑄而天下非三官錢不得行諸郡國前所鑄錢皆廢銷之輸其銅三官誠見利源所在不得不謹節其流耳國初置寶源局於應天府已令天下藩司各制貨泉局又更名為寶泉局其後罷置不一嘉靖以來止令兩京鑄造萬歴四年通行天下一體開鑄至十年奉詔停止天啓元年以遼餉匱乏增置户部寶泉局無何又令各省直藩司開爐鼔鑄每年坐定鑄息共八十二萬兩徒存虛額無一踐者諸局爐亦相繼報罷止存湖廣陜西四川雲南密雲宣大遼東數處而已崇禎二年奉㫖利權本自上操舊制只兩京鑄錢嗣因軍興煩費遼東宣大奏請權宜近乃紛紛開鑄致私錢殽雜反自外來紊制病國大非法紀著查出通行禁止維時户部以秦楚蜀滇四省係銅斤出産地方就便鼔鑄稱便未議概停後江西復以開局請至如南京兵部操江及應天府亦各紛紛鑄錢然皆自鑄自用又大小輕重不一其制於是滯鏹愈多銅鉛愈窘不獨戸部不得其尺寸之用而寶泉局亦已成眢井矣每見議錢法者皆係廣鑄局為言而乃惓惓欲議省者誠見爐座䌓興銅産有限惟局省則銅源裕而錢制一則弊絶較諸廣局之利虛實得失孰多也不然昔之鑄局不為不廣矣而不效何哉一議禁私販昔唐陸䞇之論錢法也以為宜廣即山殖貨之功峻用銅為器之禁二䇿並行不可偏廢也今或離銅場頗遠則其勢不得不出於買乃私販之禁有不可不與銅器俱嚴者夫一處之銅而止供一處之用則價平矣一處之銅而供數十處之用則銅價踴矣以今銅之流行遍天下皆是召買嗇於公家歛藏溢於私室人人吳鄧處處罏䍋銅産幾何能不騰躍而况於官買與私買爭其數不敵何者官價估有定例其價必平私買乘隙暗投其價多侈官買或有别費而給發不無稍緩私買並無破冐而交兌畧不踰時市井嗜利誰肯捨此就彼其流之弊必至銅盡歸於私鑄而官買束手矣考嘉靖三十四年嚴禁商賈人等不許私販銅錫以致價值騰踴謂宜著為厲禁凡徃産銅産鉛處所收買銅鉛必告投本處官司給有批文方許運發經過闗津驗批免稅除兩京及滇蜀秦楚四省聽商人從便徃賣報官收買如驗無批文及䦨出他省致被覺獲即比依盜掘銅錫律人論罪貨沒官至若私鑄闗頭尤在於㸃造蓋鑄錢之銅必將紅銅配鉛㸃造成黄而後可鑄請飭天下凡有私設㸃爐者罪即比於私鑄知而不舉即與連坐庶幾私鑄可絶而官買乃可繼也一議垂定制周太公立九府圜法錢圜函方至今仍之而輕重無常代有變革秦錢如周重十二銖漢興變為莢錢重二銖已變為八銖又變為四銖其重赤仄以一當五而得中者惟元狩之五銖降而蜀之直百而吳之當千則愈變而愈重晉之四文沈錢宋之菜子荇葉甚而為鵝眼綖環則變而愈輕而得中者惟武德之開元通寶從來美錢制者皆以二錢之式並言而其重實未始相類也謹按古權法十黍為絫十絫為銖八銖為錙二十四錙為兩今開元通寶其錢徑八分重止二銖四絫則比五銖錢為輕二銖六絫矣故五銖錢二文而重一兩開元必積十文而重一兩洪武初敕户部及各行省鑄錢大小凡五等當十錢重一兩當五當三當二重皆如其當之數小錢重一錢葢即開元舊法至嘉靖六年始令兩京工部鑄造制錢每文重一錢三分崇禎元年從錢法侍郎孫居相議改為一錢二分五厘雖視開元錢稍重而較之漢五銖尚輕然體質堅厚又磨鎔莫施輕重得宜人情便之至其鑄法每錢一文必令用黄銅二錢剉磨之餘只存一錢二分五厘如此然後可以革減銅多鑄之弊葢局中每有減銅多鑄而創為補秤之說以塗耳目者實明許商匠之私鑄而隂收其利今若著為定數按月按期必令報完俾貪吏無所容其通同而奸商奸匠無所容其隱屏亦即簡御煩之術也其收錢每五千文為一錠上用行牌寫爐頭匠頭及細錢人姓名各堆一處聽督鑄官照爐抽驗遇有漏風缺邊縮字等様細錢人重責錢輕色淡者責匠頭沙眼多者責翻沙匠邊粗糙者責滚剉匠磨不亮者責磨洗匠灰不淨者責刷灰匠選退錢搥碎回火如犯前弊多者責爐頭仍發看錢人挑選通同容隱看錢人重責如是則錢制既精殽雜自難若當五當十等錢鎔造似易工本較省然私鑄者競為捷趨識微者謂非久道不鑄可也一議重制錢錢法之弊由於盜鑄者多盜鑄非薄劣則無所得贏徃徃摩官錢取鎔而殽之以鉛錫於是減輕其價以與制錢雁行於是市井愚民惶惑莫知適從奸商當舖因而為奸每於通衢關隘倡言某錢盛行某錢不行轉相煽㺯既貴賣其所積以圖目前之利又賤收其所棄以圖他日之利時而私錢得與官錢並價此其所積者多而欲出也時而私錢二三文折官錢一文此其所收者少而欲入也若軰操其利權錢法受其壅滯豈可無整齊之術聽奸錢日生而莫之禁乎今有捷法於此大凡盜鑄者每鑄新錢而不鑄舊錢蓋舊則真偽難欺而新則耳目易眩請敕天下除雜年號錢難以畫一惟崇禎通寶體製色澤務取相同每錢一文重一錢二分五厘如有輕重不合式者即係盜鑄推究所由真犯匠人依天啓三年令擬斬無赦其知情買使及販賣行使者查照律從重問擬令下限三月内計民間將前所收買私鑄錢自行首出倒換依嘉靖六年例照銅價給與價銀免其私販之罪敢隱藏不出首者事發比照私鑄銅錢為從者律問罪收過私錢即與銷化為銅以俟改鑄如是則於官法獲全而於民情不厲其下令於流水無疑矣若夫前代古錢及歴朝舊錢流通已久方俗所便不必禁斷官民出納惟崇禎通寶不許留難而其他雜錢第聽民間轉輸自便官不許收一文天下曉然見雜錢與制錢貴賤不敵積漸以徃勢必棄雜錢不用如願赴官倒換亦准為照銅價收買而後一王無偶之利柄於是可全收也一議計本息泉局之錢發太倉作官俸者十之三發邊鎮充月餉者十之七原奉聖諭定六十五文估銀一錢今已習而安之矣請依此數以權鼔鑄之夲息可乎謹按銅礦産於石山之中鋼鑽打入每得鑛一百斤用木炭一百斤將鑛燒煉一火成銅鑬二火成黒銅三火成紅銅每鑛百斤上者燒銅十五斤次者十二十一不等其用錘手並燒爐匠共二十名每日給工食共銀八錢用造飯運水夫二名每日給工食六分用幇扯提礦小夫四名每日給工食一錢二分用鋼鑽三十根每根鋼三斤日費一斤約銀一錢以上共費銀一兩二錢約得銅鑛二百斤而又用木炭一百六七十斤約價四錢三火成紅銅三十斤則共前項費銀一兩五錢是每斤費本只五六分耳復用窩鉛㸃化之則為四火黃銅計窩鉛每斤價銀不過三四分據今見行配鑄則例每紅銅五十七斤入窩鉛四十三斤作黃銅一百斤益以搬載之費每斤量估一分大約黃銅一斤所費至七八分而止若夫市銅鑄錢原無甚利據京局舊例紅銅價不出一錢四分黃銅不出一錢窩鉛不出七分後漸騰踴部議以紅銅㸃化成黃既失本質易於攙和遂革黄銅不用但買紅銅與窩鉛如今法配塔定價紅銅每斤一錢四分三厘窩鉛毎斤七分七厘計配成黃銅一百斤該價銀十二兩給爐頭鼓鑄應交錢一萬一千一百一十一文其行使以錢六百五十文估銀一兩計共估銀一十七兩零九分四厘除該給各項匠役煤礶米菜工價二千二百九十五文估銀二兩五錢三分二厘零并除銅本外實存息銀一兩五錢六分一厘零計僅浮本銀十分之一耳近據陜覀撫臣練國事疏報自天啓二年開鑄起至崇禎四年止計十年間只動過本銀一萬二千四百餘兩陸續獲息銀十一萬七千八十兩零則所得幾與本銀相凖又查南部錢厰所得加五有竒葢銅鉛出産輳集地方獲息原自不貲今秦楚蜀滇四局見在議開姑未預畫成數但令其自行認報即最少亦當以加五為率滇蜀楚三省則取其息以解京充作新餉按季交納秦中之息專留該省充餉以抵京運可也乃議者多謂萬歴中曾以錢五十五文作銀一錢亦自通行無滯以為母既處貴子不應處賤欲於六十五文之内稍縮其數行之而獨慮取利頗奢則盜鑄者將如雲而起自古論錢法多矣惟孔覬不惜銅不愛工二語為不可易政以本多費巨縱復私營初無厚潤應自息心無俟嚴刑廣設耳先臣譚綸有言鑄錢之費與銀相當似於朝廷無利然歲鑄錢一萬金則國家增一萬金之錢流布海内鑄錢愈多則增銀亦愈多是藏富之術也一議權出納幣有出有入流而不息故曰泉府若上自為壅而求下之疏即日肆人於市無為也漢律人出一算算百二十錢則民賦以之矣館陶主為其子求郎不許賞錢千萬則恩賚以之矣隆慮主以錢千萬為其子贖死則罰鍰以之矣又募豪民入粟縣官而内錢於都内則開納以之矣諸胡降者贍以少府禁錢及時出内庫錢賜軍士則餉賞皆以之矣今有司承行錢之令出則無慮不普發於民而納則不肻收一文是自賤之也自賤之而欲人貴之其勢焉得民愚相煽閉暱觀望每至聚市而譁而錢遂不可行矣夫解京之入濟邉之出其有待於銀也似也以其為物輕微易藏可以多致也錢固重質而若各項存留為地方用者即以錢出入焉誰曰不可誠令郡縣於存留銀内只徵其半入錢即贖金亦兼輸之自大吏監司而下倣在京文武官常禄例以錢充俸薪其師生廪餼驛站兵糧各役工食及公費供億之類但不闗起解者悉取給於錢而遺下不發之銀即可盡行解京則所得錢息即在乎其中行之十年而天下之銀盡輦而歸之於京師矣况乎錢下而不上則其權在市井上而下下而上則其權在朝廷誠實其貴賤用歛散之法以在官者為母在民者為子當其賤則存留錢糧盡行收錢而賤者可貴當其貴則各項關給盡行𣪚錢而貴者可賤葢錢太賤則病官太貴則病民故用此法以均之管子所謂使之一髙一下不得有調賈誼所謂輕則以術歛之重則以術散之以調盈虚以收竒羡皆此意也然有司之不肻為此者有兩端焉或以貪或以朦凡銀之出納有耗有羡而錢則一文不過一文已耳利無所漁必故為齟齬以破壞之其自飽者貪也其中於胥役之口者朦也崇禎八年給事中王家彦疏初設錢局原為藉錢息濟軍興惟天啓二三年督臣李宗延陳于廷相繼受事用過銅夲二十萬九千五十四兩獲息十二萬八千六百六兩八錢零四年舊督臣鄭三俊用過銅本銀一十四萬三千四百四十一兩四錢獲息一十二萬八千九百三十二兩計得利七分八分不等為十餘年來跫然足音矣夫鼔鑄化銅為銀非無利也利歸之胥役爐匠與官而上不得受也查長安内外與法錢雁行於市者皆私鑄也而私鑄之難詰莫過局之爐頭官匠此軰或隱屏兩部或朋合諸夥冊上莫辨其名或埋銅窖中或遞錢出局夜間莫識其氣私鑄不已繼必夾鑄私鑄則乘官司之不覺至夾鑄則每爐加銅數十觔官實與匠𤓰分此弊盛於南厰而北亦然廉其人而用之而後弊乃可得而釐也然得人矣不久任以專責成可乎夫爐匠諸役皆老於其局長子孫於其中以一年報滿汲汲欲去之人而御長子孫之役欲責其爬梳無遺挽中滿之利以盡歸於上其數必不勝也至於屏局舍約爐座以便省試削人數核出入嚴干掫以防夾𢃄十日一領銅五日一交錢爐如流水以使之上無旁及所謂需其人而後行者也得人久任其於鼔鑄之道思過半矣崇禎十六年十月二十六日内閣錢法揭帖適蒙發下匣封内一件奉御批疏通錢法本為便民已有諭㫖前先生每曾議買收作銅良是近聞低錢甚多著司鑰庫及五城親行收買不許驚擾如有胥役故違需索害民的必殺無赦該城動用房號銀兩該庫動用新錢隨收隨碎類解該局鼔鑄將收過數目一月一回奏仍以收錢多寡為諸御史殿最先生每商酌可否擬㫖來行欽此竊惟鼔鑄一事既可足國兼以便民茍為民所共趨則於國自無不足恭誦御劄收買低錢嚴禁擾害德意周密具得王政理財之本大約低錢不許流行則其勢必賤而又以房號銀及新錢收之則在民亦不甚虧民既安官復不擾視古之嚴禁荇葉鵝眼至重刑不能止者功相萬也而私販無大利則私鑄亦不禁而自止矣惟是低錢多夾鉛沙鎔化不免銷蝕而新錢因此遂同泉布之流為利實大且聞價亦甚廉苐准市價稱提似亦不甚懸絶也惟在鑄局𢎞開使新錢接續不匱而已又十一月十七日揭適奉御批屢有㫖疏通錢法本欲足國便民近聞賤濫愈甚小民反成苦累皆由經管官通未遵行姑免察究再行申飭將一切低假薄小之錢概禁行使五城御史仍遵旨收買勒限十日内一奏其京城所有錢桌錢市著厰衛五城衙門嚴行禁飭廵緝仍將獲過起數一月一奏先生每商酌擬㫖來行欽此竊惟低錢不盡則制錢不行而禁誡不嚴則低錢亦未遽盡恭讀聖諭深得窮源制流之法謹即祗遵恭謄酌擬進呈昨憲臣李邦華謂收之尚苦無本臣等竊謂各官捐資助鑄宜悉令收買低錢解庫立行舂碎則不煩嚴禁而低錢可旦夕盡除臣等即將助鑄原價先行收買外并於諭稿拈出以便遵行伏候聖裁原奉批摺尊藏閣中謹題錢法國初禁金銀不得交易百文以上用鈔百文以下用錢法至善也自汚吏不便於行鈔故鈔法日廢而民間有換易之苦水火之苦故亦不甚便有收課者漸改鈔而為銀收者為銀則用者愈阻遂為一貫之鈔法值銀一兩者而僅折銀三二釐不等商課日虧官禄日薄而祖宗之良法盡矣夫金銀者産於地人得而私之鈔者製於官惟上得而增損之以天下之主筦天下之命道至順也然大寶不可以獨擅重利不可以獨居故以國初之法令而終不能得之於天下故可知也然唐宋之際天下多事甚於本朝而猶不至甚貧者以行錢法耳銅之産多於金銀而錢之法上猶得筦其權權在則利存焉今錢法非不行而行錢之地天下十不及二私錢之廣百倍於官官非不知鼔鑄之利而苦於銅之不繼不知銅之匱一匱於器飾再匱於私鑄耳今縣官雖議加鑄而涓滴不足濟愚以舉一政而可措天下於富者錢法是也今言加鑄者莫利於南京試以南京之法凖之每爐七人盡七人一日之力可得錢萬文每千錢為銅九觔觔價八分共為價七兩二錢人給工銀五分爐給炭價二錢共費七兩七錢五分而可得錢萬文如國初之制每千文值銀一兩則是一爐之鑄日得利二兩二錢五分也如國初之制每布政司各開寶源局大約兩都之局可置千爐藩司之局截補之間不減五百則是舉天下之大而可共得一萬三千五百爐也每爐歲鑄百日即可得錢一千三百五十萬緡度其餘利值銀三百三萬八千五百兩宋時二十六監永通一監歲鑄八十萬緡他可知矣銅之值不等以南之賤補北之貴召商責辦所去不遠茍非官商而擅易銅者殺無赦銅非一種俱可兼鑄故唐宋之制禁不得他用至王安石鑄鐵錢弛其禁而錢法遂壞今當修復此法命見用器飾自鏡金樂器古代鼎彜外俱勒上之於官每淨銅一觔給錢一百二十文有故匿者沒其家以半賞告者所收之銅加之鉛藥所費尚不及八分而民間除鏡金樂器聽錢局帶造市易餘以錫鐵代之無所不便品官之應用銅者亦量為改易銅屋銅像更屬不經先銷之以為民望有私鑄者朝報夕誅沒家賞告亦如匿銅其錢之式如邱文莊之議改而為篆尤可一新耳目其錢之名當改為大明通寶使萬世行之而無新舊之阻天下舊錢使上之於官古錢計如銅之價私錢銷淨而計之本朝之錢以十易五萬歴之錢以十易八京師錢貴之地稍為通融則改銷之間亦不加費收徵之法盡棄銀不用民不得不易錢以應上則民間交易不必盡禁金銀而錢自不得不行錢行之後漸如國初鑄當三當五十者以便賫發一以銅之輕重凖當之多寡而工價猶可稍省焉此法一立則有司不得加火耗貪吏不得資滿載猾胥巨冦俱難為奸成色不分三尺難欺一舉百利莫此為甚惟轉運之間稍須人力然費小利大古行而無害昔宋末兵興歲加民錢七千二百萬緡茍求七千二百萬之銀則今京庫十八年之供也雖吮血敲髓何以得之唐宋所以不貧之故可以得矣故曰舉一政而可以措天下於富者此也前代生財之法較之今日尚缺一大政焉錢法是已錢者泉也如水之行地中不可一日廢者從成周兩漢唐宋以來見之史籍一一可覩未有用銀廢錢如今日之甚者也而用錢之多鑄錢之盛也尤莫如宋故宋太祖欲積錢至五百萬贖山後諸郡於遼又宋之饒處江寧等處皆其鼓鑄之地今各處有發地得窖錢者其餘書史所嘗言幾百萬無慮鉅萬累鉅萬之說率多以錢計今去宋不遠故所用錢多宋之物夫用錢則民生日裕鑄錢則國計益饒惟人主得為之故又曰錢者權也此經國足用之大政奈何廢而不舉昔漢文帝之寵鄧通也曰吾能富之賜以蜀山之銅而鄧氏之錢滿天下吳王濞擅鑄山之利而輙稱兵漢廷與之抗夫以竊一日之權尚足以得民而抗漢况以萬乘而自振其權可勝用哉今之為計者謂錢法之難有二一曰利不酬本然計本利於出入民間之筭非天府之筭也夫天府之筭以山海之産為材以億兆之力為工以修潔英達之士為役果何本而何利哉誠將天下産銅之處贖軍徒以下之罪而定其則以收銅於西山産煤之窯以法司有罪之人而准其罪以納炭其運銅則通水路者附以官民之舟如臨清帶磚之例通陸路者資以驛遞之力而給之官庫之錢其運炭則出官庫之錢或官運或召買於人工取之見役而足則又不煩銀兩而可辦也其二曰民不願行強之恐厲民然累朝行之至稱為錢神嘉靖萬歴以前五六百文而值一兩也葢錢比鈔異於小民無不利也獨所不便者姦豪爾一曰盜不便一曰官為姦弊不便一曰商賈持挾不便一曰豪家葢藏不便此數不便者於小民無與也且朝廷施恩澤自無告始行法令自貴近始豈惟貴近自朝廷始可也凡追抵贖者除折穀外而責之以納錢上事例者除二分納銀外一分以納錢存留户口則兼收錢穀商稅課程則純用收錢此謂自朝廷始又因而賜予之費宗室之禄百官之俸則銀錢兼支又因而驛遞應付僱夫僱馬則惟錢是用又因而軍旅之餉則分其主客量其遠近或以代布花或以充折色此謂自貴近始矣此數者有出有入而民間無底滯之患輕歛輕𣪚而官府有餘積之藏著之以必行之令遲之以歲月之效久之而本末兼利公私循環天下之青銅俱化為白鏹矣昔永樂中下令有以金銀貨物交易者輙沒給告者然不徒責之下也又令各處稅糧課程贓罰俱准折收此固血脉流通之意所謂泉也而法以佐之所謂權也寶鈔局寶鈔局始於洪武八年永樂仍建局於北京後廢造鈔之法用桑穰為料其制方髙一尺濶六寸許以青色為質外為龍紋花欄横題其額曰大明通行寶鈔内上兩傍復為篆文八字曰大明寶鈔天下通行中圖鈔貫狀十串則為一貫其下曰户部奏准印造大明寶鈔與銅錢通行使用偽造者斬告捕者賞銀二百五十兩仍給犯人財産若五百文則畫鈔文為五串餘如其制而遞減之每鈔一貫折銅錢一千文銀一兩其餘以是為差其等凡六曰一貫五百文四百文三百文二百文一百文每鈔四貫易金一兩禁民間不得以金銀物貨交易違者治罪告發者就以其物給賞若有以金銀易鈔者聽凡商稅課錢鈔兼收錢十之三鈔十之七一百文以下則止用銅錢按明初有銀禁恐其或閡錢鈔也而錢之用不出於閩廣宣德正統以後錢始用於西北自天順成化以來鈔之用益微漢武帝制皮幣唐憲宗時令商賈委錢諸路進奉院以輕裝趨四方合劵乃取之號飛錢然猶錢與劵為二也張詠鎮蜀以鐵錢重不便貿易設質劑之法一交一緡以三年為一界而換之謂之交子後官為置造謂之交子務後用交子㑹子㑹價愈低賈似道改名關子而益不可行金人循交子法置交鈔自一貫至十貫五等謂之大錢自一百至七百五等謂之小錢以七年為限納舊易新元世祖造中統交鈔以銀為率名曰銀鈔一貫文省准錢一千文值銀一兩故五十貫為一錠葢是銀五十兩也後造至元鈔大行以一當五名曰金鈔子至至正中中統以廢改造至正印造中統交鈔名曰新鈔二貫准舊鈔十貫以至料鈔十錠易斗粟不得洪武循元制寶鈔立法甚嚴令官民通用欲其流行甚於刀泉後竟壅格不行但以供頒賜虚名耳不但不可易斗粟也元主呼必賚以錢與鈔問劉秉忠秉忠曰楮用於隂錢用於陽沙漠為隂華夏為陽國家起沙漠而臨中夏宜用楮幣不然四海不靖是以終元之世止行鈔法而不鑄錢及至正間托克托為相立寶泉提舉司鑄至正錢而天下遂亂即今民間古錢並無勝國年號自可見矣明太祖雖嘗以科場落卷打造寶鈔然二百年來惟錢行而鈔不甚行秉忠之言益驗矣明之貧貧於鈔不行而折價葢鈔所值已天淵矣如洪武二十四年令揚州府泰州竈户照台温處三府例支食官鹽折納鈔貫每引二百斤米四石每一石折鈔二貫五百文此與原頒令每鈔一貫值銀一兩已不同矣至嘉靖六年詔各處赴運京庫户口鹽鈔今後每鈔一貫折銀一釐一毫四絲三忽如此則每米一石者止值銀二釐七毫矣國課焉得不大損耶崇禎十六年行鈔法紀桐城生員蔣臣言鈔法可行且云歲造三千萬貫一貫直一金歲可得金三千萬兩而户部侍郎王鰲永尃管錢鈔亦以鈔為必可行且言初年造三千萬貫可代加𣲖二千餘萬以蠲窮民此後歲造五千萬貫可得五千萬金所入既多將金與土同價除免加派外每省直發百萬貫分給地方各官以佐養亷之需其言甚美然實不可行也上特設内寶鈔局晝夜督造募商發賣而一貫擬鬻一金無肻應者鰲永請每貫蠲三分止鬻九錢七分京商騷然紬縀各舖皆卷篋而去内閣言民雖愚誰肻以一金買一張紙上曰髙皇帝時如何偏行得内閣對高皇帝似亦以神道設教當時只賞賜及折俸用鈔其餘兵餉亦不曾用也上曰只要法嚴閣臣對徒法亦難行因言民窮困已極且宜安靜其語頗多然上已决意行之及内寶鈔局言造鈔宜用桑穰二百萬斤舊例採取北直山東河南浙江諸處分遣各璫催督内浙江杭嘉湖三府桑穰價銀户部請以北新關稅銀二萬抵之閣臣擬㫖採取擾累且關稅例當解京不准留又五城御史言鈔匠除現在五百人外尚欠二千五百人各城勾攝多未學習議於畿内八府州縣多方勾解閣臣亦擬不許上不懌俱發改票崇禎十六年九月十五日閣臣議鈔揭帖竊惟古者以錢代金宋末以鈔代錢鈔法誠行為利甚大而鈔虚錢實頗有不同蔣臣以宋之交子㑹子謂之錢引即今民間㑹票是也然宋時自一貫至十貫凡五等曰大鈔一百至七百凡五等曰小鈔元時以十計者四等以百計者三等以貫計者二等非不多方廣布而亦不能久惟聖祖製法甚精立法甚嚴當時軍國賞賜諸費皆取給焉而後始漸輕也伏讀御批務要有益軍國可行可久又於部議推行一疑宜加嚴明臣等竊見㑹典及例律所載鈔法似已詳盡總以嚴偽造禁阻壞立界法信倒換為主至有司之貪羡抑勒撫按三尺自在耳惟今當久廢之後驟欲督之行使恐愚民不可慮始徒法亦難自行聖諭所謂如何通行如何更換業已洞悉其端委矣蔣臣持論雖堅臣等實未見其必然之效倘萬不得已或且試之京師於凡百官俸廪軍匠月糧以鈔兼行俾民間有鈔可用而一切賦稅課程贓罰納鈔悉與收受俾知有用鈔之利俟上下通行耳目相習而後推之天下或亦變通宜民之一道乎容臣等約計臣并蔣臣到閣詳細商確聽其自行回奏外謹先擬票呈進未知當否伏候聖裁崇禎十七年正月二十七日閣臣蔣德璟回奏行鈔揭適蒙發下二本改票一為户部坐㑹關稅事内言浙江解造鈔桑穰夾紙動支關稅二萬金一為各城御史鈔匠城役無多事内言五城解到鈔匠並未學習及人數不足議於在外州縣多方勾解二千五百人各事情臣敢不祗遵另擬惟是造鈔一事原係祖制當此三空四盡之時而能化紙穰為金錢且歲得數千萬之入其利甚大果如所言即一時勞費亦不足惜而近來中外攢眉動稱窒礙細酌情勢頗費經營如造鈔必須工匠而匠則多未學習計正匠一千名每月米一石銀三兩僱工一千五百名每名月銀三兩三錢計每月費米千石銀七千九百五十兩措處甚難又五城人數既少若於在外地方廣購一番勾攝擾累必多聞内寶鈔司原有鈔匠五百似宜照舊造使俟推行有緒以漸議之至桑穰一事則猶有可商者國初令農家凡有田五畝栽桑麻各半畝又令鳯滁等處每户種桑二百株又令天下多栽桑棗每里初年二百株三年六百株違者罰有差故其時桑多而穰亦多今自賊寇殘破之後畿内及山東河南幾無桑矣杭嘉湖三府雖宜桑地而水旱時告賦歛䌓興農桑之家愁苦尤甚驟責以桑穰四十萬斤恐盡括之亦不能彀而其害將有不勝言者至於作房工料之費及民情惶惑之狀臣尚未敢盡陳誠恐害多利少異日得不償失以為宵旰憂則臣之罪更大矣臣初疑其難行亦未詳計至此或俟安民靖亂之後人心大定漸次講求庶有濟乎臣聞見既眞不敢隱飾不言謹因發下改票昧死附致芻蕘原票未敢擅改伏乞聖慈裁鑒施行御史白抱一疏竊惟今天下處處用兵處處需餉則生財為今日第一義皇上慮地方殘苦閭閻匱竭特下製鈔之令以濟時事之艱其慮非不周而意非不善大小臣工自當遵行惟謹何敢復生異議然臣揆度時勢實有難以驟舉敢備為我皇上陳之從來鈔法與錢相副而行今出銅地方如兩廣山陜河南等處見遭宼患則銅鉛勢不能辦雲貴諸處道路梗阻即有銅亦無路可達銅既不足則鼔鑄萬萬不能充溢鼔鑄窮則錢且不能遍布域中而單單以易浥爛之楮幣令通行無滯誰其信之此其不可行者一且鈔完必頒之州縣令小民輸銀自領然後或交易或納稅始可上下流通竊思小民納銀買鈔又復輸鈔作銀吏胥勒索轉折之間不無虧折彼以銀輸官何等直㨗小民不思為便㨗肻樂此轉折乎此其不可行者二且奉行之際有司賢者上體國法下順民情委曲調停猶不為害如遇不肖借口功令以威驅民強其所難小民既不甘受必生忿怒激而成變為害不小此其不可行者三且祖宗朝雖云製鈔然行之未久今二百餘年百姓止知銀錢為重蓄貯行使皆是此物一旦易鈔而與銀錢並重在皇上曰遵祖制在愚民曰剏非常非常之原黎民懼焉此其不可行者四至於皇上製鈔原欲遍行天下始少獲微息今南北俱大宼盤踞則行鈔地方亦似無幾鈔既不能遍及利息似亦覺少當此庫藏匱竭之際先費二三十萬金錢造此不能通行之鈔未收難必之利先費見在之金何若留此金錢濟目前急需之為得計乎此其不可行者五且生財之道前人無處不經筭盡使此鈔可垂諸永久前人必有先得我心者何至今日始議舉行也臣豈不知計臣為國苦心皇上生財睿慮臣揆度時勢實實見其難以驟行如此伏祈皇上勅部與司臣蔣臣從長再議暫停目前俟敵宼平息小民豐樂然後舉行未晚也臣愚戅不識忌諱祈聖明鑒宥施行春明夢餘録卷三十八
