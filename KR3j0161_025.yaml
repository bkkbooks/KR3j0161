body:
  text: 春明夢餘録卷二十五吏部左侍郎孫承澤撰六科六科直房在午門外東西相向初在掖門內之西與內閣相對所謂六科廊是也以災移外直房洪武初統設給事中六年始分為六科二十二年改給事魏敏卓敬等八十一人為士源先是上以給事中數符元士改為元士至是以六科為政事本源又改為士源未幾復為給事中都給事則二十四年所增也吏户禮兵刑工科各都給事中一人左右給事中各一人給事中吏科四人户科八人禮科六人兵科十人刑科八人工科四人蓋隨事煩簡而設員也凡章奏出入咸必經由有所遺失抵牾更易紊亂皆得封駁事有關係抄發過部略用參語謂之抄參部覆録入疏中凡朝政之得失百官之賢佞皆許聫署以聞實兼前代諫議補闕拾遺之職也六科即唐之補闕拾遺宋改補闕為司諫拾遺為正言唐制諫官隨宰相入閣此最得為政之要至明革中書省乃並諫官裁之惟設六科以掌封駁宣德中廷臣請設諫官不允于是諫無專職此為缺典昔言官察官截然二項如宋時亦尚如此監察御史初亦言事後惟察事至諫院左右諫議大夫左右司諫左右正言此專為拾遺補闕之官凡奏疏涉彈擊上即戒諭而不納故觀唐宋言官奏疏綽有可觀後世有糾劾而鮮規正蓋以言官察官渾之為一也明初省臣以所定官制班次圖進上覽畢因論及選諫議之官曰論道經邦輔弼之臣折衝禦侮將帥之職論思獻納侍從之任激濁揚清臺察之司此數者朝廷之要職也至於繩愆糾繆拾遺補過諫諍之臣尤難其人抗直者或過于矯激巽懦者又無所建明必國爾忘家忠爾忘身之士方可任之不然患得患失之徒將何所賴洪武十七年九月給事中張文輔言自九月十四日至二十一日八日之間內外諸司奏劄凡一千六百六十計三千二百九十一事上諭廷臣曰朕代天理物日總萬幾豈能一一周遍茍政事有失宜豈惟一民之害將為天下之害豈惟一身之憂將為四海之憂卿等能各悉心封駁則庶事自無不當此六科稽查號件封駁章奏之例也永樂元年十一月諭都給事中朱原貞等曰朕慮天下之民有失所者為爾曹未能盡知故選郡縣考滿官職達事體者俾於六科辦事如朕有所欲聞即可知彼有所欲言即可達而久無一人言者夫郡邑之間豈都無一事利害可言今在朕左右尚默默然况逺千里其肯言乎爾等退以朕意申諭之此俸滿有司授科之例也永樂二年召都給事馬麟等諭曰為治貴得大體比爾等疏駁奏牘一字之誤皆喋喋以言瑣碎甚矣吏治文書叢脞積纍其精力有時而敝豈免錯謬自今奏內有數目日月等字錯謬者皆令從傍改注用印蓋之不必以聞此抄參不具題用印鈐蓋之例也宣德二年諭六科曰朝廷慮刑獄有寃下情不能達故設登聞鼓然前代置院設官託耳目于一人非兼聽廣覽之道我國家命六科給事中輪直最得其當爾等無畏權勢無忽孤㷀惟其所言即時為達庶幾事無壅蔽幽隱畢聞况給事中為朝廷近侍誠能效職當顯用爾無或阿比以忝所任此六科直鼓院之例也正統中給事中張固言六科都左右給事中員缺乞選各科年深者以次升補英宗謂吏部臣曰給事中乃近侍之官凡朝廷政令得失軍民休戚百官邪慝舉得言之况都左右給事中為之領袖非識達大體者不可畀也固乃欲循資而用之不亦舛乎此都科不循資俸之例也成化中諭六部臣曰天工人其代之若事當行而緩于覆奏是忽天工也其可乎自今各衙門一應奏題㫖意即明白覆奏發落毋得稽緩五日內不覆奏者該科劾之此科抄發部定限之例也𢎞治六年諭人才難得事貴得實人貴改過祖宗愛惜人才凡百官考滿初任有平常不稱者俱令復職必待九年然後黜降方靣知府年老未滿六年有疾不妨管事素行不謹在升任之先及見任不謹罷軟無為非本部訪有實跡或有巡撫巡按只是一處開報并其餘官員到任未及二年非老疾貪酷顯著俱留辦事今後三年朝覲之年先期行之布按二司考合屬巡撫巡按考方靣年終具奏行下該衙門立案待來朝日從公詳審考察如有不公許其伸理其科道官必待吏部考察後有失當方許指名糾劾此計後拾遺之例也崇禎元年上諭六科邇來戎馬倥偬機務煩劇明㫖非不森嚴奉行尚多遲慢欲令計時集事法當委任責成爾等表裏六曹舊有注銷之規今合再行申飭各掌印官選委給事中一員查理六曹奉㫖應行事務某項某日做起某日完結次第情節勒限奏報少有違玩立付白簡定行責治如爾等自隳職掌玩忽不遵或議論紛囂致令掣肘誤事一併究處特諭此六科注銷之例也崇禎元年二月上傳諭祖宗設立部科衙門各有職掌內外覺察法甚明備乃近來人情玩惰廢弛成風即如各項章奏或奉㫖而科抄久不到部或已抄而該部久不題覆以致緊要事務率多稽遲殊非政體除已往不究今後各衙門務將已發未覆事件作速覆奏不許違誤自元年二月為始一切發行內外章奏俱限十日內題覆該衙門仍各立考成著實遵行部科互相查勘具奏崇禎元年九月諭朕惟祖宗設置科道上弼主德下警官邪寄耳目之司廣聰明之用其為國家毗倚甚重慨自逆璫用事屠戮忠良一時直言敢諫之士動遭屏斥遂令諸臣忠懷莫吐鬱悶有日思一發抒譬之川然壅而必决勢固然也朕即位以來宏開此路諸臣條奏不憚再三省覽日御文華講求商確發奸指佞之疏朝上夕下多見施行乃諸臣抒忠體國者固在朕鑒沽譽營私者未盡無人薦舉屢戒無濫輒纍牘以市恩糾奏每諭核真或游移而鮮實初閲封章侃然忠讜及朕詰問諉之風聞至不辨忠邪概行論劾使大臣不安其位誰與共理甚非朕虛懷樂諫推誠茹納之初意也今朕特諭爾諸臣以後務捐積習各偕大道一秉公忠敷陳條奏必鑿鑿可行勿剿襲而徒紛聽覽彈奸劾佞必事事有據勿逞臆而盡抹生平諸臣身膺風紀尤宜先自祓濯處於無瑕之地其有任意誣揑藉口風聞甚或持己不嚴官常先裂者朕得鑒察定下部院勘實嚴處論人不當按以反坐之條决不少貸使居言路者誠無錯雜之是非豈患司官守者尚有混淆之名實治亂在兹各宜毖飾欽哉崇禎三年九月諭朝廷設官原為治國故分叙爵秩優任才能近來人心日競銓政詭隨即如升轉京堂本以酬勞奬賢今則科道吏部司官視為固有不論賢否循例必得至於監司知府體統官階均屬隆重祖宗時特選朝臣有才望者為之何以今日輕鄙若此背違舊制恬習囂風莫此為甚若不亟加挽正濫觴日久又將輕視京堂希營卿二矣今將添注閏升一概停止以後科道中及吏部司官果有才品兼優者准升監司其或操守無疵風力稍遜者准升知府若才品勞勳並茂及司道卓異特著者准倣正升例與升京堂部院該科永遵為令敢有朦朧奏行必置重典其考選科道及推舉吏部司官必須愼擇于先方便後來升轉不許輕狥濫用混列清華今後科道吏部有不稱職者著該部院特行糾參處分毋得姑與量升别滋藏垢各令力行愼勿玩違取咎大學士商輅薦春坊林聰改吏科疏竊照見任春坊司直郎林聰原籍福建人由正統四年進士歷任刑科都給事中升今職本官學識優長操持端潔存心公正遇事敢言先在刑科衆皆推服今任司直郎固是美職但即目政務頗簡未免以有用之才置于間散之地况今吏科都給事中張某久病不出如蒙降特㫖著林聰兼吏科都給事中管事如此則恩出于朝廷非惟本官益竭忠誠勉圖報稱凡有言責者亦皆聞風感激各思自效矣且今春坊官員多係翰林等衙門兼職林聰原係都給事中今令以司直郎兼之俸祿無增品秩仍舊于事體無損於政務有益且使中外人聞之皆謂陛下誠於求言善于用賢所謂用一人而千萬人悅豈不美哉臣職居近密偶有所見不敢緘默吏科都給事中鍾羽正科中事宜疏臣惟吏科之不振甚矣建議者招尤彈劾者反噬出使者蒙辜㚄後跋前動輒得咎閲十餘載免訾議者十人一兩人耳其餘材品不同久速或異而皆橫被口語無能以良去者即去為他官猶從後仆之豈吏科則固不善哉責備之殷形跡之嫌當是非交騖之中而清議難干瑕疵易起也臣極暗陋竊自謂臣下當其末流揣己自劾不蒙俞允思所以全硜硜之節無負此官者輒為妄議披瀝而陳之夫取豫辭受士人之大節也文選以當銓扄户誠重之矣吏科即不關黜陟而是非之權在焉交通逄迎坦然而不忌于是有冠裳擁集筐篋交錯之疑此小臣耳人何至奔走以奉之然而瓜李之嫌無解也臣請一如文選杜門而謝客可乎飲食徴逐昏夜沉酣經明禁者屢矣臣自入仕途即苦此事時時蹙額應之不能過三爵去耳近出差者又以此得罪聖朝寬大原非以醉飽過繩人要之非正務也而不經申飾則人反謂臣矯臣請一切謝絶息交而省費可乎大臣之去留一惟宸斷而吏科恆置疏保留保留非諛也而有時乎為諛則雖不諛而以諛視之宜矣上不足為大臣重而反招植黨之疑何益也繼自今如嶽正李賢之被誣劉健謝遷韓文等之被逐何妨倡議留之而非是類也吏科罷保留之舉可乎人材遺佚誠為可惜乃無故發端而突然為薦揚之舉薦揚非私也而有時乎為私則并其不私者而私窺之宜矣既不足為知交重而反有市德之嫌亦何益也繼自今惟夢卜之求拊髀之歎奉㫖公舉者舉之而非是類也吏科杜薦舉之端可乎以至科中內外之轉原非選擇而一升之後低昂頓隔內者不數年而建節又不數年而卿二而外者栖遲藩臬或至十數年鞅掌浮沉而且有風波之險即人臣效忠無宜擇地於政體未為平也臣請循內遷之典兩司之卓犖者時時入為京卿歲必進五六人而為卿寺者亦使回翔南北少遲其轉使內外久速略相等也意亦可乎升轉之途本緣資俸而少有更變則訾議叢生有將轉而告疾先期而給􅖍者其心非有趨避也而形跡之間誰則諒之請自今掌印者非有真疾不許告病即告也吏部于覆本中徑云以今資俸合是某官回日不問接補何科升時止照今時之次使其真病軀命之不恤何暇計官使非真病或假託不墮其術以杜僥幸而安義命也意亦可乎是數者皆科中事體之當議者也而臣又聞衙門先進曰吏科失職掌者二其一堂上官赴科畫本此纍朝舊例也各科能守之即各部亦不以為屈而吏科獨廢豈以吏部尊而不宜來乎然此朝廷之公事非給事中所得專亦非給事中所得廢也宜復其舊可也其一大選事完科臣與部堂比肩而受賜此自來舊禮也兵科能守之兵部亦不以為亢而吏科獨下坐人以為自陳三謨始然此朝廷之公禮非給事中所得改亦非給事中所得讓也宜復其舊可也至于衆言淆亂意見懸殊則天理自明人心不逺諂下諂上病則一般求利求名同歸不義臣不敢置一毫私意于其中也管志道論言路疏國初言路甚廣而復專其責于科道使之封駁諸司風聞言事凡以防壅蔽而遏禍源也其始以三途類選給事中等於中書舍人而御史多升各部主事待之若不甚重而當時顧多直節敢言之士厥後漸重其選至𢎞治中令于博士行人推官知縣教官中選其歷練老成者除補而躋之部屬之右其重比國初加倍而直節敢言之風寖不如前何也先朝不重官而重言故人爭奮于言近代不重言而重官故人爭保其官其所由來者漸矣據臣釋褐以來所有彈章奏牘非出于科即出于道曷嘗無言第見其劾一官則人必竊疑曰是有所觀望而借以立名者也建一議則人又竊疑曰是無所觸冒而藉以塞責者也其中固多賢者往往以是非之心而奪于利害以挺特之見而縶于雷同卒歸於與時浮沉違其初志倘芒頴稍稍表著則同列便不相容而飾邊幅立崖岸則賢否同囿于其中而牢不可解即如拾遺一節京堂方靣俱秩之尊於科道者拾之是矣部屬與科道相埒也乃科不拾道道不拾科而獨拾部屬之易動者豈言官宜互相掩蔽乎此猶謂同居言責不欲相殘以撓氣也至於科道之已升京堂方靣者自當從公論之矣乃復彼此相約多寡相持凡六科拾御史之已升者一人則十三道亦拾給事中之已升者一人迹似調停實爭門户豈言官宜久庇其黨乎此猶謂言路相攻不令偏勝以遺奸也至如平時論劾凡官自科中升出者自方靣至于侍郎縱有過惡科中以先僚之故永不糾彈是寧負朝廷不負先僚也御史巡歷地方自府佐以至州縣正官一經保薦則終其身尊之曰老師而自稱曰門生有以厚幣相酬者是寧負朝廷不負舉主也抑又有甚者如高拱之在先皇帝朝自擅吏部之權而廣布腹心于科道於是有為之排擊同列輔臣者不幾於律之所謂姦黨乎有為之交章稱述救解者不幾於律之所謂上言大臣德政乎雖賴聖明亟逐潜杜此風而言路是非之難憑可概見已此無他大臣惟憚言官之能劾已而輕視諸司言官惟恃大臣之能庇巳而蔑視公論也臣讀卧碑有許諸人直言無隱之條祖宗朝內外大小臣工種種嘉謀讜論不可悉紀臣姑舉外僚之最卑者馮堅一典史也洪武中條陳開國政體太祖嘉納之潘叔正一州同知也永樂中建言㑹通河事宜而成祖採用之豈獨科道之言為重哉自隆慶以來各衙門之言事者始寡而科道之言又未必盡出於公道臣恐耳目之漸壅也以陛下之明達誠宜追祖宗朝盛事開張聖聽博求讜言仍命大臣公其心以參訂之言茍不當也不以出于科道而遂議覆行言茍當也不以出于各衙門而遂寢不覆如上所陳一切積弊嚴敕言官洗心易轍有弗悛者聽各官核舉坐罪至於疏下該科不問其覆與不覆行與不行刻期俱送史館編輯敢有匿一疏者亦聽檢舉坐罪俾公論大明朋比永杜豈不蕩蕩平平稱皇極之世哉臣又以為不除言官之廷杖言路終不得而開也人臣進言孰非為國言雖過當心亦可原歷觀祖宗盛朝未嘗有杖言官者夫忠臣誠不愛其身以報國而其身則依然父母妻子兄弟所仰賴之身也曷忍其萬死一生於箠楚之下哉此非所以全天地之和而慰祖宗在天之靈也願陛下永勿以廷杖加諸言官而鎮撫司亦非拷掠言官之地即有以言得罪者下諸法司鞫問情實如其罪不可宥律例自有明條死且瞑目况生者乎如此不惟言路大開而和氣且薰蒸宇宙間矣夏言請考選疏六科額設都左右給事中給事共五十八員中間事有煩簡故員有增損然以司諫諍備獻納則六科之職均也祖宗以來額員俱備後來乃有不盡補者然遇都左右給事中缺五員以上則必奏請升補各科給事缺十五六員以上則必奏請選補永著為例在先朝五十八員一時補足當時侈為美談蓋增置諫垣自是盛代之事今六科在任止二十一員不及額數之半吏科缺左給事中一員給事中四員户科缺給事中七員禮科五員兵科九員刑科七員工科四員共缺三十七員六科除都左右給事中之外惟給事中四員而已供事趨走日不暇給欲求優游侍從以盡文墨論思之長從容退食以致寅恭謀議之實不可得矣然其間言事者連輒被斥忤時者又多外遷歲消月減以至于今莫可復也考之祖宗舊規凡給事中有缺止于進士年三十以上者考選奏補𢎞治間始以行人博士兼選正德間始以在外推官知縣照御史例選補正德末年大臣畏忌新進敢言乃始盡廢進士考選之例陛下登極之詔命今後照依舊例給事中有缺于進士考選奏補御史有缺進士與行取人員相兼考選然應詔于一行而旋復寢吏部亦嘗奏請廟堂大臣陰行格阻往往以未嘗經歷世故藉口是不過欲得脂韋媕婀愛身固祿之流取其不為己害而已司馬光曰凡擇言事官當以三事為先一不愛富貴次則重惜名節次則曉知治體今當用光言以為取人之則將見在各衙門辦事進士及歷俸二年以上行人博士并推官知縣三年考滿到部者查照舊規及見行事例具奏從公考選文選司員外范景文救科臣周朝瑞疏伏讀聖諭內閣朕昨覽文書見有吏科給事中周朝瑞條議仰獻愼初三要內停止金花銀兩朕即位之初言路方開礦稅已撤如何擅行瀆擾此項銀兩原係舊制進內以備萬壽聖節并典禮等項及各宫賞賜武職軍官俸糧之用難以停減周朝瑞這厮要譽妄言本當拿問朕哀思皇考皇妣梓宫在殯姑從輕降一級調外任用卿可傳示該部這銀兩還遵照舊規行特諭卿知欽此隨該內閣大學士方從哲揭帖奉聖㫖覽卿所奏朕已悉知周朝瑞這厮不諳事體逞臆妄言擅行議減內庫金花阻絶國用好生可惡周朝瑞已有㫖了卿不必申救該部知道欽此欽遵竊念周朝瑞忤觸宸嚴夫何敢言但周朝瑞職居言路遭際明時未忍自負以負主上慷慨發舒故不覺慮之過語之戅耳至所條奏留停金花以寬民力而光上德酌祖制而裕國儲亦忠于皇上之職分也乃皇上罪以要譽妄言夫主聖臣直名在皇上下亦何譽之可要若因此而罪之則適成其名耳夫當容言之時而有拒言之事恐未免為聖德纍也日見皇上用人行政下如流水舉朝相慶皆謂衮職不闕補救無事臣工此時止宜將順德意彼目覩大渙王居不殖貨利已明知上意所嚮矣正所謂善將順者而何深罪乎雷霆一震已惕不測之威雨露旋施彌彰有容之度知聖德如天諒必出此也伏祈聖慈免其降謫照舊供職使下有犯顔敢諫之士足見盛世之有人使上有刻印銷印之舉愈覘聖心之無我其所禆益豈渺小者哉給事中劉斯􅀈言路漸輕疏蓋聞英主受言取象於轉圜流水而末季拒諫貽譏於轉石拔山夫人主豈有不慕受言之名而甘為拒者或偶因猜而府疑遂積疑而生厭猶豫之過未免開停閣之端此誼辟所以愼其初而忠臣必防其漸也我皇上首增考選之額以開言路而又勤召對以通下情可謂求言若渴矣然積輕之漸臣不無鰓鰓過計者則以虛言之日煩也流言之日滋也辨言之日囂也聽言之未虛而納言之未速也何也臺諫之設以封駁為義以觸邪為職其于兵刑財用之屬惟察其舉否而白簡繩之庖祝不相代也今任者少而議者多章滿公車强半借條陳為職掌矣而皇上亦若認職掌在條陳諸如套疏輒被溫綸豈以此娓娓者真足濟時艱而奏安攘乎臣以為有治人無治法條陳而當任者未即議者之心條陳而非議者反掣任者之肘試觀年來紙上之兵糧口角之節省畢竟無濟于脫巾之變而况乎窺上意之所向借條奏為逄迎者且比比也議論多而成功少所謂虛言日煩者此也百司庶尹各有司存而獨臺諫稱言官此豈惟明職掌之專亦杜紛囂之漸今乃廢辨而輕瀆天聽資郎而妄奏空談冷署間曹而時生見事之風謀出位之政不可訓矣甚有嫉賢妬正索瘢無從遂爾編造歌謡揑成單欵無頭帖子遍布于街衢匿名揭帖暗投于宅巷覽之則鑿鑿有據按之則語語無端欲何為者想不過二三小人謂皇上明目達聰妄意得流傳大內便可當射影含沙耳雖皇上視明見逺萬無旁寄之聰明而此市虎之紛紜抑豈輦轂之下所宜有耶所謂流言日滋者此也昔稱言官指及乘輿則天子改容言及政府則宰相避席豈以君相之勢遂為言官屈哉亦以糾劾不避職在則然而聞言引愆道固應爾乃今彈文甫上隼未下于高墉利口高張狼反橫于當道或以有據之事敢于侈口而爭亦有自認之辜究且支吾不應此糾一事也而彼且牽藤引蔓别尋節外之枝此論一人也而彼又東拽西扳至欲空人之國朝端同于聚訟黑白聽其溷淆且風聞有進密疏以惑聖聽而中傷善類者雖道路之口虛實不可知總之神羊結舌而鴟梟鼓喙成何世界也所為辨言日囂者此也任賢勿二去邪勿疑固哲后之芳規而舉不避親劾不避讎乃諫臣之職掌乃今推鄭莊之轂者不曰薦賢為國而以為市恩效鷹鸇之逐者不曰除惡務盡而以為苛詆欲補牘而再請既有挾私求勝之嫌逮不約而相同又有隨聲附和之指是容聲啓口盡結疑團而梧掖柏臺皆畫蛇足恐非推心置腹之誼也所謂聽言未虛者此也至于皇上勵精求治一應章奏批發從不逾時而今亦有遲至旬日漸至數月者矣向猶許諸臣催請而近且有暫留詳閲或有不應批發之㫖矣夫議論無過是非兩途而聖斷亦止從違二字言而是自應虛受以彰都俞之休言而非亦當抉出以成吁咈之雅若但束之高閣漫不部分徒長局中之葛藤更生事外之控揣况暫之為呼吸不應久之將蠧弊叢生我皇上魁柄手操要終原始豈其慮不及此而猶曰姑以此神不測之用也所謂納言宜速者此也臣非不知睿斷自有權衡于言官未嘗厭薄但防其積漸勢必至此且此時人靣日頑人情日競身叢衆鏑者尚披顔甲而請繫賊之纓褁足岩疆者又借清卿以當愈病之藥向使白簡有靈寧遂敢悍焉無忌一至此哉臣憤此頑鈍之成風而益傷言路之徒設望皇上之力行之也給事中辜朝薦用人聽言疏皇上御極以來任人圖治納諫聽言自三代而後未嘗有也而邊腹之患日深一日羣力羣䇿罔見實效古未有聖明在上殷憂若此而不能削平禍亂坐臻上理者臣嘗反覆思之豈當世遂無可用之人哉夫知人則哲惟帝其難言貌取人宣尼猶失惟皇上求治之心愈急則浮薄喜事之人愈易飾詭而釣奇惟皇上破格之意愈殷則巧言孔壬之徒愈易乘機而鬪捷昔漢臣周勃張相如號為長者言事呐呐不能出口然安劉却敵必屬其人吕蒙之舉陸遜也苐曰意思深長而張釋之之阻嗇夫李沆之惡梅曾皆惓惓以捷給為戒蓋利口之禍邦家聖有明訓臣子任事决無不出于朴誠而能克濟時艱者然朴誠之人多得之老成練達蓋敡歷既深自臨事不茍逺不具論邇來督撫中所稱足任者如洪承疇盧象升史可法等亦祇實心實做何嘗縱橫滿紙動求人知向令此數人者與楊嗣昌顔繼祖張若麒等粉飾虛張爭鬬才辨必不能逺過由是觀之其在此而不在彼明矣况今日口舌相高攻訐滋勝老成日就凋謝典型漸若晨星自此以往將恐諸臣精神不用以實圖職業而用以揣摩筆端雖皇上召對時勤無所逃于電照然既察其才辨又當察其朴誠若徒以小才喋喋付之事權嘗試追悔何及所謂用人貴審者此也書曰有言逆于汝心必求諸道有言遜于汝志必求諸非道夫臣子連篇纍牘掇拾浮詞誠易生厭然聖帝明王鞀鐸以求之者蓋舉一事欲知其利又欲知其害用一人欲知其短又欲知其長非反覆咨詢曲意審度終無以通達情僞深悉事理也昭皇帝嘗以弋謙言事過直免其朝參逾月而言者不至乃復令朝參如故且降敕以奬勵羣臣故言雖無當終不深罪皇上邇來于言事罪譴諸臣屢召賜環雖越數載猶惓惓聖懷因是羣臣無不感激思奮其間即有狂瞽過當之語終可以諒其無他即有僉壬敗類之徒終未可以概天下要以不求遜志而求逆耳則聽言之道斯得矣近如陳燕翼所論中州一案臣以守汴之勞與决河之罪原不相掩在皇上深憫之所以作勞臣之氣在言官正言之實以存萬世之公又如熊開元本無言責而論列大臣亦可以銷後來雷同之漸至於姜埰置詞舛謬百喙何贖乃懲創之則臣子之罪已明生全之則覆載之德更大况聖明孝治天下埰家遭兵火父罹慘禍彼亦人子也臣非謂諸臣之去留生死有關輕重但恐將來言者遂有所趦趄而不敢盡煩囂雖息讜論亦捐所謂聽言貴廣者此也臣四載里居再入班行流寇驚心一籌莫效而終以用人聽言為今日治平之本故不避瑣瀆冒昧上陳刑科右給事中左懋第詳察密封疏臣接錦衣衛所傳紅本乃逃帥楊德政奉㫖正法也臣密緘同駕帖還之矣次又捧御筆緘函發科者即此本也臣又密緘藏之垣中矣然自逃帥正法西市道路之口皆素恨此帥妄議練總以毒害天下又知其驕橫剝軍怯猾善逃罪不容于死人人快之而明㫖人皆未見也凡係密封皆不發抄若不請明誰敢宣布而臣思此本之為密封者原恐此機一泄罪帥或自引裁而不得行法今其人已誅自當明正其罪使國人知之以昭國人殺之之義并使九邊聞之知朝廷有殺一人而三軍震者殺之之心也語云信賞必罰必于耳目所聞見則所不聞見者莫不陰化豈如此可聞可見之事而反閉天下之耳目哉伏乞敕下發抄以便遵行而臣因思各垣之密封似此者多也臣愚以為有必當密者有不必密者有可密于事先而不必密于事後者有當密于今日而不必密于明日者如事關兵機方且動于九天藏于九地何可不密也如警報何邊寇擾某地動靜之情勝敗之事廷臣知之以便各獻芻蕘各要害知之以便共圖備禦何必密也况邸報之抄傳有定道路之訛言無端疑揣轉甚張皇孔多廷臣縱有所聞未免因而箝口何可密也如制邊之䇿諸臣有密奏密之可也邊已安矣仍當使廷臣共知其何䇿以安邊勦寇之謀諸臣有密奏密之可也寇已平矣仍當使廷臣共知其何䇿以勦寇此可密于事先而不必密于事後者也如逮有罪之人不密恐其人將遁人已獲矣則必昭布其所以逮之故如誅有罪之人不密慮其人將自裁人已正法矣則必昭布其所以誅之實此當密于今日而不必密于明日者也蓋人臣事君原無不可使天下共知之言而朝廷行事更無不可使天下共知之事愼密原為成事事成便復昭然所謂理本相成變而不失其常也臣今日不言而使朝廷一時愼密之事因循沿為故例甚至科録史館皆不能啓什襲之藏而筆之而一時之疑信猶其小者後世之信史何所取裁且謂壅蔽綸綍自臣等封駁之臣始矣臣用是虩虩然懼敢因請㫖發抄而并及之刑科給事中孫承澤請復接本之規疏竊照本章者臣工所以代靣對而陳其𠂻悃也一經聖斷大政大法于是寄焉事綦重也臣于辛未觀政户部猶見紅本發下各部司官輪流候接日當晡時內臣捧至㑹極門東廡各官鴈行序立挨次接領體統嚴肅制甚稱善及臣初入垣掖事猶如故邇因機務殷繁發無定時于是六曹不復接本或早或暮但慿㑹極門內臣發之錦衣直房直房散與各垣吏役遂失當年之制臣按祖宗朝凡紅本發科猶必令部堂一員親至垣中畫本尾署小押所以防姦杜弊如此其嚴也况未到科之前收授一憑下役豈所以重王言而尊典制臣並有請者皇上勵精圖治寒暑罔渝凡係緊要本章無不朝上夕報亦有不能即奉綸音者或以事體稍緩無妨徐發但拜疏之人計日而數賫奏之使延頸以望時日稍稽妄生揣臆當此中外多艱正賴臣工黽勉效職儻因此而署位開因循之漸事體生叢脞之端防患於微貽憂滋大况天下事無大小以敬心持之則小者亦大事無緩急以精力圖之則緩者亦急此大易所以重行健而自强不息也並望採納施行得㫖各部司官接本并部堂到科畫本原有舊規如何竟廢著察議具奏據稱紅本收發一憑下役殊非典制今當何法傳接併議妥奏來本內敬心持之行健不息等語說的是知道了該部知道户科左給事中孫承澤章疏日繁疏臣辦事垣中察本科發抄底簿見邇日章疏較崇禎初年增十之五較萬歷中年增十之七一科如此别科可知夫議論日多則事功自應日集乃近年中外景象無論不及神廟時並不及崇禎之初多矣蓋議論多者精神之薄也意念外浮則力量中歉理所必然無足怪也故密奏日多則邊防愈壞籌計日多則財用日虧啓事日多則人才愈錮此其病在議論多虛飾亦多也皇上勵精圖治鋭意太平第一急務無如課實效課實效無如省議論省議論須從六曹大臣始蓋六曹者事功之府也朝廷之大政寄焉諸臣果能公忠體國殫力救時不顧利鈍不避勞怨天下事豈遂不可為抄發到部或即具覆不必諉之别曹不必推之撫按或不必覆照例存案彚銷一力擔當大家實做如此則章疏之省不知凡幾矣由此而論臺諫之臣是以言為責者也畜狸欲捕養鷹欲擊言誠不厭煩數也若浮泛之條議市恩之奏薦與據風聞而糾在外之小吏則宜禁亦省章疏之一端也至于各曹之官自有職掌黽勉圖之日不遑給何暇出位而紛紜建白凡事無關係率妄沽名則宜禁此亦省章疏之一端也在外撫按于重大情事自應時時奏聞若錢糧之起解參罰之開復官員之更調行間之零級小捷事關該部者應行咨達部若瑣事概行䙝瀆則宜禁此亦省章疏之一端也通政之司職在封駁邇因廉恥道喪人希進取游說不根之徒有如聚訟凡此者宜禁此亦省章疏之一端也又如內外臣工凡經論劾當如祖宗朝舊事平心靜聽上俟皇上之鑒裁下俟舉朝之公論聞言嘵嘵激辨者則宜禁此亦省章疏之一端也有此數禁議論日減皇上批答之暇時御文華殿召大臣商確政事講道求理務令朝奉命而夕行從此而政不清簡功不畢集者未之有也得㫖朝廷廣聽求言欲收實益其浮議繁雜虛飾罔功允宜禁飭這本內各欵著議具覆建白係言官本職若當言不言以致旁觀出位乘間紛囂科道官殊難辭責又向來中外各衙門循例奏報及邊鎮攢造文冊察覆登答等項有係應行的亦有套混妨擾無益可省的也著詳酌奏奪該部知道户科左給事中孫承澤注銷疏竊照邇來民艱用詘度支一曹關係甚重臣今歲身歷三垣皆管注銷之事而歎積弛之狀至户部而極也每逄注銷呼羣吏持牘鴈行而前司司比之見赴比之簿大半遺漏不全所銷號件不具文牒但憑吏役口報為故事且吏役皆雇覔代身問其緣由茫然不知也臣往返申飭繼之以夏楚稍稍就緒然每當五日一銷則報完者仍復寥寥該部嘗行之本雖盈篇疊幅要不過循例題知依樣具覆而事稍重大則堂行司司付吏役束之高閣不則卸之撫按漫言行查任其稽延未幾官遷吏換前事不復記憶有同故紙矣臣試言其略如各直省新舊兩餉及金花漕折輕賫茶蠟歲絹等項拖缺以億萬計猶曰逋負在民時荒難急也至官吏之侵那畿輔之透支關差之缺額銅本之侵沒奸解之吞隱運辨之盜賣數至成千成萬者固纍纍也何至經年纍月不一問之夫户部民部也以急民為事固不止以辦餉考成見能也乃積年興屯開荒求蠲報災之疏一切沉閣有如秦人視越人之肥瘠即如臣前因江北私派小民鼎沸具疏直糾奉旨經年有餘尚未見覆諸如此類不知凡幾欲求閭里康阜婦子恬熙胡可得也以如此關係甚重之地而如此因循茍且每對部吏見其呼應不靈不知幾為扼腕矣臣前待罪兵垣見該部有摘參計次議罰之例兵農並重事可通行伏乞皇上敕部議定規則俾知遵守以警玩振靡庶有裨矣奉聖㫖民間舊缺近諭已明其官胥侵那透支隱盜等項作何追賠并摘參未完欽件作何分别罰治通著該部遵照近㫖詳核另議具奏這本直糾江北私派一節經年未覆是何緣故併著奏明刑科都給事中加俸二級孫承澤熱審疏臣捧讀聖諭于熱審大典按期舉行臣不勝加額仰見陛下如天好生之德時厪于懷不以軍旅倥􅘓而或輟也該部雖當專遣閣臣清理之後夙案甫清新案又積事如春草芟而復生弊似落葉掃而愈集其所煩斟酌蕩滌者至不易矣應審人犯臣已催部造冊細加參核恐候審者急此緩彼又將未審人犯再四移催速結然當注銷之日每見各司前件多開已題候㫖蓋近因戎馬生郊聖人有憂值此機務殷煩之時遂致批答之停閣臣歷察往例凡係未結人犯不得造審今爰書雖成而明㫖尚靳事體一時未結是當泣罪解網之日猶有羈魂向隅之悲亦大造所難獨遺也况事無重輕一屬候㫖概從羈繫饑渴困苦溽熱蒸煎遲速之間生死所關伏乞聖慈俯察該部各本盡數批發俾纍纍新犯輕者遽獲生還重者幸荷送審將見和氣所噓獄蟲不紅圜草增緑矣至于司冦一席久已塵虛雖署篆之臣不敢以傳舍視事然領袖部務必得正官並乞敕部就近推用務令朝簡而夕就于以溥皇仁而光大典端賴之矣奉㫖知道了該部知道刑科都給事中加俸二級孫承澤摘參疏竊照遣戍一罪僅亞大辟一等其問擬之也當愼而處斷之也當嚴蓋不愼則虞有寃人不嚴則虞有縱奸也今刑部見在戍犯已經清理之後贓銀量豁情罪堪矜者准豫納贖以開一靣非過也但戍犯不一矣其中大奸巨蠧使得一概收贖僅以二百金縱虎出柙是誨奸也胡可為訓該部先經批准者臣科移文署印臣張欣當力為駁正無奈承行吏胥朦玩如故也謹先摘參其一二顯著者一為軍犯髙瞻崑案察瞻崑以誣詐問辟追贓共二千二百兩分毫不納二次清理俱為除豁減擬邊戍此應速為發遣者乃移送納贖是完贓無銀贖罪有銀也且以辟而減擬胡得言贖本犯宜速為發遣者也一為軍犯鈕光先案察本犯以積年奸書描改印票侵冒料豆草束事關軍儲僅擬遣戍有餘辜矣乃該吏注銷以為業已發遣及察之則移送納贖夫既納贖何必諱言發遣是明知不可贖而代為掩飾况本犯以侵官之物為贖罪之物尤而效之其何以懲本犯宜速為發遣其已納之銀留為充餉可也一為原任吏部侍郎軍犯蔡奕琛案察本犯以十四年定罪十五年正月咨送兵部發遣至今尚未至兵科掛號定限是本犯抗未赴衛事已年餘經承何不一問收管僅以咨送了事據法違限一年例應調衛改遣似難為本犯寬也以上三項係臣行察據該司手本循職參駁伏乞敕下該部將高瞻崑鈕光先責今當時起解蔡奕琛違限年餘例應改衛速行察覆至朦玩吏書嚴加懲治各司積弊不止遣戍一事容臣極力搜剔以副職掌統希聖鑒施行奉㫖該部議奏禮科題陪祀疏臣按臣科須知一欵每歲大祀天地都給事中各一員入壇陪祀又一欵如左給事中署印必先具題入壇今歲皇上親郊該科都給事中惠世揚奉命未任郊祀大典臣垣職掌所關而陪祀乏員或于事體未協今有左給事中魏大中見署科事應否入壇陪祀謹題請㫖奉㫖准照例陪祀兵科肅朝禮疏照得臣等西三科輪直武職門籍若遇朝參調取長安左右門守衛官收貯各衙門投到門籍簿扇除公差患病外中有不到者㑹同題參此從來舊例也臣今細察武職各衙門簿籍中有填注差病者亦有止造見任者或有差回病痊不填注者又有止填痰嗽不言注籍者且有竟不移㑹直日該科者臣等每月彚題止據衛官繳到前月門籍簿扇填注差病字樣恐假借參差有難稽察况聖壽元旦諸大禮在邇倍宜整肅伏祈敕下該部申飭各衙門嗣後凡有牙牌應朝參官員務要明白詳注一投長安門一投直月該科若有差回病愈故違不填及以寒嗽溷入希圖安坐者臣等與直日該科指名參奏庶朝禮肅而人心警矣科道互改洪武中給事中宋善萬徴彭通王惟言王漸永樂中吏科右給事中羅亨信工科給事中周岐正統中給事中朱良暹李運工科都給事中張襘俱改御史洪武中御史李爌改工科給事中永樂初山東道御史文郁改工科給事中江西道御史汪俊明改刑科給事中戊寅考選紀崇禎丙子冬外計俸滿知推俱留部考察候核在任錢糧先是鄭友元熊開元以錢糧之故纍及司農下獄至是愼毖有加而吏書挾索之弊亦從前所未有也未幾上御講筵令諸詞臣條議政事黃景昉薦候考者朱天麟成勇之清項煜因奏任濬為首輔張至發姻親有意黨護之至發激辨不已楊士聰並參沈迅張若麒納賄史􅒇囑託冡臣田惟嘉求選詞林戈矛四起纒連不結史􅒇上疏言此番考選諸人薄科道而重詞林凡考中詞林者皆本衙門人援手接引于是凡取中翰林者以為預定分補各部主事至上令吏部將咨訪單進覽于是以圈奬濫狥各官傅元初張第元房之騏韓源趙繼鼎馬兆羲俱著冠帶間住許晉林正亨王猷降三級調用劉含輝楊振原葉初春劉興秀辜朝薦金蘭葛樞郭九鼎凌義渠何楷禇德培各降二級照舊時臺省員缺候考者至經年不補而現在之臺省被纍幾至一空人嗟以為變局至戊寅四月二十八日上召在京候考及已推部屬各官俱來中左門昧爽上出御門內閣及吏部都察院諸臣行一拜三叩頭禮畢候考諸臣行禮起傍立止令五人一班靣奏在任行過事實上隨以筆注記奏畢上手書䇿問云禦敵需兵養兵需餉屯鹽採鑄難取近效搜括加派民力已竭將何䇿以處之近報抵邊不戰而歸是何深謀諸臣通悉已見條對務期可行不許勦襲故套仍將履歷開寫明白上令吏部將䇿問傳示各官暫退少頃復出收各官試卷陸續而出五月初十日上親定曾就義黃文煥黃奇遇張縉彥李士淳汪偉虞國鎮余象賢馬剛中朱天麟等為翰林編檢官王調鼎熊維典解學尹張希夏張作楫耿始然成仲龍李清孫承澤吳希哲張淳等為各科給事中李嗣京秦廷奏汪游龍李春蓁任濬楊鶚喻上猷柯元伯李雲鴻凃必泓左永春宗敦一張爾忠黃諫卿甘維爃張茂爵王章蔡鵬霄王範陳天工高名衡郭景昌徐養心羅起鳳張緒掄王聚奎鄧希忠閻嗣科林蘭友葉樹聲詹兆恆等為各道御史井濟李拯楊鼎甲黃熙𦙍楊調鼎王心純葛逄夏劉作霖郭尚友唐良懿張若麒沈迅為户禮兵刑工五部主事王昌時為南部主事韓友范為兵馬次日諭內閣發下曾就義等試卷十八卷卿等傳與該部科將內中所對事宜確酌可否奏奪曾就義對中言小民不苦于餉而苦于有司之火耗私派誠嚴禁之似不妨量行加額以紓軍國之急上稱賞之拔為第一未幾遂允楊嗣昌練餉之議海內騷然就義悔甚鬱鬱而卒附載言官被言候補兵部職方司郎中劉元珍論給事中錢夢臯疏朝廷磨礪一世伸正絀邪以端揆大臣無樹私交無作好惡無蔽上而箝下彰善疸惡佐天子持衡焉不意今日乃有罔上行私如首輔沈一貫者又有頑鈍無恥如刑科給事中錢夢臯者夢臯為人臣無暇毛舉瘢索跡其推年例而妄奏求容掛察典而乘機建議壟斷如市士林不齒逮至兩蒙留用因蠱惑聖𠂻猜疑部院併考察全疏亦中格矣臺省被察諸臣概留用矣國家代守之典章屑越于一朝朝野駭聽僉謂夢臯之黨隂謀叵測將異日種種僥幸之門從此闢也甚可慮也夫使夢臯羞惡未滅亦宜驚彈射而斂跡胡乃恣起風波動駕言于楚事含沙反射蔓衍何極僉謂夢臯之黨機鋒叵測將異日種種傾危之隙從此開也甚可畏也夫使政府無私人則奸慝寧壅于上聞邪謀亦安能下逞乃一貫實為戎首秉政以來不聞輔佐皇上救生靈于塗炭者何事起忠良于擯厄者何人年來比昵憸人乖謬尤甚即如考察一事皇上豈有愛于夢臯而故䁥之豈有私于臺省諸臣而獨寬之蓋由一貫曲庇私人內則假公以朦上外則挾威以箝下既借皇上之權以伸其意復竊皇上之德以固其交使守法者抑勒無聊席奧者高張無忌將來誰肯為皇上觸權要持國是乎一貫之敢于欺罔如此所關治亂安危之窽㑹良非細故幸皇上自為社稷計南中諸臣糾錢夢臯鍾兆斗疏云頃接邸報見考察留用科臣錢夢臯年例外轉科臣鍾兆斗相繼有疏其假托遮掩中傷報復中外所共知即二臣倘有夜氣豈不自愧而乃無端蔓引互為欺罔何哉臣請略述始末而皇上試埀聽焉夫六年京察年例外推此祖宗定制天下之公道所繇係也銓部酌量自有定評往年夢臯曾以外推嘵嘵自辨士論至今鄙之及今奉考察先五日部院科道採訪已定夢臯預知不免乃乘御史林秉漢疏至托拾楚事與京察疏併上以存展辨之竇夫楚藩之事皇上排廷議而獨出神斷天下誰不服之然而楚事自為楚事京察自為京察兩者原不相蒙也今亂宗之法且行矣楚事無可言矣夢臯猶借為端以動皇上之聽試閲其疏娓娓數千言支離附㑹全無的據且其再疏曰南都之論臣者必接踵而至此其意必欲臣等寂無一言任其橫肆然後為快乎夢臯既已假楚事攻都御史溫純以强自遮飾又謂純逐鍾兆斗以激發兆斗而相與朋比為奸兆斗不念外出參藩體非有損舊典公論當自靜聽乃踵夢臯之故智語語惟攻溫純而肆醜詆是兆斗明以私怨攻純不待人言而自言之矣信如兆斗將來銓臣束手不敢推一年例憲臣噤齒不敢指一官邪紀綱倒置小人無忌而祖宗二百年之令典不幾于廢墜殆盡耶臣謂二臣者均當亟行罷斥毋使淆亂清議者也抑臣猶有說焉書曰不賞私勞不罰私怨有覺德行四國順之元輔沈一貫平章天下宜持大體務公平率由舊章且考察巨典歷朝守之用之勵世磨鈍今科道數人一旦留用聖主以為特恩天下人心共相駭異方望元輔以力爭及考察命下一貫不以為規而以為頌天下疑之乃夢臯兆斗巧辨橫詆又若陰有所恃而無所畏忌者即元輔心不直二臣靡有私勞之可念也天下其誰信之臣又以為皇上不亟斥之則輔臣之心不白也語云大臣以道事君不可則止都御史溫純守正不阿人所素知然據其自疏亦曰管南北中外考察已五次任勞任怨嫌隙既多今夢臯兆斗又紛紜力攻其去不遺餘力揆之大臣進退之義不去何待臣又以為皇上不聽純之引退則大臣去就之節不明也向當沈四明柄國時與禮侍郭江夏為楚事相左㑹妖書變起科臣錢夢臯受四明指糾江夏波及沈歸德幾蹈不測海內唾罵之溫總憲矯矯正人夢臯與兆斗合攻之既而二人計處年例四明矯㫖俱留一時議論鼎沸士大夫黨禍實始于此禮科給事中汪始亨劾兵科右給事中李魯生疏竊惟國家設立言官職綦重矣必已之出處端正也而後可以糾人之邪必己之心事磊落光明也而後可以摘人之險必引扶善類力禁苞苴而後可以絶奔競之風廣彚征之路又必出詞吐氣寧直勿倚寧厚無刻而後可以平情宣滯培國家之元氣乃險媚小人毁禮滅義其坊決矣詰曲鈎棘其心險矣鋤異己而墜之淵引私人而充其槖其舉刺顚倒矣甚至以筆墨逄迎而使一方之山川蒙垢遂至鑿削國脈害不可勝言矣欣逄我皇上聰明神武殛凶除佞逆璫姦人明正典刑虎彪而下投之逺裔逮行勘問無不發之姦也乃有三處投身百足不仆慣出不通文理之疏大肆辱詈之鄉試録序以取悅于目不識丁之魏忠賢至今日月中天諸奸逺竄而猶靦首班行玷汚青瑣如見任兵科右給事中李魯生者臣安得不歷數其穢跡于皇上之前乎夫魏忠賢所以盜竊主權殺人爵人者舊輔臣魏廣微授之柄廣微所以傾陷善良放開辣手者門生李魯生之引其緒此投身之第一處也魯生始見忠賢廣微同謀殺人魚水相歡遂甘心為廣微伏籬之犬及見楊漣與左光斗酷刑垂死廣微佯為疏救大拂忠賢之意忠賢欲棄廣微魯生遂亦棄廣微而竄入于舊輔臣馮銓之門矣臣見先帝枚卜有老成幹濟之㫖蓋謂老成閲歷既深識力夙鍊而新進之人其骨氣或未堅凝耳魯生欲居銓之首功遂出疏云成即為老而非老乎年幹即為濟而即可以濟乎國信如是言則髫年後輩即當入贊黃閣而黃髮皓齒反當就編簡之列矣如此不通文理之疏自是魯生長技寧第執中用中等語為哉求滿溪壑之腹大肆封豕之熖欲不次超擢某某即超擢某某是以長安有要官起問二李之謡欲逮某死某即逮某死某是以一時一十七人次第就斃彼時茅山人往來線索銓亦借為魯生所薦此投身之又一處也孰知逆璫喜怒無常少年揆席不久崔呈秀于是以美官白鏹市吳淳夫攻銓而魯生飽揚飛去又不肯事銓矣呈秀則其死友也魏良卿固其義兄弟也良卿欲請托鬻青襟魯生即傳之學臣李蕃而居間過付圖漁人之利其贓私狼籍行道之人皆知之此投身之又一處也三處敗而魯生之冏卿管兵科左給事中不敗呈秀淳夫等贓俱追助餉而魯生之厚藏自若于法為不平于鵷班諸賢趨蹌揖讓為有玷為魯生者當思所以自處矣乃被參飾詞又欲依附于君子之林豈以投身三處為未足耶想倐從倐背蘧廬主人諸君子鑒于前而其孰肯納之也至其典試臣鄉見上年詞臣方逄年科臣章允儒以五䇿暗入時事而削奪魯生遂主于逄迎又以止于不及時事不足得逆璫之歡心于是後序大肆辱詈詆毁前賢劫以積威而使之懼又誘哄臣鄉後進而使之效法乎彼不但衡嶽蒙羞江漢流穢其于我皇上楚材摧折最可憫惜之㫖何大背馳也皇上憐楊漣之寃死羣臣共快而魯生序中詈漣曰竊聖賢盜豪傑走天下如騖獨以為漣固忠賢所恨不得不罵此外多士如林蒸蒸蔚起皆肅皇帝豐芑之遺經數百年培養而魯生詈之曰楚士抱璞堅于三刖楚風趨上捷于細腰夫多士亦何寃而受此詈也然猶曰不幸與漣同時應當罵詈至于前賢如屈原忠愛宋玉風藻千古齒芬魯生辱罵之曰楚所矜式惟有屈宋宋玉稱神引夢賦雨橫風媟䙝蕩佚屈子踔厲侘傺之感哀悼悲些之調變雅為騷亦何足道推其語意喋喋厭薄屈宋恨不起上官大夫與之把臂定交矣若夫迫劫多士令之股栗則曰規繩在前斧銊在後士將焉往意謂吾以斧鉞臨之爾多士九十六人寧不舍所學而從我乃其誘哄臣鄉後進使之迷所向往則尤可訝焉彼不教臣鄉以法孔孟亦不俯而教以學左史倚相輩諄諄教臣鄉學魯生其序曰臣不必以楚衡楚而以臣衡楚亦不以臣衡楚而以皇上之衡臣者衡楚臣攄所欲言疏朝上夕報可且褒諭有加一則曰留心邊計一則曰苦心計畫以是為呼吸上通帝座之驗令諸士是步是趨夫臣鄉即令不達古不能讀三墳五典八索九邱之書然義路禮門童而習之亦何至瞎引盲趨甘學魯生也臣鄉死者戍者削奪者受忠賢之酷止于天啓七年而受魯生試録之辱則無有窮期皇上愛惜楚材天語斐亹一時三湘七澤之靈頓覺纎塵淨洗火熖燭天魯生亦何能辱臣鄉獨與子孫相繼皆知魯生之醜則不能為魯生解矣及見皇上浩蕩恩寬魯生又改頭換靣為楊漣等上疏免贓希圖施恩臣鄉為自全之地因依回留連需次欲徼吏垣之長夫吏長垣六垣之冠冕人才進退實攸關焉豈通身穢跡之人所可領袖臣非不知初入班行亦當隱忍以昭同類之厚道但皇上廣開言路起廢維新一時純忠亮節之英濟濟梧掖魯生以醜類混迹舉世共棄臣又安得默默處此疏中臚列魯生劣狀頗悉然尚有不盡者當孫高陽視師薊遼巡邊至近郊欲一入覲魏廣微誑逆賢曰孫閣部興晉陽之甲欲清君側逆賢怖甚使顧秉謙矯㫖令東還既而謀所以處高陽者魯生曰閣部所恃手握重兵耳宜以缺餉為名大汰其兵使敵來殺之不則兵噪亦殺之逆賢喜于是下汰兵之議此其設謀誠工不知國事之謂何哉春明夢餘録卷二十五
