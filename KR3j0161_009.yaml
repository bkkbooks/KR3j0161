body:
  text: 春明夢餘録卷九吏部左侍郎孫承澤撰文華殿文華殿在左順門之東永樂中建其後乆不臨御嘉靖踐阼之初諭將文華殿鼎新修建易以黃瓦凡齋居經筵及召見大臣等項俱御此殿九五齋恭黙室皆世宗手題殿中橫書一扁學二帝三皇治天下大經大法十二字爲神宗御筆殿中經筵每歲以二八月中旬起四十月末旬止月三㑹講日皆逢二進講每兩人一四書一經講章皆預呈閣臣轉付中書繕録正副各二紙隔日進司禮監官奏知先晚於文華殿内寶座地平之南設金鶴香罏左右各一於左香罏之東稍南設御案講案各一皆西向案上各置所講二書以夾講章各壓以金尺一副至期早進近侍内臣及知經筵官勲臣内閣學士并講官及六部尚書都御史大理卿通政使鴻臚卿錦衣指揮使及四品以上寫講章官俱繡金緋袍其展書翰林官與侍儀御史給事中序班鳴贊等官俱青繡服朝畢駕起御文華殿皆隨之大漢將軍凡二十名導駕至左順門退易冠帶便服仍各執金𤓰而領將軍或侯或伯者則易金繡蟒衣追越衆官進左順門皆分班綴行立文華門外竢傳宣云進來則將軍先入殿内負東西墻立諸臣陞陛鴻臚寺官贊入班行禮畢以次分由殿東西門入重班立指揮則立西一班末稍前御史給事序班六員分於中門左右向北立序班二人舉御案進上二人舉講案置中鳴贊唱進講講官各出班立講案前展書官二員出班對立鳴贊講官並行禮興東展書官進至地平膝行詣御案展四書講章講四書官亦稍前近案展所講書竢展書官復位先説講某書然後申講講畢掩書稍退後原展書官仍如儀進掩書復位西展書官與講經官進退俱如前儀講畢仍並行禮各回班序班各撤案聯置舊所鴻臚卿中跪奏禮畢上諭官人每喫酒飯各官跪承㫖興以次出丹陛仍行禮乃出左順門宴以官序惟學士之坐立則序于鴻臚寺卿及四品以上寫講章官右展書官坐立亦序于四品之下寫講章官上重職事也至于日講官凡四員日輪二員先大學衍義次貞觀政要二書皆不用講章惟各以黃票書所起止預進先日内臣設御案于文華殿後穿堂中以二書並起止置案上至日早朝畢四講官同閣臣隨駕入至殿内授内臣以來日起止竢召乃入穿堂門内行禮分班北向前後立東班當講者詣御案前内使授牙籖右手執之且指且講書則向上初展後掩皆屬内侍講畢還籖復位西班當講者乃進講悉如東儀講畢上諭先生喫酒飯皆跪承㫖行禮禮前後皆一拜三叩頭出宴于文華門外西廡禁中謂之小經筵亦謂之小講文華殿東室奉皇師伏羲氏神農氏軒轅氏帝師陶唐氏有虞氏王師夏禹王商湯王周文王武王九聖南向左先聖周公右先聖孔子東西向歲春秋開講前一日皇帝皮弁服拜跪用羮酒果脯帛行奠告禮元人經筵儀節悉備如以勲舊大臣知其事及定期二八月後累朝皆仍其制翰林承㫖巙巙曰天下事宰相當言宰相不得言則臺諫言之臺諫不敢言則經筵言之故事勲臣一人知經筵閣臣俱同知經筵後至李文逹賢以内閣首臣與勛臣俱知經筵遂以爲例實非初制也國初有𢎞文館在大内之西以處博學之士正統初選經筵悉翰林院官内批如何不見居外賢良以㫖赴𢎞文館于是劉球等自部屬進次經筵永樂二年上諭文華殿大學士楊士奇以大學講義進上覽而善之因諭帝王之學貴切已實用先儒謂克明峻德一章一部大學皆具士奇曰堯舜禹湯文武數聖人凡脩諸身施于家國天下者皆大學之理誠聖學所當先務宣德二年丁未二月御文華殿講孟子至二老歸文王章問曰伯夷太公皆處東海而歸文王及武王伐紂太公佐之伯夷叩馬而諫所見何以不同講官對曰太公以救民爲心伯夷以君臣爲重上曰太公之心在當時伯夷之心在萬世無非爲天下生民也宣德三年二月進講舜典上曰觀二典三謨則知萬世君臣爲治之道不出乎此歷象日月星辰以閏月定四時天道以明治水土奠高山大川别九州任土作貢地道以成克明峻德以至協和萬邦人道以建九官十二牧所掌禮樂刑政養民之道後世建官繁簡雖不同要不出乎此當時君臣都俞吁咈更相告戒用圖治功氣象藹然何後世之不能及講臣對曰明良相逄故治化之盛如此上又曰天生聖人爲後世法孔子刪書斷自唐虞使人知有堯舜所謂萬世帝王之師也三年冬十月庚寅進講春秋上曰聖人匡世之功憂世之心備見此書當時先王禮樂法度日以隳廢亂臣賊子接迹而起有此書而後天下知尊周九年十二月御文華殿出御書洪範篇及御製序文示楊士竒等且曰朕在宫中雖寒暑不廢書冊士竒曰帝王勤學問則宗社生民有賴矣惟願始終此心英宗正統元年始開經筵先是宣德以前諸帝每視朝畢無日不御文華殿或便殿召大臣及儒臣講讀時經筵未開也至是年二月從大學士楊士竒之請始開經筵命太師英國公張輔知經筵事少傅楊士竒楊榮同知經筵事少詹王直李時勉等兼經筵官賜宴及金帛有差成化中司經局洗馬楊守陳進講武成篇云魯論稱舜無爲而治周書稱武王垂拱而成然後世人主有深居禁中委政内侍者乃召望夷之禍有高居無爲肆情嬖艶者乃啟禄山之變是何也蓋舜之所以無爲者由其封山濬川以至舉相去凶無一不盡其道武之所以垂拱者由其列爵分土以至崇德報功無一不究其心皆由憂勞而有爲乃能逸樂而無爲也若後世之主則孟子所謂安危而樂亡者古今治亂可爲永鑒上聞之竦然𢎞治元年三月吏部侍郎楊守陳請遵祖宗舊制開大小經筵以講學常御早午二朝以聽政其大經筵及早朝卽如舊儀若小講則必擇端介博雅之儒臣侍班進講凡所未明曲加解喻而於義理政事興亡治亂必一一講之精而無疑乃可行之篤而無懈凡經史及祖宗典訓百官題奏皆聚之文華後殿日輪内閣大臣一人講官二人居前殿右廂或有竒奥卽令解對陛下必御文華殿之時多處乾清宫之時少使欲寡而心清惑少而理明則其得於内者深而出治之本立矣上嘉納之是年四月南兵部主事婁性請遵太祖皇帝用翰林學士宋濂等及太宗皇帝用學士胡廣等故事并成化初年經筵日講事例命内閣大臣妙選詹事翰林儒臣及行取守制養病侍講謝鐸編修張元禎檢討陳獻章等各厚其禮遇輪直召對其文武大臣學行超卓者亦時賜顧問并擇老成清謹内臣給事左右使邪佞無得而間則聰明日廣德業日隆從之𢎞治元年御文華殿講書畢賜講臣各織金緋衣金帶及紗帽烏鞾叩頭謝訖上曰先生辛苦咸對曰此職分當爲皆頓首而退程敏政有詩記之曰日映罘罳曉殿深湛恩稠疊駕親臨袞衣紅耀天機錦束帶黃分内帑金久幸清班容宦履老慚華髮㸃朝簪經生職分尋常事消得君王念苦辛學士王鏊直經筵講文王不敢盤于遊畋章上傾聽嘉納之時方春屢遊後苑左右或請止不聽及聽鏊講畢召佞幸李廣戒之曰今日講官所講殆爲汝軰好爲之竟罷遊無何廣亦罷尋誅死張元禎入侍經筵以其身短上特爲低几就聽之上疏勸經筵講太極圖以及西銘孝宗嘉納急索太極圖以觀曰天生斯人以開朕也學士劉機經筵進講責難於君謂之恭二句孝宗注聽久之俯賜清問因辨析陳字之義劉倉卒進講語不逹意上謂之曰此卽敷陳王道之陳也羣臣叩首謝又謂何以不講末句答以不敢上又曰何害善者可感善心惡者可懲逸志自今不必忌諱嘉靖二年御文華殿召講臣至首揭書經君子所其無逸章繼而講康誥惟民康乂章召誥顧畏民碞章孟子踐形章理義悅心章被袗衣鼓琴章君子反經章是日上御黼座橫經俯詢虛心聽納講官劉龍進孟子至誠章上批曰龍于至誠能動乃云邇者黃河清是至誠之騐也未免近諛但其末云謙以履盈約以保泰此二句却好又講官倫以訓進論語陽膚爲士師講義上批云以訓講哀矜勿喜云是慈悲憐憫夫慈悲二字是釋氏之教也講官魏校進書經罪疑惟輕章講說上批云桂蕚薦校善講義朕觀其講章並未有過人者且其前後率多諛詞難居近侍著吏部調南京用之講官廖道南進講論語高宗諒隂以下三句又明日進講大學衍義時汪鋐爲吏部尚書懇祈大學士張孚敬改題以其有君薨聽於冡宰句也道南執不肯孚敬遂具揭帖以進世宗批云覽卿等奏朕已悉舊日講官徐縉講孟敬子徹去二節人之將死不講夫死生人道之常何諱之有如卿等言則忠讜之論何由得聞還著道南照舊進講明日道南講畢進說云按說命夢帝賚予良弼其代予言又云其惟不言言乃雍卽是以觀古之人君心純乎孝故宅憂而不暇於有言古之人臣心純乎忠故攝政而不嫌於代言然必有高宗之聖而後可以用傅說之賢必有傅說之賢而後可以輔高宗之德不然則莽操懿温之流又將以冡宰藉口于千萬世矣孚敬聞之出謂鋐曰講官欲中傷之侍講汪佃進講洪範九疇不稱㫖令吏部改調外任因命内閣選擇翰林諸臣稱職者留用不稱者量除他官尋調汪佃寧國府通判而中允劉棟楊維聰等侍講崔桐等皆補外經筵講官及執事官失儀舊制許令出班請罪得面宥嘉靖六年以經筵乃講學親賢之地一切差誤令侍儀科道退而具奏上請免其自請嘉靖時祭酒陸深爲講官言講官講章不宜輔臣改竄使得自盡其愚因以觀學術邪正熹廟初李康先爲講官亦言講官講章宜徑逹御覽閣臣不必改易萬歴元年五月定春講以二月十二日起至五月初二日止秋講以八月十二日起十月初二日止不必題請萬歴初御經筵畢覽貞觀政要曰唐太宗多有慚德魏徴大節有虧命以後講禮記其貞觀政要停講萬歴元年正月初七日出御文華講讀舊例節假二十一日始開上假内御講帷勤于問學前此未有是月即允閣臣所請開經筵神宗因張居正進帝鑑圖說至宋仁宗不喜珠飾事上曰國之所寶在于賢臣珠玉之類寶之何益又至秦始皇銷兵事上曰木棍豈不能傷人何以銷兵爲二年二月神宗御文華殿講讀手書學二帝三王治天下大經大法十二字懸之文華殿中又諭輔臣張居正曰朕欲賜先生等及九卿掌印并日講官各大書一幅以寓期勉之意先生可於二十五日來看朕寫是日大書宅揆保衡同心夾輔各一幅正已率屬九幅陳善責難六幅敬畏二幅分賜各臣是年十二月講讀畢問張居正元夕鰲山烟火祖制乎對曰非也成化間以奉母后當時諌者不獨言官即如翰林亦有三四人上疏糜費無益所當節省上曰然明年元夕罷烟火鰲山三年神宗日講至漢强項令董宣事謂輔臣曰彼公主也尚不能私庇一奴外戚家何可不守法三年日講畢上命中使捧皇太后御書示輔臣言聖母在宫中唯觀書史課宫人俱讀書寫字張居正曰此聖母愛不忘勞端身教也因勸上勉力問學上曰先生言是朕當勉之泰昌元年十月二十日經筵以是日頒郭王兩太后諡諭改二十一日講官孫承宗講克明峻德以親九族一段臨登講筵時念上方有宫幃之隙因就親睦九族處重發一番其語云帝堯德爲聖人尊爲天子第一要緊事便重九族决不敢自恃説自家是至尊便輕踈一家骨肉所以要親愛既親愛之便處置一家各得其所所以一家骨肉相親相睦無有怨心又曰九族是自己一身爲一族上有高曾祖父是四族下有子孫曾元是四族共爲九族如上内有宫眷戚畹外有宗族親藩以親是同其好惡同其富貴即先朝所遺眷屬務要仁至義盡無使恣縱無使怨恫等語上退至九五齋謂内璫孫講官的話竟是本章又曰今日纔知九族甚稱善熹廟初御講筵内閣戒講官講章宜簡要講畢勿多獻替孫承宗曰主上幼冲正宜詳明切直博引曲譬若講官聽中堂爲芟改中堂又視中官爲忌諱則講筵爲無人矣講官李光元亦以講章不宜芟改上書爭之於是勿改承宗謂内侍王安及高時明以上御講筵恭黙無一問難當如常朝奏事例有口答上問某句講官通俗細解再問講官又細解俾上漸通曉機務與臣下日親日熟入而後說之此啟沃之要也時明曰非復午講不可安曰甚善當請修九五齋時明曰孫公欲致君堯舜須有茅茨土堦遺意何必脩齋而後講乎崇禎元年文華殿議政諭朕自御極以來夙夜焦勞惟兹封疆民瘼圖維在念而邊備積弛閭閻久困臣工習俗相沿尚牽情面之故套政事奉行不實徒誇紙上之空言故屢召平臺時厪啇確期振惰窳之弊一新明作之猷第召見以時則情意未洽咨詢有間或叅酌未詳朕欲與大小臣工日相晉接共籌庶務而諸司各有職掌辦理各有公署宣召頻煩恐滋躭閣惟是輔臣職任股肱誼協心膂票擬挈封疆之要領獻納關庻政之權輿呼吸聯通斯爲最切今後除盛暑祁寒之外朕當時御文華一切章奏與輔臣面加叅詳分别可否務求至當爾大小臣工各宜精白乃衷靖共爾位有官守者恪修職業毋飾虛文而隳實事有言責者殫竭悃誠毋昧自心而恣勦說其事關奏對論宜剖晰者仍不時單宣面垂詢察核舉廢以程勤惰按是非以辨貞邪奉公有特簡狥私有顯罪一洗欺玩頺靡之習共收奮庸熙績之功爾等欽哉故諭崇禎十五年八月經筵勅諭朕惟帝王圖治必以務學爲先葢敬怠總握於君心而法戒備彰於古訓講學勤政相須尚矣我祖宗神聖御天率隆斯軌朕用遜志罔敢荒寧爰自元年講筵肇舉於今十有五載方以明透經義實禆治理爲儒臣朂乃至宥密之地彌資啟沃之功兹特命太傅成國公朱純臣少傅兼太子太傅吏部尚書建極殿大學士周延儒知經筵事禮部尚書兼文淵閣大學士陳演禮部尚書兼東閣大學士黃景昉蔣德璟吳甡同知經筵事禮部尚書兼翰林學士林欲楫等充經筵講官於戲終始典於學克建赫濯之猷緝熙單厥心爰迓昄章之福自古帝王之學問非徒文字之敷陳其道在知人安民其本在正心誠意脈絡雖遠綱領可尋朕毎寤寐五三表章六子間沿今以遡古而實效尚稽即因理以求心而精義未晰卿等學在經世志矢格君尚其深研危微明陳標本以及人才國是吏治民生一切安内攘外之圖務求制勝保邦之要各殫忠藎勿騁繁華俾嘉言得見諸施行而上理可追於隆古予一人實嘉賴焉欽哉故諭崇禎帝以丁卯八月御極是年十月即先開日講十月初二日御文華殿講大學一章尚書堯典一章帝鑑圖説一章帝退御便殿以御書示閣臣諸臣皆贊美帝曰書有不如法處卿等當爲改正輔臣叩首謝按故事日講官一員直講一員直讀直讀者先讀五過上隨口讀已方直講者進講是日傳免進讀越三日復傳免講帝鑑圖說講祖訓通鑑二書丁卯十月十二日上御講筵畢召輔臣黄立極等入便殿出督師尚書王之臣疏示之諭曰朕覽王之臣疏自稱贅員又曰虛拘顯因内臣在彼牽制不便行事朕欲將各邊内鎭盡行撤回一切兵馬錢糧著交割各督撫鎭道衙門封疆事重王之臣須一力擔當卿可擬勅諭來看崇禎元年戊辰二月癸丑上初御經筵以英國公張維賢大學士施鳳來充知經筵官大學士張瑞圖等充同知經筵官侍讀學士温體仁等十六員充講讀官編修倪嘉善等八員充展書官講堯典大學各一章賜各官筵宴銀幣鈔錠有差戊寅春經筵講官王鐸講聰明睿知一章分疏敬信悅字反語太多言時事又有白骨如林等語講畢上怒謂其敷衍數語支吾了事全不能發揮精義王出案前待罪良久上命起來又忘謝恩其次講尚書者乃黃錦聲細而哀無一字可辨上不懌而退辛未羅喻義送講章於閣臣温體仁令改不肯遂至疏叅言舊例惟經筵進規多於正講日講則正講多進規少今喻義以日講而用經筵之例駁改不聽自媿不能表率後進等語乃下部議處部議云聖聰天縱而喻義嘵嘵多言遂以閒住處之講章原無定例體仁特借以除異已而部覆又嗤其詭隨於是喻義自上一疏云先是講官諸臣以聖學淵深經生常語懼不得當特於正文外頗及世務適臣派講尚書惟我商王布昭聖武一章謂可以闡愚忠矣於是焚香鍵户或臥或興遍及京營之練大閱之禮然不敢臆說悉本先臣讜言明聖成憲嘔心劌肝冀少禆益而爲尺幅所窘僅若干言至本月十七日携至直廬示同事而後脫藁至鄭重也亭午輟直臣與同官會食西閣下俄而閣役呼召臣至閣門久之未得見門吏言過午則講章不便進呈臣不得已稍進求面請教而又不得見但趣臣削去後半段文字夫成之數日改之片時勢亦安能往復甚苦臣謂臣官可去藁不可削遂不得已趨出也噫臣于此日亦大難矣削之則寥寥數語無以對揚吾君不削則嘵嘵執爭何以勉承人意人之言曰爲臣不易乃今知之然總微臣愚昧之過也今講章見在御前伏乞皇上罷斥臣身以明臣過并賜省覽臣言以明臣心臣孤立無黨度無全理願歸身皇上以憑進止臣雖去有餘榮矣日講一章惟我商王布昭聖武代虐以寛兆民允懷伊尹又說有夏敷虐萬方誰能仗天下之大義爲兆民除害者當時無其人也惟我商王成湯奮義理之勇興師正罪敷著其武德於天下敵方以虐我獨以寛除去一切與之更始如相代矣於是兆民之衆皆信懷我商王之德知其志在於救民也湯之得天下者以此臣謹按制治以文戡亂以武易稱神武而書稱聖武聖者生知之目成湯智勇天錫猶曰此聖於武者也考湯征不專是伐夏書序言湯伐夏升自陑戰于鳴條夏師敗績遂伐三朡韋顧昆吾同時殄滅東征西討武功暢焉布昭猶曰次第布之云爾然亦得伊尹以爲之將故所向有功其詩曰實惟阿衡左右商王此之謂也恭惟我皇上神聖性成大寶初登手剪兇逆淵謀秘䇿動合兵機可謂聖于武矣而近日戰功猶未大暢無亦左右之者未得其人歟夫伊尹大聖世不恒有即如唐史稱高崇文練卒五千常如冦至奉命討西川卯時受詔辰時即行今大凌之援經月不能出師何哉臣謂欲振武功則團操不可不講也先臣許國嘗著論曰昔高皇帝提劍滁陽混一天下乃營中軍左右掖左右哨曰五軍營文皇帝以驍騎三千入靖内難因而營之曰三千營後征南交得飛鎗流矢因而營之曰神機營此三大營之所自起也承平既久營兵漸墮乃始抽其精銳而以四營分隸三營共十二營此十二營之所自起也但其名雖十二而實統於三統之者所以握其重而分之者所以致其精兵精而勢益重矣許之此論葢善夫團營也先臣楊一清亦言京營將領宜依𢎞治間劉大夏議凡邊將曾經戰陣偶坐事閒居者悉取至京付蒐選教練之任於是周尚文等諸名將比出矣今不可倣而行乎然欲講團操則大閱不可不舉也昔高皇帝有雞籠山之閱文皇帝有鳴鑾戍之閱章皇帝有兎兒山之閱睿皇帝有西苑之閲莊皇帝有大教場之閲成憲具在不可倣而行乎兹事最關戎務乘此人心廢弛之後大駕親臨旌旗生色可以選將可以簡兵惟是舉事須有微權臣請先下其令而大展其期俟戎政操練已成然後奏請舉行一以紓經費於目前一以需成功於歲月從此張皇六師爰整一怒内安諸夏外制四方雖仰同殷武可也庚辰八月十二日當開經筵而初四日廷杖詞臣黃道周初十日又杖救道周者户部主事葉廷秀上意弗懌改期二十二日又係憲宗熹宗忌辰鴻臚請用青錦繡上改二十三日壬午九月二十五日諭禮部經筵大典禮宜嚴肅以後定于辰時行供事各官照日講例著文書官預傳站班不得參差遲悞該部即行傳飭特諭壬午八月二十二日上御文華殿日講故事經筵有二案一在御前一在講官前俱有講章而日講則止一御案第以經書置案上講官指書口講無講章也講官韓四維屢次遺忘帝以矜凛寛之先數日帝諭輔臣日講可照經筵例亦置講章朕有所疑可據以問難而講官亦不至遺忘因具揭帖進呈即批發令傳與講官知是日遂用講章在御前講官用牙簽指講壬午九月十八日上日講講官講論語子罕言一節書旅獒春秋大水孟子北宫黝節畢帝召輔臣前問夫子論仁如欲立欲逹克已復禮天下歸仁及出門使民等語言仁儘多何云罕言輔臣延儒對此即性與天道不可得聞之意德璟對聖人未嘗不言仁只門弟子悟者以爲言不悟者以爲罕言耳又問命與仁如何分别德璟對總是一理在天爲命在心爲仁帝首肯又問一日克復天下歸仁便是脩已以安百姓意思輔臣極贊以爲聖見明徹吳甡言帝王學問總只是明德新民德璟言明明德於天下便是天下歸仁頃之帝曰近來雨𤾉時若秋令甚佳輔臣因及起廢事公薦葉廷秀成勇最有清望上頷之次日手諭昨先生等論仁諸說深當朕心著即撰寫進呈以便觀覽壬午八月二十四日日講詹事邱瑜講師摯之始章帝問咸英韶濩瑜對是四代樂名上曰子在齊聞韶樂瑜對即此韶樂上復問關雎之亂亂字瑜對是樂之卒章上曰當時夫子聞韶三月不知肉味是何等氣象因顧輔臣前諭禮部舉知樂之人曽有之否對未有上曰古樂亦尚可復輔臣蔣德璟因薦黃道周知樂文震孟在講筵端恪能致人主之聽一日上偶加足於膝文講時誦講章中語拱手曰爲人君者可不敬哉又重申之曰爲人君者可不敬哉上竦然爲之下足端聽倪元璐以大司農充講官講生財有大道一節極言加派聚歛之害上震怒謂邊餉匱乏部中未見有長䇿徒作此皮面語倪徐曰臣儒者所陳雖是本頭書生語然不敢懷利以事君上黙然次日謂閣臣曰講筵有問難而無詰責昨日之言朕甚悔之張居正進日講儀注一毎日講讀大學尚書先讀大學十遍次讀尚書十遍講官各隨進講畢即退一講讀畢皇上進暖閣少憇司禮監將各衙門章奏進上御覽臣等退在西廂房伺候皇上若有所諮問乞即召臣等至御前將本中事情一一明白敷奏庶皇上睿明日開國家政務久之自然練熟一覽本後臣等率領正字官恭侍皇上進字畢若皇上欲再進暖閣少憇臣等仍退至西廂房伺候若皇上不進暖閣臣等即率講官再進午講一近午初時進講通鑑節要講官務將前代興亡事實直解明白講畢各退皇上還宫一毎日各官講讀畢或聖心於書義有疑乞即問臣等再用俗說講解務求明白一毎月三六九視朝之日暫免講讀仍望皇上於宫中有暇將講讀過經書從容温習或看字體法帖隨意寫字一幅不拘多寡工夫不致間斷一毎日定以日出時請皇上早膳畢出御講讀午膳畢還宫一查得先朝事例非遇大寒大暑不輟講讀本日若遇風雨傳㫖暫免文華殿初舉經筵謝表知經筵事太師英國公臣輔同知經筵事少傅兵部尚書兼華葢殿大學士臣士奇少𫝊工部尚書兼謹身殿大學士臣榮禮部尚書兼翰林院學士臣溥兼經筵官詹事府少詹事兼翰林院侍讀學士臣直少詹事兼翰林院侍講學士臣英翰林院侍讀學士臣時勉臣習禮侍講學士臣循侍讀臣衷侍講臣穀脩撰臣愉臣鼐等兹者恭遇經筵肇啓聖學維新講讀侍臣咸膺恩澤謹奉表稱謝者臣輔等誠懽誠忭稽首頓首上言伏以天清地寧昭聖皇之統御時康道泰美文治之隆興日月光華中外忭悅恭惟皇帝陛下聰明睿智廣大寛仁尊尊親親崇兩宫之至養推恩布德得四海之懽心是以三光全而寒暑平五穀熟而人民育益勤稽古之學益𢎞養正之功謂易書詩禮春秋之文皆堯舜禹湯文武之道萬幾有暇恒親御以經筵多聞是求肆詳延於儒雅用資啓沃用致進修上以承帝王心法之傳下以錫臣民皇極之福光祖宗之洪業擴海宇之隆平臣輔等猥以庸才咸叨榮命荷絲綸之飭勵繼宴錫之駢蕃於緝熙單厥心允恊周成之德念終始典于學敬陳商說之篇神宗遺事萬歴二年四月面諭輔臣作對聯先擬三字對云天地泰對曰日月明張居正賀云永樂十一年端午宣宗隨成祖北京射柳連發三矢皆中又出對云萬方玉帛風雲㑹即對云一統山河日月明成祖大喜賜名馬紵絲等物時宣宗年十五也上所對適與符合萬歴九年御文華出宣廟元兎圖示輔臣講官令各賦詩親書於軸仍自用印記又出永樂四駿圖以賜輔臣四駿者文皇用兵所乘也輔臣爲題詠奏之上悅賜金已又出永樂騶虞手卷賜輔臣藏之閣中此乃小卷仍有一卷長數丈鋪於文華殿僅乃竟卷于文定愼行云經筵進講在文華前殿日講在殿後穿廊正字在後殿東閣設一幄次又東一室乃上所遊息一日同二三講臣入視見窻下一几几上設少許書籍又一二玉盆盆中養寸許小金魚乃上所玩弄也西壁一几几上筆硯無甚珍異筆皆市中所買上貼筆匠楊彦章名紙皆折簡一如士人所用其樸如此于文定愼行曰甲戍四月賜輔臣張居正宅揆保衡四字吕調陽同心夾輔四字六卿正已率屬各一講臣六人責難陳善各一時愼行尚未與講六人者學士丁士美宫坊何雒文陳經邦許國學士申時行及翰撰王家屏也丙子侍讀張位及愼行補講幄上顧相臣曰新講官二人尚未賜與大字相臣曰惟上乘暇揮灑一日内使濡墨以俟上遂大書二幅賜位及臣愼行字畫比賜諸公大而老成莊勁又若勝前歲者葢御齡已十五矣一日謂居正曰朕欲爲先生書太岳二字居正頓首曰老臣不敢乃巳春明夢餘錄卷九
