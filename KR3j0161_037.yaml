body:
  text: 春明夢餘録卷三十七吏部左侍郎孫承澤撰户部三倉場總督倉場公署在城之東裱褙胡同設於正統三年糧儲抵通分貯京通二處在京者曰舊大倉曰百萬倉曰南新倉曰北新倉曰海運倉曰祿米倉曰新大倉曰廣備庫倉在通州者曰大運西倉大運南倉大運中倉大運東倉户部侍郎或尚書總督之其公署在舊大倉內銀庫在總督公署之左中為銀窖老庫元時有京畿都漕運使司所管倉有萬斯南倉萬斯北倉千斯倉相因倉豐潤倉通濟倉廣貯倉永平倉永濟倉維億倉盈衍倉大積倉豐實倉廣衍倉順濟倉今之倉多其地也漕額漕糧嵗入四百萬石內兑運三百三十萬石改兑七十萬石除舊例折糧三十六萬一百八十八石七升八合又除上薊密昌鎮天津倉糧四十五萬四千九百四十七石三斗實上京通倉三百一十八萬四千八百三石九斗九升二合倉支下糧㕔約放二百一十萬六千石外四月十月共折三十四萬石通倉約放七十七萬二千石外四月十月共折二萬石輕賫銀共四十二萬七千七百二十八兩六錢七分零金仁山曰有殼曰粟無殼曰米粟即榖也古人米與榖兼積米切用而易腐榖氣全而可久緩急兼儲後世軍儲獨以米故久即不可食漕河京師百司庶府衛士編氓仰哺於漕糧永樂初運道一由海達直沽一由淮入河逾陽武入於衛由衛入白河抵通州運兼水陸為勞費艱永樂五年户部㑹官言北京合用糧餉盡河北稅糧籽粒并河所漕粟不足供需海運乃濟而運船少嵗運不過五六十萬石且未設漕官督理事權不一請於蘇州太倉設海道都運使其中擇文武中公廉勤幹者以充銜視布政使轄衛所諸海運船并出海官軍時檢理如法太宗重其事下部詳覆而濟寧州同知潘叔正言元自須城縣安山西南行由夀張東北至東昌又西北抵臨清三百八十五里引汶絶濟屬之衛即今御河也建閘三十有一以時蓄泄名㑹通河時河初開岸狹水淺不能負重載嵗不過運十萬石故終元之世倚海運為重洪武中㑹通河故道猶存逮河决原武漫安山湖而南而㑹通之迹始湮今海險陸費而㑹通河故道淤者三之一宜可濬以漕漕成而南北之運通則無窮利也於是天子命工部尚書宋禮刑部侍郎金純都督周長董其事發山東六郡丁夫十有六萬五千役二十旬蠲租百千萬石濬之而御史許堪言古海豐故河漕汶以運道猶存宜可疏屬之衛而老人白英畫以為元遵汶入洸出濟寧而陽榖汶上東平之間地髙墟數丈南旺之間水淺涸膠舟舟不任重載固其理也今築壩於東平州之戴村抑汶水無東流令盡入南旺湖南旺者運河之脊也得全汶而湖深廣宜可漕於是疏衛河達海豐古河而築壩抑汶水入南旺至南旺而中分十之四南流以屬徐分十之六北流達臨清相地勢髙下增築閘以啓閉蓄泄自分水至臨清地降九十尺為閘十有七而達於漳御自分水至沽頭地降百十有六尺為閘二十一而達於河淮設清衛河工提舉司其中創造運船五百艘已運至三千艘以轉輸平底倉闊受載不深於度淺易脫得水僅六拏而足六拏者三尺也於是㑹通既道淮浦底績而南北之運始通初平江伯陳瑄督海運㑹通河既浚海運罷不用命瑄理漕河事瑄疏清江浦引水由管家湖入鴨陳口達淮避河淮風濤之險浚瓜洲儀真二壩祛潮港之湮鑿徐吕二洪之巨石平水怒行沛縣昭陽濟寧南旺髙郵甓社諸湖築長堤以蓄巨瀦開泰州白塔河以通大江鑿髙郵渠四十里以便舟楫自淮抵臨清增閘四十七以便蓄泄自淮至通州濵河置廬舍五百六十八所居卒以治淺緣河堤種樹鑿井以待暍者置倉於淮安徐州臨清州通州以便轉輸諸四千里數十年漕河事宜皆瑄所經綜周慮而力圖之至今是賴漕運明初尚用海運洪武三十年海運糧七十萬石於遼東永樂六年海運糧六十五萬一千二百二十石於北京十二年接運海運糧四十一萬四千八百一十石於通州自是而後始專用㑹通河儹運其㑹通河之運凡三變一曰支運一曰兑運一曰長運永樂初令直𨽻蘇松常浙江杭嘉湖等府嵗糧原坐太倉海運之數送淮安常盈倉交收鎮江廬鳯淮揚糧送徐州廣德倉交收徐州并山東兖州等府糧送濟寧倉交收令裡河船於㑹通河以三千隻支淮安倉糧運至濟寧以二千隻支濟寧倉糧運至通州每嵗四次其天津並通州等衛各撥官軍接運通州糧至京倉所謂支運也永樂末巡撫侍郎周忱㑹同平江伯陳瑄議令民運淮安瓜洲補給腳價給搬淺費給耗給蘆席費兑與軍而直𨽻各省軍各於淮瓜領兑所謂兑運也成化七年復用都御史滕昭言罷瓜淮兑運令江南江北官軍雇江船於江南水次交兑民加江耗視逺近為差而淮徐臨德四倉支運糧七十萬石皆各就水次兑之所謂改兑運為長運也總漕舊制自瓜儀以至通州河道皆屬漕撫設郎中二員南北專理之其諸洪閘各有主事一員專司之漕運都御史敕諭則各有自通州至揚州一帶水利有當蓄泄者嚴督該管官司并巡河御史管河管洪郎中等官設法疏築以便糧運怠職誤事者一體參奏凡有便於糧運利於軍民悉聽爾便宜處置之命河漕事原歸一其後偶遇黃河潰決則專敕大臣一員往治竣事還京不常設後連有水患遂以為定員其職專管黃河於曹州駐劄河南山東管河副使則屬之管河郎中洪閘主事不相屬也故總河敕云今特命爾前去總理河道其黃河北岸長隄并各該隄岸應修築者亦要著實用工修築髙厚以為先事預防之計如各該地方遇有水患即便相度防究水源可以開通分殺并可築塞隄防處所仍嚴督各該管官員斟酌事勢緩急定限工程分投用工作急修理凡修河事宜敕內該載未盡者俱聽爾便宜處置事體重大者奏請定奪此原敕也後增入云近年沛縣迤北漕河屢被黃河衝決已經差官整理今特命爾前去總理河道督率管河管洪管泉管閘郎中主事及各該三司軍衛有司掌印管河兵備等官時常往來親歷多方經畫遇有淤塞去處務要挑濬深廣蓋此敕亦為黃河衝塞漕河故有是命其實專為黃河也先年總漕都御史每嵗押糧運進京㑹議往回查看河道其後私托巡按御史奏留自嘉靖元年都御史俞諫後更不赴京矣至嘉靖二十年二洪淺阻糧運不通總漕乃具疏盡推之河道奉旨切責自管河都御史而下俱戴罪料理自此總河總漕分而為二竟以漕為米不知為河矣而且彼此水火漕法始亂故張江陵當國竟裁總河李世達别用而專用吳桂芳兼理河漕俱治後有營求總河者託言官條陳復設相沿不改漕總按吕梁洪志天下漕船十總每年過洪船一萬二千一百四十三隻其一則南京總曰旗手衛羽林左衛金吾前衛府軍左衛瀋陽衛應天衛以及興武衛共十三衛其二則中都留守總曰鳳陽衛懷逺衛留守中衛長淮衛以及潁上所共十二衛其三則南京總曰留守左衛虎賁右衛錦衣衛鷹揚衛以及虎賁左衛共十九衛其四則浙江總曰杭州前衛紹興衛寧波衛處州衛台州衛以及寧海所共十三衛其五則江北直𨽻總曰淮安衛大河衛徐州衛以及歸德衛共八衛其六則江南直𨽻總曰鎮江蘇州太倉鎮海等十一衛其七則江北直𨽻總曰揚州通州泰州鹽城髙郵等十衛其八則江西總曰南昌袁州贑州安福等十二衛其九則湖廣總曰武昌嶽州黃州蘄州荆州等十二衛其十則遮洋總曰水軍龍江廣洋等十三衛後行泇河過淮不過洪則有十三總而事體亦多更置矣漕軍軍旗十二萬一千七百一十一名每一船十人一人運正米三十七石分倉收貯共封識之中推一老成者綱領之謂之綱司次綱司者又有攔頭扶柁二人相協持之旗甲則管領之凡出納必同悉於綱司籍記之餘則共利少則共償其贏縮利害亦同也以故交兑無虛㑹之弊沿途無盜賣之失而運於是乎興矣今也兑納皆旗甲一人衆則惟任撑駕利害毫不相關甚至一船皆雇倩無藉之夫以數百石之米付之一人此運之所以敝也是何也各處月糧不給軍日貧乏故也雖有殷實在伍百法避之而領運之官營營自私此運法日敝而不可復也漕船漕船初造於清江提舉部給料舊船三新船七景泰天順間計船一萬一千七百七十五艘又産木處每隔嵗輒令有司自行派造其後止解物料焉又其後料解漸縮而各省所採木在川廣者亦以漂泊罕至至者復為監收官留難於是有解價之議而厰料愈不繼船遂以無當成化中令船薄漂流者罪及提舉然終不得堅固其後停止解價取木價於荆杭抽分二厰而已而軍士復有私辦之額其合領船料工部又不以時給給之止於舊三謂運軍操舟見為受成謾不慎護則所謂新七者量足其四以三屬之運軍以難之嚮者軍士私辦遂為公額矣𢎞治中以軍士困參酌而益之以銀軍皆喜船議為之一振正德而後六七年間船多料少大約不及期而壞又材木半出貰貸之錢展轉相續而下自旗卒運辨以至主造之官無不盤據其中蓋料愈多而船愈無當至隆慶末年船漂流益甚科臣往勘還報曰船薄而小併糧太重漕臣過也漕撫王宗沐奏運船市木嵗責商人商人豈不利佳木哉一經南都則拔其尤者為黃馬船料矣下瓜儀則市其佳者於民間造作矣至其中空不堪者始萃於清江清江厰所委指揮等官出於營求而又甲乙相承莫可究詰夫以不堪之料付之營求之人而乘以不可究詰之勢運船之弊橫潰四出不亦宜耶謂自今厰署毋注選聽工部擇司官練達清謹者任之三年而代指揮等官悉罷委别於淮安衛山陽縣附注經歷縣丞四員俾專成造亦三年核其功罪而代又請嵗解銀湖廣布政司責成糧儲道必市美木皆親造揀選庶幾乎船勝漕也詔曰可漕倉京倉為天子之內倉通倉為天子之外倉徐淮臨德倉置外所以備凶旱以防不虞也徐州之倉曰永福廣運淮安之倉曰常盈臨清之倉曰廣積常盈德州之倉曰常盈臨清倉自洪武間建謂夫南北間一都㑹也永樂初莭級寄倉為轉搬後因直達京師徐淮臨德分貯之其初則建倉厫黃衛之湄受淮倉米轉之直沽直沽又海舟所停泊處也其年即直沽設天津衛置倉三年增置露囤千四百所於是淮倉自衛河太倉自海咸輸天津倉而山東輸德州倉天津德州二倉所受又總輸之通州由通州輸之京此轉搬法也五年增設通州左衛置左衛倉八年修北京驍騎等衛倉十三年漕河成益置倉水次受民納令官軍莭級支運仍移德之廣積倉於臨清移原坐太倉海運糧於淮安府淮以北曰徐州倉徐以北曰濟寧倉絡繹臨德以抵通京十六年復益通州衛通濟倉嵗凡三運其達京倉者二儲通倉者一宣德四年益增修京通淮徐等倉益拓臨清倉度可容三百萬石正統元年定所增通州大運曰中倉曰東倉曰南倉曰西倉時嵗運米五百萬京十之四通十之六其年復增造三百萬石倉於大運西倉之側是時國家承仁宣之積重以兑運方盛嵗額日益廣倉在在贏溢四年增設府庫左右金吾前三衛倉天順四年即通州西倉之南草場置大運南倉五年復增通州大運倉百間而南倉設北東二門餘倉皆三門設守衛軍一人辦事官一人軍一人然由是設總督太監監督內官漸多事矣𢎞治中言者極言內官剝削之害請量裁罷之不聼至正德中冗食冒支益甚監督內官賄賂公行世宗盡罷革隆慶初巡倉御史蔣機言漕儲通倉者三百三十餘萬而京倉僅二百餘萬石根本之地出多入少非所以備緩急請無拘三七四六之例凡兑運者悉入京倉改兑者入通倉詔可之久之御史楊家相復言通倉誠多放一月則京倉省一月之給京倉多折銀一月則京糧餘一月之儲非必減通倉而後可實京倉也户部清除改兑盡入通倉以省腳價其兑運入京倉者仍於中撥六十萬石足通倉原額詔如議倉耗太倉總督㕔板刻則例一厫兑正糧一萬二千石每石耗米七升共計八百四十石約定四百八十石作正支銷餘准作耗數內缺五十石或一百石以至二百石以上經歷官攢甲斗級照依缺數多寡責治有差數外間有剩餘者則是多收之數不敢别作支銷莭年於倉中隙地掘窖埋之嘉靖十三年周侍郎叙初督倉場見餘米嵗埋數多心切惜之乃言於大司徒儉菴梁公材公曰此出耗米附餘四百四十石之外若欲具題作正支銷主收放者法應參究况起此附餘之端他日害大計矣寧復棄之不敢作俑也周乃貯之空厫以數作一手本報部公亦不受令總㕔自計乃知老臣固識體耳宣德年間京通二倉收受斛米一尖一平尖斛淋尖平斛行概後將淋尖斛外餘米俱要入官有虧旗甲成化元年參將袁佑奏要每石不分平尖明加一斗俱刮鐵收受户部題奉欽依只加耗五升成化二年又該户部題為收受糧斛事奉欽依准加八升今載入議單每石兑運加耗七升原為尖斛而增今於加耗之外復收斛面以為附餘則是耗外又加耗矣輕齎糧運輕賫所謂一六二六三六者即耗糧也江西湖廣浙江兑運正米一石加耗六斗六升又加尖米一斗共七斗六升以四斗隨船作耗餘三斗六升則折銀故謂之三六江南直𨽻兑運正米一石加耗尖米共六斗六升除四斗隨船作耗只二斗六升折銀故謂之二六江北直𨽻兑運正米一石加耗尖米共五斗六升除三斗隨船作耗亦即二斗六升折銀故謂之二六若山東河南兑運之耗并尖米只四斗一升除二斗五升隨船作耗餘一斗六升折銀故謂之一六蓋加耗隨地里逺近為差耳先是耗糧俱本色隨船候到灣雇車起糧則易銀為用後以灣中米價低昂不一而易賣又滯交納𢎞治十三年都御史張敷華都督郭宏方議折銀每石定價五錢可以輕賫就於交兑之時支領隨船此一六二六三六輕賫之名所由始也然只令完納兑運三百三十萬石而已餘耗本折皆歸旗卒官固無利之者是故旗卒富饒糧運於斯為盛成化七年改淮徐臨德四倉支運糧七十萬石於山東河南直𨽻四倉民運交納者亦令軍船就水次與民交兑運赴京通二倉上納即今之所謂改兑者其加耗數少止有隨船耗米俱無一六二六三六折耗輕賫就令於兑運輕賫銀內均貼腳價進倉等用若地方灾傷支運倉糧亦以兑運輕賫幫貼之亦即總完四百萬石而已此雖減耗穵貼比之只了兑運者數雖減少然用亦裕而軍無告困至正德六七年來京師權要始有官債虛立文約逼奪輕賫之弊時各總運官多出其門牽引為害蓋借公物以為私賄希求寵庇於是始有鞘封過淮赴漕運衙門呈驗重封仍委官至張家灣驗過發之蓋以革逼奪之弊而把總聶欽遂因夤緣驗封查算使用以羡餘獻之於官故又有扣除之例矣聶欽雖即以贓敗而後之相繼者則用意算扣嵗增其數咸務多獻以為功太倉庫所積羡餘至盈數十萬而官旗揭借賠償貽害不可勝言欽之倡始為可罪也夫一六二六三六輕賫乃耗糧也惟因地有逺近故耗有多寡非腳價也若腳價則一例矣灣中起糧使用則各總皆同又何必分一六二六三六之殊哉今以輕賫扣除於官是則正糧四百萬之外復收其耗糧也豈制法之意乎楊宏疏曰唐史裴耀卿為發運使凡三嵗運米七百萬斛省僦直錢三十萬緡或說耀卿獻之卿曰此公家贏縮之利耳奈何以市糴錢充公帑宋崇寧初蔡京為相始求羡財以供侈用用所親胡師文為發運使以糴本數百萬緡充貢為户部侍郎自是來者效尤時有進獻而轉搬無用矣矧輕賫原係耗米實非正納之數舍耀卿之至計用蔡京之弊政將來軍逃運缺勢所必至久之司計者竟不知其故以輕賫入有司之考成尤可怪也漕規漕之兑運各有水次凡水次江南于瓜淮已又于九江已又令淮瓜運軍過江就兑湖廣於長沙漢口已又於蘄州漢口城陵磯三處江西於吳城已又於進賢河南于小灘山東于濟寧已又令河南山東俱于臨清已又令河南仍小灘凡當兑米徴收以十月水次交兑以十二月踰十二月終次年正月糧與船至者三之一弗至者府州縣正官督糧官領運指揮千百户等官俱聽巡按御史逮問奪俸奪級以久近為次已復申定罰例較前率先一月督糧自糧道而下領運自把總而下後期者無次并罰之凡樣米解部山東直𨽻以三月為期江北直𨽻鳳陽等處以五月為期南京江西等處以六月為期浙江湖廣以七月為期違者繫其所在巡按究其官吏已令江北官軍兑本府州縣糧者過淮以十二月南京江南直𨽻官軍兑應天府等州縣糧者過淮以正月淮以北山東北直𨽻二總兑本糧及遮洋總兑河南山東糧者以正月及三月完報事皆屬之儹運凡米至京倉月旦為期五月一日北直𨽻河南山東衛所至七月一日南直𨽻鳳陽等衛所至八月一日南直𨽻過江支兑者至九月一日浙江湖廣各衛所至後者奪俸先者進秩皆有差已又令完期各前一月始四月終七月止又令更前一月及六月止凡漂流米二百石以內為小患二百石以外為大患小患報官大患以奏聞漂流損米罰治皆有分數然仍令之領運補完者復之不完者終身及子孫勿得復漂損糾劾及漕運撫總官聼上所處之凡軍有犯罰軍糧贖罪亦皆有差次無力者發戍極逺邊衛已復罰罷運苐令如數納米贖凡倉次給醫藥官若軍有故者歸其骸存恤之恤軍洪熙元年莭該欽奉敕諭官軍運糧逺道勤勞寒暑暴露晝夜不息既有盤淺之費糧米耗折所司又責其賠補朕甚憐之今後除運正糧外附載自已物件官司毋得阻當欽此正統三年户部復議運糧官軍人等合遵敕諭順帶土貨以為盤費不許沿河巡司官軍人等生事阻當成化二十一年都御史馬文升復奏申眀正德八年又該户部欽奉聖旨說與户部近年以來漕運軍士為因流賊生發阻截運道燒劫船隻好生困苦先年有奏准事例許令量帶土宜貨物以備修船剝淺等項支費你部裡還行與漕運衙門知道欽此欽遵仰惟朝廷優恤運軍之典至諄至切為臣下者正宜遵守奉行奈何近年所司罔肯體恤運船但帶柴菜竹木等物經過瓜儀抵京大小官司俱要攔阻搜盤求索虐害終不憫惻至於空船回還又假以盤鹽為由每處拘留三五日或十數日勒取報結不容放行雖醎菜魚腥之物亦皆搜去甚至有將官軍行李衣鞋公然挾制盜取不敢言喘如斯之害已非一日竊以鹽之得利惟在瓜儀如淮揚盤禁理固相應今德州臨清東昌濟寧處處搜盤况彼處地道蚤寒閘座又多每年回船凍阻獨滯于斯乞敕該部再將前例申眀重復行移沿河各該衙門今後運船所帶土貨等物令其隨便發賣以助貧軍剝淺守凍盤費之資不許違例阻當擾害若官軍乘機不將運船裝糧滿載客貨妨誤糧運者事發仍照例追究納鈔抽分其回空船隻果有夾帶私鹽聼淮揚官司依法搜查禁治施行海運按元人海運有三道初巴延建議自上海劉家港入海經揚州海門黃連沙頭萬里長灘開洋沿山㠗而行抵鹽城縣歷海州東海縣密州膠州放靈山洋投東北路多淺沙行月餘抵成山計水程至楊村馬頭一萬三千三百五十里至元二十九年朱清等陳便道自劉家港開洋至撑腳沙轉沙嘴至三沙洋子江過匾擔沙大洪又過萬里長灘血沙放大洋清水洋黑水洋至成山過劉島至之罘沙門二島放萊州大洋抵界河口其道差徑至正十三年千户殷眀略又開新道劉家港入海至崇明州三沙放洋向東行入黑水大洋取成山轉西至劉家島登州沙門島於萊州大洋入界河口舟行風信有時自浙西至京師不旬日比二道尤便洪武四年置遼東即發兵五萬戍遼命鎮海侯吳禎總舟師萬人由登萊轉運嵗以為常禎卒張赫繼之二十年封為航海侯巳未命督遼東海運嵗一行軍食賴之其後有朱夀者亦海運有功封舳艫侯嵗運七十萬石至永樂間㑹通河成始不復講隆慶五年山東巡撫梁夢龍勘報海道疏自古建都一切轉運莫不因形勝以制便宜恭惟我朝成祖定鼎燕京轉運大計一由河道一由海運至永樂十年以後平江伯陳瑄開清江浦尚書宋禮開㑹通河成始盡由河運然海船猶存遮洋海運未廢宋禮之議又曰雖由㑹通儧運每三年海運一次是當時未嘗絶意於海運也為慮逺矣𢎞治間大學士丘濬倡議請于無事時通海運故道與河漕並行一旦河漕少有滯塞此不來而彼來又謂海運之利以放洋而其險也亦以放洋今欲免放洋宜訪素知海道曲折者講求傍海通運之法歷淮揚青登等府以抵直沽濵海去處踏看萬一可行是亦良便是時河漕通利未見力行嗣是一遇滯塞大小臣工疏陳策試數百萬言皆以海運為請竟未力行正德迄嘉靖間河患益劇且頻每當穵濬築塞工程浩大刻期勒完晝夜併工公犒私貼計費不資上下窘急接連三省丁夫調發動踰十萬寒暑風雨暴露經年手足潰爛枕籍傳染疾病死亡殆不可計大衆數聚久勞怨生啓釁干和關係不細愛國之臣深以為憂我皇上撫臨華夏天覆海涵世躋隆平乃去嵗邳河陡塞一百餘里今嵗宿遷漂傷無算異常河變屢見迭出太倉空虛咽喉梗塞中外危之先蒙皇上採納忠猷簡差科臣胡檟㑹同臣等計處膠河期通海運以佐河漕之急社稷大計孰先於此時臣等勘得膠河雖屬難開而原題海道南自淮安至膠州北自天津至海倉各有商民船隻經行嵗久委堪行運及勘得中假自膠州至海倉一帶海道與南北一水相通亦有島人并商民船隻經行二十餘年堪以一體行運自淮安至天津總計二千三百餘里風便兩旬可達不便稍遲每嵗五月以前風順而柔較之六月以後更為便利臣等前後親詣登萊二府地方訪得沿海官民俱稱二十年前傍海潢道尚未之通今二十年來土人淮人以及島人做販魚蝦茶豆往來不絶其道遂通未見險阻羣情踴躍臣等猶恐事無的驗今兩試俱利兼恐人有遺議今衆見僉同臣等蚤夜思議竊以大海風波雖不可知然海面多潢猶陸地多岐海人行海猶陸人行陸傍海而行非橫海而渡海道險利兹可具推臣又與三司各官再三面審行海委官指揮王惟精千户韓禮陳璋緣事千户汪士𢎞納級官魯礦并水手等役數十餘人俱稱今次踰出海道傍海居多間有近洋洋中島嶼聨絡遇風可依岸上人烟舉目可見若船非乾朽行遵占候自無他虞較殷眀略踏出之道尤屬穩捷是即丘濬所稱傍海通運果為良便臣家於陸先年未至海上不能測識濬議今待罪海邦親勘博訪幾八閲月始歎服濬議乃神京逺計若畏風波則江河與海皆所不免今嵗宿遷河道漂傷衆多是也若重民命則大役死亡或更多也況嵗免濬築永無遷徙天津密邇通州不煩陸挽既不勞民傷財更擅形勝便宜濬之言曰家居海隅頗知海舟之便先年前後總漕大臣王恕曰髙郵湖大作波濤洶湧損壞船隻失落錢糧人命不可勝計邵寶曰陸之為勞不減行海之險陸釴曰汶水導引南接淮泗北通白衛自元人始然河渠淺澀故終元之世海運不廢永樂年間禮部㑹議曰黃河漕運未能周急必藉海運然後足用諸臣斯言當必有據今議海運誠為足採臣等愚見請及今日以河道為正運益加綜理以海道為備運兼為規復萬一河道未易疏通則運海可至畜艾對症臨急無患河道大工自可安心濬築如法以垂經久再照海防至重沿海衛所疲玩嵗久先年江南閩浙蘇松江北淮揚各沿海州縣數被倭患近來加意整飭自是寧謐山東海面東望朝鮮北接遼東西邇畿甸南控淮揚逺達浙閩真四海上游形勝之區沿海衛所疲玩更甚久無倭患識者有未然之憂今行海運兼飭海防是不但有禆於國計兼有禆於地方如是則咽喉無恐肘腋有備京師百萬人心自是安定萬年永利昭代全規我皇上繼述之善太平之烈光於千古矣行之數年極稱利便萬歷元年以龍鬭傷七艘户科賈三近請罷海運户部議如三近言總漕王宗沐疏古語天不滿西北地不滿東南故東南之海天下之水之委也渺茫無山則回避靡地近南水暖則蛟龍窟居是以風波足畏傳聞可駭昔元人海運之有驚壞以其起自太倉嘉定而北也若自淮安而東引東萊以泊天津則原名北海中多島嶼可以避風又其地髙而多石蛟龍有往來而無窟宅故登州有海市以石氣與水氣相摶映日而成石氣能達於水面以石去水近故也北海之淺是其眀驗即以舟與米行於登萊因其曠達以取其速而標記島嶼以避其患則名雖同於元人而利實專其便易佐河運之缺計無便於此者然此猶舉時宜之緒論而非臣條議之初圖若語其全則有稍進於是者其說有三一曰天下大勢二曰都燕專勢三曰目前急勢漢不逺引請以唐宋之事眀之唐人都秦右據岷涼而左通陜渭是有險可依而無水通利也有險則天寶興元乘其便無水則㑹昌大中受其貧宋人都汴梁背負大河而面接淮汴是有水通利而無險可依也有水則景德元祐享其全無險則宣和靖康受其病若國家都燕北有居庸巫閭以為城南通大海以為池金湯之固天造地設以拱衛神京聖子神孫萬年之全利也而乃使塞不通焉豈非太平之遺慮乎此臣所謂天下大勢也夫三門之險天下之所謂峻絶也然唐人裴耀卿劉晏輩百計為之經營者以彼都在關中故也粟不能飛則途有必由是三門者秦都之專路也若夫都燕則面受河與海矣一河自安山涉汶濟即今之㑹通河一河自淮入汴入衛而俱㑹於天津然終元之世未嘗事河而專於海者彼以國勢搶攘終嵗用兵固無暇於事河也彼又以為河亦間有不如海者入閘則兩舟難並是不可速也魚貫逆遡一舟壞則連觸數十舟同時俱糜若火則又甚焉是不可避也一夫大呼則萬櫓皆停此腰脊咽喉之譬先臣邱濬載在衍義補者是不可散也若我朝太平重熙纍洽主於河而協以海自可萬萬無慮故都燕之受海猶憑左臂從腋下取物也元人用之百餘年矣梁泰之所不得望也此臣所謂都燕專勢也黃河西來禹之故道雖不可考然不過自三門而東出天津入海是腹雖稍南而首尾則東西相衡也至宋時直獵大名則已稍南矣我朝𢎞治三年决張秋奪汶入海是其首猶北向也乃今則直南入淮而去嵗之决閻家口支出小河近符離靈璧則又幾正南矣自西北而直東南途益逺而合諸水益多則其勢大而决未可量也故以漢武之雄才尚自臨决塞王安石之精博且開局講求河之為立國病詎直今日然哉且夫去年之漂流大臣之與國同休及小臣之有志於世者聞之有不變色者乎夫既不能不變色于河之梗而又不能無難色於海之通則計將安出故富人之造宅則旁啓門焉防中堂有客而肴核自旁入此臣所謂目前急勢也海運里數自淮安府至安東縣九十里安東縣至馬洛橋五十里馬洛關至蘆浦四十里蘆浦至楊寨四十里楊寨至白沙關二十里白沙關至雲梯關二十里雲梯關至淮河套六十里淮河套至大海東洲山一百二十里東洲山至髙公島三十里髙公島至鷹遊山三十里鷹遊山至虛溝所十五里虛溝所至青口六十里青口至興莊五十里興莊至東流所九十里東流所至濤洛場三十里濤洛場至信陽場一百二十里信陽場至齊堂島四十里齊堂島至靈山島九十里靈山島至竹槎島五十里竹槎島至浮島四十里浮島至灣島六十里灣島至鰲山管島三十里管島至田橫島七十里田橫島至欽島一十里欽島至青島一百二十里青島至海洋所灰島七里灰島至坑兒島十八里坑兒島至元城島一百二十里元城島至雙駝埠二十里雙駝埠至寧津所八十里寧津所至成山衛五十里成山衛至青雞島六十里青雞島至羅山所五十里羅山所至威海衛四十里威海衛至劉公島五十里劉公島至寧海州七十里寧海州至空空島五十里空空島至竒山所三十里竒山所至福山縣三十里福山縣至登州新海口八十里登州新海口至沙門島六十里沙門島至桑島五十里桑島至萊州㟂屺島四十里㟂屺島至三山島八十里三山島至芙蓉島五十里芙蓉島至海倉一百里海倉至魚兒鋪十里魚兒鋪至白浪河五十里白浪河至八溝河三十里八溝河至小清河二十里小清河至清河五十里清河至絲網口子十里絲網口子至江岔河十里江岔河至大口子四十里大口子至大清河十里大清河至唐頭寨十里唐頭寨至小沙河五里小沙河至渾水汪十五里渾水汪至降河三十里降河至九山河十里九山河至大沙河二十里大沙河至泊油河十五里泊油河至套河十五里套河至沙頭河十里沙頭河至大溝河三十里大溝河至桑句河三十里桑句河至徐家溝十里徐家溝至乞溝河七十里乞溝河至大沽河一百二十里大沽河至天津衛一百五十里天津衛至張家灣八十里以上淮安府起至張家灣止海道水程共計三千三百九十里崇禎十二年沈廷揚上疏倡先小試海運事户部覆請奉旨這所議暫募運以省排造先試運以通故道說的亦是其松太等處沙船鵰船是否可用每嵗撥運若干經費作何措處運官作何遴委海上聨絡防護事宜通著總漕臣恪遵前旨一併確實畫酌妥速奏漕臣奉旨檄太倉州撥糧一萬石委官募船下海試運適太倉漕兑已畢廷揚遂領淮次糧一萬石由淮入海海道各有程途各有宿泊島嶼且近海岸俱有淺灘惟山東萊州一路地方突出海中五百餘里不得不放萊州大洋自此有白蓬頭石礁成山金嘴石等島險始不可言若得出洋子江沿江岸行至山東麻灣口别搬入船運至海倉口相去僅三百七十里中間原有膠萊廢河一道可以疏通到海倉口再入海船運至直沽僅一二日之程崇禎癸未十一月十五日考庶吉士畢上於德政殿召對因問曽櫻曽請開膠萊河已發銀十萬兩曽否支用昨計臣倪元璐奏有養魚池通漕便道欲遣賀王盛踏看是否可行蔣德璟對膠萊原有馬家濠元時所鑿嘉靖萬歷中皆再鑿欲以避成山之險然尚未通陳演奏聞尚有數里德璟奏只有十四里未通演奏對即鑿通如沙潮一衝恐又淤塞璟對前倪元璐奏欲於未通處所用陸運將漕米搬過亦是一䇿然兩邊船隻及車夫亦費區處上曰養魚池見在何處璟對在文登縣因賀王盛曽令文登故知之上曰即遣賀王盛去勘來并前户工二部所發銀十萬兩通查來看先生每擬旨行時山東已亂而所遣者亦非其人每問山東近海人皆言新河可通原長六十里今四十里海潮日到未通者二十里耳曽公櫻清而有才當日之請非無見惜未竟其用也渦河在淮之南商船自淮入渦至河南祥符銅瓦廂以達陽武陽武去衛河只六十里此元人陸運之故道也此說却似可行但今日邳州以下黃河淤淺淮水為門限沙所阻倒灌泗州一旦黃河北決淮水冬乾則清江浦便為平陸雖欲自淮入渦其道何繇哉永樂元年三月瀋陽軍士唐順之言衛河南距黃河陸路才五十餘里若開衛河距黃河置倉厫受南方所運糧餉轉至衛河交運公私兩便上曰此策亦是命近臣詳議如可行亦俟民力稍蘇行之倉支萬歷七年倉場尚書汪宗伊疏永樂二十一年每嵗漕糧以兩運京倉一運通倉往因通惠河未疏通倉糧多於京倉故嘉靖四年議放五年糧京倉六個月通倉六個月自疏通之後京倉積倍於通倉反以四月十月改折色是京倉收二分而僅放四月通倉收一分乃放六月今京倉隆慶五年分糧已及九年漸多浥爛且以京通倉粳米計之萬歷六年嵗報京倉一千二百五萬九百八十石該年放一百三萬四千三百九十六石雖放十一年而有餘通倉三百一十五萬九千五十六石該年放八十七萬二千三百三十八石雖放四年而不足合查照原收之糧額定支放之月分每年坐放京倉二分通倉一分兩月折色嵗以為常尚書張學顔議得四月十月係開操之日赴倉關支有誤隨行且軍士支糧在京倉甚近甚易在通倉為逺為難查得通倉應於本色六月十一月俱改坐京倉四月十月仍給折色是在京倉放米六個月通倉放米四個月似為多寡適均如遇米貴則折色又當停止而京倉糧米復當多放臨時酌行題請倉場侍郎南居益漕儲疏漕糧每年以四百萬為額除永折邊糧計七十八萬二千四百四十餘石外實入京通者額該三百二十一萬七千五百五十餘石即地方被災析免祖制仍責令於附近郡邑撥補足數原不容折銀虧額也如附近府分各有災傷無處凑補猶將臨德兩倉收貯備荒糧米內照數支運務不失原額四百萬石之數祖宗朝鄭重倉糈如此查神祖初年京通之貯尚計米一千五百二十餘萬於時每年支放止該一百九十餘萬今自關鮮借留地方截折每年實入京通者不過二百餘萬石而軍兵增設各役冒破每年實支米反該三百二十餘萬石除本年兑運盡數支給仍應搭配舊糧百餘萬方足嵗額今計京通二倉實在米止二百餘萬不過兩年配搭便罄盡而無餘矣此一倉糧也雖云軍需其實滿京都何家無軍亦何家不食漕米萬一搭支淨盡根本重地豈即能神運鬼輸以卒禦不可知之事變乎此時惟有嚴核虛冒而各衙門或創設或增添但就萬歷間迄今每年已多支米五十萬二千六百餘石矣況一營衛官軍也何以此月之支給較彼月之支給漫無定額一文思院官匠也何以屢清之後較未清之前支多踰額酌時宜而緩急布之所當按衙門而各令責成矣議者謂加放漕折可以省粒可以裕儲而庫銀不敷且時有借漕折而别用者矣夫米果有餘何妨給米以存銀米既不足斷當量入而制出查每年折色例該兩月而前任督臣畢懋良具題增四月即今不能四月獨不能三月乎又豈可減於二個月之祖制乎至關門遼米另編幫牌總漕已有成議此後或不致再為倉米之蠧而鮮兵既裁獨不可稍為酌減而猶株守十萬石之往規乎各地方災折即無奈多祲獨不可據議單而令通融補凑於豐稔之府縣乎臨德備災之米空懸日久獨不當急圖修復以資不時之支運乎河患火燬即恩典不容終格而獨不可嚴行稽察勿使以少報多揑假當真乎此外若掛缺運官千石以上者參送法司千石以下者押發漕司除究罪外其所失之漕糧法當照數追補者也其掛缺者固不知作何開銷其終缺也亦不知作何結局雖各衙門自有見行之事例倘亦不應如此之草草也今後各衙門似當將完缺存銷各數目年終俱清冊投部互相關白以便稽查而一切追完錢糧仍當歸還太倉以凑本折支放之用再查通庫所餘輕賫等銀及鋪厫板木折改濟邊者數原不多皆漕米本項也合無盡凑放漕折物極則反理固然耳要之裁減冗溢更屬吃緊而言者徒殷聼者自忽非以酌量之虛文塞責則以勢重之難反見泥祖宗法制非不犁然而絃轍之膠猝難變更天下事大都如此矣又疏看得倉庾為國家積貯天下命脉所關糜耗則不足撙莭則有餘此一定之理也神祖朝時值承平官享常祿役無耗蠧積貯藉以充裕至熹宗時郊祀享謁典禮紛紛告舉兼之邊疆多故在營衛則添設兵丁標勇等項在禁衛則冒替旗力軍校以致原額太增公廪匱乏倉臣南居益憂先杞人有直陳國計匱竭一疏原據京糧㕔趙建極查核條分縷析極為詳備如錦衣衛旗力軍校在萬歷年間止以一萬六七千為常乃自天啓年來駱思恭題增三萬後田爾耕陸續濫收至三萬四千四百名有零雖莭經查汰較萬歷四十六年尚有萬四千九百五十員名月增米一萬四千九百五十石嵗約增米一十七萬九千四百石今即曰如四十六年一萬六千為少不有如户兵二部所議以二萬五千為定額乎至文思院准工部咨原額七百三十三名今多增二千七百四十四名查係錦衣衛食糧匠役以功升文思院帶俸雖此增彼減而除增減相因之外仍多六十二名即米照原數又每嵗增俸銀八千四兩零前經奉旨各監局自行清汰嗣雖各有減損而仍太浮舊額是不可量減以省糜耗乎若營衛官軍祖宗所制三大營以十二萬為額每軍僅糧一石耳至萬歷五年而始有雙糧之選鋒至天啓年間而始有一石五斗之壯丁查萬歷四十六年一石軍一十一萬六千三百八十三名選鋒八千七百六十名合軍選共一十二萬五千一百四十三名比原額多五千餘名至天啓初年歷崇禎元年至四年止增收官兵選鋒三大營將官家丁巡捕營將官親丁家丁各監局匠役太常寺厨役倉庫官吏甲斗神木厰軍夫共增一千九百六十一員名月增米三千一百一十餘石又添設新軍三大營壯丁標下營選壯陵軍歸并京標𢎞仁橋家丁御馬監勇士營坐營家丁教師勇士四衛營壯丁共增一萬六百六十八員名月增米一萬四千四百二十餘石較之四十六年除減汰外共實增一萬二千一百三十七員名月增米一萬七千五百三十餘石嵗約增米二十一萬三百六十餘石值今東西交訌寇盜竊發京畿重地雖防護宜周而漏卮宜防是不當姑留之以壯聲靈而徐議之以杜濫觴乎統計錦衣衛并營衛等衙門實增二萬七千八十七員名眀旨所云增額幾至三萬者蓋亦洞晰宸衷而明徹隱微矣天下財用方匱皇上既以糜耗為憂臣等敢無說以處此錦衣在扈從之班營衛備禦侮之用文思院等亦監局急需匠役皆在輦轂之下依日月之光者也不汰則金錢有幾其能堪乎汰之則衆實有口胡從弭也不曰省其糜費而曰奪我粢糈不曰汰其老幼而曰撤我精壯萬一多口亂聽訛言蜂起恐冗冒者尚未汰而紛囂者已叢莭省者尚未見效而繁費者益滋鋌而走險其為憂方大耳惟是簡閲之際查有老弱疾病者次第汰之不必借名再收查有逃亡物故者陸續刪之不得冒名再替隨事綜核設法釐剔庶在國家無清汰之名而有清汰之實各役雖在清汰之中而亦不見有清汰之迹目前既享鎮靜之福日後漸復原額之數凡在文武內外諸臣各有憂國之心誰無急行之念審能仰體皇上撙莭益以實心行實政將縻耗漸清而倉庾自充矣給事張棟解白糧議按國家嵗派白糧正額二十萬石有竒我聖祖定鼎金陵東南數郡近在輦轂之下故用民運今東南去京師不啻三四千里每白糧一石有白耗米三斗加二舂辦該米二斗六升又夫船米八斗內本色四斗折色四斗該銀四錢又車腳銀四錢是白糧一石費用米九斗六升又銀六錢而後得達京師且有浥爛有漂沒而鈔關又有船稅臨清又有帶磚河西務又有剝淺諸如此費更不可計既達京師已離苦海而鋪墊之費嵗嵗加增有多至加七者是朝廷所得不過正米一石而小民所費幾及數石矣臣以為宜照漕糧事例即令旗軍帶稍本船每船以十分為裁漕糧九分帶白糧一分諸凡加耗板席等費比之漕糧寧過於厚而船帶磚并稅剝淺等項一不纍之運到之日仍責成巡倉御史或另設科道官親自監收毋致抑勒以害貧軍則小民既得免北運之纍即旗軍亦何纍而不樂從耶此白糧之當議者也司農王國光糧船抵壩議查得前後建議諸臣皆謂漕運糧船舊止抵灣今俱抵壩運軍抗糧雇役及泊船去處窄狹挨次起糧轉搬耽誤中多未便乞仍到灣起米運官赴部坐撥厫口令剝船運至通州交割因查舊卷并通州志載通惠河即元郭守敬所修故道國朝成化丙申更命平江伯陳鋭疏通之運船直達大通橋下彼時勢豪欲灣中起旱尅取腳價妄假黑眚之說托城社阻壞其事正德丁卯命工部郎中畢昭户部郎中郝海參將梁璽復濬又壓於權奸功卒不就故淺船不復達大通橋然俱到通州城下挨次起車無攔河委差之擾無起剝腳價之費至嘉靖初年御史向信倡言灣中搬剝始置外河剝船遇船起剝若五六月水漲仍令至通州石土二壩起旱戊子年因御史吳仲之言乃命工部郎中何棟户部郎中尹嗣中參將陳璠仍濬裡河四工成計費才七千兩而所省腳費十二萬初止運軍糧後并民糧亦運於是專設工部郎中一員淺夫六百名挑濬外河以求必達自後建議者復撓其計運船只抵灣勞費如昔故隆慶四年四月該總督倉場侍郎陳某議令淺夫及時疏濬務使運船抵壩以省腳價又該户科給事中劉繼文巡倉御史楊家相各題請糧船抵灣交割剝船運石土二壩糜費太多奸弊多端要行照先年舊例責令淺剝二船俱抵通壩考據甚真户部復奉欽依通行欽遵訖續該河道侍郎萬恭題稱糧船到灣仍於里二泗官民船剝赴京通倉免其頂壩擠塞隨經户部查議得糧船擠塞不在抵壩而起於大通橋之阻滯故橋運若速自可流行等因覆欽依仍令淺剝二船俱抵通壩遵行五年矣公議稱便然前後題覆仍舊抵壩者豈專為扣省腳價官旗人等駕言必欲抵灣者豈直為抵壩辛苦蓋運官許帶私貨雖限以四十石往往倍於此載放船底灣中商賈雲集四散交易倍取其直通州實非轉發之地此其不便者一京軍每嵗通州支米六次總計一百二十餘萬石雖人只一石惜費腳價多賤售於灣中勢豪棍徒年年囤積以待運家買以插和其好米沿途盜賣侵欺無算若通州則部官密邇奸計即發此其不便者二且灣中一應人等喜運家貯貨覔利近失其望此其不便者三橫議扇動全在於此今若必遂其計竊恐糧運蚤到各幫湧集通計淺船近萬每船裝糧約計五六百石共糧有三百五六十萬剝船目下添至八百隻加以損壞將半假令盡數起剝每剝船止容百石有餘須再造剝船三千再費腳價數萬勢或不能故先年强攔商民船隻起剝因致怨聲盈河今未盡免此其不可者一見在剝船八百若無著落皆責之武清縣富户領駕年費修船灰艌民苦不堪往往告困乃又益之一縣之民必將逃徙此其不可者二萬一天雨水漲起剝不前漂流難免如隆慶年間壞船四十二隻强半在張家灣迤南豈盡抵壩之故乃運家借此為言尤訛之甚此其不可者三灣南至壩迂曲止二十里即掯勒再四若船由浙江逺者三四千里近者二三千里或阻隔於江河或淺澀於閘壩亦將要剝船以接運乎經數千里而來靳二十里而止其情不待辨也故抵壩者舊例也嘉靖中年以前行之也其法約而善不抵壩者新議也嘉靖中年以後變之也其法狥而不善今乃以新議為舊例誤矣春明夢餘録卷三十七
