body:
  text: 春明夢餘録卷五十吏部左侍郎孫承澤撰大理寺大理寺在都察院南初制大理寺正三品設卿少卿丞洪武元年革十四年復置改為大理寺正五品其屬置左右二寺設左右寺正左右寺副左右評事及審刑司官十九年審刑司革二十二年升正三品二十六年設司務二十九年寺革後復置改左右寺為司官為都評副都評司務為都典簿永樂初左右寺及官俱復舊大理凖古廷尉掌審讞允反刑獄之政令與刑部都察院並列為三法司凡刑部都察院推問刑名按律例慮而復問囚服乃準擬否駁再擬改正曰照駁三擬不當紏問官曰參駁牾律寃甚者移調問曰番異再異則請下九卿會問曰圓審已平允慮未當移再問曰追駁屢駁不改者徑奏請上裁曰制決凡各省三司直𨽻諸死刑並讞乃已聼決每嵗會九卿朝審重囚大理古官也尚書臯陶作士周曰凖人秦曰廷尉漢初仍秦官景帝更名大理東漢又名廷尉後皆因之元以為都護府明初置大理司改為寺本寺職專審録天下刑名凡刑部都察院問擬內外刑名俱送寺覆審卿總之少卿與丞為之二司務典文移左右寺分理其事洪武中以係軍者屬左寺係民者屬右寺又定以在京屬左寺在外屬右寺萬歷九年以二寺事務煩簡不均題準以刑部十三司都察院十三道左右分管浙江福建四川貴州廣東山東六司道屬左寺湖廣廣西陜西雲南河南山西江西七司道屬右寺就各寺中除止副照該管地方通看外其評事以俸為序照來文先後分看凡寺正不看外詳洪武二十六年定凡刑部十三司都察院十三道五軍都督府斷事官五司問擬一應囚人犯該死罪徒流者具寫奏夲發審笞杖罪名者行移公文發審俱由通政司挂號另行入遞豫先差人連案同囚送發到寺照依該管地方先從左右寺審録若審得囚無寃枉者取訖各囚服辨在官案呈夲寺連囚引領赴堂圓審無異取據原問衙門司獄司印信收管入卷將囚連案責付原押人收領回監聼候發落候遞到各項奏夲公文到寺將奏夲抄白立案務要仔細參詳情犯罪名比照律條如罪名合律者準擬夲寺依式具夲同將原來奏夲繳送該科給事中編號收掌然後印押平允仍由通政司回報原衙門如擬施行如罪名不合律者依律照駁亦依式具夲將原來奏夲繳送該科收編駁回原衙門再擬如二次改擬不當仍前駁回議擬候三次改擬不當照例將當該官吏具奏送問或中間招情有未明者必須駁回再問若公文不必抄白就即立案其參詳罪名準擬合律照駁不合律及送問等項並如前行若審得囚人告訴寃枉果有明白證佐取責所訴詞狀案呈夲寺連囚引領赴堂圓審相同將囚連案依前發回原問衙門聼候發落待奏夲公文到寺將原來奏夲依式具夲如前繳送該科公文上留夲寺立案然後仰令左右寺抄案偹開囚人供詞行移隔别衙門再問若二次審異者再取夲囚供狀在官照例具奏會同六部都察院通政司等衙門堂上官圓審回奏施行凡內外問刑衙門議擬囚犯𢎞治元年奏準律無正條情犯深重者引律比附奏請定奪不得一槩俱擬不應供招之外不許妄加參語違者在內科道官紏劾在外巡按御史參究御史有違者夲寺查究𢎞治十七年刑部覆準各該司道必先推鞫明白問罪送審中間倘有寃枉不肯畫字或招情未明駁回三次改調司道或原問官事涉嫌疑雖未及三次亦許調問悉遵前項諸司職掌并見行事例施行嘉靖十年刑部題準兩京法司一應輕重刑獄務要虛心聼理必求詞證明白情法允當然後議擬施行毋得仍蹈前弊煆鍊其有情可矜疑事出無辜應辨問者即為辨問應奏請者即為奏請毋拘成案毋避嫌疑務要遵照欽依著實奏行不許虛應故事如有違者重加懲治嘉靖十一年夲寺題準敕法司堂上官一體申明戒飭使各司恪遵法守凡大小詞訟非經通政司準行非由各衙門參送不許聼理非由夲寺評允不許發落若徇私廢法如前所謂拘審及改易發落者俱聼夲寺及科道官參究檢舉嘉靖十一年刑部題奉欽依今後奏訴寃抑與稱寃不服調問人犯中間果有寃枉者問官即與辨問改擬不得避嫌畏忌因襲前弊其招擬未當該寺駁回再問者原問官即當更改不得偏執己見如招情已明罪無出入該寺即與評允不得駁論一文一字以致往返駁辨有纍罪犯至於詞訟行勘除人命家財田土等項例該檢勘者照例行城及軍衛有司勘問若委官果有徇私作弊勘報不公者原問官審究明白即與改正仍將委官參奏治罪其餘例不該勘者不得一槩行勘以騷擾害人嘉靖二十一年奉旨題準今後凡在外一應死罪重囚已經夲寺詳過題奉欽依處決後乃揑詞奏辨覆行勘問情真仍依原擬罪名者俱查遵前奉明旨施行不必再行開詳夲寺仍行都察院轉行各處巡按御史一體遵照施行凡發審罪囚有事情重大執詞稱寃不肯服辨者具由奏請會同刑部都察院或錦衣衛堂上官於京畿道問理凡駁問罪囚𢎞治十七年奏準原問官事涉嫌疑或有偏拗者不拘一次二次聼夲寺駁調問理若不改夲寺徑行隔别衙門問理又駁回犯人若不須提人者輕事限五日重事限十日完報若故意淹禁致情輕犯人纍死者聼夲寺指實參奏嘉靖十二年夲寺奏準法司堂上官將原問官員嚴加戒飭仍將發問囚犯按駁行查凡經駁回再問者照依大明令小事五日中事七日大事十日並要限內結絶如原問官敢有負氣挾私似前停閣淹延凌虐罪囚者聼夲寺指實參奏其各司擅準詞狀徑自發落既不呈堂具報送寺審録又已經審允而擅擬改變者俱聼夲寺及科道官參究凡在外問過一應刑名布政司直𨽻府州申呈刑部按察司申呈都察院各衙門仍備開招罪轉行到寺兩寺分看詳擬合律者候題回報部院如擬轉行發落不合律者駁回再擬招情不明者駁回再問凡評允人犯奉有欽依單夲具題曰單題其死罪京詳外詳俱五起一題曰類題係日審者寺正具稿係外詳者寺副而下寺員五日一具稿呈堂裁定吏部尚書蹇義論大理疏刑部都察院職典刑名而大理寺尤專詳讞居是職者必得其人其官屬宜從堂上正佐官精加考核庸劣不稱者黜之貪婪苛刻者罪之其有作姦犯科者責令互相紏舉不許故縱違者一體論罪舊制刑部都察院罪囚皆送大理寺審録無寃然後發落有異詞者駁正之法得其平罪得其當今大理寺乃同原問官會審設有寃抑囚何敢辨宜令如舊制敢再紊成法者罪之景泰中大理寺卿薛瑄言今法司發擬罪囚多加參語奏請變亂律意刑罰失中請敕自今一依祖宗律令不許妄加參語從之成化時給事中白昻言大理寺審録有詞稱寃人犯駁回在外衙門再問多偏執已見不與辨明或用非法重刑煆鍊成獄囚人慮其駁回必加酷刑雖有寃枉不敢再言今後有問招不明擬罪不當者俱乞改調相應官員問理不許煆鍊成獄違者雖無贓亦依律問罪從之大理卿劉玉疏伏惟我朝太祖髙皇帝肇迹民間享國持久備歷艱難飽諳物態故立制定法凖今酌古周備無遺視漢唐宋為過之至刑獄一事尤在所慎既設刑部以掌邦禁又設都察院以司紏察兼之問刑又設大理寺以專審録凡問過罪囚具招送審凡招不協情情不合律駁回三次改擬不當將當該官吏具奏送問謂之照駁照者照其情律也若問有寃枉囚自翻異不服則取供行移改調隔别衙門問擬二次翻異不服則具奏會同九卿圓審詳載諸司職掌與大明會典為制甚密及查見行條例遇有重囚稱寃原問官員輒難辨理者許該衙門移文會同三法司錦衣衛堂上官就於京畿道會同辨理果有寃枉及情可矜疑者奏請定奪蓋使彼此精研互相覺察故為問刑審録之司者敢不積誠竭慮據情法以議其平哉法得其平人皆易知易守而不犯故刑罰得中民獲措其手足所謂刑可期于無刑也奈何豐豫之餘人心玩怠問刑者不知五詞之審審録者不知觀刑之中惟意出入百司視勘不究其所當究刑每濫於無辜不問其所當問罪常訛於非情苛碎煩優長究興姦俾良善無控訴之門狙詐得橫行之路以求實理為怪異以論舊章為狂愚遂使祖宗良法廢壞殆盡臣等有難盡言者今幸陛下剗除宿弊圖新化理臣等幸沐遭逢忝司平反以為照駁圓審之法不行則司刑者無所畏憚庶獄決不可清他若詳定法律考課官屬矜恤獄囚查革淹滯省節煩優體悉吏隱又所以清獄之源也伏望皇上特敕法司今後問刑凡有擬議未當者容臣等查照舊規照駁再問駁回三次改擬不當將當該官吏具奏送問若問有寃枉囚自翻異不服取供改調隔别衙門問擬二次不服止照條例會同三法司及錦衣衛堂上官會審十分重情遵照會典會同九卿圓審原問官及改問官若容私偏向仍有寃枉不明者一體參提問罪其餘事情均乞敕夲寺及各衙門欽遵施行一問刑衙門固應遵照律例問擬發落但民偽日滋或有所犯出於律例所不載者或情重律輕或律重情輕難以照常科斷者節該刑部都察院及夲寺臨時議擬上請奉有欽依發落歷年以來非止一端此皆出於聖明參酌情罪以補舊章之未備誠宜傳之永逺使司刑者有所遵守也合令刑部都察院會同夲寺將自嘉靖元年以來凡問過事情臨時議擬奏請及撫按等衙門奏行部院議處具覆奉有欽依發落者逐一查出再行議擬停當開欵具奏取自上裁著為定式增入問刑條例通行內外問刑衙門永為遵守其近日刑官私議比附律條之類刻附律書者俱不許傳用庶聖謨顯而刑不濫矣一法司所以專理刑名至于大理寺職司參駁關係尤重凡任兩寺官非精律例見出原問官員之上何以評其輕重服其心乎近見兩寺官其間歷年既久諳練事體盡心職業者固多亦有初入仕途律之名例尚未通曉即欲斷按庶獄未免有差原問官因得指摘罅漏借為口實至於參駁夲寺亦不降心聽從輒逞雄辨往復數次淹纍囚衆至不得已只得將就允行亦有彼此騰謗遂相擠陷夲緣公務反成私隙以致刑獄不清多此故也合無行令夲寺今後遇有新除評事督令講讀律例半年以上考居疏通者方許干預評允如有刑名生疏者比照試御史事例仍令重歷重歷不堪者參送吏部對品改調在京别衙門敘用其見在者除寺正寺副不考外其餘亦限三月以內通加考驗勤惰內有年久未諳者一體參送吏部别用若有究心刑名才識出衆者開送吏部候兩寺正副員缺不論年資銓補至為正副又能益勵職業比照刑部各道年深郎中御史一體不次推升如臣等堂上官不能正已格物以致刑獄未協於中亦乞聖明早賜罷黜以為不職之戒庶人知省勉法律昭明而足為天下之平矣一訪刑部近年以來問理刑獄多便已私不體朝廷欽恤之意每遇強竊盜及人命重囚不問虛實輒加嚴刑苦訊又有經夲寺審允題奉欽依處決者分付獄官私行謀死詐稱病故不得明正典刑及未成招死者枕籍於獄雖經御史及錦衣衛官相視不過虛應故事夲寺所審者止據見在人犯病故者例不查考以致該部肆行無忌問官緣此得省文移提牢官員緣此便於防守而以人命之重如拉犬彘習以為常漫不知惜甚傷天地之和召災致變未必不由於此此等弊政已非一日兹當欽明大獄之後人圖自新諒無敢蹈前非者臣等恐宿弊難袪頽風易靡不可不預為之防也合無行令刑部衙門戒飭各屬俱要仰體至仁重惜民命一應罪囚無得非法凌虐有患病者提牢官及司獄官請醫調治或調治不痊身死者一面行文都察院等衙門差官相視明白仍一面將患病緣由開送夲寺以憑查審若御史等官驗有傷重及夲寺審係矜疑人犯並未結事情雖係真正死罪重囚不曽請醫用心調治假揑虛文開報者俱係當該官吏參究從重治罪其男子杖罪以下及干證平人婦人徒罪以下者不許一槩淹滯每月終該部堂上官仍將見在開除病故囚數開具説帖御前宣奏庶司刑乃有所避忌而囹圄無寃獄矣又訪得相視官往往畏懼復命延捱數日積死數囚方行相視以致尸肉潰爛臭穢薰蒸莫敢近前非惟死者莫辨其寃生者亦被所染瘟疫舉發莫可救藥誠為可矜亦乞敕都察院等衙門遇有該部開報死囚隨即差官相視毋至仍前耽誤參究治罪如此則陛下如天之仁及枯骨矣一近時法司問事多有淹滯日久牽纍平人合無行令今後問擬大小事情及行各城勘驗者大事限二十日中事十日小事限五日俱要提齊完結此外如錢糧行查未明強竊盜挨拿正犯未獲人命未檢結勘以致稽遲者將見在人犯及夲狀內各起事情先行問招送審夲寺即明開各犯到官之日以憑查考有淹滯過期者年終類奏量請罰治如例應委官勘問及行軍衛有司會勘違限并托故推調不即赴勘者原委衙門照例參奏提問庶宿弊除而官無曠職矣一近日各城巡視御史并兵馬司衙門每遇地方呈報小事不論情之輕重槩送法司法司又加深求入人以罪送寺審駁方行改正又聼人囑托濫準詞訟批發兵馬司問理以致牽纍貧民甚至傾家蕩産鬻賣子女始得完結者臣等以為市井細民愚蠢無知或因醉酒喧譁或因微末爭搆至有妻妾妬寵而反目子孫違令而打罵皆人情所不免該城量行責治已足示懲戒若一槩送問誠為優害行令各城御史除強竊盜人命等項重情照舊送問其餘一應小事量情發落不許送問亦不許受理凡軍民詞訟俱赴通政司告行法司提問亦不許巡城兵馬司等衙門濫受優民庶刁風可息而貧民獲安矣崇禎二年大理卿康新民疏臣備員廷尉稱天下之平每遇審録重犯多方詳慎歷有平反清夜省心惟恐天下有寃民也軍徒一寃民已不堪命若大辟一寃則死者不可復生斷者不可復續其關係更重矣在愚民固有以他故罹辟者然多屬人命盜犯人命自有寃對猶易訊斷惟盜犯真似微曖極易淆錯外郡縣盜情猶有著落而京師盜情益多縱枉蓋失主被盜之日須先投一失狀於官司預報失單逐項開明記號如手􅎖金銀分兩有無珠翠衣服顔色或紬絹紗羅布絮下至一帽一履亦必注一製樣嗣後擒賊追贓合者方為真盜若果審真即駢首何憾若無確證難以懸坐至盜已到官須立地審取口詞無得日後妄扳以殃林魚今京師賊犯全憑番役緝獲每當未經官時先於城外冷空廟寺非刑苦拷逼使供招利其扳扯以為竒貨至真盜真贓未必不隱縱揚去其供招成獄者或云不知名失主或云過路人不知姓名即指有失主認識贓物然當日原未投失狀安知今日盜犯果係其家失物至有一種神姦與番役穿鼻每遇盜發或當官認為失主而贓物則私相瓜分若然則天理澌滅而王法甚屑越矣城番獲賊係各兵馬司初審營番獲賊係巡捕把總等官初審夫審盜非聰明不能得情非清正不能得情非寧耐不能得情而欲以此三者必之各兵馬司把總等官其將能乎不過隨番役所寫供單為渠作謄録耳即此便為初案矣已而兵馬司所審轉解巡城御史巡捕把總等官所審轉解京營督捕提督巡視京營科院中間固有嚴究漏網亦有開釋無辜者參送刑部審定招詞堂屬幾經推敲大獄訂有成案及遇臣等閲招始末虛心鞫問其為真盜真贓甘認無辭者十之三四其嘵嘵轉辨藉口於番役之苦拷逼供者十之六七也真者自應執法以正三尺稍有可疑必駁審以期於當然計事犯之日以至臣寺則不知耽延幾許月日矣近有盜情一起牽連三十六人陸續監斃兵馬司者三十二人臨審病故者二人止二人聼鞫其中即有一可疑者駁從末減然前三十四人中豈尚無子虛烏有可待平反者俱已混登鬼録矣言念及此安得不痛心疾首也臣欲自今以後除長途卒遇響馬不及呈報外凡京師居民若有被盜者各就五城所屬先投一失狀隨開失單如前式粘狀俟賊犯既獲庶有所據以定真贋即獲自各營亦必關原狀以為確證其番役止許嚴緝不許苦拷至五城掌印兵馬司多係孝亷前途尚逺如遇審盜必分明就裡情節隔别細審果同行上盜亦須將姓名年貌住址贓物逐一剖悉不得止報混名致難緝捕審畢一一親筆注定用印鈐記不得辭勞分委致滋弊端其各營巡捕把總等官亦須念及寃報盡心審確毋輕信番役私相貓鼠其各城御史暨巡視京營科道當不時誡諭專以審賊之當與不當定各兵馬司各把總等官殿最若故出故入臣寺覆審既明將初審官題參依律懲究且盜情一發即須速結轉解參送法司不得耽延月日使無辜斃於姦穴其厰衛理刑官亦求皇上明旨申飭凡遇審盜務慎重得情毋輕枉縱至京城一種拏訛棍徒往往捕風捉影擇人而食騙詐所及家資一洗甚有羅織傾命者致使善良赤子日局蹐於橫禍則妄拏誣陷尤當嚴為申禁以安根夲之地可也崇禎十五年大理卿凌義渠疏查得臣寺職掌見在衙門事宜一書內稱凡評允人犯奉有欽依單夲具題曰單題其死罪京詳外詳俱五起一題曰類題又查刑部事宜內載大理寺審允者死罪候類題命下之日出評允勘合此五起類題之所據也惟是死罪有立決秋決二項歷來外詳類題不分立決秋決獨京詳分别二項各候足五起此不知起自何年沿成故事臣等固不敢傅會典制也恭繹明旨立決重案應否延停久待因反覆參詳立決人犯除卑幼悖逆外係強盜十之九所謂禦人國門不待教而誅者也但臣等竊見京詳盜案與外不同州縣盜發失主先有緝狀有失單及至擒獲質對月日贓狀一審了然京師多憑番捕之手獲盜未必皆真真盜未必皆獲即其有贓有證而失主或非正身贓物概無原單失出則有出柙之虞失入遂傷好生之德且州縣訊鞫強盜贓真證確然猶府道司院層纍批駁稍餘生路復入恤刑矜疑之牘比其開詳到寺次第奏讞不知幾閲年嵗京師則自城捕獲賊送部成招過寺候題其間情罪未協者惟有臣寺之一駁耳即候足五起遲不過以月計而爰書既上死者不可復生矣臣等愚鈍恨無片言折獄之明而仰體欽恤之仁俯思平反之職於此等重辟何敢率易從事雖題稿已具尚有疑竇須再行駁確者則未嘗不藉候五起之例庶得以躊躇而審也易曰君子以議獄緩死書曰要囚服念五六日至於旬時丕蔽要囚聖人之意豈為凶人停延久待緩至旬時者哉政懼濫及無辜必再三求其生而不得然後殺之也臣等前疏已及此今擬議未奏間接邸報該刑部題為遵旨認限事奉聖旨這各司未完事件既立有限期併在內各衙門在外各撫按一體祗遵查緝審結但獄須得情方無枉縱都著詳鞫確擬稱朕慎恤之意不得藉口勒完任意出入欽此臣等恭誦綸音真與聖經相為表裏固知責成速讞原期於得情無枉無縱非但以速為能而已也伏乞皇上欽定以後京詳立決重案或仍舊足五起類題或照外詳例與秋決共足五起類題總求詳確以贊祥刑從此永為典制庶畫一之令既飭而隱閣之弊愈清矣薛文清瑄大理針惟左執法廷尉象焉稽古之職士師庭堅官曰大理歷兹有年其名不一其事則然蓋天之公陽開隂闔立法憲天仁柔義遏不率典彞或過或惡天討以施低昻斟酌乃有凖臬職斯常刑讞厥當否則歸廷平廷平攸執時惟鑑衡鑑灼隱伏衡持重輕持照兩得克允克明罰當民服氣協休徵惟刑弼教聖所欽恤死者弗生絶者弗續爾居爾官宜何警肅勿徇貨利勿任憎欲勿偏縱釋勿好刻酷有一於兹靡平靡燭斁紀瘝官齎痛飲毒譬火銷膏辜亦已速邈哉千載乃有良臣釋之定國持公體仁曰民不寃曰無寃民功光簡册慶及子孫髙山宜仰景行宜遵小子述戒敬勗我人春明夢餘録卷五十
