body:
  text: 春明夢餘録卷五十一吏部左侍郎孫承澤撰太常寺太常寺在皇城西後府之東南向中為崇正堂萬歷中董其昌為寺卿改寅清堂書用李江夏法甚工後堂左右為官舍堂後為香帛庫庫北為浴堂南為柴庫右為祭器庫初為太常司正三品吳元年令凡朝㑹贈諡冊封冠婚喪祭講究儀式計量物料移文各衙門施行禮樂祭祀宴賞犒賚賔客工匠悉𨽻焉洪武元年定太常官制掌天地宗廟社稷山川神祗之祭以相大儀以格神明以致天地之和餘分𨽻各衙門設卿少卿司丞博士典簿協律郎贊禮郎司樂大祝等官及祠祭署令署丞三年置神牲所設廪犧令大使副使等官四年神牲所革七年設典樂二十四年改署令為奉祀署丞為祀丞三十年改司為寺司丞為寺丞三十五年革大祝虞舜命伯夷作秩宗典三禮后䕫典樂周併領於宗伯秦始為奉常漢因之為太常太常王者所建之旗也畫日月蛟龍百官有大功德則書之王者有大事則建以行禮官奉持之故曰奉常又曰太常漢百官志曰欲令國家盛大社稷常存稱太常又曰尊大之義也太常職事凡天神地祗人鬼嵗祭有常先嵗孟冬進明年祭日上御奉天殿受之頒諸司凡上祭贊相禮儀大臣攝事亦如之若祭先期請省牲大祀上先省大臣繼省之進版銅人上殿奏齊戒示諸司凡薦新品物移光祿寺凡國有冊封冠婚營繕出師嵗時旱潦大災難請郊廟社稷凡新王之國若朝還謁辭於寢廟凡祭滌器㸑理香燭玉帛整拂神幄必恭潔凡玉三等曰蒼玉曰黃琮曰玉制帛五等曰郊祀曰奉先曰展親曰禮神曰報功凡牲四等曰犢曰牛曰太牢曰少牢凡樂四等曰九奏曰八奏曰七奏曰六奏凡舞二曰文舞曰武舞凡樂器不徙凡陵園之祭無樂凡祭掌燎看燎讀祝奏禮對引司香進俎舉麾陳設收支導引設位典儀通贊奉帛執爵司尊司罍洗卿二屬各供其事凡宴㑹率其屬奏樂典簿典勾校金穀察視禮數省署文移博士講習禮文請上填名祝版大禮導贊其儀神樂觀提㸃知樂領樂生舞生而時教肄之進退其考贊禮郎設君臣之位以奉祭祀之禮拜跪之節皆贊導焉而承傳之協律郎司樂考協雅樂凡舞人韻聲人籍核其名數而審欵之凡淫聲過聲凶聲慢聲舞失節者皆禁糾之凡上至祀所夜警晨嚴凡祭先期演樂太和殿凡大祀樂生七十二人舞生一百三十二人凡壇署典守壇場殿宇厨庫林木時灑掃之以供其祀事陵署亦如之犧牲所凡三祀牲牢咸有數養而滌之藉田收穀納於神倉供五齊三酒之用穰藁飼牲洪武二十五年六月以皇太子新薨欲停時享命禮部侍郎張智等考求前代典禮智等奏宋㑹要言王制喪三年不祭惟祭天地社稷真宗居喪易月服除明年遂享太廟合祀天地於圜丘郊用樂餘皆備而不作今宜如宋制從之是年八月上召太常寺卿許升問祭祀禮儀升不能對典簿劉仲實從旁代奏甚詳上曰國莫重於祭祀職太常者昏惰如此何以祀神遂降升為刑部主事而以仲實代之太常博士漢人極重此官國有大政下丞相九卿㑹議必及博士即如廢昌邑王奏中公卿將相列名上請必曰臣敞等謹與博士議云云如此大事非博士之言不行其重之如此太常贊禮郎即宋之太祝也宋重其官以宰相任子為之明初亦以處文學之士乙科初選每得之後乃以黃冠充焉失矣宋濓曰凡守令滿三載者朝京師詔銓曹考核治行其昭著者皆復舊職命儀曹燕饗之遇有事郊社令被以盛服從公卿大夫之後以與祀事上之意以為能勤民方可以對越神明也宗伯于慎行太常寺題名記國家法六典建官既以禮樂神人之政總之春曹又設太常卿佐使率其屬以奉郊廟羣神之祀而掌其器幣壇場儀文樂舞之數以告時於上而請行之蓋宗伯所掌天神地祗人鬼之禮春曹舉其全太常專其職矣所謂崇明禋之典以協承神休厥惟重哉寺之在北都者初稱行在正統間始定今名則永樂以前故南太常也而題名所志卿及餘佐肇自洪武於建置之實不相中矣萬歷庚寅卿張公作霖以題石且盈將更鎸以待來者則斷自永樂十八年卿蔣公守約少卿傅公霞岫以下而除其官南寺者以志實也又准雷大司空年表之法列卿少而除丞以志守也舊記間有遺失又取年表所載頗增入之而隆慶以後續焉以志備也謂不佞承乏禮官請為之記恭惟我髙皇帝開天創宇稽古禮文惟是郊廟百神之祀對越將享罔敢逸豫洋洋乎廣謨景訓載在典策規於萬世矣列聖相承率由舊章靡有遺闕是致昊穹錫貺百神效職年穀順成羣生嘉鬯與虞周之盛有同符焉其惟明德之歆升聞於上亦越奉齍涖鬯之臣陳言祝嘏以假於上下神祗與有榮號哉及遡穆考以前寺之卿佐間或參以宗祝秩之上列亦惟其習於祼將示有常也不佞竊有睹焉古者官不易方材不兼任伯夷典禮后䕫典樂各效一職不二其守以終其身故能搏心攝志儲精㑹神以逆釐三靈而協調元化也今之太常既以一官兼夷䕫之任而備其所不能周又皆出於仙曹瑣闥極當時華要之選垂魚擁佩朝游乎圭瓉暮翔於斗樞即欲精白一心肅祗厥職以揚洪輝而甄靈貺時不幾也無已而委之宗祝曰以其服習有常不惑於儀云爾則無乃以人而棄官乎繄考舜之命夷曰夙夜惟寅直哉惟清其命䕫也以直寬剛簡之德敕之則夷䕫之終身於其官者固不在玉帛鐘鼓之間而在乎有禮樂之夲也任是官者誠有禮樂之夲以考其器數而舉其彜章則一日居職亦夷䕫之一日矣由是而後乎吾者一二人焉如之是一二人者其不為夷與䕫乎又由是而後乎吾者十百人焉如之是十百人者其不為夷與䕫乎有如提空名以自貴而慢厥官常以怨恫於神明即終其身於鐘鼓玉帛之間何以自異於宗祝之流而稱顯相乎聖上恪共祀典春秋匪懈祝號之史或有愆於禮度輒下詔申飭應時更置而於寺之卿佐茂簡名德以冠九列爛焉爍乎於前有輝矣繼自今以往任是官者其有不蒸蒸翼翼各率乃職以求踵夷䕫之躅而委諸宗祝為也即我二三禮官實儼然在庖俎之間亦曷敢不相與敬之以光揚天子之丕赫命於戲重哉爰辨諸碑首用昭示千萬䙫維張公其有令矩於後人焉春明夢餘録卷五十一
