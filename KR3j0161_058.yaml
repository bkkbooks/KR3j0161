body:
  text: 春眀夢餘録卷五十八吏部左侍郎孫承澤撰欽天監一欽天監在闕之東禮部後初置太史監洪武元年改司天監又置回回監三年始改為欽天監二十一年革回回監以回回歷法𨽻焉所職主歷數天文星紀之事監有正有副而分春夏中秋冬為五官五官正專理歷法造歷監候佐之靈臺郎辨日月星辰之躔次分野以占候天文密疏聞保章正佐之挈壺正考中星旦夜昏眀之候而漏刻博士佐之凡日月星辰風雲氣色之變異率其屬登觀象臺占焉臺四靣靣四人國有大營建師旅冠婚擇日營陵寢擇地凡立春先期候氣於東郊凡大朝賀設定時鼓於門樓及期擊焉凡日月交食先期算其分杪時刻起復方位以聞下禮部移內外諸司救護之凡疇人世業立師而教之乏人移禮部訪取試用凡元象圖書密疏上非其職不得預凡習業者分為四科曰天文曰漏刻曰回回曰歷日五官正至天文生隂陽人各專科肄焉歷有四曰大統歷曰御覽月令歷曰七政躔度歷曰六壬遁甲歷歷注上歷三十事民歷三十二事壬遁歷六十七事永樂元年命吏部欽天監正佐官嵗滿不考核著為令治歷之學始於堯典衍於歷代而精於元蓋郭守敬深於數學而又以一代大儒許衡參之故其上合往古下質來今無不吻合即聖人復起不能易也後人再斟酌於嵗差之法百世行之可也眀之太祖為一代神聖襲用其法而不改三百年行之而無弊可謂歷之聖矣後乃不能用郭之法以合郭之歷而曰别事捷法豈其然乎保定邢雲路邃於郭歷者也時不能用惜矣堯典乃命羲和欽若昊天歷象日月星辰敬授人時注曰歷所以紀數之書象所以觀天之器如璣衡之屬是也日陽精一日而繞地一周月隂精一月而與日一會星二十八宿衆星為經金木水火土五星為緯皆是也辰以日月所會分周天之度為十二次也人時謂耕穫之候凡民事早晚之所關也堯典曰期三百有六旬有六日以閏月定四時成嵗按律歷諸書與周髀皆云日行一度月行十三度十九分度之七周天三百六十五度四分度之一故日一周天為嵗嵗十二月而無整數故以閏月定四時三嵗一閏五嵗再閏及十九年而餘一百九十日一萬五千七百十三分以日法除之共得二千六百七十三分為七閏之數是謂一章然必以十九嵗而無餘分者蓋天數終於九地數終於十十九者天地二終之數積八十一章則其盈虗之餘盡而復始推此以定四時嵗功其有不成乎治歷之法莫捷於以中星定四時堯典載之矣分命羲仲宅嵎夷曰暘谷寅賔出日平秩東作日中星鳥以殷仲春厥民析鳥獸孳尾申命羲叔宅南交平秩南訛敬致日永星火以正仲夏厥民因鳥獸希革分命和仲宅西曰昧谷寅餞納日平秩西成宵中星虛以正仲秋厥民夷鳥獸毛毨申命和叔宅朔方曰幽都平在朔易日短星昴以正仲冬厥民隩鳥獸氄毛鄭氏曰二十八宿環列於四方隨天而成轉東方七宿自角至箕是為蒼龍以次舍而言則房心為大火之中南方七宿自井至軫是為鶉鳥以形而言則有朱鳥之象虗者北方七宿之中星也昴者西方七宿之中星也星本不移附天而移天傾西北極居天之中二十八宿半隱半見各以其時所以必於南方而考之仲春之月星火在東星鳥在南星昴在西星虛在北至仲夏則鳥轉而西火轉而南虛轉而東昴轉而北仲秋則火轉而西虗轉而南昴轉而東鳥轉而北至仲冬則虛轉而西昴轉而南鳥轉而東火轉而北來嵗仲春鳥復轉而南矣循環無窮此堯典考中星以正四時甚簡而眀異乎呂令之星舉月本然聖人南靣視四星之中豈徒然哉以授民時秩民事而已寅賔出日寅餞納日此禮日之祭也春禮日以起事秋禮日以助成不言夕月所重在日也殷之為言正也所正在四仲者便民事取天地之中氣也春言日中秋言宵中日夜互稱順其隂陽也星鳥星火星虛星昴者以午位為中王者向離而治故以此考時也星本不移附天而移仲春則鳥在南至仲夏而西至仲秋而北至仲冬而東他星皆倣此析者分力因者相助夷者相傷也芟伐草木以順時也隩者務蓋藏也朔方曰幽都都謂所聚隂氣盛聚於北也平在朔易者古者建子以為嵗首則凡事至此皆更易也南獨曰訛訛者邪也氣盛則防其淫皆所以節宣天地之氣也九疇之有次何也大道不越乎五行有五行則道此萌始故初一曰五行在天為五行在人為五事能敬用之則成其為人故曰敬用五事既成人矣而推以治人則為八政故曰農用八政八政舉而天紀可協故曰協用五紀四者偹而后為皇極皇極何也太極也皇極居中而前四疇由此會後四疇由此出也建者如斗柄所建止於是不他也以極自正則曰建以極正人則曰乂用三德稽極之得失於天則曰眀用稽疑驗極之得失於天則曰念用庶徴考極之得失於人則曰嚮用五福威用六極嚮者可慕威者可畏也五行之變不可窮而言味何也味者食之主人資以生故言味也人得水以滋其貌故貌屬水人得火以發其氣故言屬火木之外敷如人之魂魂棲目為視故視屬木金之內鑑如人之魄魄棲耳為聼故聼屬金土之為德金木水火得之乃成而用行於行為思思者貌言視聼之主也周禮馮相氏掌十有二嵗十有二月十有二辰十日二十有八宿之位辨其序事以會天位吳澄曰嵗謂嵗星所在寅曰攝提卯曰單閼辰曰執徐已曰大荒落午曰敦牂未曰協洽申曰涒灘酉曰作噩戌曰掩茂亥曰大淵子曰困敦丑曰赤奮若嵗星在行於地凡歷十二舍而為一紀則有十二嵗之位月為斗柄所建自正月建寅至十二月建丑凡歷十二朔而為一嵗則有十二月之位辰謂日月所會子曰元枵亥曰娵訾戌曰降婁酉曰大梁申曰實沈未曰鶉首午曰鶉火已曰鶉尾辰曰夀星卯曰大火寅曰析木丑曰星紀為十二辰之位自甲乙丙丁戊己庚辛壬癸為十日之位東方角亢氐房心尾箕南方井鬼柳星張翼軫西方奎婁胃昴畢觜參北方斗牛女虛危室壁為二十八宿之位蓋天象有定位則人事有定序辨其序事而會之者如仲春之月平秩東作厥民析則知其月之建卯日月會於降婁而為奎婁之次仲夏之月平秩南訛厥民因則知其月之建午日月會於鶉首而為井鬼之次仲秋之月平秩西成厥民夷則知其月之建酉日月會於夀星而為角亢之次仲冬之月平在朔易厥民隩則知其月之建子日月會於星紀而為斗牛之次以至十二嵗十二月所會天位皆倣乎此古今善治歷者三家一曰漢太初歷以鍾律起二曰唐大衍歷以蓍䇿起三曰元授時歷以晷影測就日影測之毫忽微眇不可得而遁者元史所謂自古及今推驗之精蓋未有出於此歷至授時雖聖人復起不能易也當元之初仍用金歷世祖欲釐正之命王恂楊恭慤郭守敬領其事恂等言歷家知歷數而不知歷理願得通天道精歷理大臣如許衡者總之於是命衡領太史院當是時守敬言司天莫大於測景古今歷以唐一行所造大衍為稱首則以唐開元間令南宫説行天下測景所歷地最廣也今國家一統疆宇比唐尤廣袤宜遣使者四往測景成一代之制而測驗莫先於儀表今司天儀本宋皇祐中於汴亰所造與大都天規環不協比量南北極差四度有竒又表石年深欹側難遵用請别創儀表相比核宜可精求於是創簡儀仰儀及諸儀各臻其精妙以為天樞附極而動昔人嘗展管候之宿度餘分終未得其的用二線測餘分纎微可考作候極儀極辰既位天體斯正作渾天儀儀象形似莫適於用作玲瓏儀以表之矩方測天之正圓欲合也實難法當以圓求圓作仰觀儀古有經緯儀相連絡而不動作新儀東西運轉南北低昂而七政列舍中外宫去極度分燦然作立運儀日有中道月有九行用為測驗其致一也作證理儀表高景虛罔象非真作景符月雖有眀測景則難作窺几歷法之驗在於交會作日月食儀天有赤道輪以當之兩極低昂標以指之作星晷定時儀諸皆創以意為之又作仰規覆矩圖異方渾蓋圖日出入永短圖與諸儀互參驗而彌精於是設監候官十四人分道行測景東至高句驪西極滇池南踰朱崖北盡鐵勒凡二十七所而守敬作懸正儀令行四方測景者用之仰察躔離近取晷景微入刻杪遠周寰海遍參歷法酌稽中數蓋五年而歷成衡守敬具疏言天體難測古歷家於天往往各有測悟而未偹精察今創以新儀木表與舊儀所測較得數嵗冬至晷景及日躔所在若月離遲速與列舍分度之差自大都較北極出地高下之度四時晝夜刻之長短參古制立新法非假測悟一本其故常考正者七事創法者五端非敢謂能然方之前代全踵故歷增損傅會為法者較然易知誠得每嵗創驗修改積三十年庶幾可使如三代日官世専其職大統歷悉用授時歷之制特改太隂行度耳洪武中漏刻博士元統節取其法以洪武十七年甲子為歷元行之無弊後以交食稍差議欲增損然讀元史李謙歷議而玩其測驗之法自近日以至遠日自近地以至逺地東極高麗西極滇池南踰朱崖北盡鐵勒不可謂不精矣而又上考往古自春秋獻公以來二千一百六十餘年類皆吻合不可謂不密矣何所據而增損之或疑元統有年逺數盈漸差天度之説殊不知嵗差者謂冬至日躔赤道之度耳黃道度數自宋統天厯至授時歷凡四變蓋天道三十年必一小變烏有定法如堯時冬至日在牽牛宋文公時在壁眀初在箕六度今冬至日日在箕四度矣古今不同此亦可驗所以郭守敬有消長之法也洪武十七年欽天監博士元統請改修大統歷監副李德芳駁之曰臣按故元至元辛巳為歷元上推往古每十年長一日每百年消一日永久不可易也今監正元統改作洪武甲子歷元不用消長之法考得春秋晉獻公十五年戊寅歲距至元辛巳二千一百六十三年以辛巳為歷元推得天正冬至在甲寅日夜子初三刻與當時實測數相合洪武甲子元正上距獻公戊寅嵗二千二百六十六年推得天正冬至在己未日午正三刻比辛巳為元差四日六時五刻有此不合今當用至元辛巳為元及消長之法方合天道此足以正元統之誤洧川范守已云授時歷雖起於至元辛巳而不以辛巳為歷元其法以七千二百五十七萬六十為一元之中平分天地人三元各得二千四百十九萬二千自太乙甲子至嘉靖四十三年甲子歷過五千二百九十五萬八百四十已逾天地二元矣今當人元內四百五十六萬六千八百四十後推將來每年增一前考已往每年減一是以太乙甲子為歷元而不以至元辛巳為歷元也至於嵗差之法起於子半虗宿六度約六十六年而退一度自堯時迄洪武甲子退過四十九度五十七分故冬至日躔箕七度七十九分至正統甲子退過五十度四十一分冬至日躔箕六度九十六分𢎞治甲子退過五十一度二十四分冬至日躔箕六度一十三分嘉靖甲子退過五十二度七分冬至日躔箕五度三十分以後每嵗約退一分三十八杪四十七微步厯者隨年減去之矣豈仍至元辛巳之舊哉至於日食起復方位多寡分數稍有不同則以南北地勢不一里差之法未之講耳故正德甲戌日食日官推步八分六十七杪而閩廣之間遂至食既萬歷乙亥日食京師未甚而蘇松亦至晝晦則南北之地勢使然也蓋日輪大而月魄小故相掩之際自下視之南北不同每千里而差一分東西不同每千里而異數刻矣而豈歷元不精嵗差未改使然哉保定邢雲路曰孟子曰天之髙也星辰之逺也茍求其故千嵗之日至可坐而致也旨哉言乎夫故之言利也其天行順利之故道也故不難致而難於求然求亦多術也從古羲和道廢日官失職帝王六歷訛於四分漢人踵之久假不變而不知為好事之偽作也四分之歷天與日齊以步氣朔一跬步不可行逮漢末劉洪始覺其誤乃減嵗餘立嵗差考冬至日躔在斗二十二度千古不明之數自洪始發之後之歷家代各改革然不數十年而輒先後天不可行者何則以嵗差之中仍有消長一機未備也至元太史郭守敬乃悉其竅焉觀守敬之言曰上考往古下驗將來皆距立元為算嵗實上推每百年長一下算每百年消一其諸應等數隨時推測不用為元其説至眀也至洪武初欽天監博士元統則不知測驗為何事而竟削去消長另立凖分以為修改合天擢為監正監副李德芳持消長正論力爭之不得遂從統議然而統所修改四準則授時舊數接年續之一無所改者也訛傳至今失之益逺疇人沿襲恬不為怪余於蘭州立六丈之表視郭太史四丈之高又申一之半復從宋周琮取立春立冬去至日逺之景日差長幾九寸尤易分别以法布之立春時刻與郭太史消一之歷符合而大統則後天九刻八十餘分適值子半之交差天一日矣夫歷從何來從日躔之在天來也今仰觀天象立春日躔在戊寅亥初而欽天監在己卯子正此可以口舌爭乎且七政一稟於日躔日度變而朔轉交及五曜之率皆變氣應一差即諸事皆差而以之步歷無一可者故守敬曰天有不齊之運而歷為一定之法所以既久而不能不差既差則不可不改隆慶間監官周相亦曰今年逺數盈嵗差天度失今不考所差必甚皆探本之論也乃監正張應侯曰大統歷乃元統依守敬法為之凖驗無差必不可改夫使元統果依守敬安得有差統背守敬者也背守敬而差却以為無差何不觀今日之天其躔形圭景立春在亥分寸易辨一指點間可與海內億萬人有目所共見者正孟子所謂天日之故不可求而可坐致者也嘉靖中華湘疏歷之來由黃帝迄秦末凡六改漢高帝迄漢末凡五改由魏文帝迄隋凡十三改由唐高祖迄周末凡十六改由宋太祖迄宋末凡十八改由金熙宗迄元末凡三改然歷代長於歷者不數嵗而輒差杜預曰隂陽之運隨動而差差而不已遂與歷錯夫所以差者由天周有餘日周不足也天周有餘則天常平運而舒日周不足則日常內轉而縮天日之差於中星驗焉堯之冬至初昏昴中而日在虛七度虛者北方之宿則日行北陸躔於元枵之子也今之冬至初昏室中而在箕三度箕者東方之宿則日行東躔於析木之寅也計今去堯末四千年而差五十度矣再以赤道考之勝國至元辛巳改歷天正冬至赤道嵗差一度五十杪今退天三度五十二分五十杪也黃道嵗差九十二分九十八杪今退天三度二十五分七十四杪也故洪武中漏刻博士元統言我朝承運以來厯雖以大統為名而積分猶踵授時之數年遠數盈漸差天度非所以重始敬正也授時法以至元辛巳為歷元至洪武甲子僅一百四年迄今則二百四十二年請以洪武甲子嵗冬至為歷元授時歷法每嵗差一分五十杪約七十年差一度今合差三度餘矣年愈逺而數愈盈治歷者當隨時修改以求合於天否則歷必差是以正德戊寅日食庚辰月食時刻分杪起復方位多與欽天監推算不合臣伏揆古今善治歷者三家漢太初以鍾律唐大衍以蓍策元授時以晷景而晷景為近其所因者本也欲正歷而不登臺測景竊以為皆空言臆見非事實也宜掄選疇人子弟諳曉本業者及冬至前詣觀象臺晝夜推測日記月書至來年冬至以驗二十四氣分至合朔日躔月離黃赤二道昏旦中星七政紫氣月孛羅㬋計都之度視元辛巳所測委有所差偹録上覽昔班固作漢志言治歷有不可不擇者三家専門之裔眀經之儒精算之士臣三者無一夙夜皇皇罔知所措乞敕禮部延訪有能知歷理如楊雄精歷數如邵雍智巧天授如僧一行郭守敬者徵赴京師令詳定嵗差以成一代之懿制改歷之法有四一曰立元二曰測候三曰察度四曰定數夫嵗朔又復謂之元作歷者每以十一月甲子夜半朔旦冬至為厯元必也用太史公三紀大偹之法本范史紀元之日如太初所謂四千六百十七嵗已盡都無絲髮之餘特起新歷之第一日則歷元不差後其可久乎是謂歷元馬融謂天體不可測知天之度惟有璣衡一事夫璣衡即今之渾儀也歷代以來其法漸偹至郭守敬又加詳焉獨不可倣而行之乎是謂測候易之革曰澤中有火革君子以治歷眀時夫作歷有常度也惟觀五星以測三垣觀三垣以測二十八宿觀二十八宿以察中星是謂察度定朔之法必於交時驗之張何所考皆不能無差惟郭守敬以辰集時刻所在之日為定數此為其最精者是謂定朔治歷之人有三一曰専門之裔二曰眀經之儒三曰精算之士夫漢之公孫卿壺遂司馬遷請改正朔矣而不能為算也乃鄧平唐都洛下閎之徒出然後成太初歷崔浩之魏歷稱精矣而惟髙允能辨五星聚井之差程子常曰堯夫差法冠絶古今堯夫常曰揚子雲知歷法又知歷理許衡郭守敬王恂之作歷也窮極四海竭盡心思就晷測影凌駕百代夫唐都洛下閎鄧平専門之裔也子雲堯夫許衡眀經之儒也高允郭守敬王恂精算之士也歷法以十一月甲子朔夜半冬至為一元其時日月五星皆起於牽牛初度更無餘分此以為推步之端每嵗有二十四氣節氣十二中氣十二是每月皆有中氣惟閏月獨無中氣閏前之月則中氣在晦日閏後之月則中氣在朔日舉中氣而正月則置閏不差矣周天三百六十五度四分度之一日之行也日一度自今年冬至至眀年冬至方一周天實計三百六十五箇日零三箇時也而一嵗正有三百六十日更有五日零三箇時辰無所歸著是為日行之餘分每嵗只均分在二十四氣上所謂氣盈者也月之行也日十三度十九分度之七常以二十九日半強與日合於朔是每月又有半日弱無所歸著是為月行之餘分故月不滿三十日而有大小盡焉所謂朔虛者也積日月之餘分每嵗常餘十一日弱故十九年而置七閏月是謂一章之數故云終於終也惟開端不差故時序無愆過中氣既正則寒暑不忒而民心無疑惑置閏得所故作事順時而無悖亂日與天會而有氣盈即歷書所謂大餘五小餘八也月與日會而有朔虛即歷書所謂大餘五十四小餘三百四十八也大餘日也小餘分也五嵗再閏而無餘分歷書所謂無大餘無小餘也周天都計三百六十五度二十四分五十杪分步十二宫惟子午兩宫每宫計三十度四十三分八十杪其餘十宫每宫計三十度四十三分七十九杪嵗必三百六十五日零三時而交春是合周天之度月必三十日零五時二刻而交節是合一宫之度日景每千里差一寸愈南則日短而夜長愈北則日長而夜短幽京在地東北故夏至日晝六十二刻夜三十八刻若洛陽有周公測景臺夏至日晝六十刻夜四十刻歷法天有黃赤二道月有九道此皆強名非實有也亦猶天有三百六十五度何嘗有度以日行三百六十日而一期強謂之度以步日月五星行次而已日之所由謂之黃道南北極之中度最均處謂之赤道月行黃道之南謂之朱道行黃道之北謂之黑道黃道之東謂之青道黃道之西謂之白道黃道內外各四並黃道為九日月之行有遲有速難可以一術御也故因其合散分為數假每一假以一色名之欲以别算位耳歷家不知遂以為實有九道矣崇禎戊辰七月上傳欽天監推算日食前後刻數俱不對天文重事這等錯違卿等傳與他姑恕一次以後還要細心推算如再錯悮重治不饒禮部因具疏請改修歷法奉旨歷法皇祖朝曾議重修今日食刻數復差允宜更正依卿等所請修改一應事宜再著另行具奏禮部復奏略謂治歷明時古人以為重事臣等不敢繁稱止據元史所載以宰相王文謙樞密張易主領裁奏於上仍命左丞許衡參預其事王恂郭守敬並領太史院事分掌測驗推步於下而又博徴楊恭懿諸人助之然猶五年而成六年而頒行十年而進書五種二十六卷後三十年間續進書九種七十九卷則成之甚難矣至順帝北遜以後典章散失止存授時成法數卷方為大統歷僅能依法布算而不能言其所以然之故後來有志之士亦止將前史歷志揣摩推度並未有守敬等數年實測之功力又無前代灼然可據之遺書所以言之而未可行用之而不必驗也按大眀會典凡天文地理等藝術之人行天下訪取考驗收用𢎞治十一年令訪取精通天文者試中取用嘉靖三年科臣建議部覆保舉於是以戶科給事中樂馥工部主事華湘俱升光祿寺少卿提督欽天監事然二臣終不能改守敬之舊所以至今寢閣臣等考之周禮則馮相與保章異職稽之職掌則天文與歷法異科蓋天文占候之宜禁者懼妄言禍福惑世誣人也若歷法則於敬授人時而已豈律例所禁哉今議通行各省直不拘官吏生儒草澤布衣但通曉歷法者具文前來但近世言歷諸家大都宗守敬舊法比於現在監官藝猶魯衛無能翹然出於其上也至於嵗差環轉嵗實參差天有經地有緯列宿有本行日月五星有本輪日月有其會惟覀國之歷有之髙皇帝命吳伯宗與西域馬沙亦黑翻譯歷法蓋以此也萬歷四十年監正周子愚建議欲得參用務會通歸一今宜取其説參用西法果得會通歸一即本朝歷法可以逺邁前代矣大統歷雖本於郭守敬之授時歷然高皇帝精於觀天而特令劉基召集天下律歷名家赴京詳議復自製觀象盤天文分野諸書誠可萬世以為典要者自西洋之法入中國上海徐光啓専習之後湯若望嗣利瑪竇之教而李天經黃應遴等信奉益堅進新歷書一百四十餘本日晷星晷星球星屛窺筒諸器然其法與舊法稍異舊法用日度計日定率西法用天度因天立差舊法用黃道矩度西法用黃道緯度之不同欽天監官生連疏爭執禮部因議另立新法一科允之崇禎十四年禮部議歷法疏看得古今治歷之家多矣其最精者漢雒下閎太初歷以鍾律唐一行大衍歷以蓍䇿元郭守敬授時歷以晷景皆稱推驗之精而晷景為近然用之既久皆不能無差蓋天與日月星辰其體皆動而其最不可測者常在於杪忽之間推移盈縮聖智有不能盡窮故雖以時分刻刻分杪非不至細而差之半杪積之嵗月則躔離朓朒皆不合原算此治歷之所以難也我皇上因監法少差特置西法一局令禮臣徐光啓領其事而寺臣李天經陪臣湯若望等與欽天監張守登諸臣覿靣講求逐年推較十餘年來如日月交食五星伏見之類臣等屢經會同赴觀星臺占測而御前亦用赤儀器親自臨驗西法比監法實為密近固昭然不待辨者守敬成歷時嘗言天體難測須每嵗創驗修改庶幾可使如三代日官世専其職未嘗自以為足也高皇帝精於觀天雖用守敬歷而特令劉基召集天下律歷名家者赴京詳議復自製觀星盤天文分野諸書且别立回回一科亦未嘗以守敬之歷為足也蓋其慎也當時博士元統成化中邱濬正德中鄭善夫嘉靖中華湘萬歷中邢雲路諸臣皆以差訛疏請更正今得西歷與之較驗而舊歷之不能不差則守敬固已自言之矣臣部尚書林欲楫向與臣等詳察經緯新歷誠如所言交食節氣用新神煞月令諸欵用舊未為不可而再四商確有不得不鄭重者舊法用日度計日定率西法用天度因天立差舊法用黃道矩度西法用黃道緯度雖微有不同然其黃赤儀器與守敬簡儀仰儀候極景符玲瓏立運等儀亦皆相似特守敬之徒沿習不察耳自古歷法輒數十年一改而守敬之歷行之已三四百年矣小差者惟日月交食時同刻異無大懸絶至置閏之差起於春秋分所差二日而西歷定分之日即舊歷所注晝夜各五十刻之日也在今日西法較密在異時亦不能保其不差則一畨更改良不易言據天經原疏曽請將在局生儒盡收之欽天監以便隨時測驗將新法暫附大統以便公同考證而前奉明旨亦令監官張守登等於交食經緯晦朔弦望年逺有差者旁求參考又以新法推測屢近著照回回科例收監學習實為得之似宜敕下另立新法一科遇交食節氣同異據法直陳以俟測驗而後徐商更改庶有當乎其寺臣李天經及陪臣湯若望中書黃應遴新局官生黃宏憲等纍年新歷書一百四十餘本日晷星晷星球星屏窺筒諸器多歷家所未發専門勞勩積有嵗年似宜量加敘録而該監官生學習則有會典按月按季課試嚴行賞罰之例所當重加申飭者也乃臣等區區之愚猶有進焉歷為敬天授民設也敬天在順時布令觀變警心其所重莫如刑賞授民在東作西成南訛朔易其所重莫若農桑故堯舜之歷以釐上熙績為欽天而成周之歷以無逸豳風為月令非徒如保章挈壺之流斤斤於時刻分杪之末而已凡歷數始於河圖五十有五以十乘之為五百五十以五乘之為二百七十有五自洪武元年戊申距今壬午蓋二百七十有五年矣實為河圖中候宜修眀禮樂先德後刑勸民農桑敦崇仁厚以昌扶國脈基萬年有道之長其斯為治歷之本務乎漢儒言眀王謹於尊天慎於飬人故立羲和之官以節授民事奉順隂陽則日月光眀風雨時節災害不生我皇上敬天勤民同符二祖故知有敬授精思非臣等迂陋所能測識萬一也授時歷要法歌歌曰授時歷法君要知但以九年舊歷推古云但見九年兔望日便是今年正月一月大月小起初一看其初一天地支天下不言干者為詩句所拘然舉支以見干也當推九年前歷每月初一是何干支便以此干支依後法數去大月天干五支九且如大月天干五地支九假令初一日甲子甲至戊五數也子至申九數也即以戊申為今日朔小月天四地八耦且如小月天干四地支八假令初一日丙寅丙至已四數也寅至酉八數也即以己酉為今日朔古云前九之年起算法大月五九小四八月大三十日無差如初一日己酉數至次日朔見己卯即月大也月小分眀只草九如九朔數至次月朔止二十九日即月小也節氣只憑九年歷假若造甲午日歷則看丙戌節氣二十四氣真端的要知今年節氣只看前九年是何節氣天干三數地支七假如癸亥日癸見乙三數亥見已七數也熟記胸中須歷歷定時二十四年取逢時遇八君無慮如逢子時交節氣却用未時亦交也中氣如之若依此法箇中推方省隂陽元奧處閏月本來中氣無古云閏月無中氣何勞物外更他圖世人暗得神仙術不是愚氓是丈夫又歌曰九年二月半便是正月一前九年二月十五日辰即今年正月初一日辰該九十七箇半月二千八百八十日六甲轉四十八周九年中試取大小無差失又歌曰若要求立春相衝對食神假如前九年甲子日立春甲食丙子衝午即今年丙午日立春也二十四氣準此閏月無中氣説與惺惺人葉子竒論授時歷曰歷自上古黃帝以後莫不隨時考驗以與天合故歷法無數更之弊及秦滅先世之術置閏於嵗終古法殆廢矣由漢而下以積年日法為推步之凖以至於今夫天運流行而不息欲以一定之法拘之未有久而不差之理差而必改其勢有不得不然者乃命改造儀象日測月驗以與天合庶永終無弊元詔定歷名曰授時取堯典敬授人時之義自古歷多用一定之法故未久而差由不知天為動物而嵗亦略有差也古歷雖立差法五十年差一度又太過一百年差一度又不及七十五年差一度稍為近之尚未精密守敬以八十一年而差一度算已往減一算將來加一算始為精密回回歷漢律歷志曰三代既沒五伯之末史官喪紀疇人子弟分散或在外國外國之有歷亦自中國而流者也然東方北地南蠻皆不聞有歷而西域獨有之蓋西域諸國當崑崙之陽於諸國中為得風氣之正故多異人若天竺梵學婆羅門技術皆西域出也自隋唐以來已見於中國今世所謂回回歷者相傳為西域馬可之地年號阿剌必時異人馬哈麻之所作也以今考之其元實起於隋開皇十九年己未之嵗其法常以三百五十五日為一嵗嵗有十二宫宫有閏日凡百二十有八年閏三十有一日又以三百五十四日為一周周有十二月月有閏日凡三十年閏十有一日歷千九百四十一年而宫月甲子再會其白羊宫第一日日月五星之行與中國春正定氣日之宿直同其用以推步分經緯之度著陵犯之占厯家以為最密元之季世其歷始東逮我髙皇帝之造大統歷也得西人之精乎歷者於是命欽天監以其歷與中國歷相參推步迄今用之今按嵗之為義於文從步從戌謂推步從戌起也白羊宫於辰在戌豈推步自戌時見星為始故與御製文集有授翰林編修馬沙亦黑馬哈麻敕文謂大將入元都得祕藏之書數十百册乃乾方先聖之書我中國無解其文者聞爾道學本宗深通其理命譯之今數月測天之道甚是精詳時洪武壬戌十二月也三人在翰林凡十餘年豈所譯者即此歷書與當俟知者考諸韓苑洛論天文天體至圓天本無涯何體之可測度謂天體者二十八宿之環列者以次相挨左旋地外此天盤之內地平之外可測度者也周圍三百六十五度四分度之一九百四十分為一度四分度之一者將九百四十分分為四分每分該二百三十五分則天體周圓共該三百六十五度零二百三十五分角十二度亢九度氐十六度房六度心六度尾十九度箕十一度斗二十五度牛七度女十一度虛九度危十六度室十七度壁九度奎十六度婁十二度胃十五度昴十一度畢十七度觜二百三十五分參十度井三十四度鬼三度柳十四度星七度張十七度翼十九度軫十七度繞地左旋常一日繞地一周而過一度冬至初一日角起子字位到第二日時則過子位一度稍東矣二十八宿天盤一定之次如二十八宿釘在車輪輪轉則釘轉角行則二十七宿皆行角易一度則二十七星皆易一度到那三百六十五日零三個時辰時恰好天多行了一遭日麗天而少遲故日行一日亦繞地一周而在天為不及一度積三百六十五日九百四十分日之二百三十五而與天會是一嵗日行之數也此九百四十分是説日二百三十五分是四分日之一天以九百四十分為一度日以九百四十分為一日二百三十五分是三個時把十二時分作四分也九百四十分日之二百三十五者是説九百四十分中的二百三十五分蓋三百六十五日零那九百四十分中的二百三十五分若只説三百六十五日零二百三十五分為尤眀渠却帶其母而言之天與日冬至初一日子時同在子一度上起到初二日時日只到舊位天則過子位二度上了一日過一度十日過十度一百日過一百度三百日過三百度又五十五日則過三百五十五度還有二百三十五分又三個時辰時又過二百三十五分則與日到寅字上會日與天會是一年已畢又起第二年矣嵗之有三百六十五日零四分日之一者以天體有三百六十五度四分度之一也月麗天而尤遲一日常不及天十三度十九分度之七積二十九日九百四十分日之四百九十九而與日會凡月與日會自朔至晦凡二十九日零六箇時辰有竒十九分度之七難算若照常數以十計之雖微杪不盡其餘今釐以下通變其法以四竒為一釐十九息為一竒則乘除始無竒零以九百四十分分為十九分每分該四十九分四釐二竒十八息內取七分該三百四十六分三釐十二息十二會得全日三百四十八此十二個二十九日餘分之積又五千九百八十八此十二個四百九十九分如日法九百四十而一得六不盡三百四十八日法九百四十分為一日以九百四十分為一日約之前五千九百八十八該六日零三百四十八分而一者一日也得六者得六日也通計得日三百五十四九百四十分日之三百四十八以全日三百四十八及餘積六日並不盡之數通共三百五十四日零三百四十八分是一嵗月行之數也嵗有十二月月有三十日三百六十者一嵗之常數也故日與天會而多五日九百四十分日之二百三十五者為氣盈月與日會而少五日九百四十分日之五百九十二者為朔虛合氣盈朔虛而閏生焉天運有常何嘗有有餘不足之數其不能齊者厯不能齊也所以置閏者只為月氣不能與節氣相同故反以節氣就朔氣若不論朔只一節一中排定則節氣又正歷亦省便但初一月不與日會十五月不圓耳然不用朔氣似與天時無害夫有陽必有隂月之氣亦自與萬物相關豈可不論三百六十者一嵗之常由前靣所注日與天會為三百六十五日零三時多五日強月與日會三百五十四日零七時強為少五日日五日多月五日少相合來十日然皆是月之不足者故一嵗閏率則十日九百四十分日之八百二十七將及十一日三嵗一閏則三十二日九百四十分日之六百單一五嵗再閏則五十四日九百四十分日之三百七十五十有九嵗七閏則氣朔分齊是為一章也十有九年餘一百九十日一萬五千七百十三分以日法除之得二百六日六百七十三分為七閏之數氣朔之分齊矣三百六十為一嵗之常者甲子六十日甲寅六十日甲辰六十日甲午六十日甲申六十日甲戌六十日六六三百六也大餘是月不及天之數小餘是日不及天之數堯冬至日在虛昏中昴今冬至日在斗昏中壁中星不同者蓋天有三百六十五度四分度之一嵗有三百六十五日四分日之一天度四分之一而有餘嵗日四分之一而不足故天度常平運而舒日道常內轉而縮天漸差而西嵗漸差而東斗二十五度牛七度女十一度虛九度共五十二度壁九度奎十六度婁十二度胃十五度昴十一度共六十三度昏中多十一度者蓋日在斗之末昏中在畢昴之中歟大較若此晉虞喜始以天為天以嵗為嵗乃立差以追其變約以五十年退一度何承天以為大過乃倍其年而又反不及至隋劉焯取二家中數七十五年為近之以七十五年乘九百四十分每年該十二分半強自堯甲子至宋寧宗己未以七十五約之則五十二度雖未齊一亦不甚逺天運微杪雖巧歷不能齊歷家那前趲後以步之如閏法耳二十八宿安次則由右運行則由左邢雲路歷高陽孫承宗邢觀察古今律歷考序古者天子有日官居卿以底日而授百官於朝蓋四序視五緯而五緯視日度故以日名官而歷法之顯者乃在定朔定朔者求日與月合度而取之乎􅝚故課􅝚之分刻而合朔之早晚氣候之遲速置閏之乖合昭有劵驗是以歷家仰觀黃赤表裏隂陽交錯而立之法乃其消長欲親其加時欲細其綜畸零長短欲精嘗讀諸家歷説至大衍十二議即間有牽合乎而實啓之窽若勝國授時歷則又參别同異酌取中數即測景遂至二十有七隅故法獨精而他或泥意泥經以行妬競故朔日有進退而氣節日分有誤豫不知今歷何如而頃言課􅝚不效則嵗差之法未盡合天而歷應改及讀士登律歷書鑿鑿發吾覆也夫律厯起於數而士登精九章以理御數故成聲見象確孚成説豫因卒業而嘆歷代法漸加詳數漸加密後之人即豫飾所未偹要不得忘創初而笑前人之未工然窮天運於心計而釐刻易亂故差法淆而歷改無論漢之五唐之八宋之十六即唐虞敬授之後不七十年而輒在璣衡齊七政其協日正月嵗行之方國假令嵗與天易齊而無差則唐虞之際寧多事也國家歷法仍授時而授時之無幾輒改三應豈其異世異人而可承訛謬者往代厯不效輒收草澤與司歷並驗至付布衣説於史館乃宗伯韙士登議請倣居卿之意而格不行夫歷竟安訛謬也則已倘欲正訛定嵗則士登議具在安得格勿行昔魯史螽書之誤説者曰過在司歷而次年再誤則説不行於魯耳豈眀盛之世而亦格正議者常嘆立言家談改率習空文而至可見之行事輒結舌不談即談所可行亦或從旁慫恿而不必以身試今士登議鑿鑿可行而又可身試也乃不可與草澤之説一參驗乎然士登抱經世術天子方用以康國寧人即律歷之學未易而𨽻首可窮星翁可步乃何足盡士登士登且入踐九列天子將以其暇召司天有心計者受士登法而試之以正其訛則歷何足煩士登也王郡公翼庭以大中丞孫公藍石大參執張公和節之檄刻其書於郡且以豫郡人也而辨之辭河南僉事邢雲路修歷四事疏略謂窺天之器無踰觀象測景候時籌策四事乃今之日至大統推在申正二刻臣測在未正一刻是大統實後天九刻餘矣不寧惟是今年立春夏至立冬皆適值子午之交臣測立春乙亥而大統推丙子臣測夏至壬辰而大統推癸巳臣測立冬巳酉而大統推庚戌夫立春與冬乃王者行陽德隂德之令而夏至則其祀方澤之期也今皆相隔一日則理人事神之謂何是豈為細故且歷法踈密驗在交食自昔記之矣乃今年閏八月朔日有食之大統推初虧已正二刻食幾既而臣候初虧已正一刻食止七分餘大統實後天幾二刻而計閏應及轉應若交應則各宜如法增損之矣蓋日食八分以下隂歷交前初虧西北固歷家所共知也今閏八月朔日食實在隂歷交前初虧西北其食七分餘眀甚則安得謂之初虧正西食甚九分八十六杪耶而大統之不效亦眀甚然此八月也若或值元日於子半則當退履端於月窮而朝賀大禮當在月正二日矣又可謂細故耶此而不改臣竊恐愈久愈差將不流而至春秋之食晦不止臣故曰閏應轉應交應之宜俱改也久之刑科給事中李應䇿亦言國朝歷元聖祖崇諭二説難憑但驗七政交會行度無差者為是惟時以至元辛巳揆之洪武甲子僅百四年所律以差法似不甚逺至正德嘉靖已當退三度餘奚俟今日哉春秋不食朔猶直書官失之今日食後天幾二刻冬至後天逾九刻計氣應應損九百餘分乃云弗失乎歷理微渺日月五星運轉交會咸取應於窺管測表歐陽修所謂事之最易差者雖古太初大衍諸書詎不深思元解行羲和氏之歷象授時遺意然果以鍾律為數無差則太初歷宜即定於漢而後之為三統四分者若何又果以蓍䇿為術無差則大衍歷亦當即定於唐而後之為五紀貞元觀象者又若何蓋隂陽迭行隨動而移移而錯錯而乖違日陷不止則躔離之謬分至之忒積此焉窮雲路持觀象測景候時籌䇿四事議者應宜俱改使得中祕星歷書一編閲而校焉必自有得於是欽天監正張應侯等疏詆其誣禮部言使舊法無差誠宜世守而今既覺少差矣失今不修將嵗愈久而差愈逺其何以齊七政而釐百工哉理宜俯從雲路所請即行考求磨算漸次修改但歷數本極元微修改非可易議蓋更歷之初上考往古數千年布算雖有一定之法而成歷之後下行將來數百年不無分杪之差前此不覺非其術之踈也以分杪布之百餘年間其微不可紀蓋亦無從測識之耳必積至數百年差至數分而始微見其端今欲驗之亦必測候數年而始微得其概即今該監人員不過勦襲故常推衍成法而已若欲斟酌損益録舊為新必得精諳歷理者為之總統其事選集星家多方測候積算纍嵗較析毫芒然後可為凖信裁定規制伏乞即以邢雲路提督欽天監事該監人員皆聼約束本部仍博訪通曉歷法之士悉送本官委用務親自督率官屬測候二至太陽晷刻逐月中星躔度及驗日月交食起復時刻分杪方位諸數隨得隨録一切開呈御覽積之數年酌定嵗差修正舊法則萬世之章程不易而一代之寶厯惟新其於國家敬天勤民之政誠大有禆益矣疏奏留中不報授時歷至元辛巳黃道躔度十二交宫界守敬所測也至今三百餘年冬至日躔已退五度則宜另步日躔宫界另以赤道變黃道以合今時在天宫界從古歷家未有以三百年後仍用三百年前黃道者而何欽天監之茫然莫覺也考唐志云日躔宿度如郵傳之過宿度既差黃道隨而變矣元志云黃道宿度據嵗差每移一度依術推變嘉靖初樂頀掌監事上言歷經即嵗差以推變黃道六十七年該推變一次本監失於推變頀又嘗語人云往年在監未奉更正甚為遺憾頀有文集可考也胡大統不是之察也元大都即今順天府授時歷大都測影夏至晝六十二刻夜三十八刻冬至晝夜刻反是洪武初南京測影夏至晝五十九刻夜四十一刻冬至反是今欽天監以授時大都之歷法布洪武南京之刻漏冬夏二至各差三刻以故正統十四年歷冬夏至六十一刻想監官以漏記之覺其差而改者人驗以為異而不知為順天測影宜然之數也夫冬夏二至盈縮之始二至既差則分至以次皆差然則一期之中盈縮損益有一日一時一刻之不參差者乎以是而頒行天下為民授時空使人夢中度日骨董瞢䠢也西洋歷徐光啓修歷十事疏其一議嵗差每嵗東行漸長漸短之數以正古來百五十年六十六年多寡互異之説其二議嵗實小餘昔多今少漸次改易及日景長短嵗嵗不同之因以定冬至以正氣朔其三每日測驗日行經度以定盈縮加減真率東西南北髙下之差以步月躔其四夜測月行經緯度數以定交轉遲疾真率東西南北髙下之差以步月離其五密測列宿經緯行度以定七政盈縮遲疾順逆違離逺近之數其六密測五星經緯行度以定小輪行度遲疾留逆伏見之數東西南北髙下之差以推步凌犯其七推變黃赤道廣狹度數密測三道距度及月五星各道與黃道相距之度以定交轉其八議日月去交逺近及真會似會之因以定距午時差之真率以正交食其九測日行考知二極出入地度數以定周天緯度以齊七政因月食考知東西相距地輪經度以定交食時刻其十依唐元法隨地測驗二極出入度數地輪經緯以求晝夜晨昏永短以正交食有無先後多寡之數因舉南京太僕寺少卿李之藻西洋人龍化民鄧玉函同襄厯事疏奏報可李之藻請譯西洋歷法疏伏見大西洋國歸化陪臣龎迪我龍化民熊三拔陽瑪諾等諸人慕義逺來讀書談道俱以穎異之資洞知歷算之學携有彼國書籍極多久漸聲教曉習華音在京仕紳與講論其言天文歷數有我中國昔賢談所未及者凡十四事一曰天包地外地在天中其體皆圓皆以三百六十度算之地徑各有測法從地窺天其自地心測算舉其地靣測算者皆有不同二曰地靣南北其北極出地髙低度分不等其赤道所離天頂亦因而異以辨地方風氣寒暑之節三曰各處地方所見黃道各有髙低斜直之異故其晝夜長短亦各不同所得日影有表北影有表南影亦有周圍圓影四曰七政行度不同各自為一重天層層包褁推算周徑各有其法五曰列宿在天另有行度以二萬七千餘嵗一周此古今中星所以不同之故不當指列宿之天為書夜一周之天六曰月五星之天各有小輪原俱平行特為小輪旋轉於大輪之上下故人從地靣測之覺有順逆遲疾之異七曰嵗差分杪多寡古今不同蓋列宿天外别有兩重之天動運不同其一東西差出入二度二十四分其一南北差出入一十四分各有定算其差極微從古不覺八曰七政諸天之中心各與地心不同處所春分至秋分多九日秋分至春分少九日此由太陽天心與地心不同處所人從地而望之覺有盈縮之差其本行初無盈縮九曰太隂小輪不但算得遲疾又且測得髙下逺近大小之異交食多寡非此不確十曰日月交食隨其出地髙低之度看法不同而人從所居地靣南北望之又皆不同兼此二者食分乃審十一曰日月交食人從地靣望之東方先見西方後見凡地靣差三十度則時差八刻二十分而以南北相距二百五十里作一度東西則視所離赤道以為減差十二曰日食與合朔不同日食在午前則先食後合在午後則先合後食凡出地入地之時近於地平其差多至八刻漸近於午則其差時漸少十三曰日月食所在之宫每次不同皆有捷法定理可以用器轉測十四曰節氣當求太陽真度如春秋分日乃太陽正當黃赤二道相交之處不當計日勻分凡此十四事者臣觀前此天文歷志諸書皆未論及或有依稀揣度頗與相近然亦初無一定之見惟是諸臣能偹論之不徒論其度數而已又能論其所以然之理蓋緣彼國不以天文歷學為禁五千年來通國之俊曹聚而講究之窺測既核研究亦審與吾中國數百年來始得一人無師無友自悟自是此豈可以踈密較者哉嵗差考嵗差法堯時冬至躔在虛一度夏至在柳十四度春分在胃十二度秋分在氐十度至唐開元大衍厯冬至日躔在斗十度夏至在井十度春分在奎七度秋分在軫十四度宋統元歷冬至在牛二度夏至在井六度春分在奎初度秋分在軫七度此歷代之歷可驗者如此然雖有進退其度不出一舍前後蓋天運星行動體也未免或前或却小有不齊歷家步算乃死法耳安得與天相符故曰嵗差後世隨時占候修改求與天合又不得不然也漢自鄧平改歷之後洛下閎謂八百年當差一度當時史官考諸上古中星知大初歷已差五度而閎未究蓋古之為歷未知有嵗差之法其論冬至日躔之宿一定而不移不知天日會道不得均齊餘分積久度數必爽今嵗之日躔在冬至者視去嵗冬至之躔常有不齊之分至晉虞喜始覺其差乃以天為天嵗為嵗立差法以追其變而算之約以五十年日退一度然失之太過宋何承天倍增其數約以百年退一度而又不及至隋劉焯取二家中數以七十五年為近之然亦未甚密至唐僧一行乃以大衍歷推之得八十三年而差一度自唐以來歷家皆宗其法大衍法有云日躔一歲行周天度未遍而日已至故每嵗有不及之分約天一度為三千四十分計一嵗不及之分三十有六大積而至于八十三年則差三千四十分為差一度矣然猶未至也至元朝郭守敬算之約六十六年而差一度算已往減一算算將來加一算而嵗差始為精密至今三百餘年臺官推演又多不合天道識者往往奏請再改歷元以正嵗差嗟乎天動物也進退盈縮未免少有不齊一定之法不可拘也劉焯取虞何二家中數定以七十五年當時善矣至唐而復差僧一行以八十三年時為合天矣至宋元之交而復差許衡郭守敬定以六十六年當時以為精矣至今又復有差然則一定之法顧可拘執也哉况法亦自有權宜者如定嵗之法四期餘一日之數分於四期則二至之定每疑於絲忽之間須酌量以定無常凖者定日之法一日變為九百四十畫者以氣朔有不盡之數難分也每月三十日一氣盈四百一十一畫二十五杪一朔虛四百四十一畫積盈虛之數以成閏故定朔必視四百四十一畫之前後以為朓朒故定朔每疑於一畫之間要亦須酌量以定無常凖者如日月交食之法時刻分杪最為精微及至半杪難分之處亦須酌量以定無常凖焉夫至之絲忽朔之一畫食之半杪積之嵗久則皆差失不合原算矣以天道不齊之動加以嵗久必差之法欲守一定之算夫安可得是故隨時考驗以求合於天此為至當堯時冬至在虛於今豈可固執也哉唐順之勾股測望論勾股所謂矩也古人執數寸之矩而日月之運行朓朒遲速之變山溪之髙深廣逺凡目力所及無不可知蓋不能逃於數也勾股之法橫為勾縱為股斜為弦勾股求弦勾股自乘相併為實平方開之得弦勾弦求股勾弦自乘相減為實平方開之得股股弦求勾同法蓋一弦實藏一勾一股之實一勾一股之實併得一弦實也數非兩不可行因勾股而得弦因股弦而得勾因勾弦而得股三者之中其兩者顯而可知其一者藏而不可知因兩以得三此勾股法之可通者也至如逺近可知而高下不可知如卑則塔影髙則日影之類塔影之在地者可量而人足可以至於戴日之下而日與塔高低之數不可知則是有勾而無股弦三者缺其二數不可起而勾股之法窮矣於是有立表之法蓋以小勾股求大勾股也小勾股每一寸之勾為股長幾何則大勾股每一尺之勾其長幾何可知矣此以人目與表與所望之高三相直而知之也人目至表小弦也人目至所望之髙大弦也又法表為小股其高幾何與至塔下之數相乘以小勾除之則得塔高蓋橫之則為小股至塔之積縱之則為小勾至塔頂之積縱橫之數恰同是變勾以為股因橫而得縱者也勾股弦三者有一可知則立表之法可得而用若其髙與逺之數皆不可知而但目力可及如隔海望山之類則勾股弦三者無一可知而立表之法又窮矣於是有重表之法蓋兩表相去幾何為影差者幾何因其差以求勾股亦可得矣立表者以通勾股之窮也重表者以通一表之窮也其實重表一表也一表勾股也無二法也崇禎七年山東參政李天經疏七政之餘依新法則火土金三星本年九月初旬會於尾宿之天江左右木星於是月前犯鬼宿之積尸氣一時五緯已有其四非必以數合天即天驗法之一據也從來歷家於列宿借星有經度無緯度雖回回歷近之猶然古法故臣等所推經緯度數時刻與監推各各不同如本年八月秋分大統厯算在八月三十日未正一刻新法算在閏八月二日未初一刻一十分相距兩日臣於閏八月二日同監局官生測太陽午正髙五十度零六分尚差一分入交推變時刻應在未初一刻一十分吻合新歷隨取輔臣徐光啓從前測影簿數年俱合春秋傳曰分同道也至相過也二語可為今日節變差訛之一證蓋太陽行黃道中線逮二分而黃道與赤道相交此晝夜之所以平而分應所由起也逮二至則過赤道內外各二十二度有竒夫過赤道三十三度為真至則兩道相交於一線詎不為真分乎太陽有平行有實行平則每日約行若干而實則有多有寡不獨秋分為然謹將諸曜會合凌犯行度開具禮部委司官同監局官生詳議以聞春眀夢餘録卷五十八
