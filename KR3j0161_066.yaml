body:
  text: 春明夢餘録卷六十六吏部左侍郎孫承澤撰寺廟晉像觀音寺天福中僧道翊所造後漢乾祐中僧從勳以佛舍利親安大士頂烏珠入臨安宋髙宗遜於海遂與玉帛圖籍俱航而北僧志完率徒以從至燕都城西五里玉河鄉建寺居之天順壬午及成化乙酉俱重修晉嘉福寺唐改龍泉寺即今潭柘寺也寺兩鴟尾自潭中湧出竒偉之甚昔謂有柘千萬章今亡矣僧新種者存其名耳燕諺謂先有潭柘後有幽州此寺之最古者也後魏尉使君寺建於元象元年戊午幽州刺史尉萇命造後改為智泉寺武則天時改為大雲寺開元中改為龍興寺在憫忠寺前隋造塔藏舍利處隋舍利塔建於仁夀二年壬戌正月初文帝為太子時有梵僧以釋迦佛舍利遺之至登極敕天下大州建舍利塔時幽州節制竇抗造五層木塔扄舍利於其下至唐文宗太和八年塔災宣宗大中丙寅得石函於故基下移置於憫忠寺多寶塔下僖宗中和壬寅又災延燒憫忠寺樓臺俱燼昭宗景福壬子遷舍利於閣內隋天王寺今之天寧寺開皇中建唐開元中修明正統中重修始改今名內有塔髙十三尋每每現光其影入殿之門窗隙內一塔散為數十塔影皆倒也唐火神廟在皇城北貞觀中建元至正六年重修萬歷三十三年始增碧瓦後有水亭可望北湖唐吉祥寺在城西南隅萬歷丙午重修改名石鐙庵蓋修時於地掘得石鐙上刻唐人所書心經萬歷中翰林黃輝陶望齡集縉紳於此放生後林增志踵行之尤盛唐憫忠寺建於貞觀十九年太宗憫東征士卒戰亡者收其遺骸葬幽州城西十餘里許為哀忠墓又於幽州城內建憫忠寺作佛事以超度之中有髙閣故但以閣名唐諺憫忠髙閣去天一握是也寺前有隋藏舍利塔所謂智泉寺也及塔災始移舍利塔於憫忠寺中今石函尚存寺前空地即雙塔舊基唐晉陽庵供大士像上刻大唐貞觀十四年尉遲敬德監造庵在宣武門外後移受水塘古佛庵庵壞移稽山㑹館唐聚慧寺武德中建正統中改萬夀寺在城西戒壇唐兜率寺今名永安俗呼卧佛寺殿前娑羅樹來自西域唐建寺時所植今大三圍髙參天唐佑聖教寺在通州城內西北隅內浮圖十三層髙三百八十尺下作蓮花臺座髙百二十尺周圍百四尺虛其中以祀佛考斷碑創於唐貞觀七年歷五代宋遼金元凡八世始成塔頂有鐵矢一相傳金將楊彥升射鏃於其上迄今猶存每天氣晴朗塔影垂映白河中唐淤泥寺即今鷲峰寺鷲峰者唐僧之號也見唐人石刻心經中寺在內城西隅中有旃檀瑞相元學士程巨夫記云釋迦如來初為太子誕七日母摩耶棄世生忉利天佛既成道思念母恩遂升忉利為母說法優闐國王欲見無從乃刻旃檀為像目犍連尊者以神力攝三十二匠升忉利天諦觀相好三返乃成及佛返人間王率臣庶同往迎佛此像騰步空中向佛稽首佛為摩頂受記曰我滅度千年之後汝從震旦廣利人天像由是飛歷西土一千二百八十五年龜兹六十八年凉州一十四年長安一十七年江南一百七十三年淮安三百一十七年復至江南二十一年北京汴京一百七十七年北至燕京居聖安寺十二年北至上京大儲慶寺二十年南還燕京內殿五十四年丁丑三月燕京火迎還聖安寺五十九年元世祖迎入仁智殿十五年遷於萬安寺一百四十餘年蜀僧紹乾續記云復居慶夀寺一百二十餘年嘉靖戊戌慶夀寺災奉迎鷲峰寺迄天啓丁卯共居八十八年計優闐造像當周穆王辛卯至熹宗丁卯凡三千六百一十餘年其說荒唐不足信然佛之體制衣紋踽踽欲動非近代人所能辦五代瑞雲寺李克用建今改百家寺在百花山金彌陀寺即法藏寺在外城東南金大定中建景泰二年修後有塔中空可登凡七級髙十丈餘金護聖寺即功德寺宣德中僧板庵重修改今名金雀兒庵在潭柘寺後章宗彈雀於此即行幄建庵金昊䒶寺大定四年秦越公主建正統四年王振修改隆恩寺金大定寺章宗建有詩刻石今改棲隱寺在仰山金甘露寺即香山寺建於大定中正統時內侍范宏重建費銀七十餘萬傍一軒萬歷御題曰來青山有祭星臺護駕松夢感泉皆金章宗遺跡遼白塔寺建於夀昌二年塔制如幢色白如銀至元八年加銅網石欄天順二年改名妙應寺附近有青塔寺黑塔寺然寺存而無塔元天慶寺原遼之永泰寺大安兵毁元世祖至元壬申重建明成化二年錦衣指揮朱善重修後有髙閣可望天壇僧舍中有李龍眠畫羅漢十六軸元學士袁桷記至治三年三月甲寅魯國大長公主集中書議事執政官翰林集賢成均之在位者悉㑹於南城之天慶寺命祕書監丞李某為之主其王府之寮宷悉以佐執事籩豆靜嘉尊斚潔清酒不强飲簮佩雜錯水陸畢凑各執禮盡歡以承飫賜而莫敢自恣酒䦨出圗畫若干卷命隨其所能俾識於後禮成復命能文詞者敘其歲月以昭示來世竊嘗聞之五經之傳左國是先女史之訓有取於繪畫將以正其視聼絶其念慮誠不以五采之可接而為之也先王以房中之歌逹於上下而草木蟲魚之纎悉因物以喻意觀文以鍳古審時知變其謹於朝夕者盡矣至於宫室有圖則知夫禮之不可僭溝洫田野則知夫民生之日勞朝覲贊享冕服懸樂詳其儀而慎别之亦將以寓其警戒之道則是魯國之所以襲藏而躬玩之者誠有得夫五經之深意夫豈若嗜竒侈聞之士為耳目計哉河水之精上為天漢昭回萬物矞雲興而英露集也吾知縑緗之積寶氣旁逹候占者必於是乎得之泰定元年正月具官袁桷記元報國寺在元彰義街今廣寧門內成化改大慈仁寺後有髙閣西山翠色以手可捫前殿竒松離竒飛舞有如怒虬閣下窑變觀音僅髙尺許寶冠緑帔瞑而右倚以手承頥宛是吳道子妙畫蔣德璟記報國寺在宣武門外可二里成化中重修蓋憲宗為皇太后祝釐處初入東廊憩禪悅庵少遲入寺後總聖門禮佛兩傍名畫百二十軸皆天堂地獄變相僧云宫內送至寺者登大毗盧閣可三十六級為王母及母兩太君遙祝畢閣外通廊環行一周俯視西山若在襟袖宫闕城市具在目中旁精舍一枝繁花或云梨或云杏甚艷遂行觀成化劉公定之碑出總聖門右轉入僧房有海棠一巨叢其幹大可數圍出過後殿多松樹及核桃再出過正殿則雙松怪甚矣雙松偃蓋皆數百年物東者髙可三四丈有三層西則僅髙二丈許而枝柯盤屈低亞橫斜其䕃數畝虬角龍髯披拂鱗皴其最修而壓地者以數十紅架承之因移榻其下梳風幕翠一庭寒色元慶夀寺即雙塔寺在西長安街有二塔一九級一七級寺僧海雲可庵葬其下僧像尚存皆團龍魚袋海雲像有門弟子劉秉忠贊舊有石刻金章宗飛渡橋飛虹橋六大字嘉靖十七年燬元般若庵在北湖之南萬歷中始增宏麗改名金剛寺僧雪浪講經其中士紳多從之遊吳中姚現聞先生著凖提像讃刻寺中元靈福寺阜成門外韓家山寺有二竒松漢循吏韓延夀家此山元祐聖王靈應廟即今都城隍廟在城西刑部街永樂遷都新其廟宇正統中重修內有石刻北平府三大字半埋土中相傳下尚有城隍廟三字元崇國寺元有二崇國寺此乃北寺至元中建至宣德改名隆善成化壬辰又增護國二字寺為托克托丞相故宅今佛座下立一幞頭朱衣老叟一鳳冠朱裳老嫗乃其夫婦也後僧録司右姚廣孝一像一主在焉廣孝舊配享廟廡嘉靖九年閣臣李時以髠徒不便在廟乃將其主送大興隆寺寺災移此其像上自題一偈看破芭蕉拄杖子等閒徹骨露風流有時搖動龜毛拂直待虛空笑㸃頭後署獨庵老人題獨庵廣孝號也釋名道衍字斯道元東嶽廟舊稱仁聖宫在朝陽門外真人張留孫買地大都齊化門外擬為宫以祀東嶽大帝未成至治壬戌其徒吳全節始畢工賜名仁聖宫泰定乙丑魯國大長公主出資巨萬更為寢宫又賜名昭德殿其像乃昭文館學士劉元手製兩傍侍臣倣唐開國功臣像為之故赫赫有生氣劉元字秉元寶坻人官至昭文館大學士正奉大夫祕書監卿凡兩都名剎有塑土範金摶換為佛一出元手天下無與比元石湖寺在德勝門內北湖傍後為方閣老園元鐡牛廟在舊燕城東南有土埋鐡牛露脊元人立廟祀之元昭應寺在西阜成門外至元中建正德八年重建修元法王寺即今廣通寺在髙梁橋西北寺四角有石樓門前玉河水色如碧古栁參天髙梁一橋橫亘水上余少時讀書東角樓者三年西山黛色時照書幌元從容庵元僧萬松老人建所著有從容録今磚塔尚存在宣武門內乾石橋北元碧雲庵在西山建於元雅克伊勒吉正德中內監于經拓之為寺經以佞幸得寵於通灣等處開設皇店嵗報上銀八萬兩餘以自飽乃為寺於香山而立塜域於後所費以萬萬計嘉靖初下獄死籍其家天啓三年內璫魏忠賢重修土人呼為于公寺朝天宫在皇城西北元之天師府也宣德中倣南都之制建三清殿通明殿又建普濟景德總制寶藏佑聖靖應崇真文昌元應九殿至成化十七年重修天啓六年六月二十日災止存張真人府府設道籙司元三碑存張真人元以為天師明太祖去其舊稱俾為大真人改天師印為真人印後授六品銅印曰龍虎山正乙元壇之印宏治間賜玉印文曰陽平治都功印蓋紅巾張道陵舊印其文如此而陽平治即蜀之陽平山二十八治之一道陵起處也隆慶元年追奪其玉印萬曆二年厚賄馮保復給之大德顯靈宫在皇城西永樂時建成化中更拓其制又建彌羅閣嘉靖中復建昊極通明殿東輔薩君殿西弼王帥殿西殿有柏為雷所擘其枝委地如屏靈濟宫在皇城西祀玉闕金闕二真人永樂十五年建成化十六年重增宏麗凡遇大禮朝臣先習儀於朝天宫宫燬乃習儀於此崇禎十五年科臣左懋第疏言二真人乃叛臣之子不宜受朝臣拜跪請以帳幕隔之報可延夀寺在韓家山永樂時內臣剛鐵靖難從征有功葬於此真覺寺在阜成門外永樂中建至成化九年建石臺髙五丈許上列五塔宏光寺在香山宣德中內侍鄭同建同髙麗人倣其國毗羅殿之制作圎殿供毗羅門內松徑作盤最為幽勝順天保明寺天順中建俗稱皇姑寺正統八年征額森陜西呂尼叩馬諫而死及復辟乃為建寺肉身在寺中碧霞元君廟在城外東南宏仁橋成化時建宏仁橋元時呼為馬駒橋都人最重元君祠其在麥莊橋北者曰西頂在草橋者曰中頂在東直門外者曰東頂在安定門外者曰北頂又西直門外髙梁橋北亦有祠每月朔望士女雲集極樂寺在阜成門外成化中建寺有牡丹園春日遊履恆滿園有髙樓萬歷壬辰新進士曠鳴鸞必欲登之寺僧以久扄不便開曠不聼甫登火發曠與樓俱燼蓋嘉靖庚戌都城告警貯火藥於此煮酒者火觸之而作也關帝廟在皇城北安門東者曰白馬廟隋基也姚彬盜馬廟在三里河天壇北亦隋基也正陽門甕城廟建於明初蒲州楊太宰博每元旦入拜先以名刺通之曰鄉晚生明因寺在天壇北內有貫休所畫羅漢十六軸僧紫柏各係以贊僧寮左壁有董文敏其昌書佛成道紀天啓二年刻石隆安寺天順間建萬歷己酉重修後有一堂曰净土社宏善寺在左安門外所謂韋公寺也正德中內侍韋霦建寺後有西府海棠二株髙二尋每開爛如堆繡香氣滿庭昔人恨海棠無香誤也寺東臨池一亭亭後假山極其幽勝龍華寺在德勝門東成化三年建萬歷五年重修寺外稻田千畝宛如江南大隆福寺景泰四年建極其巨麗大法堂石欄乃南城翔鳳殿物撤用於此摩訶庵在阜成門外八里莊嘉靖丙午建都人王崇簡記豫少時獵西郊偶過摩訶庵見石工勒金剛經集篆於石呼僧問之廓上人曰此汪中丞所得之古集篆也其始青衣鼓枻於黃蓮洲垝垣間一篋浮水上觸舟視之故經沒滅耳夜則有鬼物恍惚呵護驚告中丞於日中辨之為古集篆金剛經中丞欲刻之金陵旋以撫軍雲中未果其門人洪度刻木相貽且告之故感此竒因願勒之石以示久逺並募士大夫楷書於後余為之歎異嘗聞金剛經之有集篆始於五代僧夢英集十八體宋僧道肯增成三十二體此或是耶亡何籀文法書焜耀壁上時萬歷戊午己未之際也豫頻年讀書庵中夕燈晨磬瞻曯獨久甲申避寇竄伏庵中流連而去逮歸來村墟半落風景非殊石經之室巍然而上人已九十老矣三十年來余初見刻石於承平之時逰覽於閒暇之日以至喪亂餘生人物灰散猶得見此經石俯仰今昔不知泣涕之無從也一日上人命諸孫元長聞因謂余知刻石因緣屬為著其意求汪中丞序不可得長椿寺僧性柔出以相質為掇其大略而識之亦以見余之瞻依此經獨久也汪中丞名可受號靜峰黃梅人廓上人名性宏元長名寂善聞因名寂惠萬夀寺萬歷五年建大璫谷大用寺基慈聖李太后出資巨萬命太監馮保督造寺懸永樂時所鑄大鐘內外書華嚴八十一卷名曰華嚴鐘按鐘在漢經厰此其一也厰在德勝門內舊鑄髙二丈餘濶一丈餘者尚有十數仆地上皆楷書佛經端徑如帖非沈度夏昶不能也十剎海在龍華寺前萬歷中陜西僧三藏建千佛寺萬歷九年孝定皇太后建內供髙麗所供尊天二十四身阿羅漢一十八身像貌詭異西域雙林寺在阜成門外二里溝萬歷四年建佛作西番變相興教寺在雙林寺東成化中建藥王廟在天壇北戚畹李成銘建長椿寺萬歷四十年孝定皇太后建在宣武門外斜街都人米萬鍾水齊禪師傳長椿寺水齊大師者名明陽故中山郡鹿氏子隂入母腹已立禪於嘉靖三十八年七月十有一日生泡質雖䝉識田無染見僧而悅聞佛而稱鎮星甫周即從剃落嗣法本郡慈氏寺太和座下餐麩跣立肇修苦行八越暑霜色腰參請初受記㟥嶺不二和尚謂當十方宏濟大展宗風某甲不當汝師再走雲霧山謁無窮長老心心印可泯言諦矣自是三十餘年間普陀大士峨眉普賢菩薩少林逹摩祖師道場躬親頂禮往來五臺終南伏牛等山普行饒益一切諸苦遍經罔攝其在中臺古松和尚問師云空假中是甚麼師默然元對當體全空頓見本來心地為然指以謝復於普陀問大智禪師云如何是生死答云生死原是大智師了然更然一指炙背八十一炷如華嚴卷數乃去通天和尚者峨眉老宿也問師西來意晴天日頭出下雨地皮濕說破無生話只恐信不及又問識得麼師左指天右指地不更下一語機緣既投衣法旋授二十七代之燈囑師重剔蓋至是師復然一指通前而三矣略述苦行實難縷數嘗割體肉半斤於伏牛兼刺骨懸耳立禪一年負椽求飼虎於本山暨大漫者前後共六年其臨崖潑水以供僧細事爾最後來京師以水齊著人號水齊師先期不食七冉七後然後呷水日數以為常初師持之終南三閲月已持之京師黑窑厰一年鷲峰寺一年宣武門外茶庵五年嗟夫月光水觀未罷資糧圖澄滌腸存乎神化方之於師行獨苦矣雖然苦行云者世俗目師之强名師固不知孰為苦孰為非苦也惟知空吾身以空一切示無揀擇而已矣聖母太皇太后皇帝陛下實與嘉之賜金紫欽命焚修敕建大華嚴寺於永樂店再建大祚長椿寺於今所尋敕師齎內帑普賜南海諸净剎及欽建八十八佛道場於休哉師之苦師之宏也斯真十方宏濟大展宗風者哉慈慧寺在平則門外萬歷中蜀僧愚庵建寺後蜘蛛塔蜀太史黃輝有碑記其事慈夀寺在阜成門外八里萬歷丙子慈聖皇太后建寺有塔十三級髙入雲表後寧安閣榜太后手書又後有九蓮菩薩像嘉禧寺在阜成門外二十里萬歷中建中有御書聨天主堂在宣武門東構於西洋利瑪竇自歐羅巴航海九萬里入中國崇奉天主所畫天主乃一小兒婦人抱之曰天母其手臂耳鼻皆隆起儼然如生人所印書册皆以白紅一靣反覆印之字皆傍行其書裝法如宋板式外以漆革護之外用金銀屈戌鈎絡所製有簡平儀龍尾車沙漏逺鏡候鐘天琴之屬蔣德璟破邪集序向與西士遊苐知其歷法與天地球日圭星圭諸器以為工不知其有天主之教也比讀其書苐知其竊吾儒事天之㫖以為天主即吾中國所奉上帝不知其以漢哀帝時耶和為天主也其書可百餘種顓與佛抗而迹其人不婚不宦頗勝於火居諸衲子以是不與之絶比吾築家廟奉先而西士見過謂豫此君家主當更有天主公知之乎豫笑謂天主則上帝也吾中國惟天子得祀上帝餘無敢干者若吾儒性命之學則畏天敬天無之非天安有畫像即有之恐不是深目髙鼻一濃鬍子耳西士亦語塞或曰佛自西來作佛像利氏自大西來亦作耶和像以大西抑西以耶和抑佛非敢抗吾孔子然佛之徒非之而孔子之徒顧或從之者何也未幾當道檄所司逐之燬其像拆其居而株擒其黨事急乃控於豫豫適晤觀察曽公曰其教可斥逺人則可矜也曽公以為然稍寬其禁而吾漳黃君天香以破邪集見示則若以其教為必亂世而亟為建鼓之攻又若以豫之斥其教而緩其人為異於孟子距楊墨之為者豫謂孟夫子距邪說甚峻然至於楊墨逃而歸則受之而以招放豚為過今亦西士逃而歸之候矣愚自以為善學孟子特不敢似退之所稱功不在禹下耳且以中國之尊賢聖之衆聖天子一統之盛何所不容四夷八館現有譯字之官西僧七王亦賜闡教之號即近議修歷亦令西士與欽天分曹測定聊以之偹重譯一種示無外而已原不足驅也驅則何難之有李文節曰退之原道其功甚偉苐未聞明先王之道以道之而輒廬其居亦不必豫因以此意廣黃君而復嘆邪說之行能使愚民為所惑皆吾未能明先王之道之咎而非邪說與愚民之咎也白蓮聞香諸教入其黨者駢首就戮意竊哀之然則黃君破邪之書其亦哀西士而思以全之歟即謂有功於西士可矣春明夢餘録卷六十六
