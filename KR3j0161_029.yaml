body:
  text: 春明夢餘録卷二十九吏部左侍郎孫承澤撰宗人府宗人府在皇城之東吏部衙門之上坐東向西洪武三年置大宗正院正一品二十三年改為宗人府設宗人令左右宗正掌皇族之屬籍以時修其玉牒書宗室子女嫡庶名封生卒婚嫁諡葬之事初以秦王為宗人令晉王燕王左右宗正周王楚王左右宗人及建都北京永春侯王寧洪熙宣德武定侯郭鉉署事正統三年始建府西寧侯宋瑛嘉靖中京山侯崔元署事寧瑛元皆駙馬都尉鉉仁宗貴妃弟崇禎五年壬申推掌印以近代多用都尉諸戚畹太康伯張國紀輩起而爭之然竟用都尉至己卯再推復力爭仍用都尉萬煒周禮少宗伯掌三族之别以辨其親疏此宗人立官之始後世因之置宗正然列於九寺之中至明特立宗人府于六部之上玉牒始于宋大中祥符其制考定世次枝分派别而歸于本統者為仙源積慶圖推其所自出至於子孫而列其名位者為宗藩慶系録具其官爵功罪生死乃若男若女者為類紀同姓之親而序其五服之戚疏者為屬籍編年以紀帝系而載其厯數及朝廷政令之因革者為玉牒明之玉牒至嘉靖重修其總圖倣古史世表之法以橫格分代數列書其名氏而各𣲖所出之子孫則遞書于各𣲖之下仍餘下方以俟續書其圖以帝系為統有雖係長出而在藩封及國初加封為王者俱不以加書于帝系之前有長出而殤追授封號者唯册內載之不以列于圖蓋從禮部之議也禮部疏云嘉靖二十四年九月初一日內閣題玉牒事宜臣等為照玉牒紀載宗支以垂萬世係朝廷重事其制不敢不倍加詳慎其舊牒內有事當釐改者理合開具上請臣等看得第一册內例有總圖備載天潢世系于首所以表帝王之統合同氣之親也切因世代未逺人數未多有紙一靣列書代氏而以硃線各系所出之子孫于下但近年以來宗𣲖蕃衍已倍于前其數不下纍萬兹仍用前制不惟紙狹不足備載而字迹微渺硃線紛亂難以尋檢不無遺漏混淆之弊况將來天支萬代愈難增續臣等竊意略倣古史世表之法以橫格分代數而列書其名氏于上其各𣲖所出子孫則從而遞書于各𣲖之下庶世次不紊一覽可見仍餘下方以俟後來增入臣等又思得玉牒之修當以帝系為宗統其中有雖係長出但不有天命位在藩封如懿文太子秦晉二王不敢以加於成祖之前又有雖係長出但既殤而追受封號如悼恭太子嶽懷王哀沖太子惟當以册內載之不敢列于圖之前俱所以尊帝統也其無可仿如頴陽等王則仍書之又壽春王熙祖之長子仁祖之兄也南昌諸王仁祖之長子太祖之兄也俱在太祖有天下之後追封為王今靖江王則南昌王之後也以太祖之聖子神孫視之則有堂從之分舊圖以列于帝系之前今移置本支之後亦所以尊帝統也明太祖自敘世德碑本宗朱氏出自金陵之句容地名朱巷在通德鄉上世以來勤農桑五世祖仲八公娶陳氏生男三人長六二公次十二公其季伯六公是為髙祖考娶胡氏生二子長四五公次即曾祖考四九公娶侯氏生子四初一公初二公初三公初四公初一公凡四子初一公配王氏為祖考妣有子二人長五一公次即先考諱世珍元初籍淘金户金非土産市于他方以先祖初一公困于役遂棄田廬携二子遷泗州旴𣅿縣先伯考五一公十有二嵗先考才八嵗先祖營家泗上置田治産及卒家日消由是五一公遷濠州鍾離縣其後因至鍾離居先伯考性淳良務本積德與人無疾言忤意鄉里稱善人先伯娶劉氏生子四人重一公重二公重三公生旴𣅿重五公生鍾離先考君娶陳氏泗州人長重四公生旴𣅿次重六公重七公生五河某其季也先遷鍾離後戊辰年先伯公有孫六人兵興以來相繼寢沒先兄重四公有子曰文正今為大都督重六重七俱絶嗣曩者父兄因某自幼疾捨入皇覺寺中甲申父母長兄俱喪次兄守業又次兄出贅劉氏某托迹緇流至正二十四年天下大亂諸兄皆亡淮兵大起掠入行伍乃招集義旅兵力漸衆因取滁和龍鳳三年帥師渡江駐兵太平為念先考君常言世為朱巷人宗族俱存平日每有鄉土之念即訪求故鄉宗族之所遂調兵取句容明年克金陵而朱巷距城四十里族父兄昆弟四十餘人至始得與之敘長幼之禮行親睦之道但朱氏世次自仲八公之上不可復考今自重八公髙曾而下皆起家江左厯世墓在朱巷惟先祖葬泗州先考葬鍾離此我朱氏之源流也爰自金陵太平駐師開府為基本之地實鄉郡焉屢嵗征伐拓境吳楚甌越方數千里由是纍有顯爵乃龍鳳九年三月十四日內降制書曾祖考為資德大夫江南等處行中書省右丞相上護國軍司空吳國公曾祖妣侯氏吳國夫人先祖考稱大夫江南行中書省平章政事上柱國司徒吳國公祖妣王氏吳國夫人先府君開府儀同三司録軍國事平西右丞相吳國公先妣陳氏吳國夫人以閏月十三日祇謁隴上焚香告祭遵舊典也重念報本禮行宜厚今勉建事功匪由已能實荷先世靈長之澤垂衍後昆報恩三代并為公以遂子孫者之至願書曰作善降之百祥易曰積善之家必有餘慶先祖父積功纍善天之報茂于厥後凡我子孫皆當體祖宗之心蹈德存仁以永其緒于無窮是吾之所望也于是備書于後以傳信將來有所考焉按明緒本顓頊周諸侯國于邾漢司空朱浮裔太祖不肯冒附名族惟以所知德祖為始祖其見過於漢唐逺矣帝系明髙皇二十六子懿文太子秦愍王晉恭王成祖文皇帝周定王楚昭王齊庶人潭王梓趙王杞魯荒王蜀獻王湘獻王代簡王肅莊王遼簡王慶靖王寧獻王岷莊王谷庶人韓獻王瀋簡王安惠王唐定王郢靖王伊厲王皇子楠太宗四子仁宗漢庶人趙簡王四皇子仁宗十子宣宗鄭靖王蘄獻王越靖王襄憲王荆憲王淮靖王滕懷王梁莊王衛恭王宣宗二子英宗景皇英宗十子