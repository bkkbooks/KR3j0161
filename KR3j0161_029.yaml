梟首籍其家仍貽書天下諸王以王無子將死令宫人若有娠者以托韓王及韓王既薨妃父恂與王母及妃謀取其妾之女與他人男前後令妾與子抱納宫中既長請于朝俱受封上惡其冒亂宗支故特以異法處之天順中命諸宗室凡無子者方許請繼室生子至八嵗者方許請名女至十五嵗者方許請封景泰時岷王徽煣奏蒙封臣子音垽為世子臣弟徽煝為江川王凡遇節令及家庭行禮班次不定命禮部議以宗子法言之則以嫡長為重以家人禮言之則以尊卑為先凡遇公禮則當依宗子法重在世子家庭私禮則當依家人禮尊歸叔伯天順末年楚府嶽陽恭僖王薨無嗣其弟鎮國將軍墀嫡長子輔國將軍均鍠請嗣封以奉恭僖之祀禮部言稽考近制惟親王無嗣有以郡王進封者郡王無嗣有以鎮國將軍進封者無輔國將軍封郡王例事遂止崇禎帝系諭德許士柔帝系不可略疏臣備員史局執事神廟熹廟兩朝纂修之役得于皇考實録大端目涉手鈔反覆參定尤加詳核竊以為本朝實録一書即古帝王本紀史家編年遺意也其間提綱振目最重且大莫若聖作明述世系相傳之際故總紀之則父子母后之倫書之必其備分紀之則兄弟同宫異寢之序書之又必其明惟明且備乃為實録此定體也以臣觀於皇考改録世系獨略萬不可解此不可以當代闕文傳疑後世積慮于中欲陳已久今請為皇上備陳之而加裁察焉臣謹按原録萬厯三十三年乙巳十一月十四日皇考第一子生命廟諱孝和皇后出此熹廟篤生之自所當書也後三十四年丙午十二月二十八日皇考第二子生命某名孝和皇后出追封簡懷王後三十七年己酉七月十五日皇考第三子生命某名母選侍王氏出後三十八年庚戌十一月十六日皇考第四子生命某名母選侍李氏出此諸皇子遞年之自所當書也逮至我皇上鳳乳龍興之瑞孝純皇后捫天懷日之祥亦實在萬厯庚戌間則聖母氏族所自出封號所自隆録中固自當具載皇上娠教之年聖誕之日命名之典潛邸之號録中尤自當表明蓋必如是而後倫備而序明可以見皇考當時前有為之作後有為之述後宫多俔天之媛五葉肇承乾之胤暨乎聖母麟趾之並庥王母葛藟之綏福昭代盛烈誠可以光示于天下萬世無窮也亦必如是始見我皇上帝立之最竒天命之攸歸三代以來所未有而昭代二百餘年所僅見也乃臣所閲改録則考以皇上娠教之年聖誕之日不書也命名之典潛邸之號不書也臣不能解也更考以聖母出何氏族受何封號不書也臣不能解也而且遍及諸王之生與所生之自花蕚相輝之美鳲鳩並飼之仁不書也臣不能解也所書者止三十三年乙巳皇考第一子而巳夫皇考實生五子而何以獨紀其一皇上實有四兄而何以竟遺其三臣不能解也且臣同官文震孟所言此改録所筆焉者也筆焉而不信天下萬世猶得按其筆而正之若今臣所言此改録所削焉者也削焉而不著則將使天下萬世讀皇考實録者謂聖躬之誕降果何辰謂聖母之發祥果何姓謂其間花蕚輝映者又果幾何人是使聖朝父子母后兄弟之大倫皆缺而不具晦而不辨也臣所謂不可解者此也或者為之解曰皇上之誕降聖母之發祥在皇考之録雖不書而萬厯三十八年皇第五孫之生當必書之也臣則曰自仁率親上而至于祖自義率祖下而至于禰祖廟尊而逺何若禰廟親而近以明明天子不大書于禰廟皇子之列而附書于祖廟皇孫之列此何可為訓也又或為之解曰皇上之誕降聖母之發祥在皇考之録即不書而天啓初年皇五弟之冠婚册號當必書之也臣則曰父子相傳之謂世兄弟相傳之謂及總繇一本之繼體須辨兩宫之各乳况冠婚册號乃成立以後之典禮誕降發祥乃哲命初生之本原本原蚤已不著典禮何自而加以明明天子不蚤揭其天錫岐嶷之始而雜見于藩邸婚封之列又何可為訓也若此者其在當曰筆則筆削則削果無心耶抑有心耶其無心也是玩帝系而輕削之不可訓也其有心也是紊帝系而故削之是可忍也孰不可忍也今原録雖不藏史宬然聞當日之史臣嘗潔而藏之閣中矣皇上試命典籍搜取詳加睿覽此假紀載原録有是乎無是乎原録而有之則原録宜復也原録而無之則改録何以不補也况原録之成在皇上潛邸之日而統系之詳慎如此及改録之成在皇上御極之初而統系之慢忽如彼將何以傳信天下萬世也而宫闈更有大典今日不容不著明者孝元貞皇后皇考之元配也遡青宫承飾之春則當以萬厯三十年二月書大婚以正其始逮副禕掩綵之冬則當以萬厯四十一年十二月書辭御以正其終而今録勿書也天下後世考皇考元配之始末者將何徴也孝和皇后熹廟之所鍾慶也在承華懸矢之辰業已于萬厯三十四年三月書封號以著有初至景殿驚葭之夕亦當以萬厯四十七年三月書辭御以著有卒而今録又勿全書也天下後世考熹廟鍾慶之始末者又將何徴也至孝純皇后之辭御日月已載著祀典而其年亦不著于録中此又所當詳載者也臣所謂總紀之欲其備分紀之欲其明者此也總之今日之録本紀編年之意微而提綱振目之法泯義例不問所重輕筆削不𠂻所緩急而臣于皇考實録尤獨注詳者則以列聖實録祗取當年之行事分著本年之條目而遂可備一王之書皇考實録必以一月之紀載備舉四朝之大綱而後可以成一代之史此臣所以積慮於中欲陳已久不能不為皇上備悉之而仰祈聖裁者也又詳考補牘以效史職疏臣前有帝皇世系一疏仰祈聖鑒摉取原録詳加參訂以定信史奉旨實録體裁自有纍朝成例不必復滋煩議臣恭繹明綸敢不敬懼奉持無容再瀆然臣終夜思維平旦憬然竊有不得已而言者則臣嘗考之纍朝實録矣臣未暇全舉即以我太祖髙皇帝二十六子憲宗純皇帝十有三子其最盛也而實録中書誕書名書婚書封母后著焉仁宗昭皇帝十子世宗肅皇帝八子亦最盛也而實録中書誕書名書婚書封母后著焉次及妃嬪公主以至冠婚典禮莫不燦列昭如雲漢是帝皇世系為成例者也但我皇考在位止是一月其世系書法既不能如列聖條析于編年之中自當潔要提綱統列于總紀之首而臣閲改録挂漏殊甚即我皇上聖母孝純皇后並未紀載其餘可知且臣遡此録告成之日在皇上元年二月是皇上登大寶既半年矣我朝列聖一帝止生一帝而我皇考一帝而生二帝則為臣子者以皇考總紀之首篇紀皇上龍興之盛事自是千古無兩之美業而改録不然反舉原録而刪削焉則臣前疏所論列者政謂夫改録與纍朝成例有所不合也如果合成例臣又何有言若原録總紀則世系明備仰祈我皇上試宣取詳覽其是非得失必有瞭然者此臣前疏所謂原録宜復也乃臣積慮詳訂前疏有未敢深言與未及悉言者以聖明在上臣安敢復隱而不吐以朦徇滋戾其一曰髙皇后之祭典宜書也蓋禮莫大于祭祭莫重于始祖而國家以八月初十日髙皇后忌辰祭奉先殿先二日奏祭此萬世不祧之廟制纍朝實録所必書而世宗肅皇帝以是日聖誕議先期受賀議同日舉行實録所載尤詳今皇考元年八月初十日奉先殿行禮弗書也若曰不舉而不書則以皇考之孝敬必無此失節若曰舉之而不書是以臣子之忽玩陷皇考于廢禮也且是月初八日孝康皇后之祭則書初二日先師孔子之祭則書而何獨漏于髙皇后也其一曰孝端顯皇后之為嫡母宜書也夫分莫尊于正嫡而恩莫大于保聖當孝靖皇后封號未加我皇考青宫未定而貴妃顯號先隆之日國本幾危于震虩天心幸託諸坤寧商山之羽翼曽未能轉日而河洲之荇藻乃可以補天在當日調護之苦心真萬古慈聖之極則乃至今外廷尚論夾輔之功而中宮不言顧復之德即貴妃尚見封后之論而嫡母不著其恩勤之勞此真天理所必不可磨而人心所必不容泯者也臣所謂未敢深言者此也又其一曰皇考之冠禮夫冠禮成人之始嘉事之重與婚禮並書纍朝可考也况古者天子之子十五而冠而皇考以二十而冠即以二十而婚視列帝嘉禮後期已甚此其危疑震撼所關特重今何以不書也其一曰皇考之公主夫公主同氣之至親內戚之至貴與子並書亦纍朝可考也蓋古者男女異長以辨內外而皇考本育八女所存三主則寧德遂平樂安其笄字于歸皆骨肉毛裏所係最親今何以不書也此臣所謂未及悉言者此也凡此皆大經大法典章首務聖明在上臣子所當有言無諱而皇上孝思無窮所當下明詔令史局著之本録者也至于書法之宜繁宜簡則以列聖在位多歷年所其于編年既詳則于總紀可約而皇考在位止是一月夫既不暇編年自當詳于總紀此史官之事臣業已具揭閣臣無容贅瀆聖聽也臣職在史局叨祿十有餘年外無疆場汗馬之勞內無民社專城之績惟是討論故實次第編摩以供史職庶無瘝官故敢不辭數瀆仰祈聖聽萬歷實録萬歷三十三年乙巳十一月皇太子第一子生即熹宗選侍王氏出神宗以元孫生頒詔天下諭宗藩三十四年十二月二十八日皇太子第二子生與元孫同母命名由㰒四嵗薨天啓二年追封簡懷王三十七年七月皇太子第三子生命名由楫母選侍王氏八嵗薨三十八年十月十六日皇太子第四子生命名由模母選侍李氏五嵗薨十二月二十四日皇太子第五子生命名由檢天啓二年封信王母選侍劉氏追封貞靜賢妃泰昌實録初録萬歷三十三年乙巳十一月皇太子第一子生即熹宗選侍王氏出神宗以元孫生頒詔天下諭宗藩三十四年丙午二月尊上慈聖徽號是月進封聖母恭妃為皇貴妃先是羣臣屢請進封皆不允至是以宫闈喜慶大典告成特諭舉行人情歡悅三月封元孫母王氏為才人時禮部議上封號不稱神宗意傳諭再議隨出皇明典禮一書內載皇太子正妻皆封妃次皆稱才人故禮部奉旨定今封三十四年十二月二十八日皇太子第二子生與元孫同母命名由㰒四嵗薨天啓二年追封簡懷王三十七年七月皇太子第三子生命名由楫母選侍王氏八嵗薨三十八年十月十六日皇太子第四子生命名由模母選侍李氏五嵗薨十二月二十四日皇太子第五子生命名由檢天啓二年封信王母選侍劉氏追封貞靜賢妃按光宗在東宫生育頗多崇禎初追封皇兄齊思王等皇姊悼淑公主等至辛巳五月御札皇六弟定懿妃生七弟敬妃生十妹慎嬪生皆殤未追封擬封六弟湘懷王七弟慧昭王十妹悼溫公主七月二十日親定皇六弟名由栩七弟名由橏皇十妹名徽姃又追賜九妹名徽妱仍祭告奉先殿愍帝生母孝純皇太后生于萬歷壬辰而薨于甲寅七月十九日享年僅二十有三時帝甫四齡及登極詔曰朕惟慶源有自禮必隆于所生孝思永言施必由于親始典關教衆誼切同心彛章具存肇稱宜亟我皇妣貞靜賢妃芬降華宗躬膺令德徽音夙稟于女史婉懿早著于青蒲在昔皇考育我弟昆蓋華蕚共輝於連枝而顧復各勤于離裏我皇兄纂承祧之重典既篤于濬源逮眇躬荷世及之休情亦深于惓慕欲酬罔極宜備追崇正儷體之鴻稱舉遷祔之上典庶永無窮之問少伸不匱之思於是禮部上尊諡孝純淵靜慈肅毗天鍾聖皇后遷祔慶陵崇禎丁卯九月二十七日册立皇后諭曰朕聞太極元撰首闢乾坤天地合德乃生萬物則君之有后固儷體于兩儀而弼成於風化者也朕昭受鴻圖誕撫函夏思順陰陽剛柔之道茂衍室家君王之傳嘉內德于安貞稽懿徽于溫惠敬崇壼教宜正隆稱元妃周氏揚芬華族育慶軫元皇兄慎選以配朕躬夙夜無逸而闡敬戒已受封章于潛邸丕纘景命以維新四德咸修六宮著範可册立為皇后女順蔚承乾之佑坤寧協應地之符特諭於是遣禮部尚書來宗道持節英國公張惟賢捧册大學士黃立極捧璽施鳳來行禮崇禎元年二月初四日皇長子生誥曰朕惟帝王膺天歷而奉宗祧首重元儲尤隆世嫡朕以眇躬嗣位丕基夙夜祗念我皇祖皇考集慶發祥源深緒逺佇昌嗣續仰慰貽謀兹荷上帝居歆宗祊垂祐以今年二月初四日第一子生係皇后周氏出中闈開冡胤之先萬國愜元良之祝肆頒渥澤覃被多方崇禎三年二月初十日册立東宫詔曰朕惟自古帝王嗣大歷服長治久安莫不首重建儲所以定宗祧隆國本凝天眷而繫人心也我祖宗列聖相承德祚綿洽率繇兹道以裕貽謀朕祗紹丕基兢懷付託乃荷皇穹眷祐胤嗣早開長子慈烺睿託坤元祥鍾震一中外起敬承之頌天人表協應之符昨日文武臣民疏請再三舉行册禮而朕以子方襁褓謙讓未遑兹屆青陽載仲之辰正值蒼巽誕彌之月禮官復申前請衆志誠難固違爰考舊章式諏吉日祗告于天地宗廟社稷授册寶立慈烺為皇太子以仰繩纍葉無疆之緒俯慰兆人胥戴之情大典告成環垓同慶崇禎十四年九月十八日册封第三子慈炯為定王十五年三月二十一日册封第四子慈照為永王皇女樂安長公主名徽娖春明夢餘録卷二十九
